[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--disable-warnings",
    "--randomly-seed=last",
    "--disable-socket",
    "--allow-hosts=127.0.0.1,::1"
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "aws: opts a test out of the tests/conftest.py L2 create_client tripwire (rec-2484) -- the test genuinely constructs an AWS client, mocked or live"
]

[tool.ruff]
line-length = 127
target-version = "py312"
exclude = [".git", "__pycache__", ".venv", "personal_scripts"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.coverage.run]
source = ["src"]
omit = ["*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
fail_under = 37
show_missing = true
