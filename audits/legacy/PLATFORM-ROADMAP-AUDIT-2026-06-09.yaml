audit:
  id: PLATFORM-ROADMAP-AUDIT-2026-06-09
  target: docs/ROADMAP-PLATFORM.yaml
  target_git_sha: "038149661fade75cb94e02cb005cf312f00f4c7a"  # pragma: allowlist secret -- public commit hash, not a credential
  date: "2026-06-09"
  method: docs/AUDIT-PROMPT-platform-roadmap-audit.md
  method_version: 1

summary:
  headline: |
    The roadmap is mechanically sound (validator PASS, no duplicate ids, no dangling
    depends_on, clean completed_at hygiene) and its status fields are broadly honest:
    of 50 D3 verdicts, 31 confirmed and only 2 contradicted, with most partials
    self-disclosed in notes. It is NOT yet a trustworthy autonomous control surface,
    for four dominant reasons. First, the documented governance semantics are fiction
    in places: the log-decision Lambda (T0.7b) is described as the ratification
    vehicle while every ratified CD actually went through the ops portal, and that
    fiction leaves CD.25/T1.12/T0.7a-c in a structural deadlock no bootstrap exemption
    covers. Second, the consumer contract overstates what is implemented: preflight
    never surfaces blocked-on-CD, nothing evaluates cross_tier_gates, and the
    preflight report no longer carries the keys T-1.4 promises. Third, the forward
    book of work (the T0.6-T1.4 Lambda wave, T1.5/T1.6, T3.2) was authored against
    a pre-DuckLake / pre-CD.24 / pre-CD.21 world and was never re-grounded, so
    several currently-eligible items would misdirect the next planning session.
    Fourth, the recs cutover (T2.19) is genuinely closed on the write side but a
    read-side Athena fallback in sync_ops plus three drifted contracts and a missing
    validate.py topology guard leave the closed-boundary invariant unenforced.
    Planning consumers can rely on next_eligible only with per-item re-verification.
  findings_by_severity: {critical: 1, high: 10, medium: 18, low: 9}
  findings_by_dimension: {D1: 2, D2: 7, D3: 7, D4: 3, D5: 2, D6: 2, D7: 5, D8: 3, D9: 1, D10: 1, D11: 5}
  contract_closure: {closed: 3, open: 5, waived_prose_only: 2}
  status_truth_verdicts: {confirmed: 31, partially_confirmed: 17, unsubstantiated: 0, contradicted: 2}
  rubric_coverage:
    - id: R1
      element: "Document identity and governance"
      present: true
      carrier_keys: [document.id, document.version, document.status, document.filed_via, gate_helpers]
      notes: "Schema-validated via T-1.5/validate.py. CD-level state/filed_via are free strings (CD.1 deviates); document.status=draft is consistent with CD.1 pending."
    - id: R2
      element: "Strategic frame"
      present: true
      carrier_keys: [north_star, header-prose, rebuild_vs_refactor]
      notes: "NS.1-NS.5 present and current (NS.1 generalised per Decision 78). Sibling-boundary claim in the header is stale (F-029)."
    - id: R3
      element: "Current-state baseline"
      present: true
      carrier_keys: [foundation_already_shipped]
      notes: "15 entries; 11 confirmed. F.2 describes retired infrastructure as live, F.14 is a dead pointer, F.7 has a stale locator (F-024/F-025)."
    - id: R4
      element: "Work breakdown"
      present: true
      carrier_keys: [tier_items]
      notes: "Stable ids, intent, exit_criteria, effort, status lifecycle all present. Quality uneven on the forward book (D7 findings F-008, F-015, F-016)."
    - id: R5
      element: "Sequencing"
      present: true
      carrier_keys: [depends_on, tiers, PlatformRoadmapState]
      notes: "Machine-checkable and cycle-free. Missing edges exist where out-of-order T2 execution broke the tier-order assumption (F-012); active_tier=T-1 no longer describes execution reality."
    - id: R6
      element: "Decision governance"
      present: partial
      carrier_keys: [candidate_decisions, decision_required_before, bootstrap clauses, bootstrap_completion_exempt]
      notes: "Rich structure, but completion gating is unenforced and violated (F-011), the exemption flags drifted beyond both documented scopes, and the ratification vehicle is obsolete (F-001)."
    - id: R7
      element: "Risk register"
      present: true
      carrier_keys: [open_questions, known_gaps]
      notes: "Present with resolution tiers; 6 OQs and 3 KGs are stale, and KG.11's own trigger is breached without the prescribed action (F-019/F-020)."
    - id: R8
      element: "Economics"
      present: true
      carrier_keys: [cost_projection, effort]
      notes: "cost_projection updated through CD.21/CD.34 (runner retired, Neon $0) and carries reevaluation triggers. Effort calibration largely sane; L-without-strategic is freeze-era deliberate but unevenly annotated (F-027)."
    - id: R9
      element: "Measurability and freshness"
      present: partial
      carrier_keys: [exit_criteria, compute_state_dict stale_cache_note]
      notes: "Per-item exit criteria are the norm; freshness mechanism is only the preflight mtime note. No periodic review mechanism; several complete items have unreproducible criteria (F-006); silent completion found (F-013)."
    - id: R10
      element: "Consumer integration"
      present: partial
      carrier_keys: [header consumer list, agent_instructions, session_preflight integration]
      notes: "Consumers named and preflight integration real, but agent_instructions promise blocked-on-CD surfacing and gate enforcement that are not implemented (F-010)."
    - id: R11
      element: "Impact closure"
      present: partial
      carrier_keys: [files_in_scope, paired tier_items, docs/contracts cross-refs]
      notes: "T2.16b is a model closed cutover. But CD.28 decommission work lives only in CD prose (not tier items), T2.19's deferred four-table migrations have no owning item, and contracts lag both cutovers (F-003/F-004/F-018/F-021)."

findings:
  - id: F-001
    dimension: D2
    severity: critical
    confidence: high
    title: "CD.25 ratification deadlock: T0.7a/b/c require T1.12 complete, T1.12 completion requires CD.25 ratified, CD.25's documented ratification vehicle is T0.7b"
    detail: |
      Under the document's own semantics the chain is circular and no bootstrap
      exemption covers it. T0.7a/T0.7b/T0.7c each list T1.12 in depends_on, so the
      log-decision Lambda cannot START until T1.12 is complete. T1.12 is gated for
      COMPLETION by CD.25 (it appears in CD.25.gates) and explicitly carries
      bootstrap_completion_exempt: false. CD.25's bootstrap allowance states
      "ratification happens once T0.7b (log-decision Lambda) is available", and the
      agent_instructions declare T0.7b "the first ratification vehicle". An agent
      planning strictly from this document concludes the entire Lambda tooling
      surface is permanently blocked. In practice the deadlock has already been
      bypassed: CD.16, CD.24, CD.31 and CD.33 were all ratified via the ops portal
      (ops_decisions:dec-1085/1086/1089) with T0.7b not_started - which proves the
      documented vehicle is obsolete, but the roadmap never says so. The blast
      radius is the whole T0.6-T1.4 wave plus T-1.1 (filing CD.1-CD.19), whose
      incomplete ancestor set is {T-1.12, T0.12.7, T0.12.5, T0.13, T0.6, T1.12,
      T0.7b}.
    affected_ids: [CD.25, T1.12, T0.7a, T0.7b, T0.7c, T-1.1, CD.1]
    evidence:
      - "docs/ROADMAP-PLATFORM.yaml:2217 (T0.7a depends_on includes T1.12); :2240 (T0.7b); :2259 (T0.7c)"
      - "docs/ROADMAP-PLATFORM.yaml:780 (CD.25.gates includes T1.12); :2858 (T1.12 bootstrap_completion_exempt: false)"
      - "docs/ROADMAP-PLATFORM.yaml:751-753 (CD.25: 'ratification happens once T0.7b ... is available'); :85-86 ('the log-decision Lambda (T0.7b) is the first ratification vehicle')"
      - "command: wave-1.5 reachability scan; output: CD.25 gated_incomplete_nonexempt=[T1.12], of_which_on_T0.7b_dependency_path=[T1.12]"
      - "docs/DECISIONS.md (per subagent B): Decisions 78/79/81 ratified CD.31/CD.16+CD.24/CD.33 via ops portal with T0.7b not_started"
    proposed_remediation: "Amend agent_instructions and CD.25 to name the ops portal (file_decision) as the interim ratification vehicle, or add a bootstrap exemption for T1.12, or drop the T1.12 edge from T0.7a/b/c. Proposal only."
    proposed_rec: true

  - id: F-002
    dimension: D2
    severity: high
    confidence: high
    title: "CD completion-gating rule is unenforced and violated by four unexempted completions; bootstrap exemption flags drifted beyond both documented scopes"
    detail: |
      The documented rule is that a CD must be ratified before its gated tier_items
      can be marked complete, with a per-item bootstrap_completion_exempt flag as
      the only sanctioned escape, scoped to two enumerated sets with termination
      clauses. At HEAD: T0.10 (gated by pending CD.5), T2.12 (pending CD.20), and
      T2.16b + T2.17 (pending CD.34) are complete WITHOUT the exemption flag - the
      rule as written was simply not applied. Separately, eight items carry the
      flag while belonging to NEITHER documented scope (T0.2, T0.3, T0.5, T2.1,
      T2.2, T2.3, T2.10, T2.13), so no termination clause governs when their
      exemptions end. The START-eligibility enumeration is also stale on both
      sides: it lists T0.4 and T-1.4 as having depends_on:[] (they do not) and
      omits T-1.7/T-1.9/T-1.11 (which do). Nothing in platform_roadmap.py or
      validate.py checks any of this, so the governance layer the document
      presents as binding is effectively advisory.
    affected_ids: [T0.10, T2.12, T2.16b, T2.17, CD.5, CD.20, CD.34, T0.2, T0.3, T0.5, T2.1, T2.2, T2.3, T2.10, T2.13]
    evidence:
      - "command: wave-0 scan; output: complete_gated_by_pending_cd_no_exemption = [T0.10/CD.5, T2.12/CD.20, T2.16b/CD.34, T2.17/CD.34]"
      - "docs/ROADMAP-PLATFORM.yaml:61-82 (two documented exemption scopes + termination clauses); flags outside both scopes at :2110, :2130, :2187, :2960, :2978, :2999, :3154, :3276"
      - "docs/ROADMAP-PLATFORM.yaml:54-60 (START enumeration lists T0.4 despite depends_on [T0.3] at :2155; T-1.4 despite depends_on [T-1.0] at :1602)"
      - "scripts/platform_roadmap.py:310-381 (PlatformRoadmapState reads no candidate_decisions; no completion-gating check exists)"
    proposed_remediation: "Either enforce the rule (validate.py check: complete + pending gating CD requires the flag; flags require a documented scope) or rewrite the bootstrap clauses to describe the actual operating convention (complete first, ratify via portal afterwards). Proposal only."
    proposed_rec: true

  - id: F-006
    dimension: D3
    severity: high
    confidence: high
    title: "T0.3 is complete but its sole files_in_scope artifact (scripts/verify_platform_account.py) is absent and every exit criterion asserts checks of that nonexistent verifier"
    detail: |
      All T0.3 exit criteria are of the form "verifier check X passes" against
      scripts/verify_platform_account.py, which does not exist at HEAD (and the
      squashed clone has no history to show when it was removed). The IAM substrate
      it verified (terraform/personal/platform_roles.tf, Pattern B roles) exists
      and works - the session-start hook proves the chain daily - but the strongest
      evidence class for this complete item is unreproducible, and exit criterion 5
      (ops_decisions entry) is self-deferred to not_started T0.7b. T0.3 underpins
      most downstream account work.
    affected_ids: [T0.3]
    evidence:
      - "command: ls scripts/verify_platform_account.py; output: No such file or directory"
      - "docs/ROADMAP-PLATFORM.yaml:2118-2124 (exit criteria all reference verifier checks); :2131-2132 (note + progress_note claim '14/14 checks pass')"
      - "CD.28 discipline point at docs/ROADMAP-PLATFORM.yaml:993 still schedules edits to the now-absent verifier (PLAN-retire-bedrock-code-paths scope)"
    proposed_remediation: "Restore or re-derive the verifier, or rewrite T0.3's exit criteria to the terraform-realized reality; also update CD.28's follow-on plan scope which edits the absent file. Proposal only."
    proposed_rec: true

  - id: F-007
    dimension: D3
    severity: high
    confidence: high
    title: "T2.13 (public flip) is the most overstated complete: its post-flip verification criteria were not satisfiable on the completion date and two dependencies were unmet"
    detail: |
      T2.13 completed 2026-05-30, but its exit criteria assert GHAS active,
      branch protection active, and a green Codespace preflight - none of which
      held at flip time by the item's own note. Its depends_on (T2.5 in_progress,
      T2.11b in_progress) were and remain unmet; the green-Codespace criterion
      depends on T2.11a, still not_started. The flip itself happened (Decision 76)
      and most security criteria were later satisfied by T2.12 (2026-06-08), but
      "complete" here recorded an event, not the written exit criteria. Since
      downstream T2.15/T2.20 depend on T2.13, the status materially affects
      eligibility computation.
    affected_ids: [T2.13, T2.11a, T2.11b]
    evidence:
      - "docs/ROADMAP-PLATFORM.yaml:3263-3270 (exit criteria: GHAS verified post-flip, Codespace green preflight, branch protection); :3277 (note admits T2.11a/b + T2.12 outstanding at flip)"
      - "command: wave-0 scan; output: T2.13 complete with incomplete deps [T2.5, T2.11b]"
    proposed_remediation: "Either rescope T2.13's exit criteria to the flip event (moving verification to T2.11a/T2.12 where it now lives) or annotate the criteria as retrospectively satisfied where true. Proposal only."
    proposed_rec: true

  - id: F-009
    dimension: D4
    severity: high
    confidence: high
    title: "Stale 'Lambda-deploy DEFERRED per Decision 67' and 'DEFERRED until CD.16 ratifies' language survives on six-plus surfaces after Decision 79 lifted the freeze and CD.16 ratified"
    detail: |
      Decision 79 (dec-1086) lifted Decision 67's blanket Lambda-deploy freeze and
      ratified CD.16/CD.24, and AGENTS.md states per-Lambda gating is the live rule.
      Yet T2.19's intent still says "Lambda-deploy DEFERRED per Decision 67 / CD.16
      until per-Lambda gating resolves" while the SAME item's exit criteria say the
      clause was lifted by Decision 79 - an internal contradiction on a live
      in_progress item. CD.31's discipline point says T2.19 "deploys nothing"
      (it deploys four Lambdas). CD.28's follow-on inventory cites "Decision 67
      deferred-deployment markers" three times, CD.27's T4.x template once, and
      T1.12's intent still reads "DEFERRED until CD.16 ratifies" with a
      decision_required_before naming an already-ratified CD.
    affected_ids: [T2.19, CD.31, CD.28, CD.27, T1.12]
    evidence:
      - "docs/ROADMAP-PLATFORM.yaml:3550 (intent DEFERRED) vs :3570 (exit criteria: 'Decision 67 Lambda-deploy clause lifted by Decision 79')"
      - "docs/ROADMAP-PLATFORM.yaml:1244 (CD.31: 'This plan is IMPLEMENTATION and deploys nothing'); :972-973, :998, :1025 (CD.28 inventory); :885 (CD.27 template); :2822, :2832-2833 (T1.12)"
      - "docs/DECISIONS.md (per subagent B): Decision 79 = dec-1086 lifts the deploy clause; AGENTS.md Temporary Operational Constraints"
    proposed_remediation: "One sweep replacing the lifted-freeze language with the CD.16 per-Lambda rule (deploy fine; only the dispatcher smoke-test deferral survives until T4.3). Proposal only."
    proposed_rec: true

  - id: F-011
    dimension: D5
    severity: high
    confidence: high
    title: "Product MVP.4 (real-money stage gate) depends on platform T3.5, which sits behind a fully not_started chain ending in an XL strategic item"
    detail: |
      MVP.4, L2.pc.10 and L3.exec.11 in ROADMAP-PRODUCT.yaml depend on PLATFORM:T3.5
      (TCA aggregation). T3.5 is resolvable but practically blocked: its chain is
      T3.5 <- T3.4 (XL strategic) <- T3.3 (L strategic) <- T3.2 <- T3.1 (L), all
      not_started, with leaves T0.12.6 (not_started) and T3.6 (in_progress). The
      CD.16 start-gate on T3.5 is satisfied (ratified), so depth is the blocker.
      A product planner reading edge resolution alone would see T3.5 as available;
      it is multiple strategic decompositions away. Also worth scrutiny: T3.5
      depends on T3.4 (full control-plane loop closure), which is a heavyweight
      prerequisite for what is otherwise an aggregation Lambda + contract.
    affected_ids: [T3.5, T3.4, T3.3, T3.2, T3.1]
    evidence:
      - "docs/ROADMAP-PRODUCT.yaml:4073-4085 (MVP.4 cross_roadmap_depends_on PLATFORM:T3.5); :1854-1866 (L2.pc.10); :2495-2507 (L3.exec.11)"
      - "docs/ROADMAP-PLATFORM.yaml:3857 (T3.5 depends_on [T0.7a, T0.12.5, T3.4]); :3831-3844 (T3.4 XL strategic not_started)"
    proposed_remediation: "Re-examine whether T3.5 truly needs T3.4 (vs only T3.1/T3.2-grade verification), or resequence a minimal TCA path for the product MVP. Proposal only."
    proposed_rec: true

  - id: F-010
    dimension: D6
    severity: high
    confidence: high
    title: "agent_instructions promise consumer behavior that does not exist: blocked-on-CD surfacing is unimplemented, cross_tier_gates are evaluated by nothing, and the preflight report dropped the keys T-1.4's exit criteria require"
    detail: |
      Three documented-vs-implemented gaps. (1) Lines 41-43 claim "preflight
      surfaces 'blocked-on-CD' when a tier_item is eligible-by-deps but a referenced
      CD is pending" - compute_state_dict and PlatformRoadmapState never read
      candidate_decisions; no such computation exists anywhere. (2) Line 44 declares
      cross-tier gates "MUST hold, not advisory", but no consumer evaluates gate
      rules (the validator checks grammar only; G.8's latest_run.verdict aggregation
      was never built). G.1 and G.2 are in fact already violated by practice:
      ratifications proceeded with T-1 at 10/20 complete, and all work happens in
      web sessions with T0 at 8/19. (3) session_preflight._slim_roadmap_state
      deliberately drops in_progress/blocked/active_tier, so the preflight report
      contains only next_eligible+strategic_pending - T-1.4's exit criterion 1
      (report contains all five keys) is regressed at HEAD. Consequence: the
      computed next_eligible is the ONLY machine signal, and 5 of its 9 entries
      currently misdirect (T-1.9 silently complete, T0.6 stale architecture,
      T2.4 missing producer, T2.15 future-gated, T0.4 user-action-gated but the
      flag is not surfaced).
    affected_ids: [T-1.4, G.1, G.2, G.8]
    evidence:
      - "docs/ROADMAP-PLATFORM.yaml:41-44 (blocked-on-CD + MUST-hold claims); :1606 (T-1.4 exit criterion listing five report keys)"
      - "scripts/platform_roadmap.py:310-381 (no candidate_decisions consumption); scripts/session_preflight.py:1519-1531 (_slim_roadmap_state keeps only next_eligible+strategic_pending)"
      - "command: compute_state_dict; output: next_eligible=[T-1.9,T0.4,T0.6,T1.11,T2.4,T2.8,T2.9,T2.15,T2.20], active_tier=T-1; gate liveness: G.1 tier(10/20), G.2 tier(8/19)"
    proposed_remediation: "Either implement blocked-on-CD + gate evaluation in compute_state_dict (and restore the report keys), or rewrite agent_instructions/T-1.4 criteria to match the slim implementation. Proposal only."
    proposed_rec: true

  - id: F-008
    dimension: D7
    severity: high
    confidence: high
    title: "The forward Lambda-tooling wave (T0.6-T1.4) was authored pre-CD.24/CD.33/T2.19 and never re-grounded: wrong packaging artifacts, an Iceberg write path for a table now on DuckLake, and an obsolete read approach"
    detail: |
      Three compounding defects in the next Lambda wave's instructions. (1) T0.7a/b/c
      and T1.1 prescribe Dockerfile + requirements.txt and omit manifest.yaml,
      contradicting ratified-and-shipped CD.24 (zero Dockerfiles exist across all
      12 Lambdas; manifests are the packaging SSOT; PROJECT_CONTEXT says "No Docker").
      (2) T0.7a's intent specifies "idempotent Iceberg append" for log-rec, but
      ops_recommendations now lives on DuckLake behind the closed writer boundary -
      implementing T0.7a as written would open a second recs write path to a retired
      backend. CD.33 already declared CD.10's six-Lambda enumeration illustrative,
      and ducklake_writer/reader serve the recs path today; T0.6's exit criteria
      still require the six-Lambda skeleton. (3) T1.1's read approach (Athena
      _current view against the OLD company account, then DuckDB-on-Iceberg) is
      doubly obsolete: the old account was migrated (T2.2/T2.3) and recs reads now
      transit ducklake_reader. T0.6 is in next_eligible TODAY, so this misdirects
      the very next planning session.
    affected_ids: [T0.6, T0.7a, T0.7b, T0.7c, T0.8, T1.1, T1.2, T1.3, T1.4, T1.9, CD.10, CD.15]
    evidence:
      - "docs/ROADMAP-PLATFORM.yaml:2220-2221, 2243-2244, 2269-2270, 2588-2589 (Dockerfile+requirements.txt; no manifest.yaml); command: find src/lambdas -name Dockerfile | wc -l; output: 0"
      - "docs/ROADMAP-PLATFORM.yaml:2213 (T0.7a 'idempotent Iceberg append'); AGENTS.md (recs writes transit only the portal->ducklake_writer path)"
      - "docs/ROADMAP-PLATFORM.yaml:2579-2582 (T1.1 'Athena _current view against the OLD account'); :1373 (CD.33 supersedes CD.10's six-Lambda enumeration); :2199-2202 (T0.6 six-Lambda exit criteria)"
    proposed_remediation: "Re-ground the wave before any of it is picked up: per-Lambda manifests in files_in_scope, recs verbs routed through the established DuckLake boundary (or explicitly scoped to the still-Iceberg tables), T1.1's bridging-window text deleted. Proposal only."
    proposed_rec: true

  - id: F-003
    dimension: D11
    severity: high
    confidence: high
    title: "Recs cache-pull silently falls back to the stale Athena view under the claimed-complete DuckLake recs cutover (split-brain risk, read side)"
    detail: |
      T2.19's progress note declares the recs slice complete and signed off, with
      "no Athena escape hatch for recs" (matching AGENTS.md and Decision 81 cl.7).
      The write path is genuinely closed (verified: all three OPS_STORAGE_BACKEND
      default sites are 'ducklake'; portal write-gating reads have no Athena
      fallback; the seed action was removed). But scripts/sync_ops.py's cache pull
      and full cache rebuild fall back to the Athena ops_recommendations_current
      view for ANY table, including recs, whenever the DuckLake reader call fails -
      unconditional on the backend flag. Post-cutover that view is downstream-stale,
      so a transient reader failure silently rebuilds logs/.recommendations-log.jsonl
      from stale state. This is the exact fallback-hides-then-serves-stale pattern
      the closed-boundary design exists to prevent. High not critical: writes are
      unaffected and the path only feeds the local read cache.
    affected_ids: [T2.19]
    evidence:
      - "scripts/sync_ops.py:303-305 (_pull_single_table: 'Athena fallback (CD.8/CD.15 escape hatch)' reached for recs when reader returns None)"
      - "scripts/sync_ops.py:493-497 (_rebuild_local_cache: same fallback in the full-rebuild loop over _TABLE_TO_VIEW, which includes ops_recommendations)"
      - "docs/ROADMAP-PLATFORM.yaml:3578-3580 (progress note: 'reads transit the reader (no Athena escape hatch for recs)'); AGENTS.md warehouse invariant: 'NO Athena escape hatch on the ducklake backend'"
    proposed_remediation: "Gate the recs Athena fallback behind _ops_backend()=='iceberg' (designed rollback only), or make recs cache-pull loud-fail on the ducklake backend. Proposal only."
    proposed_rec: true

  - id: F-004
    dimension: D11
    severity: high
    confidence: high
    title: "No validate.py guard encodes the DuckLake recs topology - a regression re-opening the recs Iceberg/Athena path would pass CI"
    detail: |
      There is no CI check that (a) the OPS_STORAGE_BACKEND default is 'ducklake'
      at the three flip sites, (b) the recs reader path has no Athena fallback, or
      (c) sync_ops's Athena fallback is iceberg-gated. validate_warehouse_write_sources
      still treats OpsWriter writes to ops_recommendations as fully canonical, so it
      cannot distinguish the designed rollback from an accidental post-cutover
      Iceberg write to recs. Per the audit method, a guard that still permits the
      old path is a finding even with no current code on that path - and here
      F-003 shows code IS on that path.
    affected_ids: [T2.19, T2.5]
    evidence:
      - "scripts/validate.py:779-842 (validate_warehouse_write_sources whitelists OpsWriter ops_* writes; no backend awareness)"
      - "command: rg -i 'ducklake|OPS_STORAGE_BACKEND' scripts/validate.py; output: zero topology-guard hits (per subagent F)"
    proposed_remediation: "Add a topology guard to validate.py: assert the three ducklake defaults, assert the recs reader path raises (no Athena branch), and require backend-gating on any recs Athena reference. Proposal only."
    proposed_rec: true

  - id: F-005
    dimension: D11
    severity: high
    confidence: high
    title: "Contracts lag the recs cutover: read-engine.yaml declares an Athena escape hatch for recs and has zero DuckLake awareness; ops-data-store.md still places recs on Iceberg/Athena"
    detail: |
