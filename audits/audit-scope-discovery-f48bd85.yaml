  findings:
    - id: CAND-01
      category: CAT-C
      target: "docs/DECISIONS.md live decision set (observed seeds: Decisions 26, 35, 37, 40; metadata: Decisions 75, 77-85 Warehouse ID lines)"
      title: "Premise-integrity sweep: dead-premise Decided entries remain citable with no supersession-annotation control"
      trigger: >-
        Counterfactual sample of 15 entries: 4 rest on demonstrably-dead premises with no
        annotation -- Decision 26 (docs/DECISIONS.md:3134) is "Agent-decided -- pending review"
        since April with every named artifact retired (2-chat model, Gemini critique,
        .github/prompts deleted at T-1.13); Decision 35 (:3102) has deleted implementation
        anchors and a no-auto-apply premise inverted by Decision 77 yet is still cited by
        AGENTS.md; Decisions 37 (:3057) and 40 (:2878) name substrates retired by Decision 116
        and CD.28, with Decision 40's trigger conditions unmonitored and moot. Peers 24/68/71
        DID get migration annotations -- the practice is ad hoc, not controlled. Compounding:
        Decisions 77-85 carry retired 4-digit Warehouse IDs in-file (dec-1083..dec-1091), and
        Decision 75's "dec-081" (:2038) collides with the canonical dec-081 = Decision 81 keying
        after Decision 105 reconciled the CD side only.
      trigger_anchor: "docs/DECISIONS.md:3134"
      trigger_kind: observed
      why_now: >-
        Decision 105 (2026-07-02) fixed exactly this drift class on the roadmap side and stopped
        at the file boundary; Decisions 116/117 (2026-07-03) show correct supersession-by-header
        happening only when a new decision happens to collide with an old one. Meanwhile
        decision-scout feeds these entries to every planning session as binding context, and the
        roadmap already carries one live example of a dead premise steering work (Decision 62's
        premise revisit under T1.6, docs/ROADMAP-PLATFORM.yaml:1358). Secondary category: CAT-A
        (the file is also an area with metadata drift).
      what_a_deep_audit_would_examine: >-
        Enumerate all 81 live headers plus the 19 archived; apply the premise counterfactual to
        each; classify {premise-live, dead-but-annotated, dead-unannotated, archive-eligible};
        verify every in-file Warehouse ID against the canonical dec-NNN-by-number keying;
        adjudicate the "pending review" statuses (Decision 26/27) that never resolved; propose a
        supersession-annotation invariant (a superseding Decision MUST annotate its victims --
        mechanically checkable in the validate.py referential-guard family) and explicit archive
        criteria.
      payoff: >-
        Stops plans citing dead premises as binding; shrinks decision-scout's live surface;
        produces the formal supersession entries and archive moves the file needs; hardens the
        DECISIONS.md-to-warehouse ETL keyspace.
      review_priority: high
      priority_rationale: >-
        Real observed trigger with a 27% sample hit rate; changes planning inputs and
        governance hygiene but not mid-flight build work, so high rather than critical.
      confidence: CONFIRMED
      dedup:
        classification: partially-owned
        owning_ids: [rec-1964, rec-2057, rec-2058, rec-2059, rec-2278, rec-917, rec-918, dec-105]
        search_terms: ["DECISIONS.md in open recs", "decision premise / archive in ROADMAP-PLATFORM.yaml", "Warehouse ID lines in DECISIONS.md"]
        hit_count: 15
        note: >-
          Open recs own individual stale-reference point fixes (annotate Decision 36/37 refs,
          fix Decision 65/66 paths, duplicate-72 renumber, Decision 89 Warehouse ID line) and
          Decision 105 reconciled CD-side pointers. Surviving un-examined sub-area: the
          systematic premise adjudication of the whole live set and the missing
          supersession-annotation control -- no open item owns either.
      audit_size_estimate: M
      depends_on: []
    - id: CAND-02
      category: CAT-B
      target: "docs/ROADMAP-PLATFORM.yaml candidate_decisions, state: pending (23 entries; seeds CD.7, CD.10, CD.11, CD.18)"
      title: "Pending-CD premise validity: binding-while-stale entries and an unpopulated ratification-lane feed"
      trigger: >-
        CD.7 and CD.11 detail text opens "[Amendment 2026-05-27 -- fully/narrowly superseded by
        CD.28/CD.27]" yet both remain state: pending -- and the roadmap's own rule
        (docs/ROADMAP-PLATFORM.yaml:169-171) makes every pending CD binding on every agent
        session, while CD.14 proves a superseded state exists. CD.10's six-Lambda enumeration
        was demoted to "illustrative, not canonical" by a 2026-06-09 amendment with no state
        change. CD.18 requires a decision before T1.5 that hinges on reviving a git stash parked
        2026-05-18 on a substrate now scheduled for teardown (CD.2/T5.1) -- the stash's
        existence is unverifiable from the repo, and mvp-triage calls this ratification
        "zero-cost" without testing that premise. Meta-signal: zero of 23 pending CDs carry
        realization_evidence, so the Decision-105 lane's discovery surface (ratifiable_cds(),
        scripts/platform_roadmap.py:794) is structurally empty.
      trigger_anchor: "CD.7"
      trigger_kind: observed
      why_now: >-
        The ratification lane went live 2026-07-02 (Decision 105) and today's mvp-triage names
        CD.18 and CD.28 ratification as explicit next actions -- the pending set is about to be
        consumed as decision input, in the state it is in. Three different treatments of
        superseded pending CDs coexist (amendment-marker, state flip, nothing), which is a
        data-integrity signal on a binding surface. Secondary category: CAT-C (these are
        premises awaiting decision).
      what_a_deep_audit_would_examine: >-
        Walk all 23 pending CDs; classify each as (i) realized-but-unevidenced, (ii)
        superseded-but-unmarked, or (iii) genuinely-open; adjudicate every entry's premises
        against the post-May decision waves (84, 91, 95-97, 103, 105, 116/117); verify the
        CD.18 stash question empirically; recommend per-CD state transitions and a rule that an
        amendment recording supersession MUST flip state in the same edit; specify who populates
        realization_evidence so ratifiable_cds() stops returning empty by construction.
      payoff: >-
        Corrects the binding instruction set agents load every session; gives the new
        ratification lane real input; can unblock T1.5 (CD.18 disposition) and retire two
        zombie-binding CDs (CD.7, CD.11).
      review_priority: high
      priority_rationale: >-
        Binding-surface staleness with observed anchors and an imminent consumer (the lane);
        S-size, high decision-value per unit cost.
      confidence: CONFIRMED
      dedup:
        classification: partially-owned
        owning_ids: ["unclosed-loops ULF-02", dec-105, rec-2287, "mvp-triage RMAP (CD.18/CD.28 next-actions)"]
        search_terms: ["candidate decision / CD.7 / CD.10 / CD.11 in open recs", "ratifiable_cds in scripts/", "realization_evidence in ROADMAP-PLATFORM.yaml"]
        hit_count: 4
        note: >-
          Ratification-lane mechanics and realized-work loop-closure are owned (Decision 105,
          ULF-02); rec-2287 owns one ratified-CD text fix; mvp-triage owns two specific
          ratification next-actions. Surviving un-examined sub-area: premise validity of the
          pending set itself -- exactly the boundary CO-7 records as left open by
          unclosed-loops.
      audit_size_estimate: S
      depends_on: []
    - id: CAND-03
      category: CAT-D
      target: "The platform-first sequencing directive (platform roadmap active, ROADMAP-PRODUCT.yaml dormant until the autonomous loop closes)"
      title: "Framelock: strict platform-before-product sequencing was never decided and no owned surface can question it"
      trigger: >-
        The phrase "platform-first directive" occurs in DECISIONS.md exactly twice, both inside
        Decision 93 (docs/DECISIONS.md:1311, :1315) treating it as a given -- no Decision
        ratifies the sequencing or records examined alternatives. ROADMAP-PRODUCT.yaml is
        status: draft (docs/ROADMAP-PRODUCT.yaml:20) with current_state "trading plane is mostly
        scaffold or absent" (:347) -- L2 absent entirely, RATModel.predict raising
        NotImplementedError -- unchanged since the wave-1 code-surface audit. Meanwhile today's
        mvp-triage records zero telemetry captured and the executor frozen since May, i.e. the
        platform bet's payoff horizon extended while the product plane stayed frozen.
      trigger_anchor: "docs/DECISIONS.md:1311"
      trigger_kind: observed
