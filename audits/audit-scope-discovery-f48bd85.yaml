audit:
  meta:
    audited_commit: f48bd85
    base_branch: main
    model: "Claude (Anthropic), Claude Code session"
    methodology_version: 1
    scope_categories: [CAT-A, CAT-B, CAT-C, CAT-D]
    degraded_dedup: false
    contract_notes: >-
      Deliverables branched as audit/audit-scope-discovery-f48bd85 per Section 16's documented
      exception to the session-branch rule. Section 10.2 listed AUDIT-executor-roadmap-review and
      AUDIT-platform-roadmap-mvp-triage as in-flight; at HEAD their outputs are merged
      (audits/executor-roadmap-review-7d57a0d.*, audits/platform-roadmap-mvp-triage-7d57a0d.*,
      PRs #472/#473) and were treated as completed audits for dedup. Empirical caps respected:
      15 decision entries read in full (24, 26, 35, 37, 40, 48, 55, 67, 68, 70, 71, 75, 84, 93,
      116); all 23 pending CDs covered at title/detail level; the read-realization_evidence-in-full
      cap was moot because zero pending CDs carry the field (see stale_anchors). Repo-wide
      validate --pre not run (advisory outside CI); the deliverable YAML was parse-validated.
      An additional dedup surface not named in the prompt was used: docs/audit-reports/
      (PLATFORM-ROADMAP-AUDIT-2026-06-09.yaml and wave-1-outputs/A1..F.yaml, the code-surface
      audits grounding ROADMAP-PRODUCT.yaml current_state).
    stale_anchors:
      - >-
        TRAP-5 / DD-A imply pending CDs carry realization_evidence: at HEAD the field exists only
        on 9 ratified CDs (CD.1, CD.2, CD.6, CD.13, CD.20, CD.21, CD.25, CD.26, CD.34); zero
        pending CDs carry it, so PlatformRoadmapState.ratifiable_cds()
        (scripts/platform_roadmap.py:794) and realized_but_pending_cds() (:802) both return
        empty at HEAD.
      - >-
        Section 10.2 in-flight status of the two staged audit prompts is stale: both audits are
        completed and merged at HEAD (treated as completed for dedup).
      - "Section 10.3 says ~12 INTENT-*.md docs; 13 exist at HEAD."
  question_answers:
    - q: Q1
      verdict: low-yield
      basis: [CAND-05]
      prose: >-
        Area candidates mostly failed NS-A or NS-C. The trading-product src/ subsystems (live,
        meta_learner, execution, lab) are already characterized to file:line precision by the
        wave-1 code-surface audit (docs/audit-reports/wave-1-outputs/E.yaml) whose findings are
        embedded in ROADMAP-PRODUCT.yaml current_state ("trading plane is mostly scaffold or
        absent"), and product work is deliberately dormant, so a code audit there changes nothing
        now (rejected; its real leverage relocates to CAND-03). The workflow layer, verification
        system, and T4 executor design are recently covered. The one surviving area candidate is
        the rec-producer surface (CAND-05): 685 open recommendations, 400 from code-review,
        growth of +266 (June) and +102 (July 1-5) against 472 closed lifetime, with every
        autonomous consumer frozen or disabled. Stable areas (terraform/, config/, tests/)
        surfaced no specific trigger and were not laundered into findings.
    - q: Q2
      verdict: moderate-yield
      basis: [CAND-02, CAND-06]
      prose: >-
        The roadmap's transition MECHANICS are well-owned (Decision 105 ratification lane,
        unclosed-loops ULF-02, mvp-triage RMAP next-actions), but the PREMISE layer of the
        pending-CD set is not: CD.7 and CD.11 carry "[Amendment ... superseded]" detail text yet
        remain state: pending and therefore binding under the roadmap's own rule
        (docs/ROADMAP-PLATFORM.yaml:169-171); CD.10's six-Lambda enumeration was demoted to
        "illustrative, not canonical" by amendment without a state change; CD.18's
        decide-before-T1.5 choice rests on a 2026-05-18 git stash whose host substrate is
        scheduled for teardown and whose existence is unverifiable from the repo (CAND-02).
        Separately CD.4's "AGENTS.md is the portability hedge" premise predates the accumulated
        CC-web-specific machinery, and KG.9 acknowledges the deprecation contingency with no
        remediation surface (CAND-06). Open questions OQ.3/OQ.5/OQ.6/OQ.14 were adjudicated
        low-leverage; KG.13 and KG.14 are trigger-gated or dormant (see rejected_candidates).
    - q: Q3
      verdict: moderate-yield
      basis: [CAND-01]
      prose: >-
        The 15-entry counterfactual sample found 4 Decided entries whose grounding premise is
        demonstrably dead with NO supersession annotation (Decision 26: every named artifact --
        2-chat model, Gemini critique, .github/prompts -- retired, and its "pending review"
        status never resolved since April; Decision 35: implementation anchors deleted at T-1.13
        and its no-auto-apply premise inverted by Decision 77, while AGENTS.md still cites it;
        Decisions 37 and 40: substrates -- GitHub Models API dispatch, Copilot SDK + Bedrock BYOK
        -- retired by Decision 116 and CD.28, with Decision 40's trigger conditions unmonitored
        and moot). Three sampled peers (24, 68, 71) DID receive migration annotations, proving
        the practice exists but is ad hoc. Metadata drift compounds it: Decisions 77-85 carry
        retired 4-digit Warehouse IDs in-file, and Decision 75's "dec-081" line now collides
        with the canonical dec-081 = Decision 81 keying that Decision 105 established on the CD
        side only. One consolidated finding (CAND-01) carries all of this; the yield is moderate
        because the payoff is contained to citation integrity and planning inputs, though the
        27% observed hit rate in the sample is high.
    - q: Q4
      verdict: high-yield
      basis: [CAND-03, CAND-04]
      prose: >-
        DD-B first: a framelock detector DOES exist for new plans -- plan-critique Phase 2b
        "Frame Challenge (MANDATORY)" (.claude/skills/plan-critique/SKILL.md:69) implements
        Decision 75's mitigation -- so the "missing institutional control" quoted in CO-2 is
        stale for plan-time. The surviving gap is standing choices that never re-enter /plan:
        nothing re-examines them when conditions shift. Two such choices cleared TRAP-3 with a
        named frame and out-of-frame alternative. CAND-03: the platform-first sequencing
        directive (product dormant until the autonomous loop closes) appears in DECISIONS.md
        only as a given inside Decision 93 (line 1311) -- no Decision ever ratified it or
        examined interleaving -- while its conditions moved (executor frozen since May, zero
        telemetry captured, product plane scaffold-frozen, MVP months out per today's triage).
        CAND-04: decision knowledge is locked to a single growing prose markdown file (271KB,
        more than double the figure workflow-review already flagged stale) in a repo whose own
        north star says prose is a side effect; Decision 86 routed every OTHER prose class to
        structured surfaces and Decision 84 deepened the lock by making the file the ETL source,
        yet the format itself was never examined against the agent-first principle.
    - q: Q5
      verdict: slate-produced
      basis: [CAND-03, CAND-02, CAND-01, CAND-04, CAND-05, CAND-06]
      prose: >-
        Ranking follows Section 15 mechanically: review_priority, then observed over static,
        then smaller audit first, then id. CAND-03 is the sole critical -- if the platform-first
        premise is wrong, essentially all currently-active work is mis-allocated right now, and
        no owned surface can ever surface that (every existing audit operates inside the frame).
        Among the highs, CAND-02 (observed, S) outranks CAND-01 (observed, M) on cost: 23
        binding pending CDs are a small, closed set feeding the now-live ratification lane.
        CAND-01 is the same premise-integrity discipline applied to the 81-header live decision
        file. CAND-04 (static, M) follows: it is real but partially owned by T0.7b/T1.5's
        warehouse-native write path. Top-3 scopes are sketched in each finding's
        what_a_deep_audit_would_examine.
    - q: Q6
      answers:
        - question: >-
            Seed a: Is the open-rec ratio (685 open, 400 code-review) itself a signal that a
            finding-producing surface is mis-calibrated -- and is that a candidate?
          answer: >-
            Yes, and it is CAND-05 -- scoped to the PRODUCER side, which is the un-owned angle.
            The consumer/mapping side is owned (KG.2 backlog-to-tier mapping, Decision 103/CD.36
            relevance lifecycle, T3.8), and mvp-triage already sampled the backlog for missing
            T4 capabilities (none found). What no surface owns: whether code-review's filing
            threshold and dedup-at-write produce a queue anyone can ever consume. 585 of 685 are
            non_automatable -- the future executor could touch at most 100 -- and the open set
            grew ~3.7x faster than lifetime closure rate in June. A backlog that only grows is a
            write-only log wearing a queue's clothing.
        - question: >-
            Seed b: Is there a maturity gap between the platform surface and the trading-product
            src/, and does it warrant an area candidate?
          answer: >-
            The gap is real (platform: 5 completed audits, 132 tier_items; product: status draft,
            L2 "absent (entirely)", RATModel.predict raises NotImplementedError) but an AREA
            audit is the wrong instrument: the wave-1 code-surface audit already characterized
            the product code to file:line precision and nothing has changed since (rejected,
            recently-covered). The gap's leverage lives one level up, in WHY the product plane is
            allowed to stay frozen -- that is CAND-03, a sequencing-premise audit, not a code
            audit.
        - question: >-
            Seed c: Which single CAT-C/CAT-D candidate, if wrong, would invalidate the most
            currently-active work?
          answer: >-
            CAND-03, unambiguously. Every active tier item is being built inside the
            platform-first frame; if interleaved product iteration dominates strict sequencing,
            the marginal value of a significant share of in-flight platform work drops (or at
            least re-orders), and the telemetry chain would fill with real trading data instead
            of waiting for synthetic loop traffic. It is both rank 1 and
            highest_leverage_candidate. Note the audit can "fail" productively: ratifying
            platform-first as a conscious Decision with reversal conditions is also a win --
            currently it is not even written down as a decision.
        - question: >-
            Seed d: Which SUBSET of the slate should run, in what order, to maximize
            decision-value per unit cost -- and do sequencing dependencies exist?
          answer: >-
            Run three: CAND-03 first (M; its verdict can rescope everything below it), then
            CAND-02 (S; feeds the just-built ratification lane real input and can unblock T1.5
            via the CD.18 disposition), then CAND-01 (M). CAND-04 should wait for CAND-01
            (depends_on: the premise sweep determines how much of the file's content deserves to
            survive into any format migration, sharpening scope) and arguably for T0.7b's fate.
            CAND-05 and CAND-06 are S-size and can ride along or defer one cycle; CAND-06's
            urgency rises if CC-web pricing/roadmap signals move. Do not run all six in one wave
            -- CAND-03's outcome is upstream of the others' priorities.
        - question: >-
            Extension (self-posed): Do audit deliverables themselves have a closure loop, or is
            audits/ accumulating undispositioned verdicts?
          answer: >-
            Partially closed, no standing control. Positive signal: unclosed-loops ULF-05 was
            dispositioned into Decision 116, and verification-review f80508b produced the
            Decision 84 mis-cite amendment. But three audits landed in the last 48 hours
            (executor-review, mvp-triage, this one) with dispositions pending, and nothing
            tracks undispositioned audit findings the way ci-rca recs are tracked. Below the bar
            today (too recent to call a gap -- the human-disposes contract is 2 days old at this
            volume), but it is the first thing the NEXT scope-discovery run should check.
