audit:
  meta:
    audited_commit: cdfda88
    base_branch: main
    model: "Claude Fable 5"
    methodology_version: 1
    scope_surfaces: [S1, S2, S3, S4, S5, S6, S7, S8]
    degraded_dedup: false
    contract_notes: >-
      (1) The S2 load-trigger (per-directory CLAUDE.md loads on directory touch) is closed
      harness behaviour, taken as stated per the prompt; findings leaning on it say so.
      (2) The interactive Skill tool's internal loading is closed harness behaviour; the
      DD-A conclusion that it does not consume required-context rests on
      absence-of-consumer reasoning over the repo (no repo component parses the key into
      the interactive path) plus the residual assumption that the harness skill loader
      ignores unrecognised frontmatter keys. (3) Prompt-caching behaviour (Q6v) is
      harness-side and not repo-derivable; the cost reasoning treats it as
      directionally-true, not measured. (4) The clone is shallow (50 commits, 5 days of
      history); churn figures (AGENTS.md edited 4x, .claude/skills/ 6x in the observable
      window) are lower bounds over that window only. (5) The audit branch
      audit/agent-context-governance-cdfda88 was created off origin/main without hook
      interference; no PreToolUse guard blocked any step. (6) Repo-wide validate --pre was
      not run (advisory outside CI per MECHANICS step 3); the pre-push gate applied was
      YAML parse + counting invariant. (7) meta.model carries the harness marketing name;
      the exact model id is withheld from repo artifacts per harness policy and reported
      in the session chat.
    stale_anchors: []
  question_answers:
    - q: Q1
      verdict: see-governance_verdict
      basis: [ACG-01]
      prose: >-
        Yes for the always-on and largest on-demand surfaces; measurement-first for the
        thin ones. The repo has already answered the in-principle question three times:
        Decision 43 ratified prose line-budgets (.prompt.md 3000 / .agent.md 1500),
        Decision 134 sized a byte ceiling to a named consumer's whole-file read, and
        Decision 128 chose decompose-by-default-with-loud-raises for code. What is missing
        is not doctrine but carry-over: the Decision-43 prose rows and their enforcement
        recs (rec-432/rec-433, both still open) are stranded on the .github/ surfaces
        deleted at T-1.13, so no live prose surface is covered. TRANSFER HAZARD: SLOC caps
        a reachable set, but S1/S2 load whole-file-plus-@-imports, so a per-file cap is
        gameable by splitting into co-loading files -- for ambient surfaces the unit must
        be the resolved LOAD-SET (file plus transitive @-imports). For S3/S4 the hazard
        does not bite: a SKILL.md entry-file cap is robust because the legitimate
        decompose-response (move detail to on-demand auxiliary files, contracts, or a
        subagent) genuinely removes bytes from the invocation load rather than relocating
        them within it. Unit: bytes (deterministic, wc-derivable, matching Decision 134),
        with a ~4-chars/token conversion reported informationally. Mechanism: a budget
        registry with an inline raise-approved decision marker mirroring
        config/sloc_budgets.yaml, enforced from validate.py (single-SoT rule respected).
        Numeric ceiling values are the human's call and are deliberately not proposed
        here; seeding at current sizes (the Decision 102 pattern) makes the gate a
        ratchet-plus-loud-raise rather than an immediate constraint.
    - q: Q2
      verdict: partial
      basis: [ACG-02, ACG-06]
      prose: >-
        Lever by lever: SessionStart hooks are USED for setup only (4 hooks; none injects
        instruction context; additionalContext unused but viable as a cheap surfacing
        channel for a size/staleness digest). UserPromptSubmit is UNUSED and correctly so
        -- per-prompt injection is an ambient tax, the exact wrong direction. PreToolUse
        is USED for guards only; as a context-injection point it is structurally poor
        (fires per tool call). Subagent offload is USED and load-bearing: decision-scout,
        plan-critique, code-review, report-critique, and the overseer's read-nothing
        router are a genuinely strong offload architecture. Explicit body-instructed
        loading (commands/skills instructing full reads of PROJECT_CONTEXT.md and targeted
        projections of the big data files, fed by the preflight cache) is the live JIT
        mechanism -- but it is prose-enforced discipline, not a primitive: nothing checks
        that a skill's loading instructions stay consistent (observed contradictions
        between frontmatter payloads and body discipline, ACG-02). Within-skill
        progressive disclosure (auxiliary files loaded on demand) is available in the
        harness and used by zero skills. The harness constraint that pushes to the
        aws-native horizon: the Skill loader is closed, so per-invocation conditional
        loading can only be done by the model following instructions -- a typed
        context-retrieval verb (the decision-scout migration contract) is the mechanized
        end-state answer, and it currently has no owner (ACG-06). Ambient belongs: safety
        rules, git-ops, portal invariants. JIT belongs: decision bodies, project state,
        pipeline detail, runbooks.
    - q: Q3
      verdict: sufficient
      basis: []
      prose: >-
        DD-B (20-citation sample across AGENTS.md, planning, implement): 18-19 of 20 are
        PROVENANCE tags sitting next to an inline statement of the operative rule -- the
        agent can act correctly from the inline rule; the id enables on-demand deepening.
        1-2 are actionable-leaning (exception-gating cites like Decision 70/103 where the
        sanctioned-exception detail lives only in the decision body; reversal triggers
        like CD.17). Extrapolating that ~90/10 split repo-wide is a HYPOTHESIS. The
        posture is sound: ids cost single-digit tokens each (~50 refs in AGENTS.md is
        roughly 300 tokens); the bulk cost is the inline rules, which belong at their
        layer; decision BODIES are already fetched JIT (decision-scout inside /plan,
        rg-targeted reads at /implement Step 2 and plan-critique Phase 1). Stripping ids
        would break live machinery (raise-marker validation, CITE lists, citation
        integrity) to save almost nothing. The boundary: operative rule inline at the
        layer that needs it, body on demand, and decision-HISTORY narration (e.g. the
        Decision 89-vs-83 story in the implement skill) is the one strippable class --
        folded into ACG-03's relocation rather than a standalone finding.
    - q: Q4
      verdict: insufficient
      basis: [ACG-02]
      prose: >-
        DD-A: all 9 skills declare required-context; the ONLY parser is
        scripts/agent_development/run_skill.py (parse_required_context, lines 16/84), a
        programmatic fresh-context harness that the planning skill itself declares broken
        (rec-568, open) and routes around via Agent+Skill dispatch -- while
        develop-executor.md still instructs using it. No interactive component consumes
        the key. Counterfactual: delete the frontmatter from every skill and interactive
        behaviour is unchanged except planning/SKILL.md:546, whose critique-gate dispatch
        text references "required-context files per its frontmatter" (the model, not the
        harness, follows that pointer). Worse than latent, the declared payloads
        contradict the refined body discipline: planning and orient declare full
        docs/ROADMAP-PLATFORM.yaml (745 KB) and code-review declares full DECISIONS.md
        (398 KB) while their bodies mandate targeted projections -- run_skill.py would
        inject what the interactive path deliberately avoids. Meanwhile the contract
        mandates the key (instruction-architecture.yaml:61) and lists its absence as an
        anti-pattern (:100-102), and no validator enforces presence. As it stands the
        primitive is not the right JIT foundation: either retire it (and fix
        planning:546 / the run_skill references), or rescope it to typed load-directives
        (path + mode: full|targeted|projection) that both the programmatic harness and
        the skill bodies derive from, then enforce presence and shape.
    - q: Q5
      verdict: partial
      basis: [ACG-05, ACG-06]
      prose: >-
        The designed end-state is strong on externalization and layering, absent on
        prose-context accounting. Checklist below: (e) met; (b)(c)(d)(f)(h) partial with
        argued controls; (a)(g) missed -- nothing in the end-state meters prose context
        cost or detects loaded-but-unused prose (T3.14 is explicitly code-scoped; the
        one prose metric that existed, preflight token_anomalies, was removed with "no
        replacement"). The structural gap needs no new standing doc (Decision 86): it
        needs T3.14's snapshot shape extended (or a sibling item) to enumerate per-surface
        prose bytes/tokens, and a named owner for the decision-scout Lambda-migration
        contract on the verb surface.
      external_checklist:
        - property: a
          rating: missed
          evidence: >-
            Context-cost observability/metering: T3.14 enumerates reachable SLOC,
            import-surface, orphan count only (roadmap, "Context-budget as a tracked
            metric"); the prompt's own disambiguation pins that it does not cover prose.
            token_anomalies was built (PLAN-infra-token-telemetry) and removed with no
            replacement (PLAN-platform-telemetry-manual-workflow:152); no live preflight
            key, no script (scripts/token_budget.py and scripts/context_budget.py both
            absent).
        - property: b
          rating: partial
          evidence: >-
            Budget/quota enforcement: live, consumer-sized ceilings exist for the two
            largest agent-loaded data files (validate_decisions_size 400KB/120-header
            ceilings sized to decision-scout's whole-file read, Decision 134;
            validate_platform_roadmap 10K-line ceiling, Decision 114) and per-file SLOC
            budgets with a raise gate (Decisions 102/128/130). Property-match: these
            controls exercise exactly the budget-enforcement property on agent-loaded
            payloads and demonstrably gate growth (Decision 134 exists because DECISIONS.md
            actually grew unboundedly). They do not cover any instruction-prose surface --
            hence partial, and ACG-01.
        - property: c
          rating: partial
          evidence: >-
            JIT retrieval vs preloading: the end-state's named-verb closed boundary
            (Decision 84 I-3, Decision 91) IS JIT retrieval for ops data, and decision-scout
            carries an explicit tool-query migration contract. Instruction prose remains
            fully preloaded (ambient or whole-file on invocation) with no retrieval design.
        - property: d
          rating: partial
          evidence: >-
            Layered/tiered context: the 5-layer contract with load-times and anti-patterns
            (instruction-architecture.yaml) is a real tiering design; nothing mechanizes
            promotion/demotion -- wrong-layer content is named as an anti-pattern but only
            existence of content_locations is validated (check_layer_compliance,
            prompt_compliance.py:88-106).
        - property: e
          rating: met
          evidence: >-
            Externalized/offloaded memory: warehouse-as-source-of-truth (Decision 84),
            decision-scout subagent offload of a 398KB file, plan-critique/code-review
            fresh-context gates, overseer read-nothing router with bounded hand-backs.
            This is the design's showpiece and is live, not just designed.
        - property: f
          rating: partial
          evidence: >-
            Decomposition-under-a-cap: Decision 128 decompose-by-default with loud raises
            is ratified and enforced for code (validate_sloc_budget_raises). No prose
            analog is defined; the correct prose decompose-response (relocate to on-demand
            aux files/contracts, never split-into-co-loading-parts) is undesigned.
        - property: g
          rating: missed
          evidence: >-
            Reachability/provenance for loaded-but-unused context: T3.12/T3.13 design a
            code graph and dead-code detector (both deferred); nothing in the design
            detects unused prose context (e.g. a gotcha for a retired substrate still
            riding ambient in every session -- observed instances in PROJECT_CONTEXT.md
            Known Gotchas: Copilot CLI, Gemini CLI, LLM_PROVIDER=bedrock switch
            instructions vs CD.28 Bedrock-retired).
        - property: h
          rating: partial
          evidence: >-
            Progressive disclosure/summarization: decision-scout returns a bounded
            structured summary (1200-word cap); the PROJECT_CONTEXT End-State section is a
            designed summary-cache with a sha-fingerprint staleness check
            (_check_endstate_drift, scripts/preflight/context_docs.py:218). But no skill
            uses within-skill progressive disclosure (aux files), and the two largest
            skills inline everything.
    - q: Q6
      answers:
        - question: >-
            (i) Does the two-tier presubmit even RUN in the interactive session, or is
            prose governance only felt at PR CI -- and does the timing matter for a
            self-improving loop?
          answer: >-
            It runs interactively: /implement executes validate --pre at Step 1 and full
            validate at Step 6 before the commit flow, and the same commands are advisory
            in any session (authoritative only on PR CI, Decision 73). So a prose-size
            gate added to validate.py would be felt in-session before push, then
            authoritatively at CI -- the same timing profile SLOC governance has, which
            has proven adequate. The material gap is not timing but existence: today
            nothing fires at any time for prose size. Timing matters only in one respect:
            feedback lands after the prose is written, so the gate's failure message must
            name the decompose/relocate relief valves (the Decision 134 pattern) to avoid
            in-session thrash.
          basis: [ACG-01]
        - question: >-
            (ii) Is there a measurement DATA GAP -- does anything record per-session or
            per-surface token cost over time?
          answer: >-
            Yes, confirmed. No preflight key, script, or telemetry table records prose
            context cost: token_anomalies was built and then removed with "no
            replacement" while planning/SKILL.md:43 still instructs reacting to it; the
            telemetry store is dead pending T2.36 (preflight reports "not migrated
            (Phase 4)" without querying); even the designed telemetry model records
            execution outcomes and executor LLM-call tokens, not interactive-surface
            load cost. Embedded hand-stamped sizes rot as a direct consequence
            (">200KB"/"~230KB" claims vs 398KB measured; "currently 67" headers vs 103).
          basis: [ACG-05]
        - question: >-
            (iii) If an agent EDITS its own instruction files, what stops uncontrolled
            growth in the same edit that adds a rule?
          answer: >-
            Structurally, nothing bounds size. File-COUNT growth is genuinely gated
            (validate_prose_allowlist classifies every tracked .md; intent-doc-freeze
            blocks new standing prose-architecture docs per Decision 86;
            validate_placement gates homes) -- a real, property-scoped control worth
            naming. But INFLATION of an existing sanctioned file has no gate: the
            never_on_main and edit_scope_guard hooks gate branch and plan-scope, not
            size; plan-critique's 12n decompose check covers scripts/src only; human PR
            review is the sole backstop. In a repo whose stated loop is agents editing
            these files, that is the exact gap Decision 43 closed for code.
          basis: [ACG-01]
        - question: >-
            (iv) STEELMAN: could a token/size cap induce terser-less-correct methodology,
            or could decompose-by-default fragment load-bearing context?
          answer: >-
            The fragmentation harm is real and the repo has already ruled on it: Decision
            114 explicitly REJECTED splitting ROADMAP-PLATFORM.yaml into per-tier files
            because N files an agent must reassemble is worse than one coherent load --
            the same logic protects AGENTS.md and the big skills from naive splitting.
            The terser-less-correct harm is bounded by the mechanism choice: a
            raise-marker gate (NS-4 directed growth) never forbids growth, it prices it
            at one reviewable line; SLOC history shows raises do land when justified
            (Decision 128's own problem statement). So the steelman does not defeat
            governance; it dictates its shape: budget the LOAD-SET not the file for
            ambient surfaces, make the sanctioned decompose-response
            relocation/deferral (aux files, contracts, offload) rather than
            co-loading splits, and keep gate values generous. Where content must be read
            together to be correct, the correct response under this design is a loud
            raise, which is exactly what Decision 114 did for the roadmap.
          basis: [ACG-01]
        - question: >-
            (v) Does PROMPT-CACHING change the cost calculus for always-on prose, and
            should any budget or metric be cache-aware?
          answer: >-
            Caching changes the dollar calculus, not the capability calculus. It reduces
            marginal input cost of stable ambient prefixes, so a raw byte budget
            over-weights the PRICE of S1/S2 -- but it does nothing for context-window
            occupancy or comprehension load, which is the load-bearing concern (Decision
            128's model-portability rationale; the implement skill pins sonnet, not the
            1M-window opus the session default uses). And cache stability is weaker than
            it looks in a self-improving repo: AGENTS.md changed 4 times in the 5-day
            observable history window -- every edit invalidates the prefix. Conclusion:
            keep budgets byte-denominated (deterministic, occupancy-oriented); make the
            METRIC cache-aware by reporting stable-vs-churning ambient bytes (edit
            frequency per surface), which also feeds the staleness problem (ACG-03); let
            the human set S1/S2 ceilings more generously than raw cost would suggest.
          basis: [ACG-01, ACG-05]
        - question: >-
            (vi) [Added by this run] Is there FRESHNESS governance for the factual claims
            ambient prose makes -- and should the End-State fingerprint pattern
            generalize?
          answer: >-
            No, and yes. Duplicated project-state in ambient prose drifts silently:
            observed contradiction on the DuckLake deploy channel (AGENTS.md says the
            T2.38 channel is "still PENDING" while src/lambdas/CLAUDE.md says it "landed
            at T2.38" and the roadmap marks T2.38 complete -- two L1 surfaces asserting
            opposite states of a deploy-governance fact), stale embedded sizes and
            counts, and an ancestral context-budget stanza (ACG-04). Exactly one
            freshness mechanism exists and it works: the PROJECT_CONTEXT End-State
            section's roadmap-tier-id sha fingerprint with a fail-open preflight
            advisory (_check_endstate_drift) -- it flagged its own staleness during this
            audit's preflight. Generalizing stamped-fact + preflight-advisory to other
            duplicated ambient claims (or better, deduplicating the claims to pointers
            per ACG-03) is a cheap, repo-idiomatic extension.
          basis: [ACG-03, ACG-04]
