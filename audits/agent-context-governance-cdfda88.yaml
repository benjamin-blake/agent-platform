      top_gaps: [ACG-02]
    - surface: S6
      maturity: strong
      strengths: >-
        The governance pattern itself is proven and idiomatic where applied:
        consumer-sized byte ceilings with named relief valves (Decision 134), line
        ceiling (Decision 114), SLOC ratchet + loud-raise marker (102/128/130),
        file-class allowlist and placement gates, machine-checked pointer invariant.
        The pattern is ready to generalize -- the gap is coverage, not design.
      top_gaps: [ACG-01, ACG-05]
    - surface: S7
      maturity: strong
      strengths: >-
        Named-verb closed boundary is a real JIT design for ops data; decision-scout
