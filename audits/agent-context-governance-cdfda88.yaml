  governance_verdict:
    S1:
      present:
        verdict: token_budget_gate
        mechanism: >-
          Byte budget on the ROOT AMBIENT LOAD-SET (root CLAUDE.md plus transitive
          @-imports, i.e. AGENTS.md today), registered in a budget registry mirroring
          config/sloc_budgets.yaml with an inline raise-approved dec-NNN marker; enforced
          by a validate.py check in both tiers (single-SoT rule). Resolving the @-import
          closure is what makes the unit split-proof.
        what_changes: >-
          New check + registry entry seeded at current size; relief valves named in the
          failure message (relocate runbooks/state to L2/contracts per ACG-03, or a loud
          raise). No numeric ceiling proposed -- human disposition.
        cost: "One S-effort check + registry; near-zero runtime (wc-class)."
        backing_finding: ACG-01
      aws_native:
        verdict: token_budget_gate
        mechanism: >-
          Same gate carried forward; the load-set metric additionally feeds the extended
          T3.14 snapshot (ACG-05) so ambient cost is trendable alongside reachable SLOC.
        what_changes: "T3.14 snapshot shape gains prose fields at reactivation."
        cost: "Marginal over the present-horizon gate."
        backing_finding: ACG-01
      unit: "bytes of the resolved load-set (report ~bytes/4 token estimate informationally)"
      granularity: "per-load-set (one set: root ambient)"
      rationale: >-
        Always-on cost every session pays; whole-set loading makes per-file caps gameable
        (Q1 transfer hazard), so the set is the unit. Caching lowers price, not occupancy
        or comprehension load, and the file churns (4 edits in the 5-day window).
      confidence: CONFIRMED
    S2:
      present:
        verdict: token_budget_gate
        mechanism: >-
          Per-file byte budget for each **/CLAUDE.md in the same registry (no per-dir file
          uses @-imports today, so file == load-set; the check should resolve imports
          anyway to stay split-proof if that changes).
        what_changes: "Registry rows seeded at current sizes; terraform/ enters at its current 29.9KB."
        cost: "Shares the ACG-01 check."
        backing_finding: ACG-01
      aws_native:
        verdict: token_budget_gate
        mechanism: "Unchanged; per-directory files remain a harness-horizon surface."
        what_changes: "None beyond present."
        cost: "None beyond present."
        backing_finding: ACG-01
      unit: "bytes per resolved per-directory load-set"
      granularity: "per-file (== per conditional-ambient load-set)"
      rationale: >-
        Conditional-ambient: right-time is already good; the risk is single-file
        inflation (terraform/CLAUDE.md is 90% of the way to AGENTS.md's size), best
        held by the same ratchet-plus-loud-raise.
      confidence: CONFIRMED
    S3:
      present:
        verdict: measure_only_metric
        mechanism: >-
          Include .claude/commands/*.md in the prose-size metric (ACG-05) with no gate;
          escalate to the registry only if the trend breaks the thin-orchestration
          pattern.
        what_changes: "Metric rows only; no gate, no registry entries."
        cost: "Zero beyond the metric."
        backing_finding: ACG-01
      aws_native:
        verdict: no_change
        mechanism: ""
        what_changes: ""
        cost: ""
        backing_finding: null
      unit: "bytes per file"
      granularity: "per-file"
      rationale: >-
        Argued per surface as the prompt requires: S3 is the smallest class with the
        strongest layer discipline (every command defers to skills/AGENTS.md); a gate
        here adds friction where the observed failure mode (growth, bleed) has not
        appeared. Measurement catches drift; the gate can follow evidence.
      confidence: CONFIRMED
    S4:
      present:
        verdict: token_budget_gate
        mechanism: >-
          Per-entry-file byte budget on .claude/skills/*/SKILL.md in the same registry
          with raise markers. Robust to the transfer hazard because the sanctioned
          decompose-response is genuine deferral: move deep/conditional sections to
