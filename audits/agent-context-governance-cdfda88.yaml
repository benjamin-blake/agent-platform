  findings:
    - id: ACG-01
      surface: shared
      question: Q1
      dimension: VD2
      horizon: present
      title: >-
        No live agent-prose surface carries size/growth governance; the ratified
        Decision-43 prose budgets and their enforcement recs are stranded on surfaces
        deleted at T-1.13
      evidence: >-
        docs/DECISIONS.md '## Decision 43' structural-limits table (.prompt.md 3000 /
        .agent.md 1500 line budgets); rec-432 + rec-433 (both open: config/agent_governance.yaml
        + validate_agent_governance(), scoped to .github/ *.prompt.md/*.agent.md);
        scripts/checks/prompts/validate_prompt_files.py:23-24 (globs the deleted
        top-level .github/prompts/*.prompt.md -- now vacuous, and never had a line
        check); scripts/checks/registry.py:85-240 (no size check names any .claude/ or
        CLAUDE.md/AGENTS.md path); re-derived size table: AGENTS.md 33,176 b; per-dir
        CLAUDE.md 63,148 b/9 files; commands 37,790 b/6; skills 205,853 b/9;
        PROJECT_CONTEXT.md 41,103 b
      evidence_kind: observed
      current_behavior: >-
        Python files, DECISIONS.md, and ROADMAP-PLATFORM.yaml are all ceiling-governed
        (Decisions 102/128/130, 134, 114); every live instruction-prose surface
        (S1-S4, S8) can grow without measurement or bound. File-COUNT is governed
        (prose_allowlist, intent-doc-freeze, placement); file-SIZE is not. Candidates
        C1, C6, C7, C9(size), C11(size) all trace to this one lapsed lineage.
      ideal_behavior: >-
        The Decision 102/128 mechanism generalized to prose: a budget registry +
        validate.py check over the resolved load-sets, ratchet-down free, raises loud
        and Decision-cited, relief valves naming relocation/deferral (never
        co-loading splits, per the Decision 114 anti-fragmentation ruling).
      gap: >-
        Governance regressed rather than never existed: Decision 43 put prose in scope;
        rec-432/433 were filed to enforce it; the surfaces migrated to .claude/
        (Decision 76 / T-1.13) and neither the budgets nor the recs were re-pointed, so
        enforcement never landed and the check that partially existed now scans an empty
        glob. Counterfactual: halving every surface changes nothing structural -- the
        absence of a bound, not today's sizes, is the defect; it survives the
        counterfactual.
      compensating_controls_considered: >-
        Prompt-caching (lowers price, not occupancy; ambient files churn -- 4 AGENTS.md
        edits in the 5-day window); opus[1m] session default (implement pins sonnet, so
        the portability rationale of Decision 128 still binds); human PR review
        (property-mismatched: the Decision 128 problem statement documents three
        individually-reasonable raises accreting unreviewed for code -- same dynamic
        applies to prose); file-count gates (govern proliferation, not inflation). None
        property-matches growth-of-an-existing-file.
      change_type: enforce
      proposed_change: >-
        Add a prose-size budget registry (sloc_budgets.yaml pattern, raise-approved
        marker) + one validate.py check (both tiers) covering: root ambient load-set
        (S1), per-directory CLAUDE.md files (S2), SKILL.md entry files (S4),
        docs/PROJECT_CONTEXT.md (S8, consumer-sized per Decision 134); S3 measured
        only. Seed budgets at current sizes; values are human disposition. Re-point or
        close rec-432/rec-433 in the same change.
      acceptance: >-
        validate.py fails a PR that grows a registered prose load-set past its budget
        without a raise marker; passes when the raise line cites a real Decision header;
        rec-432/rec-433 no longer point at deleted surfaces.
      severity: high
      severity_rationale: >-
        Materially degrades the agent-loading guarantee the repo itself declares
        (NS-2/Decision 43): the surfaces that steer every session are the only
        infrastructure class that can grow unboundedly and unmeasured, in a repo whose
        loop has agents editing them; compensating controls judged property-mismatched.
        Not critical: current sizes are moderate and no routine correctness failure is
        the expected outcome today.
      confidence: CONFIRMED
      roadmap_crossref:
        classification: planned-insufficient
        item_ids: [rec-432, rec-433, Decision-43, Decision-128]
        dedup_search_terms: ["token budget", "context budget", "size ceiling", "prose budget", "agent_governance", "sloc", "byte ceiling"]
        dedup_hit_count: 2
        note: >-
          rec-432/rec-433 (open) own prose-budget enforcement but are unbuilt AND
          mis-scoped to the deleted .github/ surfaces -- built as written they would
          gate nothing live; Decision 43 owns the doctrine. T3.14 is explicitly
          code-scoped (prompt disambiguation) and is not a hit.
      effort: M
      depends_on: []
      sequencing:
        safe_to_queue_now: true
        blocked_behind: []
        note: >-
          Does not need ACG-05's metric first: seeding budgets at current sizes (the
          Decision 102 precedent) works immediately; the metric refines values later.
