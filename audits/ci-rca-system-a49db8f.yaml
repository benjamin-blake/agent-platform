audit:
  meta:
    audited_commit: a49db8f
    base_branch: main
    model: claude-fable-5
    methodology_version: 1
    scope_surfaces: [S1, S2, S3, S4]
    degraded_dedup: false
    contract_notes: >-
      Cache-gen succeeded (no degraded paths). The ops portal service was never invoked
      (write boundary): the warn-reject decomposition was computed by in-process pydantic
      validation (_validate_ci_rca_context_v2) over the read cache, zero writes, and the
      --back-validate CLI was traced in code but not executed. Pre-push gate = clean YAML
      parse of the two deliverables; repo-wide validate --pre not run (advisory outside CI).
    stale_anchors: []
    dossier_fact_check:
      - claim: "C3: the ci_rca cluster on the top-recurring file continues AFTER the preventive guard (PR #478) landed"
        prompt_value: "recurrence continues after test-count-coupling-guard landed"
        your_value: >-
          Contradicted by timing: PR #478 merged 2026-07-05T20:42Z (commit 403c037); the newest
          ci_rca rec on tests/test_rec_write_guidance.py is rec-2585 at 2026-07-05T19:30Z. All 24
          recs on that file predate the guard; zero post-guard recurrence observed as of 2026-07-06.
      - claim: "C6: override and dispute paths are typed and rate-limited"
        prompt_value: "typed and rate-limited but self-attested"
        your_value: >-
          The terminus override is neither typed nor rate-limited: CiRcaContext.why_chain_terminus_override
          is Optional[dict] with no field validation (ops_data_portal.py:179) and no portal rate limit
          exists anywhere, though INTENT Section 4 check 6 specifies min-80-char reason, a sibling
          auditable rec, and a >2-unresolved-in-7d reject rule. The dispute path is typed
          (CiRcaEvidenceDispute, ops_data_portal.py:236) but its throttle is deferred (rec-2415).
  question_answers:
    - q: Q1
      verdict: not_in_force
      basis: [CIRCA-01, CIRCA-02, CIRCA-04]
      prose: >-
        Nothing that constitutes the advertised depth/anti-rescue guarantee rejects anything today.
        Warn mode accepts 21/48 in-window writes it is designed to reject (rate 0.4375, re-derived,
        9x the 0.05 promotion gate), and the only unconditionally-hard gates that actually execute at
        the production call site are peripheral (source-file non-empty, dispute-payload shape,
        flag-value sanity). Worse, flipping the flag would NOT bring the core guarantee into force:
        bundle-wins checks 1-4 and SHA-256 verification are structurally unreachable at the CI call
        site (CIRCA-01), and any writer omitting context_v2_json bypasses the entire spine even in
        strict (CIRCA-02). Warn is not a stable-equilibrium trap, though: the reject rate decomposes
        into 10x why_chain length overruns + 8x terminus-keyword misses + 1x missing citation --
        mechanical calibration failures fixable by prompt hard-limits and/or a ceiling retune, not
        evidence of unreachable depth. The flip is reachable after the named fixes; see
        strict_flip_readiness.
    - q: Q2
      verdict: partial
      basis: [CIRCA-03, CIRCA-07]
      prose: >-
        The loop demonstrably CAN close: the test-count-coupling storm ended the day the guard
        landed (zero recurrence after 403c037), which is positive evidence the preventive_action
        pathway works case-by-case. But closure is entirely post-hoc: file_rec has no write-time
        dedup or recurrence guard for source=ci_rca; the workflow dedup anchors per-commit and
        per-workflow-slug, so a persistent red main files one Critical rec per subsequent push
        (observed: 14 duplicates in ~6 hours on one root cause, all still open at audit time,
        each hard-blocking /plan per Decision 73 L5). Back-validation is candidate-flag-only
        (file-only match key, disclosed), and nothing auto-closes duplicates when the fix lands
        (preflight's likely-resolved correlation surfaces but does not close).
    - q: Q3
      verdict: weak
      basis: [CIRCA-01, CIRCA-05]
      prose: >-
        The division of labour is well-designed on paper -- disputable facts (tier membership,
        EVG, escape_mode, vacuous_pass) are computed deterministically and the agent is told to
        mirror. But the enforcement layer that makes the division binding never executes in
        production (CIRCA-01), so the division is instruction-level only: it holds because the
        agent obeys its prompt, which is exactly the trust model the spine was built to remove.
        Additionally, the deterministic side is not as trustworthy as the contract assumes:
        compute_earliest_viable_gate always runs with current_pre_runtime=0.0, biasing EVG toward
        "pre" (CIRCA-05), and bundle-wins as designed would then FORCE the agent to mirror the
        biased value -- DD-B's wrong-but-trusted entry point is real, and the dispute path is the
        only correction. The structural floor (why_chain shape + terminus keyword + citation) is a
        signal the contract honestly labels as such; the observed rejects show the agent is not
        gaming it so much as tripping over it.
    - q: Q4
      verdict: drifting
      basis: [CIRCA-09, CIRCA-08, CIRCA-02]
      prose: >-
        The [STALE] annotation discipline for the Athena->DuckLake retarget is good and does not
        mislead. The drift that DOES mislead is un-annotated: INTENT Section 4 presents an
        enforcement list as "hard rejections unless labelled degraded path" while check 1 (missing
        context_v2_json = hard reject) is false in code even for strict mode, check 4 (actual_gate
        comparison) is not implemented at all, check 5's presence/relevance requirements are
        unenforced beyond the annotated existence-lookup deferral, and check 6's override rate
        limit does not exist. No mechanism (test, validator, review gate) ties Section 4's claims
        to ops_data_portal.py; the contract-test surface pins individual behaviours but nothing
        pins the contract text. Extraction to docs/contracts/ci-rca.yaml (MANIFEST Wave 3) is the
        owned remedy for form, not for these specific overstatements.
    - q: Q5
      verdict: weak
      basis: [CIRCA-01, CIRCA-03]
      prose: >-
        Predominantly partial with one missed property (flake/quarantine), which pins the rollup
        to weak per the enum rule. The standout genuine strength is shift-left (d): the
        earliest-viable-gate computation exists, runs, and has already driven a real promotion
        (validate_sloc_limits to --pre, c4 met). The recurring weakness across (a)/(c)/(f) is the
        same root: the enforcement/e-budget mechanisms exist as code+thresholds but are inert or
        consequence-free in the deployed configuration.
      external_checklist:
        - property: a
          rating: partial
          evidence: >-
            ops_data_portal.py:477 (check-4 author-discipline rejection) + c11 gate_is_postmerge_canary
            encoding; but check-4 is unreachable in production (CIRCA-01). Compensating control:
            .claude/agents/scheduled/ci-rca.md Step 4 explicitly forbids author-discipline attribution
            when vacuous_pass=true -- operates at generation time, property-matches the blameless
            requirement, but fails if the agent ignores instructions (no enforced backstop).
        - property: b
          rating: partial
          evidence: >-
            CiRcaContext why_chain floor (ops_data_portal.py:178,197-222): 3-7 entries, 40-250 chars,
            terminus keyword+citation enforced-in-warn. Causal antecedence admitted unenforceable
            (INTENT Section 5) and routed to /plan-critique, which is a real mandatory gate between
            planning and implementation -- the routing exists, but reviews the plan, not the rec.
        - property: c
          rating: partial
          evidence: >-
            session_preflight.py:571-572 (0.25 alert / 0.05 promotion thresholds) +
            ci_rca_probe_health.py:21 (0.3 abstention threshold with idempotent auto-escalation rec).
            SLO-shaped, but breaching the alert threshold (0.4375 observed) carries no consequence
            beyond a gauge note, and strict-rejection telemetry is deferred (T2.36, disclosed).
        - property: d
          rating: met
          evidence: "ci_rca_tier_map.py:239 compute_earliest_viable_gate + T1.13 c4 met (validate_sloc_limits promoted to --pre)"
        - property: e
          rating: missed
          evidence: >-
            No flake detection, quarantine, or reproduction probe anywhere in S1-S4; roadmap T1.13
            progress note lists "flake-reproduction probe (reproduced=true|false)" as a candidate
            NOT promoted to a criterion. probe_runtime dispersion handling governs the probe itself,
            not test flakiness.
        - property: f
          rating: partial
          evidence: >-
            Bundle computes disputable facts (ci_rca_evidence.py:180, SHA-256 anchored) and the agent
            is instructed to mirror (ci-rca.md Step 4); but the adjudication layer (checks 1-4,
            ops_data_portal.py:441-494) never executes at the production call site (CIRCA-01), so
            deterministic-over-LLM holds by instruction, not adjudication.
    - q: Q6
      answers:
        - question: "(i) Does the 20-min timeout + --max-turns 30 bound the agent against runaway?"
          answer: >-
            Yes, adequately. timeout-minutes: 20 (ci-rca.yml:36), --max-turns 30 with a restricted
            --allowedTools set (ci-rca.yml:288: Read + grep/cat/git-log + the portal module only),
            no Edit/Write/push tools, and the workflow_run filter excludes CI RCA itself (loop
            guard, ci-rca.yml:28). The claude_p_retry.sh wrapper is the only retry layer. No finding.
          basis: []
        - question: "(ii) Can a warn-accepted/strict-would-reject thin rec shape a /plan decision before anyone notices?"
          answer: >-
            Yes -- 21 such recs exist in-window and are visually indistinguishable in preflight's
            "CI RCA Recs (open)" list (the warn_mode_reject marker is buried in context_v2_json and
            not surfaced per-rec). Mitigation: the observed reject reasons are length/keyword
            mechanical failures, not fabricated causality, so the misleading-content risk of the
            CURRENT corpus is low; /plan-critique gates any resulting plan. Residual: preflight
            could badge marked recs cheaply (fold into CIRCA-04's remedy).
          basis: [CIRCA-04]
        - question: "(iii) What happens to the ~44% would-reject recs when strict flips -- migration path or unfilable?"
          answer: >-
            Existing warn-period recs stay readable (back_validate_ci_rca buckets them; --refile-audit
            files capped ci_rca_warn_period_audit recs -- a real migration surface, report-only by
            default, unscheduled). FUTURE writes of the same shape become rejects, and the workflow
            then fails loudly at the FILED: check -- the CI failure goes un-filed (fail-open toward
            re-diagnosis on the next push, but a persistent composition defect means persistent
            filing outage). One genuinely unfilable class exists: upload_failed bundles produce
            s3_uri="" which fails the ^s3:// pattern, so in strict an S3 outage makes
            evidence-carrying recs unfilable unless the agent drops the ref and claims undetermined
            (CIRCA-06) -- the exact stuck-rec failure mode the flag rollout was designed to avoid.
          basis: [CIRCA-06, CIRCA-04]
        - question: "(iv) Is the abstention path a silent depth-bypass at scale?"
          answer: >-
            Not currently. Re-derived abstention: 1/62 over 14d (1.6%), zero open undetermined recs.
            The path is structurally soft (accept + advisory preflight surfacing capped at 5, nothing
            blocks consumption -- CIRCA-10) but the volume is negligible and the probe-health
            escalator (threshold 0.3, min sample 5, idempotent rec filing) property-matches the
            AT-SCALE version of this risk. Watch item, not a live bypass.
          basis: [CIRCA-10]
        - question: "(v) Is the untrusted failed-CI log a prompt-injection surface, and what compensates?"
          answer: >-
            It is an injection surface with bounded blast radius. Privilege escalation is well
            compensated: workflow_run is gated to head_repo==base_repo AND head_branch==default_branch
            (ci-rca.yml:34), so a fork PR cannot reach the write-capable context; --allowedTools
            confines the agent to read-only bash + the portal CLI; no Edit/Write/push. The
            uncompensated residual is content integrity: a crafted log (e.g. a test that prints
            "collected 0 items" or validator names) can steer classify_failures' substring/regex
            fallbacks and the agent's narrative into a misleading rec -- but that rec lands in a
            human-reviewed /plan queue, which is the designed control (Decision 72). Property match
            holds: the control (human consumption) catches misleading content, which is the only
            asset the attacker can reach. No finding; note that priority 3 substring scan
            (ci_rca_taxonomy.py:89) is the weakest link if jobs JSON is unavailable.
          basis: []
        - question: "(vi) No concurrency block -- can concurrent/retried runs double-file, and is the observed storm a dispatch race?"
          answer: >-
            The race window is real (dedup reads commit statuses BEFORE the agent runs; success is
            marked only AFTER filing, ci-rca.yml:220-252 vs 301-327, and two workflows completing
            near-simultaneously can both pass the check), but the observed storm is NOT primarily a
            race: the 14 duplicates span 13:37-19:30 UTC across distinct anchor commits -- per-commit
            anchoring on a persistently red main is the dominant mechanism, with per-workflow-slug
            context separation (CI vs Main Canary file independently on the same commit) second.
            The force_rca bypass is manual-only (workflow_dispatch input) and not implicated.
            All three mechanisms fold into CIRCA-03; a concurrency: block is a one-line partial fix
            that does not address the dominant per-commit mechanism.
          basis: [CIRCA-03]
        - question: "(vii, extension) Does the FILED: marker contract survive multi-rec runs?"
          answer: >-
            No. ci_rca_filing.py:44 returns only the LAST marker, and the agent contract asks for
            exactly one terminal FILED: line -- so a multi-failure run that DID file N recs records
            and PR-comments only one rec id, and mark_rca then marks ALL categories success off that
            single signal. Visibility of N-1 filings is lost to the workflow layer. Folded into
            CIRCA-07's remedy.
          basis: [CIRCA-07]
        - question: "(viii, extension) Does Critical-priority-always + Decision 73 L5 hard-block turn duplicate storms into planning denial-of-service?"
          answer: >-
            Partially. Every ci_rca rec files at priority Critical and an open ci-rca rec hard-blocks
            /plan from scoping unrelated work (Decision 73 L5). 14 open duplicate Criticals therefore
            multiply triage load exactly when main is red. Preflight's likely-resolved correlation
            (ci_rca_unresolved=2 vs 14 open) is a real mitigant that keeps the block honest, but
            closure still requires manual action per duplicate. Amplifies CIRCA-03's severity; no
            separate finding.
          basis: [CIRCA-03]
  strict_flip_readiness:
    spine:
      verdict: flip_strict_after_fix
      mechanism: >-
        c2 as written (Decision Record + terraform after Phase-4 back-validation and c3 <5%) gates on
        the warn-mode reject rate, which gates on mechanical composition quality -- currently 0.4375,
        decomposed as 10x why_chain entry-length overruns (250-char ceiling), 8x terminus-keyword
        misses, 1x missing citation.
      what_changes: >-
        (1) Wire the local bundle into the portal call site (set CI_RCA_BUNDLE_LOCAL_PATH from the
        emit-dir, or point the pending-dir search at it) so checks 1-4 + SHA verify actually run --
        without this the flip activates only schema shape checks (CIRCA-01). (2) Close the legacy
        no-context_v2 acceptance for strict mode (CIRCA-02). (3) Permit s3_uri="" iff
        upload_status=upload_failed so S3 outages do not make filings impossible under strict
        (CIRCA-06). (4) Calibrate: add hard character-count guidance to ci-rca.md (or raise the
        250-char per-entry ceiling via schema_version bump) and re-measure -- the reject-rate floor
        is prompt-calibration, not depth failure. Then run --back-validate, author the Decision
        Record, flip.
      cost: >-
        (1)+(3) are XS-S code changes; (2) is S plus a one-time decision on grandfathering (back-
        validation's legacy_no_schema bucket already models it); (4) is prompt text + one 7d
        observation window. Total: one focused plan, low risk; no new infrastructure.
      rationale: >-
        keep_warn is wrong because warn mode demonstrably does not converge on its own (rate sat at
        ~9x the gate with zero owning mechanism). flip_strict_now is wrong because it would reject
        ~44% of real filings for mechanical reasons AND deliver less than advertised (dead
        cross-check, open legacy bypass, upload-failure stuck-recs). redesign is unwarranted: every
        defect found is a wiring/calibration gap in an architecture that is otherwise sound and
        already demonstrated one closed loop (sloc promotion; guard-ended storm).
      confidence: CONFIRMED
  per_surface_assessment:
    - surface: S1
      maturity: strong
      strengths: >-
        Fork-PR privilege gate + default-branch gate correct and load-bearing; deterministic FILED:
        marker with fail-loud on absence; log-availability retry; bundle_absent computed and injected
        into the agent prompt; loop guard against self-trigger; evidence step ordered before dedup.
      top_gaps: [CIRCA-03, CIRCA-07]
    - surface: S2
      maturity: frontier
      strengths: >-
        Canonical-JSON SHA-256 anchoring; registry-sourced tier membership for the live validate.py
        (Decision 104) with AST walker retained for snapshots; tri-state abstention that fails loud
        into "undetermined" rather than guessing; N-bundle-per-failed-check enumeration; taxonomy
        coverage guard in --pre.
      top_gaps: [CIRCA-05]
    - surface: S3
      maturity: solid
      strengths: >-
        The warn_mode_reject marker design (portal-derived, accumulating, rides context_v2_json) is
        what made this audit's telemetry re-derivable at all; SHA-256 mismatch always-raise;
        dispute carve-out is typed and mode-independent; bundle-absent forced onto the undetermined
        route.
      top_gaps: [CIRCA-01, CIRCA-02, CIRCA-06, CIRCA-08]
    - surface: S4
      maturity: strong
      strengths: >-
        Live gauges genuinely measure warn-mode behaviour (reject rate, recurrence distribution,
        abstention, back-validation pairings) at zero reader egress; probe-health escalation is
        idempotent file/update/close; honest disclosure of deferred strict-mode telemetry and the
        weak file-only match key.
      top_gaps: [CIRCA-04, CIRCA-09, CIRCA-10]
