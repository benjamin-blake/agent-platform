  findings:
    - id: CIRCA-01
      surface: S3
      question: Q3
      dimension: VD1
      title: "Bundle-wins cross-check (checks 1-4) and SHA-256 verification are structurally unreachable at the production call site"
      evidence: "ops_data_portal.py:273-284,438-439; ci-rca.yml:189 (emit-dir /tmp/ci-rca-bundles); ci_rca_evidence.py:97-99 (pending written only on upload failure); zero cross_check_check_N / s3_missing stamps in the 125-rec corpus"
      evidence_kind: static
      current_behavior: >-
        _load_and_verify_bundle searches only CI_RCA_BUNDLE_LOCAL_PATH (set nowhere in the repo --
        single grep hit is its own read site) and logs/.ci-rca-evidence-pending/<sha>.json (written
        only when S3 upload FAILS). In CI the bundle is emitted to /tmp/ci-rca-bundles and uploads
        succeed (bundle_upload_backlog=0), so the local load returns None and the function returns
        at ops_data_portal.py:439, silently skipping checks 1-4 and the SHA-256 verify -- in warn
        AND strict. Tests pass by seeding the pending dir (test_ops_data_portal.py:2006-2026), i.e.
        seeding exactly what production never has; test_bundle_not_found_skips_cross_check pins the
        skip as intended behaviour.
      ideal_behavior: >-
        At the CI call site the portal loads the bundle the workflow just generated, verifies its
        SHA-256, and adjudicates checks 1-4 -- the roadmap already describes this as delivered and
        load-bearing (T1.13 c10 "Cross-check spine built"; c8/c11 "load-bearing via the spine").
      gap: >-
        The enforcement the contract and roadmap present as the system's central mechanism executes
        only in unit tests and on the S3-outage path. The strict flip would not activate it. The
        c2/c5 decision calculus and /plan's trust in bundle-anchored recs rest on a spine that is
        not running. The zero-disagreement telemetry is consistent with agent obedience, not
        enforcement -- the dispositive evidence is the code path, corroborated by zero cross-check
        stamps across the corpus.
      compensating_controls_considered: >-
        (a) Agent prompt mirroring instruction (ci-rca.md Step 4) -- generation-time, property-matches
        honest agents only; fails exactly against the lazy/adversarial agent the spine exists for.
        (b) S3 head_object existence check -- verifies the object exists, not that the rec's claims
        match its content; wrong property. (c) c5 exit criterion held open pending an end-to-end
        roundtrip -- awareness of unproven roundtrip, but it does not identify or own this defect.
        None property-match; no severity reduction.
      change_type: enforce
      proposed_change: >-
        Wire the emit-dir into the portal lookup: export CI_RCA_BUNDLE_LOCAL_PATH in the rca_agent
        step (per-bundle), or add /tmp/ci-rca-bundles (parameterised emit-dir) to the candidate
        list, or have the workflow copy emitted bundles into logs/.ci-rca-evidence-pending before
        the agent runs. Add an integration test that exercises file_rec from a simulated CI layout
        (bundle in emit-dir, absent from pending) and asserts checks 1-4 fire.
      acceptance: >-
        A rec filed from the CI layout with detection_gap.earliest_viable_gate deliberately
        contradicting the bundle is stamped cross_check_check_2 in warn mode (raises in strict);
        production corpus begins showing cross-check stamps or verified-clean passes.
      severity: critical
      severity_rationale: >-
        Meets the critical class directly: an enforcement the contract claims to provide is not in
        force in a way that materially misleads consumers -- the roadmap marks c8/c10/c11 met and
        load-bearing on this spine, and the strict-flip decision assumes flipping activates it.
      confidence: CONFIRMED
      roadmap_crossref:
        classification: novel
        item_ids: []
