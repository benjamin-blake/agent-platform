      proposed_change: >-
        Add an explicit significance clause to decision-entry.yaml (and cite it from the planning
        skill's decision-authoring step): a numbered Decision requires a durable architectural
        commitment with reversal-relevant consequences; state-flips route to the DCG-04 wave
        form; operational facts route to recs/tier_item notes; field semantics to contract
        governance notes. Pair with the DCG-02 outflow and the DCG-08 index.
      acceptance: >-
