    - id: DCG-01
      surface: DECISIONS.md-corpus
      question: Q2
      dimension: VD5
      title: >-
        Live file is 1,562 bytes (0.4%) from the 400,000-byte pre-merge ceiling with BOTH named
        relief valves unbuilt and unowned -- the next ordinary decision entry wedges the authoring
        path
      evidence: >-
        wc -c docs/DECISIONS.md = 398,438 (observed at f79d6b5); validate_decisions_size.py:17-25
        (ceilings + valves), :64-74 (registered BOTH tiers, so the breach fails pre-merge);
        Decision 134 cl.2 records 336 KB / 92 headers at ratification (2026-07-16) -- 62 KB of the
        64 KB headroom consumed in 5 days; dedup: no rec or tier_item owns archival or compaction
        (DPI-04's own dedup note concurs).
      evidence_kind: observed
      current_behavior: >-
        The guard's designed relief ("archive superseded entries per DPI-04's dispositions or
        compact superseded decision bodies to pointer stubs") exists only as failure-message text;
        DPI-04's enumerated archival dispositions were never turned into an owned rec; the
        compaction valve has no criterion, grammar, or owner anywhere.
      ideal_behavior: >-
        Headroom is restored BEFORE breach via the sanctioned valves, so the guard remains a
        signal-to-act rather than a wall that invites the one response the ratification forbids.
      gap: >-
        At the observed July authoring rate (~2 entries/day, ~2-4 KB each), breach lands within
        days of resumed decision authoring, on whatever PR happens to carry the entry.
      compensating_controls_considered: >-
        (a) Manual archival at breach time is mechanically safe -- the parser, the R1 guard, and
        the conformance baseline all cover/key both files -- but it is unowned, undocumented as a
        procedure, and improvised under red-CI pressure. (b) The July wave is partly a bounded
        backlog clear (31 pending CDs at Decision 105), so steady-state rate may drop; this
        mitigates timing, not the unbuilt-valve condition. Neither control property-matches: the
        byte guard counts bytes and cannot summon relief.
      change_type: add
      proposed_change: >-
        Run the near-term relief sweep now (human disposes DPI-04's 8 enumerated entries into
        archive/stub form; the superseded-live-bodies cluster 42/44/49 is the minimal high-value
        subset), restoring >=20 KB live headroom; land the standing valve as DCG-02.
      acceptance: >-
