audit:
  meta:
    audited_commit: f79d6b5
    base_branch: main
    model: claude-fable-5
    methodology_version: 1
    scope_surfaces: [DECISIONS.md-corpus, decision-entry.yaml, decisions_md.py+DecisionPayload,
      validate_decisions_size.py, decision-scout, Decision-105-ratification-lane]
    degraded_dedup: false
    contract_notes: >-
      Coverage: read 52 of 103 live entries in full -- the 25 seed-cluster members (95/96/97;
      78/81/84/88/99/107/124; 43/102/114/128/130/134; 42/90/38/57/58/59; 60/73/135), the 3
      governing decisions not already in a cluster (86, 87, 105), the NS-5 precedent (133), 15
      additional overlap-probe samples (104, 127, 80, 132, 131, 72, 55, 67, 83, 89, 117, 116, 49,
      44, 143), and 8 ratify-CD DD-B samples (136, 137, 138, 139, 140, 141, 106, 108). Ratify-titled
      cluster/governing members (81, 107, 124, 134) were read under their cluster/governing mandate,
      not the DD-B cap. The optional parser probe ran successfully (Decisions 84 and 128 parsed;
      findings tagged observed cite it). TRAP-7 overlap: the concurrently-commissioned
      docs/audit-prompts/AUDIT-agent-context-governance.md audit owns the scout read-cost /
      context-window architecture; DCG-08 designs a generated index as a corpus-navigability
      artifact only and deliberately does NOT prescribe how the scout (or any consumer) reads it.
      repo-wide validate --pre was not run (advisory outside CI); the pre-push gate used was a clean
      YAML parse of the two deliverables. The archived-52-supersedes-live-37/40 inversion observed
      in DECISIONS_ARCHIVE.md is referenced as mechanism-criterion evidence only; its reconciliation
      is DPI-04 territory and is not re-filed.
    stale_anchors: []
  question_answers:
    - q: Q1
      verdict: partial
      basis: [DCG-01, DCG-02, DCG-03]
      prose: >-
        The live corpus is NOT redundancy-heavy: across 52 entries read in full, no same-rule
        restatement was found; subject-sharing entries are rule-distinct amendment/supersession
        chains, annotated in titles and Related lattices. Merge-into-one machinery is therefore not
        warranted -- a hand-merge without clause-parity tooling is exactly the critical
        wrong-but-trusted hazard. What IS warranted, now, is the narrower standing lifecycle both
        relief valves already name but nobody has built: number-preserving compact-to-stub for
        fully-superseded bodies (42, 44, 49 traced; DPI-04 enumerates 8 archive-eligible), plus the
        DPI-04 archival dispositions. Citation integrity mandates the number-preserving form: 12,103
        inbound "Decision N" citations across 865 files plus 998 dec-NNN citations have no
        mechanical guard (TRAP-4), and the backfill has no tombstone path -- a retired header
        orphans its warehouse current-row as live (DCG-03). A stub keeps the number, the header, and
        the parser emission, so every citation stays valid and the warehouse records a terminal
        Superseded version whose SCD2 history preserves the full pre-stub text -- the warehouse IS
        the provenance archive. Verdict partial: mechanism warranted for compaction/archival;
        destructive merges stay out; ad-hoc supersession continues to suffice for live-rule change.
    - q: Q2
      verdict: insufficient
      basis: [DCG-01, DCG-04, DCG-05, DCG-08]
      prose: >-
        Growth is structurally unbounded in rate and undirected in shape. Inflow is amplified by
        design: Decision 86/127 route ALL durable rationale into DECISIONS.md, and the Decision-105
        lane mints a full immutable prose record per CD state-flip (20 of the 39 entries numbered
        105-143, authored 2026-07-02..2026-07-20, are ratify entries). Outflow is nil: both named
        relief valves (archival per DPI-04; compact-to-stub) are unbuilt. The only counterpressure
        is the byte/header wall -- a symptom guard that cannot see composition -- and 62 KB of the
        64 KB headroom Decision 134 ratified on 2026-07-16 was consumed within 5 days. Scorecard: 0
        met, 6 partial, 3 missed (significance-gate, generated-index, superseded-compaction). A
        direction mechanism = an explicit significance bar (DCG-05), the compaction/archival outflow
        (DCG-02 via DCG-01), a batch ratification form (DCG-04), and a generated index for
        chain-traversal (DCG-08).
      external_checklist:
        - property: immutability-supersession
          rating: partial
          evidence: >-
            Entries are immutable-by-convention with dated amendment annotations
            (decision-entry.yaml:67-79) and an exact supersession-marker grammar (:81-87), exercised
            (Decision 90 re 42; Decision 83 re 89); but no enforced status lifecycle exists on prose
            entries and victim-side annotation is inconsistent (44, 49 unannotated -- DPI-01 owns,
            referenced not re-filed).
        - property: one-decision-granularity
          rating: partial
          evidence: >-
            Substantive entries are well-grained (95/96/97 split one plan into three disjoint-axis
            records); the ratify-CD class sits below decision grain -- 25 of 103 live entries record
            status transitions, e.g. Decision 136 states it "gates no tier_item (gates: [])"
            (DECISIONS.md:322).
        - property: significance-gate
          rating: missed
          evidence: >-
            No articulated bar for what becomes a numbered Decision exists anywhere; Decision 86
            cl.2 routes all rationale IN (an amplifier, not a gate), and the human loop demonstrably
            passes high-rate bookkeeping entries (9 entries on 2026-07-16 alone).
        - property: generated-index
          rating: missed
          evidence: >-
            No consumer-facing TOC/index exists; logs/.decisions-index.jsonl is a gitignored
            full-record read cache the scout does not consume (SKILL.md:28 mandates the whole-file
            markdown read).
        - property: decision-drivers
          rating: partial
          evidence: >-
            Problem/Rationale are optional markers (decision-entry.yaml:46-56) -- the contract
            requires only Status/Date/Decision (:39-44) -- but practice is near-universal: every
            modern-band entry sampled carries Problem and/or Rationale.
        - property: machine-readable-frontmatter
          rating: partial
          evidence: >-
            No front-matter, but the shared parser + typed columns (status, related_decisions_v2,
            superseded_by, content_hash -- decision.py:22-52) make id/status/supersedes addressable
            without per-consumer prose parsing; the control fails for edges the parser does not type
            (amends lives only in title prose). Remedy channel is the property-4 generated index
            (NS-4), never authored front-matter (TRAP-2).
        - property: superseded-compaction
          rating: missed
          evidence: >-
            Both valves named (validate_decisions_size.py:21-25; Decision 134 cl.2), neither built;
            fully-superseded bodies sit live in the hot path (42, 44, 49 traced; DPI-04 lists 8
            archive-eligible).
        - property: revisit-cadence
          rating: partial
          evidence: >-
            A built monitor exists (scripts/preflight/decision_conditions.py, surfaced every
            preflight as "Decisions past review date / reversal conditions fired") but machine
            coverage is fenced-stanza carriers only -- Decision 133 is the sole carrier and the
            predicate registry is empty (:28-30, :56-59); the 24+ prose-only stanzas opt out by
            absence.
        - property: relationship-graph
          rating: partial
          evidence: >-
            Related and superseded_by are typed, extracted columns (decisions_md.py:237-239);
            amends edges exist only in title prose (Decision 143 "amends Decision 81 cl.1" is
            invisible to the typed fields), and no in-repo traversal surface exists.
    - q: Q3a
      verdict: adopt-scoped
      basis: [DCG-06]
      prose: >-
        The NULL hypothesis fails on trace, but only narrowly -- hence scoped. Rationale (parsed
        into `context`) IS the de-facto intent carrier and is present on most entries (Decision 128
        observed: Problem carries the load-bearing spirit, Rationale the why). But it is optional
        and structurally absent on some: Decision 84 parses with context="" (observed via the
        parser probe -- its rationale lives in an unextracted "Ratified premises" section), so the
        warehouse row carries zero typed why-content. And Rationale conflates
        justification-of-choice, form/routing notes, and cost math -- it is not an addressable
        one-or-two-sentence statement of the durable spirit a consumer can quote. Adopt as an
        OPTIONAL fixed-spelling "Intent:" marker plus a nullable column: no retro-enforcement, no
        authoring tax on the historical band, DAF-03 forward conformance untouched. Reject the
        stronger form (required marker): drivers practice is already near-universal and a required
        field on state-flip ratify entries would be ceremony.
    - q: Q3b
      verdict: adopt
      basis: [DCG-06]
      prose: >-
        Rides Decision 134 cl.4 by construction: content_hash covers the heading-inclusive
        raw_block (decisions_md.py:227-228), so any Intent-marker edit already produces a new SCD2
        version; adding the typed column merely makes intent revisions diffable across versions.
        Grain unchanged: one version per (decision_id, content change). No new machinery, no
        separate intent hash -- an intent-only revision is an ordinary content-hash-gated version.
    - q: Q3c
      verdict: adopt-scoped
      basis: [DCG-07]
      prose: >-
        Workable at current corpus size WITHOUT the TRAP-7 read redesign: the scout already
        whole-file-reads and per-entry-judges all 103 entries every /plan, so a second judgment
        axis adds output and judgment load but zero read cost. Scoped hard against noise: a SPIRIT
        bucket fires only when (i) no literal CONTRADICT exists against the same decision, (ii)
        the flag quotes the entry's Intent marker (new entries) or a specific Problem/Rationale
        sentence (historical band) -- unquotable means no flag, (iii) severity WARN/NOTE only
        (BLOCK stays literal-only), (iv) capped at ~3 SPIRIT flags inside the existing 1,200-word
        budget. Soft-depends on Q3a: the axis functions today against Problem/Rationale quotes but
        the Intent anchor is what keeps it cheap and falsifiable for new entries.
    - q: Q4
      answers:
        - question: >-
            Is the ratification lane (Decision 105) the right artifact granularity, given 25 live
            entries are full-prose ratifications whose stated effect is a bookkeeping state-flip?
          answer: >-
            Not uniformly. The class is heterogeneous: 141 and 107 carry genuine settlement content
            (a de-facto option-(b) ruling; reversal mechanics), while 138/139-style entries are
            pure gate-clears. A ratification is structurally a status transition on an EXISTING
            decision (the CD), yet the lane mints a new immutable number per transition. The
            precedent for the fix already exists inside the lane: Decision 105 itself reconciled 5
            CDs in one entry, and CD.16/CD.24 both point at dec-079 -- many-CDs-to-one-decision is
            exercised, R1-R3-compatible shape. A batch-wave ratified form (one entry, N CDs as
            clauses) would have made the 2026-07-16 wave one header instead of six. Do not delete
            the lane (deliberate constraint); rescope its artifact.
          basis: [DCG-04]
        - question: >-
            Does consolidation conflict with immutability -- does merging live entries destroy the
            supersession provenance the corpus relies on?
          answer: >-
            Destructive merges do conflict, three ways: dated supersession chains are provenance;
            12,103 unguarded inbound citations key on numbers; and the ETL orphans removed headers
            (next answer). The reconciliation is number-preserving supersede-in-place: a stub keeps
            the number, header, Status/Date/Decision markers, and the exact "Superseded by:
            Decision N" spelling; the compaction edit changes content_hash, so the warehouse
            records a terminal Superseded version while SCD2 history retains every full pre-stub
            body. Immutability is preserved where it matters -- the warehouse history -- rather
            than in the hot file.
          basis: [DCG-02, DCG-03]
        - question: >-
            If intent becomes first-class, does the SCD2 history need an intent DRIFT signal
            (intent changed but rule text did not, or vice versa)?
          answer: >-
            Not as stored machinery now. Once the intent column exists, drift is derivable at read
            time by comparing intent vs decision_text deltas across consecutive SCD2 versions -- a
            DQ query, not a schema element. Building a stored signal ahead of a consumer is the
            ceremony NS-3 warns against; revisit when a consumer (e.g. a DQ monitor under T1.6)
            exists.
          basis: [DCG-06]
        - question: >-
            When live entries are merged (retiring a decision_id), what does the content-hash-gated
            backfill do with the retired row's warehouse lineage -- preserved, orphaned, or
            resurrected?
          answer: >-
            Traced on the write path: backfill_decisions_from_md iterates ONLY parsed headers
            (scripts/ops_portal/decisions.py:220) with hash-gated caller-keyed upserts (:242-246);
            there is no tombstone, delete, or terminal-version path for a header absent from both
            files. History rows are preserved, but the CURRENT projection is orphaned-LIVE: the
            retired decision reads as governing (its last status, typically Decided) to every
            warehouse consumer, forever. Not resurrected -- worse, never retired. Today the blast
            radius is warehouse readers only (scout and R1 read the files); at the T1.5 portal
            end-state it becomes the wrong-but-trusted class. Consequence for Q1: the mechanism
            must never remove headers -- stubs and archival both keep the parser emitting (the
            parser reads both files, first-occurrence dedup, decisions_md.py:216), so the warehouse
            converges to a terminal Superseded version instead.
          basis: [DCG-03]
        - question: >-
            What in this audit's remedies is authorable NOW vs blocked behind the Decision-67
            STRATEGIC freeze / T1.5?
          answer: >-
            Everything found here is authorable now as IMPLEMENTATION work: the DPI-04-scoped
            archival/compaction relief sweep (S), the compaction lifecycle contract + first
            exercised stub (M), the Intent marker/column/DQ row (S), the scout SPIRIT bucket (S),
            the generated index (S-M), and the D105 batch-wave amendment (S). None requires T1.5:
            all ride the interim prose+ETL substrate and survive the portal flip as
            grammar/schema. Only the portal-read end-state itself stays T1.5-frozen.
          basis: [DCG-01, DCG-02, DCG-04, DCG-06, DCG-07, DCG-08]
        - question: >-
            (Extension) Is July's growth rate a one-time ratification-backlog spike, and is the
            archive a coherent destination for a consolidation mechanism?
          answer: >-
            Partly transient: 31 of 39 CDs were pending at Decision 105, so the wave clears a
            bounded backlog. But the structural inflow persists (every future CD's lifecycle mints
            a record; Decision 86 keeps routing all rationale in), so transience mitigates rate,
            not shape. And the archive is only partially coherent as a destination: it holds an
            inverted state (archived Decision 52 supersedes still-live 37/40) -- evidence that
            archival-without-criterion produces incoherence; the mechanism's criterion must be
            direction-consistent (the superseded move, the superseders stay). The reconciliation
            itself is DPI-04's, referenced not re-filed.
          basis: [DCG-02, DCG-05]
  consolidation_clusters:
    telemetry-standards:
      verdict: keep-separate
      member_decisions: [95, 96, 97]
      overlap_basis: >-
        Three same-day (2026-06-23) REPORT-ONLY entries from one plan, all governing the telemetry
        substrate's design standards.
      what_changes: Nothing.
      cost: None.
      provenance_lost: "n/a (no action)."
      rationale: >-
        Disjoint governed axes -- 95 the trace/observation table model + lexicon, 96
        temporal/partition semantics, 97 identity/determinism -- cross-referenced by pointer, never
        restated (96 cl.3 delegates corrections to 97's mint-once rule). Merging would create the
        omnibus grain checklist property 2 warns against and destroy per-axis citability/reversal
        targeting. The seeded expectation of a deliberate calibration is confirmed on trace.
      confidence: CONFIRMED
    ducklake-ops-store:
      verdict: keep-separate
      member_decisions: [78, 81, 84, 88, 99, 107, 124]
      overlap_basis: All touch the DuckLake ops-store substrate.
      what_changes: Nothing.
      cost: None.
      provenance_lost: "n/a (no action)."
      rationale: >-
        A layered lineage, not redundancy: 78 format adoption (its four victims 50/51/56/69
        correctly archived -- the one healthy exercised lifecycle example), 81 runtime architecture
        (amended by 143 cl.1), 84 sole-backend consolidation extending 81's boundary, 88 egress
        budget, 107 the CD.34 ratification that pointer-summarizes 88's invariants while naming 88
        as authority (deliberate citation, not a re-ruling), 99 version lockstep (disjoint), 124
        portal-code decomposition (structurally the 80/104 family, only nominally DuckLake). No
        rule is stated twice. The 143-to-81 amendment edge being title-prose-only feeds the
        relationship-graph rating (Q2), and 81's missing victim-side annotation is DPI-01
        (referenced, not re-filed).
      confidence: CONFIRMED
    size-structural-governance:
      verdict: keep-separate
      member_decisions: [43, 102, 114, 128, 130, 134]
      overlap_basis: >-
        Structural-size governance; within it, 43->102->128->130 is one amendment chain on
        Python-file limits, while 114 and 134 are per-artifact ceiling siblings (roadmap file,
        decision log).
      what_changes: Nothing destructive; the chain becomes the primary beneficiary of DCG-08's index.
      cost: None now.
      provenance_lost: "n/a (no action)."
      rationale: >-
        The chain shares a subject but is rule-distinct at clause level: 43 base (whose CC/token/
        tool-tier rows remain solely governing), 102 waiver-to-ratchet, 128 raise gate, 130 scan
        scope -- no clause is restated. The counterfactual cuts both ways: a merged restatement of
        102+128+130 would lose nothing operative, but hand-merging without clause-parity tooling is
        the wrong-but-trusted critical hazard, and the operative rule is already code-enforced and
        AGENTS.md-summarized (property-matched controls for the common query). Keep separate; the
        multi-entry reconstruction cost is better served by the generated index (DCG-08) than by a
        risk-positive merge. 114/134 are deliberate parity instances over distinct artifacts.
      confidence: CONFIRMED
    workflow-architecture-lineage:
      verdict: compact-to-stub
      member_decisions: [42, 90, 38, 57, 58, 59]
      overlap_basis: >-
        The interactive-workflow architecture lineage; 42->90 is a formal supersession, 38/57/58/59
        are April-May-era siblings about retired surfaces.
      what_changes: >-
        Decision 42's 64-line dead body (compound-execution bounds, effort weights) compacts to a
        number-preserving stub (or moves whole to the archive per DPI-04's D42 disposition --
        either valve satisfies this verdict). Decision 90 stays untouched.
      cost: >-
        One careful edit per entry under the DCG-02 stub grammar; content_hash churn produces one
        terminal SCD2 version per compacted entry (by design).
      provenance_lost: >-
        None: the number, header, status, and supersession pointer survive in the stub; the full
        body survives as prior SCD2 versions and git history.
      rationale: >-
        42 is the corpus's textbook fully-superseded-live body: 90 restates the architecture and
        explicitly preserved 42's body intact, so the live file carries 64 dead lines in the
        scout's hot path. The immutability test passes -- a stub preserves the chain edge. The
        38/57/58/59 members are NOT overlap candidates (distinct subjects: instruction files,
        control-plane umbrella, workflow-layer home, validation-to-telemetry moves); their
        dead-premise disposition is DPI-02/DPI-04 territory, referenced not re-filed.
      confidence: CONFIRMED
    ci-validation-tiering:
      verdict: keep-separate
      member_decisions: [60, 73, 135]
      overlap_basis: Validation tier architecture, evolving via amendment chain.
      what_changes: Nothing.
      cost: None.
      provenance_lost: "n/a (no action)."
      rationale: >-
        Each entry is a real dated re-commitment naming precisely what it replaces: 73 redefines
        60's mechanism while explicitly retaining 60 as "the originating ratification" (a
        conscious retention ruling this audit must not re-litigate); 135 is 73's second amendment.
        No rule is restated. 60's body carries a fully-DONE migration sequence and retired INTENT
        references -- partial-body decay the compaction valve as named cannot address (it handles
        whole superseded bodies); that decay class is DPI-02-adjacent and referenced only.
      confidence: CONFIRMED
    superseded-live-bodies:
      verdict: compact-to-stub
      member_decisions: [42, 44, 49]
      overlap_basis: >-
        (Extension cluster -- the class row.) Entries fully superseded (42 by 90, 44 by 117, 49 by
        116) whose complete bodies remain in the live hot path; 44 and 49 additionally lack
        victim-side annotation (DPI-01, referenced).
      what_changes: >-
        Each compacts to the DCG-02 stub form (or archives per DPI-04, whose enumerated list adds
        23, 24, 68, 71, 89-partial, 26); this is the population the Decision 134 cl.2 second valve
        exists for.
      cost: One edit per entry; one terminal SCD2 version each.
      provenance_lost: >-
        None -- numbers, headers, and supersession pointers survive; full texts persist as SCD2
        history and git history.
      rationale: >-
        The counterfactual returns empty: no live clause dies (successors restate the governing
        rules); ~138 lines leave the whole-file read. This cluster is the concrete first exercise
        for the DCG-02 mechanism and the DCG-01 headroom relief.
      confidence: CONFIRMED
    prose-governance:
      verdict: keep-separate
      member_decisions: [86, 127]
      overlap_basis: >-
        (Extension cluster.) Both govern repository prose: 86 the routing rule + INTENT
        retirement, 127 the sanctioned-prose taxonomy "expanding" 86.
      what_changes: Nothing.
      cost: None.
      provenance_lost: "n/a (no action)."
      rationale: >-
        Rule-distinct expansion, title-annotated ("expands Decision 86"): 86 is the negative
        routing rule, 127 the positive enforced taxonomy plus the prose_allowlist enforcement. A
        probe beyond the seeds that confirms the corpus's chain discipline rather than redundancy.
      confidence: CONFIRMED
