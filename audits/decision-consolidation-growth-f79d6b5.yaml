    - id: DCG-05
      surface: DECISIONS.md-corpus
      question: Q2
      dimension: VD2
      title: >-
        No mechanism acts on growth rate or shape: inflow is structurally amplified (all rationale
        routes in; a record per CD flip) with no significance gate, while the only counterpressure
        is the total-size wall
      evidence: >-
        Decision 86 cl.2 (rationale/choices/trade-offs -> DECISIONS.md, with INTENT docs retired
        into the same channel); Decision 127 (governs prose class, not decision-worthiness);
        Decision 105 (the lane); growth series: 39 entries 2026-07-02..07-20 (~2.2/day), 9 on
        2026-07-16 alone; +62 KB / +11 headers in the 5 days after Decision 134 ratified the
        ceiling with "~2x headroom"; checklist: significance-gate missed, superseded-compaction
        missed, generated-index missed.
      evidence_kind: static
      current_behavior: >-
        Anything with durable rationale becomes a numbered live entry and nothing ever leaves;
        what-becomes-a-decision is implicit norm, what-happens-after-supersession is an unbuilt
        valve, and the guard fires only at the wall.
      ideal_behavior: >-
        NS-2: an explicit significance bar shapes inflow (decision vs rec vs tier_item note vs
        contract governance_note), the compaction/archival valves shrink the live surface as
        commitments supersede, and the ceiling never binds in normal operation.
      gap: >-
        The live reasoning surface grows monotonically toward whatever ceiling exists, and the
        composition shifts toward bookkeeping records the H2 count cannot distinguish.
      compensating_controls_considered: >-
        (a) The human authoring loop approves every entry -- but it demonstrably passes high-rate
