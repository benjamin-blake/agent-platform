    - id: DCG-02
      surface: shared
      question: Q1
      dimension: VD5
      title: >-
        No built consolidation lifecycle: design the number-preserving compact-to-stub + archival
        mechanism (eligibility criterion, stub grammar, terminal-SCD2 semantics)
      evidence: >-
        validate_decisions_size.py:21-25 and Decision 134 cl.2 name the valves; no criterion,
        grammar, tool, or owner exists (dedup negative); decisions 42/44/49 traced as the
        first-exercise population; 12,103 inbound "Decision N" citations across 865 files + 998
        dec-NNN citations with no mechanical guard (TRAP-4) mandate number preservation.
      evidence_kind: static
      current_behavior: >-
        Supersession is exercised ad hoc (some victims archived per 78; some annotated in place
        per 89; some untouched per 44/49); nothing defines when a body may compact, what a stub
        looks like, or how the warehouse records the transition.
      ideal_behavior: >-
        A standing, citation-safe lifecycle: an entry whose ENTIRE body is superseded/inert
        compacts to a stub that keeps its number, header, Status ("Superseded"), Date, a
        one-line Decision marker, and the exact "**Superseded by: Decision N**" spelling
        (decision-entry.yaml:81-87) -- or moves whole to the archive per the DPI-04 policy; the
        edit changes content_hash so the backfill records a terminal Superseded SCD2 version while
        history retains every full pre-stub body (the warehouse is the provenance archive).
      gap: >-
        Without the mechanism, the live surface cannot shrink as commitments supersede (NS-2), and
        any future consolidation impulse defaults to the unsafe forms (hand merges, header
        removal).
      compensating_controls_considered: >-
        Ad-hoc supersession annotation exists but acts only on annotation, not on body size, and
        was applied inconsistently (44/49 -- DPI-01 referenced); the byte guard does not
        property-match (counts bytes, cannot see that a body is dead).
      change_type: add
      proposed_change: >-
        Author the mechanism as one IMPLEMENTATION plan: (1) a `compaction:` section in
        decision-entry.yaml -- eligibility criterion (whole-body superseded/inert; the superseder
        must restate or subsume every live clause; superseders never compact -- the
        direction-consistency lesson of the archived-52/live-37-40 inversion), the stub grammar
        (tripwire-safe: non-empty Decision marker text, ISO date), and the never-remove-headers
        rule (DCG-03); (2) an operator `procedure:` block in the owning contract (Decision 127
        pattern); (3) first exercised compaction of Decision 42. Number retirement and destructive
        merges are explicitly out of the mechanism's vocabulary; a future clause-parity merge tool
        remains possible but is not recommended -- keep-separate verdicts above show no redundancy
        pressure justifying it.
      acceptance: >-
        decision-entry.yaml carries the compaction section; Decision 42's body is a conforming
        stub; validate --pre green (size guard, conformance -- the number-based baseline
        grandfathers edited historical entries); ops_data_portal --backfill-decisions-md writes a
        status=Superseded terminal version for dec-042 with prior full-body versions retained;
        every pre-existing "Decision 42" citation still resolves to a live header.
      severity: medium
      severity_rationale: >-
        Lifecycle gap with a clear fix; the acute pressure is DCG-01's -- this is the standing
        valve that keeps it from recurring.
      confidence: CONFIRMED
      roadmap_crossref:
        classification: novel
        item_ids: []
        dedup_search_terms: ["compact", "pointer stub", "consolidat", "supersede", "stub"]
        dedup_hit_count: 0
        note: >-
          Decision 134 cl.2 NAMES the valve but scopes no design and assigns no owner; DPI-04 owns
          the adjacent archival-policy reconciliation only. No rec or tier_item covers compaction.
      effort: M
      depends_on: [DCG-03]
      sequencing:
        safe_to_queue_now: true
        blocked_behind: []
        note: >-
          IMPLEMENTATION-type; coordinate the first-exercise list with the human's DPI-04
          dispositions. Not blocked by CD.17/T1.5; the grammar and terminal-version semantics
          survive the T1.5 portal flip unchanged.
      note: >-
        Shared across DECISIONS.md-corpus, decision-entry.yaml, and decisions_md.py+DecisionPayload
        (medium severity: no maturity drag).
    - id: DCG-03
      surface: decisions_md.py+DecisionPayload
      question: Q4
      dimension: VD5
      title: >-
        Header removal orphans the warehouse current-row as live: the backfill has no
        tombstone/terminal path for a decision absent from both files
      evidence: >-
        scripts/ops_portal/decisions.py:220 (iterates only parse_decisions_md() output), :242-246
        (hash-gated caller-keyed upsert; no deletion branch anywhere in the module);
        decisions_md.py:216 (first-occurrence dedup emits nothing for a removed header), :243
        (last_updated re-stamped per run).
      evidence_kind: static
      current_behavior: >-
        If a decision's header disappeared from both files (a destructive merge or deletion), its
        SCD2 history would be preserved but its CURRENT projection row would remain forever in its
        last state -- typically Decided -- served as a governing decision by every warehouse read
        verb, with no signal that it was retired.
      ideal_behavior: >-
        The warehouse's current projection converges to the file corpus: a retired entry reaches a
        terminal Superseded version (achieved for free by stub/archival, which keep the header
        parsed), and a divergence is loud.
      gap: >-
        Today latent (the scout and R1 guard read the files, so the blast radius is warehouse verb
        consumers); at the T1.5 portal end-state the same defect becomes the wrong-but-trusted
        critical class. It is the load-bearing reason DCG-02's mechanism must never remove
        headers.
      compensating_controls_considered: >-
        No mechanism currently performs header removal (nothing to trigger the defect), and the
        R1 guard would catch a removed header that a ratified CD points at -- but only for
        CD-referenced numbers; ordinary decisions have no such referential guard.
      change_type: enforce
      proposed_change: >-
        (a) Encode the never-remove-headers rule in DCG-02's contract section; (b) add a cheap
        divergence assertion to the backfill (or a registered check): every decision_id in the
        ops_decisions current projection must appear as a header in one of the two files; fail
        loudly otherwise (Decision 55).
      acceptance: >-
        A synthetic test removing a header and running the backfill (against a test seam) raises
        the divergence failure; the contract section states the rule with this finding's trace as
        rationale.
      severity: medium
      severity_rationale: >-
        A latent-hazard-plus-design-constraint with a clear fix; it would be critical only under a
        destructive mechanism this audit recommends never building, and post-T1.5 exposure is
        gated behind a not_started strategic item.
      confidence: CONFIRMED
      roadmap_crossref:
        classification: novel
        item_ids: []
        dedup_search_terms: ["tombstone", "orphan", "backfill", "retired decision", "delete decision"]
        dedup_hit_count: 0
        note: "No rec, tier_item, or prior-audit finding traces the removed-header write path."
      effort: S
      depends_on: []
      sequencing: {safe_to_queue_now: true, blocked_behind: [], note: "Pairs naturally with DCG-02's plan."}
