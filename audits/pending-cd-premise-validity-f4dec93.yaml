            in_progress T0.4; CD.29/CD.30 on T3.7/T3.10/T3.17) carry current premises.
          basis: [PCD-02]
        - question: "(c) Does the roadmap's self-contained-document invariant interact with any CD whose premise now lives only in a DECISIONS.md entry?"
          answer: >-
            Largely no -- the discipline of inlining amendments into CD detail is good (CD.34
            inlines the Decision 88 DR-cadence amendment; CD.28 inlines the Decision 116
            reconciliation; CD.14 summarizes Decision 86's supersession inline). One soft spot:
