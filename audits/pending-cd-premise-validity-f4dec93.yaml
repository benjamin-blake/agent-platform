            vocabulary is stale. Cosmetic; fold into the next ratification-lane touch rather
            than filing separately.
          basis: []
        - question: "(own) Is the pending set structurally one population?"
          answer: >-
            No -- it is bimodal, and the lane only addresses one mode. Roughly 9 of 23 pending
