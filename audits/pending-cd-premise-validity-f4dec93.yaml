          basis: []
        - question: "(b) Does any CD classified superseded-unmarked gate a live tier item -- a stale premise actively wedging real work?"
          answer: >-
            No. The only superseded-unmarked CD (CD.7) has an emptied gates list and wedges
            nothing. The nearest real case is CD.19 (classified other/overtaken): it still
            gates T1.6's completion, but T1.6 is not_started, so the wedge is prospective --
