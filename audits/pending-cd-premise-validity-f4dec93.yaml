            but NOT in CD.9's own entry -- an agent reading only candidate_decisions[] sees a
            fully open decision. Same file, wrong locus; the disposition for CD.9 (write
            evidence, ratify) should carry that fact into the CD entry.
          basis: [PCD-01]
        - question: "(d) Did the walk surface any ratified CD whose premise looks substantively false (pointer for the DECISIONS.md-side audit; conscious out-of-scope)?"
          answer: >-
            No ratified CD carries a substantively false live premise; the one genuinely false
            framing found (CD.34's "nothing consumes the catalog yet / blast radius is zero")
            is already self-bracketed in the CD as contradicted-and-retained-for-history, which
            is exemplary treatment. Cosmetic pre-ratification tense survives on CD.31/CD.33/
            CD.35 (PCD-05, rec-2287, rec-2048). Nothing to hand the DECISIONS.md-side audit
            beyond CD.34's own note that rec-2063's WONTFIX framing needs re-review against the
            live catalog -- which that CD already records.
          basis: [PCD-05]
        - question: "(e) Does any static reference point at a CD that is now ratified or superseded and should have been released?"
          answer: >-
            No unreleased static reference found. completion_blocked_on_cd is computed live and
            keys on state == "pending" (verified in code), so gates self-released when the wave
            ratified. The one static reference to superseded CD.14 (T5.5's
