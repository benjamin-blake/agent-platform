      question: Q2
      dimension: VD3
      title: "No mechanism collapses the CD.7 holding pattern: when CD.28 ratifies, nothing flips the fully-superseded-in-prose CD.7 to state: superseded, and no load-time guard detects the pending+fully-superseded-by-ratified-CD conjunction"
