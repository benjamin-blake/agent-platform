  findings:
    - id: PCD-01
      surface: shared
      question: Q4
      dimension: VD4
      title: "Realized-but-unevidenced pending CDs are structurally invisible to the ratification lane: the producer step has no recurring trigger and the machine-recorded post-hoc-ratification debt never flows into realization_evidence"
      evidence: "scripts/platform_roadmap.py:794-817 (both feeds empty, observed); roadmap:125-145 (scope-(c) ledger names the owing CDs); roadmap:3200 (T0.10: 'CD.5 ratifies post-hoc'); roadmap:4675 (T2.4: CD.9 substance ratified via dec-078/081); validate_platform_roadmap.py:35-116 (CD.39's mechanism enforced); .claude/skills/orient/SKILL.md:92 (orient barred from surfacing unevidenced realization); T-1.1 complete (roadmap:1987, 'later CDs ratify in subsequent sessions')"
      evidence_kind: observed
      current_behavior: >-
        Six pending CDs are realized (CD.39 fully built and CI-enforced; CD.9
        proxy-ratified via Decisions 78/81; CD.5 and CD.4 with gated work complete; CD.28
        substantially executed and wedging in_progress T0.4; CD.8's engine choice live), and
        the roadmap already records this fact machine-readably in the scope-(c) exemption
        ledger and item notes -- yet zero pending CDs carry realization_evidence, so both
        discovery feeds return empty and /orient reports nothing to ratify. The one
        population pass ever run (the 2026-07-02/03 Decision-105 wave) keyed on prose
        markers and drafted evidence, so unmarked realized CDs were missed and will stay
        missed: /orient is read-only and explicitly forbidden from surfacing them, /plan is
        item-scoped, audits are ad-hoc, and T-1.1 (the item that built the lane) is complete
        and does not reopen.
      ideal_behavior: >-
        NS-C: a discovery feed with a named producer receives input whenever there is
        genuinely something to surface. When a CD's gated work completes (or a scope-(c)
        exemption is taken), the fact that the CD now owes ratification reaches the field the
        lane reads, within a bounded number of sessions.
      gap: "The produce step ('whoever notices') is never triggered on a cadence, and the two machine surfaces holding the same fact -- exemption flags awaiting 'ends when its gating CD ratifies' and the realization_evidence field -- have no linkage."
      compensating_controls_considered: >-
        (1) The mvp-triage audit queued CD.18/CD.28 ratification as explicit next actions --
        property-matches for those two CDs only; it is a one-shot list, not a recurring pass,
        and misses CD.4/5/9/39. (2) Ad-hoc audits (this one) exercise the same discovery
        property but are not recurring -- they would not catch the next accumulation. (3) The
        lane's first batch demonstrated drain capability -- but drained only the marked set.
        None property-matches the recurring-trigger gap, so severity stands at medium rather
        than being dismissed.
      change_type: enforce
      proposed_change: >-
        Add a deterministic realization-candidate pass to session_preflight/platform_roadmap
        (not to /orient's judgment): derive, from data already in the roadmap, the set of
        pending CDs where (all non-deferred gated items are complete) OR (a scope-(c) note
        names the CD as owing post-hoc ratification), and surface it in the preflight dict as
        e.g. realization_candidates[] -- distinct from ratifiable_cds() (which stays
        deliberate-corroboration-only, preserving the Decision 55 epistemic split). /orient
        lists it as "candidate for evidence-writing in a /plan session"; the human-confirmed
        /plan session writes realization_evidence, keeping /orient read-only.
      acceptance: "With the pass live at f4dec93-equivalent state, the derived list contains CD.4, CD.5, CD.9, CD.39 (at minimum); after their evidence is written, ratifiable_cds() is non-empty and the scope-(c) discharge events can fire."
      severity: medium
      severity_rationale: "Matches the Section-15 medium class (feed empty with a cheap producer trigger): the harm is ratification latency and a pending count that overstates open decisions, not live misdirection -- no agent takes a wrong trusted action because a realized CD still binds; it binds correctly, just staler than reality."
      confidence: CONFIRMED
      roadmap_crossref:
        classification: novel
        item_ids: []
        dedup_search_terms: ["realization_evidence", "ratifiable", "ratification lane", "post-hoc ratif", "CD.39", "CD.9"]
        dedup_hit_count: 3
