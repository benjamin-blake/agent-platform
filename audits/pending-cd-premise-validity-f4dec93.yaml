      and it IS CD.18 -- no id discrepancy. The referential guard was executed live in-session
      and PASSED (98 Decision headers indexed). Both feed functions were executed live and
      returned empty lists. The git stash named by CD.18 is absent from this clone and its named
      branch does not exist on origin (git branch -a) -- recorded as an explicitly unverifiable
