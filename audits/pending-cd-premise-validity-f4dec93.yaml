    stale_anchors: []
  question_answers:
    - q: Q1
      verdict: partial
      basis: [PCD-01, PCD-02, PCD-03]
      prose: >-
        The pending set is safe to load as binding today in the narrow sense that no pending CD
        would cause a wrong TRUSTED action right now, but 8 of the 23 pending entries are not
        genuinely open decisions: CD.7 is fully superseded in prose while state stays pending
        (its amendment sits at the top of detail and its gates were emptied, so it self-corrects
        on read -- inert, not misdirecting); CD.19 is overtaken by events (its decision window
        "BEFORE T2.2 begins" passed when T2.2 completed 2026-05-29, and the recorded de facto
        timestamp policy diverges from the CD's recommended option); and six CDs (CD.4, CD.5,
        CD.8, CD.9, CD.28, CD.39) are realized -- in four cases with the realization or its
        proxy-ratification recorded elsewhere in the same file -- yet carry no
        realization_evidence, so they present as open decisions and are invisible to the
        ratification lane. The ratified sixteen are referentially sound (guard PASS observed);
        three carry stale pre-ratification prose (two already owned by open recs). The single
        superseded entry (CD.14) is the correct-transition exemplar (flipped when ratified
        Decision 86 superseded it).
    - q: Q2
      verdict: partial
      basis: [PCD-03, PCD-04, PCD-05]
      prose: >-
        Three treatments of a changed premise coexist: formal state flip (CD.14, executed when
        the superseder was a RATIFIED Decision), prose-amendment-with-gates-emptied-and-state-
        retained (CD.7, whose superseder CD.28 is itself still pending), and clause-level
        amendment without state change (CD.11 narrow supersession, recorded in BOTH prose and
        the structured narrowly_supersedes field; CD.10 self-demotion of its six-Lambda
        enumeration). Read against the evidence, the coexistence is more principled than it
        first appears: full supersession by a decision-final authority flips state; supersession
        by a still-pending candidate is held in prose until the superseder ratifies; partial
        supersession must NOT flip state (surviving clauses bind, T4). The defect is not the
        taxonomy but its enforcement: the convention lives entirely in author discipline (NS-D),
        the load-time guard validates only the ratified SHAPE (R1-R3), nothing validates the
        state value itself against the enum, and -- the sharpest edge -- nothing fires the held
        CD.7 flip when CD.28 ratifies. The convention should require that an amendment recording
        FULL supersession by a now-ratified authority flip state in the same edit, and a
        load-time guard should enforce exactly that conjunction (pending + "fully superseded by
        X" + X ratified = fail). Requiring the flip at amendment time regardless of the
        superseder's own state would be WRONG per the CD.14/CD.7 asymmetry above.
    - q: Q3
      verdict: unsound-favor-void
      basis: []
      prose: >-
        Target re-derived: CD.18 (the only CD containing "2026-05-18" and "stash"); it requires
        a decision before T1.5 goes in_progress and T1.5 is not_started, so the decision window
        is still open. Empirical pass: the stash is absent from this clone (machine-local ref,
        as expected) and the branch agent/ops-decisions-phase-2-semantic-definition does not
        exist on origin -- so the stash exists, if at all, only on the 2026-05-18 host machine.
        That host is the pre-CC-web Windows dev surface whose exit CD.2 decided and whose
        decommission T5.1 schedules (not_started, gated on T0-T4 stable >=14d -- teardown is
        scheduled but not imminent). The mvp-triage audit's characterization ("ratifying CD.18
        early is a zero-cost unblock", platform-roadmap-mvp-triage-7d57a0d.yaml:45) is unsound
        as stated: it prices the ratification ACT and assumes away the decision CONTENT. Option
        (a) revive rests on an empirically unverifiable premise (a 7-week-old machine-local
        stash nobody has confirmed) and is only cheap if that check is done at the host; option
        (b) void is genuinely near-zero-cost and is favored by the evidence: the surface the
        stash targeted has been superseded twice over (CD.10 dismantles ops_data_portal as agent
        surface; Decision 84 moved recs/decisions writes to the DuckLake writer boundary), and
        scripts/executor/rec_write_guidance.py now exists in tree independently evolved, so the
        stashed WIP would land on a surface that has moved beneath it. Safer option: (b) void,
        decided explicitly at ratification. The single piece of evidence that would settle it:
        run `git stash list` (and `git stash show -p` if present) on the 2026-05-18 host before
        T5.1 executes -- minutes of human effort, worth doing opportunistically, not worth
        blocking on. The human decides; this audit only ranks the branches.
    - q: Q4
      verdict: process
      basis: [PCD-01]
      prose: >-
        Re-derived at f4dec93: pending CDs with truthy realization_evidence = 0; pending CDs
        with a '[Realized' prose marker = 0 (both feed functions executed live, both empty;
        the nine truthy realization_evidence values all sit on RATIFIED CDs as retained lane
        input). "Empty" is NOT "healthy/drained": the 2026-07-02/03 Decision-105 wave
        (dec-106..dec-113, dec-118 -- re-derived from ratified_as fields) drained exactly the
        CDs that carried prose markers or drafted evidence at lane creation, but the Q1 walk
        finds six pending CDs realized today (CD.39 fully built AND enforced by
        validate_platform_roadmap.py; CD.9 with substance ratified by proxy via Decisions
        78/81 per T2.4's note; CD.5 with "ratifies post-hoc" recorded on T0.10; CD.4; CD.28
        with its retirement work observably executed and gating an in_progress item; CD.8 with
        its engine decision live), none carrying evidence. Root cause is PROCESS, not
        mechanism (functions correct, guard green, lane demonstrated end-to-end by the first
        batch) and not ownership (the producer is named: "whoever notices" -- audit, /orient,
        planning). The producing step is never triggered: /orient is read-only AND explicitly
        forbidden from surfacing plausibly-realized CDs without the field
        (.claude/skills/orient/SKILL.md:92), /plan sessions are item-scoped, audits are
        ad-hoc, and T-1.1 (which built the lane and ran the first batch) is complete and by
        its own text does not reopen. Meanwhile the scope-(c) exemption ledger
        (ROADMAP-PLATFORM.yaml:125-145) already records, machine-readably, which pending CDs
        owe post-hoc ratification -- and no pass converts that ledger into
        realization_evidence. Two surfaces hold the same fact with no linkage.
