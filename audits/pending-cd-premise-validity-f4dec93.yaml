            note says "gating CD.6/CD.17 ratify post-hoc" -- CD.17 does not ratify post-hoc, it
            ratifies at its reversal trigger; harmless (T2.1 complete, flag correctly retained).
          basis: []
        - question: "(own) Is the filed_via placeholder on pending CDs still accurate?"
          answer: >-
            Nine pending CDs carry filed_via: pending_log_decision_lambda -- guard-compliant
