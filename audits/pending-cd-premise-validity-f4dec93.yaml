    - id: PCD-04
      surface: marking_convention
      question: Q2
      dimension: VD3
      title: "CandidateDecision.state is an unvalidated free string and the guard's branch structure silently skips unknown values -- a typo'd state would unbind a CD from every state-keyed surface with zero errors"
      evidence: "scripts/platform_roadmap.py:381 (state: str = \"pending\", no Literal, in an otherwise extra=\"forbid\" model); scripts/checks/roadmap/validate_candidate_decision_ratification.py:75-105 (if superseded: continue / if pending: ...continue / if ratified: ... -- no else)"
      evidence_kind: static
      current_behavior: >-
        Every consumer keys on exact string equality with "pending"/"ratified"/"superseded":
        the binding-set derivation, gate computation (blocked_on_cd, completion_blocked_on_cd),
        both feeds, and the guard. A CD whose state were "Pending", "retired", or any other
        string would validate at load (str field), fall through every guard branch, vanish
        from the pending set (silently releasing its completion gates and its binding), and
        never appear ratifiable. All 40 current values are valid (observed clean) -- the hole
        is latent.
      ideal_behavior: "NS-D: the enum the whole system keys on is enforced where the data loads -- state: Literal[\"pending\", \"ratified\", \"superseded\"] fails loudly on anything else, mirroring the model's existing extra=\"forbid\" strictness and the OpenQuestion/KnownGap models' Literal status fields in the same file."
      gap: "The single most load-bearing field on the audit surface is the one field the Pydantic model does not constrain, and the guard's control flow assumes the enum rather than checking it."
      compensating_controls_considered: >-
        The sibling models (OpenQuestion, KnownGap) use Literal status fields, showing the
        pattern is established -- but that is precedent, not protection for this field. Careful
        machine-mediated edits reduce typo likelihood but would not CATCH one (the failure is
        silent by construction), so no property-matched control exists.
      change_type: enforce
      proposed_change: "Change CandidateDecision.state to Literal[\"pending\", \"ratified\", \"superseded\"] (or add an else-branch FAIL in the guard for unknown states; the Literal is the collocated fix). One-line change plus a red-fixture test."
      acceptance: "Loading a roadmap fixture with state: Retired fails validation loudly (model ValidationError or guard FAIL), in both --pre and full tiers."
      severity: medium
      severity_rationale: "Latent (no instance) but the failure mode is the audit's core risk class -- a CD silently dropping out of the binding set -- and the fix is one line; a clear-fix integrity inconsistency, not a wording issue."
