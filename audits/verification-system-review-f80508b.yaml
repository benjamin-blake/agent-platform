        ci-rca.yml:52-54), which is beyond what most industrial CI systems record; (b)
        instruction-layer drift enforcement -- skills carry machine-readable behavioural
        invariants verified by prompt_compliance in the full tier, so the process definition
        itself is under CI; (c) the terraform verification path (speculative plan, guard on
        plan-CONTENT, same-artifact apply, durable convergence record, red-record refusal) is a
        complete provenance chain. It LAGS the frontier on mutation testing, verifier-selection
        correctness, flake detection (all designed, none live), and -- the sharpest lag -- on
        independent re-execution of the per-change proof: INTENT-verification-system.md:25
        diagnoses "LLMs evaluate their own work ... cooperative self-evaluation" as the root
        failure mode, yet the interactive VP is still executed and self-reported by the
        implementing agent (VF-01). Verdict: strong, not frontier -- see maturity.
    - q: Q2
