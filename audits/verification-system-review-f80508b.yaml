        - {id: T3.10, state: deferred, closes_gap: partial, residual: "deferred_post_mvp: the acceptance[]-surface unification ships after MVP, so two check vocabularies persist through the window in which the executor is rebuilt (VF-14)"}
        - {id: T4.1, state: designed, closes_gap: yes, residual: "state machine ends at file_pr + emit_telemetry -- no merge state; MVP merge authority stays with CI + human/auto-merge, which is coherent; add a verdict-wait timeout criterion (VF-10)"}
