    - id: VF-01
      surface: interactive
      question: Q4
      dimension: VD2
      title: "Per-plan VP is executed and reported by the change author; never independently re-executed, never persisted"
      evidence: ".claude/skills/implement/SKILL.md:83-133 (protocol + chat-only compliance table); scripts/verifiers/harness.py:155-166 (no --plan mode); docs/INTENT-verification-system.md:7,25,243-253 (designed replacement never built)"
      evidence_kind: static
      current_behavior: >-
        /implement runs each VP step itself, judges PASS/FAIL, and prints a compliance table in
        chat; merge, roadmap criterion flips (closes_criteria -> met), and rec closure all key
        off that self-report. No mechanism re-executes any VP step; the table is not persisted
        to the PR or anywhere durable.
      ideal_behavior: "The pass/fail for the per-change proof is produced by something other than the author (CI replay of the hermetic subset) and recorded durably; V3 post-deploy outcomes rest on durable attested evidence inspected by the fresh-context reviewer."
      gap: "The one check that exercises the promised behaviour end-to-end is the one check whose verdict is an attestation."
      compensating_controls_considered: >-
        Code-review (fresh context, reads diff+plan, checks acceptance criteria) does not RUN
        the code -- not property-matched for a runtime proof. CI/validate re-executes the
        repo-wide envelope incl. 100% changed-line coverage (validate_test_coverage) -- a real
        partial match for V2 (changed lines provably execute under independent CI) but not for
        V3 post-deploy behaviour or plan-specific expected outputs (weak assertions pass,
        CD.30's own admission). V3 Merge Gate inserts a human at the DEPLOY step
        (implement SKILL.md:125-132) but post-deploy verification returns to self-attestation.
        Judged insufficient in combination for V3 and for expected-output fidelity generally.
      change_type: enforce
      proposed_change: >-
        (a) Append the VP compliance table (command, truncated actual output, attempts,
        PASS/FAIL) to the PR body in the implement commit flow. (b) Add registered check
        validate_vp_replay: when a PR's diff contains its PLAN-*.yaml, re-execute the plan's
        hermetic pre-deploy VP steps in pr-validate and fail on divergence from `expected`.
        (c) For V3: require post-deploy evidence (invocation output + run URL) be posted to the
        PR before merge; code-review checklist verifies the artifact exists and coheres.
      acceptance: "A PR whose plan carries a hermetic pre-deploy VP step that fails on the PR tree cannot go green; the merged PR body contains the VP table; a V3 merge without a posted evidence artifact is flagged by code-review."
