        - {property: "Provenance / attestation (SLSA-style)", met: partial, evidence: "terraform slice is strong: apply consumes the SAME plan.bin the guard inspected, no re-plan/no TOCTOU, plan_sha in the convergence record (Decision 77/92; planning SKILL.md:240-245); code slice: strict=false merges (Decision 83, DECISIONS.md:1352), VP evidence ephemeral chat (VF-07)"}
