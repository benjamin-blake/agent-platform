  architecture_recommendation:
    interactive:
      verdict: hybrid
      execution_routing: >-
        (a) Deterministic/stable-oracle checks: KEEP the VP as author-written deterministic
        script steps (already schema-enforced executable commands) and ADD independent
        re-execution -- a pr-validate step parses the PR's PLAN-*.yaml and re-runs the hermetic
        pre-deploy VP steps, comparing expected; non-hermetic steps are declared and excluded,
        mirroring the Hermeticity enum. (b) Judgment checks: zero-context agents stay exactly
        where they are (plan-critique on the oracle BEFORE code exists; code-review on the diff
        after) -- do NOT hand VP execution to a fresh agent; it adds cost, not independence,
        over CI. (c) Environment-bound/destructive V3: human-gated deploy stays; post-deploy
        evidence becomes DURABLE (invocation output + run URL posted to the PR, not chat) and
        the code-review agent's checklist gains "inspect the attested evidence artifact";
        re-invokable smokes graduate into the registry.
      authorship_fix: >-
        The surface already has the strongest cheap anti-circularity property available: the
        oracle (VP expected outcomes) is authored at /plan time and fresh-context critiqued
        BEFORE any implementation exists, and /implement runs in a separate session. Preserve
        that ordering as an explicit invariant ("VP steps may be added during /implement only
        with a logged rationale"); the residual misreport/substitute risk is eliminated by CI
        re-execution, not by more review.
      mechanism: >-
        (1) XS: implement SKILL.md commit flow appends the VP compliance table (+ attempt counts)
        to the PR body. (2) M: new validate.py check `validate_vp_replay` (registered per
        Decision 104) -- on PRs whose diff adds/modifies docs/plans/PLAN-*.yaml, execute that
        plan's pre-deploy steps tagged hermetic; report per-step verdicts. (3) S: /implement
        gains a post-VP graduation prompt that runs is_admitted live against origin/main for
        candidate steps (feeds VF-05/VF-06).
      what_changes: "VP verdict becomes independently produced for the hermetic subset and durably recorded for all of it; ledger criterion flips (closes_criteria) inherit a machine fact instead of an attestation."
      cost: "One CI step bounded by the existing 5-minute fast-tier budget (hermetic VP steps in the sample run in seconds); XS skill edit; no new infrastructure."
      rationale: >-
        INTENT-verification-system.md:25 named cooperative self-evaluation as the root failure
        mode and prescribed harness execution (Wave 3, integration point 3); the harness never
        gained --plan and the roadmap never extracted the item. The VP is already a
        deterministic per-plan script -- the missing property is WHO runs and records it, which
        CI supplies for free. Empirical support: sampled VPs are executable and mostly
        differential today, so replay is cheap; the one V3 sample shows exactly the circularity
        replay would remove.
      confidence: CONFIRMED
    aws_executor:
      verdict: script
      execution_routing: >-
        Endorse CD.38 exactly as written: GitHub Actions executes ALL verification (PR --pre,
        main full-validate, registry execution); Step Functions records correlation ids and
        waits on callbacks; >15-min deterministic steps ride the T4.1 ECS escape; NO in-cloud
        verifier runner, NO agent-produced verdicts. Add one execution lane the current text
        leaves ambiguous: a per-rec differential verify JOB in GitHub Actions (checkout
        pre-change tree, run candidate checks, assert FAIL; checkout head, assert PASS), keyed
        by rec id -- this realizes T3.1 c6's "executor verify-state" WITHOUT violating CD.38's
        sole-runner rule (VF-12). Zero-context agents appear in exactly one verification role:
        the code_review persona inspecting durable attested evidence for
        environment-bound/destructive V3 outcomes -- never producing the pass/fail for
        deterministic checks.
      authorship_fix: >-
        Executor-era oracles (rec acceptance) are often authored by a DIFFERENT agent than the
        implementer (ci-rca, code-review, curator) -- structurally better than interactive. The
        live risk is oracle WEAKNESS, not oracle rigging: structural grep oracles survive
        fail-on-revert (VF-11). Fix at admission and audit time: differential job at PR time,
        mutation-on-graduation (T3.7) pulled onto the pre-unfreeze path for any rec class the
        executor will merge unattended, and Decision 66 Tier D (semantic acceptance judge --
        LLM in an ADVISORY authoring-time role, consistent with Decision 59) actually filed as
        the rec Decision 66 promised.
      mechanism: "Contract text edits to T4.9 (+ head SHA in the correlation tuple; merge permitted only when verdict.head_sha == PR head at merge time; verdict-wait HeartbeatSeconds/timeout routes to ci-rca) and to T3.1 c6 / CD.38 (differential verify runs as a GHA job, Step Functions waits). All are design-stage edits -- nothing is built yet (confirmed on disk: no executor/Step Functions terraform exists)."
      what_changes: "The executor merges only on a verdict cryptographically tied to the artifact it verified, produced by an independent runner, with fail-on-revert proven per rec, and with every no-verdict path terminating in RCA instead of a silent wait."
      cost: "Roadmap/contract text now (XS); at build time, one additional GHA workflow and ~2 state-machine states; GHA minutes per rec (~2-5 min) -- negligible against persona LLM cost."
      rationale: >-
        CD.38 is the correct call and is already frontier-shaped (TAP flow, sole-runner
        invariant, foreclosing any AWS verifier runner). The additions close the three
        expressible failure modes -- wrong-SHA verdict (strict=false makes it real), absent
        verdict (no timeout owner), and the sole seam where the roadmap still gestures at
        in-cloud verification (T3.1 c6 wording).
      confidence: CONFIRMED

