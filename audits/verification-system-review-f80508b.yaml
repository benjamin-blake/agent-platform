      prose: >-
        The planned work is architecturally right and, where shipped, well-built. Two structural
        insufficiencies keep the verdict at partial. First, SEQUENCING: the oracle-quality layer
        (T3.7 mutation, CD.30 ratchet, Decision 66 Tier D) is deliberately NOT on the CD.17
        executor-unfreeze critical path, so the autonomous consumer of rec acceptance oracles can
        go live while those oracles are still un-audited structural greps (VF-11). Second,
        OWNERSHIP HOLES: no roadmap item owns (a) independent re-execution or persistence of the
        interactive VP -- the INTENT doc designed it (harness --plan, Wave 3) but the roadmap
        extraction never carried it (VF-01, VF-07); (b) the verifier-coverage selection repair
        (VF-02/VF-03); (c) a deterministic V-tier floor in validate.py -- Decision 48:2414 calls
        for exactly this rec and none was ever filed (VF-04); (d) an interactive-era graduation
        producer (VF-05). Everything else live-gapped is owned by a named item and needs
        building, not redesign.
    - q: Q3
      verdict: vacuous-paths-exist
      per_check_vacuity: >-
        Limb A is mostly healthy on the interactive surface TODAY: the empirical pass over the 8
        most recent plans found V2 VPs that genuinely execute the changed feature (live warehouse
        ETL in close-audit-ulf-02 step 9; module CLI + live two-run in cost-reconciliation step
        3/9) and would fail on revert at the unit level. Three vacuity classes survive: (1) the
        single sampled V3 plan (close-audit-ulf-01) has post-deploy VP COMMANDS that grep the
        author's own transcription in DECISIONS.md for a run URL rather than re-invoking the
        deployed system -- the live invocation is real but the machine-checkable verdict is
        circular (observed); (2) rec acceptance oracles are overwhelmingly `grep -q` structural
        checks (observed across the 10-rec sample, including High-priority rec-940), which
        survive fail-on-revert while proving only text presence (VF-11); (3) a HARD_GATE verifier
        passes vacuously in production: AthenaViewsVerifier reports "Views are fresh. Found 45
        decisions" against the frozen pre-Decision-84 Iceberg copy while main carries 74 decision
        headers and dec-114 exists (VF-03, observed live).
      set_completeness: >-
        Limb B is process-covered but not machine-covered. Every plan must carry a VP spanning
        its scope (schema min-1-step + critique 12c judging exercise-the-feature), and the
        two-tier CI re-executes the repo-wide envelope. But the designed machine backstop for
        selection -- check_coverage over verifier covers globs -- can never fire: a registered
        verifier inherits covers=["**"], so every path reports covered (empirically confirmed:
        check_coverage(['zzz/definitely_not_covered.xyz']) == []); --coverage additionally exits
        0 unconditionally and is wired into no workflow or skill (VF-02). Error paths,
        idempotency and rollback are exercised only when a plan author writes them; no dimension
        of the gate demands them (the rollback field is optional prose).
      vacuous_paths:
        - "V3 post-deploy self-attestation: agent performs live run, transcribes evidence, VP command greps its own transcription (PLAN-close-audit-ulf-01 step 9, observed)"
        - "Structural acceptance oracle on a rec: grep -q passes fail-on-revert yet proves only string presence; becomes the executor's merge oracle at unfreeze (VF-11)"
        - "Uncovered changed surface: a file outside every verifier's covers merges with no signal, because the coverage reporter is structurally unable to report it (VF-02)"
        - "Stale-oracle verifier: AthenaViewsVerifier green against a retired data surface on every main-validate and canary run (VF-03)"
      prose: >-
        A green interactive verdict today proves: the diff lints, changed tests pass, 100% of
        changed Python lines execute under independent CI, repo invariants hold, a fresh-context
        reviewer judged the diff against the plan, and the author REPORTS the per-plan VP passed.
        The residual trust assumption is precisely the author's report on the one check that
        exercises the promised behaviour end-to-end -- plus the four vacuous paths above. The
        system's own ci-rca instrumentation (vacuous_pass, escape_mode) shows it already treats
        vacuity as a first-class enemy at the CI seam; the same discipline has not yet reached
        the VP and the verifier registry.
    - q: Q4
      prose: "See architecture_recommendation. One-line preview: interactive = hybrid (keep deterministic self-authored VP, add CI re-execution of the hermetic subset + durable evidence; agents stay in the judgment lanes); aws-executor = script (endorse CD.38 exactly as written, with three contract amendments: per-rec differential job in GHA, head-SHA verdict binding, callback timeout-to-RCA)."
    - q: Q5
      answers:
        - question: "Who should independently re-execute the interactive VP?"
          answer: >-
            CI should, for the hermetic pre-deploy subset -- not a fresh agent. The VP is already
            machine-readable (PlanDocument.verification_plan with required executable commands),
            so a pr-validate step that parses the diff's plan and runs its pre-deploy steps buys
            independence at near-zero marginal cost; a zero-context agent re-running shell
            commands adds cost without adding independence beyond what CI gives. Self-attestation
            is NOT acceptable as the steady state here because the compensating controls do not
            property-match: code-review reads but does not run (code-review SKILL.md), and CI
            runs the repo, not the plan. The one mitigating structural fact: the ORACLE predates
            the code (VP authored at /plan, critiqued fresh, executed by a different /implement
            session), so the residual risk is misreporting/substitution, not oracle rigging --
            which is exactly what re-execution eliminates. (VF-01)
        - question: "Should VP steps graduate into the zero-entry registry, or is per-plan-throwaway correct?"
          answer: >-
            Selective graduation, and the admission bar already exists on paper: differential
            fail-on-revert (is_admitted) plus hermeticity. Most VP steps SHOULD be throwaway
            (they verify a transition, not an invariant); the graduation candidates are steps
            that assert a standing property (contract shape, guard behaviour, live-path
            liveness). Today the decision is not deliberate -- it is structurally impossible,
            because no workflow surface mentions graduation (zero hits across .claude/skills and
            .claude/commands) and CD.29's producer flow is executor-era. Add an /implement
            post-VP graduation prompt with is_admitted executed live (VF-05, VF-06).
        - question: "Should coverage-of-changed-surface be a merge GATE or stay advisory?"
          answer: >-
            Advisory now, gate later, exactly as INTENT-verification-system.md:598 designed
            ("progressive enforcement") -- but the current question is moot until the mechanism
            can fire at all: check_coverage is vacuous under the inherited ["**"] covers and
            --coverage is wired nowhere (VF-02). Repair first (explicit covers on
            AthenaViewsVerifier; treat "**" as non-covering in check_coverage), wire it into
            pr-validate as a visible advisory, then gate V3-tier plans once the verifier
            catalogue justifies it.
        - question: "Is SKIPPED (creds/infra down) a silent vacuous pass or sound degradation?"
          answer: >-
            Sound degradation, on evidence. At the VP level SKIPPED is outlawed outright ("only
            PASS or FAIL", implement SKILL.md:107-113). At the harness level SKIPPED is loudly
            labelled, and the property it leaves unproven is re-proven by a matched control:
            Main Canary runs the identical full tier with real OIDC creds every 3 hours
            (main-canary.yml:5,47-50) and its failures file ci-rca recs (ci-rca.yml:12) -- it
            would fail if a SKIPPED-masked defect were real. Residual: the DEGRADED->SKIPPED
            reduction inside DataQualityVerifier gives a backend outage a green main for up to
            ~3h; acceptable at this scale, and T1.6/Decision 62 own the durable reshape.
        - question: "Is self-assigned V-tier trustworthy with no automated classifier?"
          answer: >-
            Partially. The tier RULE is now deterministic on paper (plan-critique 12m:
            resource-affecting .tf or active-manifest Lambda => V3; Python => >=V2; Decision 79
            made Lambda-tier follow the manifest graph) but it is applied by an LLM critique
            agent, not by validate.py -- Decision 48:2414 admits "documentation-enforced only"
            and the rec it calls for was never filed (0 dedup hits). The empirical sample shows
            honest tiering, including conscious-acceptance write-ups (cost-reconciliation
            declares V2 and justifies why against Decision 48). Trustworthy today by culture;
            enforce it for the executor era with a ~50-line deterministic floor check (VF-04).
        - question: "Flakiness: is there a DETECTION mechanism for agent-declared 'flaky, passed on re-run', or only a manual label?"
          answer: >-
            No detection mechanism exists on either surface. The implement protocol bounds FIX
            attempts (3, then stop) but a bare re-run-to-green with no intervening diff is
            indistinguishable from a fix in the chat record and nothing records attempt counts.
            This is the rescue-loop-in-disguise the prompt names, and it is distinct from
            declared non-determinism (Hermeticity.NON_HERMETIC_BY_CONSTRUCTION is a typed,
            audited property; an agent's 'flaky' label is not). CD.29's
            quarantine-that-files-a-rec and T1.6's alarm-not-gate own the executor/DQ classes;
            interactive VP re-runs are unowned (VF-08). Cheap fix: attempt-count column in the
            persisted VP table; >1 attempt with empty diff auto-files a rec.
        - question: "Is the CD.38 callback-wait model sound at scale, and what are the T4.9 handshake failure modes?"
          answer: >-
            The model is sound and cheap at this scale (Step Functions waitForTaskToken costs
            nothing while waiting; GHA minutes are the marginal cost; ECS escape handles >15-min
            determinism). Three failure modes need contract text: (1) verdict never arrives --
            no timeout criterion exists on T4.1/T4.9; the interactive surface already solves the
            analogous dropped-signal problem (continue-on-error green comment + one-shot
            send_later backstop), the executor needs HeartbeatSeconds/timeout->ci-rca (VF-10);
            (2) verdict for the wrong artifact -- the T4.9 correlation tuple (PR number,
            check-run id, workflow-run id, rec id, execution id; ROADMAP:7196) omits head SHA,
            and branch protection is strict=false, so a stale-green merge is expressible; bind
            verdicts to SHAs and assert equality at merge (VF-09); (3) correlation-id integrity
            -- T4.9 already specifies auth, duplicate-idempotency and stale rejection with unit
            tests; adequate as designed.
        - question: "Defence-in-depth cost: is 'CI is authoritative' the right tiebreak, and is the per-rec/repo-wide overlap redundant?"
          answer: >-
            Yes and complementary, not redundant. CD.29:1251-1255 states the distinction
            precisely: per-change verification answers "did THIS change do what was asked" and
            can run differential baselines that repo-wide validation structurally cannot;
            validation answers "is the repo still sound". CI-authoritative (Decision 73/83/89)
            is the right tiebreak because CI is the only executor-independent, environment-
            pinned run. The observed overlap (plans ending VPs with a full `scripts.validate`
            step CI will re-run anyway) costs minutes, not correctness -- and pre-merge full
            runs prevent post-merge red mains, which cost far more.
        - question: "Same-PR guard adequacy: can an author admit a trivially-passing verifier even if they cannot weaken one?"
          answer: >-
            Yes, today. The guard (validate_verifier_same_pr_guard, --pre tier) blocks weakening
            an EXISTING verifier alongside covered code, but exception (b) deliberately admits
            brand-new verifiers with their covered code, and validate_verification_registry
            checks schema only -- nothing executes the differential admission gate against a NEW
            registry entry or verifier (is_admitted's sole production caller simulates its
            revert). The designed answer (differential gate at admission, mutation-on-graduation
            in T3.7) is right; it is not yet executable machinery (VF-06). Latent while the
            registry holds zero entries.
        - question: "(added) Does the closes_criteria/roadmap ledger inherit the VP's trust model?"
          answer: >-
            Yes -- and this widens VF-01's blast radius beyond the merge. The exit-criteria
            ledger flips criterion status open->met "on a verified VP pass" (exit-criteria-
            ledger.yaml:35-37; implement SKILL.md:179-198), i.e. on the author's self-reported
            table. Status-Trusted-Never-Inferred correctly bans INFERENCE, but the trusted proof
            is currently an attestation, not an independently produced fact. CI re-execution of
            the VP (VF-01) hardens roadmap state for free.
        - question: "(added) When the executor unfreezes, do human PRs and executor PRs hit the same gate?"
          answer: >-
            By design, yes -- CD.38's "GitHub Actions is the sole verifier/validation runner"
            plus branch protection means both PR classes face pr-validate + terraform-validate
            and post-merge full-validate identically. This is the design's strongest consistency
            property; the divergence risk is upstream of the gate (rec acceptance oracles vs
            plan VPs -- two vocabularies until T3.10, VF-14), not at it.
  per_surface_assessment:
      - surface: interactive
        maturity: solid
        strengths: >-
          Layered and honest: schema-enforced executable VPs whose oracles predate the code;
          fresh-context critique and code-review gates with deterministic verdict rules;
          two-tier diff-aware CI with a hard wall-clock budget and audited escape hatch;
          forward-fix RCA culture with deterministic gate-escape evidence (vacuous_pass,
          escape_mode); terraform path with true artifact-verdict binding; instruction surfaces
          themselves under CI (prompt_compliance).
        top_gaps: [VF-01, VF-02, VF-03, VF-04, VF-07]
      - surface: aws-executor
        maturity: strong
        strengths: >-
          The design (CD.27 + CD.38 + T4.1/T4.9) is independently-executed-by-construction:
          personas never run their own verdicts, GitHub Actions owns all verification, Step
          Functions only waits on callbacks, failures route to ci-rca and never silently retry,
          and concurrency=1 + deterministic-only retries encode RCA-first. Design-stage rating:
          nothing is built (confirmed: no Step Functions/executor orchestration terraform
          exists on disk).
        top_gaps: [VF-11, VF-09, VF-10, VF-12]

