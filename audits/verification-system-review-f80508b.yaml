        - {id: T4.11, state: deferred, closes_gap: partial, residual: "verification-attempt budgets enforced by Step Functions state land post-MVP; until then bad-output retry prohibition is persona prompt discipline only"}
        - {id: T2.15, state: designed, closes_gap: yes, residual: "restores the three deliberately deferred coverage pieces (ops_execution_plans DQ, session-log DQ successor, CausalChainVerifier); gated on T3.2/CD.17 by construction"}
        - {id: T0.12.5, state: built, closes_gap: yes, residual: "typed-checks field shape ratified; the recorded field-shape-vs-enforcement skew (CD.29:1295-1299) is explicit, not silent"}
