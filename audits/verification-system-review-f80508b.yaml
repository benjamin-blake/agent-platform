      prose: >-
        The current+planned design LEADS external practice in three places: (a) gate-escape
        forensics -- the ci-rca evidence bundle computes a tri-state vacuous_pass datum and a
        deterministic escape_mode taxonomy (check_ran_vacuously / check_absent / tier_misplaced /
