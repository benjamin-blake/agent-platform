        broad defect classes, and a vacuous green needs BOTH a mis-attested VP AND repo-wide
        blindness. High because the compensating controls do not property-match the V3/runtime
        slice, the blast radius includes roadmap ledger state (criterion flips trust this
        attestation), and a feasible, net-positive independent re-execution is left undone.
