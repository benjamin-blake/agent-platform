    compensating_control: deploy-paths.yaml centralizes top-level intents and workflows enforce the safety properties.
    control_property_match: The router names actor/trigger/recovery at docs/contracts/deploy-paths.yaml:22-51, and workflows
      fail closed on deploy/apply; these would fail if paths were absent.
    decision_or_item_id: TDS-01; TDS-03
  - candidate: C2
    why_dismissed: Mostly not a defect. Current human gates protect trust expansion, destroy, bootstrap authority, or future
      environments.
    compensating_control: Guard classification plus tf-gated-apply Environment approval.
    control_property_match: The guard observes plan JSON classifications at docs/contracts/environment-taxonomy.md:59-75 and
      routes the same saved plan to approval before apply at lines 42-57.
    decision_or_item_id: Decision 77; Decision 92
  - candidate: C3
    why_dismissed: Not a defect. Admin out-of-band is quarantined in deploy-paths.yaml, not ambient Terraform guidance.
    compensating_control: Decision 127 contract procedure placement.
    control_property_match: docs/contracts/deploy-paths.yaml:46-64 labels actor_role operator and says agents only file recs
      or execute after explicit human direction.
    decision_or_item_id: Decision 127; T2.41
  - candidate: C4
    why_dismissed: 'Partially confirmed as TDS-03: Reconcile is built and input-free, but an overlapping older dispatch path
      remains.'
    compensating_control: reconcile.yml resolve-target reads convergence record itself.
    control_property_match: scripts/ci/reconcile_target.py:69-84 maps red record to commit and green/absent to no-op; it would
      fail if operator SHA input were required.
    decision_or_item_id: TDS-03
  - candidate: C5
    why_dismissed: Not a defect. Bootstrap-window deploy role absence is explicitly scoped and cannot report deployed=true
      or smoke-green.
    compensating_control: role-provisioned variable classification plus deploy-record freshness.
    control_property_match: .github/workflows/deploy-prod-lambdas.yml:111-130 fails loud after provisioning and lines 156-194
      run smoke only after deployed=true and fresh records.
    decision_or_item_id: Decision 98; T2.43
  - candidate: C6
    why_dismissed: Underlying supply-chain defect is fully covered; only stale prose remains as TDS-02.
    compensating_control: gitignore exception plus committed terraform/personal lock file.
    control_property_match: .gitignore:62-67 unignores terraform/personal/.terraform.lock.hcl, and the file exists; provider
      version drift would show as a lock-file diff.
    decision_or_item_id: TDS-02
  - candidate: C7
    why_dismissed: Confirmed only in bounded spots, not as a system-wide drift failure.
    compensating_control: Decision 86/127 no-prose and contract drift gates.
    control_property_match: validate --pre passed sanctioned-prose, contract drift, deploy-channel conformance, and authority-budget
      drift gates in this audit run.
    decision_or_item_id: TDS-01; TDS-02
  - candidate: C8
    why_dismissed: Largely accepted. The strategy is mostly agent-first; recommended work is extraction/pointer simplification.
