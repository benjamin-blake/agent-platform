    - TDS-03
    basis:
    - TDS-03
  - id: MOVE-03
    title: Correct landed provider-lock wording
    target_surface: docs/contracts/environment-taxonomy.md
    move_type: clarify_pointer
    agent_control_gain: Avoids rediscovering already-landed supply-chain pinning work.
    safety_property_preserved: Committed lock file remains the control.
    effort: XS
    depends_on:
    - TDS-02
    basis:
    - TDS-02
  findings:
  - id: TDS-01
    surface: docs/contracts/deploy-paths.yaml
    question: Q4
    dimension: VD4
    title: Deploy-code status is a narrative blob instead of typed channel state
    evidence: docs/contracts/deploy-paths.yaml:30-36; docs/contracts/build-lambda.yaml:85-103; .github/workflows/deploy-ducklake-lambdas.yml:17-32;
      .github/workflows/deploy-prod-lambdas.yml:21-36
    evidence_kind: static
    current_behavior: The routing contract correctly names deploy_code as agent-owned and points at build-lambda.yaml, but
      its status field embeds both governed channels, bootstrap role state, repo-variable closure, and break-glass fallback
      semantics in one long prose scalar. The same facts are partly structured in build-lambda.yaml and partly executable
      in two workflows.
    ideal_behavior: A cold agent should read one small typed deploy-channel registry with per-channel fields for governed
      workflow, role-provisioned variable, bootstrap-window behavior, smoke gate, deploy record, and break-glass fallback.
      Prose should be rationale or a pointer.
    gap: The current shape is safe, but it requires natural-language extraction to answer whether a deploy path is routine,
      bootstrap-window no-op, or break-glass.
    compensating_controls_considered: The workflows enforce no silent green deployed=true and freshness checks, so this is
      not a wrong-deploy safety gap. The gap is machine readability and maintenance load.
    change_type: convert_to_contract
    proposed_change: Move the deploy-code status details into structured fields under build-lambda.yaml deploy_channels, then
      reduce deploy-paths.yaml deploy_code.status to a pointer.
    acceptance: build-lambda.yaml exposes role_provisioned_var, bootstrap_absent_role_behavior, smoke_gate, deploy_record_prefix,
      governed_channel, and break_glass_only for each channel; deploy-paths.yaml has no long channel-specific status prose;
      validate parses the new fields.
    severity: medium
    severity_rationale: Redundancy and narrative extraction reduce agent operability but executable deploy workflows still
      preserve safety.
    confidence: CONFIRMED
    roadmap_crossref:
      classification: novel
      item_ids: []
      dedup_search_terms:
      - deploy_code status build-lambda deploy_channels bootstrap window role provisioned variable
      - T2.38 T2.43 governed code deploy channel structured registry
      - deploy-record freshness deploy channel roadmap
      dedup_hit_count: 3
      note: T2.38/T2.43 built the channels and T2.41 quarantined break-glass, but no sampled item owns normalising channel
        state into a typed registry.
    effort: S
    depends_on: []
    sequencing:
      safe_to_queue_now: true
      blocked_behind: []
      note: Pure contract/check extraction.
  - id: TDS-02
    surface: docs/contracts/environment-taxonomy.md
    question: Q5
    dimension: VD4
    title: Provider lock-file section is stale after the personal lock-file exception landed
    evidence: docs/contracts/environment-taxonomy.md:158-166; .gitignore:62-67; terraform/personal/.terraform.lock.hcl
    evidence_kind: static
    current_behavior: The environment taxonomy still says .gitignore currently ignores terraform/**/.terraform.lock.hcl and
      recommends committing terraform/personal/.terraform.lock.hcl. The repository now un-ignores terraform/personal/.terraform.lock.hcl
      and the file exists.
    ideal_behavior: 'The contract should state the current control: the personal provider lock file is committed and the apply
      runner uses reviewed provider versions. Any remaining recommendation should be framed as maintenance, not missing supply-chain
      pinning.'
    gap: A cold agent could incorrectly rediscover supply-chain pinning as unbuilt work, even though the concrete control
      is present.
    compensating_controls_considered: The committed lock file and .gitignore exception property-match the supply-chain risk,
      so the original C6 defect is dismissed; only stale contract text remains.
    change_type: clarify
    proposed_change: Update section 6 to record the lock-file control as landed and keep only any real follow-on maintenance
      invariant.
    acceptance: Section 6 no longer says terraform/personal lock is ignored or merely recommended; it cites the committed
      exception and lock file as current behavior.
    severity: low
    severity_rationale: This is a stale pointer/discoverability issue; the underlying supply-chain control is already in place.
    confidence: CONFIRMED
    roadmap_crossref:
      classification: novel
      item_ids: []
      dedup_search_terms:
      - terraform personal .terraform.lock.hcl ignored recommended committed lock file
      - T2.16b CD.34 provider lock file
      - environment-taxonomy provider lock file consideration
      dedup_hit_count: 2
      note: Existing items/decisions appear to cover landing the lock file, not cleaning up this stale sentence.
    effort: XS
    depends_on: []
    sequencing:
      safe_to_queue_now: true
      blocked_behind: []
      note: Documentation correction only.
  - id: TDS-03
    surface: .github/workflows/terraform-apply-sandbox.yml
    question: Q6
    dimension: VD5
    title: Legacy acknowledge-and-retry dispatch overlaps the input-free Reconcile recovery path
    evidence: .github/workflows/terraform-apply-sandbox.yml:49-57; .github/workflows/terraform-apply-sandbox.yml:185-195;
      .github/workflows/reconcile.yml:1-28; scripts/ci/reconcile_target.py:69-84
    evidence_kind: static
    current_behavior: The landed Reconcile workflow is input-free for the target SHA and reads the red commit from the convergence
      record, but terraform-apply-sandbox still exposes workflow_dispatch acknowledge_red_commit accepting a red SHA or rec
      id.
    ideal_behavior: One recovery verb should be the routine red-record path. If acknowledge-and-retry remains as a break-glass
      or compatibility escape hatch, the contract should label it as such and point agents to Reconcile by default.
    gap: Two dispatch surfaces encode similar recovery semantics; one is input-free and agent-routable, the other asks for
      human/operator-supplied identity data. That increases interpretation load and risks agents selecting the older path.
    compensating_controls_considered: Both paths fail closed and still run the guard, so this is not an unsafe apply gap.
      The weakness is duplicated recovery routing and extra human-supplied input in the agent-facing workflow surface.
    change_type: unify
    proposed_change: Make Reconcile the single documented routine red-record recovery path; either remove acknowledge_red_commit
      or relabel it as admin/break-glass compatibility with a validation check that deploy-paths.yaml does not route agents
      to it.
    acceptance: deploy-paths.yaml and workflow comments route routine red/drift recovery only to reconcile.yml; any remaining
      terraform-apply-sandbox workflow_dispatch input is documented as non-default and covered by a structural verifier.
    severity: medium
    severity_rationale: The duplicate path materially reduces recovery simplicity but deterministic guard and convergence
      controls prevent wrong trusted applies.
    confidence: CONFIRMED
    roadmap_crossref:
      classification: planned-insufficient
      item_ids:
      - T2.37
      - T2.41
      dedup_search_terms:
      - T2.37 reconcile acknowledge_red_commit workflow_dispatch
      - red convergence record heal button input-free reconcile
      - Decision 126 acknowledge and retry
      dedup_hit_count: 4
      note: T2.37 built the heal button and T2.41 quarantined break-glass, but the older acknowledge-and-retry input remains
        exposed in the apply workflow.
    effort: S
    depends_on: []
    sequencing:
      safe_to_queue_now: true
      blocked_behind: []
      note: Can be queued as a routing simplification after confirming no active runbook depends on the old input.
