  human_gate_inventory:
  - gate: tf-gated-apply Environment approval
    surface: docs/contracts/environment-taxonomy.md
    current_risk_property: Out-of-budget IAM, trust-policy diffs, destroy/replace, and non-create Neon changes.
    deterministic_control_considered: terraform_apply_guard observes plan JSON and routes exit 2 before apply.
    verdict: current_required
    rationale: The deterministic guard detects the risk but does not authorize trust expansion; human approval is property-matched
      for current sandbox trust/destroy cases.
    basis: []
  - gate: bootstrap/admin out-of-band apply
    surface: docs/contracts/deploy-paths.yaml
    current_risk_property: Creation or mutation of the CI apply authority and admin trust boundary.
    deterministic_control_considered: Authority budget and guard govern routine apply role scope but cannot safely self-amend
      the bootstrap authority.
    verdict: current_required
    rationale: Human-only bootstrap is correctly quarantined from routine agent action.
    basis: []
  - gate: SIT/PROD manual apply and second approver
    surface: docs/contracts/environment-taxonomy.md
    current_risk_property: Future dedicated accounts and real-capital environment exposure.
    deterministic_control_considered: Sandbox guard and convergence controls do not model future real-capital blast radius.
    verdict: future_required
    rationale: Correctly deferred; absence of live SIT/PROD is not a current defect.
    basis: []
  - gate: Deploy-role provisioned repo variables set by operator
    surface: .github/workflows/deploy-prod-lambdas.yml
    current_risk_property: Bootstrap-window no-op vs post-provisioning assume-role regression.
    deterministic_control_considered: Workflow classifies assume-role failure by operator-owned variable and deploy-record
      freshness blocks smoke false green.
    verdict: current_required
    rationale: This is a temporary admin-create seam; once roles exist, failures become loud.
    basis:
    - TDS-01
  - gate: acknowledge_red_commit manual dispatch input
    surface: .github/workflows/terraform-apply-sandbox.yml
    current_risk_property: Clearing a red convergence latch after review.
    deterministic_control_considered: reconcile.yml reads the red commit from the convergence record and validates optional
      rec id.
    verdict: convert_to_agent_owned
    rationale: Reconcile property-matches the recovery target without operator-supplied SHA, so the legacy input should be
      non-default or retired.
    basis:
    - TDS-03
  simplification_moves:
