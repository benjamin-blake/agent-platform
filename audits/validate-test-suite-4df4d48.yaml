  naming_reconciliation:
    - collision: coverage
      verdict: disambiguate-in-place
      mechanism: >-
        Rename the VERIFIER-coverage surfaces only: --coverage -> --verifier-coverage (keep
        --coverage as a deprecated alias for one release), run_coverage_check ->
        run_verifier_coverage_report, pre_sequence scaffold name coverage_report ->
        verifier_coverage_report; move map_source_to_test out of test_coverage_checker.py into
        a selection-owned module (or rename the module) at the CD.30 retarget, when
        test_coverage_checker.py is already being rewritten. Leave pytest-cov and the
        domain-qualified check names untouched.
      blast_radius: >-
        --coverage callers: validate.py + scripts/verifiers/__init__.py docstring only (grepped;
        T2.15 references it in prose). Scaffold rename touches registry.py pre_sequence +
        FROZEN_PRE_SCAFFOLDS tuple in tests/test_checks_registry.py (one line each).
        map_source_to_test relocation touches affected_tests.py channel 3 import +
        validate_test_coverage's loader + tests.
      cost: XS for the CLI/scaffold renames; S for the mirror-map relocation (fold into CD.30 work).
      rationale: >-
        Three coverage semantics share one word on one CLI; the selection mirror-map living in
        a coverage-named module is the highest-misdirection instance (an agent-first repo is
        the stated design constraint). Full reconcile (renaming checks) buys little over
        in-place disambiguation of the two user-facing surfaces.
      confidence: CONFIRMED
    - collision: validate
      verdict: leave-as-is
      mechanism: >-
        No rename. The validate.py + validate_* corpus is ONE subsystem whose prefix IS the
        convention; scripts/verifiers/ is already differently named. The single genuine stray,
        scripts/validate_telemetry.py (zero importers, dormant Athena-era standalone), gets its
        disposition at T2.36 (rebuild/retire/rename with the telemetry re-land) - a rename now
        churns a dormant file twice.
      blast_radius: "None now; T2.36 absorbs the one-file disposition (its test moves with it)."
      cost: "Zero now; XS at T2.36."
      rationale: >-
        The overload is deliberate convention for surfaces (1)/(2), documented in Decision 104;
        only the stray needs an owner, and it has a natural future one.
      confidence: CONFIRMED

  requirements_options:
    - option: "A - Harden the status quo (role-true four-file set)"
      changes: >-
        Move pytest*/ruff/mypy/pydantic-dev-tools out of requirements.txt into
        requirements-dev.txt (or a new requirements-ci.txt); requirements.txt becomes
        runtime-only; ci.yml main-validate/canary install runtime+dev; delete pytest-picked
        everywhere; extend pip cache keys to hash all installed files (subsumes rec-2304).
      tradeoffs: >-
        Cleanest roles for lowest churn; keeps every existing mechanism. Leaves four files and
        the convention-only fast/full constraint sync in place.
      deferral_coupling: >-
        Excluded-set: _excluded_heavy_import_names = requirements.txt - requirements-fast.txt;
        moving DEV tools out of requirements.txt does not change the excluded set (those dists
        are in requirements-fast.txt, so they never contributed) - torch/pandas/etc stay
        excluded. Pip cache: keys must add hashFiles of requirements-dev.txt (+fast for
        pr-validate) or stale-dev-layer reuse (rec-2304's outage class) persists.
      effort: S
    - option: "B - pyproject consolidation ([project] + extras)"
      changes: >-
        Adopt [project] dependencies + optional-dependencies {fast, dev}; generate
        requirements.lock from pyproject via pip-compile; retire the three .txt files;
        Dependabot pip ecosystem follows pyproject; ci.yml installs '.[fast]'/'.[dev]' or
        pip-compile exports.
      tradeoffs: >-
        Single standard SoT, machine-parseable (agent-first alignment), tooling-native. Largest
        migration: touches _scaffolding.py's file parser, all three workflows, lockfile-sync
        check, and the requirements-file headers' documented discipline; setup.py stays an env
        bootstrap (Decision 27) but the name collision with packaging gets sharper.
      deferral_coupling: >-
        _excluded_heavy_import_names and _parse_requirement_dist_names read the two .txt PATHS
        - both must be rewritten to read pyproject extras (the derived-not-hardcoded acceptance
        of rec-2485 must be preserved). Pip cache keys re-point at pyproject.toml +
        requirements.lock. Highest coupling of the three options.
      effort: M
    - option: "C - Lock-driven CI installs (reproducible full tier)"
      changes: >-
        Keep the declaration files as-is; make main-validate/canary install FROM
        requirements.lock (pip-compile closure; optionally --require-hashes); pr-validate keeps
        the fast set; pip cache key -> hashFiles('requirements.lock'); Dependabot lock updates
        become the drift channel.
      tradeoffs: >-
        Gives the lock a live role (today it is sync-checked, installed by nothing) and makes
        post-merge reds reproducible. COST: the canary's environment-drift-detection role
        inverts - pinned installs stop catching fresh-resolution breakage, so drift detection
        moves to Dependabot PRs (which DO run the gate) - arguably a better home, but it is a
        semantic change to Decision 73's L8 canary purpose and must be owned in a decision.
      deferral_coupling: >-
        Excluded-set derivation unchanged (still reads the two .txt declaration files - the
        lock is an INSTALL source, not a declaration surface). Cache key becomes
        content-correct automatically (the lock IS the installed set).
      effort: S-M

  findings:
    - id: VTS-01
      surface: S4
      question: Q4
      dimension: VD4
      title: "tests-tree helper modules (tests/fixtures/**) are invisible to affected-set candidate admission - a fixtures-only edit selects zero tests, silently"
      evidence: "scripts/checks/deps/affected_tests.py:56-61 (_is_changed_source_py admits only src/|scripts/); trace: derive_affected_tests([('M','tests/fixtures/ducklake_fakes.py')]) -> selected=0, no defer, no warning; 8+ test files import tests.fixtures.ducklake_fakes; tests/CLAUDE.md names tests/fixtures/ as the sanctioned shared-helper home"
      evidence_kind: observed
      current_behavior: >-
        The import-closure and mirror-map channels draw candidates only from changed .py files
        under src/ or scripts/. tests/** non-test .py files (the fixtures package, any helper
        module) are not candidates; conftest.py is channel 4's only tests-tree trigger; the
        data-edge channel skips modified .py files by construction. Result: a PR that only
        edits tests/fixtures/ducklake_fakes.py runs ZERO tests in --pre - no selection, no cap
        deferral, no warning - although the dependency graph (which indexes tests/) knows every
        importer.
      ideal_behavior: >-
        A changed non-test .py under tests/ is an import-closure candidate; its direct
        importer tests land in the protected set like any other direct reverse-dep.
      gap: "Silent under-selection below the true blast radius - the exact property NS-D/Decision 135 rule out; unlike cap deferral it leaves no trace."
      compensating_controls_considered: >-
        rec-2731 (force full-suite scope on conftest/autouse-fixture changes) is adjacent but
        does NOT property-match: fixtures modules are imported helpers, not autouse fixture
        carriers, and its remedy keys on conftest paths. The full post-merge tier catches the
        breakage ~30 min later as a critical ci_rca rec - detection, not prevention. The
        no-cross-test-imports guard actively steers shared helpers INTO this blind spot.
      change_type: rescope
      proposed_change: >-
        Extend _is_changed_source_py (or add a fifth candidate class) to admit changed
        tests/**/*.py non-test files into the import-closure channel; their graph predecessors
        already resolve via _module_to_test_path. Add an incident-replay test mirroring the
        existing TestRoadmapGuardSubsumption pattern.
      acceptance: "derive_affected_tests([('M','tests/fixtures/ducklake_fakes.py')]) selects every test module importing tests.fixtures.ducklake_fakes, provenance import_closure_direct; bin/venv-python -m pytest tests/checks/deps/test_affected_tests.py"
      severity: critical
      severity_rationale: >-
        Matches the brief's critical class verbatim: an affected-set recall hole that lets a
        genuinely-broken test escape the PR gate - and this one is silent, unlike the loud cap
        path. A fixtures-only refactor that breaks its importers merges green with zero tests
        run. Frequency is moderated by fixtures edits usually accompanying test edits, but the
        sanctioned-home policy makes fixtures-only refactors a designed-for workflow.
      confidence: CONFIRMED
      roadmap_crossref: {classification: novel, item_ids: [],
        dedup_search_terms: ["tests/fixtures", "affected-set", "affected_tests", "conftest", "autouse"],
        dedup_hit_count: 2,
        note: "Hits rec-2731 (conftest/autouse scope forcing) and rec-2737 (cap ordering) are adjacent cap/conftest remedies; neither admits tests-tree helper modules as candidates. Fully distinct hole."}
      effort: S
      depends_on: []
      sequencing: {safe_to_queue_now: true, blocked_behind: [], note: "Pure additive selection widening; cannot shrink any existing selection (additive-only invariant preserved)."}

    - id: VTS-02
      surface: S4
      question: Q4
      dimension: VD4
      title: "Deleted-module recall rides on an unenforced docstring convention; import-closure structurally excludes deletions"
      evidence: "affected_tests.py:53 (_ADDED_OR_MODIFIED excludes 'D') + :234-235; dependency_graph.build_graph drops edges to absent modules; traces: D src/schemas/annotations.py -> selected=1 via data_edge ONLY because tests/test_annotations.py's docstring literally contains 'src/schemas/annotations.py'; D scripts/dependency_graph.py -> selector itself crashes loudly (its own import chain)"
      evidence_kind: observed
      current_behavior: >-
        A deleted module's surviving importer tests are selected only by the data-edge channel,
        which needs the test's TEXT to mention the deleted path or quoted basename. The repo's
        'Tests for <path>' docstring convention makes this work often (241/363 test files
        contain some src/ or scripts/ path string - a loose upper bound), but nothing enforces
        the convention; a test importing a deleted module without a textual path mention is
        silently unselected and breaks at post-merge collection.
      ideal_behavior: >-
        Deletion blast radius derived structurally: compute the deleted file's reverse-deps
        against the PRE-deletion tree (e.g. build the graph including D-status paths via git
        show of the old blob, or index importers by dotted-module reference), not via textual
        mention.
      gap: "Recall for deletions is convention-dependent, and the convention is invisible to every gate - drift narrows recall silently."
      compensating_controls_considered: >-
        Incident-B's quoted-basename channel was BUILT for the meta-test shape and works;
        the docstring-mention effect is an unplanned bonus of the same substring match. A
        deleted module still imported by PRODUCTION code fails the importer's own selected
        tests if those changed; the uncovered case is deletion PRs that miss one test-side
        importer. Full tier catches at collection ~30 min later.
      change_type: rescope
      proposed_change: >-
        Admit D-status .py paths to the import-closure channel using the merge-base tree's
        import edges (git show <base>:<path> parsed once), or cheaper: treat a D .py path's
        dotted module name as a data-edge token so any test importing it matches structurally
        rather than textually.
      acceptance: "Trace: deleting a module imported by a path-mention-free test selects that test; existing Incident-B tests stay green."
      severity: medium
      severity_rationale: >-
        Real recall hole but doubly moderated: deletion PRs usually edit importers too (whose
        tests then select), and the docstring convention covers the common mirror-named case.
        Not high: no observed incident in the 20-rec ci_rca sample post-135.
      confidence: CONFIRMED
      roadmap_crossref: {classification: novel, item_ids: [],
        dedup_search_terms: ["deleted", "Incident B", "data_edge", "deletion", "affected-set"],
        dedup_hit_count: 0,
        note: "Decision 135 owns the deleted-BYTES (textual reference) shape explicitly; the import-based deletion shape is unowned."}
      effort: S
      depends_on: []
      sequencing: {safe_to_queue_now: true, blocked_behind: [], note: ""}

    - id: VTS-03
      surface: S4
      question: Q4
      dimension: VD4
      title: "Root-conftest changes keep 35/363 test modules and defer 328 - the one observed post-135 escape class"
      evidence: "trace: derive_affected_tests([('M','tests/conftest.py')]) -> selected=35, deferred=328 (loud); rec-2725 (Main Canary red: autouse fixture added in root conftest, victim modules alphabetically beyond the keep window); rec-2731 proposes forcing full-suite scope"
      evidence_kind: observed
      current_behavior: >-
        Channel 4 correctly identifies the whole tests/ tree as affected by a root-conftest
        change, but every hit is residue under CAP=35: the first 35 alphabetical modules run,
        328 defer loudly to post-merge. rec-2725 is the realized escape: a root-conftest
        hermeticity fixture broke tests/ops_data_portal/test_decisions.py (alphabetically past
        the window), red only on the canary.
      ideal_behavior: >-
        A root-conftest (or any autouse-fixture-bearing conftest) change forces full-suite
        --pre scope, or at minimum the conftest channel's hits get proportional protected
        budget rather than alphabetical truncation.
      gap: "The highest-blast-radius single-file change in the repo gets the weakest effective selection (9.6% of its true radius)."
      compensating_controls_considered: >-
        The deferral is LOUD (printed + manifest deferred[]) and the full tier covers it -
        this is the designed cap behavior, not silence; but rec-2725 shows the churn cost is
        real (canary red + critical rec + forward-fix cycle for a change --pre saw and skipped).
      change_type: retune_gate
      proposed_change: >-
        Implement rec-2731 with the verification it asked for (this trace): root tests/conftest.py
        in the diff -> pytest_diff runs tests/ (full suite, xdist) instead of a file list;
        sub-conftests keep the subtree channel.
      acceptance: "Trace: ('M','tests/conftest.py') yields full-suite scope (or equivalent); rec-2725 incident replay selects tests/ops_data_portal/test_decisions.py"
      severity: high
      severity_rationale: >-
        Materially reduces the guarantee for a recurring change class (hermeticity fixture
        waves are ongoing) and the compensating control (post-merge catch) demonstrably
        incurred the churn it exists to avoid (rec-2725). Not critical: the defer is loud and
        the class is now known.
      confidence: CONFIRMED
      roadmap_crossref: {classification: planned-unbuilt, item_ids: [rec-2731],
        dedup_search_terms: ["conftest", "autouse", "full-suite scope", "affected-set"],
        dedup_hit_count: 1,
        note: "rec-2731 names exactly this remedy and asked for verification whether channel 4 covers the root; this audit supplies it: covered but cap-truncated to 35/363."}
      effort: S
      depends_on: []
      sequencing: {safe_to_queue_now: true, blocked_behind: [], note: "Full-suite --pre on conftest PRs costs minutes (xdist) - acceptable for a rare, highest-radius class."}

    - id: VTS-04
      surface: S4
      question: Q4
      dimension: VD5
      title: "Cap residue kept/deferred by alphabetical sort, not channel priority - mirror-map and conftest hits are unprotected"
      evidence: "affected_tests.py:246-249 (residue_sorted = sorted(residue_pool); kept = [:budget_remaining]); rec-2737 M2 names the mirror-map instance"
      evidence_kind: static
      current_behavior: >-
        residue = (transitive | mirror_hits | conftest_hits) - protected is truncated purely
        alphabetically. A canonical mirror test for a changed source (when not also a static
        import predecessor - the subprocess-CLI test shape) can be deferred while
        alphabetically-early deep-transitive ancestors are kept.
      ideal_behavior: "Residue ordered by channel signal (mirror_map, conftest, then transitive by graph distance), alphabetical only as tiebreak."
      gap: "Relevance-blind truncation spends the cap budget on the weakest-signal channel first in adversarial orderings."
      compensating_controls_considered: "Deferral is loud + full tier covers; Decision 135's reversal condition (a) pre-names 'tighten the cap's channel-priority ordering' as the remedy."
      change_type: retune_gate
      proposed_change: "Order residue (mirror, conftest, transitive) before truncation, per rec-2737 M2; alphabetical within class."
      acceptance: "Unit test: under cap pressure a mirror-map hit survives while transitive residue defers; bin/venv-python -m pytest tests/checks/deps/test_affected_tests.py"
      severity: medium
      severity_rationale: "Precision-hardening with recall side-benefit; loud backstop exists; rec-2737 already frames it as non-blocking."
      confidence: CONFIRMED
      roadmap_crossref: {classification: planned-unbuilt, item_ids: [rec-2737],
        dedup_search_terms: ["mirror-map cap ordering", "residue", "affected_tests"],
        dedup_hit_count: 1,
        note: "rec-2737 M2 is this finding; M1 (batched-collect last-block attribution over-capture) is the same rec's other half - both unbuilt."}
      effort: XS
      depends_on: []
      sequencing: {safe_to_queue_now: true, blocked_behind: [], note: "Combine with VTS-03 in one selector-hardening PR."}

    - id: VTS-05
      surface: S4
      question: Q4
      dimension: VD4
      title: "Decision 135's reversal condition (a) - the defer/escape rate - is recorded per-run but measured by nothing, and its measurement machinery is deferred behind a trigger that presupposes the measurement"
      evidence: "Decision 135 (docs/DECISIONS.md:713-720) reversal conditions; manifest deferred[]/capped fields (affected_tests.py:277-287); T2.36 deferral 'triggered by first written cross-run query' (DECISIONS.md:673-675); no aggregation code exists (grepped consumers: none)"
      evidence_kind: static
      current_behavior: >-
        Every run records deferred counts (stdout, local JSON, S3 best-effort, PR artifact),
        but no query, no telemetry, no scheduled job aggregates defer rates or attributes
        post-merge failures to deferrals. The condition that would trigger re-design ("defer
        rate proves high enough that the full tier routinely catches what should have been
        fast-tier-caught") is unobservable as instrumented; the DuckLake registration that
        would make it queryable is T2.36-deferred, triggered by "first written cross-run
        query" - which is exactly the query the reversal condition needs. Circular.
      ideal_behavior: >-
        A cheap standing signal: ci-rca (its taxonomy already exists) tags each post-merge
        pytest failure with whether the failing module appears in the triggering merge's
        selection-manifest deferred[]; a counter in the rec context makes the reversal
        condition evaluable from the recs cache alone - no warehouse work needed.
      gap: "A ratified reversal condition nobody can evaluate is a Decision-40-class recorded-then-forgotten trigger."
      compensating_controls_considered: >-
        The 23 budget_breach recs measure the BUDGET arm of the reversal conditions (b) - that
        arm IS observable. This audit's manual classification (1 escape / 20 recs) is a
        point-in-time substitute, not a standing control.
      change_type: persist
