# Audit: validate.py, check corpus, test suite, fast-tier selection, dependency declarations (S1-S6)
# Produced by AUDIT-validate-test-suite.md executed at origin/main 4df4d48 (2026-07-23).
# System of record; companion prose: audits/validate-test-suite-4df4d48.md

audit:
  meta:
    audited_commit: 4df4d48
    base_branch: main
    model: claude-fable-5
    methodology_version: 1
    scope_surfaces: [S1, S2, S3, S4, S5, S6]
    degraded_dedup: false
    contract_notes: >-
      Preflight succeeded (recs cache refreshed, 804 open recs) so dedup ran non-degraded.
      Empirical timings: per-check and per-trace timings were measured in the CC-web session
      container, which ran ~3x slower than GitHub-hosted runners while the full suite executed
      concurrently with audit work; container numbers are used for RANKING and relative cost
      only, and GitHub Actions observed numbers (sampled runs) are authoritative for CI
      wall-clock. validate.py --pre does not print per-phase timings (phase_times is captured
      but only the dominant phase is printed, and only on breach), so per-check cost was
      measured by invoking each registered check function directly, once, in-process;
      validate_requirements and validate_verification_harness were timed/skipped separately
      (network / live-AWS). The optional Q4 selection replay over 15 merged PRs was skipped:
      the recall question resolved via the 20-rec ci_rca classification, five derive-level
      traces, two deletion traces, and two sampled production selection manifests.
      Full suite timed once per the caps: 6885 passed / 2 skipped / 17 deselected in 35:14
      (serial, contended container - CI's whole validate step is 25.7-27.7 min, so treat the
      container wall as ranking evidence only); validate --pre timed once on a near-empty
      diff (31.0s floor). The unrelated-failure clause was not needed: both runs were green.
    stale_anchors: []

  question_answers:
    - q: Q1
      verdict: partial
      basis: [VTS-08, VTS-23, VTS-16, VTS-17]
      prose: >-
        The corpus (83 registered checks) is genuinely curated by structure: growth-safe
        membership floors and facade-completeness tests hold registration coherent, and the
        graduation registry (Decision 132/CD.29) gives new checks a provenance discipline.
        Against CD.29's bar the failures are specific, not systemic: two prompt checks are
        permanent no-ops globbing paths T-1.13 deleted while the five live prompts in
        .github/prompts/scheduled/ go unvalidated (VTS-08, owned by rec-2396 - one of them
        dispatched twice in the full tier with a test pinning the duplication);
        validate_imports re-imports two hardcoded modules for 16s per full run to assert a
        property the same tier's full pytest collection already asserts (VTS-23); pytest-picked
        survives in both requirements files with three stale comments referencing the retired
        selection mechanism (VTS-16); and the registry's owner/product_coupled metadata has no
        consumer outside its own conformance tests (VTS-17). Test-suite redundancy: no
        tautological or dead tests surfaced in sampling; the count-coupling and
        no-cross-test-import guards block the known tautology classes, and systematic
        dead/redundant-test detection is T3.7 (deferred_post_mvp), correctly classified
        planned-unbuilt rather than re-filed here.
    - q: Q2
      verdict: partial
      basis: [VTS-07, VTS-14, VTS-18, VTS-19, VTS-08]
      prose: >-
        The 39 checks running in BOTH tiers are justified as a pattern: the pre run is the
        author's pre-merge gate and the full run is the merge-race/whole-tree re-assertion -
        rec-2749/rec-2762 (validate_platform_roadmap failing post-merge despite both-tier
        registration) are live proof that whole-tree checks catch unions of individually-green
        PRs, so double execution is defensible; its COST is a Q3 matter (VTS-09). The real
        placement defects: validate_test_coverage is registered only in the full tier where its
        merge-base diff is empty on every CI invocation - structurally inert exactly where it
        runs, absent where its diff exists (VTS-07); validate_requirements does ~32 serial PyPI
        network calls in the blocking post-merge gate, a wedging class with near-zero
        post-merge value since requirements changes are gated pre-merge (VTS-14); the full-tier
        lint sweep targets src/+tests/ only, leaving scripts/ ruff-covered solely by the
        diff-aware fast tier (VTS-18, owned by rec-2342); two whole-tree checks (validate_cc_limits,
        validate_deploy_channel_conformance) are pre-only, so the post-merge tier never
        re-asserts them against merge unions (VTS-19); and validate_cli_tools_in_prompts is
        dispatched twice in full_sequence (VTS-08). The five pre-only placements split cleanly:
        budget-raise guards and vp_replay are diff-semantic (correct pre-only); the two
        whole-tree ones are the asymmetry.
    - q: Q3
      verdict: partial
      basis: [VTS-10, VTS-09, VTS-20, VTS-11, VTS-12, VTS-14]
      prose: >-
        Observed CI: pr-validate wall-clock median 1.8 min (n=15 sampled runs, range 1.5-2.6),
        comfortably inside the 300s budget - Decision 135's p90 2-2.5 min target is met in CI.
        The full tier costs 28-33 min per run (validate step alone 27.7 min observed), running
        ~10-12x/day on pushes plus 8x/day on the canary: roughly 8-10 hours of full-tier
        compute daily, free on a public repo but a ~30-min post-merge signal latency. The
        dominant reducible cost is the serial full-suite pytest invocation (no -n auto, unlike
        the fast tier; VTS-10). Second-order: ~28s of every --pre is whole-tree checks that
        ignore the diff (roadmap trio 16.7s + count-coupling 3.2s + cc_limits 2.9s +
        cross-test-imports 1.3s; VTS-09); the budget-breach governance loop has 23 open
        budget_breach recs (5.2-5.5 min, dominant phase pytest_diff, all local sessions) that
        nothing consumes (VTS-20); no workflow declares concurrency/cancel-in-progress so
        superseded pr-validate runs complete after force-pushes (VTS-11); the pip cache keys
        hash requirements.txt while jobs install fast/dev sets (VTS-12, extending rec-2304) -
        though the cache works in practice (observed main-validate: 35s restore + 89s install).
        Network in checks: validate_requirements 35.4s measured (VTS-14); pip-audit/pip-outdated
        are informational-only by design.
    - q: Q4
      verdict: partial
      basis: [VTS-01, VTS-02, VTS-03, VTS-04, VTS-05, VTS-06]
      prose: >-
        RECALL: the four-channel design is sound where it looks - strictly-additive union,
        protected classes never capped, loud fallback-to-edited-set on exception, and the
        soundness patches (package __init__ nodes, patch-string edges) close real static-analysis
        gaps. Empirically, of 20 recent ci_rca recs, exactly ONE is a post-Decision-135
        selection escape (rec-2725: a root-conftest autouse fixture change whose victim modules
        sat beyond the cap's alphabetical keep window - the channel SAW them and deferred
        loudly; VTS-03/VTS-04, owned by rec-2731/rec-2737). The pre-135 escapes in the sample
        (rec-2716, rec-2710/2707, rec-2673/74/75) would all be selected by the current
        derivation (data-edge deleted-bytes; import-closure direct) - the upgrade demonstrably
        closed the incident classes that motivated it. Two SILENT residual classes survive:
        (1) tests-tree helper modules - tests/fixtures/**, the repo's sanctioned shared-helper
        home - are structurally outside _is_changed_source_py's candidate set, so a
        fixtures-only edit selects ZERO tests (traced; VTS-01, critical); (2) deleted-module
        recall rides on an unenforced docstring convention - importers of a deleted module are
        selected only if their text mentions the path/basename (traced both ways; VTS-02).
        The defer/escape rate Decision 135's reversal condition (a) names is RECORDED
        per-run (manifest deferred[] + loud prints) but MEASURED nowhere - no aggregation
        exists, its T2.36 consumer is deferred behind a trigger ("first written cross-run
        query") that itself presupposes the measurement, and the manifest artifact is
        clobbered by orchestrator tests on exactly the PRs that touch the selector (VTS-05,
        VTS-06). PRECISION: bounded and acceptable - the cap holds the residue at 35, the
        protected set is uncapped by design (hub-module trace selected 63 direct importers),
        and production manifests show mixed-channel selections of ~31 modules deriving in
        4.5s; CI wall-clock (median 1.8 min) confirms over-selection is not currently a budget
        problem in CI; the 23 local budget breaches are dominated by pytest_diff runtime, i.e.
        precision cost lands on local sessions, not the CI gate.
    - q: Q5
      verdict: partial
      basis: [VTS-07, VTS-13, VTS-15, VTS-22, VTS-01]
      prose: >-
        Where can a defect merge undetected? (1) Anything only an unselected test would catch
        (the Q4 recall classes) - by design it merges and reddens post-merge, and the two
        silent classes (VTS-01/02) merge without even the loud-defer trace. (2) Anything only
        types would catch: mypy is informational in both tiers with 143 standing errors in 59
        src files, and no decision owns that advisory status (VTS-15). (3) Anything only
        coverage would catch: no PR-time coverage gate exists; the full tier's per-changed-file
        100% floor is structurally inert in CI (VTS-07) and the global fail_under=37 floor
        measures src/ only - scripts/, the platform machinery, has no coverage measurement at
        all. (4) Integration-marked tests run in no automated tier; the compensating control is
        real but partial: main-validate's DQ runner + verifier harness exercise the live
        warehouse read path with OIDC credentials post-merge. The strong properties: hermeticity
        is enforced in config (addopts --disable-socket/--allow-hosts) plus three autouse
        guard layers, meta-guarded by validate_hermeticity_flags; and the presubmit/postsubmit
        split itself is deliberate, owned, and empirically fast.
      external_checklist:
        - {property: a, rating: missed, evidence: "No coverage gate on PRs (fast tier runs pytest without --cov); full tier fail_under=37 over src/ only (pyproject.toml:31-36) - scripts/ entirely unmeasured; per-changed-file floor inert in CI (VTS-07); diff-ratchet is CD.30/T3.7, pending. Observed: fail_under DOES enforce ('Required test coverage of 37.0% reached. Total coverage: 74.59%') but sits 37.6 points below actual - a backstop that never binds, not a ratchet"}
        - {property: b, rating: missed, evidence: "mypy informational in both tiers (validate.py:270-274, 439-446); 143 errors / 59 files measured; advisory status owned by no decision (VTS-15)"}
        - {property: c, rating: partial, evidence: "-m 'not integration' in both tiers; no workflow runs the marker (observed: 17 integration tests deselected in the timed full-suite run). Compensating control, property-matched: main-validate/canary run ensure_fresh_dq (data_quality_runner) + validate_verification_harness against the LIVE warehouse with OIDC creds 18-20x/day - real integration exercise of the data plane; it would fail on a broken reader boundary, but does not exercise broker/ingestion integrations (those tests run only manually)"}
        - {property: d, rating: met, evidence: "Decision 60/73 two-tier split, ratified with enforcement (budget assertion, forward-fix, canary); Decision 135 upgraded PR-gate selection; observed: 1 selection escape in 20 recent ci_rca recs"}
        - {property: e, rating: met, evidence: "pyproject addopts --disable-socket + --allow-hosts=127.0.0.1,::1 apply to every invocation; L1/L2 AWS fixtures + LLM-CLI guard in tests/conftest.py; validate_hermeticity_flags meta-check; T3.6 hermeticity audit complete. Residuals: rec-2687 (one flaky non-hermetic test) and rec-575/VTS-22 (own_markers gap in 2 of 4 guard fixtures) are open"}
        - {property: f, rating: partial, evidence: "Fast tier: fixed seed 20260710 (rec-2653) + --timeout 60 + xdist. Full tier: --randomly-seed=last resolves to a NEW random seed per CI run (no .pytest_cache persists), no per-test timeout, serial (VTS-13); junit uploaded for RCA fingerprinting is the compensating observability; no rerun/quarantine/flake-rate machinery"}
        - {property: g, rating: missed, evidence: "Nothing operating detects dead checks or dead tests today - rec-2396's no-op checks sat undetected until humans filed them; T3.7's assertion-free lint / orphan detection / coverage-uniqueness are deferred_post_mvp (planned-unbuilt)"}
        - {property: h, rating: partial, evidence: "Compensating control, property-matched: the differential admission gate (fail-on-revert at graduation, validate_differential_gate_baseline self-test in full tier) is an operating adequacy signal for GRADUATED checks - a check that cannot fail on revert is not admitted; VF-11 records its structural-only residue. Mutation testing over the corpus is T3.7, deferred"}
    - q: Q6
      verdict: partial
      basis: [VTS-21]
      prose: >-
        Enumerated coverage-named surfaces: (1) pytest-cov CODE coverage (pyproject
        [tool.coverage.*], --cov=src, fail_under=37); (2) VERIFIER coverage (--coverage flag,
        run_coverage_check, the coverage_report scaffold step, scripts/verifiers/check_coverage);
        (3) per-changed-file TEST coverage (validate_test_coverage + test_coverage_checker.py's
        check_per_file_coverage) - a third distinct semantics; (4) test_coverage_checker.py
        ALSO hosts map_source_to_test, the selection mirror-map (not coverage at all) that
        Decision 135 channel 3 depends on; (5) validate_ci_refresh_read_coverage and (6)
        validate_lambda_manifest_coverage - benign domain qualifiers (IAM-grant and manifest
        completeness), not confusable in context. Verdict: (1)/(2)/(3) genuinely collide -
        three semantics behind one word on the same CLI surface - and (4) is the sharpest
        hazard (the selector's channel 3 lives in a module named for a different subsystem).
        No decision governs any of this; it accreted. Recommendation: disambiguate-in-place
        (VTS-21) - rename the verifier-coverage CLI surfaces and relocate/rename the mirror
        map - not a wholesale reconcile. The "validate" overload is mostly the check-naming
        convention itself (validate.py + validate_* checks are ONE subsystem by design);
        the genuine stray is scripts/validate_telemetry.py: a standalone Athena-schema CLI
        with zero importers beyond its own test, whose subject (telemetry tables) is dead
        pending T2.36 - disposition belongs to the T2.36 rebuild, not a rename now.
    - q: Q7
      verdict: partial
      basis: [VTS-16, VTS-12]
      prose: >-
        Current coherence: better than it looks from the root. Roles are documented in-file,
        requirements-fast.txt states its sync discipline, Dependabot grouped updates hold the
        two .txt files in lockstep, validate_lockfile_sync gates requirements.txt-to-lock
        membership, and the fast-tier heavy-set is DERIVED at runtime from (full - fast) so
        membership drift self-corrects loudly (a missing fast dep reds --pre; a new heavy dep
        auto-defers). The warts: requirements.txt mixes runtime and dev/test tools under a
        comment header, requirements-dev.txt is really "CI extras" (pre-commit, litellm,
        pip-tools) while the actual dev tools live in requirements.txt, requirements.lock is
        sync-checked but never installed by any CI job (a lock nobody installs pins nothing -
        its only live role is documentation of the resolved closure), pyproject.toml has no
        [project]/[build-system] table (coherent only because setup.py is an env bootstrap,
        Decision 27, not packaging), and pytest-picked is a dead declaration in both files
        (VTS-16). Constraint-level drift between fast and full (same name, different pin)
        is guarded only by the Dependabot-grouping convention - no check compares constraints.
        Root PLACEMENT was assessed and dismissed by audits/repository-structure-cb02572.yaml;
        not re-litigated here. Options with deferral/cache coupling: see requirements_options.
    - q: Q8
      answers:
        - question: "(1) Full-tier pytest parallelism vs fast tier"
          answer: >-
            Fast tier: -n auto + --timeout 60 + fixed seed (_PYTEST_FLAGS). Full tier: serial,
            no timeout, random-per-run order. The asymmetry is the largest reducible cost in
            the 27.7-min full validate step; xdist is already a dependency and junit/cov are
            xdist-compatible; adopting the fast tier's fixed-seed pattern (rec-2653) makes it
            safe. See VTS-10, VTS-13.
          basis: [VTS-10, VTS-13]
        - question: "(2) Risk profile of gating PRs on the fast tier alone"
          answer: >-
            Deliberate (Decision 60/73) and empirically healthy: 1 selection escape in 20
            recent ci_rca recs post-135; escapes become priority=critical forward-fix recs with
            ~30-min detection latency. The residual risk concentrates in the silent recall
            classes (VTS-01/02) and in whole-tree merge races, which the both-tier checks and
            full pytest catch post-merge as designed. Not a defect; the recall holes are.
          basis: [VTS-01, VTS-02, VTS-03]
        - question: "(3) registry owner/product_coupled metadata consumers"
          answer: >-
            No runtime path consumes either field - dispatch, tier sequencing, and reporting
            ignore them; the sole consumers are tests/test_checks_registry.py conformance
            assertions pinning 3 non-default rows. Write-only metadata with test-enforced
            conformance: either wire the intended consumer (product/platform split reporting)
            or record the intent. VTS-17.
          basis: [VTS-17]
        - question: "(4) Facade re-export maintenance surface"
          answer: >-
            Guarded, at real but accepted cost: a check added without its re-export line
            KeyErrors --pre and fails TestFacadeCompleteness, and the affected-set selects
            test_checks_registry.py on any registry.py edit (direct import edge), so the
            failure is pre-merge. History: the FROZEN-baseline variant of this guard caused
            three consecutive post-merge reds (rec-2673/74/75) and was superseded by
            growth-safe membership floors + scaffold-only frozen tuples - already landed.
            No action beyond the Decision-104 pattern's accepted cost.
          basis: []
        - question: "(5) scripts/validate_telemetry.py vs the presubmit gate"
          answer: >-
            No relationship: zero importers outside its own test, not registered, not
            dispatched, not named by any workflow. It is a dormant standalone CLI for the
            dead Athena telemetry path; its subject rebuilds on DuckLake at T2.36. Disposition
            (rename/retire/rebuild) belongs to T2.36; flagged under Q6 vocabulary only.
          basis: [VTS-21]
        - question: "(6) Checks in the fast tier but not the post-merge tier"
          answer: >-
            Five: validate_sloc_budget_raises, validate_prose_budget_raises, validate_vp_replay
            (all diff-semantic - vs-origin/main comparisons that are empty on main - correct
            pre-only), and validate_cc_limits + validate_deploy_channel_conformance (whole-tree
            scans whose absence from full means no merge-race/bypass re-assertion; VTS-19,
            add-to-full).
          basis: [VTS-19]
        - question: "(7) pip cache key vs the fast job's installed set"
          answer: >-
            All three workflows key the pip cache on hashFiles('requirements.txt') alone;
            pr-validate installs requirements-fast.txt + requirements-dev.txt (neither hashed),
            so a fast/dev-only change reuses a stale cache silently (rec-2304 names the dev
            half for canary/main). Observed impact is low (cache restore 35s + install 89s on
            main-validate; pr-validate installs in well under its 1.8-min median) - correctness
            of installs is unaffected (pip cache stores downloads, not resolutions). VTS-12.
          basis: [VTS-12]
        - question: "(8) Can the budget assertion prevent a slow run?"
          answer: >-
            No - it is the LAST pre_sequence step, computing elapsed after the work is done;
            it converts a breach into a red exit + a filed rec (local) or a stderr/step-summary
            warning (CI). Prevention lives only in the job-level timeout-minutes: 30. The 23
            open local breach recs (dominant phase pytest_diff) show it reporting, not
            preventing, and nothing consumes those recs (VTS-20).
          basis: [VTS-20]
        - question: "(9) Do validation workflows cancel superseded runs?"
          answer: >-
            No workflow declares a concurrency group; the only concurrency governance is
            _check_concurrency asserting the RETIRED ci-runner group stays absent. Superseded
            pr-validate runs complete after force-pushes (pure waste, ~2 min each);
            main-validate/canary should NOT be cancelled (per-commit RCA attribution and
            drift-canary roles). Scope a per-PR concurrency group to pr-validate only. VTS-11.
          basis: [VTS-11]
        - question: "(10) pr-validate trust posture over untrusted PR diffs"
          answer: >-
            Acceptable. pull_request-event token is contents:read only, no secrets, no OIDC
            step in pr-validate; fork PRs get a read-only token; signal-green's
            pull-requests:write fires only for same-repo claude/* head refs. Arbitrary-code
            execution (pytest over the diff) is contained to the runner. Cache poisoning is
            bounded by GitHub's branch-scope cache isolation (PR-saved caches are not
            restorable by main); the hashFiles('requirements.txt') key mismatch is a cost
            issue (VTS-12), not a security one. Residual accepted risk: a malicious PR can
            burn runner minutes and write its own selection-manifest artifact - neither
            crosses a trust boundary.
          basis: [VTS-12]
        - question: "(extension) Is the selection-manifest observability trustworthy?"
          answer: >-
            Not currently on the PRs where it matters most: orchestrator tests that drive
            validate.main() in --pre mode write a fixture manifest to the REAL
            logs/debug/selection-manifest.json (observed artifact: sha 'agent/test-branch',
            empty diff, on a feat PR run), clobbering the run's own record whenever the
            selection includes tests/validate/** - i.e. exactly on selector/orchestrator
            changes. VTS-06.
          basis: [VTS-06]
        - question: "(extension) Are any registered checks dispatched outside the sequences?"
          answer: >-
            One: validate_terraform_try is registered but appears in neither sequence - it is
            dispatched inside the terraform_checks scaffold (scripts/checks/_terraform.py:147),
            documented in registry.py and tested as one unit. Coherent, but the registry's own
            accounting cannot see it; any future sequence-vs-registry reconciliation tooling
            must special-case it. No action filed.
          basis: []

  per_surface_assessment:
    - surface: S1
      maturity: strong
      strengths: >-
        Thin-CLI discipline held (Decision 104): registry is the sole tier-order source, both
        tiers dispatch through one path, recursion/branch/CI guards are layered, and the facade
        is machine-guarded (growth-safe floors + facade-completeness + mock-interception
        tests). Budget assertion is enforced, bypass is CI-forbidden and audited.
      top_gaps: [VTS-09, VTS-20, VTS-15, VTS-18]
    - surface: S2
      maturity: strong
      strengths: >-
        83 checks with registration coherence machine-verified; graduation discipline (Decision
        132) gives additions provenance; whole-tree checks double as merge-race defense;
        meta-guards (hermeticity flags, workflow guards, budget-raise ratchets) protect the
        gate itself.
      top_gaps: [VTS-07, VTS-08, VTS-14, VTS-19]
    - surface: S3
      maturity: strong
      strengths: >-
        363-file mirror-convention tree with machine-enforced placement, cross-import and
        count-coupling bans; three-layer AWS/network/CLI hermeticity with meta-checks; junit
        substrate for post-merge RCA fingerprinting.
      top_gaps: [VTS-06, VTS-13, VTS-22]
    - surface: S4
      maturity: solid
      strengths: >-
        Design-sound four-channel additive selection with protected classes, loud cap deferral,
        loud exception fallback, soundness patches for package facades and patch-string edges;
        production manifests show mixed-channel selections deriving in ~4.5s; the upgrade
        demonstrably closed the pre-135 escape classes in the ci_rca sample.
      top_gaps: [VTS-01, VTS-03, VTS-02, VTS-05]
    - surface: S5
      maturity: strong
      strengths: >-
        Single-source-of-truth invariant real in both directions (workflows call validate.py;
        validate.py checks guard the workflows' load-bearing shape, plus tests/verify_ci_workflow);
        fast PR gate (median 1.8 min observed); creds-free terraform gate; artifact substrates
        (junit, selection-manifest) wired for RCA.
      top_gaps: [VTS-10, VTS-11, VTS-12]
    - surface: S6
      maturity: strong
      strengths: >-
        Documented per-file roles with mechanical sync (Dependabot grouping + lockfile-sync
        gate); the fast-tier exclusion set is DERIVED from the files at runtime, so membership
        drift self-corrects loudly rather than silently.
      top_gaps: [VTS-16]

