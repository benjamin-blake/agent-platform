# AUDIT: terraform deployment + IAM + CI strategy (redesign-grade design review)
# Deliverable 1 of 2 (structured audit). Companion prose: terraform-deploy-redesign-b67955b.md
# Audited tree: origin/main @ b67955b (derived once at SETUP; origin/main advanced to f79d6b5
# mid-audit and the base was deliberately NOT re-derived). Public-repo boundary (Decision 101):
# no account ids, ARNs, or ExternalId values appear anywhere in this file.

audit:
  meta:
    audited_commit: b67955b
    base_branch: main
    model: "Claude (Anthropic, frontier tier; exact model id withheld from committed artifacts per harness policy)"
    methodology_version: 1
    scope_surfaces: [guard, apply-pipeline, iam-identities, apply-model, workflow-fleet]
    degraded_dedup: false
    contract_notes: >-
      (1) origin/main advanced b67955b -> f79d6b5 during the audit (a fetch for history
      deepening); per SETUP step 1 the base was derived once and kept at b67955b; the audit
      branch is based on b67955b so the PR diff is exactly the two deliverables.
      (2) The session clone was shallow (50 commits); it was deepened to 2026-06-14 (~500
      commits) for the empirical pass. Commits older than that were not sampled; the sampling
      caps of section 11 were respected and no full-history sweep is claimed.
      (3) The gitignored dedup caches regenerated cleanly (787 open recs); degraded_dedup=false.
      (4) GitHub API/Actions run logs were NOT queried (static + repo-history audit); run-level
      claims (e.g. the T2.24 gated-apply failure) rest on roadmap progress notes, Decision texts,
      and commit bodies, which are consistent with each other.
    stale_anchors: []

  # =========================================================================
  # QUESTION ANSWERS
  # =========================================================================
  question_answers:
    - q: Q1
      verdict: multiple-compounding
      basis: [DEP-01, DEP-02, DEP-03, DEP-10]
      prose: >-
        Routine deploys stall because THREE nested allow-lists must all admit a change, and only
        the first is visible at plan time. Ranked contributors: (1) PRIMARY - the deployer
        identity's (github_ci_apply) enumerated per-resource WRITE surface (DEP-01). The
        bootstrap-tier inline policy grants writes per service per ARN (3 alarm ARNs, 5
        EventBridge rules, zero logs:Create*, zero lambda:CreateFunction/UpdateFunctionConfiguration,
        zero lambda:TagResource), so any change introducing a new resource class -- or even a tag
        or env-var on an existing Lambda -- passes the guard (non-IAM) and then dies AccessDenied
        at apply, latching the record red. Observed: rec-2754 (6 AccessDenieds on the single #644
        gated apply), rec-2757 (4 of 6 STILL missing at audit time), rec-2703 (a config-only PR on
        the T2.43 resources would fail auto-apply), commit #646's body ("github_ci_apply lacked
        the permission to execute it even when approved"). Decision 129 fixed exactly this class
        for the READ axis (15+ recurrences in ~6 weeks, rec-1985..rec-2702) and deliberately left
        the write axis enumerated. (2) The IAM-write budget is confined to branch/pr with
        admin-create for every new role (DEP-02 / Decision 98), so the gated-apply path is
        STRUCTURALLY unable to execute most of the changes routed to it even after human approval
        -- the human clicks approve, the apply fails, and the work falls to the break-glass admin
        tier anyway. (3) Spurious layer-replace diffs ("delete" classification from
        non-content-addressed rebuilt zips) route to gated-apply "on every recurrence" (#646;
        DEP-03; owned by T2.42, unbuilt). (4) The recovery chain after an admin fix is
        multi-step (admin apply -> saved plan now stale -> dispatch-ack fresh re-plan -> unlatch),
        DEP-10. FRACTION (section 11 sample, 12 commits, hard cap): 10 carried infra diffs; 3
        completed autonomously (all trivial: comment-only, lifecycle-only, tag-value follow-up);
        7 required human action beyond the merge -- Environment approvals that then failed,
        admin -target applies, an out-of-band `aws iam put-role-policy` later codified (474566b),
        and a bootstrap-root grant (#646). Roughly 70% of recent terraform/personal changes could
        not complete through the autonomous path, and over half of the sampled changes were
        themselves IAM-grant repairs generated by the enumerated model -- the treadmill feeds its
        own change stream. ZERO sampled plans used the T2.25 in-budget lane: shared policy
        fragments (T2.34) couple branch/pr (in-budget) to plan/drift (out-of-budget), so any
        refresh-read change routes the whole plan. Lambda CODE deploys are a separate,
        now-governed channel (T2.38/T2.43, Decision 125/126) and contribute little to the current
        "needs admin" experience beyond the bootstrap-window role-creation cost (out of deep
        scope). Verdict: multiple-compounding, with allow-list-iam-model as the dominant family
        -- but note the binding allow-list is the AWS-side identity policy, NOT the guard budget:
        widening authority_budget.json without widening IAMRoleWriteBounded would change nothing,
        because the two are deliberately mirrored and the AWS side is the wall.
    - q: Q2
      verdict: confirmed
      basis: [DEP-01, DEP-02]
      prose: >-
        The requester's diagnosis is correct, with one important refinement: the deny-list
        substrate is ALREADY HALF-BUILT and pointing the right way -- it is the allow-lists
        stacked inside it that generate the treadmill. The treadmill manifests concretely in:
        (a) the apply role's per-service, per-ARN write enumerations (rec-2754/2757/2703; the
        iterative-discovery anti-pattern terraform/CLAUDE.md itself names); (b) IAMRoleWriteBounded's
        two-role resource list; (c) the guard's in-budget table (2 roles x 2 types x update-only),
        the mirror of (b); (d) until Decision 129, the refresh-read enumerations -- the one axis
        already converted to a prefix model, which measurably ended that recurrence class.
        Meanwhile the boundary policy (agent-platform-github-ci-apply-boundary) is a genuine
        deny-list artifact: broad DataPlaneAllow service wildcards PLUS DenyIAMEscalation
        (boundary-propagation condition), DenyBoundaryRemoval, DenyBoundaryPolicyModification --
        precisely spec 6.1's SCP-substitute, built and verified (T2.23 c4 simulate-principal-policy).
        A deny-list model is FEASIBLE single-account without Organizations: the SCP substitute is
        exactly this boundary + propagation-condition pattern (already proven here), plus explicit
        Deny statements and the bootstrap privilege tier for the fixed point. It is BENEFICIAL:
        Decision 129's read-axis prefix broadening is the in-repo natural experiment -- one
        decision ended a 15-recurrence class. The redesign (Q7) is therefore an INVERSION of the
        existing material (broad-but-bounded identity policy under the existing boundary; guard
        narrows to genuinely dangerous classes), not a greenfield build. Verdict: confirmed.
    - q: Q3
      verdict: proportionate
      basis: [DEP-12]
      prose: >-
        17 live roles: 7 CI/deploy (apply, branch, pr, plan, drift, ducklake-deploy, prod-deploy),
        2 platform (PlatformDev, PlatformAdmin), 8 Lambda execution roles. Classification:
        ESSENTIAL - apply (deployer), branch (CI write), pr (fork-safe read), PlatformDev
        (runtime), PlatformAdmin (control identity), and per-function execution roles (AWS-native
        least-privilege; consolidating them would trade real isolation for cosmetic count).
        CONSOLIDATABLE - plan + drift (both read-only planners; a single planner role trusting
        both the pull_request and refs/heads/main subs, with drift's .tflock/convergence additions,
        loses little -- the marginal widening is convergence-write reachable from PR context,
        controllable with a condition or accepted); ducklake-deploy + prod-deploy (identical
        UpdateFunctionCode-only shape; one code-deploy role scoped to function:agent-platform-*
        is strictly simpler and no weaker). REMOVABLE - none live (legacy-root roles are
        retained-not-applied artifacts, correctly excluded from grading). The count is a SYMPTOM,
        not a cause: the pain per role is the admin-create ritual plus the three-policy read-grant
        sync (IAMCIRolesRead, IAMPlatformRolesRead, bootstrap IAMRolesRead) -- a cost Decision
        129's coverage verifier now bounds. Minimal set preserving current properties: 5 CI/deploy
        + 2 platform + 8 exec (~15). Verdict: proportionate -- consolidation is worthwhile hygiene
        (DEP-12, low), but role count is not what forces admin escalation.
    - q: Q4
      verdict: excessive
      basis: [DEP-08, DEP-09, DEP-03]
      prose: >-
        20 workflows, 4,419 lines total; the apply pipeline alone is 5 files / 2,324 lines
        (terraform-apply-sandbox 1,158; reconcile 704; terraform-drift 305; convergence-health
        107; tf-gated-apply-prototype 50). ESSENTIAL: terraform-apply-sandbox, terraform-drift,
        convergence-health, ci, ci-rca, the two governed deploy channels, codeql/ghas-probe/
        pr-conflict-signal. CONSOLIDATABLE: reconcile.yml re-implements the guard->review->apply->
        record-write chain (rec-2663, open); the record-write block exists 4x, the DuckLake
        zip build+byte-assert block 4x, the init-retry block 5x -- a reusable workflow or
        composite actions would collapse the apply pipeline to ~2 files and roughly half the
        line count while preserving every guarantee (same guard, same Environment, same record
        semantics). REMOVABLE: deploy.yml -- a stale, credential-less legacy workflow whose
        dispatch path would run `terraform apply -auto-approve` on the RETIRED root with no
        guard (DEP-09); tf-gated-apply-prototype is retained deliberately as a re-runnable gate
        proof (defensible, cheap at 50 lines). The complexity has already produced an incident:
        the event-keyed concurrency fix in #566 responded to a real collision (a gated approval
        pending on one PR cancelling another PR's saved plan). The largest file (1,158 lines) is
        past the point where a solo operator can hold it in the head; that is a VD6 finding in
        itself. Verdict: excessive -- in duplication and per-file size, not in the NUMBER of
        distinct concerns, each of which is legitimate.
    - q: Q5
      verdict: works-in-boundary-only
      basis: [DEP-02, DEP-01, DEP-03]
      prose: >-
        Belief-neutral trace of ALL evidence. The mechanism is real and sound: guard exit 2 ->
        routed=true -> gated-apply job -> tf-gated-apply Environment approval -> same saved
        plan.bin applied verbatim -> record write. PROVEN WORKING end-to-end: T2.22's VP re-run
        (PRs #223/#225) recorded two successful gated applies (apply + revert) after the
        Decision 94 dual-sub trust fix; layer-replace destroys are executable post-#646. PROVEN
        NOT WORKING for the dominant routed classes: the T2.24 gated apply failed iam:CreateRole
        (boundary-less role in the plan -> DenyIAMEscalation) and iam:PutRolePolicy on
        github_ci_plan (outside IAMRoleWriteBounded's branch/pr list) -- ratified as the
        DESIGNED outcome by Decision 98 (new roles are admin-created; the grant "does NOT widen
        the IAM-WRITE budget"); #644's gated apply accumulated 6 AccessDenieds (rec-2754), 4
        still open (rec-2757). So the answer by class of change: WORKS for destroys/updates of
        resources already inside the apply role's enumerated write surface, for in-budget-type
        creates on branch/pr, and for trust/tag changes on branch/pr. FAILS-AFTER-APPROVAL for
        role creates (all new roles are declared boundary-less), policy writes on any role
        except branch/pr, and any resource class missing from the enumerated write grants (new
        log groups, new alarms, Lambda config). Also: the gated-apply job is push-only, so a
        dispatch-routed plan needs reconcile.yml's twin job (landed, T2.37). The requester's
        "never worked" is refuted; the roadmap's "complete" is accurate only for the mechanism,
        not for the population of changes routed to it. Verdict: works-in-boundary-only, where
        "boundary" = the apply role's identity-policy + budget scope.
    - q: Q6
      verdict: partial
      basis: [DEP-01, DEP-02, DEP-03]
      prose: >-
        T2.41 (escape-hatch quarantine) is documentation topology -- worthwhile, already
        effectively done (criteria met, status flip pending operator confirmation), and touches
        the pain not at all. T2.42 is MORE than hygiene: its c1 (layer replace policy / fold
        layer publishing into the deploy verb) removes the single most frequent gated-apply
        generator (DEP-03), and c2/c3 (committed lockfile, content-addressed zips) close real
        supply-chain gaps -- executing it would visibly reduce gated volume. But NEITHER item
        touches the core cause: no tier_item or candidate_decision widens the deployer's write
        surface, extends boundary attachment beyond 3 of 17 roles, or schedules the Decision 92
        point-9 ratchet ("widen per change-class on measured track record") -- the ratchet
        exists as ratified governance with no engineering item, no measurement, and no widening
        ever performed. Decision 129 proved the pattern works for reads and stopped short of
        writes. T5.2 (old-account teardown) is unrelated cost hygiene. Verdict: partial --
        executing T2.42 (+T2.41) shrinks the symptom noticeably; the allow-list inversion that
        resolves the deployment pain is not on the roadmap anywhere.
    - q: Q7
      verdict: blueprint-provided
      basis: [DEP-01, DEP-02, DEP-05, DEP-13, DEP-08]
      prose: >-
        Target state: keep the pipeline's control theory (saved-plan no-TOCTOU, fail-closed
        guard, convergence anchor, Environment gate, bootstrap fixed point) and INVERT the
        authority model inside it -- from "enumerate what the deployer may write" to
        "broad-but-bounded deployer under the existing boundary, with the guard and the budget
        classifying danger". This is spec 3.2 + 6.1 realized with material already on hand.
        MIGRATION PATH (sequenced; each phase independently valuable and reversible):
        PHASE 0 (days, no Decision amendments): (a) validation block on
        gated_apply_reviewer_user_ids rejecting empty (DEP-04/rec-2307); (b) delete deploy.yml
        (DEP-09); (c) add explicit Deny on convergence/personal/*, tfstate/personal/*, and
        tfplan/personal/* writes (and tfstate reads if feasible) to PlatformDev's DailyOps --
        the runtime identity needs none of them (DEP-13; admin apply, one plan); (d) record the
        plan.bin sha256 in the speculative-plan PR comment and verify it at fetch time in all
        three fetch sites (DEP-07). PHASE 1 (T2.42, already planned): content-addressed zips +
        layer replace policy (kills the recurring destroy-classification, DEP-03), committed
        provider lockfile, extracted+deduped build bash (with DEP-08's consolidation: one
        reusable apply workflow consumed by sandbox and reconcile). PHASE 2 (the inversion --
        AMENDS Decision 98 point 1 and the Decision 92 point-5 v1 budget; both flagged
        explicitly): one admin bootstrap+personal apply that (i) attaches the existing boundary
        to ALL agent-platform-* CI and execution roles (17/17 coverage), (ii) widens
        IAMRoleWriteBounded/IAMRoleCreateBounded to Resource role/agent-platform-* -- keeping
        the boundary-propagation condition, the self-ARN exclusion, and all three boundary
        self-protection denies, (iii) broadens the apply role's data-plane WRITE surface to the
        per-service agent-platform-* prefix pattern Decision 129 already ratified for reads
        (logs:CreateLogGroup/PutRetentionPolicy on /aws/lambda/agent-platform-*, lambda
        lifecycle on function:agent-platform-*, cloudwatch:PutMetricAlarm on alarm:ducklake-*/
        agent-platform-*, events write on rule/agent-platform-*, iam:TagRole/UpdateRoleDescription
        on role/agent-platform-*), (iv) widens authority_budget.json to match (update AND create
        of inline policies/attachments on boundary-carrying agent-platform-* roles in-budget;
        role CREATE stays gated but becomes EXECUTABLE by the gated job because new roles now
        declare the boundary). End state: routine IAM auto-applies in-budget; new roles ship via
        one gated approval instead of admin-create; the admin tier shrinks to bootstrap/boundary
        amendments -- the spec 7.x fixed point. PHASE 3 (repo-side fixed point, DEP-05): a
        path-scoped ruleset (or CODEOWNERS + required review) over the ~6 gate files
        (.github/workflows/terraform-*.yml, reconcile.yml, scripts/terraform_apply_guard.py,
        terraform/bootstrap/**) with the existing admin bypass retained -- non-wedging preserved
        (Decision 83), routine autonomy untouched since these files change rarely. PHASE 4
        (conditional, at product live_small->live_full per Decision 77's own trigger): stand up
        AWS Organizations with a management account holding an org CloudTrail (the one property
        single-account cannot fake: an audit sink outside every workload identity's reach) and
        convert the boundary denies to SCPs. MULTI-ACCOUNT COST/BENEFIT NOW: not worth it. The
        setup+carry cost (org plumbing, cross-account trust, per-account tooling, mirror/state
        splits) buys blast-radius isolation that the boundary + bootstrap tier already
        approximate to within the residual risks named in DEP-05/DEP-13 -- both fixable
        single-account for cents. Decision 77 is RETAINED (not amended); its live_full trigger
        is endorsed, with the Phase-4 shell as the prepared landing. Decisions amended by this
        blueprint: Decision 98 (pipeline may mint boundary-carrying roles via the gated path),
        Decision 92 point 5 (budget v2), and a widening of Decision 129's pattern from reads to
        writes. Decision 101 untouched. Per-component verdicts in `disposition`.
    - q: Q8
      verdict: adequate
      basis: [DEP-01, DEP-02, DEP-05, DEP-06, DEP-07, DEP-13]
      external_checklist:
        - property: XC1
          rating: partial
          evidence: >-
            CI is fully OIDC (6 roles, repo+ref/sub-conditioned; no secrets-based cloud auth in
            workflows). The agent RUNTIME is a static access key -> ExternalId-conditioned
            AssumeRole chain (Decision 113, decided). Property-matched controls for the
            credential-in-repo/CI half of the clause: GHAS push protection + pre-commit
            shape-pattern block + gitignored key/tfvars surfaces -- these match the leak vector.
            The theft-of-key vector has NO matched control (long-lived key, manual rotation);
            rated partial on the strength of the CI half plus leak controls, honestly noting the
            runtime half is an accepted Decision-113 trade-off, not a met property.
        - property: XC2
          rating: met
          evidence: >-
            github_ci_plan (tfstate read, tfplan write, no mutation) vs github_ci_apply (apply)
            vs github_ci_pr (no tfstate at all) is a clean plan/apply/read split; fork isolation
            via GitHub's no-id-token-for-fork-PRs plus job-level same-repo gates.
        - property: XC3
          rating: partial
          evidence: >-
            The mandatory-boundary mechanism exists and is enforced structurally for the
            deploy path: boundary attached to apply/branch/pr; IAMRoleCreateBounded/
            IAMRoleWriteBounded condition on iam:PermissionsBoundary; boundary DenyIAMEscalation
            catches unbounded creates (T2.23 c4 verified; T2.24 observed deny). Property-matched
            control for the uncovered roles: the deployer cannot write them AT ALL (enumerated
            identity policy) -- stricter than a cap, which is exactly the problem (DEP-01/02).
            14 of 17 roles carry no boundary; PlatformDev/PlatformAdmin/exec roles are capped
            only by their own policies.
        - property: XC4
          rating: partial
          evidence: >-
            SCP-substitute exists for the pipeline's fixed point: bootstrap root (own state,
            admin-only), boundary self-protection denies (DenyBoundaryRemoval/
            DenyBoundaryPolicyModification), budget-file drift gate (validate_authority_budget).
            No account-level perimeter protects the controls from PlatformAdmin (iam:* on *),
            which the static key can reach via the two-step in DEP-13 -- matched only by
            possession controls, hence partial.
        - property: XC5
          rating: met
          evidence: >-
            scripts/terraform_apply_guard.py is deterministic policy-as-code over `terraform
            show -json` (delete -> neon -> trust-diff -> IAM order, fail-closed on parse/missing
            budget), machine-readable budget table, drift-gated against the bootstrap HCL. Not
            OPA, but the property is the mechanism, not the tool. Rule set is narrow (see DEP-06)
            -- narrowness is rated at XC7, not here.
        - property: XC6
          rating: partial
          evidence: >-
            Strong core: the PR-reviewed plan.bin is persisted keyed by head SHA and applied
            VERBATIM at merge and in both gated jobs; push path has no re-plan; terraform serial
            staleness fails closed; DuckLake zips byte-asserted against the PR-uploaded
            artifacts (a genuine content-addressed check). Matched-control shortfall: plan.bin
            integrity is key-convention only -- any same-repo PR context can PutObject over any
            tfplan/personal/*.bin and no digest of the reviewed artifact is verified at fetch
            (DEP-07); dispatch path re-plans by documented exception.
        - property: XC7
          rating: partial
          evidence: >-
            Destroys, replacements, trust diffs, out-of-budget identity-IAM, and non-create
            neon_* changes all fail closed (exit 2), and guard errors block (exit 1); missing
            budget = fail closed. Gap: resource-BASED policy mutations are not in
            IAM_SENSITIVE_TYPES; the enumerated identity policy happens to deny most (bucket
            policy, topic policy, URL config unreachable -- a property-matched accident), but
            aws_lambda_permission on the five DuckLake functions is grantable and auto-applies
            behind only the LLM review (DEP-06).
        - property: XC8
          rating: met
          evidence: >-
            Hourly terraform-drift plan with explicit exit-code semantics; green->red flip +
            tf_drift rec via the portal; one-red-one-signal dedup; lock-held cycles skip without
            alarming; live-proven full cycle (T2.24 c1 VP9-VP12) and three open tf_drift recs
            show it fires in production. Drift never writes green (anti-masking preserved).
        - property: XC9
          rating: partial
          evidence: >-
            The convergence record is write-fenced among CI roles (writer set {apply, drift};
            explicit Deny on branch; read-only pr) with post-write read-back verify and
            plan_sha. Property-matched compensating control for spoof: the hourly drift plan
            re-derives truth from state-vs-code and re-reds a masked green within ~1h.
            Shortfall: the record is writable by PlatformDev (every agent session's ambient
            identity -- DEP-13) and admin identities; CloudTrail lives in-account, reachable by
            PlatformAdmin; no immutable external sink.
        - property: XC10
          rating: met
          evidence: >-
            Declarative rollback proven live: T2.22's VP recorded gated apply + REVERT of the
            same change through the pipeline; forward-fix culture (Decision 55) keeps rollback
            on the commit axis; catalog DR (weekly pg_dump + tested restore) covers the
            data-plane incident class.
        - property: XC11
          rating: partial
          evidence: >-
            The AWS-side amendment channel IS protected: boundary + budget live in the
            bootstrap root (own state, admin-only apply), pipeline cannot write its own policy
            (self-grant break, T2.23 c1), boundary self-modification denied. Property-matched
            control for the repo side: a widened in-repo budget JSON cannot grant AWS
            permissions (the identity policy + boundary deny it) -- escalation via gate-file
            edit is capped for IAM. NOT matched for data-plane authority: workflow self-edit
            reaches the apply role (sub=refs/heads/main needs no Environment) with bucket-wide
            delete, and .github/workflows/** + guard + budget merge with zero human review
            (required_approving_review_count=0, no CODEOWNERS) -- DEP-05, the acknowledged
            CD.35/T2.20(d) residual, unclosed on the repo side.
        - property: XC12
          rating: partial
          evidence: >-
            The zero-touch lane exists and works: guard-PASS changes within the granted write
            surface auto-apply end-to-end (3 of 12 sampled; the T2.25 in-budget lane adds
            branch/pr policy updates). Matched control for the rest: gated-apply relocates
            rather than removes the human (one approval click, sole-dev self-review by
            documented necessity). In practice ~70% of sampled changes needed a human beyond
            the merge and the in-budget lane went unused (fragment coupling) -- the property
            holds for a class, not for the population.
      prose: >-
        4 met, 8 partial, 0 missed. The distinctive strengths are genuinely frontier-shaped:
        apply-the-saved-plan no-TOCTOU, a fail-closed deterministic guard with a
        machine-readable budget, a server-side anti-masking record with a fenced writer set,
        alarm-only drift, and a bootstrap fixed point for the pipeline's own IAM. The partials
        cluster on one theme: structural controls built for the PIPELINE's identities but not
        extended to the rest of the account (boundary coverage, write surface, record fencing
        vs the runtime identity, repo-side gate files). Verdict: adequate, one inversion away
        from strong.
    - q: Q9
      answers:
        - question: >-
            Does the split-brain between the built allow-list guard and the partially built
            boundary model create a state where the deployer role is PERMITTED an action the
            guard blocks -- and what does that imply?
          answer: >-
            Yes, in BOTH directions, and the mismatch map is the redesign's work list.
            Guard-blocks-but-role-permitted: layer replace (destroy classification routes it
            every recurrence; post-#646 the role CAN execute it -- pure approval ceremony,
            DEP-03); inline-policy CREATES on branch/pr (budget admits only "update"; the role
            + boundary would permit a boundary-conditioned create). Role-denied-but-guard-passes:
            the whole DEP-01 class (new log groups, alarms, Lambda config/tags -- guard-invisible,
            apply-fatal). Implication: neither artifact is currently the single source of "what
            may change autonomously"; the redesign must make the guard/budget the POLICY surface
            and the identity policy broad-but-bounded so the two can never disagree in the
            role-denied direction (disagreement in the guard-stricter direction is legitimate
            policy).
          basis: [DEP-01, DEP-02, DEP-03, DEP-06]
        - question: >-
            Is the convergence-record / anti-masking machinery's operational cost proportionate
            to the single-account risk it bounds (NS-6)?
          answer: >-
            In kind, yes -- it exists BECAUSE auto-apply exists, it has caught real reds
            (rec-2236/2238, live drift flips), and each piece (latch, drift, staleness sensor,
            heal button) traces to an incident class that actually occurred. In implementation,
            it overpays: four copies of the record-write, a second full apply chain in
            reconcile.yml, and three sensors whose interactions themselves spawn recs
            (rec-2648, rec-2694, rec-2664). Verdict: keep the anchor semantics verbatim;
            consolidate the implementation (DEP-08); close the PlatformDev writer gap (DEP-13)
            which currently undermines the property the machinery pays for.
          basis: [DEP-08, DEP-11, DEP-13]
        - question: >-
            What is the blast radius if the single static-key credential is compromised, given
            the roles it can assume?
          answer: >-
            Nuanced but ultimately near-total. The key alone (DEV-container posture) yields
            PlatformDev: full data-lake read/WRITE/delete (including tfstate, tfplan,
            convergence record), DynamoDB counters, Glue mutations, portal writes, and
            GetSecretValue on inference AND live broker credentials -- severe on its own.
            Escalation: PlatformDev can READ tfstate, and the trust policies stored there
            contain both ExternalIds (documented as the sanctioned recovery path for tfvars),
            so a key thief recovers the admin ExternalId from state and assumes PlatformAdmin
            = iam:* on * = account takeover. The ExternalId is confused-deputy defense, not a
            second factor. Mitigations that exist: the key never transits the repo (GHAS +
            pre-commit), sessions are role-scoped and short-ish, CloudTrail records it (but
            in-account). Cheap hardening: deny tfstate/* (and convergence/tfplan writes) to
            PlatformDev (DEP-13 fix collapses the escalation), move broker-live secrets off
            PlatformDev's readable set until live trading starts, calendar key rotation.
            Decision 113 itself remains a reasonable accepted trade-off at this scale ONCE the
            two-step to admin is severed.
          basis: [DEP-13]
        - question: >-
            Does gated-apply actually remove the human from routine deploys, or merely relocate
            the click?
          answer: >-
            It relocates it -- and today it relocates it to a click that often precedes an
            AccessDenied (DEP-02), which is strictly worse than the laptop apply it replaced in
            those cases. prevent_self_review=false is NOT the defect: the documented rationale
            (=true permanently wedges a sole-developer pipeline) is correct and the Environment
            still provides authorization-as-a-recorded-act (audit trail, deliberate step,
            deployment-branch policy) -- that is real value at NS-6 scale, accepted as
            proportionate. The design's own steady-state target ("near-zero gate frequency",
            CD.35 point 6) is the right metric, and it is currently missed by a wide margin
            because routing volume is inflated by DEP-01/02/03. Fix the volume, keep the gate.
          basis: [DEP-01, DEP-02, DEP-03]
        - question: "(added) Is the LLM subagent reviewer in the auto-apply path load-bearing, and is its failure/abuse surface acceptable?"
          answer: >-
            It is a second gate on every auto-apply (REVISE fails closed; PROCEED required), so
            it is load-bearing for availability and advisory for safety (Decision 92: "advises,
            never locks" refers to budget policy, but operationally its exit code gates the
            apply). Its failure mode was live (rec-2658 starvation) and is now well-handled
            (digest-fed, bounded turns, STARVED-no-latch, single same-budget retry -- T2.39).
            Residual abuse surface: the digest is derived from plan content (resource names,
            attribute snippets) -- adversarial text in a plan could try to steer PROCEED; blast
            is bounded by the guard class (non-IAM) and the identity policy, and the
            deterministic guard cannot be talked out of exit 2. Acceptable, worth one line of
            hardening (instruct the reviewer that digest content is data, not instructions).
          basis: [DEP-06]
        - question: "(added) Can the audit/recovery stack itself wedge the pipeline, and who watches the watchers?"
          answer: >-
            The known wedge classes each got a sensor (staleness -> T2.35, deadlock -> T2.37,
            drift -> T2.24), which is the right shape, but the sensors share a single writer-set
            assumption (DEP-13) and reconcile's own failures are unwatched by ci-rca (rec-2664,
            open, low). The >24h orphaned gated approval that held the concurrency group
            (T2.24 note) shows the queue itself is a wedge surface; convergence-health's
            stuck-approval check (c4) now covers it. Adequate; consolidate rather than extend.
          basis: [DEP-08, DEP-11]
        - question: "(added) Is the terraform state itself treated as the sensitive artifact it is?"
          answer: >-
            Partially. Reads are correctly narrowed on the CI side (pr role has none; plan/
            drift read-only; fork isolation). But state contains both ExternalIds and every
            resource detail, lives in the shared data-lake bucket, and is READ-writable by
            PlatformDev (ambient) -- the DEP-13 chain. The redesign should treat
            tfstate/personal/* as a privileged prefix: deny to PlatformDev, restrict admin
            access to the admin tier, and rely on the documented remote-state recovery only
            from that tier.
          basis: [DEP-13]

