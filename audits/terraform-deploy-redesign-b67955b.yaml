  # =========================================================================
  # FINDINGS (sole enumerated list; 13 findings)
  # =========================================================================
  findings:
    - id: DEP-01
      surface: iam-identities
      question: Q1
      dimension: VD4
      title: "Deployer write surface is an enumerated allow-list that structurally lags the module; guard-PASS changes die AccessDenied at apply"
      evidence: "terraform/bootstrap/github_ci_apply.tf:404-586 (write Sids: 3 alarm ARNs, 5 rule ARNs, no logs write, no lambda Create/UpdateFunctionConfiguration/TagResource); rec-2754 (closed, 6 AccessDenieds on #644's gated apply); rec-2757 (open: UpdateRoleDescription, CreateLogGroup, PutMetricAlarm, PutRolePolicy-on-plan still missing); rec-2703 (open: config-only PR would fail); commit 43c392e body; Decision 129 problem stmt (15+ read-axis recurrences)"
      evidence_kind: observed
      current_behavior: >-
        Every new resource class -- or new instance of an enumerated class (a 4th alarm, a new
        log group, a Lambda tag/env change) -- outruns the apply role's per-ARN write grants by
        at least one cycle. The guard passes (non-IAM), the apply AccessDenies, the record
        latches red, and an admin -target apply plus bootstrap grant edit plus dispatch-ack
        unlatch follow. Decision 129 closed this class for refresh READS via agent-platform-*
        prefixes and a coverage verifier; writes were left enumerated.
      ideal_behavior: >-
        Spec 3.2: the deployer is broad-but-bounded -- per-service write grants scoped to the
        account's uniform agent-platform-*/ducklake-* naming, with the boundary and guard
        carrying the safety, so a new in-family resource auto-covers.
      gap: "The binding authority surface is the identity policy enumeration, invisible at plan time and amendable only by the admin tier."
      compensating_controls_considered: >-
        ci-rca + red-latch make the failure visible and recoverable (matched for DETECTION, not
        for the autonomy property); Decision 129's coverage verifier covers reads only.
      change_type: rescope
      proposed_change: >-
        Extend Decision 129's prefix pattern to the write axis: logs:CreateLogGroup/
        PutRetentionPolicy on /aws/lambda/agent-platform-*; lambda lifecycle (Create/Update
        config+code/Delete/Tag) on function:agent-platform-*; cloudwatch:PutMetricAlarm/
        DeleteAlarms on the alarm namespaces; events:* writes on rule/agent-platform-*;
        iam:TagRole/UpdateRoleDescription on role/agent-platform-*. Extend
        validate_ci_refresh_read_coverage to assert WRITE coverage per managed resource type.
      acceptance: "A PR adding a new agent-platform-* Lambda + log group + alarm auto-applies end-to-end with zero AccessDenied and zero bootstrap edit."
      severity: high
      severity_rationale: "Materially forces admin escalation on routine changes (7/10 sampled); detection-side controls do not restore autonomy."
      confidence: CONFIRMED
      roadmap_crossref:
        classification: planned-insufficient
        item_ids: ["Decision-129", "rec-2703", "rec-2757", "T2.34"]
        dedup_search_terms: ["refresh-read", "AccessDenied", "iterative-discovery", "coverage verifier", "write grants", "rec-2702"]
        dedup_hit_count: 6
        note: "Decision 129 owns the class and fixed exactly half of it (reads); no owner exists for the write axis."
      effort: M
      depends_on: []
      sequencing: {safe_to_queue_now: true, blocked_behind: [], note: "Phase 2 of the blueprint; one bootstrap admin apply."}

    - id: DEP-02
      surface: iam-identities
      question: Q5
      dimension: VD1
      title: "Gated-apply cannot execute most changes routed to it: IAM-write budget stops at branch/pr and new roles are declared boundary-less"
      evidence: "terraform/bootstrap/github_ci_apply.tf:285-319 (IAMRoleCreateBounded/IAMRoleWriteBounded); terraform/personal/oidc.tf:707,810,922,1048 (plan/drift/deploy roles: no permissions_boundary); Decision 98; T2.24 progress_note (run failed iam:CreateRole + iam:PutRolePolicy post-approval); docs/ROADMAP-PLATFORM.yaml:6086-6091"
      evidence_kind: observed
      current_behavior: >-
        The guard routes out-of-budget IAM to the tf-gated-apply Environment, a human approves,
        and the apply then AccessDenies: PutRolePolicy is allowed only on branch/pr, and
        CreateRole requires the boundary that no new role's HCL declares. Decision 98 ratified
        admin-create as the model, so approval-then-failure is the DESIGNED outcome for the
        most common routed classes. The human is asked to authorize an act the executor cannot
        perform.
      ideal_behavior: >-
        Spec 6.1/6.2: the pipeline may author arbitrary in-family IAM; the mandatory boundary
        (which the mutation cannot detach) is the cap; the Environment approval is the
        authorization for out-of-budget classes -- and it is sufficient, because the apply then
        succeeds.
      gap: "Approval and capability are decoupled; the gate is ceremony for the classes that dominate its traffic."
      compensating_controls_considered: >-
        The admin tier completes the work (matched for COMPLETION, at the cost of the autonomy
        and audit properties the gate exists to provide); Decision 98's read-grant procedure
        keeps subsequent plans green (matched for the refresh-read follow-on only).
      change_type: rescope
      proposed_change: >-
        Amend Decision 98 point 1 and Decision 92 point 5 (flagged per section 6): widen
        IAMRoleWriteBounded/IAMRoleCreateBounded Resource to role/agent-platform-* (boundary
        condition, self-ARN exclusion, and all boundary self-protection denies retained);
        declare permissions_boundary on every agent-platform-* role in HCL; widen
        authority_budget.json to match. New roles then ship through one gated approval that
        actually applies.
