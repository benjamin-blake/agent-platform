    - id: DEP-13
      surface: shared
      question: Q9
      dimension: VD5
      title: "PlatformDev's bucket-wide S3 grant reaches the convergence record, saved plans, and tfstate: the ambient runtime identity can spoof the anti-masking anchor and escalate to PlatformAdmin via ExternalId-in-state"
      evidence: "terraform/personal/platform_roles.tf:87-91 (S3ReadWrite Get/Put/Delete on data-lake/*; no prefix denies -- contrast oidc.tf:427-434's DenyConvergenceRecordWrite on the branch role); terraform/CLAUDE.md (ExternalIds recoverable from remote state -- sanctioned recovery path; admin/breakglass residual 'not yet IAM-fenced', PlatformDev unmentioned); materially affects: iam-identities, apply-pipeline"
      evidence_kind: static
      current_behavior: >-
        The CI-side writer-set fencing is meticulous (explicit Deny on branch, read-only pr),
        but PlatformDev -- assumed by every CC-web session as the ambient runtime -- holds
        Get/Put/DeleteObject on the entire data-lake bucket: it can rewrite
        convergence/personal/sandbox.json (defeating the sole hard block's unbypassability
        claim beyond merge-path actors), overwrite tfplan/personal/* (compounding DEP-07), and
        READ tfstate -- where the trust policies carry both ExternalIds -- converting
        DEV-container key theft into PlatformAdmin (iam:* on *) account takeover via the
        documented state-recovery path.
      ideal_behavior: >-
        PlatformDev carries explicit Deny on convergence/personal/*, tfplan/personal/*, and
        tfstate/* (write always; read for tfstate too -- the runtime has no need for state);
        the admin ExternalId is recoverable only from the admin tier.
      gap: "The anti-masking anchor and the privilege tier are fenced against CI roles but not against the identity with the largest session count."
      compensating_controls_considered: >-
        Hourly drift re-derives truth from state-vs-code and re-reds a spoofed green within
        ~1h IF the delta is plan-visible (property-matched with latency -- this is what keeps
        severity below critical); read-back verify covers writer errors, not writers;
        CloudTrail records the act in-account.
      change_type: enforce
      proposed_change: >-
        Add a Deny statement to DailyOps for the three prefixes (write on all three; read on
