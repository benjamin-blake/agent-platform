      cost: "S"
      rationale: "The guard is the cheapest, most legible control in the stack and the correct policy surface for the deny-model end state."
      confidence: CONFIRMED
    authority-budget:
      verdict: retune
      mechanism: "Same budget-table mechanism, same bootstrap-tier amendment path."
      what_changes: "v2 classification after the AWS-side widening: in-budget = create+update of inline policies/attachments on ANY boundary-carrying agent-platform-* role; role-create moves from admin-only to gated-but-executable; schedule the Decision 92 point-9 ratchet review as a recurring measured act."
