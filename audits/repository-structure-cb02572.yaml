# Repository-structure audit -- physical topology, agent-optimization, end-state convergence
# Executed per docs/audit-prompts/AUDIT-repository-structure.md at origin/main cb02572.
# COUNTING INVARIANT (stated per section 14): findings[] is the SOLE enumerated list;
# total_findings = len(findings) = novel_count + planned_insufficient_count + planned_unbuilt_count.
# Fully-covered candidates and deliberate structures live in rejected_candidates, not findings.
audit:
  meta:
    audited_commit: cb02572
    base_branch: main
    model: claude-fable-5
    methodology_version: 1
    scope_surfaces: [S1, S2, S3, S4, S5, S6, S7]
    degraded_dedup: false
    web_research_available: true
    contract_notes: >-
      Tree diverged mildly from section 10 grounding: total tracked files 1027 (prompt ~1026);
      docs/audit-prompts/ holds 9 files (prompt ~8; the 9th is this audit's own prompt, merged
      after compose); scripts/ has two subtrees the prompt's list omits -- scripts/ci/ (1 file:
      ci/claude_p_retry.sh) and scripts/agent_development/ (1 file: run_skill.py). docs/ root
      count 31 confirmed exactly. Preflight cache-gen succeeded (no degraded-dedup hatch needed).
      validate --pre was not run repo-wide per section 5 (advisory outside CI); the YAML-parse
      gate on both deliverables is the pre-push gate used.
    stale_anchors: []
  question_answers:
    - q: Q1
      verdict: partial
      basis: [RS-01, RS-02, RS-03]
      prose: >-
        Placement is predictable and obeyed across most of the tree: src/ is package-per-domain
        with per-Lambda manifest dirs, tests/ has a machine-enforced location rule
        (scripts/test_coverage_checker.py:55-59), config/ has the decided T-1.7 three-zone split,
        terraform/ separates root/personal/github/bootstrap, .claude/ separates commands (L3)
        from skills (L4) from hooks. Two surfaces have no stateable rule: scripts/ root (71 files
        with at least 6 prefix families sitting beside nested checks//executor//verifiers/ --
        "does a new script go to root or a package?" has no answer; RS-01) and the docs/ root
        (31 files of ~10 classes where INTENT-*/DECISIONS*/SESSION_LOG* are owned by roadmap
        items but REPORT-*, spike notes, and loose AUDIT-* files landed by accident; RS-02,
        RS-03). Placement-by-accident is localized, not systemic.
    - q: Q2
      verdict: partial
      basis: [RS-04, RS-05, RS-07]
      prose: >-
        The bones are genuinely agent-first: canonical YAML surfaces (roadmap, contracts, plans,
        manifests) are machine-parseable and schema-validated, skills/commands load on demand,
        and the root CLAUDE.md->AGENTS.md hop is a single ambient load. The gaps are in the
        discovery layer: the canonical File Router (docs/PROJECT_CONTEXT.md:115) is hand-
        maintained prose with three confirmed dead pointers and stale rows (RS-04), context-
        locality is under-used exactly where edit-time rules already exist but live in
        non-auto-loading README.md files (4 CLAUDE.md vs 10 README.md; RS-05), and the 357-file
        flat docs/plans/ corpus has no lifecycle for context economy (RS-07). Locality is
        under-used, not over-used: no existing CLAUDE.md is bloat; the four that exist are
        accurate and directory-scoped.
    - q: Q3
      verdict: partial
      basis: [RS-01, RS-04, RS-08]
      prose: >-
        Strong against the checklist where it counts: enforced import boundaries (EC3), an
        ADR-plus decision convention (EC8), clean domain separation (EC1), a minimal sanctioned
        root (EC10), and segregated derived artifacts (EC11) are all met. Two properties are
        missed: flat-vs-nested discipline (EC4 -- scripts/ root and docs/ root/plans) and a
        machine-readable discovery index kept in sync (EC6 -- the File Router drifts and nothing
        checks it). CODEOWNERS absence is deliberately NOT the EC6 miss: researched (GitHub
        docs), it has minimal value in a single-owner repo; the miss is the drifting
        hand-maintained router. One researched property added (EC12, instruction-surface
        single-sourcing per the agents.md declared-hierarchy convention): missed for S7.
      external_checklist:
        - {property: EC1, rating: met,
           evidence: "Top-level dirs are single-domain: src/ scripts/ tests/ docs/ config/ terraform/ audits/ bin/ migrations/ logs/; no misc/ or utils/ catch-all exists at root (git ls-files top-level census, 1027 files)",
           evidence_kind: static, applies_to_surfaces: [S1]}
        - {property: EC2, rating: partial,
           evidence: "Tests do not mirror the tree but location IS derivable and machine-enforced: scripts/test_coverage_checker.py:55-59 maps src/**/x.py and scripts/x.py to tests/test_x.py and scripts/checks/** to tests/test_validate.py, registered in both validate tiers (scripts/checks/registry.py:107,182). Researched: pytest good-practices blesses separate-tests-dir without mirroring. Residual: basename collisions already forced a shim (tests/test_handler.py docstring) and a parallel convention (test_ducklake_*_handler.py) -- RS-08",
           evidence_kind: researched, applies_to_surfaces: [S3, S4]}
        - {property: EC3, rating: met,
           evidence: ".importlinter declares 4 contracts (executor/portal/verifiers layering + src.schemas purity); enforced as a registered check in both presubmit tiers via scripts/checks/deps/validate_import_contracts.py (registry.py:107,182)",
           evidence_kind: static, applies_to_surfaces: [S2, S3]}
        - {property: EC4, rating: missed,
           evidence: "scripts/ holds 71 root files with clear prefix families (ci_rca_* x7, sync_* x3, session_* x3, plan/roadmap x5+, ops_* x2, llm_*+model_registry x3) beside an already-nested scripts/checks/ (86 files in 6 subpackages) proving the pattern; docs/ root holds 31 mixed-class files and docs/plans/ 357 flat. tests/ flatness is excluded here -- it is the deliberate enforced design adjudicated under EC2",
           evidence_kind: static, applies_to_surfaces: [S2, S5]}
        - {property: EC5, rating: partial,
           evidence: "Live single-home holds for plans, contracts, skills, commands, terraform, config zones. Three exceptions, each with a live compensating control or owner: Lambda handlers in two homes bridged explicitly by manifests (src/lambdas/*/manifest.yaml handlers: keys name src/data/handlers/ paths; CD.24 ratified dec-079, T-1.8 complete, retirement owners T2.26/T4.12/Decision 61); audit outputs in one live home (audits/, pinned by .claude/skills/audit-prompt/SKILL.md:117) with inert legacy scatter (RS-02); executor instructions split across two homes with a stated rule at config/agent/executor/prompts/README.md:7 (RS-06)",
           evidence_kind: static, applies_to_surfaces: [S1, S3, S5, S7]}
        - {property: EC6, rating: missed,
           evidence: "The discovery index is the hand-maintained prose File Router (docs/PROJECT_CONTEXT.md:115) with three dead pointers confirmed at cb02572 (GEMINI.md, docs/AGENT_WORKFLOW.md, scripts/bedrock_client.py -- none tracked) plus stale rows (PLAN-{slug}.md canonical vs Decision 85 .yaml; Lambda-handlers row omits src/lambdas/). No machine-checked index or link-validity check exists; the doc-freshness monitor that might compensate is disabled (Lambda loop disabled May 2026, CC re-enable owned by T4.12). Researched: CODEOWNERS absence is costless in a single-owner repo (GitHub docs) and is NOT counted as the miss",
           evidence_kind: researched, applies_to_surfaces: [S5]}
        - {property: EC7, rating: partial,
           evidence: "Conventions present and accurate where they exist: root CLAUDE.md (@AGENTS.md), AGENTS.md, 3 directory CLAUDE.md files (src/data/handlers/, terraform/ 339 lines, tests/) all verified accurate; researched: agents.md convention endorses exactly this nested closest-wins model. Compensating control for the partial: the four existing files are correct -- incoherence is confined to the prose indices already captured as the EC6 miss. Gap is coverage: scripts/ (179 files) and docs/ (438) have zero local affordance while agent-relevant rules for them sit in non-auto-loading surfaces (RS-05)",
           evidence_kind: researched, applies_to_surfaces: [S1, S2, S3, S4, S5, S6, S7]}
        - {property: EC8, rating: met,
           evidence: "docs/DECISIONS.md numbered stable IDs (Decision NNN) with warehouse mirror ids (dec-NNN), explicit statuses, reversal conditions, amendment logs, DECISIONS_ARCHIVE.md overflow, plus a pre-ratification candidate_decisions CD.n lifecycle in the roadmap -- exceeds ADR convention (adr.github.io consulted)",
           evidence_kind: researched, applies_to_surfaces: [S5]}
        - {property: EC9, rating: partial,
           evidence: "Within-class taxonomies are uniform (PLAN-/AUDIT-/INTENT-/REPORT-/ROADMAP- prefixes; tier ids T{n}.{m}; snake_case python). Cross-surface residuals: src/lambdas/ mixes hyphenated manifest-only dirs (data-pipeline, ops-compaction) with underscored importable packages (ducklake_*) -- a stateable but undocumented rule; setup.py is an env-setup script, not setuptools packaging (setup.py:1-10 header), a misleading name; three instruction-file conventions coexist (.instructions.md applyTo, .prompt.md, SKILL.md), each internally uniform and named in the instruction-architecture contract",
           evidence_kind: static, applies_to_surfaces: [S1, S2, S3, S5, S7]}
        - {property: EC10, rating: met,
           evidence: "19 root files + 12 dirs: 7 standard dotfiles, 6 sanctioned portal files (CD.23/Decision 111: README, AGENTS.md, CLAUDE.md, SECURITY.md, LICENCE, EVALUATION-PROMPTS.yaml), 6 build/deps files with documented roles (requirements-fast.txt:1-3 documents the fast-tier subset + Dependabot grouped-sync discipline; requirements.lock is the pip-tools lock)",
           evidence_kind: static, applies_to_surfaces: [S1]}
        - {property: EC11, rating: met,
           evidence: "Derived read-caches are gitignored (.gitignore:81-137: .recommendations-log.jsonl, .decisions-index.jsonl, .preflight-report.json, outbox, runs); build artifacts never tracked. The 10 tracked logs/*.jsonl files are deliberate local persistence (AGENTS.md memory policy names structured logs as the persistence model), not derived artifacts -- the four warehouse-backed ones were already untracked per closed rec-507; the remainder await the T2.36 telemetry re-land",
           evidence_kind: static, applies_to_surfaces: [S1, S4]}
        - {property: EC12-instruction-single-sourcing, rating: missed,
           evidence: "Researched addition (agents.md declared-hierarchy convention: every live instruction file reachable from the declared instruction architecture). The repo's own contract (docs/contracts/instruction-architecture.yaml) declares L5 content_locations as config/agent/executor/prompts/*.prompt.md ONLY, while six live executor instruction files sit in .github/instructions/ acknowledged only inside a legacy_surfaces_retired note whose ownership pointer is stale (says T5.3, which completed 2026-06-29 with its deletion scope re-homed to T4.12 -- and T4.12's criteria do not mention instructions/). One file (.github/instructions/behavioral-invariants.md) has zero consumers outside docs/plans history",
           evidence_kind: researched, applies_to_surfaces: [S7]}
    - q: Q4
      verdict: partial
      basis: [RS-01, RS-02, RS-04]
      prose: >-
        Mostly converging. Realized structure-touching end-state: T-1.7 config split (complete),
        T-1.8 per-Lambda manifests (complete; build_lambda.py:15-16 confirms copytrees retired),
        CD.24 ratified with retirement owners for the legacy handler home, T5.3 executed with
        the scheduled survivors explicitly owned by T4.12, Decision 115 handoffs dir retired
        (verified gone), Decision 85 one-way plan .md->.yaml migration (162 yaml and growing),
        INTENT freeze enforced on-disk with wave-by-wave extraction (T5.5). Divergence pockets:
        scripts/ root is measurably accreting AGAINST open rec-164 (filed 2026-04 citing "30+
        files"; now 71 -- the owning remedy is unexecuted and stale), audit-artifact legacy
        scatter has no owner, and the File Router accumulates drift with no checking mechanism.
        The rebuild_vs_refactor stance (R.1 retired) is respected by every disposition below.
    - q: Q5
      verdict: see surface_dispositions
      basis: [RS-01, RS-02, RS-03, RS-04, RS-05, RS-06]
      prose: "Per-surface decision block below; every disposition is reachable by surgical move/rename/consolidate/index steps."
    - q: Q6
      answers:
        - question: "Does the inversion 'more human README.md (10) than agent CLAUDE.md (4)' matter for an agent-first repo, and what is the right ratio/placement?"
          answer: >-
            The raw ratio matters less than WHERE the rules live. Six of the ten READMEs carry
            agent-relevant placement/bundling invariants (config three-zone rule, config/agent
            not-bundled rule, executor-prompt split rule) that do NOT auto-load in the CC-web
            model when an agent edits those trees -- while the four CLAUDE.md files that do
            auto-load are exactly the high-traffic edit surfaces. The right rule: CLAUDE.md
            wherever edit-time invariants exist (scripts/, config/, docs/ qualify today);
            README.md only at portal boundaries sanctioned by CD.23 (root, terraform/ for
            public-facing infra docs, config/lambda placeholders). Ratio follows from the rule;
            roughly 7 CLAUDE.md to 4-5 READMEs at the target tree.
          basis: [RS-05]
        - question: "Should there be an enforced, machine-checked placement rule, and where would it live?"
          answer: >-
            Yes, and the repo already has the exact chassis: validate.py's registered-check
            registry (Decision 104). A placement check belongs at
            scripts/checks/hygiene/validate_placement.py reading a small machine-readable
            placement registry (the target-tree principles below rendered as YAML: allowed
            docs/-root classes, scripts/-root allowlist, one-home-per-artifact-class map, File
            Router link-validity). It fails CI when a file lands outside its class home --
            converting every placement rule this audit states from convention to mechanism,
            consistent with validate.py as the single source of truth (AGENTS.md merge
            protocol).
          basis: [RS-03, RS-04]
        - question: "Does the target tree create migration hazard for path constants embedded in prompts, configs, and validate.py checks -- and how should a move be sequenced?"
          answer: >-
            Yes -- quantified: the ci_rca_* family alone has 166 references outside scripts/
            (workflows ci-rca.yml, .claude/agents/scheduled/ci-rca.md,
            config/agent/verification_registry/registry.yaml, the roadmap, 8+ test modules);
            scripts.ops_data_portal appears 27+ times across AGENTS.md, workflows, and skills;
            Lambda manifests name individual scripts/*.py files in includes:. Sequencing that
            stays safe: (1) land the machine index + link-validity check FIRST so every
            subsequent move fails loudly if a reference is missed; (2) move one family per PR
            with git mv + same-commit repo-wide reference rewrite; (3) gates per PR = full
            validate (not --pre), full pytest, and the CD.24 bundle-completeness check when any
            manifest-named file moves; (4) ops_* family last (highest fan-out, portal is
            operationally load-bearing) or deferred; (5) no compatibility shims -- deferred
            imports and re-export stubs are the pattern the importlinter contracts exist to
            prevent.
          basis: [RS-01, RS-04]
        - question: "What is the smallest high-leverage first move?"
          answer: >-
            RS-04: convert the File Router to a machine-checked index (docs/contracts/
            file-router.yaml + a validate.py link-validity check) and fix the three dead
            pointers. Effort S, zero file moves, no migration hazard -- and it is the enabling
            move: every subsequent relocation updates one registry row and is caught by CI if
            missed, converting the audit's whole target tree from risky to routine.
          basis: [RS-04]
        - question: "Do the ~357 accumulated docs/plans/ files warrant a retention/archival policy, and what is the right lifecycle for agent context economy?"
          answer: >-
            Yes -- archive-on-supersession, not prune. git history is not an agent-facing
            archive (agents glob the working tree; 195 of the 357 are deprecated-format .md
            whose active-set value is zero). Right lifecycle: docs/plans/ holds only plans not
            yet merged-and-verified; a docs/plans/archive/ subtree (or per-year partitions)
            receives completed legacy .md plans first (pure moves -- find_plan.py resolves
            exact paths from the CURRENT branch slug, so archived historical slugs are never
            resolved; verified scripts/find_plan.py:65-73), completed .yaml plans on a lagged
            sweep. Keep-all-in-place fails context economy; deletion fails Decision 85's
            history commitment; archive satisfies both.
          basis: [RS-07]
  surface_dispositions:
    S1:
      verdict: keep
      mechanism: "No moves. Absorb legacy audit outputs INTO audits/ (executed under S5's consolidation, RS-02); logs/ tracked-file disposition rides T2.36."
      what_changes: "audits/ gains a legacy/ subdir (receiver side of RS-02); nothing else at root changes."
      cost: XS
      rationale: "Root is minimal and sanctioned (EC10 met); audits/, bin/, logs/, migrations/ are single-class and small; the only S1-adjacent defect is the audit-legacy scatter whose files live in docs/."
      confidence: CONFIRMED
    S2:
      verdict: reorganize-in-place
      mechanism: "Nest the six prefix families into subpackages (ci_rca/, session/, sync/, roadmap/, llm/, ops/) one family per PR with same-commit reference rewrite, per the Q6 hazard sequencing; refresh rec-164 first (its file list is stale)."
      what_changes: "~25 root files move into 6 subpackages; scripts/ root shrinks toward entry points (validate.py, build_lambda.py, execute_recommendation.py, ops_data_portal.py if deferred) + genuinely unclassed singles; scripts/CLAUDE.md added stating the rule (RS-05)."
      cost: M
      rationale: "71 flat root files with named families beside three nested subpackages is the repo's largest predictability gap (RS-01); the nested siblings (checks/, executor/, verifiers/) prove the pattern works here."
      confidence: CONFIRMED
    S3:
      verdict: keep
      mechanism: "No moves now. The two-home handler state resolves via its owners (T2.26 retires ops-compaction; T4.3/T4.12 + Decision 61 retire/re-home the dispatcher pair; future per-function Lambdas land as src/lambdas/<slug>/). Document the hyphen-vs-underscore rule in src/lambdas/ (one manifest-schema comment or CLAUDE.md line)."
      what_changes: "Nothing physically; naming rule documented."
      cost: XS
      rationale: "src/ is the frontier exemplar: import-contract-enforced boundaries (.importlinter src.schemas purity), per-Lambda manifests with explicit bridges to the legacy home, retirement owners named. Moving handlers ahead of their owning items would churn Lambda deploy surfaces for zero convergence gain."
      confidence: CONFIRMED
    S4:
      verdict: keep
      mechanism: "Extend test_coverage_checker.py's mapping for basename collisions (dotted-path or parent-qualified names), retiring the tests/test_handler.py shim (RS-08). No relocation."
      what_changes: "One mapping-rule extension; shim deleted once mapping covers the six handler.py files."
      cost: XS
      rationale: "Flat tests with a machine-enforced derivation rule is deliberate, pytest-endorsed (researched), and CI-enforced; the only crack is the collision family, which is fixable inside the rule."
      confidence: CONFIRMED
    S5:
      verdict: consolidate
      mechanism: "Three consolidations plus one index: (a) legacy audit outputs (docs/audit-reports/*, docs/AUDIT-test-hermeticity.yaml) -> audits/legacy/; loose docs/AUDIT-PROMPT-*.md -> docs/audit-prompts/; fix the two dead banner pointers in docs/ROADMAP-PRODUCT.md same PR. (b) REPORT-*.md + ducklake-spike-findings.md -> docs/plans/reports/ (they are plan deliverables per Decision 86's REPORT-ONLY clause). (c) docs/plans/archive/ receives completed legacy .md plans. (d) File Router -> docs/contracts/file-router.yaml + validate.py link-validity check; PROJECT_CONTEXT.md keeps a pointer row."
      what_changes: "docs/ root drops from 31 files toward ~20 (INTENT-* et al. continue shrinking under owned T5.5/T1.5/T2.26); exactly one audit-output home; discovery index becomes machine-checked."
      cost: S
      rationale: "docs/ concentrates 5 of 8 findings including the sole high (RS-04); every step is a pure move/index with zero import hazard."
      confidence: CONFIRMED
    S6:
      verdict: keep
      mechanism: "No moves. Fix config/agent/README.md drift (names dead copilot/ subtree; omits live verification_registry/ and cost_reconciliation.yaml) and convert the two rule-bearing config READMEs' invariants into config/CLAUDE.md (RS-05)."
      what_changes: "One README corrected; one CLAUDE.md added; content, not placement."
      cost: XS
      rationale: "Both trees are well-shaped: T-1.7 zones are real and build_lambda-consumed; terraform/ has the repo's best local affordance (339-line CLAUDE.md) and clean root/personal/github/bootstrap separation with annotated retired artifacts. Compound-surface note: config and terraform both rate keep independently -- no tie-break needed."
      confidence: CONFIRMED
    S7:
      verdict: consolidate
      mechanism: "Co-locate the six live .github/instructions/executor-*.instructions.md with their L5 siblings under config/agent/executor/ (instructions/ subdir), update the instruction-architecture contract content_locations + the stale T5.3 ownership note (actual owner of surviving-.github-surface deletion is T4.12, which also omits instructions/ -- assign explicitly), delete orphaned behavioral-invariants.md after a final consumer grep, and update the two consumers (prompts/README.md, tests) same PR."
      what_changes: "7 files leave .github/instructions/ (6 moved, 1 deleted); .github/ retains workflows + the T4.12-owned scheduled surfaces + dependabot + PR template; .claude/ unchanged."
      cost: S
      rationale: "Compound-surface tie-break per the pinned order (consolidate > keep): .claude/ rates keep (clean L3/L4/hooks separation), .github/ rates consolidate (instruction split is live debt with a stale owner, RS-06) -- consolidate dominates. Executor freeze (Decision 67) makes this cheap now and expensive after T4 re-enable."
      confidence: CONFIRMED
      sub:
        claude: {verdict: keep, rationale: "commands/skills/hooks/agents each single-class; settings + statusline at root; nothing misplaced."}
        github: {verdict: consolidate, rationale: "executor instructions re-home to config/agent/executor/; scheduled prompts/agents stay pending T4.12; orphan deleted."}
  proposed_target_tree:
    principles:
      - "One canonical home per artifact class; a machine-readable placement registry (consumed by a validate.py check) states each class -> home mapping."
      - "scripts/ root holds only entry points and unclassed singles; any >=3-file prefix family is a subpackage."
      - "docs/ root holds only canonical governance surfaces (roadmaps, DECISIONS, PROJECT_CONTEXT, GETTING_STARTED, CHANGELOG, ARCHITECTURE pair pending their own owners); everything else lives in a classed subtree (plans/, contracts/, audit-prompts/, dq/, runbooks/, intent-migration/)."
      - "Audit prompts (inputs) live in docs/audit-prompts/; audit outputs (results) live in audits/; legacy outputs in audits/legacy/. Exactly two audit homes, by role."
      - "Every directory whose files carry edit-time invariants has a CLAUDE.md (auto-loading); README.md only at CD.23 portal boundaries."
      - "Discovery is machine-checked: the file-router registry's targets must exist (CI-enforced link validity)."
      - "All moves are surgical (git mv + same-commit reference rewrite); R.1 stands -- nothing is rewritten."
    nodes:
      - {path: "docs/contracts/file-router.yaml", role: "Machine-readable discovery/ownership index replacing the prose File Router table",
         moves_from: ["docs/PROJECT_CONTEXT.md:115 (File Router table content)"],
         rationale: "EC6 miss; three dead pointers today; contracts/ is the decided home for machine-parseable semantics (Decision 86 routing rule)",
         roadmap_basis: ["Decision 86", "CD.13/Decision 110"], migration_hazard: "None -- additive; PROJECT_CONTEXT.md keeps a pointer", surgical: true}
      - {path: "scripts/checks/hygiene/validate_placement.py", role: "Placement + link-validity check reading the file-router registry",
         moves_from: [], rationale: "Converts placement convention to mechanism inside the existing check registry (Decision 104)",
         roadmap_basis: ["Decision 104", "AGENTS.md validate.py-is-SoT rule"], migration_hazard: "None -- additive", surgical: true}
      - {path: "scripts/ci_rca/", role: "CI-RCA subpackage (7 modules from scripts/ci_rca_*.py)",
         moves_from: ["scripts/ci_rca_back_validation.py", "scripts/ci_rca_evidence.py", "scripts/ci_rca_filing.py", "scripts/ci_rca_probe_health.py", "scripts/ci_rca_taxonomy.py", "scripts/ci_rca_tier_map.py", "scripts/ci_rca_vacuous_pass.py"],
         rationale: "Highest-cohesion family; zero Lambda-manifest overlap verified", roadmap_basis: ["rec-164 Phase A"],
         migration_hazard: "166 external refs (ci-rca.yml workflow, scheduled agent .md, verification registry, roadmap, 8 test modules) -- same-commit rewrite + full validate/pytest gate", surgical: true}
      - {path: "scripts/session/", role: "Session automation subpackage", moves_from: ["scripts/session_preflight.py", "scripts/session_postflight.py", "scripts/session_metrics.py"],
         rationale: "Named family per rec-164", roadmap_basis: ["rec-164 Phase A"], migration_hazard: "session_start hooks + AGENTS.md + skills reference scripts.session_preflight; same-commit rewrite", surgical: true}
      - {path: "scripts/sync/", role: "Cache-sync subpackage", moves_from: ["scripts/sync_ops.py", "scripts/sync_recommendations.py", "scripts/sync_ducklake_version.py"],
         rationale: "Named family", roadmap_basis: ["rec-164 Phase A"], migration_hazard: "AGENTS.md warehouse section + skills name scripts.sync_ops", surgical: true}
      - {path: "scripts/roadmap/", role: "Roadmap/plan tooling subpackage", moves_from: ["scripts/platform_roadmap.py", "scripts/product_roadmap.py", "scripts/product_roadmap_schema.py", "scripts/plan_document.py", "scripts/plan_audit.py", "scripts/find_plan.py"],
         rationale: "Named family (roadmap schema + plan artefact tooling)", roadmap_basis: ["rec-164 Phase A"], migration_hazard: "validate.py imports plan_document; skills invoke find_plan by path", surgical: true}
      - {path: "scripts/llm/", role: "LLM client/routing subpackage", moves_from: ["scripts/llm_client.py", "scripts/llm_utils.py", "scripts/model_registry.py", "scripts/github_models_client.py"],
         rationale: "Named family; File Router already groups them", roadmap_basis: ["rec-164 Phase A"],
         migration_hazard: "data-pipeline + ops-compaction manifests name these files in includes: -- manifest edit + bundle-completeness check in the same PR", surgical: true}
      - {path: "scripts/ops/", role: "Ops-portal subpackage (SEQUENCE LAST or defer)", moves_from: ["scripts/ops_data_portal.py", "scripts/ops_writer.py"],
