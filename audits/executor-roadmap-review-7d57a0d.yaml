  rejected_candidates:
    - candidate: "C1 (T4.8 slice): semantic locks/leases required for safe MVP loop closure"
      why_dismissed: >-
        Locks prevent conflicting PARALLEL rec executions; at the MVP boundary the state machine
        is pinned to concurrency=1 (T4.1 exit criterion) and CD.37 states the locks are inert
        until T4.4 raises concurrency. The deferral trigger and the hazard trigger are the same
        event, so the sequencing is self-consistent.
      compensating_control: "T4.1 'Concurrency cap = 1 ... raise as autonomy gates A2+ pass per T4.4'"
      control_property_match: >-
        Exercises the same property (mutual exclusion of in-flight recs) by admitting at most one
        in-flight rec; operates at T4.1 exit criterion 5. It would FAIL if the defect were real --
        i.e. if parallel execution were possible at MVP -- but parallelism is structurally
        impossible until the same item (T4.4) that CD.37 names as the lock-activation trigger.
        Human-interactive parallel merges are reconciled by T3.9 post-merge reconciliation +
        rebase-before-push, the same regime human PRs use.
      decision_or_item_id: "T4.1 / CD.37 / T4.4"
    - candidate: "C4: concurrency=1 as effective MVP throughput is a frontier economics gap"
      why_dismissed: >-
        Deliberate, listed on the do-not-flag list, and instrumented for its own reversal: T4.4
        A-gates raise concurrency on measured evidence, and KG.13 pre-plans the TIA/caching
        scalability work keyed to exactly that raise ('becomes load-bearing when T4.4 raises
        concurrency above 1').
      compensating_control: "Decision 55 RCA-first rationale + T4.4 gate schedule + KG.13"
      control_property_match: "Same property (throughput vs failure-attribution tradeoff): serial execution makes every failure attributable during the trust-building phase; the control fails (and is designed to be lifted) exactly when throughput matters -- at A2+."
      decision_or_item_id: "T4.1 / Decision 55 / KG.13"
    - candidate: "C6: RCA-first + concurrency=1 + no-LLM-retry structurally reintroduces a human, defeating NS-A"
      why_dismissed: >-
        Category error between critical path and exception path. Decision 93's boundary is 'no
        human in the critical path of ONE iteration'; RCA routes FAILED iterations to a human --
        the exception path NS-A explicitly permits. CD.27's stability definition even counts a
        stop-clean-with-rec-filed as 'recovered'. A healthy iteration touches no human at any
        transition; a fleet where most iterations failed would violate the CD.17 stability
        preconditions and block unfreeze anyway, which is the designed behaviour.
      compensating_control: "Decision 93 boundary definition + CD.27 T4.2 stability operational definition"
      control_property_match: "Same property (human placement): the MVP gate itself measures zero-unrecovered-failure iterations over 14 days -- it would fail if humans were structurally required per iteration."
      decision_or_item_id: "Decision 93 / CD.27 / Decision 55"
    - candidate: "C7: Lambda Durable Functions (~5 months GA) maturity risk inadequately hedged"
      why_dismissed: >-
        The risk is named, monitored, and reversibly hedged at three layers: a designated
        fallback (self-checkpointed Lambda + DynamoDB) with a 12-month API-regression trigger
        re-evaluated at EACH T4.2 atomic-plan filing; a T4.2 exit criterion that forces
        checkpoint-replay verification by induced timeout; and a checkpoint-replay-rate health
        signal with an alarm threshold. Region availability (eu-west-2) was verified on a stated
        date. INTENT-level fallback is proportionate for a designed-unbuilt system because the
        re-eval fires before any build commits.
      compensating_control: "CD.27 discipline point 6 (maturity monitoring + DynamoDB fallback) + T4.2 exit c1"
      control_property_match: "Same property (substrate API stability): the control is a designed exit ramp evaluated before each increment of exposure; it would fail only if regression appeared after the 12-month window with the fallback unexercised -- at which point checkpoint-replay-rate alarms still fire."
      decision_or_item_id: "CD.27 / T4.2"
    - candidate: "C8 (telemetry half): per-turn cost telemetry depends on T3.20's deep chain and is missing before unattended runs"
      why_dismissed: >-
        Mis-attributed dependency. T3.20 is the INTERACTIVE-session turn-telemetry item
        (SessionStart/Stop hooks); the executor's per-turn telemetry is owned directly by T4.2
        exit criterion c3 (tokens in/out, cached read/write, est_cost_usd, latency_ms, model_id
        per turn via the agent_sdk shim, T0.8) -- on the loop's own critical path, not behind
        T3.20. The cost-CAP half of C8 is real and is carried by EXR-02.
      compensating_control: "T4.2 exit criterion c3 (per-turn telemetry via agent_sdk)"
      control_property_match: "Same property (per-turn cost observability), operating at the persona turn boundary itself; it would fail if T4.2 could complete without telemetry -- it cannot, c3 is an exit criterion."
      decision_or_item_id: "T4.2 / T0.8"
    - candidate: "C9: no governed autonomy story in the T4.2->T4.4 window"
      why_dismissed: >-
        The window is governed by construction: T3.4 -- which T4.2 depends_on -- requires
        'Autonomy maturity gates A0-A3 documented and live', so gates exist BEFORE the loop first
        runs; the T4.1 concurrency=1 ceiling and the CD.17 freeze (active through T4.2's 14-day
        grace window, i.e. the entire earliest window) bound authority meanwhile, and the VF-11
        amendment blocks unattended merges on structural-only oracles even after unfreeze. The
        residual ambiguity (which item's gate semantics govern, rollback-at-birth) is real and is
        filed narrowly as EXR-06 rather than as the absent-governance hypothesis.
      compensating_control: "T3.4 exit criterion (A0-A3 live) as a T4.2 dependency + CD.17 grace window + T4.1 concurrency=1"
      control_property_match: "Same property (bounded authority between first-run and full gate machinery): the dependency edge makes an ungated T4.2 completion structurally impossible; it would fail if T4.2 could complete with T3.4 open -- depends_on forbids that."
      decision_or_item_id: "T3.4 / CD.17 / T4.1"
    - candidate: "C10 (ownership half): no T4 item owns the deploy-and-observe tail; the CD.35/CD.16 lean is an unspecified hole"
      why_dismissed: >-
        The LEAN itself is deliberate, ratified reuse, not an unowned hole: terraform application
        rides the live Decision 92/CD.35 pipeline (convergence record, gated Environment, apply
        failures wired to ci-rca); Lambda deploys ride CD.16 per-Lambda plan steps executed
        in-loop under the Decision 77 sandbox model; observation is owned by T3.2 (causal chain),
        T3.3 (anomaly->rec), and T4.1's alarm criteria. Building a T4-owned apply path would
        CONTRADICT CD.38's sole-runner generalisation. The genuinely defective residue -- the
        contradictory CD.27 escape-hatch example and the observed rec-2523 deadlock on the leaned-on
        path -- is filed narrowly as EXR-07.
      compensating_control: "Decision 92 (Wave 1 shipped, behaviourally proven) + CD.16 per-Lambda gating + T3.2/T3.3"
      control_property_match: "Same property (merged change applied and next state observed): the apply pipeline is production-proven with server-side convergence refusal; it would fail if it did not exist or were unratified -- it is both live and ratified."
      decision_or_item_id: "Decision 92 / CD.35 / CD.16 / T3.3"
    - candidate: "C12: single-region (eu-west-2) executor is a frontier resilience gap"
      why_dismissed: >-
        Deliberate cost/complexity posture consistent with the platform's sandbox-first,
        near-zero-cost operating decisions; a region outage stalls the loop (recs queue durably;
        Step Functions Standard executions and the warehouse survive) rather than corrupting
        state, and the human fallback surface (CC-web) is region-independent. Catalog-layer DR is
        separately owned (OQ.9, Decision 88 dump cadence). Multi-region autonomy for a
        sole-developer sandbox platform would be engineering theatre.
      compensating_control: "Decision 77 (single-account sandbox posture) + durable queue/warehouse + OQ.9/Decision 88 DR"
      control_property_match: "Adjacent property, honestly stated: nothing makes the executor regionally redundant; the controls convert a region outage from a data-loss event into a bounded availability event, which is the property that matters at this risk appetite. Recorded as an argued, deliberate exception (NS-F allows these)."
      decision_or_item_id: "Decision 77 / OQ.9 / Decision 88"

