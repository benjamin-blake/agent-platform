audit:
  meta:
    audited_commit: 7d57a0d
    base_branch: main
    model: "Claude (Anthropic frontier model; exact model id withheld from repo artefacts per session policy)"
    methodology_version: 1
    scope_surfaces: [orchestration, personas, verification, autonomy-governance, plan-entities, scheduled-agents, shared]
    degraded_dedup: false
    contract_notes: ""
    stale_anchors: []    # every section-10 anchor resolved within +/-6 lines of its stated position at 7d57a0d

  question_answers:
    - q: Q1
      verdict: partial
      basis: [EXR-01, EXR-04, EXR-06, EXR-07]
      prose: >-
        Walking the loop (rec -> plan -> critique -> implement -> review -> verify -> merge ->
        deploy -> observe -> next): plan/critique/implement/review are owned and well-specified
        (T4.1 state machine + T4.2 personas + T4.5-T4.7 plan entities); verify is owned and
        strongly specified by CD.38/T4.9. No transition is ABSENT -- every leg has an owning
        item/CD -- so the verdict is partial, not insufficient. But two transitions are
        mis-sequenced and two are under-specified. Mis-sequenced: the MERGE transition's only
        owner (T4.9: callback protocol, PRE_PASS-permits-merge, SHA binding) is deferred_post_mvp
        while Decision 93 places merge inside the MVP critical path, and the CD.27/T4.1 state
        machine ends at file_pr -> emit_telemetry with no merge/deploy/observe states (EXR-01).
        Under-specified: the loop HEAD -- pick_rec's eligibility predicate is not bound to the
        relevance verdict (T3.8), automatable/risk fields, or the Decision 117 self-modification
        boundary by any T4.1 exit criterion (EXR-04); and the deploy TAIL leans on the ratified
        CD.35/Decision 92 apply path through a seam that is contradictorily documented (CD.27's
        in-executor "terraform apply" escape-hatch example vs the ratified GH-Actions apply
        authority) and has an observed human-required deadlock mode (rec-2523) (EXR-07).
    - q: Q2
      verdict: competitive
      basis: [EXR-08, EXR-01, EXR-02, EXR-04]
      prose: >-
        1 row missed (row 12, persona eval harness), none of rows 4/5/11 missed -> competitive by
        the pinned aggregation. The design's verification leg (row 4) and orchestration substrate
        (row 1) are genuinely frontier-grade; the misses/partials cluster where governance items
        (T4.9/T4.10/T4.11) were parked post-MVP while the capabilities they govern go live at MVP.
        A design-level strength worth naming: the plan-entity RBAC (critic cannot author plan
        bodies, planner cannot flip status) is a separation-of-duties pattern most industrial
        agent systems lack.
      external_checklist:
        - {property: "1. Durable workflow orchestration with checkpoint-replay", rating: met,
           evidence: "CD.27 three-layer substrate; Step Functions Standard 1-yr executions; T4.2 exit c1 forces checkpoint-replay verification (forced timeout resumes from last completed tool call)"}
        - {property: "2. Planner / critic / actor separation with independent critic", rating: met,
           evidence: "T4.2 personas: plan_critic is a fresh-context Durable Function run in Parallel with decision_scout; critique_gate is a deterministic (non-LLM) aggregator; code_reviewer is a distinct persona; T4.5 RBAC verbs make the separation structural (insert_plan vs set_plan_status)"}
        - {property: "3. Bounded autonomy: hard caps on revisions/rounds/attempts/total LLM calls", rating: partial,
           evidence: "T4.11 specifies every named cap, enforced by Step Functions state not prompt discipline -- but it is deferred_post_mvp (EXR-02). Interim controls property-match the retry axis (deterministic-only retries, Decision 55) and the fleet axis (concurrency=1) but NOT the revision-cycle axis: critique_gate may route back to plan_agent unboundedly at MVP"}
        - {property: "4. Verification the actor cannot control or self-certify", rating: met,
           evidence: "CD.38: GitHub Actions sole verifier, AWS never runs validate.py in-cloud; TAP two-tier merge/promote split; VF-12 differential verify runs in GH Actions; CD.17 VF-11 amendment blocks unattended merges on structural-only oracles; no persona marks its own work green"}
        - {property: "5. Least-privilege sandboxing: per-persona tool lists, scoped IAM, self-mod boundary", rating: partial,
           evidence: "T4.1 per-Lambda IAM execution roles (CD.10 two-principal model); T4.2 per-persona MCP tool allow-lists; Decision 117 capabilities.yaml boundary SSOT exists. But contract-level enforcement (forbidden_tools, 'no persona may merge/close/apply') is deferred T4.10, and no T4 criterion binds the new substrate to the boundary SSOT (EXR-04)"}
        - {property: "6. Progressive autonomy with human-ratified gates AND automatic rollback", rating: met,
           evidence: "T4.4: A0-A5 each with entry/exit AND rollback criterion; threshold breach auto-flips gate to An-1 + files source='autonomy_rollback' rec; forward AND rollback formal changes human-ratified; T3.4 requires A0-A3 documented and live BEFORE T4.2 completes (it is a T4.2 dependency)"}
        - {property: "7. Concurrency control via semantic locks (not file overlap alone)", rating: met,
           evidence: "CD.37/T4.8: deterministic semantic lock derivation (files, contracts, tables, manifests, verbs, tf roots, decisions) + lease protocol in the governed ops plane; correctly sequenced -- inert until T4.4 raises concurrency above 1, so the deferral is property-matched to concurrency=1"}
        - {property: "8. Full-fidelity per-turn observability", rating: met,
           evidence: "T4.2 exit c3: rec_id, step_id, turn_index, model_id, tokens_in/out, cached_tokens_read/written, est_cost_usd, latency_ms per turn via agent_sdk; T4.1 CloudWatch p50/p99 + execution success/failure alarms filing recs"}
        - {property: "9. RCA-on-failure with permanent forward-fix", rating: met,
           evidence: "Decision 55 preserved verbatim in CD.27; retries deterministic-only, LLM-judgment failure -> rec/RCA, never retry-on-bad-output; T4.1/T4.9 route every verdict-wait timeout to ci-rca, never silent re-wait"}
        - {property: "10. Provider-agnostic inference transport + model-tier routing", rating: met,
           evidence: "CD.28/T4.2: LiteLLM sole transport; Tier 1 DeepSeek-direct, Tier 2 Anthropic-direct, per-persona model-tier mapping via the inference-provider contract; residuals owned (KG.3 intent re-read; KG.7 cold Tier 3)"}
        - {property: "11. Idempotency / exactly-once under retries; verdict-to-head-SHA binding", rating: partial,
           evidence: "T4.9 specifies task-token correlation ids, duplicate/stale-callback rejection, callback auth, and merge-only-when-callback-SHA==PR-head -- but is deferred_post_mvp (EXR-01). Interim property-matched control: the live main-protection ruleset (Decision 83) requires green checks on the current head SHA, and file_pr is specified idempotent (T4.1)"}
        - {property: "12. Offline evaluation / regression harness for the personas themselves", rating: missed,
           evidence: "No tier_item or CD owns pre-deploy persona-quality regression (does a plan_agent prompt change regress plan quality?). T3.7 meta-validates validate.py, not persona output. Existing controls are reactive, not offline: CD.27 14-day stability baselines and T4.4 rollback detect regression only in production; the prompt-quality scheduled agent (T4.3) is advisory review, not a regression harness (EXR-08)"}
    - q: Q3
      verdict: unsound
      basis: [EXR-02, EXR-01, EXR-03]
      prose: >-
        Per-item: T4.8 (locks) -- correctly deferred; concurrency=1 property-matches it exactly and
        CD.37 states the inertness condition. T4.9 (handshake/SHA binding) -- mis-sequenced: merge
        is inside the Decision 93 MVP critical path, so the protocol governing merge cannot sit
        post-MVP; partially compensated by the live GitHub main-protection ruleset, hence a high
        (not critical) finding (EXR-01). T4.10 (persona contracts) -- mis-sequenced by its own
        text: "T4.2 persona implementations MUST conform to these contracts" and "author before /
        with T4.2", while parked post-MVP; T4.2's informal per-persona allow-lists partially
        compensate (EXR-03). T4.11 (loop budgets) -- MVP-critical with NO interim substitute for
        the revision-cycle axis: deterministic-only retry bounds transport failures and
        concurrency=1 bounds the fleet, but nothing bounds plan->critique->revise cycling or total
        LLM calls per rec at the point the loop first runs unattended, and the platform's own
        history (rec-449 critique-cycling deadlock, cited in Decision 55) proves the failure mode
        is real (EXR-02). One MVP-critical containment control deferred with no interim substitute
        pins the verdict at unsound. The fix is cheap: re-sequence T4.9's minimal
        callback+SHA-binding slice and T4.11 (with T4.10's contract slice or a re-pointed dep)
        ahead of the MVP boundary; no design work is missing, only placement.
    - q: Q4
      verdict: sound
      basis: [EXR-07]
      prose: >-
        The CD.27 bet is well-hedged risk-by-risk. Step Functions Standard: ratified precedent
        (Decision 39), 1-yr executions fit the per-rec lifecycle. Lambda Durable Functions (~5
        months GA): explicitly hedged -- DynamoDB self-checkpoint fallback with a 12-month
        re-evaluation trigger re-checked at each T4.2 atomic-plan filing, a checkpoint-replay exit
        criterion, and a health-signal alarm; that the fallback is INTENT-level is acceptable for
        a designed-unbuilt system because the re-eval trigger fires before build. 256 KB state
        limit: S3-pointer pattern is the standard remedy and is a stated discipline point. ECS Run
        Task escape hatch: sound, except its "terraform apply" example contradicts the ratified
        apply authority (EXR-07, documentation-level). LiteLLM sole transport: a single-library
        dependency but two live providers; the both-providers-down stall is a known, owned gap
        (KG.7.2). Single region: a deliberate cost/complexity tradeoff consistent with the
        sandbox-first posture (Decision 77); an outage stalls the loop, it does not corrupt state.
        No unhedged frontier-fragility found.
    - q: Q5
      answers:
        - question: "(a) What governs autonomy between T4.2 (loop first runs) and T4.4 (A-gates land)?"
          answer: >-
            The window is governed, not bare: T3.4 -- a hard T4.2 dependency -- requires "Autonomy
            maturity gates A0-A3 documented and live" before T4.2 can complete, and the T4.1
            concurrency=1 ceiling, the still-active CD.17 freeze during the 14-day grace window,
            and the VF-11 merge-authority discipline (structural-only oracles route to human) all
            bound the window. Residual: A-gate ownership is split across T3.4 (A0-A3) and T4.4
            (A0-A5 + rollback contract), and the rollback contract arrives only with T4.4 (EXR-06).
          basis: [EXR-06]
        - question: "(b) Does any T4 item own the deploy -> observe tail, and is the CD.35/CD.16 seam specified?"
          answer: >-
            No T4 item owns the tail; the lean on existing paths is mostly deliberate and mostly
            sufficient -- terraform deploys ride the ratified, live CD.35/Decision 92 apply
            pipeline; Lambda deploys ride CD.16 per-Lambda plan steps executed by implement_agent
            (sandbox model, Decision 77); observe is owned by T3.2 (causal chain), T3.3 (anomaly
            analysis -> recs), and T4.1 alarms. But the seam itself is unspecified and its
            documentation is contradictory (CD.27's in-executor terraform-apply example vs CD.38's
            sole-runner rule and Decision 92), and rec-2523 (observed) shows the apply path has a
            guard-BLOCK red-record deadlock requiring an out-of-band admin apply -- a
            human-required recovery mode on the loop's deploy leg that no T4 item addresses.
          basis: [EXR-07]
        - question: "(c) Is there a rec-quality / eligibility gate before autonomous execution, beyond freshness?"
          answer: >-
            The parts exist -- T3.8 relevance verdicts (complete; its intent says evaluated before
            a rec is "(post-freeze) executed"), portal Tier-B structural validation at write time,
            writer-derived automatable/risk fields, and the Decision 117 boundary SSOT -- but no
            T4.1 exit criterion composes them into pick_rec's admission predicate. As written,
            pick_rec is "poll priority queue, return rec_id"; nothing in T4 binds it to relevance,
            automatable, risk ceiling, or the self-modification boundary (EXR-04).
          basis: [EXR-04]
        - question: "(d) Is there a per-rec cost cap / cost-runaway alarm before the loop runs unattended?"
          answer: >-
            Alarms yes, caps no. Detection is well-covered: T4.2 c3 per-turn est_cost_usd, T4.1
            CloudWatch alarms filing recs, the CD.27 stability definition's cost-per-rec <= 1.5x
            baseline signal, and the monthly Anthropic-pool utilisation monitor. Enforcement (a
            hard per-rec budget that STOPS the execution) exists only in deferred T4.11 -- an
            alarm that files a rec does not bound the spend of the execution that triggered it
            (EXR-02).
          basis: [EXR-02]
        - question: "(e) Does the roadmap own the transition from the frozen single-process executor to the Step Functions substrate?"
          answer: >-
            Partially. Concept carry-forward is owned piecemeal (T4.2 reuses
            config/agent/executor/prompts/; T4.1's emit_telemetry is the named replacement for the
            frozen local telemetry write sites; T3.10 flips verification consumption), and T-1.22's
            replacement-closure check is a discipline-level backstop at completion time. But no
            item owns the cutover decision itself -- the disposition of scripts/execute_recommendation.py
            and scripts/executor/* (retire, harvest, or dual-run) -- and T3.10 (live) invests
            enforcement work in the frozen executor's code while the substrate that replaces it is
            being designed (EXR-09).
          basis: [EXR-09]
        - question: "(f) Does any item own the adversarial-input / prompt-injection threat model?"
          answer: >-
            No. Dedup searches over the roadmap, DECISIONS.md, and the rec cache find no owner for
            hostile-content handling in persona context. The ingress surface is narrower than a
            public-facing agent's -- rec writes are IAM-authenticated, merges are
            branch-protected -- but real: rec context can embed content lifted from CI logs
            (ci-rca), repo/diff content includes externally-authored dependency changes, and both
            plan_agent and code_reviewer are LLM personas equally steerable by injected text.
            Independent CI (NS-C) verifies correctness, not intent, so it does not property-match
            this threat (EXR-05).
          basis: [EXR-05]
        - question: "(g) When observe detects a post-deploy regression and auto-revert is forbidden, what closes the recovery seam?"
          answer: >-
            Forward-fix IS the loop, and the design closes it without a structural human: T3.3 /
            T4.1 alarms file the regression rec, the queue feeds it to the next iteration, and
            T4.4's automatic autonomy-rollback (gate flips to An-1 + rec filed) bounds systemic
            regression while the fix lands. Executor-machinery regressions route to the human
            EXCEPTION path by design (automatable=false, Decision 117) -- consistent with NS-A,
            which excludes the exception path. The seam's practical closure depends on EXR-04
            (the regression rec must actually be eligible for pick_rec) but is otherwise sound.
          basis: [EXR-04]
        - question: "(h, extension) Who holds the GitHub-side credential that files and merges PRs, and how is it scoped per persona?"
          answer: >-
            Unnamed. T4.1's IAM exit criteria cover the AWS side only; file_pr "via gh" implies a
            PAT or GitHub App credential whose scopes, storage, rotation, and persona-level
            isolation (why would plan_agent's environment ever hold it?) appear in no T4 exit
            criterion. The Decision 83 ruleset constrains what the credential can do to main, but
            credential scoping itself is a gap the T4.1/T4.9 atomic plans should name. Not filed
            as a separate finding (it is an implementation-plan-level specification within
            EXR-01's re-sequencing remit).
          basis: [EXR-01]
        - question: "(i, extension) Is there a single named operator kill-switch for the loop?"
          answer: >-
            Mechanically yes (disable the EventBridge trigger; set state-machine concurrency to 0),
            but no exit criterion names a stop control, its authority, or its test. Frontier
            systems treat the kill-switch as a tested artefact, not an implied capability. Cheap
            to add to T4.1's observability/alarm criteria at atomic-plan time.
          basis: []
        - question: "(j, extension) What happens to in-flight (up to 1-year) executions when personas, prompts, or the state-machine definition redeploy mid-rec?"
          answer: >-
            Unowned. Step Functions pins an execution to its definition version at start, but
            Durable Function persona code/prompts redeploying mid-checkpoint-replay is a version-
            skew mode no item names. At concurrency=1 with per-rec executions the blast radius is
            one rec, and RCA-first catches the failure -- acceptable at MVP, worth a line in the
            T4.2 atomic plans.
          basis: []

  per_surface_assessment:
    - surface: orchestration
      maturity: strong
      strengths: >-
        Design-maturity rating (nothing is built). Clean three-layer decomposition with the state
        machine as the containment plane; per-Lambda IAM; every verdict-wait state carries
        heartbeat/timeout routing to ci-rca; escape hatch and S3-pointer discipline pre-empt the
        two classic Step Functions failure modes.
      top_gaps: [EXR-04, EXR-07]
    - surface: personas
      maturity: strong
      strengths: >-
        Design-maturity rating. Checkpoint-replay with a verified-by-forced-timeout exit
        criterion; per-persona prompts, model tiers, and tool allow-lists; per-turn telemetry to
        the cached-token grain; hedged substrate bet.
      top_gaps: [EXR-03, EXR-08]
    - surface: verification
      maturity: strong
      strengths: >-
        Design-maturity rating. The strongest design on paper: sole-external-oracle rule
        (CD.38), TAP two-tier merge/promote, SHA-bound merge with stale/duplicate-callback
        rejection, differential verify in CI, VF-11 merge-authority discipline. The gap is
        placement, not design (EXR-01).
      top_gaps: [EXR-01]
    - surface: autonomy-governance
      maturity: solid
      strengths: >-
        Design-maturity rating. A0-A5 gates with per-gate rollback criteria and automatic
        rollback-rec filing; human-ratified transitions; semantic-lock model correctly keyed to
        the concurrency raise.
      top_gaps: [EXR-02, EXR-06]
    - surface: plan-entities
      maturity: frontier
      strengths: >-
        Design-maturity rating, not a built-state rating. The most complete surface: SCD2 plan
        entities with verb-RBAC separation of duties (critic cannot author, planner cannot
        approve), machine-actionable revision directives, authority-flip explicitly timed to the
        autonomous producer's existence (Decision 87), and a staleness story (base_commit_sha +
        divergence check) gating decoupling before it can hurt.
      top_gaps: []
    - surface: scheduled-agents
      maturity: frontier
      strengths: >-
        Design-maturity rating, not a built-state rating; thinnest surface but no confirmed
        defects. Reuses the persona substrate; substrate choice deliberately left to the atomic
        plan with a documented-rationale exit criterion; provider routing reconciled by Decision
        116; the rec-curator producer-repoint caveat is documented where it will be read.
      top_gaps: []
    - surface: shared
      maturity: strong
      strengths: >-
        Design-maturity rating. Decision 93's no-live-dep validator, the CD.17 structural
        reversal trigger, and RCA-first give the cross-cutting skeleton real enforcement teeth;
        gaps are the two novel absences (threat model, cutover ownership).
      top_gaps: [EXR-05, EXR-09]

