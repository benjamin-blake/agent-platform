  per_workflow_assessment:
    - workflow: orient
      maturity: strong
      strengths: >-
        Cleanest of the three: hard read-only contract, deterministic-signal health check (Decision 59
        applied by name), status-trusted-never-inferred stated and honored, explicit degradation rules
        (ambiguous slug mapping -> raw commit list; absent signal -> UNKNOWN, no resolving reads),
        egress budget respected by design (cache-only reads), and the freshness gate correctly
        referenced from the planning skill instead of re-authored.
      top_gaps: [WF-07, WF-11, WF-19]
    - workflow: plan
      maturity: solid
      strengths: >-
        Strong intent-capture discipline (structured decomposition, 2-5 ranked questions, explicit
        human confirmation gate with auto-approval explicitly excluded), two genuinely well-designed
        isolation gates (decision-scout, plan-critique) with fresh-context anti-bias rationale, a
        Pydantic-validated handoff artifact, assessment-time vs commit-flow rebase distinction, and
        the Tier Item Freshness Gate closing the roadmap-lag class of dead work.
      top_gaps: [WF-05, WF-04, WF-06, WF-08, WF-10]
    - workflow: implement
      maturity: solid
      strengths: >-
        The Live Verification Protocol is genuinely industry-grade (VP-failure-is-not-negotiable, no
        env-blocked euphemisms, compliance table, V3 merge gate with human deploy confirmation), the
        bookkeeping walk has real idempotency/orphan/loss-detection design, closes_criteria flips are
        strictly declaration-scoped, and the commit flow is event-driven rather than polled.
      top_gaps: [WF-01, WF-02, WF-03, WF-09, WF-13]

  gate_fitness:
    - gate: decision-scout
      verdict: fit
      enforced: blocking
      evidence: ".claude/commands/plan.md:66-87 (MANDATORY, pre-presentation; BLOCK -> STOP + pivot + re-dispatch); planning SKILL.md:292-315 (verdict handling, 3-loop convergence cap)"
      what_it_misses: >-
        Silent truncation: exhaustiveness rests on self-attestation over a ~230KB file (64 decisions);
        no deterministic completeness echo the caller can verify (WF-18). Its output is also not
        required to land in the plan artifact, so the isolation win is re-bought by /implement's full
        DECISIONS.md read (WF-04). Caller defines no behavior for a subagent error (WF-08). Runtime
        token cost ~55-60k per dispatch, re-paid on every material revision; the '25k' cost claim is
        stale by >2x (WF-14).
      what_it_overdoes: "Little -- the anti-patterns section explicitly suppresses over-citation and keyword-adjacency noise; 1,200-word cap is enforced by self-check."
      tuning: "Add the decisions-triaged count echo (WF-18); require the CITE list + verdict recorded in plan context (WF-04); define gate-error = gate-incomplete -> re-dispatch (WF-08); refresh the cost figure (WF-14)."
    - gate: plan-critique
      verdict: degraded
      enforced: blocking
      evidence: ".claude/commands/plan.md:114-128 ('DO NOT output the completion message until this step completes'; loop on REVISE) -- but the loop is uncapped (WF-17) and no verdict artifact survives the session (WF-08)"
      what_it_misses: >-
        The Decision 85 schema-era failure modes: no closes_criteria presence/open-status check for
        follow-on plans, no verification-tier fitness adjudication (12c checks phase tags only), no
        AC-to-criterion 1:1 mapping check (WF-06). Its mandatory Phase 1 context (~1.09MB across four
        files plus all scope files) cannot fit the gate's window, so under-reading is structural and
        silent (WF-05). Residual legacy aim: plan.prompt.md reference (SKILL.md:51, file deleted at
        T-1.13), .md-plan fallbacks, and a Quality Gate 'Files Read' list absent from the output
        template.
      what_it_overdoes: >-
        Full DECISIONS.md conflict re-scan duplicating the decision-scout pass that ran minutes earlier
        in the same workflow on the same approach -- the costliest read in the gate for the least
        marginal signal.
      tuning: "Targeted retrieval instead of full-file reads (WF-05); add 12l/12m schema checks (WF-06); 3-round convergence cap (WF-17); record Recommendation verdict in plan context (WF-08)."
    - gate: code-review
      verdict: misaligned
      enforced: blocking
      evidence: ".claude/commands/implement.md:75-87 (MANDATORY, auto-trigger, Critical/High must be fixed before proceeding); implement SKILL.md:153-176"
      what_it_misses: >-
        Structurally (post-hoc, non-editing): design-time flaws already ratified at plan time; defects
        in files outside changed+planned+1-level-imports (explicitly out of scope); whether the VP
        table's self-reported results are truthful (it never re-runs verification); and whether the
        implementer's fixes to its Critical/High findings are sound -- the re-review loop exists only
        in the bookkeeping state machine and is keyed to a PROCEED/REVISE verdict the gate never emits
        (WF-03). The documented dispatch (subagent_type: code-review) errors against the current agent
        registry (WF-02). Exemption matching silently no-ops because the referenced DECISIONS.md
        section moved to DECISIONS_ARCHIVE.md (WF-15).
      what_it_overdoes: >-
        Full-repository framing and a read-all-docs step (including the 603KB roadmap) that its own
        scoping rule contradicts; a 7-dimension score table (Infrastructure, Documentation Accuracy,
        LLM Maintainability...) rendered for every branch diff regardless of relevance -- noise that
        dilutes the Critical/High signal the caller actually consumes (WF-15).
      tuning: "Fix the dispatch idiom (WF-02); add the deterministic verdict line (WF-03); scope the doc pre-read and drop the full-repo framing, fix the exemptions pointer (WF-15)."

