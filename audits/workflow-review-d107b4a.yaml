  findings:
    - id: WF-01
      workflow: implement
      dimension: D6
      title: "/implement Steps 1 and 6 invoke validate.py flags that do not exist (--ci, --quick)"
      evidence: ".claude/commands/implement.md:28,91 vs scripts/validate.py:259-293 (argparse defines only --pre/--coverage/--terraform-only/--ignore-budget[-reason]/--update-sloc-budgets; live run of both flags returns 'error: unrecognized arguments'; git log -S finds no commit on origin/main ever adding either string)"
      evidence_kind: static
      current_behavior: >-
        Step 1's pre-implementation CI gate is 'bin/venv-python -m scripts.validate --ci' and Step 6's
        final gate is 'scripts.validate --quick'; both exit 2 with an argparse error carrying no
        'Failed checks:' output, so Step 1's parse-and-file-recs instruction cannot execute and Step
        6's 'must exit 0 before continuing' is unsatisfiable as written. Agents must silently
        substitute a different command, making the merge gate's verification improvised.
      ideal_behavior: "Every gate command in the workflow is literally executable; the gate the agent runs is the gate the instruction names."
      gap: "Two mandatory validation gates reference a CLI surface absent from this repo's history."
      change_type: clarify
      proposed_change: >-
        implement.md:28 'scripts.validate --ci' -> 'scripts.validate --pre' (fast tier, matching the
        two-tier model); implement.md:91 'scripts.validate --quick' -> 'scripts.validate' (full tier,
        matching implement SKILL.md:349-350 'Run the full gate locally first' and AGENTS.md). Reword
        Step 1's failure handling to reference --pre's actual failure output.
      acceptance: "grep -n '\\-\\-ci\\|\\-\\-quick' .claude/commands/implement.md returns nothing; both replacement commands parse (exit != 2)."
      gate_ref: ""
      context_economy_ref: []
      severity: high
      severity_rationale: "high clause 'loop-slowing friction / material rework': fires on every /implement session and leaves the merge gate's verification improvised. Not critical: the implement skill separately names the correct full-gate command, which sampled sessions demonstrably run."
      confidence: CONFIRMED
      roadmap_crossref: {classification: NOVEL, item_ids: [], dedup_search_terms: "recs cache: '--ci', '--quick' (12 lines contain 'quick', none about the flag; rec-610 is a distinct historical failure); roadmap tier_items scan for implement.md", dedup_hit_count: 0, note: "no open rec or tier_item covers the stale flags"}
      effort: XS
      depends_on: []
      sequencing: {safe_to_queue_now: true, blocked_behind: "", note: "independent two-line fix"}

    - id: WF-02
      workflow: implement
      dimension: D4
      title: "Code-review gate dispatch names a subagent type that does not exist in the agent registry"
      evidence: ".claude/commands/implement.md:76 + .claude/skills/implement/SKILL.md:157 ('subagent_type: code-review') vs .claude/agents/ containing only scheduled/{ci-rca,rec-curator}.md (subdirectory; does not register) -- the live registry exposes no code-review type; the legacy .github/agents/code-review.agent.md was deleted at T-1.13"
      evidence_kind: static
      current_behavior: >-
        The MANDATORY Step 5 gate instructs Agent-tool dispatch with subagent_type: code-review, which
        errors against the current registry; the fallback path is undefined, so each session improvises
        (typically general-purpose + Skill) -- unlike the decision-scout and plan-critique gates, which
        correctly document subagent_type: general-purpose + Skill-tool invocation.
      ideal_behavior: "All three gates use the same working dispatch idiom; a mandatory gate's documented invocation never errors."
      gap: "One of three gates documents a broken dispatch; execution depends on improvisation."
      change_type: retune_gate
      proposed_change: >-
        implement.md:76 and SKILL.md:157: replace with subagent_type: "general-purpose" plus an
        explicit prompt instruction to invoke the code-review skill via the Skill tool and return its
        structured output verbatim (mirroring plan.md Step 6a/9). Alternative (out-of-scope file,
        noted as dependency only): author .claude/agents/code-review.md.
      acceptance: "grep subagent_type over both files shows only registered types; a live dispatch of the documented invocation does not error."
      gate_ref: code-review
      context_economy_ref: []
      severity: high
      severity_rationale: "high: a mandatory gate's documented invocation is broken and its error path undefined. Not critical: the instruction text still blocks, and 484 code-review-sourced recs in the cache show reviews do run via improvised dispatch."
      confidence: CONFIRMED
      roadmap_crossref: {classification: NOVEL, item_ids: [], dedup_search_terms: "recs cache: 'code-review' (rec-568 = run_skill --target breakage, different dispatcher; rec-436 targets deleted .github/agents files); roadmap scan", dedup_hit_count: 2, note: "adjacent recs exist; none covers the nonexistent subagent_type"}
      effort: XS
      depends_on: []
      sequencing: {safe_to_queue_now: true, blocked_behind: "", note: ""}

    - id: WF-03
      workflow: implement
      dimension: D4
      title: "Implement skill branches on a code-review PROCEED/REVISE verdict the code-review skill never emits"
      evidence: ".claude/skills/implement/SKILL.md:316-318 (bookkeeping commit on 'PROCEED', discard + re-review on 'REVISE') vs .claude/skills/code-review/SKILL.md:150-204 (output contract: severity-grouped findings, scores, findings JSONL -- no verdict line)"
      evidence_kind: static
      current_behavior: >-
        The parallel-with-code-review state machine commits staged roadmap criterion flips when the
        review 'returns PROCEED' and discards/re-reviews on 'REVISE', but the gate's output contract
        contains no such token; each session must invent the findings-to-verdict mapping, so the
        commit/discard/re-review trigger for staged status flips is non-deterministic (Decision 59).
      ideal_behavior: "Producer output contract and consumer branch conditions share one explicit deterministic token."
      gap: "Caller-consumer contract mismatch on the signal gating a roadmap-bookkeeping commit."
      change_type: retune_gate
      proposed_change: >-
        code-review SKILL.md output format: add a final mandatory line 'Verdict: PROCEED | REVISE' with
        the deterministic rule 'REVISE iff any Critical or High finding, else PROCEED'; implement
        SKILL.md:316 references that rule explicitly.
      acceptance: "Both files carry the identical verdict rule; the output template ends with the Verdict line."
      gate_ref: code-review
      context_economy_ref: []
      severity: high
      severity_rationale: "high: the commit trigger for staged status flips is undefined -- approaches the critical status-flip clause, but the flips remain gated on the verified VP pass and (for complete) explicit human confirmation."
      confidence: CONFIRMED
      roadmap_crossref: {classification: EXTENDS, item_ids: ["T-1.10"], dedup_search_terms: "recs cache + roadmap: 'PROCEED', 'code-review verdict'", dedup_hit_count: 0, note: "T-1.10 (complete) shipped the consumer state machine; nothing tracks the producer-side verdict"}
      effort: XS
      depends_on: []
      sequencing: {safe_to_queue_now: true, blocked_behind: "", note: "pairs naturally with WF-02"}

    - id: WF-04
      workflow: plan
      dimension: D3
      title: "Handoff loses the decision-scout output: /implement re-buys the full DECISIONS.md read the scout gate exists to avoid"
      evidence: ".claude/commands/implement.md:50 ('Also read docs/PROJECT_CONTEXT.md and docs/DECISIONS.md before proceeding') vs docs/DECISIONS.md = 229,638 B (~55-60k tokens); planning SKILL.md:294 justifies the scout subagent precisely to keep this cost out of agent context. Observed: 97 of 110 docs/plans/PLAN-*.yaml already record the scout verdict + CITE list in context (e.g. PLAN-candidate-decision-ratification.yaml: 'Decision-scout verdict: FLAGS_FOUND ... CITE: Decisions 76, 84, 86, 88, 90, ...') -- an uninstructed practice."
      evidence_kind: observed
      current_behavior: >-
        /plan pays a subagent dispatch to isolate the DECISIONS.md cost and produce a CITE list; the
        planning skill never instructs writing that list into the plan; /implement then instructs a
        full DECISIONS.md read into the executing agent's window, re-deriving what the scout found.
        Plan authors already copy the scout output into context, so the instructed re-read is pure
        redundant cost and the instructed handoff is lossier than actual practice.
      ideal_behavior: "PLAN-{slug}.yaml is the complete brief: the scout CITE list + verdict is a required context entry, and /implement reads only the cited decision sections (targeted grep by id), never the whole file."
      gap: "Uninstructed-but-universal practice on the producer side; ~55-60k tokens of forced re-derivation on the consumer side."
      change_type: rescope
      proposed_change: >-
        (1) planning SKILL.md plan template context field: add required entry 'Decision-scout verdict +
        CITE list (verbatim decision ids)'. (2) implement.md:50: replace 'and docs/DECISIONS.md' with
        'read ONLY the decisions cited in the plan context (locate each via rg "^## Decision N:"
        docs/DECISIONS.md); do not load the full file'.
      acceptance: "implement.md contains no unconditional full-DECISIONS.md read; the planning template names the scout-output context entry; the next authored plan carries it."
      gate_ref: decision-scout
      context_economy_ref: []
      severity: high
      severity_rationale: "high clause 'handoff context loss': forced re-derivation plus the single largest recurring runtime-context cost in /implement."
      confidence: CONFIRMED
      roadmap_crossref: {classification: NOVEL, item_ids: [], dedup_search_terms: "recs cache: 'DECISIONS.md' + 'implement'; roadmap items T-1.2/T-1.3 reviewed (complete, different direction)", dedup_hit_count: 0, note: "no rec covers the implement-side full read"}
      effort: S
      depends_on: []
      sequencing: {safe_to_queue_now: true, blocked_behind: "", note: "codifies existing practice; no behavior break"}

    - id: WF-05
      workflow: plan
      dimension: D11
      title: "plan-critique's mandatory required-context is ~1.09MB (~270k tokens) -- the gate cannot actually comply with its own Phase 1"
      evidence: ".claude/skills/plan-critique/SKILL.md:4-8,21-31 (MANDATORY full reads) vs measured sizes: ROADMAP-PLATFORM.yaml 603,139 B + DECISIONS.md 229,638 B + ROADMAP-PRODUCT.yaml 209,297 B + PROJECT_CONTEXT.md 49,347 B, before the plan file and every scope file (sampled IMPLEMENTATION plans carry 10-27 scope files)"
      evidence_kind: static
      current_behavior: >-
        Phase 1 is labelled 'MANDATORY - Do Not Skip' and requires four full-file reads whose combined
        size exceeds a 200k window and consumes most of a 1M window before the plan and scope files. A
        compliant subagent cannot do this; real critiques necessarily under-read while implicitly
        reporting compliance, and the Phase 2 decision-conflict check duplicates work the
        decision-scout gate performed minutes earlier on the same approach.
      ideal_behavior: >-
        The gate's required reading fits its window with room for the artifact: read only the roadmap
        items and decision sections the plan names, use the plan's recorded scout CITE list for
        conflict coverage, keep the full-file read where the isolation was designed for it (the scout).
      gap: "Instructed-vs-feasible divergence at the gate most relied on for plan quality; silent under-reading is structural and undetectable."
      change_type: retune_gate
      proposed_change: >-
        plan-critique SKILL.md Phase 1: replace unconditional full reads of ROADMAP-PLATFORM.yaml,
        ROADMAP-PRODUCT.yaml and DECISIONS.md with (a) extract the tier_item/phase ids and decision ids
        the plan names; (b) read only those roadmap items (python extraction) and decision sections;
        (c) conflict-sweep via rg of 2-3 approach keywords over '^## Decision' headers plus the plan's
        recorded CITE list. Update required-context frontmatter to match. PROJECT_CONTEXT.md (49KB)
        stays a full read.
      acceptance: "Phase 1 names no unconditional full read of the three >200KB files; a critique subagent can complete Phase 1 within a 200k window on the largest sampled plan (27 scope files)."
