audit:
  meta:
    audited_commit: 44ef5c6
    base_branch: main
    model: "Claude Code (exact model identifier withheld from repo artifacts per harness policy; stated in the session chat)"
    methodology_version: 1
    cache_availability_note: >-
      Fresh-clone container: the gitignored local caches (logs/.recommendations-log.jsonl,
      logs/.decisions-index.jsonl, logs/.preflight-report.json, logs/.ops-outbox/) do not exist,
      and DuckLake reader calls were forbidden by the audit guardrails. All magnitude counts
      therefore come from committed sources (ROADMAP-PLATFORM.yaml fields, DECISIONS.md, manifests,
      git ls-files); every accumulation claim that would need the recs cache is tagged HYPOTHESIS,
      and dedup searches cover DECISIONS.md + ROADMAP-PLATFORM.yaml only (recorded per finding).
    state_types_swept:
      - candidate_decisions (state pending/ratified/superseded)
      - tier_items by status + exit-criteria ledger (CD.39)
      - open_questions (OQ.1-OQ.15)
      - known_gaps (KG.1-KG.14)
      - cross_tier_gates (G.1/G.8/G.9/G.10)
      - decisions (DECISIONS.md numbering authority + ops_decisions warehouse projection)
      - recommendations (cache absent; magnitude untestable locally)
      - priority_queue (reads DuckLake; not locally auditable)
      - ops outbox (absent in clone; legacy paths per Decision 84 I-4)
      - contracts (ratified vs provisional_v0 + re-ratification triggers)
      - plan documents (docs/plans, PlanDocument schema)
      - handoff documents (docs/handoffs)
      - audit reports (docs/audit-reports, proposal-only lifecycle)
      - INTENT-doc migration manifest (waves 0-5)
      - lambda manifests (active/deprecated/future-state)
      - scheduled agents (schedule.yaml + terraform EventBridge gating)
      - GitHub workflows (live/disabled/prototype)
      - retired-but-retained terraform (ec2_runner.tf)
      - executor local run artifacts (logs/runs, logs/failure-summaries)
      - telemetry write path (dead until T2.36)
      - credential rotation reminders (calendar-based prose)
      - convergence record (S3; monitored by T2.35 sensor - a CLOSED loop, used as baseline)
      - public-portal projections (README/EVALUATION-PROMPTS/SECURITY.md)
      - roadmap document lifecycle (status draft / filed_via pending)
  summary:
    total_findings: 13
    by_classification: {recognized_adequate: 1, recognized_underscoped: 7, unrecognized: 5}
    by_disposition: {close: 7, absorb: 4, eliminate: 1, keep: 1}
    worst_debt_areas:
      - "Governance-state transitions (CD ratification, DECISIONS.md-to-warehouse ETL, OQ/KG resolution) are manual prose acts with no owning lane or trigger"
      - "Retired/disabled substrate residue stays half-alive (scheduled-agent manifest, copilot multiplier refresher, executor local artifacts)"
      - "Prose thresholds and triggers with no deterministic monitor (KG.11 file-size trigger, cost reevaluation triggers, provisional-contract re-ratification, GHAS live-probe)"
    systemic_fix: >-
      (Judgment call.) Generalize the blocked_on_cd pattern (T-1.20) into a single deterministic
      'dormant transitions' preflight surface: pending CDs whose gated work is realized,
      DECISIONS.md entries newer than the warehouse projection, provisional contracts whose
      trigger clock is running, breached prose thresholds (KG.11), and outstanding one-time
      verifications (Decision 83 probe) all become machine-computed rows that /orient ranks,
      with a standing ratification/bookkeeping lane so each surfaced transition terminates in
      an owned act instead of a prose annotation. Most findings below are instances of that
      one missing surface.
    sequencing_note: >-
      Nothing below is blocked behind a pending CD except the terminal step of ULF-07
      (contract ratification lands after CD.25, which ULF-02's lane delivers). ULF-02 is the
      keystone: closing it un-wedges T-1.20 completion, terminates the three
      bootstrap_completion_exempt scopes, and unblocks CD.25/T1.12. ULF-01 is a one-time
      verification act queueable immediately. All ABSORB findings extend already-live
      mechanisms (rec-autoclose.yml, validate_ci_workflow_guards, RoadmapDocument schema,
      checks registry) and are safe to queue now. ULF-06's deletion half is safe now; its
      write-path half lands with the T4.x executor rebuild.
    rejected_candidates:
      - {loop_name: "STRATEGIC-plan freeze accumulation (strategic:true items pile up unplannable)", why_dismissed: "Freeze test: intentionally suspended per Decision 67, and the freeze carries a structural reversal trigger (CD.17 grammar expression keyed to T4.2/T3.2/T3.3), so the expiry-check exists. RECOGNIZED-ADEQUATE."}
      - {loop_name: "Six scheduled agents disabled since 2026-05", why_dismissed: "The disabled state itself is deliberate migration parking; T4.3 exit criteria own re-enable/deletion and the Decision 67 freeze has the CD.17 trigger. Only the un-gated live residue (refresher workflow, stale enabled flags) survived as ULF-05."}
      - {loop_name: "rec-curator priority-queue producer writes to a store nothing reads", why_dismissed: "Freeze-gated and explicitly documented: AGENTS.md runbook caveat forbids re-enabling before the T2.26 producer repoint; T2.26 (in_progress) owns the repoint."}
      - {loop_name: "Credential rotation is calendar-reminder prose (OAuth 90d, DeepSeek/Anthropic quarterly)", why_dismissed: "Consciously deferred via T2.9 (deferred_post_mvp, Decision 93 defer-by-exception); failure mode is non-silent (CI auth errors trigger ci-rca recs per AGENTS.md rotation runbook). Safety carve-out adjacent; KEEP as-is."}
      - {loop_name: "195 deprecated PLAN-*.md files + PlanDocument has no status field / no archival", why_dismissed: "CD.22 explicitly accepts historical .md persistence ('remain ... as archive; not retroactively converted'); the roadmap-side lifecycle is the CD.39 exit-criteria ledger (met_by), and Decision 87/T4.5 queue warehouse-authoritative plan entities as the real fix."}
      - {loop_name: "GitHub-native auto-merge follow-on from Decision 76 has no owner", why_dismissed: "Tracked: AGENTS.md names rec-940 as the durable successor to the comment-wake mechanism. Dedup hit in committed instructions; not unowned."}
      - {loop_name: "INTENT extraction stalls (15/18 docs pending, waves human-gated)", why_dismissed: "T5.5 (in_progress) owns it with per-wave gates and open ledger criteria; the validate.py intent-doc-freeze guard already prevents regression. Pacing is a choice, not an unclosed loop."}
      - {loop_name: "ci-rca.yml TODO(bedrock) 90-day migration window comment", why_dismissed: "Single inline marker with the mitigation named in place; no accumulating state. Dismissed as cosmetic under the precision preference."}
      - {loop_name: "G.9/G.10 grace-period gates evaluate to deferred at runtime", why_dismissed: "By design: T-1.20 shipped the Kleene evaluator; grace_period_elapsed is statically resolvable and item_field_eq deferral is documented as owned by T-1.20 until a verifier-output source exists."}
      - {loop_name: "KG.13 Test Impact Analysis / result caching deferred", why_dismissed: "Explicit trigger exists twice over: T4.4 concurrency >1 precondition plus the Decision 80 measured _FAST_TIER_BUDGET_SECONDS breach trigger wired in scripts/import_governance.py (T3.11)."}
      - {loop_name: "deploy.yml disabled stub + tf-gated-apply-prototype.yml inert workflow", why_dismissed: "Both are documented deliberate placeholders (deploy until SIT/PROD exist per Decision 77; the prototype retained as a re-runnable reviewer-gate proof for T2.22). No state accumulates."}
      - {loop_name: "Roadmap document.status permanently draft", why_dismissed: "Not a separate loop: the terminal transition (draft -> ratified, filed_via -> ops_decisions:dec-NNN) is owned by T-1.1's exit criteria and is subsumed by ULF-02's ratification-lane finding."}
  findings:
    - id: ULF-01
      loop_name: "Decision 83 security-control live-probe: verification promised, no owner, no probe"
      lens: A
      produce:
        what: >-
          Decision 83 (2026-06-08) records the T2.12 security gate as applied but leaves GHAS
          secret-scanning, push protection, and Actions permissions verified only by
          configuration evidence, with live-probe verification explicitly outstanding
          ("one-time UI confirmation recommended"); AGENTS.md carries the same caveat ambiently.
        evidence: "docs/DECISIONS.md:1063"
      transition_gap:
        description: >-
          No rec or tier item owns the confirmation act, and no deterministic probe exists:
          the scripts/checks registry (54 checks enumerated at audit time) contains no GHAS/
          push-protection probe, the CI PAT lacks security_events scope (the reason the probe
          403'd), and T2.12 is already status:complete so no open item surfaces it. LENS A(b):
          terminal transition is manual-only with no trigger; 24 days elapsed.
        evidence: "docs/DECISIONS.md:1063 (403 on alert endpoints); scripts/checks/ registry (no security/GHAS check present - negative enumeration)"
      terminal_state: "A recorded live verification (Decision 83 annotation or closed rec) that secret-scanning + push protection are ACTIVE on the public repo, ideally plus a scheduled probe with a properly-scoped token"
      symptom:
        description: "Confidential-boundary control unverified since Decision 83 landed; if the applied config silently did not take effect, nothing alarms"
        magnitude_count: "24 days since 2026-06-08; 3 of 4 GHAS controls unverified (CodeQL alone has verified successful runs)"
        source: "docs/DECISIONS.md Decision 83 Date field vs audit date 2026-07-02"
      downstream_gated: []
      roadmap_crossref:
        classification: RECOGNIZED_UNDERSCOPED
        item_ids: [T2.12]
        dedup_search_terms: ["live-probe", "security_events"]
        dedup_hit_count: 8
        note: >-
          Hits (DECISIONS.md 3+1, ROADMAP 3+1) are all the SAME caveat restated on Decision 83,
          T2.12 notes, and AGENTS.md; none is an owning item or rec. T2.12 is complete, so the
          annotation is not schedulable work (the 2026-06-09 audit's F-014 flagged the pattern
          of complete items with acknowledged-unmet criteria; this instance remains open).
          Recs cache absent; an open rec cannot be ruled out locally.
      novelty_confidence: HYPOTHESIS
      disposition: CLOSE
      frame_lock_analysis: >-
        Solo-dev residue: verification hinges on a one-time human UI glance that never got
        scheduled, where an agent-era design gives the probe a properly-scoped credential and
        runs it deterministically. Rejected alternative: ABSORB into validate.py - rejected
        because the probe needs a security_events-scoped token CI does not hold; a one-shot
        confirmation rec plus an optional scheduled probe is the honest closure. Safety note:
        this ADDS verification of a confidential-boundary gate; nothing is removed or thinned.
      severity: critical
      severity_rationale: >-
        Critical clause invoked: confidential-boundary risk. The repo is PUBLIC and the
        Decision 101 boundary depends on push protection/secret-scanning as the GitHub-side
        layer behind the local never-commit hook; that layer's live status is unverified and
        its silent-failure mode has no alarm. No downstream item is gated (so the high clause
        does not apply); the risk class, not backlog, drives severity.
      confidence: CONFIRMED
      proposed_closer: "One-time verification rec: confirm secret-scanning + push protection + Actions permissions via UI or a security_events-scoped PAT; record evidence on Decision 83; optionally register a scheduled probe"
      proposed_rec_draft:
        title: "Verify GHAS secret-scanning/push-protection live state and record it on Decision 83"
        context: "Decision 83 (docs/DECISIONS.md:1063) applied the T2.12 security gate but live-probe verification of secret-scanning, push protection, and Actions permissions is outstanding (web PAT lacks security_events); the public-repo confidential-data boundary (Decision 101) treats these as the GitHub-side enforcement layer, and no check in scripts/checks/ probes them."
        acceptance: "DECISIONS.md Decision 83 carries a dated live-probe verification annotation naming the evidence (API responses or UI capture) for all three outstanding controls; if a scheduled probe is added, scripts/checks/ contains it and validate.py full tier runs it green"
      sequencing:
        safe_to_queue_now: true
        blocked_behind: []
        note: "Requires a human-held credential (UI session or scoped PAT); everything else is queueable immediately"
    - id: ULF-02
      loop_name: "Candidate-decision ratification: no lane transitions pending CDs whose gated work is already realized"
      lens: both
      produce:
        what: "candidate_decisions are filed state:pending in the roadmap; the portal primitive that ratifies (file_decision -> ops_decisions:dec-NNN) exists and is proven (CD.16/24/31/33/35/36 ratified through it)"
        evidence: "docs/ROADMAP-PLATFORM.yaml:363 (candidate_decisions); scripts/ops_data_portal.py:1148 (file_decision)"
      transition_gap:
        description: >-
          Nothing owns pending -> ratified: no code assigns CandidateDecision.ratified_as
          (passive schema field), /orient is read-only, decision-scout may not edit
          DECISIONS.md, /implement + T-1.10 bookkeeping flip tier-item status only. T-1.1
          nominally owns ratification but is UNDERSCOPED three ways: scoped to CD.1-CD.19
          only, depends_on T0.7b (not_started) although the agent_instructions ratification-
          vehicle note says the portal ratifies TODAY, and it predates the realized-but-
          pending backlog. Gates read state=="pending" and so keep blocking.
        evidence: "scripts/platform_roadmap.py:382 (ratified_as passive), :754 and :784 (state==pending gates), :318-323 (filed_via validator); docs/ROADMAP-PLATFORM.yaml T-1.1 (depends_on [T0.7b, T-1.5], not_started)"
      terminal_state: "state: ratified + filed_via: ops_decisions:dec-NNN on each CD whose gated work is done; document.status draft -> ratified at CD.1 (T-1.1 exit criteria); bootstrap_completion_exempt scopes terminate"
      symptom:
        description: >-
          31 of 39 CDs pending; at least 5 carry '[Realized ...]' annotations (CD.2, CD.6,
          CD.20 partial, CD.21, CD.26) meaning the gated work landed but the decision never
          ratified; T-1.20 has all 5 exit criteria met yet completion is wedged solely on
          CD.1 pending; all three bootstrap_completion_exempt scopes state they 'end at
          CD.1/CD.25 ratification', which never occurs.
        magnitude_count: "31/39 pending; 5 realized-but-pending; 1 item (T-1.20) fully-met-but-wedged"
        source: "docs/ROADMAP-PLATFORM.yaml candidate_decisions[].state (recomputed), '[Realized' annotations at lines 379/401/668/690/888, T-1.20 progress_note"
      downstream_gated: [T-1.20, T1.12]
      roadmap_crossref:
        classification: RECOGNIZED_UNDERSCOPED
        item_ids: [T-1.1]
        dedup_search_terms: ["ratification vehicle", "Realized", "ratified_as"]
        dedup_hit_count: 12
        note: >-
          The roadmap recognizes the vehicle (agent_instructions ratification-vehicle note,
          audit F-001) and T-1.1 names the act, but T-1.1's exit criteria do not close
          today's loop (wrong dependency, wrong CD range, no cadence). Recs cache absent for
          the second dedup leg.
      novelty_confidence: CONFIRMED
      disposition: CLOSE
      frame_lock_analysis: >-
        Human-team residue: ratification is modeled as a ceremony a standing team would
        batch at a milestone (T0.7b Lambda), while the portal already ratifies today and
        agents do the realization work continuously. Rejected alternative: ABSORB into
        /implement bookkeeping - rejected because ratification is a distinct governance act
        the human must sign (safety carve-out: the lane PREPARES ratification drafts and
        surfaces realized-but-pending CDs; the human ratifies).
      severity: high
      severity_rationale: "High clause: downstream gated (T-1.20 completion, T1.12 via CD.25, exemption-scope termination) AND silent (only the advisory stale_cache_note notices; no count of realized-but-pending CDs is surfaced anywhere)"
      confidence: CONFIRMED
      proposed_closer: "Rescope T-1.1 to the portal vehicle (drop the T0.7b dependency, cover CD.1-CD.39) and add a ratification lane: /orient surfaces realized-but-pending CDs; a human-confirmed /plan session files the dec-NNN batch"
      proposed_rec_draft:
        title: "Rescope T-1.1 into a portal-vehicle ratification lane for realized-but-pending CDs"
        context: "31/39 candidate decisions are pending and >=5 carry [Realized] annotations; T-1.20 is fully met but wedged on CD.1; T-1.1 still depends_on T0.7b although the agent_instructions ratification-vehicle note (audit F-001) made the ops portal the operative vehicle; no code or lane transitions CD state (scripts/platform_roadmap.py:382 passive)."
        acceptance: "T-1.1 depends_on no longer includes T0.7b and its exit criteria cover surfacing realized-but-pending CDs; after the first lane session, CD.1 is ratified (document.status=ratified) and T-1.20 flips complete; bin/venv-python -m scripts.validate passes"
      sequencing:
        safe_to_queue_now: true
        blocked_behind: []
        note: "Keystone finding: unblocks T-1.20, exemption-scope termination, and CD.25 (which ULF-07's terminal needs). Human ratifies; agent prepares."
    - id: ULF-03
      loop_name: "DECISIONS.md -> ops_decisions warehouse ETL has no automated trigger"
      lens: both
      produce:
        what: "Every merged decision adds a DECISIONS.md entry whose Warehouse ID line promises 'synced to ops_decisions via ops_data_portal --backfill-decisions-md post-merge, per Decision 84' (26 such lines; 64 decisions total)"
        evidence: "docs/DECISIONS.md:9 (convention line); scripts/ops_data_portal.py:1252 (backfill_decisions_from_md)"
      transition_gap:
        description: >-
          'Post-merge' has no executor: no workflow, hook, skill, or registered check invokes
          the backfill (negative grep across .github/workflows/, .claude/, scripts/checks/
          recorded zero hits), so warehouse sync depends on someone remembering the CLI call.
          Readers (orient/decision-scout/preflight decision_by_id verb) silently serve the
          stale projection; the only staleness signal is the advisory roadmap-mtime
          stale_cache_note, which watches the roadmap YAML, not DECISIONS.md.
        evidence: "grep 'backfill' across .github/workflows/, .claude/skills/, .claude/commands/, scripts/checks/ = 0 hits (recorded 2026-07-02); scripts/platform_roadmap.py:841-853 (advisory note only)"
      terminal_state: "Each merged DECISIONS.md entry has a corresponding ops_decisions row without manual action, or a deterministic parity check fails loudly when it does not"
      symptom:
        description: "Every decision merge is a chance to skip the sync; parity is unverifiable from a fresh container (reader calls forbidden in this audit), which is itself the symptom - nothing local or CI-side can prove the projection is current"
        magnitude_count: "64 decisions in DECISIONS.md, 26 carrying the manual-sync promise line"
        source: "docs/DECISIONS.md (grep -c '^## Decision' = 64; grep -c 'Warehouse ID' = 26)"
      downstream_gated: []
      roadmap_crossref:
        classification: UNRECOGNIZED
        item_ids: []
        dedup_search_terms: ["backfill-decisions", "post-merge sync"]
        dedup_hit_count: 22
        note: >-
          All 19 DECISIONS.md hits + 3 roadmap hits document the MECHANISM (transport via the
          writer, T0.7b exit criterion keeps the route), none the TRIGGER/automation. Recs
          cache absent, so an open rec cannot be excluded: novelty HYPOTHESIS.
      novelty_confidence: HYPOTHESIS
      disposition: ABSORB
      absorb_into: ".github/workflows/rec-autoclose.yml (existing push-to-main lane with portal write credentials)"
      frame_lock_analysis: >-
        Solo-dev residue: (1) assumption - the one human who authors a decision also remembers
        the follow-up CLI call; (2) removing mechanism - rec-autoclose.yml already runs on
        every main push with DUCKLAKE_WRITER_URL and portal access; (3) cheaper design - one
        conditional job step (DECISIONS.md in the push diff -> run --backfill-decisions-md,
        idempotent upsert by design). Rejected alternative: CLOSE via a new workflow -
        rejected because an existing credentialed lane absorbs it for one step's cost.
      severity: medium
      severity_rationale: "Medium clause: quantified magnitude (64 decisions / 26 manual-sync promises) with no downstream tier item gated; failure degrades reader freshness rather than integrity (DECISIONS.md stays authoritative; backfill is idempotent)"
      confidence: CONFIRMED
      proposed_closer: "Add a DECISIONS.md-diff-gated backfill step to rec-autoclose.yml; optionally add a full-tier parity check (max dec-NNN in md vs warehouse) that fails loudly"
      proposed_rec_draft:
        title: "Trigger ops_data_portal --backfill-decisions-md from rec-autoclose.yml on DECISIONS.md changes"
        context: "Decision 84 makes ops_decisions rebuildable from DECISIONS.md, and every Warehouse ID line promises post-merge sync via --backfill-decisions-md, but nothing invokes it (zero hits in workflows/hooks/checks); readers serve the projection silently stale until a human remembers the CLI call."
        acceptance: "A push to main touching docs/DECISIONS.md runs the backfill step green in rec-autoclose.yml (idempotent on re-run); grep confirms the step is conditioned on the DECISIONS.md path filter"
      sequencing:
        safe_to_queue_now: true
        blocked_behind: []
        note: "Independent of all pending CDs; reuses existing secrets/IAM surface"
    - id: ULF-04
      loop_name: "KG.11 roadmap file-size trigger: breached 3x, self-declared unowned, no deterministic guard"
      lens: both
      produce:
        what: "Every roadmap edit grows docs/ROADMAP-PLATFORM.yaml; KG.11 pinned a split trigger at 2500 lines / 50K tokens and prescribes filing a rec or tier item on breach"
        evidence: "docs/ROADMAP-PLATFORM.yaml:7634-7644 (KG.11)"
      transition_gap:
        description: >-
          The trigger fired long ago and the transition never ran: KG.11's own text records
          'the prescribed rec was never filed ... No tier item owns this yet' as of the
          2026-06-09 audit (F-019), the file has since grown from ~4900 to 7685 lines, and no
          validate.py check watches the threshold (sloc/complexity checks cover .py only), so
          the breach re-surfaces only when a human re-reads KG.11. LENS A(d)+(e): prose
          threshold without guard, surfaced once without closure.
        evidence: "docs/ROADMAP-PLATFORM.yaml:7642-7644 ('No tier item owns this yet'); scripts/checks/sloc/ + scripts/checks/roadmap/validate_platform_roadmap.py (no size check)"
      terminal_state: "Either the per-tier split ships or a ratified decision raises the threshold, and a deterministic size check makes the next breach fail loudly instead of accruing silently"
      symptom:
        description: "The planning skill loads this file per /plan invocation, so the ambient token cost is paid every session (KG.11's own words); the prior audit surfaced it and the loop still did not close, demonstrating the missing guard"
        magnitude_count: "7685 lines vs 2500-line trigger (3.07x), up from ~4900 at the 2026-06-09 audit"
        source: "wc -l docs/ROADMAP-PLATFORM.yaml (recomputed at audited_commit) vs KG.11 threshold text"
      downstream_gated: []
      roadmap_crossref:
        classification: RECOGNIZED_UNDERSCOPED
        item_ids: []
        dedup_search_terms: ["per-tier YAML", "2500", "split"]
        dedup_hit_count: 1
        note: "The only hit is KG.11 itself, which names the gap and its own unownedness; no tier item, CD, or decision owns closure. Recs cache absent for the rec-side check (F-019 asserted 'never filed' as of 06-09)."
      novelty_confidence: HYPOTHESIS
      disposition: CLOSE
      frame_lock_analysis: >-
        Solo-dev residue: a threshold only a human re-reading known_gaps would notice, sized
        for an era when the file was 1500 lines. The agent-era design makes the trigger
        deterministic (a size assertion in validate_platform_roadmap) so breach = red CI, and
        lets the human decide split-vs-raise once, explicitly. Rejected alternative: ELIMINATE
        the threshold (declare big-file acceptable) - rejected because KG.11 names a real
        per-session ambient cost and the decision belongs to the human, not to silence.
      severity: medium
      severity_rationale: "Medium clause: quantified backlog magnitude (7685 vs 2500 lines, growth across two audits) with no downstream item gated"
      confidence: CONFIRMED
      proposed_closer: "File the KG.11-prescribed rec: human decides split-per-tier vs ratified raised threshold; either way add a line/token assertion to validate_platform_roadmap so the next breach fails CI"
      proposed_rec_draft:
        title: "Resolve KG.11: decide roadmap split vs raised threshold and add a deterministic size guard"
        context: "KG.11 set a 2500-line/50K-token split trigger; the file is 7685 lines (3.07x), the 2026-06-09 audit (F-019) already surfaced the breach, and KG.11 still records that no rec or tier item owns it; no validate.py check watches the threshold so the breach accrues silently while the planning skill pays the load cost per /plan session."
        acceptance: "Either ROADMAP-PLATFORM splits per tier with a loader manifest or a ratified decision records the new threshold; scripts/checks/roadmap/ contains a size assertion matching the decided threshold and validate.py full tier is green; KG.11 notes updated to the resolution"
      sequencing:
        safe_to_queue_now: true
        blocked_behind: []
        note: "Human decision (split vs raise) is the only gate; mechanics are freeze-independent"
