audit:
  meta:
    audited_commit: 8fb581e
    base_branch: main
    model: claude-fable-5
    methodology_version: 1
    scope_surfaces: [docs/DECISIONS.md]
    degraded_dedup: false
    contract_notes: >-
      Cache generation succeeded (session_preflight full; 692 open recs in logs/.recommendations-log.jsonl).
      Discovery not named by the prompt: docs/DECISIONS_ARCHIVE.md contains three additional numbered
      entries -- Decisions 52 (:1481), 53 (:1453), 54 (:1432) -- as h3 ('### Decision NN:') headers nested
      after the archive's Decision 26 section. They are visible to the ETL parser (scripts/decisions_md.py:22,
      '#{2,3}') but INVISIBLE to the R1 ratification guard (validate_candidate_decision_ratification.py:22,
      h2-only '^## Decision'). Counted as archive keyspace peers; see DPI-07. rec-1964 (renumber duplicate
      Decision 72 entries) appears already satisfied at HEAD: exactly one '## Decision 72:' header exists.
    stale_anchors:
      - "Prompt anchor 'Decision 68 @ :2499' -- header is at docs/DECISIONS.md:2475; :2499 is its migration-update blockquote."
      - "Prompt anchor 'Decision 26 @ docs/DECISIONS.md:3134' resolves; archive peer at DECISIONS_ARCHIVE.md:1404 resolves; both confirmed."
      - "Prompt structural figure '~18 archived ## Decision headers' matches the 18 h2 headers but omits the 3 h3 entries (52/53/54); recorded in contract_notes."
      - ".claude/skills/decision-scout/SKILL.md Phase-1 quotes live-header count 'currently 67'; re-derived count at HEAD is 81 (observed fact only; out of scope as a finding)."
  question_answers:
    - q: Q1
      verdict: localized-drift
      basis: [DPI-02, DPI-05]
      prose: >-
        Full sweep of all 81 live '## Decision NNN:' headers (none inside code fences; verified).
        64 premise-live, 6 dead-but-annotated, 11 dead-unannotated, 0 indeterminate. Every
        dead-unannotated entry sits in the pre-Decision-77 band (Decisions 23-74); every entry from
        Decision 75 onward is either premise-live or carries an explicit annotation (inline
        [CORRECTED/RESTATED by ...], migration-update blockquote, or status-line supersession marker).
        The drift is therefore localized to the early band, not systemic across the corpus -- but the
        CAUSE (no mechanical invariant) is systemic and is Q2's verdict. Raised-stakes members of the
        dead-unannotated set: Decision 40's moot trigger conditions are still cited as live by
        ROADMAP-PRODUCT.md:755; Decision 58 is still cited as canonical by a live tier-item intent
        (ROADMAP-PLATFORM.yaml:7819); Decision 44 is cited as the boundary authority by live enforcement
        code (config/agent/executor/capabilities.yaml:1) despite supersession by Decision 117; Decision
        35's unconditional "no auto-apply" is inverted for sandbox by Decision 77 with no victim marker.
      premise_class_counts: {premise-live: 64, dead-but-annotated: 6, dead-unannotated: 11, indeterminate: 0}
      archive_eligible_count: 8
    - q: Q2
      verdict: insufficient
      basis: [DPI-01]
      prose: >-
        The absence of a mechanical supersession-annotation invariant is a real gap. The practice is
        demonstrably ad hoc: ~11 victims carry an annotation in one of three shapes (Decision 42 status
        line; Decisions 24/60/62/68/71 blockquotes; Decisions 67/89/92 and the Decision-70-mis-cite trio
        inline amendments) while 11 victims of equally-real supersessions carry none -- grep-verified
        zero mention of the superseder in the bodies of Decisions 35, 37, 40, 43, 44, 49, 58, 80.
        No check in scripts/checks/** or scripts/validate.py mentions supersession (repo-wide search,
        confirmed absent); validate_candidate_decision_ratification.py validates only CD->header pointers.
        The invariant is specified concretely in DPI-01; the point-fix recs (rec-2057/2058/2059,
        rec-917/918) annotate single instances and cannot catch the next one.
    - q: Q3
      verdict: cosmetic-drift
      basis: [DPI-03, DPI-06]
      prose: >-
        Canonical rule re-derived from the dec-086..dec-121 Warehouse ID line text and Decision 105
        (:554, reconciliation :581-583): dec-NNN = the entry's own decision number zero-padded to 3
        digits. 43 in-file lines exist: 35 conform (dec-086..dec-121, contiguous except the absent
        dec-089); 7 carry retired 4-digit writer-era ids (D77:1938=dec-1083, D78:1911=dec-1085,
        D79:1881=dec-1086, D80:1853=dec-1088, D81:1756=dec-1089, D83:1665=dec-1090, D85:1615=dec-1091);
        1 collides (D75:2038 claims dec-081, the canonical id of Decision 81, whose own line reads
        dec-1089). 38 entries carry no line, including modern-band D82, D84 (the decision that defines
        the keying!), and D89 (owned by rec-2278). The backfill ETL is PROVABLY IMMUNE: it keys on the
        header number (scripts/decisions_md.py:90 int(m.group(1)); ops_data_portal.py:1366
        dec-{n:03d}) and never parses the Warehouse ID line -- hence cosmetic-drift, not
        keyspace-hazard. The residual hazard is agent-mediated: update_decision() (ops_data_portal.py:
        1407) accepts a caller-supplied string id, so an agent trusting D75's line and calling
        update_decision("dec-081") would pass the referential check against Decision 81's real row and
        silently corrupt it. The file also contradicts the canonical rule Decision 105 itself
        established, in the same file.
    - q: Q4
      verdict: insufficient
      basis: [DPI-04, DPI-05]
      prose: >-
        Non-(Decided) header statuses at HEAD: D26 "(Agent-decided -- pending review)" (perpetual since
        March 2026, ~3 months unresolved); D27 "(Agent-decided -- approved)" (nonstandard vocabulary);
        D40 "(Decided, Deferred)" (trigger conditions moot: Copilot SDK retired by D49->D116, Bedrock
        retired by CD.28, and the drafted superseding decision in INTENT-provider-agnostic-executor.md:3
        was never filed); D67 "(Amended - Partially Active)" (legitimate, well-maintained); D49/D55
        headers carry only "(Supersedes Decision NN)" with no status; D70 has no header suffix at all.
        The stated archival policy (docs/PROJECT_CONTEXT.md:18: "DECISIONS.md keeps only open decisions
        (resolved decisions archived to DECISIONS_ARCHIVE.md)", crediting strategic_review) has NO
        enforcer: session_preflight.py:1746-1786 computes an advisory open_decisions_count and a
        strategic_review_due flag; no validate.py check exists. Practice contradicts the policy: the H1
        (docs/DECISIONS.md:1) reads "# Open Decisions" over 74 "(Decided)" entries. Recommended
        dispositions (human disposes) are enumerated in DPI-04.
    - q: Q5
      verdict: insufficient
      basis: [DPI-01, DPI-03, DPI-05]
      prose: >-
        Two properties missed, three partial; roll-up is insufficient. Details per property below.
        The record's strengths against conventions are real: entries are retained not mutated,
        superseders name their targets in headers, and the modern band's annotation discipline
        (amend-in-place with dated inline markers) exceeds typical ADR practice.
      external_checklist:
        - property: status-lifecycle
          rating: partial
          evidence: >-
            74/81 headers carry (Decided); 7 stray statuses including one perpetual "pending review"
            (D26, :3134). Property-matched compensating control: session_preflight.py:1746-1753 counts
            non-Decided/Resolved/Closed headers every session and surfaces the count -- it exercises
            exactly this property and its output (open_decisions_count > 0 indefinitely) is currently
            failing-visibly; it is advisory, not gating, which is why the rating is partial not met.
        - property: immutability-with-supersession-links
          rating: partial
          evidence: >-
            Immutability holds everywhere observed: superseded entries are retained (D42 body preserved
            per D90; archive retains full text). Links are ad hoc: 11 victims carry a forward link, 11
            carry none (Q2). Compensating control: the archive convention "(Superseded by Decision NN)"
            in headers (DECISIONS_ARCHIVE.md:7,30,64,94,148,187) exercises the link property for
            archived victims and would fail (no pointer) if the convention lapsed -- but it covers only
            entries that were moved.
        - property: stable-unique-identifiers
          rating: missed
          evidence: >-
            Decision number 26 is claimed by two divergent entries (live :3134, "Agent-decided --
            pending review", 2-chat model detail; archive :1404, "(Decided)", condensed) -- the
            identifier does not resolve to exactly one record, and the ETL silently drops the archive
            version (decisions_md.py:91-92 first-wins). Compounded by the display-layer dec-081
            double-claim (DPI-03). No control exercises number uniqueness (the parser's first-wins
            dedup MASKS the defect rather than failing on it -- it is not a property-matched control).
        - property: single-writer-numbering-authority
          rating: partial
          evidence: >-
            Numbering authority is DECISIONS.md human assignment (Decision 84 I-2). Parallel-branch
            collisions have occurred and the merge-time renumbering practice caught them: D77 carries
            "renumbered from 76" (:1938), D85 carries a **Renumbering note:** (:1616), and the
            duplicate-72 and duplicate-69 instances were renumbered (rec-1964's target no longer
            reproduces; D89 is the renumbered 69). That practice is the property-matched control -- it
            exercises collision resolution and demonstrably fired -- but it is human-memory, and one
            collision (26) escaped it.
        - property: supersession-bidirectionality
          rating: missed
          evidence: >-
            Superseder->victim is reliably discoverable (headers: D116/D117 name targets; D105/D114
            in-title). Victim->superseder is absent on 11 of ~22 traced supersession edges (grep-zero
            superseder mentions in D35/D37/D40/D43/D44/D49/D58/D80 bodies, plus D23/D26/D38/D74). No
            compensating control exercises the reverse direction.
    - q: Q6
      answers:
        - question: >-
            Does the DECISIONS.md -> ops_decisions backfill silently tolerate a duplicate or colliding
            dec-NNN, so a keyspace defect is invisible downstream?
          answer: >-
            CONFIRMED (statically determinable), with a nuance: tolerance is FIRST-parsed-wins, not
            last-writer-wins. scripts/decisions_md.py:91-92 ('if decision_id in seen: continue')
            silently drops any later entry bearing an already-seen number, with no log line; the live
            file is parsed before the archive (:17-20), so live-26 wins and archive-26 never reaches
            the warehouse. backfill_decisions_from_md (ops_data_portal.py:1442-1476) then upserts each
            surviving number (write_ops on dec-{n:03d}), so downstream state is always self-consistent
            and the collision leaves no trace. A keyspace defect in the md file is therefore invisible
            in ops_decisions. DPI-06 specifies the detection control.
          basis: [DPI-05, DPI-06]
        - question: >-
            Does ops_decisions (or its backfill logic) admit rows with no live-or-archived
            '## Decision NNN:' entry (orphan rows)?
          answer: >-
            CONFIRMED for the mechanism: the backfill is upsert-only -- there is no delete or
            full-table reconciliation against the parsed set (backfill_decisions_from_md writes and
            _sync_table pulls the cache; nothing removes warehouse rows absent from the parse). A
            renumbered or deleted header permanently strands its old row. Whether orphans EXIST today
            (e.g. the retired dec-1083..dec-1091 writer-era rows Decision 105 calls retired) is not
            statically determinable from the repo -- the warehouse cache is gitignored -- so the
            existence sub-answer is HYPOTHESIS; the admission mechanism is CONFIRMED.
          basis: [DPI-06]
        - question: >-
            Are there live entries whose premise is not dead but whose CONCLUSION was quietly reversed
            or amended by a later Decision without either entry annotating the other (silent overturns)?
          answer: >-
            Three encountered during the P2 sweep (no exhaustive pairwise pass was run; a fuller pass
            would need more budget): (1) Decision 43's SLOC-waiver row -- "waiver comment => exempt
            from the 500-SLOC cap" -- is INVERTED by Decision 102 ("no longer authorises unbounded SLOC
            growth"); D43's body (:2777-2812) never mentions 102. Counted in the Q1 dead-unannotated
            set. (2) Decision 78 clause 3 names RDS PostgreSQL as the catalog backend, superseded by
            Neon (CD.34/Decision 107); clause 9 carries an inline note for its own amendment but clause
            3 carries none -- a reader of D78 alone gets the wrong catalog backend. (3) Decision 80
            point 3 (validate.py decomposition direction) is partially superseded by Decision 104
            (header says so); D80's body (:1849-1873) never mentions 104. Only (1) reaches the
            dead-unannotated bar; (2) and (3) are clause-level and their core premises stand.
          basis: [DPI-02]
        - question: >-
            Does any live entry cite, as a live constraint, another entry that is itself archived or
            superseded (stale transitive citation)?
          answer: >-
            Inside DECISIONS.md itself the modern practice is good -- e.g. D121:58 cites archived
            Decision 52 explicitly labeled "archived context, not a live governing decision", and D61's
            references to D50/D51 carry "(superseded by Decision 78)" inline. The stale transitive
            citations found are on GOVERNING SURFACES OUTSIDE the file: ROADMAP-PLATFORM.yaml:7819
            (tier-item intent: "Per Decision 58, .agents/ is the canonical interactive workflow layer"
            -- superseded by Decision 76) and ROADMAP-PRODUCT.md:755 ("Implementation is triggered by
            conditions defined in Decision 40" -- conditions moot). Also observed: live code comments
            cite "Decision 37" for the Neon DSN Secrets-Manager runtime-fetch
            (src/common/ducklake_runtime.py:200, src/lambdas/ducklake_catalog_dr/handler.py:4) --
            Decision 37 governs GitHub-Models scheduled agents and only establishes the
            PAT-in-Secrets-Manager precedent; whether these are deliberate precedent-cites or mis-cites
            is not decidable from text: HYPOTHESIS, flagged for the human.
          basis: [DPI-02]
        - question: >-
            (Extension) Are the three victim-annotation shapes machine-discoverable, so the DPI-01
            invariant is actually checkable?
          answer: >-
            Yes. All observed shapes contain the superseder's decision number inside the victim's block:
            header/status-line suffix "(Superseded by Decision NN)" (D42:2874, archive headers),
            blockquote "> **... migration update/amendment:**" naming the superseding Decision/CD
            (D68:2499, D71:2231, D62:2652), and inline bracketed amendments "[CORRECTED/RESTATED by
            Decision NN ...]" (D92:1363, D67:2518, D84/D87/D103 mis-cite trio). A checker that asserts
            "victim block contains the superseder's number" is therefore sufficient for all existing
            practice -- no new markup needs inventing (DPI-01 spec).
          basis: [DPI-01]
        - question: >-
            (Extension) Is the archive file structurally guarded, given it is the R1 guard's referential
            peer and the ETL's second input?
          answer: >-
            No. Decisions 52/53/54 sit as h3 headers nested after the archive's Decision 26 section
            (DECISIONS_ARCHIVE.md:1432/1453/1481) -- inside the region the archive's own layout implies
            belongs to Decision 26. Two consumers parse the same file with different grammars: the ETL
            sees h2+h3 (decisions_md.py:22), the R1 guard sees h2 only
            (validate_candidate_decision_ratification.py:22). Today no ratified CD points at dec-052/053/054
            so the divergence is latent; a future CD ratifying against one of them would false-FAIL R1
            while the warehouse row exists. DPI-07.
          basis: [DPI-07]
  per_surface_assessment:
    - surface: docs/DECISIONS.md
      maturity: solid
      strengths: >-
        The modern band (Decision 75 onward, and especially 86+) is a genuinely strong decision record:
        stable number-keyed identity synced to the warehouse, superseders that name their targets in
        headers, dated inline amendment markers on corrected clauses (D92/D67/D95-restatement), a
        working merge-time renumbering practice with written provenance (D77, D85), and an ETL that is
        immune to display-metadata drift because it keys on header numbers. Immutability is respected
        throughout -- nothing observed was silently mutated or dropped from git.
      top_gaps: [DPI-01, DPI-02, DPI-03, DPI-04, DPI-05]
  rubric_ratings:
    - surface: docs/DECISIONS.md
      dimension: VD1
      rating: adequate
      evidence: "docs/DECISIONS.md (81 headers; 64 live + 6 annotated = 86% live-or-annotated)"
      note: "All 11 dead-unannotated entries are pre-Decision-77; the modern band is clean."
    - surface: docs/DECISIONS.md
      dimension: VD2
      rating: weak
      evidence: "docs/DECISIONS.md:2334 (D58), :2658 (D49), :2737 (D44), :2878 (D40) -- zero superseder mentions"
      note: "11 of ~22 supersession edges lack a victim-side pointer; no control exists (confirmed absent in scripts/checks/**)."
    - surface: docs/DECISIONS.md
      dimension: VD3
      rating: adequate
      evidence: "scripts/decisions_md.py:90; docs/DECISIONS.md:2038 vs :1752"
      note: "ETL number-keying is deterministic and collision-free; drift is confined to the display-layer Warehouse ID lines plus the duplicate number 26."
    - surface: docs/DECISIONS.md
      dimension: VD4
      rating: weak
      evidence: "docs/PROJECT_CONTEXT.md:18; docs/DECISIONS.md:1; scripts/session_preflight.py:1746"
      note: "Stated archival policy unenforced and contradicted by practice; one perpetual pending-review status; 8 archive-eligible entries in the live set."
    - surface: docs/DECISIONS.md
      dimension: VD5
      rating: weak
      evidence: "Q5 external_checklist (2 missed, 3 partial)"
      note: "stable-unique-identifiers and supersession-bidirectionality missed; the other three properties partial with named controls."
  findings:
    - id: DPI-01
      surface: docs/DECISIONS.md
      question: Q2
      dimension: VD2
      title: "No mechanical supersession-annotation invariant: a superseding Decision is not required to leave a forward pointer on its victim"
      evidence: "scripts/checks/roadmap/validate_candidate_decision_ratification.py:22 (only header-parsing check; validates CD pointers only); repo-wide 'supersess' search over scripts/checks/** and scripts/validate.py returns nothing (confirmed absent)"
      evidence_kind: observed
      current_behavior: >-
        Victim annotation is human-memory. It fired 11 times (D24/D42/D60/D62/D67/D68/D71/D89/D92 +
        mis-cite amendments) and missed 11 times (D23/D26/D35/D37/D38/D40/D43-SLOC/D44/D49/D58/D74,
        plus D80 point 3 clause-level). New supersessions (D116/D117, 2026-07-03) shipped with
        annotated headers on the SUPERSEDER but nothing on victims D49/D44 -- the miss pattern is
        current, not just historical.
      ideal_behavior: >-
        NS-B: every entry that declares "Supersedes Decision NN" / "amends Decision NN" (header or
        body) is mechanically paired with a marker on the victim containing the superseder's number;
        CI fails otherwise.
      gap: "The invariant exists as practice on half the edges and as code nowhere."
      compensating_controls_considered: >-
        rec-2057/2058/2059 and rec-917/918 (open point-fix annotation recs) -- not property-matched:
        each annotates named instances and cannot catch the next supersession; the treadmill's
        existence (5+ standing recs) is itself evidence the control is manual. The R1 guard is
        property-mismatched (validates CD->header existence, not victim pointers).
      change_type: enforce
      proposed_change: >-
        SPECIFICATION (no code written by this audit). New check
        scripts/checks/decisions/validate_supersession_annotations.py, registered owner="platform" in
        the full tier (registry.py per Decision 104). Rule: (1) parse both decision files; build edges
        superseder->victim from header titles and body phrases matching
        r"(?:Supersedes|supersedes|amends|Amends|partially supersedes)\s+Decision\s+(\d+)" inside live
        '## Decision' blocks; (2) for each edge, locate the victim block (live or archive); FAIL unless
        the victim block contains the superseder's number in any annotation form (the plain string
        "Decision {N}" suffices -- all three observed shapes satisfy this, per Q6 extension answer), or
        the victim's own header carries "(Superseded by Decision {N})"; (3) allowlist file
        (config/decision_supersession_waivers.yaml) for edges the human rules non-binding (e.g.
        clause-level amends where the victim's core stands), so the gate starts green after the DPI-02
        backfill without forcing annotations the human rejects. Inputs: docs/DECISIONS.md,
        docs/DECISIONS_ARCHIVE.md, the waiver file. The check also FAILs on duplicate '## Decision N:'
        numbers within the live file (co-owns DPI-06's live-file half).
      acceptance: "bin/venv-python -m scripts.validate 2>&1 | grep -q 'supersession-annotation' && bin/venv-python -c \"from scripts.checks.decisions.validate_supersession_annotations import validate_supersession_annotations\""
      severity: high
      severity_rationale: >-
        Absence of a control that would prevent recurrence, where the ad-hoc practice plus open
        point-fix recs are an insufficient compensating control (they annotate one instance each; the
        2026-07-03 D116/D117 supersessions still shipped without victim markers). Not critical: the
        full-file consumer (decision-scout) usually sees the superseder alongside the victim, so a
        materially-wrong trusted decision requires an additional reading failure.
      confidence: CONFIRMED
      roadmap_crossref:
        classification: novel
        item_ids: []
        dedup_search_terms: ["supersess", "annotat.*decision", "stale decision", "DECISIONS.md invariant", "scripts/checks supersess"]
        dedup_hit_count: 0
        note: "No rec or tier_item proposes a mechanical invariant; rec-2057/2058/2059/917/918 are instance annotations (cited as treadmill evidence, not owners)."
      effort: S
      depends_on: [DPI-02]
      sequencing: {safe_to_queue_now: true, blocked_behind: [], note: "Check lands green only after DPI-02's annotation backfill (or with those edges waivered); spec is self-contained either way."}
    - id: DPI-02
      surface: docs/DECISIONS.md
      question: Q1
      dimension: VD1
      title: "11 live entries carry dead or inverted premises with no victim-side annotation (systematic sweep result)"
      evidence: "docs/DECISIONS.md:3319 (D23), :3134 (D26), :3102 (D35), :3057 (D37), :3019 (D38), :2878 (D40), :2777 (D43 SLOC row), :2737 (D44), :2658 (D49), :2334 (D58), :2089 (D74) -- each grep-verified to contain zero mention of its superseder/amender"
      evidence_kind: observed
      current_behavior: >-
        Enumerated dead-unannotated set with the killing event per entry: D23 (agent/{slug} branching +
        PLAN-*.md handoff, amended by D76/D85); D26 (2-chat model over .github/prompts artifacts deleted
        at T-1.13; architecture superseded via D42->D90; also DPI-05); D35 (unconditional "no auto-apply"
        scoped/inverted for sandbox by D77 cl.3; cited live by AGENTS.md:138 and terraform/CLAUDE.md:315,
        both co-citing D77); D37 (GitHub-Models-API dispatch superseded by D116 routing; dispatcher
        disabled per D116); D38 (copilot-instructions.md and 10-step implement.prompt.md deleted; only
        the ghost-file guard survives, scripts/checks/contracts/validate_no_underscore_instructions.py);
        D40 (Copilot SDK + Bedrock BYOK -- both retired, D49->D116 and CD.28; drafted supersession in
        docs/INTENT-provider-agnostic-executor.md:3 never filed; ROADMAP-PRODUCT.md:755 still cites its
        trigger conditions as live); D43 SLOC row (inverted by D102); D44 (superseded by D117, which
        even says mechanism unchanged -- yet live code cites D44 as the authority,
        config/agent/executor/capabilities.yaml:1); D49 (superseded by D116; substrate
        copilot_sdk_client.py deleted); D58 (.agents canonical -- superseded by D76;
        ROADMAP-PLATFORM.yaml:7819 still cites it as ground truth); D74 (self-hosted-runner npm/user_data
        premise dead per CD.21; uniquely among its retired-runner peers 24/60/62/68/71 it received NO
        migration-update blockquote; its workflow_dispatch half survives in .github/workflows/ci-rca.yml:14).
      ideal_behavior: "NS-A: every live entry's premise is live, or the entry visibly says what killed it and points forward."
      gap: "A decision-scout or human reader of any of these 11 entries in isolation is told a rule or substrate that HEAD has inverted or deleted."
      compensating_controls_considered: >-
        In-file co-presence of superseders (the consumer loads the whole file) -- partial mitigation,
        property-matched only when the superseder names the victim prominently (true for D35<-D77,
        D49<-D116, D44<-D117; absent for D38/D26/D74). AGENTS.md co-citation contextualizes D35.
        Judged insufficient for the set as a whole: three of the victims are cited AS LIVE by governing
        surfaces outside the file.
      change_type: annotate
      proposed_change: >-
        One editing session: add the repo's existing annotation shapes to all 11 victims (blockquote or
        status-suffix, each naming the superseding Decision/CD and date), using the D68/D71 blockquote
        template for substrate retirements (D74, D38) and the D42 status-suffix for full supersessions
        (D49, D58, D44, D23). For D40 additionally: either file the drafted superseding decision (per
        INTENT-provider-agnostic-executor.md:3) or annotate "(triggers moot; supersession pending)" --
        and fix the two out-of-file stale citations (ROADMAP-PLATFORM.yaml:7819, ROADMAP-PRODUCT.md:755)
        in the same change. For D43, annotate the SLOC row "(amended by Decision 102 -- waiver no longer
        exempts SLOC)".
      acceptance: "for n in 23 26 35 37 38 40 44 49 58 74; do awk \"/^## Decision $n:/,/^## Decision [0-9]+:|^---$/\" docs/DECISIONS.md | grep -qE 'Superseded by|superseded by|amended by|migration update|moot' || echo MISSING-$n; done | wc -l | grep -qx 0"
      severity: high
      severity_rationale: >-
        Dead-unmarked premises on currently-binding entries that steer planning inputs: D40's moot
        triggers are cited as the activation condition of a product-roadmap track; D58 is cited as
        canonical by a live tier-item intent; D44 is cited by live enforcement code as the boundary
        authority. Not critical: no traced case where the wrong premise alone would produce an
        irreversible wrong action (the apply-path readers of D35 all co-cite D77).
      confidence: CONFIRMED
      roadmap_crossref:
        classification: planned-insufficient
        item_ids: [rec-2057, rec-2058, rec-2059, rec-917, rec-918]
        dedup_search_terms: ["Annotate stale Decision", "stale path references", "Decision 44 citation", "Decision 65", "Decision 66"]
        dedup_hit_count: 6
        note: >-
