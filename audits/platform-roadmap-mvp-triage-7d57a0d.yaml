            freeze is designed to lift exactly when the terminal items (T4.2 +14d, T3.2 PASS,
            T3.3 +7d) stabilize. "MVP" and "frozen" are sequenced, not mutually exclusive.
          basis: []
        - question: "(seed c) Is any keep_active_mvp item a single point of failure for the whole residual?"
