            branch fate) and sits on the only path to T1.6, which T4.2 requires; CD.18
            ratification is a zero-cost human act currently blocking a critical-path start.
            T2.19 (in_progress) carries the whole DuckLake limb (T2.26 -> T2.36 -> telemetry).
          basis: []
        - question: "(extension) Two pending ratifications are the cheapest speed-ups on the board -- why are they not scheduled?"
          answer: >-
            CD.28 ratification is the ONLY thing between T0.4 and complete (RMAP-04), and CD.18
            ratification is the start gate for critical-path T1.5. Both are human decision acts
            with no code cost. Neither has an owner or a date; both should be put in front of the
            operator as explicit next actions in the next /plan session.
          basis: [RMAP-04]
        - question: "(extension) Who feeds the executor? The priority queue is empty and its producer is dead."
          answer: >-
            The end-state is "recs flow queue -> executor", but ops_priority_queue is empty at
            this session's preflight, rec-curator is disabled (May 2026), and its producer path
            still writes via the retired OpsWriter/Iceberg staging (Decision 84 caveat: output
            would land in a store nothing reads). No active item other than T4.3 owns restoring
            queue production, and T4.3 is sequenced BEHIND T4.1. Either pull the producer slice
            forward (RMAP-07) or decide at T4.1 decomposition that pick_rec reads open recs
            directly for the first iterations -- but decide, not discover.
          basis: [RMAP-07]
