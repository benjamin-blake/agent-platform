        - question: "(seed a) Does closing the MVP loop actually depend on the T4 executor, or does the current /orient -> /plan -> /implement surface already satisfy a human-present-but-not-in-critical-path reading?"
          answer: >-
            As ratified, it depends on an autonomous driver: Decision 93's boundary is "no human
