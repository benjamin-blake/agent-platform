        value model (agent-telemetry vs trading-telemetry category separation, SEQ-03), and (iv)
        observable reversal/review conditions. Candidate conditions for the human to dispose:
        (a) platform-MVP closes (Decision 93 boundary) -> a product-activation decision becomes
        mandatory; (b) hard calendar review -- if platform-MVP has not closed by a named date
        (e.g. 2026-09-30, one quarter out), the sequencing is re-decided, never silently renewed;
        (c) alpha-readiness -- a candidate PySR formula artifact passing the research bar exists,
        collapsing the paper loop's marginal cost and re-opening the interleave question;
        (d) sustained slip -- N consecutive orient/triage cycles showing the MVP date receding.
        Fold SEQ-04's un-circularizing edits (T2.6:4741 and the Decision-93 product-edge language
        re-pointed at the named conditions) into the same change.
      what_changes: >-
        DECISIONS.md +1 entry (and its ops_decisions row); the frame becomes visible to the
        standing controls that key on Decisions (decision-scout; plan-critique 12h); two circular
        roadmap notes re-pointed at named conditions. NO reallocation of build capacity;
        ROADMAP-PRODUCT.yaml stays status: draft; no code or infra change.
      cost: >-
        XS-S: one planning session + one small docs/roadmap PR; ~1-2 operator-hours of review.
        SEQ-02's condition-monitor is a separate S follow-up.
      rationale: >-
        The audit's core result is an asymmetry: the frame is, on present evidence, the right
        allocation held for the wrong reason -- by inheritance rather than by record. The
        affirmative case (CAND-E) survives adversarial tracing: the operator's attention is the
        binding resource, the near-term platform critical path is dual-use, the interleave's
        headline payoffs shrink under scrutiny (category error; signal-artifact gate; 3-month
        statistical latency), and reversal stays operationally free. The gap case (CAND-A/B)
        also survives: zero ratify-class artifacts, no trigger, a convention sitting unused.
        Ratify-with-conditions is the unique disposition that banks both results -- it keeps the
        allocation and prices its one real risk (a compounding bet on an untested load-bearing
        premise) into named triggers. A run arriving at ratification with rigor is a full-credit
        outcome per the brief; this is that run.
      confidence: CONFIRMED

