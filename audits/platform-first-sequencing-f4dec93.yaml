        monitor -- ratification alone would decay into recorded-then-forgotten
      evidence: ".claude/skills/orient/SKILL.md:216; .claude/skills/plan-critique/SKILL.md:73,:85; audits/decision-log-premise-integrity-8fb581e.md (Decision 40 triggers moot yet cited live at ROADMAP-PRODUCT.md:755)"
      evidence_kind: static
      current_behavior: >-
        /orient allocates from the platform roadmap only ("v1: platform roadmap only.
        Product-roadmap orientation is deferred" -- no owner, no trigger); plan-critique's Frame
        Challenge REVISEs only on a concrete contradiction with a recorded Decision / roadmap item
