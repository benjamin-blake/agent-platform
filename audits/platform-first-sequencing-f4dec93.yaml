  findings:
    - id: SEQ-01
      surface: sequencing-frame
      question: Q1
      dimension: VD1
      title: >-
        Plane-level capacity allocation is an inherited premise: cited as a given, ratified
        nowhere, reversal-condition-free
      evidence: "docs/DECISIONS.md:1311,:1315; docs/plans/PLAN-platform-mvp-boundary.yaml:17,:146; citation census 41 hits / 0 ratify-class"
      evidence_kind: observed
      current_behavior: >-
        All build capacity flows to the platform plane under a directive that exists as (a) two
        "per the platform-first directive" citations inside Decision 93 and (b) a user steer
        recorded in one plan's scoping fields ("the user's 'complete the full platform first'
        directive"). None of the 81 live Decision headers ratifies plane sequencing; no
        alternatives were recorded as examined; the only end-condition language is circular
        ("until product work begins"). The pivot transcript (Section 11, read in full) settles
        plane SEPARATION architecture but never weighs plane TIMING. This finding subsumes CAND-B:
        each month the opportunity-cost bet is re-made silently.
      ideal_behavior: >-
        NS-A/NS-D: a choice allocating 100% of a sole operator's build capacity, renewed
        month-over-month, is recorded as a Decision with examined alternatives and observable
        reversal/review conditions -- the convention the repo already applies to materially
        smaller choices (16 reversal-condition stanzas; Decision 108 carries one for a
        roadmap-format choice).
      gap: >-
        The system's most consequential standing allocation is the only major operating premise
        with no decision record, while lesser choices (file formats, provider routing, size
        ceilings) carry full ratification + reversal machinery.
      compensating_controls_considered: >-
        decision-scout and plan-critique 12h key on recorded Decisions and cannot see an
        unrecorded frame; /orient is platform-only by scope line (orient/SKILL.md:216); the /audit
