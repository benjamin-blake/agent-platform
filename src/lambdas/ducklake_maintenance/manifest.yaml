status: active
notes: >-
  T2.18 DuckLake maintenance singleton Lambda (CD.33 / Decision 81), now the ADMIN-GATED half of
  the T2.18 c9 split (bundled Decision amending Decision 81 clause 1, runtime artifacts 3 -> 4).
  Retains the production-destructive and operational verbs: catalog_reinit, restore_drill,
  reconcile_columns, catalog_stats, clone_catalog (invoked via `aws lambda invoke`, not agent
  surfaces), plus the scheduled merge_ops cadence (every 6h, non-destructive, production ops_*
  catalog). The non-destructive smoke cadences (action=merge / action=gc / action=hot_merge /
  action=breaker_probe) moved to the CI-invokable src/lambdas/ducklake_maintenance_smoke sibling,
  which shares src/common/ducklake_maintenance.py. reserved_concurrent_executions=1 (singleton per
  Decision 81 clause 6 -- the maintenance pipeline must not run concurrently; this differs from the
  writer's OCC concurrency model per Decision 81 clause 3). duckdb (pinned via
  config/lambda/ducklake/version.yaml) + psycopg2-binary + python-ulid live in the ducklake-deps
  layer; the ducklake/httpfs/postgres extensions live in the ducklake-extensions layer. Function URL
  is AWS_IAM (admin-invoked only -- github_ci_branch is NEVER granted invoke on this function's ARN,
  only on the smoke sibling's). restore_drill needs the pgclient layer (pg_dump/pg_restore) attached
  in Terraform alongside ducklake-deps/ducklake-extensions. (The TEMPORARY seed_ops_recommendations
  bootstrap was removed at the 2026-06-09 recs sign-off.)
