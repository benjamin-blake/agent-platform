notes: >-
  T2.18 DuckLake maintenance singleton Lambda (CD.33 / Decision 81). Implements the daily
  non-destructive merge cadence (action=merge) and weekly guarded destructive GC with circuit
  breaker (action=gc). reserved_concurrent_executions=1 (singleton per Decision 81 clause 6 --
  the maintenance pipeline must not run concurrently; this differs from the writer's OCC
  concurrency model per Decision 81 clause 3). duckdb==1.5.3 + psycopg2-binary + python-ulid
  live in the ducklake-deps layer; the ducklake/httpfs/postgres extensions live in the
  ducklake-extensions layer. Function URL is AWS_IAM for the post-deploy smoke-test invoke gates.
  Scheduled table scope: ducklake_smoke_* under the ducklake_smoke meta-schema. T2.19 adds the
  operational catalog_reinit / seed_ops_recommendations / restore_drill actions (invoked via
  `aws lambda invoke`); restore_drill needs the pgclient layer (pg_dump/pg_restore) attached in
  Terraform alongside ducklake-deps/ducklake-extensions.
