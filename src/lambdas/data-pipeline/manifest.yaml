artifact: data-pipeline.zip
functions:
  - agent-platform-scheduled-agent-dispatcher
  - agent-platform-findings-processor
handlers:
  - src/data/handlers/scheduled_agent_handler.py
  - src/data/handlers/findings_processor_handler.py
  - src/data/handlers/fetch_handler.py
  - src/data/handlers/feature_handler.py
  - src/data/handlers/write_handler.py
  - src/data/handlers/discovery_handler.py
  - src/data/handlers/maintenance_handler.py
includes:
  - src/
  - scripts/__init__.py
  - scripts/aws_profile.py
  - scripts/bedrock_client.py
  - scripts/copilot_sdk_client.py
  - scripts/copilot_wrapper.py
  - scripts/github_models_client.py
  - scripts/llm_client.py
  - scripts/llm_utils.py
  - scripts/ops_writer.py
  - scripts/run_scheduled_agent.py
  - scripts/s3_log_store.py
  - scripts/telemetry_schemas.py
  - scripts/tool_runtime.py
excludes:
  # T2.17 DuckLake runtime code lives ONLY in the ducklake-deps/-extensions layers + the two
  # ducklake_* zips. The wildcard `includes: - src/` above would otherwise drag it into
  # data-pipeline.zip (and mark this artifact affected by DuckLake changes). Keep it out.
  - src/common/ducklake_runtime.py
  - src/common/ducklake_scd2_schema.py
  - src/common/ducklake_connect_probe.py
  - src/lambdas/ducklake_writer
  - src/lambdas/ducklake_reader
assets:
  - .github/agents/schedule.yaml
  - .github/prompts/scheduled/
  - docs/ROADMAP-PRODUCT.md
  - docs/ROADMAP-PLATFORM.yaml
  - config/config.yaml
  - config/config.yaml.example
config:
  - config/lambda/data-pipeline/
pip_packages:
  - github-copilot-sdk==0.2.2
runtime_config: []
status: active
notes: >-
  findings-processor slated for Phase-5 retirement (Decision 61).
  runtime_config SSM/AppConfig fetch mechanism declared for forward-compatibility; actual fetch deferred to follow-on plan.
  fetch, feature, write, discovery function names are future-state (not yet deployed as individual Lambda functions).
