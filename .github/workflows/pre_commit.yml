name: Pre-commit check
on:
  pull_request:
    branches: ["main"]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Run pre-commit
      run: |
        pip install pre-commit
        pre-commit run --all-files
