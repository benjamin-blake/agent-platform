name: ci-rca-inactivity-sweep

# ci-rca-identity-lifecycle: scheduled (weekly) + workflow_dispatch runner for
# scripts.ci_rca.inactivity_sweep. Decision 62-aware (scheduled monitor / alarm-not-gate): a
# dedicated minimal monitor because no existing scheduled workflow's cadence/semantics fit the
# ci_rca inactivity sweep. Portal-only writes (Decision 84); reads transit the DuckLake reader
# NAMED VERBS only (Decision 84 I-3 / Decision 88) -- never re-stages from a read cache.
#
# Alarm-not-gate (mirrors ghas-probe.yml): this workflow never gates a PR or merge -- it closes
# genuinely-inactive open source=ci_rca recs on a purely timestamp-based deterministic predicate.
# A persistent inability to reach the portal/reader (Decision 74 escape-hatch pattern: the
# workflow_dispatch trigger below is the manual retry/inspection path) surfaces as a red scheduled
# run in the Actions UI -- loud-fail, never a silent skip (Decision 55).

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Report inactive candidates without closing them'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials (OIDC -- branch role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/agent-platform-github-ci-branch
          aws-region: eu-west-2

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CI-RCA inactivity sweep
        env:
          AWS_DEFAULT_REGION: eu-west-2
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python -m scripts.ci_rca.inactivity_sweep ${DRY_RUN_FLAG}
