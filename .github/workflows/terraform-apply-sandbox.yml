name: terraform-apply-sandbox

# Sandbox PLATFORM-environment auto-apply (Decision 77, docs/contracts/environment-taxonomy.md).
#
# On push to main touching terraform/personal/**, this workflow plans the personal root module,
# runs scripts/terraform_apply_guard.py (deterministic, fail-closed) over the plan JSON, then a
# subagent plan review, then applies the SAME plan file the guard inspected (no re-plan -- avoids
# TOCTOU). Branch protection / required status checks are not available (Decision 72 / CD.20), so
# the guard plus the subagent review ARE the apply gate, and both fail closed.
#
# Trust: assumes agent-platform-github-ci-apply, which trusts refs/heads/main ONLY (oidc.tf). A PR
# or agent/* branch cannot assume it, so auto-apply is reachable only via a merge to main.

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/personal/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  # Serialise applies against shared S3 state; never cancel an in-flight apply.
  group: terraform-apply-sandbox
  cancel-in-progress: false

jobs:
  apply-sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write   # REQUIRED for OIDC token minting
      contents: read

    env:
      AWS_DEFAULT_REGION: eu-west-2
      # The personal provider defaults profile = var.aws_profile (agent_platform_admin), which does
      # not exist on a GitHub-hosted runner. Blank it so the AWS provider uses the OIDC-exported
      # credential env vars (configure-aws-credentials) instead of a named profile.
      TF_VAR_aws_profile: ""
      # Required root-module variables.
      # Repo variables: AWS_ACCOUNT_ID (e.g. 707578707169), OWNER_EMAIL.
      # Repo secrets:   TF_VAR_PLATFORM_DEV_EXTERNAL_ID, TF_VAR_PLATFORM_ADMIN_EXTERNAL_ID
      #                 (values from the gitignored terraform/personal/terraform.personal.tfvars).
      TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_owner_email: ${{ vars.OWNER_EMAIL }}
      TF_VAR_platform_dev_external_id: ${{ secrets.TF_VAR_PLATFORM_DEV_EXTERNAL_ID }}
      TF_VAR_platform_admin_external_id: ${{ secrets.TF_VAR_PLATFORM_ADMIN_EXTERNAL_ID }}
      WORKDIR: terraform/personal

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC -- apply role, main only)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/agent-platform-github-ci-apply
          aws-region: eu-west-2

      - name: Read pinned Terraform version
        id: tfver
        run: echo "version=$(cat config/terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Terraform init (S3 backend, sandbox)
        working-directory: ${{ env.WORKDIR }}
        run: terraform init -input=false -backend-config=backend-sandbox.hcl

      - name: Assert required Terraform variables are present
        # Fail-closed (Decision 77): a missing secret or variable reds the run before plan.
        # Never use continue-on-error here -- a silent empty var would pass plan with wrong defaults.
        run: |
          : "${TF_VAR_account_id:?TF_VAR_account_id is empty -- set the AWS_ACCOUNT_ID repo variable}" \
            "${TF_VAR_owner_email:?TF_VAR_owner_email is empty -- set the OWNER_EMAIL repo variable}" \
            "${TF_VAR_platform_dev_external_id:?TF_VAR_platform_dev_external_id is empty -- add TF_VAR_PLATFORM_DEV_EXTERNAL_ID repo secret}" \
            "${TF_VAR_platform_admin_external_id:?TF_VAR_platform_admin_external_id is empty -- add TF_VAR_PLATFORM_ADMIN_EXTERNAL_ID repo secret}"

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.WORKDIR }}
        run: |
          terraform plan -input=false -lock-timeout=120s -out=plan.bin
          terraform show -json plan.bin > plan.json

      - name: Deterministic apply guard (fail-closed)
        id: guard
        # No continue-on-error: ANY non-zero exit (2 tripped OR 1 internal error) fails this step
        # and, via the success() gate below, blocks apply. This step is the load-bearing control.
        working-directory: ${{ env.WORKDIR }}
        run: python ../../scripts/terraform_apply_guard.py plan.json

      - name: Subagent plan review
        # Second gate: only runs if the guard passed. A non-PROCEED verdict fails the step and
        # blocks apply (the && exit 1 on absence of the PROCEED token enforces fail-closed).
        if: success()
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "Subagent review unavailable (no token); failing closed." >&2
            exit 1
          fi
          if ! command -v claude &> /dev/null; then
            sudo npm install -g @anthropic-ai/claude-code@2.1.148 --omit=dev --omit=optional && sudo npm cache clean --force
          fi
          claude -p \
            --output-format text \
            --max-turns 10 \
            "Review the terraform plan in plan.json for the sandbox auto-apply pipeline. It has already passed the deterministic guard (no destroy, no IAM/trust change). Confirm the plan is a safe, expected sandbox infrastructure change. Reply with exactly the single token PROCEED on its own line if safe to auto-apply, or REVISE followed by the reason if not." \
            > review.txt 2>&1 || true
          cat review.txt
          if ! grep -qx "PROCEED" review.txt; then
            echo "Subagent did not return PROCEED; failing closed." >&2
            exit 1
          fi

      - name: Terraform apply (same plan file the guard inspected)
        # Gated on success() of all prior steps (guard + subagent review). Applies plan.bin -- the
        # exact artefact the guard parsed via plan.json -- with no intervening re-plan (no TOCTOU).
        if: success()
        working-directory: ${{ env.WORKDIR }}
        run: terraform apply -input=false -lock-timeout=120s plan.bin
