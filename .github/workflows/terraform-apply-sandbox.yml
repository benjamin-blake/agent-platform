name: terraform-apply-sandbox

# Sandbox PLATFORM-environment auto-apply (Decision 77, docs/contracts/environment-taxonomy.md).
#
# On push to main touching terraform/personal/**, this workflow plans the personal root module,
# runs scripts/terraform_apply_guard.py (deterministic, fail-closed) over the plan JSON, then a
# subagent plan review, then applies the SAME plan file the guard inspected (no re-plan -- avoids
# TOCTOU). Branch protection is now active (main-protection ruleset, Decision 83 / CD.20), but
# deliberately non-wedging -- the guard plus the subagent review ARE the plan-content gate, and both fail closed.
#
# CD.35 / T2.20 (Wave 1) adds the server-side convergence anchor on top of the above:
#   - A read-PRECONDITION before apply REFUSES (distinguishable marker CONVERGENCE_RED, record NOT
#     overwritten) when the durable convergence record is red -- the SOLE hard block, unbypassable
#     by any merge-path actor. An absent record = first-apply-allowed (pass-on-absent).
#   - An ALWAYS-run record-write after apply writes status=green on success / status=red on failure
#     to s3://agent-platform-data-lake/convergence/personal/sandbox.json (its OWN prefix, NOT under
#     tfstate/), so a failed apply can never leave a stale green. Write-IAM is apply-identity-only.
#   - A red record clears ONLY via the workflow_dispatch acknowledge-and-retry path (input names the
#     red commit or rec id); a plain push never clears red (auto-allow-descendants is rejected --
#     on linear-history main every commit is a descendant, so the latch would never latch).
#   - A read-only pull_request job posts the ADVISORY terraform-converged commit status (NOT a
#     required check, Decision 83) under the read-only PR role.
#   - A best-effort post-merge SHA->PR wake (Decision 76 poll-free; next-planning-session re-check
#     is the authoritative baseline). Apply failures wire into ci-rca.yml (Decision 72/55).
#
# CD.35 / T2.22 (Wave 3) adds a human-gated CD apply path for the guard fail-closed set:
#   - The guard BLOCK verdict (exit 2) now sets a job output routed=true and exits 0 -- routing is
#     not a failure; the apply-sandbox job stays green and the convergence record is NOT touched.
#   - A new gated-apply job (needs: apply-sandbox, if: routed == 'true' && push, environment:
#     tf-gated-apply) fetches the SAME saved plan.bin from S3 and applies it VERBATIM after a
#     human reviewer approves in GitHub Actions (no re-plan -- Decision 77 no-TOCTOU).
#   - The gated-apply job reuses the T2.20 always-run red-on-failure convergence record write so a
#     failed gated apply writes red and files a ci-rca rec (Decision 55/72 anti-masking preserved).
#   - The gated-apply job is NOT a PR required check (Decision 83 / T2.22 constraint).
#   - The routine guard-PASS auto-apply path is unchanged.
#
# Trust: assumes agent-platform-github-ci-apply, which trusts refs/heads/main ONLY (oidc.tf). A PR
# or agent/* branch cannot assume it, so auto-apply is reachable only via a merge to main. The
# advisory PR job assumes the read-only agent-platform-github-ci-pr role (refs/pull/*).

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/personal/**'
  pull_request:
    paths:
      - 'terraform/personal/**'
  workflow_dispatch:
    inputs:
      acknowledge_red_commit:
        description: >-
          Unlatch a RED convergence record: name the red commit SHA (or the open rec id, rec-NNNN).
          This is the ONLY sanctioned path to clear red; a successful apply from this run writes
          green. Leave blank for a routine manual apply (refused if the record is red).
        required: false
        type: string

permissions:
  contents: read

concurrency:
  # Serialise applies against shared S3 state; never cancel an in-flight apply. This group also
  # closes the read-precondition -> apply -> write-record race between rapid merges (CD.35 5.5b).
  group: terraform-apply-sandbox
  cancel-in-progress: false

env:
  # The convergence record lives in its OWN S3 prefix, OUTSIDE tfstate/ (CD.35 5.5c): the read-only
  # PR role gets read on this prefix only and must never gain tfstate read.
  CONVERGENCE_BUCKET: agent-platform-data-lake
  CONVERGENCE_KEY: convergence/personal/sandbox.json

jobs:
  # ---------------------------------------------------------------------------
  # Apply job: push to main + the sanctioned workflow_dispatch unlatch ONLY.
  # NOT pull_request (PRs get the read-only advisory job below; a PR cannot assume the apply role).
  # ---------------------------------------------------------------------------
  apply-sandbox:
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      # routed=true when the guard exits 2 (IAM/trust/destroy diff) -- signals the gated-apply
      # job to fetch the saved plan and wait for human approval. The convergence record is NOT
      # touched while routed (anti-masking, T2.22 / Decision 55).
      routed: ${{ steps.guard.outputs.routed }}
    permissions:
      id-token: write       # REQUIRED for OIDC token minting
      contents: read
      pull-requests: write  # best-effort post-merge SHA->PR wake comment (CD.35 5.3)

    env:
      AWS_DEFAULT_REGION: eu-west-2
      # The personal provider defaults profile = var.aws_profile (agent_platform_admin), which does
      # not exist on a GitHub-hosted runner. Blank it so the AWS provider uses the OIDC-exported
      # credential env vars (configure-aws-credentials) instead of a named profile.
      TF_VAR_aws_profile: ""
      # All other required root-module variables are sourced from the
      # agent-platform-terraform-personal-tfvars Secrets Manager secret (fetched by the
      # "Materialise tfvars" step below). New no-default vars only require updating that secret.
      WORKDIR: terraform/personal

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC -- apply role, main only)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/agent-platform-github-ci-apply
          aws-region: eu-west-2

      - name: Read pinned Terraform version
        id: tfver
        run: echo "version=$(cat config/terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Convergence precondition (refuse on red record -- sole hard block)
        id: precond
        # CD.35 5.5: the SOLE server-side hard block. Read the durable convergence record; if main
        # is non-converged (status=red) REFUSE this run and do NOT overwrite the record -- UNLESS
        # this is the workflow_dispatch acknowledge-and-retry path naming the red commit/rec. An
        # absent record = first-apply-allowed (pass-on-absent). The refusal emits a distinguishable
        # marker (CONVERGENCE_RED) so ci-rca can dedupe refusals against the open red-record rec.
        env:
          ACK: ${{ github.event.inputs.acknowledge_red_commit }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Fail-CLOSED read: the precondition is the SOLE hard block, so a read it cannot complete
          # must NOT silently degrade to pass-on-absent. Distinguish a genuinely-absent record
          # (NoSuchKey/404 -> first-apply-allowed) from any other error (transient / AccessDenied ->
          # REFUSE without overwriting; the operator re-runs once S3 is reachable). s3api get-object
          # (not `s3 cp`) so the error class is inspectable.
          set +e
          READ_ERR=$(aws s3api get-object --bucket "$CONVERGENCE_BUCKET" --key "$CONVERGENCE_KEY" /tmp/convergence-record.json 2>&1 1>/dev/null)
          READ_RC=$?
          set -e
          if [ "$READ_RC" -ne 0 ]; then
            if printf '%s' "$READ_ERR" | grep -qiE 'NoSuchKey|Not Found|404'; then
              echo "No convergence record (pass-on-absent): first apply allowed."
              echo "refused=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "refused=true" >> "$GITHUB_OUTPUT"
            echo "::error::CONVERGENCE_READ_ERROR could not read the convergence record; failing CLOSED (NOT pass-on-absent) and NOT overwriting it. Re-run once S3 is reachable. Details: ${READ_ERR}"
            exit 1
          fi
          REC_JSON=$(cat /tmp/convergence-record.json)
          # rec-2209: guard against a non-empty but malformed record (explicit refusal, not an unguarded
          # set -e abort). On parse failure emit a distinguishable marker, write refused=true, and exit 1
          # WITHOUT overwriting the record -- ci-rca can then dedupe it like a CONVERGENCE_RED refusal.
          # Both fields extracted in a single python3 call: a second json.load on the same bytes cannot
          # fail independently, so two separate guards was dead code and a misleading second error marker.
          if ! PARSE_OUT=$(printf '%s' "$REC_JSON" | python3 -c "import json,sys; r=json.load(sys.stdin); print(r.get('status','')); print(r.get('commit_sha',''))" 2>/dev/null); then
            echo "refused=true" >> "$GITHUB_OUTPUT"
            echo "::error::CONVERGENCE_PARSE_ERROR convergence record exists but could not be parsed as JSON; failing CLOSED and NOT overwriting it. Inspect s3://${CONVERGENCE_BUCKET}/${CONVERGENCE_KEY} and re-file if corrupt."
            exit 1
          fi
          STATUS=$(printf '%s' "$PARSE_OUT" | sed -n '1p')
          RED_COMMIT=$(printf '%s' "$PARSE_OUT" | sed -n '2p')
          echo "Convergence record: status=${STATUS} commit=${RED_COMMIT}"
          if [ "$STATUS" != "red" ]; then
            echo "Main is converged (status=${STATUS}); proceeding."
            echo "refused=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # status == red. The ONLY clear path is a workflow_dispatch acknowledge-and-retry whose
          # input names the red record's commit SHA or an open rec id (rec-NNNN). The dispatch actor
          # + input are the audit trail (Decision 55/72); the agent may dispatch after rec review.
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$ACK" ] && { [ "$ACK" = "$RED_COMMIT" ] || printf '%s' "$ACK" | grep -qiE '^rec-[0-9]+$'; }; then
            echo "::notice::CONVERGENCE_ACK acknowledge-and-retry for red commit ${RED_COMMIT} (input=${ACK}); proceeding to clear red on a successful apply."
            echo "refused=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "refused=true" >> "$GITHUB_OUTPUT"
          echo "::error::CONVERGENCE_RED main is non-converged at commit ${RED_COMMIT}; apply REFUSED and the record was NOT overwritten. Unlatch via workflow_dispatch acknowledge_red_commit=${RED_COMMIT} (or the open rec id) after the failure is reviewed (Decision 55/72)."
          exit 1

      - name: Materialise tfvars from Secrets Manager
        # Fetch the agent-platform-terraform-personal-tfvars secret (apply role SecretsManagerTfvarsRead
        # grant) and write it to the gitignored terraform.personal.tfvars. Fail-closed: if the fetch
        # fails the step exits non-zero and blocks all downstream steps (no continue-on-error).
        if: success()
        run: |
          set -euo pipefail
          # --output text with --query SecretString extracts the raw-body string (no JSON envelope).
          aws secretsmanager get-secret-value \
            --secret-id agent-platform-terraform-personal-tfvars \
            --query SecretString --output text \
            > terraform/personal/terraform.personal.tfvars

      - name: Mask secret-sourced tfvars values in logs
        # rec-2214: emit ::add-mask:: for account_id and the two ExternalId trust secrets BEFORE any
        # step writes plan.json / review.txt, so they are redacted in all subsequent log output.
        # rec-2285: split on first '=' only (line%%=* / line#*=) so values containing '=' are not
        # truncated (the old IFS='=' read -r key value silently dropped everything after the second =).
        if: success()
        run: |
          set -euo pipefail
          while IFS= read -r line; do
            key=${line%%=*}
            value=${line#*=}
            key=$(printf '%s' "$key" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            value=$(printf '%s' "$value" | sed 's/^[[:space:]]*"//;s/"[[:space:]]*$//')
            case "$key" in
              account_id|platform_dev_external_id|platform_admin_external_id)
                if [ -n "$value" ]; then
                  echo "::add-mask::${value}"
                fi
                ;;
            esac
          done < terraform/personal/terraform.personal.tfvars

      - name: Assert tfvars file is non-empty (fail-closed)
        # Fail-closed (Decision 77): a missing or empty tfvars file reds the run before plan.
        # Never use continue-on-error here -- an empty file would pass plan with wrong defaults.
        if: success()
        run: |
          test -s terraform/personal/terraform.personal.tfvars || {
            echo "terraform.personal.tfvars is empty or missing -- check the agent-platform-terraform-personal-tfvars secret" >&2
            exit 1
          }

      - name: Terraform init (S3 backend, sandbox)
        if: success()
        working-directory: ${{ env.WORKDIR }}
        run: |
          # Bounded retry for transient registry.terraform.io 5xx (rec-2237).
          # Transient signatures (parity with _TRANSIENT_INIT_SIGNATURES in scripts/validate.py):
          #   "502", "Bad Gateway", "could not query provider registry", "failed after "
          set +e
          attempt=1
          while [ "$attempt" -le 3 ]; do
            out=$(terraform init -input=false -backend-config=backend-sandbox.hcl 2>&1)
            rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "$out"
              break
            fi
            if echo "$out" | grep -qE '502|Bad Gateway|could not query provider registry|failed after '; then
              if [ "$attempt" -lt 3 ]; then
                delay=$(( 2 ** attempt ))
                echo "terraform init transient error (attempt ${attempt}/3); retrying in ${delay}s..." >&2
                echo "$out" >&2
                sleep "$delay"
                attempt=$(( attempt + 1 ))
                continue
              fi
            fi
            echo "$out" >&2
            set -e
            exit "$rc"
          done
          set -e

      - name: Fetch saved plan from S3 (push -- apply-the-saved-plan path, T2.21)
        id: fetch_plan
        # CD.35 Wave 2: on push to main, apply the SAME plan.bin reviewed on the PR (no re-plan).
        # Resolve the originating PR head SHA from the merge commit, fetch the persisted tfplan
        # object, and run terraform show -json to produce plan.json for the guard. Fail closed
        # if no PR is found or no saved plan object exists -- recovery is the workflow_dispatch
        # acknowledge-and-retry (dispatch re-plans fresh; push NEVER re-plans autonomously).
        if: success() && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          set -euo pipefail
          PR_HEAD_SHA=$(gh api "repos/${REPO}/commits/${SHA}/pulls" --jq '.[0].head.sha' 2>/dev/null || echo "")
          if [ -z "$PR_HEAD_SHA" ] || [ "$PR_HEAD_SHA" = "null" ]; then
            echo "::error::No originating PR resolved for ${SHA}; failing closed (no saved plan -- recovery is workflow_dispatch ack)." >&2
            exit 1
          fi
          PLAN_OBJ="s3://agent-platform-data-lake/tfplan/personal/${PR_HEAD_SHA}.bin"
          echo "Fetching saved plan: ${PLAN_OBJ}"
          if ! aws s3 ls "$PLAN_OBJ" > /dev/null 2>&1; then
            echo "::error::Saved plan object not found at ${PLAN_OBJ}; failing closed (push path has no re-plan fallback)." >&2
            exit 1
          fi
          aws s3 cp "$PLAN_OBJ" plan.bin
          terraform show -json plan.bin > plan.json
          echo "pr_head_sha=${PR_HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "Fetched and verified saved plan from ${PLAN_OBJ}"

      - name: Terraform plan (workflow_dispatch -- fresh plan)
        id: plan
        if: success() && github.event_name == 'workflow_dispatch'
        working-directory: ${{ env.WORKDIR }}
        run: |
          terraform plan -input=false -lock-timeout=120s -var-file=terraform.personal.tfvars -out=plan.bin
          terraform show -json plan.bin > plan.json

      - name: Deterministic apply guard (fail-closed)
        id: guard
        # Three-way exit code branch (CD.35 Wave 3 / T2.22 + T2.25 guard narrowing):
        #   exit 0 -- guard PASS; non-IAM or in-budget IAM (inline-policy/attachment UPDATE on
        #             managed boundary-carrying role, T2.25 / Decision 92 point 5); apply proceeds
        #   exit 2 -- guard BLOCKED (out-of-budget IAM / trust diff / destroy); sets routed=true
        #             output and exits 0 (routing is not a failure -- the gated-apply job takes
        #             over); record_write and apply SKIP when routed (anti-masking, Decision 55)
        #   exit 1 -- internal guard error; apply blocked, record_write writes red (fail-closed,
        #             Decision 77 / Decision 55 anti-masking)
        if: success()
        working-directory: ${{ env.WORKDIR }}
        run: |
          set +e
          python ../../scripts/terraform_apply_guard.py plan.json
          rc=$?
          set -e
          if [ "$rc" -eq 2 ]; then
            echo "Guard BLOCKED (exit 2): out-of-budget IAM / trust diff / destroy; routing to gated-apply job." >&2
            echo "routed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$rc" -ne 0 ]; then
            echo "Guard internal error (exit ${rc}); failing closed." >&2
            exit 1
          fi

      - name: Subagent plan review
        # Second gate: only runs if the guard passed (not routed). A non-PROCEED verdict fails the
        # step and blocks apply (the && exit 1 on absence of the PROCEED token enforces fail-closed).
        # Skipped when routed=true: human approval via the tf-gated-apply Environment is the
        # authorization gate for the fail-closed set; subagent review is not required on that path.
        if: success() && steps.guard.outputs.routed != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "Subagent review unavailable (no token); failing closed." >&2
            exit 1
          fi
          if ! command -v claude &> /dev/null; then
            sudo npm install -g @anthropic-ai/claude-code@2.1.148 --omit=dev --omit=optional && sudo npm cache clean --force
          fi
          ${GITHUB_WORKSPACE}/scripts/ci/claude_p_retry.sh review.txt -- \
            --output-format text \
            --max-turns 10 \
            "Review the terraform plan in plan.json for the sandbox auto-apply pipeline. It has already passed the deterministic guard (no destroy, no out-of-budget IAM/trust change; may include in-budget IAM inline-policy or attachment UPDATEs on managed boundary-carrying CI roles per T2.25). Confirm the plan is a safe, expected sandbox infrastructure change. Reply with exactly the single token PROCEED on its own line if safe to auto-apply, or REVISE followed by the reason if not." || true
          cat review.txt
          if ! grep -qx "PROCEED" review.txt; then
            echo "Subagent did not return PROCEED; failing closed." >&2
            exit 1
          fi

      - name: Terraform apply (same plan file the guard inspected)
        id: apply
        # Gated on success() of all prior steps (precondition + guard + subagent review). Applies
        # plan.bin -- the exact artefact the guard parsed via plan.json -- with no intervening
        # re-plan (no TOCTOU). Skipped when routed=true: the gated-apply job handles the apply
        # after human approval via the tf-gated-apply Environment (Decision 92).
        if: success() && steps.guard.outputs.routed != 'true'
        working-directory: ${{ env.WORKDIR }}
        run: terraform apply -input=false -lock-timeout=120s plan.bin

      - name: Write convergence record (always-run, red-on-failure)
        id: record_write
        # CD.35 5.5 integrity anchor: apply-identity-only write, ALWAYS-run so a failed apply writes
        # red (never leaves a stale green that would defeat the precondition). The step itself is
        # `if: always()`; it SKIPS the S3 write when the precondition refused OR the guard routed,
        # so neither a refused nor a routed run overwrites/corrupts the record. green iff apply
        # succeeded; red on any non-success (plan/guard internal error/review/apply). Guard BLOCK
        # (exit 2 -> routed=true) is NOT a failure -- the record is not latched red on this path;
        # the gated-apply job writes the record after the human-approved apply (Decision 55 anti-masking).
        if: always()
        env:
          REFUSED: ${{ steps.precond.outputs.refused }}
          ROUTED: ${{ steps.guard.outputs.routed }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$REFUSED" = "true" ]; then
            echo "Precondition refused on a red record; NOT overwriting the convergence record (anchor integrity)."
            exit 0
          fi
          if [ "$ROUTED" = "true" ]; then
            echo "Guard routed to gated-apply job (IAM/trust/destroy diff): NOT overwriting convergence record (anti-masking, Decision 55)."
            exit 0
          fi
          if [ "$APPLY_OUTCOME" = "success" ]; then
            STATUS="green"
          else
            STATUS="red"
          fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          # plan_sha: sha256 of the saved plan.bin applied on push (apply-the-saved-plan path, T2.21).
          # Null on workflow_dispatch (dispatch uses a fresh plan not persisted to S3).
          if [ "${EVENT_NAME}" = "push" ] && [ -f "${WORKDIR}/plan.bin" ]; then
            PLAN_SHA=$(sha256sum "${WORKDIR}/plan.bin" | cut -d' ' -f1)
          else
            PLAN_SHA=""
          fi
          export STATUS TS SHA RUN_ID RUN_URL PLAN_SHA
          RECORD=$(python3 -c "import json,os; v=os.environ.get('PLAN_SHA',''); print(json.dumps({'status':os.environ['STATUS'],'commit_sha':os.environ['SHA'],'run_id':os.environ['RUN_ID'],'run_url':os.environ['RUN_URL'],'timestamp':os.environ['TS'],'plan_sha':v if v else None}))")
          printf '%s' "$RECORD" | aws s3 cp - "s3://${CONVERGENCE_BUCKET}/${CONVERGENCE_KEY}" --content-type application/json
          echo "Wrote convergence record: ${RECORD}"
          # rec-2211: post-write read-back -- re-GET the object and verify the written status matches
          # the intended STATUS; fail the step on mismatch (write-verify, not assumed durable).
          READBACK=$(aws s3 cp "s3://${CONVERGENCE_BUCKET}/${CONVERGENCE_KEY}" - 2>/dev/null || echo "")
          READBACK_STATUS=$(printf '%s' "$READBACK" | python3 -c "import json,sys; print(json.load(sys.stdin).get('status','UNREADABLE'))" 2>/dev/null || echo "UNREADABLE")
          if [ "$READBACK_STATUS" != "$STATUS" ]; then
            echo "::error::CONVERGENCE_WRITE_VERIFY read-back status '${READBACK_STATUS}' != intended '${STATUS}'; record may be corrupt."
            exit 1
          fi
          echo "Convergence record read-back verified: status=${READBACK_STATUS}"

      - name: Best-effort post-merge SHA->PR wake
        # CD.35 5.3 / Decision 76 (poll-free): the push event's workflow_run.pull_requests[] is
        # empty, so resolve the originating PR from the merge commit SHA and comment to re-engage a
        # held subscription. BEST-EFFORT ONLY (continue-on-error) -- the authoritative baseline is
        # the next-planning-session record re-check; nothing depends on this wake. Skipped on
        # refusal (no apply ran).
        if: ${{ always() && github.event_name == 'push' && steps.precond.outputs.refused != 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          ROUTED: ${{ steps.guard.outputs.routed }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
        run: |
          PR_NUM=$(gh api "repos/${REPO}/commits/${SHA}/pulls" --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$PR_NUM" ] || [ "$PR_NUM" = "null" ]; then
            echo "No originating PR resolved for ${SHA}; next-planning-session baseline applies."
            exit 0
          fi
          if [ "$ROUTED" = "true" ]; then
            # Guard exit 2 (out-of-budget IAM / trust / destroy) -> routed to gated-apply job.
            # The convergence record is NOT touched; the gated-apply job pending reviewer approval
            # handles the apply. Distinct message so the held subscription knows a human action is
            # required (T2.22).
            MSG="sandbox terraform-apply guard routed ${SHA} to the tf-gated-apply job (out-of-budget IAM / trust / destroy diff). Pending reviewer approval in GitHub Actions -- the convergence record is unchanged until the gated apply completes. Approve at: Actions -> gated-apply job. (Best-effort wake.)"
          elif [ "$APPLY_OUTCOME" = "success" ]; then
            MSG="sandbox terraform-apply converged GREEN for ${SHA}; convergence record updated. (Best-effort wake; next planning session re-checks the record.)"
          else
            MSG="sandbox terraform-apply did NOT converge (RED) for ${SHA}; ci-rca will file a source=ci_rca rec. After review, unlatch via the workflow_dispatch acknowledge-and-retry path. (Best-effort wake.)"
          fi
          gh pr comment "$PR_NUM" --repo "$REPO" --body "$MSG" || true

  # ---------------------------------------------------------------------------
  # Speculative-plan job: pull_request ONLY, same-repo gated (CD.35 Wave 2 / T2.21).
  # Plans under github_ci_plan (tfstate-read, tfplan-write), captures the guard's PREDICTED
  # verdict, persists plan.bin keyed by PR head SHA for apply-the-saved-plan at merge, and
  # posts a redacted diff + verdict as a PR comment. Fork PRs are excluded via the job-level
  # if: guard (fork OIDC cannot assume github_ci_plan; the trust + job gate together enforce
  # the capability split from github_ci_pr which has NO tfstate read).
  # Decision 83 / CD.20: the speculative-plan PR comment is advisory -- do NOT add it to
  # required_status_checks (would wedge autonomous fix-merges once any record is red).
  # ---------------------------------------------------------------------------
  speculative-plan:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write       # OIDC for the plan role
      contents: read
      pull-requests: write  # post the speculative-plan comment
    env:
      AWS_DEFAULT_REGION: eu-west-2
      TF_VAR_aws_profile: ""
      WORKDIR: terraform/personal

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC -- plan role, PR only)
        # Best-effort: before the admin apply creates agent-platform-github-ci-plan (bootstrap
        # window), the assume-role fails. continue-on-error keeps the job from failing; subsequent
        # steps gate on steps.oidc_plan.outcome == 'success' and are skipped when creds are absent,
        # so the job ends green-with-skipped rather than hard-failing during the bootstrap window.
        id: oidc_plan
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/agent-platform-github-ci-plan
          aws-region: eu-west-2

      - name: Read pinned Terraform version
        id: tfver
        run: echo "version=$(cat config/terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Materialise tfvars from Secrets Manager
        if: success() && steps.oidc_plan.outcome == 'success'
        run: |
          set -euo pipefail
          aws secretsmanager get-secret-value \
            --secret-id agent-platform-terraform-personal-tfvars \
            --query SecretString --output text \
            > terraform/personal/terraform.personal.tfvars

      - name: Mask secret-sourced tfvars values in logs
        # rec-2285: split on first '=' only so values containing '=' are not truncated.
        if: success() && steps.oidc_plan.outcome == 'success'
        run: |
          set -euo pipefail
          while IFS= read -r line; do
            key=${line%%=*}
            value=${line#*=}
            key=$(printf '%s' "$key" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            value=$(printf '%s' "$value" | sed 's/^[[:space:]]*"//;s/"[[:space:]]*$//')
            case "$key" in
              account_id|platform_dev_external_id|platform_admin_external_id)
                if [ -n "$value" ]; then
                  echo "::add-mask::${value}"
                fi
                ;;
            esac
          done < terraform/personal/terraform.personal.tfvars

      - name: Assert tfvars file is non-empty (fail-closed)
        if: success() && steps.oidc_plan.outcome == 'success'
        run: |
          test -s terraform/personal/terraform.personal.tfvars || {
            echo "terraform.personal.tfvars is empty or missing -- check the agent-platform-terraform-personal-tfvars secret" >&2
            exit 1
          }

      - name: Terraform init (S3 backend, sandbox)
        if: success() && steps.oidc_plan.outcome == 'success'
        working-directory: ${{ env.WORKDIR }}
        run: |
          # Bounded retry for transient registry.terraform.io 5xx (parity with validate.py
          # _TRANSIENT_INIT_SIGNATURES: 502 / Bad Gateway / could not query provider registry / failed after ).
          set +e
          attempt=1
          while [ "$attempt" -le 3 ]; do
            out=$(terraform init -input=false -backend-config=backend-sandbox.hcl 2>&1)
            rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "$out"
              break
            fi
            if echo "$out" | grep -qE '502|Bad Gateway|could not query provider registry|failed after '; then
              if [ "$attempt" -lt 3 ]; then
                delay=$(( 2 ** attempt ))
                echo "terraform init transient error (attempt ${attempt}/3); retrying in ${delay}s..." >&2
                echo "$out" >&2
                sleep "$delay"
                attempt=$(( attempt + 1 ))
                continue
              fi
            fi
            echo "$out" >&2
            set -e
            exit "$rc"
          done
          set -e

      - name: Terraform speculative plan (-lock=false, read-only preview)
        id: spec_plan
        # -lock=false: github_ci_plan has no tfstate PutObject, so it cannot take the native S3
        # lock. The merge-time apply under github_ci_apply still locks normally.
        if: success() && steps.oidc_plan.outcome == 'success'
        working-directory: ${{ env.WORKDIR }}
        run: |
          terraform plan -lock=false -input=false -var-file=terraform.personal.tfvars -out=plan.bin
          terraform show -json plan.bin > plan.json

      - name: Deterministic apply guard (predicted verdict)
        id: pred_guard
        # Captures the PREDICTED verdict from the guard. This is advisory -- the
        # authoritative verdict is the guard re-run at merge time on the saved plan. Exit codes:
        #   0 = PASS (non-IAM or in-budget IAM, T2.25), 2 = BLOCKED (out-of-budget IAM/trust/destroy),
        #   1 = internal error.
        if: success() && steps.oidc_plan.outcome == 'success'
        working-directory: ${{ env.WORKDIR }}
        run: |
          set +e
          python ../../scripts/terraform_apply_guard.py plan.json
          PRED_RC=$?
          set -e
          if [ "$PRED_RC" -eq 0 ]; then
            echo "verdict=PASS" >> "$GITHUB_OUTPUT"
          elif [ "$PRED_RC" -eq 2 ]; then
            echo "verdict=BLOCKED" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=ERROR" >> "$GITHUB_OUTPUT"
          fi

      - name: Persist saved plan to S3
        # Keyed by PR head SHA: s3://agent-platform-data-lake/tfplan/personal/<sha>.bin.
        # The apply job resolves this key at merge time via the merge commit's PR lookup.
        if: success() && steps.oidc_plan.outcome == 'success'
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          set -euo pipefail
          aws s3 cp plan.bin "s3://agent-platform-data-lake/tfplan/personal/${HEAD_SHA}.bin"
          echo "Persisted saved plan to s3://agent-platform-data-lake/tfplan/personal/${HEAD_SHA}.bin"

      - name: Build and post PR comment (redacted plan + predicted verdict)
        # Post the speculative-plan diff + guard verdict as a PR comment. Scrub account_id and
        # ExternalIds (same rec-2285-fixed parsing used in the mask step). Self-check fails the
        # job if any 12-digit account-number sequence survives redaction (public-repo safety).
        if: always() && steps.spec_plan.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PREDICTED_VERDICT: ${{ steps.pred_guard.outputs.verdict || 'UNKNOWN' }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          set -euo pipefail
          # Extract values to scrub using the rec-2285-fixed first-'='-split parsing.
          ACCOUNT_ID_VAL=""
          DEV_EXT_ID=""
          ADM_EXT_ID=""
          while IFS= read -r line; do
            key=${line%%=*}
            value=${line#*=}
            key=$(printf '%s' "$key" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            value=$(printf '%s' "$value" | sed 's/^[[:space:]]*"//;s/"[[:space:]]*$//')
            case "$key" in
              account_id)                  ACCOUNT_ID_VAL="$value" ;;
              platform_dev_external_id)    DEV_EXT_ID="$value" ;;
              platform_admin_external_id)  ADM_EXT_ID="$value" ;;
            esac
          done < terraform.personal.tfvars

          # Build redacted plan text. Use Python str.replace (not sed) to avoid sed-injection:
          # ExternalId trust secrets may contain '/' or '&' which break sed s/// delimiters.
          PLAN_TEXT=$(terraform show -no-color plan.bin 2>/dev/null || echo "(plan output unavailable)")
          PLAN_REDACTED=$(printf '%s' "$PLAN_TEXT" \
            | _ACCT="$ACCOUNT_ID_VAL" _DEV="$DEV_EXT_ID" _ADM="$ADM_EXT_ID" \
              python3 -c "import sys,os;s=sys.stdin.read();a=os.environ.get('_ACCT','');d=os.environ.get('_DEV','');m=os.environ.get('_ADM','');s=(s.replace(a,'[ACCOUNT_ID]') if a else s);s=(s.replace(d,'[ExternalId]') if d else s);s=(s.replace(m,'[ExternalId]') if m else s);sys.stdout.write(s)")

          # Build the PR comment using concatenation (YAML block-scalar constraint: continuation
          # lines of a bare bash string drop to column 0, which the YAML scanner treats as an
          # alias token and fails to parse; keep all lines at run: | block indentation).
          _NL=$'\n'
          COMMENT="### Terraform Speculative Plan (CD.35 Wave 2 / T2.21)${_NL}"
          COMMENT+="${_NL}**Predicted guard verdict: ${PREDICTED_VERDICT}**${_NL}"
          COMMENT+="PR head SHA: \`${HEAD_SHA}\` -- this saved plan will be applied at merge (apply-the-saved-plan path).${_NL}"
          COMMENT+="A stale saved plan fails closed at merge; recovery is the workflow_dispatch acknowledge-and-retry path.${_NL}"
          COMMENT+="${_NL}<details>${_NL}<summary>Terraform plan output (sensitive values redacted)</summary>${_NL}"
          COMMENT+="${_NL}\`\`\`${_NL}${PLAN_REDACTED}${_NL}\`\`\`${_NL}</details>"

          # Redaction self-check: fail the job if any 12-digit sequence (account number) survives.
          if printf '%s' "$COMMENT" | grep -qP '(?<!\d)\d{12}(?!\d)' 2>/dev/null || \
             printf '%s' "$COMMENT" | python3 -c "import re,sys; s=sys.stdin.read(); sys.exit(1 if not re.search(r'(?<!\d)\d{12}(?!\d)',s) else 0)"; then
            echo "::error::REDACTION_FAIL: comment body contains a 12-digit account number; failing job to prevent account-id leak." >&2
            exit 1
          fi

          gh pr comment "$PR_NUM" --repo "$REPO" --body "$COMMENT" || true

  # ---------------------------------------------------------------------------
  # Advisory status job: pull_request ONLY, read-only (CD.35 5.5).
  # Reads the convergence record under the read-only PR role and posts the ADVISORY
  # terraform-converged commit status. NOT a required check (Decision 83) -- a required status would
  # wedge the autonomous fix-merge once a record is red, or be admin-bypassed anyway. Same-repo only
  # (fork PRs cannot mint the OIDC token / write statuses; mirrors ci-rca.yml's fork gate).
  # ---------------------------------------------------------------------------
  advisory-status:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write     # OIDC for the read-only PR role
      contents: read
      statuses: write     # post the advisory terraform-converged commit status
    env:
      AWS_DEFAULT_REGION: eu-west-2
    steps:
      - name: Configure AWS credentials (OIDC -- PR read-only role)
        # Best-effort: this advisory job must NEVER red a PR. Before the oidc.tf trust+read grant is
        # applied (the bootstrap window), or on any transient OIDC hiccup, the assume-role fails --
        # continue-on-error lets the job carry on and post the pass-on-absent (green) advisory rather
        # than failing the check. Post-apply the assume succeeds and the record is read for real.
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/agent-platform-github-ci-pr
          aws-region: eu-west-2

      - name: Read convergence record and post advisory terraform-converged status
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # pass-on-absent (and on read-denied pre-IAM-apply): treat a missing record as converged.
          REC_JSON=$(aws s3 cp "s3://${CONVERGENCE_BUCKET}/${CONVERGENCE_KEY}" - 2>/dev/null || echo "")
          if [ -z "$REC_JSON" ]; then
            STATE="success"
            DESC="No convergence record yet (pass-on-absent); main treated as converged. Advisory only."
          else
            STATUS=$(printf '%s' "$REC_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin).get('status',''))")
            RED_COMMIT=$(printf '%s' "$REC_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin).get('commit_sha',''))")
            if [ "$STATUS" = "red" ]; then
              STATE="failure"
              DESC="main is non-converged (last sandbox apply RED at ${RED_COMMIT}). Advisory only -- not a required check."
            else
              STATE="success"
              DESC="main is converged (last sandbox apply GREEN). Advisory only."
            fi
          fi
          TARGET="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            --method POST \
            --field state="${STATE}" \
            --field context="terraform-converged" \
            --field description="${DESC}" \
            --field target_url="${TARGET}"

  # ---------------------------------------------------------------------------
  # Gated-apply job: post-merge push ONLY, when guard exits 2 (CD.35 Wave 3 / T2.22).
  #
  # Triggered when apply-sandbox sets routed=true (guard exit 2: IAM/trust/destroy diff).
  # Declares environment: tf-gated-apply so the job does NOT start until a required reviewer
  # approves in GitHub Actions -- the Environment is the authorization boundary (Decision 92).
  #
  # Key invariants:
  #   - No re-plan: applies the SAME plan.bin the guard inspected (Decision 77 no-TOCTOU).
  #     A stale plan fails closed -> red convergence record -> ci-rca rec; recovery is the
  #     workflow_dispatch acknowledge-and-retry path only.
  #   - Always-run red-on-failure record write: a failed gated apply writes red (ci-rca files
  #     a rec). Decision 55 / 72 anti-masking: nothing auto-remediates.
  #   - NOT a PR required check (Decision 83 / T2.22): the gated-apply job is an out-of-band
  #     apply path, not a merge gate. Adding it to required_status_checks would wedge the
  #     autonomous fix-merge or be admin-bypassed.
  #   - Trust unchanged: assumes agent-platform-github-ci-apply (refs/heads/main ONLY). The
  #     Environment, not an OIDC environment claim in the sub, is the gate (oidc.tf comment).
  #   - Serialised by the shared concurrency group (cancel-in-progress: false): a pending
  #     gated-apply approval holds the group, so later auto-applies queue behind it. This is
  #     correct (serialisation prevents plan.bin from going stale; applies must serialise on
  #     shared tfstate). If an approval is abandoned, reject it in the GitHub Actions UI to
  #     release the queue.
  #   - Approval-window expiry: when the Environment approval window expires (GitHub default
  #     30 days -- adequate for this workflow's cadence) the waiting job transitions to failure,
  #     the workflow concludes failure, ci-rca.yml fires and files a rec, and the concurrency
  #     group releases normally. The "waiting" state during the review window is NOT a failure;
  #     ci-rca is triggered only on the eventual expiry/failure conclusion.
  # ---------------------------------------------------------------------------
  gated-apply:
    needs: [apply-sandbox]
    if: >-
      always() &&
      needs.apply-sandbox.result == 'success' &&
      needs.apply-sandbox.outputs.routed == 'true' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: tf-gated-apply
    permissions:
      id-token: write       # OIDC for the apply role (same as apply-sandbox)
      contents: read
      pull-requests: write  # best-effort post-merge wake comment
    env:
      AWS_DEFAULT_REGION: eu-west-2
      TF_VAR_aws_profile: ""
      WORKDIR: terraform/personal

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC -- apply role, main only)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/agent-platform-github-ci-apply
          aws-region: eu-west-2

      - name: Read pinned Terraform version
        id: tfver
        run: echo "version=$(cat config/terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Terraform init (S3 backend, sandbox)
        working-directory: ${{ env.WORKDIR }}
        run: |
          # Bounded retry for transient registry.terraform.io 5xx (parity with apply-sandbox).
          set +e
          attempt=1
          while [ "$attempt" -le 3 ]; do
            out=$(terraform init -input=false -backend-config=backend-sandbox.hcl 2>&1)
            rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "$out"
              break
            fi
            if echo "$out" | grep -qE '502|Bad Gateway|could not query provider registry|failed after '; then
              if [ "$attempt" -lt 3 ]; then
                delay=$(( 2 ** attempt ))
                echo "terraform init transient error (attempt ${attempt}/3); retrying in ${delay}s..." >&2
                echo "$out" >&2
                sleep "$delay"
                attempt=$(( attempt + 1 ))
                continue
              fi
            fi
            echo "$out" >&2
            set -e
            exit "$rc"
          done
          set -e

      - name: Fetch saved plan from S3 (gated-apply path, T2.22)
        id: fetch_plan
        # Resolve the PR head SHA from the merge commit and fetch plan.bin from S3.
        # Same logic as apply-sandbox's "Fetch saved plan" step. No re-plan -- applies the
        # guard-inspected plan verbatim (Decision 77 no-TOCTOU). Fail closed if no PR or no
        # saved plan exists; recovery is the workflow_dispatch acknowledge-and-retry path.
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          set -euo pipefail
          PR_HEAD_SHA=$(gh api "repos/${REPO}/commits/${SHA}/pulls" --jq '.[0].head.sha' 2>/dev/null || echo "")
          if [ -z "$PR_HEAD_SHA" ] || [ "$PR_HEAD_SHA" = "null" ]; then
            echo "::error::No originating PR resolved for ${SHA}; failing closed (no saved plan -- recovery is workflow_dispatch ack)." >&2
            exit 1
          fi
          PLAN_OBJ="s3://agent-platform-data-lake/tfplan/personal/${PR_HEAD_SHA}.bin"
          echo "Fetching saved plan: ${PLAN_OBJ}"
          if ! aws s3 ls "$PLAN_OBJ" > /dev/null 2>&1; then
            echo "::error::Saved plan object not found at ${PLAN_OBJ}; failing closed (no re-plan fallback)." >&2
            exit 1
          fi
          aws s3 cp "$PLAN_OBJ" plan.bin
          echo "pr_head_sha=${PR_HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "Fetched saved plan from ${PLAN_OBJ}"

      - name: Terraform apply (gated -- plan.bin verbatim, no re-plan)
        id: apply
        # Applies the exact plan.bin the guard inspected and the speculative-plan showed on the PR.
        # Human approval via tf-gated-apply Environment is the authorization. No re-plan after
        # approval (Decision 77 no-TOCTOU). A stale plan fails closed -> record write below sets red
        # -> ci-rca rec files. Recovery: workflow_dispatch acknowledge-and-retry path only.
        if: success()
        working-directory: ${{ env.WORKDIR }}
        run: terraform apply -input=false -lock-timeout=120s plan.bin

      - name: Write convergence record (always-run, red-on-failure)
        id: record_write
        # Reuses the T2.20 always-run red-on-failure record write. apply-identity-only write.
        # A failed gated apply writes red -> ci-rca files a source=ci_rca rec (Decision 55/72).
        # Recovery: dispatch-ack path (naming the red commit or rec-id) after rec review -- nothing
        # auto-remediates. plan_sha: sha256 of the applied plan.bin (same convention as apply-sandbox
        # push path; proves the saved plan -- not a re-plan -- was applied).
        #
        # No convergence-record precondition check here (unlike apply-sandbox's hard-block at Step 1):
        # the shared concurrency group (cancel-in-progress: false) serializes ALL applies on the
        # same tfstate, so the record cannot go red via the CD path while this job holds the group.
        # A workflow_dispatch ack run also queues behind this job (same group). This is an implicit
        # serialization invariant, not an explicit read-then-refuse gate -- accepted design tradeoff
        # for the gated path where the concurrency group provides the safety guarantee.
        #
        # Red-write dependency (VP10, 2026-06-22): this step writes the red record using the SAME
        # OIDC apply-role creds configured in the "Configure AWS credentials" step. If the failure
        # occurs AT OR BEFORE that creds step (e.g. the OIDC trust regresses, as VP9 first found),
        # this step cannot reach S3 ("Unable to locate credentials") and the record stays at its
        # prior value rather than going red. The backstop for that pre-creds window is ci-rca:
        # ci-rca.yml triggers on the terraform-apply-sandbox workflow_run conclusion == failure
        # (independent of the record), so a creds-stage gated-apply failure still files a rec and is
        # NOT silently masked. Failures AT the apply stage (creds already configured) DO red the
        # record here as intended.
        if: always()
        env:
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
        run: |
          if [ "$APPLY_OUTCOME" = "success" ]; then
            STATUS="green"
          else
            STATUS="red"
          fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          if [ -f "${WORKDIR}/plan.bin" ]; then
            PLAN_SHA=$(sha256sum "${WORKDIR}/plan.bin" | cut -d' ' -f1)
          else
            PLAN_SHA=""
          fi
          export STATUS TS SHA RUN_ID RUN_URL PLAN_SHA
          RECORD=$(python3 -c "import json,os; v=os.environ.get('PLAN_SHA',''); print(json.dumps({'status':os.environ['STATUS'],'commit_sha':os.environ['SHA'],'run_id':os.environ['RUN_ID'],'run_url':os.environ['RUN_URL'],'timestamp':os.environ['TS'],'plan_sha':v if v else None}))")
          printf '%s' "$RECORD" | aws s3 cp - "s3://${CONVERGENCE_BUCKET}/${CONVERGENCE_KEY}" --content-type application/json
          echo "Wrote convergence record: ${RECORD}"
          READBACK=$(aws s3 cp "s3://${CONVERGENCE_BUCKET}/${CONVERGENCE_KEY}" - 2>/dev/null || echo "")
          READBACK_STATUS=$(printf '%s' "$READBACK" | python3 -c "import json,sys; print(json.load(sys.stdin).get('status','UNREADABLE'))" 2>/dev/null || echo "UNREADABLE")
          if [ "$READBACK_STATUS" != "$STATUS" ]; then
            echo "::error::CONVERGENCE_WRITE_VERIFY read-back status '${READBACK_STATUS}' != intended '${STATUS}'; record may be corrupt."
            exit 1
          fi
          echo "Convergence record read-back verified: status=${READBACK_STATUS}"

      - name: Best-effort post-merge SHA->PR wake
        # Best-effort wake to re-engage a held subscription after the gated apply completes.
        # Same poll-free pattern as apply-sandbox (Decision 76). The authoritative baseline is
        # the next-planning-session convergence-record re-check.
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
        run: |
          PR_NUM=$(gh api "repos/${REPO}/commits/${SHA}/pulls" --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$PR_NUM" ] || [ "$PR_NUM" = "null" ]; then
            echo "No originating PR resolved for ${SHA}; next-planning-session baseline applies."
            exit 0
          fi
          if [ "$APPLY_OUTCOME" = "success" ]; then
            MSG="gated-apply converged GREEN for ${SHA} (IAM/trust/destroy change applied in CD after reviewer approval); convergence record updated with commit_sha and plan_sha. (Best-effort wake; next planning session re-checks the record.)"
          else
            MSG="gated-apply did NOT converge (RED) for ${SHA}; ci-rca will file a source=ci_rca rec. After review, unlatch via the workflow_dispatch acknowledge-and-retry path. (Best-effort wake.)"
          fi
          gh pr comment "$PR_NUM" --repo "$REPO" --body "$MSG" || true
