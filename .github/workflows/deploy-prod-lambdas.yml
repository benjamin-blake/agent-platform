name: deploy-prod-lambdas

# Governed code-deploy channel for the three prod-class Lambdas (T2.43 / Decision 125/126).
#
# Realizes the Decision 125 "deploy code" verb for the decoupled_build_pipeline class: the
# scheduled-agent-dispatcher, findings-processor, and ops-compaction functions (provisioned by
# terraform/personal/prod_lambdas.tf, rec-2157/rec-2164) ship code through this scoped, auditable
# path with post-deploy smoke gates and a deployment record -- retiring the local
# `bin/venv-python -m scripts.build_lambda --deploy` break-glass invocation as the ONLY route (it
# remains available as a genuinely non-default fallback; see
# docs/contracts/build-lambda.yaml deploy_channels.prod_functions / .ops_compaction). Mirrors
# .github/workflows/deploy-ducklake-lambdas.yml (T2.38) for the prod class.
#
# Terraform is NOT involved in this channel (Decision 126 point 1): code ships via this
# build/deploy pipeline scoped to UpdateFunctionCode-equivalent permissions only.
#
# Triggers on push to main touching prod source (kept in sync with
# scripts.convergence_health.PROD_SOURCE_PATHSPECS -- single conceptual source, rec-2686), and on
# workflow_dispatch (operator-triggered redeploy / recovery, e.g. after a stale-code drift alarm).
#
# deploy job:
#   - T2.49 / DEP-12 (Decision 144): assumes the merged agent-platform-github-ci-deploy role
#     (UpdateFunctionCode-only on the function:agent-platform-* prefix, covering all 8 functions
#     -- the three prod + five ducklake; no lambda-config, no invoke, no terraform, no iam-write).
#     This role replaces the retired prod-only deploy role and is shared with
#     deploy-ducklake-lambdas.yml -- ONE role, ONE provisioning signal (see
#     DEPLOY_ROLE_PROVISIONED below; the two per-class variables were reconciled to this single
#     shared name since both workflows now gate on the existence of the SAME role).
#   - This role is IAM-SENSITIVE and lands via the human-gated tf-gated-apply Environment
#     (Decision 77/92) -- it does NOT exist until an operator approves the gated apply of
#     terraform/personal/oidc.tf. continue-on-error on the assume-role step covers that
#     bootstrap window, but the tolerance is SCOPED (not blanket, Decision 55): it applies only
#     while the operator-owned repo variable DEPLOY_ROLE_PROVISIONED is not 'true'. The operator
#     sets that variable to 'true' as part of the same gated-apply step; from then on a failed
#     assume-role (a trust/policy regression, throttling, expired federation) FAILS LOUD instead
#     of reporting a silent green no-op deploy. Pre-provisioning pushes no-op (green,
#     deployed=false); post-provisioning regressions are red.
#   - Runs `build_lambda --deploy`, which builds + uploads + deploys the data-pipeline.zip +
#     ops-compaction.zip + data-pipeline-deps-layer.zip artifacts, capturing each function's
#     CodeSha256 and writing a deploy-records/prod/<function>.json record (function -> CodeSha256
#     -> source git SHA). Emits deployed=true only on a genuine successful deploy.
#
# smoke job (needs: deploy; Decision 55 false-green avoidance):
#   - Runs ONLY when deploy actually shipped code (needs.deploy.outputs.deployed == 'true') --
#     never on a bootstrap-window no-op.
#   - Asserts deploy-record freshness (source_git_sha == github.sha) for all three functions
#     BEFORE running the smoke gates -- a stale or partially-written record fails closed instead
#     of letting a skipped/no-op deploy report smoke-green.
#   - Assumes agent-platform-github-ci-branch (ProdLambdaInvokeCI grant -- the scoped deploy role
#     above needs no invoke permission, which keeps the "UpdateFunctionCode-only" literal).
#   - Invokes each of the three functions with an empty payload and asserts each one's observable,
#     schedule/PAT-independent output (verified against the handler source at plan time):
#       scheduled-agent-dispatcher -> {"status": "disabled", ...}      (SCHEDULED_AGENTS_ENABLED=false)
#       findings-processor         -> {"skipped_comparison": true, ...} (no live GitHub PAT value)
#       ops-compaction             -> {"statusCode": 400, "error": "malformed S3 event", ...} (no
#                                      S3 Records in an empty invoke payload -- a deterministic,
#                                      well-formed handled-error response, not a raw exception)
#     A failed gate is a loud-fail (Decision 55): stop and RCA, never auto-retry into green.

on:
  push:
    branches: [main]
    paths:
      - 'src/data/handlers/**'
      - 'scripts/aws_profile.py'
      - 'scripts/llm/github_models_client.py'
      - 'scripts/llm/client.py'
      - 'scripts/llm/utils.py'
      - 'scripts/ops_writer.py'
      - 'scripts/run_scheduled_agent.py'
      - 'scripts/s3_log_store.py'
      - 'scripts/telemetry_schemas.py'
      - 'scripts/tool_runtime.py'
      - 'config/lambda/data-pipeline/**'
      - 'config/lambda/ops-compaction/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  # Serialise governed deploys -- two concurrent update-function-code runs against the same
  # functions would race. cancel-in-progress: false so an in-flight deploy always completes.
  group: deploy-prod-lambdas
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      deployed: ${{ steps.deploy_code.outputs.deployed }}
    permissions:
      id-token: write  # OIDC token minting for assume-role
      contents: read

    env:
      AWS_DEFAULT_REGION: eu-west-2

    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials (OIDC -- merged deploy role, main only)
        # T2.49 / DEP-12 (Decision 144): repointed from the retired prod-only deploy role to the
        # merged agent-platform-github-ci-deploy role. Bootstrap-window guard: before the gated
        # apply creates it, this assume-role fails. continue-on-error keeps the job from
        # hard-failing so the "Classify assume-role outcome" step below can decide whether the
        # failure is the EXPECTED bootstrap-window absence or a real regression. The tolerance is
        # NOT blanket: it is scoped by DEPLOY_ROLE_PROVISIONED (see below).
        id: oidc_deploy
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/agent-platform-github-ci-deploy
          aws-region: eu-west-2

      - name: Classify assume-role outcome (scope the tolerance to the genuinely-absent role)
        # Decision 55 false-green guard: continue-on-error above must NOT silently swallow a
        # post-provisioning assume-role regression (a trust-policy edit, throttling, expired
        # federation) as a green no-op deploy. The bootstrap-window tolerance is gated on the
        # operator-owned repo variable DEPLOY_ROLE_PROVISIONED (T2.49 / DEP-12: reconciled from
        # the retired per-class PROD_DEPLOY_ROLE_PROVISIONED to one shared variable, since this
        # workflow and deploy-ducklake-lambdas.yml now gate on the SAME merged role), set to
        # 'true' as part of the gated-apply step that creates the role:
        #   - flag unset/not 'true' (pre-provisioning): a failed assume is the EXPECTED absent-role
        #     bootstrap window -> warn loudly and no-op (deployed stays unset -> smoke skips).
        #   - flag 'true' (role should exist): a failed assume is a REAL regression -> fail loud.
        # A successful assume is always fine regardless of the flag.
        if: steps.oidc_deploy.outcome != 'success'
        env:
          ROLE_PROVISIONED: ${{ vars.DEPLOY_ROLE_PROVISIONED }}
        run: |
          set -euo pipefail
          if [ "$ROLE_PROVISIONED" = "true" ]; then
            echo "::error::assume-role failed but DEPLOY_ROLE_PROVISIONED=true -- the merged agent-platform-github-ci-deploy role is expected to exist, so this is a real regression (trust/policy/throttle/federation), NOT the bootstrap window. Failing loud (Decision 55) rather than reporting a silent green no-op deploy."
            exit 1
          fi
          echo "::warning::assume-role failed and DEPLOY_ROLE_PROVISIONED is not 'true' -- treating as the pre-provisioning bootstrap window (role genuinely absent). No deploy performed (deployed=false); the operator lands the gated apply and sets DEPLOY_ROLE_PROVISIONED=true to close this window."

      - name: Setup Python 3.12
        if: steps.oidc_deploy.outcome == 'success'
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install build_lambda runtime deps
        # This runner has no .venv (CC-web-only convention). build_lambda's manifest-driven
        # staging needs pyyaml (parse manifest.yaml) + pydantic (LambdaManifest schema);
        # upload/deploy go through the AWS CLI via subprocess, not boto3. NOTE: this deploy
        # uploads (no --skip-upload), so it also exercises validate_bucket_exists ->
        # `aws s3api head-bucket` (needs the role's DataLakeHeadBucket s3:ListBucket grant) and
        # update-function-code + the deploy-record write.
        if: steps.oidc_deploy.outcome == 'success'
        run: pip install pyyaml pydantic

      - name: Build + upload + deploy prod Lambda code
        id: deploy_code
        if: steps.oidc_deploy.outcome == 'success'
        run: |
          set -euo pipefail
          python -m scripts.build_lambda --deploy --profile "" --bucket agent-platform-data-lake
          echo "deployed=true" >> "$GITHUB_OUTPUT"

  smoke:
    needs: deploy
    if: needs.deploy.outputs.deployed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write  # OIDC token minting for assume-role
      contents: read

    env:
      AWS_DEFAULT_REGION: eu-west-2

    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials (OIDC -- github_ci_branch role, prod-class invoke)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/agent-platform-github-ci-branch
          aws-region: eu-west-2

      - name: Assert deploy-record freshness (source_git_sha == github.sha)
        # False-green guard (Decision 55): a skipped/partial/stale deploy must not let the smoke
        # gates report green against previously-deployed code. Reads each of the three deploy
        # records this run's deploy job wrote and asserts source_git_sha matches the commit that
        # triggered this workflow run.
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          for fn in agent-platform-scheduled-agent-dispatcher agent-platform-findings-processor agent-platform-ops-compaction; do
            RECORD=$(aws s3 cp "s3://agent-platform-data-lake/deploy-records/prod/${fn}.json" - --region eu-west-2)
            ACTUAL_SHA=$(printf '%s' "$RECORD" | python3 -c "import json,sys; print(json.load(sys.stdin).get('source_git_sha') or '')")
            if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
              echo "::error::DEPLOY_RECORD_STALE ${fn}: source_git_sha=${ACTUAL_SHA} != github.sha=${EXPECTED_SHA} -- a stale or skipped deploy cannot report smoke-green (Decision 55 false-green guard)." >&2
              exit 1
            fi
            echo "OK ${fn} deploy record fresh: ${ACTUAL_SHA}"
          done

      - name: Smoke invoke -- scheduled-agent-dispatcher (expect status=disabled; schedule stays off)
        run: |
          set -euo pipefail
          aws lambda invoke --function-name agent-platform-scheduled-agent-dispatcher \
            --payload '{}' --cli-binary-format raw-in-base64-out --region eu-west-2 out-dispatcher.json
          cat out-dispatcher.json
          python3 -c "import json; d=json.load(open('out-dispatcher.json')); assert d.get('status') == 'disabled', d"
          echo "OK scheduled-agent-dispatcher smoke: status=disabled"

      - name: Smoke invoke -- findings-processor (expect skipped_comparison=true; no live PAT value)
        run: |
          set -euo pipefail
          aws lambda invoke --function-name agent-platform-findings-processor \
            --payload '{}' --cli-binary-format raw-in-base64-out --region eu-west-2 out-findings.json
          cat out-findings.json
          python3 -c "import json; d=json.load(open('out-findings.json')); assert d.get('skipped_comparison') is True, d"
          echo "OK findings-processor smoke: skipped_comparison=true"

      - name: Smoke invoke -- ops-compaction (expect a well-formed handled-error response)
        run: |
          set -euo pipefail
          aws lambda invoke --function-name agent-platform-ops-compaction \
            --payload '{}' --cli-binary-format raw-in-base64-out --region eu-west-2 out-ops.json
          cat out-ops.json
          python3 -c "import json; d=json.load(open('out-ops.json')); assert d.get('statusCode') == 400 and d.get('error') == 'malformed S3 event', d"
          echo "OK ops-compaction smoke: handled malformed-event response"
