name: CI
# Thin safety net: calls python -m scripts.validate (single source of truth for validation logic).
# Agents validate locally via python -m scripts.validate before pushing.
# To add a new check: add it to validate.py first, then it runs both locally and here.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  pr-validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Cache dependencies
      uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache pre-commit hook environments
      uses: actions/cache@v6
      with:
        path: ~/.cache/pre-commit
        key: ${{ runner.os }}-precommit-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          ${{ runner.os }}-precommit-

    - name: Install fast-tier dependencies only
      # --pre runs ruff, mypy, pytest --picked, pyyaml-backed validators, and the
      # diff-aware pre-commit suite (detect-secrets + denylist + hygiene).
      # It does NOT need torch, CUDA, pyarrow, awswrangler, etc. Installing
      # the full requirements.txt fills the runner's disk
      # (~3GB of torch+CUDA wheels). Versions sourced from requirements.txt via -c;
      # pre-commit is pinned in requirements-dev.txt.
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-fast.txt
        pip install -r requirements-dev.txt

    - name: Validate fast tier (ruff lint, ruff format, mypy, prompt checks)
      env:
        AWS_DEFAULT_REGION: eu-west-2
      run: python -m scripts.validate --pre

  main-validate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write      # REQUIRED for OIDC token minting
      contents: read

    steps:
    - uses: actions/checkout@v7

    - name: Configure AWS credentials (OIDC -- branch role)
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/agent-platform-github-ci-branch
        aws-region: eu-west-2

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Cache dependencies
      uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache pre-commit hook environments
      uses: actions/cache@v6
      with:
        path: ~/.cache/pre-commit
        key: ${{ runner.os }}-precommit-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          ${{ runner.os }}-precommit-

    - name: Install dependencies
      # requirements-dev.txt supplies pre-commit (pinned), needed for the full-tier
      # `pre-commit run --all-files` step inside validate.py.
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Validate full tier (ruff, mypy, pytest, DQ runner, verifier harness)
      env:
        AWS_DEFAULT_REGION: eu-west-2
      run: python -m scripts.validate

  terraform-validate:
    # GitHub-hosted runner (CD.21 -- self-hosted runner retired). Delegates to
    # `python -m scripts.validate --terraform-only`, the single source of truth for
    # terraform validation: init -backend=false + validate + fmt -check across BOTH
    # roots (terraform/ and terraform/personal/). Makes ZERO AWS calls (no plan), so
    # no OIDC step is added. Fires on both push and PR (no if: guard); a branch-role
    # OIDC step here would reject PR events whose sub claim is refs/pull/*.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7

    - name: Read pinned Terraform version
      id: tfver
      run: echo "version=$(cat config/terraform-version)" >> "$GITHUB_OUTPUT"

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ steps.tfver.outputs.version }}

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install validate.py import-time deps
      run: pip install pyyaml pydantic

    - name: Terraform validate + fmt (both roots via validate.py)
      run: python -m scripts.validate --terraform-only

  signal-green:
    # Gate: fires only after BOTH PR checks succeed. This captures every required
    # PR-gating check in this workflow (pr-validate + terraform-validate). INVARIANT:
    # if a future workflow adds a pull_request-triggered check it must be added to
    # this needs list -- cross-workflow needs are not supported by GitHub Actions.
    # The PR-activity subscription wakes a watching Claude session on comments and
    # failures, not on clean check passes -- so an all-green PR is silent. Posting a
    # pass comment on agent (claude/*) branch PRs restores the green wake only AFTER
    # all required checks complete. Scoped to claude/* to avoid commenting on every
    # human PR; continue-on-error so a comment hiccup can never red the build.
    needs: [pr-validate, terraform-validate]
    if: ${{ success() && github.event_name == 'pull_request' && startsWith(github.head_ref, 'claude/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Signal green CI (wake a watching session)
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
      run: |
        gh pr comment "${{ github.event.pull_request.number }}" \
          --body "CI green: all required PR checks passed for ${{ github.event.pull_request.head.sha }}. Automated wake signal for a watching session; no action needed."
