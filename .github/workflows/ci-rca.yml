name: CI RCA
# Triggered on every CI failure. Invokes the ci-rca agent headlessly to diagnose
# the root cause and file a recommendation via ops_data_portal.
# Decision 72: RCA-as-Plan-Source for CI Merge Gate Failures.

on:
  workflow_run:
    # CD.35 / T2.20: terraform-apply-sandbox is wired in so sandbox apply FAILURES (and the
    # refusals-while-red they cause) file source=ci_rca recs. The dedup step below anchors
    # terraform-apply-sandbox failures on the red convergence record's commit so one underlying
    # apply failure + every later refusal collapse to ONE rec.
    workflows: ["CI", "Main Canary", "terraform-apply-sandbox"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'GitHub Actions run ID of the failed CI run to diagnose'
        required: true
        type: string
      force_rca:
        description: 'Force RCA even if already filed for this commit (dedup bypass)'
        required: false
        type: boolean
        default: false

# Only run when CI failed -- skip success and cancellation.
# Loop guard: this workflow is NOT listed in the workflows: filter above,
# so a ci-rca failure cannot trigger another ci-rca run.
jobs:
  rca:
    # Fork-PR privilege gate (public-repo CRITICAL): ci-rca runs in the base-repo context with the
    # write-capable branch role, so a fork PR that merely fails CI must NOT trigger it. workflow_dispatch
    # (manual, privileged actor) is retained; workflow_run is gated to the same repo (non-fork).
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch == github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      actions: read
      statuses: write

    steps:
      - name: Checkout at failing commit
        uses: actions/checkout@v7
        with:
          # workflow_run: the failing commit. workflow_dispatch: head_sha is absent, so fall back
          # to github.sha (the dispatched ref, e.g. main) -- an empty ref would silently checkout
          # the default branch; this makes that intent explicit.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          # fetch-depth: 2 is required so HEAD^ exists for git diff HEAD^ HEAD in the evidence
          # bundle's merged-diff reconstruction (ci_rca_vacuous_pass.merged_diff_files).
          fetch-depth: 2

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Activate venv
        # setup.py is a dev-env bootstrap utility, not a packaging script -- it defines no
        # installable package and no [dev] extra, so `pip install -e .[dev]` is a no-op that
        # leaves scripts.ops_data_portal unimportable and file_rec silently failing. Install the
        # real dependencies from requirements.txt (mirrors the main-validate job).
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install -r requirements.txt

      # TODO(bedrock): When this runner migrates to GitHub-hosted (target: 90-day window),
      # replace this step and the `claude -p` invocation below with a Python entrypoint
      # that calls bedrock-runtime via the runner's IAM role (boto3). This eliminates the
      # Claude Code CLI dependency, the CLAUDE_CODE_OAUTH_TOKEN rotation requirement, and the
      # npm permission complexity (EACCES on global npm install without sudo) entirely.
      - name: Install Claude Code CLI
        run: |
          if ! command -v claude &> /dev/null; then
            sudo npm install -g @anthropic-ai/claude-code@2.1.148 --omit=dev --omit=optional && sudo npm cache clean --force
          fi
          claude --version

      - name: Configure AWS credentials (OIDC -- branch role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/agent-platform-github-ci-branch
          aws-region: eu-west-2

      - name: Resolve run metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          # Bind event/input values to env (never interpolate ${{ }} directly into run: bodies)
          # and sanitise the untrusted dispatch run_id to digits to prevent shell injection.
          RUN_ID_RAW: ${{ github.event.workflow_run.id || github.event.inputs.run_id }}
          HEAD_SHA_RAW: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_NAME_RAW: ${{ github.event.workflow_run.name }}
          # CD.35 / T2.20: the convergence record (its own prefix, outside tfstate/). The branch role
          # already reads the whole data-lake bucket, so no extra IAM grant is needed here.
          CONVERGENCE_BUCKET: agent-platform-data-lake
          CONVERGENCE_KEY: convergence/personal/sandbox.json
        run: |
          RUN_ID=$(printf '%s' "$RUN_ID_RAW" | tr -cd '0-9')
          HEAD_SHA="$HEAD_SHA_RAW"
          WORKFLOW_NAME="$WORKFLOW_NAME_RAW"

          if [ -z "$HEAD_SHA" ]; then
            HEAD_SHA=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}" --jq '.head_sha' 2>/dev/null || echo "")
          fi
          if [ -z "$WORKFLOW_NAME" ]; then
            WORKFLOW_NAME=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}" --jq '.name' 2>/dev/null || echo "unknown")
          fi

          WORKFLOW_SLUG=$(echo "$WORKFLOW_NAME" | tr '[:upper:]' '[:lower:]' | tr ' /' '_-' | sed 's/[^a-z0-9_-]//g')

          # Convergence-refusal dedup (CD.35 5.5d): a terraform-apply-sandbox apply FAILURE and the
          # refusals-while-red it causes on LATER commits are ONE underlying failure. Anchor the
          # dedup on the RED record's commit (not the refusing run's head_sha) so the first failure
          # files one rec and every later refusal dedupes against it. Non-apply-sandbox workflows and
          # a green/absent record fall back to head_sha (unchanged behaviour).
          ANCHOR_SHA="$HEAD_SHA"
          if [ "$WORKFLOW_SLUG" = "terraform-apply-sandbox" ]; then
            REC_JSON=$(aws s3 cp "s3://${CONVERGENCE_BUCKET}/${CONVERGENCE_KEY}" - 2>/dev/null || echo "")
            if [ -n "$REC_JSON" ]; then
              REC_STATUS=$(printf '%s' "$REC_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
              REC_COMMIT=$(printf '%s' "$REC_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin).get('commit_sha',''))" 2>/dev/null || echo "")
              if [ "$REC_STATUS" = "red" ] && [ -n "$REC_COMMIT" ]; then
                ANCHOR_SHA="$REC_COMMIT"
                echo "Convergence dedup: anchoring on red-record commit ${REC_COMMIT} (run head ${HEAD_SHA})."
              fi
            fi
          fi

          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "anchor_sha=${ANCHOR_SHA}" >> "$GITHUB_OUTPUT"
          echo "workflow_slug=${WORKFLOW_SLUG}" >> "$GITHUB_OUTPUT"
          echo "workflow_name=${WORKFLOW_NAME}" >> "$GITHUB_OUTPUT"

      - name: Fetch failed run logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ steps.meta.outputs.run_id }}"
          # Retry loop: the workflow_run log-availability race means logs may not
          # be ready immediately after the triggering run completes (rec-2117 / rec-2118).
          LOG_FETCHED=false
          for ATTEMPT in 1 2 3; do
            gh run view "$RUN_ID" --repo "${{ github.repository }}" --log-failed > /tmp/ci-rca-failed.log 2>&1 \
              || gh run view "$RUN_ID" --repo "${{ github.repository }}" --log > /tmp/ci-rca-failed.log 2>&1 \
              || true
            if test -s /tmp/ci-rca-failed.log; then
              LOG_FETCHED=true
              break
            fi
            echo "Attempt ${ATTEMPT}: log empty or unavailable; waiting before retry..." >&2
            sleep $((ATTEMPT * 10))
          done
          if [ "$LOG_FETCHED" != "true" ]; then
            echo "::error::ci-rca: log file is empty after ${ATTEMPT} attempts for run ${RUN_ID}. " \
              "The log may not be available yet or the run produced no output. Failing loudly so " \
              "the agent is not invoked on a 0-byte log (rec-2117 / rec-2118)."
            exit 1
          fi

      - name: Fetch jobs JSON
        id: jobs_json
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          RUN_ID="${{ steps.meta.outputs.run_id }}"
          gh run view "$RUN_ID" --repo "${{ github.repository }}" --json jobs \
            > /tmp/ci-rca-jobs.json 2>/dev/null || echo '{}' > /tmp/ci-rca-jobs.json

      - name: Generate evidence bundle
        id: evidence
        continue-on-error: true
        env:
          S3_LOG_BUCKET: agent-platform-data-lake
        run: |
          RUN_ID="${{ steps.meta.outputs.run_id }}"
          WORKFLOW_NAME="${{ steps.meta.outputs.workflow_name }}"
          .venv/bin/python -m scripts.ci_rca_evidence \
            --log-file /tmp/ci-rca-failed.log \
            --jobs-file /tmp/ci-rca-jobs.json \
            --workflow-name "$WORKFLOW_NAME" \
            --workflow-run-id "$RUN_ID" \
            --emit-dir /tmp/ci-rca-bundles \
            > /tmp/ci-rca-evidence-out.txt 2>/tmp/ci-rca-evidence-err.txt || true
          BUNDLE_SHA=$(grep '^BUNDLE_SHA=' /tmp/ci-rca-evidence-out.txt | head -1 | cut -d= -f2 || echo "")
          BUNDLE_S3_URI=$(grep '^BUNDLE_S3_URI=' /tmp/ci-rca-evidence-out.txt | head -1 | cut -d= -f2 || echo "")
          BUNDLE_PATH=$(grep '^BUNDLE_PATH=' /tmp/ci-rca-evidence-out.txt | head -1 | cut -d= -f2 || echo "")
          BUNDLE_LOCAL=$(grep '^BUNDLE_LOCAL=' /tmp/ci-rca-evidence-out.txt | head -1 | cut -d= -f2 || echo "")
          # Extract per-check failure categories from the emitted bundles (schema_version 2,
          # N-failure enumeration). Used by the dedup guard and mark steps for per-category contexts.
          CATEGORIES=""
          if ls /tmp/ci-rca-bundles/*.json 2>/dev/null | head -1 > /dev/null; then
            CATEGORIES=$(for f in /tmp/ci-rca-bundles/*.json; do
              .venv/bin/python -c "import json,pathlib; print(json.loads(pathlib.Path('$f').read_text(encoding='utf-8'))['failure_category'])" 2>/dev/null || echo "unknown"
            done | sort -u | paste -sd ',' -)
          fi
          echo "bundle_sha=${BUNDLE_SHA}" >> "$GITHUB_OUTPUT"
          echo "bundle_s3_uri=${BUNDLE_S3_URI}" >> "$GITHUB_OUTPUT"
          echo "bundle_path=${BUNDLE_PATH}" >> "$GITHUB_OUTPUT"
          echo "bundle_local=${BUNDLE_LOCAL}" >> "$GITHUB_OUTPUT"
          echo "categories=${CATEGORIES}" >> "$GITHUB_OUTPUT"

          # c12(ii): bundle_absent when the generator produced neither a BUNDLE_SHA nor any
          # emit-dir bundle file -- the continue-on-error above swallowed a hard failure, so the
          # agent has zero deterministic evidence. Surface it loudly instead of letting the agent
          # proceed as if it had a bundle.
          BUNDLE_ABSENT="false"
          if [ -z "$BUNDLE_SHA" ] && ! ls /tmp/ci-rca-bundles/*.json > /dev/null 2>&1; then
            BUNDLE_ABSENT="true"
            echo "[CI_RCA_BUNDLE_ABSENT] evidence bundle generation produced no BUNDLE_SHA and no emit-dir bundle file for run ${RUN_ID}."
          fi
          echo "bundle_absent=${BUNDLE_ABSENT}" >> "$GITHUB_OUTPUT"

      - name: Dedup guard
        id: dedup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ANCHOR_SHA="${{ steps.meta.outputs.anchor_sha }}"
          WORKFLOW_SLUG="${{ steps.meta.outputs.workflow_slug }}"
          CATEGORIES="${{ steps.evidence.outputs.categories }}"

          ALREADY_FILED="false"
          if [ "${{ github.event.inputs.force_rca }}" = "true" ]; then
            echo "force_rca=true; bypassing per-category dedup check."
          elif [ -n "$ANCHOR_SHA" ] && [ -n "$CATEGORIES" ]; then
            # Per-category dedup: check each category's status context separately so a real
            # regression co-occurring with a SLOC line is not masked by a single context key.
            ALREADY_FILED="true"
            IFS=',' read -ra CAT_ARRAY <<< "$CATEGORIES"
            for CAT in "${CAT_ARRAY[@]}"; do
              CONTEXT="ci-rca/${WORKFLOW_SLUG}/${CAT}"
              STATE=$(gh api "repos/${{ github.repository }}/commits/${ANCHOR_SHA}/statuses" \
                --jq ".[] | select(.context == \"${CONTEXT}\") | .state" 2>/dev/null | head -1)
              if [ "$STATE" != "success" ]; then
                ALREADY_FILED="false"
                echo "Category ${CAT} not yet filed (context=${CONTEXT}); will run agent."
                break
              fi
            done
            if [ "$ALREADY_FILED" = "true" ]; then
              echo "Dedup: all categories (${CATEGORIES}) already filed for ${WORKFLOW_SLUG}@${ANCHOR_SHA}; skipping."
            fi
          fi

          echo "already_filed=${ALREADY_FILED}" >> "$GITHUB_OUTPUT"

      - name: Run ci-rca agent
        id: rca_agent
        if: steps.dedup.outputs.already_filed != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          CI_RCA_BUNDLE_EMIT_DIR: /tmp/ci-rca-bundles
        run: |
          RUN_ID="${{ steps.meta.outputs.run_id }}"
          BUNDLE_SHA="${{ steps.evidence.outputs.bundle_sha }}"
          BUNDLE_S3_URI="${{ steps.evidence.outputs.bundle_s3_uri }}"
          BUNDLE_PATH="${{ steps.evidence.outputs.bundle_path }}"
          BUNDLE_LOCAL="${{ steps.evidence.outputs.bundle_local }}"
          BUNDLE_ABSENT="${{ steps.evidence.outputs.bundle_absent }}"
          EVIDENCE_CONTEXT=""
          if ls /tmp/ci-rca-bundles/*.json 2>/dev/null >/dev/null 2>&1; then
            # Reference the emit-dir so multi-failure runs expose all N bundles to the agent.
            # For a single-failure run BUNDLE_SHA is the only SHA; for N>1 the agent enumerates
            # /tmp/ci-rca-bundles/*.json to find each bundle's sha256 and failure_category.
            EVIDENCE_CONTEXT=" Evidence bundle(s) are at /tmp/ci-rca-bundles/ -- enumerate *.json for multi-failure runs (one JSON per failed check). Primary bundle SHA: ${BUNDLE_SHA}. Primary S3 URI: ${BUNDLE_S3_URI}. Pending path: ${BUNDLE_PATH}. Local path: ${BUNDLE_LOCAL}."
          fi
          # c12(ii): when no evidence bundle was generated at all, force the agent onto the
          # mandatory human-review route instead of letting it file a confidently-wrong rec with
          # zero deterministic evidence. ops_data_portal.file_rec's bundle-absent fail-loud check
          # only accepts a bundle-absent rec when rca_confidence='undetermined'.
          if [ "$BUNDLE_ABSENT" = "true" ]; then
            EVIDENCE_CONTEXT=" No evidence bundle was generated for this run (bundle_absent=true) -- you have zero deterministic evidence. You MUST set detection_gap.earliest_viable_gate='undetermined', rca_confidence='undetermined', and file the rec anyway so it routes to mandatory human review (preflight 'CI-RCA Mandatory Human Review'). Do NOT guess earliest_viable_gate/escape_mode without a bundle."
          fi
          # Pass the prompt via stdin: --allowedTools is variadic and would otherwise swallow a
          # trailing positional prompt, leaving claude with no input ("Input must be provided
          # either through stdin or as a prompt argument when using --print").
          PROMPT="Apply the .claude/agents/scheduled/ci-rca.md instructions to failed CI run ${RUN_ID}. The failed log is at /tmp/ci-rca-failed.log.${EVIDENCE_CONTEXT}"
          printf '%s' "$PROMPT" | ${GITHUB_WORKSPACE}/scripts/ci/claude_p_retry.sh /tmp/ci-rca-output.json -- \
            --output-format json \
            --max-turns 30 \
            --allowedTools "Read,Bash(grep:*),Bash(cat:*),Bash(git log:*),Bash(bin/venv-python -m scripts.ops_data_portal:*)" || true
          cat /tmp/ci-rca-output.json
          # Deterministic filing check: the marker/dedup must reflect a real filing, not the
          # || true-masked exit above. The parser exits 1 when no FILED: rec-NNN marker is
          # present, so a run that only mentions a rec id is never marked as RCA'd
          # (fail-open toward re-diagnosis, per Decision 74).
          REC_ID=$(bin/venv-python -m scripts.ci_rca_filing /tmp/ci-rca-output.json || true)
          if [ -z "$REC_ID" ]; then
            echo "::error::ci-rca agent filed no recommendation (no FILED: marker in output)"
            exit 1
          fi
          echo "rec_id=${REC_ID}" >> "$GITHUB_OUTPUT"

      - name: Mark failure as RCA'd
        id: mark_rca
        if: steps.rca_agent.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Mark per-category (ci-rca/<workflow-slug>/<category>) so a real regression co-occurring
          # with a SLOC failure produces two un-collapsed status contexts. CD.35 5.5d: for
          # terraform-apply-sandbox the anchor is the red record's commit; for other workflows
          # anchor IS head_sha.
          ANCHOR_SHA="${{ steps.meta.outputs.anchor_sha }}"
          WORKFLOW_SLUG="${{ steps.meta.outputs.workflow_slug }}"
          CATEGORIES="${{ steps.evidence.outputs.categories }}"
          if [ -z "$CATEGORIES" ]; then
            CATEGORIES="unknown"
          fi
          if [ -n "$ANCHOR_SHA" ]; then
            IFS=',' read -ra CAT_ARRAY <<< "$CATEGORIES"
            for CAT in "${CAT_ARRAY[@]}"; do
              CONTEXT="ci-rca/${WORKFLOW_SLUG}/${CAT}"
              gh api "repos/${{ github.repository }}/statuses/${ANCHOR_SHA}" \
                --method POST \
                --field state=success \
                --field context="${CONTEXT}" \
                --field description="ci-rca filed a recommendation for this failure"
            done
          fi

      - name: Comment on originating PR
        # Gate on the agent actually running (not dedup-skipped) so a skipped run never posts a
        # misleading "filed unknown" comment.
        if: ${{ steps.rca_agent.outcome == 'success' && github.event.workflow_run.pull_requests[0] != null && github.event.workflow_run.pull_requests[0].number != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ github.event.workflow_run.pull_requests[0].number }}"
          RUN_ID="${{ github.event.workflow_run.id }}"
          REC_ID="${{ steps.rca_agent.outputs.rec_id }}"
          gh pr comment "${PR_NUM}" \
            --body "ci-rca agent diagnosed CI run ${RUN_ID} and filed ${REC_ID}. Review in the next /plan session under 'CI RCA Recs (open)'."
