name: Main Canary

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v7

    - name: Configure AWS credentials (OIDC -- branch role)
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/agent-platform-github-ci-branch
        aws-region: eu-west-2

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Cache dependencies
      uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Validate full tier against main
      env:
        AWS_DEFAULT_REGION: eu-west-2
      run: python -m scripts.validate

    - name: Upload pytest junit report (v2 fingerprint substrate)
      # ci-rca-identity-lifecycle: mirrors ci.yml's main-validate job -- Main Canary is a
      # ci-rca.yml workflow_run trigger too, so its pytest failures need the same v2 signature.
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: pytest-junit
        path: logs/debug/pytest-junit.xml
        if-no-files-found: ignore
        retention-days: 14
