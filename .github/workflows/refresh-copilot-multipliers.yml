name: Refresh Copilot Model Multipliers

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-multipliers:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run multipliers refresher
        id: refresh
        run: |
          python -m scripts.copilot_multipliers_refresher
          echo "refresh_exit=$?" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/agent/copilot/model_multipliers.yaml
          git commit -m "chore: refresh copilot model multipliers metadata"
          git push

      - name: Log results
        run: |
          echo "## Copilot Multipliers Refresh" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Script exit code: ${{ steps.refresh.outputs.refresh_exit }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changes detected: ${{ steps.check_changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "- Status: Configuration updated and committed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Status: No changes needed" >> $GITHUB_STEP_SUMMARY
          fi
