name: Deploy to AWS
# Disabled: trigger is workflow_dispatch only until staging/prod environments exist.
# When environments are set up, update to OIDC federated auth (no static credentials).
# See DECISIONS.md for the planned escalation strategy.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'sandbox'
        type: choice
        options: [ sandbox ]

permissions:
  contents: read
  id-token: write  # Reserved for OIDC federated auth (not yet configured)

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v7

    # TODO: Replace with OIDC role assumption when environments are set up.
    # Example:
    #   - uses: aws-actions/configure-aws-credentials@v6
    #     with:
    #       role-to-assume: arn:aws:iam::REDACTED-ACCOUNT-ID:role/github-actions-deploy
    #       aws-region: eu-west-2

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: 1.10.5

    - name: Terraform Init
      run: cd terraform && terraform init

    - name: Terraform Plan
      run: cd terraform && terraform plan -out=tfplan

    - name: Terraform Apply
      if: github.event.inputs.environment == 'sandbox'
      run: cd terraform && terraform apply -auto-approve tfplan


    - name: Deploy Sync Script
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Deploying sync script to AWS Lambda or ECS..."
        # Add actual deployment commands here
