name: build-ducklake-artifacts
description: >-
  Build the DuckLake Lambda artifacts and upload them to S3, in one of three modes. Single copy
  of the "Build DuckLake lambda packages" step that existed 5x across terraform-apply-sandbox.yml
  and reconcile.yml (DEP-08); the assert+dual-write body for the 'assert'/'skip-assert' modes
  lives in the tested scripts/ci/ducklake_artifacts.py (T2.42 c4 / rec-2659).

inputs:
  mode:
    description: >-
      'assert' rebuilds via --skip-upload, byte-checks the seven build/apply-path artifacts
      against their per-sha S3 reference (Decision 77 no-TOCTOU), then dual-writes them (sandbox
      push + gated-apply, and both Reconcile call sites -- every site that re-applies a
      previously-reviewed plan). 'skip-assert' rebuilds via --skip-upload and dual-writes those
      same seven artifacts with no prior check (a fresh workflow_dispatch plan with nothing to
      compare against yet). 'upload-only' runs `build_lambda --ducklake-only` WITHOUT
      --skip-upload -- the PR speculative-plan job's first-upload path, which builds and
      dual-writes all EIGHT artifacts (including ducklake-maintenance-smoke.zip, which the other
      two modes deliberately exclude -- see scripts/ci/ducklake_artifacts.py's
      DUCKLAKE_ARTIFACT_NAMES) via build_lambda's own internal upload_to_s3, with no separate
      assert since there is nothing yet to compare against.
    required: true
  artifact-sha:
    description: >-
      Content-addressing sha for the per-sha S3 key (lambda-packages/<artifact-sha>/<name>) --
      the PR head sha on push/PR paths, the dispatch commit sha on a fresh workflow_dispatch
      plan, or the red commit's originating PR head sha on Reconcile. Callers resolve this
      themselves (it is the same value used elsewhere for the tfplan content-addressed key).
      Exported as LAMBDA_ARTIFACT_SHA so build_lambda's own artifact-sha resolution
      (scripts/build_lambda_deploy.py _resolve_artifact_sha) picks it up in every mode.
    required: true
  bucket:
    description: "S3 bucket for the DuckLake artifacts."
    required: false
    default: "agent-platform-data-lake"
  region:
    description: "AWS region."
    required: false
    default: "eu-west-2"
  working-directory:
    description: "Directory the build runs from (lambda-packages/ lands here) -- the repo root in every current call site."
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Build DuckLake lambda packages (rebuild before plan/apply, rec-2512)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        MODE: ${{ inputs.mode }}
        ARTIFACT_SHA: ${{ inputs.artifact-sha }}
        LAMBDA_ARTIFACT_SHA: ${{ inputs.artifact-sha }}
        BUCKET: ${{ inputs.bucket }}
        REGION: ${{ inputs.region }}
      run: |
        set -euo pipefail
        # This runner has no .venv (CC-web-only convention); install the build + upload
        # import-time deps directly, mirroring ci.yml's "Install validate.py import-time deps".
        pip install pyyaml pydantic boto3
        if [ "$MODE" = "upload-only" ]; then
          echo "Building + uploading all DuckLake artifacts via build_lambda's own internal upload (PR speculative-plan first-upload path)."
          python3 -m scripts.build_lambda --ducklake-only --profile "" --bucket "$BUCKET"
          exit 0
        fi
        if [ "$MODE" = "assert" ]; then
          EVENT_ARG="push"
        elif [ "$MODE" = "skip-assert" ]; then
          EVENT_ARG="workflow_dispatch"
        else
          echo "::error::build-ducklake-artifacts: unknown mode '${MODE}' (expected 'assert', 'skip-assert', or 'upload-only')" >&2
          exit 1
        fi
        echo "Content-addressed artifact namespace: lambda-packages/${ARTIFACT_SHA}/"
        python3 -m scripts.ci.ducklake_artifacts "$EVENT_ARG" "$ARTIFACT_SHA" "$BUCKET" --region "$REGION"
