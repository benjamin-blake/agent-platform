name: subagent-plan-review
description: >-
  Digest-fed subagent plan review (guard --digest on stdin, claude_p_retry.sh,
  review_verdict.py JSON classification, single same-budget STARVED retry per T2.39 c2). Single
  copy of the "Subagent plan review" step that existed in both terraform-apply-sandbox.yml
  (apply-sandbox) and reconcile.yml (apply-reconcile) (DEP-08). Preserves the STARVED-no-latch
  anti-masking (Decision 55) exactly: outcome=proceed|revise|starved, never an implicit PROCEED
  or REVISE on starvation.

inputs:
  claude-oauth-token:
    description: >-
      secrets.CLAUDE_CODE_OAUTH_TOKEN -- composite actions cannot read secrets.* directly, so the
      caller must pass it explicitly as a with: input.
    required: true
  context-description:
    description: >-
      The plan-under-review's context phrase, interpolated into the reviewer prompt in place of
      "the sandbox auto-apply pipeline" (e.g. a Reconcile caller passes "a Reconcile heal-button
      re-apply of a previously red sandbox commit (<sha>)").
    required: false
    default: "the sandbox auto-apply pipeline"
  working-directory:
    description: "Terraform root module directory containing plan.json."
    required: false
    default: "terraform/personal"

outputs:
  outcome:
    description: "proceed | revise | starved"
    value: ${{ steps.review.outputs.outcome }}

runs:
  using: composite
  steps:
    - name: Subagent plan review (digest-fed, JSON-classified)
      id: review
      shell: bash
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-oauth-token }}
        CONTEXT_DESCRIPTION: ${{ inputs.context-description }}
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -uo pipefail
        if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
          echo "Subagent review unavailable (no token); failing closed." >&2
          echo "outcome=starved" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        if ! command -v claude &> /dev/null; then
          sudo npm install -g @anthropic-ai/claude-code@2.1.148 --omit=dev --omit=optional && sudo npm cache clean --force
        fi

        if ! python3 "${{ github.workspace }}/scripts/terraform_apply_guard.py" --digest plan.json > plan_digest.txt; then
          echo "Failed to build the guard digest; failing closed (infra failure, not a plan rejection)." >&2
          echo "outcome=starved" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        MAX_TURNS=5
        PROMPT="Review the terraform plan digest below for ${CONTEXT_DESCRIPTION}. It has already passed the deterministic guard (no destroy, no out-of-budget IAM/trust change; may include in-budget IAM inline-policy or attachment UPDATEs on managed boundary-carrying CI roles per T2.25). The full plan is at plan.json (Read tool) if you genuinely need more detail than the digest provides. Confirm the plan is a safe, expected sandbox infrastructure change. Reply with exactly the single token PROCEED on its own line if safe to auto-apply, or REVISE followed by the reason if not."

        cat plan_digest.txt | "${{ github.workspace }}/scripts/ci/claude_p_retry.sh" review.json -- \
          --output-format json --allowedTools "Read" --max-turns "$MAX_TURNS" "$PROMPT" || true
        VERDICT=$(python3 "${{ github.workspace }}/scripts/ci/review_verdict.py" review.json)

        if [ "$VERDICT" = "STARVED" ]; then
          echo "Reviewer STARVED on first attempt; retrying once at the SAME turn budget (${MAX_TURNS} -- never larger, T2.39 c2)." >&2
          cat plan_digest.txt | "${{ github.workspace }}/scripts/ci/claude_p_retry.sh" review_retry.json -- \
            --output-format json --allowedTools "Read" --max-turns "$MAX_TURNS" "$PROMPT" || true
          VERDICT=$(python3 "${{ github.workspace }}/scripts/ci/review_verdict.py" review_retry.json)
        fi

        echo "Reviewer verdict: ${VERDICT}"
        case "$VERDICT" in
          PROCEED)
            echo "outcome=proceed" >> "$GITHUB_OUTPUT"
            exit 0
            ;;
          REVISE)
            echo "Subagent returned REVISE; failing closed." >&2
            echo "outcome=revise" >> "$GITHUB_OUTPUT"
            exit 1
            ;;
          *)
            echo "Subagent STARVED (max-turns/no-verdict/API-exhausted) after the same-budget retry; blocking apply WITHOUT latching the convergence record red." >&2
            echo "outcome=starved" >> "$GITHUB_OUTPUT"
            exit 1
            ;;
        esac
