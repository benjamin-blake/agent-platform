projection: >-
  This file is a curated projection of the repository's architecture and governance artefacts.
  It indexes public-repo source artefacts ONLY per CD.20 (no operational data exported).
  Canonical sources: CLAUDE.md, docs/ROADMAP-PLATFORM.yaml, docs/DECISIONS.md, and
  docs/contracts/instruction-architecture.yaml. Where this file conflicts with those sources, the
  canonical sources win. Authors are expected to resolve answer-loci against the current repo
  HEAD; file paths are relative to the repository root.
questions:
  - id: Q1
    theme: North Star and thesis
    question: >-
      What is the repository's North Star and what problem is it built to solve? Where does
      the system's strategic direction live and what are its guiding principles?
    answer_loci:
      - README.md
      - docs/ROADMAP-PLATFORM.yaml
      - CLAUDE.md

  - id: Q2
    theme: Agent-first design principle
    question: >-
      The repository is described as "for agents." What does that mean in practice? How does
      the repo structure, documentation model, and tooling reflect this principle?
    answer_loci:
      - CLAUDE.md
      - README.md

  - id: Q3
    theme: 5-layer instruction architecture
    question: >-
      How is Claude's context built at runtime? What are the five instruction layers, where
      does each one live, and when is each layer loaded?
    answer_loci:
      - docs/contracts/instruction-architecture.yaml
      - CLAUDE.md

  - id: Q4
    theme: Ops governance and single-portal invariant
    question: >-
      How are operational recommendations and decisions written and read? What is the
      single-portal invariant and why does it exist? What are the only legitimate write paths?
    answer_loci:
      - scripts/ops_data_portal.py
      - CLAUDE.md
      - docs/PROJECT_CONTEXT.md

  - id: Q5
    theme: CI and validation single gate
    question: >-
      What is the authoritative gate for merging a branch, and how is it structured? Why is
      validate.py the single source of truth for CI checks rather than the workflow YAML?
    answer_loci:
      - scripts/validate.py
      - .github/workflows/ci.yml

  - id: Q6
    theme: Branching and merge model
    question: >-
      What is the branching convention for agents and humans? What does the merge flow look
      like on Claude Code on the web, and what role does the GitHub MCP play?
    answer_loci:
      - CLAUDE.md
      - docs/PROJECT_CONTEXT.md

  - id: Q7
    theme: Environment taxonomy
    question: >-
      What environments does the platform define? How are sandbox, SIT, and PROD
      distinguished, and what gates control promotion between them?
    answer_loci:
      - docs/contracts/environment-taxonomy.md
      - CLAUDE.md

  - id: Q8
    theme: Manifest-driven Lambda packaging
    question: >-
      How does the Lambda build and deploy pipeline know which files to package? What is the
      manifest schema and how is the active/stub distinction used to gate deploys?
    answer_loci:
      - scripts/lambda_manifest.py
      - src/lambdas/data-pipeline/manifest.yaml
      - CLAUDE.md

  - id: Q9
    theme: Plan-to-implement workflow
    question: >-
      What is the canonical workflow for proposing and executing a code change? How do /plan
      and /implement interact, and what artefacts are produced at each stage?
    answer_loci:
      - .claude/commands/plan.md
      - .claude/commands/implement.md
      - .claude/skills/planning/SKILL.md

  - id: Q10
    theme: Recommendation and decision data model
    question: >-
      What is the schema for a recommendation and a decision? Where are the field semantics
      defined and how does plan_document.py enforce structural conformance on plan artefacts?
    answer_loci:
      - docs/PROJECT_CONTEXT.md
      - scripts/roadmap/plan_document.py

  - id: Q11
    theme: Verification tiers
    question: >-
      What are the verification tiers (V1, V2, V3) and what does each one require? How does
      the verification plan embedded in a PLAN-*.yaml file gate the merge flow?
    answer_loci:
      - .claude/skills/planning/SKILL.md
      - .claude/commands/plan.md

  - id: Q12
    theme: Autonomous executor design and freeze rationale
    question: >-
      How does the autonomous executor consume recommendations? What is the current freeze
      status, why was it imposed, and what must happen before it can be lifted?
    answer_loci:
      - CLAUDE.md
      - scripts/execute_recommendation.py
      - docs/ROADMAP-PLATFORM.yaml
