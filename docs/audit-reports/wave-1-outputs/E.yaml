      - "docs/ROADMAP-PLATFORM.yaml:19 (document.description: 'The platform underneath docs/ROADMAP-PRODUCT.md')"
      - "docs/ROADMAP-PLATFORM.yaml:4442-4443 (KG.1: 'canonical roadmap is docs/ROADMAP-PRODUCT.yaml (docs/ROADMAP-PRODUCT.md is superseded; retained as a recovery artefact)')"
      - "docs/ROADMAP-PRODUCT.md:3-9 (own header: 'SUPERSEDED. ... superseded by docs/ROADMAP-PRODUCT.yaml ... retained for one transition cycle as a recovery artefact')"
      - "docs/ROADMAP-PRODUCT.yaml:8-9,27-28 (own header + description: 'Supersedes docs/ROADMAP-PRODUCT.md')"
    proposed_severity: medium
    proposed_confidence: high
    note: >
      Self-contradiction WITHIN the platform roadmap. The header (lines 9-11) and document.description
