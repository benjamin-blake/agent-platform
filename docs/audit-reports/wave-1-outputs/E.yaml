      - "docs/ROADMAP-PRODUCT.yaml:1854-1866 (L2.pc.10 depends_on PLATFORM:T3.5)"
      - "docs/ROADMAP-PRODUCT.yaml:2495-2507 (L3.exec.11 cross-roadmap depends on PLATFORM:T3.5)"
      - "docs/ROADMAP-PLATFORM.yaml:3846-3876 (T3.5 status:not_started; depends_on [T0.7a, T0.12.5, T3.4]; decision_required_before CD.16)"
      - "docs/ROADMAP-PLATFORM.yaml:3831-3844 (T3.4 status:not_started, effort:XL, strategic:true; depends_on [T3.3, T1.13])"
      - "docs/ROADMAP-PLATFORM.yaml:3816-3830 (T3.3 status:not_started, strategic:true) / 3801-3815 (T3.2 not_started) / 3755-3800 (T3.1 not_started, effort:L)"
    proposed_severity: high
    proposed_confidence: high
    note: >
      Product MVP item MVP.4 (real-money live-small stage gate) depends on platform T3.5,
      which is resolvable but practically blocked behind a fully not_started chain
      T3.5 <- T3.4 (XL strategic) <- T3.3 (L strategic) <- T3.2 <- T3.1, whose leaves are
      T2.1(complete) + T0.12.6(in_progress) + T3.6(in_progress). T3.5 also carries a
      decision_required_before CD.16 gate (CD.16 IS ratified, so the gate itself is satisfied;
      the depth is the blocker, not the CD). Two of the four blocking ancestors are strategic:true
      and cannot be authored as STRATEGIC plans while CD.17 holds, compounding the practical block.

  # ------------------------------------------------------------------ E-002
  - id: E-002
    affected_ids: [T1.14, L3.exec.4, L3.exec.5, L3.exec.6, E.env.8]
    verdict_or_classification: reverse_drift
    evidence:
