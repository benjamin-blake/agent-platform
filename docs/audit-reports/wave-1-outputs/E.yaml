      - "docs/ROADMAP-PRODUCT.yaml:3929-3935 (E.env.8 cross_roadmap_depends_on lists PLATFORM:T1.14 - correct)"
      - "docs/ROADMAP-PRODUCT.yaml:2741-2753 (L3.exec.4 depends on PLATFORM:T2.14, NOT T1.14)"
      - "docs/ROADMAP-PRODUCT.yaml:2790-2801 (L3.exec.5 depends on PLATFORM:T2.14, NOT T1.14)"
      - "docs/ROADMAP-PRODUCT.yaml:2838-2851 (L3.exec.6 cross_roadmap_depends_on [T0.12, CD.25, T-1.12]; does NOT reference T1.14 or T2.14)"
    proposed_severity: medium
    proposed_confidence: high
    note: >
      T1.14's intent overclaims its consumers: it asserts E.env.8 + L3.exec.4/5/6 depend on it,
      but only E.env.8 actually references PLATFORM:T1.14. L3.exec.4 and L3.exec.5 reference
