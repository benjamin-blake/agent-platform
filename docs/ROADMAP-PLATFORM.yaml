  - id: CD.21
    title: CI migrates from self-hosted EC2 runner to GitHub-hosted runners + OIDC federation on public-flip
    detail: |
      On public-flip (T2.13), CI workloads migrate from the self-hosted EC2 runner (Decision 68) to
      GitHub-hosted standard Linux runners + AWS OIDC federation. Rationale: (a) self-hosted runners on
      public repos is the configuration GitHub explicitly recommends against -- fork PRs can execute on the
      runner with its IAM credentials unless gated by fork-approval policy; (b) ~$35/month runner cost becomes
      dead weight when GitHub-hosted standard Linux runners are free for public repos; (c) zero-stored-secrets
      via OIDC trust federation is architecturally cleaner than long-lived instance-role credentials; (d) the
      "warm runner" intent (Decision 68 future-work clause) is not built and would require drift-enforcement
      design before it would be -- so the runner currently provides no operational benefit over a hosted runner
      except AWS credential delegation, which OIDC replaces strictly better.

      terraform/ec2_runner.tf is NOT deleted -- it is marked deprecated with a header comment pointing at this
      decision, retained indefinitely as a historical artefact showing architectural-evolution (hosted ->
      self-hosted-for-AWS-access -> hosted+OIDC). Indefinite retention is explicitly accepted: the file is
      portfolio-positive and has no operational cost once the EC2 instance is terminated. Documented migration
      is more hireable signal than current state alone. No T5 teardown item is planned for ec2_runner.tf;
      if one becomes desirable it should reference this decision as the acceptance point.
      [Realized 2026-05-28: OIDC federation + CI migration to ubuntu-latest complete per Decision 73 (PR #1; terraform/personal/oidc.tf + workflow migration). EC2 runner retired; ec2_runner.tf retained with deprecation header.]
    gates: [T2.10]
    state: ratified
    ratified_as: dec-112
    filed_via: ops_decisions:dec-112
    realization_evidence: >-
      Realized 2026-05-28 -- OIDC federation + CI migration to GitHub-hosted ubuntu-latest complete
      per Decision 73 (PR #1; terraform/personal/oidc.tf + workflow migration). EC2 runner retired;
      ec2_runner.tf retained with deprecation header. Narrowly supersedes Decision 68 on the
      hosting question only. Ratifying clears the completion gate on T2.10.
    narrowly_supersedes:
      decision_id: 68
      clause: |
        Self-hosted-EC2-runner-as-primary-CI-surface clause. The IAM-design and credential-delegation
