  - id: CD.32
    title: Multi-product platform topology (unified project_id data plane + IP-boundary-only repo axis)
    detail: |
      Exploratory record: docs/INTENT-multi-product-platform.md (merged PR #57). That document is
      REPORT-ONLY and deliberately exploratory; it extends, and does not supersede, the monorepo +
      project_id commitment in docs/INTENT-aws-migration-platform-evolution.md Part 2.

      Two orthogonal axes:
        1. Data/identity axis: a unified DuckLake operational data plane keyed by a project_id origin
           dimension. All products (trading, reaper-tools, dbt-daywork, any future product) share one
           operational lakehouse; product rows are distinguished by project_id. This axis is already
           partially committed via the project_id stack below.
        2. Code/repo axis: the split decision (monorepo vs separate private repos) is made only at the
           cross-employer IP boundary -- not driven by data-plane topology. The two axes are orthogonal:
           N repos can still write to one DuckLake keyed by project_id.

      Open Decisions gating ratification (OD-1..OD-5 from the INTENT doc):
        OD-1: Ratify project_id as the canonical product-discriminator in the DuckLake ops schema.
        OD-2: Decide the egress-gate enforcement model (blocking Lambda interceptor vs application-level
              guard vs deferred to T0.15 COALESCE gate).
        OD-3: Decide the repo topology -- monorepo vs per-product separate private repos. The split is
              only at the cross-employer IP boundary. Key framing: the data/identity axis stays unified
              regardless of repo topology; per-directory CLAUDE.md is only a partial mitigation because
              the shared operational corpus (DECISIONS.md, the roadmaps, the recs log) does not shard
              with directory scope; the counter-cost of separate repos is extracting and duplicating the
              co-located platform tooling.
        OD-4: Decide rollback/freeze semantics if a product violates the egress gate post-onboarding.
        OD-5: Update KG.1 roadmap wording from trading-specific to N-product framing. ENACTED by this
              plan (the KG.1 edit). OD-5 is the only OD with a concrete deferred roadmap edit; the rest
              require a ratified decision before any active work is eligible.

      Build substrate to avoid duplicating (cross-reference docs/INTENT-aws-migration-platform-evolution.md
      Part 2): T0.12a (project_id Pydantic annotations), T0.7a-c (schema backfill), T0.15 (COALESCE gate),
      config/project_registry.yaml (product registry). These are the existing committed substrate; OD-1
      ratification would extend them, not replace them.

      Human-raised monorepo-vs-separate-private-repos open question (feeds OD-3):
        - Per-directory CLAUDE.md scoping is only a partial mitigation: the shared operational corpus
          (DECISIONS.md, the roadmaps, the recs log) does not shard with directory scope.
        - Counter-cost of separate repos: extracting and duplicating the co-located platform tooling.
        - The data/identity axis (one DuckLake, project_id keyed) is unchanged by the repo-topology
          decision; this question only touches the code/repo axis.

      Unbuilt enforcement work -- NOT eligible active tier_items; gated by OD-1/OD-2 + the unbuilt
      project_id stack:
        - Egress gate (application-level or Lambda interceptor)
        - Day-job onboarding interlock
        - COALESCE gate (T0.15, committed but not yet built)
        - Rollback/freeze path

      See KG.14 for the unbuilt enforcement substrate summary.
    gates: []
    state: pending
    filed_via: pending_log_decision_lambda
    discipline_points:
      - "No active tier_items may be created for multi-product enforcement work until OD-1 and OD-2
        are resolved and the project_id stack (T0.12a / T0.7a-c / T0.15) is built. Direction is tracked
        here as known_gaps / candidate_decisions only."
      - "The data/identity axis (one DuckLake, project_id keyed) and the code/repo axis (monorepo vs
        separate private repos) are orthogonal. Do not conflate them when authoring plans referencing
        this CD."

  - id: CD.33
    title: DuckLake ops runtime architecture -- writer/reader/maintenance split, OCC-retry concurrency, current projection, closed read/write boundary
    detail: |
      Pins the ops DuckLake runtime architecture that Decision 78 (CD.31) deferred to T2.17-T2.19.
      Ratified by Decision 81 (this CD does NOT edit DECISIONS.md while pending; ratification lands via
      the log-decision path = Decision 81, mirroring CD.31 -> Decision 78).
      (1) Three-artifact split by access pattern -- ducklake_writer / ducklake_reader / ducklake_maintenance
          -- justified by IAM-principal + scaling + deploy isolation, NOT concurrency. Supersedes CD.10's
          six-Lambda enumeration, which was illustrative (examples of needed verbs), never canonical. CD.33
          commits ONLY to the access-pattern split + closed boundary; the verb/tool set behind writer and
          reader stays deliberately extensible. The invariant is path, not verb count.
      (2) Concurrency (OQ.10 -> c): concurrent writers + bounded application-level OCC retry (backoff+jitter,
          fixed ceiling, loud-fail on exhaustion) in the writer. Idempotency is grounded: each write mints a
          monotonic ULID once at op start, reused across retries, as the history PK; the append is INSERT IF
          NOT EXISTS on that PK, so a committed-but-unacked retry de-dupes (not double-append). last_updated_
          timestamp is high-precision, stable-per-write, ordering-only. _prepare_record now() re-stamp moves
          out of the retry loop. NOT reserved-concurrency=1, NOT SQS FIFO. ducklake_maintenance is a singleton
          (DDL/ALTER hard-abort on conflict); the writer-vs-expire_snapshots race is closed by the clause-5
          GC older_than grace > max in-flight write/retry duration (pending the GC snapshot-isolation check).
      (3) Portal surface = read + write categories only; the sync category is eliminated because DuckLake's
          atomic catalog-snapshot commit removes the outbox/drain step. A write is atomic at the catalog
          commit (Parquet staged to S3, then snapshot committed in the RDS catalog txn; readers see nothing
          until commit; aborted-commit Parquet reclaimed by delete_orphaned_files). No external sequencing.
          Logical write verbs (file_rec/update_rec/file_decision) + read verb (query) retained. Decision 69
          Single-Portal invariant PRESERVED -- all writes transit scripts/ops_data_portal.py; transport only.
      (4) ducklake_writer owns the schema-enforcement gate: every write validated against the live table
          schema before commit; single un-bypassable write chokepoint; schema rejection fails loudly; schema
          evolution is a versioned maintenance DDL step, not writer-side silent coercion.
      (5) ducklake_maintenance = TWO deterministic scheduled cadences, NO LLM / NO agent: (a) daily
          non-destructive merge_adjacent_files (self-correcting compaction; current compacted more often);
          (b) separately-cadenced GUARDED destructive GC (expire_snapshots -> cleanup_old_files ->
          delete_orphaned_files) behind a retention floor + older_than grace + circuit breaker + own alarm.
          OQ.11 -> c: inlining DISABLED (inlined_rows=0) for governance tables -- writes land in S3
          immediately, removing the catalog-only durability window; small files paid down by daily merge.
          Per-table: telemetry MAY keep inlining. expire != delete: cleanup + delete_orphaned must run.
      (6) Closed read/write boundary (OQ.7 -> a): every read via reader, every write via writer, nothing
          out-of-band. No Athena escape hatch (DuckLake has no Iceberg export / external reader; the closed
          boundary is the design goal). One audited+alarmed admin-account break-glass path for DR only.
          Partitioning per-role: history by day(created_timestamp) (stable -> date reads prune); current by
          id (serving lookup + MERGE prune); applied via CD.9 ALTER at table creation. Partition-prune smoke
          test gates T2.17/T2.19.
      (7) current write-through projection (R-4): reads come from a materialised Type-1 current table (one
          row per id, latest-wins), never a read-time window over history. Each write is one DuckLake txn:
          INSERT history then MERGE current from the in-hand delta (no read-back). history is the append-only
          source of truth; current is rebuildable from history (DR only). Shared idempotent merge helper,
          one-or-many rows from day one (micro-batch is a config flip). current is a warehouse table, NOT the
          logs/*.jsonl read-cache anti-pattern. VERIFIED (capability-review C-1/C-2): single-txn multi-table
          atomicity + MERGE-through-DuckLake confirmed; DELETE+INSERT retained only as a noted alternative.
      (8) SCD2 keys + DQ (no engine PK/FK; BigQuery discipline): history logical key = auto-generated monotonic
          ULID (unique per write row, so same-instant same-rec_id updates never collide); rec_id is the natural
          key; last_updated_timestamp is high-precision, stable-per-write, SCD2 ordering with ULID tiebreak.
          DQ invariants: ULID PK uniqueness; one current row per rec_id (structural via the current MERGE key
          on rec_id); update_rec referential existence (point-lookup on current, in-transaction) while
          file_rec requires the DynamoDB-allocated rec_id to NOT exist.
      OQ.12 (version/upgrade policy) is left to T2.17 implementation (clone-rehearsal default); not pre-empted.
    gates: [T2.17, T2.18, T2.19]
    state: ratified
    ratified_as: dec-081
    filed_via: ops_decisions:dec-081
    supersedes_decisions: []
    discipline_points:
      - "Supersedes CD.10's six-Lambda enumeration; CD.10 is state:pending so no DECISIONS.md transition. CD.10's six slugs are status:stub MOCK examples (verified on disk), which confirms they were illustrative, never canonical. The agent verb/tool surface is explicitly NOT frozen by CD.33 -- only the writer/reader/maintenance path split and the closed boundary are. CD.10's PlatformDev/PlatformAdmin two-principal allow-list is retained, not superseded."
      - "Preserves the Decision 69 Single-Portal primitive-level invariant AS CARRIED FORWARD BY Decision 78 (Decision 69 itself was already superseded by Decision 78; only its invariant survives). Portal abstraction unchanged; transport changes."
      - "Does NOT edit DECISIONS.md while pending; supersession + OQ.7/OQ.10/OQ.11 resolution land at ratification via the log-decision path = Decision 81."
      - "Refines CD.15 (typed query reader) and CD.8 (DuckDB engine) and applies CD.9 partitioning; does not contradict them."
      - "OQ.11 resolves to option (c) (inlining disabled for governance tables), NOT option (b); the v1 draft's option (b) was overturned by the C2 durability-window finding."
      - "Write-id RESOLVED: history PK = monotonic ULID (stable across OCC retries) + high-precision stable timestamp (ordering-only). This single mechanism grounds clause-2 idempotency, clause-7 append idempotency, clause-8 PK uniqueness, and deterministic DR rebuild; the _prepare_record now() re-stamp must move out of the retry loop at T2.17."
      - "Capability claims VERIFIED against official DuckLake docs (ducklake.select) pre-ratification: multi-table single-snapshot ACID txn (CONFIRMED), MERGE INTO (CONFIRMED), no engine PK/FK so ULID is a logical key enforced by MERGE+DQ (CONFIRMED), OCC + app-retry (CONFIRMED), inlining row-limit=0 + flush (CONFIRMED), expire/cleanup/delete_orphaned + merge_adjacent_files names+semantics (CONFIRMED), ALTER SET PARTITIONED BY post-ALTER-only + day()/bucket(N,col) + pruning (CONFIRMED). GC deletion safety is a SOFT time-based deferral, not a hard lock -- older_than grace MUST exceed max reader/writer duration; cleanup_all=>true forbidden with pinned readers. Pin a DuckLake version; smoke-test upstream issues #233/#376 (concurrency) and #921 (inlining) at T2.17."
      - "[Amendment -- CD.34 (pending)]: CD.34 proposes migrating the catalog backend to Neon serverless Postgres. CD.33 was ratified by Decision 81 (dec-1089) WITH the RDS backend, so its body above is UNCHANGED while CD.34 is pending; the following enact only when CD.34 ratifies (Decision 82): clause (3) 'RDS catalog txn' -> 'catalog txn (Neon Postgres)'; clause (5) telemetry-inlining carve-out removed (inlining disabled for ALL tables incl. telemetry; high-write-rate tables get a higher-frequency merge, T2.18 co-tunes the GC breaker); enforcement_mechanism O-2 DR -> daily pg_dump-to-S3 (30d retention, >25h freshness alarm), O-5 pooling -> Neon built-in pooler / direct endpoint (no RDS Proxy). Tracked meanwhile in the T2.16b-T2.19 exit criteria. The runtime architecture (split/OCC/projection/SCD2 keys/GC+merge cadences) is unaffected. See docs/REPORT-ducklake-catalog-neon-migration.md. (Ratification vehicle note, 2026-06-09 audit F-033: the parenthetical 'Decision 82' reservations for CD.34 collided with the actual Decision 82 -- the EC8 churn-gate frame correction; CD.34 ratifies via a FUTURE numbered Decision, number not pre-reserved.)"
    enforcement_mechanism: "ducklake_writer schema gate + closed reader/writer boundary; ULID logical key + MERGE-on-ULID insert-if-not-matched append idempotency (no engine PK); current write-through projection enforces current-version uniqueness; guarded destructive-GC circuit breaker (expire 30d/7d, grace >=7d, breaker >20%/>10GB, weekly, no cleanup_all); PlatformAdmin break-glass (catalog+S3 read) + daily catalog PITR-to-S3; partition-prune smoke test in T2.17/T2.19 exit criteria; per-Lambda CD.24 manifests."

  - id: CD.34
    title: DuckLake catalog backend -- migrate RDS PostgreSQL to Neon serverless Postgres
    detail: |
      Narrowly amends the CD.31 / Decision 78 catalog-backend paragraph ("a dedicated micro RDS PostgreSQL
      instance") from RDS PostgreSQL to Neon serverless Postgres (free tier), provisioned via the Terraform
      Neon provider (auto-applied via the Decision-77 sandbox pipeline behind a Neon-aware fail-closed guard +
      subagent review -- NOT carved out), with the Lambda
      connection string held in AWS Secrets Manager. Everything else in Decision 78 / CD.31 is preserved:
      DuckLake adoption, the S3-Parquet data plane, the DuckDB engine, the catalog-as-metadata-store framing,
      and the closed read/write boundary. Motivated by cost -- the micro RDS is the largest live AWS line
      after the CD.21 EC2-runner retirement; Neon free tier is $0 (realized saving ~$12-15/mo). Sequenced
      BEFORE T2.17 so the Lambda runtime is built against Neon (no VPC attach for catalog reachability; Neon's
      built-in pooler) rather than RDS-in-a-VPC. [Amendment 2026-07-02, Decision 107 ratification: the
      "nothing consumes the catalog yet / blast radius is zero" framing below is now CONTRADICTED by the
      live Neon catalog -- ops are cut over per T2.19 and the catalog is the lakehouse SPOF, not a
      provably-unused stub. Retained verbatim for historical traceability only.] Nothing consumes the
      catalog yet (live ops are Iceberg/Athena until T2.19), so present blast radius is zero. Ratified by
      Decision 107 (2026-07-02) via the ops portal path (log-decision Lambda / T0.7b never deployed; see
      the agent_instructions "Ratification vehicle" note).
      Consequential mechanics (folded into the gated tier items + CD.33):
      (1) Inlining DISABLED for ALL tables including telemetry (ducklake_default_data_inlining_row_limit=0),
          overriding the telemetry-inlining carve-out in CD.33 clause (5) and OQ.11 -- on Neon's ~6h free-tier
          PITR no table may be catalog-only-durable. High-write-rate tables get a higher-frequency
          merge_adjacent_files; T2.18 co-tunes the guarded-GC circuit breaker for the raised dead-file rate.
      (2) Catalog DR = a WEEKLY pg_dump (single consistent snapshot, engine-version-tagged) to a dedicated
          versioned S3 bucket (cron(0 3 ? * SUN *), 30-day retention, ~8-day freshness alarm) + a tested
          restore as a T2.16b precondition BEFORE any production write. [Amendment -- Decision 88, folded
          in at Decision 107 ratification: cadence changed from the original daily pg_dump because the
          live Neon catalog breached the free-tier egress cap; paid-tier Neon PITR covers finer recovery
          between weekly dumps.] Catastrophic-case RPO ~7d; intra-6h via Neon PITR (free tier) / longer via
          paid-tier PITR.
      (3) Pooling = Neon built-in pooler if proven transaction-safe, else the direct endpoint for catalog
          writes (no separate RDS Proxy); a measured T2.16b connection-churn gate (the OQ.8 churn mitigation)
          requires churn + commit-latency within CD.33's OCC budget OR an app-side pool.
      (4) Break-glass / OQ.7 = the audited PlatformAdmin principal reads the Neon catalog credential (Secrets
          Manager) + S3, not an RDS/IAM grant.
      Authored by docs/REPORT-ducklake-catalog-neon-migration.md (architect + ops-risk zero-context review,
      converged PROCEED over three rounds).
    gates: [T2.16b, T2.17, T2.18, T2.19, T2.26]    # T2.26 added 2026-06-09 (audit F-018): the deferred-table migrations inherit CD.34's inlining/DR/pooling mechanics
    state: ratified
    ratified_as: dec-107
    filed_via: ops_decisions:dec-107
    realization_evidence: >-
      Live: Decision 82 names 'CD.34 (Neon)' as catalog authority; the DuckLake catalog runs on Neon
      serverless Postgres via the Terraform Neon provider behind the Decision-77 Neon-aware fail-closed
      guard. Decision 88 amends CD.34's DR cadence (daily -> weekly pg_dump) because the live Neon
      catalog breached the free-tier egress cap -- amendment presupposes the catalog is live, not
      hypothetical. Ratifying requires the Decision-88-amended framing (weekly DR, egress-budget
      invariants, inlining=0) and explicit swap-back-to-RDS reversal conditions.
    supersedes_decisions: []
    discipline_points:
      - "Narrowly amends the CD.31 catalog-backend paragraph / Decision 78 item (RDS PostgreSQL -> Neon serverless Postgres); preserves DuckLake adoption, the S3-Parquet data plane, the DuckDB engine, the metadata-store framing, and the closed boundary. CD.31/Decision 78 are paragraph-structured, not clause-numbered. Stays inside the NS.3 'small managed cloud state-store' framing that justified the catalog originally."
      - "Ratified by Decision 107 (2026-07-02) via the ops portal path (mirroring CD.31 -> Decision 78 and CD.33 -> Decision 81; NOT 'Decision 82', which names the EC8 churn-gate frame correction; audit F-033). CD.34's CD.33-level changes (staged as an additive [Amendment -- CD.34] annotation on CD.33, the CD.31 pattern, rather than a rewrite of CD.33's ratified body) now enact."
      - "Inlining DISABLED for ALL tables including telemetry (inlined_rows=0), overriding the telemetry carve-out in CD.33 clause (5) + OQ.11 -- a durability decision on Neon's ~6h free-tier PITR, NOT an architecture change. High-write-rate tables get a higher-frequency merge; T2.18 co-tunes the guarded-GC circuit breaker for the raised dead-file rate."
      - "Supersedes OQ.8's RDS-Proxy/IAM-auth-preferred resolution: RDS Proxy (never provisioned; deferrable per OQ.8) -> Neon built-in pooler (direct endpoint for catalog writes; app-side pool if churn exceeds the OCC budget); credential = Secrets Manager DSN (IAM DB auth is N/A against a non-AWS endpoint). Realized saving ~$12-15/mo; the +$10-12 RDS-Proxy figure was conditional, not bankable."
      - "Catalog is the lakehouse SPOF -- LIVE, not provably-unused (Decision 107 ratification note: the historical 'provably unused' framing on the rec-2063 WONTFIX predates cutover and no longer holds; rec-2063 needs re-review against the live catalog). On Neon free tier (~6h PITR) DR = a WEEKLY pg_dump-to-S3 (single consistent snapshot, engine-version-tagged, 30-day retention, ~8-day freshness alarm; Decision 88 amendment from the original daily cadence) + a tested restore BEFORE any production write (T2.16b). Reversible: the RDS retires with a final snapshot (sole recovery artifact; delete_automated_backups wipes PITR), human-gated (Decision 35) onto the Decision-77 fail-closed destroy path."
      - "Provisioned via the Terraform Neon provider in terraform/personal/, auto-applied via the Decision-77 sandbox pipeline behind a Neon-aware fail-closed guard + subagent review (policy-as-code parity for the new provider; NOT carved out). The guard blocks any neon_* update/replace/delete (the mutation surface -- allow-list widening, credential rotation, project deletion) and allows a neon_* create on the strength of compensating controls -- enforced TLS (sslmode=require) + a scoped non-owner neon_role + the DSN in Secrets Manager -- NOT an IP allow-list (Neon IP-Allow is Scale-plan-only, unavailable on the free tier, and egress here is dynamic; REPORT R3). Keeps declarative state/audit for the lakehouse's single most critical stateful dependency rather than console-only. The out-of-band ducklake_ops schema DDL is captured as a versioned in-repo migration for reproducibility."
      - "The CD.33 runtime architecture (writer/reader/maintenance split, OCC retry, current projection, SCD2 keys, GC/merge cadences) is UNCHANGED; only the catalog backend + its consequential recovery/pooling mechanics change."
    enforcement_mechanism: "Terraform Neon provider auto-applied via the Decision-77 sandbox pipeline behind a Neon-aware fail-closed guard + subagent review (the guard blocks any neon_* update/replace/delete and allows a neon_* create on compensating controls -- TLS sslmode=require + scoped neon_role + Secrets Manager DSN, no IP allow-list) + Secrets Manager DSN; inlining=0 on all tables enforced at the writer + T2.17/T2.18 exit criteria; WEEKLY pg_dump-to-S3 (30-day retention) + ~8-day freshness alarm (Decision 88 amendment from the original daily cadence) + tested-restore-before-cutover gate (T2.16b/T2.19); T2.16b connection-churn gate (within CD.33 OCC budget OR app-side pool); RDS retired with final snapshot (the destroy stays human-gated, Decision 35); ratified via Decision 107 (2026-07-02, ops portal path)."

  - id: CD.35
    title: Agent-native Terraform CI/CD -- speculative plan, server-side convergence, gated-CD-apply via GitHub Environments, privilege-tiered bootstrap
    detail: |
      Closes the three gaps the T2.16b RDS->Neon migration exposed (PRs #75-#77): (1) terraform apply is
      decoupled from validate-CI and its failures are non-sticky -- a later green run masks an earlier apply
      failure and ci-rca never sees it; (2) no speculative terraform plan on PRs, so nobody reviews the diff or
      the guard verdict before merging; (3) the github_ci_apply CI role cannot grant itself privileges through
      the guarded pipeline it gates (the self-grant bootstrap), forcing manual branch-first applies. Build (DIY
      in GitHub Actions) over buy (TFC/Atlantis/Spacelift) to preserve agent-legibility; single-account sandbox
      only (Decision 77 clause 5; NOT a revival of Decision 24 multi-account promotion). Reconciles the
      Decision-77 guard with the now-live CD.20 main-protection ruleset: native controls own AUTHORIZATION
      (required checks, linear history, Environment reviewer gate), the guard narrows to plan-CONTENT policy --
      a Decision-75 frame-challenge (the guard was partly a workaround for the absent branch protection that is
      now live). Authored by docs/INTENT-terraform-cicd-agent-native.md (architect + adversarial-risk
      zero-context review, converged over three rounds); the deep-dive realisation of the T2.16b retrospective
      CI follow-on. Ratified later via the log-decision path (a numbered Decision when Wave 1 / T2.20 ships);
      does NOT edit DECISIONS.md while pending.
      Load-bearing design choices (from the converged review):
      (1) Convergence anchored SERVER-SIDE: the apply job writes a durable S3 convergence record
          (pipeline-writer-identity-only write-IAM; always-run, red-on-failure) and refuses to apply against a
          red record -- the sole hard block, unbypassable by merge-path actors (workflow self-edit is the
          Wave-4 / authority-budget residual, points 6-9; red clears only via the T2.20 dispatch-ack path).
          terraform-converged is an ADVISORY PR status only (NOT a
          required check -- required would wedge the autonomous fix-merge once a record is red, or be
          admin-bypassed anyway given main-protection strict=false + bypass_mode=always).
      (2) Speculative plan on PRs under a NET-NEW least-priv github_ci_plan role (tfstate read-only, fork-gated
          -- github_ci_pr is athena/iceberg-scoped and cannot read tfstate); apply-the-saved-plan at merge
          (terraform serial-staleness fails closed; stale ⇒ STOP, never silent re-plan).
      (3) High-blast changes (IAM/trust/destroy -- the guard fail-closed set) route to a gated CD apply via a
          GitHub Environment whose required reviewer gates JOB EXECUTION; the privileged role OIDC trust lists
          BOTH refs/heads/main AND the environment:tf-gated-apply sub (Decision 94 / VP9: declaring the
          environment overrides the OIDC sub, and the environment sub is approval-gated and safe).
          Eliminates the manual/laptop apply.
      (4) Privilege-tiering: the CI/CD role own IAM moves to a separate terraform/bootstrap/ root applied
          out-of-band, breaking the self-grant cycle (absorbs rec-2079).
      (5) Apply failures wire into ci-rca; drift detection (scheduled plan, alarm-only per Decision 55) files
          its rec directly via the ops portal. Post-apply agent re-engagement baseline = next planning session
          (the record is authoritative); a same-turn post-merge wake is best-effort only.
      [Amended 2026-06-10 -- authority-budget clarification; extends the converged review, overturns nothing:]
      (6) The Wave 3 Environment gate is an AUTHORIZATION boundary, not a quality gate, and its steady-state
          contract is EXCEPTION-PATH: human review is reserved for changes that expand the pipeline's own
          authority (IAM/trust) or destroy state -- never routine control flow. End-state after T2.23 + T2.25:
          an explicit AUTHORITY BUDGET -- an IAM permissions boundary on github_ci_apply, boundary-propagation
          condition keys (any role/policy the pipeline creates or attaches must carry the same boundary), and
          a deterministic in-budget/out-of-budget diff classification in the guard -- auto-passes in-budget
          IAM changes; ONLY out-of-budget, trust-policy, and destroy changes route to the gate. Target gate
          frequency: near-zero. A firing gate is design signal ("the agent wants authority it does not have"),
          not ceremony.
      (7) The budget, boundary, and guard policy definitions live in the terraform/bootstrap/ root (Wave 4),
          outside the pipeline's writable surface. Without that separation ANY automated handling of the
          fail-closed set is self-approval -- which is also why the wave sequencing is load-bearing: gate
          exists (T2.22) -> privilege separation (T2.23) -> budget narrowing (T2.25).
      (8) Automated environment escalation (the future-state platform promotion train) is REJECTED as a
          substitute for the authority gate: escalation verifies BEHAVIOR ("does it work") and
          authority-expanding diffs pass behavioral verification by definition; destroys rehearsed on sandbox
          data prove nothing about higher-environment data; and the train's machinery is itself
          pipeline-authored code. Escalation remains the correct pattern for the BEHAVIORAL axis when SIT/PROD
          are stood up (the environment-taxonomy section 4 trigger), consuming T2.20 convergence records +
          T2.24 drift signals as platform-promotion evidence. Behavioral risk -> automate fully; authority
          risk -> budget + out-of-band amendment. Orthogonal controls, both kept, each on its own axis.
      (9) Autonomy is earned and revocable PER CHANGE-CLASS (ratchet model): the budget may widen for a class
          on measured track record (e.g. 30 days of green applies, zero red-convergence incidents) and MUST
          narrow back to gated on incident. Ratchet decisions are themselves out-of-band budget amendments via
          the bootstrap tier (the Decision 67 freeze -> Decision 79 per-artifact unfreeze pattern, made
          data-driven). A subagent review may advise at the gate; it is never the lock -- the lock is
          deterministic policy plus the human signature on budget amendments.
    gates: [T2.20, T2.21, T2.22, T2.23, T2.24, T2.25]
    state: ratified
    ratified_as: dec-092
    filed_via: ops_decisions:dec-092
    supersedes_decisions: []
    discipline_points:
      - "Extends, does NOT overturn: Decision 77 (guard narrows to content-policy, still fail-closed), Decision 35 (the GitHub-Environment reviewer gate is the native implementation of human-gated apply), Decision 76 (post-merge wake best-effort with next-session re-check as the poll-free baseline), Decision 89/CD.20 (extends the live main-protection ruleset). Single-account (Decision 77 clause 5), not Decision 24 multi-account."
      - "Anti-masking anchor is SERVER-SIDE (apply refuses on a red record), not the PR check: main-protection has strict_required_status_checks_policy=false + admin bypass_mode=always, so a required terraform-converged check would be bypassable AND would wedge the autonomous fix-merge; it is advisory only."
      - "CI/CD pipeline files are build-tooling, not executor machinery (Decision 44 boundary untouched; Decision 79 precedent). Drift + apply failures alarm and file recs; nothing auto-remediates (Decision 55)."
      - "Each of T2.20-T2.25 is a standalone IMPLEMENTATION plan (Decision 67 STRATEGIC suspension); none authored STRATEGIC."
      - "Ratified at Wave 1 as Decision 92 (2026-06-19) via the DECISIONS.md-edit + --backfill-decisions-md path, superseding this candidate's pending_log_decision_lambda clause (Decision 84 + Decision 90/91 precedent)."
      - "The Environment reviewer gate is an authorization boundary, not a routine quality gate: post-T2.25 only out-of-budget / trust-policy / destroy changes route to it (in-budget IAM auto-passes under the bootstrap-defined permissions boundary + guard budget). Environment escalation through the future-state platform promotion train is NOT a substitute (it verifies behavior, not authority); subagent review at the gate is advisory, never the lock. (Amended 2026-06-10; detail points 6-9.)"
    enforcement_mechanism: "Server-side convergence precondition (apply refuses on red record; always-run red-on-failure write; pipeline-writer-identity-only write-IAM; record in its own S3 prefix outside tfstate/; applies serialized via concurrency group; red clears only via workflow_dispatch acknowledge-and-retry; refusals dedupe against the open rec) + advisory terraform-converged status; net-new least-priv fork-gated github_ci_plan role for speculative plan + apply-saved-plan (terraform serial-staleness fail-closed, stale=STOP); GitHub Environment required-reviewer gating job execution for the guard fail-closed set (github_ci_apply OIDC trust lists refs/heads/main AND environment:tf-gated-apply per Decision 94/VP9); terraform/bootstrap/ privilege tier for the CI/CD role own IAM (absorbs rec-2079); authority budget post-T2.23/T2.25: permissions boundary on github_ci_apply + boundary-propagation condition keys + deterministic in-budget/out-of-budget guard classification, definitions resident in terraform/bootstrap/ (pipeline-unwritable), Environment gate reserved for out-of-budget changes and budget amendments, ratchet widen-on-track-record / narrow-on-incident; apply-failure -> ci-rca, drift -> ops portal (alarm-only); apply-model convention consolidated to environment-taxonomy.md; ratified via a numbered Decision when T2.20 ships."

  - id: CD.36
    title: Recommendation relevance is a governed lifecycle state, not an executor judgement
    detail: |
      The roadmap has a Tier Item Freshness Gate for tier_items (planning skill, T-1.21) and an
      implement-side replacement-closure / exit-criteria truth-maintenance rule (T-1.22), but no
      equivalent governed relevance discipline for operational recommendations. An open rec is not
      automatically worth doing: neither a human /plan / /implement session nor (post-freeze) the executor
      may action a rec merely because its status is "open" -- only if its acceptance is still UNSATISFIED
      against current main. This extends the freshness pattern from tier_items to recommendations.
      Model (forward intent; nothing implemented under the Decision 67 / CD.17 freeze):
        - Relevance is a derived verdict over an open rec: relevant | satisfied | superseded | duplicate |
          contradicted | stale_target | blocked_by_decision | unknown. It is SEPARATE from the rec
          lifecycle status (open/closed/failed/declined/superseded, Decision 70): a rec can be "open" yet
          currently "blocked_by_decision", or "satisfied" yet not-yet-closed.
        - The deterministic probe is the rec's already-required `acceptance` shell-command oracle
          (scripts/executor/jsonl_store.py; validate.py-enforced). If acceptance now passes on main, the
          rec is satisfied. No new acceptance machinery is needed -- the oracle already exists on every rec.
        - Closure requires a CLOSURE PROOF, not an LLM assertion. Deterministic satisfaction (acceptance
          passes; target symbol present) may close automatically with the proof recorded; any verdict
          resting on semantic judgement (superseded / contradicted / obsolete) produces a `close_proposed`
          for human or policy confirmation, never a direct close. This tightens the current
          Resolves:-trailer auto-close (.github/workflows/rec-autoclose.yml), which is trust-based (closes
          on a trailer string with zero verification).
      Decision 84 constraint (binding): relevance / closure-proof state is computed READ-TIME or stored in
      an explicitly named projection -- it does NOT add Class A columns to ops_recommendations (the
      ducklake_writer owns the keyspace; reads transit named verbs). Decision 88: any queue-wide relevance
      surfacing serves the warmed read-cache / a registered named verb, never a per-session warehouse
      re-fetch.
    gates: [T3.8, T3.9]
    state: ratified
    ratified_as: dec-103
    filed_via: ops_decisions:dec-103
    discipline_points:
      - Relevance verdict and lifecycle status are orthogonal axes; do not collapse them (Decision 70 governs status, this CD governs relevance).
      - Deterministic closure may auto-close with recorded proof; semantic closure produces close_proposed only (no direct close on LLM judgement).
      - No new Class A ops_recommendations columns (Decision 84); relevance is read-time or a named projection, and queue-wide surfacing serves the read-cache (Decision 88).
      - Generalisation seed already exists: session_preflight.py correlate_ci_rca_with_main() computes likely-resolved for ci_rca recs; this CD generalises that engine to all sources (surfacing only, not auto-acting -- Decision 55).
  - id: CD.37
    title: Parallel rec execution requires semantic locks, not file locks alone
    detail: |
      Forward intent for the future autonomous executor (Step Functions + Durable Lambdas, CD.27); inert
      under the Decision 67 / CD.17 freeze and the T4.1 concurrency=1 ceiling until the autonomy gates
      (T4.4) raise concurrency above 1. File-level exclusion is necessary but insufficient for safe parallel
      rec execution: two recs may touch disjoint files yet conflict semantically (e.g. one edits the
      ops_recommendations contract while another changes ducklake_writer behaviour for the same field).
      The control boundary is a SEMANTIC LOCK set derived from a rec's targets -- files, contracts, tables,
      Lambda artefacts (manifests), named verbs, Terraform roots, validation surfaces, and decision /
      tier_item references -- as shared-read or exclusive-write. Parallel execution is permitted only when
      exclusive lock sets are disjoint. The executor owns a LEASE protocol: an in-flight rec holds its
      exclusive locks until merge, failure, or explicit release (release-on-failure default); lease records
      live in the governed ops plane (Decision 84 reader/writer boundary), never local files. Post-merge
      reconciliation (T3.9) re-evaluates open recs whose locks overlap the merged change.
    gates: [T4.8]
    state: pending
    filed_via: pending_log_decision_lambda
    discipline_points:
      - Semantic locks are the concurrency boundary; file overlap is the floor, not the boundary.
      - Lease records live in the governed ops plane (Decision 84), never local files; lease failure escalates via the rec/RCA path (Decision 55), never silent retry.
      - Inert until T4.4 raises executor concurrency above 1 (T4.1 sets concurrency=1 initially).
  - id: CD.38
    title: Executor delegates verification execution to GitHub Actions; AWS waits on verdicts
    detail: |
      Makes the CD.27 executor topology EXPLICIT on its verification leg and generalises the established
      Terraform CI/CD authority model (CD.35 / Decision 92) and GitHub-hosted-runner substrate (CD.21)
      from infrastructure to rec execution. Overturns nothing: CD.27 already says AWS owns orchestration +
      persona cognition and that Step Functions retries are deterministic-only; this CD specifies the
      verification leg CD.27 left unstated. The autonomous executor does NOT run validate.py or registered
      verifiers inside AWS Lambda / Step Functions. AWS owns orchestration (Step Functions) and persona
      cognition (Durable Lambdas); GitHub Actions owns PR `--pre` validation, main full-validate, the
      verifier-registry execution (CD.29), and merge truth (remote CI is the authoritative pre-merge gate
      per the AGENTS.md merge protocol). Step Functions records correlation ids (PR number, check-run id,
      workflow-run id, rec id, execution id) and WAITS on GitHub Actions verdict callbacks. PR `--pre` PASS
      permits merge; main full-validate PASS permits promotion / escalation / rec closure; PRE_FAIL /
      FULL_FAIL routes to ci-rca (Decision 72). Encodes the Google-TAP-style flow and forecloses any future
      plan reintroducing an "AWS verifier runner". Inert under the Decision 67 / CD.17 freeze.
    gates: [T4.9]
    state: pending
    filed_via: pending_log_decision_lambda
    discipline_points:
      - Makes CD.27 explicit and extends CD.35 / CD.21 from Terraform to rec execution; overturns nothing.
      - GitHub Actions is the sole verifier/validation runner; AWS never runs validate.py or verifiers in-cloud.
      - Two-tier TAP-style flow preserved: merge on PR --pre, promote/close only on main full-validate (CI authoritative per the AGENTS.md merge protocol).
      - Verdict-callback failures (stale/duplicate/auth/verdict-timeout) route to ci-rca (Decision 72 / Decision 55), never silent retry or re-wait; every waitForTaskToken state carries HeartbeatSeconds/TimeoutSeconds (T4.1/T4.9).
      - The per-rec differential verify (fail-on-revert: pre-change tree -> assert FAIL; head -> assert PASS) runs as a GitHub Actions job keyed by rec id -- NOT in AWS. Step Functions has a verify STATE that only dispatches and waits, consistent with the sole-runner rule (resolves the T3.1 c6 vs CD.38 substrate seam, VF-12).

  - id: CD.39
    title: >-
      Exit-criteria ledger -- per-criterion status makes in_progress resolvable;
      follow-on planning is the in_progress default
    detail: |
      A tier_item is almost never completed by one plan; items take N follow-on plans. The roadmap
      tracked only item status + prose exit_criteria + a free-text progress_note, so in_progress
      conflated mid-implementing / needs-next-plan / blocked, and the harness had no deterministic
      "what's left" signal. This decision promotes each exit_criteria entry to a structured object
      {id, text, status: open|met|rehomed, met_by} -- "remaining work" becomes the set of open
      criteria (deterministic, Decision 59). The harness reads it as follows: /orient ranks in_progress
      items fewest-open-criteria-first and emits follow-on /plan prompts (not /implement-resume) for
      items whose authored plans are all actioned; /plan gains a follow-on mode that scopes only the
      next slice and declares the criteria it will close (closes_criteria); /implement flips those
      declared criteria open->met on a verified VP pass, and an all-criteria-met item QUALIFIES for
      the completion gate but is NEVER auto-flipped (Status-Trusted-Never-Inferred / T2.20). The
      ledger lives in the git-authoritative roadmap YAML now as the lightweight near-term stand-in
      for T4.5/Decision 87 (ops_plans/ops_plan_revisions warehouse entities, gated on CD.17); met_by
      is forward-compatible as a future ops_plans foreign key. Enforcement (validate.py):
      met/rehomed criteria carry a met_by that resolves to a real plan/commit/item; a touched
      tier_item may not retain bare-string criteria; plan closes_criteria refs resolve to real item
      criteria.
    gates: []
    state: pending
    filed_via: pending_log_decision_lambda

  - id: CD.40
    title: >-
      Agent-turn telemetry capture reconciled onto the canonical telemetry model
    detail: |
      Records the surviving facets of the retired T-1.9 session-log-architecture audit
      document (the substantive REPORT-ONLY deliverable; docs/plans/PLAN-session-log-audit.md
      is its companion planning artefact, not the source of this content), reconciled onto
      the canonical four-table DuckLake telemetry model (Decisions 95/96/97) rather than the
      document's original Iceberg / bespoke 7th-Lambda design:
        - Retire ops_session_log (event-flavoured, unverified writer semantics, no live
          agent-facing reader) once T2.26 migrates or retires it.
        - Retire docs/SESSION_LOG.md post-reader-rewire (session_preflight.recent_sessions
          moves to a query-Lambda verb); archived to docs/SESSION_LOG_ARCHIVE.md, not deleted outright.
        - Turn-write via the DuckLake writer boundary (Decision 84) -- agent-turn events land
          as turn-grain rows on telemetry_observations + telemetry_transcripts (Decision 95),
          NOT a new telemetry_agent_turns / telemetry_agent_turn_transcripts Iceberg pair and
          NOT a bespoke 7th Lambda (the doc's original agent-platform-log-turn design).
        - Aggregate ops_sessions table deferred with the doc's 3-condition structural trigger
          (>=10,000 telemetry_observations turn rows; >=2 distinct recs requesting an
          aggregate shape the raw event table can't answer cheaply; either a deployed
          query-Lambda verb against the event tier OR 6 months elapsed since the event-tier
          Lambda deployment) -- not a wall-clock deferral.
        - Hook-side pre-write credential scrub (AWS keys, Anthropic keys, GitHub PATs, generic
          Bearer tokens) is a launch criterion, not post-hoc polish: Iceberg/DuckLake snapshot
          retention defeats post-hoc redaction.
    gates: [T3.20]
    state: pending
    filed_via: pending_log_decision_lambda
    discipline_points:
      - >-
        The deliverable's originally proposed two-tier metadata/transcript split is SUBSUMED by
        Decision 95's canonical telemetry_observations node + telemetry_transcripts sidecar --
        not re-proposed here.
      - >-
        The deliverable's Iceberg tables and bespoke agent-platform-log-turn Lambda design are
        SUPERSEDED by Decisions 84/95/96/97 (telemetry lives on the DuckLake closed boundary;
        writes via the ducklake_writer boundary, not a new Lambda).
      - >-
        Kept UNRATIFIED per Decision 105 (ratify only on realization evidence) and Decision 87
        (record destination now, defer build) -- the underlying subsystem (T3.20) is unbuilt.
      - "Cites Decisions 86, 84, 95, 96, 97, 105, 87, 75."

