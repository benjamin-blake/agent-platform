      uses day(trade_date). New tables inherit the partitioned template. No unpartitioned-table path.
      [Amendment -- CD.31]: Partitioning IS available in DuckLake via ALTER TABLE ... SET PARTITIONED BY
      (a metadata-only operation), NOT via CREATE TABLE DDL (which is unavailable in DuckLake -- the spike
