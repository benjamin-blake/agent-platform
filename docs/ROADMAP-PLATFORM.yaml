    name: "DQ runner reshape -- alarm-not-gate (live-reader checks -> scheduled canary; hermetic structural checks stay on the gate) + reads Annotated metadata"
    intent: |
      Reshape the DQ runner from a de-facto merge-gate that queries the live DuckLake reader into a
      SCHEDULED MONITOR that files recs on drift, per CD.12 (candidate, state: pending -- "runner = alarm
      not gate, files recs on anomalies; NOT a pre-commit gate"). This REALISES the direction CD.12 STAGES
      (a candidate decision, not yet ratified). It USES Decision 73's hourly full-tier cron (the "L8 drift
      canary") as the scheduling SUBSTRATE -- NOT as a DQ-specific carve-out precedent: 73 runs the WHOLE
      tier on cron and an L8 failure files a critical ci-rca rec that hard-blocks the queue (gating-
      adjacent), so the non-gating DQ MONITOR is the NEW construct CD.12 stages, distinct from L8.
        The current state -- the uniqueness checks ulid_history_unique + current_merge_key_unique run as
      live-reader GATE queries on the blocking presubmit / main-validate path -- is the transitional
      deviation: Decision 81 cl.8 records these are STRUCTURAL (current-version uniqueness "via the current
      MERGE key on rec_id") and names DQ as their enforcer; CD.12 makes that DQ enforcement an
      alarm-not-gate monitor. Target = structural MERGE invariants on the write path + a non-gating DQ
      monitor, not a blocking live-reader gate query.

      Near-term phase (decoupled from the introspection rewrite below; AUTHORABLE ahead of the T1.5-gated
      deferred phase -- it needs only T0.12 + the landed PLAN-dq-gate-infra-resilience [2026-06-15:
      transient reader 502/503/504 -> UNAVAILABLE -> DEGRADED -> non-gating SKIP] + the write-side
      enforcement that already exists):
        1. PLACEMENT. Live-reader-dependent DQ checks leave the BLOCKING gate (PR validate +
           main-validate); they run only on the scheduled monitor, filing recs (source='dq_drift');
           alarm-not-gate per CD.12 / CD.29. Frame-correction (Decision 75), NOT enforcement relaxation
           (Decision 82) -- the violation-detection guarantee is preserved by moves 2-4.
        2. RELY ON STRUCTURAL WRITE-PATH ENFORCEMENT (no new gate work). The two uniqueness checks are
           structural to the writer's MERGE, not gate-time queries: history ULID uniqueness via
           MERGE-on-ULID idempotency (Decision 81 cl.3); current-version uniqueness "structural via the
           current MERGE key on rec_id" (Decision 81 cl.8). The log-rec handler additionally rejects a
           duplicate pre-commit with typed 4xx ('Duplicate id -> 409', T0.7a) and file_ops allocates ids
           in-transaction (T2.28). NOTE: T0.7a's handler check itself does a reader round-trip, so this
           RELOCATES the round-trip off the blocking gate (onto the write path / monitor) -- it does not
           eliminate it. Only cheap, hermetic, structural CONTRACT checks (row-level shape booleans, no
           live reader) remain GATING. (Decision 81 cl.5 -- writer owns the SCHEMA-enforcement chokepoint
           -- is the related schema guarantee, distinct from these uniqueness invariants.)
        3. FAIL-FAST. Per-verifier timeout + circuit-breaker so the merge path cannot hang ~17-20 min on a
           slow / unavailable reader (serves Decision 73's enforced fast-tier budget; bounded retry per
           Decision 81 cl.3 / T1.10). The breaker lives in the verifier / harness layer, NEVER in a reader
           Lambda: the recs DQ path reads via the DuckLake reader (src/common/ducklake_runtime.py /
           src/lambdas/ducklake_reader/), which IS manifest-packaged -> editing it escalates to V3 per
           Decision 79; a CI-latency fix must not touch it (PLAN-dq-gate-infra-resilience precedent).
           (src/common/iceberg_reader.py is NOT manifest-packaged -- do not cite it as the V3 trigger.)
        4. CANARY-MUST-ALARM. Persistent DQ unavailability files a rec and alarms; it never silently passes
           (Decision 60 'never silently weaken the gate'; Decision 74 canary-must-not-silent-no-op). Closes
           the 'alerting on PERSISTENT DQ unavailability' follow-up that PLAN-dq-gate-infra-resilience
           explicitly deferred, and mitigates Decision 62's one surviving concern (the silent 'cron agent
           not running' failure mode).
