      clause: Lambda-dispatcher-disabled clause only; STRATEGIC-plan-freeze clause remains.
  - id: CD.16
    title: Lambda deploy/smoke-test gating is per-Lambda, not blanket
    detail: |
      Replaces the blanket Lambda-deploy freeze from Decision 67. The rule becomes: plans must include
      build + deploy + smoke-test steps for the Lambdas they actually modify, and may skip those steps
      for Lambdas they do not touch. Concretely:
        - Plan modifies log-rec Lambda code or its Pydantic schema → build + deploy + smoke-test log-rec required.
        - Plan modifies an Iceberg table schema referenced by log-rec → build + deploy + smoke-test log-rec
          required (schema regenerate + handler import path).
        - Plan modifies the dispatcher Lambda (currently disabled per CLAUDE.md runbook) → deploy is fine
          but smoke-test is DEFERRED until dispatcher re-enabled. Smoke-test becomes REQUIRED for the
          dispatcher Lambda once T4.3 status == complete (the dispatcher re-enablement tier item); CD.16's
          DEFERRED clause expires at that point.
        - Plan touches no Lambda code or schema → no Lambda steps required.
      This is correctly-scoped change verification. The previous blanket "all Lambda steps DEFERRED" placeholder
      was a workaround for executor-telemetry trust leaking into Lambda-deploy decisions; it is not intrinsic
      to good Lambda hygiene.
    gates: [T0.6, T0.7a, T0.7b, T0.7c, T1.1, T1.2, T1.3, T1.4, T4.3]    # T1.4 is reserved (superseded by T2.18/T2.26) -- inert here; CD.16 is ratified regardless
    state: ratified
    ratified_as: dec-079
    filed_via: ops_decisions:dec-079
    enforcement_mechanism: |
      Wiring lives in T-1.6 (CD.16 enforcement tier item). validate.py detects Lambda-modifying changes
      via a Lambda-package file-set registry; planning skill checks per-Lambda deploy steps; build_lambda.py
      enumerates per-Lambda glob patterns. Without T-1.6, CD.16 is policy without mechanism.
    narrowly_supersedes:
      decision_id: 67
      clause: Lambda-deploy-freeze clause (replaces blanket DEFERRED marker with per-Lambda gating).
  - id: CD.12
    title: DQ-as-Annotated-Pydantic; single source of truth; runner = alarm not gate
    detail: |
      Pydantic models with Annotated[T, DqXxx()] metadata are the single source of truth for schema + DQ.
      Iceberg DDL is generated by walking model_fields. The DQ runner walks the same model_fields and emits
      checks. The runner is a scheduled drift alarm that files recs on anomalies; it is NOT a pre-commit gate.
      Stateful invariants (uniqueness, FK, status-transition) run inside the Lambda handler against _current
      (T1.x) or DuckDB+Iceberg-snapshot (T2.5+) pre-commit and return typed 4xx on failure. No post-write
      self-assertion (per Decision 70 — dirty rows are expensive to fix).
    gates: [T0.12, T1.6]
    state: pending
    supersedes_intents: [dq-enforcement]
    discipline_points:
      - Pydantic models are the only place schema lives; no direct Iceberg DDL edits.
      - DQ annotation vocabulary stays small (~6-8 markers) — DqNotNull, DqUnique, DqAcceptedValues, DqRelationship, DqRecency, DqRowCount. Adding a 7th requires a new candidate decision.
      - The Iceberg DDL generator is real code we own (~100-200 LOC). pyiceberg helpers cover most of it.
      - Stateful invariants (status DAG transitions, FK across tables, intra-table parent/child uniqueness) live in handler code, NOT in Annotated metadata. They run pre-commit against the read path (T2.5+ via DuckDB-on-Iceberg-snapshot, T1.x bridging via Athena _current views in the old account only) and return typed 4xx on failure.
      - Distributional / drift checks live in the DQ runner (T1.6 alarm-not-gate), NOT in Annotated metadata. Annotated marker vocabulary is for shapes the runner can express as a row-level boolean; drift is a distribution-level signal.
      - Schema evolution policy. Field removal is destructive — the DDL generator does NOT emit `ALTER TABLE ... DROP COLUMN` for fields merely absent from the Pydantic model. Removal requires an explicit `Annotated[T, DqDeleted(since='YYYY-MM-DD')]` marker on a deprecated field for at least one release cycle; the generator emits a no-op for `DqDeleted` and the runner short-circuits checks on those fields. Then a separate explicit drop step in a follow-on plan removes the field from Pydantic and emits the DDL drop.
      - Schema-drift detector. Until T1.6 retires `config/agent/data_quality/*.yaml` (path corrected 2026-06-09, audit F-015), both YAML and Pydantic-Annotated coexist (T0.12 onwards). A CI check (added in T0.12) confirms the two sources express the same checks for any overlapping field; divergence fails CI.
  - id: CD.13
    title: ROADMAP-PLATFORM.yaml is the agent-first documentation exemplar
    detail: Pure YAML, no narrative prose, structured tier_items + cross_tier_gates + candidate_decisions. Future repo documentation follows this shape. Markdown-with-prose is the legacy pattern being retired.
    gates: [T-1.2, T-1.3, T-1.4, T-1.5]
