        - Preserves Decision 47 (lock-in lesson) via Anthropic-direct serving the warm-fetched-escape-hatch role.
        - Preserves INTENT-provider-agnostic-executor.md's LiteLLM Layer-1 commitment. The provider
          adapter changes its routed tier; the abstraction does not change.

