# docs/ROADMAP-PLATFORM.yaml
#
# Canonical platform roadmap. Agent-first artefact. Consumed by
# scripts/session_preflight.py (platform_roadmap state computation),
# .claude/skills/planning/SKILL.md (eligibility check at intent clarification),
# .claude/commands/plan.md (orientation surface),
# scripts/validate.py (RoadmapDocument Pydantic schema check).
#
# This file is the source of truth for platform sequencing. docs/ROADMAP-PRODUCT.md
# is the source of truth for trading-system product sequencing. They are siblings,
# not parent/child.

document:
  id: ROADMAP-PLATFORM
  version: 1
  status: draft
  filed_via: pending_log_decision_lambda    # union type: "pending_log_decision_lambda" (pre-ratification) or "ops_decisions:dec-NNN" (post-ratification). T-1.5 schema enforces.
  description: |
    The platform underneath docs/ROADMAP-PRODUCT.md. Names the automation, governance,
    and control-plane infrastructure underneath the trading system. Sequenced as
    tiers T-1..T5 with named cross-tier gates. Replaces and inlines the content of
    the retired docs/INTENT-compute-and-account-topology.md (per CD.14).
  agent_instructions: |
    - Work is discoverable via tier_items[]. An item is eligible when status ==
      "not_started" AND all depends_on entries have status == "complete".
    - depends_on entries are EITHER specific tier_item ids (e.g. T0.1) OR
      tier-name shortcuts (e.g. T0, T2). A tier-name shortcut means "all
      tier_items with that tier value are complete." Both forms are valid.
    - Always reference items by id (e.g. T0.1), never by title. Titles change;
      ids do not.
    - Decision references resolve to candidate_decisions[].id (pre-ratification)
      or ops_decisions.decision_id (post-ratification).
    - candidate_decisions[].gates lists tier_items whose IMPLEMENTATION semantics
      this decision governs. A CD must be ratified before its gated tier_items
      can be marked status == "complete". A tier_item is eligible to START
      regardless of CD ratification (bootstrap allowance — see Bootstrap clause).
    - candidate_decisions[].decision_required_before (optional field) names a
      tier_item state transition that CANNOT proceed until this CD is ratified.
      Value is a gate-rule expression using gate_helpers grammar. Distinct from
      .gates in that .gates governs COMPLETION while .decision_required_before
      governs START (or another named state transition). T-1.5 schema enforces
      both fields; preflight surfaces "blocked-on-CD" when a tier_item is
      eligible-by-deps but a referenced CD is pending.
    - Cross-tier gates in cross_tier_gates[] are MUST hold, not advisory.
      Gate rule strings are evaluated against a mini-grammar of:
        - item lookups: T0.1.status, T0.1.uptime_days, T0.1.latest_run.verdict
        - boolean / comparison operators
        - named helper functions: thirty_day_grace_elapsed(item),
          tier_complete(tier_name), all_in_tier_with_status(tier_name, status)
      Unknown helpers MUST be rejected by the T-1.5 RoadmapDocument schema check.
    - Effort markers (XS/S/M/L/XL) indicate decomposition need, not wall-clock.
      L and XL items are tagged strategic: true and require their own STRATEGIC
      plan tree before implementation.
    - Bootstrap clause (START eligibility): T-1 tier_items AND T0 tier_items
      with depends_on:[] are eligible to START even when document.status ==
      "draft" and document.filed_via == "pending_log_decision_lambda" and
      candidate_decisions are all state == "pending". This covers T-1.0, T-1.4,
      T-1.5 in T-1 and T0.1, T0.2, T0.3, T0.4, T0.9, T0.10, T0.12 in T0 (the
      items with no upstream dependency that produce the substrate everything
      else needs).
    - Bootstrap clause (COMPLETION exemption): the ratification-prerequisite
      set MAY reach status == "complete" with their gating CDs still state ==
      "pending". The exempt set is now enumerated per-item via the
      tier_items[].bootstrap_completion_exempt boolean flag (the document-level
      prose enumeration is documentation; the per-item flag is the single source
      of truth). Two scopes operate in parallel after PLAN-cd25-platform-gap-sequencing:
        (a) Legacy CD.1-scoped subset: {T-1.0..T-1.6, T0.6, T0.7a..c, T0.8, T0.9,
            T0.11, T0.12, T0.13, T0.14}. Without this exemption, ratification
            deadlocks at two layers: (i) T-1.1 depends on T0.7b; T0.7b's gating CDs
            (CD.10/CD.12) only ratify inside T-1.1; (ii) CD.1.gates == [T-1]
            requires every T-1 sibling complete, including ones whose
            related_candidate_decisions reference CD.1/CD.13 -- also circular.
            Exemption ends at CD.1 ratification (i.e. the moment T-1.1 completes).
        (b) CD.25-scoped subset (T-1.12 expansion): {T-1.11..T-1.19, T0.12.5,
            T0.12.6, T0.12.7}. CD.25 cannot ratify until T0.7b (log-decision Lambda)
            is deployed, which is governed by CD.16 ratification + per-Lambda gating.
            Without this exemption, the new ratification items deadlock. Exemption
            ends at CD.25 ratification. Round-3 M2: atomic decomposition children
            of a parent inherit the parent's bootstrap_completion_exempt value
            automatically; the bookkeeping rule reads decomposition_hints at
            plan-filing time (.claude/skills/implement/SKILL.md amendment lands in
            a T-1.12 follow-on plan).
    - During the bootstrap window, candidate_decisions with state == "pending"
      MUST be treated as binding by any agent reading the roadmap; the pending
      window may span several weeks because the log-decision Lambda (T0.7b) is
      the first ratification vehicle.
    - This document is self-contained. No outbound substantive references to
      retired INTENT-compute-and-account-topology.md are valid. Mentions in
      retirement metadata (CD.14, T5.5, KG.4) are not references.

  gate_helpers:
    # Formal grammar for the gate-rule mini-language. T-1.5 RoadmapDocument
    # schema rejects unknown helpers; arity-mismatched calls are rejected.
    - name: tier_complete
      arity: 1
      params:
        - name: tier_name
          type: str
      returns: bool
      semantics: True iff all tier_items with item.tier == tier_name have status == "complete".
    - name: all_in_tier_with_status
      arity: 2
      params:
        - name: tier_name
          type: str
        - name: status
          type: str
      returns: bool
      semantics: True iff all tier_items with item.tier == tier_name have status == status.
    - name: grace_period_elapsed
      arity: 2
      params:
        - name: item
          type: tier_item_id
        - name: days
          type: int
      returns: bool
      semantics: True iff item.status == "complete" AND now() - item.completed_at >= timedelta(days=days). The named days argument removes the round-1 helper-name ambiguity ("thirty_day_grace_elapsed" used inconsistently for both 14d and 30d windows).
    - name: item_field_eq
      arity: 3
      params:
        - name: item
          type: tier_item_id
        - name: field_path
          type: str
        - name: expected
          type: scalar
      returns: bool
      semantics: |
        True iff the dotted field_path resolved against the tier_item equals expected.
        Used for runtime aggregates like item.latest_run.verdict == "PASS" that depend on
        external state (verifier outputs) not encoded in tier_items themselves. The
        validator does not statically check field_path resolution — that is a runtime
        concern handled by T-1.4's preflight computation.

north_star:
  principles:
    - id: NS.1
      principle: Storage is durable; compute is interchangeable.
      detail: S3 + open table format at every scale from GB to PB (Iceberg for market-data; DuckLake for ops/telemetry per Decision 78). Engines are swappable per workload; data is not migrated to swap engines.
    - id: NS.2
      principle: Account ownership reflects IP ownership.
      detail: Personal AWS account, not shared work account. AUP, IP, and business-continuity reasons; cost is a tiebreaker.
    - id: NS.3
      principle: Compute lives where it economically belongs.
      detail: Hybrid by design. Cloud for orchestration and state; local rig for CPU-bound batch where home hardware otherwise idles.
    - id: NS.4
      principle: The repo is for agents.
      detail: Documentation, configuration, and tooling are optimised for agent consumption. Narrative prose is a side effect, not an output.
    - id: NS.5
      principle: Self-describing typed tools over HTTPS, schema-as-code.
      detail: Agent surface is verbs (log, update, query, describe) exposed via Lambda Function URLs with AWS_IAM auth. Schema is Pydantic; YAML is generated where needed.

cost_projection:
  # Inlined from the retired INTENT-compute-and-account-topology so the projection
  # has a canonical home. To be ratified as part of CD.6 or as a sibling CD.17
  # ("Cost-projection envelope acknowledged") via log-decision (T0.7b).
  notes: |
    Order-of-magnitude only. Refined as personal account operates; revisit at T2 close.
    Not a budget; an architectural cost sanity-check. Ratified as part of CD.6 (Personal AWS = destination)
    — no separate cost-acknowledgement CD needed. (Round-3 architect LOW-5 fix: the round-2 draft cited a
    "sibling CD.17" as the cost-ratification home; CD.17 was subsequently allocated to STRATEGIC-freeze-reversal,
    leaving cost-projection without a home. CD.6 covers it instead.)
  current_scale:
    total_per_month_usd: 45-65
    dominant_cost: "EC2 self-hosted runner historically (~$35/mo) -- RETIRED 2026-05-28 per CD.21; with the RDS catalog migrated to Neon ($0) per CD.34, the dominant live AWS line is CloudWatch logs / DeepSeek inference (~$5-8/mo)"
    breakdown:
      s3_storage: "<$1"
      athena_queries: "$1-5"
      dynamodb_on_demand: "$1-3"
      ec2_runner_24_7: "$0 (retired 2026-05-28 per CD.21; ~$35/mo historical, line retained as baseline)"
      secrets_manager: "~$2"
      cloudwatch_logs: "$3-8"
      deepseek_executor_inference: "~$5 (~100 recs/month at ~$0.05 each via DeepSeek direct API, ~75% lower than the retired Bedrock path; native cache hit drops repeat-prefix cost further)"
      anthropic_escape_hatch_spillover: "$0-5 (warm-fetched Tier-2 per CD.28; usually $0 because Max x5 programmatic-pool credit absorbs the typical volume; spillover only when escape hatch activates heavily)"
      ducklake_catalog_neon: "$0 (Neon serverless Postgres free tier; scale-to-zero; built-in pooler replaces RDS Proxy) per CD.34, replacing the prior RDS catalog (~$12-15/mo single-AZ db.t4g.micro + gp3 + PITR; deferrable RDS Proxy +$10-12 was never provisioned -- OQ.8). Realized saving ~$12-15/mo. Daily pg_dump-to-S3 DR is a negligible add-on. Migrated before T2.17 to avoid building RDS-in-a-VPC + NAT plumbing."
    line_items_not_enumerated: VPC endpoints, NAT, DynamoDB PITR, CloudTrail, Config, KMS, GH-hosted runner minutes, S3 Intelligent-Tiering monitoring fee, Step Functions state-transition cost (negligible at current scale, ~$0.025 per 1000 transitions Standard Workflow) -- realistic add-on $10-30/month at current scale.
  projected_100tb_scale:
    total_per_month_usd: 880-1750
    dominant_cost: S3 storage (~$800-1500/mo with Intelligent-Tiering)
    breakdown:
      s3_storage_100tb_tiered: "$800-1500"
      athena_escape_hatch: "$5-30"
      duckdb_queries: "$0 (runs on existing compute)"
      dynamodb_ops_tables: "$5-10"
      ec2_runner_scheduled: "$15-30"
      deepseek_executor_inference: "$15-80 (volume scaling per CD.28; ~75% lower than the retired Bedrock-DeepSeek path; assumes typical cache-hit ratios on repository-context prefix)"
      anthropic_escape_hatch_spillover: "$0-30 (Max x5 programmatic pool absorbs ~$100/mo; spillover above that bills at API rates -- CD.28 discipline-point recommends org-billed Anthropic API key once sustained >70% of pool over 30d)"
      step_functions_transitions: "$1-10 (per-rec state transitions at Standard Workflow rates -- $0.025 per 1000 transitions; assumes ~30 transitions per rec and 100-300 recs/month)"
      other_secrets_cloudwatch_transfer: "$20-50"
    add_ons_at_scale: $50-150/month for the line items not enumerated above (object count matters at 100 TB).
  alternative_architectures_considered:
    - shape: SageMaker per-symbol fan-out for formula discovery
      cost_per_month_usd: 521 (or ~$160 with Spot + checkpointing)
      retired_because: ~20-25x more expensive than overnight on the compute node, which is otherwise idle. See CD.3.
    - shape: Local LLM inference on home GPU
      retired_because: Home GPU is wrong tier. The home-GPU-rejection judgement was made under CD.7 (now fully superseded by CD.28) but is preserved verbatim by CD.28 -- locally-hostable substitutes still cannot match frontier-class agentic workloads. Payback period vs the post-CD.28 DeepSeek-direct path is even longer than the original Bedrock comparison (DeepSeek direct API is the cheapest frontier-class option, narrowing the margin self-hosting would need to beat).
    - shape: AWS Bedrock as LLM substrate (CD.7 substrate path)
      retired_because: Bedrock DeepSeek charges ~2.5x input / ~4.9x output per million tokens vs DeepSeek direct API ($0.62/$1.85 vs $0.252/$0.378). DeepSeek is excluded from Bedrock Batch (no 50%-off path) and Bedrock prompt-caching covers only Anthropic + Nova families (so DeepSeek's native context cache is unavailable through Bedrock). Direct API via LiteLLM unlocks both. See CD.28. Cost-projection headline figure "~75% reduction" is intentionally conservative; spot-check arithmetic at typical executor scale (100 recs/month, ~50K input + ~10K output tokens/rec, ~80% prefix cache-hit) yields ~91% reduction; the realised savings should exceed the headline.
    - shape: AWS Fargate as executor substrate (CD.11 path)
      retired_because: The per-rec plan->critique->implement->review loop is natively a state machine, not a single long-running process. Step Functions + Lambda Durable Functions + Lambda decomposition (CD.27) eliminates the 15-minute Lambda ceiling that originally drove the Fargate choice, while gaining native checkpointing, parallel critic fan-out, and per-step cold-start <1s vs Fargate 30-90s. Fargate retained via ECS Run Task escape hatch for deterministic steps that genuinely exceed 15 min.
  reevaluation_triggers:
    - DeepSeek direct API pricing changes >5x in either direction (per CD.28; equivalent to the retired Bedrock-pricing trigger)
    - Anthropic Max x5 programmatic pool sustained at >70% utilisation over 30 days (per CD.28 discipline point -- file rec for org-billed API key)
    - S3 storage cost exceeds 50% of total monthly bill
    - Self-hosted runner cost becomes >2x scheduled-runner alternative
    - Step Functions state-transition cost exceeds 5% of total monthly bill (would signal per-rec transition count is anomalous; investigate before optimising)

rebuild_vs_refactor:
  stance: |
    Three substrates are rebuilt; three are refactored. Greenfield rewrite of the
    Python codebase is explicitly retired as a strawman: 70+ ratified decisions are
    load-bearing context that does not reload from scratch.
  rebuild:
    - AWS infrastructure in personal account (full Terraform re-deploy, not state migration)
    - Dev surface (Claude Code on the web env definition; not a port of the Windows VM)
    - Agent tooling surface (Lambda-per-tool; replaces in-process ops_data_portal imports)
    - Read engine layer (DuckDB default; Athena _current views retired in new account per CD.15)
  refactor:
    - Python codebase (scripts/, src/, tests/) — surgical changes per open recs and tier items, no rewrite
    - Iceberg table schemas (preserve, partition-everywhere on rebuild per CD.9)
    - Decision history (graduate to ops_decisions table; identities preserved)
  retired_options:
    - id: R.1
      option: Greenfield rewrite of the codebase
      retired_because: |
        70+ decisions and ~258 open recs encode load-bearing architectural context.
        Restarting from scratch discards them. The cost of cumulative refactor is bounded;
        the cost of rewriting context is unbounded.

