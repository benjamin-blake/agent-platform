      - "Catalog is the lakehouse SPOF; on Neon free tier (~6h PITR) DR = a daily pg_dump-to-S3 (single consistent snapshot, engine-version-tagged, 30-day retention, >25h freshness alarm) + a tested restore BEFORE any production write (T2.16b). Reversible: the RDS retires with a final snapshot (sole recovery artifact; delete_automated_backups wipes PITR -- rec-2063 WONTFIX while the catalog is provably unused), human-gated (Decision 35) onto the Decision-77 fail-closed destroy path."
      - "Provisioned via the Terraform Neon provider in terraform/personal/, auto-applied via the Decision-77 sandbox pipeline behind a Neon-aware fail-closed guard + subagent review (policy-as-code parity for the new provider; NOT carved out). The guard blocks any neon_* update/replace/delete (the mutation surface -- allow-list widening, credential rotation, project deletion) and allows a neon_* create on the strength of compensating controls -- enforced TLS (sslmode=require) + a scoped non-owner neon_role + the DSN in Secrets Manager -- NOT an IP allow-list (Neon IP-Allow is Scale-plan-only, unavailable on the free tier, and egress here is dynamic; REPORT R3). Keeps declarative state/audit for the lakehouse's single most critical stateful dependency rather than console-only. The out-of-band ducklake_ops schema DDL is captured as a versioned in-repo migration for reproducibility."
