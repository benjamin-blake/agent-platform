candidate_decisions:
  # Pre-ratification. Ratification vehicle: the ops portal (file_decision ->
  # ops_decisions:dec-NNN) until T0.7b lands, then the log-decision Lambda --
  # see the agent_instructions "Ratification vehicle" note (audit F-001).
  # Ratified decisions move to ops_decisions and their candidate id is retained here as
  # an alias for traceability.
  - id: CD.1
    title: Adopt platform roadmap (this document) as canonical
    detail: ROADMAP-PLATFORM.yaml is the source of truth for platform sequencing. Supersedes the platform sections of ROADMAP-PRODUCT.md.
    gates: [T-1]
    state: pending
    filed_via: pending_log_decision_lambda  # normalized to the canonical pending literal (audit F-030; was the off-union 'log-decision-lambda'); ratifiable via the ops portal per the agent_instructions vehicle note
  - id: CD.2
    title: Dev surface = Claude Code on the web; Windows VM exits
    detail: |
      Primary dev surface migrates to browser-based ephemeral Linux container. Windows VM remains opportunistically usable until T5.1.
      [Realized 2026-05-30: CC-web dev surface operational per Decision 76 (web-workflow-migration PR #10) and bin/setup-cloud-env.sh static-key setup (PRs #4/#6). CD.2 gates full T0 completion; T0.4/T0.6/T0.7+ remain outstanding.]
    gates: [T0]
    state: pending
  - id: CD.3
    title: Windows desktop = compute node only; REDACTED-VPN + SSH access
    detail: compute node hosts PySR formula discovery overnight. Not a dev surface. Reached via REDACTED-VPN + SSH.
    gates: [T2.6]
    state: pending
  - id: CD.4
    title: Vendor lock-in to Claude Code on the web is acceptable; AGENTS.md is portability hedge
    detail: Not over-investing in cross-harness abstraction. AGENTS.md is symlinked or duplicated to CLAUDE.md so other agent harnesses (Cursor, Aider, etc.) pick up the same instructions.
    gates: [T0.9]
    state: pending
  - id: CD.5
    title: Pre-commit augments, does not replace, never_on_main hook
    detail: .claude/hooks/never_on_main.py intercepts intent-to-edit; pre-commit intercepts commit. Keep both. scheduled_agent_log_only.py stays (no portable analog).
    gates: [T0.10]
    state: pending
  - id: CD.6
    title: Personal AWS account = destination; rebuild not migrate
    detail: |
      Pre-live data is throwaway. Only ops_recommendations + ops_decisions need preservation (small enough to export/import as JSON). Infrastructure is fully Terraformed, so migration = fresh terraform apply against new account ID.
      [Realized 2026-05-28: Phase B personal-account Terraform re-deploy applied + verified per Decision 77 (PR #1). Full T2 completion outstanding; T2.4/T2.5/T2.6/T2.7+ not yet started.]
    gates: [T2]
    state: pending
  - id: CD.7
    title: LLM inference stays on Bedrock; home GPU is wrong tier
    detail: |
      [Amendment 2026-05-27 -- fully superseded by CD.28]: the Bedrock-as-primary clause of this CD is
      retired. Bedrock leaves the architecture as an LLM substrate. CD.28 (DeepSeek-direct via LiteLLM
      Tier 1; Anthropic-direct Tier 2) replaces both the primary-substrate role and the per-tier-alternative
      routing scheme. The original detail is preserved below for historical traceability. The home-GPU-is-
      wrong-tier judgement is retained verbatim by CD.28 (locally-hostable substitutes still cannot match
      frontier-class agentic workloads). KG.7 (Bedrock partial-denial contingency) is rewritten as a
      Tier-2-availability gap by the same amendment.

      Original detail (pre-amendment):
      RTX 3050 6GB LP is display-class, not inference-class. Frontier-class model needs cannot be matched
      by locally-hostable substitutes for agentic multi-turn workloads. Re-evaluate if Bedrock pricing
      changes >5x. Target executor model: DeepSeek V4 on personal AWS Bedrock once available; DeepSeek
      V3.2 is the current placeholder and Claude family (Sonnet 4.6, Haiku 4.5) is the per-tier alternative
      per executor_capabilities routing. Falls back to single-frontier-model (Sonnet 4.6 only) if Bedrock
      partial-denial scenario from KG.7 occurs.
    gates: []    # emptied 2026-05-27 -- CD.7 is fully superseded by CD.28 which now gates [T0.4, T4.1, T4.2, T4.3, T4.4]; CD.7 retained for historical traceability only
    state: pending
  - id: CD.8
    title: DuckDB = default operational read engine
    detail: |
      Embedded, sub-second, no SSO, runs anywhere. Athena retained per CD.15 conditionally; the typed
      query Lambda hides the engine choice from agents.
      [Amendment -- CD.31]: Under the proposed DuckLake adoption (CD.31), DuckDB's native operational
      table format transitions from Iceberg to DuckLake; the embedded-engine choice (DuckDB) is unchanged.
    gates: [T1.2, T2.5]
    state: pending
  - id: CD.9
    title: Partition every table; uniform rule
    detail: |
      Every Iceberg table is partitioned. Ops + telemetry use day(last_updated_timestamp). Market data
      uses day(trade_date). New tables inherit the partitioned template. No unpartitioned-table path.
      [Amendment -- CD.31]: Partitioning IS available in DuckLake via ALTER TABLE ... SET PARTITIONED BY
      (a metadata-only operation), NOT via CREATE TABLE DDL (which is unavailable in DuckLake -- the spike
      returned a parser error; the error was correct but the conclusion "no partitioning" was wrong).
      The "No unpartitioned-table path" absolute holds: ops DuckLake tables are partitioned via ALTER once
      row/file count warrants. T2.4 applies the ALTER mechanism for DuckLake ops tables; the Iceberg
      partition sweep for all other tables is otherwise unchanged.
    gates: [T2.4]
    state: pending
  - id: CD.10
    title: Agent Tooling Platform = Lambda per tool; replaces ops_data_portal as agent surface
    detail: |
      Internal-only tooling surface. Six Lambdas (log-rec, update-rec, log-decision, query,
      list-tools+describe, maintenance). Invoked via boto3 or Function URL + AWS_IAM auth (sigv4-signed).
      Two IAM principals are recognized: PlatformDev (default; daily writes via log_rec/update_rec/log_decision,
      reads via query) and PlatformAdmin (T2.2 import-mode operations, emergency overrides). Lambdas check
      principal ARN against an allow-list to enforce admin-scoped paths. ops_data_portal.py survives only as
      the Lambdas' internal implementation.
      [Amendment -- CD.26 Pattern B plan]: auth primitive changed from SSO permission set to IAM role.
      PlatformDev and PlatformAdmin are now aws_iam_role resources (terraform/lambda_tooling_iam.tf), not
      aws_ssoadmin_permission_set. The two-principal allow-list semantic is preserved verbatim. Lambda handlers
      check the assumed-role ARN against the IAM role ARN for admin-only branches.
      [Amendment 2026-06-09 -- audit integration (F-008)]: the six-Lambda enumeration is illustrative,
      not canonical (CD.33 ratified the writer/reader/maintenance path split + closed boundary; the verb
      surface in front of it is deliberately extensible). For ops_recommendations, the write/read TRANSPORT
      is the closed ducklake_writer/ducklake_reader boundary (Decision 81 cl.7) -- the verb Lambdas front
      that boundary (extend its verb set or call through it; OQ.15 resolves the shape at T0.6 plan time)
      and NEVER write Iceberg/Athena directly for cut-over tables. ops_data_portal.py-as-internal-
      implementation survives for the still-Iceberg tables until T2.26.
    gates: [T0.6, T0.7a, T0.7b, T0.7c, T1.1, T1.2, T1.3, T1.4]    # T1.4 is reserved (superseded by T2.18/T2.26) -- a gate on a reserved item is inert
    state: pending
    supersedes_intents: [ops-pipeline-consolidation]
  - id: CD.11
    title: Fargate-based executor supersedes Lambda dispatcher
    detail: |
      [Amendment 2026-05-27 -- narrowly superseded by CD.27]: the "Fargate-as-executor-substrate" clause
      is retired. CD.27 (Step Functions + Lambda Durable Functions + Lambda) is the new executor substrate.
      Fargate is NOT eliminated from the architecture -- it is demoted from "the executor's substrate" to
      "the long-step escape hatch within the executor's Step Functions orchestrator," accessed via the
      arn:aws:states:::ecs:runTask.sync integration for deterministic steps that genuinely exceed 15
      minutes (e.g. full pytest, terraform apply). The other half of CD.11 -- supersession of the Lambda
      dispatcher path -- stays load-bearing and is unaffected by this amendment; the new substrate
      replaces both the Fargate path AND the prior dispatcher path. The original detail is preserved below
      for historical traceability.

      Original detail (pre-amendment):
      Long-running container in personal AWS account, headlessly calling Bedrock. Replaces the
      Lambda-dispatcher path for autonomous executor work. NOTE: Decision 67 bundled two distinct
      concerns under a single freeze: (1) STRATEGIC-plan freeze driven by executor-telemetry-trust
      readiness, and (2) Lambda-deploy freeze driven by the dispatcher being disabled. CD.11 only
      addresses concern (2) — the Lambda dispatcher path itself is retired. Concern (1) remains
      load-bearing and is NOT superseded by this decision. The replacement for concern (2) is CD.16
      (per-Lambda deploy gating). The replacement for concern (1) is the executor-telemetry-trust
      gate that T4.2 implementation must establish on its own terms.
    gates: [T4.1, T4.2]
    state: pending
    supersedes_decisions: []
    narrowly_supersedes:
      decision_id: 67
      clause: Lambda-dispatcher-disabled clause only; STRATEGIC-plan-freeze clause remains.
  - id: CD.16
    title: Lambda deploy/smoke-test gating is per-Lambda, not blanket
    detail: |
      Replaces the blanket Lambda-deploy freeze from Decision 67. The rule becomes: plans must include
      build + deploy + smoke-test steps for the Lambdas they actually modify, and may skip those steps
      for Lambdas they do not touch. Concretely:
        - Plan modifies log-rec Lambda code or its Pydantic schema → build + deploy + smoke-test log-rec required.
        - Plan modifies an Iceberg table schema referenced by log-rec → build + deploy + smoke-test log-rec
          required (schema regenerate + handler import path).
        - Plan modifies the dispatcher Lambda (currently disabled per CLAUDE.md runbook) → deploy is fine
          but smoke-test is DEFERRED until dispatcher re-enabled. Smoke-test becomes REQUIRED for the
          dispatcher Lambda once T4.3 status == complete (the dispatcher re-enablement tier item); CD.16's
          DEFERRED clause expires at that point.
        - Plan touches no Lambda code or schema → no Lambda steps required.
      This is correctly-scoped change verification. The previous blanket "all Lambda steps DEFERRED" placeholder
      was a workaround for executor-telemetry trust leaking into Lambda-deploy decisions; it is not intrinsic
      to good Lambda hygiene.
    gates: [T0.6, T0.7a, T0.7b, T0.7c, T1.1, T1.2, T1.3, T1.4, T4.3]    # T1.4 is reserved (superseded by T2.18/T2.26) -- inert here; CD.16 is ratified regardless
    state: ratified
    filed_via: ops_decisions:dec-1086
    enforcement_mechanism: |
      Wiring lives in T-1.6 (CD.16 enforcement tier item). validate.py detects Lambda-modifying changes
      via a Lambda-package file-set registry; planning skill checks per-Lambda deploy steps; build_lambda.py
      enumerates per-Lambda glob patterns. Without T-1.6, CD.16 is policy without mechanism.
    narrowly_supersedes:
      decision_id: 67
      clause: Lambda-deploy-freeze clause (replaces blanket DEFERRED marker with per-Lambda gating).
  - id: CD.12
    title: DQ-as-Annotated-Pydantic; single source of truth; runner = alarm not gate
    detail: |
      Pydantic models with Annotated[T, DqXxx()] metadata are the single source of truth for schema + DQ.
      Iceberg DDL is generated by walking model_fields. The DQ runner walks the same model_fields and emits
      checks. The runner is a scheduled drift alarm that files recs on anomalies; it is NOT a pre-commit gate.
      Stateful invariants (uniqueness, FK, status-transition) run inside the Lambda handler against _current
      (T1.x) or DuckDB+Iceberg-snapshot (T2.5+) pre-commit and return typed 4xx on failure. No post-write
      self-assertion (per Decision 70 — dirty rows are expensive to fix).
    gates: [T0.12, T1.6]
    state: pending
    supersedes_intents: [dq-enforcement]
    discipline_points:
      - Pydantic models are the only place schema lives; no direct Iceberg DDL edits.
      - DQ annotation vocabulary stays small (~6-8 markers) — DqNotNull, DqUnique, DqAcceptedValues, DqRelationship, DqRecency, DqRowCount. Adding a 7th requires a new candidate decision.
      - The Iceberg DDL generator is real code we own (~100-200 LOC). pyiceberg helpers cover most of it.
      - Stateful invariants (status DAG transitions, FK across tables, intra-table parent/child uniqueness) live in handler code, NOT in Annotated metadata. They run pre-commit against the read path (T2.5+ via DuckDB-on-Iceberg-snapshot, T1.x bridging via Athena _current views in the old account only) and return typed 4xx on failure.
      - Distributional / drift checks live in the DQ runner (T1.6 alarm-not-gate), NOT in Annotated metadata. Annotated marker vocabulary is for shapes the runner can express as a row-level boolean; drift is a distribution-level signal.
      - Schema evolution policy. Field removal is destructive — the DDL generator does NOT emit `ALTER TABLE ... DROP COLUMN` for fields merely absent from the Pydantic model. Removal requires an explicit `Annotated[T, DqDeleted(since='YYYY-MM-DD')]` marker on a deprecated field for at least one release cycle; the generator emits a no-op for `DqDeleted` and the runner short-circuits checks on those fields. Then a separate explicit drop step in a follow-on plan removes the field from Pydantic and emits the DDL drop.
      - Schema-drift detector. Until T1.6 retires `config/agent/data_quality/*.yaml` (path corrected 2026-06-09, audit F-015), both YAML and Pydantic-Annotated coexist (T0.12 onwards). A CI check (added in T0.12) confirms the two sources express the same checks for any overlapping field; divergence fails CI.
  - id: CD.13
    title: ROADMAP-PLATFORM.yaml is the agent-first documentation exemplar
    detail: Pure YAML, no narrative prose, structured tier_items + cross_tier_gates + candidate_decisions. Future repo documentation follows this shape. Markdown-with-prose is the legacy pattern being retired.
    gates: [T-1.2, T-1.3, T-1.4, T-1.5]
    state: pending
  - id: CD.14
    title: Roadmap is self-contained; INTENT-compute-and-account-topology retired
    detail: |
      docs/INTENT-compute-and-account-topology.md is retired. Its content is inlined into this roadmap
      (north_star, rebuild_vs_refactor, T2 tier items, partition strategy via CD.9, cost_projection
      top-level section). The other 10 INTENT docs (including provider-agnostic-executor, newly added
      to main during this planning session) become detail-companions — they retain their content but
      are downgraded from authoritative to reference-only.
    gates: [T-1.1, T5.5]
    state: pending
    retires_intents: [compute-and-account-topology]
    demotes_intents:
      - recommendation-executor
      - telemetry-system
      - verification-system
      - autonomous-improvement-control-plane
      - ops-pipeline-consolidation
      - validation-architecture
      - dq-enforcement
      - ops-decisions-graduation
      - ci-cd-architecture
      - provider-agnostic-executor    # round-2 architect MED-6: list sync with T5.5.files_in_scope
  - id: CD.15
    title: Reads go through typed query Lambda exposing verbs; Athena _current views retired in new account
    detail: |
      The query Lambda exposes typed verbs (get_rec_by_id, list_open_recs, get_decision_by_id, list_recent_decisions,
      list_priority_queue, etc.) instead of SQL. SCD2 dedup is implementation detail inside the Lambda. In the personal
      AWS account no Athena _current views are deployed — they are an implementation detail of the old read path and
      a known bug surface (the _rn ambiguity). DuckDB queries the Iceberg snapshots directly inside the Lambda.
      Athena is retained as an escape hatch only for ad-hoc large scans where DuckDB single-node memory binds.
      [Amendment -- CD.31]: Under the proposed DuckLake adoption (CD.31), Athena cannot read DuckLake
      tables (no Iceberg metadata export; no external-engine reader). The Athena escape hatch transitions
      from "Athena on Iceberg snapshots" to OQ.7 -- resolution deferred to T2.19 / FP-B. DuckDB-on-DuckLake
      replaces DuckDB-on-Iceberg-snapshot for the operational read path.
    gates: [T0.7c, T1.2, T2.5, T2.7]    # T2.7 (was T1.8) — Athena view retirement properly lives in T2 since it depends on T2.5
    state: pending
  - id: CD.17
    title: Decision 67 STRATEGIC-plan-freeze reversal trigger is T4.2 stability
    detail: |
      Decision 67 bundled a STRATEGIC-plan freeze with the Lambda-deploy freeze. CD.11 + CD.16 split the
      Lambda-deploy half. The STRATEGIC-plan half remains load-bearing and is reversed by THIS decision
      when its prerequisites land. Reversal trigger (grammar-expressible per document.gate_helpers):
        T4.2.status == "complete" AND grace_period_elapsed(T4.2, 14)
        AND item_field_eq(T3.2, "latest_run.verdict", "PASS")
        AND T3.3.status == "complete" AND grace_period_elapsed(T3.3, 7)
      (The verbal "sustained basis" and "operational" phrasings from the round-2 draft are recast as
      explicit grace-period checks. "Sustained" = T3.2 PASS verified for 14d via grace_period_elapsed on
      T4.2's completion; "operational" = T3.3 complete + 7d grace.)
      Practical impact during the freeze (which will remain in effect for many tier waves):
        - Tier items tagged strategic: true CANNOT be filed as a single STRATEGIC plan with Work Areas.
        - INSTEAD, each strategic tier_item decomposes into a tree of atomic IMPLEMENTATION plans.
        - This is the current operating mode in this repo (e.g. ops_decisions graduation split across
          PLAN-ops-decisions-phase-0-1, PLAN-ops-decisions-phase-2-semantic-definition, etc.) and is NOT
          a blocker for roadmap progress — it is the discipline that makes progress safe under freeze.
      Expected timeline: many months from CD.1 ratification to CD.17 trigger. The reversal cascade is
      Lambda agent tooling (T0) → DQ-as-Pydantic reshape (T1) → telemetry trust (T3) → autonomous
      executor (T4.2). The assumed model substrate at the time of trigger is DeepSeek-direct via LiteLLM
      per CD.28 (Tier 1), with Anthropic-direct (Claude Sonnet 4.6 / Haiku 4.5) as the warm-fetched Tier-2
      escape hatch. [Amendment 2026-05-27]: the original "DeepSeek V4 availability on personal AWS Bedrock"
      substrate assumption was retired by CD.28 -- Bedrock is no longer part of the executor's LLM substrate.
      The trigger expression structure is unchanged (still keyed to T4.2 stability + grace period); only the
      underlying model-substrate assumption changed.
      [Amendment 2026-06-01 -- verification-validation roadmap]: tier_items T3.6 (hermeticity audit) and T3.7
      (validation-suite meta-validation) and the expanded T3.1 (typed checks kernel + graduation registry)
      strengthen the telemetry/verification trust loop this reversal cascade depends on, but they PRECEDE and
      do NOT gate the reversal trigger -- the trigger expression remains keyed to T4.2 / T3.2 / T3.3 only and
      is structurally unchanged.
    gates: [T1.5, T1.6, T2.1, T3.3, T3.4, T4.1, T4.2, T4.4]    # the strategic items the freeze affects
    state: pending
    narrowly_supersedes:
      decision_id: 67
      clause: STRATEGIC-plan-freeze clause (the surviving half after CD.11/CD.16 split). Trigger is structural (named tier_item state transitions), not a wall-clock date.
  - id: CD.18
    title: Sibling-branch hand-off — agent/ops-decisions-phase-2-semantic-definition fate
    detail: |
      Promoted from KG.6. Uncommitted work on scripts/ops_data_portal.py, scripts/executor/rec_write_guidance.py,
      and tests/test_ops_data_portal_decisions.py was stashed at the start of this planning session
      (stash message: "WIP on agent/ops-decisions-phase-2-semantic-definition: rec_write_guidance + ops_data_portal +
      tests (parked for platform-roadmap planning session 2026-05-18)"). CD.10 dismantles ops_data_portal as
      the agent surface. Decision required BEFORE T1.5 begins: (a) revive the stashed work and land it
      as part of T1.5's strategic decomposition (its semantic-definition content directly serves Phase 2),
      or (b) void the stashed work — Phase 2 semantics will be re-derived from scratch inside T1.5's
      atomic plans against the Lambda-handler architecture. Option (a) preserves prior planning effort;
      option (b) avoids fitting the work to a now-superseded surface.
    gates: [T1.5]
    state: pending
    decision_required_before: T1.5 status == "in_progress"
  - id: CD.19
    title: SCD2 timestamp preservation policy on T2.2 ops-table import
    detail: |
      Promoted from KG.10. T2.2 imports ops_recommendations + ops_decisions from company-aws-profile to
      personal account. Each row has BOTH created_timestamp and last_updated_timestamp; SCD2 _rn derivation
      depends on the latter. Three options:
        (a) preserve both timestamps verbatim — downstream freshness checks (ratchet, drift detector,
            rec-curator) treat all imported data as "stale"; false-positive flood.
        (b) set last_updated_timestamp = import_time — lineage is lost; cannot answer "when was rec X
            last meaningfully updated."
        (c) preserve created_timestamp; set last_updated_timestamp = import_time AND tag with
            source='import-bootstrap' so downstream freshness checks tolerate it. Requires schema
            change in ops_recommendations + ops_decisions (a new boolean column OR a special source value).
      Recommended path: (c). Decision required BEFORE T2.2 begins because the schema change touches T0.12
      (Annotated-Pydantic models for RecPayload and DecisionPayload) and T1.6 (DQ runner reshape — the
      freshness check semantics) — earlier-tier dependencies. Without ratification, T2.2's implementation
      plan has no anchor.
    gates: [T0.12, T1.6, T2.2]    # round-3 adversarial LOW-11: T0.12 and T1.6 must ship the schema change before T2.2 can use it
    state: pending
    decision_required_before: T2.2 status == "in_progress"
  - id: CD.20
    title: Repository public-flip after T2.3; public surface is curated portal, not export of operational data
    detail: |
      The repo becomes public after T2.3 (company-aws-profile profile-reference sweep) completes -- at which
      point the committed account_id and bblake-* bucket references point at a dormant account pending T5.2
      teardown. The public surface is exactly: README.md (human portal -- thesis, architecture diagram, guided
      tour), AGENTS.md (agent portal -- mirror of CLAUDE.md per CD.4), EVALUATION-PROMPTS.yaml (10-12 example
      architecture questions an evaluator agent might ask with answer-loci pointers), .devcontainer/ (Codespaces-
      compatible spec; may share Dockerfile with T0.2), SECURITY.md (private vulnerability reporting).

      Hard invariant: operational data (ops_recommendations, ops_decisions, ops_session_log, telemetry) is NOT
      exported to the public repo. The platform self-describes through its source artefacts -- code, this
      roadmap, CLAUDE.md, skills, hooks, Terraform. An evaluator's agent forms substantive opinions from source
      alone; historical decision/rec contents are private operational journal entries about the trading-system
      instance, not portfolio artefacts. This preserves NS.4 (the repo is for agents) -- the public surface is
      a curated projection, not a parallel source-of-truth (see CD.23 for the projection invariant).

      Sequencing: depends structurally on T2.3 (security gate -- live references swept), T2.5 (DuckDB swap --
      session_preflight.py no longer requires Athena SSO, enabling Codespace verification), T2.10 (security gate --
      self-hosted runner removed before public exposure), T2.11a (devcontainer substrate), T2.11b (portal artefacts),
      and T2.12 (security pre-flight settings applied).
      [Realized 2026-05-30 (partial): public flip completed (T2.13 done) per Decision 76. T2.12 (GHAS + branch protection) completed 2026-06-08 (Decision 83). T2.11a (.devcontainer) and T2.11b (portal artefacts: SECURITY.md shipped; EVALUATION-PROMPTS.yaml + architecture diagram outstanding) remain open -- the curated public surface is not yet complete.]
    gates: [T2.11a, T2.11b, T2.12, T2.13]
    state: pending
  - id: CD.21
    title: CI migrates from self-hosted EC2 runner to GitHub-hosted runners + OIDC federation on public-flip
    detail: |
      On public-flip (T2.13), CI workloads migrate from the self-hosted EC2 runner (Decision 68) to
      GitHub-hosted standard Linux runners + AWS OIDC federation. Rationale: (a) self-hosted runners on
      public repos is the configuration GitHub explicitly recommends against -- fork PRs can execute on the
      runner with its IAM credentials unless gated by fork-approval policy; (b) ~$35/month runner cost becomes
      dead weight when GitHub-hosted standard Linux runners are free for public repos; (c) zero-stored-secrets
      via OIDC trust federation is architecturally cleaner than long-lived instance-role credentials; (d) the
      "warm runner" intent (Decision 68 future-work clause) is not built and would require drift-enforcement
      design before it would be -- so the runner currently provides no operational benefit over a hosted runner
      except AWS credential delegation, which OIDC replaces strictly better.

      terraform/ec2_runner.tf is NOT deleted -- it is marked deprecated with a header comment pointing at this
      decision, retained indefinitely as a historical artefact showing architectural-evolution (hosted ->
      self-hosted-for-AWS-access -> hosted+OIDC). Indefinite retention is explicitly accepted: the file is
      portfolio-positive and has no operational cost once the EC2 instance is terminated. Documented migration
      is more hireable signal than current state alone. No T5 teardown item is planned for ec2_runner.tf;
      if one becomes desirable it should reference this decision as the acceptance point.
      [Realized 2026-05-28: OIDC federation + CI migration to ubuntu-latest complete per Decision 73 (PR #1; terraform/personal/oidc.tf + workflow migration). EC2 runner retired; ec2_runner.tf retained with deprecation header.]
    gates: [T2.10]
    state: pending
    narrowly_supersedes:
      decision_id: 68
      clause: |
        Self-hosted-EC2-runner-as-primary-CI-surface clause. The IAM-design and credential-delegation
        rationale documented in Decision 68 carries forward as architectural context for the OIDC trust-policy
        configuration (same constraint, different mechanism). The warm-runner future-intent clause is retired
        without replacement -- the autonomous-loop compute substrate is Step Functions + Lambda Durable
        Functions + Lambda (CD.27, T4.1+; ECS Run Task escape hatch for >15-minute deterministic steps),
        not a long-lived runner. [Amendment 2026-05-27]: previously referenced Fargate (CD.11) as the
        autonomous-loop substrate; superseded by CD.27 per the executor pivot.
  - id: CD.22
    title: Planning artefacts migrate from PLAN-*.md to PLAN-*.yaml with Pydantic schema
    detail: |
      docs/plans/PLAN-{slug}.md files migrate to docs/plans/PLAN-{slug}.yaml with a Pydantic PlanDocument
      schema enforcing structural conformance via validate.py (same pattern as RoadmapDocument per T-1.5).
      Aligns planning artefacts with CD.13 -- markdown-with-prose is the legacy pattern being retired, and
      PLAN-*.md is one of the last remaining instances of it. Migration is one-way and non-rolling: a follow-on
      plan defines the PlanDocument schema, ports active in-flight PLAN-*.md files (typically 1-3), and updates
      the planning + implement + plan-critique skills to read YAML. Historical already-implemented PLAN-*.md
      files remain in commit history as archive; they are not retroactively converted.

      Scope clarification: this concerns planning-skill output artefacts only. It does NOT migrate CLAUDE.md,
      README.md, AGENTS.md, or other narrative-md files -- those serve human-portal purposes per CD.20 / CD.23
      and stay as markdown.
    gates: [T1.11]
    state: ratified
    filed_via: ops_decisions:dec-1091
    discipline_points:
      - "Ratified by Decision 85 (2026-06-11; recorded as 84 by PR #127, renumbered at merge -- see DECISIONS.md note) in the T1.11 implementing PR (Decision 79 precedent). Decision 76 clause 3 amended: the /implement handoff artefact reads docs/plans/PLAN-{slug}.yaml; find_plan.py's deprecated .md fallback is the transition bridge until the .claude/commands reconciliation rec lands."
      - "In-flight conversion list at implementation time (1 of 1): PLAN-t1-11-plan-yaml-migration.md -> .yaml. Historical PLAN-*.md files remain in tree and history, not retroactively converted."
  - id: CD.23
    title: Agent-first repository principle includes a curated human portal; portal is projection, not parallel source
    detail: |
      NS.4 says "the repo is for agents." CD.13 retires markdown-with-prose for canonical content. CD.20
      mandates a small human-readable surface (README.md, AGENTS.md, EVALUATION-PROMPTS.yaml, SECURITY.md) for
      portfolio purposes. CD.23 resolves the apparent tension: the human portal is a CURATED PROJECTION of
      the agent-first canonical content, not a parallel source-of-truth.

      Implication: if the README describes architectural commitments that conflict with ROADMAP-PLATFORM.yaml
      or CLAUDE.md, the canonical YAML/CLAUDE.md wins by definition -- the README is regenerated or hand-
      corrected to match. The anti-pattern called out in CLAUDE.md's Agent-First Repository section ("creating
      a human-readable companion document alongside a machine-readable source ... drift by design") applies to
      DUPLICATE canonical documentation; it does NOT apply to a single curated portal that explicitly indexes
      into canonical sources. The portal is allowed precisely because it does not claim source-of-truth status.

      Maintenance discipline: each public-portal file states at the top "this is a projection of [canonical
      source] -- see [pointer] for canonical content." Drift-detection between portal and sources is a
      follow-on concern; the immediate exit criterion is that the portal exists and states its projection
      status explicitly.
    gates: [T2.11b]
    state: pending
  - id: CD.24
    title: Per-Lambda packaging manifests; whole-src/ and whole-config/ copytrees retired
    detail: |
      Lambda deploy artefacts (data-pipeline.zip, ops-compaction.zip, and the per-Lambda zips that T0.6
      and T0.7a/b/c introduce) MUST be built from explicit per-Lambda manifests, not from whole-directory
      copytrees. Today scripts/build_lambda.py:70-71 do shutil.copytree(ROOT / "src", ...) and
      shutil.copytree(ROOT / "config", ...), which silently bundles any file added to those trees into the
      deploy artefact. Three consequences make this load-bearing wrong:
        (a) Artefact governance follows filesystem layout, not the runtime import contract. Plans adding
            files under src/ or config/ trigger V3 verification + DEFERRED-deploy assessment under
            CLAUDE.md's Lambda Deployment Assessment rule even when no Lambda handler imports the new
            code. Example: T0.12 (Annotated-Pydantic schemas) is V3-classified solely because src/schemas/
            lands in data-pipeline.zip via the copytree -- not because any Lambda imports it. The verification
            tier should follow the actual runtime contract, not where a file happens to live.
        (b) Lambda zips carry payload they do not need, eating into the 262 MB hard limit (already a real
            constraint -- ops_compaction was split into its own minimal zip per scripts/build_lambda.py:62
            for exactly this reason) and growing cold-start cost.
        (c) PR-time review sees no signal at the deploy boundary. A developer can add a file under src/
            or config/ that ships to production with no reviewer realising it crossed a Lambda deploy
            boundary. The boundary is invisible because it is implicit.

      The fix: each Lambda owns a manifest at src/lambdas/<name>/manifest.yaml listing the modules from
      outside src/lambdas/<name>/ that it bundles (shared schemas, shared client code, configs from
      config/lambda/<name>/). scripts/build_lambda.py walks the manifest. scripts/validate.py adds a
      bundle-completeness check that stages each Lambda's bundle into a tmp dir, runs
      `python -m py_compile <handler>.py` against the staged tree, and fails CI with the specific missing
      module name if the manifest is incomplete. CD.16's per-Lambda enforcement (currently policy-without-
      mechanism per the round-2 architect HIGH-2 finding) then has authoritative teeth: the
      LAMBDA_FILE_PATTERNS registry derives from the union of manifests rather than hand-curated globs.
      The deploy boundary becomes a semantic signal we can mechanically enforce, instead of a side effect
      of where a file lives.

      Relationship to existing decisions:
        - Subsumes the package-scope half of the round-2 HIGH-2 critique that motivated CD.16. CD.16
          remains load-bearing for "which Lambdas a plan affects"; CD.24 makes the "which files a Lambda
          bundles" question authoritatively answerable from a manifest instead of inferable from globs.
        - Complements CD.13 (agent-first repository). Per-Lambda manifests are exactly the agent-first
          machine-parseable artefact for the deploy boundary -- structured YAML, validated by Pydantic,
          consumed by tooling.
        - Does NOT replace T-1.7 (config/ directory split). T-1.7 establishes the directory structure
          (config/lambda/<name>/ vs config/<agent-consumed>/); T-1.8 ships the per-Lambda manifest
          mechanism that consumes that structure. Both are needed.
    gates: [T-1.6, T-1.7, T-1.8]
    state: ratified
    filed_via: ops_decisions:dec-1086
    discipline_points:
      - Manifests are committed YAML at a stable path (src/lambdas/<name>/manifest.yaml). Schema-validated by a LambdaManifest Pydantic model (parallel to RoadmapDocument per T-1.5).
      - Each manifest lists exactly: (a) handler entry-point module, (b) extra modules from src/ outside its own subtree, (c) extra paths from config/lambda/<name>/. No transitive resolution -- if module A imports B, the manifest lists both. Explicitness over cleverness.
      - bundle-completeness check is a hard CI gate, not a warning. A Lambda whose handler does not import-resolve against its staged bundle is broken.
      - Migration path: T-1.8 ships the mechanism; existing Lambdas (scheduled_agent_dispatcher, findings_processor, ops_compaction) get manifests in the same plan. The whole-src/ and whole-config/ copytrees are deleted in the same commit -- no transitional dual-source phase, since that would just be the current wrong state with extra ceremony.
      - Verification-tier reclassification (planning skill): once T-1.8 lands, the planning-skill rule for Lambda Deployment Assessment changes from "ANY scope file under src/ or config/ -> V3 + DEFERRED" to "ANY scope file named in any manifest, OR a manifest itself -> V3 + DEFERRED." Pure additions to src/ or config/ that no manifest names stay V2.

  - id: CD.25
    title: Pre-codegen contract ratification for Class A / B / C contracts
    detail: |
      Introduce a pre-codegen contract ratification ritual. The ritual applies to three named
      contract classes: Class A (data schemas that become DDL), Class B (public agent surfaces /
      Lambda verb contracts), Class C (cross-system invariants). Contracts in these classes have
      a single canonical home: docs/contracts/{name}.yaml -- machine-parseable by default.
      Codegen plans (Iceberg DDL, Lambda handlers, Pydantic projections, DQ YAML projections)
      consume the ratified contract as an authoritative input and never re-derive its semantics
      from scattered sources. Contracts carry contract_version, every Iceberg row stamps
      _contract_version (nullable; no historical backfill; read-side COALESCE), amendments
      default to forward-compatible with explicit change_class on every amendment_log entry,
      semantic breaks are opt-in with explicit migration stories. Class B contracts use a
      v0-provisional state with staggered re-ratification triggers; Class B ratification is
      itself deferred under the CD.16-governed Lambda-deploy freeze (NOT CD.17 -- that is the
      STRATEGIC plan-artefact freeze) and unblocks on CD.16 ratification. A terminal `deprecated`
      state exists for catastrophic rollback. Existing docs/contracts/*.md files convert to .yaml
      as ratification predecessor plans under this ritual.

      Problem: field semantics for the platform's load-bearing data schemas, Lambda verb
      contracts, and cross-system invariants live in four scattered places (Pydantic models,
      Athena DDL, DQ YAML, prose docs). None is canonical. Drift between them is regular.
      Lock-in moments (first DDL commit, first Lambda deploy) arrive in ordinary implementation
      PRs with no dedicated deliberation step. Iceberg structural-evolution rules do not solve
      the semantic-evolution problem (same column name, different meaning over time). Existing
      prose-shaped contracts (docs/contracts/*.md) bind nothing at runtime and drift silently
      from the code that should implement them.

      Bootstrap allowance (round-2 consensus C1): CD.25 gates T-1.11 (the INTENT producing
      CD.25) but T-1.11 produces CD.25; without an allowance, CD.25 cannot ratify until T-1.11
      completes, which itself depends on CD.25 ratifying. Same circular pattern as
      CD.1 / T-1.1 / T0.7b. Under bootstrap_allowance: true, T-1.11 completion is permitted
      with CD.25 state == "pending". Ratification: via the ops portal (the proven interim
      vehicle per the agent_instructions ratification-vehicle note) -- the original
      "ratification happens once T0.7b is available" premise created a structural deadlock
      (T0.7a/b/c depend on T1.12; T1.12 completion is CD.25-gated and NOT exempt; the vehicle
      was T0.7b itself -- 2026-06-09 audit F-001, dissolved by the portal path). The exemption
      set is enumerated per-item via the bootstrap_completion_exempt flag (T-1.11..T-1.19,
      T0.12.5/.6/.7). Exemption ends at CD.25 ratification for the CD.25-scoped subset; the
      legacy CD.1-scoped subset still terminates at CD.1 ratification.

      Enforcement (round-2 C5 + round-3 H2/H3/M3): T-1.12 lands (a) scripts/platform_roadmap.py
      schema extension for bootstrap_completion_exempt, decomposition_hints, decision_required_before
      on TierItem and bootstrap_allowance on CandidateDecision plus extra="forbid" on both
      classes; (b) scripts/contracts.py Pydantic schema + $ref resolver; (c) scripts/validate.py
      CI drift gate covering all six rejection categories (malformed YAML; description/semantics
      diff without change_class amendment_log entry; duplicate inline definitions of $ref-referenced
      fields; $ref pointing at non-existent files or chain-depth > 1; status transitions violating
      the state machine; amendment_log entries with change_class outside the closed vocabulary);
      (d) scripts/session_preflight.py hook that surfaces v0-provisional contracts whose
      re-ratification trigger conditions are met. Without T-1.12 the ritual is voluntary; T-1.12
      lands enforcement.
    gates:
      - T-1.11
      - T-1.12
      - T-1.13
      - T-1.14
      - T-1.15
      - T-1.16
      - T-1.17
      - T-1.18
      - T-1.19
      - T0.12.5
      - T0.12.6
      - T0.12.7
      - T1.12
    state: pending
    filed_via: pending_log_decision_lambda
    bootstrap_allowance: true
    decision_required_before:
      - "T0.13 may start"
      - "T0.7a may start"
      - "T0.7b may start"
      - "T0.7c may start"
      - "T1.1 may start"
      - "T1.3 may start"
      - "T1.4 may start"
      - "Any T3.x telemetry verifier may start"

  - id: CD.26
    title: Pattern-B-agent-auth supersedes Identity Center for personal account
    detail: |
      Identity Center prep from PR-361 (commit 26ac4c2) is superseded by Pattern B:
      static-key + chained AssumeRole with two IAM roles (PlatformDev, PlatformAdmin).
      Driver: SSO is a company AWS account requirement (company-aws-profile), not a
      personal account requirement. With SSO off the table, Identity Center is
      unnecessary; static-key + chained AssumeRole gives agents seamless auth (no
      re-auth pain) while preserving CD.10's two-principal allow-list model via IAM
      roles instead of SSO permission sets. The auth primitive changes; the semantic
      (two principals, PlatformDev for daily ops, PlatformAdmin for admin/import-mode)
      is preserved verbatim. ExternalId conditions provide confused-deputy defense
      in case agent-service-account static keys are ever compromised.
      [Realized 2026-05-29: terraform/personal/platform_roles.tf Pattern B IAM roles provisioned + verified (PR #4; T0.3 complete). Session-start static-key chain verification hook operational (.claude/hooks/session_start_aws.sh, PR #4).]
    gates: [T0.3]
    state: pending
    filed_via: pending_log_decision_lambda
    supersedes_decisions: ["PR-361 commit 26ac4c2"]

  - id: CD.27
    title: Executor compute substrate = Step Functions + Lambda Durable Functions + Lambda (per-step decomposition)
    detail: |
      Replaces the Fargate-as-single-executor-substrate decision (CD.11 Fargate-as-executor clause). The
      per-rec plan->critique->implement->review loop is natively a state machine, not a single long-running
      process. Substrate decomposes into three cleanly-separated layers:

        1. Step Functions (workflow orchestration substrate)
           One Step Functions execution per rec. The state machine carries rec_id, branch_slug, plan_s3_uri,
           and per-step verdicts as execution state. Native Parallel state fans out critic personas. Native
           Choice state routes critique aggregation (back to plan_agent on block; forward to implement_agent
           on pass). Native retry policies are deterministic-only -- LLM-judgment failures escalate via the
           rec/RCA path per Decision 55 (RCA-first executor). Step Functions Standard Workflows support
           executions up to 1 year, so the umbrella per-rec lifecycle is durable end-to-end.

        2. Lambda Durable Functions (agent-persona execution substrate)
           Each agent persona (plan_agent, plan_critic, decision_scout, implement_agent, code_reviewer)
           runs as a Lambda Durable Function. Iterative read-code -> call-LLM -> tool-use -> emit-output
           loops are checkpointed step-by-step inside the Lambda; on timeout, the next invocation replays
           from the last completed checkpoint and skips completed tool calls. This eliminates the 15-minute
           Lambda ceiling that originally drove the Fargate decision -- per-persona loops can now run
           arbitrarily long via checkpointed replay without losing in-flight state. Each Durable Function
           writes its substantive artefact (plan markdown, critique verdict, diff) to S3 and returns the
           S3 URI to the Step Functions state, keeping payload under the 256 KB transition limit.

        3. Lambda (deterministic glue)
           Regular Lambdas handle cheap deterministic tasks: pick_rec (poll priority queue), prepare_workspace
           (clone + branch + worktree), critique_gate (aggregate parallel critic verdicts; route), file_pr
           (idempotent PR creation), emit_telemetry (final session-close emission). Each invocation is
           sub-15-minute by construction.

      Long-running deterministic steps that genuinely exceed 15 minutes (e.g. a full pytest suite,
      terraform apply against the personal account, large data migration) use the Step Functions ECS Run
      Task synchronous integration -- arn:aws:states:::ecs:runTask.sync -- as an escape hatch. Fargate is
      not eliminated from the architecture; it is demoted from "the executor's primary substrate" to "the
      long-step escape hatch within the executor's Step Functions orchestrator."

      Industry precedent and substrate-existence verification:
        - AWS Lambda Durable Functions launched at re:Invent 2025 (December 2025); GA in US-East (Ohio)
          + 13 additional regions December 2025; expanded to 16 additional regions including eu-west-2
          (London) April 2026; documented at https://docs.aws.amazon.com/lambda/latest/dg/durable-functions.html.
          Supported runtimes: Python 3.13/3.14, Node.js 22/24, Java 17+. Max execution duration: 1 year.
          Checkpoint-replay model: on Lambda timeout, next invocation replays the event handler from start
          and skips completed durable operations (Steps/Waits). Verified availability in eu-west-2 (the
          project's region) as of 2026-05-27.
        - Step Functions has been the ratified workflow orchestrator in this codebase since Decision 39
          (April 2026). This CD extends the Decision 39 primitive to the executor's per-rec loop, not
          introducing a new substrate.

      Relationship to existing decisions:
        - Cites Decision 39 (Step Functions over Airflow) as precedent. The orchestrator choice is already ratified.
        - Preserves Decision 55 (RCA-first executor) verbatim. Step Functions retry policies are deterministic-only.
        - Replaces CD.11's Fargate-as-executor-substrate clause. Fargate-via-ECS-Run-Task retained as escape hatch.
        - T4.3 (scheduled-agent loop) substrate choice remains open between Step Functions scheduled execution
          and self-hosted runner cron (Decision 68); CD.27 keeps both options available; T4.3 atomic plans decide.
    gates: [T4.1, T4.2, T4.3, T4.4]
    state: pending
    filed_via: pending_log_decision_lambda
    narrowly_supersedes:
      decision_id: "CD.11"
      clause: |
        Fargate-as-executor-substrate clause. Step Functions + Lambda Durable Functions + Lambda is the
        new executor substrate. Fargate retained for ECS Run Task escape-hatch integration within Step
        Functions for steps that genuinely exceed 15 minutes (full pytest, terraform apply, etc.).
    discipline_points:
      - One Step Functions execution per rec (clean lifecycle scoping).
      - Agent personas as Durable Functions, not as regular Lambdas. Regular Lambdas are deterministic-only.
      - Large artefacts (plans, diffs, transcripts) pass via S3 pointer pattern in Step Functions state. Payload stays well under the 256 KB transition limit.
      - ECS Run Task escape hatch is the ONLY remaining Fargate path. Long-running agent loops are NOT a Fargate use case under CD.27 -- they are a Durable Function use case.
      - Step Functions retry policies are deterministic-only. LLM-judgment failure escalates via the rec/RCA path (Decision 55), never via automatic LLM-call retry-on-bad-output.
      - Lambda Durable Functions maturity monitoring -- the service is ~5 months in GA at the time of CD.27 ratification. If API semantics regress within the first 12 months, fall back to self-checkpointed Lambda with state in DynamoDB (intentional re-evaluation trigger; recorded as an INTENT Open Question for re-eval at each T4.2 atomic-plan filing). Track via T4.2 exit criterion "checkpoint-replay verified" and the Health Signal "Lambda Durable Function checkpoint-replay rate" (INTENT line surfaces alarm threshold).
      - T4.2 "stable for 14 days" operational definition (required for the CD.17 reversal trigger). Across the 14-day grace window: per-persona checkpoint-replay rate < 5%; per-rec success rate >= rolling 7-day baseline; zero unrecovered failures (Decision 55 stop-clean-and-RCA path counts as recovered if a rec was filed); cost-per-rec rolling avg within 1.5x rolling 7-day baseline. Trigger fires only when ALL personas' executions satisfy these per-signal thresholds for the full 14-day window. This is the explicit semantic definition replacing the pre-CD.27 "Fargate handler runs the loop end-to-end without recovery agent" implicit definition.
      - T4.x atomic-plan template: each T4.x atomic plan must declare Plan Type IMPLEMENTATION (STRATEGIC remains suspended per AGENTS.md Temporary Operational Constraints) and must include CD.16 per-Lambda build/deploy/smoke-test steps for the Lambdas it touches (Decision 79 lifted the blanket Decision-67 deploy freeze; only the dispatcher smoke-test deferral survives until T4.3 -- audit F-009). T4.2 in particular splits per-persona; not all personas need to land in the same window.

  - id: CD.28
    title: LLM inference = DeepSeek-direct via LiteLLM (Tier 1); Anthropic-direct (Tier 2); Bedrock retired from architecture
    detail: |
      Replaces CD.7 (LLM inference stays on Bedrock) in full. The executor's primary inference path becomes
      direct DeepSeek API via LiteLLM. Bedrock is retired from the architecture as an LLM substrate -- no
      longer Tier 1, no longer Tier 2 escape hatch, no longer warm-fetched. Anthropic-direct via LiteLLM
      becomes the Tier 2 escape hatch for Claude-class judgment when DeepSeek underperforms or is unavailable.

      Tier model under CD.28:
        - Tier 1 (active, primary): DeepSeek-direct via LiteLLM. Models: deepseek/deepseek-chat,
          deepseek/deepseek-reasoner; aliases remap to deepseek-v4-flash post-2026-07-24 per upstream
          deprecation. Native context caching ($0.0252 input cache-hit per 1M tokens) applies to repeated
          repository-context prefixes with no client opt-in (hash-based on DeepSeek's side).
        - Tier 2 (warm-fetched escape hatch): Anthropic-direct via LiteLLM. Funded by the user's Claude Code
          Max x5 subscription programmatic-pool credit (~$100/month, no rollover, spillover at API rates
          per Anthropic's June 2026 billing model). Activated when DeepSeek API is unavailable or when
          executor needs Claude-class judgment for a specific call. Credential validated on every harness
          cold start regardless of routing tier (escape hatch must be warm).
        - Tier 3 (deferred): OpenRouter. Unchanged from existing INTENT.

      Economic rationale (the load-bearing driver):
        - Bedrock DeepSeek V3.2: $0.62 input / $1.85 output per 1M tokens.
        - DeepSeek direct API: $0.252 input / $0.378 output per 1M tokens.
        - Ratio: ~2.5x input, ~4.9x output. At cost_projection executor inference scale, direct API
          reduces monthly executor inference from $50-200 to ~$10-40 plus near-free cache hits on the
          repository-context prefix.
        - DeepSeek is EXCLUDED from Bedrock's 50%-off Batch billing mode (eliminating the standard
          Bedrock cost-optimisation path for this model family).
        - DeepSeek's native context caching is unavailable on Bedrock because Bedrock prompt caching
          covers only Anthropic + Nova model families. Going direct unlocks the caching path.

      Architectural rationale (the secondary driver):
        - INTENT-provider-agnostic-executor.md's North Star is "swapping a model is a config change, not
          a code change; swapping a provider is a config change plus a credential change." LiteLLM as
          the Layer-1 inference protocol abstraction is already committed. CD.28 changes the active
          provider tier without touching the abstraction layer.
        - The "single-vendor commitment" Non-Goal in the INTENT explicitly allows the active provider to
          change as economics shift.
        - Decision 47 (Bedrock revocation/restoration lesson) emphasised the lock-in cost of single-vendor
          dependency. Tier 2 Anthropic-direct preserves the warm-fetched-escape-hatch principle that
          Decision 47 motivated; the substrate just changed.

      Known considerations (not blocking):
        - Production fallback funded by a personal subscription credit pool creates a future cost-monitoring
          item if executor volume scales past Max x5 programmatic pool sizing. Recommendation when volume
          warrants: file rec to provision an org-billed Anthropic API key as overflow credential.
        - Bedrock's eu-west-2 IAM-native auth + data-residency advantage is lost. Mitigation: DeepSeek API
          and Anthropic API both serve from regions outside the EU; data residency requires care for any
          PII handling. Executor input is repository code + ops-table rows -- no end-user PII -- so the
          residency loss is acceptable for the current use case.
        - AWS Cost and Usage Report (CUR) no longer captures the executor's LLM spend because Bedrock is
          out of the LLM substrate. Cost reconciliation moves to per-provider invoice export (DeepSeek
          dashboard + Anthropic Console). The previous "AWS CUR is authoritative for executor inference"
          operational discipline is retired by CD.28; the new authoritative source is per-provider invoice
          export, reconciled monthly against telemetry est_cost_usd. The reconciliation job itself is
          named as a follow-on (see discipline_points below) -- declared but not yet built.
        - Tier 2 (Anthropic-direct) boot validation contract enhancement. The simple key-shape probe
          (POST /v1/messages with a 1-token request) returns 200 OK while the Max x5 programmatic-pool
          credit may be exhausted -- the next billable call then fails with 429/insufficient_quota.
          Per-CD.28 discipline-point: Tier-2 boot validation must include a usage-API query (Anthropic
          /v1/organizations/usage if available) and assert >10% remaining pool capacity before declaring
          the escape hatch healthy. If usage-API unavailable, fall back to a minimal billable token probe
          + sentinel exception handling. Implementation lands in T4.2's `PLAN-llm-client-litellm-transport`
          precursor plan.

      Relationship to existing decisions:
        - Fully supersedes CD.7 (LLM-on-Bedrock primary clause). Bedrock leaves the architecture entirely.
        - Supersedes Decision 40 (Copilot SDK + Bedrock planning, decided-deferred). Both halves moot --
          Copilot SDK retired via Decision 49 (LiteLLM subsumes the BYOK pattern); Bedrock-as-planning-
          backend retired by this CD.
        - Aligns with Decision 49 (Copilot SDK retirement). Reconciliation note: Decision 49 retired
          Copilot SDK as a Lambda inference provider for SCHEDULED AGENTS specifically (the path used in
          .github/agents/schedule.yaml with provider: copilot-sdk). CD.28 commits the executor (T4.x)
          and any non-agentic LLM call site to LiteLLM-only. The scheduled-agent provider state remains
          governed by Decision 49 until the follow-on PLAN-resolve-scheduled-agent-provider lands (see
          Follow-on plan inventory below) -- at which point scheduled agents also move to LiteLLM,
          retiring the last Copilot SDK code path. CD.28 does NOT immediately retire schedule.yaml's
          copilot-sdk provider -- that's the follow-on plan's job.
        - Preserves Decision 47 (lock-in lesson) via Anthropic-direct serving the warm-fetched-escape-hatch role.
        - Preserves INTENT-provider-agnostic-executor.md's LiteLLM Layer-1 commitment. The provider
          adapter changes its routed tier; the abstraction does not change.

      Follow-on plan inventory (surfaced by the multi-perspective deliverable critique 2026-05-27):
        Each entry names a code-or-doc surface that CD.28 retires architecturally but does NOT sweep
        in the REPORT-ONLY plan that filed it; the follow-on is the right home for cleanup work. Each
        follow-on plan must be filed via /plan; Lambda-packaged subsets follow CD.16 per-Lambda gating
        (build + deploy + smoke-test per touched Lambda; Decision 79 lifted the blanket Decision-67
        deploy freeze -- only the dispatcher SMOKE-TEST deferral survives until T4.3; audit F-009).
        [2026-06-09 audit integration: the two high-priority sweeps below are now carried by tier item
        T1.15 so they are schedulable work, not prose-only inventory (audit F-021).]

        - PLAN-retire-copilot-sdk (priority medium)
          Scope: delete scripts/copilot_sdk_client.py; sweep references (CLAUDE.md,
          .github/copilot-instructions.md, docs/PROJECT_CONTEXT.md, docs/contracts/copilot-cli.md if
          applicable); retire copilot_wrapper.py if no remaining consumers.
          Gating: pure code deletion + docs sweep; consumer-Lambda deletions inherit CD.16 per-Lambda
          gating.
          Rationale: Decision 49 already retired Copilot SDK as a primary path; CD.28 confirms LiteLLM
          subsumes the BYOK pattern. Dormant file is dead code.

        - PLAN-retire-bedrock-code-paths (priority high)
          Scope: delete scripts/bedrock_client.py (347 LoC); remove _bedrock_call + _get_bedrock_credentials
          + _PRICING Bedrock entries from scripts/llm_client.py; remove _invoke_bedrock + Bedrock
          dispatch branches from src/data/handlers/scheduled_agent_handler.py; sweep Bedrock provider
          defaults / pricing tables from scripts/model_registry.py, scripts/copilot_wrapper.py, and
          scripts/copilot_multipliers_refresher.py (each contains residual Bedrock references that
          must be co-retired); remove bedrock:Invoke* grants from terraform/lambda_tooling_iam.tf
          (the lines around 118-126 at the time of this CD) and from docs/runbooks/policies/
          platform-dev-daily-ops.json; drop verifier check bedrock_via_chain from
          scripts/verify_platform_account.py; clean T0.3 exit criterion (mark satisfied without
          the bedrock_via_chain entry); update Bedrock-referencing test files in lockstep with
          the production sweep -- tests/test_llm_client.py, tests/test_verify_platform_account.py,
          tests/test_build_lambda.py, tests/test_scheduled_agent_handler.py.
          Gating: touches Lambda-packaged code (scheduled_agent_handler.py, llm_client.py) -- CD.16
          per-Lambda gating applies (build + deploy + smoke-test per touched Lambda; deploy is no
          longer frozen per Decision 79; the dispatcher's smoke-test stays deferred until T4.3).
          Other files (bedrock_client.py deletion, terraform IAM, verifier) are non-Lambda
          and can land freely. [Carried by tier item T1.15 per the 2026-06-09 audit.]
          Rationale: CD.28 retires Bedrock from the architecture but dispatch-active code paths remain.
          Leaving live code paths to a retired substrate is a confused-architecture anti-pattern that
          violates the agent-first repository principle (machine-parseable canonical state should match
          actual code state).

        - PLAN-update-inference-provider-contract (priority high)
          Scope: update docs/contracts/inference-provider.md to reflect CD.28 tier model (Tier 1 =
          DeepSeek-direct via LiteLLM; Tier 2 = Anthropic-direct via LiteLLM; Tier 3 = OpenRouter
          deferred; Bedrock retired). Remove provider: bedrock and provider: copilot-sdk from the active
          provider set. Update validate.py provider-routing check to enforce the new tier model.
          Coordinate with T-1.14 (the contract-conversion plan for inference-provider.md to
          inference-provider.yaml) -- T-1.14 should consume CD.28-aligned content, not pre-pivot content.
          Gating: pure docs + validator-rule change; not Lambda-packaged.
          Rationale: inference-provider.md is the canonical contract authority for the inference-provider
          boundary; leaving it on the pre-pivot tier model creates the exact agent-first-repository drift
          CD.13 + CD.25 are designed to prevent.

        - PLAN-resolve-scheduled-agent-provider (priority medium)
          Scope: migrate .github/agents/schedule.yaml entries from provider: copilot-sdk to provider:
          litellm with tier-1 (DeepSeek) or tier-2 (Anthropic) model selection per agent. Update
          src/data/handlers/scheduled_agent_handler.py to dispatch via LiteLLM (likely concurrent with
          or after PLAN-retire-bedrock-code-paths). Decision 49's Copilot SDK commitment for scheduled
          agents is retired by this plan; file as the formal supersession.
          Gating: touches Lambda-packaged code (scheduled_agent_handler.py) and schedule.yaml --
          CD.16 per-Lambda gating applies (deploy no longer frozen per Decision 79; dispatcher
          smoke-test deferred until T4.3).
          Rationale: CD.28 commits the architecture to LiteLLM-only; scheduled-agent provider state
          must reconcile or the architecture is internally contradictory.

        - PLAN-cost-reconciliation-job (priority low)
          Scope: build the monthly per-provider invoice-export-vs-telemetry-est_cost_usd reconciliation
          job referenced in INTENT Cost Attribution. Implementation: (a) ingest DeepSeek dashboard CSV
          export + Anthropic Console invoice; (b) compute monthly totals from telemetry_model_calls;
          (c) emit reconciliation report; (d) file rec via log-rec on discrepancy > 5%.
          Gating: new Lambda OR scheduled GH Actions workflow on self-hosted runner; touches no
          existing Lambda-packaged code; can land immediately as a new package.
          Rationale: INTENT declares the reconciliation job as the authoritative cost source but the
          job does not exist; closing the gap before it becomes a load-bearing audit failure.

        - PLAN-sweep-bedrock-docs-references (priority low)
          Scope: sweep remaining Bedrock-as-live references in .github/copilot-instructions.md,
          docs/PROJECT_CONTEXT.md, and any other doc surface that loads as ambient context. Update to
          reflect CD.28 tier model.
          Gating: pure docs sweep; can land immediately.
          Rationale: Ambient-context docs that describe the architecture as Bedrock-primary mislead any
          agent that loads them.
    gates: [T0.4, T4.1, T4.2, T4.3, T4.4]
    state: pending
    filed_via: pending_log_decision_lambda
    supersedes_decisions: [40, "CD.7"]
    discipline_points:
      - LiteLLM is the only Layer-1 inference protocol surface. Direct provider-SDK imports are forbidden in the executor and in scripts/llm_client.py.
      - Tier 2 Anthropic-direct credential is validated at every harness cold start, regardless of which tier the executor routes to for the next call. Warm-fetched escape hatch is non-negotiable. Validation contract -- key-shape probe + usage-API query (Anthropic /v1/organizations/usage) with >10% remaining pool assertion; fall back to minimal billable token probe if usage-API unavailable. Implementation lands in `PLAN-llm-client-litellm-transport` precursor plan under T4.2.
      - Tier 1 DeepSeek-direct credential rotation cadence -- quarterly, calendar-reminded, via Secrets Manager versioning. Same pattern as Anthropic-direct.
      - Cost-monitoring follow-on -- file rec for org-billed Anthropic API key once executor volume sustains > 70% of Max x5 programmatic pool over a 30-day window.
      - Prompt cache strategy on DeepSeek is hash-based and automatic -- no client breakpoint placement required. This simplifies Layer-3 (agent loop) compared to the Bedrock cachePoint design previously planned in INTENT.
      - Bedrock IAM policies in T0.3 (PlatformDev DailyOps `bedrock:InvokeModel`) become vestigial-but-harmless. Annotated as such in T0.3; not removed (avoids re-Terraform churn). Retirement is tracked under PLAN-retire-bedrock-code-paths in the follow-on plan inventory below.
      - Cost-projection numbers in this CD reference DeepSeek V3.2 pricing as of 2026-05-27 ($0.252 input / $0.378 output per 1M tokens; $0.0252 cache-hit input). Spot-check arithmetic at typical executor scale (100 recs/month, ~50K input + ~10K output tokens/rec, ~80% prefix cache-hit) yields ~91% cost reduction vs Bedrock-DeepSeek -- the headline ~75% figure in cost_projection is intentionally conservative; the realised savings should exceed it.

  - id: CD.29
    title: Validation suite is a graduated, deduplicated, machine-curated asset; verification graduates into validation; hard-gate by default behind a hermeticity precondition
    detail: |
      The repo-wide validation suite (scripts/verifiers/ wired into validate.py + executor postflight) is the
      deduplicated union of GRADUATED per-rec verifications, not an append-only pile. Model:
        - Per-rec verification (executor-side) and repo-wide validation (CI-side) are distinct questions --
          "did this change do what the rec asked" vs "is the repo still sound" -- and neither subsumes the
          other. Verification can do differential/baseline checks (fail-before/pass-after) that validation
          structurally cannot; validation runs the full closure that per-rec verification deliberately scopes
          down. Both are required (defence in depth).
        - Checks are typed. A small CLOSED kernel of deterministic primitives (command_exit_zero,
          command_output_matches, file_exists/file_absent, grep_count, test_selector, metric_under_threshold)
          reduces "what to verify" (per-implementation judgement, authored at plan time) to "run + compare"
          (deterministic, harness-owned). This kernel is governed by its OWN closed vocabulary, orthogonal to
          the CD.12 DQ-marker vocabulary, and is extendable only by a new candidate decision (mirrors CD.12's
          discipline). It does not consume the CD.12 marker budget.
        - Graduation lifecycle: a per-rec verification that passes and whose PR merges is promoted into the
          cumulative suite, recorded in a graduation registry (Class A governed-data contract per CD.25,
          docs/contracts/verification-registry.yaml; cross-system fields $ref into Class C invariants) indexed
          by what it guards (input closure / target symbol). It is row-bearing governed data, hence Class A,
          not a Class C cross-system invariant.
          Admission gate: the differential property -- a candidate must demonstrably FAIL on revert of the
          change it guards, else it guards nothing and is rejected (kills tautological tests at the door).
        - Hard-gate by default: every check has a defined consequence. In a human-out-of-loop system an
          advisory check nothing acts on is dead weight that trains the system to tolerate red. Per-check
          severity defaults to `required` (blocks); the only non-blocking state is a transient `quarantine`
          for flakes that files a rec (RCA-first, Decision 55), never a permanent `advisory`.
        - Hermeticity is the precondition. Hard-gating the behavioural tier is only safe once those checks are
          hermetic (env-stripped, no network, deterministic) -- flakiness is precisely WHY the legacy
          `verification` field was advisory. The hermeticity audit (T3.6) therefore precedes the hard-gate
          consolidation.
        - Meta-validation keeps the suite's PURPOSE honest (T3.7): mutation testing confirms graduated checks
          kill mutants on their target; deterministic dead/redundant-test detection retires checks whose guarded
          target no longer exists. Both are alarm-not-gate (CD.12) and file recs; retirement follows the CD.12
          mark-then-drop discipline (deprecate in registry, follow-on plan deletes), never auto-delete, never an
          LLM scan.
      Consolidation discipline (lands in T0.12.5): today `acceptance` is the Class A rec field (src/schemas/
      rec.py, DqNotNull write_time) consumed as a hard gate (run_acceptance), while `verification` is an
      EXECUTOR PROJECTION field (scripts/executor/jsonl_store.py, read advisory via run_verification) -- it is
      NOT in the Class A schema. The consolidation KEEPS the Class A field name `acceptance` (no breaking
      rename; the DQ runner, portal write-path, acceptance_lint.py, ops.yaml, and the ~36 backfilled recs are
      untouched at the field-name level) and EVOLVES its value into a typed checks structure: a list of checks,
      each with a `type` (a CD.29 kernel primitive -- preserves the behavioural-vs-mechanical distinction the
      two paths encoded) and a `severity` (default required/hard-gate; transient `quarantine`, never permanent
      advisory). The executor's advisory `verification` projection is absorbed as additional typed checks on the
      same field. A scalar-string `acceptance` stays valid via a backward-compatible scalar-or-list union during
      migration. Folded into the ops_recommendations Class A contract ratification (T0.12.5) so it is not a
      post-ratification semantic break (CD.25).

      Field-shape-vs-enforcement skew (MED -- both deliverable critics): the typed-checks field SHAPE (incl.
      severity default required) ratifies at T0.12.5, but the executor cannot HARD-GATE the behavioural tier
      until T3.6 (hermeticity) + T3.1 land. In that window a rec may carry severity: required checks the executor
      still treats as advisory (execute_recommendation.py keeps verification advisory today). This is recorded
      explicitly via the contract amendment_log change_class, not left as a silent gap.
    gates: [T3.1, T3.6, T3.7, T0.12.5]
    state: pending
    filed_via: pending_log_decision_lambda
    discipline_points:
      - The `checks` kernel is a closed vocabulary governed by this CD; adding a 7th primitive requires a new candidate decision (mirrors CD.12's DQ-marker discipline). It is orthogonal to and does not consume the CD.12 marker budget.
      - Verifiers and the graduation registry are platform machinery; recs touching scripts/verifiers/ or the registry are automatable: false (Decision 44).
      - Per-rec verification graduates into validation only after the differential admission gate passes; the registry records the guard target so orphan detection (T3.7) is deterministic.
      - Hard-gate-by-default applies to the behavioural tier only after T3.6 (hermeticity); mechanical checks (command_exit_zero) are hermetic by construction and hard-gate immediately.
      - Scheduled meta-validation (T3.7) is alarm-not-gate and runs on a GitHub Actions schedule, NOT a Lambda -- it does not re-introduce the separate-scheduled-DQ-routine that Decision 62 retired (mutation is too slow for presubmit and is advisory, not a merge gate).
      - CD.29 changes the platform verification DEFAULT from advisory (the current run_verification behaviour) to required/hard-gate. This is a deliberate semantic change, enforced only after T3.6; no prior numbered Decision is superseded because the advisory behaviour was an executor implementation default, not a ratified decision.
      - Precedence: when the executor's per-rec checks (executor-side) and the CI validation gate including diff-coverage (CI-side) both apply, CI is authoritative per the AGENTS.md merge protocol (remote CI is the authoritative pre-merge gate).

  - id: CD.30
    title: Diff-line-coverage ratchet supersedes the per-changed-file 100%-coverage gate
    detail: |
      The current coverage gate (scripts/test_coverage_checker.py, wired into validate.py) enforces
      per-changed-file 100% line coverage: it runs over get_changed_source_files() and fails any CHANGED file
      below 100%. It is already diff-scoped -- unchanged files are never measured -- so it is NOT a global gate.
      This per-changed-file floor is the V2-tier minimum mandated by Decision 48 ("pytest with 100% coverage"),
      operating alongside the Decision 60 / Decision 73 two-tier (--pre vs full) structure (F.3).

      Replace the per-changed-file 100% FLOOR with a diff-line-coverage ratchet:
        - Require coverage on CHANGED LINES (not whole changed files) for every PR -- a touched file may sit
          below 100% as long as the lines the PR actually changed are covered.
        - Global coverage may only ratchet UPWARD -- a PR may not lower the repo-wide percentage.
      Rationale: per-changed-file 100% forces full coverage on every touched file even for lines the PR did not
      change, a frequent source of low-value test churn (the actual cost -- NOT "expense as the repo grows,"
      since unchanged files are already exempt). And 100% line coverage is necessary-not-sufficient (100% with
      weak assertions passes), so mutation testing (CD.29 / T3.7) is the real quality signal. Diff-line-coverage
      is more surgical and harder to game on the changed surface. The Decision 60 / Decision 73 two-tier
      structure is unchanged; only the coverage minimum changes.

      Propagation (HIGH -- both deliverable critics): relaxing the V2 minimum edits the V2 row of Decision 48's
      tier table, which is also keyed off by config/agent/executor/prompts/critique.prompt.md and the planning
      skill. At CD.30 ratification those consumers MUST be amended in lockstep (see discipline_points). This
      roadmap edit does NOT touch DECISIONS.md or the prompt -- those land at ratification via the log-decision
      path and a named follow-on plan.
    gates: [T3.7]
    state: pending
    filed_via: pending_log_decision_lambda
    narrowly_supersedes:
      decision_id: 48
      clause: The V2-tier minimum (per-changed-file 100% line coverage). The V2 tier now requires diff-line-coverage-on-changed-lines plus an upward-only global ratchet; Decision 48's broader V1/V2/V3 classification is otherwise preserved. Decision 48's V2-row text and critique.prompt.md must be amended in lockstep at ratification.
    discipline_points:
      - Diff-coverage threshold and the ratchet baseline are config-driven; the global baseline only moves up, never down. The initial global baseline is captured at T3.7 implementation (computed from the current suite and stored in a governed config/state file); the ratchet compares each PR against that stored value.
      - The ratchet is enforced in scripts/validate.py; test_coverage_checker.py is retargeted from the per-changed-file 100% floor to diff-line-coverage + ratchet, not run as a separate parallel gate.
      - Lockstep consumers at ratification (follow-on plan, via log-decision for the Decision text): Decision 48 V2-row text, config/agent/executor/prompts/critique.prompt.md (V3 behavioural-acceptance language), and the planning skill's tier-classification guidance. Until amended they enforce the old per-file-100% minimum.

  - id: CD.31
    title: Adopt DuckLake for the operational lakehouse (ops + telemetry tables)
    detail: |
      This roadmap edit does NOT touch DECISIONS.md and does NOT change any numbered Decision's status.
      The proposed supersessions of Decisions 50, 56, 51, 69 and any NS.1 generalisation land at
      ratification via the log-decision path and the FP-B follow-on IMPLEMENTATION plan -- exactly
      mirroring CD.30.

      PROPOSAL: replace the Iceberg-based ops/telemetry write path and the DuckDB-on-Iceberg read path
      with DuckLake v1.0 -- a metadata-in-RDS-PostgreSQL + data-in-S3-Parquet open table format natively
      embedded in DuckDB. Scope: ops and telemetry tables ONLY (ops_recommendations, ops_decisions,
      ops_priority_queue, ops_execution_plans, ops_session_log, and all telemetry tables). Product tables
      (D.lake.*, market_data Iceberg tier) REMAIN Iceberg per the KG.1 platform/product boundary; a
      market-data DuckLake assessment is deferred to FP-C.

      Catalog backend: a dedicated micro RDS PostgreSQL instance -- db.t4g.micro, single-AZ, gp3 storage,
      PITR enabled, provisioned in its own schema for clean separability (T2.16). The catalog is a durable
      metadata store (a Glue-analog), NOT a query engine; DuckDB performs all computation against
      S3-backed Parquet data. This framing keeps NS.1 ("compute is interchangeable; storage is durable;
      engines do not govern the data layer") intact. Aurora DSQL was considered but dropped as unvalidated
      against DuckLake's PG12+/SQL-92/PK-based-OCC contract. NS.3 explicitly supports a small managed
      cloud state-store; the always-on RDS instance contradicts no existing decision.

      VPC-attach for DuckLake Lambdas (to reach RDS) does NOT alter the Function-URL + AWS_IAM ingress
      surface (CD.10 / NS.5): VPC config governs egress; the Function URL is ingress. The consequence is
      that egress to extensions.duckdb.org is blocked by the VPC egress rules -- the DuckLake + httpfs
      extension layer must be pre-baked into a Lambda layer (T2.17).

      Doc-research findings driving OQ.7-OQ.14:
        - DuckLake v1.0 has NO Iceberg metadata export and NO external-engine reader: Athena/Trino cannot
          read DuckLake tables. ducklake_add_data_files() is import-only AND dangerous (ownership transfers
          to DuckLake; compaction can delete the registered files). The CD.15 Athena escape hatch has no
          export-based mitigation today -> OQ.7.
        - Partitioning IS available via ALTER TABLE ... SET PARTITIONED BY (a metadata-only operation).
          The spike's CREATE TABLE PARTITION BY parser error was the correct signal but the wrong conclusion
          -- ALTER is the mechanism. Reconciles CD.9 (see CD.9 amendment).
        - The catalog is the lakehouse single point of failure: snapshots are catalog rows; un-flushed
          inlined data (default threshold 10 rows) lives only in the catalog. No catalog-format migration
          tooling spans the lockstep spec+extension+DuckDB version bump -> OQ.9 + OQ.12.
        - DuckLake is OCC + snapshot-isolation; even single-writer Lambda overlap can collide on
          snapshot_id; DDL and ALTER-table writes hard-abort on conflict -> OQ.10.
        - expire_snapshots != delete: S3 grows unless cleanup_old_files + delete_orphaned_files are also
          scheduled. Maintenance is in-engine CALL functions -> T2.18.
        - Un-flushed inlined data is durable only in the catalog, not in S3 -> OQ.11.

      Proposed supersessions (at ratification only -- NOT enacted by this roadmap edit):
        - Supersedes Decision 50 (append-only-Iceberg write path -> append-only-DuckLake write path;
          same append semantics, new format).
        - Supersedes Decision 56 (SCD2 schema reproduced in DuckLake; optionally extended by
          ducklake_table_changes CDC and time-travel for richer audit).
        - Supersedes Decision 51 (JSONL-staging write path -> DuckLake writer; the Decision 69
          Single-Portal invariant is PRESERVED -- all ops writes still go through the portal, only the
          underlying staging mechanism changes from local-file outbox to DuckLake writer).
        - Supersedes Decision 69 (JSONL outbox staging replaced by DuckLake writer; Single-Portal
          primitive-level invariant is preserved, not removed).

      Amends (factual reconciliations -- effective on CD.31 filing, not at ratification):
        - CD.8: DuckDB's native operational table format becomes DuckLake under this adoption; the
          embedded-engine choice (DuckDB) is unchanged.
        - CD.9: Partitioning IS available in DuckLake via ALTER TABLE ... SET PARTITIONED BY (metadata
          op, not CREATE TABLE DDL). The "No unpartitioned-table path" absolute holds: ops DuckLake
          tables are partitioned via ALTER when row/file count warrants.
        - CD.15: Athena cannot read DuckLake. The Athena escape hatch transitions from "Athena on
          Iceberg snapshots" to OQ.7. DuckDB-on-DuckLake replaces DuckDB-on-Iceberg-snapshot for ops.

      This roadmap edit does NOT touch DECISIONS.md and does NOT change any numbered Decision's status.
      The proposed supersessions of Decisions 50, 56, 51, 69 and any NS.1 generalisation (OQ.13:
      "S3 + Iceberg" -> "S3 + open table format") land at ratification via the log-decision path and
      the FP-B follow-on IMPLEMENTATION plan -- exactly mirroring CD.30.

      Named follow-on plans (NOT in this scope):
        - FP-B = T2.19: DuckLake ops write/read migration (replace OpsWriter JSONL-staging with DuckLake
          writer preserving Decision 69; swap DuckDBIcebergReader -> DuckLake reader; adopt SCD2 via
          current_state + optionally ducklake_table_changes CDC; resolve OQ.7 + OQ.10). V3 IMPLEMENTATION
          plan, gated on CD.31 ratification + T2.16/T2.17/T2.18. (The original "Lambda-deploy DEFERRED
          per Decision 67" rider is retired: Decision 79 lifted the blanket freeze; per-Lambda CD.16
          gating applies and the recs slice deployed live -- audit F-009. The deferred-table half is
          carried by T2.26.)
        - FP-C: market_data / product D.lake DuckLake assessment + catalog multi-tenancy decision (OQ.14).
          Gated on a billions-of-rows scale-proof; deferred after ops catalog validates the approach.
    gates: [T2.16, T2.17, T2.18, T2.19]
    state: ratified
    filed_via: ops_decisions:dec-1085
    supersedes_decisions: [50, 56, 51, 69]
    discipline_points:
      - "NS.1 generalisation (\"S3 + Iceberg\" -> \"S3 + open table format\") was deferred to OQ.13 and is now ENACTED at CD.31 ratification (Decision 78, 2026-06-02): NS.1 detail now reads \"S3 + open table format\", not the original \"S3 + Iceberg\". (Pre-ratification this discipline point recorded the deferral; it is retained as enacted-state history.)"
      - "[Superseded 2026-06-09 -- audit F-009] FP-B (T2.19) originally carried Decision 67 / CD.16 deferred-deploy markers ('deploys nothing'). CD.16 ratified (dec-1086) and Decision 79 lifted the blanket Decision-67 deploy freeze, so T2.19 deploys per the CD.16 per-Lambda flow -- its exit criteria require ducklake_writer/reader build + deploy + smoke-test, and the recs slice deployed live 2026-06-08/09."
      - "Product D.lake.* and market_data Iceberg tables REMAIN Iceberg (KG.1 platform/product boundary; independently Class-A-gated per CD.25). Market-data DuckLake assessment is deferred to FP-C."
      - "The RDS catalog is a metadata store (Glue-analog), NOT a query engine. NS.1 governs engine-swappability, not a metastore ban. NS.3 actively supports a small managed cloud state-store."
      - "VPC egress (to reach RDS) is orthogonal to Function-URL + AWS_IAM ingress (CD.10 / NS.5). The extension layer must be pre-baked into a Lambda layer to work around blocked egress to extensions.duckdb.org (T2.17)."
      - "Supersession of Decisions 50/56/51/69 is proposed-at-ratification only. Until CD.31 is ratified, all four Decisions remain in force and the existing write path (JSONL-staging, Single-Portal invariant per Decision 69) continues."
      - "[Amendment -- CD.34]: the catalog backend (\"a dedicated micro RDS PostgreSQL instance\") is migrated to Neon serverless Postgres per CD.34 (pending), for cost. This amends only the backend instantiation; the metadata-store framing, NS.1/NS.3 reasoning, S3-Parquet data plane, DuckDB engine, and closed boundary are unchanged. The RDS-specific text above (\"metadata-in-RDS-PostgreSQL\", \"the always-on RDS instance\", \"VPC egress to reach RDS\") is superseded by Neon (public TLS endpoint, no VPC attach for catalog reachability, Secrets Manager DSN). See docs/REPORT-ducklake-catalog-neon-migration.md."

  - id: CD.32
    title: Multi-product platform topology (unified project_id data plane + IP-boundary-only repo axis)
    detail: |
      Exploratory record: docs/INTENT-multi-product-platform.md (merged PR #57). That document is
      REPORT-ONLY and deliberately exploratory; it extends, and does not supersede, the monorepo +
      project_id commitment in docs/INTENT-aws-migration-platform-evolution.md Part 2.

      Two orthogonal axes:
        1. Data/identity axis: a unified DuckLake operational data plane keyed by a project_id origin
           dimension. All products (trading, reaper-tools, dbt-daywork, any future product) share one
           operational lakehouse; product rows are distinguished by project_id. This axis is already
           partially committed via the project_id stack below.
        2. Code/repo axis: the split decision (monorepo vs separate private repos) is made only at the
           cross-employer IP boundary -- not driven by data-plane topology. The two axes are orthogonal:
           N repos can still write to one DuckLake keyed by project_id.

      Open Decisions gating ratification (OD-1..OD-5 from the INTENT doc):
        OD-1: Ratify project_id as the canonical product-discriminator in the DuckLake ops schema.
        OD-2: Decide the egress-gate enforcement model (blocking Lambda interceptor vs application-level
              guard vs deferred to T0.15 COALESCE gate).
        OD-3: Decide the repo topology -- monorepo vs per-product separate private repos. The split is
              only at the cross-employer IP boundary. Key framing: the data/identity axis stays unified
              regardless of repo topology; per-directory CLAUDE.md is only a partial mitigation because
              the shared operational corpus (DECISIONS.md, the roadmaps, the recs log) does not shard
              with directory scope; the counter-cost of separate repos is extracting and duplicating the
              co-located platform tooling.
        OD-4: Decide rollback/freeze semantics if a product violates the egress gate post-onboarding.
        OD-5: Update KG.1 roadmap wording from trading-specific to N-product framing. ENACTED by this
              plan (the KG.1 edit). OD-5 is the only OD with a concrete deferred roadmap edit; the rest
              require a ratified decision before any active work is eligible.

      Build substrate to avoid duplicating (cross-reference docs/INTENT-aws-migration-platform-evolution.md
      Part 2): T0.12a (project_id Pydantic annotations), T0.7a-c (schema backfill), T0.15 (COALESCE gate),
      config/project_registry.yaml (product registry). These are the existing committed substrate; OD-1
      ratification would extend them, not replace them.

      Human-raised monorepo-vs-separate-private-repos open question (feeds OD-3):
        - Per-directory CLAUDE.md scoping is only a partial mitigation: the shared operational corpus
          (DECISIONS.md, the roadmaps, the recs log) does not shard with directory scope.
        - Counter-cost of separate repos: extracting and duplicating the co-located platform tooling.
        - The data/identity axis (one DuckLake, project_id keyed) is unchanged by the repo-topology
          decision; this question only touches the code/repo axis.

      Unbuilt enforcement work -- NOT eligible active tier_items; gated by OD-1/OD-2 + the unbuilt
      project_id stack:
        - Egress gate (application-level or Lambda interceptor)
        - Day-job onboarding interlock
        - COALESCE gate (T0.15, committed but not yet built)
        - Rollback/freeze path

      See KG.14 for the unbuilt enforcement substrate summary.
    gates: []
    state: pending
    filed_via: pending_log_decision_lambda
    discipline_points:
      - "No active tier_items may be created for multi-product enforcement work until OD-1 and OD-2
        are resolved and the project_id stack (T0.12a / T0.7a-c / T0.15) is built. Direction is tracked
        here as known_gaps / candidate_decisions only."
      - "The data/identity axis (one DuckLake, project_id keyed) and the code/repo axis (monorepo vs
        separate private repos) are orthogonal. Do not conflate them when authoring plans referencing
        this CD."

  - id: CD.33
    title: DuckLake ops runtime architecture -- writer/reader/maintenance split, OCC-retry concurrency, current projection, closed read/write boundary
    detail: |
      Pins the ops DuckLake runtime architecture that Decision 78 (CD.31) deferred to T2.17-T2.19.
      Ratified by Decision 81 (this CD does NOT edit DECISIONS.md while pending; ratification lands via
      the log-decision path = Decision 81, mirroring CD.31 -> Decision 78).
      (1) Three-artifact split by access pattern -- ducklake_writer / ducklake_reader / ducklake_maintenance
          -- justified by IAM-principal + scaling + deploy isolation, NOT concurrency. Supersedes CD.10's
          six-Lambda enumeration, which was illustrative (examples of needed verbs), never canonical. CD.33
          commits ONLY to the access-pattern split + closed boundary; the verb/tool set behind writer and
          reader stays deliberately extensible. The invariant is path, not verb count.
      (2) Concurrency (OQ.10 -> c): concurrent writers + bounded application-level OCC retry (backoff+jitter,
          fixed ceiling, loud-fail on exhaustion) in the writer. Idempotency is grounded: each write mints a
          monotonic ULID once at op start, reused across retries, as the history PK; the append is INSERT IF
          NOT EXISTS on that PK, so a committed-but-unacked retry de-dupes (not double-append). last_updated_
          timestamp is high-precision, stable-per-write, ordering-only. _prepare_record now() re-stamp moves
          out of the retry loop. NOT reserved-concurrency=1, NOT SQS FIFO. ducklake_maintenance is a singleton
          (DDL/ALTER hard-abort on conflict); the writer-vs-expire_snapshots race is closed by the clause-5
          GC older_than grace > max in-flight write/retry duration (pending the GC snapshot-isolation check).
      (3) Portal surface = read + write categories only; the sync category is eliminated because DuckLake's
          atomic catalog-snapshot commit removes the outbox/drain step. A write is atomic at the catalog
          commit (Parquet staged to S3, then snapshot committed in the RDS catalog txn; readers see nothing
          until commit; aborted-commit Parquet reclaimed by delete_orphaned_files). No external sequencing.
          Logical write verbs (file_rec/update_rec/file_decision) + read verb (query) retained. Decision 69
          Single-Portal invariant PRESERVED -- all writes transit scripts/ops_data_portal.py; transport only.
      (4) ducklake_writer owns the schema-enforcement gate: every write validated against the live table
          schema before commit; single un-bypassable write chokepoint; schema rejection fails loudly; schema
          evolution is a versioned maintenance DDL step, not writer-side silent coercion.
      (5) ducklake_maintenance = TWO deterministic scheduled cadences, NO LLM / NO agent: (a) daily
          non-destructive merge_adjacent_files (self-correcting compaction; current compacted more often);
          (b) separately-cadenced GUARDED destructive GC (expire_snapshots -> cleanup_old_files ->
          delete_orphaned_files) behind a retention floor + older_than grace + circuit breaker + own alarm.
          OQ.11 -> c: inlining DISABLED (inlined_rows=0) for governance tables -- writes land in S3
          immediately, removing the catalog-only durability window; small files paid down by daily merge.
          Per-table: telemetry MAY keep inlining. expire != delete: cleanup + delete_orphaned must run.
      (6) Closed read/write boundary (OQ.7 -> a): every read via reader, every write via writer, nothing
          out-of-band. No Athena escape hatch (DuckLake has no Iceberg export / external reader; the closed
          boundary is the design goal). One audited+alarmed admin-account break-glass path for DR only.
          Partitioning per-role: history by day(created_timestamp) (stable -> date reads prune); current by
          id (serving lookup + MERGE prune); applied via CD.9 ALTER at table creation. Partition-prune smoke
          test gates T2.17/T2.19.
      (7) current write-through projection (R-4): reads come from a materialised Type-1 current table (one
          row per id, latest-wins), never a read-time window over history. Each write is one DuckLake txn:
          INSERT history then MERGE current from the in-hand delta (no read-back). history is the append-only
          source of truth; current is rebuildable from history (DR only). Shared idempotent merge helper,
          one-or-many rows from day one (micro-batch is a config flip). current is a warehouse table, NOT the
          logs/*.jsonl read-cache anti-pattern. VERIFIED (capability-review C-1/C-2): single-txn multi-table
          atomicity + MERGE-through-DuckLake confirmed; DELETE+INSERT retained only as a noted alternative.
      (8) SCD2 keys + DQ (no engine PK/FK; BigQuery discipline): history logical key = auto-generated monotonic
          ULID (unique per write row, so same-instant same-rec_id updates never collide); rec_id is the natural
          key; last_updated_timestamp is high-precision, stable-per-write, SCD2 ordering with ULID tiebreak.
          DQ invariants: ULID PK uniqueness; one current row per rec_id (structural via the current MERGE key
          on rec_id); update_rec referential existence (point-lookup on current, in-transaction) while
          file_rec requires the DynamoDB-allocated rec_id to NOT exist.
      OQ.12 (version/upgrade policy) is left to T2.17 implementation (clone-rehearsal default); not pre-empted.
    gates: [T2.17, T2.18, T2.19]
    state: ratified
    filed_via: ops_decisions:dec-1089
    supersedes_decisions: []
    discipline_points:
      - "Supersedes CD.10's six-Lambda enumeration; CD.10 is state:pending so no DECISIONS.md transition. CD.10's six slugs are status:stub MOCK examples (verified on disk), which confirms they were illustrative, never canonical. The agent verb/tool surface is explicitly NOT frozen by CD.33 -- only the writer/reader/maintenance path split and the closed boundary are. CD.10's PlatformDev/PlatformAdmin two-principal allow-list is retained, not superseded."
      - "Preserves the Decision 69 Single-Portal primitive-level invariant AS CARRIED FORWARD BY Decision 78 (Decision 69 itself was already superseded by Decision 78; only its invariant survives). Portal abstraction unchanged; transport changes."
      - "Does NOT edit DECISIONS.md while pending; supersession + OQ.7/OQ.10/OQ.11 resolution land at ratification via the log-decision path = Decision 81."
      - "Refines CD.15 (typed query reader) and CD.8 (DuckDB engine) and applies CD.9 partitioning; does not contradict them."
      - "OQ.11 resolves to option (c) (inlining disabled for governance tables), NOT option (b); the v1 draft's option (b) was overturned by the C2 durability-window finding."
      - "Write-id RESOLVED: history PK = monotonic ULID (stable across OCC retries) + high-precision stable timestamp (ordering-only). This single mechanism grounds clause-2 idempotency, clause-7 append idempotency, clause-8 PK uniqueness, and deterministic DR rebuild; the _prepare_record now() re-stamp must move out of the retry loop at T2.17."
      - "Capability claims VERIFIED against official DuckLake docs (ducklake.select) pre-ratification: multi-table single-snapshot ACID txn (CONFIRMED), MERGE INTO (CONFIRMED), no engine PK/FK so ULID is a logical key enforced by MERGE+DQ (CONFIRMED), OCC + app-retry (CONFIRMED), inlining row-limit=0 + flush (CONFIRMED), expire/cleanup/delete_orphaned + merge_adjacent_files names+semantics (CONFIRMED), ALTER SET PARTITIONED BY post-ALTER-only + day()/bucket(N,col) + pruning (CONFIRMED). GC deletion safety is a SOFT time-based deferral, not a hard lock -- older_than grace MUST exceed max reader/writer duration; cleanup_all=>true forbidden with pinned readers. Pin a DuckLake version; smoke-test upstream issues #233/#376 (concurrency) and #921 (inlining) at T2.17."
      - "[Amendment -- CD.34 (pending)]: CD.34 proposes migrating the catalog backend to Neon serverless Postgres. CD.33 was ratified by Decision 81 (dec-1089) WITH the RDS backend, so its body above is UNCHANGED while CD.34 is pending; the following enact only when CD.34 ratifies (Decision 82): clause (3) 'RDS catalog txn' -> 'catalog txn (Neon Postgres)'; clause (5) telemetry-inlining carve-out removed (inlining disabled for ALL tables incl. telemetry; high-write-rate tables get a higher-frequency merge, T2.18 co-tunes the GC breaker); enforcement_mechanism O-2 DR -> daily pg_dump-to-S3 (30d retention, >25h freshness alarm), O-5 pooling -> Neon built-in pooler / direct endpoint (no RDS Proxy). Tracked meanwhile in the T2.16b-T2.19 exit criteria. The runtime architecture (split/OCC/projection/SCD2 keys/GC+merge cadences) is unaffected. See docs/REPORT-ducklake-catalog-neon-migration.md. (Ratification vehicle note, 2026-06-09 audit F-033: the parenthetical 'Decision 82' reservations for CD.34 collided with the actual Decision 82 -- the EC8 churn-gate frame correction; CD.34 ratifies via a FUTURE numbered Decision, number not pre-reserved.)"
    enforcement_mechanism: "ducklake_writer schema gate + closed reader/writer boundary; ULID logical key + MERGE-on-ULID insert-if-not-matched append idempotency (no engine PK); current write-through projection enforces current-version uniqueness; guarded destructive-GC circuit breaker (expire 30d/7d, grace >=7d, breaker >20%/>10GB, weekly, no cleanup_all); PlatformAdmin break-glass (catalog+S3 read) + daily catalog PITR-to-S3; partition-prune smoke test in T2.17/T2.19 exit criteria; per-Lambda CD.24 manifests."

  - id: CD.34
    title: DuckLake catalog backend -- migrate RDS PostgreSQL to Neon serverless Postgres
    detail: |
      Narrowly amends the CD.31 / Decision 78 catalog-backend paragraph ("a dedicated micro RDS PostgreSQL
      instance") from RDS PostgreSQL to Neon serverless Postgres (free tier), provisioned via the Terraform
      Neon provider (auto-applied via the Decision-77 sandbox pipeline behind a Neon-aware fail-closed guard +
      subagent review -- NOT carved out), with the Lambda
      connection string held in AWS Secrets Manager. Everything else in Decision 78 / CD.31 is preserved:
      DuckLake adoption, the S3-Parquet data plane, the DuckDB engine, the catalog-as-metadata-store framing,
      and the closed read/write boundary. Motivated by cost -- the micro RDS is the largest live AWS line
      after the CD.21 EC2-runner retirement; Neon free tier is $0 (realized saving ~$12-15/mo). Sequenced
      BEFORE T2.17 so the Lambda runtime is built against Neon (no VPC attach for catalog reachability; Neon's
      built-in pooler) rather than RDS-in-a-VPC. Nothing consumes the catalog yet (live ops are Iceberg/Athena
      until T2.19), so present blast radius is zero. Ratified later via the log-decision path (a FUTURE
      numbered Decision -- the number is not pre-reserved; the prior 'provisionally Decision 82' reservation
      collided with the actual Decision 82, the EC8 churn-gate frame correction -- audit F-033); this CD
      does NOT edit DECISIONS.md while pending.
      Consequential mechanics (folded into the gated tier items + CD.33):
      (1) Inlining DISABLED for ALL tables including telemetry (ducklake_default_data_inlining_row_limit=0),
          overriding the telemetry-inlining carve-out in CD.33 clause (5) and OQ.11 -- on Neon's ~6h free-tier
          PITR no table may be catalog-only-durable. High-write-rate tables get a higher-frequency
          merge_adjacent_files; T2.18 co-tunes the guarded-GC circuit breaker for the raised dead-file rate.
      (2) Catalog DR = a daily pg_dump (single consistent snapshot, engine-version-tagged) to a dedicated
          versioned S3 bucket (cron 03:00 UTC, 30-day retention, >25h freshness alarm) + a tested restore as a
          T2.16b precondition BEFORE any production write. Catastrophic-case RPO ~24h; intra-6h via Neon PITR.
      (3) Pooling = Neon built-in pooler if proven transaction-safe, else the direct endpoint for catalog
          writes (no separate RDS Proxy); a measured T2.16b connection-churn gate (the OQ.8 churn mitigation)
          requires churn + commit-latency within CD.33's OCC budget OR an app-side pool.
      (4) Break-glass / OQ.7 = the audited PlatformAdmin principal reads the Neon catalog credential (Secrets
          Manager) + S3, not an RDS/IAM grant.
      Authored by docs/REPORT-ducklake-catalog-neon-migration.md (architect + ops-risk zero-context review,
      converged PROCEED over three rounds).
    gates: [T2.16b, T2.17, T2.18, T2.19, T2.26]    # T2.26 added 2026-06-09 (audit F-018): the deferred-table migrations inherit CD.34's inlining/DR/pooling mechanics
    state: pending
    filed_via: pending_log_decision_lambda
    supersedes_decisions: []
    discipline_points:
      - "Narrowly amends the CD.31 catalog-backend paragraph / Decision 78 item (RDS PostgreSQL -> Neon serverless Postgres); preserves DuckLake adoption, the S3-Parquet data plane, the DuckDB engine, the metadata-store framing, and the closed boundary. CD.31/Decision 78 are paragraph-structured, not clause-numbered. Stays inside the NS.3 'small managed cloud state-store' framing that justified the catalog originally."
      - "Does NOT edit DECISIONS.md while pending; ratification lands via the log-decision path (a future numbered Decision -- NOT 'Decision 82', which now names the EC8 churn-gate frame correction; audit F-033), mirroring CD.31 -> Decision 78 and CD.33 -> Decision 81. Because CD.33 is now RATIFIED, CD.34's CD.33-level changes are staged as an additive [Amendment -- CD.34] annotation on CD.33 (the CD.31 pattern), NOT a rewrite of CD.33's ratified body; they enact when CD.34 ratifies."
      - "Inlining DISABLED for ALL tables including telemetry (inlined_rows=0), overriding the telemetry carve-out in CD.33 clause (5) + OQ.11 -- a durability decision on Neon's ~6h free-tier PITR, NOT an architecture change. High-write-rate tables get a higher-frequency merge; T2.18 co-tunes the guarded-GC circuit breaker for the raised dead-file rate."
      - "Supersedes OQ.8's RDS-Proxy/IAM-auth-preferred resolution: RDS Proxy (never provisioned; deferrable per OQ.8) -> Neon built-in pooler (direct endpoint for catalog writes; app-side pool if churn exceeds the OCC budget); credential = Secrets Manager DSN (IAM DB auth is N/A against a non-AWS endpoint). Realized saving ~$12-15/mo; the +$10-12 RDS-Proxy figure was conditional, not bankable."
      - "Catalog is the lakehouse SPOF; on Neon free tier (~6h PITR) DR = a daily pg_dump-to-S3 (single consistent snapshot, engine-version-tagged, 30-day retention, >25h freshness alarm) + a tested restore BEFORE any production write (T2.16b). Reversible: the RDS retires with a final snapshot (sole recovery artifact; delete_automated_backups wipes PITR -- rec-2063 WONTFIX while the catalog is provably unused), human-gated (Decision 35) onto the Decision-77 fail-closed destroy path."
      - "Provisioned via the Terraform Neon provider in terraform/personal/, auto-applied via the Decision-77 sandbox pipeline behind a Neon-aware fail-closed guard + subagent review (policy-as-code parity for the new provider; NOT carved out). The guard blocks any neon_* update/replace/delete (the mutation surface -- allow-list widening, credential rotation, project deletion) and allows a neon_* create on the strength of compensating controls -- enforced TLS (sslmode=require) + a scoped non-owner neon_role + the DSN in Secrets Manager -- NOT an IP allow-list (Neon IP-Allow is Scale-plan-only, unavailable on the free tier, and egress here is dynamic; REPORT R3). Keeps declarative state/audit for the lakehouse's single most critical stateful dependency rather than console-only. The out-of-band ducklake_ops schema DDL is captured as a versioned in-repo migration for reproducibility."
      - "The CD.33 runtime architecture (writer/reader/maintenance split, OCC retry, current projection, SCD2 keys, GC/merge cadences) is UNCHANGED; only the catalog backend + its consequential recovery/pooling mechanics change."
    enforcement_mechanism: "Terraform Neon provider auto-applied via the Decision-77 sandbox pipeline behind a Neon-aware fail-closed guard + subagent review (the guard blocks any neon_* update/replace/delete and allows a neon_* create on compensating controls -- TLS sslmode=require + scoped neon_role + Secrets Manager DSN, no IP allow-list) + Secrets Manager DSN; inlining=0 on all tables enforced at the writer + T2.17/T2.18 exit criteria; daily pg_dump-to-S3 (30-day retention) + >25h freshness alarm + tested-restore-before-cutover gate (T2.16b/T2.19); T2.16b connection-churn gate (within CD.33 OCC budget OR app-side pool); RDS retired with final snapshot (the destroy stays human-gated, Decision 35); ratified via a future numbered Decision (log-decision path; number not pre-reserved -- audit F-033)."

  - id: CD.35
    title: Agent-native Terraform CI/CD -- speculative plan, server-side convergence, gated-CD-apply via GitHub Environments, privilege-tiered bootstrap
    detail: |
      Closes the three gaps the T2.16b RDS->Neon migration exposed (PRs #75-#77): (1) terraform apply is
      decoupled from validate-CI and its failures are non-sticky -- a later green run masks an earlier apply
      failure and ci-rca never sees it; (2) no speculative terraform plan on PRs, so nobody reviews the diff or
      the guard verdict before merging; (3) the github_ci_apply CI role cannot grant itself privileges through
      the guarded pipeline it gates (the self-grant bootstrap), forcing manual branch-first applies. Build (DIY
      in GitHub Actions) over buy (TFC/Atlantis/Spacelift) to preserve agent-legibility; single-account sandbox
      only (Decision 77 clause 5; NOT a revival of Decision 24 multi-account promotion). Reconciles the
      Decision-77 guard with the now-live CD.20 main-protection ruleset: native controls own AUTHORIZATION
      (required checks, linear history, Environment reviewer gate), the guard narrows to plan-CONTENT policy --
      a Decision-75 frame-challenge (the guard was partly a workaround for the absent branch protection that is
      now live). Authored by docs/INTENT-terraform-cicd-agent-native.md (architect + adversarial-risk
      zero-context review, converged over three rounds); the deep-dive realisation of the T2.16b retrospective
      CI follow-on. Ratified later via the log-decision path (a numbered Decision when Wave 1 / T2.20 ships);
      does NOT edit DECISIONS.md while pending.
      Load-bearing design choices (from the converged review):
      (1) Convergence anchored SERVER-SIDE: the apply job writes a durable S3 convergence record
          (pipeline-writer-identity-only write-IAM; always-run, red-on-failure) and refuses to apply against a
          red record -- the sole hard block, unbypassable by merge-path actors (workflow self-edit is the
          Wave-4 / authority-budget residual, points 6-9; red clears only via the T2.20 dispatch-ack path).
          terraform-converged is an ADVISORY PR status only (NOT a
          required check -- required would wedge the autonomous fix-merge once a record is red, or be
          admin-bypassed anyway given main-protection strict=false + bypass_mode=always).
      (2) Speculative plan on PRs under a NET-NEW least-priv github_ci_plan role (tfstate read-only, fork-gated
          -- github_ci_pr is athena/iceberg-scoped and cannot read tfstate); apply-the-saved-plan at merge
          (terraform serial-staleness fails closed; stale ⇒ STOP, never silent re-plan).
      (3) High-blast changes (IAM/trust/destroy -- the guard fail-closed set) route to a gated CD apply via a
          GitHub Environment whose required reviewer gates JOB EXECUTION; the privileged role OIDC trust stays
          pinned to refs/heads/main (an environment: claim in the OIDC sub is NOT an authorization boundary).
          Eliminates the manual/laptop apply.
      (4) Privilege-tiering: the CI/CD role own IAM moves to a separate terraform/bootstrap/ root applied
          out-of-band, breaking the self-grant cycle (absorbs rec-2079).
      (5) Apply failures wire into ci-rca; drift detection (scheduled plan, alarm-only per Decision 55) files
          its rec directly via the ops portal. Post-apply agent re-engagement baseline = next planning session
          (the record is authoritative); a same-turn post-merge wake is best-effort only.
      [Amended 2026-06-10 -- authority-budget clarification; extends the converged review, overturns nothing:]
      (6) The Wave 3 Environment gate is an AUTHORIZATION boundary, not a quality gate, and its steady-state
          contract is EXCEPTION-PATH: human review is reserved for changes that expand the pipeline's own
          authority (IAM/trust) or destroy state -- never routine control flow. End-state after T2.23 + T2.25:
          an explicit AUTHORITY BUDGET -- an IAM permissions boundary on github_ci_apply, boundary-propagation
          condition keys (any role/policy the pipeline creates or attaches must carry the same boundary), and
          a deterministic in-budget/out-of-budget diff classification in the guard -- auto-passes in-budget
          IAM changes; ONLY out-of-budget, trust-policy, and destroy changes route to the gate. Target gate
          frequency: near-zero. A firing gate is design signal ("the agent wants authority it does not have"),
          not ceremony.
      (7) The budget, boundary, and guard policy definitions live in the terraform/bootstrap/ root (Wave 4),
          outside the pipeline's writable surface. Without that separation ANY automated handling of the
          fail-closed set is self-approval -- which is also why the wave sequencing is load-bearing: gate
          exists (T2.22) -> privilege separation (T2.23) -> budget narrowing (T2.25).
      (8) Automated environment escalation (the future-state platform promotion train) is REJECTED as a
          substitute for the authority gate: escalation verifies BEHAVIOR ("does it work") and
          authority-expanding diffs pass behavioral verification by definition; destroys rehearsed on sandbox
          data prove nothing about higher-environment data; and the train's machinery is itself
          pipeline-authored code. Escalation remains the correct pattern for the BEHAVIORAL axis when SIT/PROD
          are stood up (the environment-taxonomy section 4 trigger), consuming T2.20 convergence records +
          T2.24 drift signals as platform-promotion evidence. Behavioral risk -> automate fully; authority
          risk -> budget + out-of-band amendment. Orthogonal controls, both kept, each on its own axis.
      (9) Autonomy is earned and revocable PER CHANGE-CLASS (ratchet model): the budget may widen for a class
          on measured track record (e.g. 30 days of green applies, zero red-convergence incidents) and MUST
          narrow back to gated on incident. Ratchet decisions are themselves out-of-band budget amendments via
          the bootstrap tier (the Decision 67 freeze -> Decision 79 per-artifact unfreeze pattern, made
          data-driven). A subagent review may advise at the gate; it is never the lock -- the lock is
          deterministic policy plus the human signature on budget amendments.
    gates: [T2.20, T2.21, T2.22, T2.23, T2.24, T2.25]
    state: pending
    filed_via: pending_log_decision_lambda
    supersedes_decisions: []
    discipline_points:
      - "Extends, does NOT overturn: Decision 77 (guard narrows to content-policy, still fail-closed), Decision 35 (the GitHub-Environment reviewer gate is the native implementation of human-gated apply), Decision 76 (post-merge wake best-effort with next-session re-check as the poll-free baseline), Decision 72/CD.20 (extends the live main-protection ruleset). Single-account (Decision 77 clause 5), not Decision 24 multi-account."
      - "Anti-masking anchor is SERVER-SIDE (apply refuses on a red record), not the PR check: main-protection has strict_required_status_checks_policy=false + admin bypass_mode=always, so a required terraform-converged check would be bypassable AND would wedge the autonomous fix-merge; it is advisory only."
      - "CI/CD pipeline files are build-tooling, not executor machinery (Decision 44 boundary untouched; Decision 79 precedent). Drift + apply failures alarm and file recs; nothing auto-remediates (Decision 55)."
      - "Each of T2.20-T2.25 is a standalone IMPLEMENTATION plan (Decision 67 STRATEGIC suspension); none authored STRATEGIC."
      - "Does NOT edit DECISIONS.md while pending; ratified via the log-decision path (a numbered Decision when Wave 1 / T2.20 ships), mirroring CD.31 -> Decision 78 and CD.33 -> Decision 81."
      - "The Environment reviewer gate is an authorization boundary, not a routine quality gate: post-T2.25 only out-of-budget / trust-policy / destroy changes route to it (in-budget IAM auto-passes under the bootstrap-defined permissions boundary + guard budget). Environment escalation through the future-state platform promotion train is NOT a substitute (it verifies behavior, not authority); subagent review at the gate is advisory, never the lock. (Amended 2026-06-10; detail points 6-9.)"
    enforcement_mechanism: "Server-side convergence precondition (apply refuses on red record; always-run red-on-failure write; pipeline-writer-identity-only write-IAM; record in its own S3 prefix outside tfstate/; applies serialized via concurrency group; red clears only via workflow_dispatch acknowledge-and-retry; refusals dedupe against the open rec) + advisory terraform-converged status; net-new least-priv fork-gated github_ci_plan role for speculative plan + apply-saved-plan (terraform serial-staleness fail-closed, stale=STOP); GitHub Environment required-reviewer gating job execution for the guard fail-closed set (OIDC sub pinned to refs/heads/main); terraform/bootstrap/ privilege tier for the CI/CD role own IAM (absorbs rec-2079); authority budget post-T2.23/T2.25: permissions boundary on github_ci_apply + boundary-propagation condition keys + deterministic in-budget/out-of-budget guard classification, definitions resident in terraform/bootstrap/ (pipeline-unwritable), Environment gate reserved for out-of-budget changes and budget amendments, ratchet widen-on-track-record / narrow-on-incident; apply-failure -> ci-rca, drift -> ops portal (alarm-only); apply-model convention consolidated to environment-taxonomy.md; ratified via a numbered Decision when T2.20 ships."

