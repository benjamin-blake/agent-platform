      Scheduled Routine") rejected a separate scheduled DQ routine ON THE PREMISE that live DQ was cheap on
      the credentialed presubmit tier ("it already has SSO credentials and runs before every merge"). That
      premise is INVALIDATED -- CD.21 retired SSO/EC2; Decision 73 measured ~10-min round-trips and the
      reader-retry storm adds ~17-20 min. So 62's no-separate-routine CONCLUSION for live-reader DQ is being
