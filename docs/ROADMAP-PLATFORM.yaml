  - id: CD.15
    title: Reads go through typed query Lambda exposing verbs; Athena _current views retired in new account
    detail: |
      The query Lambda exposes typed verbs (get_rec_by_id, list_open_recs, get_decision_by_id, list_recent_decisions,
      list_priority_queue, etc.) instead of SQL. SCD2 dedup is implementation detail inside the Lambda. In the personal
      AWS account no Athena _current views are deployed — they are an implementation detail of the old read path and
      a known bug surface (the _rn ambiguity). DuckDB queries the Iceberg snapshots directly inside the Lambda.
      Athena is retained as an escape hatch only for ad-hoc large scans where DuckDB single-node memory binds.
      [Amendment -- CD.31]: Under the proposed DuckLake adoption (CD.31), Athena cannot read DuckLake
      tables (no Iceberg metadata export; no external-engine reader). The Athena escape hatch transitions
      from "Athena on Iceberg snapshots" to OQ.7 -- resolution deferred to T2.19 / FP-B. DuckDB-on-DuckLake
      replaces DuckDB-on-Iceberg-snapshot for the operational read path.
    gates: [T0.7c, T1.2, T2.5, T2.7]    # T2.7 (was T1.8) — Athena view retirement properly lives in T2 since it depends on T2.5
    state: pending
  - id: CD.17
    title: Decision 67 STRATEGIC-plan-freeze reversal trigger is T4.2 stability
    detail: |
      Decision 67 bundled a STRATEGIC-plan freeze with the Lambda-deploy freeze. CD.11 + CD.16 split the
      Lambda-deploy half. The STRATEGIC-plan half remains load-bearing and is reversed by THIS decision
      when its prerequisites land. Reversal trigger (grammar-expressible per document.gate_helpers):
        T4.2.status == "complete" AND grace_period_elapsed(T4.2, 14)
        AND item_field_eq(T3.2, "latest_run.verdict", "PASS")
        AND T3.3.status == "complete" AND grace_period_elapsed(T3.3, 7)
      (The verbal "sustained basis" and "operational" phrasings from the round-2 draft are recast as
      explicit grace-period checks. "Sustained" = T3.2 PASS verified for 14d via grace_period_elapsed on
      T4.2's completion; "operational" = T3.3 complete + 7d grace.)
      Practical impact during the freeze (which will remain in effect for many tier waves):
        - Tier items tagged strategic: true CANNOT be filed as a single STRATEGIC plan with Work Areas.
        - INSTEAD, each strategic tier_item decomposes into a tree of atomic IMPLEMENTATION plans.
        - This is the current operating mode in this repo (e.g. ops_decisions graduation split across
          PLAN-ops-decisions-phase-0-1, PLAN-ops-decisions-phase-2-semantic-definition, etc.) and is NOT
          a blocker for roadmap progress — it is the discipline that makes progress safe under freeze.
      Expected timeline: many months from CD.1 ratification to CD.17 trigger. The reversal cascade is
      Lambda agent tooling (T0) → DQ-as-Pydantic reshape (T1) → telemetry trust (T3) → autonomous
      executor (T4.2). The assumed model substrate at the time of trigger is DeepSeek-direct via LiteLLM
      per CD.28 (Tier 1), with Anthropic-direct (Claude Sonnet 4.6 / Haiku 4.5) as the warm-fetched Tier-2
      escape hatch. [Amendment 2026-05-27]: the original "DeepSeek V4 availability on personal AWS Bedrock"
      substrate assumption was retired by CD.28 -- Bedrock is no longer part of the executor's LLM substrate.
      The trigger expression structure is unchanged (still keyed to T4.2 stability + grace period); only the
      underlying model-substrate assumption changed.
      [Amendment 2026-06-01 -- verification-validation roadmap]: tier_items T3.6 (hermeticity audit) and T3.7
      (validation-suite meta-validation) and the expanded T3.1 (typed checks kernel + graduation registry)
      strengthen the telemetry/verification trust loop this reversal cascade depends on, but they PRECEDE and
      do NOT gate the reversal trigger -- the trigger expression remains keyed to T4.2 / T3.2 / T3.3 only and
      is structurally unchanged.
    gates: [T1.5, T1.6, T2.1, T3.3, T3.4, T4.1, T4.2, T4.4]    # the strategic items the freeze affects
    state: pending
    narrowly_supersedes:
      decision_id: 67
      clause: STRATEGIC-plan-freeze clause (the surviving half after CD.11/CD.16 split). Trigger is structural (named tier_item state transitions), not a wall-clock date.
  - id: CD.18
    title: Sibling-branch hand-off — agent/ops-decisions-phase-2-semantic-definition fate
    detail: |
      Promoted from KG.6. Uncommitted work on scripts/ops_data_portal.py, scripts/executor/rec_write_guidance.py,
      and tests/test_ops_data_portal_decisions.py was stashed at the start of this planning session
      (stash message: "WIP on agent/ops-decisions-phase-2-semantic-definition: rec_write_guidance + ops_data_portal +
      tests (parked for platform-roadmap planning session 2026-05-18)"). CD.10 dismantles ops_data_portal as
      the agent surface. Decision required BEFORE T1.5 begins: (a) revive the stashed work and land it
      as part of T1.5's strategic decomposition (its semantic-definition content directly serves Phase 2),
      or (b) void the stashed work — Phase 2 semantics will be re-derived from scratch inside T1.5's
      atomic plans against the Lambda-handler architecture. Option (a) preserves prior planning effort;
      option (b) avoids fitting the work to a now-superseded surface.
    gates: [T1.5]
    state: pending
    decision_required_before: T1.5 status == "in_progress"
  - id: CD.19
    title: SCD2 timestamp preservation policy on T2.2 ops-table import
    detail: |
      Promoted from KG.10. T2.2 imports ops_recommendations + ops_decisions from company-aws-profile to
      personal account. Each row has BOTH created_timestamp and last_updated_timestamp; SCD2 _rn derivation
      depends on the latter. Three options:
        (a) preserve both timestamps verbatim — downstream freshness checks (ratchet, drift detector,
            rec-curator) treat all imported data as "stale"; false-positive flood.
        (b) set last_updated_timestamp = import_time — lineage is lost; cannot answer "when was rec X
            last meaningfully updated."
        (c) preserve created_timestamp; set last_updated_timestamp = import_time AND tag with
            source='import-bootstrap' so downstream freshness checks tolerate it. Requires schema
            change in ops_recommendations + ops_decisions (a new boolean column OR a special source value).
      Recommended path: (c). Decision required BEFORE T2.2 begins because the schema change touches T0.12
      (Annotated-Pydantic models for RecPayload and DecisionPayload) and T1.6 (DQ runner reshape — the
      freshness check semantics) — earlier-tier dependencies. Without ratification, T2.2's implementation
      plan has no anchor.
    gates: [T0.12, T1.6, T2.2]    # round-3 adversarial LOW-11: T0.12 and T1.6 must ship the schema change before T2.2 can use it
    state: pending
    decision_required_before: T2.2 status == "in_progress"
  - id: CD.20
    title: Repository public-flip after T2.3; public surface is curated portal, not export of operational data
    detail: |
      The repo becomes public after T2.3 (company-aws-profile profile-reference sweep) completes -- at which
      point the committed account_id and bblake-* bucket references point at a dormant account pending T5.2
      teardown. The public surface is exactly: README.md (human portal -- thesis, architecture diagram, guided
      tour), AGENTS.md (agent portal -- mirror of CLAUDE.md per CD.4), EVALUATION-PROMPTS.yaml (10-12 example
      architecture questions an evaluator agent might ask with answer-loci pointers), .devcontainer/ (Codespaces-
      compatible spec; may share Dockerfile with T0.2), SECURITY.md (private vulnerability reporting).

      Hard invariant: operational data (ops_recommendations, ops_decisions, ops_session_log, telemetry) is NOT
      exported to the public repo. The platform self-describes through its source artefacts -- code, this
      roadmap, CLAUDE.md, skills, hooks, Terraform. An evaluator's agent forms substantive opinions from source
      alone; historical decision/rec contents are private operational journal entries about the trading-system
      instance, not portfolio artefacts. This preserves NS.4 (the repo is for agents) -- the public surface is
      a curated projection, not a parallel source-of-truth (see CD.23 for the projection invariant).

      Sequencing: depends structurally on T2.3 (security gate -- live references swept), T2.5 (DuckDB swap --
      session_preflight.py no longer requires Athena SSO, enabling Codespace verification), T2.10 (security gate --
      self-hosted runner removed before public exposure), T2.11a (devcontainer substrate), T2.11b (portal artefacts),
      and T2.12 (security pre-flight settings applied).
      [Realized 2026-05-30 (partial): public flip completed (T2.13 done) per Decision 76. T2.11a (.devcontainer), T2.11b (portal artefacts: SECURITY.md + EVALUATION-PROMPTS.yaml), and T2.12 (GHAS + branch protection) remain outstanding -- the curated public surface is not yet complete.]
    gates: [T2.11a, T2.11b, T2.12, T2.13]
    state: pending
  - id: CD.21
    title: CI migrates from self-hosted EC2 runner to GitHub-hosted runners + OIDC federation on public-flip
    detail: |
      On public-flip (T2.13), CI workloads migrate from the self-hosted EC2 runner (Decision 68) to
      GitHub-hosted standard Linux runners + AWS OIDC federation. Rationale: (a) self-hosted runners on
      public repos is the configuration GitHub explicitly recommends against -- fork PRs can execute on the
      runner with its IAM credentials unless gated by fork-approval policy; (b) ~$35/month runner cost becomes
      dead weight when GitHub-hosted standard Linux runners are free for public repos; (c) zero-stored-secrets
      via OIDC trust federation is architecturally cleaner than long-lived instance-role credentials; (d) the
      "warm runner" intent (Decision 68 future-work clause) is not built and would require drift-enforcement
      design before it would be -- so the runner currently provides no operational benefit over a hosted runner
      except AWS credential delegation, which OIDC replaces strictly better.

      terraform/ec2_runner.tf is NOT deleted -- it is marked deprecated with a header comment pointing at this
      decision, retained indefinitely as a historical artefact showing architectural-evolution (hosted ->
      self-hosted-for-AWS-access -> hosted+OIDC). Indefinite retention is explicitly accepted: the file is
      portfolio-positive and has no operational cost once the EC2 instance is terminated. Documented migration
      is more hireable signal than current state alone. No T5 teardown item is planned for ec2_runner.tf;
      if one becomes desirable it should reference this decision as the acceptance point.
      [Realized 2026-05-28: OIDC federation + CI migration to ubuntu-latest complete per Decision 73 (PR #1; terraform/personal/oidc.tf + workflow migration). EC2 runner retired; ec2_runner.tf retained with deprecation header.]
    gates: [T2.10]
    state: pending
    narrowly_supersedes:
      decision_id: 68
      clause: |
        Self-hosted-EC2-runner-as-primary-CI-surface clause. The IAM-design and credential-delegation
        rationale documented in Decision 68 carries forward as architectural context for the OIDC trust-policy
        configuration (same constraint, different mechanism). The warm-runner future-intent clause is retired
        without replacement -- the autonomous-loop compute substrate is Step Functions + Lambda Durable
        Functions + Lambda (CD.27, T4.1+; ECS Run Task escape hatch for >15-minute deterministic steps),
        not a long-lived runner. [Amendment 2026-05-27]: previously referenced Fargate (CD.11) as the
        autonomous-loop substrate; superseded by CD.27 per the executor pivot.
  - id: CD.22
    title: Planning artefacts migrate from PLAN-*.md to PLAN-*.yaml with Pydantic schema
    detail: |
      docs/plans/PLAN-{slug}.md files migrate to docs/plans/PLAN-{slug}.yaml with a Pydantic PlanDocument
      schema enforcing structural conformance via validate.py (same pattern as RoadmapDocument per T-1.5).
      Aligns planning artefacts with CD.13 -- markdown-with-prose is the legacy pattern being retired, and
      PLAN-*.md is one of the last remaining instances of it. Migration is one-way and non-rolling: a follow-on
      plan defines the PlanDocument schema, ports active in-flight PLAN-*.md files (typically 1-3), and updates
      the planning + implement + plan-critique skills to read YAML. Historical already-implemented PLAN-*.md
      files remain in commit history as archive; they are not retroactively converted.

      Scope clarification: this concerns planning-skill output artefacts only. It does NOT migrate CLAUDE.md,
      README.md, AGENTS.md, or other narrative-md files -- those serve human-portal purposes per CD.20 / CD.23
      and stay as markdown.
    gates: [T1.11]
    state: pending
  - id: CD.23
    title: Agent-first repository principle includes a curated human portal; portal is projection, not parallel source
    detail: |
      NS.4 says "the repo is for agents." CD.13 retires markdown-with-prose for canonical content. CD.20
      mandates a small human-readable surface (README.md, AGENTS.md, EVALUATION-PROMPTS.yaml, SECURITY.md) for
      portfolio purposes. CD.23 resolves the apparent tension: the human portal is a CURATED PROJECTION of
      the agent-first canonical content, not a parallel source-of-truth.

      Implication: if the README describes architectural commitments that conflict with ROADMAP-PLATFORM.yaml
      or CLAUDE.md, the canonical YAML/CLAUDE.md wins by definition -- the README is regenerated or hand-
      corrected to match. The anti-pattern called out in CLAUDE.md's Agent-First Repository section ("creating
      a human-readable companion document alongside a machine-readable source ... drift by design") applies to
      DUPLICATE canonical documentation; it does NOT apply to a single curated portal that explicitly indexes
      into canonical sources. The portal is allowed precisely because it does not claim source-of-truth status.

      Maintenance discipline: each public-portal file states at the top "this is a projection of [canonical
      source] -- see [pointer] for canonical content." Drift-detection between portal and sources is a
      follow-on concern; the immediate exit criterion is that the portal exists and states its projection
      status explicitly.
    gates: [T2.11b]
    state: pending
  - id: CD.24
    title: Per-Lambda packaging manifests; whole-src/ and whole-config/ copytrees retired
    detail: |
      Lambda deploy artefacts (data-pipeline.zip, ops-compaction.zip, and the per-Lambda zips that T0.6
      and T0.7a/b/c introduce) MUST be built from explicit per-Lambda manifests, not from whole-directory
      copytrees. Today scripts/build_lambda.py:70-71 do shutil.copytree(ROOT / "src", ...) and
      shutil.copytree(ROOT / "config", ...), which silently bundles any file added to those trees into the
      deploy artefact. Three consequences make this load-bearing wrong:
        (a) Artefact governance follows filesystem layout, not the runtime import contract. Plans adding
            files under src/ or config/ trigger V3 verification + DEFERRED-deploy assessment under
            CLAUDE.md's Lambda Deployment Assessment rule even when no Lambda handler imports the new
            code. Example: T0.12 (Annotated-Pydantic schemas) is V3-classified solely because src/schemas/
            lands in data-pipeline.zip via the copytree -- not because any Lambda imports it. The verification
            tier should follow the actual runtime contract, not where a file happens to live.
        (b) Lambda zips carry payload they do not need, eating into the 262 MB hard limit (already a real
            constraint -- ops_compaction was split into its own minimal zip per scripts/build_lambda.py:62
            for exactly this reason) and growing cold-start cost.
        (c) PR-time review sees no signal at the deploy boundary. A developer can add a file under src/
            or config/ that ships to production with no reviewer realising it crossed a Lambda deploy
            boundary. The boundary is invisible because it is implicit.

      The fix: each Lambda owns a manifest at src/lambdas/<name>/manifest.yaml listing the modules from
      outside src/lambdas/<name>/ that it bundles (shared schemas, shared client code, configs from
      config/lambda/<name>/). scripts/build_lambda.py walks the manifest. scripts/validate.py adds a
      bundle-completeness check that stages each Lambda's bundle into a tmp dir, runs
      `python -m py_compile <handler>.py` against the staged tree, and fails CI with the specific missing
      module name if the manifest is incomplete. CD.16's per-Lambda enforcement (currently policy-without-
      mechanism per the round-2 architect HIGH-2 finding) then has authoritative teeth: the
      LAMBDA_FILE_PATTERNS registry derives from the union of manifests rather than hand-curated globs.
      The deploy boundary becomes a semantic signal we can mechanically enforce, instead of a side effect
      of where a file lives.

      Relationship to existing decisions:
        - Subsumes the package-scope half of the round-2 HIGH-2 critique that motivated CD.16. CD.16
          remains load-bearing for "which Lambdas a plan affects"; CD.24 makes the "which files a Lambda
          bundles" question authoritatively answerable from a manifest instead of inferable from globs.
        - Complements CD.13 (agent-first repository). Per-Lambda manifests are exactly the agent-first
          machine-parseable artefact for the deploy boundary -- structured YAML, validated by Pydantic,
          consumed by tooling.
        - Does NOT replace T-1.7 (config/ directory split). T-1.7 establishes the directory structure
          (config/lambda/<name>/ vs config/<agent-consumed>/); T-1.8 ships the per-Lambda manifest
          mechanism that consumes that structure. Both are needed.
    gates: [T-1.6, T-1.7, T-1.8]
    state: ratified
    filed_via: ops_decisions:dec-1086
    discipline_points:
      - Manifests are committed YAML at a stable path (src/lambdas/<name>/manifest.yaml). Schema-validated by a LambdaManifest Pydantic model (parallel to RoadmapDocument per T-1.5).
      - Each manifest lists exactly: (a) handler entry-point module, (b) extra modules from src/ outside its own subtree, (c) extra paths from config/lambda/<name>/. No transitive resolution -- if module A imports B, the manifest lists both. Explicitness over cleverness.
      - bundle-completeness check is a hard CI gate, not a warning. A Lambda whose handler does not import-resolve against its staged bundle is broken.
      - Migration path: T-1.8 ships the mechanism; existing Lambdas (scheduled_agent_dispatcher, findings_processor, ops_compaction) get manifests in the same plan. The whole-src/ and whole-config/ copytrees are deleted in the same commit -- no transitional dual-source phase, since that would just be the current wrong state with extra ceremony.
      - Verification-tier reclassification (planning skill): once T-1.8 lands, the planning-skill rule for Lambda Deployment Assessment changes from "ANY scope file under src/ or config/ -> V3 + DEFERRED" to "ANY scope file named in any manifest, OR a manifest itself -> V3 + DEFERRED." Pure additions to src/ or config/ that no manifest names stay V2.

  - id: CD.25
    title: Pre-codegen contract ratification for Class A / B / C contracts
    detail: |
      Introduce a pre-codegen contract ratification ritual. The ritual applies to three named
      contract classes: Class A (data schemas that become DDL), Class B (public agent surfaces /
      Lambda verb contracts), Class C (cross-system invariants). Contracts in these classes have
      a single canonical home: docs/contracts/{name}.yaml -- machine-parseable by default.
      Codegen plans (Iceberg DDL, Lambda handlers, Pydantic projections, DQ YAML projections)
      consume the ratified contract as an authoritative input and never re-derive its semantics
      from scattered sources. Contracts carry contract_version, every Iceberg row stamps
      _contract_version (nullable; no historical backfill; read-side COALESCE), amendments
      default to forward-compatible with explicit change_class on every amendment_log entry,
      semantic breaks are opt-in with explicit migration stories. Class B contracts use a
      v0-provisional state with staggered re-ratification triggers; Class B ratification is
      itself deferred under the CD.16-governed Lambda-deploy freeze (NOT CD.17 -- that is the
      STRATEGIC plan-artefact freeze) and unblocks on CD.16 ratification. A terminal `deprecated`
      state exists for catastrophic rollback. Existing docs/contracts/*.md files convert to .yaml
      as ratification predecessor plans under this ritual.

      Problem: field semantics for the platform's load-bearing data schemas, Lambda verb
      contracts, and cross-system invariants live in four scattered places (Pydantic models,
      Athena DDL, DQ YAML, prose docs). None is canonical. Drift between them is regular.
      Lock-in moments (first DDL commit, first Lambda deploy) arrive in ordinary implementation
      PRs with no dedicated deliberation step. Iceberg structural-evolution rules do not solve
      the semantic-evolution problem (same column name, different meaning over time). Existing
      prose-shaped contracts (docs/contracts/*.md) bind nothing at runtime and drift silently
      from the code that should implement them.

      Bootstrap allowance (round-2 consensus C1): CD.25 gates T-1.11 (the INTENT producing
      CD.25) but T-1.11 produces CD.25; without an allowance, CD.25 cannot ratify until T-1.11
      completes, which itself depends on CD.25 ratifying. Same circular pattern as
      CD.1 / T-1.1 / T0.7b. Under bootstrap_allowance: true, T-1.11 completion is permitted
