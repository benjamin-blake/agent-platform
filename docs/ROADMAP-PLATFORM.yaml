      Original detail (pre-amendment):
      Long-running container in personal AWS account, headlessly calling Bedrock. Replaces the
      Lambda-dispatcher path for autonomous executor work. NOTE: Decision 67 bundled two distinct
      concerns under a single freeze: (1) STRATEGIC-plan freeze driven by executor-telemetry-trust
      readiness, and (2) Lambda-deploy freeze driven by the dispatcher being disabled. CD.11 only
      addresses concern (2) — the Lambda dispatcher path itself is retired. Concern (1) remains
      load-bearing and is NOT superseded by this decision. The replacement for concern (2) is CD.16
      (per-Lambda deploy gating). The replacement for concern (1) is the executor-telemetry-trust
      gate that T4.2 implementation must establish on its own terms.
    gates: [T4.1, T4.2]
    state: pending
    supersedes_decisions: []
