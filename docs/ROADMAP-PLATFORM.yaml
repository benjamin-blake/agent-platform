cross_tier_gates:
  - id: G.1
    name: Roadmap harness integration (schema + preflight) must precede ratifications
    rule: T-1.4.status == "complete" and T-1.5.status == "complete"
    rationale: |
      Ratifications reference roadmap items by id; the schema must enforce that those ids resolve
      (T-1.5) and preflight must compute state (T-1.4) or the roadmap is documentation only.
      [Rewritten 2026-06-09, audit F-028: the original rule tier_complete("T-1") over-claimed --
      ratifications (Decisions 78/79/81) proceeded with T-1 at 10/20 complete because the
      RATIONALE only ever needed T-1.4 + T-1.5, both complete since 2026-05-19. The rewritten
      rule states the real constraint and is satisfied.]
  # G.2 deleted 2026-06-09 (audit F-028): its premise ("T0 must complete before web-container
  # sessions can do meaningful platform work") was falsified by operating reality -- Decision 76
  # made web sessions the primary surface with T0 at 8/19 complete, because the load-bearing
  # subset (T0.1, T0.5, T0.9-T0.12) had landed. Same deletion rationale as G.3/G.4/G.5/G.7:
  # a gate the practice contradicts invites drift.
  # G.3, G.4, G.5, G.7 deleted: redundant with the depends_on graph already enforced by T-1.5 schema check.
  # The architect critique flagged these as restatements; keeping them invited drift. Constraints now live in
  # the single source of truth (depends_on) per CD.13.
  # G.6 deleted 2026-06-09 (audit F-028): its own rationale conceded "T1.6 depends_on T1.5
  # already encodes this" -- the exact redundancy for which G.3/G.4/G.5/G.7 were deleted.
  # The Phase-4-before-Phase-5 ordering lives in T1.5's exit criteria + T1.6's depends_on.
  - id: G.8
    name: T3.2 causal-chain verifier latest run PASS before T3.3 cloud analysis agent
    rule: T3.2.status == "complete" and T3.2.latest_run.verdict == "PASS"
    rationale: Cloud analysis agent trusts that telemetry data is complete. Without verified causal chain, analysis runs on potentially-broken pipeline data. This is a RUNTIME aggregate, not encodable in depends_on alone.
  - id: G.9
    name: T4.2 agent-persona Durable Functions stable for >=14 days before T5.1 VM decommission
