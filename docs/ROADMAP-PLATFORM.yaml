  - id: T3.1
    tier: T3
    name: Verifier harness foundation + typed checks kernel + graduation registry
    intent: |
      Filesystem-as-registry verifiers in scripts/verifiers/. Exit-code-as-verdict. Same-PR guard (an author
      cannot weaken their own verifier). Wire into validate.py and executor postflight as hard gate. Per CD.29
      this item also lands the foundation of the graduated-validation model:
        - Typed `checks` kernel: a small CLOSED vocabulary of deterministic primitives (command_exit_zero,
          command_output_matches, file_exists/file_absent, grep_count, test_selector, metric_under_threshold)
          that reduce per-implementation "what to verify" to harness-owned "run + compare". Closed vocabulary
          per CD.29 (orthogonal to the CD.12 DQ markers; extend only via a new CD).
        - Graduation registry: a passing per-rec verification whose PR merges is promoted into the cumulative
          validation suite, recorded as governed data in a new Class A contract
          docs/contracts/verification-registry.yaml (CD.25; row-bearing governed data, $ref into Class C
          invariants for cross-system fields), indexed by what it guards (input closure / target symbol) so
          downstream orphan detection (T3.7) is deterministic.
        - Differential admission gate: a candidate graduates only if it demonstrably FAILS on revert of the
          change it guards (kills tautological checks at the door). This fail-on-revert (baseline) check is
          defined here. Baseline-execution surface: the executor's per-rec verify state (substrate per CD.27)
          checks out the pre-change tree, runs the candidate, and asserts FAIL; at CI/PR time the same property
          runs as a validate.py step. T3.1 lands the gate logic + its unit test AND names this execution surface
          (not just the gate's self-test).
        - Hermeticity: verifiers are authored hermetic from the start; the hard-gate wiring depends on T3.6
          (the suite-wide hermeticity audit) so the behavioural tier is only hard-gated once it is flake-free.
      Freeze override (AGENTS.md): effort grew to L with the CD.29 scope; authored as IMPLEMENTATION (STRATEGIC
      suspended) -- decompose into atomic IMPLEMENTATION plans (harness + kernel + registry-contract + graduation
      gate) at /implement time.
