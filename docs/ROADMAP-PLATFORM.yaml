candidate_decisions:
  # Pre-ratification. Each will be filed via log-decision Lambda (T0.7b) once that lands.
  # Ratified decisions move to ops_decisions and their candidate id is retained here as
  # an alias for traceability.
  - id: CD.1
    title: Adopt platform roadmap (this document) as canonical
    detail: ROADMAP-PLATFORM.yaml is the source of truth for platform sequencing. Supersedes the platform sections of ROADMAP-PRODUCT.md.
    gates: [T-1]
    state: pending
    filed_via: log-decision-lambda  # circular; resolved by T0.7b landing first then T-1.1 filing this (round-2 architect HIGH-3 typo fix: was 'files_via')
  - id: CD.2
    title: Dev surface = Claude Code on the web; Windows VM exits
    detail: |
      Primary dev surface migrates to browser-based ephemeral Linux container. Windows VM remains opportunistically usable until T5.1.
      [Realized 2026-05-30: CC-web dev surface operational per Decision 76 (web-workflow-migration PR #10) and bin/setup-cloud-env.sh static-key setup (PRs #4/#6). CD.2 gates full T0 completion; T0.4/T0.6/T0.7+ remain outstanding.]
    gates: [T0]
    state: pending
  - id: CD.3
    title: Windows desktop = compute node only; REDACTED-VPN + SSH access
    detail: compute node hosts PySR formula discovery overnight. Not a dev surface. Reached via REDACTED-VPN + SSH.
    gates: [T2.6]
    state: pending
  - id: CD.4
    title: Vendor lock-in to Claude Code on the web is acceptable; AGENTS.md is portability hedge
    detail: Not over-investing in cross-harness abstraction. AGENTS.md is symlinked or duplicated to CLAUDE.md so other agent harnesses (Cursor, Aider, etc.) pick up the same instructions.
    gates: [T0.9]
    state: pending
  - id: CD.5
    title: Pre-commit augments, does not replace, never_on_main hook
    detail: .claude/hooks/never_on_main.py intercepts intent-to-edit; pre-commit intercepts commit. Keep both. scheduled_agent_log_only.py stays (no portable analog).
    gates: [T0.10]
    state: pending
  - id: CD.6
    title: Personal AWS account = destination; rebuild not migrate
    detail: |
      Pre-live data is throwaway. Only ops_recommendations + ops_decisions need preservation (small enough to export/import as JSON). Infrastructure is fully Terraformed, so migration = fresh terraform apply against new account ID.
      [Realized 2026-05-28: Phase B personal-account Terraform re-deploy applied + verified per Decision 77 (PR #1). Full T2 completion outstanding; T2.4/T2.5/T2.6/T2.7+ not yet started.]
    gates: [T2]
    state: pending
  - id: CD.7
    title: LLM inference stays on Bedrock; home GPU is wrong tier
    detail: |
      [Amendment 2026-05-27 -- fully superseded by CD.28]: the Bedrock-as-primary clause of this CD is
      retired. Bedrock leaves the architecture as an LLM substrate. CD.28 (DeepSeek-direct via LiteLLM
      Tier 1; Anthropic-direct Tier 2) replaces both the primary-substrate role and the per-tier-alternative
      routing scheme. The original detail is preserved below for historical traceability. The home-GPU-is-
      wrong-tier judgement is retained verbatim by CD.28 (locally-hostable substitutes still cannot match
      frontier-class agentic workloads). KG.7 (Bedrock partial-denial contingency) is rewritten as a
      Tier-2-availability gap by the same amendment.

      Original detail (pre-amendment):
      RTX 3050 6GB LP is display-class, not inference-class. Frontier-class model needs cannot be matched
      by locally-hostable substitutes for agentic multi-turn workloads. Re-evaluate if Bedrock pricing
      changes >5x. Target executor model: DeepSeek V4 on personal AWS Bedrock once available; DeepSeek
      V3.2 is the current placeholder and Claude family (Sonnet 4.6, Haiku 4.5) is the per-tier alternative
      per executor_capabilities routing. Falls back to single-frontier-model (Sonnet 4.6 only) if Bedrock
      partial-denial scenario from KG.7 occurs.
    gates: []    # emptied 2026-05-27 -- CD.7 is fully superseded by CD.28 which now gates [T0.4, T4.1, T4.2, T4.3, T4.4]; CD.7 retained for historical traceability only
    state: pending
  - id: CD.8
    title: DuckDB = default operational read engine
    detail: |
      Embedded, sub-second, no SSO, runs anywhere. Athena retained per CD.15 conditionally; the typed
      query Lambda hides the engine choice from agents.
      [Amendment -- CD.31]: Under the proposed DuckLake adoption (CD.31), DuckDB's native operational
      table format transitions from Iceberg to DuckLake; the embedded-engine choice (DuckDB) is unchanged.
    gates: [T1.2, T2.5]
    state: pending
  - id: CD.9
    title: Partition every table; uniform rule
    detail: |
      Every Iceberg table is partitioned. Ops + telemetry use day(last_updated_timestamp). Market data
      uses day(trade_date). New tables inherit the partitioned template. No unpartitioned-table path.
      [Amendment -- CD.31]: Partitioning IS available in DuckLake via ALTER TABLE ... SET PARTITIONED BY
      (a metadata-only operation), NOT via CREATE TABLE DDL (which is unavailable in DuckLake -- the spike
      returned a parser error; the error was correct but the conclusion "no partitioning" was wrong).
      The "No unpartitioned-table path" absolute holds: ops DuckLake tables are partitioned via ALTER once
      row/file count warrants. T2.4 applies the ALTER mechanism for DuckLake ops tables; the Iceberg
      partition sweep for all other tables is otherwise unchanged.
    gates: [T2.4]
    state: pending
  - id: CD.10
    title: Agent Tooling Platform = Lambda per tool; replaces ops_data_portal as agent surface
    detail: |
      Internal-only tooling surface. Six Lambdas (log-rec, update-rec, log-decision, query,
      list-tools+describe, maintenance). Invoked via boto3 or Function URL + AWS_IAM auth (sigv4-signed).
      Two IAM principals are recognized: PlatformDev (default; daily writes via log_rec/update_rec/log_decision,
      reads via query) and PlatformAdmin (T2.2 import-mode operations, emergency overrides). Lambdas check
      principal ARN against an allow-list to enforce admin-scoped paths. ops_data_portal.py survives only as
      the Lambdas' internal implementation.
      [Amendment -- CD.26 Pattern B plan]: auth primitive changed from SSO permission set to IAM role.
      PlatformDev and PlatformAdmin are now aws_iam_role resources (terraform/lambda_tooling_iam.tf), not
      aws_ssoadmin_permission_set. The two-principal allow-list semantic is preserved verbatim. Lambda handlers
      check the assumed-role ARN against the IAM role ARN for admin-only branches.
    gates: [T0.6, T0.7a, T0.7b, T0.7c, T1.1, T1.2, T1.3, T1.4]
    state: pending
    supersedes_intents: [ops-pipeline-consolidation]
  - id: CD.11
    title: Fargate-based executor supersedes Lambda dispatcher
    detail: |
      [Amendment 2026-05-27 -- narrowly superseded by CD.27]: the "Fargate-as-executor-substrate" clause
      is retired. CD.27 (Step Functions + Lambda Durable Functions + Lambda) is the new executor substrate.
      Fargate is NOT eliminated from the architecture -- it is demoted from "the executor's substrate" to
      "the long-step escape hatch within the executor's Step Functions orchestrator," accessed via the
      arn:aws:states:::ecs:runTask.sync integration for deterministic steps that genuinely exceed 15
      minutes (e.g. full pytest, terraform apply). The other half of CD.11 -- supersession of the Lambda
      dispatcher path -- stays load-bearing and is unaffected by this amendment; the new substrate
      replaces both the Fargate path AND the prior dispatcher path. The original detail is preserved below
      for historical traceability.

      Original detail (pre-amendment):
      Long-running container in personal AWS account, headlessly calling Bedrock. Replaces the
      Lambda-dispatcher path for autonomous executor work. NOTE: Decision 67 bundled two distinct
      concerns under a single freeze: (1) STRATEGIC-plan freeze driven by executor-telemetry-trust
      readiness, and (2) Lambda-deploy freeze driven by the dispatcher being disabled. CD.11 only
      addresses concern (2) — the Lambda dispatcher path itself is retired. Concern (1) remains
      load-bearing and is NOT superseded by this decision. The replacement for concern (2) is CD.16
      (per-Lambda deploy gating). The replacement for concern (1) is the executor-telemetry-trust
      gate that T4.2 implementation must establish on its own terms.
    gates: [T4.1, T4.2]
    state: pending
    supersedes_decisions: []
    narrowly_supersedes:
      decision_id: 67
      clause: Lambda-dispatcher-disabled clause only; STRATEGIC-plan-freeze clause remains.
  - id: CD.16
    title: Lambda deploy/smoke-test gating is per-Lambda, not blanket
    detail: |
      Replaces the blanket Lambda-deploy freeze from Decision 67. The rule becomes: plans must include
      build + deploy + smoke-test steps for the Lambdas they actually modify, and may skip those steps
      for Lambdas they do not touch. Concretely:
        - Plan modifies log-rec Lambda code or its Pydantic schema → build + deploy + smoke-test log-rec required.
        - Plan modifies an Iceberg table schema referenced by log-rec → build + deploy + smoke-test log-rec
          required (schema regenerate + handler import path).
        - Plan modifies the dispatcher Lambda (currently disabled per CLAUDE.md runbook) → deploy is fine
          but smoke-test is DEFERRED until dispatcher re-enabled. Smoke-test becomes REQUIRED for the
          dispatcher Lambda once T4.3 status == complete (the dispatcher re-enablement tier item); CD.16's
          DEFERRED clause expires at that point.
        - Plan touches no Lambda code or schema → no Lambda steps required.
      This is correctly-scoped change verification. The previous blanket "all Lambda steps DEFERRED" placeholder
      was a workaround for executor-telemetry trust leaking into Lambda-deploy decisions; it is not intrinsic
      to good Lambda hygiene.
    gates: [T0.6, T0.7a, T0.7b, T0.7c, T1.1, T1.2, T1.3, T1.4, T4.3]
    state: ratified
    filed_via: ops_decisions:dec-1086
    enforcement_mechanism: |
      Wiring lives in T-1.6 (CD.16 enforcement tier item). validate.py detects Lambda-modifying changes
      via a Lambda-package file-set registry; planning skill checks per-Lambda deploy steps; build_lambda.py
      enumerates per-Lambda glob patterns. Without T-1.6, CD.16 is policy without mechanism.
    narrowly_supersedes:
      decision_id: 67
      clause: Lambda-deploy-freeze clause (replaces blanket DEFERRED marker with per-Lambda gating).
  - id: CD.12
    title: DQ-as-Annotated-Pydantic; single source of truth; runner = alarm not gate
    detail: |
      Pydantic models with Annotated[T, DqXxx()] metadata are the single source of truth for schema + DQ.
      Iceberg DDL is generated by walking model_fields. The DQ runner walks the same model_fields and emits
      checks. The runner is a scheduled drift alarm that files recs on anomalies; it is NOT a pre-commit gate.
      Stateful invariants (uniqueness, FK, status-transition) run inside the Lambda handler against _current
      (T1.x) or DuckDB+Iceberg-snapshot (T2.5+) pre-commit and return typed 4xx on failure. No post-write
      self-assertion (per Decision 70 — dirty rows are expensive to fix).
    gates: [T0.12, T1.6]
    state: pending
    supersedes_intents: [dq-enforcement]
    discipline_points:
      - Pydantic models are the only place schema lives; no direct Iceberg DDL edits.
      - DQ annotation vocabulary stays small (~6-8 markers) — DqNotNull, DqUnique, DqAcceptedValues, DqRelationship, DqRecency, DqRowCount. Adding a 7th requires a new candidate decision.
      - The Iceberg DDL generator is real code we own (~100-200 LOC). pyiceberg helpers cover most of it.
      - Stateful invariants (status DAG transitions, FK across tables, intra-table parent/child uniqueness) live in handler code, NOT in Annotated metadata. They run pre-commit against the read path (T2.5+ via DuckDB-on-Iceberg-snapshot, T1.x bridging via Athena _current views in the old account only) and return typed 4xx on failure.
      - Distributional / drift checks live in the DQ runner (T1.6 alarm-not-gate), NOT in Annotated metadata. Annotated marker vocabulary is for shapes the runner can express as a row-level boolean; drift is a distribution-level signal.
      - Schema evolution policy. Field removal is destructive — the DDL generator does NOT emit `ALTER TABLE ... DROP COLUMN` for fields merely absent from the Pydantic model. Removal requires an explicit `Annotated[T, DqDeleted(since='YYYY-MM-DD')]` marker on a deprecated field for at least one release cycle; the generator emits a no-op for `DqDeleted` and the runner short-circuits checks on those fields. Then a separate explicit drop step in a follow-on plan removes the field from Pydantic and emits the DDL drop.
      - Schema-drift detector. Until T1.6 retires `config/data_quality/*.yaml`, both YAML and Pydantic-Annotated coexist (T0.12 onwards). A CI check (added in T0.12) confirms the two sources express the same checks for any overlapping field; divergence fails CI.
  - id: CD.13
    title: ROADMAP-PLATFORM.yaml is the agent-first documentation exemplar
    detail: Pure YAML, no narrative prose, structured tier_items + cross_tier_gates + candidate_decisions. Future repo documentation follows this shape. Markdown-with-prose is the legacy pattern being retired.
    gates: [T-1.2, T-1.3, T-1.4, T-1.5]
    state: pending
  - id: CD.14
    title: Roadmap is self-contained; INTENT-compute-and-account-topology retired
    detail: |
      docs/INTENT-compute-and-account-topology.md is retired. Its content is inlined into this roadmap
      (north_star, rebuild_vs_refactor, T2 tier items, partition strategy via CD.9, cost_projection
      top-level section). The other 10 INTENT docs (including provider-agnostic-executor, newly added
      to main during this planning session) become detail-companions — they retain their content but
      are downgraded from authoritative to reference-only.
    gates: [T-1.1, T5.5]
    state: pending
    retires_intents: [compute-and-account-topology]
    demotes_intents:
      - recommendation-executor
      - telemetry-system
