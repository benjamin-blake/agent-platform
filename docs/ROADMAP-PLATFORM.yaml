  - id: T2.20
    tier: T2
    name: "Terraform CI/CD: convergence substrate + apply-RCA + best-effort post-merge wake (CD.35 Wave 1)"
    intent: |
      Make terraform apply outcomes sticky and observed. The apply job writes a durable S3 convergence record
      (pipeline-writer-identity-only write-IAM; always-run, red-on-failure) and reads it as a server-side
      precondition that refuses to apply against a red record -- the sole hard block. terraform-converged is an
      ADVISORY PR status only (pass-on-absent; NOT added to main-protection required_status_checks). Wire
      terraform-apply-sandbox into ci-rca.yml so apply failures file source=ci_rca recs. Attempt a best-effort
      post-merge wake (resolve the PR from the merge commit SHA -- workflow_run.pull_requests[] is empty for
      push; agent holds its subscription through apply) with next-planning-session re-check as the poll-free
      baseline. Standalone IMPLEMENTATION plan (Decision 67). V3.
      [Amended 2026-06-10 -- pre-plan design review; settles four under-specified points:]
      (a) UNLATCH PROTOCOL = dispatch-ack: a red record blocks ALL push-triggered applies, and a refusal does
          NOT overwrite the record. Clearing requires an explicit workflow_dispatch acknowledge-and-retry run
          whose input names the red record's commit (or rec id); only a successful apply from that path writes
          green. The dispatch actor + input are the audit trail. Agent autonomy is preserved (the agent may
          dispatch via the MCP actions trigger after the rec review, per Decision 55/72 failure-must-be-seen
          discipline). Auto-allow-descendants is REJECTED: on linear-history main every commit is a
          descendant, so the latch would never latch.
      (b) SERIALIZATION: the apply workflow declares a concurrency group (cancel-in-progress: false) so
          applies serialize -- closes the read-precondition -> apply -> write-record race (two rapid merges
          both read green; the second applies onto an unconverged state) and keeps state-lock-timeout noise
          out of ci-rca.
      (c) RECORD PLACEMENT + WRITE IDENTITY: the record lives in its OWN S3 prefix (e.g.
          convergence/personal/sandbox.json), NOT under tfstate/ as INTENT 5.5 originally sketched -- the
          advisory PR status must read it at PR time and "github_ci_pr cannot read tfstate" (re-asserted by
          T2.21 exit criteria) stays cleanly auditable; the PR role gets read on the record prefix only.
          Write-IAM is pipeline-writer-identity-only via a shared record-writer policy (apply identity at
          Wave 1; the T2.24 drift identity joins at Wave 5 -- "apply identity alone" would contradict Wave
          5's red-flip). Never PR roles, never laptops. plan_sha is null until Wave 2 introduces saved plans.
      (d) RCA DEDUPE + HONEST FRAMING: refusals-while-red carry a distinguishable failure marker and ci-rca
          dedupes them against the open red-record rec (coordinate with T1.13's structured taxonomy) -- one
          underlying failure, one rec. The forced-failure verification rec is closed via update_rec annotated
          as synthetic. The record is unbypassable by merge-path actors but NOT against workflow self-edit;
          that residual is the Wave-4 / authority-budget class (CD.35 points 6-9) and contract language must
          not overclaim.
    depends_on: [T2.12]
    files_in_scope:
      - .github/workflows/terraform-apply-sandbox.yml    # convergence record (if: always(), red-on-failure) + precondition read + SHA->PR wake
      - .github/workflows/ci-rca.yml    # add terraform-apply-sandbox to the workflows: trigger
      - terraform/personal/oidc.tf    # record-writer write-IAM (shared policy; apply identity at Wave 1) -- record in its own prefix, NOT tfstate/; PR role reads record prefix only
      - .claude/skills/implement/SKILL.md    # hold-subscription-through-apply convention for terraform PRs
      - terraform/CLAUDE.md    # document the server-side convergence anchor + advisory status + dispatch-ack unlatch
    exit_criteria:
      - "A forced apply failure writes status=red via the always-run step; the NEXT push-triggered apply is refused server-side against the red record AND the refusal does not overwrite the record"
      - "The same forced failure files a source=ci_rca critical rec (terraform-apply-sandbox wired into ci-rca.yml); subsequent refusals-while-red file NO duplicate recs (distinguishable refusal marker + dedupe against the open rec); the synthetic verification rec is closed via update_rec annotated as synthetic"
      - "The advisory terraform-converged status shows red on a non-converged main and is NOT in main-protection required_status_checks"
      - "A red record clears ONLY via the workflow_dispatch acknowledge-and-retry path (input names the red commit or rec id); the recovery from the forced failure demonstrates it -- a successful acknowledge-path apply writes green"
      - "Applies serialize via a workflow concurrency group (cancel-in-progress: false); rapid sequential merges produce sequential applies with no precondition race"
      - "A passing apply writes the first convergence record from absent (pass-on-absent); write-IAM proven restricted to the pipeline writer identity (apply identity at Wave 1); the record lives in its own prefix outside tfstate/ with the PR role granted read on the record prefix only"
      - "Post-merge wake proven live (PR resolved via merge SHA wakes a held subscription) OR the next-planning-session re-check baseline confirmed; no sleep/loop poll (Decision 76)"
    related_candidate_decisions: [CD.35]
    effort: M
    strategic: false
    status: not_started
