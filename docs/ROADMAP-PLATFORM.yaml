  - id: T3.7
    tier: T3
    name: Validation-suite meta-validation (mutation testing + deterministic dead-test detection + diff-coverage ratchet)
    intent: |
      Keep the validation suite's PURPOSE honest -- it must guard functionality, not merely exist (CD.29).
      Three mechanisms:

        1. Scheduled mutation testing (mutmut), ALARM-NOT-GATE (CD.12). Runs on a GitHub Actions schedule, NOT a
           Lambda -- avoids the Decision 67 / CD.16 Lambda-deploy freeze and touches no Lambda-packaged file.
           Aimed NARROWLY: when a verification graduates (T3.1 registry), mutate only the lines that check claims
           to guard and confirm it kills the mutants; a graduated check that kills nothing on-target is a
           tautology and is flagged. Surviving mutants file a rec with source='mutation_survivor' (Decision 61 --
           via the source field; no new findings table). An equivalent-mutant allowlist (governed file) suppresses
           known-unkillable mutants so the scheduled run files recs only on NEW survivors (no resurrection-loop
           noise). Distinct from the separate-scheduled-DQ-routine Decision 62 retired: mutation is too slow for
           presubmit and is advisory, not a merge gate.

        2. Deterministic dead/redundant-test detection (NEVER an LLM scan -- expensive and non-deterministic for a
           deterministic job). Layered, cheapest-first: (a) AST assertion-free lint (a test with no assert /
           pytest.raises / mock.assert_* / self.assert* asserts nothing) -- cheap enough to be a BLOCKING
           validate.py check; (b) registry orphan detection -- a graduated check whose recorded guard target no
           longer exists in the tree is flagged (deterministic by construction once the T3.1 registry records guard
           targets); (c) coverage-uniqueness -- a test contributing zero unique covered lines is a redundancy
           candidate; (d) mutation-on-target -- the rigorous confirmation, reserved for flagged candidates.
           Detection files recs; RETIREMENT follows the CD.12 mark-then-drop discipline (mark deprecated in the
           registry; a follow-on plan deletes), never auto-delete -- deleting a load-bearing test on a misjudgement
           is unacceptable in a human-out-of-loop system.

        3. Diff-line-coverage ratchet (CD.30): replace the per-changed-file 100% floor (test_coverage_checker.py
           is already diff-scoped) with require-coverage-on-changed-LINES + upward-only global ratchet, enforced
           in validate.py; retarget scripts/test_coverage_checker.py.

      Freeze override (AGENTS.md): the three mechanisms decompose into separate atomic IMPLEMENTATION plans
      (mutation runner, dead-test detector, diff-coverage ratchet + the meta-validation workflow) at /implement
      time -- effort M is the umbrella estimate, not a single-plan commitment.
    depends_on: [T3.1]
    files_in_scope:
      - .github/workflows/meta-validation.yml    # new -- scheduled mutation + dead-test scan (GH Actions, not Lambda)
      - scripts/mutation_runner.py    # new -- mutmut wrapper; on-target scoping; equivalent-mutant allowlist; files recs
      - scripts/dead_test_detector.py    # new -- AST assertion-free + coverage-uniqueness + registry-orphan + mutation-on-target
      - scripts/test_coverage_checker.py    # retarget from 100% floor to diff-coverage + ratchet (CD.30)
      - scripts/validate.py    # add the AST assertion-free lint as a blocking check; enforce diff-coverage ratchet
      - config/agent/mutation_allowlist.yaml    # new -- governed equivalent-mutant allowlist
    exit_criteria:
      - "Scheduled GH Actions workflow runs mutation testing on graduated-check targets and files recs with source='mutation_survivor' on NEW surviving mutants only (allowlist suppresses known-equivalent)"
      - "AST assertion-free lint runs in validate.py and blocks a test function that contains no assertion"
      - "Registry orphan detection flags graduated checks whose guard target no longer exists; coverage-uniqueness flags zero-unique-coverage tests; both file recs"
      - "Retirement path is mark-then-drop: flagged checks are marked deprecated in the registry, never auto-deleted; a follow-on plan performs deletion (CD.12 discipline)"
      - "Diff-line-coverage ratchet enforced in validate.py: changed lines require coverage + global coverage non-regression; the per-changed-file 100% floor in test_coverage_checker.py is retargeted to diff-line-coverage + ratchet (CD.30)"
      - "Workflow touches no Lambda-packaged file (Decision 67 / CD.16 not triggered); distinguished from the Decision 62 retired separate-DQ-routine in a code comment"
    related_candidate_decisions: [CD.29, CD.30]
