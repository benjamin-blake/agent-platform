    name: Test-suite hermeticity audit
    intent: |
      Audit the pytest suite and verifier harness for hermeticity: every test/verifier must declare its inputs
      and be free of clock, network, filesystem-order, and test-order dependence. Hermeticity is the precondition
      for three downstream capabilities: (a) cacheable validation -- a test whose input closure is unchanged need
      not re-run (the basis of the deferred TIA + caching work, KG.13); (b) the executor's hermetic verify
      (env-stripped, no-network checks the executor can hard-gate on, per CD.27); and (c) honest Codespace claims
      (T2.11a / T2.13 promise a working environment -- only true if the suite runs green hermetically in a fresh
      container). This item produces the audit, the fixes that make the suite hermetic, and a CI assertion that
      new tests stay hermetic. It precedes the hard-gate consolidation (CD.29 / T0.12.5): hard-gating the
      behavioural tier on a non-hermetic suite reproduces the flakiness that made the legacy `verification` field
      advisory. DQ application (coordinate with T1.6): the live-reader-dependent DQ checks
      (ulid_history_unique, current_merge_key_unique, any reader-round-trip check) are non-hermetic by
      construction (network + live-state dependence); the contract-vs-state split -- hermetic structural
      contract checks stay GATING, live-reader state checks move to the scheduled canary -- is this
      hermeticity principle applied to DQ, and the durable fix for the DQ merge-gate flapping / wall-clock
      that PLAN-dq-gate-infra-resilience only partially addressed.
