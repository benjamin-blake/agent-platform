  - id: OQ.4
    question: GitHub OIDC vs personal-account precedence for IAM role assumption
    resolution_tier: T0.3
    status: resolved
    resolution_ref: "CD.26"
    notes: |
      RESOLVED (status reconciled 2026-06-09, audit F-020): both halves shipped -- Pattern B
      (static-key + chained AssumeRole, CD.26) at T0.3 (complete 2026-05-29) for unattended
      agents, and GitHub OIDC federation at T2.10 (complete 2026-05-28, CD.21) for CI.
