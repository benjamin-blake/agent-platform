  - id: T3.13
    tier: T3
    name: Source-code dead/orphan detection (graph-reachability + grep cross-check)
    intent: |
      Detect dead SOURCE code -- functions, classes, modules, and files unreachable from real roots -- distinct
      from T3.7, which is test-suite meta-validation (dead/redundant TESTS, mutation testing). Two-layer verdict
      that combines the structural strength of the T3.12 graph with grep's recall for dynamic references:
        1. Graph-reachability: candidates are nodes unreachable from the root set (per-Lambda manifest
           handlers/includes per Decision 79, main()/CLI entrypoints, pytest tests) over the T3.12 graph.
        2. grep cross-check across .py AND non-Python surfaces (Lambda manifest.yaml, terraform, .prompt.md):
           a candidate with any dynamic/string reference is DOWNGRADED to low-confidence "dynamically-referenced",
           not reported as dead. High-confidence dead = graph-unreachable AND grep-absent.
      Deterministic (no LLM). Supersedes the grep-only orphan-code scheduled agent, whose core weakness
      is substring false-positives and no reachability model. No automatic deletion -- mark-then-surface; the
      human/PR decides (Decision 55 no-rescue-loop posture). Rationale for the whole group: agent context is a
      first-class resource and dead code eats it.
    depends_on: [T3.12]
    files_in_scope:
      - scripts/dead_code_detector.py    # new -- reachability over the T3.12 graph + grep cross-check; two-tier confidence
      - scripts/dependency_graph.py    # consumed (T3.12)
      - .github/prompts/scheduled/orphan-code.prompt.md    # retire/retarget the grep-only detector toward the graph-grounded one
    exit_criteria:
      - "Dead-code candidates are computed as graph-unreachable-from-roots over the T3.12 graph at file/module/function granularity (roots = manifest handlers/includes + main()/CLI + pytest)"
      - "Every candidate is grep-cross-checked across .py AND non-Python reference surfaces -- Lambda manifest.yaml, terraform, .prompt.md, AND the surfaces where this repo invokes code: .github/workflows/*.yml, .github/agents/schedule.yaml, and .claude/**/*.md (skills/commands launching `-m scripts.X`); a candidate with any dynamic/string reference is reported low-confidence 'dynamically-referenced', not 'dead'"
      - "High-confidence dead code (graph-unreachable AND grep-absent) is reported separately from low-confidence candidates; nothing is auto-deleted (mark-then-surface, Decision 55)"
      - "The detector is deterministic (no LLM) and supersedes the grep-only orphan-code scheduled agent (currently cron-scheduled in .github/agents/schedule.yaml; verify its actual disable mechanism -- EventBridge rule / dispatcher env -- at implement-time rather than assuming it is off)"
      - "Exit criteria name the boundary with T3.7: T3.13 targets dead SOURCE code, T3.7 targets dead/redundant TESTS -- the two are disjoint, neither depends on the other's machinery"
    related_decisions: [80, 79, 43]
    effort: M
    strategic: false
    status: complete
    completed_at: "2026-07-01"
    decomposition_hints:
      tooling: "Candidate mechanisms: custom reachability over the T3.12 graph, and/or vulture as an unsound-but-useful symbol-level pass. Selected at implement-time per Decision 75 frame-challenge."
      disjointness: "Explicitly NOT T3.7 (dead-test/mutation). Source-orphan vs test-redundancy are separate jobs."
    note: >-
      Consumes T3.12. The graph+grep two-layer verdict is the core design: graph is the structural
      source of truth, grep is recall insurance for dynamic references the static graph cannot see.
      Shipped via PLAN-dead-orphan-detection (scripts/dead_code_detector.py, module+symbol granularity).
