      - "Step Functions execution stores correlation ids: PR number, check-run id, workflow-run id, rec id, execution id, and head SHA (the exact commit the verdict attests)"
      - "GitHub Actions reports PR --pre PASS/FAIL and main full-validate PASS/FAIL to the executor callback without exposing raw Step Functions task tokens"
      - "PRE_PASS permits merge; FULL_PASS permits promotion / closure; PRE_FAIL / FULL_FAIL routes to ci-rca (Decision 72)"
      - "Unit tests cover callback authentication, duplicate-callback idempotency, stale-callback rejection, and failed-workflow handling"
      - "Merge is permitted only when the callback's verified head SHA equals the PR head at merge time; a SHA mismatch routes to re-verify, and a repeated mismatch routes to ci-rca (Decision 72) -- the executor-side analogue of the terraform no-TOCTOU artifact-verdict binding (Decision 92)"
      - "Every verdict-wait state (waitForTaskToken) carries HeartbeatSeconds and TimeoutSeconds sized to expected verdict latency; a missing/late verdict times out to ci-rca (Decision 72), never a silent re-wait or retry"
