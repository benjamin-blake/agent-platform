cross_tier_gates:
  - id: G.1
    name: T-1 must complete before T1+ ratifies anything new
    rule: tier_complete("T-1")
    rationale: Without T-1.4 (preflight computation) and T-1.5 (validate schema check), the roadmap is documentation only — no harness consumption. Ratifications via log-decision (T-1.1) reference roadmap items by id; the schema must enforce that those ids resolve.
  - id: G.2
    name: T0 must complete before web-container sessions can do meaningful platform work
    rule: tier_complete("T0")
    rationale: Hooks, statusline, preflight, and agent_sdk all break in Linux container without T0.1-T0.11. Sessions can run from the Windows VM until T0 completes.
  # G.3, G.4, G.5, G.7 deleted: redundant with the depends_on graph already enforced by T-1.5 schema check.
  # The architect critique flagged these as restatements; keeping them invited drift. Constraints now live in
  # the single source of truth (depends_on) per CD.13.
  - id: G.6
    name: T1.5 ops_decisions Phases 0-4 complete before T1.6 final cutover (DQ Phase 5)
    rule: T1.5.status == "complete"
    rationale: HARD cross-arc prerequisite documented in both INTENT-dq-enforcement and INTENT-ops-decisions-graduation. Phase 4 corrects data; Phase 5 enforces. Wrong order makes Phase 5 unconditionally blocking against uncorrected data. T1.5 exit criteria require Phase 4 complete; T1.6 depends_on T1.5 already encodes this.
  - id: G.8
    name: T3.2 causal-chain verifier latest run PASS before T3.3 cloud analysis agent
    rule: T3.2.status == "complete" and T3.2.latest_run.verdict == "PASS"
    rationale: Cloud analysis agent trusts that telemetry data is complete. Without verified causal chain, analysis runs on potentially-broken pipeline data. This is a RUNTIME aggregate, not encodable in depends_on alone.
  - id: G.9
    name: T4.2 agent-persona Durable Functions stable for >=14 days before T5.1 VM decommission
    rule: T4.2.status == "complete" and grace_period_elapsed(T4.2, 14)
    rationale: |
      VM is the dev fallback while autonomy is being validated. Decommissioning before autonomous executor
      proves stable removes the safety net. Uses grace_period_elapsed(item, days) per gate_helpers table;
      arity 2 with explicit days argument removes the round-2 architect HIGH-4 ambiguity. [Amendment
      2026-05-27]: gate name updated from "Fargate executor handler" to "agent-persona Durable Functions"
      per CD.27 substrate pivot; rule expression structure unchanged.
  - id: G.10
    name: T2 state migration complete plus 30-day grace before T5.2 account teardown
    rule: all_in_tier_with_status("T2", "complete") and grace_period_elapsed(T2.1, 30)
    rationale: 30-day grace period after migration completes before tearing down the old account. Rollback option preserved. Uses grace_period_elapsed(item, days) per gate_helpers table.
  # G.11, G.12, G.13 deleted: redundant with the depends_on graph encoded in T2.13 and T2.11a.
  # Security rationale (live-account-reference exposure before T2.3, OIDC before T2.10, devcontainer
  # functional before T2.11a) is preserved in those items' intent and inline depends_on comments.
  # Deletion is consistent with the G.3/G.4/G.5/G.7 precedent: depends_on is the single source of truth.

open_questions:
  # Items where the planning session deferred to in-tier-implementation decisions.
  - id: OQ.1
    question: AGENTS.md mechanism — symlink vs duplicate-with-CI-parity-check
    resolution_tier: T0.9
    notes: Symlinks are awkward on Windows clones; duplicate-with-CI is more verbose but portable. Resolved at T0.9 because T0.9 creates AGENTS.md and cannot complete without committing to a mechanism. T2.11b consumes the already-created artefact.
  - id: OQ.2
    question: Pre-commit bundling scope — just branch gates, or also ruff / EOF / secrets-scan
    resolution_tier: T0.10
    notes: Bundling is convenient but enlarges the migration's diff. Branch gates only is the minimum.
  - id: OQ.3
    question: REDACTED-VPN-in-container — include in first iteration, or defer until concrete need
    resolution_tier: T2.6
    notes: Out of scope for current migration. File as candidate decision when a need surfaces.
  - id: OQ.4
    question: GitHub OIDC vs personal-account precedence for IAM role assumption
    resolution_tier: T0.3
    notes: Per topology INTENT -- OIDC against company-aws-profile may be blocked by corporate IAM. Skipping straight to personal-account was proposed; OIDC against personal-account is deferred to T2.10 / CD.21 public-flip. Current substrate for personal-account is Pattern B (static-key + chained AssumeRole) for unattended agents and breakglass-user console-login for human ops. Identity Center is not used for the personal account per CD.26.
  - id: OQ.5
    question: Will iceberg_tables_generated.tf be committed or gitignored
    resolution_tier: T0.13
    notes: Commit for terraform-plan determinism; gitignore if generator is fast and CI re-runs it. Decide at implementation time.
  - id: OQ.6
    question: Drift detector cadence and threshold tuning
    resolution_tier: T1.6
    notes: Hourly is starting point; tune to false-positive rate observed.

  - id: OQ.7
    question: Athena escape hatch after DuckLake adoption -- no Iceberg export path exists
    resolution_tier: T2.19
    notes: |
      DuckLake v1.0 has no Iceberg metadata export and no external-engine reader: Athena and Trino cannot
      read DuckLake tables directly. ducklake_add_data_files() is import-only AND dangerous (file ownership
      transfers to DuckLake; compaction can delete registered files). The CD.15 Athena escape hatch
      (ad-hoc large scans) has no export-based mitigation today. Options: (a) live without the Athena
      escape hatch for ops/telemetry (accept DuckDB-only ad-hoc reads, adding compute if needed);
      (b) maintain a parallel Iceberg mirror for Athena-accessible scans (write amplification, complexity);
      (c) wait for DuckLake to add Iceberg export in a future version. Resolve at T2.19 / FP-B.

      Resolved direction (CD.33, pending Decision 81): option (a) -- no Athena escape hatch.
      The closed reader/writer boundary is the design goal; ad-hoc scans live behind ducklake_reader (scale
      reader compute if memory binds), not a parallel Iceberg mirror. Break-glass = the audited PlatformAdmin
      principal (expanded to catalog+S3 read); catalog DR = daily PITR export to a dedicated S3 bucket.
      Enacted at T2.19.

      Re-resolved (CD.34): break-glass = the Neon catalog credential (Secrets Manager) + S3 read; catalog DR =
      a daily pg_dump to a dedicated versioned S3 bucket (30-day retention, >25h freshness alarm). Option (a)
      (no Athena escape hatch) is unchanged.

  - id: OQ.8
    question: RDS catalog backend -- sizing, RDS Proxy, and credential mechanism
    resolution_tier: T2.16
    notes: |
      Catalog backend confirmed as standard RDS PostgreSQL (Aurora DSQL dropped as unvalidated against
      DuckLake's PG12+/SQL-92/PK-based-OCC contract). Sizing: db.t4g.micro single-AZ gp3 is the proposed
      starting point (~$12-15/mo). RDS Proxy is deferrable -- adds ~$10-12/mo and NAT complexity; worth it
      only if Lambda cold-start connection churn causes catalog OCC collisions. Credential: IAM auth vs
      Secrets Manager -- IAM auth is preferred (no rotation burden, per-role scoping) but needs validation
      against the DuckLake ATTACH connection string format. Resolve at T2.16 implementation.

      Re-resolved (CD.34): backend = Neon serverless Postgres (not RDS); RDS Proxy -> Neon's built-in pooler
      (direct endpoint for catalog writes; app-side pool if churn exceeds the OCC budget -- T2.16b churn gate);
      credential = Secrets Manager DSN. The "IAM-auth-preferred" note is moot (IAM DB auth is N/A against a
      non-AWS endpoint). Realized saving ~$12-15/mo; the deferrable RDS Proxy was never provisioned.

  - id: OQ.9
    question: Catalog durability, DR strategy, and SPOF mitigation
    resolution_tier: T2.16
    notes: |
      The catalog is the lakehouse single point of failure: snapshots are catalog rows; un-flushed inlined
      data (threshold 10 rows default) lives ONLY in the catalog -- not in S3 -- until flushed. RDS PITR
      is the baseline DR mechanism. Questions: (a) backup cadence (default daily PITR; shorter window
      possible via automated backup interval); (b) what happens to in-flight writes if the catalog is
      unavailable (DuckLake hard-fails; no graceful degradation); (c) cross-AZ failover cost vs current
      single-AZ. Ties T2.16 (RDS AZ posture is an implementation choice within RDS catalog provisioning;
      T2.8 covers S3/DynamoDB DR posture, not RDS). Resolve at T2.16; revisit at T2.19.

      Re-resolved (CD.34): on Neon free tier (~6h PITR vs RDS 7-day continuous), DR baseline = a mandatory
      daily pg_dump to a versioned S3 bucket (30-day retention, >25h freshness alarm) + a tested restore
      BEFORE any production write (T2.16b). Catastrophic-case RPO ~24h (daily cadence); intra-6h recovery via
      Neon PITR. Inlining disabled for ALL tables so nothing is catalog-only-durable. SPOF property unchanged;
      the mitigation is the independent backup, not the provider.

  - id: OQ.10
    question: OCC writer-concurrency enforcement -- reserved-concurrency vs SQS FIFO vs OCC retry
    resolution_tier: T2.19
    notes: |
      DuckLake is OCC + snapshot-isolation: even single-writer Lambda overlap can collide on snapshot_id,
      and DDL / ALTER-table writes hard-abort on conflict (no retry in DuckLake itself). Options:
      (a) Lambda reserved-concurrency=1 (simplest; serialises all writes; reduces throughput);
      (b) SQS FIFO queue in front of the writer Lambda (serialises at the queue; decouples caller latency
          from write latency; adds SQS cost + infra);
      (c) Application-level OCC retry in the writer Lambda (retry on conflict; only safe if the write is
          idempotent or the conflict detection is precise). Resolve at T2.19 / FP-B; document the chosen
      mechanism in the DuckLake writer Lambda design.

      Resolved direction (CD.33, pending Decision 81): option (c) -- concurrent writers + bounded
      application-level OCC retry (backoff+jitter, loud-fail on exhaustion) in ducklake_writer (ops writes are
      idempotent SCD2 appends keyed by the monotonic ULID history PK, minted once and reused across retries);
      ducklake_maintenance runs as a singleton. NOT reserved-concurrency=1, NOT SQS FIFO. Enacted at T2.19.

  - id: OQ.11
    question: Inlining flush policy -- threshold, flush timing, and catalog-as-durability acceptance
    resolution_tier: T2.18
    notes: |
      DuckLake default inlining threshold is 10 rows. Un-flushed inlined data is durable only in the
      catalog (RDS), not in S3. Options: (a) flush-on-write (call flush_inlined_data after every write;
      eliminates catalog-only durability window; adds latency); (b) scheduled flush via T2.18 maintenance
      pipeline (accept that the catalog holds uncommitted S3 data between maintenance cycles; rely on RDS
      PITR for durability); (c) raise the inlining threshold to 0 (disable inlining; all data lands in S3
      immediately; catalog holds only metadata). Trade-off: flush-on-write is safest but adds per-write
      latency; option (c) loses the inlining optimisation for small writes. Resolve at T2.19 / FP-B.

      Resolved direction (CD.33, pending Decision 81): option (c) -- inlining DISABLED (inlined_rows=0) for
      governance tables; writes land in S3 immediately (no catalog-only durability window); small files
      compacted by a daily non-destructive merge_adjacent_files, with destructive GC on a separate guarded
      cadence. Per-table: telemetry may retain inlining. Supersedes the v1 option-(b) direction.
      Enacted at T2.18.

      Re-resolved (CD.34): inlining is DISABLED for ALL tables INCLUDING telemetry (inlined_rows=0) -- this
      SUPERSEDES the "telemetry may retain inlining" carve-out above, because on Neon's ~6h free-tier PITR no
      table may be catalog-only-durable. High-write-rate tables get a higher-frequency merge to absorb the
      small-file load (T2.18 co-tunes the GC circuit breaker). Enacted at T2.18.

  - id: OQ.12
    question: DuckLake version and DuckDB upgrade policy -- lockstep constraint + clone-rehearsal gate
    resolution_tier: T2.17
    notes: |
      DuckLake v1.0 is lockstep with DuckDB 1.5.3: the catalog schema, the DuckLake extension, and DuckDB
      must all upgrade together. There is no in-place catalog migration tooling across version bumps. Options
      for upgrade path: (a) clone-rehearsal gate -- clone the catalog to a staging schema, upgrade DuckLake
      + DuckDB there, run the full maintenance cycle, confirm data integrity, then promote; (b) blue/green
      catalog -- provision a new catalog alongside the old one, replay writes to both during the cutover
      window, then retire the old catalog. The version pin (v1.0 / DuckDB 1.5.3) is set at T2.17; the
      upgrade policy is chosen at T2.17 implementation and documented in docs/runbooks/ducklake-catalog-operations.md (OQ.12).

  - id: OQ.13
    question: NS.1 generalisation -- "S3 + Iceberg" to "S3 + open table format"
    resolution_tier: CD.31
    notes: |
      NS.1 currently reads "S3 + Iceberg at every scale" -- naming Iceberg specifically. Under DuckLake
      adoption the operational tables would use DuckLake (not Iceberg). Options: (a) generalise NS.1 to
      "S3 + open table format" (covers both Iceberg for market-data and DuckLake for ops/telemetry);
      (b) retain "S3 + Iceberg" and treat DuckLake as an implementation detail beneath the NS.1 engine
      principle (defensible since NS.1 governs compute-swappability, not the specific table format).
      CD.23 precedent: NS tensions are resolved via a pending CD. NS.1 text is UNCHANGED by this roadmap
      edit; the generalisation lands at CD.31 ratification via the log-decision path + FP-B follow-on.

  - id: OQ.14
    question: Catalog multi-tenancy -- shared ops-RDS-schema vs dedicated instance vs per-env catalog
    resolution_tier: FP-C
    notes: |
      The ops catalog is provisioned in its own schema (T2.16) for clean separability. The future
      market-data catalog (FP-C assessment) raises a multi-tenancy question: (a) shared ops-RDS-schema
      (single RDS instance, separate schemas for ops and market-data; lowest cost; coupling risk);
      (b) dedicated larger instance for market-data (cleaner isolation; higher cost); (c) per-environment
      catalog (separate RDS per E.env.2 environment -- dev/staging/prod -- adds operational complexity).
      Deferred to FP-C after the ops catalog validates the approach at billions-of-rows scale. The ops
      catalog schema provisioned in T2.16 is designed for clean separability to support any of these paths.

      Note (CD.34): on Neon the multi-tenancy primitives re-map from "shared ops-RDS-schema vs dedicated
      instance" to "shared Neon project + separate databases" vs "separate Neon projects per env" (Neon
      branching fits per-env catalogs). The question stays open (FP-C); only the option wording updates.

