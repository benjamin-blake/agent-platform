  - id: CD.10
    title: Agent Tooling Platform = Lambda per tool; replaces ops_data_portal as agent surface
    detail: |
      Internal-only tooling surface. Six Lambdas (log-rec, update-rec, log-decision, query,
      list-tools+describe, maintenance). Invoked via boto3 or Function URL + AWS_IAM auth (sigv4-signed).
      Two IAM principals are recognized: PlatformDev (default; daily writes via log_rec/update_rec/log_decision,
