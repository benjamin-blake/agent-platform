  - id: KG.13
    gap: Test Impact Analysis + result caching deferred to executor scale
    notes: |
      Coverage-based Test Impact Analysis (run only tests whose input closure intersects the diff; e.g.
      pytest-testmon) + content-addressed result caching is the scalability mechanism that lets "every
      verification stays confirmed" hold without re-running everything. It is NOT a pre-executor blocker:
      T4.1 sets executor concurrency = 1 and at ~100 recs/month a cached-full suite is tolerable. It becomes
      load-bearing when T4.4 raises concurrency above 1. Preconditions: T3.6 hermeticity (caching requires
      hermetic tests) AND the T3.1 graduation registry's per-check guard-target / input-closure metadata (TIA
      selects by input closure, which only the registry records). Cross-references Decision 73's existing Known
      Gap note that `pytest --picked` may upgrade to pytest-testmon. File a tier_item (T4.4-era) when executor
      concurrency rises.

      T3.6 hermeticity precondition [SATISFIED 2026-06-25: c1-c4 met via PLAN-t3-6-hermeticity-closeout; c5 rehomed to T1.6]; remaining precondition is the T3.1 graduation registry.

      Near-term wall-clock wins are DISTINCT from this deferred TIA/caching gap and are available now (no
      executor-scale / hermeticity precondition): the big structural win is T1.6 (live-reader DQ leaves the
      blocking gate); the lighter levers are dependency slimming (torch CPU-only wheel, lazy pysr import) +
      parallel execution (pytest-xdist) + validate_requirements hygiene. Per Decision 80 the build-orchestrator
      / TIA revisit trigger is a recurring measured `_FAST_TIER_BUDGET_SECONDS` breach (the ~30-min run is one);
      the near-term levers are filed as recs, not roadmap items (tactical, not direction).
