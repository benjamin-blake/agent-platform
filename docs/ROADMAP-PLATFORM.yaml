  - id: CD.27
    title: Executor compute substrate = Step Functions + Lambda Durable Functions + Lambda (per-step decomposition)
    detail: |
      Replaces the Fargate-as-single-executor-substrate decision (CD.11 Fargate-as-executor clause). The
      per-rec plan->critique->implement->review loop is natively a state machine, not a single long-running
      process. Substrate decomposes into three cleanly-separated layers:

        1. Step Functions (workflow orchestration substrate)
           One Step Functions execution per rec. The state machine carries rec_id, branch_slug, plan_s3_uri,
           and per-step verdicts as execution state. Native Parallel state fans out critic personas. Native
           Choice state routes critique aggregation (back to plan_agent on block; forward to implement_agent
           on pass). Native retry policies are deterministic-only -- LLM-judgment failures escalate via the
           rec/RCA path per Decision 55 (RCA-first executor). Step Functions Standard Workflows support
           executions up to 1 year, so the umbrella per-rec lifecycle is durable end-to-end.

        2. Lambda Durable Functions (agent-persona execution substrate)
           Each agent persona (plan_agent, plan_critic, decision_scout, implement_agent, code_reviewer)
           runs as a Lambda Durable Function. Iterative read-code -> call-LLM -> tool-use -> emit-output
           loops are checkpointed step-by-step inside the Lambda; on timeout, the next invocation replays
           from the last completed checkpoint and skips completed tool calls. This eliminates the 15-minute
           Lambda ceiling that originally drove the Fargate decision -- per-persona loops can now run
           arbitrarily long via checkpointed replay without losing in-flight state. Each Durable Function
           writes its substantive artefact (plan markdown, critique verdict, diff) to S3 and returns the
           S3 URI to the Step Functions state, keeping payload under the 256 KB transition limit.

        3. Lambda (deterministic glue)
           Regular Lambdas handle cheap deterministic tasks: pick_rec (poll priority queue), prepare_workspace
           (clone + branch + worktree), critique_gate (aggregate parallel critic verdicts; route), file_pr
           (idempotent PR creation), emit_telemetry (final session-close emission). Each invocation is
           sub-15-minute by construction.

      Long-running deterministic steps that genuinely exceed 15 minutes (e.g. a full pytest suite,
      terraform apply against the personal account, large data migration) use the Step Functions ECS Run
      Task synchronous integration -- arn:aws:states:::ecs:runTask.sync -- as an escape hatch. Fargate is
      not eliminated from the architecture; it is demoted from "the executor's primary substrate" to "the
      long-step escape hatch within the executor's Step Functions orchestrator."

      Industry precedent and substrate-existence verification:
        - AWS Lambda Durable Functions launched at re:Invent 2025 (December 2025); GA in US-East (Ohio)
          + 13 additional regions December 2025; expanded to 16 additional regions including eu-west-2
          (London) April 2026; documented at https://docs.aws.amazon.com/lambda/latest/dg/durable-functions.html.
          Supported runtimes: Python 3.13/3.14, Node.js 22/24, Java 17+. Max execution duration: 1 year.
          Checkpoint-replay model: on Lambda timeout, next invocation replays the event handler from start
          and skips completed durable operations (Steps/Waits). Verified availability in eu-west-2 (the
          project's region) as of 2026-05-27.
        - Step Functions has been the ratified workflow orchestrator in this codebase since Decision 39
          (April 2026). This CD extends the Decision 39 primitive to the executor's per-rec loop, not
          introducing a new substrate.

      Relationship to existing decisions:
        - Cites Decision 39 (Step Functions over Airflow) as precedent. The orchestrator choice is already ratified.
        - Preserves Decision 55 (RCA-first executor) verbatim. Step Functions retry policies are deterministic-only.
        - Replaces CD.11's Fargate-as-executor-substrate clause. Fargate-via-ECS-Run-Task retained as escape hatch.
        - T4.3 (scheduled-agent loop) substrate choice remains open between Step Functions scheduled execution
          and self-hosted runner cron (Decision 68); CD.27 keeps both options available; T4.3 atomic plans decide.
    gates: [T4.1, T4.2, T4.3, T4.4]
    state: pending
    filed_via: pending_log_decision_lambda
    narrowly_supersedes:
      decision_id: "CD.11"
      clause: |
        Fargate-as-executor-substrate clause. Step Functions + Lambda Durable Functions + Lambda is the
        new executor substrate. Fargate retained for ECS Run Task escape-hatch integration within Step
        Functions for steps that genuinely exceed 15 minutes (full pytest, terraform apply, etc.).
    discipline_points:
      - One Step Functions execution per rec (clean lifecycle scoping).
      - Agent personas as Durable Functions, not as regular Lambdas. Regular Lambdas are deterministic-only.
      - Large artefacts (plans, diffs, transcripts) pass via S3 pointer pattern in Step Functions state. Payload stays well under the 256 KB transition limit.
      - ECS Run Task escape hatch is the ONLY remaining Fargate path. Long-running agent loops are NOT a Fargate use case under CD.27 -- they are a Durable Function use case.
      - Step Functions retry policies are deterministic-only. LLM-judgment failure escalates via the rec/RCA path (Decision 55), never via automatic LLM-call retry-on-bad-output.
      - Lambda Durable Functions maturity monitoring -- the service is ~5 months in GA at the time of CD.27 ratification. If API semantics regress within the first 12 months, fall back to self-checkpointed Lambda with state in DynamoDB (intentional re-evaluation trigger; recorded as an INTENT Open Question for re-eval at each T4.2 atomic-plan filing). Track via T4.2 exit criterion "checkpoint-replay verified" and the Health Signal "Lambda Durable Function checkpoint-replay rate" (INTENT line surfaces alarm threshold).
      - T4.2 "stable for 14 days" operational definition (required for the CD.17 reversal trigger). Across the 14-day grace window: per-persona checkpoint-replay rate < 5%; per-rec success rate >= rolling 7-day baseline; zero unrecovered failures (Decision 55 stop-clean-and-RCA path counts as recovered if a rec was filed); cost-per-rec rolling avg within 1.5x rolling 7-day baseline. Trigger fires only when ALL personas' executions satisfy these per-signal thresholds for the full 14-day window. This is the explicit semantic definition replacing the pre-CD.27 "Fargate handler runs the loop end-to-end without recovery agent" implicit definition.
      - T4.x atomic-plan template: each T4.x atomic plan must declare Plan Type IMPLEMENTATION (STRATEGIC remains suspended per AGENTS.md Temporary Operational Constraints) and must include the CD.16 + Decision 67 deferred-deployment markers in its execution steps. T4.2 in particular splits per-persona; not all personas need to land in the same window.

  - id: CD.28
    title: LLM inference = DeepSeek-direct via LiteLLM (Tier 1); Anthropic-direct (Tier 2); Bedrock retired from architecture
    detail: |
      Replaces CD.7 (LLM inference stays on Bedrock) in full. The executor's primary inference path becomes
      direct DeepSeek API via LiteLLM. Bedrock is retired from the architecture as an LLM substrate -- no
      longer Tier 1, no longer Tier 2 escape hatch, no longer warm-fetched. Anthropic-direct via LiteLLM
      becomes the Tier 2 escape hatch for Claude-class judgment when DeepSeek underperforms or is unavailable.

      Tier model under CD.28:
        - Tier 1 (active, primary): DeepSeek-direct via LiteLLM. Models: deepseek/deepseek-chat,
          deepseek/deepseek-reasoner; aliases remap to deepseek-v4-flash post-2026-07-24 per upstream
          deprecation. Native context caching ($0.0252 input cache-hit per 1M tokens) applies to repeated
          repository-context prefixes with no client opt-in (hash-based on DeepSeek's side).
        - Tier 2 (warm-fetched escape hatch): Anthropic-direct via LiteLLM. Funded by the user's Claude Code
          Max x5 subscription programmatic-pool credit (~$100/month, no rollover, spillover at API rates
          per Anthropic's June 2026 billing model). Activated when DeepSeek API is unavailable or when
          executor needs Claude-class judgment for a specific call. Credential validated on every harness
          cold start regardless of routing tier (escape hatch must be warm).
        - Tier 3 (deferred): OpenRouter. Unchanged from existing INTENT.

      Economic rationale (the load-bearing driver):
        - Bedrock DeepSeek V3.2: $0.62 input / $1.85 output per 1M tokens.
        - DeepSeek direct API: $0.252 input / $0.378 output per 1M tokens.
        - Ratio: ~2.5x input, ~4.9x output. At cost_projection executor inference scale, direct API
          reduces monthly executor inference from $50-200 to ~$10-40 plus near-free cache hits on the
          repository-context prefix.
        - DeepSeek is EXCLUDED from Bedrock's 50%-off Batch billing mode (eliminating the standard
          Bedrock cost-optimisation path for this model family).
        - DeepSeek's native context caching is unavailable on Bedrock because Bedrock prompt caching
          covers only Anthropic + Nova model families. Going direct unlocks the caching path.

      Architectural rationale (the secondary driver):
        - INTENT-provider-agnostic-executor.md's North Star is "swapping a model is a config change, not
          a code change; swapping a provider is a config change plus a credential change." LiteLLM as
          the Layer-1 inference protocol abstraction is already committed. CD.28 changes the active
          provider tier without touching the abstraction layer.
        - The "single-vendor commitment" Non-Goal in the INTENT explicitly allows the active provider to
          change as economics shift.
        - Decision 47 (Bedrock revocation/restoration lesson) emphasised the lock-in cost of single-vendor
          dependency. Tier 2 Anthropic-direct preserves the warm-fetched-escape-hatch principle that
          Decision 47 motivated; the substrate just changed.

      Known considerations (not blocking):
        - Production fallback funded by a personal subscription credit pool creates a future cost-monitoring
          item if executor volume scales past Max x5 programmatic pool sizing. Recommendation when volume
          warrants: file rec to provision an org-billed Anthropic API key as overflow credential.
        - Bedrock's eu-west-2 IAM-native auth + data-residency advantage is lost. Mitigation: DeepSeek API
          and Anthropic API both serve from regions outside the EU; data residency requires care for any
          PII handling. Executor input is repository code + ops-table rows -- no end-user PII -- so the
          residency loss is acceptable for the current use case.
        - AWS Cost and Usage Report (CUR) no longer captures the executor's LLM spend because Bedrock is
          out of the LLM substrate. Cost reconciliation moves to per-provider invoice export (DeepSeek
          dashboard + Anthropic Console). The previous "AWS CUR is authoritative for executor inference"
          operational discipline is retired by CD.28; the new authoritative source is per-provider invoice
          export, reconciled monthly against telemetry est_cost_usd. The reconciliation job itself is
          named as a follow-on (see discipline_points below) -- declared but not yet built.
        - Tier 2 (Anthropic-direct) boot validation contract enhancement. The simple key-shape probe
          (POST /v1/messages with a 1-token request) returns 200 OK while the Max x5 programmatic-pool
          credit may be exhausted -- the next billable call then fails with 429/insufficient_quota.
          Per-CD.28 discipline-point: Tier-2 boot validation must include a usage-API query (Anthropic
          /v1/organizations/usage if available) and assert >10% remaining pool capacity before declaring
          the escape hatch healthy. If usage-API unavailable, fall back to a minimal billable token probe
          + sentinel exception handling. Implementation lands in T4.2's `PLAN-llm-client-litellm-transport`
          precursor plan.

      Relationship to existing decisions:
        - Fully supersedes CD.7 (LLM-on-Bedrock primary clause). Bedrock leaves the architecture entirely.
        - Supersedes Decision 40 (Copilot SDK + Bedrock planning, decided-deferred). Both halves moot --
          Copilot SDK retired via Decision 49 (LiteLLM subsumes the BYOK pattern); Bedrock-as-planning-
          backend retired by this CD.
        - Aligns with Decision 49 (Copilot SDK retirement). Reconciliation note: Decision 49 retired
          Copilot SDK as a Lambda inference provider for SCHEDULED AGENTS specifically (the path used in
          .github/agents/schedule.yaml with provider: copilot-sdk). CD.28 commits the executor (T4.x)
          and any non-agentic LLM call site to LiteLLM-only. The scheduled-agent provider state remains
          governed by Decision 49 until the follow-on PLAN-resolve-scheduled-agent-provider lands (see
          Follow-on plan inventory below) -- at which point scheduled agents also move to LiteLLM,
          retiring the last Copilot SDK code path. CD.28 does NOT immediately retire schedule.yaml's
          copilot-sdk provider -- that's the follow-on plan's job.
        - Preserves Decision 47 (lock-in lesson) via Anthropic-direct serving the warm-fetched-escape-hatch role.
        - Preserves INTENT-provider-agnostic-executor.md's LiteLLM Layer-1 commitment. The provider
          adapter changes its routed tier; the abstraction does not change.

      Follow-on plan inventory (surfaced by the multi-perspective deliverable critique 2026-05-27):
        Each entry names a code-or-doc surface that CD.28 retires architecturally but does NOT sweep
        in the REPORT-ONLY plan that filed it; the follow-on is the right home for cleanup work. Each
        follow-on plan must be filed via /plan; Lambda-packaged subsets inherit CD.16 per-Lambda gating
        + Decision 67 deferred-deployment markers until dispatcher Lambda re-enables.

        - PLAN-retire-copilot-sdk (priority medium)
          Scope: delete scripts/copilot_sdk_client.py; sweep references (CLAUDE.md,
          .github/copilot-instructions.md, docs/PROJECT_CONTEXT.md, docs/contracts/copilot-cli.md if
          applicable); retire copilot_wrapper.py if no remaining consumers.
          Gating: pure code deletion + docs sweep; consumer-Lambda deletions inherit CD.16 per-Lambda
          gating.
          Rationale: Decision 49 already retired Copilot SDK as a primary path; CD.28 confirms LiteLLM
          subsumes the BYOK pattern. Dormant file is dead code.

        - PLAN-retire-bedrock-code-paths (priority high)
          Scope: delete scripts/bedrock_client.py (347 LoC); remove _bedrock_call + _get_bedrock_credentials
          + _PRICING Bedrock entries from scripts/llm_client.py; remove _invoke_bedrock + Bedrock
          dispatch branches from src/data/handlers/scheduled_agent_handler.py; sweep Bedrock provider
          defaults / pricing tables from scripts/model_registry.py, scripts/copilot_wrapper.py, and
          scripts/copilot_multipliers_refresher.py (each contains residual Bedrock references that
          must be co-retired); remove bedrock:Invoke* grants from terraform/lambda_tooling_iam.tf
          (the lines around 118-126 at the time of this CD) and from docs/runbooks/policies/
          platform-dev-daily-ops.json; drop verifier check bedrock_via_chain from
          scripts/verify_platform_account.py; clean T0.3 exit criterion (mark satisfied without
          the bedrock_via_chain entry); update Bedrock-referencing test files in lockstep with
          the production sweep -- tests/test_llm_client.py, tests/test_verify_platform_account.py,
          tests/test_build_lambda.py, tests/test_scheduled_agent_handler.py.
          Gating: touches Lambda-packaged code (scheduled_agent_handler.py, llm_client.py) -- inherits
          CD.16 per-Lambda gating + Decision 67 deferred-deployment markers until dispatcher Lambda
          re-enables. Other files (bedrock_client.py deletion, terraform IAM, verifier) are non-Lambda
          and can land freely.
          Rationale: CD.28 retires Bedrock from the architecture but dispatch-active code paths remain.
          Leaving live code paths to a retired substrate is a confused-architecture anti-pattern that
          violates the agent-first repository principle (machine-parseable canonical state should match
          actual code state).

        - PLAN-update-inference-provider-contract (priority high)
          Scope: update docs/contracts/inference-provider.md to reflect CD.28 tier model (Tier 1 =
          DeepSeek-direct via LiteLLM; Tier 2 = Anthropic-direct via LiteLLM; Tier 3 = OpenRouter
          deferred; Bedrock retired). Remove provider: bedrock and provider: copilot-sdk from the active
          provider set. Update validate.py provider-routing check to enforce the new tier model.
          Coordinate with T-1.14 (the contract-conversion plan for inference-provider.md to
          inference-provider.yaml) -- T-1.14 should consume CD.28-aligned content, not pre-pivot content.
          Gating: pure docs + validator-rule change; not Lambda-packaged.
          Rationale: inference-provider.md is the canonical contract authority for the inference-provider
          boundary; leaving it on the pre-pivot tier model creates the exact agent-first-repository drift
          CD.13 + CD.25 are designed to prevent.

        - PLAN-resolve-scheduled-agent-provider (priority medium)
          Scope: migrate .github/agents/schedule.yaml entries from provider: copilot-sdk to provider:
          litellm with tier-1 (DeepSeek) or tier-2 (Anthropic) model selection per agent. Update
          src/data/handlers/scheduled_agent_handler.py to dispatch via LiteLLM (likely concurrent with
          or after PLAN-retire-bedrock-code-paths). Decision 49's Copilot SDK commitment for scheduled
          agents is retired by this plan; file as the formal supersession.
          Gating: touches Lambda-packaged code (scheduled_agent_handler.py) and schedule.yaml --
          inherits CD.16 per-Lambda gating + Decision 67 deferred-deployment markers.
          Rationale: CD.28 commits the architecture to LiteLLM-only; scheduled-agent provider state
          must reconcile or the architecture is internally contradictory.

        - PLAN-cost-reconciliation-job (priority low)
          Scope: build the monthly per-provider invoice-export-vs-telemetry-est_cost_usd reconciliation
          job referenced in INTENT Cost Attribution. Implementation: (a) ingest DeepSeek dashboard CSV
          export + Anthropic Console invoice; (b) compute monthly totals from telemetry_model_calls;
          (c) emit reconciliation report; (d) file rec via log-rec on discrepancy > 5%.
          Gating: new Lambda OR scheduled GH Actions workflow on self-hosted runner; touches no
          existing Lambda-packaged code; can land immediately as a new package.
          Rationale: INTENT declares the reconciliation job as the authoritative cost source but the
          job does not exist; closing the gap before it becomes a load-bearing audit failure.

        - PLAN-sweep-bedrock-docs-references (priority low)
          Scope: sweep remaining Bedrock-as-live references in .github/copilot-instructions.md,
          docs/PROJECT_CONTEXT.md, and any other doc surface that loads as ambient context. Update to
          reflect CD.28 tier model.
          Gating: pure docs sweep; can land immediately.
          Rationale: Ambient-context docs that describe the architecture as Bedrock-primary mislead any
          agent that loads them.
    gates: [T0.4, T4.1, T4.2, T4.3, T4.4]
    state: pending
    filed_via: pending_log_decision_lambda
    supersedes_decisions: [40, "CD.7"]
    discipline_points:
      - LiteLLM is the only Layer-1 inference protocol surface. Direct provider-SDK imports are forbidden in the executor and in scripts/llm_client.py.
      - Tier 2 Anthropic-direct credential is validated at every harness cold start, regardless of which tier the executor routes to for the next call. Warm-fetched escape hatch is non-negotiable. Validation contract -- key-shape probe + usage-API query (Anthropic /v1/organizations/usage) with >10% remaining pool assertion; fall back to minimal billable token probe if usage-API unavailable. Implementation lands in `PLAN-llm-client-litellm-transport` precursor plan under T4.2.
      - Tier 1 DeepSeek-direct credential rotation cadence -- quarterly, calendar-reminded, via Secrets Manager versioning. Same pattern as Anthropic-direct.
      - Cost-monitoring follow-on -- file rec for org-billed Anthropic API key once executor volume sustains > 70% of Max x5 programmatic pool over a 30-day window.
      - Prompt cache strategy on DeepSeek is hash-based and automatic -- no client breakpoint placement required. This simplifies Layer-3 (agent loop) compared to the Bedrock cachePoint design previously planned in INTENT.
      - Bedrock IAM policies in T0.3 (PlatformDev DailyOps `bedrock:InvokeModel`) become vestigial-but-harmless. Annotated as such in T0.3; not removed (avoids re-Terraform churn). Retirement is tracked under PLAN-retire-bedrock-code-paths in the follow-on plan inventory below.
      - Cost-projection numbers in this CD reference DeepSeek V3.2 pricing as of 2026-05-27 ($0.252 input / $0.378 output per 1M tokens; $0.0252 cache-hit input). Spot-check arithmetic at typical executor scale (100 recs/month, ~50K input + ~10K output tokens/rec, ~80% prefix cache-hit) yields ~91% cost reduction vs Bedrock-DeepSeek -- the headline ~75% figure in cost_projection is intentionally conservative; the realised savings should exceed it.

  - id: CD.29
    title: Validation suite is a graduated, deduplicated, machine-curated asset; verification graduates into validation; hard-gate by default behind a hermeticity precondition
    detail: |
      The repo-wide validation suite (scripts/verifiers/ wired into validate.py + executor postflight) is the
      deduplicated union of GRADUATED per-rec verifications, not an append-only pile. Model:
        - Per-rec verification (executor-side) and repo-wide validation (CI-side) are distinct questions --
          "did this change do what the rec asked" vs "is the repo still sound" -- and neither subsumes the
          other. Verification can do differential/baseline checks (fail-before/pass-after) that validation
          structurally cannot; validation runs the full closure that per-rec verification deliberately scopes
          down. Both are required (defence in depth).
        - Checks are typed. A small CLOSED kernel of deterministic primitives (command_exit_zero,
          command_output_matches, file_exists/file_absent, grep_count, test_selector, metric_under_threshold)
          reduces "what to verify" (per-implementation judgement, authored at plan time) to "run + compare"
          (deterministic, harness-owned). This kernel is governed by its OWN closed vocabulary, orthogonal to
          the CD.12 DQ-marker vocabulary, and is extendable only by a new candidate decision (mirrors CD.12's
          discipline). It does not consume the CD.12 marker budget.
        - Graduation lifecycle: a per-rec verification that passes and whose PR merges is promoted into the
          cumulative suite, recorded in a graduation registry (Class A governed-data contract per CD.25,
          docs/contracts/verification-registry.yaml; cross-system fields $ref into Class C invariants) indexed
          by what it guards (input closure / target symbol). It is row-bearing governed data, hence Class A,
          not a Class C cross-system invariant.
          Admission gate: the differential property -- a candidate must demonstrably FAIL on revert of the
          change it guards, else it guards nothing and is rejected (kills tautological tests at the door).
        - Hard-gate by default: every check has a defined consequence. In a human-out-of-loop system an
          advisory check nothing acts on is dead weight that trains the system to tolerate red. Per-check
          severity defaults to `required` (blocks); the only non-blocking state is a transient `quarantine`
          for flakes that files a rec (RCA-first, Decision 55), never a permanent `advisory`.
        - Hermeticity is the precondition. Hard-gating the behavioural tier is only safe once those checks are
          hermetic (env-stripped, no network, deterministic) -- flakiness is precisely WHY the legacy
          `verification` field was advisory. The hermeticity audit (T3.6) therefore precedes the hard-gate
          consolidation.
        - Meta-validation keeps the suite's PURPOSE honest (T3.7): mutation testing confirms graduated checks
          kill mutants on their target; deterministic dead/redundant-test detection retires checks whose guarded
          target no longer exists. Both are alarm-not-gate (CD.12) and file recs; retirement follows the CD.12
          mark-then-drop discipline (deprecate in registry, follow-on plan deletes), never auto-delete, never an
          LLM scan.
      Consolidation discipline (lands in T0.12.5): today `acceptance` is the Class A rec field (src/schemas/
      rec.py, DqNotNull write_time) consumed as a hard gate (run_acceptance), while `verification` is an
      EXECUTOR PROJECTION field (scripts/executor/jsonl_store.py, read advisory via run_verification) -- it is
      NOT in the Class A schema. The consolidation KEEPS the Class A field name `acceptance` (no breaking
      rename; the DQ runner, portal write-path, acceptance_lint.py, ops.yaml, and the ~36 backfilled recs are
      untouched at the field-name level) and EVOLVES its value into a typed checks structure: a list of checks,
      each with a `type` (a CD.29 kernel primitive -- preserves the behavioural-vs-mechanical distinction the
      two paths encoded) and a `severity` (default required/hard-gate; transient `quarantine`, never permanent
      advisory). The executor's advisory `verification` projection is absorbed as additional typed checks on the
      same field. A scalar-string `acceptance` stays valid via a backward-compatible scalar-or-list union during
      migration. Folded into the ops_recommendations Class A contract ratification (T0.12.5) so it is not a
      post-ratification semantic break (CD.25).

      Field-shape-vs-enforcement skew (MED -- both deliverable critics): the typed-checks field SHAPE (incl.
      severity default required) ratifies at T0.12.5, but the executor cannot HARD-GATE the behavioural tier
      until T3.6 (hermeticity) + T3.1 land. In that window a rec may carry severity: required checks the executor
      still treats as advisory (execute_recommendation.py keeps verification advisory today). This is recorded
      explicitly via the contract amendment_log change_class, not left as a silent gap.
    gates: [T3.1, T3.6, T3.7, T0.12.5]
    state: pending
    filed_via: pending_log_decision_lambda
    discipline_points:
      - The `checks` kernel is a closed vocabulary governed by this CD; adding a 7th primitive requires a new candidate decision (mirrors CD.12's DQ-marker discipline). It is orthogonal to and does not consume the CD.12 marker budget.
      - Verifiers and the graduation registry are platform machinery; recs touching scripts/verifiers/ or the registry are automatable: false (Decision 44).
      - Per-rec verification graduates into validation only after the differential admission gate passes; the registry records the guard target so orphan detection (T3.7) is deterministic.
      - Hard-gate-by-default applies to the behavioural tier only after T3.6 (hermeticity); mechanical checks (command_exit_zero) are hermetic by construction and hard-gate immediately.
      - Scheduled meta-validation (T3.7) is alarm-not-gate and runs on a GitHub Actions schedule, NOT a Lambda -- it does not re-introduce the separate-scheduled-DQ-routine that Decision 62 retired (mutation is too slow for presubmit and is advisory, not a merge gate).
      - CD.29 changes the platform verification DEFAULT from advisory (the current run_verification behaviour) to required/hard-gate. This is a deliberate semantic change, enforced only after T3.6; no prior numbered Decision is superseded because the advisory behaviour was an executor implementation default, not a ratified decision.
      - Precedence: when the executor's per-rec checks (executor-side) and the CI validation gate including diff-coverage (CI-side) both apply, CI is authoritative per the AGENTS.md merge protocol (remote CI is the authoritative pre-merge gate).

  - id: CD.30
    title: Diff-line-coverage ratchet supersedes the per-changed-file 100%-coverage gate
    detail: |
      The current coverage gate (scripts/test_coverage_checker.py, wired into validate.py) enforces
      per-changed-file 100% line coverage: it runs over get_changed_source_files() and fails any CHANGED file
      below 100%. It is already diff-scoped -- unchanged files are never measured -- so it is NOT a global gate.
      This per-changed-file floor is the V2-tier minimum mandated by Decision 48 ("pytest with 100% coverage"),
      operating alongside the Decision 60 / Decision 73 two-tier (--pre vs full) structure (F.3).

      Replace the per-changed-file 100% FLOOR with a diff-line-coverage ratchet:
        - Require coverage on CHANGED LINES (not whole changed files) for every PR -- a touched file may sit
          below 100% as long as the lines the PR actually changed are covered.
        - Global coverage may only ratchet UPWARD -- a PR may not lower the repo-wide percentage.
      Rationale: per-changed-file 100% forces full coverage on every touched file even for lines the PR did not
      change, a frequent source of low-value test churn (the actual cost -- NOT "expense as the repo grows,"
      since unchanged files are already exempt). And 100% line coverage is necessary-not-sufficient (100% with
      weak assertions passes), so mutation testing (CD.29 / T3.7) is the real quality signal. Diff-line-coverage
      is more surgical and harder to game on the changed surface. The Decision 60 / Decision 73 two-tier
      structure is unchanged; only the coverage minimum changes.

      Propagation (HIGH -- both deliverable critics): relaxing the V2 minimum edits the V2 row of Decision 48's
      tier table, which is also keyed off by config/agent/executor/prompts/critique.prompt.md and the planning
      skill. At CD.30 ratification those consumers MUST be amended in lockstep (see discipline_points). This
      roadmap edit does NOT touch DECISIONS.md or the prompt -- those land at ratification via the log-decision
      path and a named follow-on plan.
    gates: [T3.7]
    state: pending
    filed_via: pending_log_decision_lambda
    narrowly_supersedes:
      decision_id: 48
      clause: The V2-tier minimum (per-changed-file 100% line coverage). The V2 tier now requires diff-line-coverage-on-changed-lines plus an upward-only global ratchet; Decision 48's broader V1/V2/V3 classification is otherwise preserved. Decision 48's V2-row text and critique.prompt.md must be amended in lockstep at ratification.
    discipline_points:
      - Diff-coverage threshold and the ratchet baseline are config-driven; the global baseline only moves up, never down. The initial global baseline is captured at T3.7 implementation (computed from the current suite and stored in a governed config/state file); the ratchet compares each PR against that stored value.
      - The ratchet is enforced in scripts/validate.py; test_coverage_checker.py is retargeted from the per-changed-file 100% floor to diff-line-coverage + ratchet, not run as a separate parallel gate.
      - Lockstep consumers at ratification (follow-on plan, via log-decision for the Decision text): Decision 48 V2-row text, config/agent/executor/prompts/critique.prompt.md (V3 behavioural-acceptance language), and the planning skill's tier-classification guidance. Until amended they enforce the old per-file-100% minimum.

  - id: CD.31
    title: Adopt DuckLake for the operational lakehouse (ops + telemetry tables)
    detail: |
      This roadmap edit does NOT touch DECISIONS.md and does NOT change any numbered Decision's status.
      The proposed supersessions of Decisions 50, 56, 51, 69 and any NS.1 generalisation land at
      ratification via the log-decision path and the FP-B follow-on IMPLEMENTATION plan -- exactly
      mirroring CD.30.

      PROPOSAL: replace the Iceberg-based ops/telemetry write path and the DuckDB-on-Iceberg read path
      with DuckLake v1.0 -- a metadata-in-RDS-PostgreSQL + data-in-S3-Parquet open table format natively
      embedded in DuckDB. Scope: ops and telemetry tables ONLY (ops_recommendations, ops_decisions,
      ops_priority_queue, ops_execution_plans, ops_session_log, and all telemetry tables). Product tables
      (D.lake.*, market_data Iceberg tier) REMAIN Iceberg per the KG.1 platform/product boundary; a
      market-data DuckLake assessment is deferred to FP-C.

      Catalog backend: a dedicated micro RDS PostgreSQL instance -- db.t4g.micro, single-AZ, gp3 storage,
      PITR enabled, provisioned in its own schema for clean separability (T2.16). The catalog is a durable
      metadata store (a Glue-analog), NOT a query engine; DuckDB performs all computation against
      S3-backed Parquet data. This framing keeps NS.1 ("compute is interchangeable; storage is durable;
      engines do not govern the data layer") intact. Aurora DSQL was considered but dropped as unvalidated
      against DuckLake's PG12+/SQL-92/PK-based-OCC contract. NS.3 explicitly supports a small managed
      cloud state-store; the always-on RDS instance contradicts no existing decision.

      VPC-attach for DuckLake Lambdas (to reach RDS) does NOT alter the Function-URL + AWS_IAM ingress
      surface (CD.10 / NS.5): VPC config governs egress; the Function URL is ingress. The consequence is
      that egress to extensions.duckdb.org is blocked by the VPC egress rules -- the DuckLake + httpfs
      extension layer must be pre-baked into a Lambda layer (T2.17).

      Doc-research findings driving OQ.7-OQ.14:
        - DuckLake v1.0 has NO Iceberg metadata export and NO external-engine reader: Athena/Trino cannot
          read DuckLake tables. ducklake_add_data_files() is import-only AND dangerous (ownership transfers
          to DuckLake; compaction can delete the registered files). The CD.15 Athena escape hatch has no
          export-based mitigation today -> OQ.7.
        - Partitioning IS available via ALTER TABLE ... SET PARTITIONED BY (a metadata-only operation).
          The spike's CREATE TABLE PARTITION BY parser error was the correct signal but the wrong conclusion
          -- ALTER is the mechanism. Reconciles CD.9 (see CD.9 amendment).
        - The catalog is the lakehouse single point of failure: snapshots are catalog rows; un-flushed
          inlined data (default threshold 10 rows) lives only in the catalog. No catalog-format migration
          tooling spans the lockstep spec+extension+DuckDB version bump -> OQ.9 + OQ.12.
        - DuckLake is OCC + snapshot-isolation; even single-writer Lambda overlap can collide on
          snapshot_id; DDL and ALTER-table writes hard-abort on conflict -> OQ.10.
        - expire_snapshots != delete: S3 grows unless cleanup_old_files + delete_orphaned_files are also
          scheduled. Maintenance is in-engine CALL functions -> T2.18.
        - Un-flushed inlined data is durable only in the catalog, not in S3 -> OQ.11.

      Proposed supersessions (at ratification only -- NOT enacted by this roadmap edit):
        - Supersedes Decision 50 (append-only-Iceberg write path -> append-only-DuckLake write path;
          same append semantics, new format).
        - Supersedes Decision 56 (SCD2 schema reproduced in DuckLake; optionally extended by
          ducklake_table_changes CDC and time-travel for richer audit).
        - Supersedes Decision 51 (JSONL-staging write path -> DuckLake writer; the Decision 69
          Single-Portal invariant is PRESERVED -- all ops writes still go through the portal, only the
          underlying staging mechanism changes from local-file outbox to DuckLake writer).
        - Supersedes Decision 69 (JSONL outbox staging replaced by DuckLake writer; Single-Portal
          primitive-level invariant is preserved, not removed).

      Amends (factual reconciliations -- effective on CD.31 filing, not at ratification):
        - CD.8: DuckDB's native operational table format becomes DuckLake under this adoption; the
          embedded-engine choice (DuckDB) is unchanged.
        - CD.9: Partitioning IS available in DuckLake via ALTER TABLE ... SET PARTITIONED BY (metadata
          op, not CREATE TABLE DDL). The "No unpartitioned-table path" absolute holds: ops DuckLake
          tables are partitioned via ALTER when row/file count warrants.
        - CD.15: Athena cannot read DuckLake. The Athena escape hatch transitions from "Athena on
          Iceberg snapshots" to OQ.7. DuckDB-on-DuckLake replaces DuckDB-on-Iceberg-snapshot for ops.

      This roadmap edit does NOT touch DECISIONS.md and does NOT change any numbered Decision's status.
      The proposed supersessions of Decisions 50, 56, 51, 69 and any NS.1 generalisation (OQ.13:
      "S3 + Iceberg" -> "S3 + open table format") land at ratification via the log-decision path and
      the FP-B follow-on IMPLEMENTATION plan -- exactly mirroring CD.30.

      Named follow-on plans (NOT in this scope):
        - FP-B = T2.19: DuckLake ops write/read migration (replace OpsWriter JSONL-staging with DuckLake
          writer preserving Decision 69; swap DuckDBIcebergReader -> DuckLake reader; adopt SCD2 via
          current_state + optionally ducklake_table_changes CDC; resolve OQ.7 + OQ.10). V3 IMPLEMENTATION
          plan, gated on CD.31 ratification + T2.16/T2.17/T2.18; Lambda-deploy DEFERRED per Decision 67.
        - FP-C: market_data / product D.lake DuckLake assessment + catalog multi-tenancy decision (OQ.14).
          Gated on a billions-of-rows scale-proof; deferred after ops catalog validates the approach.
    gates: [T2.16, T2.17, T2.18, T2.19]
    state: ratified
    filed_via: ops_decisions:dec-1085
    supersedes_decisions: [50, 56, 51, 69]
    discipline_points:
      - "NS.1 generalisation (\"S3 + Iceberg\" -> \"S3 + open table format\") was deferred to OQ.13 and is now ENACTED at CD.31 ratification (Decision 78, 2026-06-02): NS.1 detail now reads \"S3 + open table format\", not the original \"S3 + Iceberg\". (Pre-ratification this discipline point recorded the deferral; it is retained as enacted-state history.)"
      - "FP-B (T2.19) carries Decision 67 / CD.16 deferred-deploy markers: Lambda-deploy DEFERRED until per-Lambda gating (CD.16) resolves. This plan is IMPLEMENTATION and deploys nothing."
      - "Product D.lake.* and market_data Iceberg tables REMAIN Iceberg (KG.1 platform/product boundary; independently Class-A-gated per CD.25). Market-data DuckLake assessment is deferred to FP-C."
      - "The RDS catalog is a metadata store (Glue-analog), NOT a query engine. NS.1 governs engine-swappability, not a metastore ban. NS.3 actively supports a small managed cloud state-store."
      - "VPC egress (to reach RDS) is orthogonal to Function-URL + AWS_IAM ingress (CD.10 / NS.5). The extension layer must be pre-baked into a Lambda layer to work around blocked egress to extensions.duckdb.org (T2.17)."
      - "Supersession of Decisions 50/56/51/69 is proposed-at-ratification only. Until CD.31 is ratified, all four Decisions remain in force and the existing write path (JSONL-staging, Single-Portal invariant per Decision 69) continues."
      - "[Amendment -- CD.34]: the catalog backend (\"a dedicated micro RDS PostgreSQL instance\") is migrated to Neon serverless Postgres per CD.34 (pending), for cost. This amends only the backend instantiation; the metadata-store framing, NS.1/NS.3 reasoning, S3-Parquet data plane, DuckDB engine, and closed boundary are unchanged. The RDS-specific text above (\"metadata-in-RDS-PostgreSQL\", \"the always-on RDS instance\", \"VPC egress to reach RDS\") is superseded by Neon (public TLS endpoint, no VPC attach for catalog reachability, Secrets Manager DSN). See docs/REPORT-ducklake-catalog-neon-migration.md."

  - id: CD.32
    title: Multi-product platform topology (unified project_id data plane + IP-boundary-only repo axis)
    detail: |
      Exploratory record: docs/INTENT-multi-product-platform.md (merged PR #57). That document is
      REPORT-ONLY and deliberately exploratory; it extends, and does not supersede, the monorepo +
      project_id commitment in docs/INTENT-aws-migration-platform-evolution.md Part 2.

      Two orthogonal axes:
        1. Data/identity axis: a unified DuckLake operational data plane keyed by a project_id origin
           dimension. All products (trading, reaper-tools, dbt-daywork, any future product) share one
           operational lakehouse; product rows are distinguished by project_id. This axis is already
           partially committed via the project_id stack below.
        2. Code/repo axis: the split decision (monorepo vs separate private repos) is made only at the
           cross-employer IP boundary -- not driven by data-plane topology. The two axes are orthogonal:
           N repos can still write to one DuckLake keyed by project_id.

      Open Decisions gating ratification (OD-1..OD-5 from the INTENT doc):
        OD-1: Ratify project_id as the canonical product-discriminator in the DuckLake ops schema.
        OD-2: Decide the egress-gate enforcement model (blocking Lambda interceptor vs application-level
              guard vs deferred to T0.15 COALESCE gate).
        OD-3: Decide the repo topology -- monorepo vs per-product separate private repos. The split is
              only at the cross-employer IP boundary. Key framing: the data/identity axis stays unified
              regardless of repo topology; per-directory CLAUDE.md is only a partial mitigation because
              the shared operational corpus (DECISIONS.md, the roadmaps, the recs log) does not shard
              with directory scope; the counter-cost of separate repos is extracting and duplicating the
              co-located platform tooling.
        OD-4: Decide rollback/freeze semantics if a product violates the egress gate post-onboarding.
        OD-5: Update KG.1 roadmap wording from trading-specific to N-product framing. ENACTED by this
              plan (the KG.1 edit). OD-5 is the only OD with a concrete deferred roadmap edit; the rest
              require a ratified decision before any active work is eligible.

      Build substrate to avoid duplicating (cross-reference docs/INTENT-aws-migration-platform-evolution.md
      Part 2): T0.12a (project_id Pydantic annotations), T0.7a-c (schema backfill), T0.15 (COALESCE gate),
      config/project_registry.yaml (product registry). These are the existing committed substrate; OD-1
      ratification would extend them, not replace them.

      Human-raised monorepo-vs-separate-private-repos open question (feeds OD-3):
        - Per-directory CLAUDE.md scoping is only a partial mitigation: the shared operational corpus
          (DECISIONS.md, the roadmaps, the recs log) does not shard with directory scope.
        - Counter-cost of separate repos: extracting and duplicating the co-located platform tooling.
        - The data/identity axis (one DuckLake, project_id keyed) is unchanged by the repo-topology
          decision; this question only touches the code/repo axis.

      Unbuilt enforcement work -- NOT eligible active tier_items; gated by OD-1/OD-2 + the unbuilt
      project_id stack:
        - Egress gate (application-level or Lambda interceptor)
        - Day-job onboarding interlock
        - COALESCE gate (T0.15, committed but not yet built)
        - Rollback/freeze path

      See KG.14 for the unbuilt enforcement substrate summary.
    gates: []
    state: pending
    filed_via: pending_log_decision_lambda
    discipline_points:
      - "No active tier_items may be created for multi-product enforcement work until OD-1 and OD-2
        are resolved and the project_id stack (T0.12a / T0.7a-c / T0.15) is built. Direction is tracked
        here as known_gaps / candidate_decisions only."
      - "The data/identity axis (one DuckLake, project_id keyed) and the code/repo axis (monorepo vs
        separate private repos) are orthogonal. Do not conflate them when authoring plans referencing
        this CD."

  - id: CD.33
    title: DuckLake ops runtime architecture -- writer/reader/maintenance split, OCC-retry concurrency, current projection, closed read/write boundary
    detail: |
      Pins the ops DuckLake runtime architecture that Decision 78 (CD.31) deferred to T2.17-T2.19.
      Ratified by Decision 81 (this CD does NOT edit DECISIONS.md while pending; ratification lands via
      the log-decision path = Decision 81, mirroring CD.31 -> Decision 78).
      (1) Three-artifact split by access pattern -- ducklake_writer / ducklake_reader / ducklake_maintenance
          -- justified by IAM-principal + scaling + deploy isolation, NOT concurrency. Supersedes CD.10's
          six-Lambda enumeration, which was illustrative (examples of needed verbs), never canonical. CD.33
          commits ONLY to the access-pattern split + closed boundary; the verb/tool set behind writer and
          reader stays deliberately extensible. The invariant is path, not verb count.
      (2) Concurrency (OQ.10 -> c): concurrent writers + bounded application-level OCC retry (backoff+jitter,
          fixed ceiling, loud-fail on exhaustion) in the writer. Idempotency is grounded: each write mints a
          monotonic ULID once at op start, reused across retries, as the history PK; the append is INSERT IF
          NOT EXISTS on that PK, so a committed-but-unacked retry de-dupes (not double-append). last_updated_
          timestamp is high-precision, stable-per-write, ordering-only. _prepare_record now() re-stamp moves
          out of the retry loop. NOT reserved-concurrency=1, NOT SQS FIFO. ducklake_maintenance is a singleton
          (DDL/ALTER hard-abort on conflict); the writer-vs-expire_snapshots race is closed by the clause-5
          GC older_than grace > max in-flight write/retry duration (pending the GC snapshot-isolation check).
      (3) Portal surface = read + write categories only; the sync category is eliminated because DuckLake's
          atomic catalog-snapshot commit removes the outbox/drain step. A write is atomic at the catalog
          commit (Parquet staged to S3, then snapshot committed in the RDS catalog txn; readers see nothing
          until commit; aborted-commit Parquet reclaimed by delete_orphaned_files). No external sequencing.
          Logical write verbs (file_rec/update_rec/file_decision) + read verb (query) retained. Decision 69
          Single-Portal invariant PRESERVED -- all writes transit scripts/ops_data_portal.py; transport only.
      (4) ducklake_writer owns the schema-enforcement gate: every write validated against the live table
          schema before commit; single un-bypassable write chokepoint; schema rejection fails loudly; schema
          evolution is a versioned maintenance DDL step, not writer-side silent coercion.
      (5) ducklake_maintenance = TWO deterministic scheduled cadences, NO LLM / NO agent: (a) daily
          non-destructive merge_adjacent_files (self-correcting compaction; current compacted more often);
          (b) separately-cadenced GUARDED destructive GC (expire_snapshots -> cleanup_old_files ->
          delete_orphaned_files) behind a retention floor + older_than grace + circuit breaker + own alarm.
          OQ.11 -> c: inlining DISABLED (inlined_rows=0) for governance tables -- writes land in S3
          immediately, removing the catalog-only durability window; small files paid down by daily merge.
          Per-table: telemetry MAY keep inlining. expire != delete: cleanup + delete_orphaned must run.
      (6) Closed read/write boundary (OQ.7 -> a): every read via reader, every write via writer, nothing
          out-of-band. No Athena escape hatch (DuckLake has no Iceberg export / external reader; the closed
          boundary is the design goal). One audited+alarmed admin-account break-glass path for DR only.
          Partitioning per-role: history by day(created_timestamp) (stable -> date reads prune); current by
          id (serving lookup + MERGE prune); applied via CD.9 ALTER at table creation. Partition-prune smoke
          test gates T2.17/T2.19.
      (7) current write-through projection (R-4): reads come from a materialised Type-1 current table (one
          row per id, latest-wins), never a read-time window over history. Each write is one DuckLake txn:
          INSERT history then MERGE current from the in-hand delta (no read-back). history is the append-only
          source of truth; current is rebuildable from history (DR only). Shared idempotent merge helper,
          one-or-many rows from day one (micro-batch is a config flip). current is a warehouse table, NOT the
          logs/*.jsonl read-cache anti-pattern. VERIFIED (capability-review C-1/C-2): single-txn multi-table
          atomicity + MERGE-through-DuckLake confirmed; DELETE+INSERT retained only as a noted alternative.
      (8) SCD2 keys + DQ (no engine PK/FK; BigQuery discipline): history logical key = auto-generated monotonic
          ULID (unique per write row, so same-instant same-rec_id updates never collide); rec_id is the natural
          key; last_updated_timestamp is high-precision, stable-per-write, SCD2 ordering with ULID tiebreak.
          DQ invariants: ULID PK uniqueness; one current row per rec_id (structural via the current MERGE key
          on rec_id); update_rec referential existence (point-lookup on current, in-transaction) while
          file_rec requires the DynamoDB-allocated rec_id to NOT exist.
      OQ.12 (version/upgrade policy) is left to T2.17 implementation (clone-rehearsal default); not pre-empted.
    gates: [T2.17, T2.18, T2.19]
    state: ratified
    filed_via: ops_decisions:dec-1089
    supersedes_decisions: []
    discipline_points:
      - "Supersedes CD.10's six-Lambda enumeration; CD.10 is state:pending so no DECISIONS.md transition. CD.10's six slugs are status:stub MOCK examples (verified on disk), which confirms they were illustrative, never canonical. The agent verb/tool surface is explicitly NOT frozen by CD.33 -- only the writer/reader/maintenance path split and the closed boundary are. CD.10's PlatformDev/PlatformAdmin two-principal allow-list is retained, not superseded."
      - "Preserves the Decision 69 Single-Portal primitive-level invariant AS CARRIED FORWARD BY Decision 78 (Decision 69 itself was already superseded by Decision 78; only its invariant survives). Portal abstraction unchanged; transport changes."
      - "Does NOT edit DECISIONS.md while pending; supersession + OQ.7/OQ.10/OQ.11 resolution land at ratification via the log-decision path = Decision 81."
      - "Refines CD.15 (typed query reader) and CD.8 (DuckDB engine) and applies CD.9 partitioning; does not contradict them."
      - "OQ.11 resolves to option (c) (inlining disabled for governance tables), NOT option (b); the v1 draft's option (b) was overturned by the C2 durability-window finding."
      - "Write-id RESOLVED: history PK = monotonic ULID (stable across OCC retries) + high-precision stable timestamp (ordering-only). This single mechanism grounds clause-2 idempotency, clause-7 append idempotency, clause-8 PK uniqueness, and deterministic DR rebuild; the _prepare_record now() re-stamp must move out of the retry loop at T2.17."
      - "Capability claims VERIFIED against official DuckLake docs (ducklake.select) pre-ratification: multi-table single-snapshot ACID txn (CONFIRMED), MERGE INTO (CONFIRMED), no engine PK/FK so ULID is a logical key enforced by MERGE+DQ (CONFIRMED), OCC + app-retry (CONFIRMED), inlining row-limit=0 + flush (CONFIRMED), expire/cleanup/delete_orphaned + merge_adjacent_files names+semantics (CONFIRMED), ALTER SET PARTITIONED BY post-ALTER-only + day()/bucket(N,col) + pruning (CONFIRMED). GC deletion safety is a SOFT time-based deferral, not a hard lock -- older_than grace MUST exceed max reader/writer duration; cleanup_all=>true forbidden with pinned readers. Pin a DuckLake version; smoke-test upstream issues #233/#376 (concurrency) and #921 (inlining) at T2.17."
      - "[Amendment -- CD.34 (pending)]: CD.34 proposes migrating the catalog backend to Neon serverless Postgres. CD.33 was ratified by Decision 81 (dec-1089) WITH the RDS backend, so its body above is UNCHANGED while CD.34 is pending; the following enact only when CD.34 ratifies (Decision 82): clause (3) 'RDS catalog txn' -> 'catalog txn (Neon Postgres)'; clause (5) telemetry-inlining carve-out removed (inlining disabled for ALL tables incl. telemetry; high-write-rate tables get a higher-frequency merge, T2.18 co-tunes the GC breaker); enforcement_mechanism O-2 DR -> daily pg_dump-to-S3 (30d retention, >25h freshness alarm), O-5 pooling -> Neon built-in pooler / direct endpoint (no RDS Proxy). Tracked meanwhile in the T2.16b-T2.19 exit criteria. The runtime architecture (split/OCC/projection/SCD2 keys/GC+merge cadences) is unaffected. See docs/REPORT-ducklake-catalog-neon-migration.md."
    enforcement_mechanism: "ducklake_writer schema gate + closed reader/writer boundary; ULID logical key + MERGE-on-ULID insert-if-not-matched append idempotency (no engine PK); current write-through projection enforces current-version uniqueness; guarded destructive-GC circuit breaker (expire 30d/7d, grace >=7d, breaker >20%/>10GB, weekly, no cleanup_all); PlatformAdmin break-glass (catalog+S3 read) + daily catalog PITR-to-S3; partition-prune smoke test in T2.17/T2.19 exit criteria; per-Lambda CD.24 manifests."

  - id: CD.34
    title: DuckLake catalog backend -- migrate RDS PostgreSQL to Neon serverless Postgres
    detail: |
      Narrowly amends the CD.31 / Decision 78 catalog-backend paragraph ("a dedicated micro RDS PostgreSQL
      instance") from RDS PostgreSQL to Neon serverless Postgres (free tier), provisioned via the Terraform
      Neon provider (auto-applied via the Decision-77 sandbox pipeline behind a Neon-aware fail-closed guard +
      subagent review -- NOT carved out), with the Lambda
      connection string held in AWS Secrets Manager. Everything else in Decision 78 / CD.31 is preserved:
      DuckLake adoption, the S3-Parquet data plane, the DuckDB engine, the catalog-as-metadata-store framing,
      and the closed read/write boundary. Motivated by cost -- the micro RDS is the largest live AWS line
      after the CD.21 EC2-runner retirement; Neon free tier is $0 (realized saving ~$12-15/mo). Sequenced
      BEFORE T2.17 so the Lambda runtime is built against Neon (no VPC attach for catalog reachability; Neon's
      built-in pooler) rather than RDS-in-a-VPC. Nothing consumes the catalog yet (live ops are Iceberg/Athena
      until T2.19), so present blast radius is zero. Ratified later via the log-decision path (provisionally
      Decision 82, sequenced after Decision 81 which ratified CD.33 as dec-1089); this CD does NOT edit
      DECISIONS.md while pending.
      Consequential mechanics (folded into the gated tier items + CD.33):
      (1) Inlining DISABLED for ALL tables including telemetry (ducklake_default_data_inlining_row_limit=0),
          overriding the telemetry-inlining carve-out in CD.33 clause (5) and OQ.11 -- on Neon's ~6h free-tier
          PITR no table may be catalog-only-durable. High-write-rate tables get a higher-frequency
