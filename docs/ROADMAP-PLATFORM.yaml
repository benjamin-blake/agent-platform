  - id: T4.7
    tier: T4
    name: Plan-staleness story -- precondition for planning/implementation decoupling
    intent: |
      Today planning and implementation are sequentially coupled, and that coupling masks staleness: a
      plan written against repo state S0 is silently stale once other implementations move the repo to
      S1. Decision 87 cl.6 gates any decoupling (plans written faster than implemented) on a staleness
      story this item delivers: pin each plan to a base-commit SHA, detect divergence between that base
      and HEAD at implement time, and re-validate (or auto-route to a revision) before an implementation
      runs against a stale plan. Without this, decoupling produces implementations against stale repo
      state -- the failure mode Decision 87 names explicitly.
