# docs/intent-migration/MANIFEST.yaml
#
# Canonical work-breakdown for migrating the prose docs/INTENT-*.md corpus into
# machine-parseable roadmap tier_items, Decisions, and contracts, then retiring
# the prose. Agent-first artefact. Produced by PLAN-intent-roadmap-migration
# (REPORT-ONLY). Governed by Decision 86, which supersedes the pending CD.14
# (demote-and-keep-prose) model.
#
# This manifest INVENTORIES and CLASSIFIES. It does NOT adjudicate drift: every
# drift_finding below is a FLAG that the owning wave's follow-on session must
# reconcile with the human before extracting the affected block. "Live state vs
# intended state" is resolved per-doc, in conversation, not here.

manifest:
  id: INTENT-MIGRATION-MANIFEST
  version: 1
  governed_by: "Decision 86"
  supersedes: "CD.14 (roadmap self-contained; INTENT demote-and-keep model)"
  produced_by: "docs/plans/PLAN-intent-roadmap-migration.yaml"
  corpus_size: 18                      # docs/INTENT-*.md on disk at 2026-06-12
  purpose: >-
    Stop deliverables being lost inside long prose INTENT docs and stop those
    docs drifting from live roadmap/decision state, by extracting their
    forward-looking content into the canonical machine-parseable surfaces
    (ROADMAP-PLATFORM.yaml tier_items, DECISIONS.md, docs/contracts/*.yaml) and
    retiring the prose. The corpus was originally authored to persist the
    owner's vision across agent sessions; the roadmap + decisions now serve that
    role with explicit YAML dependency edges agents can read without parsing
    10k+ lines of narrative.
  authority: >-
    Canonical for the migration work-breakdown and per-doc disposition. NOT
    authoritative for tier sequencing (that stays in ROADMAP-PLATFORM.yaml) or
    for rationale (that stays in DECISIONS.md). Retires itself once every
    document entry reaches disposition_state: done.

  agent_instructions: |
    - Each `documents[]` entry is a unit of migration work owned by exactly one
      wave. A doc is migrated when its disposition is fully applied AND (for
      delete dispositions) the file is deleted with every reference swept.
    - `drift_findings` are FLAGS, not conclusions. Do not extract a flagged block
      until its wave session has reconciled the intended-vs-live discrepancy with
      the human. Reconciliation may change the target or drop the block entirely.
    - Reference docs by `id` (the slug). Targets are tier_item ids (e.g. T4.2),
      Decision numbers (e.g. Decision 84), candidate-decision ids (e.g. CD.25),
      or contract paths (docs/contracts/*.yaml).
    - Waves are ordered. A wave's `gate` must hold before the next wave starts.
      Lowest-drift docs go first so the pipeline is proven before the hard ones.
    - Per-archetype disposition rules live in `archetypes`. An entry's
      `disposition` MUST be the archetype's `disposition` value.
    - `cross_cutting_findings` are drift signals that span multiple docs; the
      wave that first touches an affected doc owns surfacing the relevant one.
    - INBOUND-REFERENCE SWEEP (exit criterion for every delete disposition):
      before deleting a doc, run `rg -n "INTENT-<slug>" .claude/ scripts/ src/
      terraform/ tests/ .github/ docs/` and repoint or remove EVERY hit. "Every
      reference swept" means code/infra/test references (X6) and Decision/CD
      prose pointers (X1/X2/X7), not just the latter. A delete is not done while
      any inbound reference resolves to the deleted path.

  effort_legend:                       # decomposition signal, not wall-clock (mirrors ROADMAP-PLATFORM effort markers)
    XS: "single-file / single-pointer; <1 session"
    S:  "one doc, low drift; 1 session"
    M:  "one doc, real drift reconciliation; 1 session"
    L:  "one large/high-applied doc; may split across sessions"

# --------------------------------------------------------------------------
# Per-archetype disposition rules (the owner chose per-archetype, not uniform).
# --------------------------------------------------------------------------
archetypes:
  feasibility_graduated:
    summary: "Decision-input / feasibility doc whose verdict has already ratified into a numbered Decision."
    disposition: delete_pointer
    rule: >-
      Content already lives in the Decision. Delete the prose and leave a pointer
      to the Decision. BEFORE deleting, preserve any still-live trigger, watch-
      signal, or pending-phase as a roadmap tier_item -- a graduated verdict does
      not mean every forward hook in the doc has landed.

  tier_item_deliverable:
    summary: "REPORT-ONLY deliverable that proposed candidate decisions and/or tier_items for the roadmap."
    disposition: extract_to_roadmap
    rule: >-
      Extract residual UNBUILT proposed CDs/tier_items into ROADMAP-PLATFORM.yaml
      (or ratify the proposed CD), flag and drop already-applied parts (check the
      doc's own Application Status log against the live roadmap), then delete.

  living_strategic_arc:
    summary: "Multi-session maturity arc describing an evolving subsystem; heavily cross-superseded."
    disposition: extract_to_roadmap_and_contracts
    rule: >-
      Highest-drift archetype -- needs the most reconciliation. Extract phase
      tables -> tier_items; data-models / verifier catalogues / event taxonomies
      -> docs/contracts/*.yaml; ratified rationale -> Decision pointers; mark
      already-landed phases complete; then delete. Many of these predate Decision
      78/84 (DuckLake) and describe a retired substrate -- reconcile against live
      architecture, never extract stale instructions verbatim.

  methodology_contract:
    summary: "Canonical specification of what an agent/process must produce."
    disposition: extract_to_contract
    rule: >-
      Extract the contract body -> docs/contracts/{name}.yaml (the agent-first
      home for enforced semantics). Named follow-on tier_items already exist;
      cross-link them. Delete the prose once the contract is the live source.

  exploratory_anchor:
    summary: "Vocabulary and boundaries for an unbuilt direction; no migration committed, nothing in the repo."
    disposition: defer_or_contract
    rule: >-
      Do NOT delete content a governing CD still references. Either keep as a
      contract (vocabulary/boundaries) or seed a future tier_item gated on its
      Open Decisions. Reconcile with the governing CD so the reference is not
      orphaned.

# --------------------------------------------------------------------------
# Cross-cutting drift findings (span multiple docs; surfaced by the decision
# scout gate). The wave that first touches an affected doc owns the relevant one.
# --------------------------------------------------------------------------
cross_cutting_findings:
  - id: X1
    finding: >-
      Decision 57 grants several INTENT docs (telemetry-system, verification-
      system, recommendation-executor, autonomous-improvement-control-plane)
      "authoritative for their domain" status. Extraction re-scopes that grant;
      Decision 57 must be amended (or a superseding decision filed) as each is
      retired, or the deleted docs leave dangling authority claims.
    affects: [telemetry-system, verification-system, recommendation-executor, autonomous-improvement-control-plane]
  - id: X2
    finding: >-
      Decision 75 (frame-lock anti-pattern) cites recommendation-executor and
      provider-agnostic-executor BY PATH as the frame-locking source artefacts.
      Deleting them breaks Decision 75's historical pointers -- preserve a
      redirect (Decision 75 -> the extracted tier_item/contract) on delete.
    affects: [recommendation-executor, provider-agnostic-executor]
  - id: X3
    finding: >-
      CD.32 designates multi-product-platform as an exploratory/REPORT-ONLY
      record. A delete disposition would orphan CD.32's reference; the exploratory
      archetype keeps it (as contract or gated tier_item) instead.
    affects: [multi-product-platform]
  - id: X4
    finding: >-
      CD.14 enumerated only 10 docs to demote + 1 to retire; 18 INTENT docs now
      exist on disk. The demotion list is itself drifted -- direct evidence of the
      problem Decision 86 fixes. Wave 0 must mark CD.14 superseded rather than
      patch its stale list.
    affects: [all]
  - id: X5
    finding: >-
      docs/contracts/inference-provider.md already exists and partly duplicates
      provider-agnostic-executor. Extraction must reconcile the two rather than
      create a second provider contract.
    affects: [provider-agnostic-executor]
  - id: X6
    finding: >-
      Load-bearing CODE/INFRA/TEST references cite INTENT docs by path and are
      invisible to the X1-X5 prose-pointer findings. Verified inbound refs (sweep
      and repoint before the owning wave deletes the doc):
      scripts/execute_recommendation.py:17 (recommendation-executor);
      scripts/verifiers/__init__.py:25 (session-log-architecture);
      scripts/telemetry_schemas.py:8 + terraform/iceberg_tables.tf:1171
      (telemetry-system); scripts/validate.py:2378 (ci-cd-architecture -- a
      literal entry in the environment-taxonomy allowlist SET, so deletion leaves
      a dead allowlist member); scripts/validate.py:2752 (ci-rca-methodology,
      comment); tests/test_platform_roadmap.py:490 (pre-codegen). Re-run the rg
      sweep at each wave -- this list is a 2026-06-12 snapshot, not authoritative.
    affects: [recommendation-executor, session-log-architecture, telemetry-system, ci-cd-architecture, ci-rca-methodology, pre-codegen-contract-ratification]
  - id: X7
    finding: >-
      Decision 84's Related line cites docs/INTENT-ducklake-consolidation.md BY
      PATH as the "full program". Wave 1 deletes that doc with only a pointer TO
      Decision 84 -- a circular dangling pointer. Same redirect discipline as X2:
      before delete, repoint Decision 84's reference to the surviving target
      (the Decision itself / the carrier tier_items T2.26-T2.28).
    affects: [ducklake-consolidation]

# --------------------------------------------------------------------------
# Wave sequencing. Wave 0 is enforcement (no INTENT extraction); Waves 1-5
# extract, lowest-drift first.
# --------------------------------------------------------------------------
waves:
  - id: WAVE-0
    theme: "Stop the bleeding -- wire Decision 86 into the workflow"
    plan_type: IMPLEMENTATION
    docs: []
    actions:
      - "Edit .claude/commands/plan.md + .claude/skills/planning/SKILL.md (Documentation Artefact Design): route forward intent to tier_items, rationale to Decisions, field semantics to contracts; forbid new docs/INTENT-*.md."
      - "Edit AGENTS.md (Agent-First Repository section): add the no-new-prose-INTENT rule with a pointer to Decision 86."
      - "Roadmap-bookkeeping in ROADMAP-PLATFORM.yaml: mark CD.14 state: superseded (by Decision 86); repoint tier_item T5.5 from demote-and-footer to extract-and-retire-per-this-manifest; AND sweep CD.14's now-stale retires_intents (line 535) + demotes_intents (line 536) arrays so the roadmap's self-contained invariant (agent_instructions lines 124-125) is not left asserting demotion of docs this manifest deletes."
      - "Add a scripts/validate.py guard rejecting new standing prose-architecture docs. Grandfather mechanism (single source of truth, auto-shrinking): the guard derives the allowed set from THIS manifest -- a doc is permitted to exist iff it has a documents[] entry with disposition_state != done. As each wave flips an entry to disposition_state: done and deletes the file, the guard's allowed set shrinks automatically with no hand-edit. The guard rejects any docs/INTENT-*.md without a non-done manifest entry (and per Decision 86, any new standing prose-deliberation doc under docs/ matching the broader pattern). GUARD-SCOPING (Wave-0 must honor): the 'broader pattern' MUST exclude docs/contracts/ and docs/intent-migration/ (and not match .yaml) so it cannot reject the manifest itself or legitimate new .md contracts during the CD.25 .md->.yaml cutover window; pin the regex in the Wave-0 plan and choose fail-closed iff the manifest is readable, fail-open with a loud warning iff the manifest is absent/mid-edit."
    gate: "Decision 86 merged to main"
    follow_on_plan: "docs/plans/PLAN-intent-migration-wave0-enforcement.yaml"
    rationale: "Authored immediately after this plan while context is hot; tiny, high-leverage, prevents corpus growth during the multi-wave extraction."

  - id: WAVE-1
    theme: "Feasibility docs already graduated to Decisions -> delete + pointer"
    plan_type: IMPLEMENTATION
    docs: [bazel-feasibility, ducklake-consolidation, ops-pipeline-consolidation]
    gate: "WAVE-0 complete"
    rationale: "Lowest drift -- verdicts already ratified. Proves the delete+pointer pipeline. Watch for surviving triggers/phases (see per-doc drift)."

  - id: WAVE-2
    theme: "Tier-item deliverables (mostly landed) -> extract residual + delete"
    plan_type: IMPLEMENTATION
    docs: [session-log-architecture, terraform-cicd-agent-native, pre-codegen-contract-ratification, aws-migration-platform-evolution]
    gate: "WAVE-1 complete"
    cross_wave_gate: >-
      project_id thread: aws-migration Part 2 is the ORIGIN of the monorepo +
      project_id commitment that multi-product (Wave 5, still alive) references
      BY PATH (multi-product lines 3, 10). aws-migration's project_id content
      MUST be extracted to its tier_item/contract target AND multi-product's
      inbound path reference repointed to that target BEFORE aws-migration's
      prose is deleted. If that repoint cannot land in Wave 2, DEFER only
      aws-migration Part 2's deletion to Wave 5 (delete the rest of the doc, keep
      Part 2 until multi-product is dispositioned).
    rationale: "Each has an explicit Application Status / proposed-tier-items section -- extraction is bounded by reconciling applied-vs-residual against the live roadmap."

  - id: WAVE-3
    theme: "Living arcs: ops + CI/CD + validation layer"
    plan_type: IMPLEMENTATION
    docs: [ops-decisions-graduation, dq-enforcement, validation-architecture, ci-cd-architecture, ci-rca-methodology]
    gate: "WAVE-2 complete"
    cross_wave_gate: >-
      Contract-substrate dependency: extract_to_contract(s) dispositions target
      docs/contracts/*.yaml, but the docs/contracts/ .md -> .yaml cutover is
      governed by CD.25 / T-1.12 and is still PENDING (today the dir is mostly
      .md). A wave session must EITHER gate its contract extraction on the cutover
      landing for the target file, OR emit the contract as .yaml directly and
      record it so CD.25's conversion skips the already-converted file. Do not
      create a lone .yaml beside un-converted .md peers without recording it.
    rationale: "Phase-structured arcs with mixed landed/pending state. ci-rca-methodology is the methodology_contract; the rest are living arcs."

  - id: WAVE-4
    theme: "Living arcs: executor + telemetry + verification (+ umbrella last)"
    plan_type: IMPLEMENTATION
    docs: [recommendation-executor, telemetry-system, verification-system, provider-agnostic-executor, autonomous-improvement-control-plane]
    gate: "WAVE-3 complete"
    cross_wave_gate: >-
      Same contract-substrate dependency as WAVE-3 (telemetry/verification/
      inference-provider contracts depend on the CD.25 / T-1.12 .md -> .yaml
      cutover; X5 also requires reconciling provider-agnostic into the existing
      docs/contracts/inference-provider.md rather than creating a duplicate).
    rationale: "Highest drift (predate the CD.27/28 executor pivot and Decision 78/84 DuckLake move). The control-plane umbrella synthesises the other four, so it migrates LAST once its children have landed."

  - id: WAVE-5
    theme: "Exploratory anchor -> reconcile with CD.32"
    plan_type: IMPLEMENTATION
    docs: [multi-product-platform]
    gate: "WAVE-4 complete"
    rationale: "Nothing built; defer_or_contract. Kept until last because its disposition depends on whether CD.31/CD.32 ratify first."

