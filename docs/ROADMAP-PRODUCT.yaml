  - id: KG.tail_hedge_sleeve_surface
    gap: Tail-hedge sleeve as L2 behavioural-overlay surface
    notes: |
      Per Checkpoint 3 completeness F6 + PIVOT Part G + CDP.36. Tail-
      hedge sleeve (1-3% capital in long OTM puts) is named in CDP.36
      as behavioural-overlay-not-edge but has no tier_item, no contract
      surface, no constraint surface in L2.pc.5 or L2.pc.8. Defer with
      explicit hypothesis trigger: when MVP.5 (live_full) reaches 6
      months uptime + 2 consecutive positive-Sharpe quarters AND
      operator behaviour audit shows alpha-sizing-too-conservative,
      file follow-up plan adding L2.pc.13 tail-hedge sleeve surface
      with explicit Greeks-aware constraint set (touches options
      machinery; gated on KG.options resolution too).
  - id: KG.cost_controls
    gap: 'Cost monitoring + budget controls (current_state limitation: "No cost controls beyond budgets")'
    notes: |
      Per Checkpoint 3 completeness F7 + current_state PRODUCT.md
      limitation "No cost controls beyond budgets." Cost monitoring
      is delegated to PLATFORM (see out_of_product_scope source bullets
      99, 100). PLATFORM cost_projection block in ROADMAP-PLATFORM.yaml
      + PLATFORM CD.6 cover the substrate. PRODUCT-tier cost concerns
      surface only via per-trade transaction cost analysis (L3.exec.11
      TCA aggregation) which is a different surface from infrastructure
      cost monitoring. No PRODUCT tier_item is needed; this KG entry
      preserves the catalogue traceability anchor for the silent-drop
      finding F7 raised.
