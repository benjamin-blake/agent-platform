known_gaps:
  # Items deliberately out of scope for this audit. Each gap is intentional
  # (PIVOT-DEFERRED or PIVOT-ORTHOGONAL); the rationale is captured here so
  # future readers don't re-discover and re-defer.
  - id: KG.options
    gap: Options trading (CDP.10 deferral)
    notes: |
      Options trading reshapes L2 from "aggregate weights" to "aggregate
      Greek exposures" and L3 from "single-leg orders" to "multi-leg
      with expiry state machine." Per PIVOT Part G + CDP.10 + cross-
      tier gate G.no_options_until_stock_system_live_and_stable.
      Hypothesis trigger: 6 months live_full uptime + 2 consecutive
      positive-Sharpe quarters AND a specific options strategy hypothesis
      with tested edge. The seven architectural extensions listed in
      PIVOT Part G (instrument schema with OCC ID; pricing model; Greeks
      at decision time; portfolio-level Greek aggregation; multi-leg
      orders; expiry state machine; assignment risk monitor) all
      represent post-MVP tier_items.
      open_design_questions:
        - Which use-case to target first (covered calls; cash-secured puts; tail hedging; directional speculation; vol trading)?
        - Greek aggregation tier (L2 extension) vs separate options L4?
        - Multi-leg execution model (single broker ticket per spread vs leg-by-leg)?
  - id: KG.multi_asset
    gap: Multi-asset generalisation (cross-market, FX, commodities, crypto)
    notes: |
      Per Subagent C catalogue Phase 8+ post-launch + PIVOT Part C
      reading list framing. Multi-asset generalisation requires factor
      models tuned to each asset class, cross-currency hedging, and
      market-microstructure adapters per venue. Out of scope until
      single-market (FTSE 100 equities) trading is profitable in
      live_full.
  - id: KG.alternative_data
    gap: Alternative data sources (Reddit sentiment, news NLP, satellite, options-flow) + data vendor expansion (Alpha Vantage, Polygon, Bloomberg)
    notes: |
      Per Subagent C Phase 8+ post-launch + Checkpoint 3 completeness F5
      fix. Alternative data integration adds L1 surfaces but does not
      change the four-layer architecture. Defer until equity-only L1
      (technicals + fundamentals + sentiment) proves alpha-positive in
      live_small.
      Data-vendor expansion (Alpha Vantage / Polygon / Bloomberg) is a
      separate concern in the same gap class: yfinance is the v1 provider
      per L0.1; vendor-redundancy + hourly-beyond-730-days coverage
      requires Alpha Vantage or Polygon when data quality / latency
      becomes binding. Reconsider when daily yfinance + 1-month-hourly
      backfill (L0.4) proves operationally insufficient.
  - id: KG.intraday_streaming
    gap: Intraday streaming data via Kinesis / WebSockets (PIVOT Part A defer)
    notes: |
      Per PIVOT Part A "what not to do" #6 + CDP.27. SQS + Lambda is
      sufficient at single-agent volume. Intraday streaming becomes
      relevant only with multiple consumers of the same stream.
      Reconsider when production ensemble scales beyond 5 pipelines
      or when sub-minute decision cadence is required.
  - id: KG.regulatory_compliance
    gap: Regulatory compliance reporting (MiFID II, Dodd-Frank)
    notes: |
      Per Subagent C Phase 8+ post-launch. Compliance is a function of
      capital scale and jurisdiction; out of scope at sole-dev scale.
      Revisit when capital exceeds professional-investor thresholds.
  - id: KG.formula_explainability
    gap: Formula explainability (SHAP values, decision attribution at the alpha level)
    notes: |
      Per Subagent C Phase 8+ post-launch. Captured loosely under
      L4.ops.2 (Brinson attribution); deeper SHAP-style explainability
      is a research direction not core MVP. Reconsider when alpha
      versioning catalogue (L1.alpha.2) holds 10+ alphas in production
      and per-alpha attribution becomes operationally interesting.
  - id: KG.external_marketplace
    gap: External formula marketplace integration
    notes: |
      Per Subagent C Phase 8+ post-launch. External-marketplace
      integration introduces an L1 supply chain that the existing
      AlphaModelVersion catalogue subsumes. No dedicated tier_item.
  - id: KG.recursive_optimiser_v2
    gap: Recursive optimiser for component selection (post-MVP)
    notes: |
      Per PIVOT Part E "what NOT to do in v1" + cross_tier_gate
      G.no_recursive_optimiser_before_mvp_complete. The optimiser that
      proposes new component versions (extending the existing PLATFORM
      autonomous-improvement substrate to product) is intentionally
      deferred. Build one strategy through the funnel first; add a
      second strategy alongside; THEN add the optimiser that proposes
      new versions across components.
  - id: KG.cd25_lifetime_pending
    gap: PLATFORM:CD.25 is the parent gate for many tier_items
    notes: |
      Per INTENT-pre-codegen-contract-ratification.md round-3 M7
      sequencing note: CD.25 is state:pending for the full project
      lifetime until the log-decision Lambda is live (PLATFORM T0.7b).
      This means many product items have a long-lived GAP dependency.
      Readers should expect to see the GAP active alongside fully-active
      contract YAMLs - this is the bootstrap clause operating as
      designed. Mitigation: PLATFORM CD.25 bootstrap_allowance: true
      permits contract authoring under pending CD.25 state, identically
      to how T-1 items completed under pending CD.1.

  # Items added per Checkpoint 3 completeness F6/F7 fix.
  - id: KG.multi_broker_capacity_scaling
    gap: Multi-broker capacity scaling (IBKR swap-in beyond Alpaca capacity)
    notes: |
      Per PIVOT Part C reference + Checkpoint 3 completeness F6 fix.
      L3.exec.4 specifies AlpacaBroker for both live-small and initial
      live-full; L3.exec.5 names IBKRBroker as the optional capacity
      scale-out path but is itself a tier_item (not a KG). This KG
      entry tracks the broader hypothesis trigger: when does multi-
      broker routing become a v2 concern? Trigger heuristics: (a)
      live_full notional > $500k AND fill quality degrades on Alpaca
      vs benchmark broker; (b) execution-policy thresholds (L3.exec.12)
      indicate spread / liquidity gating fires > 5% of orders in
      Alpaca routing; (c) regulatory access changes make IBKR preferable.
      Until then, capacity is a single-broker concern.
  - id: KG.code_path_hash_emission
    gap: Dedicated code-path-hash emission + divergence detector tier_item
    notes: |
      Per Checkpoint 3 completeness F6 + audit open_question OQ.5.
      Current discipline: code_path_verification_present_for() gate
      helper checks for a runtime-recorded code-path verification;
      L4.ops.1 LayerInvocation events carry the code_path_hash field;
      E.env.10 backtest engine integration emits the hash from inside
      the backtest run. No dedicated tier_item lands a hash-divergence
      DETECTOR (a job that reads LayerInvocation rows across env
      partitions and asserts equal hashes per strategy_version_id).
      Hypothesis trigger: when paper-vs-live divergence (evaluation_
      metric layer_4_operations_telemetry.paper_vs_live_divergence)
      consistently exceeds budget over 3 promotion cycles, file as
      L4.ops.6 follow-up tier_item.
  - id: KG.paper_vs_live_divergence_observer
    gap: Dedicated paper-vs-live divergence observer + alarm tier_item
    notes: |
      Per Checkpoint 3 completeness F6 + PIVOT Part E champion-challenger
      framework + Part G platform/product diagnostic question. The
      metric paper_vs_live_divergence is declared in evaluation_metrics.
      layer_4_operations_telemetry but no scheduled observer lands the
      alarm filing. Current discipline: drift events file recs via
      ops_recommendations (extended use per CDP.33). Dedicated tier_item
      L4.ops.7 (paper-vs-live observer Lambda or Fargate task) is
      deferred until E.env.11 (champion-challenger paper alongside
      live) lands and the metric is actually computed at scheduled
      cadence.
      DEFERRED: build_lambda.py --deploy + run_scheduled_agent.py --smoke-test (pending Decision 67 reversal)
  - id: KG.tca_bucket_schema
    gap: TCA bucket schema enumeration as Class A contract addendum
    notes: |
      Per Checkpoint 3 completeness F6 + PIVOT Part E implementation
      shortfall bucketing dimensions. L3.exec.10 names the bucket
      surface (time-of-day, spread quintile, ADV quintile, vol regime,
