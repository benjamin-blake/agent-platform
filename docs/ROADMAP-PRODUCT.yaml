open_questions:
  - id: OQ.1
    question: |
      RESOLVED 2026-05-24 by PLAN-cd25-platform-gap-sequencing. The six platform-gap
      sentinel entries (cd25-contract-ritual, t-1-12-product-contracts-schema-amendment,
      tca-aggregation, broker-secrets-manager, reconciliation-lambda,
      class-b-product-lambdas) were dispositioned in a single IMPLEMENTATION plan
      that resolved each sentinel to a concrete PLATFORM tier_item (CD.25, T-1.12,
      T3.5, T2.14, T1.14, T1.12 respectively). The known_platform_gaps[] block
      now reflects the resolved ids; cross_roadmap_depends_on edges and prose
      references point at the concrete PLATFORM ids.
    auditor_default_recommendation: |
      RESOLVED. Original recommendation: single follow-up REPORT-ONLY plan reviewing
      all six gaps with the user before any are filed as recs or PLATFORM tier_items.
      Implemented as PLAN-cd25-platform-gap-sequencing (IMPLEMENTATION rather than
      REPORT-ONLY because the INTENT had already been ratified upstream).
    consequences_if_resolved_differently: |
      RESOLVED. Original concern about per-gap routing producing bad sequencing
      did not materialise -- the single-plan resolution preserved coherent
      PLATFORM sequencing.
  - id: OQ.2
    question: |
      The scripts/product_roadmap.py Pydantic schema does not yet exist.
      Without it, ROADMAP-PRODUCT.yaml cannot be validated by
      scripts/validate.py at presubmit. Should the schema be authored
      as a follow-up IMPLEMENTATION plan immediately, or deferred until
      the first PRODUCT tier_item executes?
    auditor_default_recommendation: |
      Author scripts/product_roadmap.py + scripts/validate.py wiring as
      an immediate follow-up IMPLEMENTATION plan. Without it, this YAML
      drifts uncaught - the agent-first principle requires structural
      validation. Plan should reference the schema delta code in
      docs/audit-reports/wave-1-outputs/G.yaml::schema_delta_code.
    consequences_if_resolved_differently: |
      Deferring leaves the YAML as unenforced documentation. Subsequent
      edits can silently drop required fields (the extra='forbid'
      discipline only fires when the validator runs). At minimum, file
      a rec for the schema-extension follow-up.
  - id: OQ.3
    question: |
      Does the auditor's classification of operations_telemetry
      observability metrics (paper_vs_live_divergence,
      reconciliation_drift_rate, code_path_hash_divergence) need to
      become its own tier_item, or are they sufficiently captured by
      L4.ops.1 LayerInvocation infrastructure?
    auditor_default_recommendation: |
      Sufficient under L4.ops.1 - the drift-detector metrics are
      computed by jobs that consume LayerInvocation events. No
      additional tier_item needed in v1; revisit if drift detection
      proves to need dedicated infrastructure.
    consequences_if_resolved_differently: |
      If a dedicated tier_item is needed, propose L4.ops.6 in a
      follow-up plan referencing PIVOT Part G "diagnostic question"
      framing.
  - id: OQ.4
    question: |
      Should the MVP composition reference (mvp_v1@<hash>) be authored
      as docs/contracts/minimum-viable-v1.yaml immediately in a
      ratification predecessor plan, or wait until L1.alpha + L2.pc +
      L3.exec components exist as ratified versions?
    auditor_default_recommendation: |
      Wait until component contracts ratify. The composition references
      component versions that don't exist yet; authoring a composition
      pointing at nonexistent components is the cart-before-horse
      anti-pattern. Track docs/contracts/minimum-viable-v1.yaml as a
      late-stage MVP item (effectively MVP.1's contract_gates entry).
    consequences_if_resolved_differently: |
      Early authoring would create a "provisional" composition contract
      with no enforceable consumers. Acceptable if the user wants the
      MVP shape committed early as a north-star artefact; otherwise
      defer.
  - id: OQ.5
    question: |
      The same-code-path gate (G.same_code_path_verified_before_paper)
      uses code_path_verification_present_for() rather than
      code_path_hash() because the hash mechanism doesn't exist yet.
      Is the runtime-recording substrate (E.env.10) sufficient, or does
      a dedicated hash-emission tier_item need to land?
    auditor_default_recommendation: |
      Sufficient via E.env.10 + L4.ops.1 LayerInvocation events
      carrying code_path_hash field. No dedicated tier_item; revisit
      if hash-only gating proves brittle.
    consequences_if_resolved_differently: |
      If dedicated tier_item is needed, propose L4.ops.6 (code-path
      hash emission + divergence detector) in a follow-up plan.

