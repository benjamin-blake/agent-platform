cross_tier_gates:
  # PRODUCT-specific gates. Rules use the gate_helpers grammar (PLATFORM
  # helpers tier_complete/all_in_tier_with_status/grace_period_elapsed/
  # item_field_eq inherited; PRODUCT-local helpers defined in
  # document.gate_helpers above). Rule strings are illustrative; the
  # validator (scripts/product_roadmap.py) will reject undeclared helpers
  # at load time.
  - id: G.research_backtest_before_paper
    name: Research backtest stage must complete before any paper-trading promotion
    rule: 'tier_complete("MVP") == false or item_field_eq(MVP.2, "status", "complete")'
    rationale: |
      Per PIVOT Part E four-stage funnel + CDP.17. No paper trading
      promotion until research backtest stage gate (MVP.2) has passed.
      Skipping stages is the #1 retail-quant failure mode.
    helpers_required: [tier_complete, item_field_eq]
  - id: G.paper_before_live_small
    name: Paper stage must complete before any live-small promotion
    rule: 'item_field_eq(MVP.3, "status", "complete") and grace_period_elapsed(MVP.3, 90)'
    rationale: |
      Per PIVOT Part E + CDP.17. Paper stage must be complete AND have
      a minimum 3-month grace period demonstrating realtime-market
      stability before live-small promotion. Pre-registered criteria in
      docs/contracts/promotion-criteria.yaml gate the specific
      deflated_sharpe / max_drawdown / consecutive_losing_weeks
      thresholds.
    helpers_required: [item_field_eq, grace_period_elapsed]
  - id: G.live_small_before_live_full
    name: Live-small must demonstrate cost discovery before live-full promotion
    rule: 'item_field_eq(MVP.4, "status", "complete") and grace_period_elapsed(MVP.4, 90) and implementation_shortfall_within_budget("mvp_v1", "live_small", 25.0)'
    rationale: |
      Per PIVOT Part E + CDP.17 + CDP.13. Live-small must be complete,
      90-day grace, AND implementation shortfall within budget. TCA
      cost discovery is the entire purpose of the live-small stage; no
      promotion without verified cost data.
    helpers_required: [item_field_eq, grace_period_elapsed, implementation_shortfall_within_budget]
  - id: G.alpha_validation_before_layer2_consumption
    name: Alpha must pass sizing-agnostic OOS metrics before any L2 strategy promotes
    rule: 'ic_oos("formula_score_top_n", 90) > 0.02 and ir_oos("formula_score_top_n", 90) > 0.5'
    rationale: |
      Per PIVOT Part E identifiability fix + CDP.34. L1 evaluation must
      pass sizing-agnostic metrics (IC, IR) before any L2 strategy can
      claim alpha quality. Prevents the aggressive-sizing-on-weak-signal
      blowup pattern. Numeric thresholds are placeholders pending
      docs/contracts/promotion-criteria.yaml ratification.
    helpers_required: [ic_oos, ir_oos]
  - id: G.same_code_path_verified_before_paper
    name: Backtest and live code paths must match before paper promotion
    rule: 'code_path_verification_present_for("mvp_v1") == true'
    rationale: |
      Per PIVOT Part E + CDP.5 same-code-path commitment. The verification
      must exist as recorded runtime evidence (E.env.10 backtest engine
      integration + the runtime-recording mechanism). Demoted from
      code_path_hash because the hash mechanism is its own tier_item.
    helpers_required: [code_path_verification_present_for]
  - id: G.no_options_until_stock_system_live_and_stable
    name: Options trading deferred until stock system is live and stable
    rule: 'live_full_uptime_days("mvp_v1") >= 180 and consecutive_quarters_positive_sharpe("mvp_v1") >= 2'
    rationale: |
      Per PIVOT Part G + CDP.10. Options is a separate discipline that
      reshapes L2 from weights to Greeks; adding it before stock system
      proves profitable is scope creep. Threshold is 6 months live_full
      uptime + 2 consecutive positive-Sharpe quarters as the
      hypothesis-trigger gate.
    helpers_required: [live_full_uptime_days, consecutive_quarters_positive_sharpe]
  - id: G.no_recursive_optimiser_before_mvp_complete
    name: Recursive optimiser construction blocked until MVP funnel complete
    rule: 'tier_complete("MVP")'
    rationale: |
      Per PIVOT Part E "What you DON'T do in v1." Build one strategy
      through the funnel first; THEN add a second strategy; THEN add
      the optimiser. Recursive optimiser-first is the architecture-
      before-substance anti-pattern.
    helpers_required: [tier_complete]
  - id: G.reconciliation_active_before_any_live_trading
    name: Reconciliation loop must be active before any live broker submission
    rule: 'reconciliation_active_for_env("live_small")'
    rationale: |
      Per PIVOT Part A + CDP.25. Reconciliation is non-negotiable.
      Without active reconciliation, broker-vs-cache drift is invisible
      and silent failures compound. Gate fires per env separately.
    helpers_required: [reconciliation_active_for_env]
  - id: G.contract_ratification_before_any_iceberg_write
    name: All Class A contract gates must be ratified before any new Iceberg write
    rule: 'all_contract_gates_ratified(D.lake.1) and all_contract_gates_ratified(D.lake.2) and all_contract_gates_ratified(D.lake.3) and all_contract_gates_ratified(D.lake.4) and all_contract_gates_ratified(D.lake.5) and all_contract_gates_ratified(D.lake.6) and all_contract_gates_ratified(D.lake.7)'
    rationale: |
      Per PLATFORM CD.25 ratification ritual + INTENT-pre-codegen-
      contract-ratification.md. Every Iceberg DDL writer must be gated
      on contract ratification. Currently every Class A contract here
      is in PLATFORM:CD.25 state; this gate becomes
      enforceable once the ritual lands.
    helpers_required: [all_contract_gates_ratified]
  - id: G.survivorship_inclusive_stats_required_for_promotion
    name: Promotion evaluation must include statistics from every pipeline (dead or alive)
    rule: 'survivorship_inclusive_stats_verified("mvp_v1")'
    rationale: |
      Per PIVOT Part E + CDP.19. Every pipeline that ever existed must
      be in the evaluation statistics, dead or alive. Survivorship-bias
      defence applied at every stage transition.
    helpers_required: [survivorship_inclusive_stats_verified]
  - id: G.no_synchronous_iceberg_write_from_decision_loop
    name: Decision-loop hot path must not write to Iceberg synchronously
    rule: 'item_field_eq(D.lake.8, "status", "complete")'
    rationale: |
      Per PIVOT Part A "what not to do" #1 + CDP.26. The buffered / SQS+
      Lambda Iceberg writer (D.lake.8) must be in place. Synchronous
      hot-path writes block the decision loop at Iceberg-commit
      timescales.
    helpers_required: [item_field_eq]
  - id: G.backtest_execution_timing_mirrors_live
    name: Backtest execution timing must mirror live (CDP.16)
    rule: 'item_field_eq(E.env.10, "status", "complete")'
    rationale: |
      Per PIVOT Part C trade-on-open-vs-close + CDP.16. Backtest engine
      must use the same execution-timing model as live (not the
      academic-backtest at-close assumption). E.env.10 is the backtest
      engine integration item.
    helpers_required: [item_field_eq]
  - id: G.dynamodb_cross_item_transaction_for_order_position_pair
    name: Order+position updates must use DynamoDB cross-item transactions
    rule: 'item_field_eq(D.fast.5, "status", "complete")'
    rationale: |
      Per PIVOT Part A + CDP.32. Hand-rolled concurrency is forbidden;
      DynamoDB cross-item transactions handle the order-update + position-
      update pair on fill events atomically.
    helpers_required: [item_field_eq]
  - id: G.no_neural_network_at_l3
    name: No neural-network execution at Layer 3 (CDP.14)
    rule: 'item_field_eq(L3.exec.8, "status", "complete")'
    rationale: |
      Per PIVOT Part E + CDP.14. L3 policies are rule-based with tuned
      thresholds. Marketable-limit v1 (L3.exec.8) is the production
      policy. Any ML at L3 must be filed as a separate plan with
      explicit critique gate.
    helpers_required: [item_field_eq]
  - id: G.asymmetric_research_to_prod_iam
    name: Research IAM must be READ-only against live tables (CDP.30)
    rule: 'item_field_eq(E.env.2, "status", "complete")'
    rationale: |
      Per PIVOT Part G Pattern C + CDP.30. Asymmetric IAM is the
      single-account discipline that gives Pattern A invariants without
      Pattern A overhead. E.env.2 lands the IAM + table-prefix isolation.
    helpers_required: [item_field_eq]

