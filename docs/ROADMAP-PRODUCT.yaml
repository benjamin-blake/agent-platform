four_layer_model:
  # Per PIVOT TRANSCRIPT Part C. L4 = Operations/Telemetry/Feedback - NOT
  # Risk Gates. Risk gates live as (a) L2 constraints and (b) L3 pre-trade hooks.
  - layer: alpha
    name: Alpha / Signal Generation
    responsibility: |
      Produces a score per asset: expected return, direction+confidence,
      ranking, or some scalar that says "I think this is hot." User's
      domain - formulas, models, PySR, ML, factor combinations.
    interface: "alpha(market_state: MarketState, params: AlphaParams) -> Signal"
    inputs: MarketState (per-symbol feature vectors at decision_time)
    outputs: Signal (per-symbol score)
    contract_refs:
      - {path: docs/contracts/alpha-protocol.yaml, class: C, contract_version: 1}
      - {path: docs/contracts/signal-payload.yaml, class: A, contract_version: 1}
      - {path: docs/contracts/market-state.yaml, class: C, contract_version: 1}
      - {path: docs/contracts/alpha-params.yaml, class: C, contract_version: 1}
      - {path: docs/contracts/alpha-versions.yaml, class: A, contract_version: 1}
  - layer: portfolio_construction
    name: Portfolio Construction
    responsibility: |
      Translates signals + constraints + risk model into target positions.
      "Given these scores, how much of each should I hold?" Outputs target
      portfolio (vector of weights or share counts). High-leverage middle
      layer that retail-quant content ignores.
    interface: "construct_portfolio(signal: Signal, current_portfolio: Portfolio, params: PCParams) -> TargetPortfolio"
    inputs: Signal, Portfolio (current state), Constraint set, CostCurve (consumed from PLATFORM TCA)
    outputs: TargetPortfolio (weight vector or share-count vector)
    contract_refs:
      - {path: docs/contracts/pc-protocol.yaml, class: C, contract_version: 1}
      - {path: docs/contracts/target-portfolio.yaml, class: A, contract_version: 1}
      - {path: docs/contracts/pc-versions.yaml, class: A, contract_version: 1}
      - {path: docs/contracts/constraint-set.yaml, class: C, contract_version: 1}
      - {path: docs/contracts/cost-curve.yaml, class: A, contract_version: 1}
    contains_risk_constraints: true
    notes: |
      Hedging is a Layer-2 CONSTRAINT, not a new layer (PIVOT Part G).
      Beta/dollar/sector/factor/currency/pairs hedges are linear
      constraints in the optimiser. Tail hedging is a separate
      insurance-sleeve concern outside L2. For sole-quant scale, default
      to size-down rather than hedging. Hard drawdown circuit breaker is
      also an L2 constraint (NOT an L4 surface).
  - layer: execution
    name: Execution
    responsibility: |
      Translates (target portfolio - current portfolio) into orders sent
      to broker. "How do I get from where I am to where I want to be,
      given transaction costs, slippage, microstructure?" At retail scale,
      boring-correct dominates clever.
    interface: "plan_trades(target: TargetPortfolio, current: Portfolio, params: ExecParams) -> list[Order]"
    inputs: TargetPortfolio, Portfolio (current), ExecParams, live market data via BrokerAdapter
    outputs: list[Order] submitted via BrokerAdapter.submit_order, Fills observed via BrokerAdapter.get_fills
    contract_refs:
      - {path: docs/contracts/exec-protocol.yaml, class: C, contract_version: 1}
      - {path: docs/contracts/broker-adapter.yaml, class: C, contract_version: 1}
      - {path: docs/contracts/order.yaml, class: A, contract_version: 1}
      - {path: docs/contracts/fill.yaml, class: A, contract_version: 1}
      - {path: docs/contracts/exec-versions.yaml, class: A, contract_version: 1}
      - {path: docs/contracts/exec-params.yaml, class: C, contract_version: 1}
      - {path: docs/contracts/implementation-shortfall.yaml, class: A, contract_version: 1}
    contains_pretrade_gates: true
    notes: |
      Pre-trade gates (margin check, position-cache check, circuit-
      breaker query) are L3 hooks that consult L2 constraint state.
      Execution mechanics are boring (marketable-limit at 10:00 ET);
      execution POLICY thresholds (liquidity gating, spread gating,
      vol-conditional timing) are tuned from live TCA telemetry, NOT
      backtests. No neural networks at L3.
  - layer: operations_telemetry
    name: Operations / Telemetry / Feedback
    responsibility: |
      Captures every layer invocation as a structured event, computes
      attribution (selection vs sizing vs execution), computes
      statistical-hygiene metrics (deflated Sharpe, PBO), and feeds the
      recursive improvement loop. The diagnostic layer that answers
      "strategy v17 underperforms v12 - is alpha worse? PC changed?
      Execution costlier? Platform behind a stable contract?"
    interface: "LayerInvocation event emission per layer per invocation"
    inputs: LayerInvocation events from L1/L2/L3; fills; signals; target_portfolios
    outputs: Brinson attribution rows, deflated Sharpe / PBO records, drift-detector recs filed via ops portal
    contract_refs:
      - {path: docs/contracts/layer-invocation.yaml, class: A, contract_version: 1}
      - {path: docs/contracts/brinson-attribution.yaml, class: A, contract_version: 1}
      - {path: docs/contracts/deflated-sharpe.yaml, class: A, contract_version: 1}
      - {path: docs/contracts/pbo.yaml, class: A, contract_version: 1}
      - {path: docs/contracts/promotion-events.yaml, class: A, contract_version: 1}
    notes: |
      L4 is OPERATIONS / TELEMETRY / FEEDBACK per PIVOT Part C diagram,
      NOT Risk Gates. The diagnostic question ("did the alpha-version
      change? did the PC-version change? did the exec-version change?")
      assumes L4 = telemetry that observes versioned L1-L3 components.

three_tier_data_architecture:
  description: |
    Per PIVOT TRANSCRIPT Part A. Three tiers with one-way data flow
    between them. Lakehouse is never a position store.
  diagram: |
    +----------------------------------------------------+
    | Broker (IBKR / Alpaca / etc.)                       |  OLTP source of truth
    | - canonical positions, cash, order state machine    |  for orders, positions, cash
    | - native client_order_id idempotency                |
    | - their problem to keep ACID, not yours             |
    +-------------------+---------------------------------+
                        | API + WebSocket
                        v
    +----------------------------------------------------+
    | Fast tier (DynamoDB)                                |  small, mutable, sub-ms
    | - idempotency keys for in-flight submissions        |
    | - in-flight orders cache (submitted, not yet acked) |
    | - position cache (refreshed from broker, drift-mon) |
    | - precomputed features keyed by symbol              |
    | - risk-limit current exposures                      |
    +-------------------+---------------------------------+
                        | append events
                        v
    +----------------------------------------------------+
    | Lakehouse (S3 + Iceberg + DuckDB)                   |  append-only history
    | - immutable event journal: decisions, submissions,  |
    |   acks, fills, reconciliations                      |
    | - market data history (batch-appended)              |
    | - backtest features, model artefacts                |
    | - reconciliation snapshots                          |
    +----------------------------------------------------+
  tiers:
    - tier: broker_oltp
      name: Broker (OLTP source of truth)
      description: |
        The broker (IBKR / Alpaca / etc.) is the authoritative system of
        record for orders, positions, cash, fills. Our system is a
        client, not the source of truth. Native client_order_id
        idempotency. ACID is the broker's problem.
      examples: [alpaca, interactive_brokers]
      write_authority: external
      contract_refs:
        - {path: docs/contracts/broker-adapter.yaml, class: C, contract_version: 1}
    - tier: fast_tier
      name: DynamoDB fast tier (sub-ms mutable cache)
      description: |
        Small mutable state outside the Single Portal Invariant because
        it is a derivative projection of the warehouse, not a write
        source. Conditional writes provide the OLTP primitives we
        actually need.
      rationale_for_dynamodb_not_postgres: |
        Single-writer eliminates MVCC wins; AWS-serverless-native;
        already in stack via ops portal ID allocation; key-value query
        patterns; <$1/mo on-demand; conditional writes (attribute_not_exists,
        condition: current_status IN ('submitted')) cover 95% of Postgres'
        transactional semantics for this workload.
      revisit_dynamodb_decision_when:
        - "Multiple concurrent decision agents write to the same positions (multi-strategy with shared book)"
        - "Pre-trade filters require complex relational predicates (e.g., reject any order that would create position correlated >0.7 with existing top-3 holdings)"
        - "Multi-region resilience required (Aurora Global / Yugabyte enters conversation)"
      tables:
        - name: orders
          pk: client_order_id
          write_pattern: PutItem with attribute_not_exists; UpdateItem with conditional state-machine guards
          owning_layer: execution
          contract_ref: {path: docs/contracts/dynamodb-orders.yaml, class: A, contract_version: 1}
        - name: positions_cache
          pk: symbol
          write_pattern: Refresh from broker on schedule + after fills via cross-item transactions
          owning_layer: execution
          contract_ref: {path: docs/contracts/dynamodb-positions-cache.yaml, class: A, contract_version: 1}
        - name: features_serving
          pk: symbol
          write_pattern: ONE-WAY projection from Iceberg via nightly batch (DuckDB over Iceberg). Live loop is read-only.
          owning_layer: alpha
          contract_ref: {path: docs/contracts/dynamodb-features-serving.yaml, class: A, contract_version: 1}
    - tier: lakehouse
      name: Lakehouse (S3 + Iceberg + DuckDB, append-only)
      description: |
        Append-only journal for audit, research, market-data history.
        Single Portal Invariant applies. Hot path writes via buffered
        writer or SQS -> Lambda batch-append; NEVER synchronous from
        decision loop.
      write_hot_path_rule: NEVER synchronous; buffered writer or SQS+Lambda batching
      write_market_data_rule: WebSocket -> in-memory ring buffer for decisions; batch-write every ~1 minute for history
      tables:
        - {name: strategies_versions, owning_layer: operations_telemetry}
        - {name: alpha_versions, owning_layer: operations_telemetry}
        - {name: pc_versions, owning_layer: operations_telemetry}
        - {name: exec_versions, owning_layer: operations_telemetry}
        - {name: strategy_runs, owning_layer: operations_telemetry}
        - {name: signals, owning_layer: alpha}
        - {name: target_portfolios, owning_layer: portfolio_construction}
        - {name: fills, owning_layer: execution}
        - {name: ops_trade_events, owning_layer: execution}
        - {name: ops_reconciliations, owning_layer: execution}
        - {name: tca_events, owning_layer: execution}
        - {name: pnl_attribution, owning_layer: operations_telemetry, kind: view}
        - {name: promotion_events, owning_layer: operations_telemetry}
        - {name: ops_recommendations, owning_layer: operations_telemetry, kind: extended_use, note: "PIVOT Part A tables/components table extends ops_recommendations for trading drift events; reconciliation drift fires a critical rec via existing portal flow, not a new table"}
  what_not_to_do:
    - "Don't write to Iceberg synchronously from the hot path - commits are seconds-scale; use buffered writer or SQS+Lambda batching"
    - "Don't try to make the lakehouse the live position store - snapshot isolation at second-scale freshness is wrong for trading"
    - "Don't hand-roll concurrency primitives - DynamoDB cross-item transactions exist; use them for order+position-cache pair"
    - "Don't skip reconciliation - even with two-layer idempotency, network partitions can leave local view divergent from broker"
    - "Don't put live market data in Iceberg in real-time - stream to in-memory ring buffer; batch-write to Iceberg every ~1 minute"
    - "Don't introduce Kafka / Kinesis prematurely - at single-agent volume, SQS + Lambda is sufficient"

environments:
  description: |
    Per PIVOT TRANSCRIPT Part G. Five-stage taxonomy. Environment is a
    config bundle, not a deployment - same code, different broker_adapter
    and capital_allocation. Industry-leading firms call this deploy-once,
    configure-per-environment.
  envs:
    - env: research
      code: pre_merge_exploratory
      data: production_historical_readonly
      broker_adapter: none
      capital_allocation: none
      telemetry_destination: research_sandbox
      table_prefix: research_
    - env: backtest_canonical
      code: merged_versioned
      data: frozen_canonical_dataset
      broker_adapter: HistoricalSimulationBroker
      capital_allocation: notional
      telemetry_destination: backtest_results_table
      table_prefix: backtest_
    - env: paper
      code: merged_versioned
      data: realtime_market
      broker_adapter: PaperBroker
      capital_allocation: notional
      telemetry_destination: production_telemetry_tagged_paper
      table_prefix: paper_
    - env: live_small
      code: merged_versioned
      data: realtime_market
      broker_adapter: AlpacaBroker
      capital_allocation: small_allocation
      telemetry_destination: production_telemetry
      table_prefix: live_
    - env: live_full
      code: merged_versioned
      data: realtime_market
      broker_adapter: AlpacaBroker
      capital_allocation: full_allocation
      telemetry_destination: production_telemetry
      table_prefix: live_
  invariants:
    - "Same code path across all environments. Only broker_adapter and config differ."
    - "One-way data flow: production telemetry feeds research; research never writes to production tables."
    - "Capital allocation is the production gate - promotion is a config change, not a deploy."
    - "Backtest data is frozen, versioned, survivor-bias-corrected. 'I re-ran the backtest and got different numbers' is a bug."
    - "Paper trading uses production infrastructure - same Function URL, IAM, telemetry as live."
    - "Promotion is a typed action with audit trail via promote_strategy() verb + promotion_events Iceberg table."
  isolation_pattern: pattern_c
  isolation_pattern_rationale: |
    Single AWS account, IAM + table-prefix isolation. Per PIVOT Part G
    + PLATFORM CD.6. Multi-account (Pattern A) is industrial overkill
    for sole dev. Pattern C invariants enforced:
    - Iceberg tables prefixed (research_strategy_runs, paper_strategy_runs, live_strategy_runs).
    - DynamoDB tables prefixed similarly.
    - Separate IAM roles per env with policies enforcing prefix boundaries.
    - Broker creds in separate Secrets Manager entries per env.
    - Asymmetric: research role can READ live telemetry; CANNOT WRITE to live tables.
  continuous_vs_on_demand:
    research: on_demand
    backtest_canonical: on_demand_triggered_by_strategy_versions_or_ci
    paper: continuous_mirrors_live_trading_hours
    live_small: continuous_market_hours_only
    live_full: continuous_market_hours_only

evaluation_metrics:
  layer_1_alpha:
    # Sizing-agnostic per PIVOT Part E identifiability fix
    - name: ic
      description: Information Coefficient - per-day rank correlation between predicted and realised returns; sizing-agnostic
      sizing_dependent: false
    - name: ir
      description: Information Ratio of the signal - IC mean / IC std; signal stability over time
      sizing_dependent: false
    - name: quantile_spread
      description: Top-decile minus bottom-decile realised return
      sizing_dependent: false
    - name: hit_rate_magnitude_weighted
      description: Fraction of correct direction predictions weighted by realised magnitude
      sizing_dependent: false
    - name: signal_decay_half_life
      description: Time horizon over which the alpha's IC decays to half its initial value
      sizing_dependent: false
    - name: alpha_pairwise_ic_correlation
      description: Pairwise IC correlation between alpha versions; L1 orthogonality target (frontier = 100+ orthogonal alphas)
      sizing_dependent: false
  layer_2_portfolio_construction:
    - name: brinson_attribution_sizing
      description: P&L attributed to sizing decisions holding alpha fixed
      sizing_dependent: true
    - name: turnover_adjusted_sharpe
      description: Sharpe net of explicit transaction costs
      sizing_dependent: true
    - name: realised_constraint_violation_rate
      description: Frequency of constraint hits (max position, sector cap, drawdown breach) per evaluation window
      sizing_dependent: true
  layer_3_execution:
    - name: implementation_shortfall
      description: (fill_price - decision_price) * sign(side) in bps; bucketed by (time-of-day, spread quintile, ADV quintile, vol regime, side)
      sizing_dependent: true
    - name: slippage_vs_expected
      description: Realised minus modelled slippage per bucket
      sizing_dependent: true
    - name: execution_fill_rate
      description: Filled / submitted ratio; gates retry-then-rec policy effectiveness
      sizing_dependent: false
  layer_4_operations_telemetry:
    # `role` distinguishes attribution / observability / drift_detector
    - name: layer_invocation_coverage
      description: Fraction of L1/L2/L3 invocations that successfully emit a LayerInvocation event; gates the recursive improvement loop
      sizing_dependent: false
      role: observability
    - name: brinson_full_attribution
      description: Per-strategy-version P&L decomposed across selection (L1) / sizing (L2) / execution (L3) / residual; the diagnostic surface
      sizing_dependent: true
      role: attribution
    - name: paper_vs_live_divergence
      description: For the same strategy_version_id in both paper and live, gap in fill prices / Sharpe / drawdown; execution-quality drift detector
      sizing_dependent: true
      role: drift_detector
    - name: reconciliation_drift_rate
      description: Frequency and magnitude of broker-vs-DynamoDB position-cache divergence events
      sizing_dependent: false
      role: drift_detector
    - name: code_path_hash_divergence
      description: Hash-mismatch events between backtest and live code paths for the same strategy_version_id; structural integrity check
      sizing_dependent: false
      role: drift_detector
  portfolio_level:
    - name: deflated_sharpe
      description: Lopez de Prado deflated Sharpe correcting for selection bias on multiple testing
    - name: probability_of_backtest_overfitting
      description: PBO check; gates promotion under multiple-hypothesis-testing discipline
    - name: max_drawdown
      description: Maximum peak-to-trough drawdown over evaluation window
    - name: profit_factor
      description: Sum of gains / absolute sum of losses
    - name: consecutive_losing_weeks
      description: Current run of weekly negative-Sharpe periods

minimum_viable_v1:
  # Per PIVOT TRANSCRIPT Part C "Minimum viable trading system, opinionated."
  # CRITICAL: numeric parameters live INSIDE a versioned Class A contract
  # at docs/contracts/minimum-viable-v1.yaml. NEVER as YAML scalars in this
  # roadmap. Inline numbers would fail the five-property optimisability
  # test (property #1: Parameterised - explicit, typed inputs).
  description: |
    Names the v1 composition. Numeric parameters (top_n, max_position_weight,
    rebalance_threshold_epsilon, drawdown_circuit_breaker.{lookback_days,
    drawdown_threshold, cash_days}, cash_buffer_min, spread_aggression_bps,
    submit_time, retry_policy, reconciliation_cadence_minutes) live inside
    the versioned PortfolioConstructionVersion / ExecutionPolicyVersion
    artefacts named below.
  composition_ref:
    strategy_version_id: "mvp_v1@<hash_pending_contract_ratification>"
    alpha_version_ref: "formula_score_top_n@<hash>"
    pc_version_ref: "equal_weight_top_n_v1@<hash>"
    exec_version_ref: "marketable_limit_v1@<hash>"
    risk_constraints_ref: "L2_v1_constraints@<hash>"
    environment_config_ref: "EnvironmentConfig.live_small[mvp_v1]"
  contract_refs:
    - path: docs/contracts/minimum-viable-v1.yaml
      class: A
      contract_version: 1
      contains: |
        - alpha.top_n (PIVOT Part C: "Top-N ranking, N=20" as DEFAULT, tunable under Bayesian-opt)
        - portfolio_construction.method (equal_weight_top_n OR risk_parity_top_n)
        - portfolio_construction.max_position_weight
        - portfolio_construction.gross_exposure_max
        - portfolio_construction.rebalance.{policy: threshold, epsilon}
        - portfolio_construction.drawdown_circuit_breaker.{lookback_days, drawdown_threshold, cash_days}
        - portfolio_construction.cash_buffer_min
        - execution.order_type (marketable_limit)
        - execution.spread_aggression_bps
        - execution.submit_time (10:00 ET daily)
        - execution.retry_policy (single_retry_then_file_rec)
        - operations.reconciliation_cadence_minutes
  pivot_quote_reference: |
    PIVOT TRANSCRIPT Section 11 Part C: "Minimum viable trading system,
    opinionated" block. Auditor cites verbatim in docs/contracts/
    minimum-viable-v1.yaml when authoring that contract in a follow-up plan.

promotion_funnel:
  # Per PIVOT TRANSCRIPT Part E four-stage funnel. Pre-registered promotion
  # criteria are themselves a ratified Class A contract; numeric thresholds
  # live inside the contract, NEVER as YAML scalars here.
  description: |
    Four-stage funnel with pre-registered promotion criteria. Skipping
    stages is the #1 retail-quant failure mode; each stage discovers a
    different class of bug. Stage criteria themselves are versioned
    Class A contracts.
  criteria_ref:
    path: docs/contracts/promotion-criteria.yaml
    class: A
    contract_version: 1
    contains: |
      Per-stage promotion criteria (numeric thresholds), drawn verbatim
      from PIVOT Part E "Promotion criteria, pre-registered" block:
        - research_backtest -> out_of_sample_paper:
            walk_forward_cv_passed; deflated_sharpe filter threshold;
            probability_of_backtest_overfitting check
        - out_of_sample_paper -> live_small:
            min_duration_days; deflated_sharpe_threshold;
            max_drawdown_threshold; consecutive_losing_weeks_cap;
            same_code_path_verified; survivorship_inclusive_stats_required
        - live_small -> live_full:
            min_duration_days; deflated_sharpe_threshold;
            max_drawdown_threshold;
            implementation_shortfall_within_budget;
            survivorship_inclusive_stats_required
        - production_ensemble:
            weighting (vol_scaled_equal_weight); rebalance_cadence (monthly)
      Threshold numbers authored verbatim inside the contract YAML, NOT here.
  pivot_quote_reference: |
    PIVOT TRANSCRIPT Section 11 Part E "Promotion criteria, pre-registered"
    + "Production ensemble weighting" blocks.
  stages:
    - stage: research_backtest
      population_size_target: hundreds
      data: frozen_canonical
      broker_adapter: HistoricalSimulationBroker
      purpose: cheap_exploration_filter_obviously_broken
      criteria_contract: docs/contracts/promotion-criteria.yaml#research_backtest_to_paper
    - stage: out_of_sample_paper
      population_size_target: 5_to_10
      data: realtime_market
      broker_adapter: PaperBroker
      purpose: data_pipeline_bugs_realtime_edge_cases_lookahead_bias
      criteria_contract: docs/contracts/promotion-criteria.yaml#paper_to_live_small
    - stage: live_small
      population_size_target: 3_to_5
      data: realtime_market
      broker_adapter: AlpacaBroker
      capital_allocation: small
      purpose: true_cost_discovery_via_TCA
      criteria_contract: docs/contracts/promotion-criteria.yaml#live_small_to_live_full
    - stage: live_full
      population_size_target: 3_to_5
      data: realtime_market
      broker_adapter: AlpacaBroker
      capital_allocation: full
      purpose: production_ensemble_member
      criteria_contract: docs/contracts/promotion-criteria.yaml#ensemble_weighting
  concurrent_paper_alongside_live: true
  champion_challenger: true
  ensemble_rule: |
    Vol-scaled equal-weight: each live pipeline gets weight 1/N *
    (target_vol / realised_vol_of_pipeline). Monthly rebalance. RESIST
    dynamic / performance-weighted ensembles initially - recent performance
    is mean-reverting noise; dynamic weighting introduces correlation that
    defeats diversification.

candidate_decisions:
  # CDP.1, CDP.2 ratified at audit close (subject to log-decision Lambda).
  # All others drawn from PIVOT TRANSCRIPT Parts A-G with verbatim/tight-
  # paraphrase quotes in `detail`. The candidate_decisions_research_pool
  # block lists candidates surfaced but not lifted to CDPs.
  - id: CDP.1
    title: Adopt docs/ROADMAP-PRODUCT.yaml as canonical product roadmap
    detail: |
      ROADMAP-PRODUCT.yaml is the source of truth for product sequencing.
      Supersedes docs/ROADMAP-PRODUCT.md (banner added; legacy markdown
      retained for one transition cycle as recovery artefact, deletion in
      follow-up commit per Section 10 gate #4 user decision).
    gates: [L0, L1, L2, L3, L4, D, E, MVP]
    state: pending
  - id: CDP.2
    title: Four-layer trading model is the organising principle
    detail: |
      Per PIVOT Part C diagram. L1 = Alpha (signal generation), L2 =
      Portfolio Construction (sizing + constraints + hedging), L3 =
      Execution (broker-facing), L4 = Operations / Telemetry / Feedback.
      Risk gates are NOT a fourth layer - they live as L2 constraints
      (hedging-as-constraint, max position, sector caps, gross/net
      exposure, drawdown circuit breaker) AND L3 pre-trade hooks (margin
      check, position-cache check, circuit-breaker query).
    gates: [L1, L2, L3, L4]
    state: pending
  - id: CDP.3
    title: Broker is the OLTP source of truth
    detail: |
      Per PIVOT Part A. The broker (IBKR / Alpaca / etc.) is the
      authoritative system of record for orders, positions, cash, fills.
      Our system is a client of the broker's OLTP, not its source of
      truth. ACID is the broker's problem.
    gates: [L3, D.fast, E.env]
    state: pending
  - id: CDP.4
    title: Three-tier data architecture (Broker / DynamoDB / Iceberg)
    detail: |
      Per PIVOT Part A. Fast tier = DynamoDB (sub-ms cache, conditional
      writes); Lakehouse = Iceberg/DuckDB (append-only history). Iceberg
      is NEVER a position store. DynamoDB is NOT a substitute for the
      broker's OLTP. Three tiers, three responsibilities, one-way data
      flow downstream.
    gates: [D.fast, D.lake]
    state: pending
  - id: CDP.5
    title: Same code path across environments
    detail: |
      Per PIVOT Part E + Part G. Backtest, paper, live_small, live_full
      all use identical code; only the BrokerAdapter Protocol
      implementation and capital_allocation differ. Diverging code paths
      is the #1 source of backtest-to-live degradation.
    gates: [L3, E.env, MVP]
    state: pending
  - id: CDP.6
    title: Environments are config bundles, not deployments
    detail: |
      Per PIVOT Part G "deploy-once, configure-per-environment." Same
      binary, different EnvironmentConfig. Promotion is "change the env,
      run again."
    gates: [E.env]
    state: pending
  - id: CDP.7
    title: Single AWS account, Pattern C isolation (IAM + table-prefix)
    detail: |
      Per PIVOT Part G + PLATFORM CD.6. Multi-account is industrial
      overkill for sole dev. Pattern C invariants: Iceberg + DynamoDB
      tables prefixed per env; separate IAM roles enforcing prefix
      boundaries; broker creds in separate Secrets Manager entries;
      asymmetric research-can-READ-live-but-not-WRITE.
    gates: [E.env]
    state: pending
  - id: CDP.8
    title: Layer 2 is Bayesian-opt + structured priors, NOT formula discovery
    detail: |
      Per PIVOT Part E identifiability discussion. Statistical power
      collapses ~2000x from L1 (per-symbol-per-day) to L2 (portfolio-
      rebalance). PySR or any symbolic regressor at L2 finds noise.
      L2 hyperparameter tuning uses Bayesian optimisation (Optuna,
      BoTorch) over a small structured search space of 5-10
      hyperparameters with strong theoretical priors.
    gates: [L2]
    state: pending
  - id: CDP.9
    title: Hedging is L2 constraint; default size-down at retail scale
    detail: |
      Per PIVOT Part G. Beta / dollar / sector / factor / currency /
      pairs hedges are linear constraints in the optimiser. Tail hedging
      is a separate insurance-sleeve concern outside L2 (behavioural
      instrument, not edge instrument). For sole-quant scale: DEFAULT
      to size-down rather than hedging. Revisit when factor model is
      trustworthy and alpha Sharpe survives halving from hedging costs.
    gates: [L2]
    state: pending
  - id: CDP.10
    title: Options trading deferred to post-MVP
    detail: |
      Per PIVOT Part G. Options is a separate discipline (Greeks change
      L2 from "aggregate weights" to "aggregate Greek exposures";
      multi-leg execution; expiry state machine). Adding options before
      the stock system is live and stable is scope creep that delays the
      harder thing (proving the stock system makes money live). See
      known_gaps.KG.options for hypothesis trigger.
    gates: []
    state: pending
  - id: CDP.11
    title: Full Kelly forbidden; only fractional Kelly
    detail: |
      Per PIVOT Part C L2 sub-problem (a). Kelly criterion is
      mathematically optimal for log-wealth growth but pathologically
      sensitive to estimation error in expected return. Practical
      version is fractional Kelly (e.g. 1/4 Kelly) - trades growth-
      optimality for robustness to bad estimates.
    gates: [L2]
    state: pending
  - id: CDP.12
    title: Hard drawdown circuit breaker non-negotiable (L2 constraint)
    detail: |
      Per PIVOT Part C L2 sub-problem (e). For a sole developer with real
      money at risk, the hard circuit breaker is non-negotiable. Tune
      generously so it rarely triggers, but it must exist. Lives as L2
      constraint, NOT L4 surface (L4 is Operations/Telemetry).
    gates: [L2, MVP]
    state: pending
  - id: CDP.13
    title: Execution policy tuned from live TCA telemetry, NOT backtests
    detail: |
      Per PIVOT Part E. Backtest-derived execution rules systematically
      underestimate live execution costs (market impact and microstructure
      aren't in historical data). Implementation shortfall is the metric;
      bucketed cost curves feed back into L2 cost-aware optimisation +
      L3 policy thresholds. Mechanics stay boring; POLICY tunes from live.
    gates: [L3]
    state: pending
  - id: CDP.14
    title: No neural networks at Layer 3
    detail: |
      Per PIVOT Part E. A neural network executing trades is exactly the
      wrong place to put ML for a retail-scale system. Complexity-to-edge
      ratio is awful. L3 policies are rule-based with tuned thresholds
      (liquidity gating, spread gating, vol-conditional timing) - NOT
      learned formulas.
    gates: [L3]
    state: pending
  - id: CDP.15
    title: Pipeline is the unit of optimisation
    detail: |
      Per PIVOT Part C. Alpha + portfolio construction + cost model + risk
      gates are backtested TOGETHER on out-of-sample data. Strategy
      parameters cannot be tuned by alpha-only backtests - leaves edge
      on the table AND admits the alpha-quality-vs-sizing-quality
      identifiability failure.
    gates: [L1, L2, L3, MVP]
    state: pending
  - id: CDP.16
    title: Trade-on-open-vs-close - backtest mirrors live timing
    detail: |
      Per PIVOT Part C. Most academic backtests assume execution at close;
      live trades execute at open or mid-morning. That gap is where
      backtest-to-live performance degradation lives. Mirror in the
      backtest framework whatever is done live.
    gates: [L3, E.env, MVP]
    state: pending
  - id: CDP.17
    title: Four-stage promotion funnel; skipping stages forbidden
    detail: |
      Per PIVOT Part E. research_backtest -> out_of_sample_paper ->
      live_small -> live_full. Each stage corrects a specific bias and
      discovers a different class of bug. Skipping stages is the #1
      retail-quant failure mode. No promotion bypasses the funnel.
    gates: [MVP]
    state: pending
  - id: CDP.18
    title: Promotion criteria are themselves a ratified Class A contract
    detail: |
      Per PIVOT Part E. Numeric thresholds (deflated_sharpe, max_drawdown,
      consecutive_losing_weeks, min_duration_days) live in
      docs/contracts/promotion-criteria.yaml Class A; NEVER as YAML
      scalars in this roadmap. "You cannot override your own past self
      when recent data feels good."
    gates: [MVP]
    state: pending
  - id: CDP.19
    title: Statistical hygiene - deflated Sharpe + PBO + survivorship-inclusive
    detail: |
      Per PIVOT Part E. Two killer biases: selection bias on multiple
      testing (remedy = Lopez de Prado deflated Sharpe + probability of
      backtest overfitting) AND survivorship bias (every pipeline that
      ever existed must be in evaluation, dead or alive).
    gates: [L4, MVP]
    state: pending
  - id: CDP.20
    title: Vol-scaled equal-weight ensemble; resist dynamic weighting
    detail: |
      Per PIVOT Part E. Each live pipeline gets 1/N * (target_vol /
      realised_vol_of_pipeline) weight. Monthly rebalance. Recent
      performance is mean-reverting noise at measurable timescales;
      dynamic weighting introduces correlation that defeats diversification.
    gates: [E.env, MVP]
    state: pending
  - id: CDP.21
    title: Five-property optimisability test on every L1-L4 tier_item
    detail: |
      Per PIVOT Part E. For any component to participate in the recursive
      improvement loop it must be (1) parameterised - explicit typed
      inputs; (2) versioned - stable identifier; (3) composable - clean
      I/O contracts; (4) observable - structured telemetry per invocation;
      (5) evaluable - defined success metric computable from telemetry.
      Hardcoded magic numbers fail #1; anonymous functions fail #2.
    gates: [L1, L2, L3, L4]
    state: pending
  - id: CDP.22
    title: Component-as-versioned-artifact (SCD2 Iceberg + Annotated Pydantic)
    detail: |
      Per PIVOT Part E. AlphaModelVersion / PortfolioConstructionVersion /
      ExecutionPolicyVersion / StrategyVersion are SCD2 Iceberg tables
      with Annotated-Pydantic models (extending PLATFORM CD.12). A
      strategy is a composition of versioned components, not a monolith.
    gates: [L1, L2, L3, D.lake]
    state: pending
  - id: CDP.23
    title: All product-domain Iceberg rows carry strategy_version_id lineage
    detail: |
      Per PIVOT Part E. Every signal, target_portfolio, order, fill,
      tca_event, attribution row, telemetry event carries
      strategy_version_id (and run_id where applicable). Any fill can be
      traced back to the exact alpha/pc/exec versions that produced it.
    gates: [D.lake, L4]
    state: pending
  - id: CDP.24
    title: Telemetry-as-contract (LayerInvocation per layer per invocation)
    detail: |
      Per PIVOT Part E. Every L1/L2/L3 invocation emits a structured
      LayerInvocation event with run_id, strategy_version_id, layer,
      component_version_id, inputs_hash, outputs_hash, metrics,
      duration_ms. Reproducible from logged inputs. Feeds the recursive
      optimisation loop. Class A persisted contract.
    gates: [L4]
    state: pending
  - id: CDP.25
    title: Reconciliation every N minutes during session is non-negotiable
    detail: |
      Per PIVOT Part A 7-step write-path step 7 + MVP v1 spec. Pull
      positions from broker every N minutes (MVP v1 N=30), diff against
      DynamoDB cache, append reconciliation event. Drift > tolerance
      files a critical rec via ops_recommendations (extended use).
    gates: [D.fast, E.env, MVP]
    state: pending
  - id: CDP.26
    title: No synchronous Iceberg writes from decision hot path
    detail: |
      Per PIVOT Part A "what not to do" #1. Iceberg commits are
      seconds-scale. Append via buffered writer that batches every 5-30s
      OR write event to SQS queue and let Lambda batch-append. Reuses
      PLATFORM outbox mental model.
    gates: [D.lake]
    state: pending
  - id: CDP.27
    title: No premature Kafka / Kinesis; SQS+Lambda suffices
    detail: |
      Per PIVOT Part A "what not to do" #6. At single-agent volume,
      SQS + Lambda is sufficient. Kinesis costs more than it saves until
      multiple consumers of the same stream exist.
    gates: [D.lake]
    state: pending
  - id: CDP.28
    title: Promotion is a typed verb with criteria-check baked in
    detail: |
      Per PIVOT Part E. promote_strategy(strategy_id, from_stage, to_stage,
      evaluation_window, capital_allocation) -> PromotionEventId checks
      pre-registered criteria inline. Failure returns typed rejection;
      overrides require amending ratified criteria first.
    gates: [E.env, MVP]
    state: pending
  - id: CDP.29
    title: Marketable-limit orders only at L3; market orders forbidden on illiquids
    detail: |
      Per PIVOT Part C. Marketable limit orders (limit price slightly
      through the spread) avoid slippage on jumpy stocks while filling
      near-instantly on liquid names. Never pure market orders for
      anything illiquid.
    gates: [L3]
    state: pending
  - id: CDP.30
    title: Asymmetric research-to-prod IAM (read but never write)
    detail: |
      Per PIVOT Part G Pattern C. The research role can READ live
      telemetry; CANNOT WRITE to live tables. Enforced at IAM. Invariant
      of multi-account isolation without multi-account overhead.
    gates: [E.env]
    state: pending
  - id: CDP.31
    title: Layer 2 + Layer 3 quality dominate Layer 1 quality at retail scale
    detail: |
      Per PIVOT Part C. Renaissance Medallion's edge is famously as much
      in execution and capacity management as in signal. Execution
      quality and risk discipline matter more than signal quality at
      sole-dev to medium scale. Drives investment allocation.
    gates: [L1, L2, L3]
    state: pending
  - id: CDP.32
    title: DynamoDB cross-item transactions for order+position-cache pair
    detail: |
      Per PIVOT Part A "what not to do" #3. Don't hand-roll concurrency
      primitives. DynamoDB cross-item transactions exist; use them for
      the order-update + position-update pair on fill events.
    gates: [D.fast]
    state: pending
  - id: CDP.33
    title: ops_recommendations is extended (not replaced) for trading drift events
    detail: |
      Per PIVOT Part A tables/components table. Reconciliation drift,
      TCA anomaly, paper-vs-live divergence all file critical recs via
      existing ops portal (Single Portal Invariant intact). No new
      "trading_drift" table - the existing recommendation workflow
      handles trading drift identically to platform drift.
    gates: [D.fast, D.lake, L4]
    state: pending
  - id: CDP.34
    title: L1 evaluation is sizing-agnostic
    detail: |
      Per PIVOT Part E identifiability fix. Evaluate L1 with IC, IR,
      quantile spread, hit-rate (magnitude-weighted), signal decay
      half-life, alpha pairwise IC correlation. NEVER use full-portfolio
      Sharpe to evaluate alpha quality (admits alpha-vs-sizing identifiability
      failure).
    gates: [L1, L4]
    state: pending
  - id: CDP.35
    title: Three-place order state machine - broker, DynamoDB, app code
    detail: |
      Per PIVOT Part A. Order lifecycle is a DAG (submitted -> acked ->
      filled | partial | cancelled | rejected) enforced in three places
      in order of authority: broker (canonical lifecycle); DynamoDB
      conditional UpdateItem (local races); application code (trading
      loop checks state before transitioning).
    gates: [D.fast, L3]
    state: pending
  - id: CDP.36
    title: Tail-hedge sleeve is behavioural instrument, not edge instrument
    detail: |
      Per PIVOT Part G. A small tail-hedge sleeve (1-3% of capital in long
      OTM puts) has behavioural value (lets the operator size alpha
      larger) but expected return is negative. Not a profit centre. Treat
      as behavioural overlay if used at all.
    gates: [L2]
    state: pending

candidate_decisions_research_pool:
  # Surfaced from PIVOT but NOT lifted to ratified CDPs in this audit -
  # either because they need further user input or because they're
  # forward-looking commitments tied to product evolution.
  - id: CDPR.1
    title: 100+ orthogonal alphas via meta-model (frontier)
    pivot_reference: PIVOT Part C "What the frontier looks like"
    pivot_quote: |
      Layer 1 (alpha): 100+ orthogonal alpha signals combined via a
      meta-model. Not one formula - a portfolio of formulas with negative
      or low correlation. Your PySR loop should aim at the orthogonality,
      not just predictive power.
    why_not_ratified_now: |
      L1.alpha.7 captures this as a tier_item but the meta-model design
      is itself a forward-pointing question; ratify after L1.alpha.8
      proves the SCD2 alpha catalogue works.
    proposed_resolution: ratify_in_followup
    affected_tier_items: [L1.alpha.7, L1.alpha.8]
  - id: CDPR.2
    title: Cost-aware MVO as L2 frontier
    pivot_reference: PIVOT Part C + Part E
    pivot_quote: |
      Layer 2 (portfolio construction): convex optimization with
      explicit cost model, factor-risk constraints, turnover penalty,
      position-decay terms. Industry standard since ~2010.
    why_not_ratified_now: |
      L2.pc.10 captures this; ratify after PLATFORM:T3.5
      delivers CostCurve substrate.
    proposed_resolution: ratify_in_followup
    affected_tier_items: [L2.pc.10]
  - id: CDPR.3
    title: Garleanu-Pedersen dynamic optimisation for turnover control
    pivot_reference: PIVOT Part C L2 sub-problem (d)
    pivot_quote: |
      Cost-aware optimization - penalize the trade-list size inside the
      portfolio construction step (Garleanu-Pedersen dynamic optimization
      is the academic version).
    why_not_ratified_now: |
      Threshold rebalance (L2.pc.6) is the v1 default; G-P is the
      escalation path if threshold rebalance plateaus.
    proposed_resolution: ratify_in_followup
    affected_tier_items: [L2.pc.6, L2.pc.10]
  - id: CDPR.4
    title: Factor model with Ledoit-Wolf shrinkage
    pivot_reference: PIVOT Part C L2 sub-problem (b)
    pivot_quote: |
      Middle path: factor-based risk model (Fama-French style - exposures
      to market, size, value, momentum factors). Bloomberg PORT, Barra,
      Axioma all sell this. For your scale, Ledoit-Wolf shrinkage on a
      covariance estimate is sufficient.
    why_not_ratified_now: |
      Risk-parity at L2.pc.4 implies covariance estimate; factor-model
      decomposition is the escalation. Ratify when L2.pc.4 proves
      insufficient.
    proposed_resolution: ratify_in_followup
    affected_tier_items: [L2.pc.4, L2.pc.10]
  - id: CDPR.5
    title: Cloud-analysis agent extension to trading domain
    pivot_reference: PIVOT Part E "How this composes with existing system"
    pivot_quote: |
      Your recommendation system reads from this table, identifies
      underperforming components, and files recommendations for improved
      versions.
    why_not_ratified_now: |
      L4.ops.5 captures the surface; ratify after PLATFORM T3.3 (cloud
      analysis agent) is in production.
    proposed_resolution: ratify_in_followup
    affected_tier_items: [L4.ops.5]
