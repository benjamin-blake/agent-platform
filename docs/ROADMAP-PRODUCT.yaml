# docs/ROADMAP-PRODUCT.yaml
#
# Canonical product roadmap for the recursively-self-improving trading system.
# Sibling to docs/ROADMAP-PLATFORM.yaml. Organised around the four-layer
# trading model (Alpha / Portfolio Construction / Execution / Operations-
# Telemetry) and environment-as-config-bundle.
#
# Supersedes docs/ROADMAP-PRODUCT.md (banner added; markdown retained for one
# transition cycle as a recovery artefact).
#
# Validation is deferred to scripts/product_roadmap.py (sibling to
# platform_roadmap.py) authored in a follow-up IMPLEMENTATION plan per the
# Section 10 gate #5 user decision. Until then this file is structurally
# defined but not Pydantic-validated; `bin/venv-python -m scripts.validate`
# does not exercise it.

document:
  id: ROADMAP-PRODUCT
  version: 1
  status: draft
  filed_via: pending_log_decision_lambda
  description: |
    Canonical product roadmap for the recursively-self-improving trading
    system. Sibling to docs/ROADMAP-PLATFORM.yaml. Organised around the
    four-layer trading model (Alpha / Portfolio Construction / Execution
    / Operations-Telemetry) and environment-as-config (research /
    backtest-canonical / paper / live-small / live-full). Supersedes
    docs/ROADMAP-PRODUCT.md.
  agent_instructions: |
    - Work is discoverable via tier_items[]. An item is eligible when status
      == "not_started" AND all depends_on entries have status == "complete"
      AND all cross_roadmap_depends_on PLATFORM entries are complete (or
      flagged GAP, in which case the PLATFORM gap must be filed before the
      product item can start).
    - depends_on entries are intra-PRODUCT only; cross_roadmap_depends_on
      carries PLATFORM:<id> or PLATFORM:GAP-<slug> references. Always
      reference items by id (e.g. L1.alpha.3); titles change, ids do not.
    - The four layers (Alpha, Portfolio Construction, Execution,
      Operations/Telemetry) are the organising principle (per PIVOT
      transcript Part C). Risk gates do NOT live at L4 - they are L2
      constraints (hedging, sizing, exposure caps in construct_portfolio's
      constraint argument) AND L3 pre-trade hooks (margin / position-cache
      / circuit-breaker checks in plan_trades' early-exit path).
      L4 = Operations/Telemetry/Feedback: LayerInvocation emission,
      Brinson attribution, deflated Sharpe, PBO, recursive-improvement
      loop. NOT Risk Gates.
    - Storage is three-tier per PIVOT Part A: broker = OLTP source of
      truth (orders, positions, cash, fills); DynamoDB = fast mutable
      tier (sub-ms cache, conditional writes for state-machine guards);
      Iceberg/DuckDB = append-only lakehouse for audit/research/history.
      Never write to Iceberg synchronously from decision hot path
      (buffered writer or SQS+Lambda batch).
    - Environments are config bundles (PIVOT Part G). Five envs: research,
      backtest_canonical, paper, live_small, live_full. Same code path
      across all; ONLY the broker_adapter and capital_allocation differ.
      Diverging backtest/live code paths is the #1 source of backtest-
      to-live performance degradation.
    - All product schemas persisted to Iceberg are Class A per the CD.25
      contract ratification ritual (PLATFORM:CD.25).
      Every persisted row carries strategy_version_id lineage AND
      _contract_version stamp.
    - Lambda-touching items carry the AGENTS.md canonical deferred_note
      string: "DEFERRED: build_lambda.py --deploy + run_scheduled_agent.py
      --smoke-test (pending Decision 67 reversal)". Deploys gate on
      PLATFORM CD.16 ratification, not CD.17.
    - STRATEGIC plan-artefact freeze (PLATFORM CD.17) applies: every L*
      item is strategic: false. L/XL effort items decompose into atomic
      IMPLEMENTATION plans during /plan; no STRATEGIC plans are filed
      while CD.17 holds.
    - The MVP v1 numeric parameters live INSIDE a versioned Class A
      contract at docs/contracts/minimum-viable-v1.yaml. NEVER inline as
      YAML scalars in this roadmap. Same discipline applies to
      promotion criteria (docs/contracts/promotion-criteria.yaml).
      Inline scalars defeat the five-property optimisability test.
    - Five-property test (parameterised / versioned / composable /
      observable / evaluable) is REQUIRED on every L1-L4 tier_item.
      Each attestation cites a path:line or a forward-pointing tier_item
      id. Bare prose attestations FAIL the audit definition-of-done.
    - Pre-codegen contract ratification (PLATFORM CD.25) gates every
      docs/contracts/<slug>.yaml. New product contracts are authored as
      follow-up REPORT-ONLY plans, NOT inline in this audit.
    - Options trading is PIVOT-DEFERRED until the stock system is live
      and stable. See known_gaps[].KG.options for the hypothesis trigger.
    - Per AGENTS.md: no emojis, no em dashes; plain ASCII hyphens.
      Single Portal Invariant applies to ops_recommendations + ops_decisions
      writes - extended use for trading drift events (PIVOT Part A
      tables/components table), not a new write portal.
    - Contract-class taxonomy (per docs/INTENT-pre-codegen-contract-
      ratification.md, summarised in-file per Checkpoint 4 F8 fix):
        Class A: data schemas that become persistent durable storage
          (Iceberg DDL, DynamoDB table shape). Every Class A row stamps
          its _contract_version column. Examples: signals, target_portfolios,
          fills, alpha_versions, pc_versions, exec_versions, strategy_runs,
          tca_events, promotion_events, orders, positions_cache. Amendments
          default forward-compatible; semantic breaks require explicit
          opt-in via ratified amendment plan.
        Class B: public agent surfaces (Lambda Function URL verb contracts).
          Carry typed payload shapes + typed error codes + auth model.
          Examples: promote_strategy, get_cost_curve, reconciliation
          Lambda. Class B contracts ratify post-PLATFORM-CD.16 with
          provisional_v0 + staggered re-ratification triggers.
        Class C: cross-system invariants + in-process Protocols /
          Pydantic-only configs that span multiple processes but don't
          persist to a DDL. Examples: BrokerAdapter Protocol, alpha()/
          construct_portfolio()/plan_trades() Protocols, MarketState,
          AlphaParams, PCParams, ExecParams, Constraint set,
          EnvironmentConfig, PromotionCriteria.
    - PIVOT TRANSCRIPT reference convention: tier_items, candidate_decisions,
      and cross_tier_gates cite "PIVOT Part A/B/C/D/E/F/G" pointing at
      docs/AUDIT-PROMPT-product-roadmap-yaml.md Section 11. Part A =
      data architecture; Part C = four-layer model; Part E = identifiability
      + execution + funnel + repo; Part G = hedging + options + envs +
      separation. Parts B/D/F are user questions only.
    - Tier_items are grouped by layer prefix (L0/L1/L2/L3/L4/D.fast/D.lake/
      E.env/MVP) rather than sorted lexicographically. Within each prefix
      items appear in the order they are introduced.

  gate_helpers:
    # PLATFORM helpers inherited via gate_helpers grammar:
    #   tier_complete/1, all_in_tier_with_status/2, grace_period_elapsed/2,
    #   item_field_eq/3 (see docs/ROADMAP-PLATFORM.yaml document.gate_helpers).
    # PRODUCT-local helpers below. All scope=product_local per Subagent G.
    - name: deflated_sharpe
      arity: 3
      params:
        - name: strategy_id
          type: str
        - name: env
          type: str
        - name: window_days
          type: int
      returns: float
      semantics: |
        Lopez de Prado deflated Sharpe ratio over window for strategy in
        env. Corrects for selection bias on multiple testing. Evaluator
        queries strategy_runs Iceberg table; returns float. Per PIVOT
        Part E statistical-hygiene discipline.
      scope: product_local
    - name: max_drawdown
      arity: 3
      params:
        - name: strategy_id
          type: str
        - name: env
          type: str
        - name: window_days
          type: int
      returns: float
      semantics: |
        Maximum peak-to-trough drawdown over window for strategy in env.
        Evaluator queries strategy_runs Iceberg table. Returns positive
        float (e.g. 0.12 = 12% drawdown).
      scope: product_local
    - name: consecutive_losing_weeks
      arity: 2
      params:
        - name: strategy_id
          type: str
        - name: env
          type: str
      returns: int
      semantics: |
        Current consecutive losing weeks for strategy in env. Per PIVOT
        Part E promotion criterion ("no more than 3 consecutive losing
        weeks"). Evaluator queries weekly Sharpe deltas from strategy_runs.
      scope: product_local
    - name: implementation_shortfall_within_budget
      arity: 3
      params:
        - name: strategy_id
          type: str
        - name: env
          type: str
        - name: budget_bps
          type: float
      returns: bool
      semantics: |
        True iff mean per-fill implementation shortfall in bps over the
        evaluation window is <= budget_bps. Reads tca_events Iceberg
        table. Per PIVOT Part E live_small -> live_full gate.
      scope: product_local
    - name: ic_oos
      arity: 2
      params:
        - name: alpha_version_id
          type: str
        - name: window_days
          type: int
      returns: float
      semantics: |
        Out-of-sample Information Coefficient for alpha_version over
        window. Per-day rank-correlation between predicted and realised
        returns, averaged. Sizing-agnostic L1 metric per PIVOT Part E
        identifiability fix.
      scope: product_local
    - name: ir_oos
      arity: 2
      params:
        - name: alpha_version_id
          type: str
        - name: window_days
          type: int
      returns: float
      semantics: |
        Out-of-sample Information Ratio of the signal (IC mean / IC std)
        for alpha_version over window. Signal stability over time. Per
        PIVOT Part E.
      scope: product_local
    - name: code_path_verification_present_for
      arity: 1
      params:
        - name: strategy_version_id
          type: str
      returns: bool
      semantics: |
        True iff a runtime-recorded code-path verification exists for
        the given strategy_version_id, attesting that the backtest and
        live invocations used the same code path (only broker_adapter
        differed). Demoted from code_path_hash because the hash mechanism
        is its own tier_item (E.env.10 backtest engine integration).
      scope: product_local
    - name: live_full_uptime_days
      arity: 1
      params:
        - name: strategy_id
          type: str
      returns: int
      semantics: |
        Continuous uptime days for strategy in live_full environment.
        Gates downstream items that need production stability evidence.
      scope: product_local
    - name: consecutive_quarters_positive_sharpe
      arity: 1
      params:
        - name: strategy_id
          type: str
      returns: int
      semantics: |
        Number of consecutive quarters with positive realised Sharpe in
        live_full. Long-horizon stability metric.
      scope: product_local
    - name: all_contract_gates_ratified
      arity: 1
      params:
        - name: item_id
          type: str
      returns: bool
      semantics: |
        True iff every docs/contracts/<slug>.yaml entry in this
        tier_item's contract_gates[] has status == "ratified". In-Python
        evaluator over docs/contracts/ git tree (NOT warehouse).
      scope: product_local
    - name: reconciliation_active_for_env
      arity: 1
      params:
        - name: env
          type: str
      returns: bool
      semantics: |
        True iff the reconciliation loop (E.env.8) is running on schedule
        for env, with last successful reconciliation event within the
        last hour. Reads ops_reconciliations Iceberg table.
      scope: product_local
    - name: survivorship_inclusive_stats_verified
      arity: 1
      params:
        - name: strategy_id
          type: str
      returns: bool
      semantics: |
        True iff promotion evaluation for strategy_id includes statistics
        from every pipeline that ever existed for the strategy family
        (dead or alive). Per PIVOT Part E survivorship-bias defence.
        In-Python evaluator over strategies_versions + promotion_events.
      scope: product_local

north_star:
  principles:
    - id: NSP.1
      principle: Discipline first, optimisation second.
      detail: |
        The frontier is reached by rigorous structure that admits clever
        algorithms when statistical power justifies them, NOT by clever
        algorithms applied to broken structure. (PIVOT transcript Part E
        TL;DR verbatim.)
    - id: NSP.2
      principle: Broker is the OLTP source of truth.
      detail: |
        Orders, positions, cash, and fills are the broker's authoritative
        responsibility. Our system is a client of the broker's OLTP, not
        its source of truth. ACID is the broker's problem.
    - id: NSP.3
      principle: Same code path across environments.
      detail: |
        Backtest, paper, live_small, live_full all use identical code;
        only the BrokerAdapter Protocol implementation and capital
        allocation differ. Diverging code paths is the #1 source of
        backtest-to-live degradation.
    - id: NSP.4
      principle: Pipeline is the unit of optimisation.
      detail: |
        Alpha + Portfolio Construction + Execution + risk gates are
        backtested together. Alpha-only optimisation is not promotable -
        joint identifiability between alpha quality and sizing quality
        is the killer bias.
    - id: NSP.5
      principle: Layer 2 and Layer 3 quality dominate Layer 1 quality at retail scale.
      detail: |
        At small-to-medium size, execution quality and risk discipline
        matter more than signal quality. Renaissance Medallion's edge is
        as much in execution and capacity management as in signal.
    - id: NSP.6
      principle: Promotion is config, never override.
      detail: |
        Pre-registered promotion criteria are ratified Class A contracts
        (docs/contracts/promotion-criteria.yaml). Promotion is a typed
        verb with criteria-check baked in. You cannot override your own
        past self when recent data feels good.
    - id: NSP.7
      principle: Recursive improvement is the loop, not a feature.
      detail: |
        Every layer invocation emits LayerInvocation telemetry.
        Underperforming components become recommendations via the
        ops portal. The autonomous-improvement substrate extends from
        platform to trading without architectural change.
    - id: NSP.8
      principle: Every component is parameterised, versioned, composable, observable, evaluable.
      detail: |
        The five-property optimisability test. Hardcoded magic numbers
        fail #1; anonymous functions fail #2; tight coupling fails #3;
        hidden state fails #4; "I'll know it when I see it" fails #5.
        Every L1-L4 tier_item attests to all five with path:line cites.
    - id: NSP.9
      principle: Append-only journaling; broker is OLTP, lakehouse is history.
      detail: |
        Iceberg never serves as a position store. DynamoDB carries
        sub-ms mutable state. Hot-path writes batch to Iceberg via
        buffered writer or SQS+Lambda. Reconciliation between broker and
        DynamoDB cache is non-negotiable.
    - id: NSP.10
      principle: Hedging is L2 constraint, not a new layer.
      detail: |
        For sole-quant scale, default to size-down over hedging. Hedging
        costs money; sizing-down is free. Revisit when factor model is
        trustworthy and alpha Sharpe survives halving from hedging costs.

