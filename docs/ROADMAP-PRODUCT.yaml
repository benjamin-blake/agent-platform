    reason: |
      The Phase 3 formula_models / formula_outcomes PostgreSQL pgvector
      schema is PIVOT-SUPERSEDED. Per PIVOT Part A, broker is OLTP and
      DynamoDB is the fast tier - no PostgreSQL. Per PIVOT Part E,
      alpha versioning lives in alpha_versions Iceberg SCD2 table.
      Per CDP.22, component-as-versioned-artifact is the discipline.
      PostgreSQL pgvector was the pre-pivot strategy A; the four-layer
      model replaces it with strategy-as-composition.
  - source_section: "Phase 4 / A/B Testing Framework (50/50 traffic split, t-test, GitHub Actions promotion)"
    source_bullet_ids: [80, 81, 82, 83, 84, 85, 87]
    reason: |
      Phase 4 A/B testing is PIVOT-SUPERSEDED by the four-stage promotion
      funnel (research_backtest -> out_of_sample_paper -> live_small ->
      live_full) per PIVOT Part E + CDP.17. The funnel discovers a
      different class of bug at each stage; the simple A/B with t-test
      conflates statistical power across stages. Promotion criteria are
      pre-registered as ratified Class A contracts per CDP.18, not
      computed inline.
  - source_section: "Phase 5 / Circuit Breakers (Per-formula failure detection)"
    source_bullet_ids: [90, 92]
    reason: |
      The Phase 5 per-formula circuit breaker concept is PIVOT-RECLASSIFIED.
      Per PIVOT Part C + CDP.12, drawdown circuit breaker is an L2
      constraint (in construct_portfolio's constraints argument). Per
      PIVOT Part E + CDP.13, execution-side gating (spread, liquidity,
      vol-conditional) is an L3 policy tuned from live TCA, not a
      per-formula heuristic. The Phase 5 mechanism is split across
      L2.pc.7 (drawdown breaker) and L3.exec.9 (pre-trade gate) +
      L3.exec.12 (policy thresholds). Sharpe-decay-based auto-pause
      from Phase 5 is superseded by the explicit drawdown trigger.
  - source_section: "Phase 7 / Automated Weighting & Decay (Sharpe-based per-formula weighting)"
    source_bullet_ids: [101, 102, 103, 104, 105, 107]
    reason: |
      Phase 7 Sharpe-decay weighting is PIVOT-SUPERSEDED by the
      production-ensemble vol-scaled equal-weight rule per PIVOT Part E
      + CDP.20. Recent-performance weighting is mean-reverting noise at
      measurable timescales; dynamic weighting introduces correlation
      that defeats diversification. Monthly rebalance, weight = 1/N *
      (target_vol / realised_vol_of_pipeline). Resist dynamic ensembles.
  - source_section: "Phase 1 / formula_lineage Iceberg table + dual-env config split"
    source_bullet_ids: [3, 4]
    reason: |
      The Phase 1 formula_lineage table is PIVOT-SUPERSEDED by the
      SCD2 alpha_versions / pc_versions / exec_versions / strategies_versions
      Iceberg tables per PIVOT Part E + CDP.22. Single lineage table
      conflates component-level versioning with strategy-level composition;
      the four-table catalogue separates them with proper SCD2 semantics.
      The dual-env config split (config.company.yaml vs config.personal.yaml)
      is PIVOT-SUPERSEDED by EnvironmentConfig Pydantic (E.env.1) per
      CDP.6 environments-as-config-bundles.
  - source_section: "Phase Infra-Env / Multi-account staging+production model"
    source_bullet_ids: [109, 110, 115, 116, 120, 121]
    reason: |
      The Phase Infra-Env staging/production multi-account GitHub
      Environments model is PIVOT-RECLASSIFIED. Per PIVOT Part G + CDP.7,
      single-account Pattern C (IAM + table-prefix isolation) is the
      correct posture for sole-dev. Multi-account (Pattern A) is
      industrial overkill. The Phase Infra-Env workflow (sandbox ->
      staging -> production via GitHub Actions environments) is
      replaced by promotion-as-config-change per CDP.6.
  - source_section: "Phase 6 / Per-formula CloudWatch + Grafana surfaces"
    source_bullet_ids: [96, 97, 106]
    reason: |
      Per-formula CloudWatch metrics export + Grafana formula-performance
      dashboards + weight-distribution dashboards are PIVOT-SUPERSEDED.
      Per PIVOT Part E + CDP.20 vol-scaled equal-weight ensemble, the
      weight-distribution surface becomes a derived view over
      promotion_events + strategy_runs (Brinson attribution in L4.ops.2
      provides the canonical sizing surface). CloudWatch metrics are
      subsumed by LayerInvocation telemetry (L4.ops.1) emitted by every
      layer invocation; bespoke metrics emitter retired.
  - source_section: "Phase Infra-Platform / Copilot SDK migration P3 (parallel planning)"
    source_bullet_ids: []
    reason: |
      Phase Infra-Platform P3 (parallel multi-rec planning via SDK) is
      PIVOT-ORTHOGONAL but explicitly deferred per Decision 40 + PIVOT
      Part E "what NOT to do in v1." Parallel execution is not a
      near-term priority - sequential processing on the autonomous
      executor VM at ~20 min per rec covers the open-rec queue in
      <3 calendar days. Parallelism becomes relevant only if throughput
      becomes the North Star bottleneck. Tracked as PLATFORM concern,
      not PRODUCT. source_bullet_ids intentionally empty - the catalogue
      classified Copilot SDK P3 entries as PIVOT-ORTHOGONAL not
      PIVOT-SUPERSEDED; this entry is structural acknowledgement that
      we declare P3 retired from PRODUCT roadmap regardless of
      catalogue classification.

