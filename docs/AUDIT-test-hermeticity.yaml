  # ---------------------------------------------------------------------------
  # Module reload / shared-state contamination (fixed this session)
  # ---------------------------------------------------------------------------

  - file: tests/test_executor_step_runner.py
    class: TestVenvPythonResolution
    root_cause_class: shared_state
    disposition: fix
    notes: >-
      _restore_module_state fixture called importlib.reload(sr_mod) in both setup
      AND teardown, leaving a new StepOutcome class in sr_mod after teardown.
      Module-level `from ... import StepOutcome` in downstream tests held a stale
      reference, causing `outcome == StepOutcome.X` to fail (different class
      identity). Fixed: save+restore sr_mod.__dict__ instead of reload-in-teardown.

  - file: tests/test_feature_engine.py
    class: module
    root_cause_class: shared_state
    disposition: fix
    notes: >-
      src.data.feature_engine._fear_greed_cache is a module-level dict with a
      5-minute TTL; test_fetch_fear_greed_index_returns_score_on_success caches
      42.5, then test_fetch_fear_greed_index_retries_on_malformed_json gets the
      cached value instead of its mock. Fixed in conftest.py autouse fixture
      _clear_fear_greed_cache that clears the dict before each test.

  # ---------------------------------------------------------------------------
