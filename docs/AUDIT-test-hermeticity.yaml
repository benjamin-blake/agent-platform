# Test Hermeticity Audit
# Machine-readable report produced by PLAN-test-hermeticity.md (2026-06-02).
# Each entry covers a non-hermetic test class / file identified during the audit.
# Fields:
#   file            - relative path from repo root
#   class           - test class name (or "module" for module-level issues)
#   root_cause_class - live_network_call | clock_dependence | module_level_probe |
#                      random_without_seed | filesystem_order | shared_state
#   disposition     - fix | quarantine | integration_exempt
#   notes           - one-line description of the fix or exemption rationale

tests:

