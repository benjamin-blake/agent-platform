---
# Class A data contract for ops_recommendations (DuckLake SCD2 table).
# Ratified under the CD.25 pre-codegen contract ratification ritual (T0.12.5).
# Authored against the live DuckLake column inventory in
# config/lambda/ducklake/field_semantics.yaml (25 columns + _contract_version = 26 total).
#
# Decision 65: this contract + src/schemas/rec.py Annotated model are the canonical
# field-semantic authority. ops.yaml (config/agent/data_quality/ops.yaml) retires via T1.6.
# Decision 84: sole backend is DuckLake-on-Neon. id is writer/file_ops-allocated (I-2).
# Decision 63: execution_* fields (5) are DQ-EXCLUDED -- documented but not DQ-enforced.
contract:
  id: ops_recommendations
  class: A
  contract_version: 1
  status: ratified
  ratified_at: "2026-06-20"
  ratified_via: >-
    Step 11 smoke-test pass + PLAN-ratify-ops-class-a-contracts merge to main (T0.12.5)
  description: >-
    Class A schema contract for the ops_recommendations DuckLake SCD2 table.
    Canonical field-semantic authority per Decision 65 (supersedes ops.yaml, which retires
    via T1.6). 26 fields: 25 from the live DuckLake inventory in
    config/lambda/ducklake/field_semantics.yaml plus _contract_version (stamped at write
    time by the ducklake_writer Lambda, T0.12.5). Sole backend is DuckLake-on-Neon
    (Decision 84); reads transit the closed ducklake_reader boundary (NAMED VERBS only).
    id is allocated atomically by file_ops (Decision 84 I-2); ULID is derived by the runtime.
    Five execution_* fields are DQ-EXCLUDED (Decision 63).
fields:
  ulid:
    type: str
    iceberg_type: string
    nullable: false
    description: >-
      Monotonic ULID minted once per write attempt by ducklake_runtime, outside the
      OCC-retry loop. Reused unchanged on retry. History table logical PK; idempotency
      dedup key in MERGE-on-ULID append.
    semantics: >-
      SCD2 envelope field; NOT caller-supplied. Collision-free across concurrent writes
      via python-ulid monotonic generation.
    populated_by: >-
      ducklake_runtime._derive_fields() -- minted once at op-start; NEVER caller-supplied.
    dq_intent:
      not_null:
        enforced: true

  id:
    type: str
    iceberg_type: string
    nullable: false
    description: >-
      Stable natural key for the recommendation. Format: "rec-NNNN" (e.g. rec-0042).
      Allocated atomically by the ducklake_writer file_ops action (Decision 84 I-2);
      never pre-generated by the caller. update_ops and write_ops require the caller to
      supply an existing id.
    semantics: >-
      Natural key and MERGE key for the current projection (ops_recommendations_current).
      Partitioned as bucket(8, id) on the current table for efficient point lookups.
    populated_by: >-
      ducklake_writer/file_ops allocates atomically in-transaction. update_rec/write_ops
      require caller to supply an existing id.
    dq_intent:
      not_null:
        enforced: true

  title:
    type: str
    iceberg_type: string
    nullable: true
    description: One-line human-readable title for the recommendation.
    semantics: >-
      The recommendation title is a required signal for human triage. Empty or null
      titles are accepted by the schema gate but are flagged by DQ enforcement.
    populated_by: Caller-supplied on file_rec/write_ops payload.
    dq_intent:
      not_null:
        enforced: true

  source:
    $ref: "docs/contracts/source-lineage.yaml#/contract/fields/registry_key"
    dq_intent_local:
      not_null:
        enforced: true
        write_time: true
        exclude_before: "2026-05-01"

  effort:
    type: str
    iceberg_type: string
    nullable: true
    description: >-
      Effort estimate for the recommendation. Currently a free-text string (e.g. "S", "M",
      "L", "XL"). Target-state is a LOC-weighted integer encoding deferred to T2.31.
    semantics: >-
      DERIVED field (target-state). Currently stored as caller-supplied string; derivation
      is deferred to T2.31. The derivation block documents the target-state formula.
    populated_by: Caller-supplied until T2.31; derivation rewrites on T2.31 release.
    dq_intent:
      not_null:
        enforced: false
    derivation:
      formula: >-
        LOC-weighted integer encoding. Target: estimate_effort(file, lines_of_code)
        returning int 1-5 (1=XS, 2=S, 3=M, 4=L, 5=XL). Deferred to T2.31.
      inputs:
        - file
        - lines_of_code_in_file
      recompute_trigger: file change or manual override
      degradation_policy: >-
        Absent radon/coverage data: retain caller-supplied string value unchanged.
        Null file: retain caller-supplied value. Derivation is best-effort until T2.31.

  priority:
    type: str
    iceberg_type: string
    nullable: true
    description: >-
      Priority level of the recommendation. Encoding: 1=Critical, 2=High, 3=Medium, 4=Low.
      Derived from the recommendation source via source_priority_map; target-state with full
      derivation realization deferred to T2.30.
    semantics: >-
      DERIVED field (target-state). Currently stored as caller-supplied string. The
      derivation block documents the source_priority_map for all 30 registered sources.
      Full derivation realization deferred to T2.30.
    populated_by: Caller-supplied until T2.30; derivation rewrites on T2.30 release.
    dq_intent:
      not_null:
        enforced: false
    derivation:
      formula: >-
        source_priority_map[source] if source in source_priority_map else fallback_priority.
        Encoding: 1=Critical, 2=High, 3=Medium, 4=Low. Realization pointer: T2.30.
      inputs:
        - source
      recompute_trigger: source field change
      failure_policy: fallback_priority
      fallback_priority: 3
      source_priority_map:
        ci_rca: 1
        budget_breach: 1
        executor-postmortem: 2
        executor-supervision: 2
        architectural-review: 2
        code-review: 3
        planning: 3
        implement-agent: 3
        brainstorm: 3
        telemetry-audit: 3
        workflow-audit: 3
        delegate-investigation: 3
        infra-recommendation-executor: 3
        executor-gap-analysis: 3
        scoping: 3
        cli-migration-analysis: 3
        tech-debt: 3
        manual: 3
        implement-session: 3
        budget_bypass: 3
        agent-cron: 3
        cc-scheduled-agent-test: 4
        doc-freshness: 4
        orphan-code: 4
        transcript-review: 4
        code-smell: 4
        prompt-quality: 4
        rec-curator: 4
        autonomous-postflight-cleanup: 4
        "Autonomous Postflight Cleanup": 4

  status:
    type: str
    iceberg_type: string
    nullable: false
    description: >-
      Recommendation lifecycle status. Valid values: open, closed, in_progress, deferred,
      superseded, declined.
    semantics: >-
      Status controls eligibility for the executor queue. Only "open" and "in_progress"
      recs are eligible for execution. Closed recs retain their full history in the
      SCD2 history table. Closure via lifecycle state, not deletion (Decision 70).
    populated_by: Caller-supplied on file_rec (default=open); updated via update_rec.
    dq_intent:
      not_null:
        enforced: true

  automatable:
    type: bool
    iceberg_type: boolean
    nullable: true
    description: >-
      Whether the autonomous executor can implement this recommendation without human
      intervention. Derived from capabilities.yaml maturity ceiling; overrideable by caller.
      Derivation deferred to T2.31.
    semantics: >-
      DERIVED field (target-state). Recomputed when capabilities.yaml maturity_ceiling
      changes (Decision 44/73 boundary file). Currently caller-supplied.
    populated_by: Caller-supplied until derivation is live at T2.31.
    dq_intent:
      not_null:
        enforced: false
    derivation:
      formula: >-
        True if all risk/effort/dependency gates pass and executor capability covers the
        rec's domain per capabilities.yaml maturity_ceiling. False otherwise. Deferred to T2.31.
      inputs:
        - risk
        - effort
        - dependencies
        - file
      recompute_trigger: capabilities.yaml maturity_ceiling change (Decision 44/73)
      failure_policy: >-
        Capability mismatch or missing capabilities.yaml: set False (conservative -- do not
        automate what the capability map cannot confirm). Null file: set False.

  risk:
    type: str
    iceberg_type: string
    nullable: true
    description: >-
      Qualitative risk assessment string (e.g. "low", "medium", "high"). Derived from
      radon complexity and coverage data for the target file. Derivation deferred to T2.31.
    semantics: >-
      DERIVED field (target-state). Currently caller-supplied string. The derivation block
      documents the target-state formula using radon and coverage.xml data.
    populated_by: Caller-supplied until T2.31.
    dq_intent:
      not_null:
        enforced: false
    derivation:
      formula: >-
        estimate_risk(file, radon_complexity, coverage_pct) returning 'low'|'medium'|'high'.
        Deferred to T2.31.
      inputs:
        - file
        - radon_complexity
        - coverage_pct
      recompute_trigger: radon or coverage.xml output change for the target file
      degradation_policy: >-
        Absent radon or coverage.xml: retain caller-supplied string value unchanged.
        Null file: retain caller-supplied value. Derivation is best-effort until T2.31.

  file:
    type: str
    iceberg_type: string
    nullable: true
    description: Primary target file path (relative to repo root) for this recommendation.
    semantics: >-
      The executor reads this field to determine which file to modify. Used as the dedup
      gate key in the scoping step. Null for cross-cutting recs without a single primary file.
    populated_by: Caller-supplied on file_rec.
    dq_intent:
      not_null:
        enforced: false

  context:
    type: str
    iceberg_type: string
    nullable: true
    description: >-
      Human-readable context explaining WHY this recommendation is needed. Minimum 50
      characters enforced at write time by the JIT context injection rule (AGENTS.md).
    semantics: >-
      Context is the primary LLM-consumption field. The executor reads this to understand
      the problem before acting. Thin or generic context is the main cause of executor
      failure on first attempt.
    populated_by: Caller-supplied on file_rec; quality-gated by rec_write_guidance.py.
    dq_intent:
      not_null:
        enforced: false

  acceptance:
    type: str
    iceberg_type: string
    nullable: true
    description: >-
      Acceptance criterion for the recommendation. Shape: str | list[TypedCheck].
      Scalar-string form is a legacy acceptance command (backward compat). Typed-check
      form is list[TypedCheck] per CD.29 (TypedCheck = {type, severity, command?, ...}).
    semantics: >-
      The executor runs this as the acceptance test after implementing the recommendation.
      The consumer shim (step_runner.py, acceptance_lint.py) normalizes list[str] and
      list[dict] at T0.12.5. Full typed-check dispatch by type deferred to T3.6.
    populated_by: Caller-supplied on file_rec.
    dq_intent:
      not_null:
        enforced: false
    amendment_log:
      - date: "2026-06-20"
        semantic_break: false
        change_class: type_widen
        summary: acceptance widened from str to str | list[TypedCheck] per CD.29
        migration_story: >-
          Field shape ratified as str | list[TypedCheck] at T0.12.5. TypedCheck =
          {type: str (CD.29 kernel primitives: command_exit_zero, command_output_matches,
          file_exists), severity: str (required|quarantine), command?: str, ...}.
          Scalar-string acceptance remains valid via the union (backward compat). Full
          executor typed-check dispatch by type (e.g. file_exists -> test -f,
          output_matches -> grep) deferred to T3.6; at T0.12.5, the consumer shim in
          step_runner.py (run_acceptance, _extract_acceptance_command) and acceptance_lint.py
          (validate_acceptance_feasibility, lint_acceptance_command) normalizes list[str]
          (join with ' && ') and list[dict] TypedCheck (extract command field, join with
          ' && '). Empty list treated as null.
          field-shape-ratified-at: T0.12.5 / full-executor-typed-check-dispatch-deferred-to: T3.6.

  verification:
    type: str
    iceberg_type: string
    nullable: true
    description: >-
      Verification plan description for the recommendation. Documents HOW the executor
      should verify the implementation beyond the acceptance command.
    semantics: >-
      Human-readable verification plan consumed by the executor to confirm end-to-end
      correctness beyond the acceptance command. Null for recs with no explicit VP step.
    populated_by: Caller-supplied on file_rec.
    dq_intent:
      not_null:
        enforced: false

  verification_tier:
    type: str
    iceberg_type: string
    nullable: true
    description: >-
      Verification tier identifier (V1, V2, V3). Controls the depth of live verification
      required: V1=static/format, V2=functional, V3=deploy+smoke-test.
    semantics: >-
      Executor routing signal: V3 requires build+deploy+smoke-test steps (Decision 79/CD.16).
      V2 requires functional end-to-end test. V1 requires only static/format checks.
      Null implies V1 (advisory default). Validated against the implement skill's VP protocol.
    populated_by: Caller-supplied on file_rec.
    dq_intent:
      not_null:
        enforced: false

  dependencies:
    type: "list[str]"
    iceberg_type: "array<string>"
    nullable: true
    description: List of rec-IDs or tier-item IDs that must complete before this recommendation.
    semantics: >-
      Dependency gate: the executor checks that all listed rec-IDs or tier-item IDs are in
      status=closed before scheduling this rec. Null or empty list means no gate.
    populated_by: Caller-supplied on file_rec.
    dq_intent:
      not_null:
        enforced: false

  tags:
    type: "list[str]"
    iceberg_type: "array<string>"
    nullable: true
    description: Free-form tags for categorization and filtering.
    semantics: >-
      Unstructured categorization signal. Not DQ-enforced; used for ad-hoc filtering
      in the ops portal and rec-curator ranking. No canonical vocabulary at T0.12.5.
    populated_by: Caller-supplied on file_rec.
    dq_intent:
      not_null:
        enforced: false

  resolution:
    type: str
    iceberg_type: string
    nullable: true
    description: >-
      Human-readable explanation of how the recommendation was resolved (closed, declined,
      superseded). Populated at close time via update_rec.
    semantics: >-
      Closure narrative consumed by audit tooling and the /orient session summary. Empty
      resolution on closed/declined/superseded recs is a data-quality warning (not an error).
    populated_by: >-
      Caller-supplied on update_rec at close time (Decision 70 closure-via-lifecycle-state).
    dq_intent:
      not_null:
        enforced: false

  execution_result:
    type: str
    iceberg_type: string
    nullable: true
    description: >-
      Executor post-run result field. DQ-EXCLUDED (Decision 63): not DQ-enforced and not derived.
      Written by the executor after a run attempt.
    semantics: >-
      Executor-internal write-only signal. Not read by the planning or triage paths.
      DQ-EXCLUDED (Decision 63): the DQ runner does not enforce or derive this field.
    governance_notes: >-
      Decision 63 DQ-exclusion: execution_* fields are executor-internal write-only fields
      that the DQ runner does not enforce. They are NOT derived fields.
    populated_by: execute_recommendation.py writes this after run completion.
    dq_intent:
      not_null:
        enforced: false

  execution_date:
    type: str
    iceberg_type: string
    nullable: true
    description: ISO date string of the last executor run attempt. DQ-EXCLUDED (Decision 63).
    semantics: >-
      Executor-internal timestamp for postmortem audit. DQ-EXCLUDED (Decision 63):
      not enforced or derived. See execution_result semantics.
    governance_notes: Decision 63 DQ-exclusion. See execution_result governance_notes.
    populated_by: execute_recommendation.py writes this after run completion.
    dq_intent:
      not_null:
        enforced: false

  execution_branch:
    type: str
    iceberg_type: string
    nullable: true
    description: Git branch name used in the last executor run attempt. DQ-EXCLUDED (Decision 63).
    semantics: >-
      Executor-internal git-context field for postmortem audit. DQ-EXCLUDED (Decision 63):
      not enforced or derived. See execution_result semantics.
    governance_notes: Decision 63 DQ-exclusion. See execution_result governance_notes.
    populated_by: execute_recommendation.py writes this after run completion.
    dq_intent:
      not_null:
        enforced: false

  execution_pr_url:
    type: str
    iceberg_type: string
    nullable: true
    description: GitHub PR URL created in the last executor run attempt. DQ-EXCLUDED (Decision 63).
    semantics: >-
      Executor-internal PR reference for postmortem audit. DQ-EXCLUDED (Decision 63):
      not enforced or derived. See execution_result semantics.
    governance_notes: Decision 63 DQ-exclusion. See execution_result governance_notes.
    populated_by: execute_recommendation.py writes this after run completion.
    dq_intent:
      not_null:
        enforced: false

  execution_steps:
    type: int
    iceberg_type: long
    nullable: true
    description: >-
      Number of execution steps completed in the last executor run attempt. Stored as
      BIGINT. DQ-EXCLUDED (Decision 63).
    semantics: >-
      Executor-internal progress counter for postmortem audit. DQ-EXCLUDED (Decision 63):
      not enforced or derived. See execution_result semantics.
    governance_notes: Decision 63 DQ-exclusion. See execution_result governance_notes.
    populated_by: execute_recommendation.py writes this after run completion.
    dq_intent:
      not_null:
        enforced: false

  created_timestamp:
    type: datetime
    iceberg_type: timestamptz
    nullable: false
    description: >-
      UTC timestamp minted at first write (INSERT). Carried unchanged on all subsequent
      UPDATEs to preserve original creation time across SCD2 versions.
    semantics: >-
      SCD2 envelope field. Minted once at op-start by ducklake_runtime, OUTSIDE the
      OCC-retry loop. For UPDATE: the existing value from the current projection is
      carried; it is NEVER re-stamped. Partitions the history table via day(created_timestamp).
    populated_by: ducklake_runtime._derive_fields() -- NOT caller-supplied.
    dq_intent:
      not_null:
        enforced: true

  last_updated_timestamp:
    type: datetime
    iceberg_type: timestamptz
    nullable: false
    description: >-
      UTC timestamp of the most recent write to this record. Updated on every write.
      SCD2 ordering key.
    semantics: >-
      SCD2 envelope field. Minted once at op-start by ducklake_runtime, OUTSIDE the
      OCC-retry loop. Stable across all retry iterations of the same write attempt.
      Together with ulid, serves as the tiebreak for selecting the latest SCD2 version.
    populated_by: ducklake_runtime._derive_fields() -- NOT caller-supplied.
    dq_intent:
      not_null:
        enforced: true

  context_v2_json:
    type: str
    iceberg_type: string
    nullable: true
    description: >-
      Structured JSON context blob. Supersedes the free-text context field for
      machine-parseable context. Additive migration column (post-initial-deploy).
    semantics: >-
      JSON-serialized structured context for machine consumption. When present, the executor
      preferentially reads this over the free-text context field. Schema is unvalidated at
      T0.12.5; validated shape is deferred to the context-v2 graduation milestone.
    populated_by: Caller-supplied on file_rec/write_ops for recs that populate v2 context.
    dq_intent:
      not_null:
        enforced: false

  _contract_version:
    type: str
    iceberg_type: string
    nullable: true
    description: >-
      Contract version string stamped by the ducklake_writer Lambda at write time.
      Value "1" for all rows written after T0.12.5 ratification. Historical rows
      written before T0.12.5 carry NULL (the pre-ratification sentinel).
    semantics: >-
      Handler-layer sentinel: the ducklake_writer handler stamps this on the write payload
      before passing it to ducklake_runtime (action_write_ops, action_file_ops,
      action_update_ops). Role is `input` in field_semantics.yaml so the schema gate
      accepts it from the handler layer. Callers SHOULD NOT supply it -- the handler
      default is "1"; a pre-supplied value is honoured (allows future version bumps
      without a handler redeploy). COALESCE("1") in read paths treats
      NULL historical rows (written before T0.12.5) as the pre-ratification "1" baseline.
    populated_by: >-
      ducklake_writer Lambda handler.py stamps record['_contract_version'] =
      record.get('_contract_version', '1') before rt.write_scd2 / rt.file_scd2.
      NOT on the smoke-table action_write path.
    dq_intent:
      not_null:
        enforced: false

governance:
  table_class: SCD2
  partition_by: "history=day(created_timestamp), current=bucket(8, id)"
  dedup_view: ops_recommendations_current
  write_path: >-
    scripts/ops_data_portal.py (file_rec, update_rec) ->
    ducklake_writer Lambda (agent-platform-ducklake-writer) ->
    src/common/ducklake_runtime.py (write_scd2, file_scd2)
  id_allocator: >-
    ducklake_writer/file_ops allocates id atomically in-transaction (Decision 84 I-2).
    Client MUST NOT pre-generate ids.

governance_notes: >-
  Decision 65: This contract and src/schemas/rec.py Annotated model are the canonical
  field-semantic authority for ops_recommendations. ops.yaml
  (config/agent/data_quality/ops.yaml) retires via T1.6; do NOT use ops.yaml as the
  authoritative reference for field semantics after T0.12.5 ratification.
  Decision 84: Sole backend is DuckLake-on-Neon. There is NO Athena/Iceberg path and
  NO OPS_STORAGE_BACKEND env var (retired). Reads transit the closed ducklake_reader
  boundary via NAMED VERBS only (no caller SQL).
  Decision 63: execution_* fields (execution_result, execution_date, execution_branch,
  execution_pr_url, execution_steps) are DQ-EXCLUDED. They are documented here for
  completeness but carry no DQ enforcement or derivation blocks.
  Decision 44: step_runner.py and acceptance_lint.py are executor boundary files;
  modifications require human-driven /implement only.
  _contract_version: nullable sentinel field stamped by the Lambda handler. Historical rows
  (written before T0.12.5) carry NULL; production rows carry "1".

amendment_log: []
previous_versions: []
