# Machine-readable discovery/ownership index (audit finding RS-04, repository-structure
# restructure P1). NOT a Class A/B/C ritual contract -- carries no top-level contract:/class:
# block, so the CD.25 drift gate (validate_contract_drift) skips this file as a non-ritual
# doc (precedent: telemetry-lexicon.yaml, read-engine.yaml, storage-substrate.yaml). No
# ratification ritual, amendment log, or status lifecycle applies here.
#
# Relocation contract: each route's `targets` list is the single place a file/directory's
# repo-relative path is recorded for discovery purposes. Moving or renaming a target during a
# later restructure phase is a one-line edit to the relevant route's targets. Directory
# targets end with a trailing slash. scripts/checks/hygiene/validate_placement.py (registered
# in both validate.py presubmit tiers) fails the build if any non-runtime target no longer
# resolves to a git-tracked file or directory, and rejects duplicate topics and malformed rows.
#
# `runtime: true` marks a route whose target is a warehouse read-cache: a gitignored or
# otherwise untracked file that is regenerated at runtime (Decision 84 local-cache model).
# For these rows the link-validity check asserts the PARENT directory is tracked, not the
# file itself, since a `git ls-files` snapshot never contains an untracked path.
#
# Converted from the prose "## File Router" table in docs/PROJECT_CONTEXT.md (Decision 86:
# machine field-semantics live here; the prose surface is now a one-line pointer). The
# top-level mapping is extensible so later phases can add sibling placement-registry keys
# (e.g. a docs-root allowlist, a scripts-root allowlist) without a schema break.
