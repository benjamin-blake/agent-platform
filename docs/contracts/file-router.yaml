# docs/-root placement allowlist (RS-03). A sibling top-level key (reserved by this file's header),
# NOT a route. scripts/checks/hygiene/validate_placement.py reads this and fails the build on any
# NEW depth-1 file under docs/ that is neither an allowed governance surface nor a grandfathered
# retiring-set member. Subdirectories (class homes) are not policed here. True at merge: every
# current docs/-root file is covered.
docs_root_allowlist:
  # Canonical governance surfaces sanctioned directly under docs/ (exact filename match).
  # CLAUDE.md is the docs/ directory-rules file added by this phase (RS-05) -- it is a governance
  # surface and must be listed so the check does not flag the file that introduced the check.
  allowed_files:
    - CHANGELOG.md
    - CLAUDE.md
    - PROJECT_CONTEXT.md
    - ROADMAP-PLATFORM.yaml
    - ROADMAP-PRODUCT.md
    - ROADMAP-PRODUCT.yaml
    - ROADMAP-SEMANTO.yaml
  # Retiring sets grandfathered pending their owners (fnmatch globs). Each retires on its own
  # schedule; remove its entry when the owner completes. INTENT-*.md existence is separately
  # gated by validate_intent_doc_freeze via docs/intent-migration/MANIFEST.yaml.
  grandfathered_globs:
    - "INTENT-*.md"            # owner T5.5 (intent-migration waves)
    - "DECISIONS.md"           # owner T1.5
    - "DECISIONS_ARCHIVE.md"   # owner T1.5
    - "SESSION_LOG.md"         # owner T2.26 / T-1.9
    - "SESSION_LOG_ARCHIVE.md" # owner T2.26 / T-1.9

# Repo-wide sanctioned-prose allowlist (Decision 127 expanding Decision 86). A sibling top-level
# key (reserved by this file's header), NOT a route. scripts/checks/hygiene/validate_prose_allowlist.py
# reads this and fails the build on any git-tracked .md file matching neither allowed_globs nor
# grandfathered_globs. Scope is DISTINCT from docs_root_allowlist above (docs/-root depth-1 files
# only) and from validate_intent_doc_freeze (docs/INTENT-*.md existence, gated by the
# intent-migration MANIFEST.yaml) -- this key governs every tracked .md file repo-wide.
prose_allowlist:
  # Permanent sanctioned-prose classes -- the only prose whose audience-of-record is an agent
  # (Decision 127). Root-level permanent files are listed as BARE filenames (not **/CLAUDE.md-style)
  # so they classify without relying on ** matching zero path segments -- belt-and-suspenders even
  # though the matcher genuinely honors that case.
  allowed_globs:
    - CLAUDE.md
    - AGENTS.md
    - README.md
    - SECURITY.md
    - "**/CLAUDE.md"
    - ".claude/skills/**/SKILL.md"
    - ".claude/commands/**/*.md"
    - "config/agent/executor/prompts/**/*.md"
    - "config/agent/executor/instructions/**/*.md"
    - ".github/**/*.md"
    - "docs/contracts/**/*.md"
    - "docs/audit-prompts/**/*.md"
    - "audits/**/*.md"
    - "docs/plans/**/*.md"
    - docs/PROJECT_CONTEXT.md
    # Decision 101(c) permanent exception: marketing prose is one-way downstream (never fed back
    # to agents), so it is a permanent sanctioned NON-agent-instruction class, not agent-instruction
    # itself -- pre-sanctioned even though marketing/ does not exist on disk yet.
    - "marketing/**/*.md"
  # Ratchet-only (may only shrink in later plans, e.g. the B2 follow-on; never grows). Seeded
  # deterministically to cover every currently-tracked .md not matched by allowed_globs above, so
  # this guard is green on day one. Deletes nothing (full day-one grandfather set).
  grandfathered_globs:
    - docs/CHANGELOG.md          # governance ledger; post-MVP retirement target (mechanically too
                                  # costly to retire now)
    - docs/DECISIONS.md          # governance ledger; still a working SoT; post-MVP retirement target
    - docs/DECISIONS_ARCHIVE.md
    - docs/ROADMAP-PRODUCT.md
    - docs/SESSION_LOG.md        # owner T2.26 / T-1.9
    - docs/SESSION_LOG_ARCHIVE.md
    - "docs/INTENT-*.md"         # owner T5.5 (intent-migration waves)
    - docs/runbooks/ducklake-catalog-operations.md  # retiring class (Decision 127; docs/CLAUDE.md Class->home map)
    - ".claude/agents/scheduled/*.md"

# scripts/-root placement allowlist (RS-01 completion, PLAN-nest-llm-family / rec-164 Phase A
# final phase). A sibling top-level key (same shape as docs_root_allowlist above), NOT a route.
# scripts/checks/hygiene/validate_placement.py reads this and fails the build on any NEW depth-1
# file under scripts/ that is neither an allowed entry-point/single nor a grandfathered pending
# family. Subdirectories (subpackage homes: scripts/checks/, scripts/executor/, scripts/verifiers/,
# scripts/ci_rca/, scripts/session/, scripts/sync/, scripts/roadmap/, scripts/llm/, etc.) are not
# policed here. True at merge: every current scripts/-root file is covered (generated via
# `git ls-files scripts | awk -F/ 'NF==2'` minus the ops pair).
scripts_root_allowlist:
