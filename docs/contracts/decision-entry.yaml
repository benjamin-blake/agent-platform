# Decision-entry authoring grammar (audit finding DAF-03 / Decision 134 clause 3 / Plan 3
# PLAN-daf-authoring-grammar). NOT a Class A/B/C ritual contract -- no top-level contract:/class:
# block, so the CD.25 drift gate (validate_contract_drift) skips this file as a non-ritual doc
# (precedent: file-router.yaml, deploy-paths.yaml, read-engine.yaml; free-form registry per
# Decision 118).
#
# Purpose: name the ONE canonical shape a docs/DECISIONS.md / docs/DECISIONS_ARCHIVE.md entry
# must take, so authors stop imitating the previous entry (folklore) and every structural
# consumer (the R1 ratification guard, the preflight open-decisions counter, the forward
# conformance check below, any future index generator) can import ONE shared parser --
# scripts/decisions_md.py -- instead of hand-rolling its own regex. This file is the source of
# truth for required_markers/optional_markers; scripts/checks/decisions/
# validate_decision_entry_conformance.py reads required_markers from here at check time (never
# hardcodes its own copy).
#
# Scope: forward-enforced on genuinely-NEW decision entries only (a header number absent from
# the origin/main baseline). The historical band (every entry that exists at origin/main) is
# grandfathered -- imitation-folklore entries do not retroactively fail a contract that postdates
# them (see docs/DECISIONS_ARCHIVE.md's Decisions 52/53/54, promoted from h3 to h2 by this same
# plan, which lack a separate Date marker and would fail Required markers if retro-enforced).
schema_version: 1

header_form: "## Decision NNN: <title> (<status>)"

header_grammar_note: >-
  The live file (docs/DECISIONS.md) uses '## Decision NNN:' (h2) exclusively. The archive
  (docs/DECISIONS_ARCHIVE.md) also uses '## Decision NNN:' (h2) exclusively as of this plan's
  DPI-07 promote (docs/DECISIONS_ARCHIVE.md previously carried 3 non-conforming h3 '### Decision
  NNN:' entries -- Decisions 52/53/54 -- promoted to h2 here). scripts/decisions_md.py's shared
  _DECISION_HEADING_RE grammar (r"^#{2,3}\s+Decision\s+(\d+):\s*(.+)$") still tolerates h3 for
  read-compatibility with any pre-promote git history a consumer walks, but no entry may be
  AUTHORED at h3 going forward -- h2 is the sole authoring convention for both files.

# Every marker below is a bold, colon-terminated line prefix: "**<Marker>:**". Multiline bodies
# (the common case) put the marker on its own line with the body on the following line(s);
# a single-line inline body ("**Marker:** text") is also accepted (see
# scripts.decisions_md._extract_by_marker_pattern, which tries both forms).

required_markers:
  # Every entry -- new or historical -- carries these three. Forward-enforced (new entries
  # only) by validate_decision_entry_conformance; the historical band is grandfathered.
  - Status
  - Date
  - Decision

optional_markers_fixed_spelling:
  # Not required, but WHEN PRESENT must use exactly this spelling so the shared parser's
  # exact-marker extraction (scripts.decisions_md._extract_multiline_section /
  # _extract_related_decisions) recognizes them. A synonym (e.g. "Trigger" for "Problem",
  # "Key details" for "Rationale") is tolerated by the parser as a fallback alias but the
  # canonical spelling below is preferred for new entries.
  - Problem
  - Rationale
  - Reversal conditions
  - Related
  - Warehouse ID

decision_marker_tolerance: >-
  The "Decision" required marker tolerates a decorated form -- "**Decision (four
  invariants):**", "**Decision (single-writer numbering):**" -- as long as the marker's inner
  text starts with the literal word "Decision" (scripts.decisions_md._DECISION_MARKER_BODY:
  r"Decision\b[^:]*"). Plain "**Decision:**" is the preferred spelling for new entries; the
  decorated form is tolerated for continuity with the historical band (e.g. dec-084), never
  widened past the leading word "Decision" (so "**Decision Required By:**", an unrelated field
  used in unheaded candidate-decision sections, never collides).

amendment_forms:
  # Two annotation shapes appear in the historical band; both are tolerated read-side, neither
  # is required. A NEW entry never predicts its own amendment -- these forms only apply when an
  # EXISTING ratified entry is later amended in place.
  - form: trailing_bracket
    example: "[Amendment 2026-07-03: ...]"
    description: >-
      A trailing bracketed annotation appended after the entry's original body, dated, prefixed
      "[Amendment ".
  - form: blockquote_update
    example: "> **Update (2026-05-01):** ..."
    description: >-
      A blockquote-prefixed dated update line, prefixed "> **Update (".

supersession_marker: "**Superseded by: Decision N**"
supersession_marker_note: >-
  MUST be spelled EXACTLY as above for a NEW entry -- byte-identical to
  scripts.decisions_md._SUPERSEDED_BY_RE's primary form (Plan 2 / PR #605). The historical band's
  differently-shaped "**Superseded by:** Decision N" (colon after the word "by", not before "Decision")
  is tolerated read-side (the same regex's fallback alternative) but is NOT a valid spelling for
  a new entry.

related_decisions_form: >-
  "**Related:** Decision N (...), Decisions M/P (...)" -- both the singular "Decision N" form and
  the plural "Decisions M/P" (slash- or comma-separated) form are accepted; the shared parser
  dedupes by first occurrence (scripts.decisions_md._extract_related_decisions).

decided_date_form: >-
  Prefer an explicit "**Date:**" marker with an ISO-shaped value (YYYY-MM or YYYY-MM-DD). When
  absent, the parser falls back to the "**Status:**" line's " -- <suffix>" clause ONLY when that
  suffix is itself ISO-shaped -- a non-date clause (e.g. "Status: Active -- remove when reversal
  condition is met") is never harvested as a date (DAF-01 fix). New entries should always carry
  an explicit "**Date:**" marker rather than relying on the fallback.

compaction:
  # Number-preserving decision-compaction lifecycle (audit findings DCG-02/DCG-03,
  # audits/decision-consolidation-growth-f79d6b5.yaml; PLAN-dcg-compaction-lifecycle). The named
  # relief valve for live-file size pressure alongside archival (Decision 146) -- for entries
  # that cannot archive because live code/contracts still cite the number by name. First
  # exercised on Decision 44 (its boundary-pattern table now lives in
  # config/agent/executor/capabilities.yaml per Decision 117, but capabilities.yaml and
  # scripts/checks/executor/validate_executor_boundary.py still cite "Decision 44" by name, so
  # the entry cannot move to the archive).
  eligibility_criterion: >-
    An entry compacts only when its ENTIRE body is superseded/inert AND the superseder restates
    or subsumes every live clause the entry ever carried -- a partial supersession (the
    superseder settles only some of the victim's clauses) is never eligible; the surviving live
    clauses keep the entry full-bodied. Direction-consistency: only the SUPERSEDED VICTIM
    compacts, never the superseder -- see the archived-52-supersedes-live-37/40 inversion
    (audits/decision-consolidation-growth-f79d6b5.yaml Q4 extension, used there as criterion
    evidence for this rule) for the failure mode this guards against: a superseder that itself
    goes inert/compacted while its victim stays full-bodied and live inverts the reader's
    expectation of which entry carries the authority.
  stub_grammar:
    # Non-negotiable shape for a compacted stub. A compaction is a FULL body replacement, never
    # a partial edit -- verify no pre-compaction marker line (e.g. an old non-conforming fused
    # "Decision status: Decided -- <date>" line) survives the edit for a first-match regex to
    # latch onto.
    header: >-
      The '## Decision N: <original title>' header line is UNCHANGED, INCLUDING its original
      parenthetical (e.g. '(Decided)'). Do NOT adopt the archive-move '(Superseded by Decision
      NN)' header suffix on a live-file stub -- that suffix is the DECISIONS_ARCHIVE.md move
      convention (Decision 146), and reusing it here would mint a second, silently-diverging
      live convention (the Decision 128/145 silent-trade anti-pattern). scripts.decisions_md's
      parse_decisions_md() status derivation prefers the body '**Status:**' marker over the
      header-parenthetical fallback, so the header staying '(Decided)' does not contradict the
      body saying Superseded -- the body marker is the parser's source of truth once present.
    body_markers:
      - "**Status:** Superseded"
      - "**Date:** <ISO YYYY-MM or YYYY-MM-DD>"
      - "**Decision:** <non-empty one-line pointer to the superseding Decision N and, where
        applicable, the code-level artefact that now carries the content>"
      - "**Superseded by: Decision N**"
    marker_spelling: >-
      The '**Superseded by: Decision N**' marker uses the EXACT spelling already pinned by this
      file's supersession_marker key above -- never the historical '**Superseded by:** Decision
      N' fallback form on a newly-compacted stub.
    never_remove_headers: >-
      A compaction NEVER removes the '## Decision N:' heading, and never retires or reuses the
      number. Number retirement and destructive merges (deleting/rewriting a header, or
      hand-merging two entries into one) are permanently out of this mechanism's vocabulary --
      ~12,103 unguarded inbound 'Decision N' citations across the repo depend on every number
      staying resolvable to a header in one of the two files. Rationale trace (DCG-03,
      audits/decision-consolidation-growth-f79d6b5.yaml Q4): if a header ever disappeared from
      both files, its ops_decisions CURRENT-projection row would remain forever in its last
      state with no signal it was retired -- the backfill's divergence guard
      (scripts/ops_portal/decisions.py::_assert_no_orphaned_current_rows) makes that latent
      hazard a loud, mechanical failure instead (Decision 55), but the guard is a backstop, not
      a license -- the header itself must never be removed.
  procedure:
    description: >-
      Operator/agent steps for retiring a fully-superseded decision body: either archive it
      whole (when nothing live still cites the number by name) or compact it in place to a stub
      (when it cannot archive). Both branches are number-preserving; neither is a substitute for
      the other.
    steps:
      - "Confirm eligibility: the entry's ENTIRE body is superseded/inert and the superseder
        restates/subsumes every live clause (see eligibility_criterion above). If only part of
        the body is dead, do not compact or archive -- leave the entry full-bodied."
      - "Archive-vs-compact branch: if nothing outside DECISIONS.md/DECISIONS_ARCHIVE.md still
        cites the entry's number by name in a live, non-historical context (code comments,
        docstrings, other contracts), move the whole entry to docs/DECISIONS_ARCHIVE.md per
        Decision 146's archival policy -- this is the preferred, lower-effort path. If live
        code/contracts still cite the number by name (e.g. a code comment reading '(Decision
        N)'), archiving would strand that citation pointing at a file most agents don't read by
        default -- compact in place instead (stay in DECISIONS.md, follow stub_grammar above)."
      - "Compacting in place: replace the entry's ENTIRE body (everything between the header
        line and the closing '---') with the stub_grammar shape above. This is a full-body
        replacement, not a partial edit -- verify no pre-compaction marker line survives."
      - "Run bin/venv-python -m scripts.validate --pre and confirm the DECISIONS size,
        decision-entry conformance, and supersession-annotation guards all pass."
      - "Run bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md so the
        content_hash change is detected and a terminal Superseded SCD2 version is written to
        ops_decisions; the prior full-body version is retained as history (the warehouse is the
        provenance archive -- git history retains it too)."

size_governance:
  # Decision 134 / Decision-114 parity ceilings (enforced by
  # scripts/checks/decisions/validate_decisions_size.py, both --pre and full tiers). Documented
  # here for authors: approaching these ceilings is a signal to archive superseded entries
  # (DPI-04's dispositions) or compact superseded bodies to pointer stubs (see compaction: above),
  # not to raise the ceiling. live_max_bytes reflects the Decision 145 stopgap raise (400000 ->
  # 500000, amending Decision 134 clause 2); the validator constant is the SoT if this value ever
  # drifts from it again.
  live_max_bytes: 500000
  live_max_h2_headers: 120
  combined_max_bytes: 700000

shared_parser: scripts/decisions_md.py
shared_parser_note: >-
  The single importable grammar every structural consumer must use:
  iter_decision_headings(content) for a raw heading-match iterator, and
  decision_header_numbers(paths=None) for the set of decision numbers across one or more files.
  Both are built on the module's single _DECISION_HEADING_RE ('#{2,3}' grammar) -- a consumer
  that hand-rolls its own header regex instead of importing these two functions is exactly the
  divergence this contract exists to close (DAF-03).
