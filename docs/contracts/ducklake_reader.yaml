---
# Class B Lambda verb contract for the ducklake_reader Lambda (the SOLE ops_* read authority).
# Authored at status: provisional_v0 under the CD.25 pre-codegen contract ratification ritual
# (platform tier_item T1.12, Class B wave). CD.16 ratified (dec-1086); the Lambda is deployed and
# serving live ops_* reads since the T2.19 recs cutover (2026-06-08/09), so the v0 clock is real.
#
# Re-grounded from the superseded six-Lambda model (lambda-query / lambda-list-tools) onto the
# consolidated DuckLake read boundary: CD.10's six-Lambda enumeration is illustrative not canonical
# (audit F-008, 2026-06-09); CD.33 / Decision 81 / Decision 91 ratified the writer/reader/maintenance
# split + closed boundary. The "list-tools" surface is the named-verb registry (named_read +
# src/common/ducklake_scd2_schema.py NAMED_READS), NOT a separate Lambda.
#
# Authored against the shipped scripts/contracts_schema.py + scripts/contracts.py loader (NOT the
# INTENT worked examples). Verb surface read from src/lambdas/ducklake_reader/handler.py dispatch.
contract:
  id: ducklake_reader
  class: B
  contract_version: 1
  status: provisional_v0
  description: >-
    Read-scoped DuckLake runtime Lambda invoked over an AWS_IAM (SigV4) Function URL. The SOLE read
    authority for the ops_* governance tables on DuckLake-on-Neon (CD.33 / Decision 81 cl.7): every
    ops read transits this URL; there is no Athena escape hatch. The read role is scoped read-only
    (S3 GetObject + the Neon catalog credential) so a write attempt is denied at the IAM/S3 layer
    (the closed read boundary). This contract documents the PRODUCTION verb surface only; the
    smoke/diagnostic actions (attach_check, read_current, partition_prune_check, write_probe,
    connect_probe, reset_warm_connection) are T2.17 gate instrumentation, NOT agent surfaces, and
    are out of contract scope.
  governance:
    auth_type: >-
      AWS_IAM SigV4-signed Function URL; read-only IAM role (S3 GetObject + Neon catalog credential
      only). A write attempt is denied at the IAM/S3 layer (the closed read boundary; write_probe).
    principal_classes:
      - PlatformDev
      - PlatformAdmin
    registry_path: >-
      src/common/ducklake_scd2_schema.py (the NAMED_READS registry; named_read verb dispatch,
      Decision 84 I-3). The response stamps registry_version for cache-coherence.
  provisional_v0:
    authored_at: "2026-06-22"
    authored_via: >-
      PLAN-ratify-class-b-lambda-verb-contracts (T1.12 Class B wave); Step 10 multi-perspective
      critique + merge to main.
    rationale: >-
      Class B contracts start provisional_v0 (INTENT Part 6A/6B): the verb set, error taxonomy, and
      payload shapes are validated against real agent traffic before ratification. The reader is the
      hottest ops path (every preflight sync + every rec/decision read), so a high invocation
      threshold reaches signal quickly.
    first_production_invocation_date: "2026-06-08"
    surfacing_note: >-
      The time-based alarm is LIVE: session_preflight._scan_provisional_contracts computes
      days_since_first_production_invocation deterministically from first_production_invocation_date
      (via scripts.contracts_enforcement.default_provisional_metrics) and surfaces this contract in
      provisional_contracts_due once the threshold below is met -- no credentials, no warehouse reads.
      The production_invocations condition stays dormant pending invocation telemetry (T2.36 /
      Decision 84 Phase 4); check_re_ratification_trigger schema-validates this trigger block in CI.
    re_ratification_trigger:
      first_of:
        - "production_invocations >= 2000"
        - "days_since_first_production_invocation >= 60"
    re_ratification_owner: "human + Step 10 multi-perspective critique"
verbs:
  read_ops_current:
    payload_schema_ref: >-
      event envelope {action: "read_ops_current", table, filter?: {column, value}, key?|id?, limit?}.
      Returns current-projection rows. `filter` is the structural form (column validated against the
      field-semantics contract, rec-2170); `key`/`id` is the legacy merge-key-equality form.
    response_codes:
      200: "rows returned; body {ok, table, rows, row_count}"
      500: "DuckLakeRuntimeError (unknown/missing table; malformed filter) / VersionMismatchError"
    typed_errors:
      filter_validation: "malformed filter (must carry BOTH column and value) -- rejected loudly rather than degrading to an unfiltered full-table read, rec-2170 (DuckLakeRuntimeError -> 500)"
      runtime: "unknown/missing table or runtime loud-fail (500)"
      version_mismatch: "DuckDB/extension version mismatch (500)"
  read_ops_history:
    payload_schema_ref: >-
      event envelope {action: "read_ops_history", table, key?, limit?}. Returns append-history
      (SCD2) rows for an ops_* table, optionally filtered to one merge key.
    response_codes:
      200: "rows returned; body {ok, table, rows, row_count}"
      500: "DuckLakeRuntimeError (unknown/missing table) / VersionMismatchError"
    typed_errors:
      runtime: "unknown/missing table or runtime loud-fail (500)"
      version_mismatch: "DuckDB/extension version mismatch (500)"
  named_read:
    payload_schema_ref: >-
      event envelope {action: "named_read", verb, params?: {..}, limit?}. `verb` names a
      pre-established read from the NAMED_READS registry (src/common/ducklake_scd2_schema.py);
      `params` binds named bind values. No caller SQL crosses the boundary on this path (Decision
      84 I-3). `limit` (T1.16 c1) is an optional server-side integer-cast trailing LIMIT, accepted
      ONLY for a `paginable` verb (e.g. open_recs, recs_by_title_prefix) -- rejected with a
      DuckLakeRuntimeError for a non-paginable verb.
    response_codes:
      200: "rows returned; body {ok, verb, registry_version, rows, row_count}"
      500: "DuckLakeRuntimeError (empty/unknown verb; non-object params; limit on a non-paginable verb) / VersionMismatchError"
    typed_errors:
      runtime: "missing/unknown verb, params not an object, or limit supplied for a non-paginable verb (500)"
      version_mismatch: "DuckDB/extension version mismatch (500)"
  describe:
    payload_schema_ref: >-
      event envelope {action: "describe"}. Agent-facing verb (CD.10 / CD.15): returns the per-verb
      parameter schema for every NAMED_READS entry (table, description, params, paginable,
      params_schema). Connectionless -- pure metadata, no Neon connection (Decision 88 bounded
      egress).
    response_codes:
      200: "body {ok, verbs: {<verb>: {table, description, params, paginable, params_schema}, ...}}"
    typed_errors: {}
  query_ops:
    payload_schema_ref: >-
      event envelope {action: "query_ops", table, sql, params?: []}. Caller-supplied read-only
      SELECT/WITH (single-statement; assert_read_only_sql-enforced). `sql` may use the {tbl}
      placeholder (substituted to the table's current projection), but the FROM target is
      caller-controlled -- _history and other ops_* tables ARE reachable (e.g. the DQ runner reads
      _history via this verb). The boundary is "read-only SELECT + the S3-read-only IAM role", NOT
      "current projection only".
    response_codes:
      200: "rows returned; body {ok, table, rows, row_count}"
      500: "DuckLakeRuntimeError (unknown/missing table; empty/non-SELECT/multi-statement sql) / VersionMismatchError"
    typed_errors:
      runtime: "unknown/missing table, or sql that is empty / not a single read-only SELECT|WITH (500)"
      version_mismatch: "DuckDB/extension version mismatch (500)"
audit_invariants:
  - "Closed boundary: the read role is S3 GetObject only; a write attempt is denied at IAM/S3 (no write path through the reader; write_probe gate)."
  - "named_read executes ONLY pre-established registry SQL keyed by verb name; no caller SQL crosses the boundary on this path (Decision 84 I-3)."
  - "query_ops accepts a caller-supplied read-only SELECT/WITH (single-statement; assert_read_only_sql-enforced) for internal predicate-pushdown read paths. The FROM target is caller-controlled -- _history and other ops_* tables ARE reachable (e.g. the DQ runner reads _history via this verb); the boundary is read-only-SELECT + the S3-read-only IAM role, NOT current-projection-only. NB: the reader/runtime handler docstrings that state 'only the current projection is reachable' are STALE and inaccurate -- do NOT 'fix' the code to match that comment; doing so would break the DQ runner's _history reads and violate this contract."
  - "read_ops_current rejects a malformed `filter` (must carry BOTH column and value) loudly rather than degrading to an unfiltered full-table read (rec-2170 hardening)."
  - "An unknown `action` returns 400 with the sorted action allow-list (dispatcher-level; not a per-verb outcome). Reads are idempotent and a dead Neon session is transparently reconnected once."
  - "Reader client-input errors (unknown/missing table, malformed filter, empty/unknown named_read verb, empty/non-SELECT sql) surface as DuckLakeRuntimeError -> 500, not 4xx -- the reader's loud-fail taxonomy is server-error-coded (faithfully documented here; a finer 4xx split would be a code change, not a contract amendment)."
  - "KNOWN GAP: the current_state single-key filter path has an open correctness rec (rec-2170) where a non-merge-key equality filter can bind against the merge key. The verb semantics here document the intended contract; the fix is a code amendment, not a contract change."
amendment_log: []
previous_versions: []
