---
# Class C cross-system invariant: the telemetry observation node identity key.
# Ratified under the CD.25 pre-codegen contract ratification ritual (tier_item T0.12.6).
# Authored against the shipped scripts/contracts_schema.py + scripts/contracts.py loader
# (NOT the superseded INTENT 3E worked example, whose shapes fail extra="forbid").
#
# Telemetry Class A contracts $ref into contract.fields.observation_id:
#   telemetry_observations.observation_id  -> observation_id  (PK; authored by T0.12.6)
#   telemetry_transcripts.observation_id   -> observation_id  (FK; authored by T0.12.6)
#   telemetry_agents.observation_id        -> observation_id  (FK; authored by T0.12.6)
#
# FORWARD-LOOKING: the column does not exist in the live draft. The draft telemetry tables
# (telemetry_phases/_steps/_process_events/_model_calls) carry per-table UUID4 ids
# (phase_id/step_id/event_id/call_id); the canonical model (Decision 95) collapses those four
# tables into telemetry_observations with a single observation_id. This contract is the spec the
# Phase 4 telemetry rebuild builds to (textbook CD.25 pre-codegen ratification).
contract:
  id: observation-id
  class: C
  contract_version: 1
  status: ratified
  ratified_at: "2026-06-24"
  ratified_via: "Step 10 multi-perspective critique + PLAN-ratify-class-a-telemetry-contracts merge to main (T0.12.6)"
  description: >-
    Canonical cross-system identity key for a single telemetry observation -- one timed node in a
    session's trace tree (Decision 95). Primary key of telemetry_observations; foreign key on
    telemetry_transcripts (the blob's owning node) and telemetry_agents (the node an agent row
    annotates). Crockford-base32 ULID (Decision 97): lexicographically sortable and time-ordered, so
    day()-partition pruning and chronological ORDER BY fall out of the key itself.
fields:
  observation_id:
    type: str
    iceberg_type: string
    nullable: true
    description: >-
      ULID string identifying one observation (a phase | step | process_event | model_call node, per
      telemetry_observations.observation_type). Primary key of telemetry_observations; foreign key on
      telemetry_transcripts.observation_id and telemetry_agents.observation_id.
    semantics: >-
      Format: Crockford-base32 ULID (Decision 97). Minted exactly ONCE at the boundary call that opens
      the node (scripts/executor/telemetry.py::open_observation, post Phase 4 rebuild), never re-derived
      downstream; a retried/resumed write reuses the already-minted id. The Class C baseline nullability
      is the LOOSEST common value so per-table contracts TIGHTEN via dq_intent_local without violating
      Invariant 5 (overrides must tighten, never loosen). Per-table nullability: REQUIRED in
      telemetry_observations (PK) and telemetry_transcripts (every blob owns a node); OPTIONAL in
      telemetry_agents (a session-scoped agent row may carry no observation_id).
    populated_by: >-
      FUTURE (Phase 4 / T2.33 telemetry rebuild): minted by the open_observation boundary and propagated
      to child transcript rows as a foreign key. No current populator -- the draft has no observation_id
      column (it has per-table phase_id/step_id/event_id/call_id UUID4s the collapse replaces).
    write_time_validation: >-
      Structural, not central: PK-required in telemetry_observations; foreign key in the child tables.
      ULID format is generator-guaranteed at the boundary (no separate validator), mirroring the ops
      `ulid` SCD2 envelope (Decision 84).
    dq_intent:
      not_null:
        enforced: false
    governance_notes: >-
      Loosest baseline (not_null not enforced) by design: the owning/required tables tighten to enforced
      not-null via dq_intent_local; the optional-FK use (telemetry_agents) passes through. ULID is the
      ratified format with no live predecessor to grandfather (unlike session_id, whose live UUID4 is
      grandfathered per Decision 97 clause 4) because the column is greenfield. Population is future-state
      (Phase 4); ratifying the invariant now at status: ratified (NOT provisional_v0) is deliberate --
      Class C cross-system invariants do not use the v0-provisional state (they are too foundational).
    amendment_log: []
joins_using_this_key:
  # Forward-declared. The entries land in docs/contracts/_joins.yaml with the telemetry Class A
  # contracts (T0.12.6), per INTENT Part 5 incremental-landing -- now that the referencing contracts
  # ratify in this same wave.
  - observation_id_join_observations_to_transcripts
  - observation_id_join_observations_to_agents
governance_notes: >-
  Single-hop leaf invariant (no chained $ref; Class C contracts are leaf nodes, Invariant 5).
  telemetry_observations.observation_id is the canonical definition; parent-observation-id.yaml
  references this key (an observation's parent pointer is itself an observation_id) but is a SEPARATE
  Class C contract per the field-per-contract convention, NOT a chained $ref. The cross-contract join
  entries live in docs/contracts/_joins.yaml.
amendment_log: []
previous_versions: []
