# Local-git-cache hygiene registry. NOT a Class A/B/C ritual contract -- no top-level
# contract:/class: block, so the CD.25 drift gate (validate_contract_drift) skips this file as a
# non-ritual doc (precedent: docs/contracts/deploy-paths.yaml, file-router.yaml). Sole SoT for the
# mechanics AGENTS.md's "## Git-ops procedure / Local main sync" section points at -- do not
# restate this detail in AGENTS.md; extend it here instead (Decision 43/127 prose-budget
# discipline: AGENTS.md carries only a terse pointer).
schema_version: 1

session_start_sync:
  hook: .claude/hooks/session_start_sync_main.sh
  registered_as: SessionStart
  mechanics: >-
    Best-effort `git fetch origin main`, then (when the current branch is not `main`)
    `git branch -f main origin/main`. Always exits 0 -- a network-blocked fetch never blocks
    session start (mirrors session_start_sync_deps.sh's advisory posture).
  root_cause: >-
    GitHub squash-merges PRs server-side (Decision 76), so feature-branch commits never
    fast-forward onto local `main`. A container that sits through several squash-merges ends up
    with local `main` diverged from `origin/main` with NO merge base -- any consumer that diffs
    against bare `main` then hits "fatal: no merge base" and silently skips (the failure mode
    that motivated this plan; see PLAN-main-cache-hygiene.yaml context).
  why_force_not_pull: >-
    `git branch -f main origin/main`, never `git pull` -- local `main` is not fast-forwardable
    once diverged. Safe by construction: committing to local `main` is forbidden (AGENTS.md's
    "never edit or commit on main" hard rule, .claude/hooks/never_on_main.py, and Decision 138),
    so local `main` never holds real work to lose by force-updating it.
  affected_consumers: >-
    Any script comparing the working tree against trunk must diff `origin/main...HEAD`, never
    bare `main...HEAD` (Decision 135). Canonical primitives:
    scripts/checks/_common.py's get_changed_files() / get_status_aware_diff(). The only
    active broken consumer fixed by this registry's originating plan was
    scripts/checks/misc/validate_scheduled_agent_logs.py; frozen executor scripts (Decision 67)
    that read local main are out of scope.

branch_off_remote_main_guard:
  hook: .claude/hooks/fresh_branch_base.py
  registered_as: "PreToolUse (Bash matcher), additive to never_on_main.py -- augments, never replaces"
  detects:
    - "git checkout -b/-B <name> [<start>]"
    - "git switch -c/-C <name> [<start>]"
    - "git branch <name> [<start>]"
  keying: >-
    Strictly on the resolved start-point (explicit if given, else implicit == the current
    branch) -- never on the new branch's name. A start-point of anything else (a feature branch,
    an explicit `origin/main`, a commit SHA) passes through untouched.
  decision_off_main: >-
    Current branch != main: local main is not checked out, so it is safely force-updatable.
    Best-effort `git fetch origin main` + `git branch -f main origin/main`, then ALLOW -- the
    branch-creation command that follows now cuts from a fresh local main.
  decision_on_main: >-
    Current branch == main: local main IS checked out, so `git branch -f main ...` would fail
    (git refuses to force-update the checked-out ref). BLOCK (exit 2) with guidance to branch
    directly off `origin/main` (e.g. `git checkout -b <name> origin/main`).
  novel_pattern_note: >-
    Unlike never_on_main.py's pure allow/block, this hook is side-effecting -- it mutates git
    state (fetch + branch -f) before allowing. Network calls are best-effort and non-fatal on
    any git error, bounding the cost so a slow/offline remote never stalls or fails a branch cut.
  tests: tests/hooks/test_fresh_branch_base.py

feature_branch_divergence_procedure:
  summary: >-
    Keeping an in-progress feature branch current with origin/main stays a documented,
    phase-aware human/agent judgement call -- deliberately NOT automated by a background hook.
  no_signing_hook: >-
    No commit-signing hook exists in this repo (only inactive .git/hooks/*.sample; the sole
    active git hook is pre-commit), and Decision 83's main-protection ruleset carries no
    required_signatures rule. So rebasing a feature branch onto origin/main never inadvertently
    re-signs or rewrites protected history -- rebase-at-commit-flow-time is correct and safe.
  phase_distinction: >-
    See AGENTS.md "## Git-ops procedure / Rebase phase distinction" (the canonical statement):
    assessment-time (planning) never auto-rebases -- surface divergence to the human and wait;
    commit-flow-time (implementing) DOES auto-rebase before pushing. This registry does not
    restate that rule, only cross-references it.
  why_not_automated: >-
    An automated feature-branch rebase/pull hook would collapse the phase distinction above --
    a hook cannot know whether it is firing at assessment time (where rebasing mid-plan can
    silently invalidate scoping decisions) or commit-flow time (where it is safe). Left as a
    human/agent judgement call at the correct phase instead.

origin_main_is_a_cache_principle:
  statement: >-
    origin/main is itself a cache -- only as fresh as the last `git fetch`. A consumer that
    reads main should fetch immediately before use, the same way the commit-flow rebase step
    already does; the branch-cut guard above applies the same principle just-in-time rather than
    trusting the SessionStart snapshot.
  relationship_to_decision_84: >-
    An ANALOGY to the Decision 84 eliminate-stale-caches invariant (warehouse read caches are
    never a write source; local files are downstream of DuckLake-on-Neon) -- NOT shared
    governance or enforcement. Decision 84 governs the ops warehouse's SoT/cache relationship;
    this principle governs git ref freshness. The two are structurally similar (a cache is only
    as good as its last refresh) but administered by entirely separate mechanisms.
