---
# Non-ritual substrate index. NOT a Class A/B/C ritual contract (no contract: block).
# The CD.25 drift gate skips files that lack a contract: mapping with a class: field.
#
# Purpose: bridges the documentation gap left by ops-data-store.md retirement (T0.12.5).
# Records substrate type, write boundary, and read boundary for tables that do NOT yet
# have their own Class A contracts. Tables with Class A contracts are indexed there.
#
# For DuckLake-boundary tables: see docs/contracts/read-engine.yaml (version 3).
# For Iceberg-boundary tables pending T2.26 disposition: see docs/INTENT-ducklake-consolidation.md.
#
# Class A contracts (authoritative, not indexed here):
#   ops_recommendations    -> docs/contracts/ops_recommendations.yaml (T0.12.5)
#   ops_decisions          -> docs/contracts/ops_decisions.yaml (T0.12.5)
#   telemetry_sessions     -> docs/contracts/telemetry_sessions.yaml (T0.12.6)
#   telemetry_observations -> docs/contracts/telemetry_observations.yaml (T0.12.6)
#   telemetry_transcripts  -> docs/contracts/telemetry_transcripts.yaml (T0.12.6)
#   telemetry_agents       -> docs/contracts/telemetry_agents.yaml (T0.12.6)
#
version: 1
updated_at: "2026-06-24"
updated_by: "PLAN-ratify-class-a-telemetry-contracts (T0.12.6)"

tables:
  # ---------------------------------------------------------------------------
  # Dormant DuckLake ops tables (schema-ready; not yet live-exercised)
  # ---------------------------------------------------------------------------
  ops_priority_queue:
    substrate: DuckLake-on-Neon
    status: dormant
    reason: executor paused (CD.17); current-state is the Decision-70 latest-queue_run set
    write_boundary: ducklake_writer Lambda (action_write_ops) -- when executor resumes
    read_boundary: ducklake_reader Lambda (NAMED VERBS only)
    merge_key: rec_id
    field_semantics: config/lambda/ducklake/field_semantics.yaml#ops_tables.ops_priority_queue
    read_engine_ref: docs/contracts/read-engine.yaml
    graduation_blocker: CD.17 reversal + executor resume

  # ---------------------------------------------------------------------------
  # DuckLake append-only tables (event-journal write mode, T1.14)
  # ---------------------------------------------------------------------------
  ops_smoke_events:
    substrate: DuckLake-on-Neon
    status: smoke
    write_mode: append_only
    write_mode_invariant: "history table only; no current write-through projection (ScdTableSpec.current_table=None)"
    write_boundary: ducklake_writer Lambda (action_write_ops) -- append events only; require_exists=True illegal
    read_boundary: direct DuckDB ATTACH (ops_smoke_events_history) -- no reader Lambda verb for current
    merge_key: event_id
    field_semantics: config/lambda/ducklake/field_semantics.yaml#ops_tables.ops_smoke_events
    note: platform-generic append_only kernel proof (T1.14); no current_table in ScdTableSpec

  # ---------------------------------------------------------------------------
  # Iceberg/Athena tables pending T2.26 disposition
  # ---------------------------------------------------------------------------
  ops_session_log:
    substrate: Iceberg/Athena
    status: dormant
    reason: not provisioned in the personal account (sync_ops 2026-05-28 migration note)
    write_boundary: OpsWriter (scripts/ops_writer.py) -> S3 staging -> Iceberg via awswrangler
    read_boundary: DuckDBIcebergReader (primary) / Athena fallback (CD.8/CD.15 escape hatch)
    merge_key: session_id
    field_semantics: config/lambda/ducklake/field_semantics.yaml#ops_tables.ops_session_log
    migration_ref: docs/INTENT-ducklake-consolidation.md
    disposition: T2.26 -- may retire per T-1.9; DuckLake migration or retirement TBD

  ops_execution_plans:
    substrate: Iceberg/Athena
    status: dormant
    reason: executor paused (CD.17); not provisioned in the personal account
    write_boundary: OpsWriter -> S3 staging -> Iceberg via awswrangler
    read_boundary: DuckDBIcebergReader / Athena fallback
    merge_key: rec_id
    field_semantics: config/lambda/ducklake/field_semantics.yaml#ops_tables.ops_execution_plans
    migration_ref: docs/INTENT-ducklake-consolidation.md
    disposition: T2.26 -- DuckLake migration pending executor resume

  # ---------------------------------------------------------------------------
  # Telemetry tables -- canonical 4-table trace/observation model (Decision 95);
  # live draft is 7 Iceberg/Athena tables, dead pending Phase 4 (Decision 84).
  # ---------------------------------------------------------------------------
  telemetry_tables:
    note: >-
      CANONICAL model (Decision 95): four tables -- telemetry_sessions, telemetry_observations,
      telemetry_transcripts, telemetry_agents -- each with a ratified Class A contract authored at
      T0.12.6 (those four are indexed in the "Class A contracts (authoritative)" header above, NOT in
      this substrate table). The LIVE implementation is still the seven-table DRAFT (telemetry_ prefix)
      in trading_formulas_db (Glue, Athena engine v3, personal account); schema in
      scripts/telemetry_schemas.py. The draft collapses to the canonical four at the Phase 4 rebuild:
      telemetry_phases/_steps/_process_events/_model_calls -> telemetry_observations (observation_type
      discriminator); telemetry_agent_invocations -> rooted telemetry_agents. This index entry covers the
      live draft substrate until that rebuild retires it. (Corrected 2026-06-24: the prior 7 names --
      telemetry_trades/_feature_vectors/etc. -- were a stale placeholder matching neither the DDL nor
      the dataclasses.)
    substrate: Iceberg/Athena
    status: draft_dead
    reason: >-
      Athena telemetry tables never migrated to the personal account (2026-05-28); writers still emit to
      S3 staging but the destination tables are dead. config/agent/data_quality/telemetry.yaml is empty.
    write_boundary: OpsWriter (scripts/ops_writer.py) -> S3 staging -> Iceberg (dead)
    read_boundary: DuckDBIcebergReader / Athena fallback (dead)
    schema_ref: scripts/telemetry_schemas.py
    contract_ref:
      - docs/contracts/telemetry_sessions.yaml
      - docs/contracts/telemetry_observations.yaml
      - docs/contracts/telemetry_transcripts.yaml
      - docs/contracts/telemetry_agents.yaml
    migration_ref: docs/INTENT-ducklake-consolidation.md
    disposition: >-
      Phase 4 consolidation (after T2.26): rebuild on the DuckLake telemetry substrate as the canonical
      four-table model per the Class A contracts; partition day(started_at) / day(created_at)
      (Decision 96, realized via T2.33); ULID identity (Decision 97, realized when open_session migrates).
    live_draft_tables:
      - telemetry_sessions
      - telemetry_phases
      - telemetry_steps
      - telemetry_process_events
      - telemetry_model_calls
      - telemetry_transcripts
      - telemetry_agent_invocations
    canonical_tables:
      - telemetry_sessions
      - telemetry_observations
      - telemetry_transcripts
      - telemetry_agents
