---
# Class C cross-system invariant: broker credential routing.
# Ratified under the CD.25 pre-codegen contract ratification ritual (platform tier_item T2.14).
# Authored against the shipped scripts/contracts_schema.py (ContractDocument, extra="forbid").
#
# PRE-CODEGEN (CD.25): this contract is ratified BEFORE the Secrets Manager surface
# (terraform/personal/secrets_manager_brokers.tf) and the resolver (scripts/broker_secrets.py)
# exist. Those codegen deliverables consume this contract as the authoritative routing spec in a
# named follow-on IMPLEMENTATION plan -- they do not re-derive routing semantics from scratch.
#
# VOCABULARY (Decision 77 two-axis taxonomy, lint-enforced by validate_environment_taxonomy):
# broker "paper" and "live" are product-phase / broker-account-type selectors, NOT platform
# "environments". The platform environment axis (sandbox today) governs mock-vs-real externals,
# not which broker secret is read. This file deliberately avoids the "<phase> environment"
# adjacency the taxonomy lint flags.
#
# SECRET VALUES (Decision 37 out-of-band precedent, mirrored from inference_credentials.tf):
# Terraform manages only the secret ENVELOPE; key material is set out-of-band via
# put-secret-value and never enters Terraform state.
#
# RATIFICATION AUTHORITY (CD.25 state: pending): CD.25 carries bootstrap_allowance: true and
# ratifies via the interim ops-portal vehicle; this contract is authored at status: ratified
# consistent with the precedent Class C contracts (source-lineage / project-id / session-id), all
# of which are ratified while CD.25 pends. Re-ratification trigger: if CD.25 ratifies with amended
# ritual semantics, re-confirm this contract at a contract_version bump.
#
# CONTRACT BOUNDARY: this contract governs SECRET RESOLUTION (routing key -> Secrets Manager
# secret) only. The forthcoming docs/contracts/broker-adapter-protocol.yaml (Class C, authored by
# product item L3.exec.6) governs the BrokerAdapter Protocol / interface. They are siblings, not
# nested; see governance_notes for the division of responsibility.
contract:
  id: credential-routing
  class: C
  contract_version: 1
  status: ratified
  ratified_at: "2026-06-21"
  ratified_via: "Step 10 multi-perspective critique + PLAN-broker-credential-routing merge to main"
  description: >-
    Canonical cross-system invariant governing how broker credentials are routed to AWS
    Secrets Manager. A routing key of the form broker/<broker>/<account_type> resolves to
    exactly one Secrets Manager secret holding that broker's API key material. Runtime
    components (broker adapters, Lambdas) resolve credentials ONLY by routing key through this
    contract -- never via direct broker-API-key environment variables. Absorbs
    GAP-broker-secrets-manager; product execution-layer items L3.exec.4 (Alpaca) and L3.exec.5
    (IBKR) are the intended consumers -- they declare cross_roadmap_depends_on: PLATFORM:T2.14,
    and the reciprocal contract_gate on this file is recommended for the codegen follow-on (today
    their contract_gates name only the sibling broker-adapter-protocol.yaml; see governance_notes).
fields:
  routing_key:
    type: str
    iceberg_type: string
    nullable: true
    description: >-
      The canonical credential routing key. Grammar: broker/<broker>/<account_type> where
      <broker> is a registered broker slug (alpaca today; ibkr forward, L3.exec.5) and
      <account_type> is one of {paper, live}. Resolves to exactly one Secrets Manager secret
      name via the routing_table under allowed_values.
    semantics: >-
      A RESOLUTION key, not a routing enum baked into code. The active product-phase selector
      maps to <account_type> (paper -> paper; live_small / live_full -> live), so a single
      live credential set serves both live product phases (they differ by capital_allocation
      config, not by broker account). FORWARD-LOOKING: no code resolves this key yet (no broker
      adapter exists as of 2026-06-21); the resolver scripts/broker_secrets.py lands in the
      codegen follow-on and builds to this spec.
    populated_by: >-
      FUTURE: caller-supplied at credential-resolution time (the broker adapter passes its
      broker slug plus the active product phase; the resolver derives <account_type> and the
      secret name). No current populator. Not stored as a table column today; iceberg_type is
      declared forward-looking so a future fills/orders audit row may stamp the resolved key.
    write_time_validation: >-
      FUTURE (codegen follow-on): scripts/broker_secrets.py rejects any routing key whose
      (broker, account_type) pair is absent from the routing_table (closed-set membership) -- the
      same registry / write-time-validation shape as validate_source (cf. Decision 66, Precision
      Context Injection, whose validate_source example this mirrors). None today.
    dq_intent:
      not_null:
        enforced: false
    governance_notes: >-
      Loosest baseline (not_null not enforced): the key is a resolution input, not yet a stored
      column. iceberg_type / nullable are FORWARD-DECLARED -- no table stamps routing_key today;
      they describe the future fills/orders audit column, not a present one. Any future table that
      stamps the routing key sets its own enforcement via dq_intent_local on a $ref (tighten-only,
      Invariant 5).
    amendment_log: []
governance:
  auth_type: >-  # pragma: allowlist secret -- describes an IAM action, not a credential
    secretsmanager:GetSecretValue via the consuming runtime principal's IAM role, ARN-scoped to
    the resolved secret (no wildcard). Mirrors the InferenceCredentialsRead ARN-scoped grant in
    terraform/personal/platform_roles.tf. Adding the broker-secret read statement is an IAM
    change that fail-closes the deterministic apply guard, so the Secrets Manager + IAM plan is
    human-gated (Decision 35 as scoped by Decision 77); IAM apply precedes any runtime
    credential read (IAM-precedence rule).
  principal_classes:
    - "PlatformDev runtime role (agent_platform) -- local / CC-web resolution"
    - "FUTURE broker Lambda execution role(s) -- per-broker AND per-account-type, ARN-scoped to that broker's secrets"
  registry_path: >-
    The routing_table under allowed_values in this contract is the authoritative
    broker/account_type -> secret_name registry. No separate registry file today (the set is
    small and closed); it extends via forward-compatible amendment.
  validation_path: >-
    FUTURE: scripts/broker_secrets.py::resolve (closed-set membership check at resolution time).
    The RESOLVE-BY-KEY-ONLY invariant's enforcement OWNER is the codegen follow-on: a
    scripts/validate.py guard (or the resolver) that greps production code for direct
    broker-API-key env reads, landed as a follow-on exit criterion. Today the CD.25 contract-drift
    gate (scripts/validate.py::validate_contract_drift) validates only this file's structure,
    $refs, and status transitions -- field-content completeness is NOT gate-enforced for Class C --
    and the environment/phase taxonomy lint validates its vocabulary.
allowed_values:
  routing_key_grammar: "broker/<broker>/<account_type>"
  brokers:
    - alpaca
  account_types:
    - paper
    - live
  product_phase_to_account_type:
    paper: paper
    live_small: live
    live_full: live
  unmapped_phases_note: >-
    research and backtest_canonical (Axis B, environment-taxonomy.md) intentionally map to NO
    broker secret -- they place no real broker orders (externals mocked), so the closed-set
    resolver rejects them by design rather than by omission.
  routing_table:
    broker/alpaca/paper:
      secret_name: agent-platform-broker-alpaca-paper  # pragma: allowlist secret -- public Secrets Manager resource name, not a value
      realized: false
      consumers: ["L3.exec.3 PaperBroker", "L3.exec.4 AlpacaBroker"]
      note: "Alpaca paper-trading API key set, paper-api.alpaca.markets. Value out-of-band."
    broker/alpaca/live:
      secret_name: agent-platform-broker-alpaca-live  # pragma: allowlist secret -- public Secrets Manager resource name, not a value
      realized: false
      consumers: ["L3.exec.4 AlpacaBroker"]
      note: "Alpaca live-trading API key set, api.alpaca.markets. Value out-of-band; realized at product live_small."
  extension_rule: >-
    New brokers (e.g. ibkr per L3.exec.5) or account types extend brokers / account_types and
    add routing_table rows via a forward-compatible amendment (change_class:
    accepted_values_extend). Removing or repointing a routing key to a different secret is a
    semantic break (semantic_break: true plus a migration story).
  secret_naming_convention: "agent-platform-broker-<broker>-<account_type>"  # pragma: allowlist secret -- naming template, not a credential
audit_invariants:
  - >-
    RESOLVE-BY-KEY-ONLY: runtime components resolve broker credentials exclusively via the
    routing key through this contract. No direct broker-API-key environment-variable fallback
    (e.g. an ALPACA_API_KEY read straight from os.environ) is permitted in production code paths.
    ENFORCEMENT OWNER: the codegen follow-on lands a scripts/validate.py guard (or resolver check)
    that greps production code for direct broker-API-key env reads, as a follow-on exit criterion;
    until then this invariant is design-binding but not yet CI-gated.
  - >-
    SECRET-VALUE-OUT-OF-BAND: Terraform manages only the aws_secretsmanager_secret envelope; key
    material is set via put-secret-value and never enters Terraform state (Decision 37). Secret
    tag values use the ASCII tag charset only -- no parentheses (a prior Purpose-tag parenthesis
    broke TagResource; see inference_credentials.tf).
  - >-
    ARN-SCOPED-READ: every principal that reads a broker secret is granted
    secretsmanager:GetSecretValue ARN-scoped to exactly the secrets it needs -- never a wildcard
    (mirrors InferenceCredentialsRead in platform_roles.tf).
  - >-
    ACCOUNT-TYPE-FROM-PHASE: the broker account_type is derived from the active product phase via
    product_phase_to_account_type. The platform environment axis (sandbox / SIT / PROD) does NOT
    select the broker secret; it governs mock-vs-real externals (Decision 77). Under the sandbox
    environment externals are mocked, so no live broker secret is read.
  - >-
    LEAST-PRIVILEGE-ACROSS-ACCOUNT-TYPES: the live secret SHOULD be readable only by a principal
    distinct from any paper-only code path. paper and live are separate secrets precisely so a
    single bug in a paper path cannot reach live credentials; the codegen follow-on grants per
    account_type, not a blanket broker-wide read.
  - >-
    CREDENTIAL-ROTATION: broker credentials rotate under the T2.5 cross-secret rotation policy
    (calendar-reminded, user_action_required), mirroring the inference_credentials.tf precedent.
    The absorbed GAP-broker-secrets-manager includes rotation; it is retained here, not dropped.
governance_notes: >-
  Single-hop leaf invariant (no chained $ref; Class C contracts are leaf nodes, Invariant 5). No
  Class A contract references routing_key yet (no table stamps it); the first $ref lands if and
  when a fills / orders audit table records the credential set used. No _joins.yaml entry is
  forward-declared (no join uses this key today). Forward-looking like project-id.yaml: ratified
  at status ratified (NOT provisional_v0) because a provisional cross-system invariant is a
  contradiction in terms (INTENT Part 7). Realization is staged with the product execution layer:
  paper credentials at the paper product phase (L3.exec.3 / L3.exec.4), live credentials at
  live_small (L3.exec.4). The codegen follow-on (terraform/personal/secrets_manager_brokers.tf
  plus scripts/broker_secrets.py) consumes this contract per CD.25 pre-codegen ordering.
  RATIFICATION AUTHORITY: CD.25 is state: pending (bootstrap_allowance: true); ratifying at
  status: ratified is consistent with the precedent Class C contracts authored while CD.25 pends
  -- re-confirm at a contract_version bump if CD.25 ratifies with amended semantics. CONTRACT
  BOUNDARY: this file governs SECRET RESOLUTION only; the sibling
  docs/contracts/broker-adapter-protocol.yaml (Class C, authored by L3.exec.6) governs the
  BrokerAdapter Protocol. L3.exec.4 / L3.exec.5 already declare cross_roadmap_depends_on:
  PLATFORM:T2.14; adding the reciprocal contract_gate on this file to those consumers is
  recommended for the codegen follow-on so the all_contract_gates_ratified check covers credential
  resolution too. The governance block uses the superset fields auth_type / principal_classes
  deliberately (apt for a credential contract; schema-permitted), diverging from the field-lineage
  Class C precedents that use only registry/injection/validation paths.
amendment_log: []
previous_versions: []
