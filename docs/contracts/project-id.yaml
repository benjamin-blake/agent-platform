---
# Class C cross-system invariant: the project / strategy partition id.
# Ratified under the CD.25 pre-codegen contract ratification ritual (tier_item T0.12.7).
# Authored against the shipped scripts/contracts_schema.py + tests/test_contracts.py.
#
# FORWARD-LOOKING: no code populates this field as of 2026-06-19. The contract is the
# authoritative spec that the future implementation (milestone T2.17) builds to --
# this is the textbook case for CD.25 pre-codegen ratification (ratify the invariant
# BEFORE the column exists, so codegen has a spec rather than inventing semantics).
contract:
  id: project-id
  class: C
  contract_version: 1
  status: ratified
  ratified_at: "2026-06-19"
  ratified_via: "Step 10 multi-perspective critique + PLAN-class-c-cross-system-invariants merge to main"
  description: >-
    Canonical cross-system project/strategy partition identifier intended to span
    every ops + telemetry table and every Lambda invocation, identifying which
    trading-system project a row belongs to. Pre-codegen ratification (CD.25): the
    invariant is fixed before any column exists.
fields:
  project_id:
    type: str
    iceberg_type: string
    nullable: true
    description: >-
      Identifier of the trading-system project/strategy a row belongs to. Default
      single-project value: "trading-system". Multi-project partitioning is the
      forward path; until then every row belongs to the single default project.
    semantics: >-
      FORWARD-LOOKING -- not populated in any table or code path as of 2026-06-19
      (zero occurrences in src/, scripts/, config/ confirmed by codebase sweep).
      Two-phase realization at milestone T2.17: Phase A adds the column as
      Optional[str] = None defaulting to "trading-system"; Phase B flips to a
      not-null write-time invariant. This contract is the spec both phases build to.
    populated_by: >-
      FUTURE (T2.17): harness/Lambda-injected per environment at write time. No
      current populator. Not agent-supplied.
    write_time_validation: >-
      FUTURE (T2.17 Phase B): not-null write-time validator with an exclude_before
      cutover. None today.
    dq_intent:
      not_null:
        enforced: false
    governance_notes: >-
      Population is future-state (T2.17). Ratifying the invariant now at status:
      ratified (NOT provisional_v0) is deliberate: Class C cross-system invariants do
      not use the v0-provisional state (INTENT Part 7 -- a provisional cross-system
      invariant is a contradiction in terms; they are too foundational). Phase A keeps
      not_null unenforced (column Optional, default "trading-system"); Phase B flips
      to enforced. Per-table contracts inherit via $ref and may tighten, never loosen
      (Invariant 5). Re-grounded from the roadmap intent's retired "AWS-migration
      INTENT" reference onto the live T2.17 milestone.
    amendment_log: []
governance_notes: >-
  Single-hop leaf invariant (no chained $ref; Class C contracts are leaf nodes,
  Invariant 5). No Class A contract references project_id yet (no table carries the
  column); the first $ref lands when T2.17 adds the column and the per-table Class A
  contracts are (re-)ratified to include it. No _joins.yaml entry is forward-declared
  because no join uses this key today.
amendment_log: []
previous_versions: []
