---
# Class B Lambda verb contract for the ducklake_maintenance Lambda (singleton catalog maintenance).
# Authored at status: provisional_v0 under the CD.25 pre-codegen contract ratification ritual
# (platform tier_item T1.12, Class B wave). CD.16 ratified (dec-1086); the Lambda is deployed (T2.18).
#
# This is the maintenance contract the T1.12 roadmap intent already re-grounded onto ducklake_maintenance
# (per T2.18). It is NOT a public AGENT surface: every verb is either EventBridge-scheduled or
# human-invoked over 443 via `aws lambda invoke` (an AWS_IAM Function URL exists for smoke-gate invokes
# but no scheduled/operational verb depends on it). Documented here so the closed-boundary maintenance
# verb surface carries the same ratified-contract guarantees as the writer/reader. CD.33 / Decision 81 /
# Decision 91 ratified the writer/reader/maintenance split.
#
# Authored against the shipped scripts/contracts_schema.py + scripts/contracts.py loader (NOT the
# INTENT worked examples). Verb surface read from src/lambdas/ducklake_maintenance/handler.py dispatch;
# the scheduled-vs-operational split is grounded in terraform/personal/ducklake_maintenance.tf
# EventBridge rules (all ENABLED).
contract:
  id: ducklake_maintenance
  class: B
  contract_version: 1
  status: provisional_v0
  description: >-
    Singleton DuckLake catalog-maintenance Lambda. SCHEDULED actions are EventBridge-triggered:
    merge (daily) / gc (weekly) / hot_merge (every 6h) run against the SMOKE catalog (ducklake_smoke),
    and merge_ops (every 6h) runs against the PRODUCTION catalog (ducklake_ops, data_path + meta_schema
    supplied by the EventBridge target). OPERATIONAL actions (catalog_reinit, restore_drill,
    catalog_stats, reconcile_columns) are human-invoked over 443 via `aws lambda invoke` against the
    PRODUCTION catalog with explicit data_path + meta_schema event params (no-arg invokes refused). No
    LLM / agent invocation anywhere in this path (CD.33 cl.5 / Decision 81 cl.6). Singleton via
    reserved_concurrent_executions=1. This contract documents the SCHEDULED + OPERATIONAL verb surface
    only; the forced-threshold circuit-breaker test action breaker_probe is VP instrumentation
    (analogous to the writer/reader probes), NOT an operational verb, and is out of contract scope.
  governance:
    auth_type: >-
      NOT a public agent surface (an AWS_IAM Function URL exists for smoke-gate invokes, terraform
      line 192, but no scheduled or operational verb depends on it). SCHEDULED actions are
      EventBridge-triggered (merge daily 04:00 UTC -> smoke; gc weekly 05:00 UTC Sun -> smoke;
      hot_merge cron(0 */6 * * ? *) -> smoke; merge_ops cron(30 */6 * * ? *) -> PRODUCTION
      ducklake_ops). OPERATIONAL actions (catalog_reinit, restore_drill, catalog_stats,
      reconcile_columns) are human-invoked over 443 via `aws lambda invoke` (AWS_IAM). Singleton:
      reserved_concurrent_executions=1 (Decision 81 cl.6).
    principal_classes:
      - "events.amazonaws.com (EventBridge service principal; scheduled merge / gc / hot_merge -> smoke, merge_ops -> production)"
      - "PlatformAdmin (human-invoked operational actions: catalog_reinit / restore_drill / catalog_stats / reconcile_columns)"
    admin_only_features:
      - "Human-invoked operational actions are PlatformAdmin-only by invocation path (aws lambda invoke), not by an in-handler ARN check; the boundary is IAM-role scoping."
      - "catalog_reinit: the only CATALOG-STRUCTURE destructive action (meta-schema drop + reinit, IRREVERSIBLE); requires confirm=<meta_schema> and an explicit s3:// data_path (no production default). NB: gc is separately DATA-FILE destructive (see audit_invariants)."
      - "restore_drill: DR gate on an isolated scratch meta-schema (production-safe; non-destructive to live catalogs)."
      - "reconcile_columns: ALTER TABLE ADD COLUMN only (never DROP); non-destructive; requires explicit data_path + meta_schema."
      - "catalog_stats: read-only catalog-metadata footprint (psycopg2 metadata read; ATTACH-free; requires explicit meta_schema)."
    human_initiated_value: >-
      catalog_reinit / restore_drill / catalog_stats / reconcile_columns are human-invoked (aws lambda
      invoke) with explicit catalog params; no-arg invokes are refused so they can never hit the smoke
      catalog by accident (Decision 84/81 guard). merge / gc / hot_merge / merge_ops are EventBridge-
      scheduled, NOT human-initiated (merge_ops hits PRODUCTION on the schedule with params supplied by
      the EventBridge target).
  provisional_v0:
    authored_at: "2026-06-22"
    authored_via: >-
      PLAN-ratify-class-b-lambda-verb-contracts (T1.12 Class B wave); Step 10 multi-perspective
      critique + merge to main.
    rationale: >-
      Class B contracts start provisional_v0 (INTENT Part 6A/6B). Maintenance is scheduled/low-volume,
      so an invocation-count trigger is not meaningful; the stagger is a 90-day clock only (INTENT
      Part 6B: lambda-maintenance trigger is "90 days only").
    first_production_invocation_date: "2026-06-22"
    surfacing_note: >-
      The time-based alarm is LIVE: session_preflight._scan_provisional_contracts computes
      days_since_first_production_invocation deterministically from first_production_invocation_date
      (via scripts.contracts_enforcement.default_provisional_metrics) and surfaces this contract in
      provisional_contracts_due once the threshold below is met -- no credentials, no warehouse reads.
      Maintenance has no traffic condition; it is fully live on the 90-day clock.
      check_re_ratification_trigger schema-validates this trigger block in CI.
    re_ratification_trigger:
      first_of:
        - "days_since_first_production_invocation >= 90"
    re_ratification_owner: "human + Step 10 multi-perspective critique"
verbs:
  merge:
    payload_schema_ref: >-
      event envelope {action: "merge", force_recreate_tables?}. SCHEDULED (EventBridge daily 04:00 UTC,
      smoke catalog). Daily non-destructive merge (flush_inlined_data + merge_adjacent_files).
    response_codes:
      200: "merged; body {ok, files_before, files_after_merge, elapsed_ms, ...}"
      500: "DuckLakeMaintenanceError (breaker) / DuckLakeRuntimeError / VersionMismatchError"
    typed_errors:
      breaker: "circuit-breaker trip; emits MaintenanceBreakerTrip=1; deletes nothing (500)"
      runtime: "runtime loud-fail (500)"
      version_mismatch: "DuckDB/extension version mismatch (500)"
  gc:
    payload_schema_ref: >-
      event envelope {action: "gc", force_recreate_tables?, force_file_fraction?, force_byte_budget?}.
      SCHEDULED (EventBridge weekly 05:00 UTC Sun, smoke catalog). Weekly guarded GC (five-step
      sequence); circuit-breaker guarded.
    response_codes:
      200: "gc complete; body {ok, files_before, files_after, snapshots_expired, files_cleaned, orphans_deleted, elapsed_ms}"
      500: "DuckLakeMaintenanceError (breaker trip; deletes nothing) / DuckLakeRuntimeError / VersionMismatchError"
    typed_errors:
      breaker: "file-fraction or byte-budget breaker trip; emits MaintenanceBreakerTrip=1; deletes nothing (500)"
      runtime: "runtime loud-fail (500)"
      version_mismatch: "DuckDB/extension version mismatch (500)"
  hot_merge:
    payload_schema_ref: >-
      event envelope {action: "hot_merge", force_recreate_tables?}. SCHEDULED (EventBridge cron(0 */6 * * ? *),
      smoke catalog). Higher-frequency merge-only cadence (merge_adjacent_files) over the HOT table
      scope; no expiry, no deletion (T2.18 FP-B / CD.34).
    response_codes:
      200: "merged; body {ok, files_before, files_after, elapsed_ms}"
      500: "DuckLakeMaintenanceError (breaker) / DuckLakeRuntimeError / VersionMismatchError"
    typed_errors:
      breaker: "circuit-breaker trip (500)"
      runtime: "runtime loud-fail (500)"
      version_mismatch: "DuckDB/extension version mismatch (500)"
  merge_ops:
    payload_schema_ref: >-
      event envelope {action: "merge_ops", data_path (s3://), meta_schema}. SCHEDULED (EventBridge
      cron(30 */6 * * ? *) against PRODUCTION ducklake_ops, params supplied by the EventBridge target) AND
      human-invokable. Non-destructive merge over ALL live ops_* SCD2 table pairs in the production
      catalog (discovered via information_schema). No expire/cleanup/orphan.
    response_codes:
      200: "merged; body {ok, tables, files_before, files_after, elapsed_ms, per_table}"
      500: "DuckLakeRuntimeError: missing/non-s3 data_path, missing meta_schema, or no ops_* pairs discovered / VersionMismatchError"
    typed_errors:
      runtime: "missing s3:// data_path / meta_schema, or no ops_* table pairs discovered (500)"
      version_mismatch: "DuckDB/extension version mismatch (500)"
  catalog_reinit:
    payload_schema_ref: >-
      event envelope {action: "catalog_reinit", data_path (s3://), meta_schema, confirm}. OPERATIONAL
      (human-invoked) break-glass: drop the squatting meta-schema + re-initialize at data_path.
      DESTRUCTIVE + IRREVERSIBLE; requires confirm == meta_schema.
    response_codes:
      200: "reinitialized; body {ok, meta_schema, data_path, dropped_existing, reinitialized}"
      500: "DuckLakeRuntimeError: missing/non-s3 data_path, missing meta_schema, or confirm mismatch / VersionMismatchError"
    typed_errors:
      runtime: "missing s3:// data_path, missing meta_schema, or confirm-guard mismatch (500)"
      version_mismatch: "DuckDB/extension version mismatch (500)"
  restore_drill:
    payload_schema_ref: >-
      event envelope {action: "restore_drill", scratch_meta?, scratch_data_path?, probe_id?}.
      OPERATIONAL (human-invoked) DR gate: pg_dump(custom)->pg_restore round-trip + read-your-write on
      an isolated scratch meta-schema. Requires the pgclient layer (pg_dump/pg_restore).
    response_codes:
      200: "restore verified; body {ok, scratch_meta, probe_id, restored, pg_version}"
      500: "CatalogDrError (pg_dump/pg_restore non-zero or read-your-write failed; Decision 55 stop) OR DuckLakeRuntimeError (e.g. invalid scratch_meta identifier)"
    typed_errors:
      catalog_dr: "pg_dump/pg_restore failure or read-your-write mismatch; stops the cutover (500)"
      runtime: "invalid scratch_meta identifier or runtime loud-fail (500)"
  catalog_stats:
    payload_schema_ref: >-
      event envelope {action: "catalog_stats", meta_schema, ops_table_filter?}. OPERATIONAL
      (human-invoked) read-only: catalog-metadata footprint of the production ops_* catalog (psycopg2
      metadata read; ATTACH-free; no data_path). Read-only -- no merge/expire/cleanup/orphan.
    response_codes:
      200: "stats; body {catalog_metadata_bytes, file_column_stats_rows_est, ...}"
      500: "DuckLakeRuntimeError: missing meta_schema / VersionMismatchError"
    typed_errors:
      runtime: "missing meta_schema (no production default) (500)"
      version_mismatch: "DuckDB/extension version mismatch (500)"
  reconcile_columns:
    payload_schema_ref: >-
      event envelope {action: "reconcile_columns", data_path (s3://), meta_schema, table}. OPERATIONAL
      (human-invoked): ALTER TABLE ADD COLUMN (never DROP) to add any spec columns missing from the
      physical history + current tables. Idempotent. Requires explicit data_path + meta_schema (no-arg refused).
    response_codes:
      200: "reconciled; body {ok, table, meta_schema, data_path, added_history, added_current, columns_pre_existing}"
      500: "DuckLakeRuntimeError: missing/non-s3 data_path, missing meta_schema, or empty table / VersionMismatchError"
    typed_errors:
      runtime: "missing s3:// data_path / meta_schema / table (no-arg invokes refused) (500)"
      version_mismatch: "DuckDB/extension version mismatch (500)"
audit_invariants:
  - "Singleton: reserved_concurrent_executions=1 enforces a single concurrent maintenance run (Decision 81 cl.6)."
  - "No LLM / agent invocation anywhere in this path (CD.33 cl.5 / Decision 81 cl.6)."
  - "Scheduled merge/gc/hot_merge operate on the SMOKE catalog (ducklake_smoke); merge_ops is ALSO EventBridge-scheduled (every 6h) but targets the PRODUCTION catalog (ducklake_ops) with data_path+meta_schema supplied by the EventBridge target. The human-invoked operational actions (catalog_reinit/restore_drill/catalog_stats/reconcile_columns) target production via explicit params and refuse no-arg invokes."
  - "GC is circuit-breaker guarded (file-fraction + byte-budget); a trip raises DuckLakeMaintenanceError, emits MaintenanceBreakerTrip=1, and deletes nothing. The forced-threshold breaker_probe action (out of contract scope) exists to prove this guard."
  - "Two destructive paths exist: catalog_reinit is CATALOG-STRUCTURE destructive (meta-schema drop + reinit; confirm=<meta_schema>-guarded; IRREVERSIBLE), and gc is DATA-FILE destructive (snapshot expiry + orphan-file deletion on the happy path), guarded by the circuit-breaker, not a confirm token."
  - "An unknown `action` returns 400 with the sorted action allow-list (dispatcher-level; not a per-verb outcome)."
amendment_log: []
previous_versions: []
