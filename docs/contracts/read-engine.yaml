---
# Engine-choice contract for the ops-store read layer.
# Authoritative reference for the Decision 84 single-backend topology (supersedes the CD.15
# Athena escape-hatch and the T2.19 per-backend split for ops tables).
# Consumed by: agents, planning sessions, T0.7c query Lambda implementors.

version: 3
last_updated: "2026-06-11"
decisions_cited: [CD.8, CD.33, Decision-56, Decision-69, Decision-70, Decision-79, Decision-81, Decision-84]

single_backend:
  status: ratified (Decision 84 I-1)
  backend: DuckLake-on-Neon (catalog) + S3 Parquet (data), fronted by the closed
    ducklake_reader / ducklake_writer Function-URL boundary (AWS_IAM, SigV4).
  tables_on_boundary: [ops_recommendations, ops_decisions, ops_priority_queue]
  tables_pending: [ops_session_log, ops_execution_plans]   # T2.26 disposition (session_log may retire per T-1.9)
  rollback_flag: RETIRED (OPS_STORAGE_BACKEND deleted; the frozen Iceberg copy stopped being a
    coherent rollback target the day writes moved to DuckLake)
  athena_escape_hatch: NONE for boundary tables (CD.15 scope now empty for ops; market-data
    engine choice unaffected and out of scope)

read_surface:
  named_verbs:
    status: primary application read surface (Decision 84 I-3)
    mechanism: >
      The caller names a verb and binds named params; the SQL is registry content inside the
      reader Lambda's bundle (src/common/ducklake_scd2_schema.py NAMED_READS). No caller SQL
      crosses the boundary on this path. Responses carry registry_version.
    verbs:
      ops_recommendations: [open_recs, rec_by_id, recs_by_title_prefix, ci_rca_open,
        ci_rca_since, forward_fix_recursion, budget_bypass_recent, count_by_status]
      ops_decisions: [decision_by_id, decisions_max_updated]
      ops_priority_queue: [priority_queue_current]
  structural_reads:
    read_ops_current: full current projection, or a structural {column, value} equality filter
      validated server-side against the field-semantics contract (rec-2170 root fix -- the
      column travels with the value; never a SQL fragment).
    read_ops_history: append-history rows (optional merge-key filter).
  query_ops:
    status: RETAINED for the DQ harness only (Decision 84 I-3 staging)
    rationale: >
      The ~20 ops.yaml check shapes (including history-table checks) are not yet expressible
      as verbs. Retirement is a follow-up gated on a dq_check verb family or a caller
      allowlist. The read-only verb guard (assert_read_only_sql: SELECT/WITH only,
      single-statement) and the S3-read-only execution role bound what caller SQL can do.

write_surface:
  file_ops: >
    CREATE with writer-owned id allocation (Decision 84 I-2): the entity counter row is
    updated inside the same catalog transaction as the MERGEs -- the shared-row write-write
    conflict is the serialization point; allocation re-runs inside the OCC retry loop. The
    counter NEVER self-seeds on the hot path (the concurrent-seed race mints duplicate ids;
    observed live 2026-06-11); create_ops_tables owns the serial bootstrap/repair
    (bootstrap_entity_counter). Client idempotency ULID makes response-lost retries return
    the original allocation. Scope: tables declaring entity_id_prefix (ops_recommendations).
  write_ops: caller-keyed upsert -- DECISIONS.md backfill (dec-NNN), test-/probe prefixes.
  update_ops: in-transaction referential existence check (CD.33 cl.8); absent key -> 409.
  destructive_guards: create_ops_tables(force_recreate) requires confirm_force_recreate=<table>;
    maintenance catalog_reinit requires explicit meta_schema + confirm (no production default).

current_state_qualification:
  ops_recommendations: {pattern: write-through current projection, decision: Decision-56 semantics materialised in DuckLake}
  ops_decisions: {pattern: write-through current projection, decision: Decision-56}
  ops_priority_queue:
    pattern: correlated_subquery INSIDE the priority_queue_current verb
    rationale: >
      Decision 70: the queue's current state is ALL entries of the latest curator run. The
      generic latest-per-merge-key projection would silently change these semantics; the verb
      is the only sanctioned queue read.
    decision: Decision-70

single_portal_invariant:
  decision: Decision-69 (unchanged)
  rule: >
    ops_data_portal fetch-before-update reads use the rec_by_id / decision_by_id verbs.
    On reader failure RuntimeError is raised -- no local JSONL fallback, no Athena fallback.

failure_semantics:
  policy: Decision 55 / Decision 84 I-4
  rule: >
    No offline outbox for boundary tables. A failed write raises at the call site; transient
    5xx (Neon cold-resume) is retried only when idempotent (file_ops ULID / update_ops).
    Reader failures surface as degraded signals (recs_read_status), never silent zeros.
    Writer Lambda errors alarm via CloudWatch (ducklake-writer-errors).

legacy_iceberg_reader:
  class: DuckDBIcebergReader (src/common/iceberg_reader.py)
  status: >
    No longer reachable via make_reader(). Importable for non-ops Iceberg surfaces
    (schema-integrity drift checks against the retained estate) until the Phase-3 demolition
    apply lands; ops_session_log / ops_execution_plans reads stay on their existing paths
    pending T2.26.
