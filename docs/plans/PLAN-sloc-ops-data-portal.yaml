  - "Single Portal Invariant (Decision 84/69, CLAUDE.md): `python -m scripts.ops_data_portal` and every CLI flag/exit code, plus the file_rec/update_rec/sync Python API and the CLI verbs (--backfill-decisions-md, --guidance, find_open_ci_rca_rec_by_fingerprint, bump_ci_rca_occurrence), are a HARD public contract -- byte-stable. The facade is the sole entry module; other agents call it."
  - "Import stability (tests/CLAUDE.md): the facade re-exports every public symbol AND every test-patched private symbol AND the 6 imported-into-namespace names (subprocess, ET, DECISIONS_JSONL, RECS_JSONL, Recommendation, validate_source) AND the _fetch_decision_from_athena alias. Where a moved caller's patch target must migrate, bulk-repoint EVERY such site in the SAME change and prove closure by grep -- never leave a silent no-op mock."
