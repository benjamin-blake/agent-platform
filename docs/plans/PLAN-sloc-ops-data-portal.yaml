rollback: >-
  Pure refactor on a feature branch; if the facade-completeness or patch-interception guard cannot be made
  green, abandon the branch (no merge -- nothing is deployed; ops_data_portal.py is NOT Lambda-packaged). If
  merged and a regression surfaces, revert the squash commit -- the facade + package + .importlinter + budget
  re-point + Decision 124 land atomically in one PR, so a single revert restores the monolith.
