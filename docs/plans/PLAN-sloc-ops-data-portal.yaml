  - "Decision 43: CC<=20 per function; the decision-43 complexity-waiver header travels into cli.py (main) and ci_rca_runtime.py (_run_ci_rca_cross_check) in the FIRST 10 lines; the facade keeps its own waiver (file_rec). Do NOT strip any waiver comment before checking validate_cc_limits (Decision 102)."
  - "Multi-plan coordination: this is one of ~15 SLOC-decomposition plans on the shared branch claude/sloc-violations-refactor-p5svnl. Touch ONLY the scope files, the new scripts/ops_portal/ modules, and the listed tests. config/sloc_budgets.yaml is REGENERATED, never hand-edited; assert only THIS plan's entries changed (siblings share the file). Do NOT edit any sibling's scope files."
  - "Decision 86: no new standing prose-architecture doc under docs/. Rationale routes to Decision 124 only; the facade-completeness guard is a TEST (tests/test_ops_portal_facade.py), not a doc. map_source_to_test is deliberately NOT extended (deferral recorded in Decision 124)."
  - "Public-repo boundary (Decision 101): no AWS account IDs/ARNs/secret names/internal hostnames in any new file; writer_transport.py keeps URL/ARN resolution at runtime (env/SSM/terraform/lambda-api). No emojis; ASCII hyphens."
  - "No rescue agents or workaround loops (Decision 55): on an unrecoverable verification failure, stop and RCA; never paper over a broken facade/interception with a skip or an --ignore-budget."
