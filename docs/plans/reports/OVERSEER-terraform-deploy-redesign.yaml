# Inter-wave gates the OVERSEER actively enforces (from the Fable ORDERING_HAZARDS reconciliation).
# These are NOT visible from the serial order alone.
overseer_enforced_gates:
  - id: "GATE-B-apply"
    when: "B, before dispatching C"
    rule: "B's PlatformDev Deny + E's boundary attaches route to admin out-of-band break-glass (human reviews plan, explicitly directs). Overseer NEVER approves the gated-apply Environment for these -- it would approve-then-AccessDenied (the DEP-02 trap applies to the fix itself)."
  - id: "GATE-B-smoke"
    when: "after B's apply, before dispatching C"
    rule: "PlatformDev is every session's ambient identity. VERIFY portal file_rec/update_rec writes + session-start AWS check + simulate-principal-policy (explicitDeny only on the 3 target prefixes, nothing collateral) BEFORE proceeding. A mis-scoped Deny would break all subsequent slices' ops calls."
  - id: "GATE-drift-clear"
    when: "after each admin apply (B; E), before next slice"
    rule: "Admin applies stale saved plans and trip drift-red, MIScategorized as out-of-band-drift until D3 lands. Expect it; clear (re-plan/reconcile) before the next slice; do NOT treat as plan failure."
  - id: "GATE-D2-green"
    when: "D2, before dispatching E"
    rule: "D2's forced-red -> reconcile parity rehearsal must be confirmed GREEN in D2's hand-back, else E's end-to-end acceptance conflates inversion failures with consolidation regressions."
  - id: "GATE-E-execroles"
    when: "E, during apply"
    rule: "Pre-apply simulate-principal-policy per Lambda exec role; post-apply smoke both deploy channels. (HIGHEST-RISK gate.)"
  - id: "GATE-G-bypass"
    when: "G acceptance"
    rule: "Probe-PR acceptance (protected file blocked; unprotected merges as today) + verify admin bypass retained (Decision 83)."

