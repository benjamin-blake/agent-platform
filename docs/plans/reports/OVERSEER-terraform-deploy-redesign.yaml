  - wave: 3
    slices: ["C: guard-resource-policy"]
    dispatch: serial
    rationale: "audit DEP-06: MUST land before E (restores identity-policy backstop before E removes it)"
  - wave: 4
    slices: ["D1: t2-42-path-hardening"]
    dispatch: serial
    rationale: "audit DEP-03: top generator of gated-apply noise; kill before D2's rehearsal"
  - wave: 5
