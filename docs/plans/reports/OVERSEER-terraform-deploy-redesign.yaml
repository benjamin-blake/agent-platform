    impl_hand_back: "IMPL PROCEED. Impl #683 @ 82e46b8. 7 duplicated safety blocks -> composite actions under .github/actions/ (terraform-init-retry, build-ducklake-artifacts, materialise-tfvars, fetch-saved-plan, deterministic-guard, subagent-plan-review, write-convergence-record) consumed by both apply workflows; workflows shrink 1206->881 + 736->484. DEP-07 sha256(plan.bin) digest+commit-status, fail-closed in fetch-saved-plan before every apply; tfplan key content-addressed (pr,sha) inside existing grant. ZERO .tf edits (applies nothing). validate --pre exit 0; 518/518 pytest; VP1-12 PASS, VP13-16 DEFERRED (CI/post-merge/operator-assisted). Graduation 7/8 admitted; 1 (tfplan-key regex) tautological -> waived, rec-2771 filed (Low/S follow-on). CARRY-1 applied. Lifted code-review pending -- MUST scrutinise behavioural equivalence of the 7 composite actions vs the inlined originals (guard routing / anti-masking skips / reconcile race-guard contracts) + DEP-07 fail-closed."
