# Inter-wave gates the OVERSEER actively enforces (from the Fable ORDERING_HAZARDS reconciliation).
# These are NOT visible from the serial order alone.
overseer_enforced_gates:
  - id: "GATE-B-apply"
    when: "B, before dispatching C"
    rule: "B's PlatformDev Deny + E's boundary attaches route to admin out-of-band break-glass (human reviews plan, explicitly directs). Overseer NEVER approves the gated-apply Environment for these -- it would approve-then-AccessDenied (the DEP-02 trap applies to the fix itself)."
  - id: "GATE-B-smoke"
    when: "after B's apply, before dispatching C"
    rule: "PlatformDev is every session's ambient identity. VERIFY portal file_rec/update_rec writes + session-start AWS check + simulate-principal-policy (explicitDeny only on the 3 target prefixes, nothing collateral) BEFORE proceeding. A mis-scoped Deny would break all subsequent slices' ops calls."
  - id: "GATE-drift-clear"
    when: "after each admin apply (B; E), before next slice"
    rule: "Admin applies stale saved plans and trip drift-red, MIScategorized as out-of-band-drift until D3 lands. Expect it; clear (re-plan/reconcile) before the next slice; do NOT treat as plan failure."
  - id: "GATE-D2-green"
    when: "D2, before dispatching E"
    rule: "D2's forced-red -> reconcile parity rehearsal must be confirmed GREEN in D2's hand-back, else E's end-to-end acceptance conflates inversion failures with consolidation regressions."
  - id: "GATE-E-execroles"
    when: "E, during apply"
    rule: "Pre-apply simulate-principal-policy per Lambda exec role; post-apply smoke both deploy channels. (HIGHEST-RISK gate.)"
  - id: "GATE-G-bypass"
    when: "G acceptance"
    rule: "Probe-PR acceptance (protected file blocked; unprotected merges as today) + verify admin bypass retained (Decision 83)."

autonomous_decision_log:
  - timestamp: "2026-07-21T15:04:36Z"
    decision: "Execute all 9 slices SERIALLY in listed order rather than parallelizing the B/C/D1 group."
    rationale: >-
      Autonomy criteria all hold: settled-consensus (Fable + skill serial-default agree),
      convention-fit (skill: 'serial is the default; parallel only when the matrix affirmatively
      clears a pair'), reversible (a wrong call costs a re-dispatch), no-credible-alternative that
      the human would prefer given their explicit "run sequentially" instruction. Still surfaced
      at G1 for confirmation since dispatch-mode is a decomposition-shape decision.
  - timestamp: "2026-07-21T15:04:36Z"
    decision: "Reconcile all Fable CONTESTED points as already-handled-by-prompt (no scope changes); adopt repo side on both DIVERGENCES; inject HAZARD-4 + HIGHEST-RISK as E dispatch constraints; carry two OPTIONAL additions to plan-critique, not as overseer edits."
    rationale: "Convention-fit + reversible; the two optional additions touch Decision content / audit scope so they go to the planning subagents' own gates (decision-scout/plan-critique), not overseer fiat."
  - timestamp: "2026-07-21T15:04:36Z"
    decision: "Merge-ownership model: dispatched subagents run on the SHARED working tree (NOT worktree-isolated -- a worktree severs bin/venv-python's gitignored .venv), each on its own claude/<slug> branch off origin/main; they drive to PR-CREATED + local validate.py --pre green, then RETURN. The OVERSEER owns the CI-green-wait + squash-merge for every slice PR via its event-driven lifecycle (subscribe_pr_activity)."
    rationale: >-
      Harness reality: subagents cannot receive PR webhooks (subscribe_pr_activity binds the session,
      not a subagent), so they cannot event-wait for CI. Overseer-controlled merges are also the correct
      control point for the hard always-ask apply gates -- merging B/D1/E/F/G is exactly what triggers
      the terraform pipeline, so the overseer verifies check-runs and gets human direction there. Also
      forces serial (shared tree, no parallel writers), consistent with the human "run sequentially"
      instruction. Convention-fit (git-ops procedure is written for the event-wake session), reversible.

