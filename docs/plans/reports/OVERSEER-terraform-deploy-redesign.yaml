slug: "terraform-deploy-redesign"
intent: >-
  Drive the response to audits/terraform-deploy-redesign-b67955b.yaml (the deploy/IAM/CI
  allow-list inversion) to completion via 9 sequential /plan + /implement subagent cycles,
  narrowing the human to the G0/G1/G3 gates plus the hard always-ask IAM/apply reviews.
