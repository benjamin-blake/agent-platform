    hand_back: "PLAN AUTHORED (PROCEED). Plan #685 @ 63671b5. decision-scout INLINE NO_FLAGS. validate --pre exit 0 (working-tree + committed-state; plan-PR legs green). 13 VP steps (10 pre-deploy [7 graduate pure-shell + 3 n/a] + 3 post-deploy V3; every pre-deploy hermetic:false -- rec-2770 safe). Re-grounds T2.47 stale files_in_scope to the real package submodules (carried Low addressed). Design on D2's consolidated chain: DEP-10 = stale-saved-plan fallthrough in reconcile.yml -- verbatim apply of the digest-verified plan.bin hits terraform's stale-plan signature (state serial advanced by an out-of-band admin apply) -> same run re-plans fresh, re-runs the SAME deterministic-guard + digest-fed subagent-review gate, applies; guard-PASS clears green, guard-ROUTE hands fresh plan.bin to gated-apply-reconcile via a run-scoped artifact + verified sha256 (NO new IAM); one Reconcile dispatch clears the episode. DEP-11 = write-convergence-record writes a NON-status pending_gated marker on route (status stays green -- anti-masking preserved), terraform-drift names the pending PR, convergence_health + PR advisory surface pending-gated."
