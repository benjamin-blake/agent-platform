schema_version: 1
slug: "decision-log-premise-integrity"
intent: >-
  Drive the 7-finding decision-log premise-integrity audit
  (audits/decision-log-premise-integrity-8fb581e) to completion via three
  sequential IMPLEMENTATION plans, per the operator-supplied decomposition and
  keystone-first sequencing.
wave_plan:
  - wave: 1
    slices: ["decisions-content-reconciliation"]
    dispatch: serial
    rationale: >-
      DPI-02/03/05/07 -- all content edits to docs/DECISIONS.md and
      DECISIONS_ARCHIVE.md. Keystone: waves 2 and 3 assume this end state
      (victim-side annotations + the Decision-26 duplicate verdict must exist
      before any archival move or guard lands).
  - wave: 2
    slices: ["decisions-archival-hygiene"]
    dispatch: serial
    rationale: >-
      DPI-04 -- archive moves + lifecycle/status hygiene + archival-policy
      reconciliation. depends_on wave 1 (needs the annotations and the
      Decision-26 disposition before entries move) AND overlaps wave 1's
      files_in_scope (same two decision files) -> serial after wave 1.
  - wave: 3
    slices: ["decisions-supersession-guard"]
    dispatch: serial
    rationale: >-
      DPI-01/06 -- mechanical validate.py supersession-annotation guard. Lands
      last so the new gate starts green over the final file layout instead of
      going red mid-stream. Its tests parse the live decision files while wave 2
      is still rearranging them -> serial after wave 2 (code, but data-coupled).
