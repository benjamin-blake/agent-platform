schema_version: 1
slug: "decision-log-premise-integrity"
intent: >-
  Drive the 7-finding decision-log premise-integrity audit
  (audits/decision-log-premise-integrity-8fb581e) to completion via three
  sequential IMPLEMENTATION plans, per the operator-supplied decomposition and
  keystone-first sequencing.
wave_plan:
  - wave: 1
    slices: ["decisions-content-reconciliation"]
    dispatch: serial
    rationale: >-
      DPI-02/03/05/07 -- all content edits to docs/DECISIONS.md and
      DECISIONS_ARCHIVE.md. Keystone: waves 2 and 3 assume this end state
      (victim-side annotations + the Decision-26 duplicate verdict must exist
      before any archival move or guard lands).
  - wave: 2
    slices: ["decisions-archival-hygiene"]
    dispatch: serial
    rationale: >-
      DPI-04 -- archive moves + lifecycle/status hygiene + archival-policy
      reconciliation. depends_on wave 1 (needs the annotations and the
      Decision-26 disposition before entries move) AND overlaps wave 1's
      files_in_scope (same two decision files) -> serial after wave 1.
  - wave: 3
    slices: ["decisions-supersession-guard"]
    dispatch: serial
    rationale: >-
      DPI-01/06 -- mechanical validate.py supersession-annotation guard. Lands
      last so the new gate starts green over the final file layout instead of
      going red mid-stream. Its tests parse the live decision files while wave 2
      is still rearranging them -> serial after wave 2 (code, but data-coupled).
slices:
  - plan_slug: "decisions-content-reconciliation"
    findings: ["DPI-02", "DPI-03", "DPI-05", "DPI-07"]
    status: plan_merged_implementing
    plan_pr_url: "https://github.com/benjamin-blake/agent-platform/pull/662"
    plan_merged_sha: "4c37fb2"
    pr_url: null
    hand_back:
      status: PROCEED
      gates: "decision-scout FLAGS_FOUND (103/103 triaged, all NOTE); plan-critique PROCEED (0 rounds); validate --pre exit 0 post-commit (vp_replay clean, graduation PASS, validate_decisions_size PASS)"
      bundled_recs: ["rec-2278", "rec-1964"]
      dropped: "rec-2057 (no HEAD overlap -- content is archived D50/51/56/69)"
      pending_operator_adjudications:
        - "D40: plan drafts option B (annotate triggers moot); alt A = author new superseding Decision"
        - "D26/DPI-05: plan drafts merge-into-archive + delete live duplicate; fidelity to confirm"
      notes: "DPI-07 verify-only (already resolved by #633); DPI-02 uses Decision-134 canonical annotation shapes; scope-note (vetoable): plan also annotates ROADMAP-PRODUCT.yaml:4386; 2 audit oracles corrected in-plan"
    operator_adjudications_confirmed: "D40 -> annotate moot (B); D26 -> merge into archive + delete live duplicate; scope note -> keep ROADMAP-PRODUCT.yaml edit (all as drafted -- no plan revision needed)"
    bundled_recommendations_candidates: ["rec-2278", "rec-1964", "rec-2057"]
  - plan_slug: "decisions-archival-hygiene"
    findings: ["DPI-04"]
    status: pending
    plan_pr_url: null
    pr_url: null
    hand_back: null
  - plan_slug: "decisions-supersession-guard"
    findings: ["DPI-01", "DPI-06"]
    status: pending
    plan_pr_url: null
    pr_url: null
    hand_back: null
autonomous_decision_log:
  - timestamp: "2026-07-21"
    decision: >-
      At G0 the halt-on-open-ci_rca gate (Decision 73) fired on 3 critical recs
      (rec-2743/2749/2754) unrelated to the audit. Verify-closed rec-2743 on
      proof (DQ automatable [not_null] oracle passes non-vacuously, 0/939 rows);
      escalated the other two rather than using /plan's deferral escape hatch.
    rationale: >-
      halt_on_open_ci_rca invariant -- the overseer halts new dispatch and
      escalates to the human; it never uses the deferral escape hatch
      autonomously. Closing a provably-resolved rec is sanctioned housekeeping
      (preflight coaches verify-and-close), not an inline patch.
  - timestamp: "2026-07-21"
    decision: >-
      Skipped the Fable advice-consult for the G1 decomposition shape.
    rationale: >-
      The operator supplied the full decomposition (finding->plan mapping,
      serial sequencing, and the explicit parallel-vs-serial overlap analysis),
      so this is already-settled operational sequencing, not an architecture the
      overseer must choose. Per the Fable protocol's own carve-out, consulting
      here would waste a dispatch for no new judgment.
  - timestamp: "2026-07-21"
    decision: >-
      Division of labor (adapt verdict): dispatched /plan and /implement
      subagents do the intellectual work (recon, draft, decision-scout /
      plan-critique / code-review gates, live verification) and push + open
      their PR; the long-running overseer session drives each PR to CI-green and
      squash-merge via the Decision 76 event-driven flow.
    rationale: >-
      Background Agent-tool subagents run to completion and cannot be woken by
      the CI-green webhook, so the sanctioned subscribe->end-turn->wake->merge
      mechanism must live in the overseer session. Keeps the overseer as
      router/merger with no file edits, consistent with the no_code_changes
      invariant.
fable_consults:
  - timestamp: "2026-07-21"
    trigger: >-
      Operator-prompted mid-run review of the overseer-process decisions made this
      session (not a G1-decomposition consult).
    verdicts:
      - {decision: "G0 verify-close rec-2743 + escalate 2749/2754", verdict: ADOPT}
      - {decision: "skip G1 Fable consult (operator-supplied decomposition)", verdict: ADOPT}
      - {decision: "division of labor: subagent opens PR, overseer drives merge", verdict: ADOPT}
      - {decision: "worktree isolation for serial subagents", verdict: ADOPT}
      - {decision: "umbrella ledger PR (open, merge at G3)", verdict: ADAPT}
    reconciliation: >-
      Decisions 1-4 ratified as settled consensus. Decision 5 ADAPT: open the ledger PR
      as DRAFT while the run is live, push only at hand-back/gate cadence, never subscribe
      to it until G3. Deferred to the operator (open_question) rather than auto-applied,
      because DRAFT-while-live conflicts with the harness "create PR ready-for-review, not
      draft" default -- a standing-rule conflict fails the autonomy no-credible-alternative
      test, so it routes to a human gate.
    recs_filed: ["rec-2765", "rec-2766"]
    open_questions_for_operator:
      - "Adopt DRAFT-while-live for the ledger PR (and future overseer runs)?"
      - "Should orient's SOFT PROMPT table explicitly sanction autonomous verify-and-close on a deterministic non-vacuous oracle pass (codify the rec-2743 autonomy call)?"
gates:
  g0_intake: confirmed
  g1_decomposition: confirmed
  g3_completion: pending
