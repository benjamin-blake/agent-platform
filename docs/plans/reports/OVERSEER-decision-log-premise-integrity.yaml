autonomous_decision_log:
  - timestamp: "2026-07-21"
    decision: >-
      At G0 the halt-on-open-ci_rca gate (Decision 73) fired on 3 critical recs
      (rec-2743/2749/2754) unrelated to the audit. Verify-closed rec-2743 on
      proof (DQ automatable [not_null] oracle passes non-vacuously, 0/939 rows);
      escalated the other two rather than using /plan's deferral escape hatch.
    rationale: >-
      halt_on_open_ci_rca invariant -- the overseer halts new dispatch and
      escalates to the human; it never uses the deferral escape hatch
      autonomously. Closing a provably-resolved rec is sanctioned housekeeping
      (preflight coaches verify-and-close), not an inline patch.
  - timestamp: "2026-07-21"
    decision: >-
      Skipped the Fable advice-consult for the G1 decomposition shape.
    rationale: >-
      The operator supplied the full decomposition (finding->plan mapping,
      serial sequencing, and the explicit parallel-vs-serial overlap analysis),
      so this is already-settled operational sequencing, not an architecture the
      overseer must choose. Per the Fable protocol's own carve-out, consulting
      here would waste a dispatch for no new judgment.
  - timestamp: "2026-07-21"
    decision: >-
      Division of labor (adapt verdict): dispatched /plan and /implement
      subagents do the intellectual work (recon, draft, decision-scout /
      plan-critique / code-review gates, live verification) and push + open
      their PR; the long-running overseer session drives each PR to CI-green and
      squash-merge via the Decision 76 event-driven flow.
    rationale: >-
      Background Agent-tool subagents run to completion and cannot be woken by
      the CI-green webhook, so the sanctioned subscribe->end-turn->wake->merge
      mechanism must live in the overseer session. Keeps the overseer as
      router/merger with no file edits, consistent with the no_code_changes
      invariant.
fable_consults:
  - timestamp: "2026-07-21"
    trigger: >-
      Operator-prompted mid-run review of the overseer-process decisions made this
      session (not a G1-decomposition consult).
    verdicts:
      - {decision: "G0 verify-close rec-2743 + escalate 2749/2754", verdict: ADOPT}
      - {decision: "skip G1 Fable consult (operator-supplied decomposition)", verdict: ADOPT}
      - {decision: "division of labor: subagent opens PR, overseer drives merge", verdict: ADOPT}
      - {decision: "worktree isolation for serial subagents", verdict: ADOPT}
      - {decision: "umbrella ledger PR (open, merge at G3)", verdict: ADAPT}
    reconciliation: >-
      Decisions 1-4 ratified as settled consensus. Decision 5 ADAPT: open the ledger PR
      as DRAFT while the run is live, push only at hand-back/gate cadence, never subscribe
      to it until G3. Deferred to the operator (open_question) rather than auto-applied,
      because DRAFT-while-live conflicts with the harness "create PR ready-for-review, not
      draft" default -- a standing-rule conflict fails the autonomy no-credible-alternative
      test, so it routes to a human gate.
    recs_filed: ["rec-2765", "rec-2766"]
    open_questions_for_operator:
      - "Adopt DRAFT-while-live for the ledger PR (and future overseer runs)?"
      - "Should orient's SOFT PROMPT table explicitly sanction autonomous verify-and-close on a deterministic non-vacuous oracle pass (codify the rec-2743 autonomy call)?"
