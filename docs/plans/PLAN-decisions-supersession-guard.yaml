schema_version: 1
slug: decisions-supersession-guard
intent: >-
  Build the mechanical supersession-annotation invariant (audit findings DPI-01 + DPI-06 + the DPI-03
  Warehouse-ID extension) as a new FULL-tier CI check, so a superseding Decision that ships without a
  forward pointer on its victim FAILS the post-merge full tier (RCA-looped per Decision 72), not a
  pre-merge block, instead of silently regrowing the corpse pile. Wave 3 (final) of the /overseer
  decision-log-premise-integrity run. Scope precision (plan-critique finding 12k): the open point-fix recs
  rec-2057/2058/2059/917/918 are NOT retired by this guard -- they remain OPEN and OUT OF SCOPE, a
  different staleness class (stale cross-references [2057/2058], old file-path refs [917 ->
  config/executor_capabilities.yaml, 918 -> config/data_quality/], IAM-user refs [2059]) that a
  supersession-EDGE guard neither checks nor fixes; they are named only illustratively as broader
  manual-annotation friction, and bundled_recommendations stays empty.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-decisions-supersession-guard.yaml
phase: >-
  Audit-driven platform governance hygiene (DPI-01/DPI-06/DPI-03-extension,
  audits/decision-log-premise-integrity-8fb581e.yaml); no tier_item -- durable deferred follow-ups route
  to roadmap tier_items, not recs. Wave 3 (final) of the decision-log-premise-integrity /overseer run;
  depends on Waves 1 (#665, DPI-02/03/05) and 2 (#676, DPI-04 + Decision 146) already on main.
scope:
  - file: scripts/checks/decisions/validate_supersession_annotations.py
    action: Create
    purpose: >-
      The new FULL-tier check (owner=platform). Parses docs/DECISIONS.md + docs/DECISIONS_ARCHIVE.md via
      the shared scripts.decisions_md grammar and runs three sub-checks: (1) supersession-annotation
      invariant (DPI-01), (2) duplicate-number detection (DPI-06 part a), (3) Warehouse-ID line
      conformance (DPI-03 extension). Exposes a pure extract_supersession_edges(root) helper for the
      non-vacuity test and a root= injection seam for synthetic fixtures. Must stay < 500 SLOC (Decision
      128 -- decompose into a facade package if it would exceed, never raise the budget).
  - file: scripts/checks/registry.py
    action: Modify
    purpose: >-
      Insert _c("validate_supersession_annotations") into full_sequence() immediately after
      _c("validate_decision_entry_conformance") (group the decision checks). FULL tier only -- NOT added
      to pre_sequence() (a supersession-annotation sweep need not gate the fast edit loop; it belongs with
      the other decision-corpus governance checks that run full).
  - file: scripts/validate.py
    action: Modify
    purpose: >-
      Add the facade re-export line (Decision 104 dispatch requirement) after the validate_decisions_size
      import, so globals()[name](failed) resolves the new check and tests/test_checks_registry.py
      reachability passes. Never add the check to .github/workflows/ci.yml -- validate.py is the single
      source of truth (Decision 73).
  - file: config/decision_supersession_waivers.yaml
    action: Create
    purpose: >-
      The waiver allowlist. Pre-populated with the non-binding supersession edges (clause-level amends /
      partial or scoped supersessions / one citation false-positive) so the supersession sub-check starts
      GREEN over the post-Wave-1/2 files WITHOUT any docs/DECISIONS.md content edit. Also carries an
      (initially empty) live_archive_pair_allowlist for the DPI-06 live/archive WARN.
  - file: scripts/decisions_md.py
    action: Modify
    purpose: >-
      Add a logged stderr WARNING at parse_decisions_md's first-wins dedup site (currently the silent
      `if decision_id in seen: continue`) naming the dropped decision number, so every backfill surfaces
      duplicate-number collisions instead of masking them (DPI-06). Behavior-preserving: the returned
      parse list and the byte-reconstruction invariant (Decision 134 DAF-01) are unchanged.
  - file: tests/checks/decisions/test_validate_supersession_annotations.py
    action: Create
    purpose: >-
      Unit tests at the Decision-131 mirror path (tests/test_validate.py is retired). Synthetic tmp_path
      fixtures exercise every branch to 100% per-file coverage (validate_test_coverage); plus a
      non-vacuity test that runs extract_supersession_edges over the REAL repo files and asserts > 0 edges
      WITHOUT asserting an absolute count (test-count-coupling anti-pattern).
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    bin/venv-python -m scripts.validate exits 0 at HEAD WITH validate_supersession_annotations registered
    and running in the FULL tier -- i.e. the guard starts GREEN over the post-Wave-1/2 decision files.
  - >-
    The check enumerates > 0 supersession edges over the real docs/DECISIONS.md + docs/DECISIONS_ARCHIVE.md
    (non-vacuity; ~30 at authoring time), proven by a non-vacuity test that asserts > 0 without asserting an
    absolute count.
  - >-
    validate_supersession_annotations is a module-level global of scripts/validate.py (facade re-export
    present) AND appears in registry.full_sequence(); the tests/test_checks_registry.py reachability tests
    pass.
  - >-
    config/decision_supersession_waivers.yaml waives exactly the non-binding edges (clause-level amends /
    partial or scoped supersessions / the one citation false-positive) so the supersession sub-check is
    green; every waiver names a real (superseder, victim) edge that the extractor produces, each with a
    human-readable reason.
  - >-
    The duplicate-number sub-check FAILs on a live-file duplicate number and WARNs (allowlistable) on a
    live/archive pair (0 of each at HEAD -> green). The Warehouse-ID sub-check FAILs any "**Warehouse ID:**
    dec-NNN" line whose value != dec-{header:03d} (0 nonconforming at HEAD -> green).
  - >-
    scripts/decisions_md.py parse_decisions_md emits a stderr WARNING naming the dropped decision number
    whenever its first-wins dedup discards an entry, with the returned parse result unchanged.
  - >-
    The new check file is < 500 SLOC (Decision 128; no budget raise, no decompose required at ~200 SLOC);
    tests live at tests/checks/decisions/test_validate_supersession_annotations.py (Decision 131 mirror
    convention) with 100% per-file coverage.
  - No new recommendation is filed by this plan (durable deferred follow-ups route to roadmap tier_items).
verification_plan:
  - step: 1
    phase: pre-deploy
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      The check IS the standing regression guard (registered in registry.full_sequence() and run by every
      full-tier validate); a separately-graduated kernel slot asserting "the guard is green" would
      duplicate the registered check itself. hermetic:false because the module does not exist at
      plan-commit time and the step imports it + reads the repo decision files.
    action: >-
      Prove the guard starts GREEN and is non-vacuous over the REAL decision files: call the check's pure
      extractor (assert > 0 edges) and its validate entrypoint (assert failed == []).
    command: >-
      bin/venv-python -c "from pathlib import Path; from
      scripts.checks.decisions.validate_supersession_annotations import extract_supersession_edges,
      validate_supersession_annotations; edges=extract_supersession_edges(Path('.')); assert len(edges)>0,
      'vacuous extractor'; failed=[]; validate_supersession_annotations(failed); assert failed==[], failed;
      print(f'OK: {len(edges)} edges, guard green')"
    expected: "OK: <N> edges, guard green (N ~30 at authoring)"
    fix_if: >-
      failed is non-empty -> an unwaived unannotated edge, a live duplicate number, or a nonconforming
      Warehouse-ID line survives; add the missing waiver (clause/partial/citation edge) or fix the check.
      len(edges)==0 -> the extractor regex or block-splitter regressed (vacuous guard).
  - step: 2
    phase: pre-deploy
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      tests/test_checks_registry.py already provides the standing reachability guard for every registered
      check (name in a tier sequence AND a global of scripts.validate); a new graduated slot would
      duplicate it. hermetic:false because it imports the not-yet-existing module.
    action: >-
      Confirm the Decision-104 registration is complete on all three touch points: the check name is in
      registry.full_sequence() AND is a module-level global of scripts.validate (facade re-export).
    command: >-
      bin/venv-python -c "from scripts.checks import registry; import scripts.validate as v;
      names=[s.name for s in registry.full_sequence()]; assert 'validate_supersession_annotations' in
      names, 'not in full_sequence'; assert hasattr(v,'validate_supersession_annotations'), 'not
      re-exported in validate.py'; print('OK: registered + re-exported')"
    expected: "OK: registered + re-exported"
    fix_if: >-
      Not in full_sequence -> add _c("validate_supersession_annotations") to registry.full_sequence().
      Not re-exported -> add the "from scripts.checks.decisions.validate_supersession_annotations import
      validate_supersession_annotations  # noqa: F401,E402" line to scripts/validate.py.
  - step: 3
    phase: pre-deploy
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      The check's unit suite is a committed permanent asset run by the standing pytest tier and guarded by
      validate_test_coverage (100% per-file coverage on the changed check); a graduated verifier slot would
      duplicate it. hermetic:false because the suite does not exist at plan-commit time.
    action: >-
      Run the new check's unit suite (the regression teeth): unannotated full-supersession FAILs;
      victim-annotated PASSes; header "(Superseded by Decision N)" PASSes; a waived edge PASSes; a live
      duplicate number FAILs; a live/archive pair WARNs (no fail); a nonconforming Warehouse-ID line FAILs;
      the decisions_md dedup emits a stderr warning; and the non-vacuity test asserts > 0 real edges.
    command: bin/venv-python -m pytest tests/checks/decisions/test_validate_supersession_annotations.py -q
    expected: All tests pass (green).
    fix_if: >-
      A teeth test fails -> the sub-check logic or waiver-loading is wrong. The dedup-warning test fails ->
      the scripts/decisions_md.py stderr print is missing/misplaced. The non-vacuity test fails -> the
      extractor is vacuous over the real files.
  - step: 4
    phase: pre-deploy
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      validate_sloc_limits already enforces the 500-SLOC ceiling in both tiers; this is a one-time
      authoring confirmation, not a new standing guard. hermetic:false because the file does not exist at
      plan-commit time.
    action: >-
      Confirm the new check file is < 500 SLOC (Decision 128 -- if it would exceed, decompose into a facade
      package, never raise the budget).
    command: >-
      bin/venv-python -c "import pathlib; n=sum(1 for l in
      pathlib.Path('scripts/checks/decisions/validate_supersession_annotations.py').read_text().splitlines()
      if l.strip() and not l.strip().startswith('#')); assert n<500, n; print(f'OK: {n} SLOC')"
    expected: "OK: <N> SLOC (N < 500)"
    fix_if: >-
      N >= 500 -> decompose into a facade package (__init__.py re-exporting the public surface, cohesive
      submodules each under budget), per Decision 80/104/124; do NOT raise the config/sloc_budgets.yaml
      budget.
constraints:
