  - >-
    ANNOTATION MODEL the guard encodes: FULL supersessions annotate the victim (Wave 1 DPI-02 already did
    this -> the 15 green edges); clause-level amendments are WAIVED (this plan). Going forward the guard
    FAILs the next FULL supersession that ships without a victim pointer -- exactly the invariant DPI-01
    specifies. Waiving 15 of 30 edges is BY DESIGN, not a workaround: it makes the operator's "these clause
    amends are non-binding" ruling explicit and auditable rather than baking it into regex cleverness.
  - >-
    CHECK DESIGN: reuse scripts.decisions_md._iter_decision_sections to build number->block; edge regex
    (?:Supersedes|supersedes|amends|Amends|partially supersedes)\s+Decision\s+(\d+) with the containing
    block's number as superseder and the captured number as victim; annotation test = the victim's block
    contains the plain string "Decision {superseder}" OR the victim header carries "(Superseded by Decision
    {superseder})"; edges listed in config/decision_supersession_waivers.yaml are skipped. Documented,
    spec-accepted regex limits: the PLURAL form "Supersedes Decisions N, M" is NOT matched (single-number
    form only), and the block-owner=superseder heuristic can mis-attribute a cited edge (handled by the
    waiver file). Stale waivers (a waived edge that later gets annotated) are a WARN, not a FAIL, to avoid
    waiver-rot build breaks.
