    Files NO new recommendations (task constraint). Durable deferred follow-ups become roadmap tier_items,
    not recs -- specifically the DPI-06 part-b --reconcile orphan-row report mode (surfaced as an
    operator-actioned tier_item; see context and the hand-back open_questions).
  - >-
    The guard MUST start GREEN over the post-Wave-1/2 files. Full supersessions are ALREADY victim-annotated
    (Wave 1 DPI-02 -> the 15 green edges); clause-level / partial / citation edges are WAIVED in
    config/decision_supersession_waivers.yaml. This plan makes NO docs/DECISIONS.md content edits --
    annotation was Wave 1's scope; do NOT re-annotate here (no unplanned scope creep).
  - >-
    New check < 500 SLOC (Decision 128): if the implementation would exceed, DECOMPOSE into a facade
    package (Decision 80/104/124 pattern); do NOT raise the budget and do NOT run a bare
    --update-sloc-budgets re-seed.
  - >-
    Decision 104 registry pattern: the check is added in THREE places (module @registry.register,
    registry.full_sequence() insertion, scripts/validate.py facade re-export). NEVER add it to
    .github/workflows/ci.yml -- validate.py is the single source of truth (Decision 73).
  - >-
    Tests at the mirror path tests/checks/decisions/test_validate_supersession_annotations.py (Decision 131
    amends Decision 104; tests/test_validate.py retired, _RETIRING_GRANDFATHER_HOMES empty). AVOID absolute
    header/edge-count assertions (test-count-coupling anti-pattern, validate_test_count_coupling); assert
    non-vacuity (> 0 edges) instead so future archive moves cannot break the suite.
  - >-
    The check parses BOTH docs/DECISIONS.md and docs/DECISIONS_ARCHIVE.md via the shared scripts.decisions_md
    grammar (iter_decision_headings / _iter_decision_sections, the #{2,3} regex from Decision 134's DAF-03
    consolidation) -- never a hand-rolled header regex, so it stays in lockstep with the ETL and the R1
    ratification guard (Decision 105).
  - >-
    The scripts/decisions_md.py edit is a stderr WARNING ONLY at the existing first-wins dedup -- the
    returned parse list, status/superseded_by extraction, and byte-reconstruction invariant (Decision 134
    DAF-01) are unchanged.
  - >-
    ASCII hyphens, not em dashes (house style). No eval/exec (use only stdlib re + yaml.safe_load). Never
    raise during module import (defer validation to the check call). No rescue agents or workaround loops
    (Decision 55); on an unrecoverable VP failure, stop and RCA.
