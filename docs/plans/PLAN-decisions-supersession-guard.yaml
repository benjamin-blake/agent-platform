execution_steps:
  - >-
    Create config/decision_supersession_waivers.yaml with schema {waivers: [{superseder: int, victim: int,
    reason: str}], live_archive_pair_allowlist: []}. Pre-populate with the 15 waiver edges from the prototype
    (13 confirmed + the 2 operator-flagged), each with a human-readable reason naming why the victim's core
    stands (clause/point amend, partial/scoped supersession, or citation false-positive). Re-derive the set
    from a fresh prototype run at execution time; if an edge became annotated (green) since planning, drop its
    waiver. live_archive_pair_allowlist stays empty (0 pairs at HEAD).
  - >-
    Create scripts/checks/decisions/validate_supersession_annotations.py: (a) a pure
    extract_supersession_edges(root) helper returning the list of (superseder, victim, file) tuples via
    scripts.decisions_md._iter_decision_sections over both files + the edge regex; (b) helpers for
    duplicate-number detection (live dup -> FAIL, live/archive pair -> WARN unless allowlisted) and
    Warehouse-ID conformance (line value == dec-{header:03d}); (c) the
    @registry.register("validate_supersession_annotations", owner="platform") entrypoint
    validate_supersession_annotations(failed, root=None) that loads the waiver YAML (root/config/...),
    applies the three sub-checks, prints per-issue lines, and appends a single summary string to failed on
    any FAIL (WARNs print only). root defaults to _common.ROOT (test-injection seam, mirroring
    validate_decision_entry_conformance). Keep < 500 SLOC; decompose into a facade package if it would exceed.
  - >-
    Register in scripts/checks/registry.py: insert _c("validate_supersession_annotations") into
    full_sequence() immediately after _c("validate_decision_entry_conformance"). Do NOT add it to
    pre_sequence().
  - >-
    Add the facade re-export to scripts/validate.py after the validate_decisions_size import:
    "from scripts.checks.decisions.validate_supersession_annotations import validate_supersession_annotations
    # noqa: F401,E402".
  - >-
    Edit scripts/decisions_md.py parse_decisions_md: at the first-wins dedup (the `if decision_id in seen:
    continue` around line 216), add before the continue a
    `print(f"WARNING: duplicate decision number {decision_id} in {md_path.name}; keeping first-parsed entry,
    dropping this occurrence", file=sys.stderr)` (sys is already imported). Leave the returned list and the
    byte-reconstruction invariant untouched.
  - >-
    Create tests/checks/decisions/test_validate_supersession_annotations.py (mirror path): synthetic tmp_path
    fixtures (write DECISIONS.md + DECISIONS_ARCHIVE.md + a waiver YAML under root, call with root=tmp_path)
    exercising -- unannotated full-supersession FAILs; victim-annotated (plain "Decision N") PASSes; header
    "(Superseded by Decision N)" PASSes; a waived edge PASSes; a live-file duplicate number FAILs; a
    live/archive pair WARNs (no fail) and is silenced by the allowlist; a nonconforming Warehouse-ID line
    FAILs and a conforming one passes; plus a non-vacuity test that runs extract_supersession_edges over the
    REAL repo files and asserts > 0 (NO absolute count), and a capsys test that parse_decisions_md emits the
    dedup stderr warning on a duplicate. Target 100% per-file coverage of the new check.
  - >-
    Execute the Verification Plan -- run each pre-deploy step; loop until pass; run
    bin/venv-python -m scripts.validate --pre and confirm exit 0 (guard green). On an unrecoverable failure,
    stop and RCA (Decision 55) -- never patch around a red gate.
  - "Report: the check design, the final waiver set (with any execution-time delta from the prototype), edge/green counts, and VP results."
work_areas: []
rollback: >-
  Code + config + tests change on the feature branch; revert the branch commit to remove the check, the
  waiver file, the registry.full_sequence() line, the validate.py facade re-export, the decisions_md.py
  stderr warning, and the tests. No data, warehouse, or infrastructure state is touched (the check is
  read-only; the decisions_md.py edit is a stderr print with no effect on the parse result). No migration.
