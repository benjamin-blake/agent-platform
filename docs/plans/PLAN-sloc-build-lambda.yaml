context:
  - >-
    Root cause -- build_lambda.py is the single build/deploy tool for every Lambda artifact (prod
    data-pipeline + ops-compaction, and the T2.17/T2.18 DuckLake writer/reader/maintenance/catalog-dr
    functions + deps/extensions/pgclient layers). Every new artifact family adds builders, so a
    per-file SLOC cap only ratchets upward; it currently sits at 790 SLOC against a 791 budget (1 line
    of headroom). One-concern-per-file modules that each stay flat while their count grows is the
    structural fix (same axis-error argument as PLAN-validate-decomposition / Decision 80/104). This
    plan realizes rec-2414's program for this file; rec-2414 (acceptance `grep -q '^budgets: {}'`) is
    the whole-registry umbrella -- CITED, not bundled (a single-file split does not empty the registry).
  - >-
    Flat modules, not a subpackage -- scripts/test_coverage_checker.py map_source_to_test maps
    scripts/<name>.py (depth-2) -> tests/test_<name>.py, but a NEW subpackage scripts/lambda_build/**
    returns None (only scripts/checks/** is special-cased, from the validate decomposition). A
    subpackage would silently drop out of the coverage-gate AND force editing test_coverage_checker.py,
    colliding with sibling decomposition plans on this shared branch. Flat sibling modules are
    auto-mapped and need zero shared-file edits.
  - >-
    Facade + patch-stability analysis (the load-bearing correctness argument) -- the ONLY symbol-level
    consumer is tests/test_build_lambda.py; every other repo reference is a CLI invocation
    (run_scheduled_agent.py:291, ducklake_neon_smoke_test.py:1079, terraform-apply-sandbox.yml) or a
    path-scan/comment. 34 `patch("scripts.build_lambda.subprocess.run")` and 2
    `urllib.request.urlopen` patches survive UNCHANGED because they patch an attribute on a shared
    stdlib module object (global), provided build_lambda.py keeps `import subprocess`/`import
    urllib.request`. Patches on orchestrated callees (builders, deploy funcs, assert_within_size_limit,
    list_bundle, publish_canary_layers) survive via the facade because their callers (_run_prod_build /
    _run_ducklake_build / main) stay in build_lambda.py and resolve them in this namespace. Only SIX
    targets need repointing (caller+callee both moved, or mutable-global state moved): OUTPUT_DIR,
    _zip_staged_dir, _fetch_extension_bytes, _try_s3_extension, _try_s3_pgclient (-> packaging);
    _build_ducklake_layer_names -- whose ONLY patch site is
    TestBuildLambdaContract.test_canary_layers_sourced_from_accessor (tests/test_build_lambda.py:902,
    NOT TestPublishCanaryLayers; critique finding B) -- repoints to the string-form deploy target and
    that single method relocates to the deploy test file, exempt from the blanket bl_config rule; and
    TestBuildLambdaContract's remaining _BUILD_CONTRACT_REGISTRY/_BUILD_CONTRACT_PATH mutations
    (-> bl_config). VP steps 1/2/8 prove closure.
  - >-
    Test relocation follows the coverage-mapper -- coverage is attributed to the file where code is
    DEFINED, so tests may keep `import scripts.build_lambda as bl` + `bl.X` references (the facade),
    but each test CLASS must live in the test file mapped to its function's new module so the per-file
    coverage/existence gate (map_source_to_test) is satisfied. The class->file map and the six
    repoints are enumerated in scope + execution_steps. The mutable-global TestBuildLambdaContract
    repoint is the single most error-prone item -- flagged explicitly.
  - >-
    CC/waiver -- radon rates only build_pgclient_layer at the ceiling (CC 20); the repo counter
    (cc_limits.py, _BRANCH_TYPES includes With + BoolOp) puts it above 20, and today the whole file is
    CC-exempt via the header waiver. build_lambda_packaging.py must carry `# complexity-waiver:
    decision-43` in its first 10 lines; the other three files need no waiver (all functions CC<=8).
    VP step 4 re-runs validate_cc_limits to confirm no other moved function trips the repo counter.
  - >-
    S3/CDN fetch-helper placement (a deliberate cohesion call the critique should weigh) --
    _fetch_extension_bytes/_try_s3_extension/_try_s3_pgclient do AWS/network I/O (deploy-flavoured) but
    are consumed ONLY by the extension/pgclient LAYER builders. They live in packaging to keep each
    "assemble this layer" concern whole and to avoid a packaging->deploy import edge. _aws_profile_args
    (the argv helper both they and the deploy funcs need) lives in build_lambda_config (bottom of the
    DAG) so both import it without a cycle.
  - >-
    Out-of-scope notes (do NOT fix here) -- (1) rec-2077 asks for a list_bundle test; the decomposition
    adds one incidentally (packaging is coverage-gated), but the rec is NOT bundled per direction. (2)
    rec-2162 (yanked github-copilot-sdk==0.2.2 in src/lambdas/data-pipeline/manifest.yaml) would break a
    full `--skip-upload` pip build of data-pipeline, so the equivalence oracle uses `--list-bundle`
    (skip_pip=True), not a pip build. (3) validate_ducklake_version_lockstep scans scripts/build_lambda.py
    for a hardcoded PINNED_DUCKDB_VERSION literal; post-split the derivation lives in
    build_lambda_config.py (still a call, no literal, so build_lambda.py stays clean and the check stays
    green). Extending that check to also scan build_lambda_config.py is a separate hardening item, not
    done here (the check file is out of scope).
  - Branch claude/sloc-violations-refactor-p5svnl is 0 commits behind origin/main at planning time (preflight main_files_changed_since_branch == []); no Scope-file divergence, no rebase needed. Executor is FROZEN (Decision 67) -- IMPLEMENTATION plan only (STRATEGIC suspended).
  - "Decision-scout verdict + CITE list (verbatim decision ids): FLAGS_FOUND (83 of 83 triaged; NOTE/WARN only, no BLOCK). CITE: Decision 43 (SLOC/CC caps + complexity-waiver pattern), Decision 102 (budget down-only ratchet -- the --update-sloc-budgets repoint authority), Decision 104 (the ratified validate.py thin-CLI + facade re-export + coverage-map-gotcha precedent this mirrors), Decision 79 (build_lambda is NOT Lambda-packaged / NOT executor machinery; homes CD.24 manifest bundling per Decision 105), Decision 48 (V2 tier classification + the _LAMBDA_SCRIPTS V3-trigger anchor the facade must keep resolving), Decision 99 (duckdb pin SSOT + the ducklake-version-lockstep gate), Decision 101 (public-repo boundary). RELATED: Decision 80 (decomposition precedent lineage; NOTE per critique finding D -- .importlinter has only 4 contracts, NONE covering build_lambda modules, so import-linter will NOT verify the config<-packaging/deploy<-CLI edges; the DAG is acyclic by construction and a genuine cycle fails loudly as ImportError in VP steps 1/13), Decision 86 (no new prose-architecture docs), Decision 67 (IMPLEMENTATION-only; >5-file/>8-step complexity heuristic suspended)."
  - "Decision-scout NOTE (Decision 102): the 'no new module registered' claim holds only if build_lambda_packaging.py lands <=500 SLOC (est ~359). VP step 3 enforces per-module <=500 and VP step 12 fails if any build_lambda_* key is seeded; if packaging exceeds 500 at implement time, split it on the prod-vs-ducklake seam (do NOT hand-register). Decision-scout WARN (Decision 99): resolved -- validate_ducklake_version_lockstep regex-scans build_lambda.py for a `PINNED_DUCKDB_VERSION = \"<literal>\"` assignment; post-move build_lambda.py has none (the facade re-export is an import, not an assignment), so it stays green (VP step 10 runs it explicitly). Decision-scout correction: Decision 77 governs the terraform sandbox apply path, NOT build_lambda zip determinism -- the byte-reproducible-zip preservation here is a plan-internal correctness property, not cited to 77."
  - >-
    Hermetic-replay fleet policy (validate_vp_replay, T3.15/VF-01) -- the CI gate re-executes every
    pre-deploy+hermetic:true VP step of every PLAN-*.yaml in the PR diff under a SHARED budget
