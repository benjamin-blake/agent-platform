schema_version: 1
slug: "sloc-build-lambda"
intent: >-
  Decompose the scripts/build_lambda.py monolith (790 SLOC, sitting one line under its 791 SLOC
  budget) into cohesion-based modules (config / packaging / deploy) behind a thin CLI facade, so the
  Lambda build-and-deploy tool grows by adding files rather than by ratcheting one file's budget --
  advancing the rec-2414 "empty the SLOC registry" program without changing what the tool builds or
  deploys.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-sloc-build-lambda.yaml
phase: >-
  Platform hardening. Executes rec-2414 (break SLOC-budget-registered oversized files below 500 SLOC)
  for scripts/build_lambda.py and realizes Decision 43's file-size-reduction intent, reusing the
  ratified validate.py-decomposition pattern (Decision 80/104: thin CLI + facade re-exports + a
  behaviour-equivalence oracle). Platform-internal tooling; no product-roadmap phase. build_lambda.py
  is NOT Lambda-packaged (compute_affected_artifacts([...]) == []), so no V3 Lambda build/deploy/smoke
  gating applies.
scope:
  - file: scripts/build_lambda.py
    action: Modify
    purpose: >-
      Collapse to a thin (<=450 SLOC, target ~205) CLI + facade. RETAINS: the argparse builder
      build_parser() with every flag byte-stable (--skip-upload, --bucket, --profile, --region,
      --deploy, --ducklake-only, --list-bundle, --ducklake-publish-canary-layers), main() dispatch,
      and the two build orchestrators _run_prod_build() and _run_ducklake_build() (they are the
      functions tests patch AROUND, so they stay here and call their dependencies via names resolved
      in THIS module's namespace). RETAINS module-level `import subprocess` and `import urllib.request`,
      EACH carrying `# noqa: F401` with a "deliberately-retained patch anchor" comment -- post-split they
      are otherwise UNUSED in the thin CLI, and pyproject selects ruff "F" with no unfixable/per-file-ignores,
      so an un-noqa'd `ruff check --fix` would DELETE them and every
      `patch("scripts.build_lambda.subprocess.run")` (34 sites) / `patch("scripts.build_lambda.urllib.request.urlopen")`
      (2 sites) would raise AttributeError (critique finding A). With the noqa the anchors persist and the
      patches keep resolving (patching an attribute on a shared stdlib module object patches it
      globally, so the moved functions still observe the mock). ADDS a consolidated facade re-export
      block `from scripts.build_lambda_config import (...)  # noqa: F401`, `... _packaging import (...)`,
      `... _deploy import (...)` naming EVERY public symbol AND every test-patched private symbol so
      `from scripts.build_lambda import X`, `bl.X`, and `patch("scripts.build_lambda.<orchestrated-callee>")`
      all keep resolving. REMOVES the `# complexity-waiver: decision-43` header (no residual function
      here exceeds CC 20; radon + the repo branch counter put all four retained functions at CC<=8).
      Updates the module docstring to describe the thin-CLI role and point at the three extracted modules.
  - file: scripts/build_lambda_config.py
    action: Create
    purpose: >-
      owner=platform. One concern: build configuration DATA + resolution. Holds ROOT, the size limits
      (LAMBDA_SIZE_LIMIT_BYTES, LAMBDA_SIZE_WARN_BYTES), the duckdb pin import from
      src.common.ducklake_version + PINNED_DUCKDB_VERSION (call, never a literal -- keeps
      validate_ducklake_version_lockstep green), PROD_DEPS, DUCKLAKE_DEPS, DUCKLAKE_EXTENSIONS,
      DUCKLAKE_EXT_PLATFORM/URL_BASE/S3_PREFIX, _EXT_FETCH_HEADERS, the four _DUCKLAKE_*_FUNCTION names +
      _DUCKLAKE_FUNCTION_ZIP_KEYS, DUCKLAKE_PGCLIENT_S3_PREFIX, PINNED_PG_MAJOR, DUCKLAKE_LAYER_NAMES,
      _LAMBDA_SCRIPTS, _LAMBDA_FUNCTION_NAMES, _OPS_COMPACTION_FUNCTION_NAME/_ZIP_KEY; the lazy
      build-contract loader (_BUILD_CONTRACT_PATH, _BUILD_CONTRACT_REGISTRY, _fallback_build_registry,
      _load_build_contract, _build_size_limit_bytes, _build_prod_function_names, _build_ops_compaction,
      _build_ducklake_function_zip_keys, _build_ducklake_layer_names); manifest-pattern resolution
      (_get_lambda_file_patterns, LAMBDA_FILE_PATTERNS); and the pure argv helper _aws_profile_args
      (shared by deploy + packaging's S3 fetch helpers). Bottom of the import DAG -- imports NOTHING
      from the other build_lambda_* modules (no cycle). Estimated ~161 SLOC, CC<=5 (no waiver).
  - file: scripts/build_lambda_packaging.py
    action: Create
    purpose: >-
      owner=platform. One concern: bundle/zip assembly (the task's "bundle assembly" seam). Holds
      OUTPUT_DIR, _FIXED_ZIP_DATETIME, _deterministic_zipinfo, _zip_staged_dir, the
      _zip_layer_dir_deterministic alias, assert_within_size_limit, the prod builders
      (build_app_package, build_ops_compaction_package, list_bundle, build_deps_layer), the DuckLake
      builders (build_ducklake_function_package, build_ducklake_deps_layer,
      build_ducklake_extensions_layer, build_pgclient_layer) and their input fetch helpers
      (_fetch_extension_bytes, _try_s3_extension, _try_s3_pgclient -- kept HERE because they are
      consumed only by the layer builders; splitting them into deploy would fracture a single
      "assemble this layer" concern and create a packaging->deploy dependency). CARRIES the
      `# complexity-waiver: decision-43` comment within the first 10 lines (cc_limits.py reads
      lines[:10]) because build_pgclient_layer is at the CC ceiling (radon 20; the repo counter also
      counts With/BoolOp, so it exceeds 20). Imports data/_aws_profile_args from
      build_lambda_config only. Estimated ~359 SLOC (<400 aim); if a future artifact pushes it toward
      500 the sanctioned next seam is prod-packaging vs ducklake-packaging.
  - file: scripts/build_lambda_deploy.py
    action: Create
    purpose: >-
      owner=platform. One concern: AWS deploy/publish + bucket resolution. Holds upload_to_s3,
      update_lambda_functions, resolve_bucket, validate_bucket_exists, publish_canary_layers, and
      _resolve_ducklake_profile. Imports the accessors it needs (_build_prod_function_names,
      _build_ops_compaction, _build_ducklake_function_zip_keys, _build_ducklake_layer_names) and
      _aws_profile_args from build_lambda_config only (no packaging import -> no cycle). Estimated
      ~171 SLOC, CC<=6 (no waiver).
  - file: tests/test_build_lambda.py
    action: Modify
    purpose: >-
      Preserve behaviour. KEEPS the classes that exercise the retained CLI/orchestrators
      (TestRunBuilds -> _run_prod_build/_run_ducklake_build; TestMainDispatch -> main). Their
      `patch("scripts.build_lambda.<callee>")` sites (resolve_bucket, validate_bucket_exists,
      upload_to_s3, update_lambda_functions, assert_within_size_limit, build_app_package,
      build_ducklake_*_package/layer, build_pgclient_layer, publish_canary_layers, list_bundle,
      _run_prod_build, _run_ducklake_build) STAY AS-IS -- those callees are invoked by orchestrators
      that live here, so the facade re-export makes the patch intercept. MOVES every other class to
      its module's mapped test file (below). ADDS test_facade_reexports_complete asserting every
      re-exported name is present on scripts.build_lambda and is the same object as its defining
      module. See execution_steps for the exact class->file map and the patch-repoint table.
  - file: tests/test_build_lambda_config.py
    action: Create
    purpose: >-
      New suite mapped to scripts/build_lambda_config.py (map_source_to_test: scripts/<name>.py ->
      tests/test_<name>.py). Receives TestBuildLambdaContract MINUS test_canary_layers_sourced_from_accessor
      (that single method exercises publish_canary_layers and relocates to tests/test_build_lambda_deploy.py --
      critique finding B; applying the blanket bl_config repoint to it would create a silent no-op mock).
      For the remaining contract-loader methods: mutable-global writes/reads
      bl._BUILD_CONTRACT_REGISTRY/_BUILD_CONTRACT_PATH become bl_config._BUILD_CONTRACT_REGISTRY/_BUILD_CONTRACT_PATH
      and _build_* accessor calls become bl_config._build_* -- because the loader now reads config's module
      globals, not build_lambda's re-exported binding; the one exception is test_cli_flag_equivalence's
      bl.build_parser() which stays bl. Also receives TestPinnedConstants, TestLambdaScriptsAndSdkConfig,
      and the two pure _aws_profile_args tests (test_aws_profile_args_empty/_non_empty). ADDS a test for
      _get_lambda_file_patterns (no prior coverage) to meet the per-file coverage floor.
  - file: tests/test_build_lambda_packaging.py
    action: Create
    purpose: >-
      New suite mapped to scripts/build_lambda_packaging.py. Receives TestSizeAssert,
      TestBuildLambdaConfigScope (REPOINTED: bm = scripts.build_lambda_packaging; the OUTPUT_DIR patch
      -> "scripts.build_lambda_packaging.OUTPUT_DIR"; the source-reading guard reads
      scripts.build_lambda_packaging.__file__), TestBuildDucklakeFunctionPackage (REPOINT the
      _zip_staged_dir patch -> packaging), TestBuildDucklakeDepsLayer (OUTPUT_DIR patch -> packaging),
      TestBuildDucklakeExtensionsLayer (_fetch_extension_bytes + OUTPUT_DIR patches -> packaging),
      TestFetchExtensionBytes (_try_s3_extension patch -> packaging), TestTryS3Extension,
      TestBuildPgclientLayerPgRestoreGuard (_try_s3_pgclient + OUTPUT_DIR patches -> packaging),
      TestDucklakeZipDeterminism (OUTPUT_DIR + _fetch_extension_bytes + _try_s3_pgclient patches ->
      packaging), plus the two packaging-owned profileless tests (_try_s3_pgclient / _try_s3_extension
      omit --profile). ADDS an explicit list_bundle test (satisfies the intent behind rec-2077; NOT
      bundled). subprocess.run / urllib / shutil / zipfile / pathlib patches STAY (global stdlib
      objects).
  - file: tests/test_build_lambda_deploy.py
    action: Create
    purpose: >-
      New suite mapped to scripts/build_lambda_deploy.py. Receives the three validate_bucket_exists
      tests, TestUpdateLambdaFunctions, TestUpdateLambdaFunctionsDucklakeOnly, TestResolveBucket,
      TestPublishCanaryLayers (moves AS-IS -- it patches only scripts.build_lambda.subprocess.run, a
      global stdlib object), TestResolveDucklakeProfile, the deploy-owned profileless tests
      (upload_to_s3 / validate_bucket_exists / update_lambda_functions omit/include --profile), AND the
      single relocated method test_canary_layers_sourced_from_accessor (from TestBuildLambdaContract,
      tests/test_build_lambda.py:885-906 -- critique finding B): its `patch.object(bl,
      "_build_ducklake_layer_names")` becomes the string-form
      `patch("scripts.build_lambda_deploy._build_ducklake_layer_names", ...)` because
      publish_canary_layers resolves that imported name in deploy's namespace; placed next to
      TestPublishCanaryLayers. All `patch("scripts.build_lambda.subprocess.run")` STAY (global stdlib object).
  - file: config/sloc_budgets.yaml
    action: Modify
    purpose: >-
      Re-point via `bin/venv-python -m scripts.validate --update-sloc-budgets` as the LAST
      implementation step (Decision 102 down-only ratchet). build_lambda.py drops below 500 so its
      `scripts/build_lambda.py: 791` entry is auto-removed; the three new modules are each <500 so
      NONE is seeded. Then assert (grep, NOT full-file equality -- sibling decompositions share this
      branch) that the build_lambda.py key is gone and no scripts/build_lambda_(config|packaging|deploy).py
      key was added.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - The full test set (tests/test_build_lambda.py + the three new module test files) passes with unchanged assertion semantics; no collection errors; `bin/venv-python -m pytest tests/test_build_lambda*.py -q` exits 0.
  - "Facade completeness: every public symbol and every test-patched private symbol (assert_within_size_limit, update_lambda_functions, validate_bucket_exists, resolve_bucket, upload_to_s3, publish_canary_layers, list_bundle, build_app_package, build_ops_compaction_package, build_deps_layer, the four build_ducklake_* builders, _fetch_extension_bytes, _try_s3_extension, _try_s3_pgclient, _zip_staged_dir, _deterministic_zipinfo, _aws_profile_args, _resolve_ducklake_profile, _run_prod_build, _run_ducklake_build, the _build_* accessors, _BUILD_CONTRACT_PATH/_REGISTRY, _LAMBDA_SCRIPTS, _LAMBDA_FUNCTION_NAMES, _OPS_COMPACTION_*, _DUCKLAKE_*_FUNCTION, _DUCKLAKE_FUNCTION_ZIP_KEYS, DUCKLAKE_LAYER_NAMES, PINNED_DUCKDB_VERSION, PINNED_PG_MAJOR, LAMBDA_SIZE_LIMIT_BYTES, OUTPUT_DIR, LAMBDA_FILE_PATTERNS) resolves via `from scripts.build_lambda import X` and `getattr(bl, X)`."
  - "CLI contract byte-stable: build_parser()'s `--` flag set equals docs/contracts/build-lambda.yaml cli_flags; `python -m scripts.build_lambda --list-bundle <slug>` and `--ducklake-only --skip-upload` dispatch unchanged (exit-code + routing preserved), so the two terraform-apply-sandbox.yml invocations and the run_scheduled_agent.py / ducklake_neon_smoke_test.py subprocess calls keep working."
  - "Behaviour preservation: `--list-bundle data-pipeline` and `--list-bundle ops-compaction` emit file lists byte-identical to the pre-refactor baseline, and the DuckLake zip-determinism tests still md5-match two builds -- the build outputs are unchanged."
  - scripts/build_lambda.py drops to <=500 SLOC (target ~205); each of build_lambda_config/packaging/deploy.py is <=500 SLOC (aim <=400); config/sloc_budgets.yaml loses its scripts/build_lambda.py entry and gains NO new build_lambda_* entry (diff-verified, not full-file equality).
  - validate_cc_limits passes over the new tree (build_pgclient_layer's module carries the decision-43 waiver header; no other moved function trips the repo branch counter).
  - "Namespace-migration discipline: zero residual silent-no-op patches remain -- no `patch(\"scripts.build_lambda.OUTPUT_DIR\"|._zip_staged_dir|._fetch_extension_bytes|._try_s3_extension|._try_s3_pgclient)` and no `patch.object(<any alias>, \"_build_ducklake_layer_names\")` (bl OR bl_config -- critique finding B) survive; the canary-accessor patch exists only as `patch(\"scripts.build_lambda_deploy._build_ducklake_layer_names\")`, and the other five repointed to their defining module."
  - No extracted function DEFINITION remains in scripts/build_lambda.py (only re-exports plus main/build_parser/_run_prod_build/_run_ducklake_build); `bin/venv-python -m scripts.validate --pre` exits 0.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Full build_lambda test set across all four files passes with unchanged assertion semantics.
    command: bin/venv-python -m pytest tests/test_build_lambda.py tests/test_build_lambda_config.py tests/test_build_lambda_packaging.py tests/test_build_lambda_deploy.py -q
    expected: All pass; no collection errors; exit 0.
    fix_if: A `from scripts.build_lambda import X` ImportError -> facade omitted X. A patch that no-ops (e.g. mock not called) -> a moved-together cross-helper/global patch was not repointed to its new defining module (OUTPUT_DIR/_zip_staged_dir/_fetch_extension_bytes/_try_s3_extension/_try_s3_pgclient/_build_ducklake_layer_names) or TestBuildLambdaContract still mutates bl.* instead of bl_config.*.
    hermetic: false
  - step: 2
    phase: pre-deploy
    action: Facade completeness / import-equivalence -- every re-exported name is present on scripts.build_lambda and identical to its defining-module object.
    command: bin/venv-python -m pytest tests/test_build_lambda.py -k facade_reexports -q
    expected: test_facade_reexports_complete passes; exit 0.
    fix_if: A name is missing on bl -> add it to the facade re-export block. A name resolves to a different object -> it was redefined instead of re-exported.
    hermetic: false
  - step: 3
    phase: pre-deploy
    action: SLOC assertion -- target file below limit and no new module over budget.
    command: "bin/venv-python -c \"import pathlib; s=lambda p: len([l for l in pathlib.Path(p).read_text(encoding='utf-8').splitlines() if l.strip() and not l.strip().startswith('#')]); m={p:s(p) for p in ['scripts/build_lambda.py','scripts/build_lambda_config.py','scripts/build_lambda_packaging.py','scripts/build_lambda_deploy.py']}; print(m); assert m['scripts/build_lambda.py']<=500; assert all(v<=500 for v in m.values())\""
    expected: build_lambda.py SLOC <=500 (target ~205); each new module <=500 (config ~161, packaging ~359, deploy ~171). Prints the map; exit 0.
    fix_if: A module exceeds 500 -> split it on the documented next seam (packaging -> prod vs ducklake). build_lambda.py exceeds 500 -> more logic must move out of the facade.
    hermetic: false
  - step: 4
    phase: pre-deploy
    action: CC gate passes post-extraction (waiver carried to build_pgclient_layer's module).
    command: "bin/venv-python -c \"from scripts.checks.sloc.cc_limits import validate_cc_limits; f=[]; validate_cc_limits(f); print(f); raise SystemExit(1 if f else 0)\""
    expected: No CC violation naming any scripts/build_lambda*.py function; exit 0.
    fix_if: "A violation names build_pgclient_layer -> the `# complexity-waiver: decision-43` header is not within the first 10 lines of packaging.py. A violation names another moved function -> add the waiver header to its module (the repo branch counter also counts With/BoolOp)."
    hermetic: false
  - step: 5
    phase: pre-deploy
    action: Build-only (NO deploy) bundle equivalence for two active artifacts, vs the baseline captured before any code moved.
    command: bin/venv-python -m scripts.build_lambda --list-bundle data-pipeline > /tmp/lb_after_dp.txt && bin/venv-python -m scripts.build_lambda --list-bundle ops-compaction > /tmp/lb_after_ops.txt && diff /tmp/lb_before_dp.txt /tmp/lb_after_dp.txt && diff /tmp/lb_before_ops.txt /tmp/lb_after_ops.txt && echo BUNDLE_EQUIVALENT
    expected: No diff in either artifact's static file list; prints BUNDLE_EQUIVALENT; exit 0. (Uses skip_pip=True, so it is unaffected by rec-2162's yanked github-copilot-sdk pin -- no full pip build attempted.)
    fix_if: A diff appears -> a builder's manifest/stage_bundle wiring changed during the move (ROOT rebinding, an altered stage_dir path, or a dropped import); the file-list must be manifest-identical.
    hermetic: false
  - step: 6
    phase: pre-deploy
    action: DuckLake zip byte-determinism preserved (the moved zip primitives still produce byte-identical archives).
    command: bin/venv-python -m pytest tests/test_build_lambda_packaging.py -k "byte_identical or determinism" -q
    expected: All four zip-determinism tests (staged_dir / deps_layer / extensions_layer / pgclient_layer) md5-match two builds; exit 0.
    fix_if: A hash differs -> _deterministic_zipinfo / _FIXED_ZIP_DATETIME / sorted-iteration logic was altered during the move; restore the pinned-timestamp deterministic write verbatim.
    hermetic: false
  - step: 7
    phase: pre-deploy
    action: Stale-reference sweep -- no extracted definition remains in build_lambda.py.
    command: "grep -cE '^def (build_app_package|build_ops_compaction_package|list_bundle|build_deps_layer|build_ducklake_function_package|build_ducklake_deps_layer|build_ducklake_extensions_layer|build_pgclient_layer|assert_within_size_limit|upload_to_s3|update_lambda_functions|resolve_bucket|validate_bucket_exists|publish_canary_layers|_fetch_extension_bytes|_try_s3_extension|_try_s3_pgclient|_deterministic_zipinfo|_zip_staged_dir|_load_build_contract|_fallback_build_registry|_get_lambda_file_patterns|_aws_profile_args|_resolve_ducklake_profile)\\b' scripts/build_lambda.py | grep -qx 0"
    expected: Zero extracted defs remain (only main/build_parser/_run_prod_build/_run_ducklake_build define here); exit 0.
    fix_if: A def still lives in build_lambda.py -> move its body to the domain module and leave only the re-export.
    hermetic: false
  - step: 8
    phase: pre-deploy
    action: Namespace-migration closure -- zero residual silent-no-op patch sites for moved-together helpers/globals.
    command: "! grep -rEq 'patch\\(\"scripts\\.build_lambda\\.(OUTPUT_DIR|_zip_staged_dir|_fetch_extension_bytes|_try_s3_extension|_try_s3_pgclient)\"' tests/test_build_lambda*.py && ! grep -rEq 'patch\\.object\\([A-Za-z_]+, \"_build_ducklake_layer_names\"' tests/test_build_lambda*.py && ! grep -rEq 'patch\\(\"scripts\\.build_lambda(_config)?\\._build_ducklake_layer_names\"' tests/test_build_lambda*.py && echo REPOINTS_CLEAN"
    expected: No facade-namespace patch remains for OUTPUT_DIR / _zip_staged_dir / _fetch_extension_bytes / _try_s3_extension / _try_s3_pgclient; NO patch.object on ANY module alias for _build_ducklake_layer_names (catches a bl_config mis-repoint, not just bl -- critique finding B), and no string-form bl/bl_config target for it either (only scripts.build_lambda_deploy._build_ducklake_layer_names is legitimate); prints REPOINTS_CLEAN; exit 0.
    fix_if: A match survives -> that patch silently no-ops (targets the facade or config binding, not the namespace publish_canary_layers actually resolves); repoint it to scripts.build_lambda_packaging.* or scripts.build_lambda_deploy.* (string form).
    hermetic: false
  - step: 9
    phase: pre-deploy
    action: Test-file existence gate -- each new module maps to an existing test file.
    command: bin/venv-python -m scripts.test_coverage_checker --check-tests --files scripts/build_lambda.py scripts/build_lambda_config.py scripts/build_lambda_packaging.py scripts/build_lambda_deploy.py
    expected: All four map to an existing test file; exit 0.
    fix_if: A "missing test file" error -> the mapped tests/test_build_lambda_<name>.py was not created.
    hermetic: false
  - step: 10
    phase: pre-deploy
    action: Decision 99 version-lockstep gate stays green after the pin import relocates (decision-scout WARN).
    command: "bin/venv-python -c \"from scripts.checks.misc.validate_ducklake_version_lockstep import validate_ducklake_version_lockstep as v; f=[]; v(f); print('FAILURES', f); raise SystemExit(1 if f else 0)\""
    expected: PASS on both derive surfaces (scripts/build_lambda.py has no `PINNED_DUCKDB_VERSION = \"<literal>\"` assignment -- the facade re-export is an import); requirements.txt floor matches the SSOT; exit 0.
    fix_if: A failure names build_lambda.py -> the pin reached config as a string literal instead of src.common.ducklake_version.pinned_duckdb_version() (a call). Extending the gate to also scan build_lambda_config.py is OUT of scope (the check file is not in scope).
    hermetic: false
  - step: 11
    phase: pre-deploy
    action: Authoritative pre-merge gate -- full fast tier green (subsumes SLOC/CC/import-contract/coverage checks).
    command: bin/venv-python -m scripts.validate --pre
    expected: Exit 0.
    fix_if: SLOC/CC/coverage failure -> address per that check's message; a genuine import cycle among build_lambda_* modules surfaces as ImportError at import time (VP steps 1/13), NOT via import-linter -- .importlinter carries only 4 contracts, none covering these modules (critique finding D); break a cycle with a function-local import or route the shared symbol through build_lambda_config.
    hermetic: false
  - step: 12
    phase: pre-deploy
    action: SLOC budget re-point (LAST implementation step) + diff assertion (my entry removed, none seeded).
    command: "bin/venv-python -m scripts.validate --update-sloc-budgets && ! grep -qE '^[[:space:]]*scripts/build_lambda\\.py:' config/sloc_budgets.yaml && ! grep -qE '^[[:space:]]*scripts/build_lambda_(config|packaging|deploy)\\.py:' config/sloc_budgets.yaml && echo BUDGET_OK"
    expected: scripts/build_lambda.py is removed from config/sloc_budgets.yaml and no build_lambda_* key was seeded; prints BUDGET_OK; exit 0. Do NOT assert full-file equality -- sibling SLOC decompositions on this branch also mutate this file.
    fix_if: A build_lambda_* key was seeded -> that module exceeds 500 SLOC; split it and re-run. The build_lambda.py key survives -> it is still >500; move more out of the facade.
    hermetic: false
  - step: 13
    phase: pre-deploy
    action: Replay-safe stable invariant (fleet policy, sole hermetic step) -- the scripts.build_lambda facade imports and its CLI flag set equals the ratified contract. Green at ANY tree state (pre- and post-implementation), <1s, sibling-isolated; runnable at any point, not order-dependent. Uses the portable interpreter idiom (NOT bin/venv-python) because CI's pr-validate replay job has no .venv.
    command: "PY=$(test -x .venv/bin/python && echo .venv/bin/python || echo python); $PY -c \"import yaml, pathlib; import scripts.build_lambda as bl; flags={s for s in bl.build_parser()._option_string_actions if s.startswith('--')}-{'--help'}; want=set(yaml.safe_load(pathlib.Path('docs/contracts/build-lambda.yaml').read_text(encoding='utf-8'))['cli_flags']); assert flags==want, sorted(flags^want); print('FACADE_CLI_STABLE')\""
    expected: Prints `FACADE_CLI_STABLE` and exits 0 -- the module imports cleanly and the flag-name set matches docs/contracts/build-lambda.yaml cli_flags exactly, before and after the refactor.
    fix_if: ImportError -> the facade re-export block references a missing/misnamed symbol in a build_lambda_* module. AssertionError (prints the symmetric difference) -> a CLI flag was added/dropped/renamed, breaking the byte-stable CLI contract.
    hermetic: true
constraints:
  - "Behaviour preservation is absolute -- movement only. No signature changes beyond relocation, no feature work, no bug fixes. The build outputs must be byte-identical (proven by --list-bundle file-list equivalence + the zip-determinism md5 tests). Out-of-scope findings become context notes, never inline fixes (Decision 55 / AGENTS.md 'Only modify files explicitly in scope')."
  - "CLI contract byte-stability -- `python -m scripts.build_lambda` module invocation, every flag, dispatch routing, and exit codes stay identical (two .github/workflows/terraform-apply-sandbox.yml calls + scripts.run_scheduled_agent + scripts.ducklake_neon_smoke_test depend on it). main/build_parser stay in build_lambda.py."
  - "Import stability via facade -- build_lambda.py re-exports EVERY public symbol AND every test-patched private symbol; it also keeps `import subprocess` / `import urllib.request` each with `# noqa: F401` (post-split they are unused in the thin CLI; pyproject's ruff F rules have no unfixable/per-file-ignores, so an un-noqa'd --fix would silently delete the anchors and break 36 stdlib patch sites (34 subprocess.run + 2 urlopen) -- critique finding A). The only symbol-level importer is tests/test_build_lambda.py (verified: all other references are CLI invocations, a path-scan in validate_ducklake_version_lockstep, or comments), so no external-importer migration is required."
  - "Decision 48 -- V2 tier is correct (the only files touched are build_lambda*.py + tests + regenerated config; none is Lambda-packaged: compute_affected_artifacts([...]) == []). The facade MUST keep _LAMBDA_SCRIPTS resolving from scripts.build_lambda -- it is Decision 48's V3-trigger anchor and the test imports it; the literal list moves to build_lambda_config.py but is re-exported. Executor planning/critique prompts reference the concept in prose (executor frozen, Decision 67); the symbol stays reachable, so no prompt edit is in scope."
