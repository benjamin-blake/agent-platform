  - "Decision 102 -- SLOC budgets ratchet DOWN only; re-point exclusively via `validate --update-sloc-budgets` as the last step, never a hand-edit; diff the yaml (not full-file equality, since siblings share the branch) to confirm removal + no silently-seeded >500 module."
