  - "Decision 101 / public-repo boundary -- no AWS account IDs, ARNs, ExternalIds, secrets, or internal hostnames introduced (constants moved verbatim; the pre-existing well-known bucket/function names are already public-safe). No emojis; ASCII hyphens only."
