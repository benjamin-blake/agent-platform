    are state-dependent (3 reads module files that do not exist yet; 7's zero-defs grep and 8's
    negative patch-grep only pass post-refactor), so replaying them pre-implementation would fail CI.
    The implement agent must NOT flip them back to hermetic:true. Portability rule: CI's pr-validate
    replay job has NO .venv, so the hermetic step 13 command resolves its interpreter via
    PY=$(test -x .venv/bin/python && echo .venv/bin/python || echo python) instead of bin/venv-python;
    non-hermetic steps keep bin/venv-python (they run only in agent sessions).
