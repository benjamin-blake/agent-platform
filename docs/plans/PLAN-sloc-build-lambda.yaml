rollback: >-
  Pure movement refactor on a feature branch; if bundle-equivalence (VP5/VP6) or the facade/patch
  closure (VP1/VP2/VP8) cannot be made green, abandon the branch (nothing is deployed -- build_lambda.py
  is not Lambda-packaged). If merged and a regression surfaces, revert the single squash commit: the
  three new modules + thin facade + test split + budget re-point land atomically, so one revert restores
  the monolith.
