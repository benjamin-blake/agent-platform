rollback: >-
  All changes are additive/behind CI_RCA_STRICT_MODE=warn (default), so a revert of the branch
  restores prior behaviour with no data migration. The bundle schema_version bump is forward-only but
  consumed only by this plan's cross-check; reverting the portal + evidence changes together is
  self-consistent.
