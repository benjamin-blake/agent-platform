    compute_abstention_rate / find_open_probe_health_rec / escalation_action and the idempotent escalate()
    writing via the ops portal; no reader egress, portal-only writes.
  - >-
    Register ci_rca_probe_health in config/agent/data_quality/source_registry.yaml (description +
    signal_interpretation; persistence-escalation, non-blocking).
  - >-
    Modify scripts/ops_data_portal.py: (a) bundle-absent fail-loud in the source=ci_rca path (strict reject
    unless rca_confidence=undetermined, warn log + CI_RCA_BUNDLE_ABSENT gauge); (b) c5 Section-4 check-7
    S3-object head_object verification (strict reject / warn on missing, degraded on upload_failed, fail-open
    on S3 read errors).
  - >-
    Modify scripts/session_preflight.py: abstention-rate gauge line + report-JSON fields from the warm cache;
    invoke ci_rca_probe_health.escalate() idempotently on the creds/sync-available path.
  - >-
    Modify .github/workflows/ci-rca.yml: compute bundle_absent, surface a gauge line, and inject the
    set-rca_confidence=undetermined / human-route instruction into the agent prompt on that path.
  - >-
    Amend docs/INTENT-ci-rca-methodology.md Section 7.2 (two gauges) and Section 3.4 / Section 4 check 7
    (bundle-absent now fail-loud; S3-existence implemented) -- amend-only, grandfathered doc.
  - >-
    Stage docs/ROADMAP-PLATFORM.yaml bookkeeping: c4 -> met (met_by --pre sloc promotion), c6 -> met (met_by
    ci-rca-workflow-correctness), c5 progress note (mechanism landed, stays open), c12 progress note (i+ii
    landed, stays open), T1.13 progress_note append.
  - >-
    Add tests/test_ci_rca_probe_health.py; extend tests/test_ops_data_portal.py and
    tests/test_session_preflight.py per the scope purposes.
  - >-
    Execute the Verification Plan -- run each step; loop until pass; on unrecoverable failure stop and RCA
    (Decision 55). The /implement bookkeeping walk flips c4/c6 only after VP steps 5-6 pass.
  - "Report: what was implemented, verification results, and confirmation that c5/c12 remain open."
rollback: >-
  All changes are additive and flag-gated (CI_RCA_STRICT_MODE default warn). Revert the branch commit to
  remove the sensor, the file_rec branches, the preflight gauge, and the ci-rca.yml bundle_absent path; the
  roadmap bookkeeping flips revert with it. No infra or data migration to unwind.
