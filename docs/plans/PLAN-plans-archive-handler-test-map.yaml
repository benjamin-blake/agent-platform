schema_version: 1
slug: "plans-archive-handler-test-map"
intent: >-
  Close the repository-structure restructure (phase P6, final) by adopting an archive-on-supersession
  lifecycle for docs/plans/ so the active-plan glob stays cheap (RS-07), and by making the
  test-coverage mapping derivable for colliding handler.py basenames so every lambda handler maps to
  its real, distinct test home and the coverage shim retires (RS-08).
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-plans-archive-handler-test-map.yaml
phase: >-
  Repository-structure restructure, phase P6 (FINAL) -- audit findings RS-07 (relocate) + RS-08
  (enforce) from audits/repository-structure-cb02572.yaml. Closes the P1-P6 restructure arc
  (P1 RS-04, P2 RS-02/03, P3 RS-05, P4a/b/c RS-01, P5 RS-06). Both findings are LOW; both novel
  per the audit roadmap_crossref (no owning tier_item).
scope:
  - file: "docs/plans/PLAN-*.md"
    action: Delete
    purpose: >-
      RS-07: git mv all 195 depth-1 deprecated-format PLAN-*.md plans to docs/plans/archive/. Pure
      rename, NO content edits (Decision 85 history preserved in-tree). Archival criterion is
      deterministic and machine-checkable: a depth-1 docs/plans/ file is archived iff its extension
      is .md (deprecated per Decision 85's one-way .yaml migration -> definitionally pre-standard /
      superseded; active work is authored as .yaml). Verified: all 195 depth-1 .md are PLAN-*.md
      (no strays); reference sweep found zero live-surface references to any docs/plans/*.md path.
  - file: "docs/plans/archive/"
    action: Create
    purpose: >-
      RS-07: new in-tree archive subtree (does not exist yet) receiving the 195 moved .md plans. No
      file-router edit needed -- prose_allowlist.allowed_globs already carries docs/plans/**/*.md
      (recursive ** matcher covers docs/plans/archive/*.md); docs_root_allowlist checks depth-1 docs/
      only (archive/ is depth-3); the route target docs/plans/ is a directory that stays tracked.
  - file: docs/CLAUDE.md
    action: Modify
    purpose: >-
      RS-07: reconcile and expand the existing "Plans lifecycle (RS-07)" stub (added P3). State the
      deterministic archival criterion, record that the first .md sweep landed here (no longer
      "created on first archival"), and state the lagged completed-.yaml sweep policy. No duplication
      -- edit the existing section in place. docs/CLAUDE.md is an allowlisted governance root file.
  - file: scripts/test_coverage_checker.py
    action: Modify
    purpose: >-
      RS-08: generalize the existing src/lambdas/ducklake_writer branch of map_source_to_test into a
      parent-qualified rule -- src/lambdas/<slug>/*.py -> tests/test_{slug}_handler.py. This maps all
      four handler.py files (catalog_dr, maintenance, reader, writer) plus ducklake_writer/smoke_actions.py
      to distinct real homes. Modifying (not adding) the existing branch keeps map_source_to_test at
      19 branches (verified), under the Decision 43 CC ceiling of 20 -- a NEW elif would push it to 21.
      Update the function docstring accordingly. NO complexity-waiver.
  - file: tests/test_ducklake_catalog_dr_handler.py
    action: Create
    purpose: >-
      RS-08: the genuine parent-qualified test home for src/lambdas/ducklake_catalog_dr/handler.py,
      which currently has NO real test (its coverage is masked only by the shim; test_catalog_dr.py
      tests src/common/catalog_dr.py, not the handler). Import src.lambdas.ducklake_catalog_dr.handler
      and exercise its real paths (missing-bucket 500, success 200 with mocked rt.fetch_dsn +
      catalog_dr.run_catalog_dump, CatalogDrError->500, DuckLakeRuntimeError->500, and _parse_event
      body-str/body-dict/direct). Mirror the existing test_ducklake_maintenance_handler.py style. This
      is a real test suite, NOT an empty shim-by-another-name.
  - file: tests/test_handler.py
    action: Delete
    purpose: >-
      RS-08: retire the coverage shim. Safe -- after the map generalization no source maps to it, and
      no code imports it (only tests/test_coverage_checker.py assertions reference the name, updated below).
  - file: tests/test_coverage_checker.py
    action: Modify
    purpose: >-
      RS-08: update the two tests that assert handler.py -> tests/test_handler.py
      (test_ducklake_writer_handler_py_unchanged_by_split, test_other_lambda_dirs_non_handler_stem_unaffected,
      ~lines 172-187) to assert the new parent-qualified mapping, and add a test asserting all four
      src/lambdas/*/handler.py plus ducklake_writer/smoke_actions.py resolve to distinct EXISTING
      tests/test_{slug}_handler.py homes (and none to test_handler.py). Keeps 100% coverage of the
      generalized branch.
bundled_recommendations: []
closes_criteria: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    RS-07: docs/plans/ root contains no depth-1 .md plan file --
    `git ls-files 'docs/plans/' | awk -F/ 'NF==3 && /\.md$/'` returns empty, and
    `git ls-files 'docs/plans/archive/*.md' | wc -l` returns 195.
  - >-
    RS-07: docs/CLAUDE.md "Plans lifecycle (RS-07)" section states the deterministic .md-extension
    archival criterion and no longer says the archive is merely "created on first archival".
  - >-
    RS-07: validate_prose_allowlist and validate_placement stay green after the move with NO edit to
    docs/contracts/file-router.yaml (the existing docs/plans/**/*.md glob already covers archive/).
  - >-
    RS-08: map_source_to_test returns a UNIQUE, EXISTING test path for every src/lambdas/*/handler.py
    -- catalog_dr/maintenance/reader/writer each resolve to tests/test_<slug>_handler.py, all present.
  - >-
    RS-08: tests/test_handler.py is deleted and no source path maps to it.
  - >-
    RS-08: tests/test_ducklake_catalog_dr_handler.py exists, imports
    src.lambdas.ducklake_catalog_dr.handler, and passes pytest (real handler coverage, not an empty shim).
  - >-
    RS-08: validate_cc_limits stays green -- map_source_to_test remains <= 20 cyclomatic branches
    (was 19; the generalized rule adds no branch) with no complexity-waiver.
  - >-
    Both the fast (`--pre`) and full validate tiers pass, and the `--pre` tier stays within the
    5-minute budget despite the 195-file rename.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      RS-08 mapping contract -- assert each of the four src/lambdas/*/handler.py resolves to a
      distinct EXISTING tests/test_<slug>_handler.py, none resolves to the deleted shim, and
      ducklake_writer/smoke_actions.py still resolves to test_ducklake_writer_handler.py.
    command: >-
      bin/venv-python -c "import sys; sys.path.insert(0,'scripts'); from pathlib import Path; from
      test_coverage_checker import map_source_to_test as m, ROOT; slugs=['ducklake_catalog_dr','ducklake_maintenance','ducklake_reader','ducklake_writer'];
      res={s: m(ROOT/'src'/'lambdas'/s/'handler.py') for s in slugs};
      assert all(res[s]==ROOT/'tests'/f'test_{s}_handler.py' for s in slugs), res;
      assert all(res[s].exists() for s in slugs), 'missing test home';
      assert len({str(v) for v in res.values()})==4, 'not distinct';
      assert all(v!=ROOT/'tests'/'test_handler.py' for v in res.values()), 'still maps to shim';
      assert m(ROOT/'src'/'lambdas'/'ducklake_writer'/'smoke_actions.py')==ROOT/'tests'/'test_ducklake_writer_handler.py';
      print('RS08_MAP_OK')"
    expected: "Prints RS08_MAP_OK; no AssertionError."
    fix_if: >-
      A slug resolves to test_handler.py, to a non-existent path, or the four are not distinct ->
      the generalized src/lambdas branch is wrong or catalog_dr's test file was not created.
    hermetic: false
  - step: 2
    phase: pre-deploy
    action: >-
      RS-08 existence via the checker CLI -- the exact acceptance-command form: --check-tests over
      the four handlers reports all have test files.
    command: >-
      bin/venv-python scripts/test_coverage_checker.py --check-tests --files
      src/lambdas/ducklake_catalog_dr/handler.py src/lambdas/ducklake_maintenance/handler.py
      src/lambdas/ducklake_reader/handler.py src/lambdas/ducklake_writer/handler.py
    expected: "Exit 0; prints that all 4 source files have test files (0 missing)."
    fix_if: "Any handler reports a missing test file -> its parent-qualified home does not exist."
    hermetic: false
  - step: 3
    phase: pre-deploy
    action: "RS-08 shim retired -- tests/test_handler.py no longer exists."
    command: "test ! -e tests/test_handler.py && echo SHIM_GONE"
    expected: "Prints SHIM_GONE."
    fix_if: "The file still exists -> the delete step was skipped."
    hermetic: false
  - step: 4
    phase: pre-deploy
    action: >-
      RS-08 catalog_dr test is REAL (imports the handler) and passes -- guards against a
      shim-by-another-name.
    command: >-
      grep -q "import src.lambdas.ducklake_catalog_dr.handler" tests/test_ducklake_catalog_dr_handler.py
      && bin/venv-python -m pytest tests/test_ducklake_catalog_dr_handler.py -q
    expected: "grep matches; pytest reports all tests passed."
    fix_if: >-
      grep fails (test does not exercise the handler) or pytest fails -> write genuine handler tests
      covering the four response paths.
    hermetic: false
  - step: 5
    phase: pre-deploy
    action: "RS-08 the checker's own updated tests pass (handler-mapping assertions refreshed)."
    command: "bin/venv-python -m pytest tests/test_coverage_checker.py -q"
    expected: "All tests pass, including the refreshed parent-qualified mapping assertions."
    fix_if: "A stale assertion still expects handler.py -> test_handler.py -> update it."
    hermetic: false
  - step: 6
    phase: pre-deploy
    action: >-
      RS-08 CC ceiling -- recompute map_source_to_test's cyclomatic branch count the same way
      validate_cc_limits does and assert it stays <= 20.
    command: >-
      bin/venv-python -c "import ast; b=(ast.If,ast.For,ast.While,ast.Try,ast.ExceptHandler,ast.With,ast.BoolOp);
      t=ast.parse(open('scripts/test_coverage_checker.py').read());
      n=[x for x in ast.walk(t) if isinstance(x,(ast.FunctionDef,ast.AsyncFunctionDef)) and x.name=='map_source_to_test'][0];
      c=sum(1 for s in ast.walk(n) if isinstance(s,b)); print('CC',c); assert c<=20, c"
    expected: "Prints a CC value <= 20 (expected 19); no AssertionError."
    fix_if: "CC > 20 -> the rule was added as a new elif; fold it into the existing branch instead of adding one."
    hermetic: false
  - step: 7
    phase: pre-deploy
    action: >-
      RS-07 archival landed -- no depth-1 .md at docs/plans/ root, 195 under archive/, and the
      docs/CLAUDE.md lifecycle note reconciled.
    command: >-
      test -z "$(git ls-files 'docs/plans/' | awk -F/ 'NF==3 && /\.md$/')" && echo NO_ROOT_MD;
      test "$(git ls-files 'docs/plans/archive/*.md' | wc -l | tr -d ' ')" = "195" && echo ARCHIVE_195;
      grep -q "archived iff" docs/CLAUDE.md && echo LIFECYCLE_NOTE_OK
    expected: "Prints NO_ROOT_MD, ARCHIVE_195, and LIFECYCLE_NOTE_OK."
    fix_if: >-
      A .md remains at root, the archive count != 195, or the note was not reconciled -> complete the
      git mv sweep / edit docs/CLAUDE.md.
    hermetic: false
  - step: 8
    phase: pre-deploy
    action: >-
      RS-07 hygiene + budget -- run the fast tier end to end. Proves prose_allowlist + placement stay
      green with no file-router edit, the plan document validates, and the 195-file rename stays under
      the Decision 60/73 fast-tier budget (Decision 73 redefined --pre onto the 5-min fast tier + its enforced budget_assertion, the final --pre step).
    command: "bin/venv-python -m scripts.validate --pre"
    expected: "Exit 0; no prose_allowlist/placement/cc failures; budget_assertion does not report a breach."
    fix_if: >-
      prose_allowlist/placement fails -> a moved path is uncovered (unexpected; investigate the glob).
      Budget breached -> split the .md sweep into 2-3 PRs by slug range (e.g. A-M / N-Z), landing the
      RS-08 changes in the first; the plan is one document, the implementation may stage across PRs.
    hermetic: false
constraints:
  - "No rescue agents or workaround loops (Decision 55); on unrecoverable failure, stop and RCA."
  - "Only files listed in scope may be modified."
  - >-
    RS-08: add the parent-qualified rule by GENERALIZING the existing src/lambdas/ducklake_writer
    branch (no new elif) so map_source_to_test stays <= 20 branches (Decision 43). Do NOT add a
    complexity-waiver, and do NOT use a per-slug dict/table (the transform is uniform).
  - >-
    RS-08: tests/test_ducklake_catalog_dr_handler.py must genuinely import and exercise the handler
    -- an empty or import-only file recreates the shim under a new name and is rejected.
  - >-
    RS-07: pure `git mv` for the 195 .md files -- no content edits, no deletion (Decision 85 keeps
    plan history in-tree).
  - >-
    RS-07: do NOT edit docs/contracts/file-router.yaml -- the existing docs/plans/**/*.md prose glob
    already covers docs/plans/archive/ (verified); adding entries is needless churn.
  - "Single IMPLEMENTATION plan (STRATEGIC suspended, Decision 67); >5-file heuristic suspended."
  - "Work on the harness claude/... branch; never edit or commit on main."
