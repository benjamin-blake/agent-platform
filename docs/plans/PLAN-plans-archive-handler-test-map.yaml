    conventions (pytestmark unit, monkeypatch/patch.object on h.*). Aim for 100% coverage of the handler.
  - "Delete tests/test_handler.py (the shim)."
  - >-
    Update tests/test_coverage_checker.py: rewrite test_ducklake_writer_handler_py_unchanged_by_split and
    test_other_lambda_dirs_non_handler_stem_unaffected to assert handler.py -> test_<slug>_handler.py;
    add a test asserting all four handlers + ducklake_writer/smoke_actions.py map to distinct existing
    parent-qualified homes and none to test_handler.py.
  - >-
