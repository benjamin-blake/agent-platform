  - >-
    Audit provenance: RS-07 (relocate, S5 dispositions) + RS-08 (enforce, S4 disposition) from
    audits/repository-structure-cb02572.yaml. This P6 closes the restructure (P1 RS-04, P2 RS-02/03,
    P3 RS-05, P4a/b/c RS-01, P5 RS-06 -- all merged).
