    the current tree has FOUR (ducklake_catalog_dr, ducklake_maintenance, ducklake_reader, ducklake_writer).
    data-pipeline and ops-compaction under src/lambdas/ are manifest-only (no handler.py) and bridge to
    src/data/handlers/*_handler.py, whose basenames are DISTINCT (discovery_handler, write_handler, ...),
    so they are not part of the handler.py collision family. The plan targets the actual four.
  - >-
    catalog_dr test-home finding (VERIFIED): only three of four handlers had real parent-qualified
    tests (maintenance/reader/writer, each `import src.lambdas.<slug>.handler as h`). catalog_dr's
    handler had NO real test -- its coverage was masked solely by the shim; tests/test_catalog_dr.py
    tests src/common/catalog_dr.py (the common module), not the lambda handler. This plan creates the
    missing genuine home. Effort is re-rated XS (audit) -> S because of the new real test suite.
  - >-
    RS-08 design choice (frontier best practice): generalize the existing ducklake_writer-specific
    branch to `src/lambdas/<slug>/*.py -> tests/test_{slug}_handler.py` rather than add a new branch.
