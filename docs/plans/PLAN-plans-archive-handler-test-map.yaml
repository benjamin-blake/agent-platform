    docs/contracts/, docs prose); if clean, `git mv` all 195 depth-1 docs/plans/PLAN-*.md into
    docs/plans/archive/ (create the directory). Pure renames, no content edits.
  - >-
    RS-07: reconcile the docs/CLAUDE.md "Plans lifecycle (RS-07)" section -- state the deterministic
    .md-extension archival criterion, record that the first sweep (195 files) landed here, note the
    lagged completed-.yaml sweep policy, and that prose_allowlist already covers the archive subtree.
