    RS-08 first (small, self-contained): in scripts/test_coverage_checker.py, generalize the existing
    `elif parts[0]=="src" and len(parts)>=4 and parts[1]=="lambdas" and parts[2]=="ducklake_writer" and
    rel.stem!="handler"` branch into `elif parts[0]=="src" and len(parts)>=4 and parts[1]=="lambdas":
    return ROOT/"tests"/f"test_{parts[2]}_handler.py"`. Update the map_source_to_test docstring to
    describe the parent-qualified rule and drop the ducklake_writer-only wording.
  - >-
    Create tests/test_ducklake_catalog_dr_handler.py: `import src.lambdas.ducklake_catalog_dr.handler as h`
