rollback: >-
  Fully reversible via `git revert` of the squash-merge commit: the 195 .md moves are pure renames
  (revert restores them at root), the map generalization is a single-function edit, and the shim
  delete + catalog_dr test create revert cleanly. No data or infra state involved.
