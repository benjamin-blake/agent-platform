    variable cost is precommit_changed over the renamed files; validate_prose_allowlist and
    validate_placement are cheap fixed-cost full-scans (git ls-files + regex/set ops, independent of
    diff size). Expected well under the 5-minute --pre budget; VP step 8 verifies empirically with a
    documented batching fallback.
  - >-
