  - >-
    .claude/skills/code-review/SKILL.md WF-15 (Step 0b exemptions pointer): change "Read the \"Code Review
    Exemptions\" section at the end of `docs/DECISIONS.md`." to "Read the \"Code Review Exemptions\"
    section in `docs/DECISIONS_ARCHIVE.md`." and append to that sentence "If that section is absent,
    report \"exemptions source unavailable\" in your report instead of silently matching zero exemptions."
  - >-
