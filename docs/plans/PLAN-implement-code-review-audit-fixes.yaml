    subscription through apply".
  - >-
    .claude/skills/implement/SKILL.md WF-12 (Resolves trailer): replace the IMPLEMENTATION Commit Flow
    step-1 block (the "Build the PR body. If ... append a Resolves: trailer ... fenced example ... omit
