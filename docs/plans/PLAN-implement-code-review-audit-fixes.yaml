    Agent Orientation" -> "### 11.". Leave "### 6. Documentation Accuracy" in the Review Dimensions block
    as the sole "### 6.".
  - >-
    .claude/skills/code-review/SKILL.md WF-03 (Verdict line in the output template): inside the Output
    Format fenced block, after the "### Test Completeness" entry and before the closing fence, add a final
    section: "### Verdict", then the rule line "Deterministic rule: REVISE iff any Critical or High
    finding, else PROCEED.", then the final line "Verdict: PROCEED | REVISE" (so the template ends with
    the Verdict line). The rule phrase must match the implement skill exactly.
  - >-
    .claude/skills/code-review/SKILL.md WF-15 (closing nudge): in the Closing Nudge block change "Start a
    new chat with `#prompts:plan` to plan fixes." to "Start a new chat with `/plan` to plan fixes.", and
    for coherence change the twin stale pointer "add them to Code Review Exemptions in `docs/DECISIONS.md`."
    to "add them to Code Review Exemptions in `docs/DECISIONS_ARCHIVE.md`."
  - >-
    Validate the plan document and execute the Verification Plan -- run each VP step; every step must
    print PASS (step 9 is the full gate, adjudicated against the documented pre-existing Import-contracts
    caveat). Loop until all pass.
  - >-
    Report -- files changed, per-VP-step actual outputs, and confirmation that no excluded item (WF-08,
    WF-20, CE-10, CE-14, implement.md:50) was touched.
work_areas: []
rollback: >-
  Single commit touching three markdown files; revert with git revert of the feat commit (or git
  checkout of the three files against origin/main) -- no state, migrations, or deploys involved.
