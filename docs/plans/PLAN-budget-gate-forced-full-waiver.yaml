    action: >-
      The new waiver-notice helper mirrors to GITHUB_STEP_SUMMARY and files no rec (CI diagnosability).
    command: >-
      bin/venv-python -c "import os,tempfile,pathlib; from scripts.checks._scaffolding import _mirror_budget_notice_to_summary as m; p=pathlib.Path(tempfile.mkdtemp())/'s.md'; os.environ['GITHUB_STEP_SUMMARY']=str(p); m('Fast-tier budget waived (forced full-suite scope)','budget waived: full-suite scope forced by root-conftest change'); c=p.read_text(encoding='utf-8'); assert 'Fast-tier budget waived' in c and 'forced' in c, c; print('waiver-mirror OK')"
    expected: >-
      Prints 'waiver-mirror OK' -- the helper wrote a distinct titled section to GITHUB_STEP_SUMMARY
