schema_version: 1
slug: "budget-gate-forced-full-waiver"
intent: >-
  Wire the existing full_suite_forced selection-manifest signal into Decision 73's fast-tier
  budget assertion so a root-conftest-editing PR (which deterministically forces full-suite
  scope, ~19.8 min > the 5-min budget) WARNS-and-PASSES instead of being unbypassably hard-failed,
  bounded by a new 25-minute forced-run ceiling under the 30-minute pr-validate job timeout;
  ratified as Decision 152. Fixes a latent defect in merged Slice A, which shipped scope-forcing
  (VTS-03) without teaching the budget gate about its own signal and thereby blocked Slice B PR #727.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-budget-gate-forced-full-waiver.yaml
phase: >-
  Platform quality hardening -- interstitial slice A.1 of the validate-test-suite-audit overseer
  run. Wires Decision 135's full_suite_forced signal into Decision 73's fast-tier budget assertion.
  No product-roadmap phase and no tier_item; human-approved forward-fix that unblocks Slice B (PR #727).
scope:
  - file: scripts/validate.py
    action: Modify
    purpose: >-
      Add a _FORCED_FULL_SUITE_CEILING_SECONDS = 1500 constant beside _FAST_TIER_BUDGET_SECONDS
      (line 247); in _scaffold_budget_assertion (~line 459) read
      _affected_selection["manifest"].get("full_suite_forced", False) and branch the existing
      "elapsed > budget" breach path three ways (forced-within-ceiling warn-and-pass; forced-over-
      ceiling hard-fail; non-forced hard-fail unchanged); add the new notice helper to the facade
      re-export block (lines 42-59). The --ignore-budget and within-budget paths stay byte-identical.
  - file: scripts/checks/_scaffolding.py
    action: Modify
    purpose: >-
      Add one small helper _mirror_budget_notice_to_summary(title, message) beside the existing
      _file_budget_breach_rec / _file_budget_bypass_rec helpers: print the message and, in CI,
      append a "## {title}" section to GITHUB_STEP_SUMMARY (mirroring the existing lines 121-125
      pattern); files NO rec and never exits. Shared by the forced-waiver notice (no exit) and the
      forced-run ceiling-breach notice (caller exits 1). No other function in this file is touched.
  - file: tests/validate/test_budget.py
    action: Modify
    purpose: >-
      Add TestForcedFullSuiteWaiver (forced breach in (300,1500] exits 0 with a distinct waiver
      notice and no breach rec; non-forced breach still exits 1; forced breach > 1500 exits 1) driven
      end-to-end via _validate.main() with mocked time.monotonic, injecting full_suite_forced by
      patching scripts.checks.deps.affected_tests.derive_affected_tests / emit_manifest; plus a
      TestForcedWaiverCiTelemetry unit test that the new helper mirrors to GITHUB_STEP_SUMMARY and
      files no rec.
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Insert the drafted "## Decision 152" (amends Decision 73's enforcement + Decision 135) as the
      new top entry, before Decision 151. Amend-only: the Decision 73 and 135 amendments are stated
      IN Decision 152's body; the Decision 73 and 135 bodies are NOT edited (Decision 134/145
      convention). Re-check the next free number at execution time (Decision 84 numbering race).
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    A --pre run whose selection manifest has full_suite_forced=True and elapsed in (300s, 1500s]
    EXITS 0, emits a DISTINCT "budget waived: full-suite scope forced by root-conftest change"
    notice, mirrors it to the CI step summary, and does NOT call _file_budget_breach_rec.
  - >-
    A --pre run with full_suite_forced falsy and elapsed > 300s behaves EXACTLY as today:
    _file_budget_breach_rec + the existing ERROR diagnostic + exit 1. The gate is not generally
    weakened, and the read is fail-closed -- _empty_manifest sets full_suite_forced=False and the
    code reads it with .get(..., False), so a Decision-55 derivation-failure fallback hard-fails
    rather than accidentally waiving.
  - >-
    A --pre run with full_suite_forced=True and elapsed > 1500s HARD-FAILS (exit 1) with a distinct
    ceiling-breach notice, keeping an enforced 25-min ceiling under the 30-min pr-validate job timeout.
  - >-
    No regression across tests/validate/test_budget.py: the --ignore-budget bypass, the CI
    --ignore-budget guard, the within-budget pass, and the CI budget-breach step-summary telemetry
    all stay green.
  - >-
    docs/DECISIONS.md gains "## Decision 152" (amending Decision 73's enforcement + Decision 135) as
    a PURELY ADDITIVE top insertion; Decisions 73 and 135 bodies are unedited (amend-only). No
    conftest file is touched; scripts/checks/registry.py and FROZEN_PRE_SCAFFOLDS are untouched;
    every touched file stays under 500 SLOC (Decision 128/130).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      Forced breach within the ceiling warns-and-passes with a distinct notice (the core waiver).
    command: bin/venv-python -m pytest "tests/validate/test_budget.py::TestForcedFullSuiteWaiver::test_forced_breach_within_ceiling_warns_and_passes" "tests/validate/test_budget.py::TestForcedFullSuiteWaiver::test_waiver_notice_is_distinct" -v
    expected: >-
      Both pass: a run with full_suite_forced=True and elapsed=400s (in (300,1500]) exits 0; stdout
      carries a distinct "waived"/"forced by root-conftest" notice (NOT the hard-fail ERROR); and
      _file_budget_breach_rec is not called for the forced case.
    fix_if: >-
      The forced in-window run exits 1 (waiver not applied), the notice is indistinguishable from the
      non-forced ERROR, or the breach-rec stream is still filed for the forced case.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      The waiver behaviour is pinned by a permanent test in tests/validate/test_budget.py, which the
      full post-merge tier runs every push and --pre re-selects on any edit to validate.py or
      _scaffolding.py; a parallel kernel test_selector row would duplicate the standing suite guard.
  - step: 2
    phase: pre-deploy
    action: >-
      Non-forced breach still hard-fails (exit 1) -- the anti-drift gate is not gutted.
    command: bin/venv-python -m pytest "tests/validate/test_budget.py::TestForcedFullSuiteWaiver::test_non_forced_breach_still_hard_fails" "tests/validate/test_budget.py::TestBudgetAssertion::test_exits_1_on_budget_breach" -v
    expected: >-
      Both pass: a run with full_suite_forced=False and elapsed=400s exits 1 via the unchanged
      _file_budget_breach_rec + ERROR path, and the pre-existing non-forced breach test stays green.
    fix_if: >-
      A non-forced breach no longer exits 1 -- the change weakened the gate generally instead of
      narrowing it to exactly the full_suite_forced case.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      The preserved hard-fail is guarded by permanent suite tests (new + pre-existing) run every full
      tier and re-selected on validate.py edits; a kernel row duplicates that standing coverage.
  - step: 3
    phase: pre-deploy
    action: >-
      Forced breach over the 25-min ceiling hard-fails (exit 1) -- the forced path is bounded.
    command: bin/venv-python -m pytest "tests/validate/test_budget.py::TestForcedFullSuiteWaiver::test_forced_breach_over_ceiling_hard_fails" -v
    expected: >-
      Passes: a run with full_suite_forced=True and elapsed=1600s (> 1500) exits 1 with a distinct
      ceiling-breach notice; the boundary is exclusive-above-1500 (a forced run at exactly 1500s still
      warns-and-passes per step 1's window).
    fix_if: >-
      A forced run over the ceiling passes (an unbounded escape), or the boundary is off-by-one at
      exactly 1500s.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      The ceiling contract is asserted by a permanent suite test run every full tier and re-selected
      on validate.py edits; a kernel metric_under_threshold row would duplicate that standing guard.
  - step: 4
    phase: pre-deploy
    action: >-
      Full budget-suite regression -- the whole test_budget.py file stays green.
    command: bin/venv-python -m pytest tests/validate/test_budget.py -v
    expected: >-
      All tests pass: the new TestForcedFullSuiteWaiver / TestForcedWaiverCiTelemetry plus every
      pre-existing class (TestBudgetAssertion, TestIgnoreBudgetFlag, TestIgnoreBudgetCIGuard,
      TestBudgetBreachCiTelemetry).
    fix_if: >-
      Any existing budget / ignore-budget / CI-guard / breach-telemetry test reddens, indicating the
      change perturbed behaviour outside the forced-scope branch.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      A whole-file regression sweep is not a single canonical primitive, and its permanence is already
      provided by the full post-merge tier that runs this file every push; a kernel row cannot express
      a multi-class suite pass and would duplicate the tier.
