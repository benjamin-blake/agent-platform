  - step: 7
    phase: pre-deploy
    action: >-
      Decision 152 present and DECISIONS.md purely additive (amend-only; Decision 73/135 bodies intact).
    command: >-
      git fetch origin main -q && test "$(grep -c '^## Decision 152:' docs/DECISIONS.md)" -eq 1 && test -z "$(git diff origin/main -- docs/DECISIONS.md | grep -E '^-[^-]')" && echo 'D152 present + DECISIONS.md purely additive (amend-only)'
    expected: >-
      Prints 'D152 present + DECISIONS.md purely additive (amend-only)' -- exactly one "## Decision 152:"
