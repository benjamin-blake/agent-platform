  - docs/PROJECT_CONTEXT.md read (executor self-modification boundary section)
  - DECISIONS.md relevant sections read (executor-boundary table; Decisions 67, 86, 117, 127)
  - All files in scope located and readable
  - Acceptance criteria understood and verifiable
  - Re-run the behavioral-invariants.md consumer grep immediately before deletion (confirm still zero live consumers)
