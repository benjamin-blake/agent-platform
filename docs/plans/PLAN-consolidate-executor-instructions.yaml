    config/agent/executor/instructions/ (content byte-identical; do NOT touch the applyTo frontmatter).
    Confirm only behavioral-invariants.md remains under .github/instructions/.
  - >-
    Re-run the repo-wide consumer grep for behavioral-invariants.md; confirm zero live consumers; then
    git rm .github/instructions/behavioral-invariants.md. Confirm .github/instructions/ is now empty/removed.
  - >-
    Edit docs/contracts/instruction-architecture.yaml: add the Layer 5 content_locations glob for the new
    instructions home; fix the legacy_surfaces_retired note (drop the .github/instructions/executor-* clause;
    T5.3 -> re-homed by this plan + T4.12 for the surviving scheduled surfaces).
  - "Edit docs/contracts/inference-provider.yaml: repoint the model-routing floor pattern to config/agent/executor/instructions/."
  - "Edit docs/contracts/file-router.yaml: add config/agent/executor/instructions/**/*.md to prose_allowlist.allowed_globs."
  - "Edit config/agent/executor/prompts/README.md: repoint the split-rule note to the new home and reflect the Decision 67 freeze."
  - >-
    Update the three tests: repoint the path strings in test_executor_plan.py and test_executor_step_runner.py;
    update the inline mock floor pattern and the floor-test path in test_llm_model_registry.py; rename the two
    now-misnamed test methods (github_instructions -> executor_instructions).
  - >-
    Update docs/PROJECT_CONTEXT.md boundary-file list and the docs/DECISIONS.md boundary reference-table row
    to the new instructions path (consistency; capabilities.yaml SSOT is intentionally left alone).
