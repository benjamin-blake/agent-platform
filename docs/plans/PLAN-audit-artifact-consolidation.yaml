execution_steps:
  - "Create the target home dirs so git mv has valid destinations: mkdir -p audits/legacy docs/plans/reports (docs/audit-prompts/ already exists)."
  - "git mv the 3 legacy-output groups into audits/legacy/: (a) git mv docs/audit-reports/PLATFORM-ROADMAP-AUDIT-2026-06-09.yaml audits/legacy/PLATFORM-ROADMAP-AUDIT-2026-06-09.yaml ; (b) git mv docs/audit-reports/wave-1-outputs audits/legacy/wave-1-outputs (moves all 7 files A1,A2,B,C,D,E,F as a unit) ; (c) git mv docs/AUDIT-test-hermeticity.yaml audits/legacy/AUDIT-test-hermeticity.yaml . THEN remove the emptied directory node: git does not track empty dirs, so the now-untracked docs/audit-reports/ path lingers on disk after the git mv moves -- once its tracked contents are moved, run `rm -rf docs/audit-reports` so the old home is gone from the working tree (this is what VP step 2 verifies)."
  - "git mv the 2 loose audit prompts into docs/audit-prompts/ (preserve filenames): git mv docs/AUDIT-PROMPT-platform-roadmap-audit.md docs/audit-prompts/AUDIT-PROMPT-platform-roadmap-audit.md ; git mv docs/AUDIT-PROMPT-product-roadmap-yaml.md docs/audit-prompts/AUDIT-PROMPT-product-roadmap-yaml.md ."
  - "git mv the 2 REPORT-ONLY deliverables into docs/plans/reports/: git mv docs/REPORT-ducklake-catalog-neon-migration.md docs/plans/reports/REPORT-ducklake-catalog-neon-migration.md ; git mv docs/ducklake-spike-findings.md docs/plans/reports/ducklake-spike-findings.md ."
  - "Reference sweep -- docs/ROADMAP-PLATFORM.yaml: rewrite ALL 4 occurrences of the string 'docs/REPORT-ducklake-catalog-neon-migration.md' to 'docs/plans/reports/REPORT-ducklake-catalog-neon-migration.md'. Anchor sites: CD.31 amendment text (~L1512), CD.33 amendment text (~L1644), CD.34 detail 'Authored by ...' (~L1683), and the phase/tier detail 'Authored by ...' (~L5308). Leave the pathless 'AUDIT-test-hermeticity.yaml' basename in the dated ledger note (~L6878) untouched (append-only)."
  - |
