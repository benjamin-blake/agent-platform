schema_version: 1
slug: "audit-artifact-consolidation"
intent: >-
  Consolidate the repository's scattered legacy audit artifacts and unowned docs-root stray files
  (loose AUDIT-*, REPORT-*, and a ducklake spike-note) into their single canonical class homes via
  pure git mv plus a live-surface reference sweep, and register those homes in the machine-checked
  file-router discovery registry -- shrinking placement-by-accident so the agent-first repository
  stays navigable (NS.4). Implements repository-structure audit findings RS-02 and RS-03.
plan_type: IMPLEMENTATION
verification_tier: V1
plan_path: docs/plans/PLAN-audit-artifact-consolidation.yaml
phase: >-
  Repository-structure restructure Phase P2 (audit findings RS-02 + RS-03, medium, from
  audits/repository-structure-cb02572.yaml). Depends on P1 (RS-04) file-router registry, merged at
  fcb137c. Platform axis; RS-02/RS-03 are novel unowned findings (dedup_hit_count 0) with no owning
  tier_item. Class-home routing per Decision 86.
scope:
  - file: docs/audit-reports/PLATFORM-ROADMAP-AUDIT-2026-06-09.yaml
    action: Delete
    purpose: git mv to audits/legacy/PLATFORM-ROADMAP-AUDIT-2026-06-09.yaml (inert pre-convention audit output)
  - file: audits/legacy/PLATFORM-ROADMAP-AUDIT-2026-06-09.yaml
    action: Create
    purpose: Receives the moved 2026-06-09 platform-roadmap audit output
  - file: docs/audit-reports/wave-1-outputs/
    action: Delete
    purpose: git mv the 7-file dir to audits/legacy/wave-1-outputs/ (A1, A2, B, C, D, E, F)
  - file: audits/legacy/wave-1-outputs/
    action: Create
    purpose: Receives the 7 wave-1 audit output files as a unit
  - file: docs/AUDIT-test-hermeticity.yaml
    action: Delete
    purpose: git mv to audits/legacy/AUDIT-test-hermeticity.yaml (audit-output-class file stray at docs root)
  - file: audits/legacy/AUDIT-test-hermeticity.yaml
    action: Create
    purpose: Receives the moved hermeticity audit output
  - file: docs/AUDIT-PROMPT-platform-roadmap-audit.md
    action: Delete
    purpose: git mv to docs/audit-prompts/ (compose-time prompt joins the prompt home; filename preserved)
  - file: docs/audit-prompts/AUDIT-PROMPT-platform-roadmap-audit.md
    action: Create
    purpose: Receives the moved platform-roadmap audit prompt
  - file: docs/AUDIT-PROMPT-product-roadmap-yaml.md
    action: Delete
    purpose: git mv to docs/audit-prompts/ (compose-time prompt joins the prompt home; filename preserved)
  - file: docs/audit-prompts/AUDIT-PROMPT-product-roadmap-yaml.md
    action: Create
    purpose: Receives the moved product-roadmap-yaml audit prompt
  - file: docs/REPORT-ducklake-catalog-neon-migration.md
    action: Delete
    purpose: git mv to docs/plans/reports/ (Decision 86 REPORT-ONLY plan-deliverable class home)
  - file: docs/plans/reports/REPORT-ducklake-catalog-neon-migration.md
    action: Create
    purpose: Receives the moved RDS->Neon migration REPORT deliverable
  - file: docs/ducklake-spike-findings.md
    action: Delete
    purpose: git mv to docs/plans/reports/ (spike-note is a REPORT-ONLY plan deliverable per Decision 86)
  - file: docs/plans/reports/ducklake-spike-findings.md
    action: Create
    purpose: Receives the moved ducklake spike-findings deliverable
  - file: docs/ROADMAP-PRODUCT.md
    action: Modify
    purpose: >-
      Banner (lines 10-11): replace the two dead docs/audit-reports/ pointers (which name files never
      committed) with an honest reworded pointer to the moved audit prompt (docs/audit-prompts/
      AUDIT-PROMPT-product-roadmap-yaml.md) and audits/legacy/. Verbatim replacement text in execution_steps.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Rewrite the 4 live 'docs/REPORT-ducklake-catalog-neon-migration.md' path references to
      'docs/plans/reports/REPORT-ducklake-catalog-neon-migration.md' (CD.31 amendment ~L1512, CD.33
      amendment ~L1644, CD.34 detail ~L1683, phase detail ~L5308). Leave the pathless AUDIT-test-hermeticity.yaml
      basename in the dated ledger note (~L6878) untouched (append-only history).
  - file: docs/contracts/file-router.yaml
    action: Modify
    purpose: >-
      Append 4 additive discovery rows registering the consolidated homes (audit-outputs -> audits/;
      audit-outputs-legacy -> audits/legacy/; audit-prompts -> docs/audit-prompts/; report-deliverables ->
      docs/plans/reports/). No existing row references any moved path. Verbatim YAML block in execution_steps.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    All 13 stray files are relocated to their class homes (audits/legacy/ receives 9: the 2026-06-09
    audit + wave-1-outputs/ x7 + AUDIT-test-hermeticity.yaml; docs/audit-prompts/ receives the 2
    AUDIT-PROMPT-*.md; docs/plans/reports/ receives REPORT-ducklake-catalog-neon-migration.md +
    ducklake-spike-findings.md), and docs/audit-reports/ no longer exists in the tree.
  - >-
    The docs/ root (depth-1) holds no AUDIT-*, REPORT-*, or spike-note files (RS-02/RS-03 acceptance).
  - >-
    Exactly one top-level directory (audits/) contains audit outputs (RS-02 acceptance).
  - >-
    validate_placement passes: every docs/contracts/file-router.yaml target -- including the 4 new
    rows -- resolves to a tracked file/dir; zero dead targets, no duplicate topics, no malformed rows.
  - >-
    docs/ROADMAP-PRODUCT.md no longer references the never-committed
    AUDIT-product-roadmap-yaml-conversion.yaml / PRODUCT-ROADMAP-PLATFORM-GAPS.yaml paths; its banner
    points at the moved audit prompt and audits/legacy/.
  - >-
    docs/ROADMAP-PLATFORM.yaml has zero remaining 'docs/REPORT-ducklake-...' (docs-root) references and
    4 'docs/plans/reports/REPORT-ducklake-...' references.
  - >-
    validate.py --pre passes green (the authoritative pre-merge gate).
verification_plan:
  - step: 1
    phase: pre-deploy
    hermetic: false
    action: Confirm all moved files are present at their new homes and absent at the old docs paths, and the wave dir carries all 7 files.
    command: >-
      test -f audits/legacy/PLATFORM-ROADMAP-AUDIT-2026-06-09.yaml && test "$(git ls-files audits/legacy/wave-1-outputs | wc -l)" -eq 7 && test -f audits/legacy/AUDIT-test-hermeticity.yaml && test -f docs/audit-prompts/AUDIT-PROMPT-platform-roadmap-audit.md && test -f docs/audit-prompts/AUDIT-PROMPT-product-roadmap-yaml.md && test -f docs/plans/reports/REPORT-ducklake-catalog-neon-migration.md && test -f docs/plans/reports/ducklake-spike-findings.md && test ! -e docs/AUDIT-test-hermeticity.yaml && test ! -e docs/REPORT-ducklake-catalog-neon-migration.md && test ! -e docs/ducklake-spike-findings.md && echo MOVES_OK
    expected: Prints MOVES_OK (all new paths exist with 7 wave files; all old docs-root paths gone).
    fix_if: A missing new path or lingering old path means a git mv was skipped or mis-targeted; re-run the specific move.
  - step: 2
    phase: pre-deploy
    hermetic: false
    action: Confirm the old docs/audit-reports/ home holds zero tracked files and its emptied directory node has been removed.
    command: test "$(git ls-files docs/audit-reports/ | wc -l)" -eq 0 && test ! -e docs/audit-reports && echo AUDIT_REPORTS_REMOVED
    expected: Prints AUDIT_REPORTS_REMOVED (zero tracked files under the old home; the empty dir node is gone).
    fix_if: If git still tracks files under docs/audit-reports/, a move was missed -- git mv it into audits/legacy/. If zero files are tracked but the path still exists (git leaves the emptied dir node on disk after git mv), run `rm -rf docs/audit-reports` to clear it.
  - step: 3
    phase: pre-deploy
    hermetic: false
    action: Confirm the docs/ root (depth-1) holds no AUDIT-*, REPORT-*, or spike-note files.
    command: >-
      git ls-files docs/ | grep -E '^docs/[^/]+$' | grep -E 'docs/(AUDIT-|REPORT-|ducklake-spike-findings)' || echo DOCS_ROOT_CLEAN
    expected: Prints DOCS_ROOT_CLEAN with no preceding file lines.
    fix_if: Any printed path is an unmoved stray at docs root; git mv it into its class home.
  - step: 4
    phase: pre-deploy
    hermetic: false
    action: Run the file-router link-validity (placement) check directly; every target incl. the 4 new rows must resolve.
    command: >-
      bin/venv-python -c "from scripts.checks.hygiene.validate_placement import validate_placement; f=[]; validate_placement(f); print('PLACEMENT_OK' if not f else 'PLACEMENT_FAIL: '+'; '.join(f))"
    expected: Prints PLACEMENT_OK.
    fix_if: PLACEMENT_FAIL lists a dead target/duplicate topic/malformed row; correct the offending file-router row (targets must resolve post-move; topics unique).
  - step: 5
    phase: pre-deploy
    hermetic: false
    action: Confirm the ROADMAP-PLATFORM.yaml REPORT-ducklake reference sweep is complete.
    command: >-
      test "$(grep -c 'docs/REPORT-ducklake-catalog-neon-migration.md' docs/ROADMAP-PLATFORM.yaml)" -eq 0 && test "$(grep -c 'docs/plans/reports/REPORT-ducklake-catalog-neon-migration.md' docs/ROADMAP-PLATFORM.yaml)" -eq 4 && echo ROADMAP_REFS_OK
    expected: Prints ROADMAP_REFS_OK (0 old docs-root refs; 4 new docs/plans/reports/ refs).
    fix_if: A nonzero old count or a new count != 4 means an occurrence was missed or double-edited; re-scan the 4 anchor sites.
  - step: 6
    phase: pre-deploy
    hermetic: false
    action: Confirm the ROADMAP-PRODUCT.md banner no longer cites the never-committed paths and points at the moved locations.
    command: >-
      ! grep -qE 'AUDIT-product-roadmap-yaml-conversion|PRODUCT-ROADMAP-PLATFORM-GAPS' docs/ROADMAP-PRODUCT.md && grep -q 'audits/legacy/' docs/ROADMAP-PRODUCT.md && grep -q 'audit-prompts/AUDIT-PROMPT-product-roadmap-yaml.md' docs/ROADMAP-PRODUCT.md && echo BANNER_FIXED
    expected: Prints BANNER_FIXED.
    fix_if: If a dead path remains or a new pointer is missing, re-apply the verbatim banner replacement from execution_steps.
  - step: 7
    phase: pre-deploy
    hermetic: false
    action: Confirm the 4 additive discovery rows exist and are unique in file-router.yaml.
    command: >-
      test "$(grep -cE '^[[:space:]]+- topic: (audit-outputs|audit-outputs-legacy|audit-prompts|report-deliverables)$' docs/contracts/file-router.yaml)" -eq 4 && echo ROUTER_ROWS_OK
    expected: Prints ROUTER_ROWS_OK (exactly 4 new topic rows).
    fix_if: A count != 4 means a row is missing or a topic name is misspelled/duplicated; add/correct the row.
  - step: 8
    phase: pre-deploy
    hermetic: false
    action: Confirm the new docs/plans/reports/ home is inert to plan tooling -- it holds no PLAN-*.yaml, so the non-recursive validate_plan_documents glob and find_plan.py slug resolution ignore it (Decision 85).
    command: test -z "$(ls docs/plans/reports/PLAN-*.yaml 2>/dev/null)" && test -f docs/plans/reports/REPORT-ducklake-catalog-neon-migration.md && test -f docs/plans/reports/ducklake-spike-findings.md && echo REPORTS_HOME_INERT
    expected: Prints REPORTS_HOME_INERT (no PLAN-*.yaml under reports/; both report deliverables present).
    fix_if: If a PLAN-*.yaml appears under reports/, it was misplaced -- reports/ holds only REPORT-*.md and spike notes; move any plan doc back to docs/plans/.
  - step: 9
    phase: pre-deploy
    hermetic: false
    action: Validate this PLAN document against the PlanDocument schema.
    command: bin/venv-python -m scripts.plan_document docs/plans/PLAN-audit-artifact-consolidation.yaml
    expected: Reports the plan validates against the PlanDocument schema (no errors).
    fix_if: A schema error names the offending field; correct it (extra keys forbidden).
  - step: 10
    phase: pre-deploy
    hermetic: false
    action: Run the authoritative fast presubmit tier over the whole change.
    command: bin/venv-python -m scripts.validate --pre
    expected: Exits 0 (all checks pass, including validate_placement and validate_plan_documents).
    fix_if: A named check fails; diagnose and fix on-branch (do not disable checks). If validate_plan_documents flags a stray under docs/plans/reports/, confirm it is not a PLAN-*.yaml (only PLAN-*.yaml are schema-governed).
constraints:
  - IMPLEMENTATION plan type; no recommendations bundled (orchestrator constraint; STRATEGIC suspended per Decision 67).
  - Pure git mv + live-surface reference sweep + additive file-router rows; NO behavioral/source code changes.
  - >-
    Leave append-only history untouched: docs/plans/ historical PLAN-*.md/.yaml, logs/, audits/ outputs
    (including the moved files' own internal text), SESSION_LOG*, DECISIONS_ARCHIVE.md, dated
    ledger/progress notes, and ROADMAP-PRODUCT.yaml frozen audit-lineage provenance comments.
  - >-
    Do NOT modify src/common/ducklake_spike.py -- it is Lambda-packaged into 6 active artifacts
    (data-pipeline, ducklake_catalog_dr, ducklake_maintenance, ducklake_reader, ducklake_writer,
    ops-compaction); a one-line comment change would force 6 build/deploy/smoke cycles, disproportionate
    to a pure-move plan. Its comment reference to the moved spike file is a documented residual.
  - Preserve the two AUDIT-PROMPT-*.md filenames on move (pure git mv into docs/audit-prompts/); do NOT rename to the home's AUDIT-{slug}.md convention.
  - No rescue agents or workaround loops (Decision 55). Forward-fix on-branch only.
  - Never edit or commit on main; work on the harness claude/ branch only (AGENTS.md Git-ops).
  - No emojis; ASCII hyphens only; public-repo content boundary (Decision 101) -- moved files are already-public audit/report artifacts, nothing confidential is introduced.
