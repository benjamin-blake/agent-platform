    > ([`docs/audit-prompts/AUDIT-PROMPT-product-roadmap-yaml.md`](./audit-prompts/AUDIT-PROMPT-product-roadmap-yaml.md)).
    > Its originally-planned conversion-report and platform-gaps YAML deliverables were never committed
    > under those names; historical roadmap-audit outputs are archived under [`audits/legacy/`](../audits/legacy/).
  - |
    Router registration -- docs/contracts/file-router.yaml: append these 4 rows to the end of the `routes:` list (2-space indent, matching existing rows; all topics are new/unique; all targets resolve after the moves above):
      - topic: audit-outputs
        targets: [audits/]
        description: "Audit outputs (results): current-convention <slug>-<sha>.{yaml,md} pairs. One canonical audit-output home (RS-02)."
      - topic: audit-outputs-legacy
        targets: [audits/legacy/]
        description: "Inert pre-convention audit outputs (PLATFORM-ROADMAP-AUDIT-2026-06-09.yaml, wave-1-outputs/, AUDIT-test-hermeticity.yaml); consolidated from docs/audit-reports/ and the docs root (RS-02)."
      - topic: audit-prompts
        targets: [docs/audit-prompts/]
        description: "Audit prompts (compose-time inputs): AUDIT-{slug}.md briefs authored by the /audit workflow."
