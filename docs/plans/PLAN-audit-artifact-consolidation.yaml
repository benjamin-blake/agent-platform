work_areas: []
rollback: >-
  All changes are pure git mv + text edits on the branch; revert with `git checkout -- .` before commit,
  or `git revert <sha>` after. No infrastructure, no deploy, no data migration -- rollback is a plain
  git operation with zero external side effects.
