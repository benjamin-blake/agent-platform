    scripts/ops_data_portal.py -- add the `--back-validate` action to the argparse action group
    plus `--since` (default 2026-06-15), `--refile-audit` (store_true, default False), and `--json`
    arguments; wire the back_validate_ci_rca() handler into main(). The handler reads
    logs/.recommendations-log.jsonl directly, filters source=ci_rca recs by created_timestamp >=
    --since, and routes each into legacy_no_schema / non_conformant / conformant per the load-bearing
    legacy rule (no context_v2_json => conformant, never validate {}). Recompute schema conformance
