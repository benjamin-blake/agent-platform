    Decision 27 -> "(Decided)"; Decision 146 as drafted. /implement executes this confirmed set.
  - >-
    Immutability: each moved entry's original body is preserved VERBATIM; only the header suffix and a
    top-of-body "**Status:** Superseded by Decision NN" + "**Superseded by:** Decision NN" marker pair are
    added (ETL status extraction is first-**Status:**-wins, so the prepended marker sets the correct warehouse
    status). No renumbering.
  - >-
    Warehouse-safe by construction: scripts/decisions_md.py parses BOTH files (_DECISIONS_MD_PATHS); entries
    MOVE (never dropped), so no ops_decisions row is lost and the backfill is upsert-only. Never physically
    delete an entry (Decision 70 keeps physical deletion exceptional; not engaged here).
  - No edits to any code, schema, or .tf. Docs-only. Do not touch scripts/decisions_md.py or validate_decisions_size.py.
  - >-
    New/edited text uses ASCII hyphens, not em dashes (CLAUDE.md house style); preserved bodies of moved
    entries keep their original punctuation.
  - No rescue agents or workaround loops (Decision 55); on an unrecoverable VP failure, stop and RCA.
