    ACTUAL source string when appending its suffix); (b) immediately after the header line, PREPEND the marker
    pair "**Status:** Superseded by Decision NN" then "**Superseded by:** Decision NN" (this becomes the first
    **Status:** line so the ETL records the correct warehouse status -- for Decision 40 this populates its
    previously-empty superseded_by, satisfying plan-critique obs 2); (c) preserve the original body VERBATIM
    below. Do NOT renumber.
  - >-
    Normalize the three in-place status headers in docs/DECISIONS.md (Decision 40 is ARCHIVED, not normalized
    in place -- see the archive step above): Decision 55 header -> append " (Decided)" giving "(Supersedes
    Decision 46) (Decided)"; Decision 70 header -> append " (Decided)"; Decision 27 header -> "(Decided)"
    (operator-confirmed; replace "(Agent-decided -- approved)"; preserve the "Agent-decided -- approved by
    test suite..." provenance in the body Status line, ASCII hyphens). NOTE (plan-critique obs 3): Decision
    27's header contains an em dash -- match the ACTUAL em-dash source string when editing so the in-place
