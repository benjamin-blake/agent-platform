schema_version: 1
slug: decisions-archival-hygiene
intent: >-
  Implement audit finding DPI-04 -- lifecycle/status hygiene and archival-policy reconciliation for
  docs/DECISIONS.md -- so the decision-scout hot-read path and the ops_decisions ETL source (Decision
  84) reflect the Decision-84-era reality that this file is the canonical corpus, not an
  open-decisions-only scratchpad. Wave 2 of the /overseer decision-log-premise-integrity run.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-decisions-archival-hygiene.yaml
phase: >-
  Audit-driven platform governance hygiene (DPI-04, audits/decision-log-premise-integrity-8fb581e.yaml);
  no tier_item -- durable deferred follow-ups are routed to roadmap tier_items, not recs. Depends on Wave
  1 (DPI-02/03/05, #665) already on main.
scope:
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Add Decision 146 (archival-policy governance) at the top; retitle the stale H1 "# Open Decisions"
      -> "# Decisions" and reconcile the subtitle; remove the operator-confirmed archive-eligible entries
      (23, 42, 49, 68, 71, 40); normalize the header status of Decisions 55, 70, 27 in place.
  - file: docs/DECISIONS_ARCHIVE.md
    action: Modify
    purpose: >-
      Append each moved entry (verbatim body preserved) with a "(Superseded by Decision NN)" header suffix
      and top-of-body Status/Superseded-by markers per the archive's existing convention.
  - file: docs/PROJECT_CONTEXT.md
    action: Modify
    purpose: >-
      CONDITIONAL: only if the operator elects to archive Decision 24 -- update the live pointer at
      PROJECT_CONTEXT.md:104 ("See Decision 24 in docs/DECISIONS.md") to name docs/DECISIONS_ARCHIVE.md.
      Under the recommended plan (24 stays live) this file is untouched. NOTE: the audit's premise that
      PROJECT_CONTEXT.md:18 asserts "keeps only open decisions" crediting strategic_review is STALE -- line
      18 was already reconciled to the Decision-134 deterministic-guard framing, so no policy-text rewrite
      is needed there.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    The operator-confirmed archive-eligible entries (23, 42, 49, 68, 71, 40) are REMOVED from
    docs/DECISIONS.md and PRESENT in docs/DECISIONS_ARCHIVE.md, each with an accurate "(Superseded by
    Decision NN)" header suffix (23->76, 42->90, 49->116, 68->112, 71->73, 40->122). Decisions 24 and 89
    remain in the live corpus (operator-confirmed EXCLUDE -- both still carry live citations; see context).
  - >-
    Decision 146 exists at the top of docs/DECISIONS.md with header suffix "(Decided)", a "**Warehouse ID:**
    dec-146" line, and the canonical template sections (Status/Date/Warehouse ID/Problem/Decision/Rationale/
    Related), recording the canonical-corpus + archival policy.
  - The H1 of docs/DECISIONS.md is "# Decisions" (not "# Open Decisions") with the reconciled subtitle.
  - >-
    Decisions 55 and 70 carry an explicit "(Decided)" header status; Decision 27's header is normalized to
    "(Decided)" (operator-confirmed; agent-decided provenance preserved in the body Status line). Decision 40
    is ARCHIVED under "(Superseded by Decision 122)" (see the first criterion), not status-normalized in place.
  - >-
    scripts/decisions_md.py parses both files with NO duplicate decision numbers across the combined corpus,
    every moved entry yielding a non-empty superseded_by, and Decision 146 present -- proving the moves are
    warehouse-safe (number-keyed dec-NNN identity preserved; ETL dedupe first-parsed-wins not tripped).
  - >-
    validate_decisions_size passes all three ceilings (live < 500,000 bytes, live headers < 120, combined <
    700,000 bytes) and validate --pre exits 0.
  - No new recommendation is filed by this plan (durable follow-ups route to roadmap tier_items).
verification_plan:
  - step: 1
    phase: pre-deploy
    hermetic: false
    graduation: not-applicable
    action: >-
      Confirm the 6 archive-eligible entries are GONE from the live file and PRESENT in the archive, and
      that the excluded entries (24, 89) remain live. Asserts the move is complete on both sides -- if a
      moved entry's live copy survives, the ETL dedupe (first-parsed-wins, live before archive) would
      silently keep the stale live row and the size guard would not shrink.
    command: >-
      test "$(grep -cE '^## Decision (23|42|49|68|71|40):' docs/DECISIONS.md)" = "0" && test "$(grep -cE
      '^## Decision (23|42|49|68|71|40):' docs/DECISIONS_ARCHIVE.md)" = "6" && test "$(grep -cE '^## Decision
      (24|89):' docs/DECISIONS.md)" = "2" && echo OK
    expected: OK
    fix_if: >-
      A candidate still appears in DECISIONS.md (move incomplete -> ETL keeps the stale live copy), is
      missing from the archive, or an excluded entry (24/89) was moved against the recommendation.
  - step: 2
    phase: pre-deploy
    hermetic: false
    graduation: not-applicable
    action: >-
      Confirm each archived entry carries its ACCURATE superseder suffix. 68 must cite Decision 112 (its
      narrow runner-hosting supersession per Decision 112 line "narrowly supersedes Decision 68"), not
      Decision 73 (which only acknowledges 68). 71's suffix is the operator-confirmable default -- 73 per
      71's own Wave-1 footnote ("see Decision 73"); the operator may prefer 112 for consistency with 68, in
      which case /implement updates this regex to match (same post-confirmation update granted for Decisions
      27/40).
    command: >-
      grep -qE '^## Decision 23:.*\(Superseded by Decision 76\)' docs/DECISIONS_ARCHIVE.md && grep -qE
      '^## Decision 42:.*\(Superseded by Decision 90\)' docs/DECISIONS_ARCHIVE.md && grep -qE '^## Decision
      49:.*\(Superseded by Decision 116\)' docs/DECISIONS_ARCHIVE.md && grep -qE '^## Decision 68:.*\(Superseded
      by Decision 112\)' docs/DECISIONS_ARCHIVE.md && grep -qE '^## Decision 71:.*\(Superseded by Decision
      73\)' docs/DECISIONS_ARCHIVE.md && grep -qE '^## Decision 40:.*\(Superseded by Decision 122\)'
      docs/DECISIONS_ARCHIVE.md && echo OK
    expected: OK
    fix_if: A suffix is missing or names the wrong superseder (esp. 68 -> must be 112, not 73; 40 -> 122).
  - step: 3
    phase: pre-deploy
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Duplicate-number detection across live+archive is audit finding DPI-06's scope (a standing guard to be
      built separately), not this plan's; this step is a one-time post-move parse assertion that also
      duplicates the Decision-134 DAF-01 fidelity tripwire. Graduating it here would build DPI-06's guard
      out of scope.
    action: >-
      WAREHOUSE-SAFETY PROOF. Parse both files via the real ETL (scripts.decisions_md): assert no duplicate
      decision numbers across the combined corpus (the DPI-06 silent-first-wins hazard is avoided and
      Decision 146's number is free across BOTH files per the Decision 105 ratification-guard target), each
      moved entry yields a non-empty superseded_by, and Decision 146 parses.
    command: >-
      bin/venv-python -c "from scripts.decisions_md import parse_decisions_md, iter_decision_headings,
      _DECISIONS_MD_PATHS; nums=[int(m.group(1)) for p in _DECISIONS_MD_PATHS if p.exists() for m in
      iter_decision_headings(p.read_text(encoding='utf-8'))]; dups=sorted({n for n in nums if
      nums.count(n)>1}); rows={r['decision_id']:r for r in parse_decisions_md()}; missing=[n for n in
      (23,42,49,68,71,40) if not rows.get(n,{}).get('superseded_by')]; assert not dups, f'DUP numbers across
      live+archive: {dups}'; assert not missing, f'moved entries missing superseded_by: {missing}'; assert
      146 in rows, 'Decision 146 not parsed'; print('OK: no dup numbers; moves carry superseded_by; 146
      present')"
    expected: "OK: no dup numbers; moves carry superseded_by; 146 present"
    fix_if: >-
      A duplicate number exists (an entry was added to the archive without removing the live copy), a moved
      entry lacks superseded_by (missing top marker), or 146 collides/was not added.
  - step: 4
    phase: pre-deploy
    hermetic: false
    graduation: not-applicable
    action: >-
      Confirm Decision 146 is present with its Warehouse ID line and that the H1 was retitled (the stale
      "# Open Decisions" is gone and the file now opens "# Decisions").
    command: >-
      grep -qE '^## Decision 146:' docs/DECISIONS.md && grep -qE '^\*\*Warehouse ID:\*\* dec-146 '
      docs/DECISIONS.md && test "$(head -1 docs/DECISIONS.md)" = "# Decisions" && ! grep -qxE '# Open
      Decisions' docs/DECISIONS.md && echo OK
    expected: OK
    fix_if: 146 missing / wrong Warehouse ID id, or the H1 was not retitled.
  - step: 5
    phase: pre-deploy
    hermetic: false
    graduation: not-applicable
    action: >-
      Confirm the status normalizations landed: Decision 55 header carries "(Supersedes Decision 46)
      (Decided)", Decision 70 header carries "(Decided)", and Decision 27 header carries "(Decided)"
      (operator-confirmed). Decision 40 is ARCHIVED (verified by steps 1-3), not normalized in place.
    command: >-
      grep -qE '^## Decision 55:.*\(Supersedes Decision 46\) \(Decided\)' docs/DECISIONS.md && grep -qE
      '^## Decision 70:.*\(Decided\)' docs/DECISIONS.md && grep -qE '^## Decision 27:.*\(Decided\)'
      docs/DECISIONS.md && echo OK
    expected: OK
    fix_if: Decision 55, 70, or 27 header lacks the explicit "(Decided)" status token.
  - step: 6
    phase: pre-deploy
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Duplicates the standing validate_decisions_size guard (Decision 134 / Decision 145) already registered
      in both the --pre and full tiers; asserted here as a move-safety confirmation of all three ceilings,
      not a new regression guard.
    action: >-
      Confirm all three validate_decisions_size ceilings pass (live bytes, live H2 count, and the combined
      live+archive backstop) after the moves + Decision 146 addition, by calling the check's own issue
      function directly (hermetic; does NOT invoke validate --pre, so no replay recursion).
    command: >-
      bin/venv-python -c "from scripts.checks.decisions.validate_decisions_size import _decisions_size_issues;
      from pathlib import Path; issues=_decisions_size_issues(Path('docs/DECISIONS.md').read_text(encoding='utf-8'),
      Path('docs/DECISIONS_ARCHIVE.md').read_text(encoding='utf-8')); print(chr(10).join(issues) if issues
      else 'OK: live + combined ceilings pass'); assert not issues"
    expected: "OK: live + combined ceilings pass"
    fix_if: >-
      Any ceiling breached -- should not happen (moves reduce live bytes and header count; combined bytes are
      roughly conserved plus the small Decision 146 addition).
  - step: 7
    phase: post-deploy
    action: >-
      OVERSEER-RUN post-merge ETL refresh: re-run the DECISIONS.md -> ops_decisions backfill so ops_decisions
      reflects the resolutions -- Decision 146 is upserted and each moved entry is re-derived from the archive
      file with its unchanged number-keyed dec-NNN identity (upsert-only, no row loss). Requires ducklake_writer
      (agent_platform profile); not run at plan/implement-commit time.
    command: bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md
    expected: >-
      Backfill completes; ops_decisions has a dec-146 row and the moved entries keep their dec-NNN keys with
      the corrected superseded_by / status.
    fix_if: >-
      Backfill errors -- verify the assume-role chain (aws sts get-caller-identity --profile agent_platform)
      and portal reachability; re-run. Do NOT re-stage from any logs/ read cache (warehouse-as-SoT invariant).
