execution_steps:
  - >-
    Retitle the H1 and subtitle of docs/DECISIONS.md (lines 1-3). OLD line 1 "# Open Decisions", OLD line 3
    "This document tracks key architectural and operational decisions that need to be made as the system
    evolves." NEW line 1 "# Decisions"; NEW line 3 "The canonical corpus of ratified architectural and
    operational decisions, and the sole ETL source for the `ops_decisions` warehouse table (Decision 84).
    Fully-superseded entries move to `docs/DECISIONS_ARCHIVE.md` per the archival policy in Decision 146."
  - >-
    Insert Decision 146 at the TOP of docs/DECISIONS.md (after the retitled H1/subtitle, before Decision 145),
    following the current authoring template. Exact text to insert (ASCII hyphens; adjust the number only if
    the execution-time numbering re-check finds 146 taken):

    "## Decision 146: DECISIONS.md is the canonical decision corpus, not an open-decisions-only file;
    fully-superseded entries move to the archive (retitles the stale \"# Open Decisions\" H1; reconciles the
    drifted archival policy to Decision-84-era reality) (Decided)


    **Status:** Decided

    **Date:** 2026-07-21

    **Warehouse ID:** dec-146 (keyed on the decision number; synced to ops_decisions via `ops_data_portal
    --backfill-decisions-md` post-merge, per Decision 84)


    **Problem:** docs/DECISIONS.md opened with the H1 \"# Open Decisions\" and a subtitle framing it as
    decisions \"that need to be made\" -- an open-decisions-only framing that predated Decision 84. Two facts
    made it stale: (1) Decision 84 made this file the SOLE ETL source for the `ops_decisions` warehouse table,
    so it is the canonical corpus of every ratified decision, not a scratchpad of pending ones; (2) the
    archival policy PROJECT_CONTEXT.md once credited to a `strategic_review` enforcer never had a mechanical
    enforcer -- the only surviving open-decisions signal is scripts/session/preflight.py's advisory counter,
    and the strategic_review.prompt.md the policy named was deleted (T-1.13). Audit finding DPI-04
    (audits/decision-log-premise-integrity-8fb581e.yaml) flagged the H1/subtitle drift and the
    enforcer-that-does-not-exist. (PROJECT_CONTEXT.md's policy text was independently reconciled to the
    Decision-134 deterministic-guard framing before this Decision.)


    **Decision:** docs/DECISIONS.md is the canonical decision corpus -- the sole ETL source for `ops_decisions`
    (Decision 84) -- holding ratified decisions regardless of lifecycle status. The H1 is retitled
    \"# Decisions\". Fully-superseded entries move to docs/DECISIONS_ARCHIVE.md with a \"(Superseded by Decision
    NN)\" header suffix per the archive's existing convention. \"Fully superseded\" is a per-entry test: a
    repo-wide search for the decision number returns only its own entry plus already-annotated / superseded
    mentions. An entry still cited as a LIVE constraint stays in the corpus -- so superseded-but-still-cited
    entries (e.g. Decision 44 -> 117 cited by live enforcement code, Decision 58 -> 76 cited by
    ROADMAP-PLATFORM.yaml, Decision 37 -> 116) remain until their citations retire, and archival proceeds in
    bounded, operator-disposed waves rather than one sweep. Because scripts/decisions_md.py parses BOTH files
    (`_DECISIONS_MD_PATHS`), an archive move is warehouse-safe: the entry keeps its number-keyed `dec-NNN`
    identity, the backfill re-upserts it unchanged, and the move only relocates bytes out of the
    decision-scout hot-read path. Archival is operator-disposed (the audit recommends candidates; the operator
    confirms each move), NOT mechanically enforced -- there is no \"keeps-only-open\" guard and none is created
    here. Live-file size pressure is governed by validate_decisions_size (Decision 134; ceiling raised to
    500,000 by the Decision 145 stopgap), whose named relief valves are exactly this archival and
    superseded-body compaction.


    **Rationale:** The \"open decisions\" framing credited an enforcer that does not exist and contradicted the
    post-Decision-84 reality that this file IS the warehouse's decision of record. Recording the correction as
    a numbered Decision (not prose in PROJECT_CONTEXT.md) follows Decision 86: rationale lives in a numbered
    Decision, collocated with the corpus it governs. Archival stays a judgment-based, operator-gated
    disposition rather than an automated sweep because \"fully superseded\" is not mechanically decidable --
    automated duplicate-number detection and any eligibility enforcer are separate, unbuilt scope (audit
    DPI-06).


    **Revisit condition:** if a mechanical archival-eligibility enforcer or duplicate-number guard (DPI-06) is
    ever built, revisit the \"operator-disposed, not mechanically enforced\" clause.


    **Related:** Decision 84 (sole ops_decisions ETL source), Decision 86 (rationale -> numbered Decision),
    Decision 105 (ratification guard resolves headers across both files), Decision 134 (size governance +
    authoring grammar), Decision 145 (byte-ceiling stopgap + archival as the named relief valve), audit DPI-04
    (audits/decision-log-premise-integrity-8fb581e.yaml)."
  - >-
    For each OPERATOR-CONFIRMED archive candidate (23, 42, 49, 68, 71, 40): CUT the entry's full block (from
    its "## Decision N:" header to just before the next "---"/header) out of docs/DECISIONS.md and APPEND it
    to the end of docs/DECISIONS_ARCHIVE.md (after Decision 52 / EOF), each preceded by a "---" separator.
    Transform on append: (a) add the header suffix "(Superseded by Decision NN)" using the accurate superseder
