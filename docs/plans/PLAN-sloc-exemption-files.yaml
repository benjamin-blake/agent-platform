schema_version: 1
slug: "sloc-exemption-files"
intent: >-
  Replace Decision 43's binary SLOC waiver (once `# complexity-waiver: decision-43` is present, a
  Python file may grow without bound) with a per-file SLOC budget ratchet enforced in
  scripts/validate.py. Each scripts/ or src/ file that currently exceeds the 500-SLOC hard cap is
  pinned to its current size in a checked-in config/sloc_budgets.yaml; growth beyond budget fails
  the gate, and budgets only ratchet DOWN. This stops the 17 over-limit waivered files from growing
  and surfaces the 6 stale waivers, without refactoring any file. Faithful to Decision 43, which
  already targets these files for reduction.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-sloc-exemption-files.yaml
phase: >-
  Platform / Directed Growth Governance (Decision 43). No ROADMAP tier_item closure -- additive
  governance hardening on validate.py. The deferred large-file breakdown program is tracked as
  rec-2414 (filed this session), not a roadmap edit.
scope:
  - file: config/sloc_budgets.yaml
    action: Create
    purpose: >-
      The SLOC budget registry. Top-level `budgets:` mapping of repo-relative forward-slash path ->
      integer SLOC budget, one entry per scripts/ or src/ Python file currently exceeding 500 SLOC
      (~17 files). GENERATED at implementation time by `validate --update-sloc-budgets` AFTER all
      code changes land, so validate.py's own growth from this plan is captured in its own budget.
      Empty state is the literal `budgets: {}`. Keys are file paths -> forward-compatible with the
      Decision 80 validate.py decomposition (paths re-pointed at decomposition time).
  - file: scripts/validate.py
    action: Modify
    purpose: >-
      Rewrite validate_sloc_limits() to enforce the ratchet; add _load_sloc_budgets() reader and an
      _update_sloc_budgets() regenerator wired to a new --update-sloc-budgets CLI flag. The
      cyclomatic-complexity gate (validate_cc_limits) and the _WAIVER_PATTERN semantics for CC are
      left UNCHANGED.
  - file: tests/test_validate.py
    action: Modify
    purpose: >-
      Add tests under TestValidateSlocLimits for: growth-beyond-budget fails, at-budget passes,
      below-budget passes with advisory, oversized-but-unregistered fails (bare waiver insufficient),
      stale SLOC waiver (now <=500) is advisory-not-failing, and --update-sloc-budgets regen is
      downward-only + idempotent. tests/ is NOT scanned by validate_sloc_limits, so test growth is safe.
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Add Decision 102 recording the amended waiver semantics: a `# complexity-waiver: decision-43`
      comment no longer authorises unbounded SLOC; oversized files are pinned via the
      config/sloc_budgets.yaml downward-only ratchet. Decision 43's CC row is explicitly preserved.
      After editing, run `ops_data_portal --backfill-decisions-md` to sync ops_decisions (warehouse SoT).
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - "config/sloc_budgets.yaml exists with a top-level `budgets:` mapping; every value is an int and every key is a forward-slash repo-relative path that currently exceeds 500 SLOC."
  - "Every scripts/ or src/ Python file currently >500 SLOC appears as a key in config/sloc_budgets.yaml (no oversized file is left unregistered)."
  - "validate_sloc_limits fails (appends to `failed`) when a registered file's current SLOC exceeds its budget."
  - "validate_sloc_limits fails when a file exceeds 500 SLOC and is NOT registered in config/sloc_budgets.yaml, EVEN IF it carries a `# complexity-waiver: decision-43` comment."
  - "validate_sloc_limits does NOT fail (advisory only) when a registered file's current SLOC is at or below its budget."
  - "validate_sloc_limits does NOT fail for a file <=500 SLOC that still carries the waiver comment; it is reported as an advisory stale-waiver note (the comment may still be load-bearing for the CC gate)."
  - "`validate --update-sloc-budgets` regenerates config/sloc_budgets.yaml: lowers any budget whose file shrank, seeds newly-oversized files at current SLOC, drops files now <=500 or deleted, and NEVER raises an existing budget."
  - "Running `validate --update-sloc-budgets` twice in a row leaves config/sloc_budgets.yaml byte-identical (idempotent at steady state)."
  - "validate_cc_limits behaviour is unchanged (no edit to the CC gate or _WAIVER_PATTERN semantics for CC)."
  - "Decision 102 exists in docs/DECISIONS.md and amends Decision 43's SLOC row while preserving its CC row."
  - "bin/venv-python -m scripts.validate --pre passes (SLOC gate green with the seeded budgets)."
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Unit tests for the rewritten SLOC gate and regen pass.
    command: bin/venv-python -m pytest tests/test_validate.py -q
    expected: "All tests pass (exit 0), including the new TestValidateSlocLimits ratchet cases."
    fix_if: "A test fails; read the assertion and fix validate_sloc_limits / _update_sloc_budgets within scope."
  - step: 2
    phase: pre-deploy
    action: The budget registry is present, parses as YAML, and registers every currently-oversized file.
    command: bin/venv-python -c "import yaml,pathlib; b=yaml.safe_load(pathlib.Path('config/sloc_budgets.yaml').read_text())['budgets']; over=[str(p.relative_to('.')).replace(chr(92),'/') for d in ('scripts','src') for p in pathlib.Path(d).rglob('*.py') if p.name!='__init__.py' and len([l for l in p.read_text(errors='replace').splitlines() if l.strip() and not l.strip().startswith('#')])>500]; missing=[f for f in over if f not in b]; print('MISSING',missing); assert not missing"
    expected: "Prints MISSING [] -- every oversized file is registered."
    fix_if: "MISSING is non-empty; run `bin/venv-python -m scripts.validate --update-sloc-budgets` to seed the missing files, then re-run."
  - step: 3
    phase: pre-deploy
    action: Regen is idempotent at steady state (no drift after a fresh --update-sloc-budgets).
    command: bin/venv-python -m scripts.validate --update-sloc-budgets && git diff --exit-code config/sloc_budgets.yaml && echo REGEN_IDEMPOTENT
    expected: "Prints REGEN_IDEMPOTENT (git diff finds no change; budgets already at current)."
    fix_if: "git diff shows changes; the seeded budgets did not reflect the final tree -- regenerate as the LAST code step and re-commit."
  - step: 4
    phase: pre-deploy
    action: Growth beyond budget is rejected (negative test via a temporary 1-line append to a registered file).
    command: F=$(bin/venv-python -c "import yaml; print(next(iter(yaml.safe_load(open('config/sloc_budgets.yaml'))['budgets'])))"); printf '\nassert True  # ratchet-probe\n' >> "$F"; bin/venv-python -m scripts.validate --pre; RC=$?; git checkout -- "$F"; test $RC -ne 0 && echo GROWTH_REJECTED
    expected: "Prints GROWTH_REJECTED -- validate --pre exits non-zero when a registered file grows past budget. The probe line is reverted by git checkout."
    fix_if: "validate --pre still passes after the append; the ratchet is not enforcing current<=budget. Fix validate_sloc_limits."
  - step: 5
    phase: pre-deploy
    action: Decision 102 is present and references Decision 43.
    command: grep -q "^## Decision 102" docs/DECISIONS.md && grep -q "Decision 43" docs/DECISIONS.md && echo DECISION_OK
    expected: "Prints DECISION_OK."
    fix_if: "Decision 102 heading missing or does not reference Decision 43; add/repair the entry."
  - step: 6
    phase: pre-deploy
    action: Authoritative fast-tier presubmit passes.
    command: bin/venv-python -m scripts.validate --pre
    expected: "Exit 0 -- SLOC gate green with seeded budgets; no other regression."
    fix_if: "A check fails; read the failing check and fix within scope."
constraints:
  - "Do NOT refactor or split any oversized file in this plan. Scope is the ratchet mechanism + the registry + tests + the Decision. Breakdown is rec-2414 (filed this session)."
  - "Do NOT touch validate_cc_limits or change _WAIVER_PATTERN semantics for the cyclomatic-complexity gate. The same comment waives both gates; stale SLOC waivers must NOT be auto-removed because the comment may still be needed for CC (decision-scout clause (d))."
  - "Do NOT edit docs/ROADMAP-PLATFORM.yaml. The deferred breakdown is tracked as rec-2414 per operator direction, not a roadmap edit."
  - "config/sloc_budgets.yaml MUST be generated by `validate --update-sloc-budgets` as the LAST implementation step (after all scripts/validate.py and other code edits are final), so validate.py's own post-change SLOC is captured in its budget. Hand-authoring the file risks a stale validate.py budget that fails its own gate."
  - "The regen is downward-only: an existing budget is NEVER raised by --update-sloc-budgets. Raising a budget (legitimately growing a file) requires a manual, reviewable edit to config/sloc_budgets.yaml. min(current_sloc, existing_budget) for known files; seed-at-current for newly-oversized files."
  - "Forward-compatibility (Decision 80): the registry keys on file paths. When validate.py is later decomposed under Decision 80, the keys are re-pointed at the new module paths via --update-sloc-budgets. State this in the Decision 102 text and a header comment in config/sloc_budgets.yaml."
  - "PUBLIC repo (Decisions 73/83/101): no AWS account IDs/ARNs/secrets/alpha/internal hostnames in any artefact. The budget registry is pure file-path -> int data."
  - "validate.py stays the single source of truth (Decision 80 invariant): the new gate logic lives in validate.py, not in ci.yml. No new ci.yml job is added -- the SLOC gate already runs in --pre and full tiers."
  - "No rescue agents or workaround loops (Decision 55)."
context:
  - "SLOC gate today (scripts/validate.py:1156 validate_sloc_limits): scans scripts/ and src/ for *.py (excluding __init__.py and _SLOC_EXCLUDE_DIRS = pip/lambda-packages/docker/terraform/.venv/node_modules); computes SLOC = non-blank, non-comment lines; if SLOC>500 and the first 10 lines lack `# complexity-waiver: decision-43`, it fails. A waiver currently skips the file entirely (unbounded growth). _SLOC_LIMIT=500, _WAIVER_PATTERN at line 1151 (shared with validate_cc_limits at line 1193)."
  - "Current waivered files in scripts/+src/ (24 total incl. tests/, which the gate does not scan). 17 are >500 SLOC and get registered: validate.py 3142, execute_recommendation.py 2862, session_preflight.py 1619, ducklake_neon_smoke_test.py 1343, ops_data_portal.py 1167, executor/postflight.py 1157, executor/step_runner.py 988, data_quality_runner.py 835, src/common/ducklake_runtime.py 829, build_lambda.py 771, executor/plan.py 752, platform_roadmap.py 709, session_postflight.py 652, ops_writer.py 571, src/lambdas/ducklake_writer/handler.py 569, executor/batch.py 568, copilot_wrapper.py 546. (validate.py's number will rise by ~40 lines from this change -- capture via regen as the LAST step.) 6 are STALE (<=500, still carry the waiver, likely for CC): product_roadmap.py 451, sync_ops.py 429, src/data/feature_engine.py 371, lambda_manifest.py 351, llm_client.py 331, executor/formatters.py 232."
  - "Decision-scout gate verdict: FLAGS_FOUND (one NOTE, no BLOCK). CITE: Decision 43 (amended -- SLOC row -> ratchet, CC row preserved), Decision 80 (Build-Tooling Direction; ratifies tool-free validate.py decomposition as a separate plan -- rec-2414 is its consumer; the registry must be forward-compatible with that decomposition), Decision 73 (one-directional enforced-budget ratchet precedent). RELATED: Decision 60 (two-tier validation -- gate runs in --pre advisory + full authoritative), Decision 86 (rationale routed to a numbered Decision, no new prose doc), Decision 84 (the follow-on is filed via the ops portal, not hand-edited; config/sloc_budgets.yaml is checked-in config, outside the warehouse-SoT invariant)."
  - "Decision 80 NOTE (no pivot): adding a registry + CLI is net-additive machinery on a file Decision 80 steers toward decomposition. Resolution baked into the plan: the registry keys on file paths (forward-compatible -- re-pointed at decomposition time), and the Decision 102 text states this. A budget map is do-less relative to a refactor, so it is compatible with Decision 80 clause 1."
  - "rec-2414 (filed this session, source=planning, effort L, priority Low) is the home for the deferred breakdown program: split each registered file below 500 SLOC, drop it from the registry via --update-sloc-budgets, until `budgets: {}`. This plan does NOT resolve rec-2414 (bundled_recommendations is empty); it creates the registry rec-2414 consumes."
  - "Decision 43 (docs/DECISIONS.md:1981) explicitly lists these waivered files as 'targeted for reduction via Area A extractions', so a downward-only ratchet is faithful to the original decision, not a new direction. The day-1 waiver list named validate.py/step_runner/postflight/plan/execute_recommendation -- all still oversized."
  - "Next Decision number is 102 (current max is 101). DECISIONS.md is the numbering authority; ops_decisions rebuilds from it via `ops_data_portal --backfill-decisions-md`."
  - "Additive governance plan: resolves no recs and retires no surface -> Closure Obligation exempt. No open ci-rca recs at planning time (HARD BLOCK not in effect). Branch was 0 commits behind origin/main at planning time; no scope-file overlap with main divergence."
  - "V2 tier: validate.py is Python source under test (tests/test_validate.py). Not Lambda-packaged (config/ and scripts/validate.py are not in any src/lambdas manifest), no .tf in scope -> no Lambda Deployment Assessment, no Infrastructure Assessment."
pre_implementation_checklist:
  - Branch confirmed not on main
  - docs/PROJECT_CONTEXT.md read
  - DECISIONS.md scope confirmed via decision-scout gate (FLAGS_FOUND -- one NOTE resolved in-plan, no BLOCK)
  - scripts/validate.py validate_sloc_limits / validate_cc_limits / argparse located and read
  - tests/test_validate.py TestValidateSlocLimits located and read
  - Acceptance criteria understood and verifiable
execution_steps:
  - >-
    In scripts/validate.py, add a module-level helper `_load_sloc_budgets() -> dict[str, int]` that
    reads config/sloc_budgets.yaml (ROOT / "config" / "sloc_budgets.yaml"), returns its `budgets`
    mapping (forward-slash repo-relative path -> int), and returns {} if the file is missing or has
    no `budgets` key. Use the same lazy `import yaml` pattern other checks in validate.py use.
  - >-
    Rewrite validate_sloc_limits(failed) to enforce the ratchet. Keep the same directory walk
    (scripts/ + src/, skip __init__.py and _SLOC_EXCLUDE_DIRS) and SLOC computation. Maintain two
    lists: `errors` (cause failure) and `advisories` (printed, never fail). For each file with
    rel = forward-slash relative path and has_waiver = _WAIVER_PATTERN.search(header of first 10 lines):
    (a) if sloc <= _SLOC_LIMIT: if has_waiver, append an advisory "stale SLOC waiver (<=500); the
    comment may still be needed for the CC gate -- verify before removing", then continue.
    (b) if sloc > _SLOC_LIMIT and rel in budgets: if sloc > budget -> error
    "{rel}: {sloc} SLOC exceeds budget {budget}. Reduce, or (with justification) raise the budget in
    config/sloc_budgets.yaml."; elif sloc < budget -> advisory "{rel}: {sloc} below budget {budget};
    run `validate --update-sloc-budgets` to ratchet down."; else pass.
    (c) if sloc > _SLOC_LIMIT and rel NOT in budgets -> error
    "{rel}: {sloc} SLOC exceeds limit {_SLOC_LIMIT} and is not registered in config/sloc_budgets.yaml.
    Reduce below {_SLOC_LIMIT}, or register via `validate --update-sloc-budgets`. A bare
    '# complexity-waiver: decision-43' no longer authorises unbounded SLOC." (applies regardless of
    has_waiver). Print advisories under a clear sub-header, then errors; append
    "SLOC limits (Decision 43)" to failed iff errors is non-empty.
  - >-
    In scripts/validate.py, add `_update_sloc_budgets() -> None` that regenerates config/sloc_budgets.yaml.
    Walk scripts/ + src/ with the SAME exclusions; compute SLOC for each *.py (skip __init__.py).
    existing = _load_sloc_budgets(). Build new_budgets: for each file with sloc > _SLOC_LIMIT, set
    new_budgets[rel] = min(sloc, existing[rel]) if rel in existing else sloc (downward-only: never
    raise a known budget; seed new oversized files at current). Files now <=500 or deleted are simply
    not added (dropped). Write YAML with a top-level `budgets:` key, paths sorted, ints as plain
    scalars; empty -> `budgets: {}`. Prepend a header comment block (lines starting with '#') explaining
    the ratchet, the downward-only rule, and the Decision 80 path-forward-compatibility note. Print a
    summary of added / lowered / dropped entries. The function exits 0.
  - >-
    Wire a new argparse flag in main(): `parser.add_argument("--update-sloc-budgets", action="store_true",
    help="Regenerate config/sloc_budgets.yaml from the current tree (downward-only ratchet). Lowers
    shrunk budgets, seeds newly-oversized files, drops files now <=500. Never raises an existing budget.")`.
    Handle it early in main() (alongside the --coverage branch, before the branch-guard/--pre logic):
    if args.update_sloc_budgets: _update_sloc_budgets(); sys.exit(0).
  - >-
    Create config/sloc_budgets.yaml by running `bin/venv-python -m scripts.validate --update-sloc-budgets`
    AFTER the validate.py edits above are final. This seeds all ~17 oversized files (including validate.py
    at its post-change SLOC). Confirm the file has a `budgets:` key and registers validate.py.
  - >-
    Add tests to tests/test_validate.py under TestValidateSlocLimits (use tmp_path + monkeypatch of the
    module ROOT / budgets-path as the existing tests do; see test_flags_oversized_file /
    test_allows_waivered_file patterns). Cover: (1) registered file at sloc>budget -> failed non-empty;
    (2) registered file at sloc==budget -> failed empty; (3) registered file at sloc<budget -> failed empty
    (advisory path); (4) oversized file NOT in budgets WITH a waiver -> failed non-empty (bare waiver
    insufficient); (5) file <=500 with waiver -> failed empty (stale-waiver advisory, not a failure);
    (6) _update_sloc_budgets downward-only: pre-seed a budget below current, regen, assert it is NOT raised;
    and a newly-oversized unregistered file gets seeded; a file now <=500 is dropped. Drive the budget
    source via the same config path the code reads (point _load_sloc_budgets at a tmp file via monkeypatch
    or by writing into a tmp ROOT).
  - >-
    Add Decision 102 to docs/DECISIONS.md (insert above Decision 101, newest-first ordering). Title e.g.
    "Decision 102: SLOC Waiver Ratchet (amends Decision 43)". State: the `# complexity-waiver: decision-43`
    comment no longer authorises unbounded SLOC; oversized scripts/+src/ files are pinned to current size
    in config/sloc_budgets.yaml and enforced at current<=budget by validate_sloc_limits; budgets ratchet
    DOWN only (raising requires a manual reviewed edit); the cyclomatic-complexity row of Decision 43 is
    UNCHANGED and the shared waiver comment still waives CC; the registry is forward-compatible with the
    Decision 80 validate.py decomposition (keys re-pointed at decomposition time); the breakdown program is
    tracked as rec-2414. Related: Decision 43, Decision 80, Decision 73. Mark status Decided / June 2026.
  - >-
    Sync the decision to the warehouse: `bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md`
    (idempotent ETL from DECISIONS.md -> ops_decisions). If creds/network are unavailable, note it in the
    PR body for a follow-up backfill; do not hand-edit the ops cache.
  - >-
    Re-run `bin/venv-python -m scripts.validate --update-sloc-budgets` one final time after the DECISIONS.md
    and test edits (these do not change scripts/+src/ SLOC, so it should be a no-op), then execute the full
    Verification Plan steps 1-6; loop until all pass. On any failure, fix within scope and re-run.
  - "Report: the validate_sloc_limits rewrite, the seeded config/sloc_budgets.yaml entries, the new tests, Decision 102 text, and each VP step's result."
work_areas: []
rollback: >-
  Revert scripts/validate.py to restore the prior binary-waiver validate_sloc_limits and drop the
  --update-sloc-budgets flag; delete config/sloc_budgets.yaml; revert the tests/test_validate.py
  additions; remove Decision 102 from docs/DECISIONS.md and re-run --backfill-decisions-md. No deployed
  artefact, no infra, no CI job added -- removal is clean and total. rec-2414 can be closed as declined
  if the ratchet is abandoned.
