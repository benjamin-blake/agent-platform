work_areas: []
rollback: >-
  Pure refactor on a feature branch; abandon the branch if equivalence cannot go green (nothing
  deployed; not Lambda-packaged). Post-merge regression: revert the squash commit -- facade, package,
  test migration, and budget regen land atomically, so a single revert restores the monolith.
