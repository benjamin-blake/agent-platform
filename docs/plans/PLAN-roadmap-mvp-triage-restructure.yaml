schema_version: 1
slug: "roadmap-mvp-triage-restructure"
intent: >-
  Action the rescope findings of the platform-roadmap MVP-triage audit
  (audits/platform-roadmap-mvp-triage-7d57a0d.yaml: RMAP-06, RMAP-07, RMAP-08..RMAP-13, plus
  question_answers Q1) as roadmap-bookkeeping edits to docs/ROADMAP-PLATFORM.yaml. Reconciles the
  roadmap's active surface with delivered reality (the Decision 91 named-verb surface, the T2.19/T2.26
  DuckLake migrations) and corrects three sequencing defects on the telemetry / executor critical path,
  moving the platform closer to a closed self-improvement loop (North Star) by removing eligibility noise
  and un-blurring what actually gates the loop.
plan_type: IMPLEMENTATION
verification_tier: V1
plan_path: docs/plans/PLAN-roadmap-mvp-triage-restructure.yaml
phase: >-
  Platform MVP-triage close-out (final wave). Follows PR #504 (RMAP-01..05 closeouts) and PR #505
  (RMAP-14..28 deferrals); actions the audit's rescope + Q1-sequencing residual. Touches tier_items
  across T0/T1/T2/T3/T4 and candidate_decision CD.18. No product-roadmap edge.
scope:
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      All four edit groups: (1) verb-surface consolidation (T0.7a/b/c, T1.1, T1.2, T1.3 rewritten;
      new closeout item T1.16 created); (2) T2.7 tombstoned to reserved with its residual folded into
      T2.26 (c4 pointer inverted); (3) T4.3 rewritten to the producer-write-repoint MVP slice, new
      deferred_post_mvp item T4.12 created for the five agents + schedule deletion + all provider routing,
      T5.3 c1/c2 met_by re-pointed, CD.28 inventory + T4.3 intent updated in lockstep per Decision 116;
      (4) T3.2 gains depends_on T2.36, and CD.18 flipped state: ratified per the drafted ratification block.
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Add the new numbered Decision ratifying CD.18 option (a) -- revive the stashed
      agent/ops-decisions-phase-2 WIP into T1.5's decomposition (DECISIONS.md is the decision-numbering
      authority; ops_decisions rebuilds from it via the portal backfill). Conditional on the CD.18
      ratification block; executed at /implement time behind its confirmation gate, not during planning.
