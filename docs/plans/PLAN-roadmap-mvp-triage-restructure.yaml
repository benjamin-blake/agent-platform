verification_plan:
  - step: 1
    phase: pre-deploy
    action: "YAML parses cleanly after all edits."
    command: "bin/venv-python -c \"import yaml; yaml.safe_load(open('docs/ROADMAP-PLATFORM.yaml'))\" && echo PARSE_OK"
    expected: "Prints PARSE_OK with no traceback."
    fix_if: "A YAMLError or indentation error indicates a malformed edit block; re-inspect the changed item."
  - step: 2
    phase: pre-deploy
    action: "Loader validates the full document, incl. schema + all model_validator invariants (cycle check, gate resolution, no-live-dep-on-deferred)."
    command: "bin/venv-python -m scripts.platform_roadmap"
    expected: "Prints 'PASS: docs/ROADMAP-PLATFORM.yaml validates against RoadmapDocument schema.'"
    fix_if: "A ValueError naming 'no live item may depend on a parked item' means T4.12 has a live (not_started/in_progress) dependent -- check nothing was mistakenly pointed at T4.12; a gate-resolution error means a gate ref (e.g. CD.15->T2.7) failed -- confirm the reserved id was preserved."
  - step: 3
    phase: pre-deploy
    action: "T4.12 has no live dependents (explicit no-live-dep assertion for the newly-deferred item)."
    command: "bin/venv-python -c \"import yaml; d=yaml.safe_load(open('docs/ROADMAP-PLATFORM.yaml')); items=d['tier_items']; live={'not_started','in_progress'}; bad=[i['id'] for i in items if i.get('status') in live and 'T4.12' in (i.get('depends_on') or [])]; print('LIVE_DEPENDENTS_ON_T4.12:', bad); assert not bad\""
    expected: "Prints LIVE_DEPENDENTS_ON_T4.12: [] and does not assert."
    fix_if: "A non-empty list means a live item depends on the parked T4.12; that dependency must instead point at the active T4.3 (which keeps its id) or be removed."
  - step: 4
    phase: pre-deploy
    action: "Six verb-surface items still exist, are status not_started, and carry no import_mode criterion on T0.7a/T0.7b; T1.16 and T4.12 exist; T2.7 is reserved."
    command: "bin/venv-python -c \"import yaml; d=yaml.safe_load(open('docs/ROADMAP-PLATFORM.yaml')); m={i['id']:i for i in d['tier_items']}; assert m['T1.16']['tier']=='T1'; assert m['T4.12']['status']=='deferred_post_mvp'; assert m['T2.7']['status']=='reserved'; import json; joined=lambda i: json.dumps(m[i]); assert 'import_mode' not in joined('T0.7a'); assert 'import_mode' not in joined('T0.7b'); assert 'T2.36' in (m['T3.2'].get('depends_on') or []); print('STRUCTURE_OK')\""
    expected: "Prints STRUCTURE_OK."
    fix_if: "AssertionError names the failed invariant -- fix that specific item (missing new item, un-flipped status, leftover import_mode text, or missing T3.2 edge)."
  - step: 5
    phase: pre-deploy
    action: "CD.18 ratification shape is canonical (Decision 105) when the ratification block is executed."
    command: "bin/venv-python -c \"import yaml; d=yaml.safe_load(open('docs/ROADMAP-PLATFORM.yaml')); cd={c['id']:c for c in d['candidate_decisions']}['CD.18']; assert cd['state']=='ratified'; ra=cd['ratified_as']; fv=cd['filed_via']; assert ra.startswith('dec-') and fv=='ops_decisions:'+ra, (ra,fv); print('CD18_RATIFICATION_OK', ra)\""
    expected: "Prints CD18_RATIFICATION_OK dec-NNN with matching ratified_as / filed_via."
    fix_if: "Mismatch between ratified_as and filed_via, or a non-dec-NNN id -- align both fields to the same dec-NNN allocated in DECISIONS.md. (Skip/adapt only if CD.18 ratification is deferred, which is NOT the chosen path.)"
  - step: 6
    phase: pre-deploy
    action: "Full fast-tier presubmit gate is green (authoritative pre-merge gate when run by PR CI)."
    command: "bin/venv-python -m scripts.validate --pre"
    expected: "Exit 0; all checks pass including validate_platform_roadmap and the candidate-decision-ratification referential guard."
    fix_if: "A validate_candidate_decision_ratification failure means the DECISIONS.md Decision header / dec-NNN / roadmap flip are inconsistent -- reconcile per Decision 105. Any roadmap-schema failure re-runs step 2 for the specific error."
constraints:
  - "Roadmap-bookkeeping ONLY: docs/ROADMAP-PLATFORM.yaml is the sole roadmap edit; docs/DECISIONS.md is touched solely to record the CD.18 ratification Decision. No source code, contracts, skills, or PROJECT_CONTEXT.md edits. Do NOT file any recommendations (explicit task constraint)."
  - "Status-Trusted-Never-Inferred: this plan does NOT flip any tier_item to complete. The six verb-surface items stay not_started and flip only when the T1.16 Wave-4 closeout plan verifies them. Criterion/status flips are /implement bookkeeping on a verified VP pass, never inferred here."
  - "No rescue agents or workaround loops (Decision 55). A failed validate --pre is diagnosed and the edit corrected, never bypassed."
  - "CD.18 ratification executes at /implement time behind the execution-time human confirmation gate (Decision 105 / planning skill Step 5b): the ops_data_portal write and the roadmap state flip are NOT performed during planning. Re-check the max '## Decision NNN' header in DECISIONS.md at execution time (numbering race) and use the next free number in BOTH the header and the roadmap ratified_as/filed_via fields."
  - "Preserve tombstoned ids: T2.7 stays status: reserved (never deleted) because CD.15's gate list and T2.26 coordination prose reference it; gates on reserved items are inert (T1.4 precedent)."
  - "No-live-dep-on-deferred (Decision 93): T4.3 must keep its id and stay active so its CD.16/CD.27/CD.28 gate refs and the completed-T5.3 depends_on edge remain valid; the new T4.12 must have zero live dependents."
