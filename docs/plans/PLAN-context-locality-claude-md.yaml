schema_version: 1
slug: "context-locality-claude-md"
intent: >-
  Convert the placement and Lambda-bundling invariants that today live in non-auto-loading READMEs
  (or nowhere) into three directory CLAUDE.md files that auto-load exactly where agents edit
  (scripts/, config/, docs/), and turn the docs/-root placement convention into a machine-checked
  rule inside the existing validate_placement gate -- so the agent-first repository teaches its own
  edit-time rules and fails CI on a NEW out-of-class docs-root file (NS.4). Implements audit
  findings RS-05 and the RS-03 docs-root allowlist.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-context-locality-claude-md.yaml
phase: >-
  Repository-structure restructure Phase P3 (audit finding RS-05 [medium] + the RS-03 docs-root
  allowlist, from audits/repository-structure-cb02572.yaml). Runs AFTER P1 (RS-04 file-router
  registry + validate_placement link-validity check) and P2 (RS-02/RS-03 stray consolidation), both
  merged at origin/main 69b209a. Platform axis; RS-05/RS-03 are novel unowned findings
  (dedup_hit_count 0) with no owning tier_item. Context-locality + class-home routing per Decision 86
  / NS.4. IMPLEMENTATION type (STRATEGIC frozen, Decision 67).
scope:
  - file: scripts/CLAUDE.md
    action: Create
    purpose: >-
      Auto-loading edit-time rules for scripts/: the root-vs-subpackage placement rule (root = entry
      points + genuine singles; any >=3-file prefix family is a subpackage; governs NEW files now,
      existing families migrate under RS-01/rec-164), the bin/venv-python invocation rule, and the
      pointer to the checks registry (scripts/checks/registry.py). Verbatim body in execution_steps.
  - file: config/CLAUDE.md
    action: Create
    purpose: >-
      Auto-loading edit-time rules for config/: the T-1.7 three-zone layout + the "config/agent/ is
      never Lambda-bundled" invariant (converted from config/README.md + config/agent/README.md) +
      the CD.23 README-is-projection rule. Verbatim body in execution_steps.
  - file: docs/CLAUDE.md
    action: Create
    purpose: >-
      Auto-loading edit-time rules for docs/: the docs-root class allowlist, the class->home map
      (plans/, contracts/, audit-prompts/, plans/reports/, dq/, runbooks/, intent-migration/), and
      the RS-07 plans-lifecycle statement (active at docs/plans/ root; completed/deprecated under
      docs/plans/archive/). Verbatim body in execution_steps. NOTE: docs/CLAUDE.md is itself a
      depth-1 docs-root file, so CLAUDE.md must be in the allowlist (see scope row for file-router).
  - file: config/README.md
    action: Modify
    purpose: >-
      Reduce to a CD.23 portal projection: replace the three-zone bullet block (current lines 3-7)
      with a short pointer to config/CLAUDE.md; the invariant now lives once, in config/CLAUDE.md.
      PRESERVE the rest of the file (human config reference, env vars, troubleshooting) unchanged --
      it is not an edit-time invariant and is not duplicated in CLAUDE.md. Verbatim replacement in
      execution_steps.
  - file: config/agent/README.md
    action: Modify
    purpose: >-
      Reduce to a CD.23 portal projection: a short pointer stub to config/CLAUDE.md (the file is
      entirely invariant content, all of which moves to config/CLAUDE.md). Verbatim body in
      execution_steps. No live code/infra references it (grep-verified).
  - file: docs/contracts/file-router.yaml
    action: Modify
    purpose: >-
      Append the sibling top-level key docs_root_allowlist: (allowed_files list of the 10 sanctioned
      governance root files INCLUDING CLAUDE.md, + grandfathered_globs for the retiring INTENT-* /
      DECISIONS* / SESSION_LOG* sets). This is the placement-registry key the P1 header explicitly
      reserved; file-router.yaml is non-ritual (its header opts it out of validate_contract_drift),
      so the addition is drift-safe. Verbatim block in execution_steps.
  - file: scripts/checks/hygiene/validate_placement.py
    action: Modify
    purpose: >-
      Extend the EXISTING registered validate_placement check (a rule inside it, NOT a new registered
      check -- no registry/facade edit) with the docs-root allowlist scan: two helpers
      (_load_docs_root_allowlist, _docs_root_stray_files) + a block that reuses the already-computed
      git ls-files snapshot to fail any NEW depth-1 docs-root file outside the allowlist. Absent key
      -> skip (back-compat); malformed key -> fail. Verbatim code in execution_steps.
  - file: tests/test_validate.py
    action: Modify
    purpose: >-
      Add unit tests to TestValidatePlacement covering the new allowlist logic to 100% new-code
      coverage (per the scripts/checks/** -> tests/test_validate.py mapping, Decision 104), including
      a regression test that docs/CLAUDE.md is allowlisted and not flagged by intent-doc-freeze.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    RS-05: scripts/CLAUDE.md, config/CLAUDE.md, and docs/CLAUDE.md all exist and carry their named
    invariants -- scripts/ (root-vs-subpackage placement + bin/venv-python + checks-registry
    pointer), config/ (T-1.7 three-zone + "config/agent/ NOT bundled into any Lambda zip"), docs/
    (docs-root allowlist + class->home map + RS-07 plans lifecycle).
  - >-
    config/README.md and config/agent/README.md are reduced to CD.23 portal projections that point
    at config/CLAUDE.md and no longer restate the three-zone/bundling invariant (config/README.md's
    "Bundled into Lambda zips" three-zone bullet block is gone).
  - >-
    RS-03: docs/contracts/file-router.yaml carries a docs_root_allowlist key whose allowed_files
    includes all 10 governance surfaces (the 9 sanctioned files + CLAUDE.md) and whose
    grandfathered_globs cover INTENT-*.md, DECISIONS.md, DECISIONS_ARCHIVE.md, SESSION_LOG.md,
    SESSION_LOG_ARCHIVE.md.
  - >-
    RS-03 enforcement: validate_placement fails when a NEW out-of-class file is added at the docs
    root (proven by the staged-probe VP step), and PASSES on the current tree (all 27 post-merge
    docs-root files -- 26 existing + docs/CLAUDE.md -- are allowlisted or grandfathered), so it is
    TRUE at merge.
  - >-
    The INTENT-*/DECISIONS*/SESSION_LOG* grandfathered sets are NOT stray-flagged, and docs/CLAUDE.md
    is not flagged by validate_intent_doc_freeze (self-consistency: the plan does not fail on the
    file it creates).
  - >-
    New allowlist logic in validate_placement.py has 100% unit-test coverage in
    tests/test_validate.py; the existing link-validity behaviour and its tests are unchanged.
  - >-
    validate.py --pre passes green (authoritative pre-merge gate), and no Lambda build/deploy is
    triggered (compute_affected_artifacts over the scope files returns {} -- V2 confirmed).
verification_plan:
  - step: 1
    phase: pre-deploy
    hermetic: false
    action: Validate this PLAN document against the PlanDocument schema.
    command: bin/venv-python -m scripts.plan_document docs/plans/PLAN-context-locality-claude-md.yaml
    expected: Reports the plan validates against the PlanDocument schema (no errors).
    fix_if: A schema error names the offending field; correct it (extra keys forbidden; every VP step needs a non-empty command).
  - step: 2
    phase: pre-deploy
    hermetic: false
    action: Confirm the three CLAUDE.md files exist and carry their named invariant anchors.
    command: >-
      test -f scripts/CLAUDE.md && test -f config/CLAUDE.md && test -f docs/CLAUDE.md && grep -q 'subpackage' scripts/CLAUDE.md && grep -q 'bin/venv-python' scripts/CLAUDE.md && grep -q 'registry.py' scripts/CLAUDE.md && grep -qi 'three-zone' config/CLAUDE.md && grep -q 'NOT bundled into any Lambda zip' config/CLAUDE.md && grep -q 'docs_root_allowlist' docs/CLAUDE.md && grep -q 'docs/plans/archive/' docs/CLAUDE.md && echo CLAUDE_MD_OK
    expected: Prints CLAUDE_MD_OK (all three files present with their invariant anchors).
    fix_if: A missing file or absent anchor means the body was not written per execution_steps; add the missing content.
  - step: 3
    phase: pre-deploy
    hermetic: false
    action: Confirm both config READMEs are reduced to CD.23 projections pointing at config/CLAUDE.md and no longer restate the bundling invariant.
    command: >-
      grep -q 'config/CLAUDE.md' config/README.md && grep -q 'config/CLAUDE.md' config/agent/README.md && ! grep -q 'Bundled into Lambda zips' config/README.md && echo READMES_REDUCED
    expected: Prints READMES_REDUCED (both point at config/CLAUDE.md; the old three-zone "Bundled into Lambda zips" bullet is gone from config/README.md).
    fix_if: If a pointer is missing or the old three-zone bullet block remains, re-apply the verbatim README edits from execution_steps.
  - step: 4
    phase: pre-deploy
    hermetic: false
    action: Confirm the docs_root_allowlist key exists with the 10 governance files (incl CLAUDE.md) and the grandfathered globs.
    command: >-
      bin/venv-python -c "import yaml; a=yaml.safe_load(open('docs/contracts/file-router.yaml'))['docs_root_allowlist']; ok = 'CLAUDE.md' in a['allowed_files'] and len(a['allowed_files'])==10 and 'INTENT-*.md' in a['grandfathered_globs'] and 'DECISIONS_ARCHIVE.md' in a['grandfathered_globs'] and 'SESSION_LOG_ARCHIVE.md' in a['grandfathered_globs']; print('ALLOWLIST_OK' if ok else 'ALLOWLIST_FAIL')"
    expected: Prints ALLOWLIST_OK.
    fix_if: ALLOWLIST_FAIL means an entry is missing/misspelled; correct the docs_root_allowlist block (CLAUDE.md must be present; allowed_files must be exactly 10).
  - step: 5
    phase: pre-deploy
    hermetic: false
    action: Run validate_placement against the REAL tree -- both link-validity (RS-04) and the docs-root allowlist (RS-03) must pass now (TRUE at merge; grandfathered sets + docs/CLAUDE.md not flagged).
    command: >-
      bin/venv-python -c "from scripts.checks.hygiene.validate_placement import validate_placement; f=[]; validate_placement(f); print('PLACEMENT_OK' if not f else 'PLACEMENT_FAIL: '+'; '.join(f))"
    expected: Prints PLACEMENT_OK (zero dead targets, zero docs-root strays -- all 27 docs-root files allowlisted or grandfathered).
    fix_if: PLACEMENT_FAIL lists the offender; if a real docs-root file is flagged, add it to allowed_files/grandfathered_globs (it is a genuine governance/retiring surface); if a dead target, fix that file-router row.
  - step: 6
    phase: pre-deploy
    hermetic: false
    action: Enforcement negative-proof -- a NEW out-of-class docs-root file must fail the check. Stage a probe stray, run the check, expect it flagged, then unstage and remove it (self-cleaning).
    command: >-
      tmpf=docs/__placement_probe_DELETE_ME.md; printf 'probe\n' > "$tmpf"; git add -- "$tmpf"; OUT=$(bin/venv-python -c "from scripts.checks.hygiene.validate_placement import validate_placement; f=[]; validate_placement(f); print('ENFORCED' if any('__placement_probe' in x for x in f) else 'NOT_ENFORCED')"); git rm -q --cached -- "$tmpf"; rm -f -- "$tmpf"; echo "$OUT"
    expected: Prints ENFORCED (the staged probe was flagged as an out-of-class docs-root file), and the probe is unstaged + deleted afterward.
    fix_if: NOT_ENFORCED means the docs-root scan did not run or did not flag the probe -- confirm the docs_root_allowlist key is present and the scan enumerates depth-1 docs/ files from the tracked snapshot.
  - step: 7
    phase: pre-deploy
    hermetic: false
    action: Self-consistency -- confirm validate_intent_doc_freeze does NOT flag the new docs/CLAUDE.md (Decision 86 mechanism-interaction check).
    command: >-
      bin/venv-python -c "from scripts.checks.contracts.validate_intent_doc_freeze import validate_intent_doc_freeze; f=[]; validate_intent_doc_freeze(f); print('FREEZE_OK' if not any('CLAUDE' in x for x in f) else 'FREEZE_FLAGS_CLAUDE')"
    expected: Prints FREEZE_OK (the guard scans only INTENT-*.md; docs/CLAUDE.md is untouched).
    fix_if: FREEZE_FLAGS_CLAUDE would indicate the freeze guard's scope changed to include CLAUDE.md -- it should not; do not broaden that guard in this plan.
  - step: 8
    phase: pre-deploy
    hermetic: false
    action: Run the validate_placement unit tests (existing link-validity + new docs-root allowlist) by class path.
    command: bin/venv-python -m pytest tests/test_validate.py::TestValidatePlacement -q
    expected: All tests pass (existing tests unchanged; new docs-root allowlist tests green).
    fix_if: A failing test names the case; fix the check or the test. If an EXISTING link-validity test broke, the change was not additive -- restore _load_router untouched.
  - step: 9
    phase: pre-deploy
    hermetic: false
    action: Confirm 100% coverage of the new validate_placement lines (V2 obligation) via the diff-aware coverage checker.
    command: bin/venv-python -m pytest tests/test_validate.py::TestValidatePlacement --cov=scripts.checks.hygiene.validate_placement --cov-report=term-missing -q
    expected: The class passes and the term-missing report shows no uncovered lines in the new _load_docs_root_allowlist / _docs_root_stray_files helpers or the new block.
    fix_if: term-missing lists an uncovered new line; add a direct helper/integration test hitting it. (If pytest-cov is unavailable, run `bin/venv-python -m scripts.validate` and confirm validate_test_coverage reports 100% for the new code.)
  - step: 10
    phase: pre-deploy
    hermetic: false
    action: Run the authoritative fast presubmit tier over the whole change.
    command: bin/venv-python -m scripts.validate --pre
    expected: Exits 0 (all checks pass, incl validate_placement, validate_test_count_coupling, and pytest_diff).
    fix_if: A named check fails; diagnose and forward-fix on-branch (never disable a check).
