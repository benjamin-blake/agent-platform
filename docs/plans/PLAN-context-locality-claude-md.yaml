execution_steps:
  - |
    Create scripts/CLAUDE.md with exactly this body (ASCII hyphens, no emoji, lines <=127):
    ---8<--- scripts/CLAUDE.md
    # scripts/ - directory-scoped rules

    Loaded automatically when Claude reads or edits files in this directory. Universal rules in repo-root `CLAUDE.md` still apply.

    ## Placement: root vs subpackage
    `scripts/` root holds only entry points (run as `python -m scripts.<name>`) and genuine unclassed
    singles. Any prefix family of >= 3 related modules is a subpackage, not loose root files -- the
    existing `scripts/checks/`, `scripts/executor/`, `scripts/verifiers/` packages prove the pattern.

    - Governs NEW files now: do not add a third `scripts/<prefix>_*.py` sibling at the root -- create
      `scripts/<prefix>/` and place it there.
    - Existing un-nested families (`ci_rca_*`, `session_*`, `sync_*`, `roadmap`/`plan_*`, `llm_*`,
      `ops_*`) are grandfathered; they migrate under the RS-01 subpackaging plans (rec-164), one
      family per PR with a same-commit reference rewrite. Do not migrate them ad hoc.

    ## Invocation
    Always invoke `bin/venv-python` (never bare `python`/`python3`) -- the wrapper auto-detects the
    platform and resolves the correct venv binary. Each Bash tool call is independent; do not rely on
    `source .venv/bin/activate`.

    ## Adding a validate.py check
    CI checks are registered, not hand-wired into `scripts/validate.py`. Add the module under
    `scripts/checks/<domain>/`, decorate it `@register(...)`, and insert its name in the ordered tier
    sequence(s) in `scripts/checks/registry.py`. `scripts/validate.py` is the single source of truth
    for CI gates (AGENTS.md merge protocol) -- never add a CI check without adding it here first.
    --->8---
  - |
    Create config/CLAUDE.md with exactly this body:
    ---8<--- config/CLAUDE.md
    # config/ - directory-scoped rules

    Loaded automatically when Claude reads or edits files in this directory. Universal rules in repo-root `CLAUDE.md` still apply.

    ## Three-zone layout (T-1.7)
    `config/` splits into three zones by who loads a file and whether it ships in a Lambda zip:

    - Root (shared): `config.yaml` (active, gitignored copy/symlink), `config.company.yaml`,
      `config.personal.yaml`, `config.yaml.example` -- runtime config loaded by `src.common.config`.
      BUNDLED into Lambda zips.
    - `lambda/<name>/`: per-Lambda runtime payloads, bundled into `<name>.zip` by
      `scripts/build_lambda.py`. BUNDLED (that Lambda only).
    - `agent/<consumer>/`: agent-consumed config (DQ rules, executor prompts, IAM runner manifest,
      verification registry, cost-reconciliation baselines). NOT bundled into any Lambda zip -- only
      Claude Code agents and CI scripts read it.

    ## Invariant: config/agent/ is never Lambda-bundled
    `build_lambda.py` bundles ONLY the shared root config and the artifact's `config/lambda/<name>/`
    payload (per-Lambda manifest, Decision 79 / CD.24). `config/agent/**` is out of every zip. Editing
    a file here changes agent/CI behaviour, not deployed Lambda behaviour -- and a Lambda-bundling plan
    must NOT assume `config/agent/` files reach the function. (This is why `config/agent/` does not
    trigger the Lambda Deployment Assessment in `/plan`.)

    ## READMEs are portal projections (CD.23)
    `config/README.md` and `config/agent/README.md` are curated portal projections (CD.23): the
    authoritative placement/bundling rules live in THIS file, and if a README conflicts with it the
    canonical CLAUDE.md wins. Do not restate the zone or bundling rules in a README -- point at
    `config/CLAUDE.md` instead (two synced surfaces is drift by design).
    --->8---
  - |
    Create docs/CLAUDE.md with exactly this body:
    ---8<--- docs/CLAUDE.md
    # docs/ - directory-scoped rules

    Loaded automatically when Claude reads or edits files in this directory. Universal rules in repo-root `CLAUDE.md` still apply.

    ## docs/ root allowlist (RS-03)
    The `docs/` root (depth-1 files) holds ONLY canonical governance surfaces; every other class lives
