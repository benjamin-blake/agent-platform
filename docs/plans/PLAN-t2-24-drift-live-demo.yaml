  - agent_platform_admin (PlatformAdmin) assume-role chain reachable in the implementation container (REQUIRED -- verify with `aws sts get-caller-identity --profile agent_platform_admin`)
  - terraform/personal init + tfvars-recovery-from-state procedure understood (terraform/CLAUDE.md "Running terraform/personal on CC-web")
  - terraform-drift.yml, the github_ci_drift role, and the convergence/lock S3 keys located and readable
  - Starting state confirmed clean (convergence record green, no .tflock, zero tf_drift recs)
  - Acceptance criteria understood and each independently verifiable; closes_criteria refs resolve to open criteria
execution_steps:
  - >-
    Confirm prerequisites: agent_platform_admin reachable; convergence record green; no .tflock; zero
    tf_drift recs. Run VP1-VP3 (schema, pre-state, c3 structural) now -- all are local/read-only.
  - >-
    VP4 (c3 IAM): under agent_platform_admin, run the simulate-principal-policy capability matrix; the
    decisive assertion is that the drift role CANNOT s3:PutObject the state object. Loop until pass.
  - >-
    VP5 (c2): under agent_platform_admin, seed the demo .tflock (JSON body including "ID":"t2-24-drift-demo")
    at tfstate/personal/sandbox/terraform.tfstate.tflock; dispatch terraform-drift (workflow_dispatch);
    wait for the run to conclude and confirm via get_job_logs the "lock held; skipping" notice + exit 0;
    run the VP5 command (verifies no rec, record green, removes the demo lock after the ID guard). Run c2
    BEFORE c1 so the no-rec assertion holds against a zero baseline.
  - >-
    VP6 (c1 seed): under agent_platform_admin, recover tfvars + init terraform/personal; seed a reversible
    managed-tag-value change on a low-risk resource; run the VP6 command to GATE on local plan exit 2 before
    dispatching. If it does not produce exit 2 or admin lacks permission, pick another managed attribute per
    VP6 fix_if and re-verify.
  - >-
    VP7 (c1 signal): dispatch terraform-drift (workflow_dispatch) with the seed in place; wait for the run;
    run the VP7 command (record red + one open tf_drift rec). VP8 (dedup): dispatch terraform-drift again
    while red; run the VP8 command (no duplicate).
  - >-
    VP9 (recovery): revert the seed; confirm local plan exit 0; dispatch terraform-apply-sandbox
    (workflow_dispatch, acknowledge_red_commit = the red commit sha or rec id); wait for success; close the
    demo rec via ops_data_portal --update-rec ... --status closed; run the VP9 command (green + zero open recs).
  - >-
    Bookkeeping walk (the ONLY repo edit): in docs/ROADMAP-PLATFORM.yaml, flip T2.24 c1/c2/c3 status
    open->met with met_by: t2-24-drift-live-demo, and flip T2.24 status in_progress->complete with
    completed_at and a closeout note citing this plan + the demonstration run URLs. Run VP10 to verify.
  - >-
    Run the authoritative local gate `bin/venv-python -m scripts.validate --pre` (ruff/mypy on changed
    files + plan schema + roadmap validation + ledger guard) and ensure it passes before opening the PR.
  - >-
    Open the docs-only PR (GitHub MCP create_pull_request), wait for the PR --pre tier event-driven via
    subscribe_pr_activity (end the turn; do not sleep), then squash-merge (merge_pull_request
    merge_method="squash"). No Resolves: trailer is needed (the demo rec is closed directly via update_rec,
    not by this merge).
  - >-
    Report: the c1/c2/c3 demonstration outcomes (run URLs, the tf_drift rec id filed-then-closed), the
    convergence record's green->red->green trajectory, all VP results, and the final roadmap bookkeeping.
work_areas: []
rollback: >-
  The demonstration is self-cleaning: revert any seeded tag (restore the original managed value), remove any
  seeded .tflock (after verifying its demo ID), dispatch-ack terraform-apply-sandbox back to green, and close
  the demo tf_drift rec via update_rec -- leaving the sandbox exactly as found (green, no open tf_drift rec).
  If abandoned mid-demo, perform that cleanup before ending. The only repository change is the
  docs/ROADMAP-PLATFORM.yaml ledger bookkeeping, revertable by reverting the commit (which would return
  T2.24 to in_progress with c1/c2/c3 open). No schema or data migration is involved; rollback is low-risk.
