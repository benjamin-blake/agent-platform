  - Branch confirmed not on main (claude/rec-2729-critical-bug-plan-yje3iz)
  - docs/PROJECT_CONTEXT.md read
  - DECISIONS.md not read in full by the planning agent (Decision-scout gate substitutes, per Step 3 of the plan workflow)
  - Both scope files located and readable (scripts/ops_data_portal.py, tests/test_ops_portal_facade.py)
  - Acceptance criteria understood and independently verifiable via the commands in verification_plan
  - rec-2729's reproduction confirmed live on this branch before editing (verification_plan step 1)
execution_steps:
  - >-
    In scripts/ops_data_portal.py, replace the eager `from scripts.ops_portal.decisions import
    (_fetch_decision_from_athena, _fetch_decision_from_reader, backfill_decisions_from_md,
    file_decision, update_decision)` block (lines ~85-91) with: (a) an eager `from
    scripts.ops_portal import decisions as _decisions` (or equivalent) module import so the
    static import-graph edge is preserved, and (b) a module-level `def __getattr__(name:
    str):` function that returns `getattr(_decisions, name)` for exactly the five names
    `{"file_decision", "update_decision", "backfill_decisions_from_md",
    "_fetch_decision_from_reader", "_fetch_decision_from_athena"}` and raises AttributeError
    for anything else (standard PEP 562 fallback semantics, matching what a normal
    module-attribute lookup miss would raise). Add a short comment on the __getattr__
    explaining it exists specifically to avoid eager-import mock-capture under
    pytest-randomly (rec-2729), consistent with the file's existing imported-name-trap comment
    style.
  - >-
    In tests/test_ops_portal_facade.py, add a `TestDecisionsLazyReexport` class with tests
    asserting: (1) none of the five names are keys in `_facade.__dict__` directly (using
    `vars(_facade)` or `_facade.__dict__`, not hasattr which would trigger __getattr__); (2)
    `_facade.file_decision is decisions_submodule.file_decision` (and the same identity check
    for the other four, with _fetch_decision_from_athena checked against the alias target)
    where `decisions_submodule` is imported directly as `import scripts.ops_portal.decisions as
    decisions_submodule` in the test file; (3) `from scripts.ops_data_portal import
    file_decision` resolves to the same object as the getattr form (mirroring the existing
    TestFacadeImportable pattern for consistency).
  - >-
    Execute the Verification Plan in order (steps 1-8): confirm baseline reproduction, confirm
    fix at the acceptance seed, sweep additional seeds, run the new regression guard, run the
    full facade guard suite, run the full ops_data_portal test package unseeded, confirm SLOC
    budget compliance, run ruff. Loop on any failure per each step's fix_if guidance until all
    pass; on an unrecoverable failure stop and file an RCA rec rather than working around it
    (Decision 55).
  - >-
    Report: what was implemented (the PEP 562 lazy-reexport mechanism and the regression
    guard), verification results (all 8 VP steps passing), and the rec-2729 closure evidence
    (the exact acceptance command from the rec's filed acceptance field, re-run and passing).
  - >-
    Close rec-2729 via the ops portal after the fix lands and CI is green: `bin/venv-python -m
    scripts.ops_data_portal --update-rec rec-2729 --status closed --resolution "Fixed via
    PEP 562 lazy __getattr__ re-export in scripts/ops_data_portal.py; see PLAN-rec-2729-facade-
    lazy-reexport.yaml and the merged PR."` (or via the squash-merge commit's `Resolves:
    rec-2729` trailer per AGENTS.md Git-ops procedure, which triggers rec-autoclose.yml
    automatically -- prefer the trailer over the manual command when merging via the standard
    flow).
work_areas: []
rollback: >-
  Revert the two-file diff (git revert the merge commit, or re-apply the prior eager
  `from scripts.ops_portal.decisions import (...)` block). No data, schema, or infrastructure
  state is touched by this change -- it is pure in-process Python re-export mechanism, so
  rollback is a plain code revert with no follow-up cleanup required.
