schema_version: 1
slug: "verb-surface-closeout"
intent: >-
  Close out the Decision-91 named-verb DuckLake surface (roadmap item T1.16) by delivering its five
  verified residuals -- list-family pagination, a describe capability, update_ops status-DAG
  enforcement, a history-version read, and per-verb unit-test coverage -- so the six consolidated
  source items and the closeout item itself reach complete, hardening the agent-facing ops read/write
  boundary toward the self-improving-platform North Star.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-verb-surface-closeout.yaml
phase: >-
  Platform tier_item T1.16 (Verb-surface closeout); consolidates residuals of T0.7a/T0.7b/T0.7c,
  T1.1, T1.2, T1.3. Realizes agent-facing describe/typed-verb surface intent of CD.10 + CD.15.
scope:
  - file: src/common/ducklake_scd2_schema.py
    action: Modify
    purpose: >-
      Add `paginable` flag to NamedRead; add the `rec_history` history-verb and bump
      NAMED_READS_VERSION to 3; add a unique-key tiebreak to the two existing LIMIT-bearing verbs
      (ci_rca_open, budget_bypass_recent); add the STATUS_TRANSITIONS DAG + check_rec_status_transition
      + StatusTransitionError; add describe_named_reads(), the VERB_REGISTRY write-verb registry, and
      describe_write_verbs(). All pure / I/O-free.
  - file: src/common/ducklake_runtime.py
    action: Modify
    purpose: >-
      Add an optional server-side `limit` argument to named_read() (appended as integer-cast LIMIT for
      paginable verbs only); enforce the rec status-DAG inside write_scd2's existing require_exists
      fetch (reuse that read; no second Neon round-trip) and re-export StatusTransitionError.
  - file: src/lambdas/ducklake_reader/handler.py
    action: Modify
    purpose: >-
      action_named_read passes event.get("limit") through to rt.named_read; add a network `describe`
      action returning describe_named_reads(); register it in _ACTIONS.
  - file: src/lambdas/ducklake_writer/handler.py
    action: Modify
    purpose: >-
      Add a network `describe` action returning describe_write_verbs(); register it in _ACTIONS; map
      the new rt.StatusTransitionError to a typed HTTP 422 (error_type="status_transition") in the
      dispatcher.
  - file: docs/contracts/ducklake_reader.yaml
    action: Modify
    purpose: >-
      Document the new agent-facing `describe` verb and the optional `limit?` field on the named_read
      envelope (verbs: additions -- no Class A field / contract.description change, so no amendment_log
      entry is required; Decision 118 / CD.25).
  - file: docs/contracts/ducklake_writer.yaml
    action: Modify
    purpose: >-
      Document the new `describe` verb and the status_transition 422 error taxonomy entry for
      update_ops (verbs: additions only; Decision 118 / CD.25).
  - file: tests/test_ducklake_scd2_schema.py
    action: Modify
    purpose: >-
      Cover the DAG checker, describe functions, VERB_REGISTRY, rec_history entry, and the growth-safe
      total-order invariant (every LIMIT-bearing verb's ORDER BY ends in a unique key).
  - file: tests/test_ducklake_runtime.py
    action: Modify
    purpose: >-
      Cover named_read `limit` application (paginable vs non-paginable) and write_scd2 status-DAG
      enforcement on the require_exists path (illegal -> StatusTransitionError; legal + same-status pass).
  - file: tests/test_ducklake_reader_handler.py
    action: Modify
    purpose: >-
      Cover action_describe and the named_read limit passthrough; add a growth-safe parametrized test
      exercising every NAMED_READS verb through named_read dispatch (SQL renders, params validate).
  - file: tests/test_ducklake_writer_handler.py
    action: Modify
    purpose: >-
      Cover action_describe, the StatusTransitionError -> 422 mapping, and a growth-safe parametrized
      test over every VERB_REGISTRY write verb.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Bookkeeping (c6): flip T0.7a/T0.7b/T0.7c/T1.1/T1.2/T1.3 and T1.16 to complete; mark T1.16 c1-c6
      met; rehome c7 (telemetry read verbs) to T3.3 with a note on both items.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    c1: named_read accepts an optional integer `limit`; paginable list-family verbs return at most
    `limit` rows in a deterministic TOTAL order; ci_rca_open and budget_bypass_recent gain an `id`
    tiebreak; a growth-safe invariant test asserts that every NAMED_READS verb that is EITHER
    paginable=True OR carries a TRAILING output-bounding LIMIT ends its ORDER BY in a unique key (id or
    ulid). A subquery LIMIT that does not bound the outer result (priority_queue_current) is excluded.
    No caller SQL crosses the boundary (server-side LIMIT only).
  - >-
    c2: describe_named_reads() and describe_write_verbs() return per-verb parameter schema (JSON-schema
    shape); the reader and writer Lambdas each expose a `describe` action returning them.
  - >-
    c3: update_ops rejects a known-illegal rec status transition -- reactivating a RESOLVED rec
    (closed/declined/superseded -> open) -- with a typed HTTP 422 (error_type "status_transition"). ALL
    live transitions pass: failed->open (executor restart), *->superseded and failed/open->declined
    (postmortem purge), open->{closed,failed,declined,superseded}, and same-status writes; unrecognised
    status vocabulary is skipped (not silently rejected). Enforcement reuses write_scd2's require_exists fetch.
  - >-
    c4: a `rec_history` named read returns the prior SCD2 versions of an updated rec (>=2 rows for a
    once-updated rec) ordered newest-first (last_updated_timestamp DESC, ulid DESC); NAMED_READS_VERSION == 3.
  - >-
    c5: every NAMED_READS verb and every VERB_REGISTRY write verb is exercised by a growth-safe
    parametrized unit test through the named_read / write-verb dispatch (no exact-count assertions).
  - >-
    Contract: docs/contracts/ducklake_reader.yaml and ducklake_writer.yaml document the describe verb
    (+ limit? envelope / status_transition 422); validate_contract_drift passes in both tiers; the
    ops_recommendations.yaml status-enum divergence is left unmodified with a recorded deferral note.
  - >-
    c6: T0.7a, T0.7b, T0.7c, T1.1, T1.2, T1.3 and T1.16 are status: complete in docs/ROADMAP-PLATFORM.yaml;
    T1.16 criteria c1-c6 are status: met with met_by: verb-surface-closeout, and c7 is status: rehomed with
    met_by: T3.3 (a reciprocal telemetry-read-verb criterion/note added on T3.3); the platform_roadmap
    Pydantic validators load without error (rules (g)/(h) satisfied; no stranded dependency, Decision 93).
  - >-
    validate --pre is green and the 4 affected active Lambda artifacts (ducklake_reader, ducklake_writer,
    ducklake_catalog_dr, ducklake_maintenance) are rebuilt, deployed, and pass their smoke gates (Decision 79).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: NAMED_READS_VERSION was bumped to 3 and rec_history is registered against the history table.
    command: >-
      bin/venv-python -c "from src.common.ducklake_scd2_schema import NAMED_READS, NAMED_READS_VERSION;
      assert NAMED_READS_VERSION == 3, NAMED_READS_VERSION;
      rh = NAMED_READS['rec_history']; assert rh.params == ('id',) and '{hist}' in rh.sql, rh"
    expected: Exit 0 -- version is 3 and rec_history reads {hist} keyed by id.
    fix_if: KeyError/AssertionError -- rec_history not registered or version not bumped.
    hermetic: true
  - step: 2
    phase: pre-deploy
    action: >-
      Total-order invariant -- every NAMED_READS verb that is paginable OR carries a TRAILING (output
      row-cap) LIMIT ends its ORDER BY in a unique key (id or ulid), so a bounded read is reproducible.
      A subquery LIMIT that does not bound the outer result (priority_queue_current's `LIMIT 1` inside
      the latest-run correlated subquery) is correctly excluded.
    command: >-
      bin/venv-python -c "import re; from src.common.ducklake_scd2_schema import NAMED_READS;
      lim=lambda s: bool(re.search(r'\\bLIMIT\\s+\\d+\\s*\$', s, re.I));
      tot=lambda s: bool(re.search(r'ORDER BY .*\\b(id|ulid)\\b[^,]*\$', s, re.I|re.S));
      bad=[v for v,n in NAMED_READS.items() if (getattr(n,'paginable',False) or lim(n.sql)) and not tot(n.sql)];
      assert not bad, bad; print('total-order-ok', sorted(NAMED_READS))"
    expected: >-
      Exit 0; prints total-order-ok -- covers the paginable verbs (open_recs, recs_by_title_prefix) AND the
      trailing-LIMIT verbs (ci_rca_open, budget_bypass_recent, now id-tiebroken); priority_queue_current is
      excluded (its LIMIT is a subquery, its outer output is unbounded ORDER BY rank).
    fix_if: Non-empty `bad` list -- a paginable or trailing-LIMIT verb lacks a unique-key tiebreak.
    hermetic: true
  - step: 3
    phase: pre-deploy
    action: >-
      The rec status-DAG checker allows EVERY live transition (failed->open, *->superseded,
      failed/open->declined, open->closed, same-status), skips unknown vocab, and rejects ONLY a
      resolved-rec reactivation (closed/declined/superseded -> open).
    command: >-
      bin/venv-python -c "import pytest; from src.common.ducklake_scd2_schema import check_rec_status_transition as c, StatusTransitionError as E; T='ops_recommendations';
      [c(T,a,b) for a,b in [('failed','open'),('open','superseded'),('closed','superseded'),('failed','declined'),('open','declined'),('open','closed'),('closed','closed'),('banana','open')]];
      [pytest.raises(E, c, T, a, b) for a,b in [('closed','open'),('declined','open'),('superseded','open')]];
      print('dag-ok')"
    expected: Exit 0; prints dag-ok -- all live edges pass, all three resolved->open reactivations raise StatusTransitionError.
    fix_if: >-
      AssertionError from a bare call -- a live transition is wrongly rejected (breaks executor reset /
      postmortem purge). pytest.raises failure -- a resurrection edge is not being blocked.
    hermetic: true
  - step: 4
    phase: pre-deploy
    action: describe capability returns a per-verb parameter schema over both read and write verbs.
    command: >-
      bin/venv-python -c "from src.common.ducklake_scd2_schema import describe_named_reads, describe_write_verbs, NAMED_READS, VERB_REGISTRY;
      r=describe_named_reads(); w=describe_write_verbs();
      assert set(r)==set(NAMED_READS) and 'params' in r['rec_by_id'], r.get('rec_by_id');
      assert set(w)>={'write_ops','update_ops','file_ops'} and set(w)==set(VERB_REGISTRY);
      print('describe-ok', len(r), len(w))"
    expected: Exit 0; describe covers every NAMED_READS verb and every VERB_REGISTRY write verb with a params schema.
    fix_if: KeyError/AssertionError -- a verb is missing from a describe map or lacks a params schema.
    hermetic: true
  - step: 5
    phase: pre-deploy
    action: Schema-module unit tests (pure DAG, describe, registry, rec_history, invariant) pass with full new-code coverage.
    command: bin/venv-python -m pytest tests/test_ducklake_scd2_schema.py -q
    expected: All pass.
    fix_if: A failing case indicates a defect in the new pure functions or the invariant test.
  - step: 6
    phase: pre-deploy
    action: >-
      Runtime unit tests pass -- named_read limit application (paginable vs non-paginable) and
      write_scd2 status-DAG enforcement on the require_exists path, covering each live transition as a
      PASS (failed->open, *->superseded, failed/open->declined) and each resolved->open reactivation as
      a StatusTransitionError.
    command: bin/venv-python -m pytest tests/test_ducklake_runtime.py -q
    expected: All pass, including a write_scd2(require_exists) closed->open case that raises StatusTransitionError and a failed->open case that commits.
    fix_if: Failure indicates limit not applied server-side, the DAG not wired into write_scd2, or a live transition wrongly rejected.
  - step: 7
    phase: pre-deploy
    action: >-
      Reader + writer handler unit tests pass -- describe actions, named_read limit passthrough, the
      StatusTransitionError->422 mapping, and the growth-safe per-verb parametrized dispatch tests.
    command: bin/venv-python -m pytest tests/test_ducklake_reader_handler.py tests/test_ducklake_writer_handler.py -q
    expected: All pass; the writer 422 test asserts error_type == "status_transition".
    fix_if: Failure indicates a dispatch/mapping defect or an uncovered verb.
  - step: 8
    phase: pre-deploy
    action: Contract-drift gate accepts the reader/writer verb additions and finds no unaccompanied Class A change.
    command: >-
      bin/venv-python -c "from scripts.checks.contracts.validate_contract_drift import validate_contract_drift;
      f=[]; validate_contract_drift(f); print('DRIFT', f); assert not f, f"
    expected: "Exit 0; DRIFT [] -- verbs: additions need no amendment_log; ops_recommendations.yaml untouched."
    fix_if: Non-empty failures -- a contract edit touched a field/description without an amendment entry.
  - step: 9
    phase: pre-deploy
    action: The platform roadmap still loads under its Pydantic validators after the flips + c7 rehome (no stranded dep, Decision 93).
    command: bin/venv-python -m scripts.platform_roadmap
    expected: Exit 0 -- roadmap parses; no live item depends on a deferred item; tier math consistent.
    fix_if: ValidationError -- a completed item is depended on incorrectly or c7's rehome stranded a reference.
  - step: 10
    phase: pre-deploy
    action: Full fast presubmit tier green (authoritative pre-merge gate when run by PR CI).
    command: bin/venv-python -m scripts.validate --pre
    expected: PASS.
    fix_if: Any check fails -- fix on branch and re-run; do not add a CI check without adding it to validate.py first.
  - step: 11
    phase: post-deploy
    action: Rebuild + deploy exactly the 4 affected active DuckLake Lambda artifacts (reader, writer, maintenance, catalog-dr).
    command: bin/venv-python -m scripts.build_lambda --ducklake-only --deploy --profile agent_platform
    expected: 4 function code updates succeed (writer, reader, maintenance, catalog-dr); no other artifact touched (Decision 79).
    fix_if: Build/deploy error -- inspect the zip/layer step; do not deploy partial artifacts.
  - step: 12
    phase: post-deploy
    action: Reader closed-boundary + writer warm-reuse smoke gates still pass against the freshly deployed bundles (regression).
    command: >-
      bin/venv-python -m scripts.ducklake_neon_smoke_test --lambda-reader --profile agent_platform &&
      bin/venv-python -m scripts.ducklake_neon_smoke_test --lambda-warm-reuse-writer --profile agent_platform
    expected: Both gates report ok/within-budget -- the shared-module change did not regress the runtime primitives.
    fix_if: A gate fails -- the new shared code broke an existing runtime path; RCA before proceeding (Decision 55).
  - step: 13
    phase: post-deploy
    action: >-
      ducklake_maintenance smoke gate passes against its freshly deployed bundle -- confirms the
      maintenance Lambda still loads the shared modules and its merge path works (regression for the two
      deploy-only artifacts that VP step 12 does not cover).
    command: bin/venv-python -m scripts.ducklake_neon_smoke_test --lambda-maintenance-merge --profile agent_platform
    expected: The daily-merge gate reports ok (files merged / count assertion holds) -- no shared-module import or runtime regression in maintenance.
    fix_if: Non-200 / import error -- the additive shared-module change broke maintenance's bundle; RCA (Decision 55).
  - step: 14
    phase: post-deploy
    action: >-
      ducklake_catalog_dr smoke gate passes against its freshly deployed bundle -- confirms the DR
      Lambda still loads the shared modules and its dump path works.
    command: bin/venv-python -m scripts.ducklake_neon_smoke_test --lambda-catalog-dr --profile agent_platform
    expected: The FP-B DR gate reports ok (dump object + engine-version tag + metric) -- no regression in catalog_dr.
    fix_if: Non-200 / import error -- the additive shared-module change broke catalog_dr's bundle; RCA (Decision 55).
  - step: 15
    phase: post-deploy
    action: The deployed reader serves `describe` and a bounded, ordered named_read; registry_version is 3.
    command: >-
      bin/venv-python -c "from src.common.iceberg_reader import DuckLakeReader;
      r=DuckLakeReader(profile='agent_platform');
      d=r._invoke({'action':'describe'}); assert d['ok'] and 'open_recs' in d['verbs'], d;
      p=r._invoke({'action':'named_read','verb':'open_recs','params':{},'limit':5});
      assert p['registry_version']==3 and p['row_count']<=5, p; print('reader-live-ok', p['row_count'])"
    expected: Exit 0 -- describe lists verbs; open_recs honours limit=5 and stamps registry_version 3.
    fix_if: AssertionError/non-200 -- the deployed bundle lacks the new code (redeploy) or limit not applied.
  - step: 16
    phase: post-deploy
    action: The deployed reader's rec_history verb returns >=2 ordered versions for a rec that has been updated at least once.
    command: >-
      bin/venv-python -c "from src.common.iceberg_reader import DuckLakeReader;
      r=DuckLakeReader(profile='agent_platform');
      row=r._invoke({'action':'named_read','verb':'count_by_status','params':{}}); print('status counts', row['rows']);
      h=r._invoke({'action':'named_read','verb':'rec_history','params':{'id':__import__('os').environ.get('REC_HIST_ID','rec-001')}});
      assert h['ok'], h; print('rec_history rows', h['row_count'])"
    expected: >-
      Exit 0 -- rec_history returns the append-history rows for the probed id (>=2 for a rec updated at
      least once), newest-first. (Pick an id known to have >1 version; a fresh file_rec+update_rec pair also qualifies.)
    fix_if: Non-200 or 0 rows for a multi-version id -- rec_history not reading {hist} or not deployed.
  - step: 17
    phase: post-deploy
    action: >-
      The deployed writer rejects a resolved-rec reactivation (closed->open) with a typed 422 -- exercised
      via the portal against an already-RESOLVED rec (the write is rejected before any mutation, so this
      is non-destructive). NB: use a resolved rec (closed/declined/superseded), NOT a failed rec --
      failed->open is a LEGAL executor-restart transition and would (correctly) succeed.
    command: >-
      bin/venv-python -c "import pytest; from scripts import ops_data_portal as p; import os;
      rid=os.environ['RESOLVED_REC_ID'];
      ei=pytest.raises(Exception, p.update_rec, rid, {'status':'open'}, profile='agent_platform');
      assert 'status_transition' in str(ei.value) or '422' in str(ei.value), ei.value;
      print('writer-422-ok')"
    expected: >-
      Exit 0; prints writer-422-ok -- the closed->open update is rejected with a status_transition 422 and
      nothing is written. (Set RESOLVED_REC_ID to any rec whose current status is closed/declined/superseded.)
    fix_if: >-
      No exception / wrong error -- the DAG is not enforced in the deployed writer, or a resurrection edge is
      not blocked; redeploy / fix write_scd2 wiring.
constraints:
  - "No caller SQL crosses the reader boundary: `limit` is a server-side integer-cast trailing LIMIT on registry SQL only (Decision 84 I-3)."
  - "Status DAG is built over the ENFORCED rec status set {open, closed, failed, declined, superseded} (Decision 103) and encodes ONE invariant: a RESOLVED rec (closed/declined/superseded) must not be silently REACTIVATED (-> open). It rejects exactly closed/declined/superseded -> open; it ALLOWS every live transition -- failed->open (executor restart, scripts/executor/jsonl_store.py:_reset_rec_status + scripts/execute_recommendation.py:936,1016), *->superseded and open/failed->declined (postmortem purge, scripts/ops_data_portal.py:1873/1887, live today), open->{closed,failed,declined,superseded}, and same-status. `failed` is deliberately NON-terminal (retryable). Skip unrecognised vocabulary narrowly (Decision 55) -- do NOT silently accept a resolved->open reactivation."
  - "Do NOT modify docs/contracts/ops_recommendations.yaml: the status-enum divergence (Pydantic {open,closed,failed,declined,superseded} vs the Class A contract's {open,closed,in_progress,deferred,superseded,declined}) reconciliation is OUT OF SCOPE -- record a deferral note citing Decision 118 and the field's re_ratification_trigger; touching the status field's description/semantics would trigger the category-6 amendment gate."
  - "Reuse write_scd2's existing require_exists existing-row fetch to read the current status; do NOT add a second Neon round-trip, and keep the status compare OUTSIDE the OCC-collision retry path (Decision 82 / Decision 88)."
  - "Add NO new Class A columns to ops_recommendations (Decision 103); c3/c4 add none."
  - "Name the c3 checker `check_rec_status_transition` -- distinct from scripts/contracts_enforcement.check_status_transition (the contract-lifecycle check), to avoid a same-name collision."
  - "Do NOT 'fix' the reader/runtime docstrings that claim 'only the current projection is reachable' -- the ducklake_reader.yaml contract marks them STALE-but-intentional (query_ops reaches _history for the DQ runner)."
  - "V3: rebuild + deploy + smoke each of the 4 affected ACTIVE artifacts (reader, writer, maintenance, catalog-dr) via --ducklake-only --deploy (Decision 79). Model-ID validation is N/A -- these Lambdas carry no LLM model id."
  - "Tests are growth-safe: no exact len()==N assertions against NAMED_READS / VERB_REGISTRY (tests/CLAUDE.md, Decision 104). Parametrize over the registry; assert membership floors / uniqueness invariants."
  - "Roadmap edits are the only permitted docs/ change beyond the two verb contracts; route forward intent to tier_items (Decision 86). No new prose-architecture docs."
  - "No rescue agents or workaround loops; loud-fail on unrecoverable V3 failure and RCA (Decision 55)."
context:
  - "Decision-scout verdict + CITE list (verbatim decision ids): FLAGS_FOUND. CITE: Decision 91, Decision 84, Decision 81, CD.33, Decision 79, Decision 55. RELATED/handled: Decision 103 (DAG status basis; no new Class A cols), Decision 118 (contract-drift ritual -> verb contracts updated, enum reconciliation deferred), Decision 88 (Neon egress; bounded reads favoured; reuse require_exists fetch), Decision 86 (semantics to contracts, not prose), Decision 93 (roadmap validator on the flips/rehome), CD.10 + CD.15 (describe / typed-verb surface intent)."
  - "gates: decision-scout=FLAGS_FOUND (all flags handled in scope/constraints); plan-critique=REVISE(r1)->REVISE(r2)->addressed. r1: status-DAG edge set grounded in live call sites; invariant extended to paginable; met_by specified; maintenance+catalog_dr smoke added. r2: total-order invariant switched to a trailing-LIMIT regex (bare 'LIMIT' substring false-positived priority_queue_current's subquery LIMIT); smoke-gate flags corrected to --lambda-warm-reuse-writer / --lambda-maintenance-merge / --lambda-catalog-dr; describe registered connectionless (Decision 88)."
  - "Status-DAG safety (plan-critique round 1): the DAG is a resolved-reactivation guard, NOT a forward-only/terminal whitelist -- it was corrected to allow every live transition (failed->open executor reset; *->superseded and open/failed->declined postmortem purge, live via --purge-postmortems-for) and reject ONLY closed/declined/superseded -> open. VP steps 3/6 assert each live edge passes and each resurrection edge raises."
  - "Regression coverage (plan-critique round 1): VP steps 13/14 add --lambda-merge (ducklake_maintenance) and --lambda-dr (ducklake_catalog_dr) smoke gates so all 4 deployed active artifacts have a post-deploy check, not just reader/writer (Decision 79)."
  - "Scout flag handling: Decision 118 [WARN] -> add describe verb + limit?/422 to the two Class B verb contracts (verbs: additions, no amendment_log needed); defer the Class A status-enum divergence with a recorded note. Decision 55 [NOTE] -> unknown-vocab skip stays narrow, known-illegal edges raise. Decision 70->103 citation corrected (lifecycle-by-status is Decision 103, not Decision 70). Decision 82 -> status read reuses require_exists fetch, outside OCC loop. Decision 93 -> VP step 9 loads the roadmap under its validators."
  - "c7 resolution (human-confirmed 2026-07-07): rehome T1.16 c7 (telemetry read verbs) to T3.3 (Telemetry Phase E -- its stated natural owner, blocked on unbuilt substrate T2.36), so T1.16 completes on c1-c6."
  - "Lambda blast radius: editing shared src/common/ducklake_scd2_schema.py + ducklake_runtime.py fans out to 4 active manifest artifacts (compute_affected_artifacts): ducklake_reader, ducklake_writer, ducklake_catalog_dr, ducklake_maintenance -> V3 per-Lambda build+deploy+smoke (Decision 79). Reader/writer exercise the new verbs; catalog_dr/maintenance are regression-only."
  - "rec_history is a NAMED_READS registry entry (named_read verb dispatch), NOT a new contract verb -- the reader contract documents named_read generically (registry_path points at ducklake_scd2_schema.py), so c4 needs no contract edit. The `describe` action IS a new agent-facing verb and IS added to both verb contracts."
  - "Latent bug fixed in-scope: ci_rca_open and budget_bypass_recent already carry a baked LIMIT but ORDER BY created_timestamp (non-unique) -- ties are non-deterministic. An `id` tiebreak makes them reproducible; the total-order invariant test (VP step 2) prevents regressions."
  - "Offset/keyset pagination is deliberately NOT implemented (offset row-shift on a mutating table); `limit`-only + guaranteed total order is the MVP altitude. Keyset (WHERE id > :last ORDER BY id LIMIT n) is the correct future path if offset is ever needed."
  - "Branch was 0 commits behind origin/main at planning time; no Scope-file overlap with main divergence -- no rebase deferral."
  - "_VALID_STATUSES (scripts/executor/jsonl_store.py) and Recommendation.status Literal agree on {open,closed,failed,declined,superseded}; update_rec validates against this set client-side before the writer, so the DAG operates over the same enforced vocabulary."
