    edge constrains this ordering today; cross-ref T5.6 (frozen-executor disposition owner).
  - Execute Verification Plan -- run each step; loop until pass; on unrecoverable V3 failure stop and RCA (Decision 55) (N/A here -- V1, all steps pre-deploy)
  - "Report: what was authored (T4.13, T4.14, T5.6, T3.10/T4.4 annotations), verification results"
work_areas: []
rollback: >-
  Single-file, additive edit. Revert with git checkout docs/ROADMAP-PLATFORM.yaml (or drop the
  three new items + the T4.4/T3.10 note edits); no runtime, data, or infrastructure state changes.
