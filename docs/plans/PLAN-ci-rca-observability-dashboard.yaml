execution_steps:
  - >-
    Modify scripts/ops_data_portal.py: add warn_mode_reject: Optional[dict] to CiRcaContext (portal-
    derived, Tier-B); in each warn-would-reject branch (schema-deficiency, cross-check checks 1-4, bundle-
    absent, S3-missing) stamp the tripped-check reasons into context_v2_json before the write; strict mode
    unchanged (raises before write).
  - >-
    Create scripts/ci_rca_back_validation.py mirroring ci_rca_probe_health.py -- pure
    find_preventive_regressions over the warm cache (open ci_rca rec file-matching a closed prior ci_rca
