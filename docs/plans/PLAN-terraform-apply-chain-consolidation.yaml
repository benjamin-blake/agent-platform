execution_steps:
  - "Create scripts/ci/ducklake_artifacts.py: move the DuckLake build byte-identity-assert + fixed/per-sha dual-write loop out of the inline workflow bash into assert_and_upload(names, artifact_sha, event_name, bucket, region) (mismatch fails closed; on push the per-sha object must exist; dual-write BOTH keys; dispatch skips the assert). Keep the build invocation (build_lambda --ducklake-only --skip-upload) callable from the action."
  - "Create scripts/ci/plan_digest.py: emit(path)->sha256 hex; verify(path, reference)->fail-closed (nonzero/raise) on mismatch or empty/missing reference. Pure, no S3 in the compare path."
  - "Create the 7 composite actions under .github/actions/ (terraform-init-retry, build-ducklake-artifacts, materialise-tfvars, fetch-saved-plan[+digest verify], deterministic-guard[out: routed], subagent-plan-review[in: claude_oauth_token; out: outcome], write-convergence-record). Copy the inline block bodies VERBATIM (preserve every skip condition, transient signature, redaction, read-back verify); resolve repo-file paths via ${{ github.workspace }}."
  - "Modify .github/workflows/terraform-apply-sandbox.yml: replace the inline shared blocks in apply-sandbox / speculative-plan / gated-apply with `uses: ./.github/actions/<name>` steps (pass secrets as `with:` inputs; keep OIDC role, environment, if-guards, concurrency, the ci-rca self-dispatch step INLINE). Add the DEP-07 emit (sha256 -> PR comment + terraform-plan-digest commit status; add `statuses: write` to the speculative-plan job). Content-address the tfplan key to tfplan/personal/<pr>/<sha>.bin at persist + both fetch sites."
  - "Modify .github/workflows/reconcile.yml: replace the inline shared blocks in apply-reconcile / gated-apply-reconcile with the same `uses:` actions; PRESERVE resolve-target, checkout-red, and the race-guard re-verify verbatim; content-address reconcile's two fetch keys by the red commit's originating (pr, sha)."
  - "Create tests/test_ducklake_artifacts.py and tests/test_plan_digest.py (per VP-9/VP-10). If (and only if) an assertion in tests/verify_ci_workflow/test_apply_and_terraform.py referenced inline text that moved into an action, update just that assertion; keep the ci-rca + concurrency assertions green and un-weakened."
  - "Execute the Verification Plan: run each pre-deploy step (1-12); loop until green; run `bin/venv-python -m scripts.validate --pre` (exit 0). Mark VP-13 (CI), VP-14 (GATE-D2-green rehearsal), VP-15 (DEP-07 negative), VP-16 (rec close) as post-merge/operator-assisted. On an unrecoverable failure, stop and RCA (Decision 55) -- diff the drifted action against its inline original; no workaround loop."
  - "Commit feat(terraform-apply-chain-consolidation): ...; open the PR; the squash-merge body carries `Resolves: rec-2663, rec-2659`. APPLY NOTHING."
  - "Report: what was consolidated (block -> action census), the DEP-07 digest wiring, VP results, and the deferred operator-assisted items (GATE-D2-green rehearsal + DEP-07 negative test)."
rollback: >-
  Every edit is a GitHub Actions / script / test change revertable by git revert with ZERO infra effect (no
  terraform apply is performed). The composite actions are behaviour-preserving refactors of existing inline
  blocks; the DEP-07 digest emit/verify and (pr,sha) key are additive and fail-closed (a missing reference
  fails closed, never opens). If the forced-red rehearsal (VP-14) or a fetch-digest check regresses, revert
  the workflow `uses:` edits to restore the inline blocks (the actions can remain unused) and re-open via a
  fresh PR -- never a silent re-plan-and-apply.
