  - step: 14
    phase: post-deploy
    action: >-
      GATE-D2-green (operator-assisted, post-merge) -- FORCED-RED -> RECONCILE PARITY REHEARSAL that MUST come
      back GREEN. On a converged commit with an available saved plan, write a synthetic RED convergence record
      via the pipeline-writer/admin identity (T2.22 rehearsal precedent), dispatch reconcile.yml, and confirm
      it walks the CONSOLIDATED chain -- race-guard re-verify -> fetch-saved-plan (+digest verify) ->
      deterministic-guard -> subagent-plan-review -> terraform apply (no-op on converged state) ->
      write-convergence-record -- and the convergence record READS GREEN afterward. Proves the consolidated
      apply-chain recovers cleanly through the composite actions (so slice E's end-to-end acceptance cannot
      conflate an inversion failure with a consolidation regression). APPLIES NOTHING NEW (the reconcile apply
