constraints:
  - "APPLIES NOTHING (Decision 77/92/126): no terraform/personal or terraform/github .tf is edited; all edits are workflow/action/script/test, effective on merge. Agents never self-direct terraform apply. The DEP-07 c3 key stays within the existing tfplan/personal/* grant -- no IAM, no apply. The overseer batches any human-gated apply separately; this slice triggers none."
  - "CI-SAFETY (rec-2770, learned in D1): every hermetic:true pre-deploy VP step and every graduated-check registry `command` is PURE-SHELL (grep / git ls-files / wc / awk) -- never bin/venv-python. CI has no .venv, so validate_vp_replay re-runs the hermetic steps and the graduated checks there; a venv-python command passes locally + in code-review but fails in CI. pytest/validate steps are hermetic:false (not replayed)."
  - "No-TOCTOU + anti-masking preserved verbatim (Decision 77/92/55): the composite actions carry the guard exit-code routing, the always-run record-write skip conditions (REFUSED/ROUTED/STARVED), the read-back verify, the reconcile race guard, and the STARVED-no-latch semantics UNCHANGED. Consolidation is a refactor, not a behaviour change."
  - "Environment gate stays at the JOB level (Decision 92 pt3 / Decision 94): the tf-gated-apply Environment and OIDC role selection remain inline job-level keys in the entry workflows -- composite actions run inside the already-authorised job; they never carry or bury the authorization gate. (This is the core reason for choosing composite actions over a reusable workflow.)"
  - "Branch protection (Decision 83): do NOT add or remove a required status check; the new terraform-plan-digest commit status is advisory/machine-verified at fetch, NOT a required PR check; terraform-converged stays advisory."
  - "PUBLIC repo (Decision 101): composite actions, scripts, and the digest carry no account IDs / ARNs / ExternalIds; the speculative-plan PR-comment redaction self-check (12-digit account-number guard) is preserved verbatim. Commit statuses are publicly readable (simplifies the fetch-side digest read)."
  - "SLOC (Decision 128): the two new scripts (ducklake_artifacts.py, plan_digest.py) stay under 500 SLOC; the workflows SHRINK. No budget raise, no --update-sloc-budgets re-seed."
  - "Warehouse-SoT / Single-Portal (Decision 84): rec-2663 + rec-2659 close via the Resolves: trailer / ops portal; never edit logs/*.jsonl directly."
  - "No rescue agents or workaround loops (Decision 55): on an unrecoverable V3/rehearsal failure, stop and RCA -- diff the drifted composite action against its inline original; never hot-patch the convergence record."
  - "Only modify files listed in scope; out-of-scope issues become recommendations, not inline fixes."
