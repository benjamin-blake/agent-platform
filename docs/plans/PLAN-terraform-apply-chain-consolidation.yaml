  - "MECHANISM CHOICE = composite actions (.github/actions/*/action.yml) + two tested scripts, NOT a single reusable workflow_call workflow. The audit (DEP-08 proposed_change) offered BOTH ('composite actions / a workflow_call workflow'); T2.46 c1 says 'in the new reusable workflow' but its binding requirement is 'each block exists exactly once + both entry workflows pass their behavioural contracts'. Composite actions satisfy that AND keep the Environment gate + OIDC role + trigger/if-guards + concurrency VISIBLE at the entry-workflow job level (a reusable workflow would bury the security-critical gated-apply Environment behind a conditional `environment:` input -- worse for a solo operator and higher-risk on the exact gate this run is hardening). The guard+review+apply 'chain' becomes a short, order-preserving sequence of `uses:` steps. This deviation is a judgment call for the (overseer-run) plan-critique gate to review."
  - "T2.46 files_in_scope lists terraform/personal/oidc.tf; this plan deliberately does NOT touch it. Reason: the only oidc.tf-relevant change is the DEP-07 c3 key refinement, and tfplan/personal/<pr>/<sha>.bin stays inside the existing TfplanWrite grant (PutObject on tfplan/personal/*), so no IAM change is needed -- and touching terraform/personal would force a human-gated apply this slice must NOT trigger (constraint: applies nothing). Keeping oidc.tf out is what makes D2 fully code/workflow-effective-on-merge."
  - "DEP-07 x DEP-08 synergy: consolidating the fetch into ONE fetch-saved-plan composite action means the digest verification is implemented ONCE and automatically covers every fetch site (sandbox push + gated; reconcile auto + gated) -- the audit's 'verify at all fetch sites' falls out of the consolidation for free. The digest REFERENCE is a terraform-plan-digest commit status keyed to the PR head sha (written once by the plan job's GITHUB_TOKEN with statuses:write); a same-repo PutObject attacker would have to forge the S3 object AND the commit status AND still pass guard+review -- the residual same-repo-actor surface is the one DEP-07 explicitly accepts."
