schema_version: 1
slug: "ducklake-maintenance-smoke-split"
intent: >-
  Split the privileged ducklake_maintenance Lambda into a CI-invokable smoke-safe function and an
  admin-gated singleton holding the production-destructive verbs, so the T2.18 c9 post-deploy smoke
  test runs autonomously in the governed CD channel without granting the always-on public-repo CI
  identity invoke on a production-catalog-destructive Lambda -- advancing the self-improving loop's
  no-human-in-the-critical-path goal while keeping factory-state blast radius behind IAM.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-ducklake-maintenance-smoke-split.yaml
phase: >-
  Platform tier_item T2.18 (DuckLake maintenance pipeline replacing ops_compaction) follow-on --
  closes c9 (autonomous per-Lambda smoke gate) and reconciles the silently-complete criteria;
  product phase unaffected (platform-axis infrastructure only).
scope:
  - file: src/lambdas/ducklake_maintenance_smoke/handler.py
    action: Create
    purpose: >-
      Smoke-safe Lambda entrypoint. Dispatch table = {merge, gc, breaker_probe, hot_merge} ONLY,
      env-pinned to the smoke catalog (DUCKLAKE_DATA_PATH/META_SCHEMA default to smoke). Shares
      src/common/ducklake_maintenance.py. Destructive/operational verbs are ABSENT from its dispatch,
      so a crafted CI payload (e.g. action=catalog_reinit) returns 400 unknown-action.
  - file: src/lambdas/ducklake_maintenance_smoke/__init__.py
    action: Create
    purpose: Package marker for the new Lambda slug.
  - file: src/lambdas/ducklake_maintenance_smoke/manifest.yaml
    action: Create
    purpose: >-
      CD.24 per-Lambda packaging manifest (Decision 79 coverage invariant). status active. Includes
      the shared ducklake runtime/maintenance modules; excludes catalog_dr/pgclient (restore_drill
      stays admin-side). lifecycle-decoupled code deploy via the governed channel (Decision 125/126).
  - file: src/lambdas/ducklake_maintenance/handler.py
    action: Modify
    purpose: >-
      Remove the 4 smoke actions from the dispatch table AND their now-orphaned defs/constants
      (action_merge/action_gc/action_hot_merge/action_breaker_probe, _SCOPE_TABLES, _HOT_SCOPE_TABLES,
      _BREAKER_PROBE_* -- ruff F811/unused + coverage force this) ; retain the production/operational
      verbs (catalog_reinit, merge_ops, reconcile_columns, restore_drill, catalog_stats, clone_catalog).
      SLOC decreases (Decision 128; decreases unrestricted).
  - file: src/lambdas/ducklake_maintenance/manifest.yaml
    action: Modify
    purpose: Update notes to reflect the admin-gated destructive/operational role after the split.
  - file: terraform/personal/ducklake_maintenance_smoke.tf
    action: Create
    purpose: >-
      New smoke function + smoke-prefix-scoped IAM execution role (S3 RW+Delete on the SMOKE prefix
      only, Neon DSN read, DuckLakeMaintenance metrics, logs), reserved_concurrent_executions=1,
      AWS_IAM Function URL, deps+extensions layers (no pgclient). Re-targeted EventBridge rules for
      merge (daily) / gc (weekly) / hot_merge (6h). Breaker CloudWatch alarm (namespace-scoped).
      lifecycle { ignore_changes = [source_code_hash] } (Decision 125/126). Outputs the smoke
      Function URL + name.
  - file: terraform/personal/ducklake_maintenance.tf
    action: Modify
    purpose: >-
      Remove the merge/gc/hot_merge EventBridge rules+targets+permissions (moved to the smoke fn);
      keep the admin function, the merge_ops (prod, 6h) schedule, and the breaker alarm reference.
      Narrow the admin exec role to drop the now-unused smoke-prefix S3 grant (prod prefix retained;
      restore_drill scratch lives under the prod prefix). Keep the existing AWS_IAM Function URL.
  - file: terraform/personal/oidc.tf
    action: Modify
    purpose: >-
      Grant github_ci_branch lambda:InvokeFunction/InvokeFunctionUrl/GetFunctionUrlConfig on the NEW
      smoke function ARN ONLY, via a distinctly-named sid "MaintenanceSmokeInvokeCI" (never the admin
      ducklake_maintenance ARN). Add the smoke function ARN to the github_ci_ducklake_deploy
      DucklakeUpdateFunctionCode grant (else the governed CD deploy AccessDenies on UpdateFunctionCode
      for the 5th function). Add the new smoke EXEC role ARN to IAMPlatformRolesRead (the shared
      github_ci_plan+github_ci_drift refresh-read grant; else validate_ci_refresh_read_coverage fails
      for plan/drift). Do NOT add per-ARN LambdaRead/EventBridgeRead grants -- Decision 129 pt1 already
      broadened those to function:agent-platform-* / rule:agent-platform-* account-wide (per-ARN
      additions are redundant and trip validate_ci_refresh_read_coverage).
  - file: terraform/bootstrap/github_ci_apply.tf
    action: Modify
    purpose: >-
      Enumerate the new smoke EXEC role ARN in IAMRolesRead (required by validate_ci_refresh_read_coverage,
      the --pre gate this plan runs; iam stays enumerated per Decision 35/98/129 pt2) and add the smoke
      function ARN to the enumerated lambda:AddPermission grant (else the EventBridge-invoke
      aws_lambda_permission for the smoke rules cannot apply). Landed via the separate bootstrap
      admin-applied path (terraform/bootstrap is admin-only, out-of-band from the CD pipeline, T2.23).
  - file: .github/workflows/deploy-ducklake-lambdas.yml
    action: Modify
    purpose: >-
      Build+deploy the 5th ducklake function; add it to the deploy-record false-green guard loop;
      add post-deploy smoke steps (--lambda-maintenance-merge/gc/breaker/hot-merge) resolving the
      smoke Function URL under the github_ci_branch role. This is the autonomous c9 gate.
  - file: scripts/build_lambda.py
    action: Modify
    purpose: Add the 5th ducklake function to the --ducklake-only build + --deploy code-update set.
  - file: scripts/build_lambda_config.py
    action: Modify
    purpose: Register the smoke function name -> lambda-packages/ducklake-maintenance-smoke.zip mapping.
  - file: scripts/ducklake_smoke/core.py
    action: Modify
    purpose: >-
      Add DUCKLAKE_MAINTENANCE_SMOKE_URL env + _function_url "maintenance_smoke" -> env /
      terraform-output ducklake_maintenance_smoke_function_url resolution.
  - file: scripts/ducklake_smoke/lambda_maintenance_gates.py
    action: Modify
    purpose: >-
      Repoint the 4 maintenance smoke gates from _function_url("maintenance") to
      _function_url("maintenance_smoke"); update docstrings (no longer "requires agent_platform_admin"
      -- now invoked by github_ci_branch on the smoke function).
  - file: tests/test_ducklake_maintenance_smoke_handler.py
    action: Create
    purpose: >-
      Unit tests for the new handler: dispatch table contains exactly the 4 smoke actions and NOT any
      destructive verb; a destructive-action payload returns 400 unknown-action; the smoke actions do
      not read data_path/meta_schema from the event (env-pinned). 100% coverage of the new module.
  - file: tests/test_ducklake_maintenance_handler.py
    action: Modify
    purpose: Assert the 4 smoke actions are removed from the admin dispatch and operational verbs remain.
  - file: tests/test_ducklake_neon_smoke_test.py
    action: Modify
    purpose: Update gate patch targets / URL resolution for the repointed maintenance_smoke gates.
  - file: tests/test_build_lambda_config.py
    action: Modify
    purpose: Assert the 5th ducklake function + zip mapping is registered.
  - file: tests/test_build_lambda.py
    action: Modify
    purpose: >-
      Bump the hardcoded subprocess/upload mock call_count (4 function zips + 3 layers = 7 -> 5 + 3
      = 8) at both == 7 asserts in _run_ducklake_build; AND extend the build_ducklake_function_package
      side_effect lists from 4 to 5 _FakePath entries in ALL THREE _run_ducklake_build tests -- including
      test_run_ducklake_build_bucket_missing_exits, which has no count assert but still consumes the
      side_effect list (the classic mock-exhaustion gotcha, PROJECT_CONTEXT.md). Without both, --pre (VP12) fails.
  - file: docs/contracts/build-lambda.yaml
    action: Modify
    purpose: >-
      Register the smoke function -> ducklake-maintenance-smoke.zip mapping in
      ducklake_function_zip_keys (loaded at runtime by build_lambda_config._load_build_contract);
      without it the deploy cannot resolve the function->zip mapping. Also add
      ducklake-maintenance-smoke.zip to pipelines.ducklake.artifacts for artefact honesty (that list is
      documentation -- the loader consumes only deploy_targets -- so it is non-load-bearing).
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Freshness-Gate bookkeeping on T2.18: flip c1(mechanism)/c3/c5/c6/c7 -> met (met_by this plan);
      re-ground c2 to smoke-scoped-met + prod-GC-owned-by-T2.26, and re-home c4 (ops_compaction
      retirement) and c8 (final numeric co-tuning + real high-write tables) to T2.26 by criterion-text
      update; re-ground c9 to the split + autonomous CI gate; update files_in_scope + progress_note.
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Author the new Decision (privileged-verb Lambda decomposition rule; amends Decision 81 cl.1
      3->4 runtime artifacts) at the next free ## Decision NNN header. Written to ops_decisions via
      --backfill-decisions-md at /implement time (Decision 84/105); NEVER a direct warehouse write.
bundled_recommendations: []
closes_criteria:
  - "T2.18:c1"
  - "T2.18:c3"
  - "T2.18:c5"
  - "T2.18:c6"
  - "T2.18:c7"
  - "T2.18:c9"
  - >-
    APPLY-PATH SPLIT (critical -- github_ci_apply's own authority budget, not just the guard, decides
    who can apply). These IAM changes are BEYOND github_ci_apply's bounded authority
    (IAMRoleCreateBounded only mints boundary-carrying roles; IAMRoleWriteBounded scopes PutRolePolicy
    to github-ci-branch/pr ONLY; DenyIAMEscalation) -- so tf-gated-apply/apply-sandbox CANNOT apply them
    and they require agent_platform_admin (human-gated `-target` apply from the ADMIN container/operator,
    same precedent as the github_ci_drift admin-create and the T2.43 prod exec roles / ducklake_maintenance.tf
    APPLY POSTURE): (a) the new smoke exec role + inline policy (ducklake_maintenance_smoke.tf); (b) the
    github_ci_ducklake_deploy DucklakeUpdateFunctionCode grant addition (oidc.tf); (c) the
    github_ci_plan/github_ci_drift IAMPlatformRolesRead grant addition (oidc.tf); (d) the bootstrap
    IAMRolesRead + lambda:AddPermission additions (terraform/bootstrap, already admin-only out-of-band).
    The DEV /implement container LACKS agent_platform_admin -- the IAM-create portion is an operator/ADMIN
    handoff, NOT a tf-gated-apply approval. IAM apply MUST precede the code deploy.
  - >-
    CD-applicable subset: the github_ci_branch MaintenanceSmokeInvokeCI grant is an in-budget
    aws_iam_role_policy UPDATE on a managed boundary-carrying role (github-ci-branch is in
    authority_budget.json in_budget_managed_roles; UPDATE in in_budget_actions), so per T2.25 / Decision
    92 pt5 the guard classifies it IN-BUDGET and it AUTO-APPLIES behind the guard (exit 0) -- NOT
    tf-gated-apply gated. The NON-IAM resources (the smoke function, Function URL, and the moved
    EventBridge rules/targets/permissions) also auto-apply behind the guard on the apply-sandbox path
    (Decision 77/92). The speculative-plan guard verdict on the PR is advisory.
  - >-
    EventBridge write-grant coverage (verify at /implement -- VP10 does NOT check this): github_ci_apply's
    bootstrap EventBridgeWrite grant is ENUMERATED to the existing rule ARNs (no rule/agent-platform-*
    wildcard, unlike the READ side). RECOMMENDED: keep the moved smoke rules' AWS `name` attributes equal
    to the existing rule names (agent-platform-ducklake-maintenance-{merge,gc,hot_merge}) and move only
    the terraform resource ADDRESS via `moved{}` -- the ARN is unchanged so the enumerated grant already
    covers PutRule/PutTargets and the CD apply does not AccessDeny. If instead new AWS rule names are
    chosen, the new rule ARNs MUST be added to the bootstrap EventBridgeWrite grant (another
    agent_platform_admin bootstrap edit). This makes `moved{}` recommended, not merely optional.
  - >-
    Code deploy via the governed CD channel .github/workflows/deploy-ducklake-lambdas.yml (T2.38,
    Decision 125/126); the new function carries lifecycle { ignore_changes = [source_code_hash] } so
    code redeploys do not surface as a terraform diff on the IAM-gated apply path.
  - >-
    Provider-init egress: terraform/personal uses the kislerdm/neon third-party provider (github.com
    checksum fetch blocked from a stock CC-web session, Decision 119) -- local terraform steps are
    fmt/grep only; terraform validate/plan/apply are CI-delegated (terraform-validate check +
    speculative-plan/apply-sandbox jobs are authoritative).
acceptance_criteria:
  - >-
    A new smoke-safe Lambda ducklake_maintenance_smoke exists whose dispatch table is exactly
    {merge, gc, breaker_probe, hot_merge}; no production-destructive verb is reachable on it.
  - >-
    The smoke function's IAM execution role can write/delete S3 only under the smoke prefix (no prod
    prefix), and reserved_concurrent_executions=1 is preserved.
  - >-
    github_ci_branch is granted invoke on the smoke function ARN only; it is NOT granted invoke on
    the admin ducklake_maintenance ARN (verified by grep of the diffed oidc.tf).
  - >-
    The admin ducklake_maintenance function retains the production/operational verbs, its prod-prefix
    IAM, the merge_ops schedule, and reserved_concurrent_executions=1; the 4 smoke actions are gone
    from its dispatch.
  - >-
    deploy-ducklake-lambdas.yml builds/deploys the smoke function and runs the four
    --lambda-maintenance-* smoke gates post-deploy under github_ci_branch (the autonomous c9 gate).
  - >-
    The four maintenance smoke gates pass against the deployed smoke function (c9 verified live).
  - >-
    A new Decision is written to ops_decisions (via --backfill-decisions-md) ratifying the
    scope-by-worst-verb rule and amending Decision 81 cl.1 (3->4 runtime artifacts).
  - >-
    T2.18 exit_criteria are reconciled: c1/c3/c5/c6/c7 flipped met with proof; c2 re-grounded
    (smoke-met, prod-GC->T2.26); c4/c8 re-homed to T2.26; c9 flipped met on the CD gate green.
  - "bin/venv-python -m scripts.validate --pre passes on the branch diff."
  - >-
    VP hermetic/graduation policy (VF-01 vp-replay + T3.21 graduation-completeness, both landed on main
    during the planning gap): every pre-deploy VP step carries graduation=not-applicable (these are
    plan-specific one-shot migration/wiring/re-adjudication checks, not reusable kernel verifiers -- none
    graduates into config/agent/verification_registry). All implementation-verifying steps are
    hermetic:false because they grep files /implement CREATES (so they cannot pass the plan-PR-tree
    vp-replay); only VP8 (c6 re-adjudication of already-landed src/common/ducklake_maintenance.py) is
    hermetic:true and independently replay-proven at PR time.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      Blast-radius invariant: the smoke handler dispatch admits ONLY the 4 smoke actions and NO
      production-destructive verb.
    command: >-
      grep -qE '"merge":|"gc":|"hot_merge":|"breaker_probe":' src/lambdas/ducklake_maintenance_smoke/handler.py
      && ! grep -qE 'catalog_reinit|merge_ops|reconcile_columns|restore_drill|clone_catalog|catalog_stats' src/lambdas/ducklake_maintenance_smoke/handler.py
    expected: >-
      Exit 0 -- the 4 smoke actions are present and none of the 6 production-destructive/operational
      verbs (catalog_reinit, merge_ops, reconcile_columns, restore_drill, clone_catalog, catalog_stats)
      appear anywhere in the smoke handler source.
    fix_if: >-
      A destructive verb name appears in the smoke handler, or a smoke action is missing -- a crafted
      CI payload could then reach a production verb; remove the verb from the smoke dispatch.
    hermetic: false
    graduation: not-applicable
  - step: 2
    phase: pre-deploy
    action: >-
      Env-pinning invariant: the smoke actions do not read data_path/meta_schema from the event (they
      use the env-pinned smoke connection), so a payload cannot redirect them to the prod catalog.
    command: >-
      ! grep -nE "event.get\\((['\"])(data_path|meta_schema)\\1\\)" src/lambdas/ducklake_maintenance_smoke/handler.py
    expected: Exit 0 -- no data_path/meta_schema event override exists in the smoke handler.
    fix_if: >-
      A smoke action accepts a caller-supplied data_path/meta_schema; remove it so the connection is
      env-pinned to the smoke catalog only.
    hermetic: false
    graduation: not-applicable
  - step: 3
    phase: pre-deploy
    action: New smoke-handler unit tests pass (dispatch, unknown-action 400 for a destructive payload, env-pinning).
    command: bin/venv-python -m pytest tests/test_ducklake_maintenance_smoke_handler.py -x -q
    expected: All tests pass; the destructive-payload case asserts a 400 unknown-action response.
    fix_if: >-
      Dispatch admits a destructive action, env pinning is wrong, or the 400 path is not returned.
    hermetic: false
    graduation: not-applicable
  - step: 4
    phase: pre-deploy
    action: >-
      The admin handler no longer dispatches the 4 smoke actions and still dispatches the operational
      verbs.
    command: bin/venv-python -m pytest tests/test_ducklake_maintenance_handler.py -x -q
    expected: >-
      Tests pass; assertions confirm merge/gc/hot_merge/breaker_probe are absent from the admin
      dispatch and catalog_reinit/merge_ops/reconcile_columns/restore_drill remain.
    fix_if: A smoke action is still routable on the admin function, or an operational verb was dropped.
    hermetic: false
    graduation: not-applicable
  - step: 5
    phase: pre-deploy
    action: >-
      Blast-radius IAM invariant (machine-verifiable positive AND negative): a github_ci_branch invoke
      statement references the smoke ARN, and NEITHER github_ci_branch invoke statement references the
      admin (non-smoke) ducklake_maintenance ARN.
    command: >-
      grep -A10 'MaintenanceSmokeInvokeCI' terraform/personal/oidc.tf | grep -q 'ducklake_maintenance_smoke.arn'
      && ! grep -A10 -E 'DuckLakeInvokeCI|MaintenanceSmokeInvokeCI' terraform/personal/oidc.tf | grep -qE 'ducklake_maintenance\.arn'
    expected: >-
      The smoke ARN appears in the MaintenanceSmokeInvokeCI (github_ci_branch) statement; the admin
      pattern ducklake_maintenance\.arn (word-boundary -- does NOT match ducklake_maintenance_smoke.arn)
      appears in NEITHER github_ci_branch invoke statement.
    fix_if: >-
      The admin maintenance ARN is present in a github_ci_branch invoke statement (blast-radius widen --
      the whole point of the split is defeated), or the smoke invoke grant is missing.
    hermetic: false
    graduation: not-applicable
  - step: 6
    phase: pre-deploy
    action: >-
      Decision 129 conformance: no redundant per-ARN Lambda/EventBridge refresh-read grants were
      added; the CI refresh-read coverage verifier passes.
    command: bin/venv-python -m scripts.validate --pre
    expected: >-
      --pre passes including validate_ci_refresh_read_coverage (the new smoke role is enumerated in
      IAMRolesRead; the function/rule are covered by the D129 account-wide prefixes -- no per-ARN
      lambda/eventbridge additions).
    fix_if: >-
      The coverage verifier fails (an UNMAPPED resource type / an uncovered resource -- extra grants are
      harmless, they do NOT fail it); enumerate the new smoke exec role in IAMRolesRead per Decision 129 pt2/98.
    hermetic: false
    graduation: not-applicable
  - step: 7
    phase: pre-deploy
    action: >-
      Build/deploy/grant wiring for the 5th function: build set + zip mapping (config + build-lambda.yaml
      contract) + URL env + gate repoint + the governed-deploy UpdateFunctionCode grant + the bootstrap
      AddPermission/IAMRolesRead grants.
    command: >-
      grep -q 'ducklake_maintenance_smoke' scripts/build_lambda.py
      && grep -q 'ducklake-maintenance-smoke.zip' scripts/build_lambda_config.py
      && grep -q 'ducklake-maintenance-smoke.zip' docs/contracts/build-lambda.yaml
      && grep -q 'DUCKLAKE_MAINTENANCE_SMOKE_URL' scripts/ducklake_smoke/core.py
      && grep -q 'maintenance_smoke' scripts/ducklake_smoke/lambda_maintenance_gates.py
      && grep -A15 'DucklakeUpdateFunctionCode' terraform/personal/oidc.tf | grep -q 'ducklake_maintenance_smoke'
      && grep -q 'ducklake-maintenance-smoke' terraform/bootstrap/github_ci_apply.tf
    expected: >-
      Build set, config + contract zip mapping, URL env, and gate repoint are wired; the smoke function
      ARN is enumerated in the github_ci_ducklake_deploy UpdateFunctionCode grant (else the CD deploy
      AccessDenies) and in the bootstrap AddPermission + IAMRolesRead grants (else the EventBridge-invoke
      permission cannot apply / the coverage verifier fails). NOTE: terraform/bootstrap is a SEPARATE
      root -- it cannot use aws_lambda_function.*.arn interpolation, so it enumerates the HYPHENATED
      literal ARN (agent-platform-ducklake-maintenance-smoke); grep the hyphenated spelling there, the
      underscore resource-reference spelling in oidc.tf. VP7 is the ONLY pre-deploy check of the bootstrap
      AddPermission grant (the coverage verifier does not check WRITE grants).
    fix_if: >-
      A wiring or grant reference is missing -- the CD deploy would AccessDeny, the smoke URL would not
      resolve, the EventBridge permission would fail to apply, or validate_ci_refresh_read_coverage fails.
    hermetic: false
    graduation: not-applicable
  - step: 8
    phase: pre-deploy
    action: >-
      Re-adjudicate c6 (destructive GC guardrails pinned) -- constants unchanged and cleanup_all never
      True in scheduled runs.
    command: >-
      grep -qE 'SNAPSHOT_RETAIN_DAYS: int = 30' src/common/ducklake_maintenance.py
      && grep -qE 'FILE_CLEANUP_GRACE_DAYS: int = 7' src/common/ducklake_maintenance.py
      && grep -qE 'SNAPSHOT_FLOOR: int = 2' src/common/ducklake_maintenance.py
      && grep -qE '_DEFAULT_GC_BREAKER_FILE_FRACTION: float = 0.20' src/common/ducklake_maintenance.py
      && grep -qE 'cleanup_all=False' src/common/ducklake_maintenance.py
    expected: >-
      All guardrail constants match CD.33/Decision 81; the scheduled cleanup call passes cleanup_all=False
      (the string cleanup_all=True appears only in docstrings, never as a call arg).
    fix_if: A guardrail drifted or a scheduled call passes cleanup_all=True -- do NOT relax to pass (Decision 55).
    hermetic: true
    graduation: not-applicable
  - step: 9
    phase: pre-deploy
    action: >-
      Re-adjudicate c5 (two singleton no-LLM cadences) and c1 (inlining disabled + sequence) --
      reserved_concurrent_executions=1 on both maintenance functions; connection-level inlining=0.
    command: >-
      grep -q 'reserved_concurrent_executions' terraform/personal/ducklake_maintenance_smoke.tf
      && grep -q 'reserved_concurrent_executions' terraform/personal/ducklake_maintenance.tf
      && grep -q 'SET ducklake_default_data_inlining_row_limit=0' src/common/ducklake_runtime.py
      && ! grep -rqiE 'litellm|anthropic|openai|gemini' src/lambdas/ducklake_maintenance_smoke/handler.py
    expected: >-
      Both functions pin singleton concurrency; inlining is disabled at the connection level; no LLM
      client import in the smoke handler.
    fix_if: A maintenance function lost its singleton cap, inlining re-enabled, or an LLM import leaked in.
    hermetic: false
    graduation: not-applicable
  - step: 10
    phase: pre-deploy
    action: >-
      Re-adjudicate c3 (cadence mechanism) and c7 (weekly catalog DR + freshness alarm), AND assert the
      EventBridge rule MOVE: merge/gc/hot_merge on the smoke fn, removed from the admin tf, merge_ops
      still on the admin fn; DR weekly with the 7-day alarm.
    command: >-
      grep -q 'ducklake_maintenance_merge_ops' terraform/personal/ducklake_maintenance.tf
      && grep -qE 'action = "(merge|gc|hot_merge)"' terraform/personal/ducklake_maintenance_smoke.tf
      && ! grep -qE '"ducklake_maintenance_merge"|"ducklake_maintenance_gc"|"ducklake_maintenance_hot_merge"' terraform/personal/ducklake_maintenance.tf
      && grep -q 'cron(0 3 ? \* SUN \*)' terraform/personal/ducklake_catalog_dr.tf
      && grep -qE 'evaluation_periods  = 7' terraform/personal/ducklake_catalog_dr.tf
    expected: >-
      merge_ops stays on the admin fn; the merge/gc/hot_merge action targets exist on the smoke fn and
      their named rule resources are REMOVED from ducklake_maintenance.tf (no duplicate/name-collision at
      apply); catalog DR is weekly (Sunday 03:00 UTC) with evaluation_periods=7.
    fix_if: >-
      A cadence is on the wrong function, a moved merge/gc/hot_merge rule still exists in the admin tf
      (destroy/recreate collision -- consider a moved{} block), or the DR cadence/alarm drifted (Decision 88).
    hermetic: false
    graduation: not-applicable
  - step: 11
    phase: pre-deploy
    action: Full fast presubmit passes on the branch diff (ruff, mypy, pytest, coverage, SLOC, roadmap referential guard, VP replay).
    command: bin/venv-python -m scripts.validate --pre
    expected: >-
      --pre passes; validate_platform_roadmap accepts the closes_criteria refs (T2.18:c1/c3/c5/c6/c7/c9
      all exist) and the Freshness-Gate criterion edits; test_coverage_checker passes for every modified source file.
    fix_if: Any gate fails; fix forward (Decision 55) -- never relax a check to pass.
    hermetic: false
    graduation: not-applicable
  - step: 12
    phase: post-deploy
    action: >-
      Terraform gate + APPLY-PATH SPLIT (Decision 119 CI-delegation + Decision 92/98 authority tiering):
      terraform-validate green; the beyond-budget IAM lands via agent_platform_admin; the branch grant +
      non-IAM resources land via the CD gated path.
    command: >-
      echo "CI: confirm terraform-validate + speculative-plan (guard verdict) green via mcp__github__pull_request_read get_check_runs. ADMIN HANDOFF (agent_platform_admin -target, operator/ADMIN container -- NOT tf-gated-apply): apply the smoke exec role+policy (ducklake_maintenance_smoke.tf), the oidc DucklakeUpdateFunctionCode + IAMPlatformRolesRead grant additions, and the bootstrap IAMRolesRead + AddPermission additions. CD: the github_ci_branch MaintenanceSmokeInvokeCI grant (in-budget T2.25 auto-apply behind the guard, not gated) + the non-IAM function/URL/EventBridge rules apply via apply-sandbox. IAM precedes code deploy."
    expected: >-
      terraform-validate green; the beyond-budget IAM (exec role+policy, deploy/plan/drift grant edits,
      bootstrap) is admin-applied and converges; the github_ci_branch grant + non-IAM resources apply via
      the CD gated path and apply-sandbox writes a green convergence record.
    fix_if: >-
      terraform-validate fails (fix the .tf and re-push); or an implementer routed the exec-role CREATE /
      deploy-plan-drift grant edits to tf-gated-apply and hit AccessDenied on iam:CreateRole/PutRolePolicy
      (github_ci_apply is out-of-budget for these) -- re-route those to agent_platform_admin.
    hermetic: false
  - step: 13
    phase: post-deploy
    action: >-
      Autonomous c9 gate: after the governed CD channel deploys the smoke function, the four
      maintenance smoke gates pass (run by deploy-ducklake-lambdas.yml under github_ci_branch, or from
      the admin container with the smoke URL resolved).
    command: >-
      bin/venv-python -m scripts.ducklake_neon_smoke_test --lambda-maintenance-merge
      && bin/venv-python -m scripts.ducklake_neon_smoke_test --lambda-maintenance-gc
      && bin/venv-python -m scripts.ducklake_neon_smoke_test --lambda-maintenance-breaker
      && bin/venv-python -m scripts.ducklake_neon_smoke_test --lambda-maintenance-hot-merge
    expected: >-
      MAINTENANCE_MERGE OK, MAINTENANCE_GC OK (breaker not tripped, files stable), MAINTENANCE_BREAKER
      OK (forced 500 trip), MAINTENANCE_HOT_MERGE OK -- all against the smoke catalog. Closes c9.
    fix_if: >-
      A gate fails or returns AccessDenied -- the CI invoke grant or the smoke function deploy is wrong;
      the false-green deploy-record guard must also be green (source_git_sha == github.sha).
    hermetic: false
  - step: 14
    phase: post-deploy
    action: >-
      The bundled Decision is authored in DECISIONS.md and written to ops_decisions via the portal
      (never a direct warehouse write).
    command: bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md
    expected: >-
      The new ## Decision NNN header (scope-by-worst-verb rule; amends Decision 81 cl.1 3->4 artifacts)
      is present in DECISIONS.md and the backfill reports the ops_decisions row upserted.
    fix_if: The header is malformed or the backfill errors; fix the DECISIONS.md entry and re-run.
    hermetic: false
  - step: 15
    phase: post-deploy
    action: >-
      Roadmap bookkeeping applied and internally consistent: c9 flipped met (met_by this plan) after
      the CD gate; c2 re-grounded (smoke-met, prod-GC->T2.26); c4/c8 re-homed to T2.26.
    command: >-
      grep -nA2 'id: c9' docs/ROADMAP-PLATFORM.yaml | grep -q 'status: met'
      && bin/venv-python -m scripts.roadmap.plan_document docs/plans/PLAN-ducklake-maintenance-smoke-split.yaml
    expected: >-
      c9 shows status met with a met_by pointer; the plan document validates (closes_criteria refs
      resolve to real T2.18 criteria) and the c2/c4/c8 re-homing text names T2.26.
    fix_if: A criterion flip is missing or a closes_criteria ref is dangling (validate_platform_roadmap fails).
    hermetic: false
constraints:
  - >-
    The smoke function's dispatch table MUST NOT contain any production-destructive/operational verb
    (catalog_reinit, merge_ops, reconcile_columns, restore_drill, clone_catalog, catalog_stats). The
    boundary is the resource shape + IAM, NOT an in-handler guard (an agent could edit a guard out).
  - >-
    github_ci_branch (and any CI identity) must NEVER be granted lambda:InvokeFunction on the admin
    ducklake_maintenance ARN. CI invoke is scoped to the smoke function ARN only.
  - >-
    Do not relax any CD.33/Decision 81 guardrail constant (retain days, grace, floor, breaker
    fraction/bytes, weekly cadence, cleanup_all=False) to make a gate pass (Decision 55).
  - >-
    Decisions are written ONLY via scripts.ops_data_portal (DECISIONS.md numbering + backfill to
    ops_decisions); never a direct warehouse write, never a prose-doc edit (Decision 84/86/105).
  - >-
    terraform validate/plan/apply for terraform/personal are CI-delegated (Decision 119); local
    terraform steps are fmt/grep only. Agents never self-direct terraform apply; the IAM role CREATE
    is human-gated via tf-gated-apply (Decision 77/92/126).
  - "No rescue agents or workaround loops (Decision 55)."
  - "Only modify files listed in scope."
