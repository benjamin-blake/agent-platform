rollback: >-
  Pre-apply: revert the branch (no infra changed). Post-apply: the smoke function + its role/URL/rules
  are additive; to roll back, re-target the 3 EventBridge rules to the admin function, remove the
  github_ci_branch smoke invoke grant + the smoke function/role (admin apply), and restore the 4 smoke
  actions to the admin dispatch. The admin function retains full capability throughout, so maintenance
  cadences never lapse. No warehouse rollback for the Decision (append-only; supersede via a new
  Decision if reversed).
