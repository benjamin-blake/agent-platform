rollback: >-
  Phase A and Phase B merge as separate PRs; either can be reverted independently. Phase B schema is
  additive and backward-compatible (bare strings still load via the normalizer), so reverting the
  backfill commit alone restores prior behavior without breaking the loader. The new contract file and
  CD.39/T-1.23 entries are inert if the consuming code is reverted.
