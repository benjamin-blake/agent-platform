schema_version: 1
slug: exit-criteria-ledger-orient-followon
intent: >-
  Make a tier_item's in_progress state resolvable instead of three-way ambiguous by giving each
  exit_criteria entry a machine-readable status, then teaching /orient, /plan, and /implement to
  drive follow-on planning off open criteria -- so the roadmap harness deterministically routes an
  item that needs its NEXT plan to /plan (not a wrong /implement-resume), advancing the self-improving
  platform's North Star of deterministic, low-friction agent orchestration.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-exit-criteria-ledger-orient-followon.yaml
phase: >-
  Platform tier T-1 (roadmap harness). New tier_item T-1.23 -- extends T-1.20 (preflight roadmap-state
  surfacing, just landed) and is the lightweight near-term stand-in for T4.5/Decision 87
  (ops_plans/ops_plan_revisions warehouse entities, gated on the CD.17 executor freeze).

scope:
  # ---- Phase A (skill-only, ship-fast; merged as its own PR before Phase B) ----
  - file: .claude/skills/orient/SKILL.md
    action: Modify
    purpose: >-
      Phase A. Emit follow-on /plan prompts for in_progress items ranked fewest-open-criteria-first;
      add a per-item open-criteria count to the Status Digest (inferred from prose in Phase A,
      read from preflight cache in Phase B); drop the /implement-resume default, suggesting /implement
      only when a genuinely un-actioned (mid-implementing) plan exists.
  - file: .claude/commands/orient.md
    action: Modify
    purpose: >-
      Phase A. Load in_progress items and (Phase B) the new followon-state fields from the preflight
      cache; document the follow-on-prompt and open-criteria-count deliverable additions.
  # ---- Phase B (durable, deterministic) ----
  - file: scripts/platform_roadmap.py
    action: Modify
    purpose: >-
      Phase B. Add the ExitCriterion Pydantic model; widen TierItem.exit_criteria to
      list[str | ExitCriterion] with a normalizer (bare string -> status=open, met_by=None); add
      referential integrity in the RoadmapDocument model_validator (met/rehomed requires met_by;
      rehomed met_by must resolve to a known item id); add compute_followon_state(doc, plans_dir)
      and surface open_criteria/all_plans_actioned/needs_followon_plan in to_preflight_dict for
      in_progress (live) items only.
  - file: scripts/session_preflight.py
    action: Modify
    purpose: >-
      Phase B. Thread the new followon-state fields from compute_state_dict into
      logs/.preflight-report.json (platform_roadmap.in_progress entries gain open_criteria_count,
      all_plans_actioned, needs_followon_plan). Reads only on-disk files (roadmap YAML + docs/plans/);
      no warehouse fan-out (Decision 88).
  - file: scripts/plan_document.py
    action: Modify
    purpose: >-
      Phase B. Add an additive optional closes_criteria: list[str] field to PlanDocument (each entry
      a criterion ref "<item-id>:cN"). No schema_version bump -- additive optional field is
      backward-compatible under extra="forbid" (Decision 85).
  - file: scripts/validate.py
    action: Modify
    purpose: >-
      Phase B. Extend validate_platform_roadmap with criteria-status integrity assertions: met_by
      resolves to a real docs/plans/PLAN-<slug>.yaml OR a 40-hex commit OR (rehomed) a real item id;
      a git-diff-touched tier_item may not retain bare-string criteria; every plan closes_criteria
      ref resolves to a real item:criterion in the roadmap.
  - file: .claude/skills/planning/SKILL.md
    action: Modify
    purpose: >-
      Phase B. Add a follow-on /plan mode: when intent targets an in_progress item with open criteria,
      load the open criteria + prior plans + progress_note, scope ONLY the next slice, and declare
      which item-criteria the plan closes via closes_criteria (mapping to its acceptance_criteria).
  - file: .claude/skills/implement/SKILL.md
    action: Modify
    purpose: >-
      Phase B. Extend the T-1.10 tier_item bookkeeping walk: on VP pass, flip each declared
      closes_criteria criterion open->met (met_by=<plan-slug>) in the staged YAML edit. Only declared
      criteria flip; all-criteria-met items QUALIFY for the completion gate but are never auto-flipped
      (Status-Trusted-Never-Inferred / T2.20).
  - file: docs/contracts/exit-criteria-ledger.yaml
    action: Create
    purpose: >-
      Phase B. Machine-parseable field semantics for the ExitCriterion object and the plan
      closes_criteria field (Decision 86 routing: field semantics -> contract). Draft is in this
      plan's context for review.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Phase B. Add tier_item T-1.23 and candidate_decision CD.39 (draft in context); backfill the
      14 in_progress items' exit_criteria from bare strings to ExitCriterion objects, seeding
      met/rehomed only where the progress_note unambiguously attests it (conservative bias; else open).
  - file: tests/test_platform_roadmap.py
    action: Modify
    purpose: >-
      Phase B. Unit tests for the ExitCriterion normalizer, the model_validator integrity rules, and
      compute_followon_state (in-flight-plan vs no-plan -> needs_followon_plan; live-items-only scope).
  - file: tests/test_session_preflight_platform_roadmap.py
    action: Modify
    purpose: >-
      Phase B. Tests that the preflight cache surfaces open_criteria_count/all_plans_actioned/
      needs_followon_plan on in_progress entries.
  - file: tests/test_plan_document.py
    action: Modify
    purpose: >-
      Phase B. Tests that PlanDocument accepts closes_criteria, defaults it to [], and still rejects
      unknown keys (extra="forbid").
  - file: tests/test_validate.py
    action: Modify
    purpose: >-
      Phase B. Tests for the new validate_platform_roadmap integrity assertions (dangling met_by ->
      failure; unresolvable plan closes_criteria ref -> failure; valid refs -> pass), satisfying the
      100%-new-code-coverage gate for the scripts/validate.py changes.

bundled_recommendations: []
infrastructure_dependencies: []

acceptance_criteria:
  # Phase A
  - .claude/skills/orient/SKILL.md emits follow-on /plan prompts for in_progress items ranked
    fewest-open-criteria-first and shows an open-criteria count in the Status Digest; the in_progress
    recommendation routes to a follow-on /plan by default and suggests /implement ONLY for a
    mid-implementing un-actioned plan (positive assertion -- the current skill has no literal
    /implement-resume default string to remove; the change is the added follow-on routing).
  - .claude/commands/orient.md documents loading in_progress + followon-state inputs and the new
    follow-on-prompt / open-criteria-count deliverable additions.
  # Phase B - schema + ledger
  - TierItem.exit_criteria accepts both bare strings (normalized to status=open) and ExitCriterion
    objects {id, text, status in [open,met,rehomed], met_by}; the RoadmapDocument model_validator
    rejects a met/rehomed criterion with no met_by and a rehomed met_by that names no known item.
  - Every in_progress tier_item (currently 14) carries fully-structured ExitCriterion objects after
    backfill; status is met/rehomed only where the progress_note unambiguously attests it, else open.
  - PlanDocument accepts an optional closes_criteria field (list[str], default []) and still rejects
    unknown keys.
  # Phase B - deterministic signal
  - compute_followon_state(doc, plans_dir) returns, per in_progress item, open_criteria,
    all_plans_actioned, and needs_followon_plan, computed from on-disk files only; needs_followon_plan
    is True iff open_criteria>0 AND no docs/plans/PLAN-*.yaml closes_criteria names a still-open
    criterion of that item; the computation is scoped to live items and excludes
    deferred_post_mvp/reserved (Decision 93).
  - logs/.preflight-report.json platform_roadmap.in_progress entries carry open_criteria_count,
    all_plans_actioned, and needs_followon_plan.
  # Phase B - workflow + enforcement
  - The planning skill documents follow-on /plan mode (scope the next slice; declare closes_criteria);
    the implement skill flips declared closes_criteria open->met (met_by=<plan-slug>) in the bookkeeping
    walk on VP pass, never auto-flipping undeclared/prose criteria.
  - validate.py fails when a touched tier_item keeps bare-string criteria, when a met/rehomed met_by
    does not resolve to a real plan/commit/item, or when a plan closes_criteria ref does not resolve
    to a real item:criterion.
  - docs/contracts/exit-criteria-ledger.yaml exists with field semantics for ExitCriterion and
    closes_criteria, is authored as a non-ritual registry (no top-level contract or class block) so the
    CD.25 contract-drift gate skips it, and the full validate.py presubmit passes.

verification_plan:
  # ---------- Phase A ----------
  - step: 1
    phase: pre-deploy
    action: >-
      Confirm the orient skill POSITIVELY adds follow-on /plan prompts for in_progress items ranked
      fewest-open-criteria-first, an open-criteria count, and a mid-implementing /implement carve-out.
    command: >-
      grep -qiE "follow-on" .claude/skills/orient/SKILL.md
      && grep -qiE "fewest-open-criteria" .claude/skills/orient/SKILL.md
      && grep -qiE "open[- ]criteria count" .claude/skills/orient/SKILL.md
      && grep -qiE "mid-implementing|un-actioned" .claude/skills/orient/SKILL.md
      && echo PHASE_A_SKILL_OK
    expected: Prints PHASE_A_SKILL_OK (all positive follow-on / ranking / open-criteria additions present).
    fix_if: >-
      Missing the follow-on prompt, the fewest-open-criteria ranking, the open-criteria count, or the
      mid-implementing /implement carve-out.
  - step: 2
    phase: pre-deploy
    action: Confirm the orient command documents the new in_progress + followon-state inputs.
    command: >-
      grep -qiE "in_progress" .claude/commands/orient.md
      && grep -qiE "follow-on|needs_followon_plan|open[- ]criteria" .claude/commands/orient.md
      && echo PHASE_A_CMD_OK
    expected: Prints PHASE_A_CMD_OK.
    fix_if: The command file does not load/describe in_progress follow-on inputs.
  # ---------- Phase B: schema + ledger ----------
  - step: 3
    phase: pre-deploy
    action: >-
      Load the roadmap through the (modified) schema and assert every in_progress item has structured
      criteria with a valid status enum; assert bare strings still normalize to status=open.
    command: >-
      bin/venv-python -c "from scripts.platform_roadmap import load;
      d=load('docs/ROADMAP-PLATFORM.yaml');
      ip=[i for i in d.tier_items if i.status=='in_progress'];
      assert ip, 'no in_progress items found';
      bad=[(i.id,c) for i in ip for c in i.exit_criteria if isinstance(c,str)];
      assert not bad, f'unstructured (bare-string) criteria on in_progress items: {bad}';
      print('LEDGER_BACKFILL_OK', len(ip), 'in_progress items', sum(len(i.exit_criteria) for i in ip), 'criteria')"
    expected: Prints LEDGER_BACKFILL_OK with the in_progress + criteria counts; no assertion error.
    fix_if: Any in_progress item still carries a bare-string (unstructured) criterion after backfill.
  - step: 4
    phase: pre-deploy
    action: >-
      Confirm the model_validator rejects a met criterion with no met_by and a rehomed met_by naming
      an unknown item (negative test via an in-memory doc).
    command: bin/venv-python -m pytest tests/test_platform_roadmap.py -k "criterion or exit_criteria or met_by" -q
    expected: Tests pass; the integrity negative cases assert ValueError is raised.
    fix_if: The validator accepts a met-without-met_by or an unresolvable rehomed met_by.
  - step: 5
    phase: pre-deploy
    action: Confirm PlanDocument accepts closes_criteria, defaults to [], and still forbids unknown keys.
    command: bin/venv-python -m pytest tests/test_plan_document.py -k "closes_criteria or extra or forbid" -q
    expected: Tests pass.
    fix_if: closes_criteria rejected, wrong default, or extra="forbid" weakened.
  # ---------- Phase B: deterministic signal ----------
  - step: 6
    phase: pre-deploy
    action: >-
      Exercise compute_followon_state on a fixture: an in_progress item with one open criterion and
      (a) no plan -> needs_followon_plan True; (b) a docs/plans plan whose closes_criteria names that
      open criterion -> needs_followon_plan False (mid-implementing). Assert deferred_post_mvp/reserved
      items are excluded.
    command: bin/venv-python -m pytest tests/test_platform_roadmap.py -k "followon" -q
    expected: Tests pass for both branches and the live-items-only scoping.
    fix_if: needs_followon_plan ignores in-flight plans, or includes non-live items.
  - step: 7
    phase: pre-deploy
    action: >-
      Run preflight and confirm the cache surfaces the new fields on in_progress entries.
    command: >-
      bin/venv-python -m scripts.session_preflight --roadmap-detail full >/dev/null 2>&1;
      bin/venv-python -c "import json;
      r=json.load(open('logs/.preflight-report.json'));
      ip=r['platform_roadmap']['in_progress'];
      assert ip, 'no in_progress entries';
      k={'open_criteria_count','all_plans_actioned','needs_followon_plan'};
      missing=[i['id'] for i in ip if not k.issubset(i)];
      assert not missing, f'entries missing followon fields: {missing}';
      print('PREFLIGHT_FOLLOWON_OK', len(ip), 'in_progress entries')"
    expected: Prints PREFLIGHT_FOLLOWON_OK; every in_progress entry carries all three fields.
    fix_if: Any in_progress entry lacks open_criteria_count/all_plans_actioned/needs_followon_plan.
  - step: 8
    phase: pre-deploy
    action: Confirm preflight-surfacing unit tests pass.
    command: bin/venv-python -m pytest tests/test_session_preflight_platform_roadmap.py -q
    expected: Tests pass.
    fix_if: Preflight projection does not thread the followon fields.
  # ---------- Phase B: enforcement + full gate ----------
  - step: 9
    phase: pre-deploy
    action: >-
      Confirm validate.py's roadmap integrity assertions fail closed on a dangling met_by, via a
      fixture-driven test in tests/test_validate.py (no live-file mutation, no python -c -- the test
      builds an in-memory/temp roadmap and calls validate_platform_roadmap directly).
    command: bin/venv-python -m pytest tests/test_validate.py -k "exit_criteria or met_by or criteria_integrity or closes_criteria" -q
    expected: >-
      Tests pass -- validate_platform_roadmap appends a failure for a met_by that resolves to no real
      plan/commit/item and for an unresolvable plan closes_criteria ref, and accepts valid refs.
    fix_if: validate_platform_roadmap does not flag a dangling met_by or an unresolvable closes_criteria ref.
  - step: 10
    phase: pre-deploy
    action: Run the full presubmit gate to confirm no regressions across both phases.
    command: bin/venv-python -m scripts.validate
    expected: Exit 0 (credential-dependent verifiers may SKIP per Decision 57; no FAIL).
    fix_if: Any check fails -- diagnose and fix before opening either PR.

constraints:
  - IMPLEMENTATION plan only -- the Decision 67 / CD.17 STRATEGIC-plan freeze is in effect; the
    >5-file/>8-step complexity heuristic is suspended during the freeze (AGENTS.md Temporary
    Operational Constraints). Authored as ONE larger IMPLEMENTATION plan with two execution phases.
  - Decision 86 routing -- rationale -> candidate decision CD.39 (in the roadmap), field semantics ->
    docs/contracts/exit-criteria-ledger.yaml, the work -> tier_item T-1.23. No new standing
    prose-architecture doc under docs/.
  - CD.25 contract-drift gate (validate.py::validate_contract_drift) -- the new
    docs/contracts/exit-criteria-ledger.yaml MUST be authored as a free-form NON-RITUAL registry with
    NO top-level `contract:`/`class:` block (the read-engine.yaml / storage-substrate.yaml / _joins.yaml
    precedent), so the drift gate SKIPS it. It must NOT declare a class A/B/C contract -- a ritual
    contract is run through ContractDocument (scripts/contracts_schema.py, extra forbid) where Class B
    forbids a fields section and requires a verbs section, and FieldSpec rejects the id/text/status/met_by
    sub-keys. The intent-doc-freeze guard is NOT the relevant gate (it scans docs/INTENT-*.md and
    excludes docs/contracts/).
  - Decision 88 / Decision 84 -- followon-state computation reads on-disk files only (roadmap YAML +
    docs/plans/); NO warehouse reader fan-out. /orient continues to read the preflight cache only.
  - Status-Trusted-Never-Inferred (T2.20 lesson) -- /implement flips ONLY criteria a plan explicitly
    declares in closes_criteria, and only on a verified VP pass; never infer met from prose, file
    existence, or commit activity. An all-criteria-met item QUALIFIES for the completion gate; it is
    never auto-flipped.
  - Decision 85 -- closes_criteria is an additive optional PlanDocument field; PlanDocument keeps
    extra="forbid" and schema_version=1 (additive optional fields are backward-compatible).
  - Decision 80 / single-source-of-truth -- every new check lands in validate.py (and/or the
    platform_roadmap model_validator that validate.py invokes), never ci.yml first.
  - Single Portal Invariant -- this plan does NOT write logs/.recommendations-log.jsonl or
    logs/.decisions-index.jsonl directly; CD.39 is authored as a candidate_decision in the roadmap
    YAML (ratification is a later, separate step), not via the decisions index.
  - No rescue agents or workaround loops (Decision 55). On an unrecoverable VP failure, stop and RCA.

context:
  - >-
    Problem (verified): a tier_item's exit_criteria is a bare list[str] with no per-criterion status,
    plus a free-text progress_note. So in_progress conflates three states -- (1) mid-implementing a
    plan, (2) last plan actioned, needs the NEXT follow-on plan (the common case), (3) blocked
    downstream. /orient ranks in_progress #1 ("momentum") but emits actionable /plan prompts only for
    not_started items, and defaults in_progress to a wrong "/implement-resume". This plan makes the
    state machine deterministic.
  - >-
    Decisions this plan cites (from the Step 6a decision-scout CITE list): 86 (artefact routing),
    90 (four-tier /orient->/plan->/implement workflow), 88 (Neon egress budget / cache-only reads),
    87 (T4.5/T4.6 plan-warehouse entities; ledger is the near-term projection stand-in), 67/CD.17
    (STRATEGIC freeze -> IMPLEMENTATION only), 85 (PlanDocument schema; additive optional field),
    80 (validate.py single source of truth). RELATED: 59 (deterministic signals), 70 (lifecycle-state
    closure mirrors open|met|rehomed), 84 (ledger is git-authoritative, not an ops_* warehouse table,
    so warehouse-SoT does not yet apply), 93 (live-item-only scoping -- exclude deferred_post_mvp/
    reserved from followon computation), 75 (frame-lock-aware forward-compatible deferral).
  - >-
    OPEN QUESTION RESOLUTIONS (carried from /plan Step 6):
    (1) Ledger home = roadmap YAML now; T4.5 (ops_plans/ops_plan_revisions) is the eventual home but
    is not_started and gated on CD.17, and the ledger is collocated with exit_criteria which already
    live in the git-authoritative roadmap. met_by (plan-slug) is forward-compatible as a future
    ops_plans FK.
    (2) needs_followon_plan is deterministic with NO new plan registry: /plan merges PLAN-{slug}.yaml
    to main before /implement runs, so a merged-but-unimplemented plan is observable on disk. A plan's
    new closes_criteria field + a criterion's met_by form the bidirectional link; an "in-flight plan"
    is one whose closes_criteria names a still-open criterion. ops_execution_plans (the executor's
    Athena table) is not git-plan-aware and is NOT reused.
    (3) /implement flips status via the existing T-1.10 bookkeeping walk, restricted to the plan's
    declared closes_criteria, on VP pass, with met_by=<plan-slug>. validate.py enforces met_by
    referential integrity + no-bare-strings-on-touched-items + closes_criteria resolution.
    (4) Backfill = structured-with-conservative-seeding: Pydantic normalizes bare strings to open so
    the ~103 untouched not_started items migrate lazily on-touch (no big-bang over 116 items); the 14
    in_progress items convert now, seeding met/rehomed only where the progress_note unambiguously
    attests it (e.g. T2.19 "criterion re-homed to T2.26"), else open.
    (5) Decomposition = new tier_item T-1.23 in the T-1 roadmap-harness tier; one PLAN with two
    execution phases (operator choice), Phase A merged as its own PR before Phase B.
  - >-
    DOGFOODING NOTE: T-1.20 is itself status=in_progress with a progress_note attesting all 5 criteria
    met -- a textbook completion-gate candidate. The Phase A /orient rework will surface it as
    closest-to-done; the Phase B ledger + bookkeeping will let a follow-on session close it cleanly.
    This work is self-applying (mirrors the T-1.10 self-application invariant).
  - >-
    CI-RCA DEFERRAL RATIONALE (HARD BLOCK rec-2346): the open ci-rca rec rec-2346
    ("github_ci_apply boundary blocks CreateRole/PutRolePolicy for CD.35 Wave 5", file
    terraform/personal/oidc.tf) shares no file, Decision Record, or failure category with this
    roadmap-harness/skill work (it is an IAM permissions-boundary issue in the Terraform CI/CD bootstrap
    root). Planning this item does not touch its surface and does not satisfy any Related-Work
    condition; the block is deferred per the planning skill's Related-Work Check with this logged
    rationale. rec-2346 must still be resolved on its own track (T2.23/CD.35 Wave 5).
  - >-
    LAMBDA/V2 JUSTIFICATION: compute_affected_artifacts() reports docs/ROADMAP-PLATFORM.yaml is bundled
    into the data-pipeline.zip artifact (status: active) as a static ASSET (manifest assets:, not a
    handler include). No data-pipeline handler reads exit_criteria or roadmap state at runtime (verified
    by grep over src/lambdas/data-pipeline/). This change edits roadmap PLANNING metadata only, with no
    behavioral change to the deployed artifact; established precedent is that roadmap-only / bookkeeping
    commits (e.g. T-1.20, every /implement bookkeeping commit) do NOT redeploy data-pipeline. Tier is
    therefore V2, not V3 -- no per-Lambda build/deploy/smoke-test step is required for this artifact.
  - >-
    CANDIDATE DECISION DRAFT -- CD.39 (to add under candidate_decisions in docs/ROADMAP-PLATFORM.yaml;
    state: pending; this plan authors the candidate, it does not ratify it):
    id: CD.39
    title: "Exit-criteria ledger -- per-criterion status makes in_progress resolvable; follow-on
    planning is the in_progress default"
    detail: |
      A tier_item is almost never completed by one plan; items take N follow-on plans. The roadmap
      tracked only item status + prose exit_criteria + a free-text progress_note, so in_progress
      conflated mid-implementing / needs-next-plan / blocked, and the harness had no deterministic
      "what's left" signal. This decision promotes each exit_criteria entry to a structured object
      {id, text, status: open|met|rehomed, met_by} -- "remaining work" becomes the set of open
      criteria (deterministic, Decision 59). The harness reads it as follows: /orient ranks in_progress
      items fewest-open-criteria-first and emits follow-on /plan prompts (not /implement-resume) for
      items whose authored plans are all actioned; /plan gains a follow-on mode that scopes only the
      next slice and declares the criteria it will close (closes_criteria); /implement flips those
      declared criteria open->met on a verified VP pass, and an all-criteria-met item QUALIFIES for the
      completion gate but is NEVER auto-flipped (Status-Trusted-Never-Inferred / T2.20). The ledger lives
      in the git-authoritative roadmap YAML now as the lightweight near-term stand-in for T4.5/Decision
      87 (ops_plans/ops_plan_revisions warehouse entities, gated on CD.17); met_by is forward-compatible
      as a future ops_plans foreign key. Enforcement (validate.py): met/rehomed criteria carry a met_by
      that resolves to a real plan/commit/item; a touched tier_item may not retain bare-string criteria;
      plan closes_criteria refs resolve to real item criteria.
      filed_via: pending_log_decision_lambda
    gates: []
    state: pending
  - >-
    TIER ITEM DRAFT -- T-1.23 (to add under tier_items in docs/ROADMAP-PLATFORM.yaml):
    id: T-1.23
    tier: T-1
    name: "Exit-criteria ledger + /orient follow-on planning for multi-plan in_progress items"
    intent: "Promote exit_criteria to {id,text,status,met_by}; surface per-item open-criteria and
    needs_followon_plan in preflight; rework /orient (follow-on prompts, fewest-open-criteria-first),
    /plan (follow-on mode + closes_criteria), /implement (flip declared criteria); enforce ledger
    integrity in validate.py."
    depends_on: [T-1.20]
    related_candidate_decisions: [CD.39]
    files_in_scope: [the scope list of this plan]
    effort: L
    status: not_started
    exit_criteria (authored as ExitCriterion objects, all status: open at creation):
      - c1 (Phase A): /orient emits follow-on /plan prompts for in_progress items ranked
        fewest-open-criteria-first, shows an open-criteria count, and drops the /implement-resume default.
      - c2: exit_criteria accepts str|ExitCriterion with a normalizer; the model_validator enforces
        met/rehomed-requires-met_by and rehomed-met_by-resolves.
      - c3: compute_followon_state surfaces open_criteria/all_plans_actioned/needs_followon_plan
        (live items only) into the preflight cache, on-disk-only.
      - c4: /plan follow-on mode + PlanDocument.closes_criteria; /implement flips declared criteria
        open->met on VP pass without auto-inferring.
      - c5: validate.py asserts criteria-status integrity (met_by resolution, no bare strings on
        touched items, closes_criteria resolution); docs/contracts/exit-criteria-ledger.yaml exists.
  - >-
    CONTRACT DRAFT -- docs/contracts/exit-criteria-ledger.yaml. Authored as a free-form NON-RITUAL
    registry (NO top-level `contract:`/`class:` block) so validate_contract_drift SKIPS it, mirroring
    read-engine.yaml. Sketch:
      version: 1
      last_updated: "<ISO date at implement time>"
      decisions_cited: [Decision-59, Decision-70, Decision-86, Decision-87, Decision-88, CD.39]
      summary: >-
        Per-criterion status ledger on roadmap tier_items, plus the plan->criterion linkage field.
        Makes in_progress resolvable: remaining work == the set of open criteria (Decision 59).
      exit_criterion_object:               # shape of each TierItem.exit_criteria[] entry (scripts/platform_roadmap.py::ExitCriterion)
        id:
          type: str
          semantics: "stable within the tier_item; full ref is '<item-id>:<id>', e.g. 'T2.19:c3'"
        text:
          type: str
          semantics: "the criterion prose (was the bare string before this ledger)"
        status:
          type: "enum: open | met | rehomed"
          semantics: >-
            open = remaining work. met = closed by an actioned plan/commit. rehomed = scope moved to
            another tier_item (met_by names the receiving item id). Default open. Bare-string criteria
            normalize to status=open at load (lazy migration of untouched items).
          populated_by: "/implement bookkeeping walk flips open->met for plan.closes_criteria on VP pass."
          write_time_validation: >-
            met/rehomed REQUIRE met_by; never inferred from prose/file-existence/commit-activity
            (Status-Trusted-Never-Inferred / T2.20). validate.py forbids bare strings on git-diff-touched items.
        met_by:
          type: "str | null"
          semantics: >-
            For met: a plan-slug (docs/plans/PLAN-<slug>.yaml) or a 40-hex commit sha. For rehomed:
            the receiving tier_item id. Forward-compatible as a future ops_plans FK (T4.5/Decision 87).
      plan_closes_criteria:                # PlanDocument.closes_criteria (scripts/plan_document.py)
        type: "list[str]"
        semantics: >-
          Each entry '<item-id>:<criterion-id>' the plan will close. /implement flips exactly these
          open->met on VP pass. validate.py asserts each ref resolves to a real item:criterion. Default
          [] (a plan that closes no item criteria -- e.g. a not_started item's first plan -- omits it).
      governance_notes: >-
        Ledger is git-authoritative (roadmap YAML), NOT an ops_* warehouse table (Decision 84 SoT does
        not apply yet). T4.5 is the eventual warehouse home; this is the Decision 87 projection-until-T4.x
        stand-in. This file is intentionally non-ritual (no contract:/class: block) per the CD.25 gate.

