acceptance_criteria:
  - >-
    Test-id preservation (per file): the set of pytest node ids (module-path stripped) collected from
    each new package equals the pre-move set from the corresponding monolith. Every monolith is a PURE
    move -- whole test classes (and, for build_lambda_deploy, three module-level test functions) copied
    verbatim, NO rename, NO class-split (no new module exceeds 500 SLOC) -- so each of the four id-diffs
    MUST be EMPTY. The overseer independently AST-verifies id-preservation (ast.walk over
    FunctionDef/AsyncFunctionDef under each ClassDef + module-level test_ funcs).
  - >-
    bin/venv-python -m scripts.validate --pre exits 0: SLOC gate green (all 13 new modules < 500 SLOC
    and < 20 CC, none registered in config/sloc_budgets.yaml; scripts/test_coverage_checker.py stays
    < 500 SLOC after the deletion); no-cross-test-import guard green (no new module imports from
    another test_* module); collectability green.
  - >-
    Fast-tier heavy-dep correctness (the recurring CI-only failure class -- local --pre CANNOT catch
    it): exactly ONE new module carries a module-level `import boto3  # noqa: F401` marker --
    tests/build_lambda_deploy/test_deploy_records.py (TestReadDeployRecord's boto3.client patch +
    lazy botocore imports). The fast-tier simulation (VP step 9) passes for every non-marked module
    with boto3/botocore/duckdb/pandas/numpy/pyarrow/psycopg2/awswrangler/pyiceberg blocked, and the
    marked module ERRORS at collection when boto3 is blocked (marker load-bearing).
  - >-
    bin/venv-python -m pytest tests/build_lambda_deploy tests/lambda_manifest tests/s3_log_store
    tests/verify_ci_workflow -q passes with the same total test count as the four pre-move baselines
    summed.
  - >-
    git diff origin/main -- config/sloc_budgets.yaml shows ONLY the four W12 lines removed (with their
    dec-130 markers); every other entry byte-identical; zero added lines.
  - >-
    map_source_to_test spot-checks stay green in the (unchanged) coverage-checker oracles:
    scripts/build_lambda_deploy.py -> tests/build_lambda_deploy; scripts/lambda_manifest.py ->
    tests/lambda_manifest; scripts/s3_log_store.py -> tests/s3_log_store; scripts/verify_ci_workflow.py
    -> tests/verify_ci_workflow (each the concern-split package DIR). The grandfather oracle's
    tree-derived test_retirement_state_matches_the_tests_tree stays green (all four homes absent from
    _RETIRING AND all four flat monoliths deleted).
  - >-
    Retirement is atomic and the empty-set is a genuine set: _RETIRING_GRANDFATHER_HOMES no longer
