verification_plan:
  - step: 1
    phase: pre-deploy
    graduation: not-applicable
    action: >-
      Capture the BEFORE test-id baseline for all four monoliths (run while they are still intact --
      before the FINAL commit deletes them). Use -qq (NOT -q): the repo addopts carries -v, so -v+-q
      nets to verbosity 0 = a TREE report with no '::' node lines; -qq forces the flat node-id list.
      Strip the differing module-path prefix so class-methods (Class::method) and the three bare
      module-level funcs both normalise cleanly.
    command: >-
      S=/tmp/claude-0/-home-user-agent-platform/efde6a5d-8723-5096-89dd-16f0c066db30/scratchpad;
      for m in test_build_lambda_deploy test_lambda_manifest test_s3_log_store test_verify_ci_workflow;
      do bin/venv-python -m pytest tests/$m.py --collect-only -qq 2>/dev/null | grep '::' | sed -E
      's#^[^:]+::#FN::#' | sort -u > $S/before_$m.txt; echo "$m: $(wc -l < $S/before_$m.txt) ids"; done
    expected: A non-empty sorted node-id baseline for each of the four files.
    fix_if: If any collection errors, that monolith has a pre-existing import/collection problem -- fix before decomposing.
  - step: 2
    phase: pre-deploy
    graduation: not-applicable
    action: Collect the AFTER id set from each new package and assert a byte-identical diff against the matching baseline.
    command: >-
      S=/tmp/claude-0/-home-user-agent-platform/efde6a5d-8723-5096-89dd-16f0c066db30/scratchpad;
      for pair in "test_build_lambda_deploy:build_lambda_deploy" "test_lambda_manifest:lambda_manifest"
      "test_s3_log_store:s3_log_store" "test_verify_ci_workflow:verify_ci_workflow"; do m=${pair%%:*};
      d=${pair##*:}; bin/venv-python -m pytest tests/$d --collect-only -qq 2>/dev/null | grep '::' |
      sed -E 's#^[^:]+::#FN::#' | sort -u > $S/after_$m.txt; echo "== $m =="; diff $S/before_$m.txt
      $S/after_$m.txt && echo "$m EMPTY-DIFF-OK"; done
    expected: Empty diff for all four (identical node-id sets). No sanctioned delta -- pure move, no renames/splits.
    fix_if: Any added/removed id means a test was dropped, duplicated, mis-copied, or renamed. STOP and reconcile.
  - step: 3
    phase: pre-deploy
    graduation: not-applicable
    action: Run the authoritative fast presubmit tier -- proves SLOC gate, no-cross-test-import guard, collectability.
    command: bin/venv-python -m scripts.validate --pre
    expected: Exit 0. No SLOC-limit failure, no cross-test-import failure, no collection error.
    fix_if: >-
      A >=500 unregistered module: rebalance (e.g. split test_schema_and_staging.py or
      test_ci_data_guards.py further). A cross-test import: a helper/data dict leaked between test_*
      modules -> either regroup by data-locality (the verify_ci_workflow design) or move a genuinely
      shared plain helper to tests/fixtures/ (NEVER `from tests.<pkg> import test_*`). A collection
      error: fix a fresh import header, or the boto3 marker on test_deploy_records.py.
  - step: 4
    phase: pre-deploy
    graduation: not-applicable
    action: Full scoped pass of all four new packages at the summed baseline count.
    command: >-
      bin/venv-python -m pytest tests/build_lambda_deploy tests/lambda_manifest tests/s3_log_store
      tests/verify_ci_workflow -q
    expected: All pass; total selected count equals the sum of the four step-1 baselines.
    fix_if: >-
      A failure means a patch target, fixture, local helper, or module-level data dict did not survive
      the move -- most likely a missing fresh-header import, a mis-grouped _VALID_CI_DATA/_VALID_CANARY_DATA/
      _VALID_APPLY_* datum (verify_ci_workflow), a local _FakePath/_args (build_lambda_deploy
      test_canary_layers.py), or the class-scoped reset_registry autouse fixture that must stay inside
      TestLogStorageRegistry (s3_log_store).
  - step: 5
    phase: pre-deploy
    graduation: not-applicable
    action: Assert config/sloc_budgets.yaml lost exactly the four target lines and nothing else.
    command: git diff origin/main -- config/sloc_budgets.yaml
    expected: >-
      Exactly four removed lines (test_build_lambda_deploy.py 612, test_lambda_manifest.py 599,
      test_s3_log_store.py 539, test_verify_ci_workflow.py 573, each with its dec-130 raise-approved
      marker) and zero added lines.
    fix_if: Any other changed line means --update-sloc-budgets was run (forbidden) or an unintended entry was touched.
  - step: 6
    phase: pre-deploy
    graduation: not-applicable
    action: >-
      Prove the retired mapping + the empty-set integrity via BOTH coverage-checker oracle files.
      These files need ZERO edits this wave (the map oracle has no per-home case for any of the four
