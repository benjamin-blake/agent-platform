    test_gate_flips_colocation_to_mirror_on_retirement's `|`). _ALL_MIRROR_TARGET_HOMES (24-frozenset)
    unchanged with all four basenames still present.
  - >-
    Coverage preserved for all four sources: pytest each new package with --cov of its source reports
    100% for scripts/build_lambda_deploy.py, scripts/lambda_manifest.py, scripts/s3_log_store.py, and
    scripts/verify_ci_workflow.py.
  - >-
    ACCEPTANCE GATE (rec-2709 program completion): `! grep -qE '^[[:space:]]*tests/'
    config/sloc_budgets.yaml && echo config/sloc_budgets.yaml` returns the filename (exit 0) -- ZERO
