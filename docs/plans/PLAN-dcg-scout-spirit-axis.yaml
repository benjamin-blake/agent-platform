    validate_prose_budget_raises; keep them separate).
  - "gates: decision-scout=FLAGS_FOUND (104/104 triaged, gate_run_id verified) after 1 round; plan-critique=<verdict> after <N> round(s) (overseer trampoline -- filled post-critique)."
  - >-
    STEP 6b A/B FORK (the Decision-150 significance-bar call; the decision-scout Decision-128 NOTE is
    exactly this fork). This plan is WRITTEN for Option A (recommended). OPTION A: author Decision 152 +
    raise the decision-scout prose budget with a dec-152 marker (scope = SKILL.md + prose_budgets.yaml +
    DECISIONS.md). OPTION B: net-neutral restructure of the SKILL.md using the prose registry's
