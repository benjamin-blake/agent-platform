schema_version: 1
slug: dcg-scout-spirit-axis
intent: >-
  Complete the decision-scout's intent-alignment capability (audit finding DCG-07): add a
  quotability-gated SPIRIT triage lane so a plan that violates the spirit of an active decision
  without literally contradicting any clause is surfaced as a WARN/NOTE flag -- making Decision 151's
  Intent marker load-bearing end-to-end and tightening the /plan pre-confirmation gate that guards
  every planning session, without loosening its anti-over-citation discipline.
plan_type: IMPLEMENTATION
verification_tier: V1
plan_path: docs/plans/PLAN-dcg-scout-spirit-axis.yaml
phase: >-
  Platform-plane, DCG audit-consolidation Wave 5 (audit finding DCG-07, Q3c adopt-scoped). Consumer
  half of the NS-3 intent mechanism whose anchor half -- the decision-record Intent marker -- landed as
  Decision 151 / DCG-06 (Wave 4, merged f0e701d). Closes no roadmap exit criterion.
scope:
  - file: .claude/skills/decision-scout/SKILL.md
    action: Modify
    purpose: >-
      Add the SPIRIT intent-alignment triage axis: (1) a Phase-2 spirit-alignment overlay step
      defining the SPIRIT bucket and its four anti-noise gates; (2) a mandatory-even-when-empty
      `### Spirit-Alignment Flags (SPIRIT)` output section with a "None" default; (3) a widened Verdict
      definition (FLAGS_FOUND fires on >=1 SPIRIT flag OR >=1 CONTRADICT WARN/NOTE) keeping the three
      verdict strings and the `## Decision Scout Report` / `Verdict` interface UNCHANGED; (4) two
      Quality-Gate rows; (5) a SPIRIT-over-citation anti-pattern; (6) a one-clause spirit-alignment
      mention in the `## Intent` role list. PRESERVE every existing Phase 2 step, especially the
      Managed-service-native check (Decision 100 / Decision 75). No change to HOW the corpus is read
      (TRAP-7).
  - file: config/prose_budgets.yaml
    action: Modify
    purpose: >-
      [Option A] Raise the S4 `.claude/skills/decision-scout/SKILL.md` entry from its zero-headroom
      8265 bytes to the post-edit `wc -c` value, carrying an inline `# raise-approved: dec-152 <reason>`
      marker resolving to the governing `## Decision 152:` header authored in this same PR. Only this
      FILE byte budget is raised; the scout's 1,200-word RESPONSE cap is untouched. Do NOT touch any
      other budget entry.
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      [Option A] Author governing Decision 152 (re-check the max `## Decision NNN:` header at implement
      time per the numbering-race rule; author at the next free number and use that SAME number in the
      prose raise marker) recording the SPIRIT axis as a durable architectural commitment clearing the
      Decision 150 significance bar. Authored WITH an `**Intent:**` marker (Decision 151's now-live
      convention) and with reversal conditions. Forward governance Decision, NOT a CD ratification (the
      Decision 105 R1-R3 ratified-CD guard is not engaged). The DECISIONS.md -> ops_decisions sync is
      CI-automated post-merge by rec-autoclose.yml; NOT a VP step here.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    `.claude/skills/decision-scout/SKILL.md` defines the SPIRIT bucket with ALL FOUR gates -- (i) no
    literal CONTRADICT on the same decision, (ii) a mandatory verbatim quote of the violated
    `**Intent:**` marker or a specific Problem/Rationale sentence (unquotable means no flag), (iii) WARN
    or NOTE severity only (never BLOCK), (iv) capped at 3 flags -- plus the mandatory
    `### Spirit-Alignment Flags (SPIRIT)` output section with a "None" default, the widened FLAGS_FOUND
    verdict (SPIRIT-inclusive), and two Quality-Gate rows (verbatim quote per SPIRIT flag; SPIRIT count
    <= 3, no CONTRADICT overlap). The three verdict strings (NO_FLAGS | FLAGS_FOUND | BLOCK), the
    `## Decision Scout Report` interface, and the existing Managed-service-native check (Decision
    100/75) are all preserved unchanged.
  - >-
    Synthetic dispatch (violating): a decision-scout dispatch against a proposed approach that works
    against a stated decision Intent WITHOUT literally contradicting any clause returns >= 1 SPIRIT flag
    at WARN carrying a verbatim quote of the violated intent, and Verdict FLAGS_FOUND.
  - >-
    Synthetic dispatch (benign): a decision-scout dispatch against a proposed approach with no spirit
    violation and no contradiction returns the SPIRIT section as "None" and Verdict NO_FLAGS.
  - >-
    [Option A] `config/prose_budgets.yaml`'s decision-scout S4 entry is raised to the exact post-edit
    byte size with a `# raise-approved: dec-152 <reason>` marker resolving to the authored
    `## Decision 152:` header, and `bin/venv-python -m scripts.validate --pre` is green (prose limits,
    prose budget-raise guard, decisions-size, decision-entry conformance on Decision 152,
    graduation-completeness on this plan, SLOC).
  - >-
    [Option A] `docs/DECISIONS.md` carries governing Decision 152 authored WITH an `**Intent:**` marker
    (Decision 151 convention) and reversal conditions, clearing the Decision 150 significance bar; the
    DECISIONS.md -> ops_decisions sync is left to the automatic post-merge rec-autoclose.yml backfill
    (writer-health-gated, CI-owned), not a VP step.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      Interface-contract presence -- the mandatory SPIRIT output section header the parent parser
      depends on exists exactly once in the edited skill. This is the stable, parsed-interface string
      (distinct from the reword-prone gate prose in step 2).
    command: >-
      test "$(grep -c '^### Spirit-Alignment Flags (SPIRIT)$' .claude/skills/decision-scout/SKILL.md)" = "1" &&
      grep -m1 '^### Spirit-Alignment Flags (SPIRIT)$' .claude/skills/decision-scout/SKILL.md
    expected: >-
      Exactly one `### Spirit-Alignment Flags (SPIRIT)` section header in the skill -- the
      mandatory-even-when-empty output section is present and singular.
    fix_if: >-
      Count 0 -> the SPIRIT output section was not added or was mis-spelled (author it with the exact
      header). Count >1 -> a duplicate section was introduced (collapse to one).
    hermetic: true
    graduation: graduate
    graduation_check_id: decision-scout-spirit-section-present
  - step: 2
    phase: pre-deploy
    action: >-
      Structural completeness of the SPIRIT axis and preservation of the existing interface -- the four
      gates, the widened verdict, the two quality-gate rows, the anti-pattern, AND the preserved
      Managed-service-native check and report header. Grep by distinctive phrase.
    command: >-
      f=.claude/skills/decision-scout/SKILL.md; grep -q "SPIRIT bucket" "$f" && grep -q "unquotable means
      no flag" "$f" && grep -q "NEVER carries BLOCK" "$f" && grep -q "Capped at 3" "$f" && grep -q "at
      least one SPIRIT flag" "$f" && grep -q "verbatim quote of the violated" "$f" && grep -q "SPIRIT
      over-citation" "$f" && grep -q "## Decision Scout Report" "$f" && grep -q "Managed-service-native
      check" "$f" && grep -q "NO_FLAGS | FLAGS_FOUND | BLOCK" "$f"
    expected: >-
      All anchors present: the SPIRIT bucket step, the quote-or-drop gate, the never-BLOCK gate, the
      cap-3 gate, the SPIRIT-inclusive FLAGS_FOUND clause, the verbatim-quote quality-gate row, the
      SPIRIT over-citation anti-pattern, the unchanged report header + three-string verdict line, and
      the preserved managed-service check.
    fix_if: >-
      Any anchor missing -> that element was omitted or reworded away (author/restore it). A missing
      "Managed-service-native check" or "## Decision Scout Report" means the edit disturbed the existing
      interface -- revert that disturbance (the SPIRIT axis is purely additive).
    hermetic: true
    graduation: waive
    graduation_waiver_reason: >-
      These anchors are phrasing-level and reword-brittle by nature (gate wording, anti-pattern prose);
      a verification_registry grep row on each would fail on legitimate future rewordings while adding
      no durable invariant. The durable guards are the graduated stable-interface check (step 1), the
      zero-headroom prose-budget floor + PR review (a trim that drops the SPIRIT axis breaches the
      budget or is caught in review), and the behavioral synthetic-dispatch checks (steps 4-5). This
      hermetic step is still replayed by validate_vp_replay at implement time against the complete tree.
  - step: 3
    phase: pre-deploy
    action: >-
      Full fast-tier presubmit -- prove the Option A budget raise and the Decision 152 authoring are
      well-formed: prose limits (current <= budget), the prose budget-raise guard (the dec-152 marker
      resolves to a real `## Decision 152:` header in the working tree), decisions-size (byte ceiling),
      decision-entry conformance on the new entry (Status/Date/Decision present), graduation-completeness
      on THIS plan, and SLOC all green.
    command: bin/venv-python -m scripts.validate --pre
    expected: >-
      PASS. validate_prose_budget_raises confirms the raised decision-scout entry carries a dec-152
      marker resolving to the authored header; validate_prose_limits confirms the file is <= its new
      budget; validate_decisions_size confirms DECISIONS.md stays under 500000 bytes; decision-entry
      conformance passes on Decision 152; every pre-deploy VP step here carries a graduation disposition.
    fix_if: >-
      Prose budget-raise violation -> the marker is missing, cites a number with no matching header
      (numbering race: re-check max `## Decision NNN:` and align the marker to the authored number), or
      the raise is unmarked. Prose-limits fail -> the budget value is below the actual post-edit `wc -c`
      (set it to the exact measured size). decision-entry conformance fail -> a required marker is
      missing from Decision 152. Do NOT decompose or fragment the skill (Decision 114/110), do NOT
      `--update` any budget silently.
    hermetic: false
    graduation: not-applicable
  - step: 4
    phase: pre-deploy
    action: >-
      Synthetic dispatch (VIOLATING). Dispatch the decision-scout skill in a fresh subagent (Agent tool,
      subagent_type general-purpose, invoking the `decision-scout` Skill) against this inline brief and
      save its VERBATIM `## Decision Scout Report` to logs/debug/spirit-dispatch-violating.txt. Brief:
      Intent = "make decision intent auditable"; Proposed approach = "add a validate.py check that FAILS
      CI when any docs/DECISIONS.md entry lacks an **Intent:** marker, retroactively enforcing an Intent
      marker across the entire historical decision corpus"; Scope files = ["scripts/validate.py",
      "docs/DECISIONS.md"]; Verification Tier = V2; Explicitly cited decisions = none. This works AGAINST
      Decision 151's stated Intent ("never retroactively obligating the historical corpus to supply one"
      / "no retro-enforcement") WITHOUT literally contradicting a Decision 151 clause (the clauses assert
      optionality; none literally forbids a validator), so it is the canonical spirit-not-literal case and
      Decision 151 carries a quotable **Intent:** marker.
    command: >-
      o=logs/debug/spirit-dispatch-violating.txt; test -s "$o" && grep -q "FLAGS_FOUND" "$o" && sed -n
      '/^### Spirit-Alignment Flags/,/^### Verdict/p' "$o" | grep -Eq "\bWARN\b" && sed -n '/^###
      Spirit-Alignment Flags/,/^### Verdict/p' "$o" | grep -q '"'
    expected: >-
      The saved report exists and non-empty; Verdict is FLAGS_FOUND; the SPIRIT section carries at least
      one WARN flag; and that section contains a double-quote character (the mandatory verbatim quote of
      the violated Decision 151 Intent). The dispatch itself is the real behavioral test; this command is
      the deterministic pass/fail latch on its saved output.
    fix_if: >-
      No SPIRIT section or an empty one -> the skill did not emit the mandatory section (structural bug,
      re-check steps 1-2). WARN present but no quote -> the quote-or-drop gate is not being honored in the
      output template. Verdict NO_FLAGS despite a SPIRIT flag -> the FLAGS_FOUND widening (step 2 anchor
      "at least one SPIRIT flag") was not wired into the verdict definition. A BLOCK verdict -> the
      never-BLOCK gate is violated. This is an LLM-in-the-loop step; on a malformed dispatch, re-run the
      dispatch, not a workaround (Decision 55).
    hermetic: false
    graduation: not-applicable
  - step: 5
    phase: pre-deploy
    action: >-
      Synthetic dispatch (BENIGN). Dispatch the decision-scout skill in a fresh subagent (same shape as
      step 4) against this inline brief and save its VERBATIM report to
      logs/debug/spirit-dispatch-benign.txt. Brief: Intent = "add an optional field to an existing config
      contract"; Proposed approach = "add a new nullable, optional field to an existing docs/contracts
      YAML contract, collocating its description and semantics with the field per the Decision 86 routing,
      changing no write path and retro-enforcing nothing"; Scope files = ["docs/contracts/ops_decisions.yaml"];
      Verification Tier = V1; Explicitly cited decisions = none. This has no spirit violation and no literal
      contradiction.
    command: >-
      o=logs/debug/spirit-dispatch-benign.txt; test -s "$o" && grep -q "NO_FLAGS" "$o" && sed -n '/^###
      Spirit-Alignment Flags/,/^### Verdict/p' "$o" | grep -q "None"
    expected: >-
      The saved report exists and non-empty; the SPIRIT section is present and reads "None"; Verdict is
      NO_FLAGS. Confirms the mandatory-even-when-empty section renders its "None" default (the parent
      parser never has to branch) and that a benign approach does not manufacture SPIRIT noise.
    fix_if: >-
      No SPIRIT section -> the section is not truly mandatory-when-empty (fix the output contract). A
      SPIRIT flag on a benign approach -> the anti-noise gating is too loose (the quote-or-drop / no-flag
      discipline is not being applied). Verdict not NO_FLAGS with no flags in any lane -> the verdict
      logic is miswired. Re-run the dispatch on a malformed result (Decision 55), never patch around it.
    hermetic: false
    graduation: not-applicable
constraints:
  - "IMPLEMENTATION plan type ONLY (Decision 67 STRATEGIC freeze). Do NOT declare STRATEGIC."
  - "bundled_recommendations: [] -- file NO recs; all work inline (overseer constraint). Unrelated discoveries go to the hand-back open_questions, not the portal."
  - >-
    TRAP-7 boundary: do NOT redesign HOW the scout reads the corpus (no pagination, no tool-backed read,
    no index consumption). This axis is workable at current corpus size precisely because the whole-file
    read (SKILL.md Phase 1) already exists; the concurrent agent-context-governance audit owns any change
    to the read mechanism. The SPIRIT axis adds only a judgment lane.
  - >-
    PRESERVE the decision-scout public interface: the `## Decision Scout Report` structure, the three
    verdict strings (NO_FLAGS | FLAGS_FOUND | BLOCK), and the `Decisions triaged: N of M` line are parsed
    by the /plan Step 6a gate AND the overseer decision-scout gate. The SPIRIT change is purely additive
    -- widen the FLAGS_FOUND DEFINITION, add one output section, never rename or drop an existing string.
  - >-
    PRESERVE every existing Phase 2 step, especially the Managed-service-native check (Decision 100 /
    Decision 75) which lives in the SAME Phase 2 being edited. The SPIRIT overlay is a NEW step appended
    after the status filter; do not disturb steps 3-6.
  - >-
    TWO DISTINCT BUDGETS -- do not conflate. Option A raises ONLY the FILE byte budget in
    config/prose_budgets.yaml (the skill grew). The scout's ~1,200-word RESPONSE cap (SKILL.md Quality
    Gate / step 9) is UNCHANGED; the SPIRIT section rides inside it, bounded by the cap of 3 flags.
  - >-
    Numbering-race linkage (Option A): re-check the max `## Decision NNN:` header in the working-tree
    DECISIONS.md at implement time; author the Decision at the next free number; the
    `# raise-approved: dec-NNN` marker in prose_budgets.yaml MUST use that SAME number, because
    validate_prose_budget_raises resolves the marker against the working-tree `## Decision N:` header.
    A mismatch fails the raise guard.
  - >-
    Decision 152 is a FORWARD governance Decision, not a candidate-decision ratification -- the Decision
    105 R1-R3 ratified-CD referential guard is NOT engaged (mirrors how Decision 151 handled it).
  - >-
    Prose registry relief valve: for an S4 skill file the sanctioned relief for an over-budget surface is
    a loud, Decision-cited RAISE (Option A) or content RELOCATION/DEFERRAL to a contract/PROJECT_CONTEXT
    (Option B). NEVER split/decompose the skill into @-imported fragments (Decision 114/110
    anti-fragmentation). Decision 128's decompose-don't-raise relief valve is SLOC-specific and, by the
    prose_budgets.yaml header's own statement, does not apply to this registry.
  - >-
    No em dashes (ASCII hyphen `-` / ` -- `), no emojis, no new standing prose doc under docs/ (Decision
    86 intent-doc-freeze). Do not touch the pre-existing em-dash on the current SKILL.md status-filter
    line (out of scope).
  - "Loud-fail; no rescue agents or workaround loops (Decision 55). A malformed synthetic dispatch is re-run, never patched around."
context:
  - >-
    Decision-scout verdict + CITE list (verbatim decision ids): FLAGS_FOUND (gate_run_id verified;
    104/104 live decisions triaged; NO BLOCK -- Option A well-grounded, no pivot). CITE: dec-150 (the
    significance bar Decision 152 clears + the four routing rows it exercises), dec-151 (the **Intent:**
    marker the SPIRIT bucket quotes; this finding's depends_on DCG-06), dec-127 and dec-043 (the
    sanctioned-prose byte-budget taxonomy governing the config/prose_budgets.yaml raise -- the registry's
    own charter), dec-134 / dec-145 (DECISIONS.md live byte ceiling + the scout's own size-ceiling
    context; 60885 bytes headroom), dec-105 (forward governance Decision, R1-R3 guard not engaged),
    dec-086 (methodology-in-skill / rationale-in-Decision routing; no new prose doc), dec-090 (four-tier
    workflow whose Step 6a gate the scout serves), dec-146 (operator-disposed convention-only enforcement
    the SPIRIT quote-or-drop judgment mirrors), dec-055 (loud-fail), dec-128 (SLOC decompose-by-default --
    does-NOT-violate NOTE, see fork below), dec-100 / dec-075 (managed-service-native check preserved
    unchanged in the same Phase 2). RELATED: dec-048 (confirms V1 -- no runtime effect -- and no
