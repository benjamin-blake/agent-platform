  - >-
    Preflight: venv_ok, creds ok; main_freshness commits_behind=0 (at merged main f0e701d, no rebase
    needed, no scope-file divergence); ci_rca_unresolved_recs=[] (no HARD BLOCK); 816 open recs / 690
    non-automatable (informational, individual review suspended per Decision 73). Data-quality last run
    FAIL with 0 checks defined (stub state; this plan touches no data pipeline). ANOMALY (pre-existing,
    out of scope, surfaced to the orchestrator, NOT acted on -- overseer no-recs constraint): ops_outbox
    shows 2 entries in the retired ops_recommendations dir (Decision 84 I-4: migrated-table outboxes are
