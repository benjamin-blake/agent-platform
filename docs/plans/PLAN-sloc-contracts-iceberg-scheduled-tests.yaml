acceptance_criteria:
  - >-
    Test-id preservation (per file): the set of pytest node ids (module-path stripped) collected from each
    new package equals the pre-move set from the corresponding monolith. contracts and scheduled monoliths
    are class-based (id = Class::method, incl parametrize ids); the iceberg monolith mixes module-level
    functions (id = funcname) and classes. PURE move -- NO rename, NO class-split (no new module exceeds 500
    SLOC); the diff MUST be EMPTY for all three files. The overseer independently AST-verifies this.
  - >-
    bin/venv-python -m scripts.validate --pre exits 0: SLOC gate green (every new module < 500 SLOC and < 20
    CC, none registered in config/sloc_budgets.yaml; scripts/test_coverage_checker.py stays < 500 SLOC);
    no-cross-test-import guard green; collectability green (test_duckdb_iceberg_reader.py deferred by its
    module-level pyarrow import, test_ducklake_reader.py deferred by its module-level boto3 marker).
  - >-
    bin/venv-python -m pytest tests/contracts_enforcement tests/common/iceberg_reader
    tests/data/handlers/scheduled_agent_handler -q passes with the same total test count as the three
    pre-move baselines summed (full local toolchain; all deps present).
  - >-
    git diff origin/main -- config/sloc_budgets.yaml shows ONLY the three lines removed
    (test_contracts_enforcement.py 665, test_iceberg_reader.py 641, test_scheduled_agent_handler.py 502)
    with their dec-130 markers; every other entry byte-identical; zero added lines.
  - >-
    map_source_to_test resolves each retired source to its concern-split package DIR (asserted by the
    EXISTING, UNEDITED oracle files): scripts/contracts_enforcement.py -> tests/contracts_enforcement;
    src/common/iceberg_reader.py -> tests/common/iceberg_reader;
    src/data/handlers/scheduled_agent_handler.py -> tests/data/handlers/scheduled_agent_handler. Both
    tests/test_coverage_checker_map.py and tests/test_coverage_checker_grandfather.py pass with ZERO edits
    (green by construction -- no positive flat-mapping case exists for any of the three homes; the iceberg
    TestMirrorRule case is monkeypatched and wave-invariant).
  - >-
    Retirement is proven by the tree-derived grandfather oracle
    (test_retirement_state_matches_the_tests_tree): all three basenames absent from
    _RETIRING_GRANDFATHER_HOMES AND all three flat monoliths deleted (atomic in the FINAL commit);
    _ALL_MIRROR_TARGET_HOMES (24 entries) unchanged with all three basenames still present; all three sources
    still present in _CONCERN_SPLIT_TEST_PACKAGES.
  - >-
    Heavy-dep marker audit: tests/common/iceberg_reader/test_duckdb_iceberg_reader.py carries a module-level
    `import pyarrow as pa`; tests/common/iceberg_reader/test_ducklake_reader.py carries a module-level
    `import boto3  # noqa: F401`; NO other new module carries a heavy-dep IMPORT STATEMENT (word-boundary
    check on `import`) -- contracts modules, scheduled modules, and the parity module reference no heavy dep
    at module scope.
  - >-
    Fast-tier simulation: with boto3/botocore/duckdb/pyarrow/numpy/awswrangler/pyiceberg/psycopg2 blocked and
    `-m "not integration"`, the contracts package, the scheduled_agent_handler package, and
    tests/common/iceberg_reader/test_warehouse_parity.py PASS (or exit 5 NO_TESTS_COLLECTED where all tests
    are integration-deselected); and the two marked iceberg modules ERROR at --collect-only naming their
    heavy dep (marker load-bearing).
  - >-
    Coverage preserved: pytest of each new package with --cov of its source reports 100% for
    scripts/contracts_enforcement.py, src/common/iceberg_reader.py, and
    src/data/handlers/scheduled_agent_handler.py respectively (each package covers its single source exactly
    as the monolith did).
  - >-
    Every new test module is < 500 SLOC (validate_sloc_limits counting) and < 20 CC; NO new
    config/sloc_budgets.yaml entry; the three monoliths are deleted; whole-suite collection is clean;
    tests/validate/test_pytest_diff.py stays green.
verification_plan:
  - step: 1
    phase: pre-deploy
    graduation: not-applicable
    action: >-
      Capture the BEFORE test-id baseline for all three monoliths (run while they are still intact -- before
      the FINAL commit deletes them). Strip only the module-path prefix so class/method/parametrize ids
      survive; collect ALL ids (no -m filter) so integration ids are included. `-o addopts=""` clears the
      repo's default flags so `-q` yields a flat `::` node-id list (avoids the -v+-q tree-report trap).
    command: >-
      S=/tmp/claude-0/-home-user-agent-platform/efde6a5d-8723-5096-89dd-16f0c066db30/scratchpad;
      for m in test_contracts_enforcement test_iceberg_reader test_scheduled_agent_handler; do
      bin/venv-python -m pytest tests/$m.py --collect-only -q -o addopts="" 2>/dev/null | grep '::' |
      sed -E 's#^[^:]+::#FN::#' | sort -u > $S/before_$m.txt; echo "$m: $(wc -l < $S/before_$m.txt) ids"; done
    expected: A non-empty sorted node-id baseline for each of the three files.
    fix_if: If any collection errors, that monolith has a pre-existing import/collection problem -- fix before decomposing.
  - step: 2
    phase: pre-deploy
    graduation: not-applicable
    action: Collect the AFTER id set from each new package and assert a byte-identical diff against the matching baseline.
    command: >-
      S=/tmp/claude-0/-home-user-agent-platform/efde6a5d-8723-5096-89dd-16f0c066db30/scratchpad;
      for pair in "test_contracts_enforcement:contracts_enforcement"
      "test_iceberg_reader:common/iceberg_reader" "test_scheduled_agent_handler:data/handlers/scheduled_agent_handler";
      do m=${pair%%:*}; d=${pair##*:}; bin/venv-python -m pytest tests/$d --collect-only -q -o addopts=""
      2>/dev/null | grep '::' | sed -E 's#^[^:]+::#FN::#' | sort -u > $S/after_$m.txt; echo "== $m =="; diff
      $S/before_$m.txt $S/after_$m.txt && echo "$m EMPTY-DIFF-OK"; done
    expected: Empty diff for all three (identical node-id sets). No sanctioned delta -- pure move, no renames/splits.
    fix_if: Any added/removed id means a function/method was dropped, duplicated, mis-copied, or renamed. STOP and reconcile.
  - step: 3
    phase: pre-deploy
    graduation: not-applicable
    action: Run the authoritative fast presubmit tier -- proves SLOC gate, no-cross-test-import guard, collectability.
    command: bin/venv-python -m scripts.validate --pre
    expected: Exit 0. No SLOC-limit failure, no cross-test-import failure, no collection error.
    fix_if: >-
      A >=500 unregistered module (rebalance the concern split further); a cross-test import (a helper leaked
      between test_* modules -> move to tests/fixtures/); a collection error (fix a fresh import header, or a
      missing pyarrow/boto3 marker on the iceberg modules).
  - step: 4
    phase: pre-deploy
    graduation: not-applicable
    action: Full scoped pass of all three new packages at the summed baseline count (full local toolchain).
    command: >-
      bin/venv-python -m pytest tests/contracts_enforcement tests/common/iceberg_reader
      tests/data/handlers/scheduled_agent_handler -q
    expected: All pass; total selected count equals the sum of the three step-1 baselines.
    fix_if: >-
      A failure means a patch target, fixture, or local helper did not survive the move -- most likely the
      shared `_make_class_a_doc` import (contracts), a local con-helper mis-placed, or a class-level autouse
      fixture (_enable_agents / _skip_if_no_warehouse) not co-located with its owning class.
  - step: 5
    phase: pre-deploy
    graduation: not-applicable
    action: Assert config/sloc_budgets.yaml lost exactly the three target lines and nothing else.
    command: git diff origin/main -- config/sloc_budgets.yaml
    expected: >-
      Exactly three removed lines (test_contracts_enforcement.py 665, test_iceberg_reader.py 641,
      test_scheduled_agent_handler.py 502, each with its dec-130 raise-approved marker) and zero added lines.
    fix_if: Any other changed line means --update-sloc-budgets was run (forbidden) or an unintended entry was touched.
  - step: 6
    phase: pre-deploy
    graduation: not-applicable
    action: >-
      Prove the retirement + mapping via BOTH coverage-checker oracle files -- WHICH THIS WAVE DOES NOT EDIT.
      This is the authoritative retirement check; do NOT add a literal `grep -q '"test_iceberg_reader.py"'
      scripts/test_coverage_checker.py` step (it always fails because the basename legitimately persists in
      _ALL_MIRROR_TARGET_HOMES). The grandfather oracle's tree-derived test IS the _RETIRING membership check.
    command: bin/venv-python -m pytest tests/test_coverage_checker_map.py tests/test_coverage_checker_grandfather.py -q
    expected: >-
      All pass with ZERO edits to either oracle file: TestMapSourceToTest / TestMirrorRule green (the
      iceberg TestMirrorRule case is monkeypatched, wave-invariant); grandfather
      test_retirement_state_matches_the_tests_tree green (all three homes absent from _RETIRING and all three
      flat monoliths deleted); test_roster_is_the_24_known_basenames unchanged.
    fix_if: >-
      A failing grandfather test_retirement_state_matches_the_tests_tree means the three _RETIRING deletions
      and the three monolith deletions did not land together in the same (FINAL) commit -- they MUST be
      atomic. A failing map oracle means Edit A removed the wrong basename or touched _CONCERN_SPLIT. Do NOT
      "fix" by editing an oracle file -- reconcile the checker Edit A and the deletions.
  - step: 7
    phase: pre-deploy
    graduation: not-applicable
    action: >-
      Confirm all three monoliths are gone, all three new package dirs exist and are populated, and a control
      still-grandfathered / off-roster home is untouched (no over-reach).
    command: >-
      test ! -f tests/test_contracts_enforcement.py && test ! -f tests/test_iceberg_reader.py &&
      test ! -f tests/test_scheduled_agent_handler.py &&
      ls tests/contracts_enforcement/test_*.py >/dev/null &&
