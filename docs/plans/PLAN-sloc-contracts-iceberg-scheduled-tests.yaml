schema_version: 1
slug: sloc-contracts-iceberg-scheduled-tests
intent: >-
  Decompose the THREE oversized concern-split test monoliths --
  tests/test_contracts_enforcement.py (665), tests/test_iceberg_reader.py (641) and
  tests/test_scheduled_agent_handler.py (502) -- into three concern-split test PACKAGES
  (tests/contracts_enforcement/, tests/common/iceberg_reader/,
  tests/data/handlers/scheduled_agent_handler/), each a set of cohesive test_<concern>.py modules
  < 500 SLOC, then retire the three grandfather homes and delete their three
  config/sloc_budgets.yaml lines -- rec-2709 Wave 11 of the Decision 131 mirror-convention rollout.
  All three sources are ALREADY declared in _CONCERN_SPLIT_TEST_PACKAGES, so the checker flip is a
  single Edit A (three _RETIRING deletions) -- no _CONCERN_SPLIT add, no smoke_actions-style
  special-case. Purpose: keep every test file small enough for lower-tier model comprehension
  (the load-bearing reason the 500-SLOC gate exists, Decision 128). Behaviour-preserving pure MOVE;
  no source module is touched; no Lambda build/deploy/smoke-test (compute_affected_artifacts of the
  changed tests/ files is {} -- confirmed).
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-sloc-contracts-iceberg-scheduled-tests.yaml
phase: >-
  rec-2709 Wave 11 (Decision 131 mirror convention, amends Decision 104); SLOC governance /
  model-portability (AGENTS.md Decision 128). Behaviour-preserving test MOVE of three concern-split
  monoliths. No product-roadmap phase; platform tooling only.
scope:
