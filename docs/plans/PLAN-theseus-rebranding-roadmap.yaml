schema_version: 1
slug: "theseus-rebranding-roadmap"
intent: >-
  Establish the external-facing brand identity for the platform and stand up a NEW third roadmap
  (docs/ROADMAP-SEMANTO.yaml) that holds the post-MVP marketing / external-presence work, so the
  public documentation + marketing site at theseus.support (already-owned Cloudflare domain) can be
  built once the MVP is complete. This session ONLY ratifies the anchoring decision and authors the
  roadmap items; it builds no site and changes no internal identifier or infrastructure. Concretely:
  (1) ratify Decision 101 fixing the naming hierarchy -- "Theseus" = external brand for the PLATFORM
  (the self-improving host), "Guerdon" = external brand for the trading PRODUCT (product #1),
  "Semanto" = the external-facing marketing/comms system -- as a PRESENTATION-LAYER-ONLY brand with
  every internal identifier unchanged (repo agent-platform, AWS prefixes agent-platform-*, profile
  agent_platform, Glue db, and project_id staying trading-system; deep internal rename explicitly
  DEFERRED to a future post-MVP tightening refactor); (2) carve, in that same decision, a scoped
  exception to Decision 86 / Agent-First for marketing prose (sited OUTSIDE docs/, never an agent
  source-of-truth, one-way downstream rendering) and a public-content boundary (never publish AWS
  account specifics; market the platform engineering, never Guerdon's trading alpha/performance);
  (3) create docs/ROADMAP-SEMANTO.yaml whose tier_items all carry status: deferred_post_mvp
  (Decision 93) so none surface as eligible until reactivated post-MVP.
plan_type: IMPLEMENTATION
verification_tier: V1
plan_path: docs/plans/PLAN-theseus-rebranding-roadmap.yaml
phase: >-
  Post-MVP external-presence / go-to-market. Net-new concern: the existing two roadmaps cover platform
  infrastructure (ROADMAP-PLATFORM.yaml) and the trading product lifecycle (ROADMAP-PRODUCT.yaml);
  marketing/external presence is neither, so it gets a third sibling roadmap. All work is gated behind
  the Platform-MVP boundary via Decision 93's deferred_post_mvp lifecycle status (the canonical post-MVP
  gate -- chosen over a cross-roadmap depends_on edge, which is not expressible since depends_on
  resolves within a single roadmap graph). No item is eligible now. Product roadmap: not applicable.
scope:
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Insert "## Decision 101: External brand identity (Theseus / Guerdon / Semanto) -- presentation-layer
      only, with a scoped Agent-First marketing-prose exception (Decided)". Body must state, as ratified
      policy: (a) NAMING HIERARCHY -- Theseus = external brand for the platform/host; Guerdon = external
      brand for the trading product (product #1 under Theseus); Semanto = the external-facing
      marketing/comms system and the name of its roadmap (ROADMAP-SEMANTO.yaml). (b) PRESENTATION-LAYER
      ONLY -- brands apply to external/marketing surfaces; ALL internal identifiers are unchanged (repo
      name agent-platform, AWS resource prefixes agent-platform-*, the agent_platform profile, Glue db
      agent_platform, and project_id stays trading-system per the INTENT-multi-product-platform origin
      model, which is unbuilt and unchanged here). A deep internal rename is a recognised high-blast-radius
      future item DEFERRED to a post-MVP tightening refactor (cite Decision 75 frame-lock: do not commit
      a fixed internal-rename scope now). (c) AGENT-FIRST / DECISION 86 EXCEPTION (scoped) -- marketing
      prose is a sanctioned human-readable surface that lives OUTSIDE docs/ (canonical dir: top-level
      marketing/), is NOT consumed by internal agents as a source of truth, and flows one-way downstream
      from the internal artefacts it renders; it never becomes a warehouse write source (Decision 84).
      Cite Decision 86 and frame this as a scoped exception, not a violation. (d) PUBLIC-CONTENT BOUNDARY
      -- the public site must never publish AWS account specifics (account IDs, infra topology, secrets,
      decision logs) and must market the platform engineering, never Guerdon's trading alpha/performance
      (edge protection + avoids investment-solicitation/performance-claim exposure). (e) HOSTING -- the
      site is a static site on Cloudflare Pages built with Astro + Starlight (free/MIT; Cloudflare Pages
      is the native managed primitive -- consistent with Decision 100, no hand-rolled build/host tooling).
      (f) POSITIONING -- primary audience is data-engineering hiring managers (portfolio/credibility),
      with open-source-community as a secondary aspiration and a paid service as a deferred, separately
      gated future option. After the edit, the decision is synced to ops_decisions via the canonical path
      (ops_data_portal --backfill-decisions-md), per Decision 84.
  - file: docs/ROADMAP-SEMANTO.yaml
    action: Create
    purpose: >-
      New THIRD sibling roadmap (alongside ROADMAP-PLATFORM.yaml and ROADMAP-PRODUCT.yaml). Conforms to
      the same RoadmapDocument document shape the platform roadmap uses (document: header with id
      ROADMAP-SEMANTO, version, status: draft, description, agent_instructions; tier_items: []; an empty
      candidate_decisions: [] and cross_tier_gates: []), so it can later reuse the existing roadmap
      validator with no new schema. Header comment names Decision 101 as the anchoring decision. Tier
      prefix is "S" (id grammar S1.x). EVERY tier_item carries status: deferred_post_mvp (Decision 93)
      with a progress_note explaining the post-MVP parking and naming Decision 101; effort/strategic:false
      set per item. depends_on edges only ever point to other deferred SEMANTO items (Decision 93
      no-live-dep invariant: no LIVE item may depend on a deferred item -- satisfied because the whole
      tier is deferred and nothing in PLATFORM/PRODUCT depends on it). Tier_items to author:
        - S1.1 "Apply Theseus/Guerdon external branding to public-facing surfaces" (README wording/badge,
          repo description; presentation only, no internal identifier change). effort: XS. depends_on: [].
        - S1.2 "Register theseus.support DNS/TLS + Cloudflare Pages project" -- user_action_required: true
          (human owns the Cloudflare/domain console step). effort: XS. depends_on: [].
        - S1.3 "Astro + Starlight static-site scaffold in top-level marketing/ + Cloudflare Pages build"
          (site skeleton, content collections with Zod-validated frontmatter, build pipeline). effort: M.
          depends_on: [S1.2].
        - S1.4 "Public-content boundary review gate + validate.py marketing/ exclusion guard" (pre-publish
          checklist enforcing Decision 101's boundary; validate.py guard excludes top-level marketing/ from
          the agent-first / intent-doc-freeze corpus so the guard does not false-positive on marketing
          prose). effort: S. depends_on: [S1.3].
        - S1.5 "Wire ROADMAP-SEMANTO into tooling" (add a validator over ROADMAP-SEMANTO.yaml reusing the
          RoadmapDocument schema, and surface it in session_preflight via the platform_roadmap
          compute_state path). effort: S. depends_on: [].
        - S1.6 "Initial content: landing page + first engineering write-up" (the self-improving / agent-first
          platform story; markets the engineering, not Guerdon's alpha, per Decision 101). effort: M.
          depends_on: [S1.3, S1.4].
  - file: docs/plans/PLAN-theseus-rebranding-roadmap.yaml
    action: Create
    purpose: This plan artefact (already authored by the /plan session; committed alongside the deliverables).
bundled_recommendations: []
infrastructure_dependencies:
  - >-
    NO infrastructure, NO terraform, NO AWS change, NO Lambda build/deploy. Decision 79 assessment:
    compute_affected_artifacts(scope) matches no active Lambda artifact -- docs/*.md, docs/*.yaml, and
    docs/plans/*.yaml are not Lambda-packaged and config/agent/ is explicitly not packaged. No per-Lambda
    build/deploy/smoke-test step is owed. The theseus.support site (Cloudflare Pages) and DNS are
    deferred_post_mvp tier_items (S1.2/S1.3), authored here but NOT provisioned in this session.
  - >-
    NO internal identifier changes in this session. The rebrand is presentation-layer only and entirely
    forward-declared in Decision 101 + ROADMAP-SEMANTO.yaml; repo name, agent-platform-* AWS prefixes,
    the agent_platform profile, Glue db, and project_id (trading-system) are untouched. The deep internal
    rename is a deferred future item, not this plan.
  - >-
    Single-Portal / warehouse path (Decision 84): the Decision 101 edit lands in docs/DECISIONS.md (the
    numbering + source authority) and is synced to ops_decisions via
    bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md. No direct write to
    logs/.decisions-index.jsonl. Marketing rendering is one-way and never a warehouse write source.
acceptance_criteria:
  - >-
    (Decision ratified) docs/DECISIONS.md contains "## Decision 101:" covering all six clauses --
    naming hierarchy (Theseus/Guerdon/Semanto), presentation-layer-only with internal identifiers and
    project_id=trading-system unchanged + deep-rename deferred, the scoped Decision-86 marketing-prose
    exception (sited outside docs/), the public-content boundary (no AWS specifics; platform-not-alpha),
    Cloudflare Pages + Astro/Starlight hosting, and positioning. The decision is synced to ops_decisions
    via ops_data_portal --backfill-decisions-md (exit 0).
  - >-
    (Third roadmap created) docs/ROADMAP-SEMANTO.yaml exists, is valid YAML, has a document: header with
    id ROADMAP-SEMANTO, and contains tier_items S1.1-S1.6 as specified. EVERY tier_item has
    status: deferred_post_mvp with a progress_note citing Decision 93 and Decision 101.
  - >-
    (Post-MVP gate is the only gate / no-live-dep invariant) No tier_item in ROADMAP-SEMANTO.yaml carries
    status not_started or in_progress, and no depends_on edge points from a SEMANTO item to a non-SEMANTO
    item; no live item in ROADMAP-PLATFORM.yaml or ROADMAP-PRODUCT.yaml depends_on any S1.x id.
  - >-
    (No internal-identifier drift) This session changes no code, no terraform, no config: a working-tree
    diff touches only docs/DECISIONS.md, docs/ROADMAP-SEMANTO.yaml, and docs/plans/PLAN-theseus-rebranding-roadmap.yaml.
    project_id remains trading-system and agent-platform-* prefixes are unchanged (grep confirms no edits).
  - >-
    The full validate.py presubmit passes (exit 0) with the three new/edited files present -- the new
    ROADMAP-SEMANTO.yaml does not break validate_platform_roadmap / validate_product_roadmap (which target
    their own fixed paths) and the new Decision passes any DECISIONS.md format check.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      Authoritative local gate -- full presubmit (YAML parse, plan schema, roadmap validators over their
      fixed paths, decisions format). Confirms the new files introduce no regression.
    command: bin/venv-python -m scripts.validate --pre && bin/venv-python -m scripts.validate
    expected: All checks pass (exit 0).
    fix_if: >-
      A check fails -- read the failing check and fix the offending file. If a generic roadmap check
      rejects ROADMAP-SEMANTO.yaml, conform its document: header to the RoadmapDocument shape (do NOT
      weaken the check). If the new validation truly requires a validator, that is S1.5 scope -- pull the
      minimal registration forward rather than disabling the check.
  - step: 2
    phase: pre-deploy
    action: ROADMAP-SEMANTO.yaml parses and every tier_item is deferred_post_mvp (Decision 93 gate).
    command: >-
      bin/venv-python -c "import yaml,sys; d=yaml.safe_load(open('docs/ROADMAP-SEMANTO.yaml'));
      items=d.get('tier_items',[]); assert items, 'no tier_items';
      bad=[i['id'] for i in items if i.get('status')!='deferred_post_mvp'];
      assert not bad, ('not deferred_post_mvp: '+repr(bad)); print('SEMANTO deferred_post_mvp OK', [i['id'] for i in items])"
    expected: Prints "SEMANTO deferred_post_mvp OK" with the S1.1-S1.6 id list; no assertion trips.
    fix_if: An assertion trips -- set status deferred_post_mvp on the offending tier_item(s).
  - step: 3
    phase: pre-deploy
    action: No-live-dep invariant -- no PLATFORM/PRODUCT live item depends_on a SEMANTO id, and SEMANTO depends_on edges stay within SEMANTO.
    command: grep -nE "depends_on:.*S1\." docs/ROADMAP-PLATFORM.yaml docs/ROADMAP-PRODUCT.yaml || echo "no external dependents OK"
    expected: Prints "no external dependents OK" (grep finds nothing in the two live roadmaps).
    fix_if: A match is found -- a live roadmap must not depend on a deferred SEMANTO item; remove that edge (Decision 93).
  - step: 4
    phase: pre-deploy
    action: Decision 101 present with its clauses and synced to the warehouse.
    command: >-
      grep -nE "^## Decision 101:" docs/DECISIONS.md && bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md
    expected: The Decision 101 header is found and the backfill completes (exit 0), syncing ops_decisions.
    fix_if: >-
      Header missing -- author Decision 101 per scope. Backfill fails -- confirm the static-key chain
      (aws sts get-caller-identity --profile agent_platform) and re-run; do not edit logs/.decisions-index.jsonl directly.
  - step: 5
    phase: pre-deploy
    action: No internal-identifier drift -- the only changed files are the decision, the new roadmap, and this plan.
    command: git diff --name-only origin/main...HEAD | grep -vE "^docs/(DECISIONS\.md|ROADMAP-SEMANTO\.yaml|plans/PLAN-theseus-rebranding-roadmap\.yaml)$" || echo "scope clean OK"
    expected: Prints "scope clean OK" (no file outside the declared scope was touched).
    fix_if: An out-of-scope file appears -- revert it; internal renames/code changes are explicitly out of scope for this plan.
execution_steps:
  - "Insert '## Decision 101: External brand identity (Theseus / Guerdon / Semanto) -- presentation-layer only, with a scoped Agent-First marketing-prose exception (Decided)' into docs/DECISIONS.md (above Decision 100, preserving the file's existing newest-first ordering). Body must cover all six clauses from the scope row: (a) naming hierarchy; (b) presentation-layer-only with internal identifiers and project_id=trading-system unchanged + deep-rename deferred (cite Decision 75); (c) scoped Decision-86 marketing-prose exception sited at top-level marketing/ (never an agent source-of-truth, one-way, never a warehouse write source per Decision 84); (d) public-content boundary (no AWS account specifics; market platform engineering, not Guerdon alpha); (e) Cloudflare Pages + Astro/Starlight hosting (Decision 100 native primitive); (f) positioning (data-engineering hiring managers primary, OSS secondary, paid deferred)."
  - "Sync the new decision to ops_decisions: bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md (must exit 0). Do not edit logs/.decisions-index.jsonl directly."
  - "Create docs/ROADMAP-SEMANTO.yaml conforming to the platform RoadmapDocument document shape: a document: header (id ROADMAP-SEMANTO, version 1, status draft, description, agent_instructions naming Decision 101 + the deferred_post_mvp gate), candidate_decisions: [], cross_tier_gates: [], and tier_items: [] populated with S1.1-S1.6 exactly as specified in the scope row (tier prefix S, every item status: deferred_post_mvp with a progress_note citing Decision 93 + Decision 101, effort/strategic:false per item, S1.2 user_action_required: true, depends_on edges intra-SEMANTO only)."
  - "Run verification Step 1 (full validate.py --pre and full) and fix any failure in the offending file -- do not weaken a check."
  - "Run verification Steps 2-5 (deferred_post_mvp assertion, no-live-dep grep, Decision 101 header + backfill, scope-clean git diff); fix any assertion failure before proceeding."
  - "Commit the three files (docs/DECISIONS.md, docs/ROADMAP-SEMANTO.yaml, docs/plans/PLAN-theseus-rebranding-roadmap.yaml) with message 'feat(theseus-rebranding-roadmap): ratify Decision 101 + add ROADMAP-SEMANTO.yaml'. Rebase on origin/main and push per the git-ops flow."
rollback: >-
  Pure additive documentation change. To roll back: revert the docs/DECISIONS.md Decision 101 insertion
  and re-run ops_data_portal --backfill-decisions-md (rebuilds ops_decisions from the reverted file), and
  delete docs/ROADMAP-SEMANTO.yaml. No code, infrastructure, or internal identifier was touched, so there
  is nothing else to unwind.
