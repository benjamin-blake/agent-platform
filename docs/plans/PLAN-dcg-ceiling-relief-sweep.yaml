  - "Loud-fail, no silent counters or retry-into-green (Decision 55); the DCG-03 orphan baseline (dec-010) is not to be silently altered to pass the backfill."
  - "No new standing prose-architecture docs (Decision 86): DCG-01's closure is recorded in this plan; no new docs/INTENT-*.md or companion artefact."
  - "No rescue agents or workaround loops (Decision 55)."
