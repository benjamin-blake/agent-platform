schema_version: 1
slug: "dcg-ceiling-relief-sweep"
intent: >-
  Apply the merged number-preserving compaction lifecycle (Decision 149) to Decision 58 -- the sole
  remaining genuinely-eligible fully-superseded live entry after the DPI-04 archival wave and Plan-1's
  D44 compaction -- reclaiming live headroom under the Decision 134/145 DECISIONS.md ceiling and closing
  audit finding DCG-01 with an honest outflow record (relief valves built and exercised), not a byte
  target or a ceiling raise.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-dcg-ceiling-relief-sweep.yaml
phase: >-
  Audit-driven platform governance (DCG-01, audits/decision-consolidation-growth-f79d6b5.yaml). No
  tier_item -- audit follow-ups route to Decisions/contracts/plans, not recs (Decision 86); soft-warn
  category (audit-driven), so the Tier Item Freshness Gate is skipped. Sibling application of the merged
  PLAN-dcg-compaction-lifecycle (Decision 149 compaction mechanism) and the DPI-04 archival wave
  (Decision 146).
scope:
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Compact Decision 58 (`.agents` as Canonical Interactive Workflow Layer, fully superseded by
      Decision 76 -- the `.agents/` interactive-workflow layer is retired in favour of the
      `.claude/commands/` + `.claude/skills/` architecture) to a conforming Decision-149 stub IN PLACE.
      It cannot archive because docs/ROADMAP-PLATFORM.yaml (T5.3) and docs/contracts/instruction-architecture.yaml
      cite "Decision 58" by number, so it stubs in the live file per the archive-vs-compact branch. Header
      parenthetical stays `(Decided)`; body carries `**Status:** Superseded`, `**Date:** 2026-05-01`, a
      non-empty one-line `**Decision:**` pointer to Decision 76 and why it stays live-compacted, and the
      already-present exact `**Superseded by: Decision 76**` marker. ~700 live bytes reclaimed; the second
      exercise of the compaction lifecycle after Plan-1's D44.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    Decision 58 in docs/DECISIONS.md is a conforming Decision-149 stub: header parenthetical still
    `(Decided)`; body has `**Status:** Superseded`, `**Date:** 2026-05-01`, a non-empty one-line
    `**Decision:**` pointer naming Decision 76, and the exact `**Superseded by: Decision 76**` marker; the
    prior full body (Problem/Decision/Rationale/Related) is gone. parse_decisions_md() yields dec-058
    status=Superseded, superseded_by=dec-076, non-empty decision_text, decided_date starting '2026'.
  - >-
    The `## Decision 58:` header survives in docs/DECISIONS.md exactly once (never-remove-headers) and
    Decision 58 does NOT appear in docs/DECISIONS_ARCHIVE.md (compaction stays in place, no archive move);
    every pre-existing by-name "Decision 58" citation (ROADMAP-PLATFORM.yaml T5.3, docs/contracts/instruction-architecture.yaml,
    ROADMAP-PRODUCT.yaml, config/decision_supersession_waivers.yaml) still resolves to the live header.
  - >-
    bin/venv-python -m scripts.validate --pre is green -- validate_decisions_size PASS (live bytes < 500000;
    live `## Decision` header count unchanged at 102 <= 120, no header added or removed) and the R1
    ratification guard (validate_candidate_decision_ratification) + validate_candidate_decision_supersession
    PASS (dec-058 still resolves to a live header; no ratified CD maps to dec-058).
  - >-
    bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md runs green, writing a status=Superseded
    terminal SCD2 version for dec-058 (content_hash changed by the stub edit) with the prior full-body Decided
    version retained as SCD2 history; the DCG-03 divergence guard fires no NEW orphan (dec-010 tolerated via the
    orphan baseline) and the fidelity tripwire stays silent.
  - >-
    The ops_decisions current projection records dec-058 as the terminal Superseded version
    (status=Superseded, superseded_by=dec-076) via the closed-boundary reader.
  - >-
    This plan files NO recommendations (bundled_recommendations: []); rec-2822 and rec-2823 (already filed by
    the operator for the citation-stranded D24-class future work) are referenced in context, not refiled; no
    Decision 24 edit is made, no DECISIONS_ARCHIVE.md move is made, no ceiling raise and no byte-target is
    claimed.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Assert the compacted Decision 58 stub parses to the required terminal shape.
    command: "bin/venv-python -c \"from scripts.decisions_md import parse_decisions_md; r={x['decision_id']:x for x in parse_decisions_md()}[58]; assert r['status']=='Superseded', r['status']; assert r['superseded_by']=='dec-076', r['superseded_by']; assert r['decision_text'].strip(), 'empty decision_text'; assert r['decided_date'].startswith('2026'), r['decided_date']; print('D58 stub OK', r['status'], r['superseded_by'])\""
    expected: "Prints 'D58 stub OK Superseded dec-076'; no AssertionError."
    fix_if: >-
      status != Superseded (the `**Status:**` marker is missing or spelled wrong), superseded_by != dec-076
      (the `**Superseded by: Decision 76**` marker was dropped/mangled), empty decision_text (the one-line
      `**Decision:**` pointer is missing -- fidelity-tripwire risk), or a non-ISO decided_date (the `**Date:**`
      line was dropped).
    hermetic: true
    graduation: waive
    graduation_waiver_reason: >-
      A one-time correctness assertion on this compacted stub (transient this-plan repo state). The durable
      guard for stub fidelity is the backfill's EXISTING per-run fidelity tripwire (empty decision_text /
      non-ISO decided_date on a live-h2 entry), already exercised in VP step 4 -- registering a separate
      CANONICAL_SLOTS kernel check duplicates that standing coverage without adding a new regression surface.
  - step: 2
    phase: pre-deploy
    action: Confirm the Decision 58 header survives in place (never-remove-headers) and was not archived, so every inbound by-name citation still resolves.
    command: "bin/venv-python -c \"from scripts.decisions_md import decision_header_numbers as H; n=H(); assert 58 in n, sorted(n); import pathlib; live=pathlib.Path('docs/DECISIONS.md').read_text(encoding='utf-8'); assert live.count('## Decision 58:')==1, live.count('## Decision 58:'); arch=pathlib.Path('docs/DECISIONS_ARCHIVE.md').read_text(encoding='utf-8'); assert '## Decision 58:' not in arch, 'D58 must NOT be archived'; print('D58 header live x1, not archived; citations resolve')\""
    expected: "Prints 'D58 header live x1, not archived; citations resolve'."
    fix_if: >-
      Decision 58 lost its live header (a number-keyed citation would dangle -- never-remove-headers
      violated), the header appears more than once (a duplicate was introduced), or Decision 58 was moved into
      DECISIONS_ARCHIVE.md (the archive-vs-compact branch was mis-applied -- D58 is cited by number so it must
      stub in place, not archive).
    hermetic: true
    graduation: waive
    graduation_waiver_reason: >-
      A deterministic hermetic check, but this-entry-specific to D58's one-time compaction. The durable
      never-remove-headers / no-orphaned-current-row invariant is ALREADY a standing guard -- the DCG-03
      `_assert_no_orphaned_current_rows` divergence check the backfill runs (VP step 4) -- so a dedicated
      kernel slot here duplicates existing coverage rather than adding a new regression surface.
  - step: 3
    phase: pre-deploy
    action: Run the fast presubmit gate; the size guard and the R1 ratification guard must pass.
    command: "bin/venv-python -m scripts.validate --pre"
    expected: >-
      Green. DECISIONS size governance PASS (live bytes < 500000 -- ~421.9K after the ~700-byte compaction;
      live `## Decision` headers unchanged at 102 <= 120, since compaction adds and removes no header). R1
      validate_candidate_decision_ratification PASS and validate_candidate_decision_supersession PASS (dec-058
      resolves to a live header; no ratified CD maps to dec-058). validate_plan_documents PASS on this plan.
    fix_if: >-
      A size breach (impossible -- bytes only decrease), an R1 FAIL (a decision header was removed or
      renumbered -- never-remove-headers violated), a plan-schema FAIL on this document, or any other --pre
      check regresses.
    hermetic: false
    graduation: not-applicable
  - step: 4
    phase: post-deploy
    action: Run the DECISIONS.md -> ops_decisions backfill against the live DuckLake warehouse (needs agent_platform creds); writes dec-058's terminal Superseded version and exercises the DCG-03 orphan guard.
    command: "bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md"
    expected: >-
      Exit 0. The run writes >=1 row including dec-058 (its content_hash changed by the stub edit), failed=0,
      and neither the fidelity tripwire nor the DCG-03 divergence tripwire fires (dec-010 is tolerated via the
      orphan baseline; no NEW orphan exists).
    fix_if: >-
      The DCG-03 divergence RuntimeError fires (a genuine NEW orphan exists -- investigate and DO NOT silence a
      real one; dec-010 is the only baselined orphan); the fidelity tripwire fires (the D58 stub parsed to empty
      decision_text or a non-ISO date -- fix the stub, do not weaken the tripwire); or the reader/writer Function
      URLs are unreachable (degraded -- refresh the agent_static key per AGENTS.md, do NOT treat as a code
      failure or retry into green, Decision 55).
    hermetic: false
  - step: 5
    phase: post-deploy
    action: Confirm the warehouse current projection now records dec-058 as the terminal Superseded version.
    command: "bin/venv-python -c \"from src.common.iceberg_reader import make_reader; r=make_reader().named('decision_by_id', id='dec-058')[0]; assert r['status']=='Superseded', r['status']; assert r.get('superseded_by')=='dec-076', r.get('superseded_by'); print('dec-058 terminal:', r['status'], r.get('superseded_by'))\""
    expected: "Prints 'dec-058 terminal: Superseded dec-076'. The prior status=Decided full-body version is retained as SCD2 history (append-only), and in git history."
    fix_if: >-
      The current projection still shows status Decided (the content_hash skip-gate did not detect the stub edit
      -- confirm the raw_block actually changed) or superseded_by is unset (the `**Superseded by: Decision 76**`
      marker did not parse to dec-076).
    hermetic: false
