rollback: >-
  Revert the four hunks. scripts/convergence_health.py: re-inline filter_stuck_runs into
  find_stuck_gated_approvals and drop diagnose_stuck_approvals + the main() diagnose branch (no other
  module imports them; the production path is unchanged so reverting is safe). .github/workflows/
  convergence-health.yml: drop the diagnose input and the CONVERGENCE_HEALTH_DIAGNOSE env (the sensor
  keeps running unchanged). tests/test_convergence_health.py and docs/ROADMAP-PLATFORM.yaml: plain
  reverts. No IAM, no terraform, no convergence-record schema change, no data-plane effect -- rollback
  is low-risk.
