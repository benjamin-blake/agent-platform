    handling as find_stuck_gated_approvals but query terraform-apply-sandbox runs of ANY status
    (drop the status=waiting filter; per_page recent) and return filter_stuck_runs(runs, threshold_hours,
    now). Add a diagnose branch to main() gated on os.environ.get("CONVERGENCE_HEALTH_DIAGNOSE"): read
