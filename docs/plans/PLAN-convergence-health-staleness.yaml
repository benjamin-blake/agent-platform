    Checked clean against 77, 84, 100/75, 86, 55/72. Continuity from the parent: 55, 72, 83, 84, 86.
  - >-
    Branch level with origin/main (0 ahead, 0 behind) at planning time; ci_rca_unresolved is empty (no
