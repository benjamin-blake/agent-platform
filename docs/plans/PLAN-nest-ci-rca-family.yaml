  - file: .claude/agents/scheduled/ci-rca.md
    action: Modify
    purpose: Rewrite the scheduled-agent doc path scripts/ci_rca_filing.py -> scripts/ci_rca/filing.py (acceptance -- the scheduled agent resolves its module path)
  - file: docs/contracts/file-router.yaml
    action: Modify
    purpose: >-
      Append one discovery route (topic ci-rca-code -> targets [scripts/ci_rca/]) registering the new
      subpackage home. Realizes the RS-04 "each family move updates the registry" sequencing point.
      No existing row targets a ci_rca path, so nothing to fix -- this is an additive discovery row.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Cosmetic sweep of ~10 live path refs (files_in_scope + prose) scripts/ci_rca_<name>.py ->
      scripts/ci_rca/<name>.py. Verified NOT existence-validated by any CI check (no files_in_scope
      existence gate), so non-blocking -- swept per the live-surface policy. The pathless `# new`
      annotations stay.
  - file: docs/INTENT-ci-rca-methodology.md
    action: Modify
    purpose: Cosmetic sweep of ~14 live path refs scripts/ci_rca_<name>.py / scripts.ci_rca_<name> -> nested form (grandfathered INTENT doc; live surface)
  - file: tests/test_ci_rca_back_validation.py
    action: Modify
    purpose: Rewrite the import + docstring path (scripts.ci_rca_back_validation -> scripts.ci_rca.back_validation). File stays named test_ci_rca_back_validation.py (coverage map preserved).
  - file: tests/test_ci_rca_evidence.py
    action: Modify
    purpose: Rewrite import of taxonomy_mod + evidence + all @patch("scripts.ci_rca_tier_map...") / @patch("scripts.ci_rca_evidence...") targets to the nested form (~75 refs)
  - file: tests/test_ci_rca_evidence_ast.py
    action: Modify
    purpose: Rewrite the docstring + import from scripts.ci_rca_tier_map -> scripts.ci_rca.tier_map (this file tests tier_map's AST walker despite its name)
  - file: tests/test_ci_rca_filing.py
    action: Modify
    purpose: Rewrite docstring + import + the subprocess CLI invocation ("-m", "scripts.ci_rca_filing" -> "scripts.ci_rca.filing") that proves the workflow entry path
  - file: tests/test_ci_rca_probe_health.py
    action: Modify
    purpose: Rewrite docstring + import (scripts.ci_rca_probe_health -> scripts.ci_rca.probe_health)
  - file: tests/test_ci_rca_taxonomy.py
    action: Modify
    purpose: Rewrite docstring + both imports (import scripts.ci_rca_taxonomy as taxonomy_mod; from scripts.ci_rca_taxonomy import ...) to the nested form
  - file: tests/test_ci_rca_tier_map.py
    action: Modify
    purpose: Rewrite docstring + import + three @patch("scripts.ci_rca_tier_map.subprocess.run") targets to the nested form
  - file: tests/test_ci_rca_vacuous_pass.py
    action: Modify
    purpose: Rewrite docstring + import + the @patch("scripts.ci_rca_vacuous_pass.subprocess.run") targets (~10 refs) to the nested form
  - file: tests/test_session_preflight.py
