    ---8<--- sweep (bin/venv-python - <<'PY')
    import re, pathlib
    DOTTED = re.compile(r"\bscripts\.ci_rca_(back_validation|evidence|filing|probe_health|taxonomy|tier_map|vacuous_pass)\b")
    PATHRE = re.compile(r"\bscripts/ci_rca_(back_validation|evidence|filing|probe_health|taxonomy|tier_map|vacuous_pass)\.py\b")
    FILES = [
      # moved modules (at their NEW paths)
      "scripts/ci_rca/back_validation.py", "scripts/ci_rca/evidence.py", "scripts/ci_rca/filing.py",
      "scripts/ci_rca/probe_health.py", "scripts/ci_rca/taxonomy.py", "scripts/ci_rca/tier_map.py",
      "scripts/ci_rca/vacuous_pass.py",
      # non-moving importers / consumers
      "scripts/preflight/ci_rca_gauges.py", "scripts/checks/ci_guards/validate_ci_rca_taxonomy.py",
      "config/agent/verification_registry/registry.yaml", ".github/workflows/ci-rca.yml",
      ".claude/agents/scheduled/ci-rca.md",
      # live docs (cosmetic sweep)
      "docs/ROADMAP-PLATFORM.yaml", "docs/INTENT-ci-rca-methodology.md",
      # tests (imports, @patch targets, string literals, subprocess -m)
      "tests/test_ci_rca_back_validation.py", "tests/test_ci_rca_evidence.py",
      "tests/test_ci_rca_evidence_ast.py", "tests/test_ci_rca_filing.py",
      "tests/test_ci_rca_probe_health.py", "tests/test_ci_rca_taxonomy.py",
