schema_version: 1
slug: "nest-ci-rca-family"
intent: >-
  Nest the seven-module ci_rca_* family from the scripts/ root into a scripts/ci_rca/ subpackage
  (git mv + __init__.py) with a same-commit repo-wide reference rewrite -- the highest-fan-out move
  of the repository-structure restructure. Converts the scripts/ root's largest predictability gap
  into the proven scripts/checks//executor//verifiers/ subpackage pattern so agents locate CI-RCA
  code by home, not by scanning 71 flat filenames. Audit finding RS-01, phase 1 of 3 (rec-164
  Phase A territory).
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-nest-ci-rca-family.yaml
phase: >-
  Repository-structure restructure Phase P4a (audit finding RS-01 [medium], phase 1 of 3, from
  audits/repository-structure-cb02572.yaml RS-01 + the proposed_target_tree scripts/ci_rca/ node).
  Runs AFTER P1 (RS-04 file-router registry + validate_placement link-validity check), P2 (RS-02/03
  stray consolidation), and P3 (RS-05/RS-03 context-locality CLAUDE.md), all merged at origin/main
  ed77d58 (scripts/CLAUDE.md now carries the root-vs-subpackage placement rule this phase realizes).
  Platform axis; RS-01 is planned-insufficient via open rec-164. IMPLEMENTATION type (STRATEGIC
  frozen, Decision 67). rec-164 does NOT close here -- it closes at RS-01 phase 3.
scope:
  - file: scripts/ci_rca_back_validation.py
    action: Delete
    purpose: git mv to scripts/ci_rca/back_validation.py (no ROOT anchor; one docstring path ref to probe_health rewritten by the sweep)
  - file: scripts/ci_rca/back_validation.py
    action: Create
    purpose: Receives back_validation via git mv; docstring path ref scripts/ci_rca_probe_health.py -> scripts/ci_rca/probe_health.py
  - file: scripts/ci_rca_evidence.py
    action: Delete
    purpose: git mv to scripts/ci_rca/evidence.py (workflow entry point; intra-family imports of taxonomy/tier_map/vacuous_pass; ROOT anchor)
  - file: scripts/ci_rca/evidence.py
    action: Create
    purpose: >-
      Receives evidence via git mv. Rewrite intra-family imports (scripts.ci_rca_taxonomy/tier_map/
      vacuous_pass -> scripts.ci_rca.*) and CLI docstring; FIX ROOT=Path(__file__).parent.parent ->
      parent.parent.parent (anchors _PENDING_DIR, sys.path, config.personal.yaml, --validate-path default).
  - file: scripts/ci_rca_filing.py
    action: Delete
    purpose: git mv to scripts/ci_rca/filing.py (workflow entry point; no internal ci_rca refs, no ROOT anchor -- clean move)
  - file: scripts/ci_rca/filing.py
    action: Create
    purpose: Receives filing via git mv; pure move (no internal reference or ROOT edit needed)
  - file: scripts/ci_rca_probe_health.py
    action: Delete
    purpose: git mv to scripts/ci_rca/probe_health.py (two string-literal path refs to evidence.py; no ROOT anchor)
  - file: scripts/ci_rca/probe_health.py
    action: Create
    purpose: Receives probe_health via git mv; rewrite the two scripts/ci_rca_evidence.py string-literal paths to scripts/ci_rca/evidence.py
  - file: scripts/ci_rca_taxonomy.py
    action: Delete
    purpose: git mv to scripts/ci_rca/taxonomy.py (loads config/ci_rca_taxonomy.yaml via ROOT; docstring path ref; ROOT anchor)
  - file: scripts/ci_rca/taxonomy.py
    action: Create
    purpose: >-
      Receives taxonomy via git mv. Rewrite docstring path ref; FIX ROOT parent.parent ->
      parent.parent.parent so _TAXONOMY_PATH still resolves config/ci_rca_taxonomy.yaml and the
      workflows dir default still resolves .github/workflows. The config/ci_rca_taxonomy.yaml
      string is NOT rewritten (not a scripts/ path) -- the config file stays put.
  - file: scripts/ci_rca_tier_map.py
    action: Delete
    purpose: git mv to scripts/ci_rca/tier_map.py (ROOT anchors scripts/validate.py + cwd; no internal ci_rca import)
  - file: scripts/ci_rca/tier_map.py
    action: Create
    purpose: Receives tier_map via git mv; FIX ROOT parent.parent -> parent.parent.parent (anchors scripts/validate.py path x2 and subprocess cwd)
  - file: scripts/ci_rca_vacuous_pass.py
    action: Delete
    purpose: git mv to scripts/ci_rca/vacuous_pass.py (ROOT anchors subprocess cwd; no internal ci_rca import)
  - file: scripts/ci_rca/vacuous_pass.py
    action: Create
    purpose: Receives vacuous_pass via git mv; FIX ROOT parent.parent -> parent.parent.parent (anchors subprocess cwd=ROOT)
  - file: scripts/ci_rca/__init__.py
    action: Create
    purpose: New package marker with a one-line docstring (empty-equivalent; coverage-excluded) so scripts.ci_rca is an importable package
  - file: scripts/preflight/ci_rca_gauges.py
    action: Modify
    purpose: >-
      NON-moving importer. Rewrite its function-local imports of the moved modules
