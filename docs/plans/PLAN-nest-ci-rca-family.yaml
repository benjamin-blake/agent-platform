      string literals in the _derive_ci_rca_open projection tests -> nested form.
  - file: tests/test_session_preflight_cache_serving.py
    action: Modify
    purpose: Rewrite the single "scripts/ci_rca_tier_map.py" marker_file string literal -> scripts/ci_rca/tier_map.py
