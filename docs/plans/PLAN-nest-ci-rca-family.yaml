      "tests/test_session_preflight.py", "tests/test_session_preflight_cache_serving.py",
      "tests/test_validate.py",
    ]
    for f in FILES:
        p = pathlib.Path(f); t = p.read_text(encoding="utf-8")
        t2 = PATHRE.sub(r"scripts/ci_rca/\1.py", DOTTED.sub(r"scripts.ci_rca.\1", t))
        if t2 != t: p.write_text(t2, encoding="utf-8"); print("rewrote", f)
