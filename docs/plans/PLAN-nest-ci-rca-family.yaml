acceptance_criteria:
  - >-
    No ci_rca_*.py file remains DIRECTLY under scripts/: all 7 (back_validation, evidence, filing,
    probe_health, taxonomy, tier_map, vacuous_pass) now live under scripts/ci_rca/ with an __init__.py.
    The non-moving ci_rca-named siblings are untouched: scripts/ops_portal/ci_rca_{runtime,schema}.py,
    scripts/preflight/ci_rca_{gauges,signals}.py, and scripts/checks/ci_guards/validate_ci_rca_taxonomy.py
    keep their paths (only their imports of the moved modules are rewritten where present).
  - >-
    The ci-rca workflow (.github/workflows/ci-rca.yml) and the scheduled agent
    (.claude/agents/scheduled/ci-rca.md) resolve their module paths: scripts.ci_rca.evidence,
    scripts.ci_rca.filing, and scripts/ci_rca/filing.py.
  - >-
    Zero flat references remain in LIVE surfaces: `git grep -E "scripts[./]ci_rca_(back_validation|
    evidence|filing|probe_health|taxonomy|tier_map|vacuous_pass)"` excluding docs/plans/, audits/,
    logs/, and docs/audit-prompts/ returns nothing (append-only history left intact).
  - >-
    The 4 ROOT-anchoring modules resolve repo-root paths post-move: scripts.ci_rca.taxonomy._TAXONOMY_PATH
    equals <repo>/config/ci_rca_taxonomy.yaml and exists; scripts.ci_rca.evidence.ROOT and
    scripts.ci_rca.tier_map.ROOT each contain scripts/validate.py (proving parent.parent -> parent.parent.parent).
  - >-
    config/ci_rca_taxonomy.yaml is byte-unchanged and still loaded by scripts/ci_rca/taxonomy.py; the
    DO-NOT-TOUCH set (scripts/ops_portal/ci_rca_{runtime,schema}.py, scripts/preflight/ci_rca_signals.py)
    shows no diff versus origin/main.
  - >-
    scripts/test_coverage_checker.py resolves scripts/ci_rca/<name>.py to tests/test_ci_rca_<name>.py
    (coverage enforcement preserved for the moved modules; the 8 ci_rca test modules keep their names).
  - >-
    docs/contracts/file-router.yaml carries a ci-rca-code route whose target scripts/ci_rca/ resolves;
    validate_placement is green (no dead target, no duplicate topic).
  - >-
    FULL validate (bin/venv-python -m scripts.validate, not --pre) and FULL pytest
    (bin/venv-python -m pytest) are both green, including import-linter; compute_affected_artifacts over
    the changed paths returns {} (V2 -- no Lambda build/deploy/smoke-test step).
  - rec-164 remains OPEN (it closes at RS-01 phase 3, not here).
verification_plan:
  - step: 1
    phase: pre-deploy
    hermetic: false
    action: Validate this PLAN document against the PlanDocument schema.
    command: bin/venv-python -m scripts.plan_document docs/plans/PLAN-nest-ci-rca-family.yaml
    expected: Reports the plan validates against the PlanDocument schema (no errors).
    fix_if: A schema error names the offending field; correct it (extra keys forbidden; every VP step needs a non-empty command; unique step ids).
  - step: 2
    phase: pre-deploy
    hermetic: false
    action: Confirm the 7 modules moved into scripts/ci_rca/, the package marker exists, and no flat ci_rca_*.py remains directly under scripts/.
    command: >-
      test -f scripts/ci_rca/__init__.py && for m in back_validation evidence filing probe_health taxonomy tier_map vacuous_pass; do test -f "scripts/ci_rca/$m.py" || { echo "MISSING scripts/ci_rca/$m.py"; exit 1; }; test ! -e "scripts/ci_rca_$m.py" || { echo "STILL FLAT scripts/ci_rca_$m.py"; exit 1; }; done && echo MOVED_OK
    expected: Prints MOVED_OK (all 7 present under scripts/ci_rca/, __init__.py present, zero flat originals).
    fix_if: A MISSING or STILL FLAT line names the offender; complete the git mv for that module and re-run.
  - step: 3
    phase: pre-deploy
    hermetic: false
    action: Stale-reference sweep (Closure Obligation) -- zero flat module references remain in LIVE surfaces; append-only history is intentionally excluded.
    command: >-
      MATCHES=$(git grep -nE "scripts[./]ci_rca_(back_validation|evidence|filing|probe_health|taxonomy|tier_map|vacuous_pass)" -- ':(exclude)docs/plans/*' ':(exclude)audits/*' ':(exclude)logs/*' ':(exclude)docs/audit-prompts/*' || true); if [ -z "$MATCHES" ]; then echo SWEEP_CLEAN; else echo "STALE_REFS:"; echo "$MATCHES"; fi
    expected: Prints SWEEP_CLEAN (no flat scripts.ci_rca_<name> / scripts/ci_rca_<name>.py reference survives on any live surface).
    fix_if: STALE_REFS lists file:line -- apply the anchored rewrite to that live file (unless it is genuinely append-only, in which case widen the exclude pathspec, not the rewrite).
  - step: 4
    phase: pre-deploy
    hermetic: false
    action: ROOT-anchor correctness -- the 4 modules that compute ROOT=Path(__file__).parent.parent.parent resolve to the repo root post-move (this is the move-sensitivity fix that the import rewrite alone does NOT provide).
    command: >-
      bin/venv-python -c "import scripts.ci_rca.taxonomy as t, scripts.ci_rca.evidence as e, scripts.ci_rca.tier_map as tm; assert t._TAXONOMY_PATH.name=='ci_rca_taxonomy.yaml' and t._TAXONOMY_PATH.exists(), t._TAXONOMY_PATH; assert (e.ROOT/'scripts'/'validate.py').exists(), e.ROOT; assert (tm.ROOT/'scripts'/'validate.py').exists(), tm.ROOT; print('ROOT_ANCHORS_OK')"
    expected: Prints ROOT_ANCHORS_OK (taxonomy finds config/ci_rca_taxonomy.yaml; evidence and tier_map ROOT both contain scripts/validate.py).
    fix_if: An AssertionError shows a wrong path -- the module still has parent.parent (2 levels); change it to parent.parent.parent (3 levels) for evidence, taxonomy, tier_map, vacuous_pass.
  - step: 5
    phase: pre-deploy
    hermetic: false
    action: DO-NOT-TOUCH invariants -- the config file and the sibling non-moving ci_rca packages are unchanged versus origin/main (proves the anchored sweep did not over-reach the broad "ci_rca" substring).
    command: >-
      CHANGED=$(git diff --name-only origin/main -- config/ci_rca_taxonomy.yaml scripts/ops_portal/ci_rca_runtime.py scripts/ops_portal/ci_rca_schema.py scripts/preflight/ci_rca_signals.py); if [ -z "$CHANGED" ]; then echo DONOTTOUCH_OK; else echo "UNEXPECTED_CHANGE:"; echo "$CHANGED"; fi
    expected: Prints DONOTTOUCH_OK (config/ci_rca_taxonomy.yaml + ops_portal/ci_rca_{runtime,schema}.py + preflight/ci_rca_signals.py all byte-unchanged).
    fix_if: UNEXPECTED_CHANGE names a file the sweep wrongly touched -- revert it (git checkout origin/main -- <file>); the anchored regex must never rewrite these.
  - step: 6
    phase: pre-deploy
    hermetic: false
    action: Functional -- run the moved family's own tests, which exercise real imports, all @patch targets, and the filing CLI via subprocess "-m scripts.ci_rca.filing" (proves the workflow/scheduled-agent invocation path end-to-end).
    command: bin/venv-python -m pytest tests/test_ci_rca_back_validation.py tests/test_ci_rca_evidence.py tests/test_ci_rca_evidence_ast.py tests/test_ci_rca_filing.py tests/test_ci_rca_probe_health.py tests/test_ci_rca_taxonomy.py tests/test_ci_rca_tier_map.py tests/test_ci_rca_vacuous_pass.py -q
    expected: All 8 ci_rca test modules pass (imports, patches, and the subprocess -m invocation resolve against the nested package).
    fix_if: A failing test names the unresolved import/patch target; complete the anchored rewrite in that test file (imports + every @patch string) or the moved module.
  - step: 7
    phase: pre-deploy
    hermetic: false
    action: Coverage-map preservation -- the coverage checker resolves each moved module to its kept-in-place test.
    command: >-
      bin/venv-python -c "from scripts.test_coverage_checker import map_source_to_test as m; from pathlib import Path; import sys; ok = all(str(m(Path(f'scripts/ci_rca/{n}.py'))).endswith(f'tests/test_ci_rca_{n}.py') for n in ['back_validation','evidence','filing','probe_health','taxonomy','tier_map','vacuous_pass']); print('MAP_OK' if ok else 'MAP_FAIL'); sys.exit(0 if ok else 1)"
    expected: Prints MAP_OK (every scripts/ci_rca/<name>.py maps to tests/test_ci_rca_<name>.py).
    fix_if: MAP_FAIL means the ci_rca branch is missing/incorrect in map_source_to_test; add the `parts[1]=="ci_rca"` len==3 branch returning tests/test_ci_rca_<stem>.py.
  - step: 8
    phase: pre-deploy
    hermetic: false
    action: Discovery-index + placement -- the new ci-rca-code route resolves and validate_placement stays green (no dead target, no duplicate topic).
    command: >-
      bin/venv-python -c "from scripts.checks.hygiene.validate_placement import validate_placement as v; f=[]; v(f); print('PLACEMENT_OK' if not f else 'PLACEMENT_FAIL: '+'; '.join(f))"
    expected: Prints PLACEMENT_OK (scripts/ci_rca/ is tracked and resolves; ci-rca-code topic is unique; all other targets still resolve).
    fix_if: PLACEMENT_FAIL names the issue -- a dead target means git add did not stage scripts/ci_rca/ before validate; a duplicate topic means ci-rca-code collides (rename the topic).
  - step: 9
    phase: pre-deploy
    hermetic: false
    action: Lambda non-regression -- confirm zero Lambda artifacts are affected by the moved/edited paths (V2, no deploy gate).
    command: >-
      bin/venv-python -c "from scripts.lambda_manifest import compute_affected_artifacts as c; r=c(['scripts/ci_rca/evidence.py','scripts/ci_rca/filing.py','scripts/ci_rca/taxonomy.py','scripts/ci_rca/tier_map.py','scripts/ci_rca/probe_health.py','scripts/ci_rca/back_validation.py','scripts/ci_rca/vacuous_pass.py','scripts/ci_rca/__init__.py','scripts/preflight/ci_rca_gauges.py','scripts/checks/ci_guards/validate_ci_rca_taxonomy.py','scripts/test_coverage_checker.py']); print('LAMBDA_NONE' if r=={} else 'LAMBDA_AFFECTED: '+str(r))"
    expected: Prints LAMBDA_NONE (no ci_rca module is Lambda-packaged; V2 confirmed, no build/deploy/smoke-test needed).
    fix_if: LAMBDA_AFFECTED would mean a manifest names a moved file -- update that manifest include and add the per-Lambda deploy steps; not expected (audit + this session both measured {}).
  - step: 10
    phase: pre-deploy
    hermetic: false
    action: Authoritative gate 1 -- FULL validate (not --pre). Runs import-linter, validate_placement, the coverage checker, plan-document + prompt-compliance, and the whole registered check sequence.
    command: bin/venv-python -m scripts.validate
    expected: Exits 0 -- all checks pass, including import-linter (no new cycle/contract violation from the nested package) and validate_placement.
    fix_if: A named check fails; forward-fix on-branch (Decision 55 -- never disable a check). If import-linter flags an unexpected contract, confirm no moved module was pulled into a layered contract (none should be).
  - step: 11
    phase: pre-deploy
    hermetic: false
    action: Authoritative gate 2 -- FULL pytest across the whole suite (catches any missed @patch target or import in cross-cutting tests such as test_session_preflight / test_validate).
    command: bin/venv-python -m pytest -q
    expected: The full suite passes (0 failures). If validate.py already ran pytest, this is the explicit confirmation the planning skill requires.
    fix_if: A failure names the test/module; if it is an unresolved patch target in a cross-cutting test, finish the anchored rewrite there; if a moved module's runtime path broke, re-check the ROOT fix (step 4).
constraints:
  - IMPLEMENTATION plan type; no recommendations bundled or filed (orchestrator constraint; STRATEGIC suspended per Decision 67).
  - >-
    Do NOT close rec-164 -- it owns the whole RS-01 territory and closes only at RS-01 phase 3. This
    phase moves ONE family (ci_rca) and leaves the other grandfathered families (session_*, sync_*,
    roadmap/plan_*, llm_*, ops_*) untouched.
  - >-
    No import shims, re-export stubs, or compatibility deferred-imports (audit Q6 answer -- the
    import-linter contracts exist precisely to prevent that pattern). The move is a hard cutover.
  - >-
    ANCHORED rewrite ONLY: target `scripts.ci_rca_<name>` and `scripts/ci_rca_<name>.py` for exactly
    the 7 names. DO NOT rewrite the broad "ci_rca" substring. Leave untouched: config/ci_rca_taxonomy.yaml
    (a config FILE, not a module -- references to it stay valid), scripts/ops_portal/ci_rca_{runtime,schema}.py
    and scripts/preflight/ci_rca_{gauges,signals}.py MODULE names (different packages), and the
    scripts/checks/ci_guards/validate_ci_rca_taxonomy.py check's own module name. Rewriting any of these
    breaks the build.
  - >-
    Sweep LIVE surfaces only. Append-only history is LEFT untouched: docs/plans/ historical plans,
    audits/ (incl. audits/legacy/ and audits/repository-structure-cb02572.yaml), logs/, and the EXECUTED
    docs/audit-prompts/AUDIT-ci-rca-system.md.
  - >-
    The 4 ROOT-anchoring modules (evidence, taxonomy, tier_map, vacuous_pass) MUST have
    Path(__file__).parent.parent changed to parent.parent.parent -- nesting one level deeper otherwise
    resolves ROOT to scripts/ and breaks _TAXONOMY_PATH, the validate.py path, .github/workflows, and cwd.
    This is a mandatory correctness edit, not optional.
  - >-
    Test files are NOT renamed. tests/test_ci_rca_<name>.py stay put; only their internal imports /
    @patch targets / string literals are rewritten. The coverage-map extension keeps them resolvable.
  - Gates are FULL validate (not --pre) AND FULL pytest, both green before the orchestrator pushes.
  - No emojis; ASCII hyphens only; ruff line length 127; async for I/O; type hints (AGENTS.md style).
  - "Public-repo content boundary (Decision 101): every touched file is engineering code/config/docs -- no account IDs, ARNs, ExternalIds, credentials, or trading alpha."
  - No rescue agents or workaround loops (Decision 55). Forward-fix on-branch only.
  - Never edit or commit on main; work on the harness claude/ branch only (AGENTS.md Git-ops).
