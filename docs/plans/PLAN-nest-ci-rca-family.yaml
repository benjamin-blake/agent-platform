  - file: scripts/test_coverage_checker.py
    action: Modify
    purpose: >-
      Extend map_source_to_test with a ci_rca branch so scripts/ci_rca/<name>.py resolves to the
      kept-in-place tests/test_ci_rca_<name>.py (otherwise the nested path maps to None and coverage
      enforcement silently lapses). Self-excluded from its own coverage gate (name starts with test_).
  - file: config/agent/verification_registry/registry.yaml
