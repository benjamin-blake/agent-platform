  - "The non-pytest error_signature fallback must cover terraform-apply-sandbox apply failures, whose source=ci_rca records also carry fingerprints (Decision 92)."
  - "New CiRcaContext fields are all Optional[...]=None -- do NOT raise the schema_version ceiling (backward-compatible additions). If a future change does raise it, fix the why_chain ceiling branch `400 if schema_version == 2 else 250` to `>= 2` so v3+ records do not silently regress to 250."
