  - "The fingerprint and every dedup/regression/inactivity/escape decision are computed IN CODE, never by the LLM RCA agent (Decision 55)."
  - "regression_of, fixed_by_sha, affected_nodeids, flaky, escape_class live in the ci-rca-lifecycle projection / context_v2_json -- NO new Class A columns on ops_recommendations (Decision 84/103); fix-state is not denormalized onto the rec row (Decision 63). The in-place fingerprint recompute is the only field written in place."
  - "PORTAL-WEDGE guard: removing reopen_ci_rca_rec + find_recent_ci_rca_rec_by_fingerprint from ci_rca_runtime.py REQUIRES repointing their call site in scripts/ops_data_portal.py (file_rec write-time backstop, lines ~284-315) and deleting the two dead imports (lines 70-71) in the SAME change, or file_rec/update_rec/sync ImportError-wedge."
  - "A closed-head match with NO fixed_by_sha (legacy/manual closures) FAILS CLOSED to a REGRESSION record -- never a silent drop (Decision 55); the git merge-base --is-ancestor check runs only when the head carries a fixed_by_sha."
