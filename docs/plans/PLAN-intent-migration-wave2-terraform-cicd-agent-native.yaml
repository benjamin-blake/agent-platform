schema_version: 1
slug: "intent-migration-wave2-terraform-cicd-agent-native"
intent: >-
  Advance platform tier T5.5 (INTENT-doc extract-and-retire, Decision 86) by retiring WAVE-2's second
  document docs/INTENT-terraform-cicd-agent-native.md. Its forward content is ALREADY fully extracted
  into the live roadmap (Section-8 waves -> tier_items T2.20-T2.25 + T2.35; the doc's CD.NN placeholder
  -> CD.35, ratified as Decision 92 / dec-092), so retirement is a clean delete-plus-pointer: repoint the
  one live inbound reference, remove the file, flip the manifest entry, and record the progress -- creating
  no new tier_item or candidate_decision. Keeps the roadmap the single machine-parseable source of forward
  intent as the corpus retires.
plan_type: IMPLEMENTATION
verification_tier: V1
plan_path: docs/plans/PLAN-intent-migration-wave2-terraform-cicd-agent-native.yaml
phase: >-
  Platform tier T5.5 (INTENT-* document extraction and retirement); WAVE-2 (tier_item_deliverable ->
  extract_to_roadmap) of docs/intent-migration/MANIFEST.yaml. Second WAVE-2 doc, following WAVE-1 complete
  (bazel-feasibility, ops-pipeline-consolidation, ducklake-consolidation) and WAVE-2 first doc
  (session-log-architecture) done -- 4 of 18 retired.
scope:
  - file: docs/INTENT-terraform-cicd-agent-native.md
    action: Delete
    purpose: >-
      Retire the agent-native-Terraform-CI/CD design prose. Its entire forward content is already extracted
      and ratified in canonical surfaces: Section-8 Waves 1-5 -> tier_items T2.20-T2.24 (all complete);
      Wave X (convention sync + guard narrowing) -> T2.25 (not_started, exists); Wave 6 (staleness sensor)
      -> T2.35; the doc's "CD.NN" placeholder -> CD.35, ratified as Decision 92 (dec-092, 2026-06-19). No
      content is stranded. Prose deleted per the tier_item_deliverable / extract_to_roadmap archetype;
      recoverable in git history.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Three edits, all pointer/bookkeeping (no tier_item or CD created). (a) Repoint the single live inbound
      reference in CD.35's detail block (~line 1700): "Authored by docs/INTENT-terraform-cicd-agent-native.md
      (architect + adversarial-risk zero-context review, converged over three rounds)" -- swap the
      deleted-doc path for a git-history / Decision-86 pointer while PRESERVING the provenance sentence
      (attribution + three-round-review provenance kept; only the dangling path replaced). (b) Remove the
      `- docs/INTENT-terraform-cicd-agent-native.md` line from tier_item T5.5 files_in_scope (~line 7818).
      (c) Append a T5.5 progress_note line (5 of 18 docs retired; WAVE-2 second doc). Do NOT touch T2.20-T2.25,
      T2.35, or the CD.35 design-choice body -- only the one attribution path token and the two T5.5
      bookkeeping edits.
  - file: docs/intent-migration/MANIFEST.yaml
    action: Modify
    purpose: >-
      Flip the terraform-cicd-agent-native documents[] entry disposition_state from pending to done. Change
      ONLY that one field; leave content_blocks / drift_findings / primary_targets / related_decisions
      intact as the disposition record. MANIFEST self-references (the documents[] entry + the WAVE-2 docs
      list at line 204) are c4-exempt and are NOT swept.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - docs/INTENT-terraform-cicd-agent-native.md no longer exists on disk.
  - >-
    No new tier_item and no new candidate_decision are created by this plan: the deliverable's forward
    content already has live carriers (T2.20-T2.24 complete, T2.25 not_started, T2.35 present; CD.35 ratified
    as dec-092). A no-stranded-intent check confirms every Section-8 wave has a live tier_item carrier and
    CD.35 carries state: ratified before the doc is deleted.
  - >-
    The CD.35 detail block in docs/ROADMAP-PLATFORM.yaml no longer contains the
    docs/INTENT-terraform-cicd-agent-native.md path, and the provenance sentence (architect +
    adversarial-risk zero-context review, converged over three rounds) is preserved with a git-history /
    Decision-86 pointer in place of the deleted path.
  - >-
    tier_item T5.5 files_in_scope no longer lists docs/INTENT-terraform-cicd-agent-native.md, and a T5.5
    progress_note line records 5 of 18 docs retired (WAVE-2 second doc).
  - >-
    The MANIFEST terraform-cicd-agent-native documents[] entry has disposition_state: done, and it is the
    only entry flipped to done in this plan; every other documents[] entry is unchanged.
  - >-
    The validate.py intent-doc-freeze guard (validate_intent_doc_freeze) produces no failure naming
    terraform-cicd-agent-native when run against the post-change tree.
  - >-
    A fresh repo-wide sweep for terraform-cicd-agent-native returns only historical / c4-exempt residual:
    docs/plans/* plan artefacts, docs/audit-reports/* point-in-time records, and
    docs/intent-migration/MANIFEST.yaml (c4-exempt self-references). No live canonical surface
    (ROADMAP-PLATFORM.yaml tier_items/CDs, DECISIONS.md, PROJECT_CONTEXT.md, AGENTS.md, docs/contracts/*,
    .claude/skills/*, scripts/, tests/, .github/) and no code/infra surface contains the doc path as a live
    pointer.
  - >-
    Full `bin/venv-python -m scripts.validate` exits 0 (credential-gated checks may report SKIPPED in
    degraded mode); the ROADMAP schema check passes and the MANIFEST schema check passes.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      No-stranded-intent gate -- confirm every Section-8 wave has a live tier_item carrier AND the doc's
      CD.NN placeholder is a ratified CD BEFORE deleting the prose (Decision 86: extract residual to live
      surfaces first). This is a delete_pointer-class disposition: nothing forward may be lost on delete.
    command: >-
      bin/venv-python -c "import yaml; d=yaml.safe_load(open('docs/ROADMAP-PLATFORM.yaml'));
      ids={i['id'] for i in d['tier_items']};
      assert {'T2.20','T2.21','T2.22','T2.23','T2.24','T2.25','T2.35'} <= ids, sorted(ids);
      cds=[c for c in d.get('candidate_decisions',[]) if c['id']=='CD.35']; assert cds, 'CD.35 missing';
      c=cds[0]; assert c.get('state')=='ratified' and c.get('ratified_as')=='dec-092', c;
      print('CARRIERS_OK')"
    expected: Prints CARRIERS_OK (all seven tier_items present; CD.35 ratified as dec-092).
    fix_if: >-
      If any wave tier_item is missing or CD.35 is not ratified, do NOT git rm -- forward intent would be
      stranded. Re-verify the wave->tier mapping (T2.20=Wave1 ... T2.25=WaveX, T2.35=Wave6) and CD.35's
      ratification before proceeding; this doc's extraction is a precondition, not part of this plan.
  - step: 2
    phase: pre-deploy
    action: Confirm the INTENT doc is deleted from the working tree.
    command: test ! -f docs/INTENT-terraform-cicd-agent-native.md && echo DELETED || echo PRESENT
    expected: Prints DELETED.
    fix_if: Prints PRESENT -- ensure `git rm docs/INTENT-terraform-cicd-agent-native.md` ran.
  - step: 3
    phase: pre-deploy
    action: Confirm the MANIFEST terraform-cicd-agent-native entry is flipped to disposition_state done.
    command: >-
      grep -A20 '^  - id: terraform-cicd-agent-native$' docs/intent-migration/MANIFEST.yaml | grep -m1
      'disposition_state:'
    expected: "Prints a line whose value is `    disposition_state: done`."
    fix_if: >-
      Prints pending (or nothing) -- flip ONLY the terraform-cicd-agent-native entry's disposition_state to
      done; do not touch other entries.
  - step: 4
    phase: pre-deploy
    action: >-
      Confirm the only-one-entry-flipped invariant: exactly the WAVE-1 (3) + session-log-architecture (1) +
      terraform-cicd-agent-native (1) = 5 documents[] entries are at disposition_state: done, the rest pending.
    command: >-
      bin/venv-python -c "import yaml; m=yaml.safe_load(open('docs/intent-migration/MANIFEST.yaml'));
      docs=m['documents']; done=[x['id'] for x in docs if x['disposition_state']=='done'];
      assert set(done)=={'bazel-feasibility','ducklake-consolidation','ops-pipeline-consolidation',
      'session-log-architecture','terraform-cicd-agent-native'}, sorted(done); print('DONE_SET_OK', len(done))"
    expected: Prints DONE_SET_OK 5.
    fix_if: >-
      Wrong set/count -- a second entry was flipped or terraform-cicd-agent-native was missed. Flip ONLY the
      terraform-cicd-agent-native entry; leave all others as they were.
  - step: 5
    phase: pre-deploy
    action: Run the real intent-doc-freeze guard; confirm no terraform-cicd-agent-native false-positive.
    command: >-
      bin/venv-python -c "import scripts.validate as v; f=[]; v.validate_intent_doc_freeze(f);
      print('PASS' if not any('terraform-cicd-agent-native' in x for x in f) else 'FAIL:'+str(f))"
    expected: Prints PASS.
    fix_if: >-
      Prints FAIL -- the guard flags terraform-cicd-agent-native. Ensure BOTH the file is deleted AND the
      manifest entry is done (the guard derives its allowed set from disposition_state != done, so the two
      must land together in one commit).
  - step: 6
    phase: pre-deploy
    action: >-
      Inbound-reference sweep (Decision-86 X-finding clause) -- confirm no LIVE canonical surface still
      dangles the deleted doc path. Records the sweep result explicitly rather than asserting singularity
      (decision-scout NOTE).
    command: >-
      grep -rln 'terraform-cicd-agent-native' . --include=*.md --include=*.yaml --include=*.yml
      --include=*.py --include=*.tf | grep -v '^\./docs/plans/' | grep -v '^\./docs/audit-reports/'
      | grep -v '^\./docs/intent-migration/MANIFEST.yaml' | sort; echo "residual_exit=$?"
    expected: >-
      No lines printed before residual_exit (all remaining hits are under docs/plans/, docs/audit-reports/,
      or the c4-exempt MANIFEST self-reference). A live canonical or code/infra surface appearing is a failure.
    fix_if: >-
      docs/ROADMAP-PLATFORM.yaml still appears -- the CD.35 attribution repoint (~line 1700) or the T5.5
      files_in_scope removal (~line 7818) was missed; repoint/remove it. Any OTHER canonical or code surface
      appears -- repoint it to a git-history / Decision-86 pointer (do not delete the host content). An
      UNEXPECTED new path -- investigate before editing; it may post-date this plan's inventory.
  - step: 7
    phase: pre-deploy
    action: >-
      Confirm the CD.35 provenance sentence survived the repoint (attribution + three-round-review provenance
      preserved; only the path token replaced).
    command: >-
      grep -n 'adversarial-risk' docs/ROADMAP-PLATFORM.yaml
    expected: >-
      At least the CD.35 provenance line still matches (the "architect + adversarial-risk zero-context
      review" provenance is preserved); the deleted-doc path is no longer on that line (verified by step 6).
    fix_if: >-
      No match -- the provenance sentence was dropped instead of repointed. Restore the attribution +
      three-round-review provenance, replacing only the docs/INTENT-terraform-cicd-agent-native.md path.
  - step: 8
    phase: pre-deploy
    action: Confirm the synthetic intent-doc-freeze guard unit tests still pass (flip-independent).
    command: bin/venv-python -m pytest tests/test_validate.py::TestIntentDocFreeze -q
    expected: All TestIntentDocFreeze tests pass.
    fix_if: >-
      A failure -- inspect it; the tests are synthetic and should be flip-independent. Do NOT edit the tests
      to mask a real regression (Decision 55).
  - step: 9
    phase: pre-deploy
    action: Run the authoritative presubmit (CI-equivalent gate).
    command: bin/venv-python -m scripts.validate
    expected: >-
      Exits 0; the "Intent doc freeze (Decision 86)" section reports no failures; the ROADMAP schema check
      passes and the MANIFEST schema check passes (credential-gated DQ checks may report SKIPPED in degraded
      mode).
    fix_if: >-
      Non-zero exit -- read the failing check. Likely causes: malformed YAML after the roadmap/manifest edit,
      or an intent-doc-freeze failure (file-deleted and manifest-done not both landed). Fix the cited check at
      source; do not add or remove checks to make it pass (Decision 55).
