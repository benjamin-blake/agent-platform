schema_version: 1
slug: "broker-credential-criteria-closeout"
intent: >-
  Reconcile T2.14's exit-criteria ledger with reality so the trading platform's broker
  credential-routing surface reports its true state: all four criteria substantively shipped
  (PLAN-broker-credential-routing + PLAN-broker-credential-codegen) but read stale open, which makes
  /orient emit false follow-on prompts. Flipping them to met via a verified VP pass clears the false
  signal and keeps the roadmap a trustworthy "what's left" source for downstream L3.exec broker work.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-broker-credential-criteria-closeout.yaml
phase: >-
  Platform tier_item T2.14 (Broker credential routing via AWS Secrets Manager + Class C
  credential-routing contract) -- follow-on / criteria-closeout slice. Closes the four open exit
  criteria as a verified ledger reconciliation. T2.14 stays in_progress: completion is gated on CD.25
  ratification (bootstrap_completion_exempt: false), out of scope for this follow-on.
scope:
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      The /implement bookkeeping walk flips T2.14 exit criteria c1-c4 status open->met (met_by -> the
      delivering plans: c1/c3 broker-credential-codegen, c2/c4 broker-credential-routing) on a verified
      VP pass, and refreshes T2.14's progress_note to record the reconciliation. Status stays
      in_progress (CD.25-gated). No other tier_item or field is touched.
bundled_recommendations: []
infrastructure_dependencies: []
closes_criteria:
  - "T2.14:c1"
  - "T2.14:c2"
  - "T2.14:c3"
  - "T2.14:c4"
acceptance_criteria:
  - >-
    c1 holds live: the Alpaca paper secret envelope is provisioned and resolvable by routing key --
    broker_secrets --broker alpaca --phase paper --fetch returns "fetch OK" via GetSecretValue under the
    PlatformDev runtime role; and the Alpaca live envelope is provisioned (GetSecretValue returns the
    "no value for staging label AWSCURRENT" envelope-exists form -- value intentionally absent until
    product live_small per Decision 37 -- not the "can't find the specified secret" missing form).
  - >-
    c2 holds: docs/contracts/credential-routing.yaml loads via scripts.contracts.load_contract as Class
    C, contract_version 1, status ratified.
  - >-
    c3 holds: the resolver routes by key and returns the NoBrokerCredentials sentinel for an unmapped
    phase without raising, AND scripts/validate.py validate_broker_env_reads flags a planted direct
    broker-API-key env read (tests/test_validate.py::TestBrokerEnvReadGuard passes).
  - >-
    c4 holds: docs/plans/PLAN-broker-credential-routing.yaml exists and the ratified contract records
    ratified_via the Step 10 multi-perspective critique (the converged critique is the ratification
    vehicle).
  - >-
    After the bookkeeping flip: T2.14 has zero open criteria; c1-c4 are status met with met_by naming
    the delivering plan-slugs (broker-credential-codegen / broker-credential-routing), each resolving to
    an existing docs/plans/PLAN-*.yaml (CD.39 met_by-resolves enforcement); and T2.14 status REMAINS
    in_progress (NOT complete -- CD.25 pending, bootstrap_completion_exempt: false).
  - >-
    docs/ROADMAP-PLATFORM.yaml still loads (scripts.platform_roadmap.load) and bin/venv-python -m
    scripts.validate --pre passes (CD.39 criteria enforcement, plan-document schema, roadmap validators,
    contract-drift) with docs/ROADMAP-PLATFORM.yaml the only roadmap change.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      Re-verify c1 (paper): the Alpaca paper secret envelope is provisioned and PlatformDev's
      ARN-scoped GetSecretValue grant resolves it by routing key.
    command: bin/venv-python -m scripts.broker_secrets --broker alpaca --phase paper --fetch
    expected: >-
      Prints "resolved OK: broker='alpaca' phase='paper'" then a "fetch OK: GetSecretValue returned N
      field(s)" line (N>=1 -- the count reflects the live placeholder payload, not the routing logic
      c1 tests); exits 0.
    fix_if: >-
      AccessDenied -> the BrokerCredentialsRead grant regressed (re-check the agent_platform_admin apply
      from PLAN-broker-credential-codegen). ResourceNotFoundException (missing secret) -> the paper
      envelope/value was removed. Either means c1 no longer holds -- do NOT flip c1; stop and RCA
      (Decision 55), the criterion is genuinely open again.
  - step: 2
    phase: pre-deploy
    action: >-
      Re-verify c1 (live envelope): the Alpaca live secret envelope is provisioned but intentionally
      value-less until product live_small (Decision 37). Under PlatformDev (no Describe grant), prove
      envelope existence via the GetSecretValue staging-label error-form.
    command: |-
      bin/venv-python - <<'PY'
      import sys, boto3, botocore
      c = boto3.Session(profile_name="agent_platform").client("secretsmanager", region_name="eu-west-2")
      try:
          c.get_secret_value(SecretId="agent-platform-broker-alpaca-live")
          print("OK c1-live: envelope provisioned, value present")
      except botocore.exceptions.ClientError as e:
          code = e.response["Error"]["Code"]; msg = e.response["Error"]["Message"]
          if code == "ResourceNotFoundException" and "staging label" in msg:
              print("OK c1-live: envelope provisioned, value intentionally absent (AWSCURRENT staging-label form)")
          else:
              print("FAIL c1-live:", code, msg); sys.exit(1)
      PY
    expected: >-
      Prints an "OK c1-live: envelope provisioned ..." line and exits 0 -- either the value is present
      or the error is the staging-label (envelope-exists, no-value) form.
    fix_if: >-
      "FAIL c1-live: ... can't find the specified secret" or AccessDenied -> the live envelope is missing
      or the grant regressed; c1 no longer holds. Do NOT flip c1; stop and RCA.
  - step: 3
    phase: pre-deploy
    action: Re-verify c2 -- the credential-routing contract loads as Class C, contract_version 1, status ratified.
    command: |-
      bin/venv-python - <<'PY'
      import pathlib
      from scripts.contracts import load_contract
      d = load_contract(pathlib.Path("docs/contracts/credential-routing.yaml"))
      assert d.contract.class_.value == "C", d.contract.class_
      assert d.contract.contract_version == 1, d.contract.contract_version
      assert d.contract.status.value == "ratified", d.contract.status
      print("OK c2: credential-routing Class C contract_version 1 ratified")
      PY
    expected: >-
      Prints "OK c2: credential-routing Class C contract_version 1 ratified"; exits 0.
    fix_if: >-
      AssertionError or ContractValidationError -> the contract regressed from ratified v1; c2 no longer
      holds. Do NOT flip c2.
  - step: 4
    phase: pre-deploy
    action: >-
      Re-verify c3 (resolver): routing-key resolution works and an unmapped product phase returns the
      NoBrokerCredentials sentinel without raising.
    command: bin/venv-python -m scripts.broker_secrets --broker alpaca --phase backtest_canonical
    expected: >-
      Prints the NoBrokerCredentials sentinel line for phase='backtest_canonical'; exits 0 (no
      exception, no secret resolved).
    fix_if: >-
      The CLI raises or resolves a secret for the unmapped phase -> the resolve-by-key / sentinel path
      regressed; c3 no longer holds.
  - step: 5
    phase: pre-deploy
    action: >-
      Re-verify c3 (guard): scripts/validate.py validate_broker_env_reads is live and flags a planted
      direct broker-API-key env read (positive, negative, self-exclusion).
    command: bin/venv-python -m pytest tests/test_validate.py::TestBrokerEnvReadGuard -v
    expected: >-
      All TestBrokerEnvReadGuard cases pass: a planted os.environ["ALPACA_API_KEY"] is flagged, the
      clean tree passes, and broker_secrets.py / validate.py are self-excluded. Exits 0.
    fix_if: A failure or zero tests collected -> the guard regressed or was removed; c3 no longer holds.
  - step: 6
    phase: pre-deploy
    action: >-
      Re-verify c4: the Phase 1 plan exists and the ratified contract records ratification via the Step
      10 multi-perspective critique (the converged critique is the ratification vehicle).
    command: 'test -f docs/plans/PLAN-broker-credential-routing.yaml && grep -q "Step 10 multi-perspective critique" docs/contracts/credential-routing.yaml && echo "OK c4: Step 10 critique converged (ratified_via)"'
    expected: >-
      Prints "OK c4: Step 10 critique converged (ratified_via)"; exits 0.
    fix_if: >-
      Non-zero exit -> the Phase 1 plan is missing or the contract no longer records the Step 10
      ratification vehicle; c4 provenance cannot be established. Do NOT flip c4.
  - step: 7
    phase: pre-deploy
    action: >-
      Validate the artifacts as they stand (pre-flip): the plan-document schema, the roadmap validators,
      and the CD.39 criteria-ledger enforcement (closes_criteria refs resolve; no bare-string criteria
      on the touched item) all pass.
    command: bin/venv-python -m scripts.plan_document docs/plans/PLAN-broker-credential-criteria-closeout.yaml && bin/venv-python -m scripts.validate --pre
    expected: >-
      plan_document prints PASS; validate --pre exits 0 (plan-document, platform-roadmap, contract-drift,
      and CD.39 criteria gates green). The closes_criteria refs T2.14:c1-c4 resolve.
    fix_if: >-
      A schema/validator failure -> fix per its message (e.g. a closes_criteria ref typo, a bare-string
      criterion) and re-run; remote CI is authoritative.
constraints:
  - >-
    T2.14 status MUST remain in_progress. When the /implement bookkeeping walk reports "all criteria on
    T2.14 are now met -- QUALIFIES for status: complete (manual confirmation required)", the correct
    response is to LEAVE it in_progress: T2.14 is bootstrap_completion_exempt: false and CD.25 is state:
    pending, so completion stays gated (CD.39 / Status-Trusted-Never-Inferred / T2.20). Do NOT stage
    status: complete or completed_at.
  - >-
    Criterion flips happen ONLY via the /implement bookkeeping walk on a verified VP pass for the
    declared closes_criteria (CD.39). Do NOT hand-edit criterion statuses to met before the VP passes,
    and never infer met from prose / file-existence / commit-activity (Status-Trusted-Never-Inferred).
  - >-
    met_by must name the DELIVERING plan-slug per criterion (c1/c3 -> broker-credential-codegen; c2/c4
    -> broker-credential-routing), each resolving to an existing docs/plans/PLAN-*.yaml (CD.39
    met_by-resolves enforcement). Do NOT default met_by to this closeout plan's slug.
  - >-
    Only docs/ROADMAP-PLATFORM.yaml is in scope. Touch only T2.14 (its four criteria + progress_note);
    do NOT re-touch T2.14 depends_on ([T2.1] per Decision 93), files_in_scope, intent, or any other
    tier_item.
  - >-
    This is a ledger reconciliation, not new feature work: no Terraform apply, no code edits to
    broker_secrets.py / validate.py / the contract, no Lambda deploy. The broker surface already
    shipped; this plan only verifies it live and reconciles the criterion statuses.
  - >-
    The exit-criteria ledger is git-authoritative (Decision 87 projection-until-T4.x); reconcile it by
    editing docs/ROADMAP-PLATFORM.yaml directly, NOT via the ops portal (Decision 84 warehouse-SoT does
    not govern this ledger yet).
  - No rescue agents or workaround loops (Decision 55); on an unrecoverable VP failure, stop and RCA.
  - No new standing prose-architecture docs under docs/ (Decision 86) -- the only edit is the existing roadmap YAML.
context:
  - >-
    Tier Item Freshness Gate (silent-completion): all four T2.14 exit criteria were re-adjudicated live
    at planning time and hold -- c1 (paper --fetch returns "fetch OK" via GetSecretValue under
    PlatformDev; live envelope returns the AWSCURRENT staging-label envelope-exists form), c2 (contract
    loads Class C v1 ratified), c3 (resolver routes + sentinel without raising + validate_broker_env_reads
    live at validate.py:873/2888), c4 (PLAN-broker-credential-routing recorded 3-round Step 10
    convergence; contract ratified_via the Step 10 critique). The stale open statuses are a bookkeeping
    lag: the work merged 2026-06-21/22, the structured exit-criteria ledger (CD.39) landed 2026-06-25, so
    no closes_criteria-bearing plan ever flipped them.
  - >-
    Provenance of the shipped work: PLAN-broker-credential-routing (Phase 1, REPORT-ONLY) ratified the
    Class C contract (c2) via the Step 10 multi-perspective critique (c4); PLAN-broker-credential-codegen
    (Phase 2, IMPLEMENTATION, V3) provisioned the two secret envelopes via agent_platform_admin apply (c1)
    and shipped scripts/broker_secrets.py + the validate_broker_env_reads guard (c3), with post-deploy
    VP7-9 PASS at the time.
  - >-
    CD.25 (state: pending, bootstrap_allowance: true) gates T2.14 COMPLETION. The bootstrap_allowance
    applies to the CD.25-scoped subset (T-1.11..T-1.19, T0.12.5/.6/.7) -- NOT to T2.14, which is
    bootstrap_completion_exempt: false. So no allowance lets T2.14 complete; the only correct posture is
    criteria = met + status in_progress. Ratifying CD.25 is a cross-wave governance action, out of scope
    for this T2.14 follow-on.
  - >-
    After this plan lands, T2.14 open_criteria_count -> 0, so needs_followon_plan
    (scripts/platform_roadmap.py) becomes False and /orient stops emitting the false T2.14 follow-on
    prompt that triggered this session.
  - >-
    Verification tier V3 (Decision 48): c1 re-verification performs a live AWS Secrets Manager
    GetSecretValue round-trip. All VP steps run under the agent_platform (PlatformDev) profile --
    agent_platform_admin is NOT available in-session, and PlatformDev intentionally has GetSecretValue
    only (no Describe/List) per the credential-routing contract, which is why c1's live check uses
    --fetch and the GetSecretValue error-form rather than describe-secret.
  - >-
    Decision-scout verdict NO_FLAGS. CITE: CD.39 (exit-criteria-ledger candidate decision -- the governing
    open->met flip mechanism + its validate.py enforcement: met_by resolves, no bare-string criteria on a
    touched item, closes_criteria refs resolve), CD.25 (gating candidate, state: pending -- non-exempt
    gate), Decision 59 (remaining work = open-criteria set), Decision 87 (ledger git-authoritative until
    T4.x), Decision 77 (paper/live are product phases / account types, not platform environments),
    Decision 37 (out-of-band secret values; live value absent until live_small), Decision 80 (validate.py
    single source of truth), Decision 93 (T2.14 depends_on [T2.1] -- do not re-touch the edge), Decision 48
    (V3 tier), Decision 86 (no new prose docs -- compliant), Decision 84 (warehouse-SoT NOT triggered --
    ledger is git-authoritative). Cite CD.25 / CD.39 as candidate decisions, not "Decision N".
  - >-
    Aligned open recs NOT bundled (kept this plan a pure reconciliation): rec-2326 (unreachable
    else-str(entry) branch in broker_secrets.py) and rec-2327 (validate_broker_env_reads hardcodes the
    ALPACA_ prefix). Neither blocks a criterion -- Alpaca is the only broker in the routing_table today,
    so the guard covers all current broker keys; rec-2327 is forward-hardening for additional brokers.
    They warrant a separate code-quality plan.
  - >-
    Branch claude/keen-fermi-c6vtgs was 0 commits behind origin/main at planning time (preflight
    main_freshness ok); docs/ROADMAP-PLATFORM.yaml had no overlapping main change since branch.
    ci_rca_unresolved_recs empty -- no CI-RCA block.
pre_implementation_checklist:
  - Branch confirmed not on main (claude/keen-fermi-c6vtgs)
  - docs/PROJECT_CONTEXT.md read
  - CD.39, CD.25, and the cited Decisions (59/87/77/37/80/93/48/86/84) understood via the decision-scout gate
  - T2.14 exit_criteria c1-c4 located in docs/ROADMAP-PLATFORM.yaml and confirmed structured (not bare strings)
  - The delivering plans (PLAN-broker-credential-routing.yaml, PLAN-broker-credential-codegen.yaml) exist for met_by
  - AWS static-key chain verified (aws sts get-caller-identity --profile agent_platform); agent_platform_admin NOT required (all VP steps run under PlatformDev)
  - Acceptance criteria understood and verifiable
execution_steps:
  - >-
    No code / Terraform / contract changes -- this plan's substance is the ledger reconciliation
    performed by the bookkeeping walk. Begin by running the Verification Plan.
  - >-
    Execute the Verification Plan steps 1-7 under the agent_platform (PlatformDev) profile; loop until
    all pass. A genuine criterion failure (e.g. a missing secret, a regressed guard) means that criterion
    is actually open again -- stop and RCA (Decision 55), do NOT flip it.
  - >-
    On the verified VP pass, the /implement bookkeeping walk flips T2.14 c1-c4 status open->met, setting
    met_by per criterion to the delivering plan-slug (c1/c3 -> broker-credential-codegen; c2/c4 ->
    broker-credential-routing). In the same staged docs/ROADMAP-PLATFORM.yaml edit, refresh T2.14's
    progress_note to record: all four criteria reconciled-met (verified live this session), citing the
    delivering plans; item remains in_progress pending CD.25 ratification.
  - >-
    When the bookkeeping walk surfaces "all criteria on T2.14 are met -- QUALIFIES for status: complete
    (manual confirmation required)", respond by LEAVING T2.14 in_progress. Do NOT stage status: complete
    or completed_at -- CD.25 is state: pending and T2.14 is bootstrap_completion_exempt: false.
  - >-
    Post-bookkeeping confirmation -- run: bin/venv-python -c "from scripts.platform_roadmap import load;
    t={i.id:i for i in load('docs/ROADMAP-PLATFORM.yaml').tier_items}['T2.14']; assert [c.id for c in
    t.exit_criteria if c.status=='open']==[], 'open remain'; assert all(c.status=='met' and c.met_by for c
    in t.exit_criteria), 'met/met_by'; assert t.status=='in_progress', t.status; print('OK reconciled: 4
    met, met_by set, in_progress')" -- expect the OK line. If status is complete, revert it to in_progress
    (CD.25 pending).
  - >-
    Run bin/venv-python -m scripts.validate --pre after the flip; confirm CD.39 enforcement (met_by
    resolves to the delivering plans, no bare-string criteria) and the roadmap validators pass.
  - 'Report: criteria re-verification results (c1-c4), the bookkeeping flip + met_by values, confirmation that T2.14 remains in_progress (CD.25-gated), and the validate --pre result.'
work_areas: []
rollback: >-
  The only change is the T2.14 criterion-status flips + progress_note refresh in
  docs/ROADMAP-PLATFORM.yaml. Rollback = revert that single staged edit (git checkout --
  docs/ROADMAP-PLATFORM.yaml before commit, or revert the bookkeeping commit after). No runtime, infra,
  or contract state is touched, so rollback is side-effect-free; the criteria simply return to open.
