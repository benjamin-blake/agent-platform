rollback: >-
  Changes are additive. To roll back before the code-deploy channel is exercised: revert the workflow,
  contract, doc, and code commits; the new terraform resources (functions + roles) are removed via an
  agent_platform_admin -target destroy of prod_lambdas.tf's resources and the github_ci_prod_deploy
  role. Because the functions carry ignore_changes=[source_code_hash], a code-only rollback is a
