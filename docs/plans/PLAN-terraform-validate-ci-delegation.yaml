    marker) as a distinct tuple. In _terraform_init_with_retry, on a non-transient failure, check the
    proxy-blocked signature FIRST: if matched, print a visible skip (mirroring the invoke_step/skip
    format, referencing the terraform-validate CI job) and return False WITHOUT appending to `failed`;
    otherwise keep the existing failed.append + return False. Do NOT add the 403 to
    _TRANSIENT_INIT_SIGNATURES. Update the adjacent docstring/comment to document the three outcomes
    (success / proxy-skip / genuine-fail) and the transient-retry path.
  - >-
    tests/test_validate.py -- add tests named with a `proxy` selector for the skip branch (proxy-403
