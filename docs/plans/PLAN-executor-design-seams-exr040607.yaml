execution_steps:
  - "EXR-04a (T4.1 pick_rec shape): In T4.1's intent state-machine-shape list, replace the pick_rec line ('poll priority queue, return rec_id + branch_slug') with an admission-predicate form: 'poll priority queue; ADMISSION PREDICATE gates the return -- admit a rec only when its T3.8 relevance verdict == relevant (CD.36 / Decision 103), automatable == true, and risk is within the current T4.4 autonomy-gate ceiling (Decision 92 ratchet), AND its targets do NOT match Decision 117 boundary_patterns (config/agent/executor/capabilities.yaml); a refused pick emits a typed telemetry event and a boundary_patterns hit re-routes the rec to the human path (Decision 55), never auto-executed; returns rec_id + branch_slug'."
  - "EXR-04b (T4.1 exit criterion): Append a T4.1 exit criterion (bare string, existing style): 'pick_rec admission predicate enforced (not merely poll priority queue): a rec is admitted for autonomous execution only when its T3.8 relevance verdict == relevant (CD.36 / Decision 103), automatable == true, and its risk is within the current T4.4 autonomy-gate ceiling (Decision 92 ratchet), AND none of its targets match the Decision 117 boundary_patterns SSOT (config/agent/executor/capabilities.yaml); a refused pick emits a typed telemetry event, and a boundary_patterns hit re-routes the rec to the human path (Decision 55) -- never auto-executed'."
  - "Optional Q5 (h) (T4.1 exit criterion): Append 'file_pr / merge GitHub-side credential scoping is specified in the T4.1 / T4.9(a) atomic plans (the IAM criteria above cover the AWS leg only): which credential (PAT or GitHub App) files and merges PRs, its scopes, storage, rotation, and why no persona environment other than file_pr / merge holds it (Decision 92 least-privilege OIDC precedent)'."
  - "Optional Q5 (i) (T4.1 exit criterion): Append 'A single named operator kill-switch is documented (disable the EventBridge trigger AND set state-machine concurrency to 0) with its authority, and is covered by a test proving an in-flight execution stops cleanly (Decision 55) and no new execution starts'."
  - "EXR-04/07 (T4.1 progress_note): Append a dated entry -- '2026-07-07 (PLAN-executor-design-seams-exr040607, EXR-04/EXR-07, Decision 93): bound pick_rec's admission predicate (T3.8 relevance / automatable / T4.4 risk ceiling / Decision 117 boundary_patterns; refused-pick typed telemetry + boundary-hit human re-route); completed the deploy_dispatch state to dispatch-to-CD.35-and-wait with the rec-2523 red-record-deadlock precondition and dropped terraform apply from the ESCAPE example; added file_pr/merge credential-scoping and operator kill-switch exit criteria (Q5 h/i).'"
  - "EXR-07a (T4.1 ESCAPE line): Replace the ESCAPE state-shape line's parenthetical 'for deterministic steps that exceed 15 min (full pytest, terraform apply)' with 'for deterministic steps that exceed 15 min (e.g. full pytest, large data migration); terraform apply is NOT an in-executor escape-hatch task -- see deploy_dispatch (dispatched to the CD.35 / Decision 92 GitHub-Actions gated-apply pipeline, per CD.38)'."
  - "EXR-07b (T4.1 deploy_dispatch line): Replace 'dispatch the deploy job and wait for completion (dispatch-and-wait only, no apply-authority -- EXR-07 out of scope)' with 'dispatch merged-change application to the CD.35 / Decision 92 GitHub-Actions gated-apply pipeline and wait on its server-side convergence-record verdict, exactly as the verify leg waits on a CI verdict (CD.38 sole-runner authority; the executor holds NO apply authority and never runs terraform apply in-cloud). PRECONDITION for running this leg unattended: rec-2523 guard-BLOCK red-convergence-record deadlock (a red record clearable by neither automated path, requiring an out-of-band admin apply) must have a designed exception path -- fixing that deadlock stays with rec-2523, out of scope here'."
  - "EXR-06a (T3.4 criterion): Replace T3.4's exit criterion 'Autonomy maturity gates A0-A3 documented and live' with 'Autonomy maturity gates A0-A3 documented and live, WITH a per-gate rollback criterion for each (A-gate ownership boundary, EXR-06): T3.4 owns gate DEFINITION semantics for A0-A3 including rollback-from-birth, satisfying T4.4 MED-9 forward-only-autonomy-is-unsafe rationale at first-live (Decision 92 points 6-9); T4.4 extends the ladder to A4-A5 and owns rollback AUTOMATION + preflight/roadmap gate exposure -- see T4.4'."
  - "EXR-06b (T3.4 progress_note): Add a progress_note (T3.4 currently has none) -- '2026-07-07 (PLAN-executor-design-seams-exr040607, EXR-06, Decision 93): stated the A-gate ownership boundary -- T3.4 owns A0-A3 gate definitions WITH rollback-from-birth (MED-9 at first-live); rollback AUTOMATION + A4-A5 extension owned by T4.4 (cross-referenced, not duplicated).'"
