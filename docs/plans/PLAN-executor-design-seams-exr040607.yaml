schema_version: 1
slug: "executor-design-seams-exr040607"
intent: >-
  Tighten three under-specified executor-design seams per audit findings EXR-04/EXR-06/EXR-07 in
  audits/executor-roadmap-review-7d57a0d.yaml: bind pick_rec's admission predicate to relevance /
  automatable / risk-ceiling / self-modification boundary (EXR-04); state the A-gate ownership
  boundary across T3.4 and T4.4 with rollback-from-birth for A0-A3 (EXR-06); and reconcile the
  deploy-leg seam -- drop terraform apply from CD.27's in-executor escape-hatch examples, name the
  dispatch-to-CD.35-and-wait deploy leg, and cross-reference rec-2523's red-record deadlock (EXR-07).
  Roadmap-bookkeeping only.
plan_type: IMPLEMENTATION
verification_tier: V1
plan_path: docs/plans/PLAN-executor-design-seams-exr040607.yaml
phase: >-
  Platform Tier T4 (autonomous executor) forward-design tightening under the Decision 93 MVP
  boundary and the Decision 67 / CD.17 freeze. Touches tier_items T4.1, T3.4, T4.4 and
  candidate_decisions CD.27, CD.38. Body-only prose edits -- no new items, no status changes.
scope:
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      EXR-04: add a pick_rec admission-predicate line to T4.1's state-machine shape + a matching
      T4.1 exit criterion. EXR-06: amend T3.4's A0-A3 criterion to require per-gate rollback and
      state the A-gate ownership boundary; add the reciprocal boundary statement to T4.4. EXR-07:
      drop terraform apply from CD.27's escape-hatch examples (detail + narrowly_supersedes clause)
      and T4.1's ESCAPE line, complete T4.1's deploy_dispatch state (dispatch-to-CD.35-and-wait +
      rec-2523 precondition), and add a CD.38 deploy-leg discipline point. Optional Q5 h/i: add
      T4.1 exit criteria for file_pr/merge credential scoping and a tested operator kill-switch.
      Sole file changed.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - "EXR-04: T4.1's exit_criteria include a pick_rec admission predicate naming T3.8 relevance (relevant), automatable, risk-vs-T4.4-gate-ceiling, and Decision 117 boundary_patterns; the pick_rec state-machine-shape line states the same predicate (no longer merely 'poll priority queue'); refused picks emit a typed telemetry event and boundary hits re-route to the human path. validate.py roadmap checks pass."
  - "EXR-06: T3.4 and T4.4 each state the A-gate ownership boundary; T3.4's A0-A3 criterion requires a per-gate rollback criterion (rollback-from-birth, satisfying T4.4's MED-9 rationale at first-live); T4.4 states it extends to A4-A5 and owns rollback AUTOMATION + preflight gate exposure; no overlapping unqualified ownership remains and the two items cross-reference rather than duplicate."
  - "EXR-07: grep 'terraform apply' over CD.27 (detail + narrowly_supersedes) and T4.1 no longer names it as an in-executor ECS escape-hatch task (every remaining mention frames it as dispatched to the CD.35 / Decision 92 pipeline, NOT an in-executor task); a deploy-dispatch sentence in T4.1's deploy_dispatch state states merged-change application is dispatched to the CD.35 pipeline and waited on like verification; CD.38 gains a matching deploy-leg discipline point; rec-2523's guard-BLOCK red-record deadlock is cross-referenced as a named precondition for the unattended deploy leg (referenced only, not fixed)."
  - "Optional (Q5 h/i): T4.1 carries an exit criterion requiring the T4.1/T4.9(a) atomic plans to specify GitHub-side file_pr/merge credential scoping, and an exit criterion naming a single tested operator kill-switch (disable EventBridge trigger + concurrency=0) with documented authority."
  - "The platform_roadmap.py model_validator (no-live-dep invariant + cycle + dep resolution) and validate_platform_roadmap criteria-integrity + size guard pass; no new depends_on edge is introduced (all cross-references are prose); each edited tier_item's progress_note (T4.1/T3.4/T4.4) cites the driving EXR id + Decision 93, and CD.27/CD.38 carry dated EXR-07 amendment markers."
verification_plan:
  - step: 1
    phase: pre-deploy
    action: "Pydantic model_validator passes on load (no-live-dep check f, cycle detection, depends_on resolution) after the edits -- confirms no depends_on edge was accidentally introduced by the prose cross-references."
    command: "bin/venv-python -c \"from scripts.platform_roadmap import load; load('docs/ROADMAP-PLATFORM.yaml'); print('LOAD_OK')\""
    expected: "Prints LOAD_OK with no ValueError; depends_on graph unchanged from origin/main (this plan edits only intent/exit_criteria/discipline_points/progress_note prose)."
    fix_if: "A ValueError names a live->deferred edge or dangling dep -- a cross-reference was mistakenly written into a depends_on list instead of prose; move it back into intent/criterion text."
  - step: 2
    phase: pre-deploy
    action: "validate_platform_roadmap criteria-integrity + size guard passes (checks i/ii/iii + Decision 114 line ceiling); this exercises the full-tier checks --pre does not."
    command: "bin/venv-python -c \"from scripts.checks.roadmap.validate_platform_roadmap import validate_platform_roadmap as v; f=[]; v(f); print('FAILS:', f); assert not f, f\""
    expected: "Prints FAILS: [] and exits 0. Body-only edits leave every `- id:` line unchanged, so check (ii) flags no item; bare-string criteria added to T4.1/T3.4 (their existing style) are permitted for non-diff-touched id lines."
    fix_if: "check (ii) reports an item 'still has bare-string criteria' (git line-attribution flagged an adjacent id) -- convert that item's exit_criteria to structured ExitCriterion objects ({id, text, status: open}) and re-run. If size guard fails, the diff overran the ceiling (not expected; ~40 lines added)."
  - step: 3
    phase: pre-deploy
    action: "The named fast-tier gate passes on the changed roadmap."
    command: "bin/venv-python -m scripts.validate --pre"
    expected: "Exit 0; roadmap guard tests pass; no schema / plan-document failures (this PLAN file included)."
    fix_if: "Read the failing check name and correct the roadmap edit or this PLAN's schema; never suppress the check (Decision 55)."
  - step: 4
    phase: pre-deploy
    action: "EXR-04 satisfied: T4.1 carries a pick_rec admission-predicate exit criterion naming relevance + automatable + risk/gate ceiling + Decision 117 boundary_patterns, AND the pick_rec state-machine-shape line names the predicate."
    command: |
      bin/venv-python - <<'PY'
      import sys, yaml
      d = yaml.safe_load(open('docs/ROADMAP-PLATFORM.yaml'))
      t41 = [i for i in d['tier_items'] if i['id'] == 'T4.1'][0]
      crit = ' '.join((c if isinstance(c, str) else c.get('text', '')) for c in t41.get('exit_criteria', [])).lower()
      shape = t41.get('intent', '').lower()
      fails = []
      need = ['relevan', 'automatable', 'boundary_patterns', '117', 'ceiling']
      for n in need:
          if n not in crit:
              fails.append(f'T4.1 exit_criteria missing "{n}"')
      if 'pick_rec' not in shape or 'admission' not in shape:
          fails.append('pick_rec shape line does not state an admission predicate')
      if 'typed telemetry' not in crit and 'typed telemetry' not in shape:
          fails.append('refused-pick typed telemetry event not stated')
      if 'human path' not in crit and 'human path' not in shape:
          fails.append('boundary-hit human-path re-route not stated')
      for f in fails: print('BAD', f)
      print('OK' if not fails else f'FAILS={len(fails)}')
      sys.exit(1 if fails else 0)
      PY
    expected: "Prints OK and exits 0."
    fix_if: "A 'BAD ...' line names the missing clause -- add it to T4.1's admission-predicate criterion or the pick_rec shape line."
  - step: 5
    phase: pre-deploy
    action: "EXR-06 satisfied: T3.4's A0-A3 criterion requires rollback criteria, and both T3.4 and T4.4 state the A-gate ownership boundary."
    command: |
      bin/venv-python - <<'PY'
      import sys, yaml
      d = yaml.safe_load(open('docs/ROADMAP-PLATFORM.yaml'))
      items = {i['id']: i for i in d['tier_items']}
      def blob(it):
          parts = [it.get('intent', '') or '', it.get('progress_note', '') or '', it.get('note', '') or '']
          for c in it.get('exit_criteria', []):
              parts.append(c if isinstance(c, str) else (c.get('text', '') or ''))
          return ' '.join(parts).lower()
      t34, t44 = blob(items['T3.4']), blob(items['T4.4'])
      fails = []
      t34_crit = ' '.join((c if isinstance(c, str) else c.get('text', '')) for c in items['T3.4'].get('exit_criteria', [])).lower()
      if 'a0-a3' not in t34_crit or 'rollback' not in t34_crit:
          fails.append('T3.4 A0-A3 criterion does not require rollback criteria')
      for tid, b in (('T3.4', t34), ('T4.4', t44)):
          if 'ownership boundary' not in b and 'a-gate ownership' not in b:
              fails.append(f'{tid} does not state the A-gate ownership boundary')
      if 'a4-a5' not in t44 or 'automation' not in t44:
          fails.append('T4.4 does not state it extends to A4-A5 + owns rollback automation')
      for f in fails: print('BAD', f)
      print('OK' if not fails else f'FAILS={len(fails)}')
      sys.exit(1 if fails else 0)
      PY
    expected: "Prints OK and exits 0 -- T3.4 requires A0-A3 rollback criteria, both items state the boundary, T4.4 owns A4-A5 + rollback automation."
    fix_if: "A 'BAD ...' line names the gap -- add the rollback requirement to T3.4's criterion or the boundary statement to the named item's intent."
  - step: 6
    phase: pre-deploy
    action: "EXR-07 satisfied: no remaining 'terraform apply' mention on CD.27/T4.1 frames it as an in-executor ECS task; the deploy_dispatch state names dispatch-to-CD.35-and-wait; rec-2523 is cross-referenced; CD.38 has the deploy-leg discipline point."
    command: |
      bin/venv-python - <<'PY'
      import sys, yaml
      d = yaml.safe_load(open('docs/ROADMAP-PLATFORM.yaml'))
      items = {i['id']: i for i in d['tier_items']}
      cds = {c['id']: c for c in d.get('candidate_decisions', [])}
      t41 = items['T4.1']
      cd27 = cds['CD.27']
      cd38 = cds['CD.38']
      fails = []
      # (a) T4.1 ESCAPE line no longer lists terraform apply as an in-executor example
      shape = t41.get('intent', '')
      import re
      escape_line = next((ln for ln in shape.splitlines() if 'ESCAPE' in ln), '')
      if 'terraform apply' in escape_line and 'NOT an in-executor' not in escape_line:
          fails.append('T4.1 ESCAPE line still lists terraform apply as an in-executor example')
      # (b) deploy_dispatch names dispatch-to-CD.35 + wait
      dd = next((ln for ln in shape.splitlines() if 'deploy_dispatch' in ln), '').lower()
      if 'cd.35' not in dd or 'wait' not in dd:
          fails.append('deploy_dispatch does not state dispatch-to-CD.35-and-wait')
      if 'rec-2523' not in dd:
          fails.append('deploy_dispatch does not cross-reference rec-2523')
      # (c) CD.27 detail: any terraform apply mention is framed as NOT-in-executor
      detail = cd27.get('detail', '')
      clause = (cd27.get('narrowly_supersedes', {}) or {}).get('clause', '')
      disc = ' '.join(str(p) for p in (cd27.get('discipline_points') or []))
      cd27_all = detail + ' ' + clause + ' ' + disc
      # the old in-executor example ('terraform apply against the personal account') must be GONE
      if 'terraform apply against the personal account' in detail.lower():
          fails.append('CD.27 detail still lists terraform apply in the escape-hatch example parenthetical')
      if 'NOT an in-executor' not in cd27_all and 'not an in-executor' not in cd27_all.lower():
          fails.append('CD.27 does not state terraform apply is NOT an in-executor task')
      if 'EXR-07' not in cd27_all:
          fails.append('CD.27 carries no EXR-07 amendment marker')
      # (d) CD.38 deploy-leg discipline point
      cd38_disc = ' '.join(str(p) for p in (cd38.get('discipline_points') or []))
      if 'deploy leg' not in cd38_disc.lower() or 'cd.35' not in cd38_disc.lower():
          fails.append('CD.38 has no deploy-leg discipline point naming CD.35')
      if 'rec-2523' not in cd38_disc:
          fails.append('CD.38 deploy-leg point does not cross-reference rec-2523')
      for f in fails: print('BAD', f)
      print('OK' if not fails else f'FAILS={len(fails)}')
      sys.exit(1 if fails else 0)
      PY
    expected: "Prints OK and exits 0."
    fix_if: "A 'BAD ...' line names the gap -- reword the CD.27 escape-hatch example, the T4.1 ESCAPE/deploy_dispatch lines, or the CD.38 discipline point as required."
  - step: 7
    phase: pre-deploy
    action: "Optional Q5 h/i satisfied: T4.1 carries a file_pr/merge credential-scoping criterion and a tested operator kill-switch criterion; and progress_note / amendment-marker provenance holds (EXR ids + Decision 93 on T4.1/T3.4/T4.4)."
    command: |
      bin/venv-python - <<'PY'
      import sys, yaml
      d = yaml.safe_load(open('docs/ROADMAP-PLATFORM.yaml'))
      items = {i['id']: i for i in d['tier_items']}
      t41 = items['T4.1']
      crit = ' '.join((c if isinstance(c, str) else c.get('text', '')) for c in t41.get('exit_criteria', [])).lower()
      fails = []
      if 'credential' not in crit or 'file_pr' not in crit:
          fails.append('T4.1 missing file_pr/merge credential-scoping criterion (Q5 h)')
      if 'kill-switch' not in crit and 'kill switch' not in crit:
          fails.append('T4.1 missing operator kill-switch criterion (Q5 i)')
      for tid, exr in (('T4.1', 'EXR-04'), ('T3.4', 'EXR-06'), ('T4.4', 'EXR-06')):
          pn = (items[tid].get('progress_note', '') or '')
          if 'EXR-0' not in pn or 'Decision 93' not in pn:
              fails.append(f'{tid} progress_note missing EXR id or Decision 93 citation')
      for f in fails: print('BAD', f)
      print('OK' if not fails else f'FAILS={len(fails)}')
      sys.exit(1 if fails else 0)
      PY
    expected: "Prints OK and exits 0 -- both optional criteria present; T4.1/T3.4/T4.4 progress_notes cite an EXR id + Decision 93."
    fix_if: "A 'BAD ...' line names the gap -- add the missing T4.1 criterion or the EXR-id/Decision-93 citation to the named progress_note."
