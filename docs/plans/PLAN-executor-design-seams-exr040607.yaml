  - "Body-only prose edits: do NOT change any item's status, effort, strategic flag, or depends_on list, and do NOT add or remove tier_items. All cross-references (T3.4<->T4.4, ESCAPE->deploy_dispatch, CD.27/T4.1->CD.35/Decision 92) are PROSE, never depends_on edges -- the no-live-dep graph must be identical to origin/main."
  - "EXR-07 amends only the executor-side / candidate CD.27 + T4.1 escape-hatch wording and adds a CD.38 discipline point; it does NOT edit ratified Decision 92 / CD.35 text and does NOT attempt to fix rec-2523's deadlock -- that stays owned by rec-2523 (reference only)."
  - "Editing pending candidate_decisions CD.27 and CD.38 (state: pending / not yet a numbered DECISIONS.md entry) is permitted; do not touch ratified CD.35 (dec-092) discipline text."
  - "Preserve every existing T4.1 / T3.4 / T4.4 exit criterion verbatim except the EXR-06 amendment to T3.4's 'A0-A3 documented and live' criterion (which is edited, not replaced wholesale) and the EXR-04/EXR-07/optional additions (which are appended)."
