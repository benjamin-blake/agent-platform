schema_version: 1
slug: "close-audit-ulf-02"
intent: >-
  Close keystone audit finding ULF-02 (candidate-decision ratification) by building on the
  ALREADY-SHIPPED Decision 105 ratification lane rather than rebuilding it: rescope tier item
  T-1.1 onto the ops-portal vehicle, add a standing machine surface for realized-but-pending
  CDs, run the first realized-but-pending ratification batch under interactive human sign-off
  (CD.1, CD.2, CD.13, CD.20, CD.21, CD.26), then flip T-1.20 complete and discharge the
  now-expired bootstrap-completion-exemption flags. This turns the silent realized-but-pending CD
  backlog into a governed, machine-surfaced, human-signed lane -- hardening the governance
  substrate the self-improving trading platform runs on.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-close-audit-ulf-02.yaml
phase: >-
  Platform governance -- tier T-1 (candidate-decision ratification lane; audit finding ULF-02,
  audits/unclosed-loops-44ef5c6.yaml, severity high, keystone). Closing ULF-02 unwedges T-1.20
  completion (gated by CD.1 + CD.13, both in this batch) and discharges the
  CD.1/CD.2/CD.13/CD.20/CD.21/CD.26 exemption slices. Builds on Decision 105 (the lane, shipped
  2026-07-02 via PR #378); does NOT re-plan it.
scope:
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      The governance edits. (a) RESCOPE T-1.1 (line ~1831): depends_on [T0.7b, T-1.5] -> [T-1.5]
      (Decisions 91/105 made file_decision the shipped vehicle -- drop the T0.7b dep; T-1.5 is
      complete so no complete-depends-on-not_started inversion); rename from "File adoption decisions
      via log-decision Lambda (CD.1-CD.19)" to reflect the ops-portal lane + CD.1-CD.39 coverage;
      set related_candidate_decisions to [CD.1] (the keystone this item's completion turns on --
      CD.1-CD.39 coverage is expressed in name/intent/exit_criteria, NOT by stuffing 39 pending CDs
      into the related list, which would dangle a completed lane item on ~30 pending CDs); rewrite
      the exit_criteria from the one-time "all CDs ratified" ceremony to a CAPABILITY definition
      (lane exists per Decision 105 + realized-but-pending machine-surfaced + CD.1 ratified +
      document.status draft->ratified + first batch demonstrates the lane), authored as
      fully-structured ExitCriterion objects (id: c1.., text, status: met, met_by:
      close-audit-ulf-02) -- NOT bare strings (validate_platform_roadmap rule (ii): a diff-touched
      item must carry structured criteria; rule (i): met_by must resolve to a real plan, which
      PLAN-close-audit-ulf-02.yaml does once merged to main). status not_started -> complete. (b)
      RATIFY the 6 batch CDs to the canonical shape (state: ratified + ratified_as: dec-NNN +
      filed_via: ops_decisions:dec-NNN) + populate realization_evidence -- CD.1->108, CD.2->109,
      CD.13->110, CD.20->111, CD.21->112, CD.26->113 at plan time; re-derive the base from the
      DECISIONS.md max at implement time if main advanced. (c) document.status draft -> ratified and
      document.filed_via pending_log_decision_lambda -> ops_decisions:dec-108 (CD.1's Decision) once
      CD.1 lands. (d) T-1.20 (line ~2432) status in_progress -> complete (sequenced AFTER both CD.1
      AND CD.13 flip to ratified -- its completion gate is {CD.1 via [T-1], CD.13 via
      related_candidate_decisions}; both are in this batch, so post-batch its completion gate is
      EMPTY). (e) STRIP bootstrap_completion_exempt: true from EXACTLY the 16 discharged items (T-1.0,
      T-1.1, T-1.2, T-1.3, T-1.4, T-1.5, T-1.6, T0.2, T0.5, T0.11, T0.14, T2.3, T2.10, T2.12, T2.13,
      T2.16b) -- the items whose gating CDs are now ALL ratified; KEEP the flag on every other exempt
      item (still gated by pending CD.25/CD.10/CD.12/CD.4/etc). (f) UPDATE the document-level
      agent_instructions scope prose (lines ~85-119): mark scope (a) [CD.1-scoped] discharged for its
      CD.1/CD.13-gated members at CD.1+CD.13 ratification (T0.6/T0.7a-c/T0.8/T0.12/T0.13 stay exempt
      -- still gated by pending CD.10/CD.12); mark the CD.2/CD.20/CD.21/CD.26 slices of scope (c)
      expired; note T2.3/T2.16b were already discharged by CD.6(dec-106)/CD.34(dec-107); scope (b)
      [CD.25-scoped] stays OPEN (CD.25 is not in this batch).
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Author 6 new `## Decision NNN:` entries (108-113) ratifying CD.1/CD.2/CD.13/CD.20/CD.21/CD.26,
      mirroring the Decision 106 (CD.6 ratification) template: Status/Date/Warehouse-ID header, a
      **Decision:** block naming the realization evidence + the necessary-not-sufficient gate
      implication, a **Reversal conditions:** block, and a **Related:** block. DECISIONS.md is the
      numbering authority (Decision 84 I-2); the `## Decision NNN:` header MUST exist before/with the
      roadmap CD flip so R1 of the ratification guard resolves. CD.13 and CD.20 entries are scoped
      necessary-not-sufficient (core commitment realized; broader work ongoing). Draft text is prepared
      per CD and filed only after the human signs it (Decision 105 execution-time confirmation gate).
  - file: scripts/platform_roadmap.py
    action: Modify
    purpose: >-
      Add a computed detector realized_but_pending_cds() on PlatformRoadmapState (near
      ratifiable_cds(), line ~780): returns pending CDs whose detail carries a '[Realized' prose
      marker but which are NOT already surfaced by ratifiable_cds() (i.e. no structured
      realization_evidence). Kept DISTINCT from ratifiable_cds() (Decision 55: the prose marker is a
      lower-confidence "needs corroboration/ratification-review" signal, not a deliberate
      ready-to-ratify corroboration). Wire it into to_preflight_dict() (line ~812) AND the
      compute_state_dict error-dict (empty list) as a new "realized_but_pending_cds" key. Output shape
      mirrors ratifiable_cds: {id, title, gates} plus a short realized_hint (first ~80 chars around the
      '[Realized' marker). Pure additive; no change to ratifiable_cds() semantics.
  - file: scripts/session_preflight.py
    action: Modify
    purpose: >-
      Add "realized_but_pending_cds" to the full (/orient) projection in _slim_roadmap_state(full=True)
      (line ~2105) using .get() default [] so the product roadmap (no candidate_decisions) is
      unaffected -- exactly mirroring the ratifiable_cds line. The slim (/plan) projection is
      untouched (keeps the planning payload lean).
  - file: docs/contracts/candidate-decision-ratification.yaml
    action: Modify
    purpose: >-
      Amend the surfacing_signal section to document the SECOND, lower-confidence signal: a pending
      CD carrying a '[Realized' prose annotation in detail (computed by
      PlatformRoadmapState.realized_but_pending_cds(), surfaced in to_preflight_dict
      ['realized_but_pending_cds']) is flagged for corroboration/ratification-review, DISTINCT from
      the deliberate realization_evidence-keyed ratifiable_cds() ready-to-ratify signal. Record that
      ratification promotes the prose marker into structured realization_evidence. Bump last_updated;
      add Decision-105 amendment note. (This file has no top-level contract: key, so
      validate_contract_drift skips it -- per its own line 19-20.)
  - file: .claude/skills/orient/SKILL.md
    action: Modify
    purpose: >-
      Add a "Realized-but-pending CDs" subsection (near the "Ratifiable CDs" block, line ~87) and an
      Inputs-table row (near line 32): read platform_roadmap.realized_but_pending_cds from the
      preflight cache -- pending CDs with a '[Realized' prose marker but no realization_evidence, a
      lower-confidence corroboration-review signal. /orient ranks them as candidates for a
      human-confirmed /plan ratification session (never ratifies -- read-only, Decision 55). Preserve
      the existing "do NOT surface a pending CD with no realization_evidence in the RATIFIABLE list"
      rule -- the new list is explicitly the "prose-only, needs corroboration" tier that sits below it.
  - file: .claude/commands/orient.md
    action: Modify
    purpose: >-
      Add "realized_but_pending_cds" to the enumerated full-projection preflight keys the command
      lists (line ~25), so the command-contract text and the report keys agree (no
      promised-but-absent / present-but-undocumented key).
  - file: tests/test_platform_roadmap.py
    action: Modify
    purpose: >-
      (a) Add TestRealizedButPendingCds covering the new detector with synthetic _doc/_cd fixtures:
      a pending CD with '[Realized' in detail and no realization_evidence -> surfaced; a pending CD
      with realization_evidence (already ratifiable) -> NOT in the new list (belongs to ratifiable_cds);
      a pending CD with neither -> not surfaced; a ratified/superseded CD with '[Realized' -> not
      surfaced; the to_preflight_dict carries the "realized_but_pending_cds" key. 100% coverage of the
      new lines. (b) Update test_live_platform_yaml_bootstrap_exemption_set's expected set (lines
      ~499-549) to REMOVE the 16 stripped items (T-1.0, T-1.1, T-1.2, T-1.3, T-1.4, T-1.5, T-1.6,
      T0.2, T0.5, T0.11, T0.14, T2.3, T2.10, T2.12, T2.13, T2.16b -> 43 becomes 27) so it matches the
      post-strip live YAML verbatim.
  - file: tests/test_session_preflight_platform_roadmap.py
    action: Modify
    purpose: >-
      (a) Re-point test_t120_surfaces_cd1_as_completion_gate (lines ~210-218): T-1.20 is now complete
      (absent from in_progress) and both its gates (CD.1, CD.13) are ratified, so the old assertion is
      dead. Replace it with an assertion that a STILL-in_progress item still-gated by a pending CD
      surfaces completion_blocked_on_cd (T1.12 is in_progress and gated by pending CD.25/CD.10/CD.11) --
      preserving the test's intent (completion_blocked_on_cd surfaces a real pending gate) against live
      post-ratification state. (b) Add an assertion that the full projection carries the new
      "realized_but_pending_cds" key (structural; list type).
bundled_recommendations: []
infrastructure_dependencies:
  - >-
    LIVE warehouse write (Decision 84 Single Portal Invariant): the ratification ETL step runs
    `bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md`, which parses DECISIONS.md
    and upserts every entry (incl. the 6 new ones) into ops_decisions via the ducklake_writer closed
    boundary. Requires the agent_platform (PlatformDev) static-key assume-role chain (verified live
    this session: session_preflight creds=ok, "pulled 1259 rows from the warehouse"). The write is a
    caller-keyed idempotent upsert (re-running the backfill refreshes the same dec-NNN, never
    duplicates). There is NO offline outbox (Decision 84 I-4) -- if the chain is down the write FAILS
    LOUDLY; re-run after `aws sts get-caller-identity --profile agent_platform` confirms the chain.
  - >-
    Lambda Deployment Assessment (conscious deferral, documented -- Decision 79 / CD.24): docs/
    ROADMAP-PLATFORM.yaml is a declared assets[] entry (line 44) of the active src/lambdas/data-pipeline
    manifest, so compute_affected_artifacts() flags data-pipeline. NO per-Lambda build/deploy/smoke-test
    is warranted here because: (i) the roadmap is a runtime ASSET, not handler code or a schema -- no
    import contract changes (scripts/platform_roadmap.py and session_preflight.py are NOT in the
    manifest includes[]); (ii) validate_lambda_deploy_gating is ADVISORY (it prints the affected
    artifact, only reds on an import error -- confirmed at scripts/checks/lambda_pkg/
    validate_lambda_deploy_gating.py); (iii) the only consumers that read the bundled roadmap (scheduled
    doc-freshness / rec-curator agents) are operationally DISABLED per the AGENTS.md runbook, so
    redeploy happens on re-enable, not here; (iv) direct precedent: #378 (the Decision-105 PR -- flipped
    CD.6/CD.34 in this same asset), #387, #389 all edited docs/ROADMAP-PLATFORM.yaml with no
    data-pipeline deploy. No Terraform / IAM changes are in scope.
  - >-
    Interactive human sign-off (NOT a fully autonomous /implement run): ratification is a governance
    act the human signs. Per CD, /implement drafts the Decision text and PAUSES for explicit human
    confirmation before authoring the DECISIONS.md entry + ETL + roadmap flip (Decision 105 lane;
    the user's "I ratify interactively"). The non-ratification changes (detector, T-1.1 rescope,
    contract/orient/test edits) are ordinary code and land without per-item sign-off.
acceptance_criteria:
  - >-
    T-1.1 depends_on no longer includes T0.7b (== [T-1.5]); its name/intent/exit_criteria express the
    ops-portal lane + CD.1-CD.39 coverage + capability-based completion (not the one-time "all CDs
    ratified" ceremony); exit_criteria are structured ExitCriterion objects with status: met + met_by:
    close-audit-ulf-02; related_candidate_decisions == [CD.1]; status == complete.
  - >-
    PlatformRoadmapState.realized_but_pending_cds() exists and, on a synthetic roadmap, surfaces a
    pending CD with a '[Realized' detail marker and no realization_evidence while excluding
    ratified/superseded CDs and pending CDs that already carry realization_evidence (those belong to
    ratifiable_cds); to_preflight_dict and the /orient full projection both carry a
    "realized_but_pending_cds" key; the module is 100% covered.
  - >-
    After the batch, docs/ROADMAP-PLATFORM.yaml has CD.1/CD.2/CD.13/CD.20/CD.21/CD.26 with state:
    ratified + ratified_as: dec-NNN + filed_via: ops_decisions:dec-NNN (matching NNN, 108-113 or the
    re-derived base) + a realization_evidence note; document.status == ratified and document.filed_via ==
    ops_decisions:dec-108; and each dec-NNN resolves to a `## Decision NNN:` header in DECISIONS.md.
  - >-
    docs/DECISIONS.md contains 6 new `## Decision 108-113:` entries (ratifying CD.1/CD.2/CD.13/CD.20/
    CD.21/CD.26 respectively) in the Decision 106 template shape; CD.13's entry scopes its assertion to
    the realized exemplar (roadmap is the agent-first structured-data exemplar; gated T-1.2..T-1.5 all
    complete) with the broader doc-migration ongoing under T5.5, and CD.20's entry scopes to the realized
    public-flip + curated-portal COMMITMENT with portal completion (T2.11a/T2.11b) ongoing -- neither
    claims its broader vision is finished (necessary, not sufficient).
  - >-
    ops_decisions contains dec-108..dec-113 after `ops_data_portal --backfill-decisions-md` (the live
    warehouse ETL succeeded; a re-run is a no-op upsert).
  - >-
    T-1.20 status == complete AND its post-batch completion gate is EMPTY -- i.e. recomputing
    completion_blocked_on_cd for T-1.20 (were it still in_progress) yields [] because BOTH its gating CDs
    (CD.1 via the [T-1] tier shortcut, CD.13 via related_candidate_decisions) are now ratified. (Not
    merely "no longer CD.1-blocked" -- the residual CD.13 gate is the failure mode this criterion guards.)
  - >-
    bootstrap_completion_exempt is stripped from EXACTLY the 16 discharged items (T-1.0, T-1.1, T-1.2,
    T-1.3, T-1.4, T-1.5, T-1.6, T0.2, T0.5, T0.11, T0.14, T2.3, T2.10, T2.12, T2.13, T2.16b) and retained
    on every other exempt item (43 -> 27); test_live_platform_yaml_bootstrap_exemption_set passes with
    its expected set updated to match.
  - >-
    The document-level agent_instructions scope prose marks scope (a)'s CD.1/CD.13-gated members
    discharged and the CD.2/CD.20/CD.21/CD.26 slices of scope (c) expired; scope (b) [CD.25] and the
    CD.10/CD.12-gated scope-(a) items (T0.6/T0.7a-c/T0.8/T0.12/T0.13) are explicitly retained as open.
  - >-
    `bin/venv-python -m scripts.validate` passes -- including validate_candidate_decision_ratification
    (R1: the 6 newly-ratified CDs resolve to headers; R2: all still-pending CDs carry no ratified_as
    and no dec-pointer filed_via), validate_platform_roadmap (criteria integrity), and
    validate_test_coverage.
  - >-
    Re-running `bin/venv-python -m scripts.session_preflight` after the flips shows T-1.20 absent from
    in_progress (complete) and realized_but_pending_cds reflecting the post-batch state.
verification_plan:
  - step: 1
    phase: pre-merge
    action: The new detector is unit-covered with synthetic fixtures (surfaces prose-'[Realized' pending CDs; excludes ratified/superseded and realization_evidence-carrying CDs).
    command: grep -q "class TestRealizedButPendingCds" tests/test_platform_roadmap.py && bin/venv-python -m pytest tests/test_platform_roadmap.py::TestRealizedButPendingCds -q
    expected: All cases pass -- prose-'[Realized' + pending + no realization_evidence -> surfaced; ratified/superseded -> excluded; realization_evidence present -> excluded (belongs to ratifiable_cds).
    fix_if: A case fails, or the detector surfaces a ratified CD / a realization_evidence-carrying CD (it must stay DISTINCT from ratifiable_cds and only flag prose-only pending CDs).
  - step: 2
    phase: pre-merge
    action: to_preflight_dict and the /orient full projection both carry the new key; the slim projection does not.
    command: bin/venv-python -c "from pathlib import Path; from scripts.platform_roadmap import compute_state_dict; from scripts.session_preflight import _slim_roadmap_state as s; st=compute_state_dict(Path('docs/ROADMAP-PLATFORM.yaml')); assert 'realized_but_pending_cds' in st; assert 'realized_but_pending_cds' in s(st, full=True); assert 'realized_but_pending_cds' not in s(st, full=False); print('surface ok')"
    expected: Prints "surface ok".
    fix_if: The key is missing from to_preflight_dict (add it in platform_roadmap.py) or from the full projection (add it to _slim_roadmap_state full branch in session_preflight.py), or it leaked into the slim projection.
  - step: 3
    phase: pre-merge
    action: T-1.1 is rescoped -- T0.7b dropped, related list is [CD.1], status complete, criteria structured+met.
    command: bin/venv-python -c "from pathlib import Path; from scripts.platform_roadmap import load; t=next(i for i in load(Path('docs/ROADMAP-PLATFORM.yaml')).tier_items if i.id=='T-1.1'); assert 'T0.7b' not in t.depends_on, t.depends_on; assert t.related_candidate_decisions==['CD.1'], t.related_candidate_decisions; assert t.status=='complete', t.status; assert all(c.status=='met' and c.met_by=='close-audit-ulf-02' for c in t.exit_criteria), [(c.id,c.status,c.met_by) for c in t.exit_criteria]; print('T-1.1 rescoped ok')"
    expected: Prints "T-1.1 rescoped ok".
    fix_if: T0.7b still in depends_on; related_candidate_decisions is not [CD.1]; status is not complete; or a criterion is not met/met_by close-audit-ulf-02 (or is a bare string).
  - step: 4
    phase: pre-merge
    action: The 6 batch CDs carry the canonical ratified shape, document meta flipped, and the guard's R1/R2 hold on the whole roadmap.
    command: bin/venv-python -c "from pathlib import Path; from scripts.platform_roadmap import load; d=load(Path('docs/ROADMAP-PLATFORM.yaml')); m={c.id:c for c in d.candidate_decisions}; assert all(m[i].state=='ratified' and m[i].ratified_as and m[i].filed_via=='ops_decisions:'+str(m[i].ratified_as) for i in ['CD.1','CD.2','CD.13','CD.20','CD.21','CD.26']); assert d.document.status=='ratified' and d.document.filed_via.startswith('ops_decisions:dec-'); print('shapes ok')"
    expected: Prints "shapes ok" -- all 6 CDs ratified with matching ratified_as/filed_via; document.status ratified; document.filed_via is an ops_decisions:dec-NNN pointer.
    fix_if: A CD is missing a field or ratified_as != the dec inside filed_via; or document meta was not flipped.
  - step: 5
    phase: pre-merge
    action: Each newly-ratified dec-NNN resolves to a real `## Decision NNN:` header (R1 referential integrity), authored BEFORE/with the CD flip.
    command: bin/venv-python -c "import re; from pathlib import Path; from scripts.platform_roadmap import load; hdr={int(n) for n in re.findall(r'^## Decision (\d+):', open('docs/DECISIONS.md').read(), re.M)}; d=load(Path('docs/ROADMAP-PLATFORM.yaml')); m={c.id:c for c in d.candidate_decisions}; assert all(int(str(m[i].ratified_as).split('-')[1]) in hdr for i in ['CD.1','CD.2','CD.13','CD.20','CD.21','CD.26']); print('headers resolve')"
    expected: Prints "headers resolve" -- all 6 dec-NNN have `## Decision NNN:` headers.
    fix_if: A CD points at a dec-NNN with no header (author the DECISIONS.md entry first) -- this is exactly the R1 failure the guard would red on.
  - step: 6
    phase: pre-merge
    action: T-1.20 is complete with an EMPTY residual completion gate, and the flag-strip set is exactly the 16 discharged items.
    command: bin/venv-python -c "from pathlib import Path; from scripts.platform_roadmap import load, PlatformRoadmapState, _pending_gating_cds_for_item; d=load(Path('docs/ROADMAP-PLATFORM.yaml')); m={i.id:i for i in d.tier_items}; assert m['T-1.20'].status=='complete'; pend={cd.id:cd for cd in d.candidate_decisions if cd.state=='pending'}; idx={}; [idx.setdefault(r,[]).append(cd.id) for cd in pend.values() for r in cd.gates]; assert _pending_gating_cds_for_item(m['T-1.20'], pend, idx)=={}, _pending_gating_cds_for_item(m['T-1.20'], pend, idx); strip={'T-1.0','T-1.1','T-1.2','T-1.3','T-1.4','T-1.5','T-1.6','T0.2','T0.5','T0.11','T0.14','T2.3','T2.10','T2.12','T2.13','T2.16b'}; assert all(not m[x].bootstrap_completion_exempt for x in strip), [x for x in strip if m[x].bootstrap_completion_exempt]; assert m['T-1.12'].bootstrap_completion_exempt and m['T0.7b'].bootstrap_completion_exempt, 'kept-flags regressed'; print('t120 empty gate + flags ok')"
    expected: Prints "t120 empty gate + flags ok" -- T-1.20 complete with an empty pending completion gate; the 16 stripped; still-gated exempt items (T-1.12 via CD.25, T0.7b via CD.10) retain their flag.
    fix_if: T-1.20 not complete or its completion gate is non-empty (a gating CD -- e.g. CD.13 -- was not ratified); a discharged item still exempt; or a still-gated item lost its flag.
  - step: 7
    phase: pre-merge
    action: Full validate is green end-to-end -- the ratification guard, the criteria-integrity check, the exemption-set test, coverage, and everything else.
    command: bin/venv-python -m scripts.validate
    expected: Exit 0. The "Candidate decision ratification guard (Decision 105)" section prints PASS; validate_platform_roadmap PASS; validate_test_coverage passes (platform_roadmap.py 100% covered); test_live_platform_yaml_bootstrap_exemption_set passes with the updated expected set.
    fix_if: 'Ratification guard reds -> a header is missing (step 5) or a pending CD carries a dec-pointer (R2). Criteria integrity reds -> T-1.1 met_by does not resolve or a touched item has bare-string criteria. Coverage reds -> the new detector lines are uncovered. Exemption-set test reds -> its expected set was not updated to drop the 16.'
  - step: 8
    phase: pre-merge
    action: The re-pointed live-roadmap preflight test passes (T-1.20 no longer asserted as CD.1-blocked; a real pending gate is still surfaced elsewhere; the new key is present).
    command: bin/venv-python -m pytest tests/test_session_preflight_platform_roadmap.py -q
    expected: Green -- the re-pointed test asserts an in_progress item (T1.12) surfaces its pending gate (CD.25) in completion_blocked_on_cd, and the new realized_but_pending_cds key is present in the full projection.
    fix_if: The old test still asserts T-1.20/CD.1 (dead post-ratification) -- re-point it to T1.12/CD.25.
  - step: 9
    phase: post-merge (live warehouse write)
    action: >-
      ETL the 6 new Decisions into ops_decisions and confirm the gate cleared. This is the live
      warehouse leg (Decision 84) -- run it after the DECISIONS.md entries are authored and the human
      has signed each CD.
    command: bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md && bin/venv-python -m scripts.session_preflight
    expected: >-
      The backfill prints a JSON result with failed==0; preflight re-runs clean, T-1.20 is complete
      (absent from in_progress), and ratifiable_cds/realized_but_pending_cds reflect the post-batch state.
    fix_if: >-
      The backfill raises (static-key chain down -> verify `aws sts get-caller-identity --profile
      agent_platform`, re-run; NO offline outbox per Decision 84 I-4). A dec-NNN failed validation ->
      fix the DECISIONS.md entry and re-run (idempotent upsert).
constraints:
  - >-
    Decision 105 (the ratification lane -- BUILD ON, do not rebuild): the canonical ratified shape is
    state: ratified + ratified_as: dec-NNN + filed_via: ops_decisions:dec-NNN (same 3-digit NNN in
    both). Ratifying clears the COMPLETION gate on items a CD gates (gate derivation keys purely on
    cd.state=='pending') -- necessary, NOT sufficient: open CODE exit criteria on those items remain,
    and tier-status flips are a separate step. Do NOT reimplement ratifiable_cds(), the contract, or
    the R1/R2/R3 guard -- they exist.
  - >-
