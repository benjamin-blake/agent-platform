rollback: >-
  The code/doc edits are revertible by branch revert (detector + session_preflight key + contract +
  orient + tests + the roadmap T-1.1/CD/flag/prose edits + the 5 DECISIONS.md entries). The ONLY
  non-git side effect is the ops_decisions warehouse write: dec-108..112 are SCD2 append rows. To
  unwind, `ops_data_portal --update-decision dec-NNN --status superseded` (or re-run backfill after
  reverting DECISIONS.md, which upserts the current state) -- there is no hard delete, matching the
  append-only lakehouse invariant. No Terraform / IAM / Lambda state to unwind (deploy was deferred).
  Governance note: ratification is a human-signed act; rollback of a ratified Decision is itself a
  governance decision, not a mechanical revert.
