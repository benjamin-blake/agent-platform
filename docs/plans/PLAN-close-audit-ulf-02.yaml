schema_version: 1
slug: "close-audit-ulf-02"
intent: >-
  Close keystone audit finding ULF-02 (candidate-decision ratification) by building on the
  ALREADY-SHIPPED Decision 105 ratification lane rather than rebuilding it: rescope tier item
  T-1.1 onto the ops-portal vehicle, add a standing machine surface for realized-but-pending
  CDs, run the first realized-but-pending ratification batch under interactive human sign-off
  (CD.1, CD.2, CD.20, CD.21, CD.26), then flip T-1.20 complete and discharge the now-expired
  bootstrap-completion-exemption flags. This turns the silent realized-but-pending CD backlog
  into a governed, machine-surfaced, human-signed lane -- hardening the governance substrate the
  self-improving trading platform runs on.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-close-audit-ulf-02.yaml
phase: >-
  Platform governance -- tier T-1 (candidate-decision ratification lane; audit finding ULF-02,
  audits/unclosed-loops-44ef5c6.yaml, severity high, keystone). Closing ULF-02 unwedges T-1.20
  completion and discharges the CD.1/CD.2/CD.20/CD.21/CD.26 exemption slices. Builds on Decision
  105 (the lane, shipped 2026-07-02 via PR #378); does NOT re-plan it.
scope:
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      The governance edits. (a) RESCOPE T-1.1 (line ~1831): depends_on [T0.7b, T-1.5] -> [T-1.5]
      (Decisions 91/105 made file_decision the shipped vehicle -- drop the T0.7b dep; T-1.5 is
      complete so no complete-depends-on-not_started inversion); rename from "File adoption decisions
      via log-decision Lambda (CD.1-CD.19)" to reflect the ops-portal lane + CD.1-CD.39 coverage;
      set related_candidate_decisions to [CD.1] (the keystone this item's completion turns on --
      the CD.1-CD.39 coverage is expressed in name/intent/exit_criteria, NOT by stuffing 39 pending
      CDs into the related list, which would dangle a completed lane item on ~30 pending CDs);
      rewrite the exit_criteria from the one-time "all CDs ratified" ceremony to a CAPABILITY
      definition (lane exists per Decision 105 + realized-but-pending machine-surfaced + CD.1
      ratified + document.status draft->ratified + first batch demonstrates the lane). Author the
      rewritten exit_criteria as fully-structured ExitCriterion objects (id: c1.., text, status: met,
      met_by: close-audit-ulf-02) -- NOT bare strings (validate_platform_roadmap rule (ii): a
      diff-touched item must carry structured criteria; rule (i): met_by must resolve to a real plan,
      which PLAN-close-audit-ulf-02.yaml does once merged to main). status not_started -> complete. (b) RATIFY the 5 batch CDs to the canonical shape (state: ratified +
      ratified_as: dec-NNN + filed_via: ops_decisions:dec-NNN) + populate realization_evidence
      (CD.1->108, CD.2->109, CD.20->110, CD.21->111, CD.26->112 at plan time; re-derive the base
      from the DECISIONS.md max at implement time if main advanced). (c) document.status draft ->
      ratified and document.filed_via pending_log_decision_lambda -> ops_decisions:dec-108 (CD.1's
      Decision) once CD.1 lands. (d) T-1.20 (line ~2432) status in_progress -> complete (sequenced
      AFTER CD.1 flips to ratified -- the completion gate derives from cd.state=='pending'). (e)
      STRIP bootstrap_completion_exempt: true from EXACTLY the 12 discharged items (T-1.0, T-1.1,
      T-1.6, T0.2, T0.5, T0.11, T0.14, T2.3, T2.10, T2.12, T2.13, T2.16b) -- the items whose gating
      CDs are now ALL ratified; KEEP the flag on every other exempt item (still gated by pending
      CD.13/CD.25/CD.10/CD.4/etc). (f) UPDATE the document-level agent_instructions scope prose
      (lines ~85-119): mark scope (a) [CD.1-scoped] expired at CD.1 ratification, mark the
      CD.2/CD.20/CD.21/CD.26 slices of scope (c) expired, note T2.3/T2.16b were already discharged
      by CD.6(dec-106)/CD.34(dec-107); scope (b) [CD.25-scoped] stays OPEN (CD.25 is not in this batch).
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Author 5 new `## Decision NNN:` entries (108-112) ratifying CD.1/CD.2/CD.20/CD.21/CD.26,
      mirroring the Decision 106 (CD.6 ratification) template: Status/Date/Warehouse-ID header, a
      **Decision:** block naming the realization evidence + the necessary-not-sufficient gate
      implication, a **Reversal conditions:** block, and a **Related:** block. DECISIONS.md is the
      numbering authority (Decision 84 I-2); the `## Decision NNN:` header MUST exist before/with
      the roadmap CD flip so R1 of the ratification guard resolves. Draft text is prepared per CD
      and filed only after the human signs it (Decision 105 execution-time confirmation gate).
  - file: scripts/platform_roadmap.py
    action: Modify
    purpose: >-
      Add a computed detector realized_but_pending_cds() on PlatformRoadmapState (near
      ratifiable_cds(), line ~780): returns pending CDs whose detail carries a '[Realized' prose
      marker but which are NOT already surfaced by ratifiable_cds() (i.e. no structured
      realization_evidence). Kept DISTINCT from ratifiable_cds() (Decision 55: the prose marker is a
      lower-confidence "needs corroboration/ratification-review" signal, not a deliberate
      ready-to-ratify corroboration). Wire it into to_preflight_dict() (line ~812) as a new
      "realized_but_pending_cds" key. Output shape mirrors ratifiable_cds: {id, title, gates} plus a
      short realized_hint (first ~80 chars around the '[Realized' marker). Pure additive; no change
      to ratifiable_cds() semantics.
  - file: scripts/session_preflight.py
    action: Modify
    purpose: >-
      Add "realized_but_pending_cds" to the full (/orient) projection in _slim_roadmap_state(full=True)
      (line ~2105) using .get() default [] so the product roadmap (no candidate_decisions) is
      unaffected -- exactly mirroring the ratifiable_cds line. The slim (/plan) projection is
      untouched (keeps the planning payload lean).
  - file: docs/contracts/candidate-decision-ratification.yaml
    action: Modify
    purpose: >-
      Amend the surfacing_signal section to document the SECOND, lower-confidence signal: a pending
      CD carrying a '[Realized' prose annotation in detail (computed by
      PlatformRoadmapState.realized_but_pending_cds(), surfaced in to_preflight_dict
      ['realized_but_pending_cds']) is flagged for corroboration/ratification-review, DISTINCT from
      the deliberate realization_evidence-keyed ratifiable_cds() ready-to-ratify signal. Record that
      ratification promotes the prose marker into structured realization_evidence. Bump last_updated;
      add Decision-105 amendment note. (This file has no top-level contract: key, so
      validate_contract_drift skips it -- per its own line 19-20.)
  - file: .claude/skills/orient/SKILL.md
    action: Modify
    purpose: >-
      Add a "Realized-but-pending CDs" subsection (near the "Ratifiable CDs" block, line ~87) and an
      Inputs-table row (near line 32): read platform_roadmap.realized_but_pending_cds from the
      preflight cache -- pending CDs with a '[Realized' prose marker but no realization_evidence, a
      lower-confidence corroboration-review signal. /orient ranks them as candidates for a
      human-confirmed /plan ratification session (never ratifies -- read-only, Decision 55). Preserve
      the existing "do NOT surface a pending CD with no realization_evidence in the RATIFIABLE list"
      rule -- the new list is explicitly the "prose-only, needs corroboration" tier that sits below it.
  - file: .claude/commands/orient.md
    action: Modify
    purpose: >-
      Add "realized_but_pending_cds" to the enumerated full-projection preflight keys the command
      lists (line ~25), so the command-contract text and the report keys agree (no
      promised-but-absent / present-but-undocumented key).
  - file: tests/test_platform_roadmap.py
    action: Modify
    purpose: >-
      (a) Add TestRealizedButPendingCds covering the new detector with synthetic _doc/_cd fixtures:
      a pending CD with '[Realized' in detail and no realization_evidence -> surfaced; a pending CD
      with realization_evidence (already ratifiable) -> NOT in the new list (belongs to ratifiable_cds);
      a pending CD with neither -> not surfaced; a ratified/superseded CD with '[Realized' -> not
      surfaced; the to_preflight_dict carries the "realized_but_pending_cds" key. 100% coverage of
      the new lines. (b) Update test_live_platform_yaml_bootstrap_exemption_set's expected set to
      REMOVE the 12 stripped items (T-1.0, T-1.1, T-1.6, T0.2, T0.5, T0.11, T0.14, T2.3, T2.10,
      T2.12, T2.13, T2.16b) so it matches the post-strip live YAML verbatim.
  - file: tests/test_session_preflight_platform_roadmap.py
    action: Modify
    purpose: >-
      (a) Re-point test_t120_surfaces_cd1_as_completion_gate: T-1.20 is now complete (absent from
      in_progress) and CD.1 is ratified, so the old assertion is dead. Replace it with an assertion
      that a STILL-in_progress item still-gated by a pending CD surfaces completion_blocked_on_cd
      (T1.12 is in_progress and gated by pending CD.25/CD.10/CD.11) -- preserving the test's intent
      (completion_blocked_on_cd surfaces a real pending gate) against live post-ratification state.
      (b) Add an assertion that the full projection carries the new "realized_but_pending_cds" key
      (structural; list type).
bundled_recommendations: []
infrastructure_dependencies:
  - >-
    LIVE warehouse write (Decision 84 Single Portal Invariant): the ratification ETL step runs
    `bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md`, which parses DECISIONS.md
    and upserts every entry (incl. the 5 new ones) into ops_decisions via the ducklake_writer closed
    boundary. Requires the agent_platform (PlatformDev) static-key assume-role chain (verified live
    this session: session_preflight creds=ok, "pulled 1259 rows from the warehouse"). The write is a
    caller-keyed idempotent upsert (re-running the backfill refreshes the same dec-NNN, never
    duplicates). There is NO offline outbox (Decision 84 I-4) -- if the chain is down the write FAILS
    LOUDLY; re-run after `aws sts get-caller-identity --profile agent_platform` confirms the chain.
  - >-
    Lambda Deployment Assessment (conscious deferral, documented -- Decision 79 / CD.24): docs/
    ROADMAP-PLATFORM.yaml is a declared assets[] entry (line 44) of the active src/lambdas/data-pipeline
    manifest, so compute_affected_artifacts() flags data-pipeline. NO per-Lambda build/deploy/smoke-test
    is warranted here because: (i) the roadmap is a runtime ASSET, not handler code or a schema -- no
    import contract changes (scripts/platform_roadmap.py is NOT in the manifest's includes[]); (ii)
    validate_lambda_deploy_gating is ADVISORY (it prints the affected artifact, only reds on an import
    error -- confirmed at scripts/checks/**/validate_lambda_deploy_gating.py); (iii) the only consumers
    that read the bundled roadmap (scheduled doc-freshness / rec-curator agents) are operationally
    DISABLED per the AGENTS.md runbook, so redeploy happens on re-enable, not here; (iv) direct precedent:
    #378 (the Decision-105 PR -- flipped CD.6/CD.34 in this same asset), #387, #389 all edited
    docs/ROADMAP-PLATFORM.yaml with no data-pipeline deploy. No Terraform / IAM changes are in scope.
  - >-
    Interactive human sign-off (NOT a fully autonomous /implement run): ratification is a governance
    act the human signs. Per CD, /implement drafts the Decision text and PAUSES for explicit human
    confirmation before authoring the DECISIONS.md entry + ETL + roadmap flip (Decision 105 lane;
    the user's "I ratify interactively"). The non-ratification changes (detector, T-1.1 rescope,
    contract/orient/test edits) are ordinary code and land without per-item sign-off.
