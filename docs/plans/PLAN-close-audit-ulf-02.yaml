  - >-
    T-1.1 depends_on no longer includes T0.7b (== [T-1.5]); its name/intent/exit_criteria express the
    ops-portal lane + CD.1-CD.39 coverage + capability-based completion (not the one-time "all CDs
    ratified" ceremony); related_candidate_decisions == [CD.1]; status == complete.
  - >-
    PlatformRoadmapState.realized_but_pending_cds() exists and, on a synthetic roadmap, surfaces a
    pending CD with a '[Realized' detail marker and no realization_evidence while excluding
    ratified/superseded CDs and pending CDs that already carry realization_evidence (those belong to
    ratifiable_cds); to_preflight_dict and the /orient full projection both carry a
    "realized_but_pending_cds" key; the module is 100% covered.
  - >-
    After the batch, docs/ROADMAP-PLATFORM.yaml has CD.1/CD.2/CD.20/CD.21/CD.26 with state: ratified +
    ratified_as: dec-NNN + filed_via: ops_decisions:dec-NNN (matching NNN, 108-112 or the re-derived
    base) + a realization_evidence note; document.status == ratified and document.filed_via ==
    ops_decisions:dec-108; and each dec-NNN resolves to a `## Decision NNN:` header in DECISIONS.md.
  - >-
    docs/DECISIONS.md contains 5 new `## Decision 108-112:` entries (ratifying CD.1/CD.2/CD.20/CD.21/
    CD.26 respectively) in the Decision 106 template shape; CD.20's entry scopes its assertion to the
    realized public-flip + curated-portal COMMITMENT and states portal completion (T2.11a/T2.11b) is
    ongoing (necessary, not sufficient) -- it does NOT claim the portal is finished.
  - >-
    ops_decisions contains dec-108..dec-112 after `ops_data_portal --backfill-decisions-md` (the live
    warehouse ETL succeeded; a re-run is a no-op upsert).
  - >-
    T-1.20 status == complete (all 6 exit criteria were already met; unwedged by CD.1 ratification).
  - >-
    bootstrap_completion_exempt is stripped from EXACTLY the 12 discharged items (T-1.0, T-1.1, T-1.6,
    T0.2, T0.5, T0.11, T0.14, T2.3, T2.10, T2.12, T2.13, T2.16b) and retained on every other exempt
    item; test_live_platform_yaml_bootstrap_exemption_set passes with its expected set updated to match.
  - >-
    The document-level agent_instructions scope prose marks scope (a) [CD.1] expired and the
    CD.2/CD.20/CD.21/CD.26 slices of scope (c) expired; scope (b) [CD.25] is explicitly retained as open.
  - >-
    `bin/venv-python -m scripts.validate` passes -- including validate_candidate_decision_ratification
    (R1: the 5 newly-ratified CDs resolve to headers; R2: all still-pending CDs carry no ratified_as
    and no dec-pointer filed_via) and validate_test_coverage.
  - >-
    Re-running `bin/venv-python -m scripts.session_preflight` after the flips shows T-1.20 absent from
    in_progress (or complete) and no longer carrying CD.1 in completion_blocked_on_cd.
verification_plan:
  - step: 1
    phase: pre-merge
    action: The new detector is unit-covered with synthetic fixtures (surfaces prose-'[Realized' pending CDs; excludes ratified/superseded and realization_evidence-carrying CDs).
    command: grep -q "class TestRealizedButPendingCds" tests/test_platform_roadmap.py && bin/venv-python -m pytest tests/test_platform_roadmap.py::TestRealizedButPendingCds -q
    expected: All cases pass -- prose-'[Realized' + pending + no realization_evidence -> surfaced; ratified/superseded -> excluded; realization_evidence present -> excluded (belongs to ratifiable_cds).
    fix_if: A case fails, or the detector surfaces a ratified CD / a realization_evidence-carrying CD (it must stay DISTINCT from ratifiable_cds and only flag prose-only pending CDs).
  - step: 2
    phase: pre-merge
    action: to_preflight_dict and the /orient full projection both carry the new key; the slim projection does not.
    command: bin/venv-python -c "from pathlib import Path; from scripts.platform_roadmap import compute_state_dict; from scripts.session_preflight import _slim_roadmap_state as s; st=compute_state_dict(Path('docs/ROADMAP-PLATFORM.yaml')); assert 'realized_but_pending_cds' in st; assert 'realized_but_pending_cds' in s(st, full=True); assert 'realized_but_pending_cds' not in s(st, full=False); print('surface ok')"
    expected: Prints "surface ok".
    fix_if: The key is missing from to_preflight_dict (add it in platform_roadmap.py) or from the full projection (add it to _slim_roadmap_state full branch in session_preflight.py), or it leaked into the slim projection.
  - step: 3
    phase: pre-merge
    action: T-1.1 is rescoped -- T0.7b dropped, related list is [CD.1], status complete.
    command: bin/venv-python -c "from pathlib import Path; from scripts.platform_roadmap import load; t=next(i for i in load(Path('docs/ROADMAP-PLATFORM.yaml')).tier_items if i.id=='T-1.1'); assert 'T0.7b' not in t.depends_on, t.depends_on; assert t.related_candidate_decisions==['CD.1'], t.related_candidate_decisions; assert t.status=='complete', t.status; print('T-1.1 rescoped ok')"
    expected: Prints "T-1.1 rescoped ok".
    fix_if: T0.7b still in depends_on, related_candidate_decisions is not [CD.1], or status is not complete.
  - step: 4
    phase: pre-merge
    action: The 5 batch CDs carry the canonical ratified shape, document meta flipped, and the guard's R1/R2 hold on the whole roadmap.
    command: bin/venv-python -c "from pathlib import Path; from scripts.platform_roadmap import load; d=load(Path('docs/ROADMAP-PLATFORM.yaml')); m={c.id:c for c in d.candidate_decisions}; assert all(m[i].state=='ratified' and m[i].ratified_as and m[i].filed_via=='ops_decisions:'+str(m[i].ratified_as) for i in ['CD.1','CD.2','CD.20','CD.21','CD.26']); assert d.document.status=='ratified' and d.document.filed_via.startswith('ops_decisions:dec-'); print('shapes ok')"
    expected: Prints "shapes ok" -- all 5 CDs ratified with matching ratified_as/filed_via; document.status ratified; document.filed_via is an ops_decisions:dec-NNN pointer.
    fix_if: A CD is missing a field or ratified_as != the dec inside filed_via; or document meta was not flipped.
  - step: 5
    phase: pre-merge
    action: Each newly-ratified dec-NNN resolves to a real `## Decision NNN:` header (R1 referential integrity), authored BEFORE/with the CD flip.
    command: bin/venv-python -c "import re; from pathlib import Path; from scripts.platform_roadmap import load; hdr={int(n) for n in re.findall(r'^## Decision (\d+):', open('docs/DECISIONS.md').read(), re.M)}; d=load(Path('docs/ROADMAP-PLATFORM.yaml')); m={c.id:c for c in d.candidate_decisions}; assert all(int(str(m[i].ratified_as).split('-')[1]) in hdr for i in ['CD.1','CD.2','CD.20','CD.21','CD.26']); print('headers resolve')"
    expected: Prints "headers resolve" -- all 5 dec-NNN have `## Decision NNN:` headers.
    fix_if: A CD points at a dec-NNN with no header (author the DECISIONS.md entry first) -- this is exactly the R1 failure the guard would red on.
  - step: 6
    phase: pre-merge
    action: T-1.20 is complete and the flag-strip set is exactly the 12 discharged items.
    command: bin/venv-python -c "from pathlib import Path; from scripts.platform_roadmap import load; d=load(Path('docs/ROADMAP-PLATFORM.yaml')); m={i.id:i for i in d.tier_items}; assert m['T-1.20'].status=='complete'; strip={'T-1.0','T-1.1','T-1.6','T0.2','T0.5','T0.11','T0.14','T2.3','T2.10','T2.12','T2.13','T2.16b'}; assert all(not m[x].bootstrap_completion_exempt for x in strip), [x for x in strip if m[x].bootstrap_completion_exempt]; assert m['T-1.2'].bootstrap_completion_exempt and m['T-1.12'].bootstrap_completion_exempt and m['T0.7b'].bootstrap_completion_exempt, 'kept-flags regressed'; print('flags ok')"
    expected: Prints "flags ok" -- T-1.20 complete; the 12 stripped; the still-gated exempt items (T-1.2 via CD.13, T-1.12 via CD.25, T0.7b via CD.10) retain their flag.
    fix_if: T-1.20 not complete; a discharged item still exempt; or a still-gated item lost its flag (would re-surface as completion-blocked).
  - step: 7
    phase: pre-merge
    action: Full validate is green end-to-end -- the ratification guard, the exemption-set test, coverage, and everything else.
    command: bin/venv-python -m scripts.validate
    expected: Exit 0. The "Candidate decision ratification guard (Decision 105)" section prints PASS; validate_test_coverage passes (platform_roadmap.py 100% covered); test_live_platform_yaml_bootstrap_exemption_set passes with the updated expected set.
    fix_if: 'Ratification guard reds -> a header is missing (step 5) or a pending CD carries a dec-pointer (R2). Coverage reds -> the new detector lines are uncovered (extend TestRealizedButPendingCds). Exemption-set test reds -> its expected set was not updated to drop the 12.'
  - step: 8
    phase: pre-merge
    action: The re-pointed live-roadmap preflight test passes (T-1.20 no longer asserted as CD.1-blocked; a real pending gate is still surfaced elsewhere).
    command: bin/venv-python -m pytest tests/test_session_preflight_platform_roadmap.py -q
    expected: Green -- the re-pointed test asserts an in_progress item (T1.12) surfaces its pending gate (CD.25) in completion_blocked_on_cd, and the new realized_but_pending_cds key is present.
    fix_if: The old test still asserts T-1.20/CD.1 (dead post-ratification) -- re-point it to T1.12/CD.25.
  - step: 9
    phase: post-merge (live warehouse write)
    action: >-
      ETL the 5 new Decisions into ops_decisions and confirm the gate cleared. This is the live
      warehouse leg (Decision 84) -- run it after the DECISIONS.md entries are authored and the human
      has signed each CD.
    command: bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md && bin/venv-python -m scripts.session_preflight
    expected: >-
      The backfill prints a JSON result with failed==0; preflight re-runs clean, T-1.20 is no longer
      surfaced as CD.1-blocked, and ratifiable_cds/realized_but_pending_cds reflect the post-batch state.
    fix_if: >-
      The backfill raises (static-key chain down -> verify `aws sts get-caller-identity --profile
      agent_platform`, re-run; NO offline outbox per Decision 84 I-4). A dec-NNN failed validation ->
      fix the DECISIONS.md entry and re-run (idempotent upsert).
constraints:
  - >-
    Decision 105 (the ratification lane -- BUILD ON, do not rebuild): the canonical ratified shape is
    state: ratified + ratified_as: dec-NNN + filed_via: ops_decisions:dec-NNN (same 3-digit NNN in
    both). Ratifying clears the COMPLETION gate on items a CD gates (gate derivation keys purely on
    cd.state=='pending') -- necessary, NOT sufficient: open CODE exit criteria on those items remain,
    and tier-status flips are a separate step. Do NOT reimplement ratifiable_cds(), the contract, or
    the R1/R2/R3 guard -- they exist.
  - >-
    Decision 90 (four-tier workflow): tier-status flips (T-1.1 -> complete, T-1.20 -> complete) are an
    /implement bookkeeping step, executed here, never in /plan. Sequence CD.1 ratification (state ->
    ratified) BEFORE the T-1.20 completion flip, since T-1.20's completion gate derives from
    cd.state=='pending'.
  - >-
    Decision 84 (Single Portal Invariant + numbering authority): DECISIONS.md assigns the decision
    numbers (author entries FIRST); ops_decisions is populated ONLY via the portal
    (--backfill-decisions-md; --file-decision is the single-row alternative). NEVER edit
    logs/.decisions-index.jsonl directly. The warehouse write FAILS LOUDLY with no outbox.
  - >-
    Decision 55 (no unilateral judgement in a read-only surface; RCA-first): the new
    realized_but_pending_cds() detector is a lower-confidence "needs corroboration" signal kept DISTINCT
    from the deliberate realization_evidence-keyed ratifiable_cds() -- /orient surfaces both but ratifies
    neither. Ratification requires per-CD human sign-off; the agent drafts, the human signs.
  - >-
    Decision 86 (rationale-to-Decisions, field-semantics-to-contracts; no new prose-architecture doc):
    ratification rationale lands in DECISIONS.md; the surfacing-signal semantics land in the existing
    candidate-decision-ratification.yaml contract. Create no new docs/ design doc.
  - >-
    Decision 91 (file_decision verb is already-shipped, extends ducklake_writer): the basis for dropping
    T-1.1's T0.7b dependency -- the portal is the operative vehicle TODAY; T0.7b (log-decision Lambda) is
    not required for ratification.
  - >-
    CD.20 scoped-assertion discipline: the state vocabulary is binary (pending|ratified|superseded) with
    no "partial". CD.20's ratifying Decision text asserts ONLY the realized public-flip + curated-portal-
    not-operational-data-export COMMITMENT; it states portal completion (T2.11a .devcontainer, T2.11b
    architecture diagram) is ongoing (necessary, not sufficient). Do NOT let the flip claim the portal
    is finished.
  - >-
    Flag-strip safety (the 12-only rule): strip bootstrap_completion_exempt ONLY from items whose gating
    CDs are ALL now ratified (T-1.0, T-1.1, T-1.6, T0.2, T0.5, T0.11, T0.14, T2.3, T2.10, T2.12, T2.13,
    T2.16b). KEEP it on every item still gated by a pending CD (T-1.2..T-1.5 via CD.13; the
    T-1.11..T-1.19 + T0.12.5/.6/.7 set via CD.25; T0.6/T0.7a-c/T0.8/T0.12.7/T2.17 via CD.10; T0.9 via
    CD.4; etc.) -- stripping those would erase live exemption rationale and re-surface complete items as
    completion-blocked. T2.3/T2.16b are already-stale (CD.6/CD.34 ratified earlier); their strip is bonus
