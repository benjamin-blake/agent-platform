schema_version: 1
slug: "import-governance-baseline"
intent: >-
  Land the Decision 80 clause-2 "do-less" import-governance baseline (platform tier_item T3.11) -- import-linter
  contracts, a pinned dependency lockfile, a fail-closed edit-scope hook, and the Bazel/Pants revisit-trigger wiring --
  so the agent-first platform gains deterministic dependency governance and bounded agent blast radius WITHOUT a build
  orchestrator, advancing the "agent context / structural integrity is a first-class resource" North Star driver.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-import-governance-baseline.yaml
phase: >-
  Platform tier_item T3.11 (keystone of the T3.11-T3.14 dependency-graph/dead-code/context-leanness group).
  No product-phase coupling (ROADMAP-PRODUCT untouched); this is PLATFORM governance substrate.
scope:
  - file: .importlinter
    action: Create
    purpose: >-
      import-linter contract config: a forbidden-illegal-cycle (no_cross_cycles) contract plus layering/independence
      contracts between src/ packages (common, data, execution, lab, live, meta_learner, schemas, lambdas) and scripts/
      packages (executor, verifiers, root modules). The three KNOWN function-local deferred-import cycles
      (scripts.verifiers<->ops_data_portal, ops_data_portal<->executor, execute_recommendation<->executor.batch) are
      allowlisted via ignore_imports WITH an inline rationale comment per entry, BEFORE the contract goes blocking, so
      grimp (which counts function-local imports as edges) does not produce a day-one false-fail.
  - file: scripts/import_governance.py
    action: Create
    purpose: >-
      New module holding the three checks' LOGIC (keeps validate.py off its SLOC budget; aligns with the Decision-80
      validate.py decomposition that config/sloc_budgets.yaml already anticipates): run_import_contracts() shells the
      import-linter lint-imports engine against .importlinter; check_lockfile_sync() verifies requirements.lock pins
      every top-level requirements.txt package and records requirements.txt source identity (deterministic, offline);
      evaluate_bazel_revisit_trigger() evaluates the Decision 80 cl.4 predicate. Exposes a __main__ CLI
      (--check-contracts / --check-lockfile / --revisit-trigger) returning exit 0 on pass for clean acceptance commands.
  - file: scripts/validate.py
    action: Modify
    purpose: >-
      Add thin wrappers validate_import_contracts(failed) and validate_lockfile_sync(failed) that delegate to
      scripts.import_governance, wired into BOTH the --pre fast tier and the full run_python_checks tier (Decision 73);
      surface the revisit-trigger advisory note (non-wedging). Net growth kept to ~7 SLOC of call-sites + import.
  - file: config/sloc_budgets.yaml
    action: Modify
    purpose: >-
      Raise the scripts/validate.py budget from 3316 to the exact post-edit SLOC of validate.py (a minimal, reviewed
      Decision-102 ratchet-up justified by the new wrapper call-sites). Setting it to the exact value avoids both the
      over-budget failure and the below-budget advisory.
  - file: requirements.txt
    action: Modify
    purpose: Add import-linter (pulls in grimp transitively) so the full-tier contract check has its engine installed.
  - file: requirements-fast.txt
    action: Modify
    purpose: >-
      Add import-linter so the --pre fast tier can run the contract check too (exit-criterion c1 requires BOTH tiers).
      Version constraint must match requirements.txt per requirements-fast.txt's stated sync contract.
  - file: requirements-dev.txt
    action: Modify
    purpose: Add pip-tools (pip-compile) as the deterministic lockfile-generation tool.
  - file: requirements.lock
    action: Create
    purpose: >-
      Pinned full transitive closure generated by pip-compile from requirements.txt; includes networkx and grimp pinned
      to ==. CI fails (via check_lockfile_sync) if it drifts from requirements.txt.
  - file: .claude/hooks/edit_scope_guard.py
    action: Create
    purpose: >-
      Fail-closed edit-scope PreToolUse hook modeled on .claude/hooks/never_on_main.py. Resolves an active-plan scope
      pointer (CLAUDE_ACTIVE_PLAN env var naming a PLAN-*.yaml, with a marker-file fallback). No active plan declared ->
      exit 0 ALLOW (never wedges /plan, /orient, ad-hoc work). Active plan declared -> ALLOW edits to files in that
      plan's Scope, exit 2 DENY edits outside it; if the active plan cannot be read/parsed -> exit 2 DENY (fail-closed).
      Defensive on malformed hook JSON (allow, per never_on_main precedent).
  - file: .claude/settings.json
    action: Modify
    purpose: >-
      Register bin/venv-python .claude/hooks/edit_scope_guard.py in the existing PreToolUse hook array (matcher already
      covers Edit|Write|MultiEdit|NotebookEdit|Bash), after never_on_main.py.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Convert T3.11 exit_criteria from bare strings to structured ExitCriterion objects (ids c1..c5, status: open) --
      required because the diff touches T3.11 (validate_platform_roadmap check ii forbids bare-string criteria on a
      diff-touched item) and because closes_criteria refs bind to c.id. Re-ground criterion c2's stale wording (it
      claims networkx is "in no requirements file"; networkx>=3.0 is already in requirements.txt and requirements-fast.txt,
      unpinned -- the lockfile still pins it plus grimp). On a verified VP pass, /implement's bookkeeping walk flips
      c1..c5 to met (Status-Trusted-Never-Inferred: this plan does NOT pre-flip them).
  - file: tests/test_import_governance.py
    action: Create
    purpose: >-
      Cover scripts/import_governance.py to 100%: contract-runner passes on the clean tree AND a negative case proving an
      injected illegal cycle is detected (anti-vacuous-pass); lockfile-sync passes when synced and FAILS when a top-level
      package is missing from the lock; revisit-trigger is dormant at concurrency=1 and fires when concurrency>1 AND
      (KG.13 filed OR budget breach).
  - file: tests/test_validate.py
    action: Modify
    purpose: Cover the new validate_import_contracts / validate_lockfile_sync wrappers (both-tier wiring) to 100%.
  - file: tests/test_edit_scope_guard.py
    action: Create
    purpose: >-
      Cover .claude/hooks/edit_scope_guard.py: ALLOW (no active plan), ALLOW (active plan + in-scope file), DENY (active
      plan + out-of-scope file), fail-closed DENY (active plan unparseable/missing), defensive ALLOW (malformed JSON).
bundled_recommendations: []
closes_criteria:
  - "T3.11:c1"
  - "T3.11:c2"
  - "T3.11:c3"
  - "T3.11:c4"
  - "T3.11:c5"
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    [c1] import-linter contracts run inside validate.py in BOTH tiers and FAIL CI on an illegal cycle or a
    layering/independence violation between src/ and scripts/ packages (validate_import_contracts present in both the
    --pre block and run_python_checks; the contract check returns non-zero on an injected illegal import).
  - >-
    [c2] requirements.lock pins the full transitive closure (networkx and grimp included, pinned to ==), and
    check_lockfile_sync fails CI when the lock drifts from requirements.txt.
  - >-
    [c3] .claude/hooks/edit_scope_guard.py blocks edits outside the active plan's declared Scope (exit 2), defaults to
    DENY when the active plan is undeparseable, and ALLOWS when no active plan is declared; it is registered in
    .claude/settings.json PreToolUse.
  - >-
    [c4] The three known cycles (scripts.verifiers<->ops_data_portal, ops_data_portal<->executor,
    execute_recommendation<->executor.batch) are encoded/allowlisted in .importlinter WITH per-entry rationale, and the
    contract check passes green on the unmodified tree (no day-one false-fail).
  - >-
    [c5] evaluate_bazel_revisit_trigger encodes the Decision 80 cl.4 predicate verbatim (executor concurrency > 1 AND
    (KG.13 tier_item filed OR _FAST_TIER_BUDGET_SECONDS breach)), is dormant at the current concurrency=1, surfaces an
    advisory note when it fires, and never auto-acts (no silent Bazel/Pants re-litigation).
  - >-
    The full validate suite (bin/venv-python -m scripts.validate) passes green, including validate_sloc_limits (the
    Decision-102 budget raise absorbs validate.py growth), validate_platform_roadmap (T3.11 criteria structured, no
    bare strings, closes_criteria resolve), test_coverage_checker, and all unit tests. The advisory Lambda deploy-gating
    line for data-pipeline (docs/ROADMAP-PLATFORM.yaml asset) is expected and non-blocking per the exemption in context.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Plan document is schema-valid and its closes_criteria refs resolve to real T3.11 criteria.
    command: bin/venv-python -m scripts.plan_document docs/plans/PLAN-import-governance-baseline.yaml
    expected: Exit 0; the plan validates against PlanDocument (slug/path consistency, unique VP step ids).
    fix_if: Schema error -- fix the offending field (e.g. an extra key, a closes_criteria entry not in '<item>:<crit>' form) and re-run.
  - step: 2
    phase: pre-deploy
    action: import-linter contracts pass green on the unmodified tree (3 known cycles allowlisted; no false-fail).
    command: bin/venv-python -m scripts.import_governance --check-contracts
    expected: Exit 0; lint-imports reports all contracts kept, including the no-illegal-cycle contract.
    fix_if: A contract is broken -- if it is one of the three known cycles, add/correct its ignore_imports entry (with rationale) in .importlinter; if a genuine new cycle, surface it, do not blanket-ignore.
  - step: 3
    phase: pre-deploy
    action: The contract check is NON-vacuous -- an injected illegal import is actually detected (anti-vacuous-pass).
    command: bin/venv-python -m pytest tests/test_import_governance.py -q
    expected: Pass, including the negative test that asserts lint-imports returns non-zero when a forbidden cross-package import / illegal cycle is injected into a fixture.
    fix_if: The negative test passes vacuously (contract never fails) -- tighten the .importlinter contract set so a real violation is caught.
  - step: 4
    phase: pre-deploy
    action: The contract check is wired into BOTH validate tiers.
    command: grep -c "validate_import_contracts" scripts/validate.py
    expected: Count >= 2 (one call in the --pre block, one in run_python_checks).
    fix_if: Count < 2 -- add the missing call site so exit-criterion c1's both-tier requirement holds.
  - step: 5
    phase: pre-deploy
    action: The lockfile pins the transitive closure including networkx and grimp, and sync-check passes.
    command: grep -Eq "^networkx==" requirements.lock && grep -Eq "^grimp==" requirements.lock && grep -Eq "^import-linter==" requirements.lock && bin/venv-python -m scripts.import_governance --check-lockfile
    expected: All greps match and the sync-check exits 0 (lock is in sync with requirements.txt).
    fix_if: A pin is missing -- regenerate requirements.lock via pip-compile requirements.txt -o requirements.lock; if sync-check fails, reconcile the lock against requirements.txt.
  - step: 6
    phase: pre-deploy
    action: The lockfile sync-check FAILS on drift (proves it is a real gate, not vacuous).
    command: bin/venv-python -m pytest tests/test_import_governance.py -q -k lockfile
    expected: Pass, including the test that a requirements.txt top-level package absent from requirements.lock makes check_lockfile_sync report failure.
    fix_if: The drift test does not fail the sync-check -- strengthen check_lockfile_sync to compare the full top-level set and source identity.
  - step: 7
    phase: pre-deploy
    action: The edit-scope hook enforces fail-closed scope containment across all four cases.
    command: bin/venv-python -m pytest tests/test_edit_scope_guard.py -q
    expected: Pass -- ALLOW (no active plan), ALLOW (active + in-scope), DENY exit 2 (active + out-of-scope), fail-closed DENY exit 2 (active + unparseable).
    fix_if: A case returns the wrong exit code -- correct edit_scope_guard.py decision logic (default-DENY only when an active plan is declared; ALLOW when none).
  - step: 8
    phase: pre-deploy
    action: The hook is registered and settings.json remains valid JSON.
    command: grep -q "edit_scope_guard.py" .claude/settings.json && bin/venv-python -m json.tool .claude/settings.json
    expected: The hook command is present in PreToolUse and the file parses as JSON.
    fix_if: Missing registration or JSON parse error -- add the hook entry to the PreToolUse hooks array and fix any JSON syntax.
  - step: 9
    phase: pre-deploy
    action: The revisit trigger encodes the Decision 80 predicate and is dormant today (concurrency=1).
    command: bin/venv-python -m scripts.import_governance --revisit-trigger
    expected: Prints a dormant/not-fired verdict (executor concurrency is 1, so the AND-gate is false) as an advisory; exit 0, non-wedging.
    fix_if: It fires or hard-fails today -- the predicate is mis-wired; concurrency>1 must be required and the surface must be advisory-only (Decision 55).
  - step: 10
    phase: pre-deploy
    action: T3.11 criteria are structured (no bare strings), closes_criteria resolve, and the roadmap loads clean.
    command: bin/venv-python -m scripts.platform_roadmap
    expected: Exit 0; T3.11 exit_criteria parse as structured ExitCriterion objects c1..c5 with no integrity errors.
    fix_if: Bare-string or referential-integrity error -- finish converting T3.11 criteria to id/text/status objects and ensure c2's re-grounded text is well-formed.
  - step: 11
    phase: pre-deploy
    action: Full presubmit passes green end-to-end (capstone -- proves wiring, SLOC budget, coverage, and no regressions).
    command: bin/venv-python -m scripts.validate
    expected: Exit 0; SLOC limits pass (validate.py within its raised budget), platform-roadmap integrity passes, import-contracts + lockfile-sync checks run and pass, all unit tests + coverage pass.
    fix_if: Any check red -- address that check specifically (do NOT weaken a gate to make it pass); re-run until green.
constraints:
  - Single Portal Invariant -- no direct writes to logs/.recommendations-log.jsonl or logs/.decisions-index.jsonl; this plan writes none.
  - No rescue agents or workaround loops (Decision 55); the revisit trigger is advisory/alarm-only, never auto-acting.
  - This is the do-less baseline, NOT a build orchestrator (Decision 80 frame-lock, Decision 75) -- do not introduce Bazel/Pants/any build-graph runner.
  - validate.py is the single source of truth -- the contract and lockfile checks are added to validate.py FIRST (both run via it), never CI-only.
  - The three known cycles must be allowlisted WITH rationale BEFORE the contract goes blocking -- never silently ignored, never a day-one false-fail (exit-criterion c4).
  - Python 3.12+, type hints, ruff line-length 127, no emojis, ASCII hyphens; bin/venv-python for all invocations; no exceptions raised at module import (defer to explicit calls).
  - >-
    Status-Trusted-Never-Inferred -- this plan does NOT flip T3.11 criteria or item status; /implement's verified
    bookkeeping walk does, only on a passing VP.
  - The SLOC budget raise is the minimum needed for the wrapper call-sites and must cite Decision 102; do not raise other files' budgets.
context:
  - >-
    Decisions to cite (decision-scout CITE list): 80 (originating do-less baseline; cl.2 names these four parts, cl.4 gives
    the revisit predicate verbatim), 67 (STRATEGIC frozen -> this lands as IMPLEMENTATION), 73/60 (two-tier diff-aware CI;
    new checks wire into both tiers respecting the 5-min --pre budget), 102 (SLOC ratchet -- governs the validate.py budget
    raise), 75 (frame-lock: explicitly NOT a build orchestrator). Related: 86 (no new prose docs -- trigger rationale routes
    to code + roadmap), 89/83 (never_on_main hook precedent), 55/72 (alarm-not-gate), 79 (no new Lambda code in scope; the roadmap-asset deploy exemption is justified below -> V2), 43
    (per-file SLOC/CC caps still apply; new functions stay under the 20-branch CC cap).
  - >-
    Decision 102 SLOC flag (resolved): scripts/validate.py is at exactly its 3316 budget. Resolution chosen by operator:
    put check logic in a new scripts/import_governance.py module and apply a minimal reviewed budget raise for validate.py's
    ~7 wrapper lines (set the budget to the exact post-edit SLOC to avoid both over-budget failure and below-budget advisory).
  - >-
    Tier Item Freshness Gate findings: (1) Not silently complete -- none of the four parts exist. (2) Stale-reference:
    criterion c2's "in no requirements file" claim is wrong (networkx>=3.0 is in requirements.txt:33 and
    requirements-fast.txt:12, unpinned) -- re-grounded in this plan's roadmap edit. (3) Partial overlap with T3.12
    (dependency_graph.py, complete): T3.12 is the agent-facing import-graph oracle; T3.11's import-linter is a governance
    /contract layer using grimp's own graph -- distinct mechanisms, no duplication. (4) Gating decision 80 adjudicated via
    the decision-scout gate (FLAGS_FOUND -> the SLOC WARN, now resolved; no BLOCK).
  - >-
    The edit-scope hook must default to ALLOW when no active plan is declared, or it would wedge /plan, /orient and all
    ad-hoc work. "Fail-closed / default DENY" applies only WHEN an active plan is declared (out-of-scope edit, or
    unparseable plan). Activation (how /implement sets CLAUDE_ACTIVE_PLAN or the marker) is a separate integration; this
    baseline ships the mechanism + registration + tests, inert until a plan context is declared.
  - >-
    Branch was 0 commits behind origin/main at planning time (preflight main_freshness ok); no Scope overlap with recent
    main changes. ci_rca_unresolved_recs was empty (the two ci-rca recs rec-2425/rec-2426 are likely-resolved), so no HARD BLOCK.
  - >-
    import-linter is invoked as a local static analyzer (no network, no LLM); it reads .importlinter and builds its grimp
    graph from ast, counting function-local deferred imports as edges -- which is exactly why the three known cycles must be
    allowlisted up front. The plan adds no new external system / Lambda code / Terraform, which is why the tier is V2.
  - >-
    Lambda deploy-gating exemption (Decision 79 / CD.16 -- explicit, do NOT promote to V3): docs/ROADMAP-PLATFORM.yaml is a
    declared assets[] entry of the ACTIVE artifact data-pipeline.zip (src/lambdas/data-pipeline/manifest.yaml:44,
    status: active), so compute_affected_artifacts() returns {'data-pipeline': ['docs/ROADMAP-PLATFORM.yaml']} and
    validate_lambda_deploy_gating prints an advisory line for it. No build/deploy/smoke-test step is added, and the tier
    stays V2, for four reasons: (a) validate_lambda_deploy_gating is ADVISORY-ONLY -- it never fails the build (confirmed
    in scripts/validate.py), so the capstone VP step 11 stays green; (b) the roadmap edit is criteria-metadata/structural
    (bare-string -> ExitCriterion objects + c2 wording re-grounding), not a behavioral code change to the Lambda; (c) the
    scheduled-agent dispatcher that bundles the roadmap is DISABLED (SCHEDULED_AGENTS_ENABLED=false and the EventBridge
    rules are state:DISABLED per terraform/scheduled_agents.tf; May 2026 migration to Claude Code scheduled agents per
    AGENTS.md), so there is no live consumer of a stale bundled copy; (d) precedent: T3.12 (commit 156e7fb,
    dependency_graph oracle) and T3.8 (commit 849fd7d) both edited docs/ROADMAP-PLATFORM.yaml and merged with no Lambda
    redeploy. If the scheduled-agent dispatcher is ever re-enabled, a roadmap-content refresh redeploy is handled by that
    re-enable runbook, not this plan.
  - >-
    Fast-tier cost note (non-blocking, c1 both-tier wiring): the import-linter/grimp graph build over src/ + scripts/
    (~36.5k SLOC) runs on every --pre invocation, which carries the 300s _FAST_TIER_BUDGET_SECONDS budget. Expected
    sub-minute, but /implement should record a measured --pre wall-clock at VP step 11 time to confirm headroom; if it
    ever approaches the budget, the contract check can be narrowed or moved full-tier-only with a noted rationale.
pre_implementation_checklist:
  - Branch confirmed not on main (claude/import-governance-baseline-pf1pxc)
  - docs/PROJECT_CONTEXT.md read
  - DECISIONS.md context obtained via the decision-scout gate (CITE list 80/67/73/60/102/75)
  - All 14 files in scope located and readable (4 new, the rest existing)
  - Acceptance criteria understood, each maps 1:1 onto T3.11 c1..c5 (+ the full-validate capstone)
  - SLOC resolution path confirmed by operator (new module + minimal validate.py budget raise)
execution_steps:
  - >-
    Add import-linter to requirements.txt and requirements-fast.txt (matching version constraints) and pip-tools to
    requirements-dev.txt; install into the venv so lint-imports and pip-compile are available.
  - >-
    Generate requirements.lock via pip-compile from requirements.txt (full transitive closure; verify networkx, grimp,
    import-linter are pinned to ==).
  - >-
    Create scripts/import_governance.py with run_import_contracts(), check_lockfile_sync(), evaluate_bazel_revisit_trigger()
    and a __main__ CLI (--check-contracts / --check-lockfile / --revisit-trigger). Keep each function under the Decision-43
    CC cap; raise no exceptions at import time.
  - >-
    Create .importlinter with the no-illegal-cycle + layering/independence contracts; allowlist the three known cycles via
    ignore_imports with a per-entry rationale comment. Run lint-imports and confirm green on the clean tree.
  - >-
    Add thin wrappers validate_import_contracts(failed) and validate_lockfile_sync(failed) to scripts/validate.py,
    delegating to scripts.import_governance; call both from the --pre block AND run_python_checks; surface the
    revisit-trigger advisory note. Recompute validate.py SLOC and set config/sloc_budgets.yaml to the exact new value
    (cite Decision 102).
  - >-
    Create .claude/hooks/edit_scope_guard.py (fail-closed edit-scope guard modeled on never_on_main.py) and register it in
    .claude/settings.json PreToolUse after never_on_main.py.
  - >-
    Edit docs/ROADMAP-PLATFORM.yaml: convert T3.11 exit_criteria to structured ExitCriterion objects (c1..c5, status open)
    and re-ground c2's networkx wording. Do NOT flip statuses here.
  - >-
    Create tests/test_import_governance.py and tests/test_edit_scope_guard.py (100% coverage of new files, including the
    negative/anti-vacuous-pass cases) and extend tests/test_validate.py for the new wrappers.
  - >-
    Execute the Verification Plan -- run each step; loop until pass; on an unrecoverable failure stop and RCA (Decision 55),
    do not weaken any gate.
  - >-
    On a verified VP pass, run /implement's criteria bookkeeping walk to flip T3.11 c1..c5 to met (with met_by this plan slug),
    then commit with a Resolves trailer only if recs were bundled (none here).
  - 'Report: what was implemented, the four parts'' status, and full verification results.'
work_areas: []
rollback: >-
  All changes are additive/config-level and revertable by git. If the import-linter contract proves too strict at CI time,
  the safe interim is to widen/allowlist (with rationale) rather than disable the check; if the lockfile or hook causes
  friction, revert the specific file -- no data migration or infrastructure state is involved.
