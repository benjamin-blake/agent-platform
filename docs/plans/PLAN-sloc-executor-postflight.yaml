  - "Importer topology (recon-verified): the only production importers of scripts.executor.postflight are the scripts/execute_recommendation.py facade re-export (lines 51-63), the scripts/executor/batch.py lazy import (line 372: _code_review_gate/_fix_code_review_findings/finalize), and scripts/executor/__init__.py -- all resolve through the retained facade path. No src/, config/, or .github importers. .github/instructions/executor-review.instructions.md pins applyTo=scripts/executor/postflight.py (a glob) -- unaffected because the file is retained as a facade (not renamed)."
  - "Patch-site inventory (recon-verified): 129 string-literal patch sites on scripts.executor.postflight (90 in test_execute_recommendation.py, 34 in test_executor_postflight.py, 5 in test_postflight_gates.py); of these 17 are postflight.subprocess and 13 postflight.llm_call and 11 postflight.load_prompt -- the primitive-patch migration set. Symbol patches (wait_for_ci 10, _run_verifiers_gate 11, _code_review_gate 14, finalize, merge_pr, cleanup_after_merge) are preserved via facade re-export."
  - "Coverage-gate: scripts/test_coverage_checker.map_source_to_test returns None for scripts/executor/**/*.py (depth>2), so no NEW test file is required and no per-file coverage floor is enforced on the sibling modules; the moved bodies stay covered by the existing suites through the facade imports. New tests are optional (convention tests/test_executor_postflight_<mod>.py)."
