  - Branch confirmed not on main (claude/sloc-violations-refactor-p5svnl)
  - docs/PROJECT_CONTEXT.md read
  - DECISIONS.md read (102, 104, 80, 43, 117, 67; and 48/75 flags folded)
  - All files in scope located and readable
  - Acceptance criteria understood and verifiable
  - Baseline captured -- the current tests/test_executor_postflight.py + test_postflight_gates.py + postflight parts of test_execute_recommendation.py pass BEFORE any code movement (the behavioural-equivalence oracle)
execution_steps:
  - "Capture baseline FIRST -- run the three suites green on the pre-refactor tree; that green run is the behavioural-equivalence oracle for this pure refactor."
  - "Create scripts/executor/postflight_gitops.py, postflight_fixers.py, postflight_gates.py, postflight_ciwait.py; move each function body verbatim; carry the '# complexity-waiver: decision-43' header into postflight_fixers.py (_fix_ci_failure) and postflight_gates.py (_code_review_gate); route any intra-executor cross-module call a test patches through the postflight facade namespace (call-time attribute access) -- e.g. _agent_merge_recovery -> _pf.cleanup_after_merge."
  - "Collapse scripts/executor/postflight.py to the facade: keep finalize() + __main__; add `from scripts.executor.postflight_<mod> import <name>` re-exports for every extracted public AND test-patched-private symbol; verify finalize()'s collaborator names resolve as facade module globals."
  - "Bulk-migrate ONLY the shared-primitive patch targets that drive a moved leaf's internals (postflight.subprocess/llm_call/load_prompt/model_registry -> the leaf's sibling module) in tests/test_executor_postflight.py, tests/test_postflight_gates.py, and tests/test_execute_recommendation.py; leave finalize-resident symbol patches on the facade namespace; re-count subprocess side_effect sequences."
  - "Run `validate --update-sloc-budgets`, then grep-confirm the postflight.py key is dropped and no postflight_*.py key was seeded."
  - "Execute the Verification Plan -- run each step; loop until pass; on unrecoverable failure stop and RCA (Decision 55)."
  - "Report -- what was extracted, the equivalence-oracle result, final postflight.py SLOC, CC/coverage status, and the migrated-patch summary."
work_areas: []
rollback: >-
  Pure refactor on a feature branch; if the equivalence oracle (existing suites) cannot be made green,
  abandon the change (no merge). Nothing is deployed. If merged and a regression surfaces, revert the
  squash commit -- the facade + siblings + test-patch migration land atomically in one PR.
