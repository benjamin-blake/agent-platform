  - "Flag folded (Decision 75 frame-lock, conscious choice recorded): the executor is FROZEN (Decision 67) and the roadmap direction (CD.27 pending, T5.6 deferred_post_mvp) is a Step Functions + Durable-Function-Lambda rewrite that will HARVEST reusable helper logic and RETIRE the orchestration shell. postflight.py's contents (git/CI/merge/review helpers) are exactly the harvestable helper logic; decomposing them into clean cohesion-seam modules is justified as freeze-window SLOC-governance/maintainability (Decision 102/43 mandate; rec-2414 scopes it) and arguably eases the eventual T5.6 harvest -- it is NOT positioned as substrate-rewrite prep. The multi-month/many-tier-wave freeze (CD.17) realizes the maintainability value before any T4.2 obsolescence."
