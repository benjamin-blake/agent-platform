  - "Create postflight_gitops.py, postflight_fixers.py, postflight_gates.py, postflight_ciwait.py; move each function body verbatim EXCEPT rewriting every routed-name reference (see context inventory) to the _pf facade alias resolved function-locally; carry the decision-43 waiver header into postflight_fixers.py and postflight_gates.py."
  - "Collapse scripts/executor/postflight.py to the facade: keep finalize() + __main__ + all module-scope imports; add re-exports for every extracted symbol; verify finalize()'s collaborator names resolve as facade module globals."
  - "REPLACE the verifiers ignore pair in .importlinter's no-cycles-verifiers-executor contract: DELETE the two stale scripts.executor.postflight -> scripts.verifiers[.harness] lines (post-move they are unmatched ignores, which import-linter treats as errors) and ADD the two scripts.executor.postflight_gates equivalents (net +2/-2). Do NOT add any .importlinter comment containing the literal postflight_gates arrow text -- VP step 7's count grep asserts exactly 2 occurrences and a comment would make it 3 (self-inflicted, immediately diagnosable)."
  - "Run the suites; ZERO patch migration is expected -- if a test fails on interception, fix the body's routing, never the test. Apply only import-line touch-ups where a test from-imports a moved symbol."
