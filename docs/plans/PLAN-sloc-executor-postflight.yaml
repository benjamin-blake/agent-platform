schema_version: 1
slug: "sloc-executor-postflight"
intent: >-
  Decompose scripts/executor/postflight.py (1157 SLOC) into a thin facade plus cohesion-seam sibling
  modules so every executor file drops to <=500 SLOC, removing the per-implement SLOC-budget friction and
  advancing the rec-2414 breakdown program without changing any executor behaviour.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-sloc-executor-postflight.yaml
phase: >-
  Platform hardening / SLOC-governance during the executor freeze. Executes the rec-2414 umbrella
  breakdown program (Decision 102 ratchet, Decision 43 cap) using the ratified PLAN-validate-decomposition
  facade mechanism (Decision 104/80). One of four coordinated executor-decomposition plans on this branch.
  Platform-internal tooling; no product-roadmap phase.
scope:
  - file: scripts/executor/postflight.py
    action: Modify
    purpose: >-
      Collapse to a thin facade (<=500 SLOC, target ~330) that RETAINS the top orchestrator finalize()
      (CC 50 -- keeps the existing decision-43 waiver header), the __main__ block, ALL current module-scope
      imports (subprocess, time, json, os, re, shutil, sys, llm_call, load_prompt, ExecutionPlan,
      clear_checkpoint, update_recommendation_status, _create_postmortem_recommendation, emit_process_event,
      model_registry, build_context_path, kill_process_tree, MODEL_EXECUTION, triage_ci_failure), and FACADE
      RE-EXPORTS of every extracted symbol. ZERO-MIGRATION INTERCEPTION RULE (Decision 104 mechanism,
      uniform across the four executor plans): every moved body references every name in the routed-name
      inventory (see context) via a function-local facade alias (import scripts.executor.postflight as _pf;
      _pf.llm_call(...), _pf.subprocess.run(...), _pf.time.sleep(...), _pf.cleanup_after_merge(...)), so ALL
      129 existing patch sites on the scripts.executor.postflight namespace keep intercepting with ZERO test
      migration. finalize()'s own callees remain facade module globals (native interception).
  - file: scripts/executor/postflight_gitops.py
    action: Create
    purpose: >-
      owner=platform. Git/commit/push + merge + cleanup primitives: _git_commit_and_push_with_retry,
      merge_pr, _safe_merge_origin_main, cleanup_after_merge (~280 SLOC; all CC<=20, no waiver). Bodies
      route subprocess/time/clear_checkpoint via _pf.
  - file: scripts/executor/postflight_fixers.py
    action: Create
    purpose: >-
      owner=platform. LLM-escalation fixers: _get_ci_failure_details, _fix_ci_failure (CC 26 -> module
      carries the decision-43 waiver header), _fix_code_review_findings (~205 SLOC). Bodies route
      llm_call/build_context_path/subprocess/kill_process_tree and the co-located-but-patched
      _get_ci_failure_details via _pf; triage_ci_failure (0 patch sites) may import directly.
  - file: scripts/executor/postflight_gates.py
    action: Create
    purpose: >-
      owner=platform. Review/verifier/scope gates: _scope_drift_check, _commits_ahead_of_main,
      _code_review_gate (CC 22 -> module carries the decision-43 waiver header), _handle_failure,
      _parse_scope_files, _run_verifiers_gate (~310 SLOC). Bodies route llm_call/load_prompt/model_registry/
      emit_process_event/build_context_path/subprocess/ExecutionPlan via _pf. _run_verifiers_gate KEEPS its
      function-local `import scripts.verifiers` (patch sites live on scripts.verifiers.* -- location-independent)
      -- this new direct edge requires the .importlinter verifiers-ignore REPLACE pair (see .importlinter scope row).
  - file: scripts/executor/postflight_ciwait.py
    action: Create
    purpose: >-
      owner=platform. CI polling + agent merge recovery: wait_for_ci, _agent_merge_recovery (~160 SLOC;
      CC<=20, no waiver). Bodies route subprocess/time/llm_call/build_context_path/cleanup_after_merge via _pf.
  - file: .importlinter
    action: Modify
    purpose: >-
      REPLACE (not add) under the no-cycles-verifiers-executor contract. postflight.py's ONLY scripts.verifiers
      import lives inside _run_verifiers_gate (function-local), which moves to postflight_gates -- so the two
      EXISTING ignore lines (scripts.executor.postflight -> scripts.verifiers and -> scripts.verifiers.harness)
      become UNMATCHED after the move, and import-linter defaults unmatched_ignore_imports_alerting=error
      (empirically verified on this repo's version: exit 1, "No matches for ignored import"). Correct edit:
      DELETE the 2 stale postflight lines and ADD the 2 postflight_gates equivalents (net numstat +2/-2).
      import-linter analyzes function-scope imports (the existing ignore entries exist precisely for that
      reason). No other contract touches postflight siblings (they import only the intra-package facade).
  - file: tests/test_executor_postflight.py
    action: Modify
    purpose: >-
      ZERO patch-target migration expected (all 34 postflight-namespace patch sites keep working via the
      routing rule). Only permitted edits are import-line touch-ups if an assertion imports a symbol
      directly from a moved location. Assertion semantics unchanged.
  - file: config/sloc_budgets.yaml
    action: Modify
    purpose: >-
      Re-point via `validate --update-sloc-budgets` after the split (Decision 102): postflight.py drops out
      of the registry at <=500 SLOC. Assert via grep (not full-file diff -- sibling plans co-mutate this
      file) that the scripts/executor/postflight.py key is removed and no scripts/executor/postflight_*.py
      key is seeded. Never hand-edit.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - The full existing tests/test_executor_postflight.py, tests/test_postflight_gates.py, and the postflight-touching parts of tests/test_execute_recommendation.py pass unchanged in assertion semantics, with ZERO patch-target migration (the mechanical inventory's 129 postflight-namespace sites all still intercept).
  - Every public symbol AND every test-patched private symbol formerly defined in postflight.py is reachable both as scripts.executor.postflight.<name> (getattr) and via `from scripts.executor.postflight import <name>` (facade re-export), including the two from-import sites (_run_verifiers_gate, finalize in tests/test_postflight_gates.py).
  - Mock interception is preserved by construction -- the new sibling modules contain NO module-scope import of any routed-name (grep-verified closure), so every routed reference resolves through the facade namespace at call time; and tests contain ZERO patches on the new postflight_*.py namespaces (grep-verified, proving zero migration).
  - scripts/executor/postflight.py drops to <=500 SLOC (target ~330); no new scripts/executor/postflight_*.py module exceeds 500 SLOC or CC 20 without the decision-43 waiver header; validate_cc_limits passes over the new tree.
  - config/sloc_budgets.yaml loses its scripts/executor/postflight.py entry and gains NO scripts/executor/postflight_*.py entry (grep-verified; other entries may shift from sibling plans).
  - No extracted function DEFINITION remains in the postflight.py facade except finalize() and the __main__ block; import-linter contracts pass with exactly the .importlinter replace pair -- the two stale scripts.executor.postflight -> scripts.verifiers[.harness] ignore lines DELETED (post-move they are unmatched-ignore ERRORS under import-linter's default alerting) and the two postflight_gates equivalents ADDED -- and no other .importlinter change from this plan.
  - The postflight surface path scripts.executor.postflight is unchanged (facade retained), so all production importers (scripts/execute_recommendation.py facade re-export, scripts/executor/batch.py lazy import, scripts/executor/__init__.py) resolve without edits.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Full postflight test suites + the cross-cutting executor suite pass with unchanged assertion semantics and zero patch migration (behavioural-equivalence oracle).
    command: bin/venv-python -m pytest tests/test_executor_postflight.py tests/test_postflight_gates.py tests/test_execute_recommendation.py -m "not integration" -q
    expected: All pass; no collection errors; exit 0.
    fix_if: "A patch on scripts.executor.postflight.<name> no-ops (silent no-op mock or StopIteration on a subprocess side_effect) means a moved body referenced that routed-name bare instead of via _pf; fix the body, never the test."
  - step: 2
    phase: pre-deploy
    action: Facade completeness -- every public + test-patched private symbol is importable from the facade (stable invariant, holds pre- and post-implementation).
    command: PY=$(test -x .venv/bin/python && echo .venv/bin/python || echo python); $PY -c "import scripts.executor.postflight as p; syms='finalize wait_for_ci merge_pr cleanup_after_merge _agent_merge_recovery _safe_merge_origin_main _git_commit_and_push_with_retry _code_review_gate _commits_ahead_of_main _scope_drift_check _handle_failure _parse_scope_files _run_verifiers_gate _get_ci_failure_details _fix_ci_failure _fix_code_review_findings'.split(); missing=[s for s in syms if not hasattr(p,s)]; print('missing', missing); raise SystemExit(1 if missing else 0)"
    expected: The printed missing list is empty; exit 0.
    fix_if: "A symbol is missing means its re-export was omitted; add the from-sibling import to the facade."
    hermetic: true
  - step: 3
    phase: pre-deploy
    action: Grep-closure (Decision 104 discipline, inverted for zero-migration) -- tests carry NO patches on the new sibling namespaces AND the new siblings carry NO module-scope import of a routed-name.
    command: "! grep -rnE \"patch\\((['\\\"])scripts\\.executor\\.postflight_\" tests/ && ! grep -nE '^\\s*(import (subprocess|time)\\b|from scripts\\.llm_client import|from scripts\\.llm_utils import|from scripts\\.execution_state import|from scripts\\.executor\\.telemetry import|from scripts\\.executor\\.jsonl_store import|from scripts\\.executor\\.plan import|from scripts import model_registry)' scripts/executor/postflight_gitops.py scripts/executor/postflight_fixers.py scripts/executor/postflight_gates.py scripts/executor/postflight_ciwait.py && echo CLOSURE_OK"
    expected: Both greps find nothing; prints CLOSURE_OK; exit 0.
    fix_if: "A test patches a postflight_*.py namespace means an unauthorised migration happened -- revert it and fix the body routing instead; a sibling imports a routed-name at module scope means the routing rule was violated -- replace with _pf.<name>."
  - step: 4
    phase: pre-deploy
    action: SLOC re-point -- postflight.py drops below 500, no sibling over budget, budget entry removed with no new seed.
    command: bin/venv-python -m scripts.validate --update-sloc-budgets && ! grep -qE '^\s*scripts/executor/postflight\.py:' config/sloc_budgets.yaml && ! grep -qE '^\s*scripts/executor/postflight_[a-z_]+\.py:' config/sloc_budgets.yaml && bin/venv-python -c "import pathlib; mods=['scripts/executor/postflight.py','scripts/executor/postflight_gitops.py','scripts/executor/postflight_fixers.py','scripts/executor/postflight_gates.py','scripts/executor/postflight_ciwait.py']; over=[m for m in mods if len([l for l in pathlib.Path(m).read_text().splitlines() if l.strip() and not l.strip().startswith('#')])>500]; print('over', over); raise SystemExit(1 if over else 0)"
    expected: postflight.py key removed; no postflight_*.py key seeded; the printed over list is empty; exit 0.
    fix_if: "A postflight_*.py key was seeded means that module exceeds 500 SLOC; split it finer and re-run. postflight.py key remains means the facade is still over 500; move more out."
  - step: 5
    phase: pre-deploy
    action: CC gate passes -- moved high-CC functions carry the decision-43 waiver header in their new module.
    command: bin/venv-python -c "from scripts.validate import validate_cc_limits; f=[]; validate_cc_limits(f); print('cc', f); raise SystemExit(1 if f else 0)"
    expected: The CC gate reports no failures; exit 0 (postflight_fixers.py has the waiver for _fix_ci_failure CC26; postflight_gates.py for _code_review_gate CC22; facade retains it for finalize CC50).
    fix_if: "A module reddens the CC gate -> add a decision-43 complexity-waiver header within its first 10 lines."
  - step: 6
    phase: pre-deploy
    action: Stale-definition sweep -- no extracted def remains in the facade except finalize.
    command: grep -nE '^def (_git_commit_and_push_with_retry|_get_ci_failure_details|_fix_ci_failure|_fix_code_review_findings|_commits_ahead_of_main|_scope_drift_check|_code_review_gate|_handle_failure|wait_for_ci|_agent_merge_recovery|merge_pr|_safe_merge_origin_main|cleanup_after_merge|_parse_scope_files|_run_verifiers_gate)\b' scripts/executor/postflight.py; test $? -eq 1
    expected: grep finds no matches (exit 1, so the test asserts closure); only finalize + re-exports remain.
    fix_if: "A def still lives in the facade -> move its body to the sibling module and leave only the re-export."
  - step: 7
    phase: pre-deploy
    action: import-linter contracts pass with the verifiers ignore REPLACE pair (state-based assertion, tolerant of sibling plans' .importlinter edits landing first).
    command: bin/venv-python -c "from scripts import import_governance as g; ok,out=g.run_import_contracts(); print(out); raise SystemExit(0 if ok else 1)" && test "$(grep -c 'scripts.executor.postflight_gates -> scripts.verifiers' .importlinter)" = "2" && ! grep -qE 'scripts\.executor\.postflight -> scripts\.verifiers' .importlinter
    expected: All import contracts pass; .importlinter carries the two postflight_gates -> scripts.verifiers[.harness] lines and ZERO stale scripts.executor.postflight -> scripts.verifiers lines (the space after postflight in the regex excludes postflight_gates); exit 0. Asserts THIS plan's file-state contribution only -- sibling executor plans edit other contracts/lines and cannot false-fail this check.
    fix_if: "Contracts fail with an unmatched-ignore error ('No matches for ignored import' naming scripts.executor.postflight -> scripts.verifiers) means the two stale lines were left in place after the move -- DELETE them (import-linter defaults unmatched_ignore_imports_alerting=error); contracts fail naming postflight_gates means the two replacement ignore lines are missing -- ADD them; the stale-line grep matching means the deletion half of the replace pair was skipped."
  - step: 8
    phase: pre-deploy
    action: Fast presubmit tier is green over the change.
    command: bin/venv-python -m scripts.validate --pre
    expected: exit 0.
    fix_if: "A gate reddens -> address per its message; never bypass with --ignore-budget for a real SLOC/CC regression."
constraints:
  - Behaviour preservation is absolute -- no feature work, no bug fixes, no signature changes beyond movement. The existing suites must pass with unchanged assertion semantics. Out-of-scope findings become notes here, never inline fixes.
  - Decision 104/80 facade mechanism, ZERO-MIGRATION variant -- the original path stays a thin facade re-exporting every symbol; moved bodies reference every routed-name (see context inventory) via a function-local _pf facade alias so ALL existing postflight-namespace patches keep intercepting; NO test patch target moves. The grep-closure VP step enforces both directions.
  - Decision 102 -- budgets ratchet DOWN only; re-point exclusively via `validate --update-sloc-budgets`, never a hand-edit; grep-verify key removal + no new seed (do NOT assert full-file equality -- sibling plans co-mutate config/sloc_budgets.yaml on this branch).
  - Decision 43 -- CC<=20 per function; the decision-43 waiver header travels with any moved function over CC 20 (finalize CC50 stays in the facade which keeps its header; postflight_fixers/_gates carry it for _fix_ci_failure CC26 / _code_review_gate CC22).
  - Decision 117 -- executor self-modification boundary -- capabilities.yaml is the SSOT; its boundary_patterns substring scripts/executor/ already classifies every new postflight_*.py module as a boundary file, so config/agent/executor/capabilities.yaml is NOT edited by this plan.
  - Decision 67 -- executor freeze (STRATEGIC clause) -- this is an IMPLEMENTATION plan; behaviour-preserving executor-machinery maintenance is routed through /plan -> /implement, permitted during the freeze.
  - Decision 55 -- no rescue agents or workaround loops. On an unrecoverable equivalence/interception failure, stop and RCA; never paper over a broken mock with a skip.
  - Multi-plan coordination -- one of ~16 SLOC-decomposition plans (4 executor) on branch claude/sloc-violations-refactor-p5svnl; touch ONLY postflight.py, the new postflight_*.py modules, .importlinter (the verifiers-ignore replace pair, delete 2 + add 2), and test import touch-ups; config/sloc_budgets.yaml is regenerated (never hand-edited) and a conflict there is resolved by re-running the regen command.
  - Hermetic VP discipline (fleet rule) -- exactly ONE hermetic step (step 2, a stable invariant true pre- and post-implementation) using the portable PY idiom because CI's pr-validate job has no .venv; all other steps are hermetic false.
  - AGENTS.md code style -- Python 3.12+, type hints, ruff line length 127, no emojis, ASCII hyphens, default no comments.
  - Public-repo boundary (Decision 101) -- no AWS account IDs/ARNs/secrets/internal hostnames introduced.
