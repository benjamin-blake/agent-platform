schema_version: 1
slug: "affected-set-selection"
intent: >-
  Upgrade the fast --pre presubmit tier from an edited-set (test files literally in the diff) to a
  live, per-run affected-set (tests affected by the diff) so a source-only PR and a test broken by a
  change it does not itself contain are caught pre-merge -- hardening the merge path every
  self-improvement change flows through (co-resolves rec-2638).
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-affected-set-selection.yaml
phase: >-
  Platform CI / fast-tier presubmit hardening. AMENDS Decision 73's fast-tier selection mechanism
  (its 2nd amendment, after the PR #334 explicit-paths fix). Not tied to a single tier_item;
  co-resolves rec-2638. Leaves KG.13 (deferred Bazel-style Test-Impact-Analysis + selection/coverage
  caches, gated by T3.11 c5's revisit trigger) undisturbed and still gated; defers the manifest's
  DuckLake table + named-verb registration to T2.36.
scope:
  - file: scripts/checks/deps/affected_tests.py
    action: Create
    purpose: >-
      Live per-run affected-set derivation. Unions FOUR channels over the edited-set, strictly
      additively (selection can only GROW): (1) import-closure reverse-deps via
      scripts/dependency_graph.py; (2) data-edge PRECISE-match channel (generalizes+retires
      select_roadmap_guard_tests) -- scoped to non-.py data artifacts changed in the diff PLUS the
      deleted-.py-bytes Incident-B case, matched by PATH or QUOTED-TOKEN reference (NOT a bare
      substring), so common basenames (config.py, utils.py, __init__.py, base.py) do NOT
      false-positive and inflate the uncapped protected set; (3) map_source_to_test() mirror map;
      (4) conftest-subtree rule. Composition + ~35-module cap + loud defer of the transitive residue
      + exception->edited-set fallback + selection-manifest.json emission. Decompose into
      scripts/checks/deps/ submodules if it would cross 500 SLOC (Decision 128 -- never raise).
  - file: scripts/checks/_common.py
    action: Modify
    purpose: >-
      Add a NEW status-aware diff function (git diff --name-status vs merge-base + git ls-files
      --others --exclude-standard for untracked; deleted paths flow through with D status). This is
      the SOLE home of get_changed_files / shared primitives (Decision 104) -- keep qualified-name
      interception (_common.run/ROOT). Keep get_changed_files()'s existing contract (deleted-path
      filtering) unchanged for its existing callers. Co-resolves rec-2638 (untracked new files
      invisible to --pre selection).
  - file: scripts/dependency_graph.py
    action: Modify
    purpose: >-
      Two soundness patches: (i) parse __init__.py as package nodes so facade re-exports (Decision
      124) don't drop edges; (ii) union string-constant module edges from patch("scripts.x.y")
      targets (AST pass over ast.Constant matching ^(src|scripts)(\.\w+)+). Reverse transitive
      closure for the affected-set is computed via nx.ancestors in affected_tests.py. Keep the stable
      public API (build_graph / roots / reverse_deps / forward_closure / ...).
  - file: scripts/validate.py
    action: Modify
    purpose: >-
      PREFERRED IMPLEMENTATION: inline -- replace the edited-set changed_tests computation in main()'s
      --pre block with a call to the new derivation that FEEDS THE EXISTING pytest_diff scaffold
      (touching NEITHER registry.py NOR the frozen-baseline). Retire select_roadmap_guard_tests
      (function + call site) into the general data-edge channel; wire the manifest emit/print. main()
      is the thin CLI surface (Decision 104).
  - file: scripts/checks/registry.py
    action: Modify
    purpose: >-
      CONDITIONAL / preferred no-op. Only touched if the implementer introduces a NEW pre_sequence
      scaffold/check step instead of the preferred inline path. If so, WS1 owns this file and any
      wiring edit moves in the SAME commit as the tests/test_checks_registry.py floor+scaffold-anchor
      update (canary coupling). With the inline path this entry is a no-op (registry.py untouched).
  - file: scripts/checks/_scaffolding.py
    action: Modify
    purpose: >-
      Batch the currently-serial per-file collect-only pass in
      partition_changed_tests_by_collectability into ONE pytest invocation (~30x saving) to net-fund
      the cap+defer + derivation cost inside the 5-min budget. MUST parse the batched --collect-only
      ERROR blocks PER FILE (attribute each collection error to its own file via the error header
      path), so exactly the uncollectable file(s) defer and the rest still run -- a naive single-batch
      collect that mis-defers the ENTIRE affected-set on one bad file is a near-silent under-run and
      is forbidden. Preserve the existing loud defer idiom (_print_deferred_warning).
  - file: .github/workflows/ci.yml
    action: Modify
    purpose: >-
      Add an actions/upload-artifact step (if: always()) to the pr-validate job to capture
      selection-manifest.json as the PR-context observability capture. Must keep
      validate_ci_workflow_guards green (jobs-and-flags / signal-green needs / fetch-depth /
      concurrency invariants). No AWS creds are added to pr-validate.
  - file: tests/checks/deps/test_affected_tests.py
    action: Create
    purpose: >-
      Regression tests that exercise the REAL selector (not mocks of it) and fail when the relevant
      channel is disabled. Classes: TestImportClosureChannel, TestDataEdgeChannel (Incident A),
      TestDeletedPathDataEdge (Incident B), TestFacadeNodeSoundness, TestPatchStringEdgeSoundness,
      TestAdditiveOnlyInvariant, TestCapAndDefer, TestDataEdgePrecision (common-basename no-over-
      select), TestManifestEmission (keys + per-test provenance/channel), TestS3UploadDegradesGracefully
      (lazy boto3 + loud skip), TestExceptionFallback (edited-set loud fallback), TestManifestNotAnInput
      (selection byte-identical across absent/present/mutated prior manifest). New package dir carries
      __init__.py; self-contained (no cross-test imports), conftest layered per Decision 131.
  - file: tests/test_dependency_graph.py
    action: Modify
    purpose: Tests for the two soundness patches (facade __init__ package nodes; patch-string module edges).
  - file: tests/test_checks_registry.py
    action: Modify
    purpose: >-
      CONDITIONAL / preferred no-op. Only touched if registry.py's pre_sequence gains a new
      scaffold/check step: a new SCAFFOLD step needs a FROZEN_PRE_SCAFFOLDS exact-tuple update
      (a new CHECK passes the membership floor unchanged), and either moves in the SAME commit as the
      registry.py edit. With the preferred inline path this entry is a no-op. This file is also
      _common.py's coverage-checker mapped home (so it may still be touched to cover the new
      status-aware diff fn).
  - file: tests/validate/test_changed_files.py
    action: Modify
    purpose: >-
      Tests for the new status-aware diff function (deletions flow through with D; untracked new
      files visible -- rec-2638) while the existing get_changed_files() deleted-path-dropping tests
      stay green (contract preserved).
  - file: tests/validate/test_pytest_diff.py
    action: Modify
    purpose: Test that the collect-only partition runs as a single batched pytest invocation.
  - file: tests/validate/test_tiers.py
    action: Modify
    purpose: >-
      Remove/adapt the retired select_roadmap_guard_tests tests; add a subsumption proof that a
      roadmap-YAML change still selects the roadmap-guard tests via the general data-edge channel.
bundled_recommendations:
  - rec-2638
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    A source-only diff (no test file edited) that changes a module selects that module's
    reverse-dependency test modules in --pre via the import-closure channel, proven by exercising the
    real selector (not a mock of it).
  - >-
    Incident A: a YAML entry-count change selects the test that READS that YAML (data-edge channel);
    the selection drops it when the data-edge channel is disabled (channel has teeth).
  - >-
    Incident B: a deleted test file selects the meta-test that READS its bytes (data-edge channel
    over deleted paths, made visible by the status-aware diff's D-status entries).
  - >-
    A facade-only (__init__.py re-export, Decision 124) import selects its dependents (dependency_graph
    __init__ package-node soundness patch).
  - >-
    A patch("scripts.x.y")-string-only dependency selects the target module's tests (dependency_graph
    string-constant module-edge soundness patch).
  - >-
    Additive-only invariant: for any diff, affected-selection is a superset of the edited-set,
    including under cap/overflow -- an edited-set member (and direct reverse-deps + data-edge hits) is
    never deferred; only the transitive residue is deferred.
  - >-
    Untracked new files are visible to the status-aware diff / --pre selection (rec-2638
    co-resolution), while get_changed_files()'s existing deleted-path-dropping contract is unchanged
    for its existing callers.
  - >-
    select_roadmap_guard_tests is removed (function + call site) and its behavior is subsumed by the
    general data-edge channel: a roadmap-YAML change still selects the roadmap-guard tests.
  - >-
    Data-edge precision: the channel matches by PATH or QUOTED-TOKEN reference (not bare substring)
    and is scoped to non-.py data artifacts + the deleted-.py-bytes Incident-B case, so a change to a
    common basename (config.py, utils.py, __init__.py) does NOT over-select every test that merely
    mentions that word; the uncapped protected set stays bounded and the whole-tests/ scan cost is
    counted in the fast-tier budget.
  - >-
    A per-run selection-manifest.json is emitted (sha, status-aware diff, per-test provenance/channel,
    selected/capped/deferred, timings) to a gitignored path, printed in the CI log, and uploaded as a
    GitHub Actions artifact; the aws s3 cp path lazy-imports boto3 and degrades gracefully (loud skip)
    when creds/boto3 are absent (the no-creds fast tier); the manifest is NEVER a selection input.
  - >-
    The collect-only partition in partition_changed_tests_by_collectability runs as a single batched
    pytest invocation that attributes collection errors PER FILE: a mixed batch (one uncollectable +
    several runnable) defers ONLY the uncollectable file and runs the rest -- never mis-defers the
    whole affected-set on one bad file.
  - >-
    The manifest surface is verified: emission with per-test provenance/channel content; best-effort
    S3 upload that lazy-imports boto3 and LOUD-skips (not silent) when creds/boto3 absent; the
    exception->edited-set LOUD fallback; and the MANIFEST-NOT-AN-INPUT invariance (selection is
    byte-identical whether a prior manifest is absent or mutated -- proves the cacheless/no-drift
    property structurally, not by comment).
  - >-
    bin/venv-python -m scripts.validate --pre passes green within the 5-minute fast-tier budget;
    every touched source file stays <= 500 SLOC (decompose, never raise -- Decision 128 / 130). IF
    (and only if) the implementer adds a new pre_sequence scaffold/check step instead of the preferred
    inline path, the registry.py wiring + the tests/test_checks_registry.py floor/scaffold-anchor
    update + any docs move in the SAME commit (canary coupling).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      Import-closure channel: a source-only diff changing a module selects that module's
      reverse-dependency test modules via the real selector.
    command: bin/venv-python -m pytest tests/checks/deps/test_affected_tests.py::TestImportClosureChannel -v
    expected: Test passes; a source-only change selects the reverse-dep test module (no test file was edited).
    fix_if: >-
      The import-closure channel does not walk nx.ancestors from the changed module to its test
      modules, or the source-only case selects nothing.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Exercised by TestImportClosureChannel as a standing pytest regression in the full post-merge
      tier; graduating a per-scenario selector into the verification-checks kernel duplicates the
      suite-level guard without adding independent signal.
  - step: 2
    phase: pre-deploy
    action: >-
      Incident A (data-edge): a YAML entry-count change selects the test that reads that YAML, and
      DISABLING the data-edge channel drops it (channel has teeth).
    command: bin/venv-python -m pytest tests/checks/deps/test_affected_tests.py::TestDataEdgeChannel -v
    expected: Both the positive (selected) and channel-disabled (dropped) assertions pass.
    fix_if: The data-edge basename alternation does not match the YAML basename inside the reading test, or the disabled-channel case still selects it.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Standing pytest regression (TestDataEdgeChannel) in the full tier; the data-edge property is a
      pure-function grep over a constructed fixture repo with no live-state seam a kernel primitive
      would capture better than the test.
  - step: 3
    phase: pre-deploy
    action: >-
      Incident B (deleted-path data-edge): a deleted test file selects the meta-test that reads its
      bytes, via the status-aware diff's D-status entries.
    command: bin/venv-python -m pytest tests/checks/deps/test_affected_tests.py::TestDeletedPathDataEdge -v
    expected: Test passes; the deleted path (D status) still flows through and its basename selects the meta-test that reads it.
    fix_if: The status-aware diff drops deleted paths, or the data-edge channel is not fed the deleted basenames.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: Standing pytest regression (TestDeletedPathDataEdge) in the full tier; duplicating it as a kernel check adds no independent signal.
  - step: 4
    phase: pre-deploy
    action: Facade __init__ soundness patch -- a facade-only (__init__.py re-export) import selects its dependents.
    command: bin/venv-python -m pytest tests/checks/deps/test_affected_tests.py::TestFacadeNodeSoundness -v
    expected: Test passes; edges through the package (__init__) node are not dropped, so dependents of a facade re-export are selected.
    fix_if: dependency_graph.build_graph still skips __init__.py (no package node), so facade re-export edges are missing.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: Standing pytest regression (TestFacadeNodeSoundness); the graph-soundness property is covered by the suite, not better captured by a kernel primitive.
  - step: 5
    phase: pre-deploy
    action: patch-string soundness patch -- a patch("scripts.x.y")-string-only dependency selects the target module's tests.
    command: bin/venv-python -m pytest tests/checks/deps/test_affected_tests.py::TestPatchStringEdgeSoundness -v
    expected: Test passes; the string-constant module edge is unioned into the graph and the target's tests are selected.
    fix_if: The AST pass over ast.Constant does not match ^(src|scripts)(\.\w+)+ patch targets, so the string edge is missing.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: Standing pytest regression (TestPatchStringEdgeSoundness); duplicating in the kernel adds no independent signal.
  - step: 6
    phase: pre-deploy
    action: >-
      Additive-only invariant -- affected-selection is a superset of the edited-set for any diff,
      including under cap/overflow (edited-set + direct reverse-deps + data-edge hits are never
      deferred).
    command: bin/venv-python -m pytest tests/checks/deps/test_affected_tests.py::TestAdditiveOnlyInvariant tests/checks/deps/test_affected_tests.py::TestCapAndDefer -v
    expected: Both classes pass; selection always contains the edited-set, and overflow defers only the transitive residue.
    fix_if: A cap/overflow path defers an edited-set member (or a direct reverse-dep / data-edge hit), violating the additive-only invariant.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      The additive-only invariant is exercised by TestAdditiveOnlyInvariant/TestCapAndDefer as a
      standing pytest regression in the full tier; it is a pure-function property over the selector
      with no live-state or wall-clock seam, so a verification-checks kernel test_selector row would
      re-run the same pytest without independent signal.
  - step: 7
    phase: pre-deploy
    action: >-
      rec-2638 co-resolution -- untracked new files are visible to the status-aware diff; the
      existing get_changed_files() deleted-path-dropping contract is unchanged.
    command: bin/venv-python -m pytest tests/validate/test_changed_files.py -v
    expected: >-
      All tests pass: the new status-aware diff surfaces untracked (git ls-files --others) and
      deleted (D-status) paths; the pre-existing get_changed_files() tests (drops deleted paths) stay
      green.
    fix_if: The status-aware diff omits untracked paths, or the change regressed get_changed_files()'s existing contract.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: Standing pytest regression (test_changed_files.py) in the full tier; the diff-manifest behavior is suite-covered.
  - step: 8
    phase: pre-deploy
    action: select_roadmap_guard_tests retirement -- the special-case function is removed from scripts/.
    command: bash -c '! grep -rn "def select_roadmap_guard_tests" scripts/'
    expected: grep finds no definition of select_roadmap_guard_tests anywhere under scripts/ (exit 0).
    fix_if: The special-case function still exists; it was not generalized into the data-edge channel and removed.
    hermetic: false
    graduation: graduate
    graduation_check_id: "select-roadmap-guard-tests-retired"
  - step: 9
    phase: pre-deploy
    action: Subsumption proof -- a roadmap-YAML change still selects the roadmap-guard tests via the general data-edge channel.
    command: bin/venv-python -m pytest tests/validate/test_tiers.py::TestRoadmapGuardSubsumption -v
    expected: Test passes; changing a roadmap YAML selects the tests that reference its basename, via the general channel (not the retired special case).
    fix_if: The data-edge channel does not reproduce the roadmap-guard selection the retired function provided.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: Standing pytest regression (TestRoadmapGuardSubsumption); the subsumption equivalence is suite-covered, not a kernel primitive.
  - step: 10
    phase: pre-deploy
    action: >-
      Data-edge PRECISION -- a change to a common basename (e.g. config.py / utils.py / __init__.py)
      does NOT over-select every test that merely mentions that word; only precise path/quoted-token
      references select.
    command: bin/venv-python -m pytest tests/checks/deps/test_affected_tests.py::TestDataEdgePrecision -v
    expected: Test passes; a common-basename change selects only tests with a precise path/quoted-token reference, not bare-substring mentions -- the uncapped protected set stays bounded.
    fix_if: The data-edge channel matches bare substrings, so a common basename inflates the protected set (and can blow the 5-min budget with no cap relief).
    hermetic: false
    graduation: waive
    graduation_waiver_reason: Standing pytest regression (TestDataEdgePrecision); the precise-match property is a pure-function grep over a fixture repo, suite-covered with no independent kernel signal.
  - step: 11
    phase: pre-deploy
    action: >-
      Batched collect-only with PER-FILE attribution -- a MIXED batch (one uncollectable file +
      several runnable) defers ONLY the uncollectable one and runs the rest (not one collect-only
      subprocess per file, and NOT a whole-batch mis-defer on one bad file).
    command: bin/venv-python -m pytest tests/validate/test_pytest_diff.py -v
    expected: Tests pass, including a mixed-batch case where exactly the one uncollectable file defers and the several runnable files still run under a single batched collect-only invocation.
    fix_if: The batch mis-defers the entire affected-set on one uncollectable file (near-silent under-run), or reverts to one collect-only subprocess per file.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: Standing pytest regression (test_pytest_diff.py); the per-file attribution + batching behavior is suite-covered.
  - step: 12
    phase: pre-deploy
    action: >-
      Manifest emission + content -- selection-manifest.json is produced with the required keys (sha,
      status-aware diff, per-test provenance/channel, selected/capped/deferred, timings) and each
      selected test carries a correct channel/provenance tag.
    command: bin/venv-python -m pytest tests/checks/deps/test_affected_tests.py::TestManifestEmission -v
    expected: Test passes; the manifest dict has all required keys and per-test provenance matches the channel that selected each test.
    fix_if: The manifest is missing keys, or per-test provenance is absent/wrong (cannot attribute an escape to a channel).
    hermetic: false
    graduation: waive
    graduation_waiver_reason: Standing pytest regression (TestManifestEmission); the manifest schema/content is suite-covered, no independent kernel signal.
  - step: 13
    phase: pre-deploy
    action: >-
      S3 best-effort graceful degrade -- with boto3/creds absent, the upload lazy-imports boto3 and
      prints a LOUD skip (never silent, never raising), and never counts against the budget.
    command: bin/venv-python -m pytest tests/checks/deps/test_affected_tests.py::TestS3UploadDegradesGracefully -v
    expected: Test passes; when boto3 import or creds resolution fails, the function prints a loud skip and returns without raising (Decision 55 no-silent-skip).
    fix_if: The upload raises (breaks --pre in the no-creds fast tier), or skips silently with no printed warning.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: Standing pytest regression (TestS3UploadDegradesGracefully); the degrade path is suite-covered.
  - step: 14
    phase: pre-deploy
    action: >-
      Exception -> edited-set LOUD fallback -- when the derivation raises internally, the selector
      falls back to the edited-set and prints a loud warning, never silently shrinking below it.
    command: bin/venv-python -m pytest tests/checks/deps/test_affected_tests.py::TestExceptionFallback -v
    expected: Test passes; an injected derivation exception yields a selection >= the edited-set with a loud printed fallback warning.
    fix_if: A derivation exception silently shrinks the selection (below the edited-set) or is swallowed without a warning.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: Standing pytest regression (TestExceptionFallback); the fail-loud fallback is suite-covered.
  - step: 15
    phase: pre-deploy
    action: >-
      MANIFEST-NOT-AN-INPUT invariance -- the derivation output is byte-identical whether a prior
      selection-manifest.json is ABSENT, present, or deliberately MUTATED; the manifest never feeds
      selection (proves the cacheless/no-drift property structurally, not by comment).
    command: bin/venv-python -m pytest tests/checks/deps/test_affected_tests.py::TestManifestNotAnInput -v
    expected: Test passes; selection for a fixed diff is identical across absent / present / mutated prior-manifest states.
    fix_if: The selection changes when a prior manifest is present or mutated -- the manifest is being read as an input (drift/cache violation).
    hermetic: false
    graduation: waive
    graduation_waiver_reason: Standing pytest regression (TestManifestNotAnInput); the no-input invariance is suite-covered, no independent kernel signal.
  - step: 16
    phase: pre-deploy
    action: >-
      Registry/canary coupling OR inline no-op -- either registry.py + the frozen-baseline stay green
      after a same-commit scaffold/check wiring, OR (preferred inline path) both are untouched.
    command: bin/venv-python -m pytest tests/test_checks_registry.py -v
    expected: All tests pass; REQUIRED_PRE_CHECKS floor + FROZEN_PRE_SCAFFOLDS order hold (untouched under the inline path; consistently updated if a new step was wired in the same commit).
    fix_if: A new scaffold/check step was wired without the same-commit floor/scaffold-anchor update, perturbing the baseline.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Standing registry regression (test_checks_registry.py) that runs in the full post-merge tier;
      it is a suite-level structural guard over the check registry with no per-change verification
      seam a kernel primitive would capture, and under the preferred inline path it is a pure no-op
      assertion -- graduating it adds no independent signal.
  - step: 17
    phase: pre-deploy
    action: >-
      End-to-end + net-budget proof -- the full fast tier runs green within the 5-min budget with live
      affected-set selection active (batched collect-only net-funds the added derivation cost).
    command: bin/venv-python -m scripts.validate --pre
    expected: "Validation Summary (scope: pre): All checks passed; elapsed under the 5-minute fast-tier budget (no budget-breach rec filed)."
    fix_if: The derivation errors (should fall back to edited-set loudly, never silently shrink), reds a check, or blows the budget (the batched collect-only saving did not net-fund the derivation).
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      This is an end-to-end budget/meta-run of the whole fast tier (invokes validate --pre), not a
      single kernel-primitive command; graduating it would recurse into the check sequence it runs.
      It is the plan's integration proof, not a graduatable standing check.
  - step: 18
    phase: post-deploy
    action: >-
      rec-2638 closure -- after the feat PR merges with a `Resolves: rec-2638` trailer, rec-autoclose
      closes the rec; confirm it via the operator cache-rebuild + read.
    command: 'bin/venv-python -m scripts.sync.ops sync && bin/venv-python -c "import json,pathlib; rows=[json.loads(l) for l in pathlib.Path(''logs/.recommendations-log.jsonl'').read_text().splitlines() if l.strip()]; r=next((x for x in rows if x.get(''id'')==''rec-2638''), None); assert r and r.get(''status'')==''closed'', (r or {}).get(''status''); print(''rec-2638 closed'')"'
    expected: Prints `rec-2638 closed`; the read cache (rebuilt from the DuckLake reader) shows rec-2638 status=closed. Behavioral co-resolution itself is covered pre-merge by VP step 7.
    fix_if: rec-2638 is still open post-merge -- the Resolves trailer was omitted from the squash-merge body (fallback closure via ops_data_portal --update-rec rec-2638 --status closed).
constraints:
  - No SLOC budget raises -- decompose past-budget files into a scripts/checks/deps/ facade package (Decision 128 / 80 / 104 / 124); never raise config/sloc_budgets.yaml. New + modified tests/ files are whole-repo scanned (Decision 130).
  - Never add a check to .github/workflows/ci.yml without adding it to validate.py / the checks registry first (validate.py is the single source of truth). The ci.yml edit here is an artifact-upload STEP, not a check; it must keep validate_ci_workflow_guards green.
  - No direct writes to logs/*.jsonl -- ops portal only (Single Portal Invariant, Decision 84).
  - No terraform apply; no .tf files in scope; no edits on main.
  - The selection-manifest.json is an OUTPUT/observability artifact ONLY -- NEVER a selection input. The derivation always recomputes live (no persisted selection cache, no coverage cache), preserving the no-drift property.
  - Selection is STRICTLY ADDITIVE over the edited-set -- it can only GROW, never shrink. On derivation exception, fall back to edited-set and print loudly; never silently shrink (Decision 55).
  - S3 upload stays best-effort/async so it never counts against the 5-min budget assertion (Decision 73); it degrades to a loud skip (lazy boto3) in the no-creds fast tier -- never silent (Decision 55).
  - No rescue agents or workaround loops (Decision 55); on an unrecoverable failure, stop and RCA.
