schema_version: 1
slug: sloc-ducklake-runtime-smoke-tests
intent: >-
  Decompose the two remaining ducklake test-home monoliths in ONE PR -- tests/test_ducklake_runtime.py
  (991 SLOC, MIRROR pattern) into per-source-module mirror modules under tests/common/, and
  tests/test_ducklake_neon_smoke_test.py (1110 SLOC, CONCERN-SPLIT pattern, already seeded) into a
  tests/ducklake_neon_smoke_test/ package -- then retire BOTH grandfather homes and delete BOTH
  config/sloc_budgets.yaml entries. rec-2709 Wave 7 of the Decision 131 mirror-convention rollout that
  keeps files small enough for lower-tier model comprehension (the load-bearing purpose of the
  500-SLOC gate, Decision 128).
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-sloc-ducklake-runtime-smoke-tests.yaml
phase: >-
  rec-2709 Wave 7 (Decision 131 mirror convention, amends Decision 104); SLOC governance /
  model-portability (Decision 128). Behavior-preserving pure test MOVE of the two ducklake test homes.
  No product-roadmap phase; platform tooling only.
scope:
  # ---- FILE 1: test_ducklake_runtime.py -> tests/common/ mirror modules ----
  - file: tests/common/__init__.py
    action: Create
    purpose: >-
      Package marker for the new tests/common/ mirror tree (prepend import mode; mirror convention).
      Empty file. tests/common/ does not exist yet -- this wave creates it. No package conftest is
      needed (test_ducklake_runtime.py defines NO custom pytest fixtures -- only monkeypatch/tmp_path/
      capsys builtins; the root tests/conftest.py global guards merge up the tree).
  - file: tests/fixtures/ducklake_fakes.py
    action: Create
    purpose: >-
      Home for the two CROSS-BUCKET shared helpers of the runtime suite: the FakeCon connection double
      (used by all five buckets) and the _SEMANTICS dict (used by writes + runtime buckets). tests/fixtures/
      is an importable package exempt from the no-cross-test-import guard (names never start with test_).
      FakeCon references rt.SMOKE_HISTORY_TABLE/SMOKE_CURRENT_TABLE, so this module imports
      `from src.common import ducklake_runtime as rt`. Consumers import with an alias where needed to keep
      bodies byte-identical. FileOpsCon (writes-only), NamedReadCon (reads-only), _DSN + _patch_duckdb
      (runtime-only) and _APPEND_ONLY_RT_SEMANTICS (writes-only) are SINGLE-CONSUMER and move WITH their
      bucket module, NOT hoisted (Wave 1/3 single-consumer precedent).
  - file: tests/common/test_ducklake_writes.py
    action: Create
    purpose: >-
      MIRROR for src/common/ducklake_writes.py. Verbatim move of every test whose primary symbol is
      writes-owned: mint_write_identity (2), is_occ_collision/_occ_backoff (2), write_scd2 core +
      derivation/idempotency/OCC (12), _safe_rollback/_emit_write_metrics (2), write_scd2 table-param
      require_exists / status-transition (8), file_scd2 / bootstrap_entity_counter / _advance_entity_counter
      (16, incl the FileOpsCon class moved in here), churn budget constants (1, CHURN_* live in
      ducklake_writes), and the append_only write_scd2 tests (4) with the _APPEND_ONLY_RT_SEMANTICS dict
      (writes-single-consumer, moved in here). ~440 SLOC after header -- under 500 (largest mirror file;
      see OPEN RISK 1 for the sibling-split fallback if the real header pushes it over). Fresh import
      header; pytestmark = pytest.mark.unit replicated; FakeCon + _SEMANTICS imported from the fixture.
  - file: tests/common/test_ducklake_tables.py
    action: Create
    purpose: >-
      MIRROR for src/common/ducklake_tables.py (create_scd2_tables, reconcile_table_columns): the two
      create_scd2_tables partition/force-recreate tests, the ops-DDL-real-types test, the two append_only
      create_scd2_tables tests, and reconcile_table_columns append_only. ~68 SLOC. FakeCon +
      _APPEND_ONLY_RT_SEMANTICS -- note _APPEND_ONLY lives in test_ducklake_writes.py (single-consumer);
      the append_only tables tests here do NOT pass semantics (they call create_scd2_tables(con,
      table="ops_smoke_events") with no semantics arg), so tables needs only FakeCon from the fixture.
      pytestmark replicated.
  - file: tests/common/test_ducklake_reads.py
    action: Create
    purpose: >-
      MIRROR for src/common/ducklake_reads.py (read_current, read_history, assert_read_only_sql,
      named_read, query_current): read_current all/by-rec-id/limit (3), the ops-table read_current /
      read_history / query_current (3), the assert_read_only_sql SELECT-allow + writes-reject
      (parametrized) + multistatement + query_current-enforces (4), named_read registry / unknown-verb /
      param-mismatch / select-only (4), read_current unknown-filter-column + binds-named-column (2, with
      the NamedReadCon class moved in here -- reads-single-consumer), and the two append_only read_current/
      query_current raises (2). ~157 SLOC. FakeCon from the fixture. pytestmark replicated.
  - file: tests/common/test_ducklake_metrics.py
    action: Create
    purpose: >-
      MIRROR for src/common/ducklake_metrics.py (emit_metric, make_metric_sink): the four
      emit_metric / make_metric_sink tests (injected client, swallows client error, boto3 path, sink
      units). ~53 SLOC. No FakeCon needed (these use their own inline _CW doubles). pytestmark replicated.
  - file: tests/common/test_ducklake_runtime.py
    action: Create
    purpose: >-
      MIRROR for src/common/ducklake_runtime.py (the facade). Carries the genuine runtime-owned tests
      (assert_duckdb_version 3, fetch_dsn/libpq_conninfo 5, open_connection 5 with the _patch_duckdb
      helper + _DSN dict, both runtime-single-consumer) AND the facade RE-EXPORT tests that exercise
      symbols owned by ducklake_scd2_schema but surfaced through rt.* (field-semantics 4, schema_gate
      loud-fail 8, resolve_table_spec / schema_gate-ops / _PY_TYPE_FOR_SQL / _build_merge_* /
      ops_table_names 13, and the split-invariant byte-identical / re-export-identity / no-import-cycle
      tests 6). scd2_schema keeps its own dedicated tests/test_ducklake_scd2_schema.py and is NOT in
      scope; these facade tests belong with the runtime re-export surface. ~278 SLOC. FakeCon + _SEMANTICS
      from the fixture; pytestmark replicated.
  - file: tests/test_ducklake_runtime.py
    action: Delete
    purpose: >-
      Fully decomposed into the five tests/common/test_ducklake_*.py mirror modules. Deleted in the FINAL
      commit only, atomically with the retire-line deletion + budget-line deletion + oracle update.
  # ---- FILE 2: test_ducklake_neon_smoke_test.py -> tests/ducklake_neon_smoke_test/ concern-split ----
  - file: tests/ducklake_neon_smoke_test/__init__.py
    action: Create
    purpose: >-
      Package marker for the concern-split (prepend import mode; mirror convention). Empty file. No
      package conftest is needed (the smoke suite defines NO custom pytest fixtures -- only monkeypatch/
      capsys builtins; the root tests/conftest.py global recursion/socket guards merge up the tree).
  - file: tests/fixtures/ducklake_smoke_fakes.py
    action: Create
    purpose: >-
      Home for the smoke suite's three CROSS-CONCERN shared helpers: the smoke FakeCon (records executed
      SQL; used by core open_attached + direct_gates attach/single-writer/probe tests), the _Resp HTTP
      response double (used by core url-invoke + every lambda-gate concern + canary), and the _DSN dict
      (used by core + direct_gates). These are DISTINCT from tests/fixtures/ducklake_fakes.py's runtime
      FakeCon/_DSN (different signatures) -- keep a separate smoke fixtures module so bodies stay verbatim.
      Single-concern helpers (_completed, _stub_churn_gate_prelude, _patch_gate, _churn_single_body,
      _patch_fanout_churn, _warm_reuse_invoker, _stub_canary_rehearsal, _stub_invoke_response, the
      _FAKE_BRANCH_* / _FAKE_PROJECT_ID canary constants) move WITH their concern module, NOT hoisted.
  - file: tests/ducklake_neon_smoke_test/test_core.py
    action: Create
    purpose: >-
      CONCERN: scripts/ducklake_smoke/core.py -- fetch_dsn (2), _libpq_conninfo/_dsn_uri (3),
      _open_attached (2), and the lambda-invoke PRIMITIVES also owned by core (_function_url,
      _sigv4_invoke, _ok_json: 6). ~147 SLOC. FakeCon + _Resp + _DSN from the smoke fixture. Verbatim.
  - file: tests/ducklake_neon_smoke_test/test_direct_gates.py
    action: Create
    purpose: >-
      CONCERN: scripts/ducklake_smoke/direct_gates.py -- attach_roundtrip (2), OCC classification +
      _single_writer_commit (4), _run_churn_burst + _p95 + _evaluate_churn (6), churn_gate (3, with the
      _stub_churn_gate_prelude helper moved in here), _engine_tag/_run (3, with the _completed helper),
      pg_dump/restore wrappers (4), probe write/verify + _derive_scratch_dsn (4), restore_drill (3), and
      the DUCKLAKE_ALLOW_DIRECT_GATE guard tests for churn_gate + restore_drill (4). ~241 SLOC (largest
      concern module -- comfortable margin under 500). FakeCon + _DSN from the fixture. Verbatim.
  - file: tests/ducklake_neon_smoke_test/test_lambda_ec_gates.py
    action: Create
    purpose: >-
      CONCERN: scripts/ducklake_smoke/lambda_ec_gates.py -- lambda_attach/ingress/idempotency/partition/
      inlining/loudfail gates (12, with the _patch_gate helper), the lambda_churn fan-out cohort (with
      _churn_single_body + _patch_fanout_churn helpers, 7 tests) incl test_churn_constants_imported_from_runtime,
      and lambda_churn_incontainer (2). ~208 SLOC. _Resp from the fixture. Verbatim.
  - file: tests/ducklake_neon_smoke_test/test_lambda_ops_gates.py
    action: Create
    purpose: >-
      CONCERN: scripts/ducklake_smoke/lambda_ops_gates.py -- lambda_reader (2), lambda_warm_reuse /
      lambda_warm_reuse_writer (3, with the _warm_reuse_invoker helper), ops_read_your_write (2),
      ops_churn_regate (1), catalog_restore_drill (2). ~133 SLOC. _Resp from the fixture. Verbatim.
  - file: tests/ducklake_neon_smoke_test/test_lambda_maintenance_gates.py
    action: Create
    purpose: >-
      CONCERN: scripts/ducklake_smoke/lambda_maintenance_gates.py -- the four lambda_maintenance_merge
      gate tests (ok / empty-catalog / files-grew-fail / not-ok-fail). ~54 SLOC. _Resp from the fixture.
      Verbatim.
  - file: tests/ducklake_neon_smoke_test/test_canary.py
    action: Create
    purpose: >-
      CONCERN: scripts/ducklake_smoke/canary.py -- canary_rehearsal orchestration (11 tests, with the
      _stub_canary_rehearsal helper + the _FAKE_BRANCH_ID/_FAKE_BRANCH_HOST/_FAKE_PROJECT_ID module
      constants), _lambda_invoke_cli (3, with the _stub_invoke_response helper), and _wait_function_active
      (2). ~254 SLOC. _Resp from the fixture. Verbatim.
  - file: tests/ducklake_neon_smoke_test/test_main_dispatch.py
    action: Create
    purpose: >-
      CONCERN: the facade CLI main() dispatch -- all nine test_main_* tests (direct-gate dispatch,
      churn-incontainer dispatch, lambda-attach dispatch, lambda-gate loud-fail, canary dispatch). main()
      is defined in the facade scripts/ducklake_neon_smoke_test.py itself. ~58 SLOC. Verbatim.
  - file: tests/ducklake_neon_smoke_test/test_facade.py
    action: Create
    purpose: >-
      CONCERN: facade completeness + Decision-104 module-object interception --
      test_facade_reexports_identity_equal_to_owning_submodule (with the _PACKAGE_SUBMODULES tuple) plus
      the five interception tests (core._sigv4_invoke through the ec/maintenance/ops/canary families and
      lambda_ec_gates.lambda_churn via ops_churn_regate). ~92 SLOC. Imports all six ducklake_smoke
      submodules. Verbatim. SEE OPEN RISK 2: the facade-completeness test scans `__file__` for smoke.<name>
      refs; post-move it scans only test_facade.py (narrower set) -- still green, coverage flagged.
  - file: tests/test_ducklake_neon_smoke_test.py
    action: Delete
    purpose: >-
      Fully decomposed into the tests/ducklake_neon_smoke_test/ concern-split package. Deleted in the
      FINAL commit only, atomically with the map flip + budget-line deletion + oracle update.
  # ---- THE SHARED FLIP (final commit) ----
  - file: scripts/test_coverage_checker.py
    action: Modify
    purpose: >-
      THE FLIP (final commit): delete BOTH lines "test_ducklake_runtime.py" and
      "test_ducklake_neon_smoke_test.py" from _RETIRING_GRANDFATHER_HOMES. CRUX (FILE 1): KEEP
      _DUCKLAKE_RUNTIME_SPLIT_MODULES and its special-case branch UNCHANGED -- do NOT remove it. Removing
      it would route src/common/ducklake_{writes,tables,reads,metrics}.py to grandfather home
      test_ducklake_{stem}.py, which is NOT in _ALL_MIRROR_TARGET_HOMES, so the mirror branch would never
      fire and they would wrongly resolve to the FLAT tests/test_ducklake_writes.py instead of the mirror
      tests/common/test_ducklake_writes.py. Keeping the special-case (exactly the Wave 1 scripts/checks/**
      precedent) means: once test_ducklake_runtime.py is deleted from _RETIRING, the four modules'
      grandfather home (test_ducklake_runtime.py, still in the frozen roster) drives the mirror rule ->
      _mirror_source_to_test drops src, keeps common, non-concern-split -> tests/common/test_ducklake_*.py.
      NO _CONCERN_SPLIT_TEST_PACKAGES edit for FILE 2 -- "scripts/ducklake_neon_smoke_test.py" is ALREADY
      seeded there, so its retire-line deletion alone resolves it to the tests/ducklake_neon_smoke_test/
      package dir. Do NOT touch _ALL_MIRROR_TARGET_HOMES (frozen 24). Optionally update the
      _DUCKLAKE_RUNTIME_SPLIT_MODULES doc comment to note the post-Wave-7 mirror behaviour (doc-only,
      mirrors Wave 1's comment updates).
  - file: config/sloc_budgets.yaml
    action: Modify
    purpose: >-
      Delete ONLY the two lines "tests/test_ducklake_neon_smoke_test.py: 1110 ..." and
      "tests/test_ducklake_runtime.py: 991 ..." by hand. NEVER run --update-sloc-budgets (it strips the
      dec-130 markers on the other retiring entries and could re-seed the new modules). HARD invariant:
      this file loses exactly those two lines and nothing else.
  - file: tests/test_coverage_checker.py
    action: Modify
    purpose: >-
      Update the map_source_to_test / retiring-table oracle to the post-Wave-7 state (SIX homes retired).
      (a) test_maps_ducklake_runtime_split_modules_to_test_ducklake_runtime (parametrized over the four
      split stems): change the expected from ROOT/tests/test_ducklake_runtime.py to
      ROOT/tests/common/test_ducklake_{stem}.py and update the docstring/method name to
      "...resolve_to_their_common_mirror" -- THIS is the assertion that proves the crux (special-case kept
      + retirement drives the mirror). (b) test_representative_paths_resolve_under_current_retirement_state:
      ADD cases src/common/ducklake_writes.py -> tests/common/test_ducklake_writes.py,
      src/common/ducklake_runtime.py -> tests/common/test_ducklake_runtime.py, and
      scripts/ducklake_neon_smoke_test.py -> tests/ducklake_neon_smoke_test (package dir); KEEP the
      scripts/executor/step_runner.py -> None and scripts/ops_portal/cli.py -> None Decision-124 regression
      cases; update the docstring to "six homes retired". (c) test_retiring_is_all_target_homes_minus_four_retired_waves:
      rename to ...minus_six_retired_waves, add "test_ducklake_runtime.py" + "test_ducklake_neon_smoke_test.py"
      to the `retired` set, add the two "not in _RETIRING_GRANDFATHER_HOMES" asserts, keep the
      test_session_postflight.py-still-grandfathered control, update the docstring. (d) LEAVE
      test_roster_is_the_24_known_basenames UNCHANGED (frozen roster already contains both names).
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    Per-file test-id preservation: the union of class::function pytest node ids collected from
    tests/common/ (module path stripped) equals the pre-move union from origin/main's
    tests/test_ducklake_runtime.py; AND the union from tests/ducklake_neon_smoke_test/ equals the pre-move
    union from origin/main's tests/test_ducklake_neon_smoke_test.py. Both diffs are EMPTY (no class > 500
    exists in either file, so there is NO sanctioned class-qualifier rename this wave). Same function set,
    same count, same pass/skip outcomes. The two baselines are captured and diffed SEPARATELY (the smoke
    and runtime suites share function names like test_fetch_dsn_success -- they must not be cross-compared).
  - >-
    Every new test module under tests/common/ and tests/ducklake_neon_smoke_test/ is < 500 SLOC
    (validate_sloc_limits counting: non-blank, non-comment) and < 20 CC per function; no
    config/sloc_budgets.yaml entry is added for any of them.
  - "bin/venv-python -m scripts.validate --pre exits 0 (SLOC gate green; no-cross-test-import guard green; collectability green)."
  - >-
    bin/venv-python -m pytest tests/common -q and bin/venv-python -m pytest tests/ducklake_neon_smoke_test -q
    each collect/pass the same number of tests as their respective origin/main monolith.
  - >-
    git diff origin/main -- config/sloc_budgets.yaml shows EXACTLY the two lines removed
    (tests/test_ducklake_runtime.py: 991 and tests/test_ducklake_neon_smoke_test.py: 1110); every other
    entry and its dec-130 marker is byte-identical.
  - >-
    map_source_to_test oracle (asserted by the updated tests/test_coverage_checker.py): each
    src/common/ducklake_{writes,tables,reads,metrics}.py -> tests/common/test_ducklake_{stem}.py;
    src/common/ducklake_runtime.py -> tests/common/test_ducklake_runtime.py;
    scripts/ducklake_neon_smoke_test.py -> tests/ducklake_neon_smoke_test (package dir);
    scripts/executor/step_runner.py -> None and scripts/ops_portal/cli.py -> None (Decision 124 preserved).
    _RETIRING_GRANDFATHER_HOMES no longer contains either "test_ducklake_runtime.py" or
    "test_ducklake_neon_smoke_test.py"; _ALL_MIRROR_TARGET_HOMES (frozen 24) is unchanged;
    _DUCKLAKE_RUNTIME_SPLIT_MODULES is unchanged; "scripts/ducklake_neon_smoke_test.py" stays in
    _CONCERN_SPLIT_TEST_PACKAGES.
  - >-
    check_test_file_exists returns True for both retired sources: src/common/ducklake_writes.py finds
    tests/common/test_ducklake_writes.py, and scripts/ducklake_neon_smoke_test.py finds the
    tests/ducklake_neon_smoke_test package (>= 1 test_*.py + __init__.py); both monoliths are gone.
verification_plan:
  - step: 1
    phase: pre-deploy
    graduation: not-applicable
    action: Capture the BEFORE runtime id baseline from the monolith (module path stripped).
    command: >-
      bin/venv-python -m pytest tests/test_ducklake_runtime.py --collect-only -q | grep '::'
      | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/claude-0/rt_before.txt; wc -l /tmp/claude-0/rt_before.txt
    expected: "A non-empty sorted baseline of CLASSFN:: ids for the runtime suite."
    fix_if: If collection ERRORS (not a clean list), the monolith has an import/collection problem to fix before moving anything.
  - step: 2
    phase: pre-deploy
    graduation: not-applicable
    action: Capture the BEFORE smoke id baseline from the monolith (module path stripped).
    command: >-
      bin/venv-python -m pytest tests/test_ducklake_neon_smoke_test.py --collect-only -q | grep '::'
      | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/claude-0/smoke_before.txt; wc -l /tmp/claude-0/smoke_before.txt
    expected: "A non-empty sorted baseline of CLASSFN:: ids for the smoke suite."
    fix_if: If collection errors, fix the monolith's import/collection problem before moving anything.
  - step: 3
    phase: pre-deploy
    graduation: not-applicable
    action: After the move, collect the AFTER runtime id set from tests/common/ and diff against the baseline.
    command: >-
      bin/venv-python -m pytest tests/common --collect-only -q | grep '::'
      | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/claude-0/rt_after.txt;
      diff /tmp/claude-0/rt_before.txt /tmp/claude-0/rt_after.txt
    expected: Empty diff (identical id sets). No class > 500 exists, so there is NO sanctioned rename -- any delta is a defect.
    fix_if: Any added/removed id means a test was dropped, duplicated, or a verbatim body was lost/renamed during the move -- restore it. A helper that became a collected test_ name is a naming error; keep helpers underscore-prefixed.
  - step: 4
    phase: pre-deploy
    graduation: not-applicable
    action: After the move, collect the AFTER smoke id set from tests/ducklake_neon_smoke_test/ and diff against the baseline.
    command: >-
      bin/venv-python -m pytest tests/ducklake_neon_smoke_test --collect-only -q | grep '::'
      | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/claude-0/smoke_after.txt;
      diff /tmp/claude-0/smoke_before.txt /tmp/claude-0/smoke_after.txt
    expected: Empty diff (identical id sets).
    fix_if: Any added/removed id means a test was dropped, duplicated, or a body was lost/renamed -- restore it.
  - step: 5
    phase: pre-deploy
    graduation: not-applicable
    action: Run the authoritative fast presubmit tier -- proves the SLOC gate, the no-cross-test-import guard, and collectability.
    command: bin/venv-python -m scripts.validate --pre
    expected: Exit 0. No "SLOC limits" failure, no "cross-test import" failure, no collection error.
    fix_if: >-
      A >500 unregistered module (rebalance / sibling-split, see OPEN RISK 1), a cross-test import (hoist
      the shared helper to tests/fixtures/ or keep a single-consumer helper in its module), or a collection
      error (fix the module's fresh import header / a missing pytestmark replication).
  - step: 6
    phase: pre-deploy
    graduation: not-applicable
    action: Full pass of both moved suites at the same counts as their baselines.
    command: bin/venv-python -m pytest tests/common tests/ducklake_neon_smoke_test -q
    expected: All pass; the tests/common count equals the step-1 baseline and the tests/ducklake_neon_smoke_test count equals the step-2 baseline.
    fix_if: A failure means a patch target or mock did not survive the move -- re-check that string patch targets (src.common.*, scripts.ducklake_smoke.*, boto3, requests) are byte-identical and that FakeCon/_Resp/_DSN were imported from the correct fixture module.
  - step: 7
    phase: pre-deploy
    graduation: not-applicable
    action: Assert config/sloc_budgets.yaml lost exactly the two target lines and nothing else.
    command: git diff origin/main -- config/sloc_budgets.yaml
    expected: >-
      Exactly two removed lines ("tests/test_ducklake_runtime.py: 991 ..." and
      "tests/test_ducklake_neon_smoke_test.py: 1110 ...") and zero added lines; every other entry + its
      dec-130 marker untouched.
    fix_if: Any other changed line means --update-sloc-budgets was run (forbidden) or an unintended entry was added.
  - step: 8
    phase: pre-deploy
    graduation: not-applicable
    action: Prove the retired mapping, the kept _DUCKLAKE_RUNTIME_SPLIT_MODULES special-case, and the Decision 124 None-returns via the updated coverage-checker oracle.
    command: bin/venv-python -m pytest tests/test_coverage_checker.py -q
    expected: >-
      All pass, including: the four ducklake split modules -> tests/common/test_ducklake_{stem}.py;
      src/common/ducklake_runtime.py -> tests/common/test_ducklake_runtime.py;
      scripts/ducklake_neon_smoke_test.py -> tests/ducklake_neon_smoke_test; the two executor/ops_portal
      None-returns; both basenames absent from _RETIRING_GRANDFATHER_HOMES; roster still the frozen 24.
    fix_if: An oracle assertion still asserts grandfather behavior for either home, or a None-return regressed, or the split-modules assertion still expects the flat tests/test_ducklake_runtime.py -- update it to the mirror target.
  - step: 9
    phase: pre-deploy
    graduation: not-applicable
    action: Confirm both monoliths are gone, both retirement lines are deleted, and the whole tests/ tree still collects clean.
    command: >-
      test ! -f tests/test_ducklake_runtime.py && test ! -f tests/test_ducklake_neon_smoke_test.py
      && ! grep -qE '"test_ducklake_runtime.py"|"test_ducklake_neon_smoke_test.py"' scripts/test_coverage_checker.py
      && bin/venv-python -m pytest tests/ --collect-only -q >/dev/null && echo RETIRED-OK
    expected: Prints RETIRED-OK (both monoliths absent, both retirement lines absent, whole-suite collection clean -- no import/collision error).
    fix_if: If a file survives, a line remains, or collection errors, the FINAL commit is incomplete or a module header is malformed.
constraints:
