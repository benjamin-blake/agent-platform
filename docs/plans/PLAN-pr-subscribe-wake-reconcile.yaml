    Decision 83 / CD.20 / rec-940) is the durable successor that retires this comment-wake + backstop.
    Keep the prose tight and machine-parseable, matching the surrounding style.
  - >-
    In `.claude/skills/implement/SKILL.md` wait-for-CI section (~lines 317-327, esp. line 318),
    reconcile "no recurring scheduled re-check" so it forbids busy-wait / tight polling while
