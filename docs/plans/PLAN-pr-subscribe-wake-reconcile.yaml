    In AGENTS.md `## Git-ops procedure` -> "Push -> PR -> CI -> merge flow" step 4 (CI-green-comment
    wake), append a reconciliation note that: (a) the harness `subscribe_pr_activity` wake message
    is generic and not repo-editable -- it is a server-side string from the harness `github` MCP
    server, distinct from the repo's `github-full` server in `.mcp.json`; (b) in this repo CI
    success IS delivered as the signal-green comment, so the event-driven wake (failure event +
