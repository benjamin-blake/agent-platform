execution_steps:
  - >-
    Create scripts/preflight/decision_conditions.py: (1) import _DECISION_HEADING_RE + _DECISIONS_MD_PATHS
    from scripts.decisions_md; (2) discover the 'yaml reversal-conditions' fence WITHIN each decision
    block (column-0 fences, unclosed = malformed); (3) yaml.safe_load + cross-check decision:==header;
    (4) a module-level predicate registry dict (EMPTY) + register_predicate decorator; (5) evaluate()
    -> per-decision state (fired > manual-review-due > not-due, MALFORMED on any structural error),
    accepting paths=, predicates=, today= overrides for tests; (6) preflight_bucket() +
    print_decision_conditions(); (7) a __main__ CLI accepting path args, printing states, exiting
    nonzero iff any MALFORMED. Never parse at import. Keep under 500 SLOC or decompose to a facade
    package (Decision 128).
  - >-
    Modify scripts/session/preflight.py: add decision_conditions to the scripts.preflight import
    tuple; in main() call preflight_bucket() (resilient -- never raises), assign
    report["decision_conditions"], and print the stdout section. Keep the diff to glue lines only.
  - >-
    Create scripts/checks/ops_governance/validate_reversal_stanzas.py
    (@registry.register("validate_reversal_stanzas", owner="platform")), reusing the monitor's
    well-formedness pass over the real _DECISIONS_MD_PATHS; append one failed[] entry per MALFORMED
    stanza (never requiring predicate/params on a kind: manual condition). Import it in
    scripts/validate.py FIRST (adjacent to the existing ops_governance imports), then insert
    _c("validate_reversal_stanzas") into BOTH pre_sequence() and full_sequence() in
    scripts/checks/registry.py.
  - >-
    Modify .claude/skills/orient/SKILL.md: add the Inputs-table row + the Status Digest bucket
    (fired-first, then manual-review-due; MALFORMED rendered loudly), reading the preflight cache only.
  - >-
    Create tests/test_decision_conditions.py + tests/checks/ops_governance/test_validate_reversal_stanzas.py
    + committed .txt fixtures under tests/fixtures/decision_conditions/ (past_review, fired_predicate,
    not_due_133_like, prose_only, malformed_bad_decision_key/unclosed_fence/unknown_predicate/bad_kind).
    Inject a fixture predicate for the 'fired' case; do not mutate the production registry. Also
    extend tests/session/preflight/test_main_report.py with a main()-integration case covering the
    net-new preflight glue (report["decision_conditions"] present in the JSON + the stdout section
    renders) -- the 100%-coverage home for those lines under the Decision-131 mirror rule.
  - Execute Verification Plan -- run each step; loop until pass; on unrecoverable V2 failure stop and RCA (Decision 55).
  - 'Report: what was implemented, verification results, whether the module was decomposed, and the final graduation dispositions.'
