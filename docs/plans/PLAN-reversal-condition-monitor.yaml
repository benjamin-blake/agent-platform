  - docs/PROJECT_CONTEXT.md read
  - DECISIONS.md Decision 133 stanza + Decision 131 mirror-rule read; DECISIONS.md scanned via decision-scout (93 of 93)
  - >-
    All files in scope located and readable (scripts/decisions_md.py splitter, scripts/session/preflight.py
