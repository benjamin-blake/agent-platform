schema_version: 1
slug: "nest-llm-family"
intent: >-
  Nest the scripts/ "llm" prefix family (llm_client, llm_utils, model_registry, github_models_client)
  from the scripts/ root into a scripts/llm/ subpackage via git mv + a single same-commit repo-wide
  reference rewrite with no import shims, update both Lambda manifests that bundle these modules, and
  finish the scripts-root placement rule so "scripts/ root = entry points + declared singles" becomes
  machine-enforced. Final phase (3 of 3) of audit finding RS-01: closes the scripts/ root
  predictability gap so agents locate LLM code by home, not by scanning flat filenames, and closes the
  owning rec-164.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-nest-llm-family.yaml
phase: >-
  Repository-structure restructure Phase P4c (audit finding RS-01 [medium], phase 3 of 3, from
  audits/repository-structure-cb02572.yaml RS-01 + proposed_target_tree scripts/llm/ node +
  surface_dispositions.S2). Runs AFTER P1 (RS-04 file-router.yaml + validate_placement link-validity),
  P2/P3 (RS-02/03/05 consolidation + scripts/CLAUDE.md), P4a (scripts/ci_rca/), and P4b
  (scripts/session/, scripts/sync/, scripts/roadmap/) -- all merged at origin/main 0eb9cae. Platform
  axis; RS-01 is planned-insufficient via open rec-164, which CLOSES at this phase. V3 (two ACTIVE
  Lambda artifacts bundle the moved modules). IMPLEMENTATION type (STRATEGIC frozen + >5-file heuristic
  suspended, Decision 67 -- authored as one larger IMPLEMENTATION plan).
scope:
  # ---- llm family moves: STRIP prefix (client, utils) / KEEP name (model_registry, github_models_client)
  - file: scripts/llm_client.py
    action: Delete
    purpose: >-
      git mv to scripts/llm/client.py. Bundled in data-pipeline + ops-compaction manifests. Module-scope
      import of llm_utils; deferred imports of model_registry + executor.telemetry. NO Path(__file__) anchor
      (uses cwd-relative Path("logs/debug")). Executor-boundary file (Decision 117).
  - file: scripts/llm/client.py
    action: Create
    purpose: >-
      Receives llm_client via git mv. Rewrite module-scope `from scripts.llm_utils import LLMResponseError`
      -> `from scripts.llm.utils import LLMResponseError`; deferred `from scripts.model_registry import
      resolve_provider` -> `from scripts.llm.model_registry import resolve_provider`; docstring usage
      `from scripts.llm_client import llm_call` -> `from scripts.llm.client import llm_call`. NO ROOT/anchor
      edit (Path("logs/debug") is cwd-relative, not __file__-anchored).
  - file: scripts/llm_utils.py
    action: Delete
    purpose: git mv to scripts/llm/utils.py. No intra-family import; no Path anchor. Executor-boundary file (Decision 117).
  - file: scripts/llm/utils.py
    action: Create
    purpose: >-
      Receives llm_utils via git mv (pure move; no reference or anchor edit -- it imports nothing from the
      family and uses only f-string "logs/debug/..." paths). The copilot_wrapper docstring provenance line is
      historical and LEFT as-is.
  - file: scripts/model_registry.py
    action: Delete
    purpose: git mv to scripts/llm/model_registry.py (name KEPT). NOT bundled in any manifest. No intra-family import; cwd-relative _CONFIG_PATH.
  - file: scripts/llm/model_registry.py
    action: Create
    purpose: >-
      Receives model_registry via git mv (name kept). Rewrite the docstring usage `from scripts.model_registry
      import ...` -> `from scripts.llm.model_registry import ...`. NO anchor edit: _CONFIG_PATH =
      Path("docs/contracts/inference-provider.yaml") is cwd-relative, not __file__-anchored -- do NOT add one.
  - file: scripts/github_models_client.py
