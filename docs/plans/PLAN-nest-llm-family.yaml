acceptance_criteria:
  - >-
    The four llm modules live under scripts/llm/ with an __init__.py and NONE remain directly under scripts/:
    scripts/llm/client.py (from llm_client), scripts/llm/utils.py (from llm_utils), scripts/llm/model_registry.py
    (name kept), scripts/llm/github_models_client.py (name kept). Prefix rule applied per-name: client/utils STRIP
    the llm_ prefix, model_registry/github_models_client KEEP their names.
  - >-
    No >=3-file prefix family from the audit's RS-01 set remains directly under scripts/ EXCEPT the deferred ops
    pair (ops_data_portal.py, ops_writer.py). Zero flat llm references remain in LIVE surfaces: a git grep for
    scripts[./](llm_client|llm_utils|model_registry|github_models_client) and `from scripts import model_registry`,
    excluding docs/plans/, audits/, logs/, docs/DECISIONS*.md, docs/CHANGELOG.md, docs/SESSION_LOG*.md,
    docs/INTENT-*.md, and the EXECUTED docs/audit-prompts/*.md, returns nothing.
  - >-
    Both Lambda manifests (data-pipeline, ops-compaction) name the moved modules at their new paths in includes
    (scripts/llm/{github_models_client,client,utils}.py + scripts/llm/__init__.py); model_registry is NOT added. compute_affected_artifacts
    over the ACTUAL changed files returns {data-pipeline, ops-compaction}; the CD.24 bundle-completeness check
    (validate_lambda_bundle_completeness) is green (both handlers import from the staged tree).
  - >-
    Both ACTIVE artifacts are rebuilt, deployed via the routine decoupled_build_pipeline channel (local
    `build_lambda --deploy`, agent_platform profile), and smoke-tested post-deploy: the dispatcher smoke
    (run_scheduled_agent --smoke-test doc-freshness) passes and the ops-compaction function code is confirmed
    updated -- no runtime ImportError referencing scripts.llm.
  - >-
    The executor boundary invariant is preserved: capabilities.yaml boundary_patterns match the NEW paths so an
    open automatable rec targeting scripts/llm/client.py or scripts/llm/utils.py is still flagged by
    validate_executor_boundary.
  - >-
    validate_placement is green: the 4 rewritten router rows + the new llm-code route resolve to tracked paths,
    and the new scripts_root_allowlist covers EVERY post-move depth-1 scripts/ file with zero strays (ops pair
    grandfathered). scripts/CLAUDE.md family map reflects reality (only ops_ grandfathered).
  - >-
    map_source_to_test resolves each moved module to its (renamed) test file: scripts/llm/client.py->
    test_llm_client.py, utils->test_llm_utils.py, model_registry->test_llm_model_registry.py, github_models_client->
    test_llm_github_models_client.py. FULL validate (not --pre) and FULL pytest are both green (import-linter,
    validate_placement, coverage checker, bundle-completeness, executor-boundary all pass).
  - >-
      rec-164 CLOSES at this phase via bundled_recommendations [rec-164] plus a "Resolves rec-164" squash-merge
      trailer (rec-autoclose.yml); a new tier_item T-1.24 owns the deferred scripts/ops/ move.
verification_plan:
  - step: 1
    phase: pre-deploy
    hermetic: false
    action: Validate this PLAN document against the PlanDocument schema.
    command: bin/venv-python -m scripts.roadmap.plan_document docs/plans/PLAN-nest-llm-family.yaml
    expected: Reports the plan validates against the PlanDocument schema (no errors).
    fix_if: A schema error names the offending field; correct it (extra keys forbidden; every VP step needs a non-empty command; unique step ids).
  - step: 2
    phase: pre-deploy
    hermetic: false
    action: Confirm the 4 modules moved into scripts/llm/ with an __init__.py and no flat original remains directly under scripts/.
    command: >-
      set -e; for p in client utils model_registry github_models_client; do test -f "scripts/llm/$p.py" || { echo "MISSING scripts/llm/$p.py"; exit 1; }; done; test -f scripts/llm/__init__.py || { echo "MISSING __init__"; exit 1; }; for old in llm_client llm_utils model_registry github_models_client; do test ! -e "scripts/$old.py" || { echo "STILL FLAT scripts/$old.py"; exit 1; }; done; echo MOVED_OK
    expected: Prints MOVED_OK (4 modules under scripts/llm/, __init__.py present, zero flat originals).
    fix_if: A MISSING/STILL FLAT line names the offender; complete the git mv (or add the __init__.py) and re-run.
  - step: 3
    phase: pre-deploy
    hermetic: false
    action: Stale-reference sweep (Closure Obligation) -- zero flat llm references (dotted, path, or from-scripts-import) survive in LIVE surfaces; append-only/grandfathered history is intentionally excluded.
    command: >-
      ALT="github_models_client|model_registry|llm_client|llm_utils"; MATCHES=$(git grep -nE "scripts[./]($ALT)\b|from scripts import ($ALT)\b" -- ':(exclude)docs/plans/*' ':(exclude)audits/*' ':(exclude)logs/*' ':(exclude)docs/DECISIONS.md' ':(exclude)docs/DECISIONS_ARCHIVE.md' ':(exclude)docs/CHANGELOG.md' ':(exclude)docs/SESSION_LOG*.md' ':(exclude)docs/INTENT-*.md' ':(exclude)docs/audit-prompts/*' || true); if [ -z "$MATCHES" ]; then echo SWEEP_CLEAN; else echo "STALE_REFS:"; echo "$MATCHES"; fi
    expected: Prints SWEEP_CLEAN.
    fix_if: STALE_REFS lists file:line -- apply the anchored rewrite to that live file (unless it is genuinely append-only history, in which case widen the exclude pathspec, not the rewrite).
  - step: 4
    phase: pre-deploy
    hermetic: false
    action: Import + cwd-anchor smoke -- the 4 nested modules import, the intra-family imports resolve, and NO __file__ depth fix was wrongly introduced (all paths are cwd-relative).
    command: >-
      bin/venv-python -c "import scripts.llm.client as c, scripts.llm.utils as u, scripts.llm.model_registry as mr, scripts.llm.github_models_client as g; from pathlib import Path; import inspect; assert u.LLMResponseError is c.LLMResponseError, 'intra-family utils import broken'; src=inspect.getsource(mr); assert 'Path(__file__)' not in src, 'do NOT add a __file__ anchor to model_registry'; src2=inspect.getsource(c); assert 'Path(__file__)' not in src2, 'do NOT add a __file__ anchor to client'; print('IMPORTS_OK')"
    expected: Prints IMPORTS_OK (all four import; client re-exports utils.LLMResponseError; no __file__ anchor was added).
    fix_if: An ImportError/ModuleNotFoundError means a cross-module import (client->utils, client->model_registry) was not repointed; an AssertionError about __file__ means an anchor was wrongly added -- remove it (these modules are cwd-relative).
  - step: 5
    phase: pre-deploy
    hermetic: false
    action: Executor-boundary preservation + Decision 117 lockstep -- both the capabilities.yaml SSOT AND the classify_automatable.py duplicate list carry the NEW path-qualified llm patterns (so validate_executor_boundary still flags a rec targeting scripts/llm/client.py, and the two lists have not drifted).
    command: >-
