    line (DPI-03); rec-1964 is verified already-satisfied (exactly one `## Decision 72:` header at HEAD --
    the branch-protection duplicate was renumbered to Decision 89 by the decision-taxonomy-hygiene change,
    confirmed via rec-2278's own context) and is closed with that proof. rec-2057 is deliberately NOT
    bundled: at HEAD its content is archived Decision 50/51/56/69 cross-references in DECISIONS_ARCHIVE.md,
    which does NOT overlap this plan's live-Decision-37 work (the audit's "D37 facet" characterization does
    not reproduce at HEAD).
  - >-
    Use ONLY the Decision-134 / docs/contracts/decision-entry.yaml canonical annotation shapes
    (re-grounding the audit's pre-Decision-134 shape names): `**Superseded by: Decision N**` for full
    supersessions; `> **Update (YYYY-MM-DD):**` blockquote for substrate retirement / moot; `[Amendment
    YYYY-MM-DD: ...]` trailing bracket for partial/clause amendment. Do NOT invent a new shape.
  - >-
    Do NOT re-do DPI-07 (already resolved by #633); make no archive header edits beyond the Decision-26
    merge provenance line.
  - >-
    Do NOT scrub the two legitimate historical 4-digit references in docs/DECISIONS.md -- Decision 105's
    reconciliation body (~line 1931) and Decision 85's Renumbering note (~line 2982) cite the retired
    writer-era ids as provenance and are NOT Warehouse ID lines. Rewritten Warehouse ID provenance
    references Decision 105 WITHOUT re-writing any 4-digit literal (else the DPI-03 no-4-digit oracle,
    scoped to Warehouse ID lines, would trip).
  - >-
    Build NO validate.py check (DPI-01 supersession-annotation invariant and DPI-06 duplicate-number
    detection are follow-up plans) and perform NO archive moves beyond the Decision-26 disposition (DPI-04
    is a follow-up plan).
  - >-
    File NO new recommendations (Decision 55): out-of-scope findings surface to the operator via this
    plan's open-questions / Context, not via file_rec.
  - >-
    The Warehouse ID rewrites are display-layer only and provably ETL-immune (parse_decisions_md keys on
    the header number, scripts/decisions_md.py; file_decision re-derives dec-{n:03d}); do not treat them
    as a data-layer migration.
  - >-
    No em dashes (ASCII ' -- '), no emojis; keep annotations terse so docs/DECISIONS.md stays under the
    400,000-byte / 120-h2 Decision-134 ceiling; bin/venv-python (never bare python); no `python -c` in VP
    commands.
  - "No rescue agents or workaround loops (Decision 55); out-of-scope bugs become recommendations, not inline fixes -- but see the NO-new-recs constraint above (this plan surfaces, does not file)."
  - "Public-repo boundary (Decision 101): no AWS account ids / ARNs / ExternalIds / secrets in any edit or the PR body."
