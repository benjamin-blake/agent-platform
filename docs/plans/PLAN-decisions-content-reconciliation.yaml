schema_version: 1
slug: "decisions-content-reconciliation"
intent: >-
  Restore premise-integrity and identifier-uniqueness to docs/DECISIONS.md -- the sole ETL source
  for ops_decisions and the whole-file context every /plan decision-scout reads -- by backfilling
  victim-side supersession/decay annotations (DPI-02), unifying the Warehouse ID display keyspace
  onto the Decision-105 canonical rule (DPI-03), and resolving the duplicate Decision 26 (DPI-05),
  so an agent reading any single entry is no longer told a rule or substrate that HEAD has inverted
  or deleted.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-decisions-content-reconciliation.yaml
phase: >-
  Platform interim decision-log governance (audit decision-log-premise-integrity-8fb581e, findings
  DPI-02/03/05, plus verify-only DPI-07). Content-reconciliation complement to the merged
  PLAN-daf-authoring-grammar (#633), which landed the decision-entry.yaml grammar contract and the
  DPI-07 archive h3->h2 promote and explicitly deferred the DPI-02/03/05 CONTENT work to a separate
  plan (its constraint line: "Do NOT edit DECISIONS.md/ARCHIVE content EXCEPT the 3 archive header
  promotes"). No tier_item owns these findings (audit roadmap_crossref: novel / planned-insufficient);
  owner surface docs/DECISIONS.md is the T1.5 grandfathered retiring set.
scope:
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      DPI-02: add victim-side annotations to 10 live dead-unannotated entries using the Decision-134
      / decision-entry.yaml canonical shapes -- `**Superseded by: Decision N**` for full supersessions
      (Decision 58<-76, 49<-116, 44<-117, 37<-116, 23<-76); a dated `> **Update (2026-07-21):**`
      blockquote for substrate retirements / moot triggers (Decision 74<-CD.21, 38<-artifacts deleted
      at T-1.13, 40<-triggers moot); a `[Amendment 2026-07-21: ...]` trailing bracket for partial/clause
      amendments (Decision 35<-Decision 77 clause 3; Decision 43 SLOC-waiver row<-Decision 102).
      DPI-03: rewrite the 8 non-canonical `**Warehouse ID:**` lines (Decisions 75,77,78,79,80,81,83,85)
      to canonical dec-NNN keeping Decision-105-referencing provenance WITHOUT re-writing any 4-digit
      literal; correct Decision 75's dec-081 double-claim to dec-075; add `**Warehouse ID:** dec-082`,
      `dec-084`, `dec-089` lines to Decisions 82/84/89 (the D89 line satisfies rec-2278).
      DPI-05: delete the live Decision 26 block (the pending-review 2-Chat duplicate, ~4166 bytes).
  - file: docs/DECISIONS_ARCHIVE.md
    action: Modify
    purpose: >-
      DPI-05: add a renumbering-note-style provenance line to the archived Decision 26 entry ("Workflow
      Cost Optimisation (Decided)") recording that the divergent live pending-review duplicate was
      reconciled into this canonical entry and removed from the live file (D85 renumbering-note precedent),
      leaving exactly one Decision 26 across both files. DPI-07 is verify-only here (zero `### Decision`
      h3 headers -- already resolved by #633; NO edit).
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Fix the stale out-of-file citation in the T5.3 tier_item intent (currently "Per Decision 58,
      .agents/ is the canonical interactive workflow layer") to annotate that Decision 58 is superseded
      by Decision 76, mirroring the already-annotated citation at line ~3692 ("Decision 58 superseded by
      Decision 76, reaffirmed by Decision 85"). In-place annotation only -- no new lines, no status flip.
  - file: docs/ROADMAP-PRODUCT.md
    action: Modify
    purpose: >-
      Fix the stale Decision-40 citation at the Phase Infra-Platform note ("Implementation is triggered
      by conditions defined in Decision 40") to annotate that Decision 40's trigger conditions are moot
      (Copilot SDK retired via Decisions 49->116; Bedrock retired via CD.28). This file is a
      globally-SUPERSEDED recovery artefact; the annotation prevents a reader of the retained copy being
      misled.
  - file: docs/ROADMAP-PRODUCT.yaml
    action: Modify
    purpose: >-
      Annotate the authoritative sibling citation (source_section "Copilot SDK migration P3", reason
      block "deferred per Decision 40 + PIVOT") that Decision 40's trigger conditions are now moot, so
      the authoritative roadmap surface is not left stale while the superseded .md copy is fixed.
      Prose `reason:` block edit only. OPERATOR-VETOABLE scope extension beyond the brief's named .md.
bundled_recommendations:
  - rec-2278
  - rec-1964
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    DPI-02: each of the 10 live victims (Decisions 23, 35, 37, 38, 40, 43, 44, 49, 58, 74) contains a
    victim-side annotation whose text names its superseder/amender decision number or the 'moot' state,
    in a Decision-134 canonical shape; Decision 26's premise-death is recorded in the archived entry
    (its live duplicate is deleted per DPI-05, so 26 is excluded from the live-annotation set).
  - >-
    DPI-03: every `**Warehouse ID:**` line in docs/DECISIONS.md carries a canonical 3-digit `dec-NNN`
    value; no `**Warehouse ID:**` line carries a 4-digit `dec-1NNN`; Decision 75's dec-081 double-claim
    is corrected to dec-075; and Decisions 82, 84, 89 each now carry a `**Warehouse ID:**` line
    (the Decision 89 line satisfies rec-2278).
  - >-
    DPI-05: exactly one Decision 26 entry exists across docs/DECISIONS.md + docs/DECISIONS_ARCHIVE.md
    (the archived Decided entry, now carrying a provenance note); the live pending-review duplicate is
    deleted.
  - >-
    DPI-07 (verify-only): `grep -c '^### Decision' docs/DECISIONS_ARCHIVE.md` == 0 (already resolved by
    #633; this plan makes no archive header edits).
  - >-
    Stale out-of-file citations fixed: docs/ROADMAP-PLATFORM.yaml no longer carries the bare "Per
    Decision 58, .agents/ is the canonical interactive workflow layer" phrasing (now annotated
    superseded-by-76); docs/ROADMAP-PRODUCT.md and docs/ROADMAP-PRODUCT.yaml annotate Decision 40's
    triggers as moot.
  - >-
    Size governance stays green: docs/DECISIONS.md remains under the 400,000-byte and 120-h2-header
    Decision-134 ceiling (the DPI-05 deletion of ~4166 bytes more than offsets the DPI-02/03 additions;
    net byte delta is negative).
  - >-
    `bin/venv-python -m scripts.validate --pre` is green on the branch and the plan document
    schema-validates.
  - >-
    bundled_recommendations rec-2278 and rec-1964 close via the Resolves trailer post-merge (rec-1964
    closed with proof: exactly one `## Decision 72:` header at HEAD).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      DPI-02: all 10 live victims carry a victim-side supersession/decay annotation naming the
      superseder/amender number or the moot state.
    command: >-
      missing=""; for n in 23 35 37 38 40 43 44 49 58 74; do awk "/^## Decision $n:/{f=1;next}
      /^## Decision [0-9]+:/{f=0} f" docs/DECISIONS.md | grep -qiE "superseded by|amended by|migration
      update|moot|\*\*update \(|\[amendment" || missing="$missing $n"; done; test -z "$missing"
    expected: >-
      Exit 0 -- every one of the 10 victim blocks contains a Decision-134 canonical annotation
      (**Superseded by:**, > **Update (...):**, or [Amendment ...: amended by ...]).
    fix_if: >-
      A victim number remains in $missing -- its block lacks the annotation; add the appropriate
      canonical marker naming the superseder/amender.
    hermetic: false
    graduation: not-applicable
  - step: 2
    phase: pre-deploy
    action: >-
      DPI-03: every Warehouse ID line is canonical 3-digit dec-NNN and no Warehouse ID line carries a
      retired 4-digit dec-1NNN (oracle scoped to `**Warehouse ID:**` lines -- the audit's whole-file
      variant is over-broad, see constraints).
    command: >-
      test -z "$(grep -nE '^\*\*Warehouse ID:\*\*' docs/DECISIONS.md | grep -vE 'dec-[0-9]{3}( |\)|$)')"
      && ! grep -E '^\*\*Warehouse ID:\*\*' docs/DECISIONS.md | grep -qE 'dec-1[0-9]{3}'
    expected: >-
      Exit 0 -- every Warehouse ID line's value is dec-NNN (3-digit, followed by space, ')' or EOL) and
      no Warehouse ID line shows a 4-digit dec-1NNN.
    fix_if: >-
      A Warehouse ID line still shows a 4-digit id or a non-canonical value (e.g. Decision 75 left at
      dec-081).
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      A Warehouse-ID-line conformance assertion is kernel-expressible as a standing guard, but this plan
      builds NO validate.py check by brief -- the durable check is deferred to the DPI-01/DPI-03-extension
      follow-up plan. Graduating it here would pre-empt that scoped decision.
  - step: 3
    phase: pre-deploy
    action: "DPI-03: Decisions 82, 84, 89 each carry a canonical Warehouse ID line (the D89 line = rec-2278)."
    command: >-
      for n in 82 84 89; do awk "/^## Decision $n:/{f=1;next} /^## Decision [0-9]+:/{f=0} f"
      docs/DECISIONS.md | grep -qF "**Warehouse ID:** dec-0$n" || { echo "MISSING-$n"; exit 1; }; done
    expected: "Exit 0 -- Decisions 82/84/89 each contain '**Warehouse ID:** dec-082/dec-084/dec-089'."
    fix_if: "A MISSING-N is printed -- add the canonical Warehouse ID line to that entry."
    hermetic: false
    graduation: not-applicable
  - step: 4
    phase: pre-deploy
    action: "DPI-05: exactly one Decision 26 across both files -- zero live, one archived."
    command: >-
      test "$(grep -cE '^## Decision 26:' docs/DECISIONS.md)" -eq 0 && test "$(grep -cE '^## Decision
      26:' docs/DECISIONS_ARCHIVE.md)" -eq 1
    expected: "Exit 0 -- the live pending-review duplicate is deleted; the archived Decided entry remains (with a provenance note)."
    fix_if: "The live duplicate is still present, or the archived entry was removed."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Duplicate-decision-number detection is kernel-expressible but is the explicit deliverable of the
      DPI-06 follow-up check plan (out of scope here per brief); graduating it now would pre-empt that
      plan's scoped design.
  - step: 5
    phase: pre-deploy
    action: "DPI-07 (verify-only): no h3 numbered decision headers remain in the archive (already resolved by #633 -- regression guard)."
    command: test "$(grep -c '^### Decision' docs/DECISIONS_ARCHIVE.md)" -eq 0
    expected: "Exit 0 -- zero '### Decision' headers in docs/DECISIONS_ARCHIVE.md."
    fix_if: "An h3 numbered header reappeared (a regression of PLAN-daf-authoring-grammar #633); restore h2."
    hermetic: true
    graduation: waive
    graduation_waiver_reason: >-
      Already graduated by PLAN-daf-authoring-grammar (#633) as check_id
      archive-no-h3-numbered-decision-headers; this plan asserts it verify-only to prove no regression.
      Re-graduating would duplicate that standing guard.
  - step: 6
    phase: pre-deploy
    action: "Stale out-of-file citations annotated (ROADMAP-PLATFORM Decision 58; ROADMAP-PRODUCT.md + .yaml Decision 40)."
    command: >-
      ! grep -qE 'Per Decision 58, .?\.agents.? is the canonical interactive workflow layer\.'
      docs/ROADMAP-PLATFORM.yaml && grep -qi 'moot' docs/ROADMAP-PRODUCT.md && grep -qi 'moot'
      docs/ROADMAP-PRODUCT.yaml
    expected: >-
      Exit 0 -- the bare stale Decision-58 phrasing is gone from ROADMAP-PLATFORM.yaml (now annotated
      superseded-by-76) and a 'moot' Decision-40 annotation is present in both ROADMAP-PRODUCT files.
    fix_if: "A stale citation remains unannotated."
    hermetic: false
    graduation: not-applicable
  - step: 7
    phase: pre-deploy
    action: "Size governance: docs/DECISIONS.md stays under the Decision-134 400,000-byte / 120-h2 ceiling after the edits."
    command: >-
      test "$(wc -c < docs/DECISIONS.md)" -lt 400000 && test "$(grep -cE '^## Decision [0-9]+:'
      docs/DECISIONS.md)" -le 120
    expected: "Exit 0 -- live bytes < 400000 and live h2 header count <= 120 (the DPI-05 deletion is the relief valve)."
    fix_if: >-
      The byte ceiling is breached -- the DPI-05 live-Decision-26 deletion (~4166 bytes) must land to
      offset the DPI-02/03 additions; keep annotations terse; do NOT raise the ceiling (Decision 134).
    hermetic: true
    graduation: waive
    graduation_waiver_reason: >-
      Duplicates the standing validate_decisions_size check (Decision 134, already in --pre + full);
      this step is an explicit visibility assertion of the size interaction, not a new guard.
  - step: 8
    phase: pre-deploy
    action: "The fast presubmit gate is green on the branch (runs validate_decisions_size, validate_vp_replay, and all --pre checks)."
    command: bin/venv-python -m scripts.validate --pre
    expected: "PASS -- all --pre-tier checks green including the Decision-134 size gate."
    fix_if: "Any --pre check fails; diagnose and fix on the branch (never mark this step hermetic -- replay recursion)."
    hermetic: false
    graduation: not-applicable
  - step: 9
    phase: pre-deploy
    action: "The plan document itself schema-validates (PlanDocument, extra=forbid)."
    command: bin/venv-python -m scripts.roadmap.plan_document docs/plans/PLAN-decisions-content-reconciliation.yaml
    expected: "Schema validation passes."
    fix_if: "A schema violation (unknown key, missing required field, bad enum)."
    hermetic: false
    graduation: not-applicable
  - step: 10
    phase: post-deploy
    action: >-
      Post-merge closure: after the Resolves trailer fires rec-autoclose, rec-2278 and rec-1964 read
      status closed in the synced read-cache.
    command: >-
      bin/venv-python -m scripts.sync.ops pull && grep -F '"rec-2278"' logs/.recommendations-log.jsonl |
      grep -qi 'closed' && grep -F '"rec-1964"' logs/.recommendations-log.jsonl | grep -qi 'closed'
    expected: "Both rec-2278 and rec-1964 show status closed after sync."
    fix_if: >-
      A rec is still open -- run the fallback bin/venv-python -m scripts.ops_data_portal --update-rec
      rec-NNNN --status closed --resolution "...". Requires the agent_platform profile.
  - step: 11
    phase: post-deploy
    action: >-
      Post-merge ETL refresh (overseer-run): re-run the DECISIONS.md -> ops_decisions backfill so dec-026
      reflects the reconciled (archived Decided) entry.
    command: bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md
    expected: >-
      Exit 0 -- ops_decisions re-derived from the reconciled file; dec-026 now upserts from the archived
      Decided entry. The annotation/Warehouse-ID display edits are ETL-immune (parse keys on header
      number; file_decision re-derives dec-{n:03d}), so no other keyspace row changes.
    fix_if: "Backfill errors (creds/connectivity) -- confirm the agent_platform profile chain and re-run."
constraints:
