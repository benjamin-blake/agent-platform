schema_version: 1
slug: "plan-workflow-audit-actions"
intent: >-
  Improve the /plan and /implement instruction files (context economy, gate retuning, handoff
  completeness) so the planning-and-implementation workflow that authors every change to the
  self-improving trading platform is cheaper, more reliable, and self-consistent -- the audit-action
  slice covering the plan-workflow, decision-scout, plan-critique, and cross-workflow handoff findings.
plan_type: IMPLEMENTATION
verification_tier: V1
plan_path: docs/plans/PLAN-plan-workflow-audit-actions.yaml
phase: >-
  Platform: agent-workflow instruction quality (Decision 90 four-tier /orient->/plan->/implement
  workflow; docs/contracts/instruction-architecture.yaml layers 3-4). Ad-hoc audit-action slice from
  audits/workflow-review-d107b4a.yaml -- no tier_item (soft-warn exception: user_explicit_out_of_scope).
  Sibling to the merged orient slice (PR #385). Roadmap phase: Phase 1 Core Infrastructure (complete).
scope:
  - file: .claude/commands/plan.md
    action: Modify
    purpose: >-
      Thin layer-3 restatements to trigger+pointer form (CE-04/05/06/07/16, WF-10); add Step 2 resume
      check (WF-16); collapse the slim-report line (CE-14); refresh 25k->>200KB (WF-14); fix run_skill
      wording (ride-along); reference the 3-round critique cap in Step 9 (WF-17).
  - file: .claude/skills/planning/SKILL.md
    action: Modify
    purpose: >-
      Add required-context frontmatter (WF-20); plan-template context entries for scout CITE list +
      gate verdicts (WF-04a, WF-08); absorb the scout example-prompt body (CE-04); add gate-error
      clauses + N!=M scout completeness handling (WF-08, WF-18); 3-round critique convergence cap
      (WF-17); collapse scout-isolation rationale + branch-topology restatements (CE-08/09); trim
      agent-first ambient lines keeping the ops.yaml pattern (CE-10); 25k->>200KB (WF-14); run_skill
      wording (ride-along).
  - file: .claude/skills/decision-scout/SKILL.md
    action: Modify
    purpose: >-
      Phase 1 records M = rg -c "^## Decision " docs/DECISIONS.md; Phase 3 adds the mandatory
      "Decisions triaged: N of M" completeness echo; renumber the duplicate step 5 (WF-18);
      25k->>200KB at the three sites (WF-14).
  - file: .claude/skills/plan-critique/SKILL.md
    action: Modify
    purpose: >-
      Phase 1 targeted retrieval instead of ~1.09MB full reads + matching required-context frontmatter
      (WF-05); add Phase-2 checks 12l (follow-on closes_criteria) and 12m (tier fitness) mirrored in the
      Phase 3 template (WF-06); reword 12d to the surviving CD.17/executor-freeze framing and add the
      "Files Read" list to the Phase 3 template (WF-06 ride-alongs).
  - file: .claude/commands/implement.md
    action: Modify
    purpose: >-
      Step 2 read-list reads ONLY the plan-cited decision sections, not the whole DECISIONS.md (WF-04b);
      collapse the slim-report line (CE-14). No other lines touched.
  - file: .claude/skills/implement/SKILL.md
    action: Modify
    purpose: >-
      Remove the agent-first ambient Documentation Artefact Design block (CE-10); add the gate-error
      clause to the Code Review Protocol (WF-08); add required-context frontmatter (WF-20). No other
      lines touched.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - "WF-04a: planning SKILL.md plan-template shows a required ITEM in the existing free-text `context:` list -- 'Decision-scout verdict + CITE list (verbatim decision ids)' -- and NOT a new top-level schema field (Decision 85 extra='forbid' respected; scripts/plan_document.py untouched)."
  - "WF-04b: implement.md Step 2 contains no unconditional full docs/DECISIONS.md read; it reads only the plan-cited decision sections (located via rg \"^## Decision N:\")."
  - "WF-05: plan-critique Phase 1 names no unconditional full read of ROADMAP-PLATFORM.yaml, ROADMAP-PRODUCT.yaml, or DECISIONS.md; it extracts only named items/decisions + a keyword conflict-sweep + the plan's CITE list; PROJECT_CONTEXT.md stays a full read; required-context frontmatter matches."
  - "WF-06: plan-critique Phase 2 has checks 12l and 12m, both mirrored in the Phase 3 output template; 12m is qualified to 'resource-affecting .tf OR active-manifest Lambda => V3; Python source => >=V2' (defers to the planning skill's Verification Tier Guidelines, Decision 48/79); 12d rationale reworded to the CD.17/executor-freeze framing; Phase 3 template includes a 'Files Read' list. Decision 67's 12d STRATEGIC block is preserved and un-renumbered."
  - "WF-08: all three gate sections (planning-skill Decision Scout Gate + Critique Gate; implement-skill Code Review Protocol) carry the gate-error-is-incomplete/re-dispatch clause; plan-template context records the 'gates: decision-scout=...; plan-critique=... after N round(s)' entry."
  - "WF-18: decision-scout Phase 1 records M via rg -c; Phase 3 template has the 'Decisions triaged: N of M' line; the planning-skill scout verdict-handling treats N!=M or a missing line as gate-incomplete -> re-dispatch; the duplicate step-5 numbering is fixed."
  - "WF-10/CE-04/05/06/07/16: no dispatch-shape or example-prompt text appears in both plan.md and planning SKILL.md; plan.md Steps 2/6a/9/10/12 are trigger+pointer form; plan.md shrinks by roughly 38 lines."
  - "CE-08/09: planning SKILL.md scout-isolation rationale is a one-line pointer to the decision-scout skill; the branch-topology restatement collapses to the AGENTS.md pointer, keeping the slug-derivation + .md-deprecation line."
  - "CE-10: redundant agent-first preference lines removed from both planning and implement SKILL.md; exactly one copy of the ops.yaml extended-contract pattern remains (in the planning skill); the Decision 86 forward-routing rule is PRESERVED in planning SKILL.md (clause-4 mandate) and removed only from implement SKILL.md."
  - "Protected regions survive the retunes: decision-scout's managed-service-native WARN check (Decision 100) and plan-critique's five-question frame-challenge Phase 2b (Decision 75) are both still present and intact."
  - "CE-14: plan.md and implement.md each carry the single-line slim-report explanation 'stdout is a one-line summary; Read logs/.preflight-report.json for the full constraint surface.'"
  - "WF-14: rg '25k' over plan.md, planning SKILL.md, and decision-scout SKILL.md returns nothing; former sites read 'the full DECISIONS.md, currently >200KB'."
  - "WF-16: plan.md Step 2 has a resume check offering resume-at-step (Step 9 uncritiqued / Step 11 approved-unmerged / discard) when a matching PLAN-*.yaml exists on the branch."
  - "WF-17: planning SKILL.md Critique Gate and plan.md Step 9 both reference the 3-round convergence cap with human escalation."
  - "WF-20: planning SKILL.md and implement SKILL.md both carry a required-context frontmatter key (implement's list excludes full DECISIONS.md per WF-04); prompt_compliance --all still reports no violations."
  - "Ride-along: plan.md and planning SKILL.md retain the 'do not shell out to run_skill' directive but drop the inaccurate 'dispatcher is removed' wording (file exists, broken per rec-568)."
  - "Regression: prompt_compliance --all exits 0; validate --pre shows no new failures attributable to these edits."
verification_plan:
  - step: 1
    phase: pre-deploy
    action: "WF-04 handoff -- planning template records scout output; implement reads only cited decisions."
    command: "grep -n 'Decision-scout verdict' .claude/skills/planning/SKILL.md; echo '--'; grep -nE 'docs/DECISIONS.md before proceeding' .claude/commands/implement.md; echo '--'; grep -n 'only the decisions cited' .claude/commands/implement.md"
    expected: "planning grep matches; the implement full-read grep is EMPTY; the implement targeted-read grep matches."
    fix_if: "planning template lacks the CITE entry, or implement.md still instructs an unconditional full DECISIONS.md read."
  - step: 2
    phase: pre-deploy
    action: "WF-05 -- plan-critique Phase 1 is targeted, not full-file."
    command: "grep -nE 'read only those|targeted|CITE list|conflict-sweep|extract the (tier_item|decision)' .claude/skills/plan-critique/SKILL.md; echo '--'; sed -n '1,12p' .claude/skills/plan-critique/SKILL.md"
    expected: "Phase 1 language names targeted extraction + CITE-list conflict sweep; PROJECT_CONTEXT.md remains a full read; the required-context frontmatter no longer lists the three >200KB files as unconditional full reads."
    fix_if: "Phase 1 still mandates full reads of ROADMAP-PLATFORM/PRODUCT or DECISIONS."
  - step: 3
    phase: pre-deploy
    action: "WF-06 -- plan-critique gains 12l/12m (Phase 2 + Phase 3), the 12d/Files-Read ride-alongs; Decision 75 frame-challenge preserved."
    command: "grep -nE '12l|12m' .claude/skills/plan-critique/SKILL.md; echo '--'; grep -n 'Files Read' .claude/skills/plan-critique/SKILL.md; echo '--'; grep -n 'telemetry tables not yet confirmed operational' .claude/skills/plan-critique/SKILL.md; echo '--'; grep -nE '12e|12f|12g|12h|12i|Frame Challenge' .claude/skills/plan-critique/SKILL.md"
    expected: "12l and 12m each appear at least twice (Phase 2 check + Phase 3 template row); a 'Files Read' row is in the Phase 3 output template; the stale 12d parenthetical grep is EMPTY (reworded to CD.17/executor-freeze); the five frame-challenge questions 12e-12i (Decision 75, protected) are all still present."
    fix_if: "either check missing from Phase 2 or Phase 3, 12d still cites 'telemetry tables not yet confirmed operational', or any 12e-12i frame-challenge question was damaged."
  - step: 4
    phase: pre-deploy
    action: "WF-08 -- gate-error clauses in all three gate sections + gates: context entry."
    command: "grep -rn 'gate has NOT completed' .claude/skills/planning/SKILL.md .claude/skills/implement/SKILL.md; echo '--'; grep -n 'gates: decision-scout=' .claude/skills/planning/SKILL.md"
    expected: "the gate-error clause appears in the planning-skill Decision Scout Gate, the planning-skill Critique Gate, and the implement-skill Code Review Protocol; the plan-template context entry for gate verdicts is present."
    fix_if: "any gate section lacks the error clause, or the plan template lacks the gates: entry."
  - step: 5
    phase: pre-deploy
    action: "WF-18 -- decision-scout completeness echo + numbering fix + caller N!=M handling; Decision 100 check preserved."
    command: "grep -n 'Decisions triaged' .claude/skills/decision-scout/SKILL.md; echo '--'; grep -nE '^[0-9]+\\.' .claude/skills/decision-scout/SKILL.md; echo '--'; grep -nE 'N of M|N != M|triaged' .claude/skills/planning/SKILL.md; echo '--'; grep -n 'Managed-service-native' .claude/skills/decision-scout/SKILL.md"
    expected: "the scout Phase 3 template contains 'Decisions triaged: N of M' and Phase 1 the rg -c count with the live-file-count note; the numbered-step list has no repeated number (single 5, single 6, ...); the planning-skill scout verdict-handling names the N!=M / missing-line re-dispatch condition; the Decision 100 Managed-service-native check is still present (protected)."
    fix_if: "the triage-count line is absent, the duplicate step 5 survives, the caller does not treat a mismatch as gate-incomplete, or the Decision 100 check was damaged."
  - step: 6
    phase: pre-deploy
    action: "WF-10 -- plan.md is thinned; the scout example prompt lives only in the planning skill."
    command: "grep -c 'You are running the decision-scout gate in a fresh context window' .claude/commands/plan.md; echo '--'; grep -c 'You are running the decision-scout gate' .claude/skills/planning/SKILL.md; echo '--'; wc -l .claude/commands/plan.md"
    expected: "the example-prompt body count in plan.md is 0; it is >=1 in planning SKILL.md; plan.md line count dropped from 175 to roughly 137 (~-38)."
    fix_if: "the example prompt still appears in plan.md, or plan.md did not shrink."
  - step: 7
    phase: pre-deploy
    action: "CE-10 + CE-14 -- ops.yaml pattern kept once; Decision 86 routing rule preserved in planning; slim-report one-liner in both commands."
    command: "grep -c 'ops.yaml extended contract' .claude/skills/planning/SKILL.md .claude/skills/implement/SKILL.md; echo '--'; grep -c 'Prefer extending an existing machine-readable source' .claude/skills/implement/SKILL.md; echo '--'; grep -c 'route forward intent' .claude/skills/planning/SKILL.md; echo '--'; grep -n 'stdout is a one-line summary; Read logs/.preflight-report.json' .claude/commands/plan.md .claude/commands/implement.md"
    expected: "planning=1 and implement=0 for the ops.yaml pattern; implement=0 for the ambient agent-first line; the Decision 86 routing rule ('route forward intent') still appears >=1 in planning SKILL.md (clause-4 preserved); the slim-report one-liner is present in BOTH commands."
    fix_if: "the ops.yaml pattern is duplicated or lost, the ambient lines survive in implement, the Decision 86 routing rule was stripped from planning, or a command is missing the one-liner."
  - step: 8
    phase: pre-deploy
    action: "WF-14 -- no stale 25k figure remains."
    command: "rg -n '25k' .claude/commands/plan.md .claude/skills/planning/SKILL.md .claude/skills/decision-scout/SKILL.md; echo \"rg-exit=$?\"; rg -c '>200KB' .claude/commands/plan.md .claude/skills/planning/SKILL.md .claude/skills/decision-scout/SKILL.md"
    expected: "the 25k search prints no matches (rg-exit=1); the >200KB search matches in each file that previously carried a 25k figure."
    fix_if: "any '25k' occurrence survives."
  - step: 9
    phase: pre-deploy
    action: "WF-16 + WF-17 -- resume protocol and critique convergence cap present on both surfaces."
    command: "grep -n 'Resume check' .claude/commands/plan.md; echo '--'; grep -nE '3[- ]round|3 REVISE' .claude/skills/planning/SKILL.md .claude/commands/plan.md"
    expected: "plan.md Step 2 carries the Resume check; the 3-round convergence cap is referenced in both the planning-skill Critique Gate and plan.md Step 9."
    fix_if: "resume check missing, or the cap is only on one of the two Step 9 surfaces."
  - step: 10
    phase: pre-deploy
    action: "WF-20 + ride-along -- required-context frontmatter; run_skill wording fixed."
    command: "grep -n 'required-context' .claude/skills/planning/SKILL.md .claude/skills/implement/SKILL.md; echo '--'; grep -n 'dispatcher is removed' .claude/commands/plan.md .claude/skills/planning/SKILL.md; echo '--'; grep -n 'run_skill\\|agent_development' .claude/commands/plan.md .claude/skills/planning/SKILL.md"
    expected: "both skills carry required-context; the 'dispatcher is removed' grep is EMPTY; the run_skill directive still appears (retained behaviour) with corrected wording."
    fix_if: "a skill lacks required-context, or the inaccurate 'removed' wording survives, or the behavioural directive was dropped."
  - step: 11
    phase: pre-deploy
    action: "Regression -- instruction guards still pass after the edits."
    command: "bin/venv-python -m scripts.prompt_compliance --all; echo \"pc-exit=$?\"; bin/venv-python -m scripts.validate --pre 2>&1 | tail -20"
    expected: "prompt_compliance exits 0 with 'no violations'; validate --pre shows no NEW failure attributable to these markdown edits (any pre-existing failure is identical on origin/main)."
    fix_if: "prompt_compliance reports a violation, or validate --pre gains a new failure caused by these edits."
constraints:
  - "V1 scope: only the six in-scope markdown instruction files may be modified. implement.md is limited to the Step 2 read-list + the CE-14 slim-report line; implement SKILL.md is limited to the Documentation Artefact Design block, the Code Review Protocol error clause, and the frontmatter. No Python/source, no .tf, no Lambda."
  - "Do NOT file any recommendations and do NOT add roadmap items -- all work lands as file edits in this plan (per task constraint; out-of-scope issues are NOT converted to recs this session)."
  - "closes_criteria: none -- this is not a follow-on plan and flips no tier_item criterion. Status-Trusted-Never-Inferred: touch no roadmap statuses."
  - "The prompt_compliance.py enhancement (asserting the gates: entry per plan) is OUT of scope -- noted as a downstream dependency only; do not edit Python."
  - "Decision 85 (scout WARN): the WF-04a CITE-list entry and the WF-08 gate-verdict entry are REQUIRED ITEMS in the plan template's existing free-text `context:` list (already list[str]) -- NOT new top-level PlanDocument fields. A new typed field would fail extra='forbid', force a scripts/plan_document.py edit, and push the tier V1->V2. Do not add schema fields."
  - "Decision 86 (scout WARN): CE-10 must NOT strip the Decision 86 forward-routing rule from planning SKILL.md -- clause 4 mandates it live on plan.md + planning/SKILL.md + AGENTS.md. In planning SKILL.md keep BOTH the ops.yaml extended-contract pattern AND the Decision 86 routing rule; remove only the genuinely-redundant agent-first preference lines. implement SKILL.md's copy is not clause-4-mandated and is removed with the rest of its block."
  - "Decision 100 + Decision 75 (scout WARN): treat as protected regions during the decision-scout/plan-critique retunes -- the managed-service-native WARN check (Decision 100, decision-scout Phase-2 first step 5 at :52) and the five-question frame-challenge Phase 2b (Decision 75) MUST survive. WF-18's renumber affects only the SECOND step 5 (:60 status filter); the Decision 100 check keeps number 5."
  - "Decision 48 + Decision 79 (scout NOTE): 12m must defer to the planning skill's own Verification Tier Guidelines -- qualify as 'resource-affecting .tf OR active-manifest Lambda => V3; Python source => >=V2' so comment-only .tf or docstring-only Python edits are not force-escalated."
  - "Decision 55 (scout NOTE): the WF-17 3-round critique cap must terminate in human escalation / gate-incomplete, NEVER auto-proceed or auto-skip (that would reproduce the --skip-critique workaround Decision 55 condemns)."
  - "Decision 103 (scout RELATED): do NOT clobber the rec-relevance freshness gates when retuning plan-critique Phase 1 -- they are out of the edit set and must stay intact."
  - "Preserve every inbound anchor when thinning plan.md: the Step 6a and Step 9 labels must survive (implement/planning skills and other surfaces reference them by number)."
  - "No rescue agents or workaround loops (Decision 55). No emojis; ASCII hyphens only; line length <=127 where applicable."
  - "Layer discipline (Decision 86 / instruction-architecture.yaml): layer-3 commands keep triggers + MANDATORY markers + skill pointers; layer-4 skills own dispatch shapes, prompt bodies, and verdict-handling verbatim -- never duplicate across layers."
context:
  - "Specification: audits/workflow-review-d107b4a.yaml (audited commit d107b4a, by claude-fable-5). Read it first -- it is the spec. This plan actions the plan/decision-scout/plan-critique/cross-workflow-handoff slice (14 task items); the orient slice already merged (PR #385) and the implement/code-review slice is the precondition."
  - "PRECONDITION VERIFIED against the working tree: WF-01 (implement.md:28/84 use --pre / full validate), WF-02 (implement.md:76 + implement SKILL.md:157 use subagent_type general-purpose), WF-03 (code-review SKILL.md:189-191 emits 'Verdict: PROCEED | REVISE', REVISE iff any Critical/High), WF-09 (implement.md:95 files friction via portal, telemetry suspended, no run_skill), WF-12 (implement SKILL.md:388-389 defers wake-mechanism to AGENTS.md; Resolves-trailer reconciled at :440), WF-13 (no 'Self-application' sections remain). This plan builds on WF-03's Verdict line (WF-08's error clause references 'the required Verdict/Recommendation line') and edits the same implement files."
  - "Line numbers drifted from the audit since the orient + implement/code-review slices merged. Current anchors: 25k at plan.md:47,67 / planning SKILL.md:331,344 / decision-scout:3,10,16 (audit said planning:294,307). run_skill wording at plan.md:116 / planning SKILL.md:444 (audit said 407). decision-scout duplicate step 5 at :52 and :60. Rely on grep/rg-based acceptance, not line numbers."
  - "CE-14 interpretation: collapse ONLY the slim-report stdout-explanation line (plan.md:20 / implement.md:16). The adjacent git-fetch-main and roadmap-slim paragraphs are workflow-specific, NOT duplicates -- leave them intact. The audit's 20-24 / 16-18 ranges are loose region-pointers."
  - "WF-17 x CE-05 reconciliation: plan.md Step 9 is thinned to a trigger+pointer but must still mention the 3-round cap (WF-17 acceptance requires 'both Step 9 surfaces reference the 3-round cap'). Phrase the pointer as 'loop on REVISE (3-round cap, then escalate per the skill), proceed on PROCEED'."
  - "gates: decision-scout=FLAGS_FOUND after 1 round; plan-critique=<recorded at Step 9>. (This plan dogfoods WF-08's own gate-recording convention in its context list.)"
  - "Decisions this plan must reference (scout CITE list): Decision 90 (four-tier /orient->/plan->/implement workflow being edited), Decision 86 (forward-routing rule + collocation governing the CE-10 dedup), Decision 85 (PlanDocument extra='forbid' -- governs where CITE/verdict entries may live), Decision 48 (V1/V2/V3 tiers -- governs 12m and confirms this plan's own V1), Decision 79 (active-manifest Lambda tiering + retained STRATEGIC clause), Decision 67 (STRATEGIC freeze -- 12d must survive), Decision 100 + Decision 75 (managed-service-native check + frame-challenge phase -- both live in edited files, protected), Decision 55 (RCA-first -- cap must escalate not skip), Decision 59 (deterministic signals -- governs the gate-completeness echoes), Decision 76 (.claude/ canonical; NO .agents/ mirror obligation, confirming the six-file scope is complete)."
  - "WF-18 completeness echo (Decision 105 caveat from the scout): M is the LIVE-FILE header count via `rg -c \"^## Decision \" docs/DECISIONS.md` (currently 67), NOT the max decision number (107, which reflects archive/gaps) and NOT inclusive of docs/DECISIONS_ARCHIVE.md. The decision-scout Phase 1 instruction must state this so an implementer does not mis-read a false gate-incomplete."
  - "Context-economy target: audit estimates ~-110 net lines across the nine audit files after finding-driven additions; this slice touches six of them. Directional, not a hard gate."
  - "Preflight (2026-07-02): venv ok, creds ok, 0 behind main, 0 ci-rca recs (no HARD BLOCK). Informational: open_recommendations=613, non_automatable_softcap_breached=true (both suspended per Decision 73, non-blocking for markdown-only work). endstate_drift stale (advisory)."
pre_implementation_checklist:
  - "Branch confirmed not on main (claude/workflow-audit-findings-b4kgqh)."
  - "docs/PROJECT_CONTEXT.md read."
  - "Only the plan-cited decision sections read (WF-04 handoff -- scout CITE list is in this plan's context)."
  - "audits/workflow-review-d107b4a.yaml read as the spec."
  - "All six in-scope files located and readable; sub-scoping for implement.md / implement SKILL.md understood."
  - "Acceptance criteria understood and verifiable via the V1 grep/rg VP."
execution_steps:
  - "WF-04 (do first): planning SKILL.md plan-template -- add a required ITEM to the existing free-text `context:` list: 'Decision-scout verdict + CITE list (verbatim decision ids)'. This is a list[str] entry in the template, NOT a new PlanDocument field (Decision 85 extra='forbid'; do not touch scripts/plan_document.py). implement.md Step 2 (line ~50) -- replace '... and docs/DECISIONS.md before proceeding' with 'read ONLY the decisions cited in the plan context (locate each via rg \"^## Decision N:\" docs/DECISIONS.md); do not load the full file'."
  - "WF-20: add required-context frontmatter -- planning SKILL.md [logs/.preflight-report.json, docs/PROJECT_CONTEXT.md, docs/ROADMAP-PLATFORM.yaml]; implement SKILL.md [logs/.preflight-report.json, docs/PROJECT_CONTEXT.md] (no full DECISIONS.md, reflecting WF-04)."
  - "WF-05: plan-critique SKILL.md Phase 1 -- replace the unconditional full reads of ROADMAP-PLATFORM.yaml / ROADMAP-PRODUCT.yaml / DECISIONS.md with (a) extract the tier_item/phase ids and decision ids the plan names, (b) read only those roadmap items (python extraction) and decision sections, (c) conflict-sweep via rg of 2-3 approach keywords over '^## Decision' headers plus the plan's recorded CITE list. PROJECT_CONTEXT.md stays a full read. Update the required-context frontmatter to match."
  - "WF-06: plan-critique SKILL.md Phase 2 -- add 12l (follow-on closes_criteria: non-empty, each ref names a status:open criterion, acceptance_criteria map 1:1, else REVISE) and 12m (tier fitness: verification_tier must satisfy the planning skill's Verification Tier Guidelines -- resource-affecting .tf OR active-manifest Lambda scope => V3; Python source => >=V2; a lower declared tier => REVISE [Decision 48/79 qualification per scout NOTE]). Insert 12l/12m AFTER 12k and BEFORE Phase 2b so Decision 67's 12d STRATEGIC block keeps its number. Mirror both in the Phase 3 output template. Ride-alongs: reword 12d's parenthetical to the surviving CD.17/executor-freeze framing (drop 'telemetry tables not yet confirmed operational'); add a 'Files Read' row to the Phase 3 output template."
  - "WF-08: add to the planning-skill Decision Scout Gate and Critique Gate, and the implement-skill Code Review Protocol: 'If the gate subagent errors or returns output missing the required Verdict/Recommendation line, the gate has NOT completed -- re-dispatch; never proceed past an incomplete gate.' Add the plan-template context entry 'gates: decision-scout=<verdict>; plan-critique=<verdict> after <N> round(s)'."
  - "WF-18: decision-scout SKILL.md Phase 1 -- 'run rg -c \"^## Decision \" docs/DECISIONS.md and record the count M (the LIVE-FILE header count -- currently 67 -- NOT the max decision number and NOT inclusive of docs/DECISIONS_ARCHIVE.md, per Decision 105)'. Phase 3 output -- mandatory line 'Decisions triaged: N of M'. Renumber ONLY the duplicate SECOND step 5 at :60 (the status filter) to 6 and cascade Phase 3 numbering (6->7, 7->8); the FIRST step 5 at :52 is the Decision 100 managed-service-native check and KEEPS number 5 (protected region). In the planning-skill scout verdict-handling, treat N!=M or a missing triage line as gate-incomplete -> re-dispatch."
