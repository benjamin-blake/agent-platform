schema_version: 1
slug: "t2-26-migrate-ops-execution-plans"
intent: >-
  Migrate the ops_execution_plans table onto the DuckLake closed writer/reader boundary -- the one
  non-CD-gated table remaining in T2.26 -- so the last executor-owned ops write path leaves the dead
  Iceberg/OpsWriter estate and the eventual ops_compaction retirement has one fewer blocker. Provisions
  the table fresh on DuckLake (no live Iceberg source exists), repoints the frozen executor producer
  through a named portal verb, and establishes the plan->telemetry-trace join the self-improvement loop
  will need.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-t2-26-migrate-ops-execution-plans.yaml
phase: >-
  Platform tier_item T2.26 (Deferred ops-table DuckLake migrations + ops_compaction retirement);
  closes newly-added criterion T2.26:c9. Follow-on slice after the T2.19 recs cutover.
closes_criteria:
  - "T2.26:c9"
scope:
  - file: config/lambda/ducklake/field_semantics.static.yaml
    action: Modify
    purpose: >-
      Expand the ops_execution_plans block from the minimal placeholder (rec_id, plan, status) to the
      Fable-recommended shape -- promoted scalars rec_id[merge_key]/revision/status/model/tokens_used/
      prompt_hash/slug/planning_session_id + steps/critique_history/plan_text as VARCHAR JSON, derived
      ulid/created/last_updated -- and flip status: dormant -> live. This is the editable SoT; the .yaml
      is generated from it.
  - file: config/lambda/ducklake/field_semantics.yaml
    action: Modify
    purpose: >-
      Regenerated from the static sidecar via scripts.schema_to_field_semantics (do-not-hand-edit; drift
      gate --check must be clean). Bundled into ducklake_writer/reader zips -> triggers the governed deploy.
  - file: scripts/ops_portal/execution_plans.py
    action: Create
    purpose: >-
      Named portal producer (mirrors ops_portal/decisions.py): save_execution_plan(plan_dict) projects
      ExecutionPlan.to_dict() onto the registered columns (steps/critique_history -> json.dumps;
      planning_session_id carried opaque), routes action=write_ops via writer_transport, and does the local
      read-cache upsert. Keeps execution_plans writes on the Single-Portal path (Decision 81 cl.4 / 84).
  - file: scripts/executor/plan.py
    action: Modify
    purpose: >-
      Repoint save_plan off OpsWriter().write("ops_execution_plans", ...) onto
      scripts.ops_portal.execution_plans.save_execution_plan(...). Producer is CD.17-frozen -> table lands
      empty (priority_queue precedent).
  - file: scripts/s3_log_store.py
    action: Modify
    purpose: Remove the ".execution-plans.jsonl" -> ops_execution_plans OpsWriter write-through routing sentinel.
  - file: scripts/ops_writer.py
    action: Modify
    purpose: Drop ops_execution_plans from _OPS_TABLE_NAMES and _OPS_TABLE_DTYPES (no Iceberg staging path survives).
  - file: scripts/data_quality_execute.py
    action: Modify
    purpose: >-
      Add ops_execution_plans to _DUCKLAKE_OPS_TABLES so its DQ checks route to the closed reader; correct
      the stale "stays on Athena until T2.26" comments.
  - file: config/agent/data_quality/ops.yaml
    action: Modify
    purpose: >-
      Add an ops_execution_plans tables block: rec_id not_null, status accepted_values, (rec_id,revision)
      uniqueness, and a revision-monotonic current-vs-history check (Fable guard against late-replay clobber).
  - file: scripts/sync/ops.py
    action: Modify
    purpose: >-
      Add ops_execution_plans to _TABLE_TO_LOCAL + _DUCKLAKE_MIGRATED_TABLES; add _coerce_ops_execution_plans_row
      and a dispatch branch; update the stale "NOT migrated to the personal account" comment.
  - file: docs/contracts/_joins.yaml
    action: Modify
    purpose: >-
      Register the logical join (key session_id; from ops_execution_plans.planning_session_id; to
      telemetry_sessions.session_id; cardinality many_to_one; soft/unenforced) -- the artifact->producing-run
      linkage (OpenLineage Job/Run/Dataset pattern).
  - file: docs/contracts/session-id.yaml
    action: Modify
    purpose: >-
      Add ops_execution_plans to joins_using_this_key (a consumer of the session_id key via planning_session_id;
      UUID4 grandfathered until open_session mints ULID, opaque-string carry).
  - file: docs/contracts/storage-substrate.yaml
    action: Modify
    purpose: >-
      Update the ops_execution_plans declaration with the grain note (one row per plan revision) and the
      expanded column shape; it already carries merge_key: rec_id.
  - file: docs/contracts/log-storage.yaml
    action: Modify
    purpose: Remove/re-ground the ".execution-plans.jsonl" -> ops_execution_plans routing mirror (write path retired).
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      c9 added at plan time (closure target). On VP pass: flip c9 open -> met (met_by:
      t2-26-migrate-ops-execution-plans); re-ground c2/c3/c8 text (execution_plans migrated; only
      ops_session_log (CD.40/T3.20-gated) remains; no live Iceberg table/view ever existed -- stale-ref
      correction); append a progress_note entry.
bundled_recommendations: []
infrastructure_dependencies:
  - >-
    Governed deploy channel .github/workflows/deploy-ducklake-lambdas.yml (T2.38, landed) redeploys
    ducklake_writer + ducklake_reader on merge to main (path filter includes config/lambda/ducklake/**).
    No terraform/personal apply: the four DuckLake Lambdas are terraform_personal_ignore_changes_decoupled
    post-#544 (Decision 125/126). The break-glass build_lambda --ducklake-only --deploy is NOT the VP default.
  - >-
    Neon DuckLake catalog: the physical ops_execution_plans_history / ops_execution_plans_current tables are
    provisioned at runtime via the writer create_ops_tables action against the deployed writer Function URL
    -- not a terraform step, not a neon_* op (so the Decision 77 fail-closed guard does not gate it).
  - >-
    Ordering: the redeployed reader must carry the expanded/live field_semantics BEFORE the post-deploy
    reader/DQ/sync VP steps run (deploy -> provision -> readback).
acceptance_criteria:
  - >-
    ops_execution_plans_history and ops_execution_plans_current are provisioned on the DuckLake catalog with
    grain one-row-per-plan-revision (merge_key rec_id, current = latest revision); reader current_state
    returns a list (0 rows, empty) with no TABLE_NOT_FOUND.
  - >-
    The executor save_plan producer writes execution_plans via the named portal producer
    (scripts/ops_portal/execution_plans.py -> write_ops); NO OpsWriter/Iceberg write path for
    ops_execution_plans survives (grep-clean in plan.py, ops_writer._OPS_TABLE_NAMES, s3_log_store routing,
    log-storage.yaml) -- replacement closure.
  - >-
    planning_session_id is a first-class opaque-VARCHAR soft-FK column to telemetry_sessions.session_id,
    registered in docs/contracts/_joins.yaml and docs/contracts/session-id.yaml; no UUID/ULID translation
    table or dual id column is introduced.
  - >-
    DQ checks for ops_execution_plans route to the ducklake reader (not Athena) and return PASS/WARN (no
    FAIL/HARD_GATE); the (rec_id,revision) uniqueness and status accepted_values checks are defined.
  - "scripts.sync.ops pull retrieves ops_execution_plans via the reader (0 rows) and writes its local cache without error."
  - >-
    No ops_execution_plans_current Athena view exists in the personal account (information_schema.views query
    returns 0 rows) -- c8's execution_plans half is satisfied with nothing to drop.
  - >-
    Roadmap bookkeeping: c9 flipped met (met_by: t2-26-migrate-ops-execution-plans); c2/c3/c8 re-grounded to
    record execution_plans done + only ops_session_log (CD.40/T3.20-gated) remaining and the no-live-Iceberg
    stale-reference correction.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: field_semantics.yaml is regenerated from the edited static sidecar (no drift).
    command: "bin/venv-python -m scripts.schema_to_field_semantics --check"
    expected: "Exit 0 / no drift -- the generated field_semantics.yaml matches the edited static sidecar."
    fix_if: "Drift reported -> the sidecar was edited but not regenerated; run scripts.schema_to_field_semantics (no --check) then re-run."
    hermetic: false
  - step: 2
    phase: pre-deploy
    action: The resolved spec carries the expanded columns, merge_key rec_id, and status is live.
    command: "bin/venv-python -c \"from src.common.ducklake_scd2_schema import resolve_table_spec, load_field_semantics; s=resolve_table_spec('ops_execution_plans'); cols=[c for c,_ in s.ordered_columns]; assert s.merge_key=='rec_id', s.merge_key; need={'rec_id','revision','status','model','tokens_used','prompt_hash','planning_session_id','steps','critique_history','plan_text'}; assert need<=set(cols), sorted(need-set(cols)); st=load_field_semantics()['ops_tables']['ops_execution_plans'].get('status','live'); assert st!='dormant', st; print('OK', st, cols)\""
    expected: "Prints OK, a non-dormant status, and a column list containing every promoted scalar + the JSON blobs."
    fix_if: "AssertionError -> columns not expanded, merge_key wrong, or status still dormant in the sidecar."
    hermetic: false
  - step: 3
    phase: pre-deploy
    action: No OpsWriter/Iceberg write path for ops_execution_plans remains (replacement closure, static).
    command: "bin/venv-python -c \"import pathlib; t=pathlib.Path('scripts/executor/plan.py').read_text(); assert 'OpsWriter().write(\\\"ops_execution_plans\\\"' not in t, 'plan.py still writes via OpsWriter'; from scripts.ops_writer import _OPS_TABLE_NAMES; assert 'ops_execution_plans' not in _OPS_TABLE_NAMES, 'still in _OPS_TABLE_NAMES'; import scripts.s3_log_store as s; assert 'ops_execution_plans' not in set(getattr(s,'_OPS_TABLE_ROUTING',{}).values()), 's3_log_store still routes it'; print('OK')\""
    expected: "OK -- plan.py no longer OpsWriter-writes execution_plans; it is absent from _OPS_TABLE_NAMES and the s3_log_store routing."
    fix_if: "Assertion fails -> a residual Iceberg/OpsWriter write path survives; remove it."
    hermetic: false
  - step: 4
    phase: pre-deploy
    action: Unit-test the new portal producer projection (dataclass -> registered columns, JSON blobs, opaque session id).
    command: "bin/venv-python -m pytest tests/test_ops_portal_execution_plans.py -q"
    expected: "Passing -- save_execution_plan projects rec_id/revision/status/model/tokens_used/prompt_hash/slug/planning_session_id and json.dumps(steps|critique_history); planning_session_id passes through as an opaque string."
    fix_if: "Failing -> projection drops/renames a column or mis-serializes a JSON blob."
    hermetic: false
  - step: 5
    phase: pre-deploy
    action: DQ and sync routing include ops_execution_plans on the DuckLake/reader path.
    command: "bin/venv-python -c \"from scripts.data_quality_execute import _DUCKLAKE_OPS_TABLES; from scripts.sync.ops import _TABLE_TO_LOCAL,_DUCKLAKE_MIGRATED_TABLES; assert 'ops_execution_plans' in _DUCKLAKE_OPS_TABLES; assert 'ops_execution_plans' in _TABLE_TO_LOCAL and 'ops_execution_plans' in _DUCKLAKE_MIGRATED_TABLES; print('OK')\""
    expected: "OK -- DQ routes execution_plans checks to the reader; sync pulls it from the reader with no Athena fallback."
    fix_if: "Missing membership -> add to the named set(s)."
    hermetic: false
  - step: 6
    phase: pre-deploy
    action: The plan->telemetry-trace join and the grain note are registered in the contracts.
    command: "bin/venv-python -c \"import pathlib; j=pathlib.Path('docs/contracts/_joins.yaml').read_text(); sid=pathlib.Path('docs/contracts/session-id.yaml').read_text(); ss=pathlib.Path('docs/contracts/storage-substrate.yaml').read_text(); assert 'ops_execution_plans.planning_session_id' in j, '_joins.yaml missing the join'; assert 'ops_execution_plans' in sid, 'session-id.yaml missing consumer'; assert 'revision' in ss, 'storage-substrate grain note missing'; print('OK')\""
    expected: "OK -- planning_session_id -> telemetry_sessions.session_id join defined; session-id lists execution_plans; storage-substrate records the per-revision grain."
    fix_if: "Missing -> register the join / consumer / grain note (telemetry correlation is a launch requirement, not polish)."
    hermetic: false
  - step: 7
    phase: pre-deploy
    action: Fast presubmit passes (schema, placement, roadmap closes_criteria referential integrity).
    command: "bin/venv-python -m scripts.validate --pre"
    expected: "PASS -- plan_document schema, placement, and closes_criteria [T2.26:c9] referential integrity all green."
    fix_if: "Failure -> address the named check; if closes_criteria fails, c9 is missing from docs/ROADMAP-PLATFORM.yaml."
    hermetic: false
  - step: 8
    phase: post-deploy
    action: The governed deploy channel redeployed writer+reader at the merge SHA (CI-delegated, Decision 119).
    command: "aws s3api list-objects-v2 --bucket agent-platform-data-lake --prefix deploy-records/ducklake/ --profile agent_platform --query 'reverse(sort_by(Contents,&LastModified))[0].Key' --output text | xargs -I{} aws s3 cp s3://agent-platform-data-lake/{} - --profile agent_platform | bin/venv-python -c \"import sys,json; d=json.load(sys.stdin); print('deploy record source_git_sha=', d.get('source_git_sha'), 'functions=', d.get('functions') or d.get('deployed'))\""
    expected: "Latest ducklake deploy record's source_git_sha == the plan's merge commit, listing writer + reader -- deploy-ducklake-lambdas.yml ran on merge (config/lambda/ducklake/** path filter)."
    fix_if: "Stale/absent record -> the governed run did not complete; check/redispatch deploy-ducklake-lambdas.yml (workflow_dispatch). Do NOT fall back to local build_lambda --deploy except as acknowledged break-glass."
    hermetic: false
  - step: 9
    phase: post-deploy
    action: Provision the physical history/current tables via the writer create_ops_tables action.
    command: "bin/venv-python -c \"from scripts.ops_portal.writer_transport import _ducklake_write; r=_ducklake_write('ops_execution_plans', {}, action='create_ops_tables'); print('provisioned:', r)\""
    expected: "Writer returns the created tables (ops_execution_plans_history + ops_execution_plans_current)."
    fix_if: "'unknown ops table' -> the reader/writer was not redeployed with the live field_semantics (step 8 failed); catalog error -> check Neon/writer perms."
    hermetic: false
  - step: 10
    phase: post-deploy
    action: Reader readback -- current_state returns an empty list without error (provisioned, empty).
    command: "bin/venv-python -c \"from src.common.iceberg_reader import make_reader; r=make_reader(table='ops_execution_plans'); rows=r.current_state('ops_execution_plans'); assert isinstance(rows, list); print('OK rows=', len(rows))\""
    expected: "0 rows, no error -- the closed reader serves the provisioned empty table."
    fix_if: "TABLE_NOT_FOUND -> provisioning (step 9) did not run; boundary error -> reader not redeployed."
    hermetic: false
  - step: 11
    phase: post-deploy
    action: DQ run for ops_execution_plans routes to the reader and passes.
    command: "bin/venv-python -m scripts.data_quality_runner --table ops_execution_plans"
    expected: "verdict PASS/WARN (empty-row WARN tolerated), backend=ducklake, no FAIL/HARD_GATE."
    fix_if: "Athena backend used -> routing (_DUCKLAKE_OPS_TABLES) missed; HARD_GATE/FAIL -> schema/check mismatch."
    hermetic: false
  - step: 12
    phase: post-deploy
    action: sync pull retrieves execution_plans via the reader and writes the local cache.
    command: "bin/venv-python -m scripts.sync.ops pull && bin/venv-python -c \"from scripts.sync.ops import _TABLE_TO_LOCAL, _LOGS_DIR; import pathlib; p=_LOGS_DIR/_TABLE_TO_LOCAL['ops_execution_plans']; assert p.exists(), p; print('OK cache', p)\""
    expected: "Pull completes with no reader-unreachable warning for execution_plans; its local cache file exists (0 rows)."
    fix_if: "reader-unreachable / TABLE_NOT_FOUND -> provisioning or routing missing."
    hermetic: false
  - step: 13
    phase: post-deploy
    action: c8 execution_plans half -- confirm NO ops_execution_plans_current Athena view exists.
    command: "bin/venv-python -c \"import awswrangler as wr; df=wr.athena.read_sql_query(\\\"SELECT table_name FROM information_schema.views WHERE table_schema='agent_platform' AND table_name='ops_execution_plans_current'\\\", database='agent_platform', workgroup='agent-platform-production'); assert df.empty, df.to_dict('records'); print('OK: no ops_execution_plans_current view')\""
    expected: "0 rows -- no _current view exists for execution_plans (create-fresh-on-DuckLake; nothing to drop)."
    fix_if: "A row returns -> an unexpected view exists; add an explicit drop mirroring null_resource.drop_ops_decisions_view (with the %{if var.aws_profile != \"\"} guard)."
    hermetic: false
constraints:
  - "No rescue agents or workaround loops (Decision 55). Writer errors FAIL LOUDLY; no offline outbox for execution_plans (Decision 84 I-4)."
  - "Single-Portal preserved: execution_plans writes transit a named portal producer (scripts/ops_portal/execution_plans.py), never a raw transport call (Decision 81 cl.4 / 84)."
  - "Deploy ONLY via the governed .github/workflows/deploy-ducklake-lambdas.yml channel (Decision 125/126, T2.38). Local build_lambda --ducklake-only --deploy is break-glass, not the VP default."
  - "No terraform/personal edits: no _current view to drop, and the DuckLake functions are ignore_changes-decoupled (#544). No local terraform validate/plan/init (Decision 119, CI-delegated)."
  - "config/lambda/ducklake/field_semantics.yaml is GENERATED -- edit the .static.yaml sidecar and regenerate via scripts.schema_to_field_semantics; never hand-edit the generated file (drift gate)."
  - "planning_session_id stored as opaque VARCHAR carrying exactly what open_session mints; NO UUID/ULID translation table, NO dual id column (Decision 97 cl.4 / session-id.yaml). Do not gate on or pull in the open_session ULID flip -- out of scope."
  - "SLOC: scripts/executor/plan.py is a Decision-43 day-1-waived large file; the repoint is a small edit. If it or the new producer crosses budget, decompose (facade, Decision 128) -- do not raise the budget."
  - "Status-Trusted-Never-Inferred: only /implement flips c9 open->met, on a verified VP pass; never infer met from prose or file existence."
