execution_steps:
  - >-
    Edit config/lambda/ducklake/field_semantics.static.yaml: expand the ops_execution_plans block to the
    Fable shape (promoted scalars rec_id[merge_key]/revision/status/model/tokens_used/prompt_hash/slug/
    planning_session_id + steps/critique_history/plan_text as VARCHAR JSON; derived ulid/created/last_updated),
    keep merge_key rec_id and partition day(created_timestamp)/bucket(8,rec_id), flip status: dormant -> live.
    Regenerate config/lambda/ducklake/field_semantics.yaml (scripts.schema_to_field_semantics) and confirm --check clean.
  - >-
    Create scripts/ops_portal/execution_plans.py (mirror ops_portal/decisions.py): save_execution_plan(plan_dict)
    projects ExecutionPlan.to_dict() onto the registered columns (json.dumps steps/critique_history;
    planning_session_id opaque), routes action=write_ops via writer_transport._ducklake_write, then the local
    read-cache upsert. This is the Single-Portal-honoring producer.
  - >-
    Repoint scripts/executor/plan.py::save_plan onto scripts.ops_portal.execution_plans.save_execution_plan(...);
    remove the s3_log_store.py ".execution-plans.jsonl" routing sentinel + docs/contracts/log-storage.yaml mirror;
    drop ops_execution_plans from scripts/ops_writer.py _OPS_TABLE_NAMES and _OPS_TABLE_DTYPES.
  - >-
    DQ: add ops_execution_plans to _DUCKLAKE_OPS_TABLES in scripts/data_quality_execute.py (fix the stale
    comments); add an ops_execution_plans block to config/agent/data_quality/ops.yaml (rec_id not_null; status
    accepted_values; (rec_id,revision) uniqueness; revision-monotonic current-vs-history check).
  - >-
    sync: add ops_execution_plans to _TABLE_TO_LOCAL + _DUCKLAKE_MIGRATED_TABLES in scripts/sync/ops.py; add
    _coerce_ops_execution_plans_row + a dispatch branch in _coerce_rows_list; update the stale migration comment.
  - >-
    Contracts: register the join in docs/contracts/_joins.yaml (key session_id; from
    ops_execution_plans.planning_session_id; to telemetry_sessions.session_id; cardinality many_to_one; logical/
    soft); add ops_execution_plans to docs/contracts/session-id.yaml joins_using_this_key; update
    docs/contracts/storage-substrate.yaml with the grain note + expanded column shape.
