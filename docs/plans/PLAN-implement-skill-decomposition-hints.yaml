  skill's tier_item bookkeeping rule to inherit bootstrap-completion exemption from a parent
  tier_item onto its atomic child plans, so freeze-override decompositions stay
  governance-consistent without per-child re-derivation -- closing the last enforcement gap
  that keeps pre-codegen contract ratification a machine-checked ritual rather than voluntary
  discipline.
