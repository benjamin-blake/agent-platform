execution_steps:
  - >-
    Modify .claude/skills/implement/SKILL.md. Insert the following subsection verbatim into the
    "## Tier_item bookkeeping (post-verification, pre-merge)" section, immediately AFTER the
    "### Outcome rules" block (after its "Zero criteria pass -> no YAML change." line) and BEFORE
    "### Replacement closure check (cutover / supersession items)". Use ASCII hyphens only, no em
    dashes, no emojis. Exact text to insert:
  - |
    ### Decomposition-hint exemption inheritance (T-1.12 subset g)

    A STRATEGIC parent tier_item that was split into atomic IMPLEMENTATION plans under the freeze
    override (AGENTS.md Temporary Operational Constraints / CD.17; the T2.19 pattern) carries a
    `decomposition_hints` block naming its children:
    ```yaml
    decomposition_hints:
      split_by: <subsystem|per_lambda|phase|...>
      atomic_plans:
        - "PLAN-<child-slug> -- <description> (subset <x>)"
      rationale: |
        ...
    ```
    When the bookkeeping walk files a status outcome for the current plan, resolve the plan's
    effective `bootstrap_completion_exempt` by INHERITANCE from its parent -- do NOT read it from
    the child's own (often absent) flag:

    1. **Find the parent.** Scan `docs/ROADMAP-PLATFORM.yaml` `tier_items[]` for an item whose
       `decomposition_hints.atomic_plans[]` names the current plan. Match on the `PLAN-{slug}` token
       at the head of each entry (`entry.strip().split()[0] == "PLAN-{slug}"`). Some parents enumerate
       their children as prose descriptions rather than `PLAN-{slug}` tokens (e.g. T1.12's
       "Ratify lambda-*.yaml" entries, T1.6's phase descriptions); when no head-token match exists,
       map the current plan to its parent via the plan's Phase field / the decomposition rationale.
    2. **Inherit the flag.** The child's effective exemption is the PARENT's live
       `bootstrap_completion_exempt` value. The per-item flag is the single source of truth -- the
       document-level "Bootstrap clause (COMPLETION exemption)" prose enumeration is documentation
       only. A child of an exempt parent (`true`) MAY stage `status: complete` on its slice even while
       the parent's gating CD is still `state: pending`; a child of a non-exempt parent (`false`)
       follows the normal flow and stays gated on CD ratification. Canonical examples: T-1.12 is
       `bootstrap_completion_exempt: true`, so its subset children inherit `true` (they may complete
       ahead of CD.25); T1.12 is `false`, so its per-Lambda children inherit `false` and ratify
       post-CD.16 under the normal flow.
    3. **Read-only resolution.** Inheritance never writes the parent's `decomposition_hints` or the
       child's flag during bookkeeping -- it is read-only resolution at filing time. Record the
       inheritance in the bookkeeping output (e.g. "PLAN-<child-slug> inherits
       bootstrap_completion_exempt=true from parent T-1.12"). This is not a license to author STRATEGIC
       children: the freeze stays in force and atomic children remain IMPLEMENTATION plans.

    **Self-application invariant (T-1.12 subset g):** `PLAN-implement-skill-decomposition-hints` is
    itself an atomic child named in T-1.12's `decomposition_hints.atomic_plans`. The first `/implement`
    run using this rule SHOULD therefore resolve this plan's exemption as inherited `true` from parent
    T-1.12 and, subset (g) being T-1.12's last open exit criterion, stage `T-1.12 -> status: complete`
    in the same bookkeeping pass. If the rule works, T-1.12 self-flips; if it does not, T-1.12 stays
    `in_progress` and the discrepancy is observable (mirrors the T-1.10 self-application invariant below).
  - >-
    Create tests/test_implement_skill_decomposition_hints.py with type hints and ruff formatting
    (line length 127). Module-level objects: (a) SKILL_PATH = repo-root /
    ".claude/skills/implement/SKILL.md"; ROADMAP_PATH = repo-root / "docs/ROADMAP-PLATFORM.yaml".
    (b) _bookkeeping_section(text) -> str: returns the slice from "## Tier_item bookkeeping" up to the
    next top-level "\n## " header. (c) assert_inheritance_documented(text) -> None: raises AssertionError
    unless the bookkeeping section contains the header "### Decomposition-hint exemption inheritance" AND
    all required tokens within that section: "decomposition_hints", "atomic_plans",
    "bootstrap_completion_exempt", "read-only", "inherit" (case-insensitive), "T-1.12", and "T1.12".
    (d) resolve_inherited_exemption(roadmap_doc, plan_slug) -> bool | None: an in-test model of the rule
    -- iterate roadmap_doc.tier_items; for any item with decomposition_hints containing atomic_plans,
    if any entry's head token (entry.strip().split()[0]) equals f"PLAN-{plan_slug}", return that item's
    bootstrap_completion_exempt; return None if no parent matches.
  - >-
    Add these tests to the file: test_inheritance_clause_present_in_live_skill (assert_inheritance_documented
    on SKILL_PATH.read_text passes); test_clause_co_located_in_bookkeeping_section (the header appears inside
    _bookkeeping_section(text), not merely anywhere in the file); test_assertion_helper_has_teeth (strip the
    subsection from header to the next "###"/"## " boundary via regex, then assert_inheritance_documented on
    the mutated text raises AssertionError -- proves non-vacuity); test_behavioural_invariants_block_still_parses
    (scripts.prompt_compliance.parse_invariants(SKILL_PATH) returns a dict whose keys include preflight_run,
    never_on_main, review_as_scope, auto_review_and_commit); test_resolution_exempt_parent (synthetic
    RoadmapDocument via scripts.platform_roadmap with a parent bootstrap_completion_exempt=true naming
    "PLAN-child-x" -> resolve returns True); test_resolution_non_exempt_parent (parent false -> returns False);
    test_resolution_no_parent_returns_none (unrelated slug -> None); test_live_roadmap_this_plan_inherits_from_t_1_12
    (load ROADMAP_PATH via scripts.platform_roadmap.load; resolve_inherited_exemption(doc,
    "implement-skill-decomposition-hints") is True AND the matched parent id == "T-1.12"). Reuse the synthetic
    roadmap-doc construction pattern from tests/test_platform_roadmap.py (_BASE_DOC / _item / _doc helpers) if
    convenient, or build a minimal valid doc inline.
  - >-
    Execute the Verification Plan -- run each step; loop until every step passes; on an unrecoverable
    failure stop and run RCA (Decision 55), do not inline-patch around a structural failure.
  - "Report: what was implemented (the SKILL.md subsection + the test file), and the VP compliance table with actual outputs."
