schema_version: 1
slug: "t5-3-scheduled-surface-rehome"
intent: >-
  Re-scope and complete platform tier_item T5.3 ("Legacy .github/prompts + .github/agents
  retirement"). T5.3's actual deliverable -- retiring the legacy *interactive* VS Code prompt/agent
  surfaces (Decision 58) -- was delivered by T-1.13 (PLAN-instruction-architecture-yaml, commit
  f1e001bafa28d5d0b4fa857ca6eac2cc38d4b07d): top-level .github/prompts/*.prompt.md (8 files),
  .github/agents/*.agent.md (9 files), .github/copilot-instructions.md, and the .agents/ tree were
  deleted. The files surviving under .github/prompts/scheduled/ (7 files) and .github/agents/schedule.yaml
  are *scheduled-agent* surfaces -- live runtime surfaces of the disabled-but-deployed Lambda
  scheduled-agent loop -- which collide with T5.3 only because they share the directory paths. Their
  owner is T4.3 ("Scheduled-agent loop re-enabled in personal account", status not_started). Per
  Decision 86 (forward-route intent to the receiving tier_item), this plan rehomes T5.3's two
  exit_criteria to T4.3, transfers the directory deletion + consumer-repoint work to T4.3 as a new
  criterion, and marks T5.3 complete. Roadmap-config-only; no code, no Lambda, no .github file deleted.
plan_type: IMPLEMENTATION
verification_tier: V1
plan_path: docs/plans/PLAN-t5-3-scheduled-surface-rehome.yaml
phase: >-
  T5 retirement tier. Follows T-1.13 (PLAN-instruction-architecture-yaml), which retired the legacy
  interactive prompt/agent surfaces and the .agents/ tree, leaving T5.3 in_progress with two open
  exit_criteria that measure full-directory deletion. This plan resolves that residual by transferring
  ownership of the surviving scheduled-agent surfaces to their substrate owner (T4.3) and completing
  T5.3. T4.3 remains not_started; the actual file deletion happens when T4.3 re-enables/re-homes the
  scheduled-agent loop onto the CD.27/CD.28 substrate.
scope:
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Two tier_items change, nothing else. (1) T5.3: convert its 2 bare-string exit_criteria to
      structured ExitCriterion objects (text preserved verbatim), set BOTH status: rehomed with
      met_by: T4.3, set status: complete, set completed_at: "2026-06-29", and replace progress_note
      with the re-scope rationale. Keep related_decisions: [58], depends_on, files_in_scope, intent,
      name, tier, effort, strategic unchanged. (2) T4.3: convert its 4 bare-string exit_criteria to
      structured objects (text verbatim, status: open), add a 5th criterion c5 capturing the rehomed
      deletion + consumer repoint (status: open), append .github/prompts/scheduled/ and
      .github/agents/schedule.yaml to files_in_scope, and add a progress_note recording the transfer.
      Keep T4.3 status: not_started, depends_on, related_candidate_decisions, intent, effort unchanged.
      No other tier_item, gate, or candidate_decision is touched. No .github file is deleted by this
      plan -- the surviving scheduled surfaces stay live until T4.3 re-homes them.
bundled_recommendations: []
infrastructure_dependencies: []
closes_criteria: []
acceptance_criteria:
  - >-
    T5.3 status == complete with completed_at == "2026-06-29". Both its exit_criteria are structured
    ExitCriterion objects with text byte-identical to the prior bare strings ("grep -r '.github/prompts'
    returns no references in production code" and "Directories deleted in a single PR"), each
    status: rehomed with met_by: T4.3. related_decisions remains [58]; depends_on remains [T-1.2, T4.3];
    intent, name, files_in_scope unchanged.
  - >-
    T4.3 has 5 structured exit_criteria: c1-c4 carry the original four texts verbatim with status: open,
    and a new c5 (status: open) names the deletion of .github/prompts/scheduled/ + .github/agents/schedule.yaml
    and the repoint of the runtime consumers (run_scheduled_agent.py, scheduled_agent_handler.py,
    findings_processor_handler.py, validate.py check_source_registry, src/lambdas/data-pipeline/manifest.yaml),
    flagged as rehomed from T5.3:c1/c2. T4.3 files_in_scope now includes .github/prompts/scheduled/ and
    .github/agents/schedule.yaml. T4.3 status remains not_started.
  - >-
    The roadmap loads (scripts.platform_roadmap.load) and validate_platform_roadmap criteria-integrity
    passes: rule (g) met/rehomed criteria carry non-empty met_by; rule (h) T5.3's rehomed met_by=T4.3
    resolves to a known tier_item id; rule (ii) neither touched item retains a bare-string criterion.
  - >-
    No .github file is deleted and no code/config outside docs/ROADMAP-PLATFORM.yaml changes. The only
    files in the commit are docs/ROADMAP-PLATFORM.yaml and this PLAN file. bin/venv-python -m
    scripts.validate --pre passes (plan-document schema, product/platform roadmap validators, contract-drift).
  - >-
    T5.3 no longer appears in the platform_roadmap next_eligible / in_progress surface (it is complete);
    nothing depends_on T5.3 and no cross_tier_gate references it, so completing it strands nothing.
verification_plan:
  - step: 1
    phase: pre-edit
    action: >-
      Capture the starting state: T5.3 is in_progress with two bare-string criteria; T4.3 is not_started
      with four bare-string criteria. (Baseline for the diff; not a gate.)
    command: |-
      bin/venv-python - <<'PY'
      from scripts.platform_roadmap import load
      d = load("docs/ROADMAP-PLATFORM.yaml")
      t = {i.id: i for i in d.tier_items}
      for k in ("T5.3", "T4.3"):
          it = t[k]
          print(k, it.status, "crit=", [(c.id, c.status, c.met_by) for c in it.exit_criteria])
      PY
    expected: >-
      Prints T5.3 in_progress with c1/c2 status open (met_by None), and T4.3 not_started with c1-c4
      status open. Exits 0.
    fix_if: >-
      If the roadmap fails to load before any edit, the working tree is already broken -- stop and
      investigate before editing.
  - step: 2
    phase: post-edit
    action: >-
      Confirm the T5.3 re-scope: status complete, completed_at set, both criteria rehomed to T4.3 with
      text preserved, related_decisions still [58].
    command: |-
      bin/venv-python - <<'PY'
      from scripts.platform_roadmap import load
      d = load("docs/ROADMAP-PLATFORM.yaml")
      t = {i.id: i for i in d.tier_items}["T5.3"]
      assert t.status == "complete", t.status
      assert t.completed_at == "2026-06-29", t.completed_at
      assert t.related_decisions == [58], t.related_decisions
      assert len(t.exit_criteria) == 2, len(t.exit_criteria)
      for c in t.exit_criteria:
          assert c.status == "rehomed", (c.id, c.status)
          assert c.met_by == "T4.3", (c.id, c.met_by)
      texts = {c.text for c in t.exit_criteria}
      assert "grep -r '.github/prompts' returns no references in production code" in texts, texts
      assert "Directories deleted in a single PR" in texts, texts
      print("OK T5.3: complete, completed_at 2026-06-29, c1/c2 rehomed -> T4.3, texts verbatim")
      PY
    expected: 'Prints "OK T5.3: complete, completed_at 2026-06-29, c1/c2 rehomed -> T4.3, texts verbatim"; exits 0.'
    fix_if: >-
      AssertionError -> the staged T5.3 edit is wrong (status, completed_at, met_by, status: rehomed,
      verbatim text, or related_decisions). Correct the edit and re-run.
  - step: 3
    phase: post-edit
    action: >-
      Confirm the T4.3 transfer: 5 structured criteria with c5 naming the rehomed deletion + consumer
      repoint, the two .github paths in files_in_scope, and status still not_started.
    command: |-
      bin/venv-python - <<'PY'
      from scripts.platform_roadmap import load
      d = load("docs/ROADMAP-PLATFORM.yaml")
      t = {i.id: i for i in d.tier_items}["T4.3"]
      assert t.status == "not_started", t.status
      ids = [c.id for c in t.exit_criteria]
      assert ids == ["c1", "c2", "c3", "c4", "c5"], ids
      assert all(c.status == "open" for c in t.exit_criteria)
      c5 = {c.id: c for c in t.exit_criteria}["c5"]
      assert "schedule.yaml" in c5.text and "scheduled/" in c5.text, c5.text
      fis = t.files_in_scope
      assert ".github/prompts/scheduled/" in fis, fis
      assert ".github/agents/schedule.yaml" in fis, fis
      print("OK T4.3: 5 open criteria incl c5 deletion/repoint; .github scheduled paths in files_in_scope; not_started")
      PY
    expected: >-
      Prints "OK T4.3: 5 open criteria incl c5 deletion/repoint; .github scheduled paths in
      files_in_scope; not_started"; exits 0.
    fix_if: >-
      AssertionError -> the T4.3 edit is wrong (missing c5, a bare string survived, the paths were not
      appended, or status changed). Correct the edit and re-run.
  - step: 4
    phase: post-edit
    action: >-
      Run the platform-roadmap criteria-integrity checks directly (validate_platform_roadmap runs in the
      FULL tier, not --pre): pydantic graph validators (g) met/rehomed needs met_by + (h) rehomed met_by
      resolves to a known id, plus the criteria-integrity rules (i)/(ii)/(iii) including the no-bare-string
      and PLAN closes_criteria-resolution checks.
    command: |-
      bin/venv-python - <<'PY'
      import sys
      from scripts.validate import validate_platform_roadmap
      failed: list[str] = []
      validate_platform_roadmap(failed)
      if failed:
          print("FAILED:", failed); sys.exit(1)
      print("OK: platform roadmap schema + criteria integrity green")
      PY
    expected: 'Prints "OK: platform roadmap schema + criteria integrity green"; exits 0.'
    fix_if: >-
      A FAIL line names the offending item/criterion (e.g. rehomed met_by unresolved, bare-string
      criterion on a touched item, met_by not resolving). Fix per the message and re-run.
  - step: 5
    phase: post-edit
    action: >-
      Validate this PLAN's document schema and run the fast presubmit gate (plan-document, product +
      platform roadmap validators that run in --pre, contract-drift) with the roadmap as the only roadmap change.
    command: bin/venv-python -m scripts.plan_document docs/plans/PLAN-t5-3-scheduled-surface-rehome.yaml && bin/venv-python -m scripts.validate --pre
    expected: 'plan_document prints PASS; validate --pre exits 0.'
    fix_if: 'A schema/validator failure -> fix per its message and re-run; remote CI is authoritative.'
  - step: 6
    phase: post-edit
    action: >-
      Prove blast radius: the only changed files are docs/ROADMAP-PLATFORM.yaml and this PLAN file, and no
      .github prompt/agent file was deleted.
    command: 'git status --porcelain && test -f .github/agents/schedule.yaml && test -d .github/prompts/scheduled && echo "OK: scheduled surfaces still present"'
    expected: >-
      git status shows only docs/ROADMAP-PLATFORM.yaml and docs/plans/PLAN-t5-3-scheduled-surface-rehome.yaml
      modified/added; prints "OK: scheduled surfaces still present"; exits 0.
    fix_if: >-
      Any other file appears in git status, or a scheduled surface is missing -> an out-of-scope edit or
      an accidental deletion happened; revert it. Only the roadmap + this PLAN may change.
constraints:
  - >-
    Roadmap-config-only. The sole edited file is docs/ROADMAP-PLATFORM.yaml (plus this PLAN file). NO
    code, NO Terraform, NO Lambda build/deploy, and -- critically -- NO deletion of any file under
    .github/prompts/ or .github/agents/. The surviving scheduled-agent surfaces stay live; their
    deletion is T4.3's work (now T4.3:c5), gated on T4.3 re-homing the loop onto the CD.27/CD.28 substrate.
  - >-
    Preserve the two T5.3 criterion texts BYTE-FOR-BYTE when converting bare strings to ExitCriterion
    objects (human directed "leave the exit-criteria wording as-is"). Only structure + status + met_by
    are added; the text strings do not change. Same for T4.3's four existing criterion texts.
  - >-
    Use status: rehomed (not met) for the two T5.3 criteria. met_by must be the bare tier_item id "T4.3"
    (validator rule (h)). Do NOT use status: met -- a met criterion's met_by must resolve to a real
    PLAN-<slug>.yaml or a 40-hex SHA (rule (i)), which does not apply to a cross-item transfer.
  - >-
    Only T5.3 and T4.3 change. Do NOT touch any other tier_item, the cross_tier_gates block, or any
    candidate_decision. Do NOT edit the unrelated files_in_scope comment near line 1737 of another
    tier_item ("will be retired in T5.3 ...") -- editing it would pull a third tier_item into scope and
    the structured-criteria rule; it is stale prose, out of scope here, and harmless.
  - >-
    T4.3 stays status: not_started and keeps depends_on [T4.1, T0.7a, T0.8] unchanged. Adding c5 +
    files_in_scope paths + a progress_note does not start the item; it only records the inherited scope.
  - >-
    The tier_item status / exit-criteria ledger is git-authoritative (Decision 87; Decision 84
    warehouse-SoT is NOT triggered for this ledger until T4.x). Reconcile by editing
    docs/ROADMAP-PLATFORM.yaml directly, NOT via the ops portal.
  - >-
    No new standing prose-architecture docs under docs/ (Decision 86). The re-scope rationale lives in
    the two progress_note fields, which is the Decision-86-compliant form for transferring scope between
    tier_items. This PLAN file is the planning artefact, not a standing prose-architecture doc.
context:
  - >-
    Why this plan exists: T5.3's two exit_criteria ("grep -r '.github/prompts' returns no references in
    production code"; "Directories deleted in a single PR") measure FULL deletion of the .github/prompts/
    + .github/agents/ directories. T-1.13 (PLAN-instruction-architecture-yaml, commit
    f1e001bafa28d5d0b4fa857ca6eac2cc38d4b07d) delivered the part T5.3 actually owns -- the legacy
    *interactive* VS Code surfaces (8 top-level prompts, 9 agent files, copilot-instructions, .agents/).
    What remains under those directories (.github/prompts/scheduled/ x7 + .github/agents/schedule.yaml)
    are scheduled-agent surfaces with live runtime consumers, owned by T4.3.
  - >-
    Live consumers of the surviving surfaces (why they cannot be deleted under T5.3): scripts/run_scheduled_agent.py:37
    reads .github/agents/schedule.yaml; src/data/handlers/scheduled_agent_handler.py loads each agent's
    prompt_path from it; src/data/handlers/findings_processor_handler.py:41 references
    .github/prompts/scheduled/findings-compare.prompt.md; scripts/validate.py check_source_registry reads
    schedule.yaml; src/lambdas/data-pipeline/manifest.yaml (status: active) packages both paths as assets.
    The Lambda loop is DISABLED (terraform/scheduled_agents.tf SCHEDULED_AGENTS_ENABLED=false, EventBridge
    rule DISABLED) but the surfaces remain live infrastructure. T5.3 formally depends_on T4.3, which is
    not_started.
  - >-
    Approach chosen by the human (over "relocate now + delete dirs" and "keep blocked, refine note"):
    re-scope T5.3 to its real deliverable and hand the residual deletion to T4.3. Relocating the surfaces
    now would be churn -- T4.3 re-homes them onto a new substrate (Step Functions scheduled execution vs
    GitHub-hosted Actions schedule, CD.27/CD.28) with LiteLLM transport anyway. The human also chose NOT
    to reword criterion 1's grep scope (it keeps false-positive hits in docs/tests, which is acceptable
    because the criterion is rehomed, not asserted-met).
  - >-
    Schema basis for the rehome (scripts/platform_roadmap.py): ExitCriterion.status is
    Literal["open","met","rehomed"] with a met_by field; model_validator (g) requires met/rehomed to
    carry a non-empty met_by and (h) requires a rehomed met_by to resolve to a known tier_item id (T4.3
    exists). No validator requires a complete item's depends_on to be complete (the only depends_on/status
    rule, (f), forbids live items depending on deferred_post_mvp items -- not triggered). validate.py
    validate_platform_roadmap rule (ii) requires touched items to have no bare-string criteria, which is
    why both items' criteria are structured.
  - >-
    Decision-scout verdict: NO_FLAGS (roadmap-config-only; contradicts no active decision). CITE:
    Decision 58 (the original interactive-retirement deliverable rationale -- preserve T5.3
    related_decisions: [58]) and Decision 86 (forward-route intent to the receiving tier_item via the
    roadmap edge / progress_note, the compliant transfer mechanism). RELATED (mention only): Decision 71
    (cc-scheduled-agents cron substrate -- T4.3 owns it), Decision 61 (scheduled-agent findings flow via
    ops_recommendations source field -- distinct substrate), Decision 93 (platform_roadmap model_validator
    is the V1 gate), Decision 90 (four-tier workflow). CD.27 / CD.28 are T4.3 candidate decisions
    (substrate / LiteLLM transport), not numbered DECISIONS.md entries.
  - >-
    Blast radius: nothing depends_on T5.3 and no cross_tier_gate references it (verified at planning
    time), so completing it strands no downstream item and flips no gate. T4.3 gains scope but stays
    not_started, so /orient and preflight next_eligible are unaffected for T4.3; T5.3 leaves the
    in_progress surface.
  - >-
    Branch claude/legacy-github-prompts-agents-382dgt was 0 commits behind origin/main at planning time
    (preflight main_freshness ok); docs/ROADMAP-PLATFORM.yaml had no overlapping main change since branch.
    ci_rca_unresolved_recs empty -- no CI-RCA block.
pre_implementation_checklist:
  - Branch confirmed not on main (claude/legacy-github-prompts-agents-382dgt)
  - docs/PROJECT_CONTEXT.md read; AGENTS.md scheduled-agent runbook + warehouse-SoT rules understood
  - Decision 58 + Decision 86 understood via the decision-scout gate (NO_FLAGS)
  - "T5.3 located at docs/ROADMAP-PLATFORM.yaml (~line 6585); T4.3 (~line 6260); both blocks read"
  - "Schema confirmed: ExitCriterion status rehomed + met_by: T4.3 is valid (platform_roadmap.py 326-331, 538-553)"
  - "Confirmed nothing depends_on T5.3 and no gate references it"
  - Acceptance criteria understood and verifiable via the V1 verification plan
execution_steps:
  - >-
    No code / Terraform / Lambda changes. Edit docs/ROADMAP-PLATFORM.yaml, T5.3 block (~line 6585):
    convert exit_criteria from the two bare strings to two ExitCriterion objects preserving text verbatim
    -- c1 text "grep -r '.github/prompts' returns no references in production code", c2 text
    "Directories deleted in a single PR" -- each with status: rehomed and met_by: T4.3. Set status:
    complete and add completed_at: "2026-06-29" immediately after status. Replace progress_note with the
    re-scope rationale: T-1.13 delivered the interactive-surface retirement (cite commit
    f1e001bafa28d5d0b4fa857ca6eac2cc38d4b07d); the surviving .github/prompts/scheduled/ + schedule.yaml
    are scheduled-agent surfaces owned by T4.3; both criteria rehomed to T4.3 per Decision 86. Leave
    name, tier, intent, depends_on [T-1.2, T4.3], files_in_scope, related_decisions [58], effort,
    strategic unchanged.
  - >-
    Edit the T4.3 block (~line 6260): convert its four bare-string exit_criteria to ExitCriterion objects
    (c1-c4, text verbatim, status: open). Add c5 (status: open) with text naming the deletion of
    .github/prompts/scheduled/ + .github/agents/schedule.yaml and the repoint of consumers
    (scripts/run_scheduled_agent.py, src/data/handlers/scheduled_agent_handler.py,
    src/data/handlers/findings_processor_handler.py, scripts/validate.py check_source_registry,
    src/lambdas/data-pipeline/manifest.yaml), tagged "rehomed from T5.3:c1 and T5.3:c2". Append
    ".github/prompts/scheduled/" and ".github/agents/schedule.yaml" to files_in_scope. Add a progress_note
    recording the inherited scope. Keep status: not_started, depends_on, related_candidate_decisions,
    intent, effort unchanged.
  - >-
    Run Verification Plan steps 1-6. Step 1 is the pre-edit baseline; run it before editing. Steps 2-6
    are post-edit gates -- loop until all pass. Step 4 (validate_platform_roadmap) and step 5
    (plan_document + validate --pre) are the authoritative schema gates; step 6 proves no scheduled
    surface was deleted and only the roadmap + this PLAN changed.
  - >-
    Commit with a roadmap(T5.3,T4.3) message (roadmap bookkeeping per AGENTS.md commit-message
    conventions), push -u origin HEAD, open the PR, and follow the event-driven CI -> squash-merge flow
    (AGENTS.md Git-ops procedure). No bundled recommendations, so no Resolves: trailer.
  - >-
    Report: the T5.3 status flip + completed_at + both criteria rehomed -> T4.3, the T4.3 c5 + paths +
    progress_note transfer, confirmation that no .github file was deleted and no other tier_item changed,
    and the validate --pre result.
work_areas: []
rollback: >-
  The only change is the T5.3 + T4.3 edit in docs/ROADMAP-PLATFORM.yaml (plus this PLAN file). Rollback =
  revert that single roadmap edit (git checkout -- docs/ROADMAP-PLATFORM.yaml before commit, or revert
  the commit after). No runtime, infra, Lambda, or .github file state is touched, so rollback is
  side-effect-free; T5.3 returns to in_progress with its two open criteria and T4.3 loses the inherited c5.
