    Two callers of _probe: (1) @registry.register("validate_ghas_probe", owner="platform")
    validate_ghas_probe(failed) -- the SKIP-when-unscoped check: GHAS_PROBE_TOKEN absent / 401 / 403 / any
    transport error -> print SKIPPED and return without appending; a clean 200 reporting a control disabled
    -> failed.append(...). (2) a module-level _run_cli() -> int -- the LOUD-FAIL runner: token absent / 401 /
    403 / transport error -> print a control-state error line and return non-zero; a disabled control ->
    non-zero; all-enabled -> print control-state and return 0. End with `if __name__ == "__main__":  # pragma:
    no cover` doing `raise SystemExit(_run_cli())`. Resolve owner/repo from the GITHUB_REPOSITORY env var
    (GitHub Actions sets it; default benjamin-blake/agent-platform if unset). Never recompute ROOT (import
    from scripts.checks._common if needed).
