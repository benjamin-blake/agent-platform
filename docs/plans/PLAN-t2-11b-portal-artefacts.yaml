execution_steps:
  - >-
    SECURITY.md (Modify): reposition the projection statement to the TOP using the CD.23 template -- e.g. "This
    file is a projection of the repository's security posture: vulnerability reporting is enabled in GitHub repo
    settings and the security controls live as code in terraform/github/ (CD.20 public-repo security gate, T2.12) --
    see terraform/github/ and CLAUDE.md for canonical content." Keep the GitHub private vulnerability reporting
    pointer ("Security tab -> Report a vulnerability") and maintainer contact; fold or drop the now-redundant
    bottom note. Do not regress the PVR mechanism.
  - >-
    EVALUATION-PROMPTS.yaml (Create at repo ROOT): make `projection:` the literal first line (a block scalar
    projection statement naming CLAUDE.md, docs/ROADMAP-PLATFORM.yaml, docs/DECISIONS.md, docs/contracts/ as
    canonical sources and stating it indexes public-repo source artefacts ONLY per CD.20). Then `questions:` -- a
    list of 12 entries, each with id, question, theme, answer_loci (list of repo-relative public-repo paths), and an
    optional note. Author from the suggested 12-question set in Context; ensure NONE of ops_recommendations /
    ops_decisions / ops_session_log / telemetry appears anywhere in the file (frame Q4/Q10 around
    scripts/ops_data_portal.py + CLAUDE.md governance section + docs/PROJECT_CONTEXT.md schema section).
  - >-
    README.md (Modify): add a single EVALUATION-PROMPTS.yaml link line to the Canonical Sources section, described
    as the evaluator guided-tour index of architecture/governance questions with answer-loci into canonical
    sources. Do not otherwise rewrite README.
  - >-
    docs/ROADMAP-PLATFORM.yaml (Modify, bookkeeping only): re-ground T2.11b's progress_note to record SECURITY.md
    projection-at-top enriched + EVALUATION-PROMPTS.yaml authored (date-stamp 2026-06-18) and the architecture
    diagram still deferred/gated (T2.13 build + T2.11a substrate); fix the stale files_in_scope annotations
    (SECURITY.md: enriched, shipped by T2.12 -- not "# new"; README.md: rewritten + link added -- not "# rewrite");
    reconcile the CD.20 realized-note (line ~644) so it reflects EVALUATION-PROMPTS.yaml landed and only the
    architecture diagram outstanding. Leave status: in_progress, depends_on, and exit_criteria unchanged.
  - "Execute Verification Plan -- run each step; loop until pass. V1: no deploy step."
  - >-
    Run full `bin/venv-python -m scripts.validate` before pushing (mirrors CI; remote CI is the authoritative gate
    per the CLAUDE.md merge protocol). Then follow the Decision 76 web MCP merge flow (PR -> fast --pre tier via
    subscribe_pr_activity -> squash-merge); emit NO Resolves: trailer (no recs resolved).
  - >-
    'Report: files changed, the 12 question themes authored, all VP results, and the explicit deferral list
    (docs/architecture-diagram.svg, .devcontainer/ substrate, and the 5 ci-rca recs).'
