execution_steps:
  - >-
    SSOT core: create config/lambda/ducklake/version.yaml (duckdb_version "1.5.4", ducklake_format "v1.0",
    extension_platform "linux_amd64", header comment) and src/common/ducklake_version.py (stdlib + pyyaml
    loader, module-relative path + DUCKLAKE_VERSION_CONFIG override, cached, no import-raise, fail-loud on
    explicit call). Add tests/test_ducklake_version.py (100%, incl. the env-override cascade case).
  - >-
    Derive the pin: repoint src/common/ducklake_runtime.py (assert_duckdb_version -> pinned_duckdb_version();
    PINNED_DUCKDB_VERSION via module __getattr__; message -> SSOT/runbook; lines 466/499 -> "DuckLake v1.0")
    and scripts/build_lambda.py (PINNED_DUCKDB_VERSION = pinned_duckdb_version(); docstrings/notes -> SSOT ref).
    Note the benign eager-vs-lazy split: build_lambda binds the constant eagerly at import, runtime exposes it
    lazily via __getattr__; both reach the same loader value (a build tool, so eager is fine). Optionally factor
    a shared _load_yaml_cached helper rather than a parallel lru_cache, mirroring _load_field_semantics_cached.
    Run `ruff format` after editing.
  - >-
    requirements sync + gate: create scripts/sync_ducklake_version.py (+ tests/test_sync_ducklake_version.py,
    100%); run it to set requirements.txt duckdb floor ">=1.5.4" with the generated-from-SSOT comment; add the
    ducklake-version-lockstep static gate to scripts/validate.py (+ its test) and wire it into the static tier.
  - >-
    Tests derive: repoint the six affected test files' fakes/tags/paths to pinned_duckdb_version() (mismatch
    test uses pin + "-mismatch"). Run `ruff check --fix` after editing tests (tests/CLAUDE.md F401 discipline).
  - >-
    Infra/manifests: add version.yaml (asset) + ducklake_version.py (include) to the writer/reader/maintenance
    (+ catalog-dr if it derives the tag) manifests and rephrase their notes version-agnostic; make
    terraform/personal/ducklake_lambdas.tf descriptions derive via a try()-wrapped yamldecode local (a bare
    file() reddens validate_terraform_try). Rephrase the residual
    behavioral-note literals (spike.py:65, maintenance.py:29, handler.py:204, smoke_test.py:693).
  - >-
    Docs: update docs/runbooks/ducklake-catalog-operations.md Section 2 to the one-edit + sync + rehearsal
    flow; record the SSOT + exercised bump in docs/ROADMAP-PLATFORM.yaml (no status flips in /plan).
  - >-
    Run the pre-deploy VP (steps 1-12); fix to green -- especially the CASCADE PROOF (step 3) and the
    zero-stray/no-raw-literal gate (step 6). Then the clone-rehearsal (steps 13-14). If any rehearsal step is
    blocked, STOP, file a rec (Decision 55), and report -- do NOT proceed to deploy.
  - >-
    On a green rehearsal: deploy (step 15) -- build_lambda --ducklake-only --deploy for the four function
    codes, then the interactive human-gated terraform loop for the layer republish (plan -> guard exit 0 ->
    PRESENT -> human accepts -> apply). Then the post-deploy in-Lambda gates (steps 16-19).
  - >-
    Append the SSOT + bump Decision to docs/DECISIONS.md (allocate the next number by reading the current
    max; record the cascade + rehearsal evidence), then VP step 20 (--backfill-decisions-md + sync_ops sync).
  - >-
    Execute the full Verification Plan in order; loop each step until pass; on an unrecoverable V3 / live-gate
    failure STOP and RCA (Decision 55) -- never relax a gate, budget, or the assert.
  - >-
    Report: the SSOT landed + the cascade proof (one value moved every surface), the zero-stray/no-raw-literal
    result, the rehearsal evidence (restore-drill OK, churn within budget), the four-artifact deploy +
    --lambda-attach version=1.5.4 source=layer, the catalog-dr tag re-baseline, the filed Decision id, and
    that PLAN-t2-28 VP6 is now fulfilled.
work_areas: []
rollback: >-
  The SSOT + bump revert with `git revert` (restores the 1.5.3 value in version.yaml -- which cascades the
  revert through every derived surface, the inverse of the cascade proof -- plus the synced requirements
  floor and the derive-surface edits). The deployed artifacts roll back by setting version.yaml back to
  1.5.3, re-running build_lambda --ducklake-only --deploy + the interactive terraform apply to republish the
  1.5.3 layer versions -- the deployed Lambdas are self-consistent at whichever pin is live. No catalog data
  migration is involved (restore-drill proved 1.5.4 reads the 1.5.3-authored catalog, so no on-disk rewrite
  occurred to undo). The appended Decision is superseded via the portal (lifecycle state, Decision 70), never deleted.
