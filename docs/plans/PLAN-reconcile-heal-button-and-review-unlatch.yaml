schema_version: 1
slug: "reconcile-heal-button-and-review-unlatch"
intent: >-
  Land the recovery-ergonomics half of the Decision-126 deployment model: an input-free Reconcile
  "heal button" (T2.37) plus taking the non-deterministic LLM plan-review subagent out of the
  red-latch path (T2.39, forward-fix for rec-2658), so a stuck convergence record self-heals in one
  dispatch and a starved reviewer never wedges the sandbox auto-apply pipeline.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-reconcile-heal-button-and-review-unlatch.yaml
phase: >-
  Platform T2 -- deployment-model cluster (Decision 126). Closes tier_items T2.37 (heal button) and
  T2.39 (LLM plan-review out of the red-latch path); unblocks T2.41 (escape-hatch quarantine,
  depends_on T2.37).
scope:
  - file: .github/workflows/reconcile.yml
    action: Create
    purpose: >-
      Input-free workflow_dispatch Reconcile action. Reads the red commit directly from the
      convergence record (no operator-supplied SHA), re-runs the deterministic guard, and re-applies
      the guard-PASS case in its apply job. The guard-BLOCK (out-of-budget IAM/trust/destroy) case is
      handled by reconcile.yml's OWN gated-apply job that declares environment: tf-gated-apply (it does
      NOT re-enter the sandbox gated-apply job, which is push-only at terraform-apply-sandbox.yml:860);
      the two jobs live in this one dispatch, so the routed case is subsumed within the same run
      (closes the rec-2647/rec-2523 dispatch-vs-push deadlock). Optional rec-id input is validated OPEN
      via the ops portal before proceeding.
  - file: .github/workflows/terraform-apply-sandbox.yml
    action: Modify
    purpose: >-
      (a) Review step: feed the guard digest to the reviewer on stdin, restrict --allowedTools to
      Read, use --output-format json, keep a small turn budget, classify the verdict via the new
      review_verdict helper (not grep over a 2>&1 file), retry once at the SAME budget on a
      no-verdict/max-turns outcome. (b) Record-write step: gate the red convergence-record write
      behind a REVIEW_STARVED marker so reviewer starvation blocks auto-apply and files a rec but
      never latches the record red; an explicit REVISE and any genuine apply failure still fail
      closed + red. Routing for the Reconcile guard-BLOCK case lives in reconcile.yml's own
      gated-apply job, so this file's routed (push-triggered) gated-apply path is left unchanged.
  - file: scripts/ci/review_verdict.py
    action: Create
    purpose: >-
      Testable verdict classifier consumed by the review step. The retained scripts/ci/claude_p_retry.sh
      wrapper merges stderr into the output file (2>&1), so review_verdict must ROBUSTLY EXTRACT the
      claude result JSON object from possibly-stderr-interleaved output (e.g. locate the result object /
      last well-formed JSON object rather than assuming a clean json.load of the whole file) -- a
      max-turns/no-verdict run is exactly when stderr diagnostics appear, so a naive json.load would
      break on the STARVED class this feature exists to detect. Returns exactly one mutually-exclusive
      class: PROCEED (apply-eligible), REVISE (fail closed + red), or STARVED
      (max-turns/no-verdict/API-exhausted -> block + file rec, NOT red). Pure function of its input so
      the partition is unit-provable.
  - file: scripts/ci/reconcile_target.py
    action: Create
    purpose: >-
      Testable helper for reconcile.yml: read the convergence record, return the red commit SHA (or
      exit cleanly when the record is green/absent -> no-op), and validate an optional rec-id resolves
      to an OPEN rec via the ducklake_reader portal boundary before the dispatch proceeds.
  - file: scripts/terraform_apply_guard.py
    action: Modify
    purpose: >-
      Add a --digest mode that reuses evaluate_plan()'s resource_changes traversal to emit a bounded,
      decision-relevant plan summary (address/type/actions/changed top-level attributes) with a hard
      size cap + explicit truncation marker and ARN/account-id redaction, for inline review on stdin.
  - file: scripts/convergence_health.py
    action: Modify
    purpose: >-
      Recognize an in-flight Reconcile episode and do not double-file a tf_convergence_stale rec for
      the red episode the Reconcile run is clearing (T2.37 c4). The record schema is unchanged, so the
      signal is an in-flight/recent reconcile.yml Actions run within the current red episode window
      (NOT matched by head_sha == red commit -- a workflow_dispatch run's head_sha is the branch tip at
      dispatch time and will not reliably equal the red commit once later commits merged), queried via
      the module's existing injected-gh_caller GitHub-Actions helper pattern (as used by
      find_stuck_gated_approvals / diagnose_stuck_approvals); when present, suppress the stale-rec file.
  - file: docs/contracts/deploy-paths.yaml
    action: Modify
    purpose: >-
      Flip the reconcile: block status from "Tier_item T2.37, not yet landed" to landed, pointing at
      the new reconcile.yml. Navigation-index field edit only; no apply-model rules restated
      (Decision 126 point 2 / Decision 86 no-drift).
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Roadmap bookkeeping: reword T2.39 exit-criterion c2 ("retry with a LARGER turn budget" ->
      "retry once at the SAME budget, no-verdict class only"); add a soft-coordination note to T2.39
      (co-sequence after/with T2.37; shares the terraform-apply-sandbox.yml record-write block; NOT a
      hard depends_on); no criterion status flips (Status-Trusted-Never-Inferred -- /implement flips
      on a verified VP pass).
  - file: tests/test_terraform_apply_guard.py
    action: Modify
    purpose: Unit tests for the --digest mode (summary content, size cap + truncation marker, ARN/account-id redaction).
  - file: tests/test_review_verdict.py
    action: Create
    purpose: >-
      Unit tests for review_verdict classification -- PROCEED/REVISE/STARVED partition and mutual
      exclusivity. MUST include cases where the JSON result is surrounded by leading/trailing stderr
      noise (npm/CLI diagnostic lines), matching the real claude_p_retry.sh 2>&1-merged output shape,
      not only clean pure-JSON inputs.
  - file: tests/test_reconcile_target.py
    action: Create
    purpose: Unit tests for reconcile_target -- red-commit extraction, green/absent no-op, and rec-id OPEN validation (injected reader).
  - file: tests/test_convergence_health.py
    action: Modify
    purpose: Unit test that a Reconcile-triggered episode does not double-file tf_convergence_stale.
bundled_recommendations:
  - rec-2658
closes_criteria:
  - "T2.37:c1"
  - "T2.37:c2"
  - "T2.37:c3"
  - "T2.37:c4"
  - "T2.39:c1"
  - "T2.39:c2"
  - "T2.39:c3"
  - "T2.39:c4"
infrastructure_dependencies:
  - >-
    No .tf files in scope. The workflows drive terraform apply against terraform/personal but do not
    change terraform config -- the speculative-plan/apply-sandbox pipeline contract (T2.21/Decision 77
    no-TOCTOU) is preserved, not modified. reconcile.yml re-applies the SAME guard-inspected plan and
    re-runs the guard; it never widens the auto-apply set.
  - >-
    tf-gated-apply Environment (Decision 92/94) is the authorization control for out-of-budget
    IAM/trust/destroy re-applies routed by Reconcile. Reconcile does not bypass it.
acceptance_criteria:
  - >-
    reconcile.yml is an input-free workflow_dispatch action that reads the red commit SHA directly
    from the convergence record (no operator-supplied SHA) and re-applies it; a green/absent record
    yields a clean no-op with no record write (T2.37 c1).
  - >-
    When an optional rec-id input is supplied, reconcile.yml validates it resolves to an OPEN rec via
    the ops portal before proceeding; an invalid or non-open rec-id fails the dispatch (T2.37 c2).
  - >-
    A guard-BLOCK (out-of-budget IAM/trust/destroy) commit is recoverable via a single Reconcile
    dispatch: Reconcile re-runs the guard and routes the blocked re-apply through reconcile.yml's own
    job declaring environment: tf-gated-apply in the same run -- it does NOT auto-apply the gated
    change, does NOT re-enter the push-only sandbox gated-apply job, and does NOT require a separate
    manual acknowledge-and-retry (T2.37 c3; closes rec-2647/rec-2523).
  - >-
    convergence_health does not double-file a tf_convergence_stale rec for a red episode that a
    Reconcile run is clearing -- detected via an in-flight/recent reconcile.yml Actions run within the
    red episode window (not by head_sha equality) (T2.37 c4).
  - >-
    review_verdict classifies a max-turns/no-verdict/API-exhausted reviewer outcome as STARVED,
    distinct from an explicit REVISE; STARVED is never treated as an implicit REVISE (T2.39 c1).
  - >-
    On a STARVED outcome the review step retries the reviewer exactly once at the SAME turn budget
    (not a larger budget) before falling to the starvation handling (T2.39 c2).
  - >-
    A STARVED outcome blocks auto-apply and files a labelled rec but NEVER writes status=red to the
    convergence record; an explicit REVISE and any genuine apply/convergence failure still fail
    closed and write red. The three classes are mutually exclusive and this partition is proven by
    unit test (T2.39 c3).
  - >-
    The reviewer receives a bounded guard --digest on stdin (not just the plan.json filename), runs
    with --allowedTools Read and --output-format json, and the digest carries no AWS account
    ids/ARNs (Decision 101).
  - >-
    rec-2658 is closed via the ops portal with resolution referencing this plan, and its acceptance
    is updated to assert the classification/not-latch-red behaviour rather than a raised max-turns
    ceiling (T2.39 c4; forward-fix per Decision 55/72, not a ceiling raise).
  - "bin/venv-python -m scripts.validate --pre passes on the branch tree."
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Unit-test the guard --digest mode content over a canned terraform show -json fixture.
    command: "bin/venv-python -m pytest tests/test_terraform_apply_guard.py -k digest -v"
    expected: >-
      Digest lists each resource_change's address/type/actions and changed top-level attributes for a
      multi-resource fixture; assertions on presence and formatting pass.
    fix_if: >-
      Digest omits changed resources, mislabels actions, or does not reuse evaluate_plan's traversal
      (drift between guard verdict and digest).
    hermetic: false
  - step: 2
    phase: pre-deploy
    action: Unit-test the digest size cap, truncation marker, and secret/ARN redaction.
    command: "bin/venv-python -m pytest tests/test_terraform_apply_guard.py -k 'digest and (redact or truncat or cap)' -v"
    expected: >-
      A digest over an oversized fixture is capped and carries an explicit truncation marker; a
      fixture containing an ARN/12-digit account id emits neither in the digest output.
    fix_if: >-
      Digest exceeds the cap silently, truncates without a marker (would let the reviewer PROCEED on a
      partial plan), or leaks an ARN/account id into stdout (Decision 101 breach).
    hermetic: false
  - step: 3
    phase: pre-deploy
    action: Unit-test the review_verdict PROCEED/REVISE/STARVED partition, mutual exclusivity, and robustness to stderr-interleaved input.
    command: "bin/venv-python -m pytest tests/test_review_verdict.py -v"
    expected: >-
      PROCEED json -> PROCEED (apply-eligible); 'REVISE <reason>' -> REVISE (red); a claude
      error_max_turns / empty-result / API-exhausted json -> STARVED (block + file rec, not red).
      Classification holds even when the JSON is wrapped in leading/trailing stderr noise (the real
      claude_p_retry.sh 2>&1 shape). Every input maps to exactly one class; no input maps to two.
    fix_if: >-
      A max-turns/no-verdict input classifies as PROCEED (fail-open -- unsafe) or as REVISE (masks a
      reviewer-infra failure as a plan rejection); the classes overlap; or a stderr-wrapped result
      throws instead of classifying (the contamination the 2>&1 merge introduces on the STARVED path).
    hermetic: false
  - step: 4
    phase: pre-deploy
    action: Unit-test reconcile_target red-commit read, green/absent no-op, and rec-id OPEN validation.
    command: "bin/venv-python -m pytest tests/test_reconcile_target.py -v"
    expected: >-
      Injected red record -> returns the red commit SHA; injected green/absent record -> signals a
      clean no-op; an OPEN rec-id (mock reader) validates, a closed/absent rec-id is rejected.
    fix_if: >-
      Helper returns a stale/wrong SHA, treats a green record as reconcilable (would re-apply
      needlessly), or lets a non-open rec-id through.
    hermetic: false
  - step: 5
    phase: pre-deploy
    action: Unit-test that convergence_health does not double-file on a Reconcile-cleared episode.
    command: "bin/venv-python -m pytest tests/test_convergence_health.py -k reconcile -v"
    expected: A record flagged as under Reconcile for the current red episode yields no new tf_convergence_stale rec.
    fix_if: convergence_health files a duplicate stale rec for the episode Reconcile is already clearing (T2.37 c4 violation).
    hermetic: false
  - step: 6
    phase: pre-deploy
    action: Static-parse both workflow files and assert the review-step + record-write wiring invariants by structure.
    command: "bin/venv-python -c \"import yaml,sys; [yaml.safe_load(open(p)) for p in ['.github/workflows/reconcile.yml','.github/workflows/terraform-apply-sandbox.yml']]; print('workflows parse OK')\""
    expected: Both workflow YAML files parse without error.
    fix_if: A YAML syntax error or a malformed job/step block.
    hermetic: false
  - step: 7
    phase: pre-deploy
    action: Assert the review step no longer greps a 2>&1 file for the verdict and instead calls review_verdict on JSON.
    command: "bin/venv-python -c \"s=open('.github/workflows/terraform-apply-sandbox.yml').read(); assert 'grep -qx \\\"PROCEED\\\"' not in s, 'still grepping stdout for verdict'; assert 'review_verdict' in s, 'review_verdict helper not wired'; print('verdict wiring OK')\""
    expected: The legacy grep-for-PROCEED gate is gone; the review step invokes the review_verdict helper.
    fix_if: The workflow still classifies the verdict by grepping combined stdout/stderr (the rec-2658 conflation), or the helper is not wired in.
    hermetic: false
  - step: 8
    phase: pre-deploy
    action: Run the authoritative pre-merge gate.
    command: "bin/venv-python -m scripts.validate --pre"
    expected: All --pre checks pass (schema, roadmap referential integrity for closes_criteria, VP replay of hermetic steps, tests).
    fix_if: Any check fails; read the check output and fix before push.
    hermetic: false
  - step: 9
    phase: post-deploy
    action: >-
      Live no-op smoke of reconcile.yml (post-merge, manual, non-gating). Dispatch Reconcile while the
      convergence record is green and confirm it exits as a clean no-op without touching the record.
    command: "aws s3 cp s3://agent-platform-data-lake/convergence/personal/sandbox.json - --profile agent_platform | python3 -c 'import json,sys; r=json.load(sys.stdin); print(\"status=\"+r[\"status\"])'  # then dispatch reconcile.yml via Actions and re-read; status must stay green"
    expected: >-
      With a green record, a Reconcile dispatch performs no apply and leaves status=green untouched;
      the run log states there is no red commit to reconcile.
    fix_if: >-
      Reconcile applies against a green record, overwrites the record, or errors on the no-op path.
      (Red-path recovery is exercised the next time a genuine red episode occurs; do not manufacture a
      red record to test it.)
    hermetic: false
  - step: 10
    phase: post-deploy
    action: >-
      Confirm rec-2658 is closed by the Resolves trailer (rec-autoclose.yml) after the squash-merge
      (closure obligation 12k for a rec-resolving plan).
    command: "bin/venv-python -m scripts.sync.ops sync && bin/venv-python -c \"import json; rows=[json.loads(l) for l in open('logs/.recommendations-log.jsonl') if l.strip()]; r=next(x for x in rows if x.get('id')=='rec-2658'); print(r['status']); assert r['status']=='closed', 'rec-2658 not closed'\""
    expected: rec-2658 shows status=closed after the read-cache is synced from the warehouse.
    fix_if: >-
      rec-2658 is still open post-merge -- the Resolves: rec-2658 trailer was missing from the
      squash-merge body or rec-autoclose.yml did not fire; close it via
      bin/venv-python -m scripts.ops_data_portal --update-rec rec-2658 --status closed
      --resolution "..." (Decision 70 fallback).
    hermetic: false
constraints:
  - >-
    Fail-closed is preserved: nothing auto-applies without an explicit PROCEED token OR explicit human
    approval via the tf-gated-apply Environment. Reconcile never widens the auto-apply set (Decision
    77/92/94/126).
  - >-
    No-TOCTOU: any re-apply consumes the same plan artifact the guard inspected in that run; Reconcile
    re-runs the guard before applying (Decision 77).
  - >-
    Anti-masking (Decision 55): REVIEW_STARVED must be provably disjoint from an explicit REVISE and
    from a genuine apply/convergence failure -- both still write red. The marker must never absorb a
    real failure. No force-write of any convergence record.
  - "Public-content boundary (Decision 101): no AWS account ids/ARNs/ExternalIds/secrets in reconcile.yml, the digest output, deploy-paths.yaml, or logs."
  - "Single Portal Invariant (Decision 84): the rec-id OPEN check reads via the ducklake_reader boundary; the rec-2658 acceptance/close write transits the ops portal (update_rec), never a direct log-cache edit."
  - "Do not add reconcile or terraform-converged as a main-protection required check (Decision 83)."
  - "No rescue agents or workaround loops (Decision 55). This is a forward-fix, not a ceiling raise."
  - "Only files listed in scope may be modified. STRATEGIC type is suspended -- this is a single larger IMPLEMENTATION plan (freeze override)."
context:
  - >-
    Governing decision: Decision 126 (two-verb + heal-button + operator-only-admin-tier deployment
    model) authored T2.37 and T2.39. This plan lands the heal button + the review-unlatch half; it
    does NOT quarantine the escape hatch (that is T2.41, depends_on T2.37).
  - >-
    rec-2658 root cause (Fable-subagent-verified): the review step passed the reviewer only the
    plan.json FILENAME with nothing on stdin, so it burned the 10-turn budget reading a large
    terraform show -json dump before reaching a verdict; --output-format text also discarded the turn
    trace (zero diagnosability). Fix removes the ingestion cost (inline digest), constrains tools,
    and classifies the verdict from JSON. The convergence record self-cleared at 13:03 on 2026-07-11
    (run 29153621390, green); the pipeline is not currently wedged.
  - >-
    rec-2647/rec-2523 are the routed-gated-apply deadlock T2.37 closes: today gated-apply requires
    github.event_name == 'push' (terraform-apply-sandbox.yml:860), so a routed change acknowledged via
    workflow_dispatch strands (rec-2523 needed an agent_platform_admin out-of-band apply on
    2026-07-04). Reconcile subsumes the routed case within one dispatch by routing through the
    tf-gated-apply Environment.
  - >-
    T2.39 is marked depends_on: [] and that is substantively correct -- not-latch-red REMOVES the
    starvation class from what the heal button must clear (T2.39 makes T2.37 easier, not vice versa).
    The only coupling is a merge-ordering hazard: both edit the record-write block of
    terraform-apply-sandbox.yml, so this co-plan lands them together to avoid a two-branch collision.
  - >-
    Decision-scout verdict + CITE list (verbatim decision ids): FLAGS_FOUND (86 of 86 decisions
    triaged). CITE: 126, 92, 94, 77, 55, 72, 83, 101, 84, 120, 86, 114. Flags resolved in-plan:
    [WARN 92/94/126] Reconcile must re-run the guard and route out-of-budget re-applies through the
    tf-gated-apply Environment (not auto-apply) -- encoded as acceptance criterion 3;
    [NOTE 55/92/94] REVIEW_STARVED proven disjoint from REVISE and real failure -- acceptance
    criterion 7 + VP step 3; [NOTE 48/84/103] rec-2658 acceptance edited via the portal with a
    behavioural (not grep-ceiling) check -- acceptance criterion 9.
  - "gates: decision-scout=FLAGS_FOUND; plan-critique=PROCEED after 2 revision rounds (R1: added rec-2658 closure VP step 10, pinned c3 own-gated-apply-job mechanism, named c4 in-flight-reconcile signal; R2: review_verdict robust extraction from stderr-interleaved claude_p_retry.sh 2>&1 output + stderr-noise test case, c4 predicate reworded to red-episode window not head_sha)"
pre_implementation_checklist:
  - Branch confirmed not on main
  - docs/PROJECT_CONTEXT.md read
  - DECISIONS.md read (via decision-scout gate; CITE list in context)
  - All files in scope located and readable
  - Acceptance criteria understood and verifiable
  - "Verify guard.py/convergence_health.py are NOT Lambda-packaged: bin/venv-python -c \"from scripts.lambda_manifest import compute_affected_artifacts; print(compute_affected_artifacts(['scripts/terraform_apply_guard.py','scripts/convergence_health.py']))\" (expect empty -> no deploy step, Decision 79)"
execution_steps:
  - "Add --digest mode to scripts/terraform_apply_guard.py reusing evaluate_plan()'s resource_changes traversal; bounded, size-capped with truncation marker, ARN/account-id redacted. Add tests in tests/test_terraform_apply_guard.py."
  - "Create scripts/ci/review_verdict.py: {PROCEED|REVISE|STARVED} classifier with a mutually-exclusive partition, robustly extracting the claude result JSON from stderr-interleaved output (claude_p_retry.sh merges 2>&1). Add tests/test_review_verdict.py including a case with JSON surrounded by leading/trailing stderr noise."
  - "Create scripts/ci/reconcile_target.py: read convergence record -> red commit SHA or clean no-op; validate optional rec-id OPEN via the ducklake_reader portal boundary. Add tests/test_reconcile_target.py."
  - "Create .github/workflows/reconcile.yml: input-free workflow_dispatch; call reconcile_target for the red commit (green/absent -> clean no-op); re-run the deterministic guard; re-apply guard-PASS in its apply job and route guard-BLOCK through a second job in the SAME workflow declaring environment: tf-gated-apply (not the push-only sandbox job); optional rec-id validated OPEN first. Rework scripts/terraform_apply_guard.py main() arg parsing (currently rejects arg count != 1) to add the --digest flag."
  - "Modify .github/workflows/terraform-apply-sandbox.yml review step: pipe guard --digest on stdin, --allowedTools Read, --output-format json, small budget; classify via review_verdict; retry once at the SAME budget on STARVED. Modify the record-write step: gate the red write behind a REVIEW_STARVED marker (starvation blocks + files rec, never red); keep REVISE and real failures red. Make the routed case reachable by Reconcile."
  - "Modify scripts/convergence_health.py to recognize an in-flight Reconcile episode (in-flight/recent reconcile.yml Actions run within the red episode window -- not head_sha equality, via the existing injected-gh_caller helper pattern) and not double-file tf_convergence_stale. Add the test in tests/test_convergence_health.py."
  - "Confirm the interaction with scripts/ci/claude_p_retry.sh: the transient-API-error wrapper is RETAINED around the reviewer; the new SAME-budget STARVED retry is a distinct verdict-driven concern layered on top (no double-retry, no dropped transient-retry)."
  - "Flip docs/contracts/deploy-paths.yaml reconcile: status to landed (field edit only). Reword T2.39 c2 and add the T2.39 soft-coordination note in docs/ROADMAP-PLATFORM.yaml (no status flips)."
  - "Update rec-2658 acceptance via the ops portal to the behavioural (classification + not-latch-red) assertion; the squash-merge body carries 'Resolves: rec-2658'."
  - "Execute the Verification Plan -- run each step; loop until pass; on an unrecoverable failure stop and RCA (Decision 55). Post-deploy step 9 is a manual, non-gating live no-op smoke run after merge."
  - "Report: what was implemented, verification results, and the closes_criteria flipped on the verified pass."
rollback: >-
  Each surface is independently revertible. reconcile.yml is additive (delete to remove). The
  terraform-apply-sandbox.yml review/record-write edits revert to the current grep-PROCEED + always-red
  behaviour. No terraform state or infra is mutated by landing this plan; the convergence record schema
  is unchanged (only the conditions under which red is written).
