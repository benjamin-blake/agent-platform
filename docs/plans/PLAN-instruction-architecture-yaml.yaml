schema_version: 1
slug: instruction-architecture-yaml
intent: >-
  T-1.13: Convert the prose contract docs/contracts/instruction-architecture.md into a
  machine-readable docs/contracts/instruction-architecture.yaml (the 5-layer model as structured
  fields: layer, name, consumers, load_time, content_locations, anti_patterns), correcting the
  stale Layer 1/2 drift (the .md still names GEMINI.md / copilot-instructions.md; the live set is
  CLAUDE.md/AGENTS.md + docs/PROJECT_CONTEXT.md per Decision 76, audit F-038). Wire
  scripts/prompt_compliance.py to read the YAML (behavioural-invariant source discovery +
  layer-claims enforcement), delete the prose .md, and -- per user directive 2026-06-29 -- delete
  the runtime-orphaned legacy instruction surfaces this work would otherwise edit/reference
  (.agents/, top-level .github/prompts/*.prompt.md, .github/agents/*.agent.md,
  .github/copilot-instructions.md). Advances the CD.25 pre-codegen contract-ratification series
  (T-1.13..T-1.19) and partially advances T5.3 (legacy retirement).
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-instruction-architecture-yaml.yaml
phase: >-
  PLATFORM tier_item T-1.13 (tier T-1, CD.25 pre-codegen contract ratification). depends_on T-1.12
  (satisfied). Not on the product roadmap critical path. Partially advances T5.3 (Legacy
  .github/prompts + .github/agents retirement).
scope:
  - file: docs/contracts/instruction-architecture.yaml
    action: Create
    purpose: >-
      NON-ritual registry YAML carrying the 5-layer model as structured data (per-layer name,
      content_locations globs, load_time, consumers, contains/excludes), the consumers table,
      the anti-patterns table, a behavioural_invariant_sources list (read by prompt_compliance),
      and a legacy_surfaces_retired note. Describes ONLY the live consumer set -- no legacy mirrors.
  - file: docs/contracts/instruction-architecture.md
    action: Delete
    purpose: Superseded by the YAML; agent-first repo forbids a prose companion alongside a machine-readable source (Decision 86). Carries stale GEMINI.md/copilot-instructions.md drift that must not survive.
  - file: scripts/prompt_compliance.py
    action: Modify
    purpose: >-
      Add a lazy, cached, import-safe loader for instruction-architecture.yaml; an accessor
      get_behavioural_invariant_sources() (fallback ['.claude/skills/*/SKILL.md']); and
      check_layer_compliance() asserting each layer's content_locations resolve to >=1 path on disk.
      Repoint the hardcoded .github/prompts/ discovery in main() to the YAML-sourced set. Update
      docstring/help text. Never raise at import; all I/O deferred to first accessor call.
  - file: scripts/validate.py
    action: Modify
    purpose: >-
      validate_prompt_compliance(): source the invariant-file discovery from
      compliance.get_behavioural_invariant_sources() (resolved under ROOT) instead of the hardcoded
      .github/prompts glob. Add validate_instruction_architecture_layers(failed) that runs
      check_layer_compliance and appends violations; wire it into the run sequence. KEEP the
      validate_no_underscore_instructions guard LOGIC (Decision 38) but genericise its docstring
      (~line 1018) which references the now-deleted hyphen copilot-instructions.md -- restate it as
      "the underscore variant is a ghost file (Decision 38 deleted it); this check prevents
      re-creation" without asserting the hyphen file is loaded. Update the stale legacy comment
      (~line 214).
  - file: scripts/session_preflight.py
    action: Modify
    purpose: >-
      Remove sync_copilot_instructions() (function + its call site ~line 1621) -- it compared the
      now-deleted copilot-instructions.md against the already-absent underscore variant; with the
      hyphen file deleted it is permanently vacuous.
  - file: scripts/executor/step_runner.py
    action: Modify
    purpose: Remove the dead '.github/copilot-instructions.md' key from _GOTCHA_MAP (the executor can no longer target a deleted file).
  - file: config/agent/copilot/model_routing.yaml
    action: Modify
    purpose: >-
      Remove the dead 'copilot-instructions.md' path-tier pattern. KEEP the '.github/prompts/',
      '.github/agents/', '.github/instructions/' patterns -- live files (scheduled/, schedule.yaml,
      executor instructions) still match them. Does NOT touch the Copilot SDK provider config
      (Decision 49/40 -- this is path-tier routing, not provider selection).
  - file: scripts/model_registry.py
    action: Modify
    purpose: Update the docstring example (~lines 221-222) that referenced copilot-instructions.md pattern matching; no logic change.
  - file: scripts/copilot_wrapper.py
    action: Modify
    purpose: Genericise the comment (~line 579) referencing copilot-instructions.md Known Gotchas; the gotchas now live in AGENTS.md/PROJECT_CONTEXT.md. KEEP the .github/instructions/ reference (~line 472, files retained). No logic change.
  - file: scripts/telemetry_schemas.py
    action: Modify
    purpose: Genericise the comment (~line 385) referencing copilot-instructions.md. No logic change.
  - file: scripts/delegate_runner.py
    action: Modify
    purpose: Genericise the comment (~line 10) referencing copilot-instructions.md. No logic change.
  - file: scripts/list_customizations.py
    action: Modify
    purpose: Update the docstring/scan (~line 106) that scans top-level .github/prompts/*.prompt.md + .github/agents/*.agent.md to reflect that only scheduled/ + schedule.yaml remain. Advisory script (not in CI); keep it non-erroring.
  - file: AGENTS.md
    action: Modify
    purpose: Repoint the Instruction architecture section (~line 187) from docs/contracts/instruction-architecture.md to the .yaml.
  - file: docs/PROJECT_CONTEXT.md
    action: Modify
    purpose: >-
      Repoint the two instruction-architecture.md references (~lines 6, 148) to the .yaml AND sweep
      every File Router / prose row that points at a deletion target so this canonical Layer-2 surface
      holds no dangling links: header note (~L3, .github/copilot-instructions.md deep-frozen fallback
      -- remove), .agents/ legacy row (~L153 -- remove), plan/implement legacy-prompt clauses
      (~L154, L156 -- drop the ".github/prompts/...prompt.md is VS Code legacy" tail, keep the
      canonical .claude/commands/ entry), subagents row (~L159 -- repoint to .claude/skills/),
      already-dangling strategic_review row (~L166 -- remove), CI-triage rows (~L167, L168 -- remove
      the deleted .github/prompts refs), the Decision 44 boundary list (~L240 -- drop
      .github/prompts/develop-executor.prompt.md), and the 5-layer prose (~L459-463 -- update the
      "deep-frozen legacy, retired at T5.3" sentence to reflect that the legacy mirrors are now
      deleted and only the scheduled-agent surface survives the dirs). KEEP the schedule.yaml (~L171)
      and scheduled/ (~L177) rows and the .github/instructions/ boundary ref (~L240).
  - file: EVALUATION-PROMPTS.yaml
    action: Modify
    purpose: Repoint the two instruction-architecture.md references (~lines 5, 34, canonical-sources + answer_loci) to the .yaml.
  - file: tests/test_prompt_compliance.py
    action: Modify
    purpose: >-
      Add coverage for the new loader (reads-YAML, absent-YAML fallback, unparseable fallback,
      yaml-import-unavailable fallback, lazy-import), get_behavioural_invariant_sources(), and
      check_layer_compliance() (pass when all layers resolve; violation when a layer's
      content_locations match nothing). 100% coverage of new code. Update any main() test that
      assumed the .github/prompts discovery path.
  - file: tests/test_validate.py
    action: Modify
    purpose: >-
      Update TestValidatePromptCompliance (3 tests) for YAML-sourced discovery (stub
      get_behavioural_invariant_sources on the mock to return ['.github/prompts/*.prompt.md'] so the
      tmp_path .github/prompts fixtures still resolve, OR switch fixtures to .claude/skills). Add
      TestValidateInstructionArchitectureLayers. Leave the underscore-instruction test intact.
  - file: tests/test_session_preflight.py
    action: Modify
    purpose: Remove the patch("session_preflight.sync_copilot_instructions") line (~1510) and any assertion on it.
  - file: tests/test_model_registry.py
    action: Modify
    purpose: Remove/adjust the copilot-instructions.md pattern assertions (~lines 67, 247, 377, 387). KEEP the .github/prompts//.github/agents//.github/instructions/ pattern assertions (patterns retained).
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Mark T-1.13 status complete (set completed_at; record met_by). Add a T5.3 progress_note that
      top-level .github/prompts/*.prompt.md + .github/agents/*.agent.md + .github/copilot-instructions.md
      + .agents/ were deleted under T-1.13; the directories survive for scheduled/ + schedule.yaml,
      so T5.3's full-directory deletion remains blocked on scheduled-agent decoupling (depends_on T4.3).
  - file: .agents/
    action: Delete
    purpose: Antigravity legacy mirror (workflows/ + skills/). Zero runtime consumers; demoted to legacy (Decision 76) / retired (Decision 58). Reverses PLAN-t014-phase3-residual-sweep retention -- conscious choice per user directive.
  - file: .github/prompts/*.prompt.md (top-level only)
    action: Delete
    purpose: >-
      Legacy VS Code/Copilot interactive prompts (ci_triage, develop-executor, documentation,
      documentation_full_audit, documentation_update, git_add_commit_message, implement, plan).
      KEEP the .github/prompts/scheduled/ subdirectory (live scheduled-agent prompts).
  - file: .github/agents/*.agent.md
    action: Delete
    purpose: >-
      Legacy subagent definitions (code-review, plan-critique, prompt-reviewer, rca-analyst,
      rec-curator, retro-lite, retrospective, scope-guard, step-validator). KEEP
      .github/agents/schedule.yaml (live scheduled-agent manifest read by run_scheduled_agent.py).
  - file: .github/copilot-instructions.md
    action: Delete
    purpose: Legacy gh-copilot-CLI instruction file; external Copilot tooling abandoned (user directive 2026-06-29). The underscore variant was already removed (Decision 38).
bundled_recommendations: []
infrastructure_dependencies:
  - >-
    NONE. No Lambda artifact change: config/agent/ is NOT Lambda-packaged (AGENTS.md); the only
    Lambda-asset legacy files (.github/agents/schedule.yaml, .github/prompts/scheduled/) are KEPT.
    scripts/prompt_compliance.py, validate.py, session_preflight.py, step_runner.py, model_registry.py
    are not in any active Lambda manifest's includes. A verification step confirms no active manifest
    references a deleted file. No terraform. V2.
acceptance_criteria:
  - docs/contracts/instruction-architecture.yaml exists with version 1, contract_version 1, status ratified; it is NON-ritual (no contract block carrying a class field) so the CD.25 drift gate skips it.
  - The YAML's layer table reflects the LIVE consumer set -- Layer 1 = CLAUDE.md/AGENTS.md + per-dir CLAUDE.md, Layer 2 = docs/PROJECT_CONTEXT.md, Layer 3 = .claude/commands/, Layer 4 = .claude/skills/, Layer 5 = config/agent/executor/prompts/ -- with NO GEMINI.md or copilot-instructions.md references and no legacy-mirror layer entries.
  - scripts/prompt_compliance.py reads the YAML for behavioural_invariant_sources and layer content_locations; module import performs no I/O and never raises; absent/unparseable YAML falls back to ['.claude/skills/*/SKILL.md'] without error.
  - check_layer_compliance passes against the live repo (every declared layer content_locations glob resolves to >=1 path), and a unit test proves it flags a layer whose glob matches nothing.
  - validate.py full run passes locally; prompt-compliance discovery is YAML-sourced; validate_instruction_architecture_layers runs in the sequence; validate_no_underscore_instructions remains active.
  - docs/contracts/instruction-architecture.md is deleted; AGENTS.md, docs/PROJECT_CONTEXT.md (full File Router sweep), and EVALUATION-PROMPTS.yaml point at the .yaml; no live (non-historical-plan, non-audit, non-DECISIONS, non-ROADMAP-tier-item-self-description) surface references the deleted .md, and docs/PROJECT_CONTEXT.md has no dangling File Router row pointing at a deleted legacy file.
  - The deleted legacy surfaces (.agents/, top-level .github/prompts/*.prompt.md, .github/agents/*.agent.md, .github/copilot-instructions.md) are gone; .github/prompts/scheduled/, .github/agents/schedule.yaml, and .github/instructions/ are retained; no live code/config references a deleted file.
  - Scheduled-agent + executor surfaces still load (run_scheduled_agent reads schedule.yaml; scheduled-agent + executor-step-runner tests pass); the Copilot SDK provider path is untouched.
  - The affected test suites pass (prompt_compliance, validate, session_preflight, model_registry, executor_step_runner, scheduled_agent_handler, run_scheduled_agent).
  - docs/ROADMAP-PLATFORM.yaml marks T-1.13 complete and records the T5.3 partial-progress note.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Unit tests for prompt_compliance exercise the real (un-mocked) YAML load path, the accessor, check_layer_compliance, and all fallbacks.
    command: bin/venv-python -m pytest tests/test_prompt_compliance.py -q
    expected: All tests pass, including new loader/accessor/layer-check/fallback tests.
    fix_if: A failure means the loader, accessor, layer-check, or fallback is wrong; fix the implementation or the test fixture.
  - step: 2
    phase: pre-deploy
    action: Confirm the YAML has the required top-level keys + ratified status, declares the live layers (no GEMINI.md / copilot-instructions.md), and that prompt_compliance reads it (not just the fallback).
    command: bin/venv-python -c "import yaml; d=yaml.safe_load(open('docs/contracts/instruction-architecture.yaml')); assert {'version','contract_version','status','layers','consumers','behavioural_invariant_sources','anti_patterns'} <= set(d), set(d); assert d['contract_version']==1 and d['status']=='ratified'; t=yaml.safe_dump(d); assert 'GEMINI.md' not in t and 'copilot-instructions.md' not in t, 'stale drift survived'; import scripts.prompt_compliance as p; assert '.claude/skills' in ''.join(p.get_behavioural_invariant_sources()); print('yaml+keys+live-consumer OK')"
    expected: Prints "yaml+keys+live-consumer OK".
    fix_if: Missing keys, wrong status, surviving stale names, or accessor not reading the YAML; fix the YAML or accessor.
  - step: 3
    phase: pre-deploy
    action: check_layer_compliance passes against the live repo -- every declared layer content_locations glob resolves to at least one file.
    command: bin/venv-python -c "import scripts.prompt_compliance as p; c=p._load_instruction_architecture(); v=p.check_layer_compliance(c); assert v==[], v; print('layer-claims OK')"
    expected: Prints "layer-claims OK" (no unresolved layer content_locations).
    fix_if: A violation means a layer's glob is wrong or points at a deleted/moved path; correct the YAML content_locations.
  - step: 4
    phase: pre-deploy
    action: Import safety + absent-YAML fallback -- importing performs no FS read; with the contract hidden the accessor returns the fallback and does not raise.
    command: bin/venv-python -c "import scripts.prompt_compliance as p; assert getattr(p,'_INSTRUCTION_ARCH_REGISTRY',None) is None, 'must be lazy'; orig=p._INSTRUCTION_ARCH_PATH; p._INSTRUCTION_ARCH_PATH=orig.with_name('nope.yaml'); p._INSTRUCTION_ARCH_REGISTRY=None; assert p.get_behavioural_invariant_sources()==['.claude/skills/*/SKILL.md']; print('lazy+fallback OK')"
    expected: Prints "lazy+fallback OK".
    fix_if: An exception or eager load means the loader is not lazy/fallback-safe; defer I/O to the accessor and wrap the read in try/except returning the fallback.
  - step: 5
    phase: pre-deploy
    action: Deleted-surface sweep -- the orphaned legacy files are gone and the load-bearing subset is retained.
    command: bash -lc 'set -e; test ! -e .github/copilot-instructions.md; test ! -e docs/contracts/instruction-architecture.md; test ! -d .agents; test -z "$(ls .github/prompts/*.prompt.md 2>/dev/null)"; test -z "$(ls .github/agents/*.agent.md 2>/dev/null)"; test -d .github/prompts/scheduled; test -f .github/agents/schedule.yaml; test -d .github/instructions; echo "deleted-surface sweep OK"'
    expected: Prints "deleted-surface sweep OK" (orphans gone, scheduled/ + schedule.yaml + instructions/ kept).
    fix_if: A target survived or a kept file is missing; adjust the deletion set.
  - step: 6
    phase: pre-deploy
    action: >-
      Stale-reference sweep -- no live production code/config references the deleted .md or the
      deleted copilot-instructions.md (historical PLAN-*.md, docs/audit-reports, docs/DECISIONS.md,
      docs/INTENT-*.md, and the T-1.13/T5.3 ROADMAP tier_item self-description are allowed; tests/ is
      EXCLUDED because it legitimately retains path-string fixtures -- e.g. test_validate.py:946's
      copilot-instructions.md tmp_path fixture for the retained underscore-guard test, and
      test_model_registry path-string assertions -- per the risk-lens critique).
    command: bash -lc '! grep -rn "instruction-architecture\.md\|copilot-instructions\.md" --include=*.py --include=*.yml --include=*.yaml scripts src config .github/workflows 2>/dev/null; echo "ref-sweep exit=$?"'
    expected: No live .py/.yml/.yaml reference to the deleted .md or copilot-instructions.md under scripts/src/config/.github/workflows (exit 0 / empty). tests/ intentionally not swept.
    fix_if: A live reference remains; repoint it to the .yaml or remove/genericise it (this includes the validate.py:1018 docstring and the four comment genericisations).
  - step: 7
    phase: pre-deploy
    action: No active Lambda manifest references a deleted file (bundle-completeness safety).
    command: bin/venv-python -m scripts.lambda_manifest --list-patterns
    expected: No deleted path (top-level .github/prompts/*.prompt.md, .github/agents/*.agent.md, .agents/, copilot-instructions.md) appears as an active artifact asset; only kept assets (schedule.yaml, scheduled/) referenced.
    fix_if: A deleted file is a manifest asset; restore it or update the manifest (out of scope -- escalate, do not silently delete a packaged asset).
  - step: 8
    phase: pre-deploy
    action: Scheduled-agent + executor + routing surfaces intact -- the tests that consume schedule.yaml, scheduled/ prompts, executor step-runner gotchas, and model routing still pass.
    command: bin/venv-python -m pytest tests/test_scheduled_agent_handler.py tests/test_run_scheduled_agent.py tests/test_executor_step_runner.py tests/test_model_registry.py tests/test_session_preflight.py -q
    expected: All pass (schedule.yaml + scheduled/ still load; _GOTCHA_MAP + model_routing edits are clean; sync_copilot_instructions removal does not break preflight).
    fix_if: A failure points to an over-broad deletion or a missed reference update; fix the edit.
  - step: 9
    phase: pre-deploy
    action: Full presubmit -- contract-drift gate treats the new YAML as non-ritual and does not fail it; layer-claims + prompt-compliance validators pass; whole suite green.
    command: bin/venv-python -m scripts.validate
    expected: validate.py exits 0; "Contract drift gate (CD.25)" scans instruction-architecture.yaml without a violation; the prompt-compliance and instruction-architecture-layers sections pass.
    fix_if: A drift-gate failure means the YAML accidentally has a contract block carrying a class field; keep it non-ritual. Any other failure -- fix the cited check.
constraints:
  - No rescue agents or workaround loops; on an unrecoverable step, stop and RCA (Decision 55).
  - instruction-architecture.yaml MUST stay NON-ritual (top-level version/contract_version/status metadata; NO contract block carrying a class field) so the CD.25 drift gate skips it -- mirrors log-storage.yaml / read-engine.yaml / storage-substrate.yaml.
  - scripts/prompt_compliance.py must never raise at import and must defer all I/O to first accessor call (AGENTS.md import-safety rule), exactly like s3_log_store.py (T-1.15 precedent).
  - check_layer_compliance MUST exclude matches under .venv/ and .git/ when resolving content_locations globs -- the Layer 1 "**/CLAUDE.md" glob otherwise matches vendored third-party CLAUDE.md files under .venv (architect-lens critique). The glob expresses first-party per-directory CLAUDE.md intent; the exclusion keeps the existence check semantically correct.
  - KEEP .github/prompts/scheduled/, .github/agents/schedule.yaml, and .github/instructions/executor-*.instructions.md -- they have live consumers (scheduled agents, executor). Deleting them is OUT OF SCOPE and breaks CI.
  - KEEP validate_no_underscore_instructions (Decision 38 guard) and the Copilot SDK provider config -- only the dead instruction-routing surface is removed.
  - Do NOT delete the .github/prompts/ or .github/agents/ DIRECTORIES (only the named files); full-directory deletion is owned by T5.3 and blocked on scheduled-agent decoupling.
  - Only modify/delete files in the Scope table.
