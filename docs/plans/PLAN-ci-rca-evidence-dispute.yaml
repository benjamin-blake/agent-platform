    Add the ci_rca_evidence_dispute entry to config/agent/data_quality/source_registry.yaml
    (description + signal_interpretation per scope; signal_interpretation states the review-resolution
    flow and the no-hard-block property; added_date 2026-06-29).
  - >-
    In scripts/ops_data_portal.py: define CiRcaEvidenceDispute(BaseModel) (parent_rec_id pattern
    ^rec-\d+$; disputed_field Literal/enum {earliest_viable_gate, actual_gate_that_caught_it};
    agent_value str non-empty; bundle_value str non-empty; evidence_for_dispute str min_length 120) and
    _validate_ci_rca_dispute(payload)->list[str] mirroring _validate_ci_rca_context_v2 (but
    hard-raising form is applied at the call site).
