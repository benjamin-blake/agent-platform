rollback: >-
  All edits are additive (one new model + one new file_rec branch + one guidance elif + one preflight
  section trio + tests + a registry entry + a progress_note line). Revert via git. No infrastructure,
  no Lambda deploy, no warehouse schema change to roll back (the dispute payload rides the existing
  context_v2_json column). The only durable side effect is the VP-step-9 tracking rec in the
  warehouse; if rolling back the whole plan, close that rec via
  `bin/venv-python -m scripts.ops_data_portal --update-rec rec-NNN --status closed --resolution
  "superseded: dispute path reverted"`.
