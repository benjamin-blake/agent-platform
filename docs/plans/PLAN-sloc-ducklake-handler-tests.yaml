verification_plan:
  - step: 1
    phase: pre-deploy
    graduation: not-applicable
    action: >-
      Capture the BEFORE test-id baseline for both monoliths (run while they are still intact -- before the
      FINAL commit deletes them). Both are flat module-level functions, so the id is the bare function name.
    command: >-
      S=/tmp/claude-0/-home-user-agent-platform/efde6a5d-8723-5096-89dd-16f0c066db30/scratchpad;
      for m in test_ducklake_maintenance_handler test_ducklake_writer_handler; do bin/venv-python -m pytest
      tests/$m.py --collect-only -q 2>/dev/null | grep '::' | sed -E 's#^[^:]+::#FN::#' | sort -u
      > $S/before_$m.txt; echo "$m: $(wc -l < $S/before_$m.txt) ids"; done
    expected: A non-empty sorted function-id baseline for each of the two files.
    fix_if: If either collection errors, that monolith has a pre-existing import/collection problem -- fix before decomposing.
  - step: 2
    phase: pre-deploy
    graduation: not-applicable
    action: Collect the AFTER id set from each new package and assert a byte-identical diff against the matching baseline.
    command: >-
      S=/tmp/claude-0/-home-user-agent-platform/efde6a5d-8723-5096-89dd-16f0c066db30/scratchpad;
      for pair in "test_ducklake_maintenance_handler:lambdas/ducklake_maintenance/handler"
