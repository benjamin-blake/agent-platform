schema_version: 1
slug: sloc-ducklake-handler-tests
intent: >-
  Decompose the TWO oversized ducklake Lambda-handler test monoliths --
  tests/test_ducklake_maintenance_handler.py (758) and tests/test_ducklake_writer_handler.py (671)
  -- into two concern-split test PACKAGES (tests/lambdas/ducklake_maintenance/handler/ and
  tests/lambdas/ducklake_writer/handler/), each a set of cohesive test_<concern>.py modules < 500
  SLOC, then retire the two grandfather homes and delete their two config/sloc_budgets.yaml lines --
  rec-2709 Wave 8 of the Decision 131 mirror-convention rollout. Each home's REAL source is a single
  src/lambdas/<slug>/handler.py (basename<->source mismatch: the parent-qualified RS-08 rule keys the
  test home off the slug dir, not the file stem), so each is a genuine CONCERN-SPLIT of one module.
  Purpose: keep every test file small enough for lower-tier model comprehension (the load-bearing
  reason the 500-SLOC gate exists, Decision 128). Behaviour-preserving pure MOVE; handler source is
  never touched; no Lambda build/deploy/smoke-test (compute_affected_artifacts of the changed tests/
  files is {} -- confirmed).
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-sloc-ducklake-handler-tests.yaml
phase: >-
  rec-2709 Wave 8 (Decision 131 mirror convention, amends Decision 104); SLOC governance /
  model-portability (AGENTS.md Decision 128). Behaviour-preserving test MOVE of two src/lambdas/*/
  handler.py grandfather homes. No product-roadmap phase; platform tooling only.
scope:
