acceptance_criteria:
  - >-
    Test-id preservation (per file): the set of pytest node ids (function name, module-path stripped)
    collected from each new package (tests/lambdas/ducklake_maintenance/handler,
    tests/lambdas/ducklake_writer/handler) equals the pre-move set from the corresponding monolith. Both
    monoliths are entirely module-level test functions (no test classes; FakeCon is a non-collected helper),
    so the id set is the flat function-name set. PURE move -- NO rename, NO class-split (no file exceeds 500
    SLOC); the diff MUST be EMPTY for both files.
  - >-
    bin/venv-python -m scripts.validate --pre exits 0: SLOC gate green (every new module < 500 SLOC and < 20 CC,
    none registered in config/sloc_budgets.yaml; scripts/test_coverage_checker.py stays < 500 SLOC after Edit
    A/B/C); no-cross-test-import guard green; collectability green (test_churn.py proactively deferred by its
    module-level boto3 marker).
  - >-
    bin/venv-python -m pytest tests/lambdas/ducklake_maintenance/handler tests/lambdas/ducklake_writer/handler -q
    passes with the same total test count as the two pre-move baselines summed.
  - >-
    git diff origin/main -- config/sloc_budgets.yaml shows ONLY the two lines removed
    (test_ducklake_maintenance_handler.py 758, test_ducklake_writer_handler.py 671) with their dec-130 markers;
    every other entry byte-identical; zero added lines.
  - >-
