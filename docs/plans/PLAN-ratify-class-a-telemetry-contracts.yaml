  - "Branch was 0 commits behind origin/main at preflight. Rebase onto origin/main before merge (Step 11) and re-run the VP so the ritual-contract count (15) and drift gate are evaluated against current main; if main has added/removed a ritual contract since, adjust VP step 5's expected count accordingly."
