schema_version: 1
slug: "overseer-improvements"
intent: >-
  Harden the /overseer orchestration meta-layer (Decision 90) by codifying the subagent-dispatch
  division of labor, liveness/resilience protocol, and autonomy calibration that three live
  overseer runs surfaced -- so the platform's highest-leverage "drive a whole roadmap item to
  completion unattended" workflow runs reliably instead of re-improvising harness workarounds
  every run. Resolves 16 filed overseer-improvement recommendations.
plan_type: IMPLEMENTATION
verification_tier: V1
plan_path: docs/plans/PLAN-overseer-improvements.yaml
phase: >-
  Platform workflow tooling: /overseer orchestration meta-layer hardening (Decision 90). Ad-hoc,
  rec-driven (16 workflow-audit / code-review / manual findings from 3 live overseer runs:
  agent-context-governance, decision-log-premise-integrity, terraform-deploy-redesign); not tied
  to a roadmap tier_item.
scope:
  - file: docs/contracts/overseer-dispatch.yaml
    action: Create
    purpose: >-
      New machine-parseable contract (Decision 86/127 relief valve) holding the detailed overseer
      dispatch model so the SKILL.md stays lean and loads it on demand: the subagent-vs-overseer
      division-of-labor tables, the gate-request trampoline schema (GATE_REQUEST status,
      gate_run_id provenance, write-ahead pending_gates, artifact-first yield, SendMessage-resume
      as an optimization over artifact re-dispatch), the three-signal subagent-detection stack,
      the liveness/watchdog/stall recipe, the safety-net trigger recipe, the hook-deferral record
      (two preconditions), the proceed-with-notice autonomy tier, the broadened Fable triggers,
      the ledger persistence model, and the executor-rca artifact feed. Schema kept
      transport-agnostic (subagent ids / SendMessage handles ride alongside payloads, never inside
      them) to survive the future durable-Lambda migration.
  - file: .claude/skills/overseer/SKILL.md
    action: Modify
    purpose: >-
      Point the dispatch / ledger / liveness / autonomy / Fable sections at the new contract;
      retain load-bearing invariants and every rec-mandated anchor phrase; add the exact injected
      SUBAGENT CONTEXT header, the proceed-with-notice tier, the liveness/watchdog/stall/restart/
      safety-net anchors, the scratchpad-vs-durable persistence note, the executor-rca+transcript
      RCA note, the model-namespace/enum note, the headroom intake check, the validate --pre
      bounded-validation note, and the division-of-labor / gate-ownership / subagent-dispatch
      anchors. Held at or below its current 12722-byte prose budget by relocating detail to the
      contract and tightening existing prose (no budget raise, per human decision).
  - file: .claude/skills/planning/SKILL.md
    action: Modify
    purpose: >-
      Add the subagent-mode gate-request conditional to the decision-scout gate AND plan-critique
      gate sections (if in SUBAGENT CONTEXT / the Agent tool is absent, hand back a GATE_REQUEST
      with the exact gate prompt and pause; never run the gate inline via the Skill tool;
      error-fallback on a nesting error). Add the subagent-dispatch anchor.
  - file: .claude/skills/implement/SKILL.md
    action: Modify
    purpose: >-
      Add the same subagent-mode gate-request conditional to the code-review gate section. Add the
      subagent-dispatch anchor.
  - file: .claude/commands/overseer.md
    action: Modify
    purpose: >-
      Light alignment of the Step 6 Dispatch language so the thin lifecycle matches the codified
      division of labor: the dispatched subagent stops at PR-open and hands gates/PR back; the
      overseer owns all gate dispatch and the subscribe -> CI-green -> squash-merge flow.
  - file: docs/contracts/file-router.yaml
    action: Modify
    purpose: >-
      Add a route for the new docs/contracts/overseer-dispatch.yaml contract, and resolve the
      docs/plans/reports/ double-registration (rec-2727) by documenting the shared-directory
      overlap as intentional -- the overseer-ledger runtime class and the report-deliverables plan
      class are distinct doc classes co-hosted in one directory -- via a cross-reference note on
      both routes.
  - file: config/prose_budgets.yaml
    action: Modify
    purpose: >-
      Reseed the S4 .claude/skills/overseer/SKILL.md entry to the exact final byte count of the
      edited skill (ratchet down/flat; validate_prose_limits requires current == budget). No
      raise-approved marker is added -- the entry only decreases or holds.
