schema_version: 1
slug: sloc-execute-recommendation
intent: >-
  Decompose tests/test_execute_recommendation.py (5812 SLOC, the second-largest test file and the
  root-script test home for scripts/execute_recommendation.py, the repo's biggest source ~2330 raw
  lines) into a concern-split package tests/execute_recommendation/ whose modules each cover
  scripts/execute_recommendation.py and are each < 500 SLOC, then retire its grandfather home and
  delete its config/sloc_budgets.yaml entry -- rec-2709 Wave 2 of the Decision 131 mirror-convention
  rollout that keeps files small enough for lower-tier model comprehension (the load-bearing purpose
  of the 500-SLOC gate). This is a PURE, behavior-preserving test MOVE: verbatim class/method bodies,
  no test-logic change, the frozen executor source untouched (Decision 44/117/67).
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-sloc-execute-recommendation.yaml
phase: >-
  rec-2709 Wave 2 (Decision 131 mirror convention, amends Decision 104); SLOC governance /
  model-portability (AGENTS.md Decision 128). Behavior-preserving test MOVE of the
  scripts/execute_recommendation.py test home into a CONCERN-SPLIT package (like Wave 1's
  tests/validate/), not a per-module mirror -- scripts/executor/** stays None-mapped (Decision 124).
  No product-roadmap phase; platform tooling only.
scope:
  - file: tests/execute_recommendation/__init__.py
    action: Create
    purpose: >-
      Package marker for the concern-split package (prepend import mode; mirror convention). Empty
      file. No package conftest is created -- the monolith declares no module-level @pytest.fixture,
      and every fixture the classes consume (the autouse _patch_write_run_summary that patches
      scripts.execute_recommendation.write_run_summary, plus builtins) lives in the ROOT
      tests/conftest.py, which pytest merges down the tree automatically.
  - file: tests/execute_recommendation/test_plan_lifecycle.py
    action: Create
    purpose: >-
      Plan/rec loading + plan authoring. Move VERBATIM: TestLoadPrompt, TestLoadRecommendation,
      TestParseStepsFromPlan, TestSavePlan, TestGenerateInitialPlan, TestCritiquePlan (~192 class SLOC).
  - file: tests/execute_recommendation/test_eligibility.py
    action: Create
    purpose: >-
      Eligibility + rec-status + rec loading. Move VERBATIM: TestIsEligible, TestIsPoisonedRec,
      TestIsEligibleStatus, TestUpdateRecommendationStatus, TestLoadAllRecommendations,
      TestIsEligibleDependencies (~167 class SLOC).
  - file: tests/execute_recommendation/test_execution_flow.py
    action: Create
    purpose: >-
      Top-level execute_recommendation + per-step execution. Move VERBATIM: TestExecuteRecommendation,
      TestImplementStep, TestCommitStep, TestRunAcceptance, TestGatherStepContext (~271 class SLOC).
  - file: tests/execute_recommendation/test_ci_merge.py
    action: Create
    purpose: >-
      CI-wait / PR-merge / branch cleanup. Move VERBATIM: TestWaitForCI, TestMergePR,
      TestCleanupAfterMerge, TestPruneMergedAgentBranches, TestFinalizeAutoMerge (~322 class SLOC).
      MOCK HAZARD: TestFinalizeAutoMerge / TestCleanupAfterMerge / TestPruneMergedAgentBranches carry
      ordered subprocess side_effect lists -- move each class whole; do NOT reorder side_effect entries.
  - file: tests/execute_recommendation/test_ci_fix_retry.py
    action: Create
    purpose: >-
      CI-fix retry loop + hotfix branch. Move VERBATIM: TestCIFixRetry (234 SLOC, 10 tests, 10
      side_effect sites, 3 Popen), TestHotfixBranch (~272 class SLOC total). MOCK HAZARD: TestCIFixRetry
      is one of the most side_effect-dense classes -- verbatim whole-class move; every ordered
      subprocess.run/Popen side_effect list and call-count assertion must survive untouched.
  - file: tests/execute_recommendation/test_checkpointing.py
    action: Create
    purpose: >-
      Checkpoint save/load/resume-branch-merged. Move VERBATIM: TestCheckpointing (378 SLOC, 13 tests,
      3 helper methods, 5 Popen). Self-contained (helpers are instance methods) -- verbatim whole move.
  - file: tests/execute_recommendation/test_batch_selection.py
    action: Create
    purpose: >-
      Batch execution + topological ordering + batch/cluster selection. Move VERBATIM: TestExecuteBatch,
      TestTopologicalSort, TestSelectCompoundBatch, TestSelectNextBatch, TestLoadCluster (~374 class SLOC).
  - file: tests/execute_recommendation/test_execute_compound.py
    action: Create
    purpose: >-
      Compound-rec execution. Move VERBATIM: TestExecuteCompound (286 SLOC, 6 tests, 6 side_effect sites).
      Verbatim whole-class move (ordered side_effect lists intact).
  - file: tests/execute_recommendation/test_telemetry.py
    action: Create
    purpose: >-
      Prompt-hash / diff-capture / step + session telemetry. Move VERBATIM: TestPromptHashing,
      TestDiffCapture, TestStepTelemetryPersistence, TestSessionTelemetry (~297 class SLOC).
  - file: tests/execute_recommendation/test_failure_handling.py
    action: Create
    purpose: >-
      Failure cleanup / summary / scope-drift. Move VERBATIM: TestFailureCleanup, TestFailureSummary,
      TestScopeDriftCheck (~268 class SLOC).
  - file: tests/execute_recommendation/test_review_and_context.py
    action: Create
    purpose: >-
      Code-review gate / planning-context injection / postflight-quarantine parsing. Move VERBATIM:
