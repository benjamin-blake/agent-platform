  - file: tests/execute_recommendation/test_postflight_validation.py
    action: Create
    purpose: >-
      Warm-base auto-resume + doc-only validation fallback + postflight validation quarantine. Move
      VERBATIM: TestWarmBaseAndAutoResume, TestDocOnlyValidationFallback, TestPostflightValidationQuarantine
      (~375 class SLOC). MOCK HAZARD: TestDocOnlyValidationFallback nests a local popen_tracker
      side_effect fn (L4796) used at L4850 -- it is method-local and moves verbatim with its class.
  - file: tests/execute_recommendation/test_session_summary.py
    action: Create
    purpose: >-
      clean_slate / session-status / write_run_summary. Move VERBATIM: TestCleanSlate, TestSessionStatus,
      TestWriteRunSummary (~304 class SLOC). NOTE: TestWriteRunSummary.test_pytest_guard_skips_write
      requests the root-conftest _patch_write_run_summary fixture by name and calls .stop()/.start() on
      it -- that fixture stays in root tests/conftest.py and remains visible to this package unchanged.
  - file: tests/execute_recommendation/test_preflight.py
    action: Create
    purpose: >-
      Preflight side-effect-free contract. Move VERBATIM: TestPreflightSideEffectFree (272 SLOC, 6 tests).
      Self-contained -- verbatim whole move.
  - file: tests/execute_recommendation/test_fast_mode.py
    action: Create
    purpose: >-
      Fast-mode EXECUTION half (OPEN RISK 1 sibling-split). TestFastMode keeps its original name and the
      5 happy-path tests (test_fast_mode_skips_planning_critique_review, test_fast_mode_still_runs_implement_and_finalize,
      test_fast_mode_reads_stdin_when_no_plan_json, test_fast_mode_accepts_dict_with_steps_key,
      test_default_args_unchanged_non_fast) plus VERBATIM copies of the 4 helper methods it uses
      (_base_rec, _fast_plan_json, _patch_run_acceptance, _inner). ~305 class SLOC.
  - file: tests/execute_recommendation/test_fast_mode_validation.py
    action: Create
    purpose: >-
      Fast-mode INPUT-VALIDATION half (OPEN RISK 1 sibling-split). NEW sibling class TestFastModeInputValidation
      carries the 4 validation/CLI tests (test_fast_cli_parses_fast_and_plan_json,
      test_fast_mode_rejects_empty_plan_json, test_fast_mode_rejects_invalid_json,
