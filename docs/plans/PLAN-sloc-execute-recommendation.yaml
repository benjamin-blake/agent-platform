      delta in the whole wave (accepted at VP step 2). NO config/sloc_budgets.yaml marker is added.
  - file: scripts/test_coverage_checker.py
    action: Modify
    purpose: >-
      FINAL FLIP only. Delete the single line "test_execute_recommendation.py" from
      _RETIRING_GRANDFATHER_HOMES; add "scripts/execute_recommendation.py" to _CONCERN_SPLIT_TEST_PACKAGES
      (so the source now resolves to the tests/execute_recommendation/ PACKAGE DIRECTORY via
      _mirror_source_to_test). Do NOT touch _ALL_MIRROR_TARGET_HOMES (frozen 24-home roster),
