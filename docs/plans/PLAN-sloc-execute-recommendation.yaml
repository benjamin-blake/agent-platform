      scripts/execute_recommendation.py -> tests/execute_recommendation once retired. Do NOT modify
      test_roster_is_the_24_known_basenames (the frozenset is unchanged).
  - file: tests/test_execute_recommendation.py
    action: Delete
    purpose: >-
      Fully decomposed into the tests/execute_recommendation/ concern-split package. Deleted in the FINAL
