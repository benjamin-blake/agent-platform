      main-branch safety: jsonl-clean / acceptance-on-main / checkout-main-safely. Move VERBATIM:
      TestCheckJsonlClean, TestCheckAcceptanceOnMain, TestCheckoutMainSafely (~387 class SLOC). MOCK
      HAZARD: TestCheckAcceptanceOnMain (8 side_effect) and TestCheckoutMainSafely (9 side_effect) are
