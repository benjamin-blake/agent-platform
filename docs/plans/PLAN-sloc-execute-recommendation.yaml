  - file: config/sloc_budgets.yaml
    action: Modify
    purpose: >-
      FINAL FLIP only. Delete by hand ONLY the line
      "  tests/test_execute_recommendation.py: 5812  # raise-approved: dec-130 ...". NEVER run
      --update-sloc-budgets (it strips the dec-130 markers on the other 22 entries). HARD invariant:
      this file loses exactly that one line and nothing else. A ratchet-DOWN removal is unrestricted
