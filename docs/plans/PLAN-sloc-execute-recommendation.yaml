bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    Test-id preservation: the union of Class::function pytest node ids collected from
    tests/execute_recommendation/ equals the pre-move union collected from origin/main's
    tests/test_execute_recommendation.py, modulo module-path changes AND exactly one sanctioned class
    rename -- the 4 TestFastMode validation methods re-qualify to TestFastModeInputValidation. Same
    function set, same count, same pass/fail outcomes.
  - "bin/venv-python -m scripts.validate --pre exits 0 (SLOC gate green: every new module < 500 and unregistered; no-cross-test-import guard green; CC gate green)."
  - "bin/venv-python -m pytest tests/execute_recommendation -q passes with the same number of tests as the pre-move tests/test_execute_recommendation.py (step-1 baseline count)."
  - "git diff origin/main -- config/sloc_budgets.yaml shows ONLY the tests/test_execute_recommendation.py line removed; the other 22 dec-130 entries and their raise-approved markers are byte-identical."
  - >-
    map_source_to_test(scripts/execute_recommendation.py) == tests/execute_recommendation (the
    concern-split PACKAGE DIRECTORY), asserted by the updated tests/test_coverage_checker.py oracle; and
    map_source_to_test returns None for scripts/executor/** and scripts/ops_portal/** (Decision 124
    regression -- unperturbed).
  - "_RETIRING_GRANDFATHER_HOMES no longer contains 'test_execute_recommendation.py'; _ALL_MIRROR_TARGET_HOMES (frozenset) is unchanged; scripts/execute_recommendation.py is now in _CONCERN_SPLIT_TEST_PACKAGES."
  - "Every new module under tests/execute_recommendation/ is < 500 SLOC (validate_sloc_limits counting: non-blank, non-comment lines) and < 20 CC branches; no new config/sloc_budgets.yaml entry is added (TestFastMode is concern-split, NOT budget-raised)."
  - "The frozen executor source is untouched: git diff origin/main touches no file under scripts/executor/** and does not touch scripts/execute_recommendation.py (Decision 44/117/67)."
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Capture the BEFORE Class::function id baseline from the pristine monolith before any class move.
    command: >-
      bin/venv-python -m pytest tests/test_execute_recommendation.py --collect-only -q | grep '::'
      | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/claude-0/before_ids.txt; wc -l /tmp/claude-0/before_ids.txt
    expected: A non-empty sorted baseline of Class::function ids (module path stripped) written to the temp file.
    fix_if: If collection errors, the pristine file has an import/collection problem that must be fixed before moving anything.
  - step: 2
    phase: pre-deploy
    action: After all classes are moved, collect the AFTER id set from the new package and diff against the baseline.
    command: >-
      bin/venv-python -m pytest tests/execute_recommendation --collect-only -q | grep '::'
      | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/claude-0/after_ids.txt;
      diff /tmp/claude-0/before_ids.txt /tmp/claude-0/after_ids.txt
    expected: >-
      The ONLY diff is the sanctioned TestFastMode->TestFastModeInputValidation class-qualifier rename of the
      4 validation methods (4 removed CLASSFN::TestFastMode::test_fast_* lines, 4 added
      CLASSFN::TestFastModeInputValidation::test_fast_* lines). Review these 8 lines by hand and accept
      explicitly; any OTHER added/removed id means a class was dropped, duplicated, or a method lost.
    fix_if: Any unexpected id delta -- a verbatim class body was altered, a class was missed, or a helper-method duplication renamed a test.
  - step: 3
    phase: pre-deploy
    action: Run the authoritative fast presubmit tier -- proves SLOC gate, CC gate, no-cross-test-import guard, collectability.
    command: bin/venv-python -m scripts.validate --pre
    expected: Exit 0. No "SLOC limits" failure, no CC failure, no "cross-test import" failure.
    fix_if: >-
      A >500 unregistered module (rebalance its class roster into a sibling module), a cross-test import
      (none should exist -- if one appears, a helper was referenced across modules instead of duplicated),
      or a collection error (fix the offending module's fresh import header).
  - step: 4
    phase: pre-deploy
    action: Full pass of the new package at the same count as the pre-move monolith.
    command: bin/venv-python -m pytest tests/execute_recommendation -q
    expected: All pass; total selected count equals the step-1 baseline line count.
    fix_if: A failure means a patch target, ordered subprocess side_effect list, or mock call-count did not survive the move (namespace/mock-sequence discipline).
  - step: 5
    phase: pre-deploy
    action: Assert config/sloc_budgets.yaml lost exactly the test_execute_recommendation.py line and nothing else.
    command: git diff origin/main -- config/sloc_budgets.yaml
    expected: >-
      Exactly one removed line (the "tests/test_execute_recommendation.py" budget entry, value 5812,
      with its "# raise-approved: dec-130 ..." marker) and zero added lines; the other 22 entries +
      markers byte-identical.
    fix_if: Any other changed line means --update-sloc-budgets was run (forbidden) or an unintended entry was added.
  - step: 6
    phase: pre-deploy
    action: Prove the retired mapping AND the executor/ops_portal None-return regression via the updated coverage-checker oracle.
    command: bin/venv-python -m pytest tests/test_coverage_checker.py -q
    expected: >-
      All pass, including the updated assertions: scripts/execute_recommendation.py -> tests/execute_recommendation
      (concern-split package dir); scripts/executor/** and scripts/ops_portal/** -> None; the retiring set ==
      _ALL_MIRROR_TARGET_HOMES - {"test_validate.py", "test_execute_recommendation.py"}.
    fix_if: An oracle assertion still asserts grandfather behavior for test_execute_recommendation.py, or a None-return regressed -- fix the oracle / the map edit.
  - step: 7
    phase: pre-deploy
    action: Confirm the monolith is gone, the retirement line is deleted, and the whole suite still collects cleanly.
    command: >-
      test ! -f tests/test_execute_recommendation.py && ! grep -q '"test_execute_recommendation.py"' <(grep -A40 _RETIRING_GRANDFATHER_HOMES scripts/test_coverage_checker.py)
      && bin/venv-python -m pytest tests/ --collect-only -q > /dev/null && echo RETIRED-OK
    expected: Prints RETIRED-OK (file gone, retirement line removed from _RETIRING_GRANDFATHER_HOMES, whole-suite collection clean with no import/collision error).
    fix_if: If the file survives, the retirement line remains, or collection errors, the FINAL batch is incomplete or a module path collides.
constraints:
  - No test-logic changes -- this is a behavior-preserving MOVE. Copy each class/method body VERBATIM; only author a fresh per-file import header importing exactly the symbols that module references (from scripts.execute_recommendation, scripts.executor.step_runner.StepOutcome, scripts.llm.utils.LLMResponseError, and stdlib json/subprocess/unittest.mock/pytest), mirroring the monolith's header pattern.
  - "MOCK-SEQUENCE HAZARD (tests/CLAUDE.md rec-117/rec-325): the classes rely on exact ordered subprocess.run/Popen side_effect lists and mock call counts. Move each class WHOLE and verbatim -- never reorder or renumber a side_effect entry, never split a single class's mock setup across modules. Method-local nested side_effect fns (e.g. popen_tracker, run_side_effect, mock_subprocess_run) travel inside their test method verbatim."
  - "EXECUTOR BOUNDARY (Decision 44/117/67): this wave decomposes TEST code ONLY. Do NOT edit any file under scripts/executor/** and do NOT edit scripts/execute_recommendation.py source. The frozen executor is untouched."
  - No cross-test imports (validate_no_cross_test_imports is active in --pre and full). Every module is self-contained. NO shared helper is hoisted -- the monolith has zero module-level functions and zero module-level fixtures, so no tests/fixtures/ or conftest additions are required. TestFastMode's helper methods are DUPLICATED verbatim into each sibling class (a bare side_effect function would go to tests/fixtures/, but none exists here).
  - Every new directory carries an __init__.py (prepend import mode). The declared concern-split package tests/execute_recommendation/ needs its __init__.py plus >=1 test_*.py (it gets 20).
  - Every new module < 500 SLOC and < 20 CC branches. TestFastMode (525 SLOC, the only class over 500) is concern-split into two sibling classes across two modules -- NO config/sloc_budgets.yaml raise marker (Decision 128 decompose-by-default).
  - config/sloc_budgets.yaml loses exactly the tests/test_execute_recommendation.py line; NEVER run --update-sloc-budgets (it strips the 22 remaining dec-130 markers). Edit by hand.
  - The map edit MUST preserve scripts/executor/** and scripts/ops_portal/** None-returns (Decision 124) -- do not touch their handling; the oracle carries an explicit regression assertion.
  - "After removing classes from the shrinking monolith each batch, run `ruff check --fix` on tests/test_execute_recommendation.py to drop now-unused imports (F401); after adding a module, confirm every symbol used in side_effect=/assertions is imported at module scope (tests/CLAUDE.md 'After editing tests')."
  - Namespace-migration discipline (tests/CLAUDE.md) -- these tests patch absolute "scripts.execute_recommendation.<symbol>" targets (verified in TestFastMode et al.), so patch strings move unchanged; still grep each moved class for any bare "patch(\"execute_recommendation." or "patch(\"module." target before finalizing and re-point if found.
  - No rescue agents or workaround loops (Decision 55). On an unrecoverable collect-id mismatch or mock-exhaustion StopIteration, STOP and RCA -- never patch around it.
  - PUBLIC repo -- no AWS account IDs/ARNs/ExternalIds/secrets/internal hostnames in any new file. Use bin/venv-python for all Python invocations; bash-only shell.
context:
  - >-
    INLINE DECISION ANALYSIS (no decision-scout sub-subagent was spawned; the overseer is the critique
    gate). CITE: Decision 131 (mirror convention + retiring grandfather-table + no-cross-test-import
    guard -- governs every step; this wave retires the 2nd of 24 roster homes). Decision 130 (whole-repo
    SLOC scan + 24-home grandfather + sloc_budgets dec-130 markers -- governs the one-line budget
    deletion). Decision 128 (decompose-by-default, do-not-raise -- governs the TestFastMode concern-split
    with NO budget marker; amends Decision 102). Decision 124 (scripts/executor/** and
    scripts/ops_portal/** map to None -- the map edits MUST preserve these, enforced by an oracle
    regression assertion). Decision 44/117 + Decision 67 (executor boundary + frozen executor -- this
    wave touches TEST code only; never the executor source). Decision 104 (check-registry colocation
    precedent being inverted -- background). Decision 80 (facade/concern-split precedent the
    tests/execute_recommendation/ package mirrors, same as Wave 1's tests/validate/). Decision 43/102
    (500-SLOC / CC-20 limits for new files; the budget-line deletion is a ratchet-DOWN removal, which
    validate_sloc_budget_raises leaves unrestricted). NO decision contradiction found: the single
    Decision-128 tension (TestFastMode 525-SLOC single class) is RESOLVED by OPEN RISK 1 = PRIMARY
    (concern-split into sibling classes, no raise marker) -- the doctrine-aligned resolution, matching
    Wave 1's TestValidatePlacement precedent.
  - >-
    OPEN RISK 1 (TestFastMode, 525 SLOC, the ONLY class over 500): RESOLUTION = PRIMARY concern-split
    into two sibling classes across two modules -- TestFastMode (execution half, 5 tests) in
    test_fast_mode.py, TestFastModeInputValidation (validation/CLI half, 4 tests) in
    test_fast_mode_validation.py. Natural seam = "reject bad plan-json input / CLI parse" vs "run the
    happy-path fast execution". The 4 helper methods (_base_rec, _fast_plan_json, _patch_run_acceptance,
    _inner) are DUPLICATED verbatim into whichever sibling uses them (execution half uses all 4;
    validation half uses 3, not _patch_run_acceptance) -- a pure move that respects no-cross-test-import
    with zero logic change. The ONLY test-id delta is the class-qualifier of those 4 validation methods
    (accepted at VP step 2). NO config/sloc_budgets.yaml marker. FALLBACK (single class + raise marker)
    is REJECTED -- it would leave a tests/ entry in sloc_budgets, violating rec-2709's zero-tests/-entries
    goal. OVERSEER: ratify PRIMARY before the fast-mode batch.
  - >-
    CONCERN-SPLIT MODULE BREAKDOWN (20 test modules + __init__.py; class SLOC sums, all < 500 with a
    per-module header of ~15-35 SLOC): test_plan_lifecycle 192, test_eligibility 167, test_execution_flow
    271, test_ci_merge 322, test_ci_fix_retry 272, test_checkpointing 378, test_batch_selection 374,
    test_execute_compound 286, test_telemetry 297, test_failure_handling 268, test_review_and_context 275,
    test_acceptance_validation 201, test_main_safety 387, test_verification_gates 263, test_resume 330,
    test_postflight_validation 375, test_session_summary 304, test_preflight 272, test_fast_mode ~305
    (post-split), test_fast_mode_validation ~156 (post-split). Sum of the 58 source classes = 5759 class
    SLOC + 53 header = 5812 total (matches the budget). Largest module class-sum is 387 (test_main_safety)
    -- comfortable headroom under 500 after its ~15 SLOC header.
  - >-
    SHARED-HELPER / MOCK ANALYSIS: the monolith has NO module-level functions, NO module-level
    @pytest.fixture, and NO class inheritance -- every helper is an instance method (self._foo) or a
    method-LOCAL nested function (run_side_effect / mock_subprocess_run / fake_llm_call / popen_tracker),
    all of which travel verbatim inside their owning class/method. Therefore NO tests/fixtures/ hoisting
    and NO package conftest are required (contrast Wave 1, which had cross-tree _mock_completed and
    _neutralized_pre_registry to hoist). The autouse _patch_write_run_summary fixture in the ROOT
    tests/conftest.py already patches scripts.execute_recommendation.write_run_summary tree-wide and is
    requested by name by TestWriteRunSummary.test_pytest_guard_skips_write -- it stays in the root conftest
    and remains visible to the new package unchanged.
  - >-
    MAPPING MECHANICS (verified against scripts/test_coverage_checker.py): scripts/execute_recommendation.py
    is a root script (parts==('scripts','execute_recommendation.py'), len==2) -> _grandfathered_source_to_test
    returns tests/test_execute_recommendation.py (the flat drop-root rule). Confirmed
    "test_execute_recommendation.py" is in BOTH _ALL_MIRROR_TARGET_HOMES (frozen roster) and
