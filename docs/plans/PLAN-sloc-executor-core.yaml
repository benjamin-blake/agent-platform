  - "gates: decision-scout=FLAGS_FOUND; plan-critique=PROCEED after 2 round(s) (round 1 flagged the unassessed .importlinter constraint on the new deferred imports -- now scoped with explicit ignore-line entries and a contract assessment; the patch inventory was re-derived mechanically)"
  - "HIGH-RISK + DEAD-WORK FLAG (Decision 75 frame-lock, conscious choice recorded): this is the riskiest of the four executor plans. It phase-decomposes the 1767-SLOC / CC-169 _execute_recommendation_inner -- an extract-method refactor threading ~15 shared locals through a RunState object while preserving ~15 repeated early-return failure-bookkeeping sequences and the exact phase order. The roadmap direction (CD.27 pending, T5.6 deferred_post_mvp) RETIRES this orchestration SHELL (it does not harvest it) once the Step Functions + Durable-Function-Lambda substrate lands. Unlike the helper clusters (run_summary/branch_lifecycle) and the other three plans -- which are T5.6-HARVEST-bound reusable logic -- the orchestrator shell is T5.6-RETIRE-bound, so its decomposition has the highest dead-work exposure. It is justified ONLY as freeze-window SLOC-governance (Decision 102/43 mandate; rec-2414 scopes it; removes the single largest 2862-SLOC registry entry) realized over the multi-month/many-tier-wave freeze (CD.17), NOT as substrate-rewrite prep. ORCHESTRATOR DECISION: sequence this plan LAST; if the risk/reward is judged unfavourable at /implement time, the alternative is to land only the low-risk cluster extractions and accept execute_recommendation.py as a documented ratchet exception (registered at reduced SLOC) until T5.6 retires it -- but that alternative does NOT satisfy the <=500 goal for this file."
