rollback: >-
  Pure refactor on a feature branch; if the equivalence oracle (the 6683-line suite) cannot be made green,
  abandon the change (no merge) -- nothing is deployed. Extract cluster-by-cluster and phase-by-phase with a
  green suite after each step so a regression is isolated to the last extraction. If merged and a regression
  surfaces, revert the squash commit -- the facade + clusters + phases + .importlinter lines + any test
  import touch-ups land atomically in one PR.
