schema_version: 1
slug: "dq-gate-infra-resilience"
intent: >-
  Make CI durably green by fixing the data-quality merge gate so transient DuckLake-reader
  infrastructure outages no longer hard-block merges, while genuine data violations and semantic
  check errors still gate -- keeping the self-improving pipeline's quality signal trustworthy.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-dq-gate-infra-resilience.yaml
phase: >-
  Platform reliability / CI hardening. ci_rca-driven, no tier_item (user_explicit_out_of_scope).
  Resolves the DQ HARD_GATE flapping observed on main-validate / main-canary 2026-06-15.
scope:
  - file: scripts/data_quality_runner.py
    action: Modify
    purpose: >-
      Add a distinct UNAVAILABLE per-check verdict and a non-gating DEGRADED aggregate verdict.
      Change _execute_check_ducklake to read via the reader's RAISING surface (reader._invoke with
      action=query_ops, through a new module-level helper _query_ops_rows) instead of the swallowing
      reader.query() -- so a reader failure propagates as an exception the runner can classify by
      HTTP status rather than collapsing to None. Add _is_reader_unavailable(exc): True for a requests
      connection/timeout, or a RuntimeError whose message matches the reader's transient set
      `failed (HTTP (502|503|504))` AND carries no structured `error_type` marker; False otherwise.
      On the except path, UNAVAILABLE when _is_reader_unavailable else ERROR. Update RunResult counts,
      run_checks aggregate logic, the progress symbol map, _print_results (loud DEGRADED banner),
      main() exit code (0 on PASS/DEGRADED/SKIP), and _save_latest_result (record the unavailable
      count + DEGRADED verdict).
  - file: scripts/verifiers/data_quality.py
    action: Modify
    purpose: >-
      When run_checks returns the DEGRADED aggregate (infra-unavailable, no real failure), return
      VerifierStatus.SKIPPED (non-gating) with a LOUD message naming the unavailable checks --
      mirroring the existing creds-unavailable SKIP precedent in this file. Exclude UNAVAILABLE
      from _FAIL_VERDICTS. Genuine FAIL/HARD_GATE still returns FAIL at HARD_GATE severity; the
      no-yaml and zero-checks hard gates are unchanged.
  - file: scripts/validate.py
    action: Modify
    purpose: >-
      Add an UNAVAILABLE carve-out to the DQ graduation guard (alongside the existing SKIP carve-out,
      ~line 2019). Without it, an UNAVAILABLE per-check verdict in dq-latest.json during an
      enforced:false->true flip would be treated as a non-PASS blocker and falsely block graduation
      with a misleading "verify PASS first" message -- the same false-block class this plan removes.
      UNAVAILABLE must warn (inconclusive), not block.
  - file: scripts/session_preflight.py
    action: Modify
    purpose: >-
      In check_data_quality_coverage(), read the new `unavailable` field from dq-latest.json,
      include it in the last_run dict, and surface the DEGRADED verdict + unavailable count in the
      printed line so a degraded gate is loud in preflight.
  - file: tests/test_data_quality_runner.py
    action: Modify
    purpose: >-
      Cover the new code with mocks faithful to production (the reader's _invoke RAISES; it does not
      return None): _is_reader_unavailable classification (connection/timeout and `failed (HTTP 502)`
      with no error_type -> True; structured `failed (HTTP 500)` with error_type, HTTP 4xx, and a
      semantic error -> False); _execute_check_ducklake returns UNAVAILABLE on a transient _invoke
      raise and ERROR on a structured-500/semantic raise; run_checks aggregates DEGRADED when the
      only non-PASS results are UNAVAILABLE; main() exits 0 on DEGRADED and 1 on real FAIL; a mixed
      unavailable+violation run aggregates to FAIL. ALSO migrate the existing reader.query()-based
      ducklake fakes (test_execute_check_ducklake_success, test_execute_check_ducklake_reader_none_is_error,
      test_run_checks_routes_ducklake) to the _invoke surface so they exercise the real call path
      rather than passing for the wrong reason.
  - file: tests/test_verifiers/test_data_quality.py
    action: Modify
    purpose: >-
      Cover the verifier: a DEGRADED run_checks result -> VerifierStatus.SKIPPED (non-gating) with
      a message naming the unavailable checks; a mixed real-HARD_GATE + unavailable result still
      returns FAIL at HARD_GATE severity. Extend the existing _run_result helper to carry an
      unavailable count and the DEGRADED verdict.
  - file: tests/test_validate.py
    action: Modify
    purpose: >-
      Cover the graduation-guard carve-out: an UNAVAILABLE per-check verdict warns and does NOT
      append a graduation-guard failure; a genuine non-PASS/non-SKIP/non-UNAVAILABLE verdict still
      blocks.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    A reader transient outage that propagates from the reader's raising surface (a requests
    ConnectionError/Timeout, or a RuntimeError whose message matches `failed (HTTP 502|503|504)`
    with no `error_type` marker) classifies the affected check as UNAVAILABLE -- not ERROR, not FAIL.
  - >-
    A run whose only non-PASS results are UNAVAILABLE aggregates to DEGRADED, and
    scripts.data_quality_runner.main() returns exit code 0 (not 1) for that run.
  - >-
    DataQualityVerifier returns VerifierStatus.SKIPPED (non-gating) with a message naming the
    unavailable checks when the aggregate is DEGRADED; it does not return FAIL/HARD_GATE.
  - >-
    Genuine data violations still hard-gate: a FAIL/HARD_GATE result yields runner exit 1 and
    DataQualityVerifier FAIL at HARD_GATE severity (unchanged from today).
  - >-
    A deliberate reader error -- a structured HTTP 500 (error_type = runtime/version_mismatch), an
    HTTP 4xx, or any non-transient/semantic failure -- still classifies as ERROR and hard-gates.
    Infra-classification is bounded to the reader's own transient set {502,503,504} (+ requests
    connection/timeout) and never swallows a structured handler error or a 4xx.
  - >-
    A mixed run (>=1 UNAVAILABLE plus >=1 real FAIL/HARD_GATE) aggregates to FAIL/HARD_GATE --
    a real failure always dominates an unavailability.
  - >-
    Loud-surface invariant: UNAVAILABLE/DEGRADED is never reported as PASS; dq-latest.json records
    the unavailable count and DEGRADED verdict, and session_preflight.check_data_quality_coverage()
    surfaces it.
  - >-
    An UNAVAILABLE per-check verdict in dq-latest.json does NOT falsely block a DQ graduation
    (enforced:false->true) in validate.py's graduation guard -- it warns (inconclusive) like SKIP,
    rather than appending a graduation-guard failure.
  - >-
    Scope boundary: no fallback or stale data is substituted on unavailability, and no behavioural
    change is made to src/common/iceberg_reader.py, the ops portal (file_rec/update_rec), or
    sync_ops -- the non-gating treatment is DQ-runner/verifier only.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      Run the DQ runner, verifier, and validate test modules. These exercise the real run_checks
      aggregate, the real _execute_check_ducklake classification against a reader whose _invoke
      RAISES (faithful to production), the real DataQualityVerifier.verify, and the real graduation
      guard -- proving UNAVAILABLE->DEGRADED->exit-0/SKIPPED, structured-500/semantic->ERROR->FAIL,
      violations->FAIL, and the graduation carve-out.
    command: bin/venv-python -m pytest tests/test_data_quality_runner.py tests/test_verifiers/test_data_quality.py tests/test_validate.py -v
    expected: >-
      All tests pass, including the new UNAVAILABLE/DEGRADED classification, exit-code, verifier
      SKIPPED, structured-500/semantic-ERROR-still-gates, mixed-run-still-fails, and graduation
      carve-out cases.
    fix_if: >-
      A test fails -- a real FAIL leaking to exit 0, an UNAVAILABLE leaking to FAIL, or a structured
      500/semantic error leaking to UNAVAILABLE is a defect; re-check _is_reader_unavailable
      (transient-set + error_type marker) and the run_checks aggregate.
  - step: 2
    phase: pre-deploy
    action: >-
      Guard against vacuous green -- confirm the new verdict and the new tests actually landed in
      every source and test file (not silently dropped by an import-block merge, per tests/CLAUDE.md).
    command: grep -nE "UNAVAILABLE|DEGRADED" scripts/data_quality_runner.py scripts/verifiers/data_quality.py scripts/validate.py scripts/session_preflight.py tests/test_data_quality_runner.py tests/test_verifiers/test_data_quality.py tests/test_validate.py
    expected: Matches in all seven files.
    fix_if: >-
      A file has no match -- the change or its test coverage was not applied there; add it before
      proceeding (tests/CLAUDE.md requires 100% coverage of new code).
  - step: 3
    phase: pre-deploy
    action: >-
      Dry-run the runner to confirm check compilation and backend routing are unbroken by the
      verdict/aggregate changes (no AWS calls on the dry path).
    command: bin/venv-python -m scripts.data_quality_runner --dry-run
    expected: Prints compiled SQL for the checks and exits 0 with no traceback (dry-run verdict SKIP).
    fix_if: >-
      A traceback or non-zero exit indicates a regression in run_checks/_print_results/_save_latest_result
      wiring for the new verdict -- fix the aggregation or printing path.
  - step: 4
    phase: pre-deploy
    action: Run the fast presubmit tier (ruff lint, ruff format, mypy, prompt checks).
    command: bin/venv-python -m scripts.validate --pre
    expected: Passes (lint, format, type-check, prompt-compliance all green).
    fix_if: >-
      ruff/mypy failures -- address line-length (127), missing type hints, or unused imports
      (run ruff check --fix after removing/adding test classes).
  - step: 5
    phase: pre-deploy
    action: >-
      Live integration check against the now-paid Neon reader -- run the real DQ runner with
      credentials. Confirms the gate is green when the reader is reachable, and that an infra blip
      degrades (exit 0) rather than hard-failing.
    command: bin/venv-python -m scripts.data_quality_runner
    expected: >-
      Exits 0. Verdict PASS when the reader is reachable (0 violations), or DEGRADED if the reader
      is mid-cold-start; a transient 502/503/504 must surface as DEGRADED, never as an exit-1 FAIL.
      (If credentials are unavailable the run SKIPs and still exits 0.)
    fix_if: >-
      The runner exits 1 on a reader 502/503/504 -- the classification or aggregate is still treating
      a transient-status as FAIL; re-check _is_reader_unavailable and the run_checks aggregate.
constraints:
  - Only modify the seven files listed in scope.
  - >-
    Do NOT touch src/common/iceberg_reader.py -- it is Lambda-packaged into the data-pipeline and
    ops-compaction artifacts (both status:active, verified via lambda_manifest.compute_affected_artifacts),
    so editing it would escalate to V3 + per-Lambda build/deploy/smoke (Decision 79). Read the failure
    signal from the runner by calling the reader's existing raising surface (reader._invoke,
    action=query_ops) -- the same payload reader.query() builds internally, minus the swallow-to-None.
  - >-
    Bound UNAVAILABLE to the reader's OWN transient set {502,503,504} (matching iceberg_reader's
    _READER_TRANSIENT_STATUS) plus requests connection/timeout, and exclude any response carrying a
    structured `error_type` marker. A handler-returned HTTP 500 (version_mismatch / runtime) and any
    4xx must classify as ERROR and gate -- never UNAVAILABLE.
  - >-
    DEGRADED != PASS. No fallback, cache, or stale data is ever substituted on unavailability
    (Decision 60 no-silent-fallbacks; Decision 84 I-1 reader-unreachable has no fallback).
  - >-
    Scope the non-gating treatment to the DQ runner/verifier ONLY. Do not change the reader's
    loud-raise behaviour or how the ops portal (file_rec/update_rec) and sync_ops surface a reader
    failure (Decision 84 I-4 fail-loudly-at-the-call-site).
  - >-
    Genuine FAIL/HARD_GATE must still flow to ci-rca on the full tier -- DEGRADED must not suppress
    the forward-fix path for real failures (Decision 73).
  - The Athena execution path (_execute_check) is left unchanged; its ERROR->FAIL behaviour is preserved.
  - >-
    Accepted layering compromise: the runner reads via reader._invoke (a by-convention-internal method
    on the out-of-scope DuckLakeReader). Flag at code-review. The trade is deliberate -- the alternative
    (editing iceberg_reader.py to add a public raising query) escalates to V3 + per-Lambda deploy
    (Decision 79). If the reader ever renames _invoke or changes the query_ops payload shape, the
    faithful VP step-1 mocks + step-5 live run are the guard.
  - No rescue agents or workaround loops (Decision 55). No emojis; ASCII hyphens; ruff line length 127; type hints required.
  - >-
    Acceptance/VP commands: no `pytest -k` selectors and no `python -c` one-liners (tests/CLAUDE.md);
    verify tests via file::Class or grep.
context:
  - >-
    RCA. main-validate (push to main) and main-canary (scheduled, every 3h) run the full
    scripts.validate, which executes the DQ runner AND the verifier harness against the DuckLake
    reader (resolve_aws_profile returns None under OIDC, so the branch-role env creds are used).
    The migrated recs clause-8 checks (ulid_history_unique, current_merge_key_unique) route to the
    Neon-backed reader. On a reader 502 the DQ check verdict becomes ERROR; run_checks folds has_error
    into a FAIL verdict (~line 726-729) and DataQualityVerifier's _FAIL_VERDICTS includes ERROR ->
    HARD_GATE (~line 109). Result: a transient infra outage reds the merge gate with 0 violations.
  - >-
    Evidence. CI run 27571189587 -> ci-rca run 27572636999:
    `ops_recommendations.ulid [ulid_history_unique] ERROR (0 violation(s))` and
    `ops_recommendations.id [current_merge_key_unique] ERROR (0 violation(s))`, proximate cause
    ducklake_reader Function URL HTTP 502 twice (each retried 3x with cold-resume backoff).
    0 violations => infrastructure, not data. The writer was in the same 502 outage, so ci-rca
    could not file the rec (no offline outbox, Decision 84 I-4).
  - >-
    Plan-critique correction (load-bearing). The reader path swallows the signal: DuckLakeReader.query()
    (iceberg_reader.py:487-501) catches the `failed (HTTP 5xx)` RuntimeError raised by _invoke
    (line 439) and returns None; the runner's _execute_check_ducklake then hard-maps None -> ERROR
    (lines 554-557). So classifying in the except block on a propagated exception is dead code for the
    production path, and a single None cannot distinguish infra from semantic. Resolution: read via the
    RAISING surface (reader._invoke, action=query_ops -- the same payload query() builds) so per-check
    HTTP status reaches the runner. The reader handler (src/lambdas/ducklake_reader/handler.py:224-245)
    has only two excepts (VersionMismatchError, DuckLakeRuntimeError) -> structured HTTP 500 with an
    `error_type` marker for deliberate/semantic errors, while a genuine infra failure is the Function-URL
    502 with no such marker. Hence UNAVAILABLE = transient-status {502,503,504} (the reader's own
    _READER_TRANSIENT_STATUS, which it retries) or connection/timeout, AND no `error_type` marker;
    structured 500 / 4xx / semantic -> ERROR (gates). This satisfies acceptance #1 and #5 simultaneously.
  - >-
    Known limitation (documented, accepted). If a semantic error ever escaped the handler's two excepts
    raw (no catch-all), the Function URL would emit a bare 502 and the runner would classify it
    UNAVAILABLE. This is bounded and LOUD: such a break is deterministic, so it would surface as
    persistent DEGRADED on every run (preflight data_quality + the runner banner) rather than a silent
    PASS -- and the dry-run VP step plus the SQL compiler catch malformed check SQL pre-merge.
  - >-
    Trigger relieved. The Neon plan was upgraded to paid on 2026-06-15, so the reader/writer 502s
    should clear and main-validate/main-canary self-heal on their next run. This plan is the DURABLE
    fix: even on paid Neon a cold-resume can still 502 occasionally, and the gate must not red on it.
  - >-
    Decision alignment (decision-scout gate verdict: NO_FLAGS). Cite Decision 84 (I-1 no fallback,
    I-4 fail-loudly-at-call-site / no offline outbox), Decision 60 (two-tier validation;
    no-silent-fallbacks; the SSO/creds-unavailable SKIP precedent this extends), Decision 55
    (loud-fail doctrine), Decision 81 (clause-5 loud-fail; clause-8 DuckLake DQ checks), Decision 79
    (the iceberg_reader Lambda-packaging escalation this plan deliberately avoids). The scout's two
    NOTE-level tensions (Decision 60 no-silent-fallbacks; Decision 84 I-1/I-4) are resolved by the
    invariant UNAVAILABLE != PASS, no data substituted, correctness gates untouched, DQ-only scope.
  - >-
    Precedent. scripts/verifiers/data_quality.py already returns non-gating VerifierStatus.SKIPPED
    for module-unavailable, AWS-creds-unavailable, and boto3-unavailable/dry-run; the DEGRADED ->
    SKIPPED path is the same pattern extended to reader-unavailable (see tests
    test_verify_credentials_unavailable and test_verify_skip_when_run_checks_returns_skip).
  - >-
    Symbol-map note. run_checks' progress-symbol map already uses 'U' for UNENFORCED_FAIL; assign a
    new symbol (e.g. 'A') for UNAVAILABLE to avoid collision.
  - >-
    Rec/preflight gap. Preflight ops reads were unavailable at planning time (same reader outage),
    so no open rec could be enumerated or bundled, and the DQ ci_rca rec for run 27571189587 was
    never filed (writer in the same 502 outage). This plan IS the architectural review of that DQ
    HARD_GATE failure (related-work condition 3: same failure category -- DQ check failure).
    Follow-up: once the writer is reachable, file/close the rec referencing this plan.
  - >-
    Out of scope (explicit, per "minimum to durable-green"): the terraform apply-role IAM
    refresh-read root-cause (converged green at round-5, run 27571200048; the next DuckLake resource
    re-opens the iterative-discovery walk -- separate follow-up); the ci-rca FILED:-marker watchdog
    false-negative in scripts/ci_rca_filing.py; the Neon egress investigation (user-owned); and
    alerting on PERSISTENT DQ unavailability (reliability follow-up under the deferred harden track).
  - >-
    main_freshness could not be computed (preflight errored on the reader 502 before writing its
    report); main is an ancestor of this branch (git merge-base check), so no divergence/rebase
    risk for the seven scope files.
pre_implementation_checklist:
  - Branch confirmed not on main (claude/kind-mccarthy-q31fck)
  - docs/PROJECT_CONTEXT.md read
  - DECISIONS.md reviewed via the decision-scout gate (NO_FLAGS; cite Decisions 84, 60, 55, 81, 79)
  - All seven scope files located and readable
  - Acceptance criteria understood and verifiable
  - Confirmed src/common/iceberg_reader.py is OUT of scope (Lambda-packaged, active) -- classifier reads via reader._invoke in the runner
execution_steps:
  - >-
    scripts/data_quality_runner.py: add the UNAVAILABLE per-check verdict and the DEGRADED aggregate.
    Add a module-level helper _query_ops_rows(reader, table, sql) -> list[dict] that calls
    reader._invoke({"action": "query_ops", "table": table, "sql": sql, "params": []}) and returns
    list(body.get("rows", [])) -- the raising equivalent of reader.query(). Add _is_reader_unavailable(exc)
    -> bool: True for a requests ConnectionError/Timeout (lazy-import requests) OR a message matching
    re `failed \(HTTP (?:502|503|504)\)` that does NOT contain "error_type"; else False. In
    _execute_check_ducklake, call _query_ops_rows (both the history and non-history branches) inside
    try/except; on exception return UNAVAILABLE if _is_reader_unavailable(exc) else ERROR; keep a
    defensive ERROR for an unexpected None. Add RunResult.unavailable. In run_checks aggregate, compute
    has_unavailable and set verdict = HARD_GATE if has_hard_gate elif FAIL if (has_fail or has_error)
    elif DEGRADED if has_unavailable else PASS. Add 'UNAVAILABLE':'A' to the progress symbol map. In
    _print_results, add an Unavailable count to the summary, add UNAVAILABLE to the issues list +
    prefix map (loud), and include `unavailable` in the JSON output. main(): return 0 if verdict in
    {PASS, DEGRADED, SKIP} else 1. _save_latest_result: record `unavailable` and persist DEGRADED.
  - >-
    scripts/verifiers/data_quality.py: exclude UNAVAILABLE from _FAIL_VERDICTS. Before the generic
    non-PASS FAIL branch, handle result.verdict == "DEGRADED" -> return VerifierResult(status=SKIPPED)
    with a loud message listing the unavailable checks (table[.column] [test_type]) and a clear
    "DQ degraded -- backend unavailable, gate not run" framing. Keep PASS -> PASS, the no-yaml and
    zero-checks HARD_GATE FAILs, and genuine FAIL/HARD_GATE -> FAIL at HARD_GATE severity.
  - >-
    scripts/validate.py: in the DQ graduation guard (~lines 2019-2026), add an UNAVAILABLE carve-out
    next to the SKIP carve-out -- treat verdict in {"SKIP", "UNAVAILABLE"} as a warn-and-continue
    (inconclusive, flip not blocked but unverified) so an infra blip never falsely blocks a graduation.
  - >-
    scripts/session_preflight.py: in check_data_quality_coverage(), read data.get("unavailable", 0)
    into the last_run dict and update the printed summary line (~1258) to include the U count and to
    render a DEGRADED verdict distinctly from PASS/FAIL.
  - >-
    tests/test_data_quality_runner.py: add tests with a fake reader whose _invoke RAISES (faithful to
    production) -- _is_reader_unavailable (conn/timeout and `failed (HTTP 502)` no-error_type True;
    `failed (HTTP 500)` with error_type, HTTP 4xx, semantic False); _execute_check_ducklake UNAVAILABLE
    vs ERROR; run_checks DEGRADED aggregate when only UNAVAILABLE; main() exit 0 on DEGRADED; main()
    exit 1 on real FAIL; mixed unavailable+violation -> FAIL. ALSO migrate the existing .query()-based
    ducklake fakes (test_execute_check_ducklake_success, test_execute_check_ducklake_reader_none_is_error,
    test_run_checks_routes_ducklake) to the _invoke surface. Use file::Class invocation, no -k, no python -c.
  - >-
    tests/test_verifiers/test_data_quality.py: extend _run_result to carry an unavailable count and
    accept the DEGRADED verdict; add a test that a DEGRADED result -> VerifierStatus.SKIPPED with the
    unavailable checks named in the message, and a test that a mixed real-HARD_GATE + unavailable
    result -> FAIL at HARD_GATE severity. Keep the existing pass/fail/skip tests green.
  - >-
    tests/test_validate.py: add a test for the graduation-guard carve-out -- an UNAVAILABLE per-check
    verdict warns and does not append a graduation-guard failure; a genuine non-PASS/non-SKIP/non-UNAVAILABLE
    verdict still blocks (regression guard).
  - Execute the Verification Plan -- run each step; loop until pass; on unrecoverable failure stop and RCA (Decision 55)
  - 'Report: what changed, verification results, and confirmation that the DQ gate degrades (not reds) on a reader transient outage'
work_areas: []
rollback: >-
  Revert the single commit (seven files). No data migration, no infra/Lambda change, no schema change
  to persisted data -- dq-latest.json merely gains an optional `unavailable` field that older readers
  ignore. Reverting restores the prior ERROR->FAIL hard-gating behaviour.
