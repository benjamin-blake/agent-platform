execution_steps:
  - >-
    Create .github/workflows/pr-conflict-signal.yml. Trigger: push:[branches: main] + workflow_dispatch.
    Job (ubuntu-latest, timeout ~10 min, permissions {contents: read, pull-requests: write}, env
    GH_TOKEN=${{ github.token }}, GH_REPO=${{ github.repository }}): enumerate open PRs with base=main
    and head starting claude/ (gh pr list --base main --state open --json number,headRefName,headRefOid,mergeable);
    for each, poll gh pr view <n> --json mergeable,headRefOid a bounded number of times (e.g. 5 tries,
    ~5s apart) until mergeable != UNKNOWN, skipping the PR if it stays UNKNOWN; when mergeable ==
    CONFLICTING, grep the PR's existing comments for an HTML-comment marker "<!-- conflict-wake:<headRefOid> -->"
    and, if absent, post a wake comment carrying that marker plus a short human/agent-readable body
    ("Merge conflict: this PR now conflicts with main and must be rebased/resolved before it can merge.
    Automated wake signal for a watching session."). The comment step is continue-on-error: true. Add a
    short comment block matching the surrounding workflow style and a one-line note that this is the
    push:[main] counterpart to signal-green -- it delivers the merge-conflict-transition wake that the
    pull_request-only signal-green job cannot.
  - >-
    In .github/workflows/ci.yml, wrap the signal-green "gh pr comment" invocation in a bounded retry
    (e.g. for i in 1 2 3; do gh pr comment ... && break || sleep 3; done). Keep continue-on-error: true,
    the claude/* if-gate, and needs: [pr-validate, terraform-validate] unchanged.
  - >-
    Create scripts/checks/ci_guards/validate_pr_conflict_signal.py: a registered check decorated
    @registry.register("validate_pr_conflict_signal", owner="platform") with signature
    def validate_pr_conflict_signal(failed: list[str]) -> None that loads
    .github/workflows/pr-conflict-signal.yml (reuse _load and _get_steps_text imported from
    scripts.verify_ci_workflow to avoid duplication) and appends a distinct label to failed for each
    missing/incorrect property: on.push.branches == [main]; on has workflow_dispatch; job permissions
    include pull-requests: write; the steps text filters on "claude/"; polls "mergeable" and handles
    "UNKNOWN" (skip); gates the comment on "CONFLICTING"; carries continue-on-error; embeds a
    "conflict-wake:" head-SHA marker. Then in scripts/checks/registry.py insert
    _c("validate_pr_conflict_signal") into BOTH pre_sequence() and full_sequence(), adjacent to the
    existing _c("validate_ci_workflow_guards") entries. Do NOT pin the owner (keeps
    test_exactly_three_pinned_checks at 3). ALSO add the re-export line "from
    scripts.checks.ci_guards.validate_pr_conflict_signal import validate_pr_conflict_signal
    # noqa: F401,E402" to scripts/validate.py in the ci_guards import block (adjacent to line 64's
    validate_ci_workflow_guards import): dispatch is globals()[name](failed) with no auto-discovery,
    so without this line validate --pre KeyErrors on the check and the reachability tests fail. ALSO
    rewrite scripts/checks/registry.py's module docstring (lines 8-11) so its "Adding a check touches
    only this package, never scripts/validate.py" no longer contradicts the same module's dispatch
    note and the register() docstring -- it must name the required scripts/validate.py re-export.
  - >-
    In scripts/CLAUDE.md "Adding a validate.py check", RECONCILE the opening clause "CI checks are
    registered, not hand-wired into scripts/validate.py" (do not merely append a contradictory line
    beneath it): clarify that a check is @register + tier-inserted AND still requires the "from
    scripts.checks.<domain>.<module> import <name>  # noqa: F401,E402" re-export in scripts/validate.py
    so it becomes the module-level global for globals()[name] dispatch. Closes the doc gap that caused
    this plan's round-2 critique miss.
  - >-
    Create tests/checks/ci_guards/test_validate_pr_conflict_signal.py with a pass-path class (real
    file + a valid mocked _load returning a well-formed workflow dict -> failed stays empty) and a
