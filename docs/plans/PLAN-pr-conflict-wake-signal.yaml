    required (its membership/reachability assertions are growth-safe).
  - >-
    In AGENTS.md "## Git-ops procedure" -> "Push -> PR -> CI -> merge flow" step 4: register the new
    merge-conflict wake signal next to the signal-green CI-success wake, and replace the "Dropped-signal
    backstop" bullet's "exactly one low-frequency (~1h) ... send_later ... permitted" language with an
