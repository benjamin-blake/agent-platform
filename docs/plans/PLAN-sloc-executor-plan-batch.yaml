execution_steps:
  - "Capture baseline FIRST -- run tests/test_executor_plan.py + tests/test_executor_batch.py + the plan/batch parts of tests/test_execute_recommendation.py green on the pre-refactor tree."
  - "Create plan_parsing.py (parse_steps_from_plan + scope validators) and plan_generation.py (generate/critique/refine + helpers, decision-43 waiver header); move each body verbatim EXCEPT rewriting every routed-name reference to the _pl facade alias resolved function-locally; keep the lazy step_runner/jsonl_store imports exactly as today."
  - "Create batch_compound.py (load_cluster + _ensure_compound_branch + execute_compound, decision-43 waiver header); rewrite execute_compound's _ensure_compound_branch call and all subprocess references to the _ba facade alias; execute_compound also references os (env reads: PLAN_MAX_REVISIONS, SKIP_CODE_REVIEW, REVIEW_FIX_RETRIES) -- reference it as _ba.os or a function-local import (0 patch sites on it, but VP step 3's closure grep forbids module-scope import os in siblings); keep the lazy execute_recommendation/plan/postflight/step_runner facade imports exactly as today."
  - "Collapse plan.py and batch.py to facades: keep the retained clusters + module state + module-scope imports; add re-exports for every extracted symbol; remove the now-stale waiver headers only if the CC gate stays green."
  - "Add the batch_compound -> execute_recommendation ignore lines to BOTH named .importlinter contracts."
  - "Run the suites; ZERO patch migration is expected -- if a test fails on interception, fix the body's routing, never the test."
  - "Run `validate --update-sloc-budgets`, then grep-confirm the plan.py and batch.py keys are dropped and no sibling key was seeded."
  - "Execute the Verification Plan -- run each step; loop until pass; on unrecoverable failure stop and RCA (Decision 55)."
  - "Report -- what was extracted, the equivalence-oracle result, final plan.py and batch.py SLOC, CC status, the .importlinter diff, and confirmation of zero patch migration."
work_areas: []
rollback: >-
  Pure refactor on a feature branch; if the equivalence oracle (existing suites) cannot be made green,
  abandon the change (no merge). Nothing is deployed. If merged and a regression surfaces, revert the
  squash commit -- the two facades + siblings + .importlinter lines land atomically in one PR.
