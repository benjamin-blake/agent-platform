acceptance_criteria:
  - >-
    Per-family test-id preservation: for each of step_runner, plan, postflight, the set of pytest node ids
    (Class::function, module-path stripped) collected from tests/executor/<family>/ equals the pre-move set from the
    intact monolith (which is byte-identical to origin/main -- the monolith is never edited before deletion). Same
    function set, same count, same pass/fail outcomes. Because this is a PURE move with NO class rename, NO method
    rename, and NO class-level concern-split (the largest class, TestAllStepsAlreadyDone at ~222 SLOC, is far under
    500), each family's diff MUST be EMPTY with no sanctioned delta.
  - >-
    bin/venv-python -m scripts.validate --pre exits 0: SLOC gate green (every one of the 12 new modules < 500 SLOC and
    < 20 CC branches, none registered in config/sloc_budgets.yaml); no-cross-test-import guard green; test-count-coupling
    scanner green (verbatim move preserves the monoliths' already-clean local-collection asserts); collectability green.
  - "bin/venv-python -m pytest tests/executor/step_runner tests/executor/plan tests/executor/postflight -q passes with the same total as the three pre-move baselines summed."
  - >-
    git diff origin/main -- config/sloc_budgets.yaml shows ONLY the three tests/test_executor_*.py lines removed (values
    1354, 1345, 596 with their dec-130 raise-approved markers); every other dec-130 entry and marker is byte-identical;
    zero added lines.
  - >-
    map_source_to_test regressions (asserted by the updated tests/test_coverage_checker.py oracle):
    scripts/executor/step_runner.py -> None, scripts/executor/plan.py -> None, scripts/executor/postflight.py -> None,
    scripts/ops_portal/cli.py -> None (Decision 124, unperturbed); every non-executor roster mapping (e.g.
    scripts/validate.py -> tests/validate, scripts/session/postflight.py -> tests/test_session_postflight.py) unchanged.
  - >-
    _RETIRING_GRANDFATHER_HOMES no longer contains "test_executor_step_runner.py", "test_executor_plan.py", or
    "test_executor_postflight.py" and STILL contains "test_session_postflight.py"; _ALL_MIRROR_TARGET_HOMES (frozenset)
    is unchanged (24 entries); _ALL_MIRROR_TARGET_HOMES - _RETIRING_GRANDFATHER_HOMES == the 7-basename retired set;
    nothing was added to _CONCERN_SPLIT_TEST_PACKAGES.
  - >-
    Every new test module is < 500 SLOC (validate_sloc_limits counting: non-blank, non-comment lines) and < 20
    cyclomatic branches; NO new config/sloc_budgets.yaml entry is added; all three monoliths are deleted.
  - >-
    git diff origin/main touches NO file under scripts/executor/** (executor SOURCE is frozen -- Decision 44/117/67);
    the only production-code file changed is scripts/test_coverage_checker.py (the three-line _RETIRING deletion).
  - >-
    Whole-suite collection is clean: bin/venv-python -m pytest tests/ --collect-only -q reports no import or collection
    error from the three new packages, the deleted monoliths, or the oracle edits.
verification_plan:
  - step: 1
    phase: pre-deploy
    graduation: not-applicable
    action: >-
      Capture the BEFORE test-id baseline for all three intact monoliths (before the FINAL commit deletes them; the
      monolith is unedited so it equals origin/main).
    command: >-
      for fam in step_runner plan postflight; do bin/venv-python -m pytest tests/test_executor_${fam}.py --collect-only
      -q 2>/dev/null | grep '::' | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/exec_${fam}_before.txt; echo "$fam
      before: $(wc -l < /tmp/exec_${fam}_before.txt)"; done
    expected: Three non-empty sorted baselines (Class::function ids, module path stripped) written to the temp files; the printed counts are non-zero for all three families.
    fix_if: If any family's collection errors, that monolith has an import/collection problem that must be fixed before decomposing (it should collect cleanly on origin/main).
  - step: 2
    phase: pre-deploy
    graduation: not-applicable
    action: Collect the AFTER id set from each new package and assert byte-identical equality with that family's baseline.
    command: >-
      for fam in step_runner plan postflight; do bin/venv-python -m pytest tests/executor/${fam} --collect-only -q
      2>/dev/null | grep '::' | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/exec_${fam}_after.txt; echo "=== $fam
      ==="; diff /tmp/exec_${fam}_before.txt /tmp/exec_${fam}_after.txt && echo "$fam OK"; done
    expected: Three empty diffs (each family prints "<fam> OK"). No sanctioned delta -- pure move, no renames/splits.
    fix_if: Any added/removed id means a class was dropped, duplicated, mis-copied, or a method was lost/renamed. STOP and reconcile against the CLASS -> MODULE MAP.
  - step: 3
    phase: pre-deploy
    graduation: not-applicable
    action: Run the authoritative fast presubmit tier -- proves SLOC gate, no-cross-test-import guard, count-coupling scanner, and collectability.
    command: bin/venv-python -m scripts.validate --pre
    expected: Exit 0. No "SLOC limits" failure, no "cross-test import" failure, no test-count-coupling failure, no collection error.
    fix_if: >-
      A >500 unregistered file (rebalance classes across sibling modules in the same family -- never register a budget
      line); a cross-test import (a helper leaked between test_* modules -- move it to tests/fixtures/, NOT to a
      conftest, per the bare-side_effect/key rule); or a collection error (fix the offending module's fresh import header).
  - step: 4
    phase: pre-deploy
    graduation: not-applicable
    action: Full pass of each new package at the same per-family count as the baseline.
    command: for fam in step_runner plan postflight; do echo "=== $fam ==="; bin/venv-python -m pytest tests/executor/${fam} -q; done
    expected: All pass; each family's selected count equals its step-1 baseline line count.
    fix_if: >-
      A failure means a patch target or a moved helper did not survive the move. Confirm patch("scripts.executor.<mod>.X")
      string targets are unchanged (executor source is frozen, so the namespace is stable) and that each module's fresh
      header imports every symbol the moved classes reference.
  - step: 5
    phase: pre-deploy
    graduation: not-applicable
    action: Assert config/sloc_budgets.yaml lost exactly the three tests/test_executor_*.py lines and nothing else.
    command: git diff origin/main -- config/sloc_budgets.yaml
    expected: >-
      Exactly three removed lines (tests/test_executor_plan.py: 1345, tests/test_executor_postflight.py: 596,
      tests/test_executor_step_runner.py: 1354, each with its dec-130 raise-approved marker) and zero added lines.
    fix_if: Any other changed line means --update-sloc-budgets was run (forbidden) or an unintended entry was touched. Revert and re-delete by hand.
  - step: 6
    phase: pre-deploy
    graduation: not-applicable
    action: Prove the None regression and the 7-retired invariant via the updated coverage-checker oracle.
    command: bin/venv-python -m pytest tests/test_coverage_checker.py -q
    expected: >-
      All pass, including: all three scripts/executor/*.py -> None plus scripts/ops_portal/cli.py -> None; the renamed
      test_retiring_is_all_target_homes_minus_seven_retired_waves with the 7-basename retired set and the retained
      test_session_postflight.py grandfather control; the unchanged 24-entry roster test.
    fix_if: >-
      A failing oracle assertion means either the three basenames were not removed from _RETIRING, or the oracle
      `retired` set / None cases were not updated to match. Correct whichever side is stale (both edits are coupled in
      the FINAL commit).
  - step: 7
    phase: pre-deploy
    graduation: not-applicable
    action: Confirm all three monoliths are gone, the three basenames are removed from _RETIRING, and the executor SOURCE is untouched.
    command: >-
      test ! -f tests/test_executor_step_runner.py && test ! -f tests/test_executor_plan.py && test ! -f
      tests/test_executor_postflight.py && ! grep -qE '"test_executor_(step_runner|plan|postflight)\.py"'
      scripts/test_coverage_checker.py && test -z "$(git diff --name-only origin/main -- 'scripts/executor')" && echo RETIRED-OK
    expected: Prints RETIRED-OK (three monoliths deleted, three executor basenames removed from _RETIRING, and git diff touches no scripts/executor/** file).
    fix_if: If any monolith survives, a basename remains in _RETIRING, or scripts/executor/** shows a diff, the FINAL commit is wrong -- reconcile before pushing.
  - step: 8
    phase: pre-deploy
    graduation: not-applicable
    action: Whole-suite collection smoke -- no import/collection error anywhere from the move.
    command: bin/venv-python -m pytest tests/ --collect-only -q
    expected: Clean collection; no ImportError/collection error from the three new packages, the deleted monoliths, or the oracle edits.
    fix_if: A collection error means a dangling reference to a deleted monolith or a broken import header in a new module.
constraints:
  - >-
    EXECUTOR BOUNDARY (Decision 44/117/67 -- frozen executor): TEST code ONLY. Never edit scripts/executor/** or any
    executor source. `git diff origin/main` must touch NO file under scripts/executor/**. The only production file this
    plan modifies is scripts/test_coverage_checker.py (the three-line _RETIRING deletion).
  - >-
    Pure behaviour-preserving MOVE. Copy every class body and every class-bound helper VERBATIM with its owning class
    (class-level constants _PLANNING_TMPL / _REFINE_TMPL move with TestScopeValidationIntegration). Author a fresh
    per-file import header importing exactly the symbols that file references -- no test-logic edits, no method renames.
  - >-
    MOCK-SEQUENCE HAZARD (tests/CLAUDE.md rec-117/rec-325): the executor tests carry ordered subprocess side_effect
    lists and call-count asserts (e.g. `assert len(commit_calls) == 3`). Move each class WHOLE and VERBATIM; never
    reorder or renumber a side_effect list; never split a single class's mock setup across two modules. Every class
    lands in exactly one module.
  - >-
    SHARED-HELPER PLACEMENT: the only module-level helpers are _PLAN_TEXT (plan; used solely by TestParseStepsFromPlan),
    _gh_checks_result (postflight; used solely by TestWaitForCi), and _make_plan_text (postflight; used by
    TestParseScopeFiles + TestCoveragePredicate). The module split is DESIGNED so each helper's every user lands in one
    module, so each helper stays module-level VERBATIM in that module and NOTHING is hoisted to tests/fixtures/. If any
    future rebalance splits a helper's users across modules, THEN hoist that bare helper to tests/fixtures/ (a
    plain side_effect/key function -- NOT a conftest fixture).
  - >-
    NO package conftest and NO shared module-loader singleton (this is the key divergence from Wave 4). The three
    monoliths import their module-under-test DIRECTLY (`from scripts.executor.step_runner import ...`), not via an
    importlib synthetic-module loader, so there is no per-module-object attribute-identity hazard (the Wave 4
    PREFLIGHT_REPORT problem does not exist here). They also carry NO module-level autouse fixture. Do NOT create
    tests/executor/**/conftest.py and do NOT add any tests/fixtures/ module.
  - >-
    Do NOT duplicate, move, or redeclare the ROOT tests/conftest.py autouse fixtures (_clear_executor_env_vars,
    _isolate_plans_jsonl, _patch_write_run_summary, and the global recursion/socket guards) -- they stay global and
    layer above the new packages automatically.
  - >-
    No cross-test imports (validate_no_cross_test_imports active in --pre and full). New modules import only: stdlib,
    pytest, the real scripts.executor.<mod> / scripts.llm.* symbols a class references (patch("scripts.executor.<mod>.X")
    stays a STRING target -- the frozen source keeps the namespace stable, so patch targets survive the move verbatim
    with NO namespace-migration rewrite). Never `import` from another test_* module.
  - >-
    ruff-format import discipline (tests/CLAUDE.md): one consolidated import block per module (never split the same
    module's imports across two blocks -- ruff silently drops the second). After removing classes, run ruff check --fix
    to catch F401; after adding classes, verify every symbol used in side_effect= / assertions is imported at module scope.
  - >-
    Every mirror directory carries an __init__.py (prepend import mode): tests/executor/__init__.py and each of
    tests/executor/{step_runner,plan,postflight}/__init__.py. Precedent: tests/checks/ and tests/checks/hygiene/.
  - >-
    THREE-LINE surgical retirement in scripts/test_coverage_checker.py: remove ONLY the three executor basenames from
    _RETIRING_GRANDFATHER_HOMES. Do NOT add anything to _CONCERN_SPLIT_TEST_PACKAGES (dead config -- nothing maps to
    these homes). Do NOT touch _ALL_MIRROR_TARGET_HOMES, _NESTED_SUBPACKAGE_TEST_PREFIX, _grandfathered_source_to_test,
    or _mirror_source_to_test.
  - >-
    config/sloc_budgets.yaml loses exactly the three tests/test_executor_*.py lines by hand; NEVER run
    --update-sloc-budgets. Add NO raise marker and NO new tests/ budget entry (Decision 128 -- decompose, not raise).
  - Do NOT resolve rec-2709 (Wave 5 of the roster); bundled_recommendations stays empty.
  - >-
    No rescue agents or workaround loops (Decision 55). On an unrecoverable collect-id mismatch, STOP and RCA -- never
    patch around it. PUBLIC repo -- no AWS account IDs/ARNs/secrets/internal hostnames in any new file.
  - Use bin/venv-python for all Python invocations; bash-only shell.
context:
  - >-
    DECISION ANALYSIS (inline; the overseer is the critique gate, so no decision-scout/plan-critique sub-subagents were
    spawned). CITE: Decision 131 (test-colocation inverted to a mirror rule + retiring grandfather-table +
    no-cross-test-import guard + per-package conftest hierarchy; amends Decision 104; enables rec-2709 -- governs the
