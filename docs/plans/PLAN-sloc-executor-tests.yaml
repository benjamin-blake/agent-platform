schema_version: 1
slug: sloc-executor-tests
intent: >-
  Decompose the three grandfathered executor TEST monoliths -- tests/test_executor_step_runner.py
  (1354 SLOC), tests/test_executor_plan.py (1345), tests/test_executor_postflight.py (596) -- into
  three concern-split test packages under tests/executor/{step_runner,plan,postflight}/ (12 cohesive
  test_<concern>.py modules total, each < 500 SLOC), then delete the three monoliths, remove their
  three basenames from _RETIRING_GRANDFATHER_HOMES (tidiness + oracle consistency), delete their three
  config/sloc_budgets.yaml entries by hand, and update the coverage-checker oracle -- rec-2709 Wave 5
  of the Decision 131 mirror-convention rollout. UNIQUE to this wave: scripts/executor/** returns None
  in the grandfather helper (Decision 124), so NO source path maps to these three test files -- this is
  a PURE test-file split with NO source->test mapping to preserve, NO _CONCERN_SPLIT_TEST_PACKAGES
  declaration (that would be dead config), and NO mirror-rule flip. Purpose: keep every test file small
  enough for lower-tier model comprehension (the load-bearing reason the 500-SLOC gate exists, Decision
  128). Behaviour-preserving pure MOVE; no test-logic change; executor SOURCE untouched (frozen, Decision 44/117/67).
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-sloc-executor-tests.yaml
phase: >-
  rec-2709 Wave 5 (Decision 131 mirror convention, amends Decision 104); SLOC governance /
  model-portability (AGENTS.md Decision 128). Behaviour-preserving test MOVE of the three
  scripts/executor/** test homes, all of which map to None (Decision 124). No product-roadmap phase;
  platform tooling only.
