    ducklake_maintenance merge/GC at the production catalog before telemetry write volume lands) and
    cross-linking Decisions 95/96/97 + T0.12.6 Class A telemetry contracts.
  - >-
    Before deletion, T2.26 is confirmed to carry the Phase-3 demolition (Athena DDL drops,
    ops_compaction retirement, _current view drops, sync_athena_to_pgvector.py delete) AND the
    rec-curator / queue producer repoint -- so no still-live content is stranded by the delete
    (Decision 86 clause 2; manifest drift_finding "must be live tier_items before delete").
  - >-
    The MANIFEST ducklake-consolidation documents[] entry has disposition_state: done, and it is the
    only entry flipped to done in this plan; every other documents[] entry is unchanged.
  - >-
    The validate.py intent-doc-freeze guard (validate_intent_doc_freeze) produces no failure naming
    ducklake-consolidation when run against the post-change tree.
  - tier_item T5.5 files_in_scope no longer lists docs/INTENT-ducklake-consolidation.md.
  - >-
    Finding X7 closed: docs/DECISIONS.md Decision 84 Related line no longer contains the path
    docs/INTENT-ducklake-consolidation.md; it points at T2.26/T2.27/T2.28 + T2.36 instead.
  - >-
