verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      No-stranded-content gate -- confirm T2.26 carries the Phase-3 demolition + rec-curator/queue
      producer repoint BEFORE deleting the doc (Decision 86 clause 2; manifest drift_finding).
    command: >-
      grep -A60 '^  - id: T2.26$' docs/ROADMAP-PLATFORM.yaml | grep -Ei 'compaction|sync_athena_to_pgvector|producer|_current view|Athena'
    expected: >-
      Prints lines showing T2.26 owns ops_compaction retirement, sync_athena_to_pgvector.py deletion,
      Athena view/DDL teardown, and the queue/producer repoint. (T2.26 intent + exit_criteria c3/c5
      cover these.)
    fix_if: >-
      If T2.26 does NOT cover one of these, do NOT git rm yet -- add the missing demolition hook to
      T2.26 (or T2.36 for telemetry) first, so deletion strands no live content.
  - step: 2
    phase: pre-deploy
    action: Confirm the new tier_item T2.36 exists with the required dependency edges.
    command: >-
      grep -A4 '^  - id: T2.36$' docs/ROADMAP-PLATFORM.yaml | grep -E 'name:|depends_on:'
    expected: >-
      Prints the T2.36 name ("Phase 4: telemetry re-lands on DuckLake" or equivalent) and
      `depends_on: [T2.26, T2.18]`.
    fix_if: >-
      Missing or wrong edges -- add/fix the T2.36 block. Both T2.26 and T2.18 must already exist
      (they do) or the T-1.5 roadmap schema check will fail on an unresolved depends_on.
  - step: 3
    phase: pre-deploy
    action: Confirm the INTENT doc is deleted from the working tree.
    command: test ! -f docs/INTENT-ducklake-consolidation.md && echo DELETED || echo PRESENT
    expected: Prints DELETED.
    fix_if: >-
      Prints PRESENT -- ensure `git rm docs/INTENT-ducklake-consolidation.md` ran.
  - step: 4
    phase: pre-deploy
    action: Confirm the MANIFEST ducklake-consolidation entry is flipped to disposition_state done.
    command: >-
      grep -A20 '^  - id: ducklake-consolidation$' docs/intent-migration/MANIFEST.yaml | grep -m1 'disposition_state:'
    expected: "Prints a line whose value is `    disposition_state: done`."
    fix_if: >-
      Prints `    disposition_state: pending` (or nothing) -- flip ONLY the ducklake-consolidation
      entry's disposition_state to done; do not touch other entries.
  - step: 5
    phase: pre-deploy
    action: Run the real intent-doc-freeze guard; confirm no ducklake-consolidation false-positive.
    command: >-
      bin/venv-python -c "import scripts.validate as v; f=[]; v.validate_intent_doc_freeze(f); print('PASS' if not any('ducklake-consolidation' in x for x in f) else 'FAIL:'+str(f))"
    expected: Prints PASS.
    fix_if: >-
      Prints FAIL -- the guard flags ducklake-consolidation. Ensure BOTH the file is deleted AND the
      manifest entry is done (the two must land together; the guard derives its allowed set from
      disposition_state != done).
  - step: 6
    phase: pre-deploy
    action: Finding X7 -- confirm DECISIONS.md no longer dangles the deleted doc path.
    command: >-
      grep -n "INTENT-ducklake-consolidation.md" docs/DECISIONS.md; echo "grep_exit=$?"
    expected: No matching lines; trailing line reads grep_exit=1.
    fix_if: >-
      Any line prints -- the Decision 84 Related line still cites the deleted path. Repoint it to
      T2.26/T2.27/T2.28 + T2.36 and drop the path.
  - step: 7
    phase: pre-deploy
    action: Inbound-reference sweep -- confirm every live canonical surface is repointed.
    command: >-
      grep -rn "INTENT-ducklake-consolidation" docs/ROADMAP-PLATFORM.yaml docs/contracts/storage-substrate.yaml
      docs/PROJECT_CONTEXT.md AGENTS.md .claude/skills/planning/SKILL.md docs/INTENT-ops-decisions-graduation.md;
      echo "grep_exit=$?"
    expected: No matching lines; grep_exit=1.
    fix_if: >-
      Any line prints -- a live surface still dangles. Repoint per the scope table (T2.26 / T2.36 /
      Decision 84 / Decisions 95-97). Do not delete the host content, only swap the pointer.
  - step: 8
    phase: pre-deploy
    action: >-
      X6/X7 generic close -- fresh repo-wide sweep returns only c4-exempt / historical residual.
    command: >-
      grep -rl "INTENT-ducklake-consolidation" . --include=*.md --include=*.yaml --include=*.py | sort
    expected: >-
      Only these paths appear, all c4-exempt or historical: ./docs/intent-migration/MANIFEST.yaml
      (c4-exempt self-reference) and docs/plans/PLAN-*.{md,yaml} historical plan artefacts (e.g. this
      plan, PLAN-intent-migration-wave1-bazel-feasibility.yaml, PLAN-ratify-ops-class-a-contracts.yaml,
      PLAN-ratify-class-a-telemetry-contracts.yaml). NOTE: tests/test_validate.py does NOT appear --
      its fixture uses the bare slug "ducklake-consolidation" without the INTENT- prefix this grep
      matches. NO live canonical surface (DECISIONS.md, ROADMAP-PLATFORM.yaml, PROJECT_CONTEXT.md,
      AGENTS.md, docs/contracts/*, .claude/skills/*) appears.
    fix_if: >-
      A canonical surface appears -- repoint it (step 7). An UNEXPECTED new path appears -- investigate
      before editing; it may be a reference introduced after the 2026-06-30 plan-time inventory.
  - step: 9
    phase: pre-deploy
    action: Confirm the synthetic-fixture guard tests still pass (unaffected by the real manifest flip).
    command: bin/venv-python -m pytest tests/test_validate.py::TestIntentDocFreeze -q
    expected: All TestIntentDocFreeze tests pass.
    fix_if: >-
      A failure -- inspect it; the tests are synthetic and should be flip-independent. Do NOT edit
      the tests to mask a real regression (Decision 55). The fixture's
      {"id": "ducklake-consolidation", "disposition_state": "pending"} is intentionally synthetic
      test data and is NOT swept by this plan (same precedent as bazel-feasibility, already deleted).
  - step: 10
    phase: pre-deploy
    action: Run the authoritative presubmit (CI-equivalent gate).
    command: bin/venv-python -m scripts.validate
    expected: >-
      Exits 0; the "Intent doc freeze (Decision 86)" section reports no failures; the ROADMAP schema
      check passes (T2.36 depends_on resolves) and the MANIFEST schema check passes (credential-gated
      DQ checks may report SKIPPED).
    fix_if: >-
      Non-zero exit -- read the failing check. Likely causes: malformed YAML after the roadmap/manifest/
      contract edit, or a T2.36 schema violation (missing required field, unresolved depends_on). Fix
      the cited check; do not add or remove checks to make it pass.
