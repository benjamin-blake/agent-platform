schema_version: 1
slug: "intent-migration-wave1-ducklake-consolidation"
intent: >-
  Advance platform tier T5.5 (INTENT-doc extract-and-retire, Decision 86) by retiring WAVE-1's
  last remaining document docs/INTENT-ducklake-consolidation.md, whose architecture graduated to
  Decision 84 (DuckLake single-backend ops store). Per the feasibility_graduated -> delete_pointer
  archetype, the doc's still-live forward content is preserved as live tier_items BEFORE deletion
  (the manifest's own drift_finding requires "the pending Phase 4 (telemetry on DuckLake) and
  rec-curator producer repoint must be live tier_items before delete"), then the prose is deleted
  and every live inbound reference is repointed to the surviving canonical surface. Completing this
  doc closes WAVE-1 and unblocks WAVE-2 per docs/intent-migration/MANIFEST.yaml wave gating.
plan_type: IMPLEMENTATION
verification_tier: V1
plan_path: docs/plans/PLAN-intent-migration-wave1-ducklake-consolidation.yaml
phase: >-
  Platform tier T5.5 (INTENT-* document extraction and retirement); WAVE-1 of
  docs/intent-migration/MANIFEST.yaml (feasibility_graduated -> delete_pointer). This is the
  third and final WAVE-1 doc, following bazel-feasibility (done) and ops-pipeline-consolidation (done).
scope:
  - file: docs/INTENT-ducklake-consolidation.md
    action: Delete
    purpose: >-
      Retire the DuckLake consolidation prose. Its ratified premises, problem statement, target
      end-state, and the I-1..I-4 invariants are fully captured in Decision 84. The Phase-3
      demolition forward content is carried by live tier_item T2.26; the Phase-4 telemetry forward
      content is carried by the new tier_item T2.36 (created in this plan) plus Decisions 95/96/97
      and the docs/contracts/storage-substrate.yaml telemetry_tables disposition. Prose deleted per
      delete_pointer archetype; recoverable in git history.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Four edits. (a) CREATE new tier_item T2.36 "Phase 4: telemetry re-lands on DuckLake"
      (depends_on [T2.26, T2.18]) consolidating the doc's Phase-4 forward hooks and cross-linking
      Decisions 95/96/97 + T0.12.6 Class A telemetry contracts + storage-substrate telemetry_tables.
      This satisfies the manifest drift_finding's "live tier_item" bar and gives the scattered
      Phase-4 pointers a single repoint target. (b) Repoint the T2.26 progress_note's
      docs/INTENT-ducklake-consolidation.md path reference (~line 5559) to Decision 84 / T2.36.
      (c) Remove the `- docs/INTENT-ducklake-consolidation.md` line from T5.5 files_in_scope
      (~line 7077). (d) Append a T5.5 progress_note line recording 3 of 18 docs retired and WAVE-1
      complete.
  - file: docs/intent-migration/MANIFEST.yaml
    action: Modify
    purpose: >-
      Flip the ducklake-consolidation documents[] entry disposition_state from pending to done.
      Change ONLY that one field; leave content_blocks / drift_findings / primary_targets /
      related_decisions and the X7 cross_cutting_finding intact as the disposition record. MANIFEST
      self-references are c4-exempt and are NOT swept.
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Finding X7: Decision 84's Related line (~line 909) cites docs/INTENT-ducklake-consolidation.md
      BY PATH as "(full program)" -- a circular dangling pointer once the doc is deleted. Repoint it
      to the surviving canonical targets: the roadmap carriers T2.26/T2.27/T2.28 (already named on
      that line) plus the new T2.36, and drop the deleted-doc path. Leave the line 864 slug mention
      ("ducklake-consolidation INTENT graduates to it") untouched -- it is a correct historical
      statement and contains no INTENT- path token.
  - file: docs/contracts/storage-substrate.yaml
    action: Modify
    purpose: >-
      Repoint four references to the deleted path: the header comment (~line 10, "For
      Iceberg-boundary tables pending T2.26 disposition: see docs/INTENT-ducklake-consolidation.md")
      and three `migration_ref:` fields. For ops_session_log and ops_execution_plans (Iceberg-boundary,
      pending) -> tier_item T2.26 (their live disposition carrier). For telemetry_tables (Phase-4
      pending) -> tier_item T2.36 plus Decisions 95/96/97 (the canonical 4-table model + partition +
      identity standards). Preserve each entry's existing disposition prose; only swap the dangling
      doc-path pointer for the live target.
  - file: docs/PROJECT_CONTEXT.md
    action: Modify
    purpose: >-
      Repoint the storage-backend section (~line 37) trailing "See docs/INTENT-ducklake-consolidation.md."
      pointer to Decision 84 (the ratified consolidation) -- the sentence already cites Decision 84;
      replace the dangling doc-path tail with the canonical Decision/tier_item reference.
  - file: AGENTS.md
    action: Modify
    purpose: >-
      Repoint the warehouse-as-source-of-truth section (~line 116) "Telemetry stays on its
      (dead, to-be-rebuilt) path until consolidation Phase 4 (docs/INTENT-ducklake-consolidation.md)"
      to cite Decision 84 Phase 4 / tier_item T2.36 instead of the deleted doc path. Minimal pointer
      swap; sentence meaning preserved. (This is a hygiene pointer in the source-of-truth section, not
      a semantic/merge-protocol change.)
  - file: .claude/skills/planning/SKILL.md
    action: Modify
    purpose: >-
      Repoint the telemetry-store note (~line 50) "telemetry re-lands on DuckLake (consolidation
      Phase 4, docs/INTENT-ducklake-consolidation.md)" to cite Decision 84 / tier_item T2.36 instead
      of the deleted doc path. Minimal pointer swap; guidance meaning preserved.
  - file: docs/INTENT-ops-decisions-graduation.md
    action: Modify
    purpose: >-
      Repoint the cross-INTENT pointer (~line 8) "DECISIONS.md decommission question. See
      docs/INTENT-ducklake-consolidation.md." to Decision 84. This doc is a SURVIVING INTENT doc
      (Wave 3, disposition_state still pending) -- leaving it pointing at a deleted sibling would
      strand the pointer. Change ONLY the dangling pointer; do not extract or alter any other content
      in this Wave-3 doc (out of scope for WAVE-1).
