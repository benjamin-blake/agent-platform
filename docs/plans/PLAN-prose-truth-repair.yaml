schema_version: 1
slug: "prose-truth-repair"
intent: >-
  Repair drifted/stale factual claims in ambient (L1) and on-invocation (L4) agent-instruction
  prose so agents load one authoritative, non-contradictory governance state -- directly
  advancing the self-improving loop's dependence on trustworthy instruction surfaces. Implements
  audit findings ACG-03 and ACG-04 from audits/agent-context-governance-cdfda88.yaml.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-prose-truth-repair.yaml
phase: >-
  Platform governance -- agent-context-governance audit remediation (ACG-03 cross-layer
  drift/freshness; ACG-04 PROJECT_CONTEXT context-budget stanza + preflight fields). No owning
  tier_item (audit roadmap_crossref classified both findings "novel"); ships as a standalone
  IMPLEMENTATION plan (STRATEGIC suspended per Decision 67).
scope:
  - file: AGENTS.md
    action: Modify
    purpose: >-
      ACG-03 item 1 (the T2.38 contradiction, fixed first). Line ~34 "Lambda deploy channel"
      bullet asserts the governed code-deploy CD channel is "still PENDING (tier_item T2.38)",
      contradicting on-disk truth (.github/workflows/deploy-ducklake-lambdas.yml exists; roadmap
      marks T2.38 complete; four contracts + src/lambdas/CLAUDE.md say it landed). Replace the
      stale state assertion with the durable rule (governed channel exists; break-glass is the
      non-default fallback) plus a pointer to the authoritative surface docs/contracts/deploy-paths.yaml.
  - file: src/lambdas/CLAUDE.md
    action: Modify
    purpose: >-
      ACG-03. Lines ~9-10 independently restate "The governed code-deploy channel landed at T2.38".
      Reframe to a pointer: keep the directory-local operational fact (the workflow filename) but
      attribute channel STATUS/authority to docs/contracts/deploy-paths.yaml so exactly one surface
      owns the state and the others point.
  - file: docs/PROJECT_CONTEXT.md
    action: Modify
    purpose: >-
      ACG-04 (line 18 Context-budget stanza) + ACG-03 stale-ref items. (C-i) line ~212 "See
      plan.prompt.md Step 4" -> re-point to the live surface (.claude/skills/planning/SKILL.md
      "Infrastructure & Lambda Assessment"), plan.prompt.md deleted at T-1.13. (C-ii) line ~214
      "Decision 49" -> "Decision 116 (supersedes Decision 49)" per src/data/handlers/CLAUDE.md.
      (C-iii) line ~240 remove the dead "LLM_PROVIDER=bedrock" executor switch instruction
      (Bedrock retired, CD.28 / Decision 122; the value now falls back to gemini per
      test_llm_model_registry). (C-iv) line 18 rewrite to the LIVE governance model (Decision 134
      DECISIONS.md byte/header ceiling + Decision 114 roadmap ceiling + SLOC budgets), naming no
      nonexistent file (ROADMAP.md / ROADMAP_ARCHIVE.md) or nonexistent enforcer (strategic_review).
  - file: .claude/skills/decision-scout/SKILL.md
    action: Modify
    purpose: >-
      ACG-03 rotting literals. Line ~28 drop the "(currently 67)" live-header-count literal (103
      measured) while KEEPING the runtime `rg -c "^## Decision " docs/DECISIONS.md` computation.
      Lines ~3/10/16 replace the ">200KB" DECISIONS.md size literals (398KB measured) with a
      reference to the live Decision 134 ceiling / a qualitative descriptor, so no hardcoded size
      magnitude remains.
  - file: .claude/skills/planning/SKILL.md
    action: Modify
    purpose: >-
      ACG-03 + E-relocation. (B-iii) line ~43 remove the dangling `token_anomalies` preflight
      conditional (key retired from preflight with no replacement -- nothing emits it). (B-ii)
      line ~418 replace ">200KB" with the Decision 134 ceiling reference. (E-i) lines ~240-245
      strip the inlined speculative-plan pipeline mechanics (plan.bin paths, apply-sandbox job,
      guard exit codes) -- keep a methodology-level instruction and point to
      docs/contracts/environment-taxonomy.md (the apply-model SoT, which already holds the detail)
      + roadmap T2.21. (E-ii) line ~54 strip the Athena-migration history narration ("died with
      the 2026-05-28 account migration") -- keep the "do not gate plans on session counts"
      methodology and point to Decision 84 / tier_item T2.36.
  - file: .claude/skills/plan-critique/SKILL.md
    action: Modify
    purpose: >-
      ACG-03 rotting literal. Phase 1 step 4 (line ~26) replace the "~230KB" DECISIONS.md size
      literal with the Decision 134 ceiling reference / a qualitative descriptor.
  - file: .claude/skills/implement/SKILL.md
    action: Modify
    purpose: >-
      ACG-03 E-relocation (iii). Commit Flows intro (line ~473) inlines Decision-89-vs-83
      reversal history. Strip the history narration (fetch-not-inline) -- keep the operational
      statement and the existing pointer to AGENTS.md `## Git-ops procedure`; the reversal
      rationale is fetchable from Decision 83 / Decision 89 in DECISIONS.md (Decision 86: rationale
      lives in Decisions).
  - file: scripts/preflight/context_docs.py
    action: Modify
    purpose: >-
      ACG-04 preflight fields. Retire the `strategic_review_due` computation (~lines 76-95) and its
      return-dict key + docstring mention -- STRATEGIC review is frozen (Decision 67) and the flag
      is emitted-but-unconsumed; also drop the now-unused `datetime`/`timezone` imports if they
      become unused. Update the `roadmap_phase` source comment (~line 41) to name the real file
      after the _common.ROADMAP_FILE re-point.
  - file: scripts/preflight/_common.py
    action: Modify
    purpose: >-
      ACG-04. Re-point the stale `ROADMAP_FILE` constant (~line 20) from docs/ROADMAP-PRODUCT.md
      (SUPERSEDED per its own header, slated for deletion) to docs/ROADMAP-PRODUCT.yaml (the
      durable canonical product roadmap) so preflight context fields derive from a file that exists
      and persists. Constant name unchanged (all import/patch sites stay valid).
  - file: tests/session/preflight/test_context_docs.py
    action: Modify
    purpose: >-
      ACG-04. Remove the two `strategic_review_due` unit tests
      (test_strategic_review_due_when_no_mention, test_strategic_review_not_due_when_recent_mention)
      and the `strategic_review_due` assertion in test_missing_files_return_defaults, in tandem
      with retiring the field. roadmap_phase tests are unaffected (they patch ROADMAP_FILE to a
      synthetic markdown fixture).
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    ACG-03/A (T2.38): `grep -nE "PENDING \(tier_item T2\.38\)|still PENDING" AGENTS.md` returns no
    match; AGENTS.md and src/lambdas/CLAUDE.md both reference docs/contracts/deploy-paths.yaml for
    channel status; docs/contracts/deploy-paths.yaml remains the single authoritative status
    statement ("Two governed channels landed ... tier_item T2.38").
  - >-
    ACG-03/B (literals): `grep -rnE "2[03]0 ?KB|~230KB|>200KB|currently 67" .claude/` returns no
    match; the runtime `rg -c "^## Decision " docs/DECISIONS.md` computation is retained in
    decision-scout/SKILL.md.
  - >-
    ACG-03/B: `grep -c token_anomalies .claude/skills/planning/SKILL.md` returns 0.
  - >-
    ACG-03/E: planning/SKILL.md no longer inlines the speculative-plan mechanics (no "plan.bin" /
    "apply-sandbox job" prose) and points to docs/contracts/environment-taxonomy.md; planning/SKILL.md
    no longer inlines the telemetry Athena-migration date ("2026-05-28") and points to Decision 84 /
    T2.36; implement/SKILL.md no longer narrates the Decision-89-vs-83 reversal and retains its
    AGENTS.md `## Git-ops procedure` pointer.
  - >-
    ACG-04/C: docs/PROJECT_CONTEXT.md Rules section names no nonexistent file or enforcer --
    `grep -nE "ROADMAP\.md|ROADMAP_ARCHIVE\.md|plan\.prompt\.md|strategic_review enforces|LLM_PROVIDER=bedrock" docs/PROJECT_CONTEXT.md`
    returns no match; line 18 states the live governance (Decision 134/114 ceilings + SLOC budgets);
    "Decision 116" is present (Decision 49 corrected).
  - >-
    ACG-04/D: preflight context fields derive from files that exist -- `ROADMAP_FILE` in
    scripts/preflight/_common.py points at docs/ROADMAP-PRODUCT.yaml (which exists);
    `grep -c strategic_review_due scripts/preflight/context_docs.py` returns 0; the preflight
    context_docs test module passes.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      ACG-03/A -- AGENTS.md no longer asserts the T2.38 governed channel is PENDING, and both L1
      surfaces point to the authoritative contract.
    command: >-
      bash -c '! grep -nE "PENDING \(tier_item T2\.38\)|still PENDING" AGENTS.md && grep -q
      "deploy-paths.yaml" AGENTS.md && grep -q "deploy-paths.yaml" src/lambdas/CLAUDE.md && echo OK'
    expected: "Prints OK: no PENDING-T2.38 assertion in AGENTS.md; both files reference deploy-paths.yaml."
    fix_if: "AGENTS.md still says PENDING, or a surface lacks the deploy-paths.yaml pointer."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      One-time contradiction removal (a single stale AGENTS.md assertion). Systematic freshness
      guarding of cross-surface state is the explicit scope of sibling audit findings ACG-01/ACG-05
      (prose-size/metric registry layer), not this repair slice; a per-string standing guard now
      would be superseded by that layer. Matches the prose-currency-sweep precedent (graduated none).
  - step: 2
    phase: pre-deploy
    action: "ACG-03/A -- deploy-paths.yaml remains the authoritative T2.38 landed-status statement."
    command: >-
      grep -nE "tier_item T2\.38.*deploy-ducklake-lambdas\.yml" docs/contracts/deploy-paths.yaml
    expected: "Matches: the authoritative 'Two governed channels landed ... T2.38' status line is intact."
    fix_if: "The authoritative status statement was removed or weakened; restore it."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Asserts an unchanged pre-existing contract line (deploy-paths.yaml is not edited by this plan);
      a standing registry guard on a line this plan does not author adds no anti-regression value
      beyond step 1, which owns the contradiction it removes.
  - step: 3
    phase: pre-deploy
    action: "ACG-03/B -- no hardcoded DECISIONS.md size/count literal remains anywhere under .claude/."
    command: >-
      bash -c '! grep -rnE "2[03]0 ?KB|~230KB|>200KB|currently 67" .claude/ && echo OK'
    expected: "Prints OK: zero hardcoded DECISIONS.md size (>200KB/~230KB) or count (currently 67) literals under .claude/."
    fix_if: "A size/count literal survives in a skill; replace it with the Decision 134 ceiling reference or a qualitative descriptor."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Kernel-expressible (grep_count == 0) but deferred: a standing "no DECISIONS.md size/count
      literal in .claude/" guard belongs to the ACG-01/ACG-05 prose-governance layer that owns
      systematic anti-rot, not this one-time repair. Registering it here would duplicate that
      pending layer's intended coverage. Mirrors the prose-currency-sweep waiver pattern.
  - step: 4
    phase: pre-deploy
    action: "ACG-03/B -- decision-scout retains the RUNTIME rg header-count computation (only the stale literal is dropped)."
    command: >-
      grep -n 'rg -c "\^## Decision " docs/DECISIONS.md' .claude/skills/decision-scout/SKILL.md
    expected: "Matches: the runtime `rg -c` computation instruction is preserved."
    fix_if: "The runtime computation was removed along with the literal; restore the rg instruction."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Guards preservation of a specific instruction string during this one edit; not a durable
      cross-repo invariant worth a standing registry row (the value is proving this plan did not
      over-delete, a plan-scoped concern).
  - step: 5
    phase: pre-deploy
    action: "ACG-03/B -- the retired token_anomalies preflight conditional is gone from planning/SKILL.md."
    command: "bash -c '[ \"$(grep -c token_anomalies .claude/skills/planning/SKILL.md)\" = 0 ] && echo OK'"
    expected: "Prints OK: zero token_anomalies references."
    fix_if: "The dangling conditional survives; remove it."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Kernel-expressible (grep_count == 0) but a one-time removal of a dangling conditional; a
      standing "no token_anomalies in planning skill" guard is low-value in isolation and belongs to
      the ACG-01/ACG-05 prose-governance layer rather than this repair slice.
  - step: 6
    phase: pre-deploy
    action: >-
      ACG-03/E -- planning/SKILL.md relocates the speculative-plan mechanics (points to the
      apply-model SoT, no inlined plan.bin/apply-sandbox prose) and the telemetry history.
    command: >-
      bash -c '! grep -nE "plan\.bin|apply-sandbox job" .claude/skills/planning/SKILL.md && !
      grep -n "2026-05-28" .claude/skills/planning/SKILL.md && grep -q "environment-taxonomy.md"
      .claude/skills/planning/SKILL.md && echo OK'
    expected: "Prints OK: no inlined pipeline mechanics or Athena-migration date; environment-taxonomy.md pointer present."
    fix_if: "Detailed mechanics or the migration date still inlined; strip to a pointer."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      One-time relocation of two specific narration blocks; a standing grep guard on these exact
      strings has low recurrence value versus the general literal guard (step 3) and would ossify
      the current wording of a skill under active editorial change.
  - step: 7
    phase: pre-deploy
    action: "ACG-03/E -- implement/SKILL.md strips the Decision-89-vs-83 reversal narration and keeps its git-ops pointer."
    command: >-
      bash -c '! grep -nE "reversed Decision 89|Decision 89.s .Branch Protection" .claude/skills/implement/SKILL.md
      && grep -q "Git-ops procedure" .claude/skills/implement/SKILL.md && echo OK'
    expected: "Prints OK: the reversal history is gone; the AGENTS.md Git-ops pointer remains."
    fix_if: "The Decision-89-vs-83 narration survives, or the git-ops pointer was lost."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      One-time narration strip; the durable git-ops authority already lives in AGENTS.md and a
      standing guard on this specific removed sentence adds no cross-repo invariant.
  - step: 8
    phase: pre-deploy
    action: "ACG-04/C -- PROJECT_CONTEXT.md Rules section names no nonexistent file or enforcer, and corrects Decision 49 -> 116."
    command: >-
      bash -c '! grep -nE "ROADMAP\.md|ROADMAP_ARCHIVE\.md|plan\.prompt\.md|strategic_review enforces|LLM_PROVIDER=bedrock"
      docs/PROJECT_CONTEXT.md && grep -q "Decision 116" docs/PROJECT_CONTEXT.md && echo OK'
    expected: "Prints OK: no dead file/enforcer references; Decision 116 present."
    fix_if: "A dead reference (ROADMAP.md, ROADMAP_ARCHIVE.md, plan.prompt.md, strategic_review enforcer, Bedrock switch) survives, or Decision 49 was not corrected."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Kernel-expressible (grep_count == 0) but the step ANDs several dead-ref patterns plus a
      presence check; a standing PROJECT_CONTEXT dead-ref guard is the ACG-01/ACG-05 layer's remit,
      not this repair slice. Deferred to avoid duplicating that pending systematic coverage.
  - step: 9
    phase: pre-deploy
    action: "ACG-04/C -- line 18 states the live governance model (Decision 134/114 ceilings + SLOC budgets)."
    command: >-
      bash -c 'grep -nE "Decision 134|Decision 114|SLOC" docs/PROJECT_CONTEXT.md | head -1 | grep -q . && echo OK'
    expected: "Prints OK: the rewritten context-budget rule references the live ceilings/SLOC governance."
    fix_if: "Line 18 still describes the retired 5-entry/open-decisions-only model instead of the live ceilings."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Presence-of-reference check for a one-time rewrite; the anti-regression value is covered by
      step 8's dead-ref guard, and a standing guard requiring these tokens would ossify the stanza's wording.
  - step: 10
    phase: pre-deploy
    action: "ACG-04/D -- ROADMAP_FILE points at an existing durable file and strategic_review_due is retired."
    command: >-
      bash -c 'grep -nE "ROADMAP_FILE *= .*ROADMAP-PRODUCT\.yaml" scripts/preflight/_common.py &&
      test -f docs/ROADMAP-PRODUCT.yaml && [ "$(grep -c strategic_review_due scripts/preflight/context_docs.py)" = 0 ] && echo OK'
    expected: "Prints OK: ROADMAP_FILE -> ROADMAP-PRODUCT.yaml (exists); zero strategic_review_due references in context_docs.py."
    fix_if: "ROADMAP_FILE still points at ROADMAP-PRODUCT.md, the target file is missing, or strategic_review_due survives."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Compound assertion (ROADMAP_FILE target + file existence + strategic_review_due absence) that
      is not a single canonical slot; the durable behaviour is already covered by the preflight
      context_docs test module (step 11), so a separate standing grep guard is redundant.
  - step: 11
    phase: pre-deploy
    action: >-
      ACG-04/D -- the preflight context_docs test module passes after retiring strategic_review_due
      and re-pointing ROADMAP_FILE (real behaviour, not just grep).
    command: "bin/venv-python -m pytest tests/session/preflight/test_context_docs.py -q"
    expected: "All tests pass; no reference to the retired strategic_review_due field remains in the suite."
    fix_if: "A test still asserts strategic_review_due, or read_context_files/_common changes broke a case."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      test_selector-expressible, but the preflight test suite already runs under validate --pre's
      pytest tier in CI; registering this file-run as a separate standing check would duplicate that
      existing coverage rather than add a new guard.
  - step: 12
    phase: pre-deploy
    action: "Lint + coverage gate on the two modified Python files (no new lint debt, coverage checker satisfied)."
    command: >-
      bash -c 'bin/venv-python -m ruff check scripts/preflight/context_docs.py scripts/preflight/_common.py
      tests/session/preflight/test_context_docs.py && bin/venv-python -m scripts.test_coverage_checker
      --check-tests --files scripts/preflight/context_docs.py scripts/preflight/_common.py'
    expected: "ruff clean (no unused-import debt from the removed block); coverage checker reports no missing test file."
    fix_if: "ruff flags an unused import (drop it) or the coverage checker demands a test file (satisfy via the existing preflight test package)."
    hermetic: false
    graduation: not-applicable
constraints:
  - "IMPLEMENTATION plan only -- STRATEGIC is suspended (Decision 67 / AGENTS.md Temporary Operational Constraints)."
