  - >-
    Decision 86 routing: relocate by POINTER to existing authoritative homes (contracts, Decisions,
    tier_items) -- create NO new standing prose-architecture doc and add NO restated copy that becomes
    a second surface to sync. Every relocation target must already hold the content (verified: deploy-paths.yaml,
    environment-taxonomy.md, Decision 84/T2.36, Decision 83/89, AGENTS.md Git-ops procedure).
  - >-
    Decision 114: never split a load-bearing file into co-loading parts; fetch-not-inline means point
    to the authoritative home, not fragment the skill.
  - "No rescue agents or workaround loops (Decision 55). Out-of-scope adjacent staleness becomes a note, not an inline fix."
  - >-
    File NO new recommendations. Neither rec-2163 nor rec-2379 is bundled (see open_questions);
    remediation ships as this plan's steps only.
  - "Never Edit/Write logs/.recommendations-log.jsonl or docs/DECISIONS.md directly (portal-only; not touched by this plan)."
