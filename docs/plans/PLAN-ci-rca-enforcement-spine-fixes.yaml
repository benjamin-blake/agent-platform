  - >-
    CIRCA-01 design choice: uses the audit's alternative-2 (env-parameterised, sha-keyed emit-dir
    candidate) rather than the "preferred" single-path CI_RCA_BUNDLE_LOCAL_PATH, because a single
    file path cannot cover multi-failure runs where the evidence step emits N bundles (N shas) to
    /tmp/ci-rca-bundles/<sha>.json. The existing CI_RCA_BUNDLE_LOCAL_PATH candidate is retained.
  - >-
    CIRCA-04 ceiling decision: bump the why_chain per-entry ceiling 250->400 in THIS plan,
    version-gated (v1=250, v2=400). The immediate-next plan (CIRCA-03/07 + CIRCA-04 agent-prompt half)
    adds the prompt hard-limits and a fresh 7d measurement window and explicitly conforms to this
    ceiling; per-rule stamping shipped here keeps the residual terminus/citation rejects decomposable.
  - >-
    Deferrals (Decision 86 routing): CIRCA-08 sibling-rec + rate-limit machinery -> hygiene/next plan;
    CIRCA-09 bundle-emit None->'unknown' (scripts/ci_rca_evidence.py, S2 surface) + INTENT Section 4
    enforcement-claim annotation -> hygiene plan. These are recorded here so the hygiene plan annotates
    them; this plan makes only the portal enum reachable.
  - >-
    T1.13 c10 re-grounded met->open (audit CIRCA-01 CONFIRMED-critical the cross-check spine was not
    load-bearing at the production call site). closes_criteria T1.13:c10 -> /implement re-closes on the
    verified reachability VP (VP steps 1-2), which is the recorded closure proof (Decision 103). c8/c11
    stay met -- their evidence computation is genuine; only c10's binding into the spine was inert.
  - >-
    main not diverged at planning time (0 behind / 0 ahead); Main Divergence Assessment not triggered.
    Lambda assessment: compute_affected_artifacts(scope) == {'data-pipeline':
    ['docs/ROADMAP-PLATFORM.yaml']} because the roadmap is a bundled read-only ASSET of the active
    data-pipeline artifact (src/lambdas/data-pipeline/manifest.yaml:42) -- NOT because any Lambda
    handler code changed (ops_data_portal.py / rec_write_guidance.py are not Lambda-packaged). No
    build/deploy/smoke-test is warranted: the affected file is a non-executable doc asset (a
    status-flip + progress_note), the scheduled agents that read it are disabled, and
    validate_lambda_deploy_gating is advisory-only (Decision 104, never fails the build) so
    validate --pre stays green. V2 (unit) is the correct tier; do NOT add a data-pipeline deploy step.
  - >-
    Decision-scout verdict + CITE list: FLAGS_FOUND (Decisions triaged: 81 of 81; one Decision 86/65
    NOTE, resolved above). CITE = Decision 72, Decision 55, Decision 84, Decision 66, Decision 86.
    RELATED = Decision 73, Decision 61, Decision 103.
  - "gates: decision-scout=FLAGS_FOUND (1 NOTE resolved) after 1 round; plan-critique=PROCEED after 2 round(s) (round 1 REVISE: corrected Lambda-asset assessment + folded in the back-validate test-docstring refresh)"
pre_implementation_checklist:
  - Branch confirmed not on main (claude/ci-rca-enforcement-spine-fixes-7yjn6k)
  - docs/PROJECT_CONTEXT.md read
  - Audit audits/ci-rca-system-a49db8f.yaml findings CIRCA-01/02/04/06/08/09 read
  - All seven scope files located and readable
  - Acceptance criteria understood and verifiable
execution_steps:
  - >-
    scripts/ops_data_portal.py -- CIRCA-01: in _load_and_verify_bundle, append an emit-dir candidate
    Path(os.environ['CI_RCA_BUNDLE_EMIT_DIR'])/f"{sha256}.json" (when the env var is set) to the
    existing pending-dir + CI_RCA_BUNDLE_LOCAL_PATH candidate list; keep sha-keyed lookup so N-bundle
    runs resolve each rec's own bundle.
  - >-
    scripts/ops_data_portal.py -- CIRCA-02: in the source=ci_rca branch where context_v2_json is None
    (currently the log-only elif), raise ValueError in strict mode; keep the warn-mode deprecation log
    and acceptance. Update the elif so the strict path fails loudly.
  - >-
    scripts/ops_data_portal.py -- CIRCA-06: replace _EvidenceBundleRef.s3_uri's unconditional
    ^s3:// Field pattern with a model_validator: require ^s3:// iff upload_status=='ok'; allow empty
    s3_uri when upload_status=='upload_failed' (constrain upload_status to the known {ok,upload_failed}).
  - >-
    scripts/ops_data_portal.py -- CIRCA-08: add a _WhyChainTerminusOverride sub-model
    (reason: str = Field(min_length=80, max_length=400)) and retype
    CiRcaContext.why_chain_terminus_override to Optional[_WhyChainTerminusOverride]; _validate_terminus
    still returns early when a (now-validated) override is present.
  - >-
    scripts/ops_data_portal.py -- CIRCA-04 stamping: at the schema-deficiency stamp site, map each
    pydantic deficiency message to a stable schema_<rule> tag (e.g. schema_why_chain_too_long,
    schema_terminus_missing_keyword, schema_missing_citation, schema_why_chain_too_short), falling back
    to schema_deficiency for unmapped; stamp those tags. Update back_validate_ci_rca's non_schema_reasons
    filter to exclude any reason starting with "schema". Refresh the docstring's stale "strict-mode
    file_rec ACCEPTS these" claim.
  - >-
    scripts/ops_data_portal.py -- CIRCA-04 ceiling: move the why_chain per-entry length check into a
    schema_version-aware model_validator (max 250 for schema_version < 2, max 400 for schema_version 2);
    keep the min-40 floor.
  - >-
    scripts/ops_data_portal.py -- CIRCA-09: add 'unknown' to the
    _DetectionGap.actual_gate_that_caught_it pattern (^(pre|presubmit|CI|unknown)$).
  - >-
    scripts/executor/rec_write_guidance.py -- update the ci_rca guidance: actual_gate_that_caught_it
    lists pre|presubmit|CI|unknown with "mirror the bundle value; write 'unknown' when the bundle
    emits null (not_a_gate workflows such as terraform-apply-sandbox)"; why_chain_terminus_override
    reason is required 80-400 chars; why_chain per-entry is 40-400 chars at schema_version 2.
  - >-
    .github/workflows/ci-rca.yml -- add CI_RCA_BUNDLE_EMIT_DIR: /tmp/ci-rca-bundles to the rca_agent
    step env block (alongside CLAUDE_CODE_OAUTH_TOKEN / GH_TOKEN).
  - >-
    tests/test_ops_data_portal.py -- add the six test classes named in the VP (CIRCA-01 emit-dir
    reachability added to TestCiRcaCrossCheckSpine; TestCiRcaStrictLegacyReject;
    TestEvidenceBundleRefConditional; TestTerminusOverrideTyped; TestWarnModePerRuleStamping;
    TestWhyChainCeilingVersioned; TestDetectionGapUnknownGate). Patch p.ROOT / _FEATURE_FLAGS_YAML and
    set CI_RCA_BUNDLE_EMIT_DIR via monkeypatch/os.environ as the existing spine tests do.
  - >-
    tests/test_rec_write_guidance.py and tests/test_ci_rca_back_validate.py -- update/extend assertions
    for the guidance-text changes and the schema_-prefixed marker filter; refresh the stale docstring
    parenthetical in test_ci_rca_back_validate.py (~line 83) alongside the back_validate_ci_rca docstring.
  - >-
    docs/ROADMAP-PLATFORM.yaml -- flip T1.13:c10 status met->open and append a dated T1.13 progress_note
    recording that the c10 cross-check spine was built but NOT load-bearing at the production call site
    until this plan (audit CIRCA-01), wired via CI_RCA_BUNDLE_EMIT_DIR + an emit-dir integration test.
  - >-
    Execute the Verification Plan -- run each step; loop until pass; on an unrecoverable failure stop
    and RCA (Decision 55). On a verified pass, /implement's bookkeeping walk closes T1.13:c10.
  - "Report: what was implemented, verification results, and the c10 closure."
work_areas: []
rollback: >-
  All changes are additive schema/wiring edits on a feature branch; revert the branch commit to
  restore prior behaviour. The strict-mode CIRCA-02 reject and the version-gated ceiling only affect
  new source=ci_rca writes (CI_RCA_STRICT_MODE is warn in the deployed config), so a revert has no
  data-migration consequence.
