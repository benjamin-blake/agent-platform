schema_version: 1
slug: "daf-size-governance-ratify"
intent: >-
  Ratify the decisions-authoring-format audit's `ratify-prose-with-size-governance` disposition as one
  numbered Decision, add a deterministic DECISIONS.md size-governance guard in both validate.py tiers, and
  correct the T1.5 roadmap retirement end-state -- governing the decision log's growth so the decision-scout
  /plan gate stays viable while the warehouse authority flip remains future work.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-daf-size-governance-ratify.yaml
phase: >-
  Platform tier_item T1.5 (ops_decisions graduation) end-state correction + governance backstop for the
  DECISIONS.md prose monolith; actions audit findings DAF-02 and DAF-04 plus the audit's format_disposition
  (ratify-prose-with-size-governance). DAF-01 and DAF-03 are adopted as direction and deferred to follow-on
  IMPLEMENTATION plans.
scope:
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Add ONE new numbered Decision entry (next free number, re-derived at implement time -- currently max is
      132, so likely 133) at the TOP of the file, ratifying the audit's format_disposition. Modern-band format,
      mirroring Decision 114. No restructuring of any existing entry.
  - file: scripts/checks/decisions/__init__.py
    action: Create
    purpose: New check subpackage for decision-log guards (no scripts/checks/decisions/ dir exists yet).
  - file: scripts/checks/decisions/validate_decisions_size.py
    action: Create
    purpose: >-
      New registry check (owner=platform) enforcing the DECISIONS.md/DECISIONS_ARCHIVE.md size ceiling via three
      module-level constants and a pure `_decisions_size_issues()` helper, mirroring the
      validate_platform_roadmap.py precedent (module-level constant + pure helper + guarded sys.path inject).
  - file: scripts/checks/registry.py
    action: Modify
    purpose: Insert `_c("validate_decisions_size")` into BOTH pre_sequence() and full_sequence().
  - file: scripts/validate.py
    action: Modify
    purpose: >-
      Add the facade re-export import so the check resolves via `globals()[name]` in _dispatch_check and via
      `from scripts.validate import validate_decisions_size` (required by TestFacadeCompleteness). Single import
      line only.
  - file: tests/test_checks_registry.py
    action: Modify
    purpose: >-
      Add "validate_decisions_size" to BOTH REQUIRED_PRE_CHECKS and REQUIRED_FULL_CHECKS membership floors so the
      check's presence in both tiers is enforced.
  - file: tests/checks/decisions/__init__.py
    action: Create
    purpose: Mirror-package init for the new check's test module (Decision 131 mirror convention).
  - file: tests/checks/decisions/test_validate_decisions_size.py
    action: Create
    purpose: >-
      Unit tests exercising `_decisions_size_issues()` below/at/above each of the three constants via real code
      paths (synthetic content), plus coverage of the relief-valve failure message and archive inclusion.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      DAF-04 end-state correction on tier_item T1.5: rewrite the first exit criterion to gate prose-file
      retirement on the decisions read-portal + hermetic-read path (all consumers incl. the repointed R1 guard)
      AND the DAF-01 content-parity gate; add the parity gate as an explicit T1.5 exit criterion; mirror the
      portal/parity wording into the Phase 3b intent text; fix the stale files_in_scope comment that
      cross-references the now-reserved T5.4.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    docs/DECISIONS.md carries exactly one new `## Decision NNN:` entry at the top (NNN = the next free number
    re-derived at implement time) in Decision-114-parity format (Status/Date/Warehouse ID/Decision/Reversal
    conditions/Related/`---`), whose body records all five clauses: (a) prose-monolith authoring retained on
    Decision 87 cl.2-3; (b) the size ceiling + deterministic dual guard naming the three constants,
    validate_decisions_size, both tiers, and the archival/compaction relief valves; (c) adopts the DAF-03
    authoring-contract/single-shared-parser direction as follow-on work; (d) adopts DAF-01's ETL-parity +
    fidelity-tripwire direction as follow-on work; (e) records the T1.5 portal-read end-state + DAF-01 parity
    correction.
  - >-
    scripts/checks/decisions/validate_decisions_size.py defines module-level `_DECISIONS_LIVE_MAX_BYTES = 400_000`,
    `_DECISIONS_LIVE_MAX_H2 = 120`, `_DECISIONS_COMBINED_MAX_BYTES = 700_000` and a pure `_decisions_size_issues()`
    helper; the check is registered `@registry.register("validate_decisions_size", owner="platform")` and covers
    BOTH docs/DECISIONS.md and docs/DECISIONS_ARCHIVE.md, with a failure message that names archival (DPI-04) and
    compaction-to-pointer-stubs as the relief valves.
  - >-
    validate_decisions_size runs in BOTH the --pre and full validate tiers (present in registry.pre_sequence()
    and full_sequence()) and is listed in BOTH REQUIRED_PRE_CHECKS and REQUIRED_FULL_CHECKS; the guard PASSES on
    the current tree (336 KB / 92 live headers / 430 KB combined all sit below the 400_000 / 120 / 700_000 ceilings).
  - >-
    The size helper is exercised below/at/above each of the three constants via unit tests that drive the real
    `_decisions_size_issues()` code path (not mocks of it); AND the registered `validate_decisions_size(failed)`
    check function itself is exercised for both a PASS and a FAIL case via `patch("scripts.checks._common.ROOT",
    tmp_path)` over a synthetic docs/DECISIONS.md + docs/DECISIONS_ARCHIVE.md tree, so `validate_test_coverage`'s
    100%-of-new-code gate is satisfied (mirrors the validate_platform_roadmap test).
  - >-
    docs/ROADMAP-PLATFORM.yaml tier_item T1.5's first exit criterion encodes the portal-read + hermetic-cache
    end-state (decisions read portal / read-lambda + named verbs + synced hermetic cache; all consumers incl. the
    repointed R1 guard) and NOT a "generated projection markdown file"; a distinct DAF-01 content-parity exit
    criterion is present; the Phase 3b intent wording mirrors the portal/parity end-state; and the stale
    `# ... per T5.4` files_in_scope comment is corrected to reference T1.5 c1.
  - The plan document validates against the PlanDocument schema.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      Exercise the size helper below/at/above each of the three constants via its unit tests (real code paths,
      synthetic byte/header content).
    command: bin/venv-python -m pytest tests/checks/decisions/test_validate_decisions_size.py -q
    expected: >-
      All tests pass; the suite includes below/at/above cases for each of _DECISIONS_LIVE_MAX_BYTES,
      _DECISIONS_LIVE_MAX_H2, and _DECISIONS_COMBINED_MAX_BYTES, plus a case asserting the failure message names
      the archival/compaction relief valves and that DECISIONS_ARCHIVE.md is covered, AND a PASS case and a FAIL
      case that call the REGISTERED validate_decisions_size(failed) function with patch("scripts.checks._common.ROOT",
      tmp_path) over a synthetic docs/DECISIONS.md + docs/DECISIONS_ARCHIVE.md tree, so the check function's own
      file-read / count / print / failed.append branches are covered (validate_test_coverage 100%-of-new-code).
    fix_if: >-
      A boundary case is missing, the helper mis-handles the at-ceiling boundary (off-by-one), the archive file is
      not counted, or the registered validate_decisions_size(failed) function is left uncovered (patch _common.ROOT
      and assert both a PASS and a FAIL) -- fix the helper/tests until all boundary and coverage cases pass.
    hermetic: true
    graduation: waive
    graduation_waiver_reason: "Durable coverage is the registered validate_decisions_size check plus its permanent mirror-package unit tests; a verification_registry graduation would duplicate standing coverage (Decision 132)."
  - step: 2
    phase: pre-deploy
    action: Confirm the three ceiling constants exist in the check module.
    command: grep -Eq '_DECISIONS_LIVE_MAX_BYTES|_DECISIONS_LIVE_MAX_H2|_DECISIONS_COMBINED_MAX_BYTES' scripts/checks/decisions/validate_decisions_size.py
    expected: Exit 0 -- all three constant names are present.
    fix_if: A constant is missing or misnamed -- add/rename it in the module.
    hermetic: true
    graduation: waive
    graduation_waiver_reason: "Structural constant-existence check; the constants are exercised by validate_decisions_size and its unit tests, so no separate standing guard is warranted (Decision 132)."
  - step: 3
    phase: pre-deploy
    action: >-
      Confirm the check is registered in BOTH tiers and enforced by BOTH membership floors, via the registry
      oracle tests (real registry sequences + floors).
    command: bin/venv-python -m pytest tests/test_checks_registry.py::TestSequenceInvariants tests/test_checks_registry.py::TestFacadeCompleteness -q
    expected: >-
      All pass -- the membership-floor tests confirm REQUIRED_PRE_CHECKS/REQUIRED_FULL_CHECKS (now including
      validate_decisions_size) are subsets of the actual pre/full sequences, and the facade-completeness tests
      confirm validate_decisions_size is reachable via getattr(validate, name) and via a from-scripts.validate
      import statement (no backtick-literal here -- vp-replay auto-extracts backtick text as a required-present
      substring, and neither form is a literal substring of pytest's dot-progress stdout).
    fix_if: >-
      A floor or facade test fails -- add the check to the missing sequence in registry.py, the missing floor in
      tests/test_checks_registry.py, or the facade import in scripts/validate.py.
    hermetic: true
    graduation: waive
    graduation_waiver_reason: "Exercises the existing tests/test_checks_registry.py oracle, already a permanent suite test; no new verification_registry primitive warranted (Decision 132)."
  - step: 4
    phase: pre-deploy
    action: Confirm the guard actually runs and prints its header in the full validate tier (authoritative full-tier presence proof).
    command: bin/venv-python -m scripts.validate 2>&1 | grep -qi 'decisions size'
    expected: Exit 0 -- the guard's section header (containing "DECISIONS size") appears in full-tier output.
    fix_if: >-
      The header does not appear -- confirm _c("validate_decisions_size") is in full_sequence() and the check
      prints a header whose text contains the case-insensitive substring "decisions size".
    hermetic: false
    graduation: not-applicable
  - step: 5
    phase: pre-deploy
    action: Confirm the guard PASSES on the current tree (all three ceilings sit above current size).
    command: bin/venv-python -m scripts.validate --pre 2>&1 | grep -A3 -i 'decisions size'
    expected: >-
      The guard reports PASS (no FAIL line) -- 336 KB live / 92 headers / 430 KB combined are all under the
      400_000 / 120 / 700_000 ceilings (re-derive at implement time -- sizes drift as decisions land).
    fix_if: The guard FAILS on day one -- a ceiling was set at or below current size; raise it above current per Decision A.
    hermetic: false
    graduation: not-applicable
  - step: 6
    phase: pre-deploy
    action: Assert the rewritten T1.5 first exit criterion encodes the portal-read end-state (not a projection markdown file).
    command: grep -q 'decisions read portal' docs/ROADMAP-PLATFORM.yaml && ! grep -q 'generated projection markdown' docs/ROADMAP-PLATFORM.yaml
    expected: >-
      Exit 0 -- the portal-read end-state phrase is present and the audit's "generated projection markdown"
      framing is absent.
    fix_if: >-
      The portal-read phrase is missing, or projection-markdown language leaked in -- rewrite T1.5 c1 per
      Decision B (portal + hermetic cache, mirroring the recs read path).
    hermetic: true
    graduation: not-applicable
  - step: 7
    phase: pre-deploy
    action: Assert the DAF-01 content-parity gate is present as a T1.5 exit criterion and the R1-guard repoint is named.
    command: "grep -q 'content-parity' docs/ROADMAP-PLATFORM.yaml && grep -A55 '^  - id: T1.5$' docs/ROADMAP-PLATFORM.yaml | grep -q 'validate_candidate_decision_ratification'"
    expected: >-
      Exit 0 -- the parity criterion (every live-entry governing section recoverable from ops_decisions before any
      reader is repointed) and the R1 guard repoint are both encoded in T1.5's text.
    fix_if: The parity criterion or R1 repoint is missing -- add per Decision B.
    hermetic: true
    graduation: not-applicable
  - step: 8
    phase: pre-deploy
    action: Assert the stale T5.4 cross-reference in T1.5's files_in_scope comment is corrected.
    command: bin/venv-python -m pytest tests/checks/roadmap/test_validate_platform_roadmap.py -q && ! grep -q 'eventually deleted in 3b (per T5.4)' docs/ROADMAP-PLATFORM.yaml
    expected: >-
      Roadmap schema validation passes and the stale eventually-deleted-in-3b-per-T5.4 files_in_scope comment no
      longer appears (replaced by a T1.5 c1 cross-reference). No backtick-literal here -- vp-replay auto-extracts
      backtick text as a required-PRESENT substring, and this text is asserted ABSENT by the command's own
      negated grep, so a backtick form would always false-fail the replay.
    fix_if: The stale comment remains or the roadmap fails schema validation -- correct the comment / fix the structural error.
    hermetic: true
    graduation: not-applicable
  - step: 9
    phase: pre-deploy
    action: Validate this plan document against the PlanDocument schema.
    command: bin/venv-python -m scripts.roadmap.plan_document docs/plans/PLAN-daf-size-governance-ratify.yaml
    expected: Exit 0 -- the plan document is schema-valid.
    fix_if: Schema errors are reported -- fix the offending field and re-run.
    hermetic: true
    graduation: waive
    graduation_waiver_reason: "One-time plan-document schema validation, not a product regression guard (Decision 132)."
  - step: 10
    phase: post-deploy
    action: >-
      After merge, confirm the new dec-NNN row lands in ops_decisions via the portal reader/cache (rec-autoclose.yml
      auto-runs `--backfill-decisions-md` on the merge touching DECISIONS.md, per Decision 84).
    command: bin/venv-python -m scripts.sync.ops pull && grep -q '"dec-NNN"' logs/.decisions-index.jsonl
    expected: >-
      The read cache rebuilt from the DuckLake reader contains the new dec-NNN row (substitute the actual number
      allocated at implement time).
    fix_if: >-
      The row is absent after the backfill -- inspect the rec-autoclose.yml backfill run; re-run
      `bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md` if the auto-run did not fire.
    hermetic: false
  - step: 11
    phase: post-deploy
    action: Confirm the R1 ratification guard stays green with the new decision header present.
    command: bin/venv-python -m scripts.validate --pre 2>&1 | grep -A3 -i 'Candidate decision ratification'
    expected: The R1 guard reports PASS -- adding a new `## Decision NNN:` header does not dangle any ratified CD pointer.
    fix_if: R1 fails -- inspect for an accidental CD/header mismatch introduced by the edit.
    hermetic: false
constraints:
  - "Do NOT decompose into recommendations -- all work executes inline (bundled_recommendations is empty)."
  - >-
    Do NOT touch scripts/decisions_md.py or src/schemas/decision.py -- the parser and schema are owned by the
    follow-on DAF-01 IMPLEMENTATION plan. This plan does not change the parser or the schema.
  - The docs/DECISIONS.md change is a NEW entry only -- no restructuring of any existing entry.
  - Do NOT build the archival tool (DPI-04's scope) or the decisions read-portal (future T1.5 work); this plan only NAMES them.
  - "No em dashes anywhere (ASCII hyphen only); no emojis; ruff line length 127; type hints required; bin/venv-python for all Python."
  - "No `python -c` one-liners in acceptance/VP commands (tests/CLAUDE.md); no `pytest -k` selectors -- run via `pytest path::Class`."
  - >-
    SLOC decompose-by-default if any scope file would cross its config/sloc_budgets.yaml budget (Decision 128) --
    the new check module and its test are small and expected well under 500 SLOC; do NOT raise a budget.
  - No rescue agents or workaround loops (Decision 55).
  - >-
    Numbering-race: re-derive the next free `## Decision NNN:` at implement time (max is 132 now); a concurrent PR
    may claim the number. The R1 guard catches any header mismatch, so shifting to the next free number at
    execution time is safe. The new Decision entry is authored under an execution-time human confirmation gate.
  - >-
    Do NOT restructure T1.5's exit_criteria into ExitCriterion objects -- keep them bare strings (as they are
    today). Edit only the criterion TEXT, the added parity criterion (bare string), the Phase 3b intent wording,
    and the files_in_scope comment; leave the `- id: T1.5` line untouched so validate_platform_roadmap check (ii)
    (touched-item-must-have-no-bare-string-criteria) does not fire.
