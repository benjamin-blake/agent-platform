schema_version: 1
slug: "inference-credentials"
intent: >-
  Provision the CD.28 Tier 1 (DeepSeek) and Tier 2 (Anthropic) inference credentials as Secrets
  Manager envelopes with PlatformDev read access, unblocking the LiteLLM transport (T4.2) that drives
  the autonomous self-improvement executor loop at the heart of the North Star.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-inference-credentials.yaml
phase: >-
  Platform tier item T0.4 (Tier T0 bootstrap; effort XS). Product Phase 1 complete; this is parallel
  platform-infra work. Governed by CD.28 (pending -- gates T0.4 completion).
scope:
  - file: terraform/personal/inference_credentials.tf
    action: Create
    purpose: >-
      Two aws_secretsmanager_secret envelope resources (agent-platform-deepseek-api-key,
      agent-platform-anthropic-api-key) with NO aws_secretsmanager_secret_version -- key material is set
      out-of-band. Rotation cadence recorded in each description; each ARN exported as an output. Mirrors
      the neon_ducklake_catalog.tf out-of-band precedent (Decision 37).
  - file: terraform/personal/platform_roles.tf
    action: Modify
    purpose: >-  # pragma: allowlist secret
      Add an InferenceCredentialsRead statement to the platform_dev_runtime DailyOps inline policy granting
      secretsmanager:GetSecretValue scoped to exactly the two new secret ARNs. Mirrors the existing
      DuckLakeEndpointDiscovery statement (Decision 81), annotated "MANUAL admin-apply required (IAM change,
      Decision 77 guard)".
  - file: scripts/smoke_test_inference_credentials.py
    action: Create
    purpose: >-
      Standalone V3 smoke-test CLI: boto3-fetch a secret value (via the agent_platform/PlatformDev profile,
      so the IAM grant is exercised end-to-end) then litellm.completion() against the tier's model; exit 0 on
      non-empty (HTTP 200) completion, fail loudly on AccessDenied or empty response. No import-time side
      effects; plain unguarded import litellm.
  - file: tests/test_smoke_test_inference_credentials.py
    action: Create
    purpose: >-
      Unit test with mocked boto3 + litellm covering both providers, success, AccessDenied, and empty-response
      paths to 100% coverage (test_coverage_checker requirement for the new script).
  - file: requirements-dev.txt
    action: Modify
    purpose: >-
      Declare litellm (the smoke-test's mandatory dependency). requirements-dev.txt installs in BOTH CI tiers
      (fast pr-validate + full), so pytest --picked and import-validation resolve litellm; it stays out of the
      heavy production requirements.txt. T4.2 promotes litellm to requirements.txt when the production executor
      transport imports it.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Roadmap-bookkeeping: re-ground T0.4 files_in_scope from the stale single work-root path
      terraform/inference_credentials.tf (work-root retired, CD.21/audit F-014) to the corrected and complete
      personal-account file list, with a re-grounding note. No status flip (CD.28 pending gates completion).
bundled_recommendations: []
infrastructure_dependencies:
  - >-
    AWS Secrets Manager (eu-west-2, personal account): two new secret envelopes. VALUES set out-of-band via
    aws secretsmanager put-secret-value and NEVER entered into Terraform state or any committed file. Pre-merge:
    terraform plan presented to the human. Post-deploy: human-gated terraform apply, then out-of-band value-set.
  - >-
    IAM (PlatformDev DailyOps inline policy): new InferenceCredentialsRead statement. Because it is an IAM change,
    scripts/terraform_apply_guard.py fail-closes and auto-apply is blocked; it applies via the interactive
    human-gated plan -> present -> accept -> apply loop (Decision 77, terraform/CLAUDE.md). IAM apply precedes any
    dependent runtime use (IAM-precedence rule).
  - >-
    No Lambda artifacts affected: scripts/, tests/, terraform/personal/ are not Lambda-packaged, so Decision 79 /
    CD.16 per-Lambda build+deploy+smoke gating is not triggered.
acceptance_criteria:
  - >-
    terraform/personal/inference_credentials.tf defines two aws_secretsmanager_secret envelopes
    (agent-platform-deepseek-api-key, agent-platform-anthropic-api-key) with NO aws_secretsmanager_secret_version;
    each ARN is exposed as a terraform output and rotation cadence is recorded in the secret description.
  - >-
    terraform/personal/platform_roles.tf platform_dev_runtime DailyOps policy contains an InferenceCredentialsRead
    statement granting secretsmanager:GetSecretValue scoped to exactly the two new secret ARNs (no Resource="*").
  - 'terraform -chdir=terraform/personal validate succeeds with the new file and the IAM edit.'
  - >-
    litellm is declared in requirements-dev.txt and scripts/smoke_test_inference_credentials.py imports it
    unguarded (no try/except ImportError).
  - >-
    tests/test_smoke_test_inference_credentials.py passes with 100% coverage of the new script (mocked boto3 +
    litellm; both providers and the AccessDenied / empty-response failure paths covered).
  - >-
    After human-gated terraform apply and out-of-band value-set, a LiteLLM completion against deepseek/deepseek-chat
    returns non-empty content (HTTP 200) via the smoke-test.
  - >-
    After value-set, a LiteLLM completion against anthropic/claude-haiku-4-5 returns non-empty content (HTTP 200)
    via the smoke-test.
  - >-
    The smoke-test fetches each secret using the agent_platform (PlatformDev) profile, so the InferenceCredentialsRead
    grant is exercised end-to-end (a missing grant surfaces as AccessDenied, failing the test).
  - >-
    docs/ROADMAP-PLATFORM.yaml T0.4 files_in_scope is re-grounded to the five corrected paths
    (terraform/personal/inference_credentials.tf, terraform/personal/platform_roles.tf,
    scripts/smoke_test_inference_credentials.py, tests/test_smoke_test_inference_credentials.py, requirements-dev.txt)
    with a re-grounding note citing CD.21 / audit F-014.
  - >-
    Quarterly rotation cadence is recorded in each secret description; the calendar reminder is flagged
    user_action_required (T2.5 owns the cross-secret rotation policy + calendar-cron rec).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Terraform syntactic format check on the new file and the IAM edit (no init/credentials needed).
    command: terraform fmt -check -recursive terraform/personal/
    expected: Exit 0 (all files canonically formatted).
    fix_if: Non-zero exit or files listed -- run `terraform fmt terraform/personal/` and re-check.
  - step: 2
    phase: pre-deploy
    action: Terraform semantic validation with providers from the lock file, no backend/credentials.
    command: terraform -chdir=terraform/personal init -backend=false -input=false && terraform -chdir=terraform/personal validate
    expected: "Success! The configuration is valid."
    fix_if: Validation error -- fix the HCL (resource refs, output refs, IAM jsonencode) until it parses and resolves.
  - step: 3
    phase: pre-deploy
    action: Assert the out-of-band invariant -- the new file must NOT manage a secret VALUE.
    command: '! grep -q "aws_secretsmanager_secret_version" terraform/personal/inference_credentials.tf'
    expected: Exit 0 (no aws_secretsmanager_secret_version resource present; the key value stays out-of-band).
    fix_if: Exit 1 (grep matched) -- a aws_secretsmanager_secret_version slipped in; remove it (value is out-of-band only).
  - step: 4
    phase: pre-deploy
    action: Assert the IAM grant is present and ARN-scoped, not a wildcard.
    command: grep -q "InferenceCredentialsRead" terraform/personal/platform_roles.tf && grep -q "secretsmanager:GetSecretValue" terraform/personal/platform_roles.tf  # pragma: allowlist secret
    expected: Exit 0 (the scoped statement exists in DailyOps).
    fix_if: Exit 1 -- add the InferenceCredentialsRead statement scoped to the two secret ARNs.
  - step: 5
    phase: pre-deploy
    action: Confirm litellm is declared as a dev dependency.
    command: grep -qE "^litellm" requirements-dev.txt
    expected: Exit 0 (litellm pinned/floored in requirements-dev.txt).
    fix_if: Exit 1 -- add a litellm requirement line.
  - step: 6
    phase: pre-deploy
    action: Run the smoke-test unit test (mocked boto3 + litellm); proves the module imports and all paths work.
    command: bin/venv-python -m pytest tests/test_smoke_test_inference_credentials.py -v
    expected: All tests pass.
    fix_if: Failure/ImportError -- fix the script or test; ensure litellm + boto3 are mocked, not called live.
  - step: 7
    phase: pre-deploy
    action: Per-file coverage gate for the new script (100% required for new source).
    command: bin/venv-python -m scripts.test_coverage_checker --file scripts/smoke_test_inference_credentials.py
    expected: 100% coverage reported for the new script.
    fix_if: Below 100% -- add test branches for the uncovered lines (failure paths, both providers).
  - step: 8
    phase: pre-deploy
    action: Generate the terraform plan and present it to the human (the human gate). The gitignored terraform.personal.tfvars is NOT in the fresh clone (terraform/CLAUDE.md lines 25-52); materialize it from the agent-platform-terraform-personal-tfvars Secrets Manager secret first (the same var source the sandbox CD pipeline uses). It is .gitignored (terraform/**/terraform.personal.tfvars) -- never commit it. Do NOT apply before acceptance.
    command: aws secretsmanager get-secret-value --secret-id agent-platform-terraform-personal-tfvars --query SecretString --output text --profile agent_platform_admin --region eu-west-2 > terraform/personal/terraform.personal.tfvars && terraform -chdir=terraform/personal init -backend-config=backend-sandbox.hcl -input=false && terraform -chdir=terraform/personal plan -var-file=terraform.personal.tfvars
    expected: Plan shows 2 aws_secretsmanager_secret creates + 1 in-place update of aws_iam_role_policy.platform_dev_runtime; no destroys, no trust-policy change.
    fix_if: AccessDenied on get-secret-value -> use the agent_platform_admin (PlatformAdmin) profile; unexpected destroy / trust-policy diff / extra resource -> stop and reconcile before presenting.
  - step: 9
    phase: post-deploy
    action: After human acceptance and terraform apply, confirm both secret envelopes exist in Secrets Manager.
    command: aws secretsmanager describe-secret --secret-id agent-platform-deepseek-api-key --profile agent_platform --region eu-west-2 && aws secretsmanager describe-secret --secret-id agent-platform-anthropic-api-key --profile agent_platform --region eu-west-2
    expected: Both describe-secret calls return the secret metadata (ARN, rotation note in Description).
    fix_if: ResourceNotFoundException -- the apply did not create the secret; re-run the human-gated apply.
  - step: 10
    phase: post-deploy
    action: Tier 1 end-to-end smoke-test -- fetch the DeepSeek key (PlatformDev profile) and make a live LiteLLM call.
    command: bin/venv-python -m scripts.smoke_test_inference_credentials --provider deepseek
    expected: Prints PASS and exits 0 (non-empty completion from deepseek/deepseek-chat; HTTP 200).
    fix_if: AccessDenied -> IAM grant not applied/propagated; auth error -> secret value unset/invalid; empty -> model id mismatch (verify the litellm alias).
  - step: 11
    phase: post-deploy
    action: Tier 2 end-to-end smoke-test -- fetch the Anthropic key (PlatformDev profile) and make a live LiteLLM call.
    command: bin/venv-python -m scripts.smoke_test_inference_credentials --provider anthropic
    expected: Prints PASS and exits 0 (non-empty completion from anthropic/claude-haiku-4-5; HTTP 200).
    fix_if: AccessDenied -> IAM grant; auth error -> secret value unset/invalid or Max-pool credit exhausted; empty -> model alias mismatch.
constraints:
  - >-
    Secret VALUES never enter Terraform state, a PR, chat, or any committed file -- out-of-band put-secret-value only.
    No aws_secretsmanager_secret_version for the two API-key secrets.
  - >-
    The IAM change fail-closes the sandbox auto-apply guard (scripts/terraform_apply_guard.py); the whole change
    applies via the interactive human-gated plan -> present -> accept -> apply loop (Decision 77, terraform/CLAUDE.md).
    Never auto-apply; never apply without presenting the plan first. IAM apply precedes dependent runtime use.
  - >-
    litellm goes in requirements-dev.txt only; do NOT add it to requirements.txt (T4.2 owns that promotion) and do NOT
    add direct provider-SDK imports to the executor or scripts/llm_client.py (CD.28 LiteLLM-only Layer-1 discipline).
  - >-
    No new standing prose-architecture docs (Decision 86): rotation cadence lives in the secret description + the T0.4
    tier_item, not a new docs/ file. The validate.py intent-doc-freeze guard enforces this.
  - >-
    Never commit account_id, the PlatformDev/PlatformAdmin ExternalIds, or any secret material (pre-commit never-commit
    hook). Recover terraform vars from remote state, do not paste them anywhere.
  - >-
    CD.28 is pending: starting/implementing is allowed (bootstrap), but do NOT flip T0.4 status to complete until CD.28
    is ratified via the ops portal. This plan leaves status at not_started.
  - >-
    Code style: no emojis, ASCII hyphens only, line length 127, type hints required, invoke Python via bin/venv-python.
  - No rescue agents or workaround loops; on unrecoverable V3 failure stop and RCA (Decision 55).
context:
  - >-
    T0.4 implements the CD.28 tier model: Tier 1 DeepSeek-direct (primary), Tier 2 Anthropic-direct (warm escape hatch),
    both via LiteLLM (the sole Layer-1 inference surface). It bootstraps/de-risks T4.2's LiteLLM transport rewrite.
  - >-
    Tier Item Freshness Gate findings -- (1) not silently complete (no inference_credentials.tf/secrets/grant exist);
    (2) STALE references re-grounded: files_in_scope path moved work-root -> terraform/personal/ (CD.21/F-014) and
    expanded to include the IAM file + smoke-test + dev requirement; (3) no blocking supersession (T2.1's inference-cred
    criterion was re-homed TO T0.4; T2.5 owns the broader rotation policy; broker-credential items T2.14/E.env.3 are a
    different class); (4) CD.28 pending gates COMPLETION (not start); depends_on T0.3 = complete; no cross_tier_gates rule
    names T0.4.
  - >-
    Precedents: terraform/personal/neon_ducklake_catalog.tf (secret envelope + out-of-band value + rotation in
    description, Decision 37 runtime-fetch); platform_roles.tf DuckLakeEndpointDiscovery statement (Decision 81) for the
    manual-admin-apply IAM annotation pattern. The PlatformDev DailyOps policy currently has NO secretsmanager grant, so
    InferenceCredentialsRead is a genuine least-privilege addition.
  - >-
    Decision-scout gate verdict: NO_FLAGS. Cite CD.28 (governing, pending), Decision 77 (apply gating/guard), Decision 37
    (out-of-band Secrets Manager runtime-fetch), Decision 81 (manual-admin-apply IAM statement pattern), Decision 86
    (no new prose docs -- bookkeeping to the tier_item), CD.21 (work-root retired -- basis for re-grounding), Decision 48
    (V3 tier). Decision 84 NOTE: the smoke-test's boto3 path is read-only against Secrets Manager and never routes through
    the ops portal or S3 staging -- the warehouse-as-source-of-truth invariant is untouched.
  - >-
    Branch was 0 commits behind origin/main at planning time; no Main Divergence Assessment needed.
  - >-
    user_action_required (T0.4 flag): create the DeepSeek key (platform.deepseek.com) and Anthropic key
    (console.anthropic.com); accept the terraform plan (the human gate); set both secret values out-of-band via
    aws secretsmanager put-secret-value; set the quarterly rotation calendar reminder. The agent authors all code/TF and
    runs the post-apply smoke-tests once values are set.
  - >-
    Anthropic Tier 2 is funded by the Claude Code Max x5 programmatic-pool credit (~$100/month, no rollover); the smoke-test
    is a single minimal completion to bound cost. The exact litellm-resolvable model aliases (deepseek/deepseek-chat,
    anthropic/claude-haiku-4-5) are verified at implementation time against the installed litellm version's model map.
pre_implementation_checklist:
  - Branch confirmed not on main (harness session branch)
  - docs/PROJECT_CONTEXT.md read
  - DECISIONS.md consulted via the decision-scout gate (NO_FLAGS)
  - All files in scope located and readable (neon_ducklake_catalog.tf + platform_roles.tf DailyOps precedents reviewed)
  - Acceptance criteria understood and verifiable
  - CD.28 pending-gate understood -- do not flip T0.4 to complete
  - terraform/CLAUDE.md apply posture understood -- IAM change uses the interactive human-gated loop
execution_steps:
  - >-
    Create terraform/personal/inference_credentials.tf: two aws_secretsmanager_secret resources named
    agent-platform-deepseek-api-key and agent-platform-anthropic-api-key, each with a description recording purpose +
    "ROTATION: quarterly, calendar-reminded", tags, and NO aws_secretsmanager_secret_version. Add two outputs exposing
    the secret ARNs. Follow the neon_ducklake_catalog.tf style.
  - >-
    Modify terraform/personal/platform_roles.tf: add an InferenceCredentialsRead statement to the
    aws_iam_role_policy.platform_dev_runtime DailyOps policy -- Action secretsmanager:GetSecretValue, Resource the two
    aws_secretsmanager_secret ARNs (reference the resources from inference_credentials.tf), with a comment noting
    "MANUAL admin-apply required (IAM change, Decision 77 guard fail-closes)".
  - Add a litellm requirement line to requirements-dev.txt (version floor consistent with the file's style).
  - >-
    Create scripts/smoke_test_inference_credentials.py: argparse CLI with --provider {deepseek,anthropic} (and optional
    --model / --secret-id overrides). Resolve the secret name + default model id per provider, boto3 get_secret_value
    using the default credential chain (agent_platform/PlatformDev), call litellm.completion() with a one-line prompt,
    assert non-empty content, print PASS and exit 0; on AccessDenied / auth error / empty response print a precise
    diagnostic and exit non-zero. Type hints; no import-time side effects; no raise on import.
  - >-
    Create tests/test_smoke_test_inference_credentials.py: mock boto3 client get_secret_value and litellm.completion;
    cover both providers, the success path, AccessDenied, and empty-response to 100% coverage. Never make live calls.
  - >-
    Re-ground docs/ROADMAP-PLATFORM.yaml T0.4 files_in_scope to the five corrected paths and add a brief note
    ("[Re-grounded <date>: files_in_scope moved off the retired work-root path per CD.21/audit F-014 and expanded to the
    IAM grant + smoke-test + dev requirement the exit criteria require]"). Leave status not_started (CD.28 pending).
  - >-
    Run the pre-deploy Verification Plan (steps 1-7); loop until green. Then generate the terraform plan (step 8) and
    PRESENT it to the human; do not apply before explicit acceptance.
  - >-
    After acceptance, terraform apply (admin path). user_action_required gate: the human creates the provider API keys
    and sets both secret values out-of-band (aws secretsmanager put-secret-value).
  - >-
    Run the post-deploy Verification Plan (steps 9-11); loop until both smoke-tests return 200/non-empty. On unrecoverable
    V3 failure, stop and run RCA (Decision 55) -- do not paper over with a workaround.
  - >-
    Report: files created/modified, terraform plan summary, smoke-test results for both tiers, and a reminder that T0.4
    status stays not_started until CD.28 ratifies and that the quarterly rotation reminder + T2.5 cross-reference are
    user-action follow-ups.
work_areas: []
rollback: >-
  Revert the InferenceCredentialsRead statement from platform_roles.tf and re-apply (human-gated). The two secret
  envelopes hold no Terraform-managed value, so removing them from inference_credentials.tf and applying is low-risk;
  note Secrets Manager's recovery-window (use --force-delete-without-recovery only if immediate removal is required).
  Remove the litellm line from requirements-dev.txt and delete the smoke-test script + test. Revert the
  docs/ROADMAP-PLATFORM.yaml re-grounding. No data loss: nothing consumes these credentials until T4.2.
