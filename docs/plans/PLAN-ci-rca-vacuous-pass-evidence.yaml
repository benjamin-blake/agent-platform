pre_implementation_checklist:
  - Branch confirmed not on main (claude/ci-rca-methodology-contract-h5um0o)
  - docs/PROJECT_CONTEXT.md read
  - DECISIONS.md scanned via decision-scout gate (NO_FLAGS; CITE 72/73/55/86)
  - All files in scope located and readable
  - Acceptance criteria understood and verifiable
  - >-
    P1/P2 boundary internalised -- emit inputs only, no escape_mode / enum / cross-check
  - >-
    Confirm --pre changed-tests regex and -m "not integration" deselection at scripts/validate.py:3871-3875 before replaying it
execution_steps:
  - >-
    Create scripts/ci_rca_vacuous_pass.py with: parse_collection_summary(log_text) ->
    tri-state vacuous_pass (true|false|undetermined) distinguishing collected vs deselected counts;
    merged_diff_files() and deleted_test_files() wrapping `git diff HEAD^ HEAD` and
    `git diff --diff-filter=D HEAD^ HEAD` (return an explicit undetermined sentinel when HEAD^ is
    absent or git fails); compute_merge_gate_test_coverage(failed_check, merged_files) replaying the
    validate.py:3871 regex + -m "not integration" rule; compute_coverage_regression(...). No raises
    at import; defer all validation to call time.
  - >-
    Modify scripts/ci_rca_taxonomy.py: add classify_failures(log_text, jobs, path) -> list of
    (category, check, source) enumerating every distinct failed check (iterate jobs-JSON failed
    steps and/or all function_to_category matches in the log); keep classify_failure intact.
  - >-
    Modify scripts/ci_rca_evidence.py: generate_bundles loops over classify_failures emitting one
    hashed bundle per failed check; _assemble_core adds vacuous_pass, merge_gate_test_coverage,
    gate_is_postmerge_canary (true when workflow tier resolves to CI), coverage_regression; bump
    schema_version to 2. Keep the gh-free, log+local-git-only contract.
  - >-
    Modify .github/workflows/ci-rca.yml: checkout fetch-depth: 2; run evidence/classification so the
    dedup guard and the "Mark failure as RCA'd" status use a per-category context
    (ci-rca/<workflow-slug>/<category>); skip only categories already filed. Preserve all Decision 74
    install / log-fetch-retry / workflow_dispatch / fork-PR-gate steps. This is the highest-risk
    step -- verify validate_ci_rca_trigger's expected if:-gate shape still holds.
  - >-
    Author tests: tests/test_ci_rca_vacuous_pass.py (new, full coverage of the new module incl.
    fail-loud paths) and extend tests/test_ci_rca_evidence.py + tests/test_ci_rca_taxonomy.py.
    Add any needed fixtures under tests/fixtures/ci_rca/.
  - >-
    Amend docs/INTENT-ci-rca-methodology.md Section 3.3 (new fields + schema_version=2 + N-failure);
    append the T1.13 progress_note in docs/ROADMAP-PLATFORM.yaml (no status flips).
  - >-
    Execute the Verification Plan -- run each step; loop until pass; on unrecoverable failure stop
    and RCA (Decision 55), do not inline-patch around a red check.
  - 'Report: what was implemented, verification results, and the c8/c11 criteria ready for /implement bookkeeping.'
rollback: >-
  All changes are additive bundle fields + tests + a workflow edit. Revert the branch commits; the
  bundle reverts to schema_version 1 with the prior single-failure behaviour. No data migration, no
  deployed artifact, no infra change to unwind.
