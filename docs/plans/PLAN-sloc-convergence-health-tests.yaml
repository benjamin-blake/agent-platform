schema_version: 1
slug: sloc-convergence-health-tests
intent: >-
  Decompose tests/test_convergence_health.py (1327 SLOC) into a 1:1 PACKAGE-MIRROR test package under
  tests/convergence_health/ (six cohesive test_<module>.py modules, one per scripts/convergence_health/
  submodule, each < 500 SLOC), then SURGICALLY retire only its grandfather home and delete its
  config/sloc_budgets.yaml entry -- rec-2709 Wave 6 of the Decision 131 mirror-convention rollout.
  Purpose: keep every test file small enough for lower-tier model comprehension (the load-bearing reason
  the 500-SLOC gate exists, Decision 128). Behaviour-preserving pure MOVE; no test-logic change. The
  SOURCE is already a package (Decision 128 facade decomposition), so this is the direct analog of Wave 1's
  scripts/checks/** -> tests/checks/** package-mirror -- NOT a concern-split (Waves 2-4).
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-sloc-convergence-health-tests.yaml
phase: >-
  rec-2709 Wave 6 (Decision 131 mirror convention, amends Decision 104); SLOC governance /
  model-portability (AGENTS.md Decision 128). Behaviour-preserving test MOVE of the
  scripts/convergence_health/ package test home (already-a-package -> package-mirror). No product-roadmap
  phase; platform tooling only.
scope:
  - file: tests/convergence_health/__init__.py
    action: Create
    purpose: >-
      Package marker for the tests/convergence_health/ mirror tree (prepend import mode; empty file).
      Mandatory per tests/CLAUDE.md ("every mirror test directory carries an __init__.py").
  - file: tests/convergence_health/test_record.py
    action: Create
    purpose: >-
      record.py mirror (verbatim, 6 classes): TestDeriveRedSince, TestRedAgeHours,
      TestCountUnappliedTfCommits, TestReadConvergenceRecord, TestReadConvergenceRecordReraise,
      TestCountUnappliedTfCommitsDefaultRunner. ~117 SLOC. Fresh header: from __future__ + io + json +
      datetime/timezone + unittest.mock (patch/MagicMock as used) + `from scripts.convergence_health import
      (count_unapplied_tf_commits, derive_red_since, read_convergence_record, red_age_hours)`. NO boto3, NO
      ch alias, NO build_lambda_config.
  - file: tests/convergence_health/test_approvals.py
    action: Create
    purpose: >-
      approvals.py mirror (verbatim, 7 classes): TestFindReconcileRunsSince,
      TestHasInFlightReconcileForEpisode, TestFindStuckGatedApprovals, TestFindStuckDefaultCaller,
      TestMakeGithubCaller, TestFilterStuckRuns, TestDiagnoseStuckApprovals. ~232 SLOC. Fresh header:
      from __future__ + datetime/timezone + json + unittest.mock + pytest (pytest.MonkeyPatch) + `from
      scripts.convergence_health import (_make_github_caller, diagnose_stuck_approvals, filter_stuck_runs,
      find_reconcile_runs_since, find_stuck_gated_approvals, has_in_flight_reconcile_for_episode)`. NO boto3,
      NO ch alias, NO build_lambda_config.
  - file: tests/convergence_health/test_assess.py
    action: Create
    purpose: >-
      assess.py mirror (verbatim, 2 classes): TestEscalationAction, TestAssessHealth. ~125 SLOC. Fresh
      header: from __future__ + datetime/timezone + `import scripts.convergence_health as ch` (for
      ch.STALE_GREEN_BACKLOG_THRESHOLD_HOURS) + `from scripts.convergence_health import (HealthVerdict,
      assess_health, escalation_action, red_age_hours)`. NO boto3, NO build_lambda_config.
  - file: tests/convergence_health/test_escalate.py
    action: Create
    purpose: >-
      escalate.py mirror (verbatim, 8 classes): TestFindOpenConvergenceStaleRec, TestEscalate,
      TestEscalateReconcileInFlight, TestEscalateGreenClosesOpenRec, TestEscalateGreenStuckApproval,
      TestEscalateGreenStaleBacklog, TestFetchOpenRecs, TestEscalateLiveFetchAndPortal. ~345 SLOC (largest
      after code_drift). Fresh header: from __future__ + unittest.mock + `import scripts.convergence_health
      as ch` (ch._TITLE_*/._RESOLUTION_*/._fetch_open_recs/.STALE_GREEN_BACKLOG_THRESHOLD_HOURS) + `from
      scripts.convergence_health import (HealthVerdict, assess_health, escalate,
      find_open_convergence_stale_rec, find_reconcile_runs_since, has_in_flight_reconcile_for_episode,
      red_age_hours)`. NO boto3, NO build_lambda_config. In-class _make_verdict helpers move verbatim with
      their classes.
  - file: tests/convergence_health/test_code_drift.py
    action: Create
    purpose: >-
      code_drift.py mirror (verbatim, 4 classes + code_drift-local support): the module constants
      _ALL_DUCKLAKE_FUNCTIONS and _ALL_PROD_FUNCTIONS and the helper class _FakeDeployRecordsS3 (all used
      ONLY here), plus TestFindOpenDucklakeDriftRec, TestDetectDucklakeCodeDrift, TestFindOpenProdDriftRec,
      TestDetectProdCodeDrift. ~435 SLOC (closest to the 500 ceiling; ~65 headroom). Fresh header: from
      __future__ + io + json + typing (Any, Optional) + unittest.mock + `import boto3  # noqa: F401` WITH
      its verbatim ~8-line collectability comment (patch("boto3.Session") is used) + `from
      scripts.build_lambda_config import (_DUCKLAKE_CATALOG_DR_FUNCTION, _DUCKLAKE_MAINTENANCE_FUNCTION,
      _DUCKLAKE_READER_FUNCTION, _DUCKLAKE_WRITER_FUNCTION)` + `from scripts.convergence_health import
      (detect_ducklake_code_drift, detect_prod_code_drift, find_open_ducklake_drift_rec,
      find_open_prod_drift_rec)`. NO ch alias.
  - file: tests/convergence_health/test___main__.py
    action: Create
    purpose: >-
      __main__.py mirror (verbatim, 4 classes): TestMain, TestMainDiagnoseMode, TestMainDucklakeDrift,
      TestMainProdDrift. ~189 SLOC. The filename is the EXACT path the machinery computes for
      scripts/convergence_health/__main__.py (test_ + stem "__main__" = test___main__.py, verified against
      _mirror_source_to_test) -- __main__.py is NOT excluded by get_changed_source_files (only __init__.py
      is), so this mirror is MANDATORY or check_test_file_exists reports a missing test file. Do NOT rename
      it to test_main.py. Fresh header: from __future__ + unittest.mock + pytest (monkeypatch) + `import
      boto3  # noqa: F401` WITH its verbatim collectability comment (patch("boto3.Session") is used) + `from
      scripts.convergence_health import (HealthVerdict, assess_health, detect_ducklake_code_drift,
      detect_prod_code_drift, diagnose_stuck_approvals, escalate, find_reconcile_runs_since,
      find_stuck_gated_approvals, main, main_ducklake_drift, main_prod_drift, read_convergence_record,
      red_age_hours)`. NO ch alias, NO build_lambda_config.
  - file: scripts/test_coverage_checker.py
    action: Modify
    purpose: >-
      The surgical flip (FINAL commit only): delete the single line "test_convergence_health.py" from
      _RETIRING_GRANDFATHER_HOMES. That is the ONLY code edit. Do NOT add anything to
      _CONCERN_SPLIT_TEST_PACKAGES (scripts/convergence_health/ is a 1:1 package mirror, not a concern-split
      monolith -- the mirror rule already yields test_<stem>.py per submodule). Do NOT touch the
      convergence_health home-resolver branch in _grandfathered_source_to_test (`parts[1] ==
      "convergence_health" -> tests/test_convergence_health.py`) -- it STAYS as the router that feeds the
      retiring table, exactly as the scripts/checks/** branch stayed after Wave 1. Do NOT touch
      _ALL_MIRROR_TARGET_HOMES or _NESTED_SUBPACKAGE_TEST_PREFIX. Gate reasoning: after the deletion,
      home.name "test_convergence_health.py" is NOT in _RETIRING but IS in _ALL_MIRROR_TARGET_HOMES, and !=
      "test_validate.py" (so the _ORCHESTRATION_SCAFFOLDING_FILES sub-case is skipped), so map_source_to_test
      routes every scripts/convergence_health/*.py through _mirror_source_to_test to
      tests/convergence_health/test_<stem>.py.
  - file: tests/test_coverage_checker.py
    action: Modify
    purpose: >-
      Update the oracle (FINAL commit): (a) test_retiring_is_all_target_homes_minus_four_retired_waves ->
      rename to ..._five_retired_waves; ADD "test_convergence_health.py" to the `retired` set (now the five
      {test_validate, test_execute_recommendation, test_ops_data_portal, test_session_preflight,
      test_convergence_health}); ADD assert "test_convergence_health.py" not in _RETIRING_GRANDFATHER_HOMES;
      update the docstring "four"->"five". (b) ADD a positive parametrized test (mirroring
      test_maps_ducklake_runtime_split_modules_to_test_ducklake_runtime) asserting each of the six
      scripts/convergence_health/<sub>.py -> tests/convergence_health/test_<sub>.py, INCLUDING
      __main__.py -> tests/convergence_health/test___main__.py. (c) ADD one convergence_health case to
      test_representative_paths_resolve_under_current_retirement_state (e.g. scripts/convergence_health/
      record.py -> tests/convergence_health/test_record.py) and KEEP the existing scripts/executor/** and
      scripts/ops_portal/** -> None entries (Decision 124, unperturbed). LEAVE
      test_roster_is_the_24_known_basenames UNCHANGED (roster frozen at 24; retirement never removes from
      _ALL_MIRROR_TARGET_HOMES).
  - file: config/sloc_budgets.yaml
    action: Modify
    purpose: >-
      Delete ONLY the line "  tests/test_convergence_health.py: 1327  # raise-approved: dec-130 one-time
      grandfather of pre-existing tests/ SLOC debt (coverage-gap fix)" by hand (FINAL commit). NEVER run
      --update-sloc-budgets (it strips the dec-130 markers on the other grandfathered entries). HARD
      invariant: this file loses exactly that one line and nothing else. This is a ratchet-DOWN removal
      (Decision 43/102), always unrestricted; no raise marker is added (Decision 128 -- decompose, don't raise).
  - file: tests/test_convergence_health.py
    action: Delete
    purpose: >-
      Fully decomposed into the tests/convergence_health/ package. Deleted WHOLE in the FINAL commit only
      (kept 100% intact through every prior commit so the monolith and its mirror copies never diverge under
      one full-suite collection -- see OPEN RISK 1).
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    Test-id preservation: the set of pytest node ids (class::function, module-path stripped) collected from
    tests/convergence_health/ equals the pre-move set from origin/main's tests/test_convergence_health.py.
    Same function set, same count (139 test functions), same pass/fail outcomes. Because this is a PURE move
    with NO class rename, NO method rename, and NO class-level split (the largest class,
    TestDetectProdCodeDrift, is ~181 SLOC -- far under 500), the diff MUST be EMPTY with no sanctioned delta.
  - >-
    bin/venv-python -m scripts.validate --pre exits 0: SLOC gate green (every new module < 500 SLOC and < 20
    CC branches, none registered in config/sloc_budgets.yaml); no-cross-test-import guard green; collectability
    green; test-coverage-checker (test-file-exists) green for every scripts/convergence_health/*.py including
    __main__.py.
  - "bin/venv-python -m pytest tests/convergence_health -q passes with the same number of tests as the pre-move baseline (139)."
  - >-
    git diff origin/main -- config/sloc_budgets.yaml shows ONLY the tests/test_convergence_health.py line
    removed; every other dec-130 entry and its raise-approved marker is byte-identical.
  - >-
    map_source_to_test spot-checks (asserted by the updated tests/test_coverage_checker.py oracle):
    scripts/convergence_health/record.py -> tests/convergence_health/test_record.py, and likewise
    approvals->test_approvals, assess->test_assess, escalate->test_escalate, code_drift->test_code_drift,
    __main__->test___main__.py; scripts/executor/step_runner.py -> None and scripts/ops_portal/cli.py -> None
    (Decision 124, unperturbed).
  - >-
    _RETIRING_GRANDFATHER_HOMES no longer contains "test_convergence_health.py"; _ALL_MIRROR_TARGET_HOMES
    (frozenset) is unchanged (24 entries); NO "scripts/convergence_health/*.py" entry was added to
    _CONCERN_SPLIT_TEST_PACKAGES (1:1 mirror, not concern-split); the convergence_health home-resolver branch
    in _grandfathered_source_to_test is unchanged.
  - >-
    Every new test module is < 500 SLOC (validate_sloc_limits counting: non-blank, non-comment lines) and
    < 20 cyclomatic branches; NO new config/sloc_budgets.yaml entry is added; tests/test_convergence_health.py
    is deleted.
  - >-
    Whole-suite collection is clean: bin/venv-python -m pytest tests/ --collect-only -q reports no import or
    collection error from the new package, the deleted monolith, or the oracle edits.
verification_plan:
  - step: 1
    phase: pre-deploy
    graduation: not-applicable
    action: Capture the BEFORE test-id baseline from the monolith before the FINAL commit deletes it.
    command: >-
      bin/venv-python -m pytest tests/test_convergence_health.py --collect-only -q | grep '::'
      | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/cvh_before_ids.txt; wc -l /tmp/cvh_before_ids.txt
    expected: A non-empty sorted baseline of class::function ids (module path stripped) written to the temp file; ~139 functions.
    fix_if: If collection errors, the monolith has an import/collection problem that must be fixed before decomposing.
  - step: 2
    phase: pre-deploy
    graduation: not-applicable
    action: Collect the AFTER id set from the new package and assert byte-identical equality with the baseline.
    command: >-
      bin/venv-python -m pytest tests/convergence_health --collect-only -q | grep '::'
      | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/cvh_after_ids.txt;
      diff /tmp/cvh_before_ids.txt /tmp/cvh_after_ids.txt
    expected: Empty diff (identical class::function sets). No sanctioned delta -- this is a pure move with no renames/splits.
    fix_if: Any added/removed id means a class was dropped, duplicated, mis-copied, or a method was lost/renamed. STOP and reconcile.
  - step: 3
    phase: pre-deploy
    graduation: not-applicable
    action: Run the authoritative fast presubmit tier -- proves SLOC gate, no-cross-test-import guard, coverage-checker, and collectability.
    command: bin/venv-python -m scripts.validate --pre
    expected: Exit 0. No "SLOC limits" failure, no "cross-test import" failure, no "missing test file" failure, no collection error.
    fix_if: >-
      A >500 unregistered file (rebalance a class into a sibling -- never register a budget line), a cross-test
      import (a helper leaked between test_* modules -- move it to tests/fixtures/ or a package conftest), a
      missing-test-file for __main__.py (the test___main__.py filename was mangled), or a collection error (fix
      the offending module's fresh import header).
  - step: 4
    phase: pre-deploy
    graduation: not-applicable
    action: Full pass of the new package at the same count as the baseline.
    command: bin/venv-python -m pytest tests/convergence_health -q
    expected: All pass; total selected count equals the step-1 baseline line count (139).
    fix_if: >-
      A failure means a patch target or symbol did not survive the move. Patch targets are already
      submodule-qualified (scripts.convergence_health.<sub>.X) so no rewrite is needed -- most likely a fresh
      import header is missing a symbol the moved class references (NameError) or boto3/ch/build_lambda_config
      was placed in the wrong module.
  - step: 5
    phase: pre-deploy
    graduation: not-applicable
    action: Assert config/sloc_budgets.yaml lost exactly the tests/test_convergence_health.py line and nothing else.
    command: git diff origin/main -- config/sloc_budgets.yaml
    expected: >-
      Exactly one removed line (the "tests/test_convergence_health.py" budget entry with its 1327 value and
      dec-130 raise-approved marker) and zero added lines.
    fix_if: Any other changed line means --update-sloc-budgets was run (forbidden) or an unintended entry was touched.
  - step: 6
    phase: pre-deploy
    graduation: not-applicable
    action: Prove the retired + mirror mapping via the updated coverage-checker oracle.
    command: bin/venv-python -m pytest tests/test_coverage_checker.py -q
    expected: >-
      All pass, including: each scripts/convergence_health/<sub>.py -> its tests/convergence_health/test_<sub>.py
      (record/approvals/assess/escalate/code_drift/__main__); executor/** and ops_portal/** -> None; the updated
      FIVE-retired-homes assertion; the unchanged 24-entry roster.
    fix_if: >-
      A failing oracle assertion means the flip was wrong -- e.g. convergence_health was mistakenly added to
      _CONCERN_SPLIT_TEST_PACKAGES (would map to a package DIR not test_<stem>.py), the five-retired assertion
      still expects four, or a mirror path is mis-declared. Correct the map edit or the oracle expectation to match.
  - step: 7
    phase: pre-deploy
    graduation: not-applicable
    action: Confirm the monolith is gone, the retirement line is deleted, and convergence_health was NOT added to the concern-split set.
    command: >-
      test ! -f tests/test_convergence_health.py && ! grep -q '"test_convergence_health.py"' scripts/test_coverage_checker.py
      && ! grep -q 'scripts/convergence_health' scripts/test_coverage_checker.py && echo RETIRED-OK
    expected: Prints RETIRED-OK (monolith deleted, convergence_health line removed from _RETIRING, and no scripts/convergence_health entry in _CONCERN_SPLIT_TEST_PACKAGES).
    fix_if: If the file survives, the retirement line remains, or a scripts/convergence_health/ concern-split entry was wrongly added, the FINAL commit is wrong.
  - step: 8
    phase: pre-deploy
    graduation: not-applicable
    action: Measure each new module's SLOC (validate_sloc_limits formula) and assert all < 500.
    command: >-
      for f in tests/convergence_health/test_record.py tests/convergence_health/test_approvals.py
      tests/convergence_health/test_assess.py tests/convergence_health/test_escalate.py
      tests/convergence_health/test_code_drift.py tests/convergence_health/test___main__.py; do
      printf '%s ' "$f"; grep -cvE '^[[:space:]]*(#.*)?$' "$f"; done
    expected: >-
      Every module prints a SLOC count < 500 (projected record ~117, approvals ~232, assess ~125,
      escalate ~345, code_drift ~435, __main__ ~189).
    fix_if: If any module measures >= 500, rebalance a class into a sibling module (never register a budget line, Decision 128).
  - step: 9
    phase: pre-deploy
    graduation: not-applicable
    action: Whole-suite collection smoke -- no import/collection error anywhere from the move.
    command: bin/venv-python -m pytest tests/ --collect-only -q
    expected: Clean collection; no ImportError/collection error from the new package or the deleted monolith.
    fix_if: A collection error means a dangling reference to the deleted file or a broken import header in a new module.
constraints:
  - >-
    Pure behaviour-preserving MOVE. Copy every class body and every in-class helper (the _make_verdict /
    _verdict / _acts_caller methods) VERBATIM with the class that owns them; copy the two module-scope
    constants (_ALL_DUCKLAKE_FUNCTIONS, _ALL_PROD_FUNCTIONS) and the helper class _FakeDeployRecordsS3
    VERBATIM into test_code_drift.py (their sole consumer). Author a fresh per-file import header importing
    exactly the symbols that file references -- no test-logic edits.
  - >-
    Patch targets are ALREADY submodule-qualified (patch("scripts.convergence_health.record.subprocess.run"),
    ".code_drift.subprocess.run", ".code_drift._fetch_open_recs", ".escalate._fetch_open_recs",
    ".__main__.read_convergence_record" / ".escalate" / ".assess_health" / ".find_stuck_gated_approvals" /
    ".find_reconcile_runs_since" / ".diagnose_stuck_approvals", plus external "scripts.ops_data_portal.*",
    "boto3.Session", "urllib.request.urlopen", "src.common.iceberg_reader.make_reader") because the SOURCE is
    already a package. Do NOT rewrite any patch target -- this is a package-mirror of an already-decomposed
    source, NOT a monolith->package split.
  - >-
    boto3 module-scope import (`import boto3  # noqa: F401`) plus its verbatim ~8-line collectability comment
    goes ONLY in test_code_drift.py and test___main__.py (the two modules that use patch("boto3.Session")).
    OMIT it from the other four modules -- they never reference boto3, adding it would be a spurious F401 and
    would wrongly defer a light module to the full tier. This preserves proactive full-tier deferral for the
    boto3 tests while letting record/approvals/assess/escalate collect in the fast tier (a benefit, not a
    regression: the facade import chain is boto3-free -- every heavy dep in the source submodules is lazy /
    in-function; verified no module-scope boto3/iceberg in scripts/convergence_health/). VP steps 3 + 9
    (--collect-only) + step 4 (scoped run) prove no tier regression.
  - >-
    `import scripts.convergence_health as ch` goes ONLY in test_assess.py and test_escalate.py (they alone use
    ch.STALE_GREEN_BACKLOG_THRESHOLD_HOURS / ch._TITLE_* / ch._RESOLUTION_* / ch._fetch_open_recs). `from
    scripts.build_lambda_config import (_DUCKLAKE_*_FUNCTION)` goes ONLY in test_code_drift.py.
  - >-
    No cross-test imports (validate_no_cross_test_imports is active in --pre and full). New modules import only
    stdlib, pytest, unittest.mock, boto3 (two modules), `scripts.convergence_health`, and
    `scripts.build_lambda_config` (one module) -- none starts with "test_". There is NO shared plain
    cross-class helper to hoist (every _make_verdict/_verdict/_acts_caller is class-bound; _FakeDeployRecordsS3
    and the two _ALL_* constants are used ONLY by code_drift classes). So NO tests/fixtures/ file is created.
  - >-
    NO package conftest is created: tests/test_convergence_health.py declares ZERO @pytest.fixture, and every
    autouse guard it relies on is a GLOBAL fixture in the root tests/conftest.py, which pytest auto-merges into
    tests/convergence_health/ (walks up the tree) without redeclaration. Do NOT duplicate, move, or redeclare
    any root conftest autouse fixture.
  - >-
    ruff-format import discipline (tests/CLAUDE.md): one consolidated import block per module (never split the
    same module's imports across two blocks -- ruff silently drops the second). After populating each module,
    run `ruff check --fix` to clear unused imports (F401) and confirm every referenced symbol is imported (no
    NameError).
  - >-
    Every mirror directory carries an __init__.py (prepend import mode): tests/convergence_health/__init__.py.
    The __main__.py mirror MUST be named test___main__.py (test_ + stem "__main__") -- the exact path the
    coverage checker asserts for scripts/convergence_health/__main__.py; do NOT tidy it to test_main.py.
  - >-
    SURGICAL retirement: remove ONLY "test_convergence_health.py" from _RETIRING_GRANDFATHER_HOMES. Do NOT add
    anything to _CONCERN_SPLIT_TEST_PACKAGES (1:1 mirror), do NOT touch _ALL_MIRROR_TARGET_HOMES,
    _NESTED_SUBPACKAGE_TEST_PREFIX, or the convergence_health home-resolver branch in
    _grandfathered_source_to_test (it stays -- it routes the source into the retiring table).
  - >-
    config/sloc_budgets.yaml loses exactly the tests/test_convergence_health.py line; NEVER run
    --update-sloc-budgets. Add NO raise marker and NO new tests/ budget entry (Decision 128 -- decompose, not raise).
  - Do NOT resolve rec-2709 (Wave 6 of ~14); bundled_recommendations stays empty.
  - >-
    No rescue agents or workaround loops (Decision 55). On an unrecoverable collect-id mismatch, STOP and RCA --
    never patch around it. PUBLIC repo -- no AWS account IDs/ARNs/secrets/internal hostnames in any new file.
  - Use bin/venv-python for all Python invocations; bash-only shell.
