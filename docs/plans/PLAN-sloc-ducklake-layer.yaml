  - "Collapse ducklake_runtime.py to the connection-authority + facade module: keep the connection cluster + warm cache + connection constants + the ducklake_scd2_schema re-export block + the __getattr__/_PINNED shim; add `from src.common.ducklake_writes|_tables|_reads|_metrics import (...)` re-exports covering every public symbol AND the census private set (_emit_write_metrics, _occ_backoff, _safe_rollback). Leave NO moved body defined here."
  - "Create src/lambdas/ducklake_writer/smoke_actions.py: move the smoke/probe/churn actions + their private helpers VERBATIM; `import ducklake_runtime as rt`; resolve DATA_PATH/META_SCHEMA/EXTENSION_DIRECTORY from os.environ locally (no handler import). Collapse handler.py to entrypoint + production actions + dispatch + exact exception mapping; re-import the extracted actions/helpers from smoke_actions for _ACTIONS and test access; keep handler() byte-for-byte in its status mapping."
  - "Edit SIX manifests: add ducklake_writes.py/ducklake_tables.py/ducklake_reads.py/ducklake_metrics.py to includes[] of writer/reader/maintenance/catalog_dr (writer also gains smoke_actions.py); add the SAME four src/common paths to excludes[] of data-pipeline and ops-compaction, extending their existing ducklake exclude blocks (exact paths -- excludes support no globs; smoke_actions.py is already covered by their src/lambdas/ducklake_writer dir exclude)."
  - "Extend scripts/test_coverage_checker.py map_source_to_test (route the new ducklake sub-modules to their oracle test files) and add tests/test_coverage_checker.py cases."
  - "Migrate patch targets (namespace discipline): test_ops_data_portal.py CATALOG_ALIAS -> ducklake_tables; the 7 writer private-helper setattr(h,...) -> smoke_actions. Author tests/test_ducklake_facade.py (re-export completeness for both facades + interception preservation + dispatch integrity). Audit test_ducklake_runtime.py for any residual intra-module patch that the interception test flags (expected none)."
  - "Run pre-deploy VP steps 1-11; loop until green (steps 1-3 prove the new module graph acyclic at import time; step 10 guards existing import contracts). Run `validate --update-sloc-budgets` (step 9) as the LAST budget-mutating action and diff-assert both entries removed + no new module seeded."
