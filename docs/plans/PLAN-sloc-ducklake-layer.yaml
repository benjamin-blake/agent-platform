constraints:
  - "Behaviour preservation is absolute -- pure code movement + re-export. No feature work, no bug fixes, no signature changes beyond movement. The handler exception->status mapping and every action's return dict are byte-for-byte preserved. Out-of-scope findings become notes, not fixes."
  - "Import stability -- the facade at src.common.ducklake_runtime.* and the handler at src.lambdas.ducklake_writer.handler.* re-export every public symbol AND every census-enumerated test-patched/read private symbol; the ducklake_scd2_schema re-export block is preserved verbatim; rt.ducklake_spike stays resolvable."
  - "Manifest handler contract -- src.lambdas.ducklake_writer.handler.handler MUST stay the Lambda entrypoint named in the writer manifest; every new src/common module bundled by ducklake_runtime.py is added to ALL FOUR ducklake manifests' includes[]; smoke_actions.py is added to the writer manifest only; the SAME four src/common paths are added to data-pipeline + ops-compaction excludes[] so their wholesale 'includes: - src/' does not drag DuckLake runtime code into prod bundles (their excludes-block doctrine) and does not create a deploy obligation on a broken deploy path (rec-2162)."
  - "Namespace-migration discipline (tests/CLAUDE.md) -- a patched symbol called INTRA a moved module migrates its patch target to that module in the SAME change, proven by an interception test + grep-count closure; never leave a silent no-op mock."
  - "Decision 102 -- SLOC budgets ratchet DOWN only; re-point EXCLUSIVELY via `validate --update-sloc-budgets`; config/sloc_budgets.yaml is regenerated, never hand-edited; diff-verify no >500 module is auto-seeded."
  - "Decision 43 -- CC<=20 per function; the decision-43 complexity-waiver header travels with any moved function that genuinely exceeds CC 20 (ducklake_runtime.py and handler.py both currently carry the header -- keep it wherever a residual/moved waivered function lands)."
  - "Decision 79 / CD.16 -- all four affected active artifacts get per-Lambda build + deploy + smoke-test (V3). No version bump (config/lambda/ducklake/version.yaml unchanged); layers are not rebuilt."
  - "Multi-plan coordination -- this is one of ~16 SLOC-decomposition plans on branch claude/sloc-violations-refactor-p5svnl. Touch ONLY the scope files, the new modules, and the tests. config/sloc_budgets.yaml and scripts/test_coverage_checker.py are shared surfaces: the budget file is regenerated (never hand-edited) and the coverage-mapper edit is additive (a ducklake-specific branch) to minimise merge conflict; the orchestrator resolves integration. The V3 deploy+smoke phase (steps 12-14) runs LAST, after all V2 plans integrate, so deployed artifacts reflect the integrated branch -- steps 12-14 are a cleanly separable final phase."
  - "Decision 55 -- loud-fail; no rescue agents / workaround loops. On an unrecoverable V3 deploy/smoke failure stop and RCA; never paper over a broken gate with a skip or an --ignore-budget past a real regression."
  - "Decision 101 (public repo) -- no AWS account IDs/ARNs/ExternalIds/secrets/internal hostnames in code, tests, or this plan. Account-relative `--profile agent_platform` commands are fine. No emojis; ASCII hyphens only; Python 3.12+, type hints, ruff line length 127."
context:
  - >-
    Root cause -- ducklake_runtime.py (855 SLOC, budget 859: 4 lines headroom) and
    ducklake_writer/handler.py (580 SLOC, budget 580: 0 headroom) are at their SLOC ceiling. Capping a
    cohesive multi-concern file only ratchets upward; the structural fix is one-concern-per-file modules
    whose count grows freely while each stays flat (mirrors Decision 80/104's validate.py decomposition).
  - >-
    Design choice -- ONE combined plan (not two). The runtime decomposition affects ALL FOUR active
    artifacts (writer/reader/maintenance/catalog-dr all bundle ducklake_runtime.py); the handler
    decomposition affects only the writer. A single `build_lambda --ducklake-only --deploy` cycle
    build+deploy+smokes all four ONCE (the writer smoke covers BOTH the runtime and handler changes);
    two plans would deploy+smoke the writer twice and both edit ducklake_writer/manifest.yaml (cross-plan
    conflict on one file). Combining also means one coverage-mapper edit and one --update-sloc-budgets
    diff covering both files. The executor freeze suspends the >5-file STRATEGIC heuristic (author as a
    single larger IMPLEMENTATION plan).
  - >-
    Decomposition doctrine -- Design keeps ducklake_runtime.py's headline "single ATTACH / connection
    authority" concern IN the facade (open_connection + fetch_dsn + warm-connection cache stay), which
    (a) preserves the existing warm-connection test patch bindings and coverage arrangement completely
    untouched (test_ducklake_runtime_warm_connection.py is NOT in scope), and (b) still lands the facade
    at ~340 SLOC. The four extracted src/common modules import only from ducklake_scd2_schema (+ stdlib)
    and never import the facade, so the dependency DAG is acyclic (schema <- {writes,tables,reads,metrics}
    <- runtime-facade). Entity-allocation is co-located with the write primitives (in ducklake_writes.py)
    to keep write_scd2 -> _advance_entity_counter and file_scd2 -> _allocate_entity_id intra-module and
    avoid a writes<->tables cycle.
  - >-
    Census (fresh-context subagent, cross-verified) -- 20 importer files of ducklake_runtime (10 non-test
    + 10 test); 135 direct-on-module patch sites over 17 distinct patched symbols (ALL public), plus 12
    private internals read by test_ducklake_runtime.py that the facade must ALSO re-export. Writer handler:
    1 importer (the test), 33 setattr(h,...) sites over 8 private symbols (7 move to smoke_actions, 1 --
    _open_writer_connection -- stays). Sibling precedent: ducklake_scd2_schema.py is a 468-SLOC flat
    src/common sibling that ducklake_runtime imports and all four Lambdas reach transitively via rt.* --
    the model this plan follows.
  - >-
    Verified intra-module patch hazards (drove the module boundaries): (1) test_ducklake_runtime_warm_connection.py
    patches open_connection to intercept get_warm_connection's internal call -- NEUTRALISED by keeping both
    in the facade (no migration). (2) test_ops_data_portal.py:~1671 patches ducklake_runtime.CATALOG_ALIAS to
    intercept reconcile_table_columns -> migrate to ducklake_tables. (3) the 7 writer private helpers are
    called intra smoke_actions -> migrate their setattr(h,...) to smoke_actions. schema_gate/mint_write_identity
    are patched only for EXTERNAL rt.X calls (loudfail/file_ops/idempotency probes) -> facade re-export suffices
    (confirmed: no test patches them to intercept write_scd2/file_scd2 internally).
  - >-
    Coverage gate mechanics -- validate_test_coverage gates on test-file EXISTENCE (per-file 100% via the
    single stem-mapped file is effectively advisory: pyproject sets a global floor fail_under=37, and
    ducklake_runtime.py passes today although its warm-cache is covered only by the separate warm test
    file). map_source_to_test maps src/**/*.py -> test_{stem}.py, so the new modules are routed to their
    colocated oracle test files via the extended mapper (mirrors Decision 104's scripts/checks/** ->
    test_validate.py), satisfying existence without moving test bodies (lowest behaviour-preservation risk).
  - >-
    Version lockstep -- NO bump. validate_ducklake_version_lockstep checks (a) requirements.txt duckdb
    floor == config/lambda/ducklake/version.yaml (unchanged; no dep change) and (b) no PINNED_DUCKDB_VERSION
    literal in ducklake_runtime.py / build_lambda.py (resolution stays via the loader + __getattr__ shim).
    Only function zips rebuild; duckdb 1.5.4 / ducklake v1.0 and all layers are untouched.
  - >-
    Recs -- rec-2414 (umbrella "break SLOC-registered oversized files below 500") is CITED and ADVANCED
    (2 of 17 files) but NOT bundled (partial). Open recs on the touched files are behaviour changes this
    refactor must NOT make and are left open as out-of-scope notes: rec-2090 (action_write omits
    created/last_updated_timestamp), rec-2092 (churn emits 5 put_metric_data calls), rec-2097
    (CHURN_WRITES_PER_WRITER diagnostic-only clarification), rec-2158 (add delete_ops verb), rec-2247
    (writer dead-connection retry blanket / action_write not idempotent). No exact-match rec is fully
    satisfied by a behaviour-preserving move, so bundled_recommendations is empty.
  - >-
    No conflict with T2.26 / CD.34 -- this is behaviour-preserving code movement; the deferred-table
    migration (telemetry/session_log/execution_plans) and the Neon catalog mechanics (inlining-off, pg_dump
    DR, closed boundary) are untouched. Branch is 0 commits behind origin/main at planning time (preflight);
    no scope-file divergence; ci_rca_unresolved_recs empty (no HARD BLOCK).
  - >-
    Acyclic import discipline (Decision 80 WARN from decision-scout) -- the four new src/common sub-modules
    import their shared base exception (DuckLakeRuntimeError) and all shared schema symbols FROM
    ducklake_scd2_schema, and NEVER from the facade. OCCRetryExhaustedError is DEFINED in ducklake_writes.py
    (subclassing the scd2_schema DuckLakeRuntimeError); VersionMismatchError stays in the facade with the
    connection cluster. The OCC/entity constants (OCC_MAX_ATTEMPTS, OCC_*_BACKOFF_S, ENTITY_COUNTERS_TABLE,
    churn budgets) are DEFINED in ducklake_writes.py and re-exported by the facade for external rt.X readers.
    Net DAG: ducklake_scd2_schema <- {ducklake_writes, ducklake_tables, ducklake_reads, ducklake_metrics} <-
    ducklake_runtime (facade). No sub-module imports the facade, so there is no facade<->sub-module cycle.
    Acyclicity is proven at import time by VP steps 1-3 (a module-scope cycle fails import loudly); VP
    step 10 (import-linter, LIVE per Decision 80) guards that no EXISTING contract regresses --
    .importlinter carries no src.common layers contract today, and adding one is an optional follow-up
    surfaced to the orchestrator, NOT scope here.
  - >-
    Write-path-in-read-artifact NOTE (Decision 81/84 from decision-scout) -- adding ducklake_writes.py to the
    reader/maintenance/catalog_dr manifests places write CODE in read-only bundles, but this is status quo:
    ducklake_runtime.py already contains write_scd2 and is already bundled into all four artifacts. The closed
    boundary is enforced at the IAM / Function-URL layer (read-only IAM principals + AWS_IAM ingress), not by
    symbol absence; code movement introduces NO new write capability to any read-only principal. No action
    beyond this note.
  - >-
    Umbrella-rec discipline (Decision 103/70) -- rec-2414 is an umbrella (2 of 17 files); do NOT emit a
    `Resolves: rec-2414` trailer on the squash-merge (it stays open until all 17 land). bundled_recommendations
    is empty, so there is no rec-closure obligation for this plan.
  - >-
    Tier note (Decision 73/79) -- `--pre` (VP step 11) is the authoritative PR gate. Bundle-completeness
    (step 6) is a FULL-tier check (NOT `--pre`, per Decision 79/73), so the plan runs it directly as a
    dedicated pre-deploy step to avoid deferring the manifest-include proof to the post-merge tier.
    Version-lockstep (step 8) runs in BOTH tiers (registry pre_sequence AND full), so `--pre` already
    covers it -- the dedicated step 8 run is retained so the no-bump proof is explicit in this plan's own
    VP; the conclusion holds a fortiori.
  - >-
    Hermetic-replay budget (fleet policy, T3.15/VF-01) -- validate_vp_replay re-executes every
    pre-deploy+hermetic:true step of every PLAN-*.yaml in the PR diff under a SHARED 20-step/120s budget
    across all ~16 sibling SLOC plans on this branch. This plan therefore marks exactly ONE step hermetic:
    step 2 (facade re-export completeness), a <5s creds-free stable invariant that passes both before
    (verified on the monolith: FACADE-COMPLETE) and after the refactor. All other steps are hermetic: false
    BY DESIGN -- do NOT re-mark them; the implementer still executes the FULL VP (steps 1-14) directly.
  - >-
    Affected-artifact evidence (orchestrator finding, verified empirically this session) -- data-pipeline
    and ops-compaction manifests both carry `includes: - src/` (wholesale) plus an explicit ducklake
    excludes block; compute_affected_artifacts on the prospective diff attributed the four new src/common
    modules to data-pipeline + ops-compaction and NOT to the ducklake artifacts (their manifests do not
    list the new paths yet), while smoke_actions.py attributed NOWHERE (both prod manifests already
    dir-exclude src/lambdas/ducklake_writer). Decision 79 rules tier-from-manifest-graph, so the fix is
    the exclude rows; a post-remediation simulation (excludes added + ducklake includes added) confirms
    attribution == exactly the four ducklake artifacts. Import safety: cmd_check_bundles passes TODAY
    with ducklake_runtime.py excluded from both prod bundles (no handler import path to any ducklake
    module); grep confirms zero ducklake imports in src/data/ and in the nine scripts/*.py files both
    manifests include (the only hits are a docstring + log strings in ops_compaction_handler.py).
    validate_lambda_deploy_gating is ADVISORY (prints affected slugs; never fails the build) -- it will
    list the two prod artifacts because their manifest.yaml files change; this is expected and carries no
    deploy obligation (shipped zip content is unchanged). rec-2162 (data-pipeline deploy broken on a
    yanked dep pin) is thereby AVOIDED, not worked around (Decision 55). Critique observation: rec-2162's
    yanked-pin premise is not reproducible in the current tree (the data-pipeline manifest declares
    pip_packages: [] and build_lambda's PROD_DEPS carries no yanked pin) -- a Decision 103 relevance
    check on rec-2162 is recommended to the orchestrator; out of scope for this plan.
  - "Decision-scout verdict + CITE list (verbatim decision ids): FLAGS_FOUND (triaged 83 of 83). CITE: Decision 104 (facade + coverage-mapper precedent), 80 (tool-free decomposition + LIVE import-linter gate), 102 (SLOC ratchet down-only), 43 (500 cap + CC<=20 waiver), 81/CD.33 (runtime invariants), 84 (I-2 writer-owned allocation, I-3 named-verb read boundary), 79/CD.16 (manifest SSOT, bundle-completeness import-resolve, V3 build+deploy+smoke), 99 (DuckDB version-lockstep SSOT), 82 (EC8 churn semantics preserved), 88 (warm-connection reuse -> connection stays in facade). RELATED: 55, 103/70, 73, 101, 107/CD.34, 67."
  - "gates: decision-scout=FLAGS_FOUND after 1 round (WARN import-cycle -> resolved via explicit acyclic import discipline, proven at import time by VP steps 1-3; NOTE write-in-read-only-artifact -> accepted as status-quo note); plan-critique=PROCEED after 2 rounds (round 1 killed by a session limit mid-investigation of affected-artifact attribution -- the finding was investigated and remediated by the planner; round 2 PROCEED with both deltas empirically confirmed and three non-blocking wording notes folded in)."
