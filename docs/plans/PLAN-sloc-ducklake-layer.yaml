  - "Report: final SLOC per file, facade-completeness + interception results, bundle-completeness across all four artifacts, the sloc_budgets diff, version-lockstep (no bump), and the per-artifact deploy+smoke outcomes."
rollback: >-
  Pure refactor + re-export on a feature branch; if any pre-deploy gate cannot be made green, abandon the
  branch (nothing deployed). If merged and a regression surfaces, revert the squash commit -- the facades,
  new modules, manifest includes, coverage-mapper edit, and patch migrations land atomically in one PR, so
  a single revert restores the pre-decomposition state. Post-deploy: the four function zips are
  code-only (layers untouched), so redeploying the prior commit's zips via `build_lambda --ducklake-only
  --deploy` restores the previous function code with no layer/version churn.
