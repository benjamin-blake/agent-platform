schema_version: 1
slug: "sloc-ducklake-layer"
intent: >-
  Behavior-preserving SLOC decomposition of the DuckLake layer so each oversized file drops below
  the 500-SLOC budget (aim <=450 for ratchet headroom): split src/common/ducklake_runtime.py and
  src/lambdas/ducklake_writer/handler.py on cohesion seams behind thin facades that preserve every
  public import path, every test-patched symbol, and the exact Lambda response semantics. Advances
  the umbrella rec-2414 (reduce SLOC-budget-registered oversized files below 500) and Decision 43's
  reduction target -- one file added per concern, not one file's budget ratcheted up.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-sloc-ducklake-layer.yaml
phase: >-
  Platform hardening (Decision 43 SLOC reduction; Decision 80/104 tool-free-decomposition precedent).
  Executes the umbrella rec-2414 for two of the seventeen oversized files. DuckLake runtime is the
  closed verb boundary (Decision 81 / Decision 84 I-2/I-3, CD.33/CD.34). No product-roadmap phase.
scope:
  - file: src/common/ducklake_runtime.py
    action: Modify
    purpose: >-
      Collapse to a thin (<450 SLOC) module that RETAINS its headline "single ATTACH / connection
      authority" concern -- open_connection, fetch_dsn, _parse_secret_string, libpq_conninfo,
      assert_duckdb_version + VersionMismatchError, and the entire warm-connection cache
      (_WARM_CONNECTION_LOCK, _warm_connection, _DEAD_CONNECTION_SIGNATURES, is_dead_connection_error,
      _probe_connection_alive, reset_warm_connection, get_warm_connection) plus the connection
      constants (DSN_SECRET_ID, META_SCHEMA, SMOKE_META_SCHEMA, SMOKE_DATA_PATH, BAKED_EXTENSIONS,
      LAMBDA_EXTENSION_DIRECTORY) STAY here. Keep the module docstring (trimmed), the ducklake_spike
      import (so rt.ducklake_spike resolves), the verbatim ducklake_scd2_schema re-export block, and
      the __getattr__ + _PINNED_DUCKDB_VERSION shim (PINNED_DUCKDB_VERSION keeps resolving via
      src.common.ducklake_version.pinned_duckdb_version() -- NO hardcoded literal, NO version bump).
      Add FACADE RE-EXPORTS (`from src.common.ducklake_writes|_tables|_reads|_metrics import (...)`)
      for every public symbol AND every census-enumerated private symbol that moved
      (_emit_write_metrics, _occ_backoff, _safe_rollback, and the write/read/metrics publics) so all
      `from src.common.ducklake_runtime import X`, `rt.X` reads, and `patch("src.common.ducklake_runtime.X")`
      sites keep binding to real module attributes at the original path.
  - file: src/common/ducklake_writes.py
    action: Create
    purpose: >-
      owner concern: the writer-owned SCD2 write path. Holds mint_write_identity, the OCC constants +
      churn-gate budgets + _OCC_COLLISION_MARKERS, OCCRetryExhaustedError, is_occ_collision,
      _occ_backoff, _safe_rollback, _emit_write_metrics, write_scd2, file_scd2, and the entity-id
      allocation cluster (ENTITY_COUNTERS_TABLE, ensure_entity_counters_table, bootstrap_entity_counter,
      _allocate_entity_id, _advance_entity_counter). Entity-allocation is co-located with the write
      primitives that call it (write_scd2 -> _advance_entity_counter; file_scd2 -> _allocate_entity_id;
      bootstrap -> _safe_rollback) so ALL those calls stay intra-module -- no writes<->tables import
      cycle. Imports schema spec/SQL-builders/gate/exceptions from ducklake_scd2_schema only. <=400 SLOC.
  - file: src/common/ducklake_tables.py
    action: Create
    purpose: >-
      owner concern: table-lifecycle DDL. Holds create_scd2_tables and reconcile_table_columns.
      Imports resolve_table_spec / _column_ddl / CATALOG_ALIAS from ducklake_scd2_schema; calls nothing
      in ducklake_writes (no cycle). <=400 SLOC.
  - file: src/common/ducklake_reads.py
    action: Create
    purpose: >-
      owner concern: the closed read boundary primitives (Decision 84 I-3). Holds read_current,
      read_history, assert_read_only_sql, named_read, query_current. query_current -> assert_read_only_sql
      stays intra-module. Imports NAMED_READS / resolve_table_spec / CATALOG_ALIAS / SchemaGateError /
      DuckLakeRuntimeError from ducklake_scd2_schema. <=400 SLOC.
  - file: src/common/ducklake_metrics.py
    action: Create
    purpose: >-
      owner concern: CloudWatch metric emission (EC9). Holds CLOUDWATCH_NAMESPACE, emit_metric,
      make_metric_sink (make_metric_sink -> emit_metric stays intra-module). <=400 SLOC.
  - file: src/lambdas/ducklake_writer/handler.py
    action: Modify
    purpose: >-
      Collapse to a thin (<450 SLOC) Lambda entrypoint that RETAINS the `handler` function (the manifest
      `handlers:` contract -- src.lambdas.ducklake_writer.handler.handler MUST keep resolving), the
      env-config constants (DATA_PATH/META_SCHEMA/EXTENSION_DIRECTORY), WriterActionError, the connection
      helpers (_open_writer_connection, _warm_writer_connection), the PRODUCTION ops actions
      (action_write_ops, action_file_ops, action_update_ops, action_create_ops_tables, action_describe,
      _require_ops_table), the _ACTIONS / _CONNECTIONLESS_ACTIONS dispatch tables, _parse_event,
      _response, and the EXACT exception->status mapping in handler() (SchemaGateError->422,
      StatusTransitionError->422, ReferentialError->409, WriterActionError->400, OCCRetryExhaustedError->503,
      VersionMismatchError->500, DuckLakeRuntimeError->500, unknown action->400; the dead-connection
      reopen-once path unchanged). Import the extracted smoke/probe/churn actions from smoke_actions and
      RE-EXPORT them (so _ACTIONS wiring and h.<action>/h.<helper> test access keep resolving).
  - file: src/lambdas/ducklake_writer/smoke_actions.py
    action: Create
    purpose: >-
      owner concern: the T2.17 smoke/probe/churn gates (NOT the production ops path). Holds
      action_attach_check, action_create_tables, action_write, action_idempotency_probe,
      action_partition_probe, action_inlining_probe, action_loudfail_probe, action_connect_probe,
      action_reset_warm_connection, action_churn, action_churn_single, and their private helpers
      (_churn_one_writer, _churn_one_single_write, _frozen_creds, _measure_cold_warm_connect, _p95,
      _count_files, _count_files_for_predicate, _count_inlined_rows, _concurrency_probe,
      _AlwaysCollidingConnection). Imports `from src.common import ducklake_runtime as rt`; resolves its
      own DATA_PATH/META_SCHEMA/EXTENSION_DIRECTORY from os.environ (mirroring handler.py, identical
      values) so there is NO handler<->smoke_actions import cycle. All intra-smoke helper calls
      (action_inlining_probe -> _concurrency_probe -> _churn_one_writer -> _frozen_creds; probes ->
      _count_files*) stay intra-module. <=400 SLOC.
  - file: src/lambdas/ducklake_writer/manifest.yaml
    action: Modify
    purpose: >-
      Add the four new src/common modules (ducklake_writes.py, ducklake_tables.py, ducklake_reads.py,
      ducklake_metrics.py) AND src/lambdas/ducklake_writer/smoke_actions.py to includes[] -- the facade
      imports them at module scope, so the staged bundle must carry them or validate_lambda_bundle_completeness
      (import-resolve) fails. Handler path unchanged.
  - file: src/lambdas/ducklake_reader/manifest.yaml
    action: Modify
    purpose: >-
      Add the four new src/common modules to includes[] -- the reader bundles ducklake_runtime.py, whose
      module-scope re-export imports resolve to the new modules.
  - file: src/lambdas/ducklake_maintenance/manifest.yaml
    action: Modify
    purpose: Add the four new src/common modules to includes[] (maintenance bundles ducklake_runtime.py).
  - file: src/lambdas/ducklake_catalog_dr/manifest.yaml
    action: Modify
    purpose: Add the four new src/common modules to includes[] (catalog-dr bundles ducklake_runtime.py).
  - file: src/lambdas/data-pipeline/manifest.yaml
    action: Modify
    purpose: >-
      Add the four new src/common ducklake module paths to excludes[] (extending the existing ducklake
      exclude block, whose own comment mandates exactly this: "T2.17 DuckLake runtime code lives ONLY in
      the ducklake-deps/-extensions layers + the two ducklake_* zips. The wildcard `includes: - src/`
      above would otherwise drag it into data-pipeline.zip (and mark this artifact affected by DuckLake
      changes). Keep it out."). Without this, `includes: - src/` matches the new files and
      compute_affected_artifacts attributes them to data-pipeline (verified empirically at planning time),
      making it deploy-obligated under Decision 79's tier-from-manifest-graph rule -- and data-pipeline's
      deploy is BROKEN (rec-2162). The exclude keeps its bundle content byte-identical, so no deploy
      obligation arises. smoke_actions.py needs NO new exclude: the existing `src/lambdas/ducklake_writer`
      dir exclude already covers it (verified: it attributes nowhere pre-remediation).
  - file: src/lambdas/ops-compaction/manifest.yaml
    action: Modify
    purpose: >-
      Same four-path exclude addition as data-pipeline (its excludes block carries the same "must not
      leak in via `includes: - src/`" doctrine and the same src/lambdas/ducklake_writer dir exclude).
      Keeps ops-compaction's bundle content unchanged -- no deploy obligation (artifact is DEPRECATED,
      retires at T2.26). Import safety proven: bundle completeness passes TODAY with ducklake_runtime.py
      excluded from both prod bundles (so no handler in them can import ANY ducklake module); their only
      "ducklake" references are a docstring and log strings in ops_compaction_handler.py, not imports.
  - file: scripts/test_coverage_checker.py
    action: Modify
    purpose: >-
      Extend map_source_to_test so the new sub-modules route to their colocated behavior-oracle test
      files, mirroring the Decision 104 precedent (scripts/checks/** -> test_validate.py): the four
      src/common/ducklake_{writes,tables,reads,metrics}.py -> tests/test_ducklake_runtime.py, and any
      src/lambdas/ducklake_writer/*.py whose stem is not `handler` (i.e. smoke_actions) ->
      tests/test_ducklake_writer_handler.py. Closes the coverage-gate existence hole for the split.
  - file: tests/test_coverage_checker.py
    action: Modify
    purpose: Add cases asserting the new ducklake routing (each new module maps to its oracle test file; non-ducklake paths unchanged; handler.py still maps to test_ducklake_writer_handler.py).
  - file: tests/test_ducklake_runtime.py
    action: Modify
    purpose: >-
      Preserve behaviour; it stays the write/read/metrics/connection behavior oracle (tests via rt.X
      through the facade, so coverage lands on the moved modules). Migrate ONLY intra-module-call patch
      targets that the interception test surfaces (expected: none for write/read/metrics because those
      symbols are patched for EXTERNAL rt.X calls; confirm via the interception test). No assertion
      semantics change.
  - file: tests/test_ducklake_writer_handler.py
    action: Modify
    purpose: >-
      Preserve behaviour; stays the handler + smoke/churn behavior oracle. Migrate the 7 private
      churn/probe-helper patch targets from `setattr(h, "<helper>", ...)` to the smoke_actions module
      (they are called INTRA smoke_actions, so a handler-namespace patch would silently no-op):
      _churn_one_writer, _churn_one_single_write, _frozen_creds, _concurrency_probe, _count_files,
      _count_files_for_predicate, _count_inlined_rows. _open_writer_connection STAYS patched on the
      handler (it stays in handler.py). setattr(rt, ...) sites are unchanged (external rt.X calls still
      intercept via the facade re-export). No assertion semantics change.
  - file: tests/test_ops_data_portal.py
    action: Modify
    purpose: >-
      Migrate the single CATALOG_ALIAS patch (line ~1671) from `patch("src.common.ducklake_runtime.CATALOG_ALIAS")`
      to `patch("src.common.ducklake_tables.CATALOG_ALIAS")` -- it drives reconcile_table_columns, which
      moves to ducklake_tables; a facade-namespace patch would no-op after the move. No other change.
  - file: tests/test_ducklake_facade.py
    action: Create
    purpose: >-
      New suite proving the two facade contracts in one place: (1) re-export completeness -- every
      census-enumerated public + private symbol is a real attribute at src.common.ducklake_runtime.* and
      every accessed handler symbol at src.lambdas.ducklake_writer.handler.*; (2) interception
      preservation -- patching each migrated target (src.common.ducklake_tables.CATALOG_ALIAS; the 7
      smoke_actions private helpers) fires through the moved body; (3) dispatch integrity -- _ACTIONS maps
      the same action names to callables and _CONNECTIONLESS_ACTIONS is unchanged.
  - file: config/sloc_budgets.yaml
    action: Modify
    purpose: >-
      Re-point ONLY via `bin/venv-python -m scripts.validate --update-sloc-budgets` (Decision 102): the
      two target entries auto-drop at <=500 SLOC. Never hand-edit. Assert the diff removes both target
      entries and seeds NO new module entry (a >500 module would be silently added). Do NOT assert
      full-file equality -- sibling SLOC-decomposition plans share this branch and regenerate this file.
bundled_recommendations: []
infrastructure_dependencies:
  - "No .tf files in scope. Lambda artifacts affected (Decision 79 / CD.16 V3): ducklake_writer, ducklake_reader, ducklake_maintenance, ducklake_catalog_dr -- all bundle src/common/ducklake_runtime.py, so all four require build + deploy + smoke-test."
  - "Version lockstep (config/lambda/ducklake/version.yaml, duckdb 1.5.4 / ducklake v1.0): NO bump. (a) requirements.txt duckdb floor is unchanged (no dependency change); (b) no PINNED_DUCKDB_VERSION literal is introduced in ducklake_runtime.py or build_lambda.py -- resolution stays via the loader. Only function zips rebuild (code movement); the ducklake-deps/extensions/pgclient LAYERS are untouched, so no layer republish and no clone-rehearsal."
  - "ducklake-* artifacts declare pip_packages: [] (duckdb/psycopg2/ulid live in the ducklake-deps LAYER, not the zip). `build_lambda --ducklake-only` does NOT touch data-pipeline, so rec-2162's yanked data-pipeline dep pin is out of this deploy path."
  - "Affected-artifact attribution (Decision 79 'tier from manifest graph': a plan modifying files named in any active manifest triggers V3 + per-Lambda deploy steps; additions no manifest references stay V2): data-pipeline and ops-compaction include src/ WHOLESALE and match the four new src/common modules (verified via compute_affected_artifacts on the prospective diff) -- without the exclude additions they become deploy-obligated, and data-pipeline's deploy is broken (rec-2162, hard blocker). The exclude rows keep their bundle content byte-identical, so the deploy scope stays EXACTLY the four ducklake artifacts. The advisory validate_lambda_deploy_gating printout will still list data-pipeline/ops-compaction (their manifest.yaml files change in this plan) -- expected and explained: a manifest edit whose sole effect is PREVENTING new content from entering leaves the shipped zip unchanged; no deploy step is required or included for them."
acceptance_criteria:
  - "src/common/ducklake_runtime.py and src/lambdas/ducklake_writer/handler.py each drop to <=500 SLOC (target <=450); every new module (ducklake_writes/tables/reads/metrics, smoke_actions) is <=500 SLOC (aim <=400) and every function is CC<=20 (a decision-43 complexity-waiver header travels with any moved function that needs it)."
  - "The full existing DuckLake test suites (test_ducklake_runtime.py, test_ducklake_runtime_warm_connection.py, test_ducklake_writer_handler.py, test_ducklake_reader_handler.py, test_ducklake_maintenance_handler.py, test_ducklake_scd2_schema.py, test_ducklake_connect_probe.py) plus test_ops_data_portal.py and test_coverage_checker.py pass unchanged in assertion semantics."
  - "Facade completeness: every census-enumerated symbol is a real attribute at src.common.ducklake_runtime.<sym> (45 non-test import symbols + 17 patched symbols + the 12 private internals read by test_ducklake_runtime.py + PINNED_DUCKDB_VERSION via __getattr__) and every accessed handler symbol resolves at src.lambdas.ducklake_writer.handler.<sym> (including the 8 private helpers and _AlwaysCollidingConnection). rt.ducklake_spike still resolves."
  - "Interception preservation: patching src.common.ducklake_tables.CATALOG_ALIAS fires through reconcile_table_columns, and patching each of the 7 migrated smoke_actions private helpers fires through its intra-module caller; a grep-count closure shows ZERO residual stale patch targets (no `setattr(h, \"_churn_one_writer\"|...)` in the writer test; no `src.common.ducklake_runtime.CATALOG_ALIAS` patch in test_ops_data_portal.py)."
  - "The Lambda response contract is byte-for-byte preserved: the handler status/error_type mapping (200 ok; 400 unknown-action/WriterActionError; 409 referential; 422 schema_gate + status_transition; 503 occ_exhausted; 500 version_mismatch/runtime) and the dead-connection reopen-once path are unchanged, proven by the existing writer-handler tests."
  - "Bundle completeness passes for all four active artifacts: `lambda_manifest --check-bundles` stages each manifest and import-resolves its handler with the new modules present; each artifact's static bundle list (`build_lambda --list-bundle <slug>`) contains the four new src/common modules (and the writer bundle also contains smoke_actions.py)."
  - "Attribution correctness: compute_affected_artifacts over the five new module paths returns EXACTLY the four ducklake artifacts (writer also matching smoke_actions.py); the new modules are ABSENT from the data-pipeline and ops-compaction static bundle lists (exclude rows effective); NO deploy of data-pipeline/ops-compaction is required or performed (bundle content unchanged; rec-2162 blocker avoided, not worked around)."
  - "config/sloc_budgets.yaml loses BOTH target entries and gains NO new module entry (diff-verified); no new >500-SLOC module was auto-seeded by the ratchet."
  - "DuckLake version-lockstep gate stays green (no requirements.txt floor drift; no hardcoded PINNED_DUCKDB_VERSION literal in ducklake_runtime.py or build_lambda.py); no version bump."
  - "`bin/venv-python -m scripts.validate --pre` exits 0 on the branch tree."
  - "Post-deploy (executed LAST, after all sibling V2 plans integrate): all four DuckLake functions are rebuilt+deployed in one --ducklake-only cycle; the writer smoke gates (attach + idempotency + loudfail + ops-read-your-write + churn), the reader closed-path gate, the maintenance merge gate, and the catalog-dr DR gate all pass against the deployed artifacts."
verification_plan:
  - step: 1
    phase: pre-deploy
    hermetic: false
    action: All DuckLake + facade + coverage-mapper test suites pass unchanged (behavior oracle).
    command: bin/venv-python -m pytest tests/test_ducklake_runtime.py tests/test_ducklake_runtime_warm_connection.py tests/test_ducklake_writer_handler.py tests/test_ducklake_reader_handler.py tests/test_ducklake_maintenance_handler.py tests/test_ducklake_scd2_schema.py tests/test_ducklake_connect_probe.py tests/test_ops_data_portal.py tests/test_coverage_checker.py tests/test_ducklake_facade.py -m "not integration" -q
    expected: All pass; no collection errors; exit 0.
    fix_if: "A `from src.common.ducklake_runtime import X` or `h.<sym>` AttributeError -> facade omitted a re-export; a patched helper silently no-ops (assertion flips) -> an intra-module patch target was not migrated to its new module."
  - step: 2
    phase: pre-deploy
    hermetic: true
    action: Facade re-export completeness for BOTH facades (import + hasattr; no network/creds; import triggers no duckdb). Portable interpreter -- CI's pr-validate replay job has no .venv, so this hermetic step resolves the interpreter itself; all non-hermetic steps keep bin/venv-python.
    command: >-
      PY=$(test -x .venv/bin/python && echo .venv/bin/python || echo python); $PY -c "import importlib; rt=importlib.import_module('src.common.ducklake_runtime');
      req=['open_connection','fetch_dsn','_parse_secret_string','libpq_conninfo','assert_duckdb_version','get_warm_connection','reset_warm_connection','is_dead_connection_error','_probe_connection_alive','_warm_connection','write_scd2','file_scd2','mint_write_identity','is_occ_collision','_occ_backoff','_safe_rollback','_emit_write_metrics','bootstrap_entity_counter','ensure_entity_counters_table','_allocate_entity_id','_advance_entity_counter','create_scd2_tables','reconcile_table_columns','read_current','read_history','assert_read_only_sql','named_read','query_current','emit_metric','make_metric_sink','CATALOG_ALIAS','SMOKE_DATA_PATH','SMOKE_HISTORY_TABLE','SMOKE_CURRENT_TABLE','META_SCHEMA','SMOKE_META_SCHEMA','LAMBDA_EXTENSION_DIRECTORY','DSN_SECRET_ID','ENTITY_COUNTERS_TABLE','BAKED_EXTENSIONS','CHURN_WRITERS','CHURN_WRITES_PER_WRITER','COMMIT_LATENCY_BUDGET_MS','OCC_COLLISION_RATE_BUDGET','CLOUDWATCH_NAMESPACE','OCCRetryExhaustedError','VersionMismatchError','DuckLakeRuntimeError','WriteIdentity','WriteResult','ReferentialError','SchemaGateError','StatusTransitionError','ducklake_spike','ops_table_names','describe_write_verbs','describe_named_reads','resolve_table_spec','schema_gate','NAMED_READS','NAMED_READS_VERSION','PINNED_DUCKDB_VERSION'];
      miss=[s for s in req if not hasattr(rt,s)]; print('rt missing:',miss); assert not miss, miss;
      h=importlib.import_module('src.lambdas.ducklake_writer.handler');
      hreq=['handler','_ACTIONS','_CONNECTIONLESS_ACTIONS','_parse_event','_response','_open_writer_connection','_warm_writer_connection','_require_ops_table','WriterActionError','action_write_ops','action_file_ops','action_update_ops','action_create_ops_tables','action_describe','action_attach_check','action_create_tables','action_write','action_idempotency_probe','action_partition_probe','action_inlining_probe','action_loudfail_probe','action_connect_probe','action_reset_warm_connection','action_churn','action_churn_single','_churn_one_writer','_churn_one_single_write','_frozen_creds','_concurrency_probe','_count_files','_count_files_for_predicate','_count_inlined_rows','_AlwaysCollidingConnection','_p95'];
      hmiss=[s for s in hreq if not hasattr(h,s)]; print('handler missing:',hmiss); assert not hmiss, hmiss; print('FACADE-COMPLETE')"
    expected: Prints FACADE-COMPLETE; both missing lists empty; exit 0.
    fix_if: A symbol is missing -> add its re-export to the facade (ducklake_runtime.py) or handler.py; PINNED_DUCKDB_VERSION missing -> the __getattr__ shim was dropped.
  - step: 3
    phase: pre-deploy
    hermetic: false
    action: Interception preservation + dispatch integrity (the migrated-patch fires through the moved body).
    command: bin/venv-python -m pytest tests/test_ducklake_facade.py -q
    expected: Patching src.common.ducklake_tables.CATALOG_ALIAS intercepts reconcile_table_columns; patching each of the 7 smoke_actions helpers intercepts its intra-module caller; _ACTIONS/_CONNECTIONLESS_ACTIONS unchanged; exit 0.
    fix_if: An interception assertion fails -> the caller resolves the symbol in a different module than the patched one; move caller+callee into the same module or migrate the patch target.
  - step: 4
    phase: pre-deploy
    hermetic: false
    action: Stale-definition + stale-patch closure (no moved body remains DEFINED in a facade; no residual no-op patch target).
    command: >-
      test $(grep -cE '^(def |class )(write_scd2|file_scd2|mint_write_identity|is_occ_collision|_occ_backoff|_safe_rollback|_emit_write_metrics|bootstrap_entity_counter|ensure_entity_counters_table|_allocate_entity_id|_advance_entity_counter|create_scd2_tables|reconcile_table_columns|read_current|read_history|assert_read_only_sql|named_read|query_current|emit_metric|make_metric_sink)\b' src/common/ducklake_runtime.py) -eq 0 &&
      test $(grep -cE '^(def |class )(action_attach_check|action_create_tables|action_write|action_idempotency_probe|action_partition_probe|action_inlining_probe|action_loudfail_probe|action_connect_probe|action_reset_warm_connection|action_churn|action_churn_single|_churn_one_writer|_churn_one_single_write|_frozen_creds|_measure_cold_warm_connect|_p95|_count_files|_count_files_for_predicate|_count_inlined_rows|_concurrency_probe|_AlwaysCollidingConnection)\b' src/lambdas/ducklake_writer/handler.py) -eq 0 &&
      test $(grep -cE 'setattr\(h, "(_churn_one_writer|_churn_one_single_write|_frozen_creds|_concurrency_probe|_count_files|_count_files_for_predicate|_count_inlined_rows)"' tests/test_ducklake_writer_handler.py) -eq 0 &&
      test $(grep -cE 'src\.common\.ducklake_runtime\.CATALOG_ALIAS' tests/test_ops_data_portal.py) -eq 0 &&
      echo CLOSURE-OK
    expected: Prints CLOSURE-OK -- zero moved definitions remain in either facade; zero residual stale patch targets; exit 0.
    fix_if: A def/class still lives in a facade -> move its body to the sub-module and leave only the re-export; a residual patch target remains -> migrate it (silent no-op mock otherwise).
  - step: 5
    phase: pre-deploy
    hermetic: false
    action: SLOC assertion -- both facades <=500 and no new module >500.
    command: >-
      bin/venv-python -c "import pathlib; s=lambda p: sum(1 for l in pathlib.Path(p).read_text().splitlines() if l.strip() and not l.strip().startswith('#'));
      fac={p:s(p) for p in ['src/common/ducklake_runtime.py','src/lambdas/ducklake_writer/handler.py']};
      new=['src/common/ducklake_writes.py','src/common/ducklake_tables.py','src/common/ducklake_reads.py','src/common/ducklake_metrics.py','src/lambdas/ducklake_writer/smoke_actions.py'];
      over={p:s(p) for p in new if s(p)>500}; print('facades',fac); print('over-budget-new',over);
      assert all(v<=500 for v in fac.values()), fac; assert not over, over; print('SLOC-OK')"
    expected: Prints SLOC-OK; both facades <=500 (target <=450); zero over-budget new modules.
    fix_if: A facade exceeds 500 -> extract more; a new module exceeds 500 -> split it finer on a sub-seam.
  - step: 6
    phase: pre-deploy
    hermetic: false
    action: Bundle completeness -- stage every active manifest and import-resolve each handler with the new modules bundled.
    command: bin/venv-python -m scripts.lambda_manifest --check-bundles
    expected: "All four DuckLake artifacts (plus data-pipeline/ops-compaction): handlers import-resolved, assets present; exit 0."
