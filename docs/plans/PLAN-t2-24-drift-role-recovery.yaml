schema_version: 1
slug: "t2-24-drift-role-recovery"
intent: >-
  Recover the T2.24 scheduled-drift detector by landing the github_ci_drift CI role via the
  human-gated admin path and clearing the RED sandbox convergence record, restoring the CD.35
  convergence anchor (no out-of-band drift can mask a failed apply) that the platform's
  self-improving infra loop rests on.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-t2-24-drift-role-recovery.yaml
phase: >-
  Platform tier T2.24 (CD.35 Wave 5 -- scheduled Terraform drift detection). Recovers the failed
  post-merge gated-apply of PR #250 (main d49e26c); resolves ci-rca rec-2346.
scope:
  - file: terraform/bootstrap/github_ci_apply.tf
    action: Modify
    purpose: >-
      GAP 3 fix. Add the agent-platform-github-ci-drift role ARN to the IAMRolesRead statement so
      every future github_ci_apply plan can refresh-read the drift role once it is in
      terraform/personal state (without this, the next pipeline plan fails AccessDenied on
      iam:GetRole/GetRolePolicy/ListRolePolicies/ListAttachedRolePolicies). This is a READ-ONLY
      refresh grant -- it does NOT widen github_ci_apply's IAM-WRITE budget, which stays scoped to
      branch+pr (IAMRoleWriteBounded / IAMRoleCreateBounded unchanged; in-budget IAM auto-apply
      remains gated to T2.25). Update the adjacent comment to record drift in the read set and the
      read-vs-write distinction.
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Record Decision 98: new convergence-writer / peer CI roles are admin-provisioned in
      terraform/personal (agent_platform_admin -target apply) and added to github_ci_apply's
      bootstrap IAMRolesRead as a read-only grant; the auto-apply pipeline does NOT mint peer CI
      roles until in-budget IAM auto-apply lands at T2.25. Codifies the precedent so this failure
      class does not recur. Synced to ops_decisions via ops_data_portal --backfill-decisions-md.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Truth-maintenance. Revert T2.24 status from complete to in_progress with a progress_note
      (pre-deploy code merged in PR #250 but the role is not yet operational; post-deploy
      VPs blocked until this recovery lands). status:complete is currently inaccurate.
  - file: terraform/CLAUDE.md
    action: Modify
    purpose: >-
      Update the T2.24 "Role creation is guard-BLOCKED" note: under the T2.23 authority budget the
      gated-apply pipeline CANNOT mint a new peer CI role; the only working create path for
      github_ci_drift is agent_platform_admin (-target apply of terraform/personal). Cross-reference
      Decision 98.
bundled_recommendations:
  - rec-2346
infrastructure_dependencies:
  - >-
    IAM (human-gated, Decision 77): two agent_platform_admin (PlatformAdmin) applies. (a)
    terraform/bootstrap -- in-place update of aws_iam_role_policy.github_ci_apply (IAMRolesRead +1
    ARN); (b) terraform/personal -- targeted apply of aws_iam_role.github_ci_drift +
    aws_iam_role_policy.github_ci_drift + aws_iam_role_policy.github_ci_plan (all HCL already present in
    oidc.tf from PR #250; the github_ci_plan policy delta is included because the failed apply never
    landed it and the pipeline cannot PutRolePolicy on the plan role). A VP12 untargeted convergence
    gate catches any further unapplied delta. Both present `terraform plan` to the human BEFORE apply.
    The bootstrap root is always admin-applied out-of-band (Decision 92 point 4); it is not part of the
    CD pipeline.
  - >-
    The drift role create is run by agent_platform_admin (iam:*), so it does NOT depend on the
    bootstrap IAMRolesRead grant. Ordering: apply bootstrap (a) and create the role (b) BEFORE the
    dispatch-ack -- the bootstrap grant must be live before any github_ci_apply pipeline plan
    refresh-reads the now-in-state drift role.
  - >-
    Convergence record: s3://agent-platform-data-lake/convergence/personal/sandbox.json is currently
    {status:red, commit_sha:d49e26c...}. Red clears ONLY via a successful terraform-apply-sandbox
    workflow_dispatch acknowledge-and-retry (acknowledge_red_commit=d49e26c...); a plain push never
    clears red (Decision 92 point 2). Do NOT dispatch before the role exists -- a premature dispatch
    re-fails on CreateRole and re-writes red, filing another ci-rca rec.
  - >-
    tfvars are gitignored and not in the clone -- recover the four no-default vars from remote state
    (terraform/CLAUDE.md "Running terraform/personal on CC-web"). Never paste account_id/ExternalIds
    into chat, a PR, or any committed file.
acceptance_criteria:
  - >-
    github_ci_apply's IAMRolesRead (live, via get-role-policy) includes
    arn:aws:iam::<acct>:role/agent-platform-github-ci-drift; its IAM-WRITE statements
    (IAMRoleWriteBounded / IAMRoleCreateBounded / IAMRoleReconcile) are unchanged (still branch+pr only).
  - >-
    The agent-platform-github-ci-drift role exists in AWS with its inline policy
    (agent-platform-github-ci-drift) carrying TfstateRead, TfstateNativeLockFile,
    ConvergenceRecordWrite, and the refresh-read surface; it is reconciled into terraform/personal state.
  - >-
    simulate-principal-policy for github_ci_apply returns allowed for iam:GetRole/iam:GetRolePolicy on
    the drift ARN and implicitDeny (or explicitDeny) for iam:CreateRole/iam:PutRolePolicy on it.
  - >-
    github_ci_plan's live inline policy (get-role-policy) carries the drift ARN in IAMCIRolesRead -- the
    PR #250 delta the failed apply left unapplied is reconciled.
  - >-
    terraform/personal globally converges: an untargeted `terraform plan -detailed-exitcode` exits 0
    BEFORE any dispatch-ack (no residual code-vs-state delta the dispatch-ack pipeline or a drift tick
    would re-detect).
  - >-
    The convergence record sandbox.json has status == green at commit d49e26c (or a successor commit
    from the dispatch-ack run).
  - >-
    A terraform-drift workflow_dispatch run completes successfully with the assume-role step NOT
    skipped (no continue-on-error bypass) and the drift plan exits 0 (converged -- no false red).
  - rec-2346 is closed (status closed in the synced recommendations cache) with a resolution note.
  - docs/ROADMAP-PLATFORM.yaml T2.24 status == in_progress with a progress_note.
  - >-
    Decision 98 exists in docs/DECISIONS.md and is present in ops_decisions after
    ops_data_portal --backfill-decisions-md.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Plan document is schema-valid.
    command: bin/venv-python -m scripts.plan_document docs/plans/PLAN-t2-24-drift-role-recovery.yaml
    expected: Exits 0; "valid" (no schema errors).
    fix_if: Non-zero exit or schema error -- fix the offending field and re-run.
  - step: 2
    phase: pre-deploy
    action: Bootstrap root still validates after the IAMRolesRead edit.
    command: terraform -chdir=terraform/bootstrap init -backend=false -input=false >/dev/null && terraform -chdir=terraform/bootstrap validate
    expected: "Success! The configuration is valid."
    fix_if: Validation error -- malformed JSON/HCL in the IAMRolesRead Resource list; correct and re-run.
  - step: 3
    phase: pre-deploy
    action: github_ci_apply's IAM-WRITE statements are unchanged by the edit (read-only grant only).
    command: git diff terraform/bootstrap/github_ci_apply.tf | grep -E '^[+-]' | grep -iE 'IAMRoleWriteBounded|IAMRoleCreateBounded|IAMRoleReconcile|CreateRole|PutRolePolicy|AttachRolePolicy'
    expected: No matching added/removed lines (empty output) -- only the IAMRolesRead Resource list and its comment changed.
    fix_if: Any write-statement line appears in the diff -- the edit widened the IAM-write surface; revert to a read-only IAMRolesRead change.
  - step: 4
    phase: pre-deploy
    action: Determine whether github_ci_plan's drift-ARN policy change actually applied to AWS (the failed apply hit AccessDenied on PutRolePolicy github_ci_plan, so it likely did NOT).
    command: aws iam get-role-policy --role-name agent-platform-github-ci-plan --policy-name agent-platform-github-ci-plan --profile agent_platform --output json | bin/venv-python -c "import sys,json; d=json.load(sys.stdin); s=[x for x in d['PolicyDocument']['Statement'] if x.get('Sid')=='IAMCIRolesRead'][0]; print('PRESENT' if any('github-ci-drift' in r for r in s['Resource']) else 'ABSENT-needs-admin-reconcile')"
    expected: >-
      Most likely "ABSENT-needs-admin-reconcile" (the PR #250 github_ci_plan policy change merged to
      main but never applied to AWS because the gated apply failed). If ABSENT, the personal -target
      apply (step 7) MUST include aws_iam_role_policy.github_ci_plan -- otherwise the dispatch-ack
      pipeline (which canNOT PutRolePolicy on github_ci_plan) re-hits the original AccessDenied and
      re-REDs the record. If "PRESENT", the change did land; step 7 may drop that target.
    fix_if: Command errors (NoSuchEntity on github_ci_plan) -- the plan role itself is missing; escalate, the speculative-plan substrate is broken.
  - step: 5
    phase: pre-deploy
    action: Present the bootstrap plan; it is an in-place policy update with no destroy and no trust change.
    command: terraform -chdir=terraform/bootstrap plan -out=/tmp/bootstrap.plan && terraform -chdir=terraform/bootstrap show -no-color /tmp/bootstrap.plan
    expected: >-
      "0 to add, 1 to change, 0 to destroy" affecting aws_iam_role_policy.github_ci_apply only; the
      diff adds the drift ARN to IAMRolesRead and shows NO assume_role_policy (trust) change and NO
      resource destroy. PRESENT to the human before apply (Decision 77).
    fix_if: Any destroy, any trust-doc change, or any resource other than the apply inline policy -- STOP and reconcile.
  - step: 6
    phase: post-deploy
    action: After admin applies bootstrap, the live apply-role policy lists the drift ARN in IAMRolesRead.
    command: aws iam get-role-policy --role-name agent-platform-github-ci-apply --policy-name agent-platform-github-ci-apply --profile agent_platform --output json | bin/venv-python -c "import sys,json; d=json.load(sys.stdin); s=[x for x in d['PolicyDocument']['Statement'] if x.get('Sid')=='IAMRolesRead'][0]; print('drift' if any('github-ci-drift' in r for r in s['Resource']) else 'MISSING')"
    expected: "drift"
    fix_if: Prints MISSING -- the bootstrap apply did not land; re-run the admin apply.
  - step: 7
    phase: post-deploy
    action: Present the personal targeted plan; it creates the drift role + policy AND reconciles the github_ci_plan policy delta the failed apply left unapplied.
    command: terraform -chdir=terraform/personal plan -target=aws_iam_role.github_ci_drift -target=aws_iam_role_policy.github_ci_drift -target=aws_iam_role_policy.github_ci_plan -out=/tmp/drift.plan && terraform -chdir=terraform/personal show -no-color /tmp/drift.plan
    expected: >-
      "2 to add, 1 to change, 0 to destroy" when step 4 was ABSENT -- adds aws_iam_role.github_ci_drift
      + aws_iam_role_policy.github_ci_drift and changes aws_iam_role_policy.github_ci_plan (drift ARN
      into IAMCIRolesRead). If step 4 was PRESENT, expect "2 to add, 0 to change" and the github_ci_plan
      target is a no-op (drop it). NO destroy, NO trust change. PRESENT to the human before apply
      (Decision 77).
    fix_if: Any destroy, any trust-doc change, or any resource beyond the three targets -- STOP and reconcile.
  - step: 8
    phase: post-deploy
    action: After admin applies the targeted create, the drift role exists in AWS.
    command: aws iam get-role --role-name agent-platform-github-ci-drift --profile agent_platform --output json | bin/venv-python -c "import sys,json; print(json.load(sys.stdin)['Role']['RoleName'])"
    expected: Prints agent-platform-github-ci-drift (NoSuchEntity is gone).
    fix_if: NoSuchEntity -- the targeted apply did not create the role; re-run under agent_platform_admin.
  - step: 9
    phase: post-deploy
    action: The drift role's inline policy carries the sanctioned writer + read surface.
    command: aws iam get-role-policy --role-name agent-platform-github-ci-drift --policy-name agent-platform-github-ci-drift --profile agent_platform --output json | bin/venv-python -c "import sys,json; sids={x.get('Sid') for x in json.load(sys.stdin)['PolicyDocument']['Statement']}; need={'TfstateRead','TfstateNativeLockFile','ConvergenceRecordWrite'}; print('OK' if need<=sids else 'MISSING:'+str(need-sids))"
    expected: "OK"
    fix_if: Prints a MISSING set -- the inline policy did not apply fully; re-apply the role policy resource.
  - step: 10
    phase: post-deploy
    action: The github_ci_plan policy now carries the drift ARN live (the reconciliation landed).
    command: aws iam get-role-policy --role-name agent-platform-github-ci-plan --policy-name agent-platform-github-ci-plan --profile agent_platform --output json | bin/venv-python -c "import sys,json; d=json.load(sys.stdin); s=[x for x in d['PolicyDocument']['Statement'] if x.get('Sid')=='IAMCIRolesRead'][0]; print('PRESENT' if any('github-ci-drift' in r for r in s['Resource']) else 'STILL-ABSENT')"
    expected: "PRESENT"
    fix_if: STILL-ABSENT -- the github_ci_plan target was not applied; re-run the admin apply including -target=aws_iam_role_policy.github_ci_plan.
  - step: 11
    phase: post-deploy
    action: github_ci_apply can READ the drift role but CANNOT create/write it (Path A keeps write surface minimal).
    command: ACCT=$(aws sts get-caller-identity --profile agent_platform --query Account --output text); aws iam simulate-principal-policy --policy-source-arn arn:aws:iam::$ACCT:role/agent-platform-github-ci-apply --action-names iam:GetRole iam:GetRolePolicy iam:CreateRole iam:PutRolePolicy --resource-arns arn:aws:iam::$ACCT:role/agent-platform-github-ci-drift --profile agent_platform --output json | bin/venv-python -c "import sys,json; print([(e['EvalActionName'], e['EvalDecision']) for e in json.load(sys.stdin)['EvaluationResults']])"
    expected: >-
      GetRole=allowed, GetRolePolicy=allowed, CreateRole=implicitDeny (or explicitDeny via the
      boundary), PutRolePolicy=implicitDeny (or explicitDeny). The assertion is those four decisions.
    fix_if: CreateRole/PutRolePolicy = allowed (write surface widened), or GetRole = denied (read grant missing).
  - step: 12
    phase: post-deploy
    action: terraform/personal GLOBALLY converges before any dispatch-ack (gate -- the same delta the drift tick computes).
    command: terraform -chdir=terraform/personal plan -lock=false -detailed-exitcode -out=/tmp/converge.plan >/dev/null 2>&1; echo "exit=$?"; terraform -chdir=terraform/personal show -no-color /tmp/converge.plan 2>/dev/null | tail -5
    expected: >-
      "exit=0" (no changes; fully converged). This MUST hold BEFORE the dispatch-ack -- otherwise the
      dispatch-ack pipeline apply (or the next drift tick) hits the residual diff. Run under
      agent_platform_admin. If exit=2, inspect the remaining diff: any IAM-sensitive resource the
      pipeline cannot apply (a role policy outside branch+pr, a role create) must be admin -target-applied
      first (present plan; Decision 77), then re-run this gate until exit=0.
    fix_if: exit=2 with a residual IAM-sensitive diff -- admin-reconcile it before dispatching; do NOT dispatch on a non-converged personal root.
  - step: 13
    phase: post-deploy
    action: Dispatch-ack clears red; the convergence record is green at the acknowledged commit.
    command: aws s3 cp s3://agent-platform-data-lake/convergence/personal/sandbox.json - --profile agent_platform | bin/venv-python -c "import sys,json; d=json.load(sys.stdin); print(d['status'], d['commit_sha'][:7])"
    expected: >-
      Prints "green d49e26c" (or green at the dispatch-ack successor commit). Run AFTER the
      terraform-apply-sandbox workflow_dispatch run reports success.
    fix_if: status still red -- inspect the dispatch run logs; if it re-failed on an IAM AccessDenied (CreateRole or PutRolePolicy) the convergence gate (step 12) was not satisfied; re-verify steps 6/8/10/12.
  - step: 14
    phase: post-deploy
    action: A manual drift tick now assumes the role and converges (no false red, no skip).
    command: bin/venv-python -m scripts.gh_run_status --workflow terraform-drift.yml --latest 2>/dev/null || echo "use GitHub MCP actions_get on the dispatched terraform-drift run id"
    expected: >-
      The dispatched terraform-drift run conclusion == success; the assume-role step did NOT skip
      (no continue-on-error bypass); the plan step exit code is 0 (converged). Verify via GitHub MCP
      actions_get / get_job_logs on the run.
    fix_if: assume-role still skipped (role/trust mismatch) or run failed for a non-lock reason -- diagnose before closing recs.
  - step: 15
    phase: post-deploy
    action: rec-2346 is closed after the sync.
    command: bin/venv-python -m scripts.sync_ops pull >/dev/null 2>&1; grep '"rec-2346"' logs/.recommendations-log.jsonl | tail -1 | bin/venv-python -c "import sys,json; print(json.loads(sys.stdin.read())['status'])"
    expected: "closed"
    fix_if: Prints open -- the Resolves trailer did not fire; close manually via ops_data_portal --update-rec rec-2346 --status closed.
  - step: 16
    phase: post-deploy
    action: Roadmap truth restored and Decision 98 synced.
    command: grep -nE 'T2\.24' docs/ROADMAP-PLATFORM.yaml | head; grep -c '## Decision 98' docs/DECISIONS.md
    expected: T2.24 shows status in_progress with a progress_note; grep count for "## Decision 98" == 1.
    fix_if: T2.24 still complete or Decision 98 absent -- complete the truth-maintenance edits and re-run --backfill-decisions-md.
constraints:
  - >-
    Decision 77 (human-gated IAM apply): present `terraform plan` to the human and get acceptance
    BEFORE every apply (bootstrap and personal). The CC-web agent runs the apply in-container under
    agent_platform_admin; never apply without presenting first.
  - >-
    Decision 55 / 72 (RCA-first, no inline hot-patch / no autonomous workaround): this plan is the
    sanctioned rec->/plan->/implement consumption of rec-2346. Do NOT widen github_ci_apply's
    IAM-WRITE to let the pipeline self-mint the role (that is the workaround anti-pattern and Path B,
    which the human rejected); fix the root cause by admin-provisioning the role.
  - >-
    Decision 92 (authority budget): the IAMRolesRead addition is READ-ONLY refresh access and does
    NOT widen the apply role's IAM-WRITE budget. In-budget IAM auto-apply (the pipeline minting roles
    under its boundary) remains gated to T2.25 and is out of scope here.
  - >-
    T2.23 bootstrap authority budget: do not casually widen IAMRoleWriteBounded / IAMRoleCreateBounded
    / the boundary DenyIAMEscalation. Only IAMRolesRead changes in this plan.
  - >-
    Single Portal Invariant (Decision 84): rec writes/closes transit scripts.ops_data_portal only.
    Decisions are authored in DECISIONS.md (numbering authority) and synced to ops_decisions via
    ops_data_portal --backfill-decisions-md. Never edit logs/.recommendations-log.jsonl or
    logs/.decisions-index.jsonl directly.
  - >-
    Never paste account_id or the ExternalIds into chat, a PR, or any committed file (the pre-commit
    never-commit hook shape-blocks the account id; the ExternalIds are AssumeRole trust secrets).
  - Never edit or commit on main; work on the harness session branch.
context:
  - >-
    Failure: post-merge gated-apply run 28102910305 (gated-apply job, ~4s) failed iam:CreateRole on
    agent-platform-github-ci-drift with an explicit deny in the apply role's permissions boundary
    (agent-platform-github-ci-apply-boundary). The gated-apply job runs as github_ci_apply,
    constrained by the T2.23 authority budget.
  - >-
    Three gaps were diagnosed, all in terraform/bootstrap/github_ci_apply.tf. GAP 1 (the immediate
    failure) and GAP 2 (PutRolePolicy scope) only bite if the PIPELINE creates/writes the role -- under
    Path A the admin creates it, so both are moot. GAP 3 (IAMRolesRead omits the drift ARN) is the only
    one that must be fixed: once the role is in terraform/personal state, every future github_ci_apply
    plan refresh-reads it and would fail AccessDenied. That single read grant is this plan's only
    terraform code change.
  - >-
    Path selection: the human chose Path A (admin-create in terraform/personal). Rejected: Path B
    (widen the pipeline to mint it -- premature T2.25 work, couples the drift role to the apply boundary)
    and Path C (re-home the role into the bootstrap root -- more churn, new pattern, literal-ARN rewrite).
    Path A matches the branch/pr/plan precedent: those CI roles were ALL admin-created and ALL appear in
    IAMRolesRead.
  - >-
    Merged to main in PR #250 (HCL is the desired state) but NOT necessarily applied to AWS: the failed
    gated apply (run 28102910305) hit TWO AccessDenied errors -- iam:CreateRole on github_ci_drift AND
    iam:PutRolePolicy on github_ci_plan -- so it landed neither. "Merged to main" != "applied to AWS".
    Consequence: BOTH the drift role create AND the github_ci_plan IAMCIRolesRead drift-ARN addition
    (oidc.tf:479) are unreconciled code-vs-state deltas. The admin -target apply MUST reconcile BOTH
    (github_ci_apply -- the pipeline -- cannot PutRolePolicy on github_ci_plan, so a dispatch-ack alone
    re-hits the same AccessDenied and re-REDs). VP4 probes the live github_ci_plan policy to confirm; VP7
    broadens the -target set to include aws_iam_role_policy.github_ci_plan; VP12 is a global-convergence
    gate that must show exit 0 BEFORE any dispatch-ack.
  - >-
    No code change needed (HCL already correct on main, verify live-applied during VP12 convergence gate):
    terraform-drift.yml (cron + workflow_dispatch; assume-role continue-on-error covers this bootstrap
    window), the tf_drift data-quality source, and the ci_rca_taxonomy not_a_gate entry. If the failed
    apply left any OTHER terraform/personal delta unapplied (e.g. a github_ci_branch policy/comment change),
    the VP12 untargeted plan surfaces it and admin reconciles it before dispatch.
  - >-
    Related-Work check (ci_rca_unresolved_recs non-empty -- rec-2346): satisfied by failure-category
    match (terraform apply failure) AND by bundling rec-2346 as the rec this plan resolves. rec-2346's
    source_file pointer is terraform/personal/oidc.tf (where ci-rca localized the symptom); the actual
    root-cause fix is the bootstrap read grant + the admin create.
  - >-
    Decision 94 precedent: an IAM/trust change the gated CD path itself cannot apply is admin-applied
    locally, then confirmed by a no-op merge/plan. Path A is the same shape.
  - >-
    No tf_drift rec is expected yet: the drift workflow's assume-role is continue-on-error during the
    bootstrap window, so scheduled ticks no-op without filing. If a source=tf_drift rec does surface,
    close it the same way (Resolves: trailer or update_rec) once the record is green.
pre_implementation_checklist:
  - Branch confirmed not on main (claude/t2-24-drift-role-recovery-25eup6)
  - docs/PROJECT_CONTEXT.md read
  - DECISIONS.md relevant decisions read (77, 92, 94, 55, 72, 84)
  - terraform/bootstrap/github_ci_apply.tf and terraform/personal/oidc.tf (drift role block) read
  - rec-2346 reviewed (the ci-rca rec this plan resolves)
  - agent_platform_admin (PlatformAdmin) assume-role chain reachable for the two applies
  - tfvars recoverable from remote state (terraform/CLAUDE.md procedure)
  - Acceptance criteria understood and verifiable
execution_steps:
  - >-
    Review rec-2346 (the ci-rca rec) and re-read terraform/bootstrap/github_ci_apply.tf IAMRolesRead.
    Confirm Path A scope (only IAMRolesRead changes in terraform code).
  - >-
    Modify terraform/bootstrap/github_ci_apply.tf: add
    "arn:aws:iam::${var.account_id}:role/agent-platform-github-ci-drift" to the IAMRolesRead Resource
    list; update the Sid comment to note drift is now in the read set and that this is a READ-ONLY
    grant that does NOT widen the IAM-WRITE budget (in-budget IAM auto-apply remains T2.25). Run VP1-VP3.
  - >-
    Recover the four no-default tfvars from remote state (terraform/CLAUDE.md). Under agent_platform_admin,
    `terraform -chdir=terraform/bootstrap init` then `plan` (VP4). PRESENT the plan to the human (expect:
    in-place update to aws_iam_role_policy.github_ci_apply only; no destroy, no trust change). On
    acceptance, `terraform apply`. Verify VP5.
  - >-
    Probe the live github_ci_plan policy (VP4) to confirm whether the PR #250 drift-ARN delta applied to
    AWS. Expect ABSENT (the failed apply also denied PutRolePolicy on github_ci_plan). This determines
    the next -target set.
  - >-
    Under agent_platform_admin, `terraform -chdir=terraform/personal init` then
    `plan -target=aws_iam_role.github_ci_drift -target=aws_iam_role_policy.github_ci_drift
    -target=aws_iam_role_policy.github_ci_plan` (VP7; drop the github_ci_plan target only if VP4 showed
    PRESENT). PRESENT to the human (expect: 2 to add, 1 to change). On acceptance, `apply -target=...`.
    This creates the drift role + policy, reconciles the github_ci_plan policy, and writes all into the
    shared personal tfstate. Verify VP8-VP11.
  - >-
    GLOBAL CONVERGENCE GATE (VP12): under agent_platform_admin run an UNtargeted
    `terraform -chdir=terraform/personal plan -lock=false -detailed-exitcode` and require exit 0. If
    exit 2, inspect the residual diff -- any IAM-sensitive resource the pipeline cannot apply must be
    admin -target-applied (present plan first, Decision 77), then re-run the gate until exit 0. Do NOT
    proceed to dispatch on a non-converged personal root.
  - >-
    ONLY after VP6/VP8/VP10 pass AND VP12 shows exit 0: dispatch the terraform-apply-sandbox workflow via
    GitHub MCP actions_run_trigger (workflow_dispatch) with
