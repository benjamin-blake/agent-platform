  - file: tests/checks/deps/__init__.py
    action: Create
    purpose: Package marker for deps mirrors (TestDependencyGraphFreshness, TestValidateImportContracts, TestValidateLockfileSync).
  - file: tests/checks/executor/__init__.py
    action: Create
    purpose: Package marker for executor mirror (TestValidateExecutorBoundary).
  - file: tests/checks/hygiene/test_validate_placement.py
    action: Create
    purpose: >-
      Mirror for TestValidatePlacement (522 SLOC single class -- SEE OPEN RISK 1: split into two classes
      or register a raise marker). Plus hygiene siblings: TestValidateCliToolsInPrompts,
      TestValidateSubprocessEncoding, TestValidateTestCountCoupling, TestValidateSysExecutable.
  - file: tests/checks/hygiene/test_validate_prose_allowlist.py
    action: Create
    purpose: RELOCATE tests/checks/test_validate_prose_allowlist.py into the hygiene/ subdir (no test_validate.py overlap; verified).
  - file: tests/checks/test_validate_prose_allowlist.py
    action: Delete
    purpose: Superseded by the hygiene/ mirror relocation.
  - file: tests/checks/iam_tf/__init__.py
    action: Create
    purpose: Package marker for iam_tf mirrors.
  - file: tests/checks/iam_tf/test_validate_authority_budget.py
    action: Create
    purpose: RELOCATE tests/test_validate_authority_budget.py (flat root, 23 SLOC). Plus iam_tf siblings TestValidateEnvironmentTaxonomy, TestValidateTerraformTry, TestValidateIamRunnerPolicy, TestValidateInvokeImpliesResolve (+ _write_oidc_tf helper).
  - file: tests/checks/iam_tf/validate_ci_refresh_read_coverage/__init__.py
    action: Create
    purpose: >-
      CONCERN-SPLIT package (declare scripts/checks/iam_tf/validate_ci_refresh_read_coverage.py in
      _CONCERN_SPLIT_TEST_PACKAGES). MERGE the two test_validate.py classes
      (TestValidateCiRefreshReadCoverageHelpers, TestValidateCiRefreshReadCoverageEndToEnd + the
      _write_ci_refresh_read_fixture helper) WITH the flat-root TestValidateCiRefreshReadCoverage class
      (~655 SLOC total) -- one class per module file, each < 500. Delete the flat root file.
  - file: tests/test_validate_authority_budget.py
    action: Delete
    purpose: Relocated to tests/checks/iam_tf/test_validate_authority_budget.py.
  - file: tests/test_validate_ci_refresh_read_coverage.py
    action: Delete
    purpose: Merged into the tests/checks/iam_tf/validate_ci_refresh_read_coverage/ concern-split package.
  - file: tests/test_validate_contract_drift.py
    action: Delete
    purpose: Relocated to tests/checks/contracts/test_validate_contract_drift.py.
  - file: tests/checks/lambda_pkg/__init__.py
    action: Create
    purpose: Package marker for lambda_pkg mirrors (TestValidateLambdaManifests, TestValidateLambdaManifestCoverage, TestValidateLambdaBundleCompleteness, TestValidateLambdaDeployGating).
  - file: tests/checks/misc/__init__.py
    action: Create
    purpose: Package marker for misc mirrors (TestValidateTestCoverage, TestValidateInvariants, TestValidateScheduledAgentLogs, TestDucklakeVersionLockstepGate, TestValidateGhasProbe).
