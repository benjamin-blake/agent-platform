  - file: tests/checks/ops_governance/test_validate_deploy_channel_conformance.py
    action: Create
    purpose: RELOCATE tests/checks/test_validate_deploy_channel_conformance.py into ops_governance/ (no test_validate.py overlap; verified). Plus siblings TestFieldSemanticsDriftGate, TestValidateRecommendationsSchema, TestValidateRecWritePaths, TestValidateWarehouseWriteSources, TestValidateOutboxStaleness, TestValidateDqManifestGate, TestCheckSourceRegistry, TestValidateRecRelevanceContract.
