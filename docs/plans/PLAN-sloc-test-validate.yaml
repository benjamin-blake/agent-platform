bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    Test-id preservation: the union of pytest node ids collected from the new mirror modules
    (tests/checks/**) + the tests/validate/ package + the relocated flat files equals the pre-move
    union collected from origin/main's tests/test_validate.py + the six relocated flat root/checks files,
    modulo module-path changes (and, IF OPEN RISK 1 is resolved by class-split, the class-qualifier of the
    TestValidatePlacement methods). Same function set, same count, same pass/fail outcomes.
  - "bin/venv-python -m scripts.validate --pre exits 0 (SLOC gate green: no file over 500 unregistered; no-cross-test-import guard green)."
  - "bin/venv-python -m pytest tests/checks tests/validate -q passes with the same number of tests as before the move."
  - "git diff origin/main -- config/sloc_budgets.yaml shows ONLY the tests/test_validate.py line removed; the other 23 dec-130 entries and their raise-approved markers are byte-identical."
  - >-
    map_source_to_test spot-checks (asserted by the updated tests/test_coverage_checker.py oracle):
    scripts/checks/hygiene/validate_placement.py -> its hygiene mirror; scripts/validate.py -> tests/validate;
    scripts/checks/_scaffolding.py and _terraform.py -> tests/validate; scripts/checks/registry.py and
    _common.py -> tests/test_checks_registry.py (unchanged).
  - "_RETIRING_GRANDFATHER_HOMES no longer contains 'test_validate.py'; _ALL_MIRROR_TARGET_HOMES (frozenset) is unchanged; the other 23 retiring entries are intact."
  - "Every new/relocated test file is < 500 SLOC (validate_sloc_limits counting: non-blank, non-comment lines) OR is a declared concern-split package whose modules are each < 500; no new config/sloc_budgets.yaml entry is added (see OPEN RISK 1 for the TestValidatePlacement exception)."
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Capture the BEFORE test-id baseline from the union of all source homes before any move.
    command: >-
      bin/venv-python -m pytest tests/test_validate.py tests/checks/test_validate_prose_allowlist.py
      tests/checks/test_validate_deploy_channel_conformance.py tests/test_validate_authority_budget.py
      tests/test_validate_ci_refresh_read_coverage.py tests/test_validate_contract_drift.py
      tests/test_validate_decisions.py tests/test_validate_dq_drift.py --collect-only -q
      | grep '::' | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/claude-0/before_ids.txt; wc -l /tmp/claude-0/before_ids.txt
    expected: A non-empty sorted baseline of class::function ids (module path stripped) written to the temp file.
    fix_if: If collection errors, a source file has an import/collection problem that must be fixed before moving anything.
  - step: 2
    phase: pre-deploy
    action: After the move, collect the AFTER id set from the new homes and assert equality with the baseline.
    command: >-
      bin/venv-python -m pytest tests/checks tests/validate --collect-only -q | grep '::'
      | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/claude-0/after_ids.txt;
      diff /tmp/claude-0/before_ids.txt /tmp/claude-0/after_ids.txt
    expected: >-
      Empty diff (identical class::function sets). If OPEN RISK 1 is resolved by splitting TestValidatePlacement,
      the only permitted delta is the class-qualifier rename of that one class's methods, which must be reviewed
      line-by-line and explicitly accepted.
    fix_if: Any unexpected added/removed id means a class was dropped, duplicated, or a merge lost/renamed a function.
  - step: 3
    phase: pre-deploy
    action: Run the authoritative fast presubmit tier -- proves SLOC gate, no-cross-test-import guard, and collectability.
    command: bin/venv-python -m scripts.validate --pre
    expected: Exit 0. No "SLOC limits" failure, no "cross-test import" failure.
    fix_if: >-
      A >500 unregistered file (split it), a cross-test import (hoist the helper to tests/fixtures/ or a conftest),
      or a collection error (fix the mirror's import header).
  - step: 4
    phase: pre-deploy
    action: Full pass of the moved suites at the same count as before.
    command: bin/venv-python -m pytest tests/checks tests/validate -q
    expected: All pass; total selected count equals the step-1 baseline line count.
    fix_if: A failure means a patch target or fixture did not survive the move (namespace-migration discipline).
  - step: 5
    phase: pre-deploy
    action: Assert config/sloc_budgets.yaml lost exactly the test_validate.py line and nothing else.
    command: >-
      git diff origin/main -- config/sloc_budgets.yaml
    expected: >-
      Exactly one removed line ("  tests/test_validate.py: 7350  # raise-approved: dec-130 ...") and (per OPEN RISK 1
      resolution) at most zero added lines; the other 23 entries + markers untouched.
    fix_if: Any other changed line means --update-sloc-budgets was run (forbidden) or an unintended entry was added.
  - step: 6
    phase: pre-deploy
    action: Prove the retired mapping via the updated coverage-checker oracle (no python -c; runs the oracle test file).
    command: bin/venv-python -m pytest tests/test_coverage_checker.py -q
    expected: >-
      All pass, including the updated map_source_to_test assertions for the retired mapping (checks/** -> mirror,
      validate.py -> tests/validate, _scaffolding/_terraform -> tests/validate, registry/_common unchanged).
    fix_if: An oracle assertion still asserts grandfather behavior for test_validate.py -- update it to the post-retirement mapping.
  - step: 7
    phase: pre-deploy
    action: Confirm the residual monolith is gone and the retirement line is deleted.
    command: >-
      test ! -f tests/test_validate.py && ! grep -q '"test_validate.py"' scripts/test_coverage_checker.py && echo RETIRED-OK
    expected: Prints RETIRED-OK.
    fix_if: If the file survives or the line remains, the FINAL batch is incomplete.
constraints:
  - No test-logic changes -- this is a behavior-preserving MOVE. Copy each class/method body verbatim; only author a fresh per-file import header importing exactly the symbols that file references (from the source check module and scripts.checks._common), mirroring the pre-existing flat files' pattern.
  - Namespace-migration discipline (tests/CLAUDE.md) -- rewrite any `patch("validate.<X>")` that targets the check-under-test to its source-module path; leave absolute `scripts.checks.*` patch targets untouched. Grep each moved class for `patch("validate.` before finalizing.
  - No cross-test imports (validate_no_cross_test_imports is active in --pre and full). Shared helpers go to tests/fixtures/ (importable, exempt) or a conftest fixture -- NEVER imported between test_* modules.
  - Every mirror directory carries an __init__.py (prepend import mode). Declared concern-split packages need >=1 test_*.py plus __init__.py.
  - config/sloc_budgets.yaml loses exactly the tests/test_validate.py line; NEVER run --update-sloc-budgets (it strips the 23 dec-130 markers). See OPEN RISK 1 for the single possible exception.
  - Do NOT touch the registry.py/_common.py -> tests/test_checks_registry.py special-case, and do NOT touch tests/checks/hygiene/test_validate_no_cross_test_imports.py (foundation artefact).
  - Do NOT resolve rec-2709 (Wave 1 of ~14); bundled_recommendations stays empty.
  - No rescue agents or workaround loops (Decision 55). PUBLIC repo -- no AWS account IDs/ARNs/secrets/hostnames in any new file.
  - Use bin/venv-python for all Python invocations; bash-only shell.
context:
  - "Gates: decision-scout=FLAGS_FOUND (91/91 triaged). CITE: Decision 131 (mirror convention + retiring grandfather + no-cross-test-import guard -- governs every step), Decision 130 (whole-repo SLOC scan + 24-home grandfather + sloc_budgets markers -- governs the budget-line deletion), Decision 104 (check-registry colocation precedent being inverted). The single WARN is the Decision-128 conflict on the 522-SLOC TestValidatePlacement single-class mirror file -- RESOLVED by OVERSEER DECISION OPEN RISK 1 = PRIMARY (concern-split; no raise marker), which is the scout's own recommended doctrine-aligned resolution. RELATED: Decision 124 (the map edits must preserve the scripts/executor/** and scripts/ops_portal/** None-returns -- add a targeted regression assertion to the oracle), Decision 43/102 (the budget-line deletion is a ratchet-DOWN removal, unrestricted; new mirror files must respect the 500/CC-20 limits), Decision 80 (facade/concern-split precedent the tests/validate/ package mirrors). plan-critique gate: dispatched but did not return before overseer review (nested-agent stall); the OVERSEER conducted a direct review in its stead and PROCEEDs (this is a behavior-preserving pure move verified by test-id preservation)."
  - "OVERSEER DECISION -- OPEN RISK 1 (TestValidatePlacement 522-SLOC single class): resolution = PRIMARY (concern-split the class into a tests/checks/hygiene/validate_placement/ package declared in _CONCERN_SPLIT_TEST_PACKAGES, split by a sensible 2-way seam that keeps both modules < 500 SLOC; method bodies verbatim). The FALLBACK (raise-approved budget marker) is REJECTED -- it would leave a tests/ entry in config/sloc_budgets.yaml, violating rec-2709's acceptance (zero tests/ entries). Accept the one class-qualifier test-id delta for that class's methods (VP step 2 permitted exception)."
  - "OVERSEER DECISION -- PR STRUCTURE OVERRIDE: implement as ONE branch (claude/rec-2709-w1-test-validate) / ONE PR with the batches as SEQUENTIAL COMMITS (Batch 0 helpers -> domain batches -> FINAL flip), NOT the plan's multi-PR-per-domain. Rationale: intermediate batches are low-risk by design (monolith stays grandfathered, mirrors additive) so per-domain PRs buy little safety while multiplying overhead ~14x; W1+ auto-merge on green (no human-review bottleneck to relieve); the whole move is verified atomically by test-id preservation (VP 1-2) + validate --pre + full suite. Run validate --pre + scoped tests after each batch-commit to localize failures early. The rollback note's 'each batch is an independent squash-merge' is superseded: rollback = revert the single PR."
  - "OVERSEER FOLLOW-UP (non-blocking): the retirement exposes ~5 check modules with no test anywhere (validate_workflow_agent_safety, validate_imports, validate_requirements, validate_claude_p_retry_wrapper, validate_verification_harness) that will resolve to non-existent mirrors post-retirement -- full-tier-only, forward-fixed when touched. The overseer will file a follow-up rec to backfill these test stubs. NOT a Wave 1 blocker (this wave edits none of them)."
  - "FULL class->mirror map (91 classes + 5 module test-funcs). PER-CHECK MIRRORS (move out): ci_guards{TestValidateCiRcaTrigger,TestValidateCiRcaTaxonomy,TestValidateCiWorkflowGuards,TestValidateOpsPortalPatchTargets}; contracts{TestClaudeMdPointerInvariant,TestValidatePromptCompliance,TestValidateInstructionArchitectureLayers,TestValidateNoUnderscoreInstructions,TestIntentDocFreeze,TestValidatePortalDrift}; deps{TestDependencyGraphFreshness,TestValidateImportContracts,TestValidateLockfileSync}; executor{TestValidateExecutorBoundary}; hygiene{TestValidateCliToolsInPrompts,TestValidatePlacement,TestValidateSubprocessEncoding,TestValidateTestCountCoupling,TestValidateSysExecutable}; iam_tf{TestValidateEnvironmentTaxonomy,TestValidateTerraformTry,TestValidateIamRunnerPolicy,TestValidateInvokeImpliesResolve,TestValidateCiRefreshReadCoverageHelpers,TestValidateCiRefreshReadCoverageEndToEnd}; lambda_pkg{TestValidateLambdaManifests,TestValidateLambdaManifestCoverage,TestValidateLambdaBundleCompleteness,TestValidateLambdaDeployGating}; misc{TestValidateTestCoverage,TestValidateInvariants,TestValidateScheduledAgentLogs,TestDucklakeVersionLockstepGate,TestValidateGhasProbe}; ops_governance{TestFieldSemanticsDriftGate,TestValidateRecommendationsSchema,TestValidateRecWritePaths,TestValidateWarehouseWriteSources,TestValidateOutboxStaleness,TestValidateDqManifestGate,TestCheckSourceRegistry,TestValidateRecRelevanceContract}; product/trading{TestBrokerEnvReadGuard}; roadmap{TestGraduationGuard,TestGraduationGuardUnavailableCarveout,TestExtractEnforcedMap->check_graduation_guard; TestPlatformRoadmapCriteriaIntegrity,TestPlatformRoadmapT31Criteria,TestRoadmapSizeGuard->validate_platform_roadmap; TestCandidateDecisionRatification; TestValidateTierFloor}; sloc{TestValidateSlocLimits->test_sloc_limits,TestValidateSlocBudgetRaises,TestValidateCcLimits->test_cc_limits,TestValidateComplexity->test_complexity}; verification{TestValidateHermeticityFlags,TestVerifierHermeticity,TestSamePrGuard+Helpers+Differential->validate_verifier_same_pr_guard,TestVerificationRegistry+Differential+TestEntriesAtRef->validate_verification_registry,TestDifferentialGateStep->validate_differential_gate_baseline,TestValidateVpReplay}."
