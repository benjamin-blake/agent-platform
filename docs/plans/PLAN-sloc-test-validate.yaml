    purpose: >-
      RELOCATE tests/test_validate_contract_drift.py (flat root, 457 SLOC, no test_validate.py overlap) here;
      plus create sibling contracts mirrors for TestClaudeMdPointerInvariant, TestValidatePromptCompliance,
      TestValidateInstructionArchitectureLayers, TestValidateNoUnderscoreInstructions, TestIntentDocFreeze,
