schema_version: 1
slug: sloc-test-validate
intent: >-
  Decompose tests/test_validate.py (the repo's largest file, 7350 SLOC) into per-check mirror
  test modules under tests/checks/** plus a tests/validate/ orchestrator concern-split package,
  then retire its grandfather home and delete its config/sloc_budgets.yaml entry -- rec-2709 Wave 1
  of the Decision 131 mirror-convention rollout that keeps files small enough for lower-tier
  model comprehension (the load-bearing purpose of the 500-SLOC gate).
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-sloc-test-validate.yaml
phase: >-
  rec-2709 Wave 1 (Decision 131 mirror convention, amends Decision 104); SLOC governance /
  model-portability (AGENTS.md Decision 128). Behavior-preserving test MOVE of scripts/checks/**
  + scripts/validate.py test homes. No product-roadmap phase; platform tooling only.
scope:
  - file: scripts/test_coverage_checker.py
    action: Modify
    purpose: >-
      Retire the grandfather: delete the single line "test_validate.py" from
      _RETIRING_GRANDFATHER_HOMES; add "scripts/validate.py" to _CONCERN_SPLIT_TEST_PACKAGES so the
      residual orchestrator tests resolve to the tests/validate/ package; add scripts/checks/_scaffolding.py
      and scripts/checks/_terraform.py to a new orchestration-scaffolding special-case routing them to
      the same tests/validate/ home (their tests live there, not in a per-check mirror). Do NOT touch
      the registry.py/_common.py special-case.
  - file: config/sloc_budgets.yaml
    action: Modify
    purpose: >-
      Delete ONLY the "tests/test_validate.py: 7350" line by hand once the residual is gone. NEVER run
      --update-sloc-budgets (it strips the dec-130 markers on the other 23 entries). HARD invariant:
      this file loses exactly that one line and nothing else.
  - file: tests/test_coverage_checker.py
    action: Modify
    purpose: >-
      Update the map_source_to_test / check_test_file_exists oracle assertions to reflect the retired
      mapping (scripts/checks/**/*.py now resolve to their mirror; scripts/validate.py to tests/validate/;
      _scaffolding.py/_terraform.py to tests/validate/; registry.py/_common.py unchanged).
  - file: tests/test_validate.py
    action: Delete
    purpose: >-
      Fully decomposed; replaced by the tests/validate/ concern-split package (orchestrator residue) plus
      the per-check mirror modules under tests/checks/**. Deleted in the FINAL batch only.
  - file: tests/conftest.py
    action: Modify
    purpose: >-
      Hoist the _neutralized_pre_registry fixture here (root conftest) -- it is used by TestGraduationGuard
      (moves to tests/checks/roadmap/) AND the tests/validate/ orchestrator classes, so it must be visible
      to both trees. No global-guard changes.
  - file: tests/fixtures/subprocess_stubs.py
    action: Create
    purpose: >-
      Home for the _mock_completed helper (used by TestEnsureFreshDqResults -> tests/validate/ AND
      TestPlatformRoadmapCriteriaIntegrity -> tests/checks/roadmap/). tests/fixtures/ is exempt from the
      no-cross-test-import guard (names never start with test_), so both consumers import it here.
  - file: tests/validate/__init__.py
    action: Create
    purpose: Package marker for the orchestrator concern-split (prepend import mode; mirror convention).
  - file: tests/validate/conftest.py
    action: Create
    purpose: >-
      Package conftest for tests/validate/. Hoist _pre_mock_run here (shared across the split orchestrator
      modules). Layers under the root conftest; declares no global guards.
  - file: tests/validate/test_tiers.py
    action: Create
    purpose: >-
      Orchestrator tier/dispatch tests (call _validate.main()): TestLoadHelpers, TestPreModeDiffAware,
      TestPreModePytestSelection, TestSlocLimitsInPreMode, TestPreModeChecks, TestPreModeRegistryIsolation,
      TestPreRoadmapGuardSelection. Keep < 500 SLOC (regroup if needed).
  - file: tests/validate/test_budget.py
    action: Create
    purpose: >-
      Budget-assertion orchestrator tests: TestBudgetAssertion, TestIgnoreBudgetFlag, TestIgnoreBudgetCIGuard,
      TestBudgetBreachRecFiling, TestBudgetRecFilingCiGuard, TestBudgetBreachCiTelemetry. Keep < 500 SLOC.
  - file: tests/validate/test_pytest_diff.py
    action: Create
    purpose: >-
      _scaffolding pytest-diff/collectability tests: TestFastTierCollectability, TestRunPytestDiff,
      TestRunPytestDiffSingleExecution, TestRunPytestDiffReactiveDefer, TestPytestDiffParallelAndTimeout,
      TestPytestFlagsPinnedSeed, TestExcludedHeavyDeps. Keep < 500 SLOC (regroup with test_scaffold_gates).
  - file: tests/validate/test_scaffold_gates.py
    action: Create
    purpose: >-
      _scaffolding/_terraform gate tests: TestRunTerraformChecks, TestRunCoverageCheck, TestEnsureFreshDqResults,
      TestWholeRepoScanCoverage. Keep < 500 SLOC (rebalance vs test_pytest_diff so neither exceeds 500).
  - file: tests/validate/test_changed_files.py
    action: Create
    purpose: >-
      get_changed_files origin/main + deleted-path tests: TestGetChangedFilesOriginMain,
      TestGetChangedFilesDeletedPaths.
  - file: tests/checks/ci_guards/__init__.py
    action: Create
    purpose: Package marker for ci_guards mirrors.
  - file: tests/checks/ci_guards/test_validate_ci_rca_trigger.py
    action: Create
    purpose: Mirror for TestValidateCiRcaTrigger, TestValidateCiRcaTaxonomy, TestValidateCiWorkflowGuards, TestValidateOpsPortalPatchTargets (one class per source module; see context map).
  - file: tests/checks/contracts/__init__.py
    action: Create
    purpose: Package marker for contracts mirrors.
  - file: tests/checks/contracts/test_validate_contract_drift.py
