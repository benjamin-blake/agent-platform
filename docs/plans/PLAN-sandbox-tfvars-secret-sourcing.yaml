schema_version: 1
slug: "sandbox-tfvars-secret-sourcing"
intent: >-
  Restore the sandbox Terraform auto-apply pipeline (the platform's self-converging infra
  substrate) to green by eliminating the per-variable TF_VAR wiring drift that produced
  ci-rca rec-2213: source the entire terraform.personal.tfvars from a single AWS Secrets
  Manager secret the OIDC apply role reads, so every current and future no-default variable
  is supplied automatically with no per-variable workflow edit.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-sandbox-tfvars-secret-sourcing.yaml
phase: >-
  Platform tier T2.20 (Terraform CI/CD convergence substrate, CD.35 Wave 1) -- ci-rca
  remediation of rec-2213 arising from that substrate.
scope:
  - file: terraform/personal/oidc.tf
    action: Modify
    purpose: >-  # pragma: allowlist secret
      Grant aws_iam_role_policy.github_ci_apply secretsmanager:GetSecretValue + DescribeSecret
      scoped to the tfvars secret ARN, mirroring the Neon-credential secret-read grant the
      apply role already carries. Trust policy untouched.
  - file: .github/workflows/terraform-apply-sandbox.yml
    action: Modify
    purpose: >-
      Replace the four per-variable TF_VAR_* env mappings + the per-variable assertion with a
      single step that fetches the tfvars secret to disk (apply role) and a fail-closed
      non-empty check; pass it to plan via -var-file; keep only TF_VAR_aws_profile="". Update
      the header comments to describe Secrets-Manager sourcing.
  - file: terraform/CLAUDE.md
    action: Modify
    purpose: >-
      Update the record-backed sandbox-CD apply-posture paragraph: replace the GitHub-repo-
      variable sourcing description with the single-secret tfvars sourcing (name the secret +
      the apply-role grant; note new no-default vars only require a secret update).
bundled_recommendations:
  - rec-2213
infrastructure_dependencies:
  - >-
    terraform/personal/oidc.tf adds an IAM read grant to the github_ci_apply role; the
    deterministic apply guard fail-closes on IAM changes (Decision 77), so this lands via the
    human-gated interactive terraform apply loop (Decision 35), NOT sandbox auto-apply.
  - >-
    AWS Secrets Manager secret 'agent-platform-terraform-personal-tfvars' (holds the canonical
    terraform.personal.tfvars body) must be provisioned under admin creds before the apply
    role's read grant is exercised. The agent's PlatformDev runtime cannot create or read it.
  - >-
    Ordering is load-bearing: provision secret -> apply IAM grant (human-gated) -> merge ->
    workflow_dispatch acknowledge_red_commit=rec-2213. The IAM grant must be live before the
    dispatch so the dispatch plan shows no IAM diff and the guard passes.
  - >-
    The convergence record (s3://agent-platform-data-lake/convergence/personal/sandbox.json) is
    currently RED and sticky (CD.35/T2.20 Wave 1); it clears ONLY via the dispatch-ack path. A
    plain merge cannot clear it, and merging terraform/personal/** re-triggers the apply
    workflow which the red precondition harmlessly refuses.
acceptance_criteria:
  - >-
    .github/workflows/terraform-apply-sandbox.yml sources terraform.personal.tfvars from the
    agent-platform-terraform-personal-tfvars secret (a get-secret-value step writes the file)
    and passes it via -var-file; the four per-variable TF_VAR_* env mappings (account_id,
    owner_email, platform_dev_external_id, platform_admin_external_id) and their assertions are
    removed, leaving only TF_VAR_aws_profile="".
  - >-
    terraform/personal/oidc.tf grants github_ci_apply secretsmanager:GetSecretValue +
    DescribeSecret scoped (standard secret-ARN wildcard form) to the
    agent-platform-terraform-personal-tfvars secret, and the role's trust (assume-role) policy
    is unchanged.
  - >-
    The agent-platform-terraform-personal-tfvars secret exists and contains all five no-default
    personal-module variables (account_id, owner_email, platform_dev_external_id,
    platform_admin_external_id, alerts_email) and does not pin aws_profile.
  - >-
    A workflow_dispatch acknowledge_red_commit=rec-2213 run of terraform-apply-sandbox completes
    successfully and the convergence record flips to status=green.
  - "rec-2213 is closed via the Resolves: rec-2213 squash-merge trailer (rec-autoclose)."
  - >-
    terraform/CLAUDE.md's sandbox-CD apply-posture paragraph reflects the Secrets-Manager-backed
    tfvars sourcing (no stale GitHub-repo-variable wiring description).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Confirm the per-variable TF_VAR_* wiring (the drift surface) is fully removed from the apply workflow.
    command: |-
      ! grep -nE 'TF_VAR_(account_id|owner_email|platform_dev_external_id|platform_admin_external_id)' .github/workflows/terraform-apply-sandbox.yml
    expected: No matches; command exits 0 (the four per-variable mappings and their assertions are gone).
    fix_if: Any of the four names still appear -> the migration to single-secret sourcing is incomplete (stale surface remains).
  - step: 2
    phase: pre-deploy
    action: Confirm the Secrets-Manager fetch, the -var-file wiring, and the lone aws_profile override are present.
    command: |-
      grep -q 'secretsmanager get-secret-value' .github/workflows/terraform-apply-sandbox.yml && grep -q 'var-file=terraform.personal.tfvars' .github/workflows/terraform-apply-sandbox.yml && grep -q 'TF_VAR_aws_profile: ""' .github/workflows/terraform-apply-sandbox.yml
    expected: All three present; exit 0.
    fix_if: Missing fetch step, missing -var-file on the plan step, or the TF_VAR_aws_profile blank override was dropped.
  - step: 3
    phase: pre-deploy
    action: Confirm the oidc.tf apply-role read grant exists, is ARN-scoped to the tfvars secret, and the module still validates.
    command: |-
      grep -q 'SecretsManagerTfvarsRead' terraform/personal/oidc.tf && grep -q 'agent-platform-terraform-personal-tfvars' terraform/personal/oidc.tf && ( cd terraform/personal && terraform init -backend=false -input=false >/dev/null && terraform validate )
    expected: Grant present, ARN scoped to the tfvars secret, and 'terraform validate' reports Success.
    fix_if: Missing/misnamed Sid, unscoped or wrong ARN, or HCL invalid.
  - step: 4
    phase: pre-deploy
    action: Confirm the provisioned secret holds all five no-default variables and omits aws_profile (run by the provisioner under admin/apply creds; prints only counts, never values).
    command: |-
      S=$(aws secretsmanager get-secret-value --secret-id agent-platform-terraform-personal-tfvars --query SecretString --output text); printf 'required=%s aws_profile=%s\n' "$(printf '%s' "$S" | grep -cE '^[[:space:]]*(account_id|owner_email|platform_dev_external_id|platform_admin_external_id|alerts_email)[[:space:]]*=')" "$(printf '%s' "$S" | grep -cE '^[[:space:]]*aws_profile[[:space:]]*=')"
    expected: "Prints: required=5 aws_profile=0"
    fix_if: required<5 -> a required variable is missing from the secret (plan would fail-closed on it). aws_profile=1 -> remove it so the runner's TF_VAR_aws_profile="" override wins. AccessDenied -> run under the admin profile that created the secret (PlatformDev runtime cannot read it).
  - step: 5
    phase: post-deploy
    action: After the workflow_dispatch acknowledge_red_commit=rec-2213 run, confirm the convergence record flipped to green.
    command: |-
      aws s3 cp s3://agent-platform-data-lake/convergence/personal/sandbox.json - --profile agent_platform | bin/venv-python -c "import json,sys; d=json.load(sys.stdin); assert d['status']=='green', d; print('GREEN at', d['commit_sha'])"
    expected: Prints 'GREEN at <sha>' (status=green).
    fix_if: status=red -> the dispatch apply failed (fetch/plan/guard/review/apply); inspect the run logs and re-diagnose, do not inline-patch (Decision 55). A red SNS-subscription replacement means the secret's alerts_email differs from the value in state.
  - step: 6
    phase: post-deploy
    action: Confirm rec-2213 is closed after the Resolves trailer / rec-autoclose.
    command: |-
      bin/venv-python -m scripts.sync_ops pull >/dev/null && bin/venv-python -c "import json; rows=[json.loads(l) for l in open('logs/.recommendations-log.jsonl') if l.strip()]; m=[x for x in rows if x.get('id')=='rec-2213'][0]; assert m['status']=='closed', m['status']; print('rec-2213', m['status'], '-', (m.get('resolution') or '')[:60])"
    expected: Prints 'rec-2213 closed - ...'.
    fix_if: Still open -> the Resolves trailer did not fire; close via bin/venv-python -m scripts.ops_data_portal --update-rec rec-2213 --status closed --resolution '...'.
constraints:
  - Only modify the three files in scope (oidc.tf, terraform-apply-sandbox.yml, terraform/CLAUDE.md). Out-of-scope bugs become recommendations, not inline fixes.
  - No rescue agents or workaround loops; on unrecoverable V3 failure STOP and RCA (Decision 55).
  - >-
    The IAM grant lands via the human-gated interactive terraform apply loop (plan presented +
    explicit human acceptance), NOT auto-apply -- the guard fail-closes IAM changes (Decision
    77/35). The plan diff must add only the SecretsManagerTfvarsRead statement; the role trust
    policy must show NO change (lockout guard).
  - >-
    The secret body must contain exactly the five no-default variables and MUST NOT pin
    aws_profile; otherwise -var-file would override the runner's TF_VAR_aws_profile="" blank and
    the provider would try the non-existent agent_platform_admin named profile.
  - >-
    The secret's alerts_email (and every value) must equal what is in Terraform state; a mismatch
    force-replaces the SNS subscription (a destroy) which the apply guard fail-closes -> red.
    Provision from state-recovered values.
  - >-
    Never echo secret values (account_id is shape-blocked from commits; the ExternalIds are
    AssumeRole trust secrets). All provisioning and verification print counts/booleans only.
  - No new docs (Decision 86); edits land only in the grandfathered terraform/CLAUDE.md and collocated workflow comments.
  - >-
    Dispatch the workflow_dispatch unlatch ONLY after this rec/plan review (satisfied by this
    /plan session) -- Decision 55/72; nothing auto-remediates.
context:
  - >-
    Resolves ci-rca rec-2213 (HARD BLOCK in preflight). Same source_file
    (.github/workflows/terraform-apply-sandbox.yml) and same failure category (terraform
    plan/validate failure) -- satisfies the /plan Related-Work check.
  - >-
    Root cause: the apply workflow hand-wired 4 of the 5 no-default terraform/personal variables
    as TF_VAR_* env; alerts_email (added by sns_alerts.tf / T2.18 FP-B) drifted unwired, so
    'terraform plan' failed with "No value for required variable 'alerts_email'". The redesign
    sources the whole tfvars from one secret, structurally eliminating the drift class (no
    validate.py guard is added -- a static guard cannot inspect secret contents).
  - >-
    The rec's literal acceptance heuristic (grep -q 'TF_VAR_alerts_email' ...) is intentionally
    superseded: the redesign removes per-variable TF_VARs, so the true acceptance is the green
    dispatch run (Decision 48: acceptance is behavioural, not structural).
  - >-
    Decisions to cite: 77 (sandbox auto-apply / guard fail-closed on IAM), 35 (terraform apply
    never automatic; human-gated IAM path), 55 + 72 (ci-rca resolved via architectural
    root-cause in /plan; dispatch only post-review), 48 (behavioural V3 acceptance), 86 (no new
    docs). Decision 39 only ratifies SNS as the notification primitive -- do NOT over-attribute
    alerts_email's origin to it (origin is sns_alerts.tf / T2.18 FP-B).
  - >-
    The apply role already reads Secrets Manager (two GetSecretValue statements in oidc.tf
    scoped to the Neon catalog credential secrets); the new grant mirrors that precedent. Only the
    apply job plans terraform/personal (ci.yml makes zero AWS calls; the advisory PR job only
    reads the convergence record), so no PR/branch role needs the tfvars.
  - >-
    Branch was 0 commits behind origin/main at planning time with no scope-file divergence.
    /implement should still rebase before the interactive apply so oidc.tf is current.
pre_implementation_checklist:
  - Branch confirmed not on main
  - docs/PROJECT_CONTEXT.md read
  - DECISIONS.md surfaced via the decision-scout gate (cites 77/35/55/72/48/86; NO_FLAGS)
  - All three scope files located and readable
  - Acceptance criteria understood and verifiable
  - Admin credentials available for the one-time secret provisioning (or the human will provision it)
  - Human available to accept the IAM-grant terraform plan diff (Decision 77/35 human gate)
execution_steps:
  - Rebase the branch on origin/main so terraform/personal/oidc.tf is current before any apply.
  - >-
    terraform/personal/oidc.tf -- add a SecretsManagerTfvarsRead statement
    (secretsmanager:GetSecretValue + DescribeSecret) to aws_iam_role_policy.github_ci_apply,
    Resource scoped to the agent-platform-terraform-personal-tfvars secret ARN (copy the
    wildcard ARN form from the role's existing Neon secret-read statement). Do not touch the
    role trust policy.
  - >-
    .github/workflows/terraform-apply-sandbox.yml -- remove the four per-variable TF_VAR_* env
    mappings (keep TF_VAR_aws_profile=""); add a "Materialise tfvars from Secrets Manager" step
    after the convergence precondition and before terraform init that writes the secret to
    terraform/personal/terraform.personal.tfvars via `aws secretsmanager get-secret-value
    --secret-id agent-platform-terraform-personal-tfvars --query SecretString --output text`;
    replace the per-variable assertion step with a fail-closed `test -s` non-empty check on the
    written file; change the plan step to add -var-file=terraform.personal.tfvars; update the
    header comments (around lines 83-86) to describe Secrets-Manager sourcing.
  - >-
    terraform/CLAUDE.md -- update the "Apply posture (record-backed sandbox CD, CD.35 / T2.20
    Wave 1)" paragraph: replace the GitHub-repo-variable sourcing sentence with the single-secret
    tfvars sourcing (name agent-platform-terraform-personal-tfvars + the apply-role grant), and
    note that a new no-default variable now only requires updating that secret.
  - >-
    Provision the secret (admin creds): recover the five no-default values from the S3 remote
    state per terraform/CLAUDE.md (never echo), assemble a tfvars body containing exactly
    account_id, owner_email, platform_dev_external_id, platform_admin_external_id, alerts_email
    (NO aws_profile), then `aws secretsmanager create-secret --name
    agent-platform-terraform-personal-tfvars --secret-string file://<tmp>`; shred the temp file.
    Run VP step 4 to confirm required=5 aws_profile=0.
  - >-
    Human-gated interactive apply of the IAM grant: `cd terraform/personal && terraform init
    -backend-config=backend-sandbox.hcl && terraform plan -var-file=terraform.personal.tfvars
    -target=aws_iam_role_policy.github_ci_apply -out=plan.bin`; run
    `python ../../scripts/terraform_apply_guard.py plan.json` (it WILL flag the IAM change --
    expected); PRESENT the plan to the human and obtain explicit acceptance (the Decision 77/35
    gate); verify the diff adds only the SecretsManagerTfvarsRead statement and the trust policy
    is unchanged; then `terraform apply plan.bin`.
  - >-
    Commit the three changes; open a PR (base main) and emit a "Resolves: rec-2213" trailer in
    the squash-merge body; wait for the fast PR --pre tier event-driven via subscribe_pr_activity
    (end the turn; the webhook wakes the session -- never sleep); squash-merge.
  - >-
    Clear red + verify end-to-end: trigger workflow_dispatch on terraform-apply-sandbox (ref
    main) with acknowledge_red_commit=rec-2213 via the GitHub MCP actions trigger. The run
    fetches the secret-sourced tfvars and plans with no IAM diff -> guard passes -> subagent
    review PROCEED -> apply -> writes green. Run VP step 5 to confirm the record is green.
  - Execute the full Verification Plan -- run each step; loop until pass; on unrecoverable V3 failure STOP and RCA (Decision 55).
  - "Report: what was implemented, verification results, and confirm rec-2213 closed (VP step 6)."
work_areas: []
rollback: >-
  The IAM grant and the secret are additive and safe to leave in place. If the dispatch apply
  reds, the always-run record write sets status=red and ci-rca files a fresh rec -- do NOT
  re-dispatch blindly; re-diagnose first. To fully revert the workflow: restore the four
  per-variable TF_VAR_* env mappings + the per-variable assertion from git history and drop the
  fetch/-var-file changes (the secret is then unread and may be deleted); remove the
  SecretsManagerTfvarsRead statement from oidc.tf via a human-gated apply.
