schema_version: 1
slug: "ci-deploy-role-consolidation"
intent: >-
  Execute audit finding DEP-12 / roadmap T2.49 under Decision 144: consolidate the four consolidatable
  CI/deploy IAM roles into two -- merge github_ci_plan + github_ci_drift into one dual-sub planner role and
  github_ci_ducklake_deploy + github_ci_prod_deploy into one code-deploy role scoped to
  function:agent-platform-* -- taking the live role census from 17 to 15 while preserving every capability
  split (pr-no-tfstate, apply-only-writer, drift-only-convergence-writer) as a test/simulate invariant rather
  than a role-count accident. Slice F of the /overseer terraform-deploy-redesign run (audit b67955b); provides
  T2.48 c2 (new-role gated-apply proof) and VP-12 (pending_gated legibility on the natural guard-BLOCK).
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-ci-deploy-role-consolidation.yaml
phase: >-
  Platform tier_item T2.49 (CI/deploy role consolidation, audit DEP-12), depends_on T2.48 (slice E inversion,
  APPLIED). Slice F of the /overseer terraform-deploy-redesign run. Follow-on/execution plan closing
  T2.49 c1 + c2 + c3.
closes_criteria:
  - "T2.49:c1"
  - "T2.49:c2"
  - "T2.49:c3"
scope:
  - file: terraform/personal/oidc.tf
    action: Modify
    purpose: >-
      c2 (planner merge): create aws_iam_role.github_ci_planner (name agent-platform-github-ci-planner,
      boundary-carrying) with a TWO-statement dual-sub web-identity trust -- (main) Allow when
      sub=refs/heads/main AND sts:RoleSessionName StringEquals the reserved drift session-name; (pr) Allow when
      sub in {pull_request, ref:refs/pull/*} AND sts:RoleSessionName StringNotEquals that reserved name. Its
      inline policy = the shared ci_full_refresh_read doc + the UNION of the two roles' read/plan-time
      statements (TfplanWrite, DucklakeBuildInputsRead, DucklakeLambdaPackagesWrite from plan;
      TfstateNativeLockFile, DuckLakeWriterInvoke from drift) UNCONDITIONED, PLUS ConvergenceRecordWrite as a
      FAIL-CLOSED ALLOW (GetObject+PutObject on convergence/personal/*) CONDITIONED on aws:userid StringLike
      "*:<reserved-drift-session>" -- the sole allow for that resource, so any non-drift session is
      implicitly denied (Decision 92 pt2). SINGLE-SOURCE (hardening item 3): the reserved session-name is a
      `local` (local.convergence_writer_session_name) whose comment enumerates its 4 coupled sites -- trust
      StringEquals (main-sub), trust StringNotEquals (pr-sub), the aws:userid permission condition, and the drift
      workflow's role-session-name (a workflow literal that MUST equal the local's value). c3 (deploy merge): create aws_iam_role.github_ci_deploy (name
      agent-platform-github-ci-deploy, boundary-carrying, trust sub=refs/heads/main only) granting
      lambda:UpdateFunctionCode on function:agent-platform-* (Decision 129/144 pt2 prefix; covers all 8
      functions) and the UNION of the two deploy roles' S3 grants (DataLakeHeadBucket, LambdaPackagesReadWrite,
      DeployRecordWrite on deploy-records/ducklake/* AND deploy-records/prod/*, DucklakeBuildInputsRead); NO
      other lambda action, no iam:*, no terraform:*. DESTROY github_ci_plan, github_ci_drift,
      github_ci_ducklake_deploy, github_ci_prod_deploy and their role_policy resources. Update the
      IAMCIRolesRead resource list inside ci_full_refresh_read: remove the 4 retired role ARNs, add the 2 new
      (net -2). rec-2793: add a lifecycle precondition asserting length(<rendered policy json>) <= 10240 to the
      planner + deploy aws_iam_role_policy resources (DEP-01 anti-recurrence). ARNs stay ${var.account_id}-
      templated (Decision 101).
  - file: terraform/bootstrap/github_ci_apply.tf
    action: Modify
    purpose: >-
      Decision 98 pt2 read-grant reconcile: in the IAMRolesRead statement, remove the 4 retired CI role ARNs
      (agent-platform-github-ci-plan, -drift, -ducklake-deploy, -prod-deploy) and add the 2 new
      (agent-platform-github-ci-planner, -deploy) -- net -2 ARNs, so this bootstrap inline policy SHRINKS (helps
      the rec-2793 headroom). rec-2793 (the rec's cited file): add a lifecycle precondition asserting the
      github_ci_apply inline policy rendered length <= 10240 (hoist the jsonencode(...) to a local if needed for
      self-reference). ADMIN-APPLY-ONLY root (agent_platform_admin, out-of-band; never a CD path).
  - file: .github/workflows/terraform-apply-sandbox.yml
    action: Modify
    purpose: >-
      Repoint the speculative-plan job's role-to-assume from agent-platform-github-ci-plan to
      agent-platform-github-ci-planner, and set its configure-aws-credentials role-session-name to a NON-reserved
      value (must NOT equal the reserved drift session-name -- the planner pr-sub trust StringNotEquals enforces
      this, so a mismatch fails at assume time, loud). Update the bootstrap-window continue-on-error comment/gate
      to name the planner role. No other job changes.
  - file: .github/workflows/terraform-drift.yml
    action: Modify
    purpose: >-
      Repoint the drift job's role-to-assume from agent-platform-github-ci-drift to
      agent-platform-github-ci-planner AND set configure-aws-credentials role-session-name to the RESERVED drift
      session-name (identical string to the planner trust StringEquals and the ConvergenceRecordWrite aws:userid
      condition) -- this single assumption serves both the terraform plan (refresh-read/tfstate-read/.tflock) and
      the convergence-record write. Update the bootstrap-window continue-on-error comment/gate to name the
      planner role.
  - file: .github/workflows/deploy-ducklake-lambdas.yml
    action: Modify
    purpose: >-
      Repoint role-to-assume from agent-platform-github-ci-ducklake-deploy to agent-platform-github-ci-deploy.
      Reconcile the operator-owned provisioned-gate variable (DUCKLAKE_DEPLOY_ROLE_PROVISIONED) to the merged
      role's provisioning signal (rename to a shared DEPLOY_ROLE_PROVISIONED, or keep both vars pointing at the
      one role -- name the choice in the diff); update the fail-loud error string to the merged role name.
  - file: .github/workflows/deploy-prod-lambdas.yml
    action: Modify
    purpose: >-
      Repoint role-to-assume from agent-platform-github-ci-prod-deploy to agent-platform-github-ci-deploy.
      Reconcile the PROD_DEPLOY_ROLE_PROVISIONED provisioned-gate variable the same way as the ducklake deploy
      workflow (shared signal or both->one-role); update the fail-loud error string to the merged role name.
  - file: scripts/checks/iam_tf/_read_coverage.py
    action: Modify
    purpose: >-
      Decision 129 coverage-verifier lockstep: this module hard-codes _PLAN_ROLE_POLICY_NAME="github_ci_plan"
      and _DRIFT_ROLE_POLICY_NAME="github_ci_drift" (lines ~97-98) and resolves both oidc.tf policy docs.
      Collapse the plan+drift dual-resolution to a single planner role (github_ci_planner) whose refresh-read
      surface must cover github_ci_apply's -- the parity contract is unchanged, only the role identity is. Stays
      under 500 SLOC (currently 413; Decision 128 -- decompose if it would cross, never raise).
  - file: scripts/checks/iam_tf/validate_ci_refresh_read_coverage.py
    action: Modify
    purpose: >-
      Update the check's role references and the "could not resolve github_ci_plan/github_ci_drift role
      policies" failure text (lines ~45, ~86) to the single planner role. COUNT-COUPLING: the module docstring
      at ~line 44 ("refresh-read-covered in ALL THREE plan-capable role policies -- github_ci_apply / plan /
      drift") -> "BOTH ... -- github_ci_apply + planner" (the plan-capable set goes 3 -> 2). Behaviour (assert
      planner covers apply's refresh-read set) preserved. Currently 121 SLOC; stays well under 500.
  - file: tests/checks/iam_tf/test__read_coverage.py
    action: Modify
    purpose: >-
      Update the embedded fixture HCL blocks (resource/data "github_ci_plan"/"github_ci_drift") and any
      assertions to the planner role, keeping the coverage-parity and ARN-prefix-collision test intent
      (the agent-platform-github-ci-prod-deploy longer-ARN case at ~line 127 stays a valid prefix-collision
      fixture or is repointed to the deploy role). COUNT-COUPLING: line ~227 `assert set(result) ==
      {"plan","drift"}` -> `== {"planner"}`. Preserve every existing negative/positive assertion's meaning.
  - file: tests/checks/iam_tf/validate_ci_refresh_read_coverage/test_real_tree.py
    action: Modify
    purpose: >-
      Update the fixture HCL (github_ci_plan/github_ci_drift blocks) to the planner role so the real-tree
      end-to-end coverage assertion exercises the post-merge shape. COUNT-COUPLING: lines ~213-214
      `assert len(fn_findings) == 3` / `assert len(secret_findings) == 3` (apply, plan, drift) -> `== 2`
      (apply, planner).
  - file: tests/checks/iam_tf/validate_ci_refresh_read_coverage/test_end_to_end.py
    action: Modify
    purpose: >-
      Update the fixtures and the "could not resolve github_ci_plan/github_ci_drift role policies" assertion
      (~line 183) to the planner role. COUNT-COUPLING: line ~247 `assert len(failed) == 3  # apply, plan, drift`
      and ~322 `assert len(collide_findings) == 3 ... # apply, plan, drift` -> `== 2  # apply, planner`.
      Preserve the resolve-failure + prefix-collision negative tests (now keyed on the planner policy).
  - file: scripts/checks/iam_tf/validate_convergence_writer_isolation.py
    action: Create
    purpose: >-
      HUMAN-RATIFICATION HARDENING item 1 (the non-negotiable, Decision 92 pt2): a pure-Python JSON-SEMANTIC
      STANDING check in the iam_tf family (mirrors validate_invoke_implies_resolve.py -- regex-parse the
      github_ci_planner aws_iam_policy_document, resolve source_policy_documents, inspect each statement's
      actions/resources/condition). ASSERTS: (a) EVERY statement granting s3:PutObject on convergence/personal/*
      in the planner policy carries the aws:userid condition keyed to the reserved-session local, AND (b) NO
      unconditioned convergence-write Allow exists in the planner policy (closes the blind spot grep-presence
      cannot see -- a SECOND unconditioned Allow added alongside the good one); also assert the branch role
      retains DenyConvergenceRecordWrite and github_ci_pr stays read-only on convergence. @register-decorated;
      under 500 SLOC.
  - file: scripts/checks/registry.py
    action: Modify
    purpose: >-
      Register validate_convergence_writer_isolation in the ordered iam_tf tier sequences (both --pre and full
      tiers, alongside validate_boundary_attached / validate_invoke_implies_resolve /
      validate_ci_refresh_read_coverage) via `_c("validate_convergence_writer_isolation")`. +1 line; approx_sloc
      207, headroom 293 to 500.
  - file: scripts/validate.py
    action: Modify
    purpose: >-
      Add the required facade re-export `from scripts.checks.iam_tf.validate_convergence_writer_isolation import
      validate_convergence_writer_isolation  # noqa: F401,E402` (scripts/CLAUDE.md: dispatch is globals()[name],
      so without this line validate --pre KeyErrors on the check). +1 line; approx_sloc 422, headroom 78 -- no
      raise, no decompose.
  - file: tests/checks/iam_tf/test_validate_convergence_writer_isolation.py
    action: Create
    purpose: >-
      Unit tests for the semantic check (family match): POSITIVE (a planner policy with the aws:userid-conditioned
      convergence-write passes) + the load-bearing NEGATIVES that grep cannot catch (a SECOND, UNCONDITIONED
      convergence PutObject Allow FAILS; a conditioned-but-wrong-session-key FAILS; a missing branch
      DenyConvergenceRecordWrite FAILS). This test file is the node_id for VP-3's graduated test_selector row.
  - file: config/agent/verification_registry/registry.yaml
    action: Modify
    purpose: >-
      HARD FIX (c1 self-consistency): the graduated check `ducklake-deploy-role-defined` (~line 724) greps
      oidc.tf for the symbol `github_ci_ducklake_deploy` (grep_count >= 1) -- F retires that symbol, so the
      check would assert a NOW-FALSE invariant contradicting c1. SUPERSEDE it: remove the
      `ducklake-deploy-role-defined` entry (VP-4's new `deploy-role-updatefunctioncode-prefix` graduated check is
      its successor for the merged role). `deploy-ducklake-lambdas-workflow-present` (file_presence) stays valid
      (the workflow persists; only its assumed role changes). Also RECEIVES the new graduated-check rows for the
      graduate-disposition VP steps at implement time (graduation-completeness) -- including VP-3's test_selector
      row (primitive_slot: test_selector, node_id = the validate_convergence_writer_isolation test; 47
      test_selector precedents already exist).
  - file: terraform/CLAUDE.md
    action: Modify
    purpose: >-
      Re-ground the admin-create runbook (the IAMCIRolesRead / IAMRolesRead reconcile probe steps ~L218-224 and
      any prose enumerating the retired CI roles) to the post-merge role set (planner, deploy) so the next
      operator following it does not recreate the retired roles. Narrow edit -- role-name re-grounding only, no
      procedural rewrite beyond the merged names.
  - file: docs/contracts/deploy-paths.yaml
    action: Modify
    purpose: >-
      Live-surface re-ground (~line 36 status prose): the two governed-deploy channels name
      agent-platform-github-ci-ducklake-deploy and agent-platform-github-ci-prod-deploy and the
      DUCKLAKE_DEPLOY_ROLE_PROVISIONED / PROD_DEPLOY_ROLE_PROVISIONED variables -> the merged
      agent-platform-github-ci-deploy role and the reconciled provisioned-variable name(s). Contract text only;
      the intent->trigger->recovery index is unchanged.
  - file: docs/contracts/build-lambda.yaml
    action: Modify
    purpose: >-
      Live-surface re-ground: the deploy_channels governed_channel comments (~lines 92, 98) name the two
      retired deploy roles -> the merged agent-platform-github-ci-deploy role. UpdateFunctionCode-only shape
      description preserved.
  - file: src/data/handlers/CLAUDE.md
    action: Modify
    purpose: >-
      Live ambient-surface re-ground (~lines 19, 26): the prod-class deploy runbook names
      agent-platform-github-ci-prod-deploy -> agent-platform-github-ci-deploy (parity with the terraform/CLAUDE.md
      re-ground). Role-name only.
  - file: docs/PROJECT_CONTEXT.md
    action: Modify
    purpose: >-
      Live governance-surface re-ground: the IaC/convergence section names github_ci_plan (~line 333, the
      speculative-plan role) and lists "apply-path github_ci_plan / github_ci_apply / convergence-writer" (~line
      350). Re-ground github_ci_plan -> the dual-sub planner and note the planner now carries the fail-closed
      convergence-write (absorbing the drift "convergence-writer" leg). Description text only; no schema.
bundled_recommendations:
  - "rec-2793"
infrastructure_dependencies:
  - >-
    APPLY MODEL (Decision 77/92/126): terraform/personal/oidc.tf carries aws_iam_role CREATE (planner, deploy) +
    DESTROY (4 retired) + trust + inline-policy diffs -- ALL IAM-SENSITIVE. The deterministic guard
    (scripts/terraform_apply_guard.py) exits 2 on these (delete + trust + IAM classes) -> routed=true -> the
    change lands via the tf-gated-apply GitHub Environment (human approval at apply). The DEV /implement
    container CANNOT self-apply this; the saved-plan no-TOCTOU model applies (PR-time plan reviewed + persisted,
    applied verbatim at the gated merge job). This slice is authored APPLIES-NOTHING-IN-SESSION; the
    overseer/human batches the gated apply.
  - >-
    BOOTSTRAP root (terraform/bootstrap/github_ci_apply.tf): IAMRolesRead ARN swap + the rec-2793 byte-size
    precondition are ADMIN-APPLY-ONLY (agent_platform_admin, out-of-band). This root is never a CD/auto-apply
    path. It is a SEPARATE apply from the personal-root gated apply.
  - >-
    STAGED create-before-destroy ordering (avoids a refresh-read AccessDenied window): the merged roles must
    exist AND appear in BOTH refresh-read grant lists (oidc IAMCIRolesRead + bootstrap IAMRolesRead) before the
    retired roles are removed from the lists and destroyed. Recommended two-pass sequence the overseer/human
    runs: (pass 1) admin-apply bootstrap adding planner+deploy ARNs (superset, retired ARNs retained) + gated-
    apply personal creating planner+deploy, updating oidc IAMCIRolesRead to the superset, repointing the 4
    workflows; verify convergence green + drift/plan/deploy jobs assume cleanly; (pass 2) gated-apply personal
    destroying the 4 retired roles + shrinking oidc IAMCIRolesRead to new-only, then admin-apply bootstrap
    shrinking IAMRolesRead to new-only. The COMMITTED .tf is the END STATE (merged roles, new-only grants); the
    superset is a transient operator step, not a committed intermediate.
  - >-
    T2.48 c2 + VP-12: F's CreateRole for planner+deploy is the first gated-apply role-create AFTER slice E's
    inversion -- because both new roles DECLARE the mandatory boundary in HCL, the gated job's iam:CreateRole
    succeeds (E made new-role creation executable through the gated path, replacing the Decision 98
    admin-create-then-AccessDenied failure the audit observed at T2.24). The guard-BLOCK (exit 2) that routes F
    is the natural pending_gated legibility demonstration (VP-12).
  - >-
    CI-delegation (Decision 119/120): terraform/personal + terraform/bootstrap use the third-party kislerdm/neon
    provider (github.com egress-blocked in CC-web), so this plan runs NO local terraform init/validate/plan. Local
    terraform VP is grep + `terraform fmt -check` ONLY (fmt needs no provider install); terraform validate/plan is
    delegated to the required terraform-validate CI job + the speculative-plan job (authoritative verifiers).
  - >-
    No Lambda handler code change (Decision 79/125): scope touches no src/lambdas/** handler and no
    terraform/personal-managed Lambda source; the merged DEPLOY role's UpdateFunctionCode is its runtime purpose,
    not a code change in this slice. So Decision-79 per-Lambda build/deploy/smoke steps are NOT triggered and the
    terraform_personal_filemd5_coupled deploy channel (T2.38/T2.43) is unaffected. scripts/checks/iam_tf and the
    workflows are not Lambda-packaged (confirmed via lambda_manifest patterns).
  - >-
    SLICE E IS LIVE (overseer-confirmed, this session): T2.48's inversion was APPLIED in AWS -- the bootstrap
    github_ci_apply policy now carries IAMRoleCreateBounded/IAMRoleDeleteBounded (PR #698) and the 13 personal
    boundary attachments converged (both roots green). F's gated iam:CreateRole/DeleteRole authority is therefore
    LIVE. The roadmap T2.48 `status: not_started` is ONLY an un-flipped status field (a pending G3 edit,
    Status-Trusted-Never-Inferred) -- NOT a signal E is un-applied; do NOT block F on the roadmap status field.
  - >-
    PLANNER POLICY SIZE (rec-2793 / the critique's byte-overflow guard): the merged planner inline policy is the
    UNION of github_ci_plan + github_ci_drift's ~20-statement ci_full_refresh_read + the fail-closed
    ConvergenceRecordWrite -- SIZE IT EARLY (VP-7) against the 10,240 B inline limit (expected ~7-8.5 KB, since it
    lacks github_ci_apply's large write surface, so ~1.7-3 KB headroom). The rec-2793 lifecycle precondition is the
    apply-time safety net; VP-7 catches an overflow at implement time. FALLBACK if it overflows: move the
    drift-specific leg (ConvergenceRecordWrite + DuckLakeWriterInvoke + TfstateNativeLockFile) to a customer-MANAGED
    policy attached to the planner (separate from the inline aggregate), keeping convergence-write FAIL-CLOSED; or
    the census-16 separate-writer topology (re-ground c1 15->16 as a human-ratifiable roadmap edit).
acceptance_criteria:
  - >-
    T2.49 c1 (census): the live CI/deploy role set goes 7 -> 5 (apply, branch, pr, planner, deploy) and total
    live agent-platform-* + platform roles go 17 -> 15; the 4 retired roles (github_ci_plan, github_ci_drift,
    github_ci_ducklake_deploy, github_ci_prod_deploy) are absent from oidc.tf, both refresh-read grant lists, and
    ALL live enforcement/contract/ambient surfaces (workflows, actions, verification registry, deploy contracts,
    ambient CLAUDE.md, PROJECT_CONTEXT). Capability splits preserved and simulate-verified: github_ci_pr still
    reads NO tfstate; github_ci_apply is still the sole convergence-GREEN writer; the planner has
    tfstate-read+tfplan-write; the deploy role is UpdateFunctionCode-only.
  - >-
    T2.49 c2 (planner merge, FAIL-CLOSED convergence): plan+drift are one planner role trusting BOTH subs
    (pull_request + refs/pull/* AND refs/heads/main). Convergence-write is condition-scoped FAIL-CLOSED: an
    ALLOW on s3:PutObject convergence/personal/* conditioned on the reserved drift session identity (aws:userid),
    default-deny for every other session; and the pr-sub trust statement StringNotEquals the reserved session-name
    so a PR-context assumption structurally CANNOT obtain convergence-write (non-spoofable -- defeating it needs an
    IAM trust-policy change, itself guard-BLOCKed/gated). simulate-principal-policy proves ALLOW in the
    drift-session context and (implicit/explicit) DENY in a pr-typical session context (Decision 92 pt2).
  - >-
    T2.49 c3 (deploy merge): github_ci_ducklake_deploy + github_ci_prod_deploy are one github_ci_deploy role
    granting lambda:UpdateFunctionCode on function:agent-platform-* (covers all 8 functions) and NO other lambda
    action; the union S3 grants (lambda-packages RW, deploy-records/ducklake/* + /prod/* writes, build-input
    reads, head-bucket) are preserved; both deploy workflows assume it and their governed-deploy behaviour is
    unchanged.
  - >-
    rec-2793 (High, open): a Terraform lifecycle precondition asserting rendered-inline-policy byte length <=
    10240 is present on github_ci_apply's policy resource AND on the two new merged-role policy resources; F net
    SHRINKS github_ci_apply's policy (-2 ARNs) so its rendered size stays under the ceiling with reported
    headroom. rec-2793 is closed via the Resolves: trailer at squash-merge (Decision 84 portal path, never a
    direct cache edit).
  - >-
    c2 SEMANTIC ISOLATION (hardening item 1): validate_convergence_writer_isolation -- a standing validate.py
    check (registered in scripts/checks/registry.py + scripts/validate.py, runs every --pre; graduated via
    test_selector) -- asserts EVERY convergence/personal/* PutObject Allow in github_ci_planner carries the
    aws:userid condition keyed to the reserved-session local AND that NO unconditioned convergence-write Allow
    exists (plus branch DenyConvergenceRecordWrite intact, pr read-only). Its NEGATIVE unit fixtures (a 2nd
    unconditioned Allow; a wrong-session-key) FAIL the check -- proving it catches the blind spot grep-presence
    misses. This is the real control for the permission-side condition, which auto-applies (in-budget) rather
    than routing to the human gate.
  - >-
    Decision 129 coverage verifier stays GREEN post-merge: _read_coverage.py + validate_ci_refresh_read_coverage.py
    are updated to the single planner role, their unit tests pass, and validate_ci_refresh_read_coverage +
    validate_boundary_attached + validate_authority_budget all pass in `bin/venv-python -m scripts.validate --pre`
    (exit 0). The new roles carry the mandatory boundary (validate_boundary_attached, regex-based, auto-covers
    them).
  - "Local presubmit stays green: bin/venv-python -m scripts.validate --pre exits 0 (ruff/mypy/schema/sloc/graduation-completeness/vp-replay)."
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      c1/c3 REPO-WIDE surface-retiring sweep across LIVE surfaces -- the four retired role names appear 0 times in
      any enforcement/config/contract/ambient-doc surface: .github/workflows, .github/actions, the two governed
      deploy contracts (deploy-paths.yaml, build-lambda.yaml), the verification registry, terraform/CLAUDE.md,
      src/data/handlers/CLAUDE.md, and PROJECT_CONTEXT.md. (Grandfathered narrative -- historical docs/plans/*.yaml,
      completed ROADMAP tier_item text, DECISIONS.md, audits/ -- is deliberately EXCLUDED; those legitimately name
      the retired roles as history.)
    command: >-
      targets=".github/workflows .github/actions docs/contracts/deploy-paths.yaml docs/contracts/build-lambda.yaml
      config/agent/verification_registry/registry.yaml terraform/CLAUDE.md src/data/handlers/CLAUDE.md
      docs/PROJECT_CONTEXT.md"; hits=$(grep -REc
      'agent-platform-github-ci-(plan|drift|ducklake-deploy|prod-deploy)\b' $targets 2>/dev/null | awk -F:
      '{s+=$2} END{print s+0}'); echo "retired_role_refs_live=$hits"; [ "$hits" -eq 0 ]
    expected: "retired_role_refs_live=0 ; exit 0 (no live enforcement/contract/ambient surface names a retired role)."
    fix_if: >-
      hits>0 -- a live surface still names a retired role; repoint it to agent-platform-github-ci-planner (plan/
      drift) or agent-platform-github-ci-deploy (ducklake/prod deploy). Comments must name the merged role, not
      the retired full name. (The \b anchor excludes -planner/-deploy from matching.)
    hermetic: true
    graduation: graduate
    graduation_check_id: "no-retired-ci-role-in-live-surfaces"
  - step: 2
    phase: pre-deploy
    action: >-
      c2 -- the planner role exists with a DUAL-SUB trust and a session-name partition: its assume_role_policy
      references BOTH the pull_request sub and the refs/heads/main sub, and carries an sts:RoleSessionName
      condition (the fail-closed discriminator).
    command: >-
      f=terraform/personal/oidc.tf; def=$(grep -c 'resource "aws_iam_role" "github_ci_planner"' "$f"); prsub=$(grep
      -c 'pull_request' "$f"); mainsub=$(grep -c 'refs/heads/main' "$f"); sess=$(grep -c 'sts:RoleSessionName'
      "$f"); echo "planner=$def pr_sub=$prsub main_sub=$mainsub session_cond=$sess"; [ "$def" -ge 1 ] && [
      "$sess" -ge 2 ] && [ "$prsub" -ge 1 ] && [ "$mainsub" -ge 1 ]
    expected: "planner>=1, session_cond>=2 (StringEquals on main stmt + StringNotEquals on pr stmt), both subs present; exit 0."
    fix_if: >-
      planner=0 -- the merged role is not defined. session_cond<2 -- the trust is missing the RoleSessionName
      partition (main-sub StringEquals reserved + pr-sub StringNotEquals reserved) that makes convergence-write
      non-spoofable.
    hermetic: true
    graduation: graduate
