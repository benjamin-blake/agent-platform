rollback: >-
  The committed edits (.tf / .yml / .py / .md) are revertable by `git revert` with ZERO infra effect until a
  gated apply is approved. Because F is authored applies-nothing-in-session, reverting the PR before any gated
  apply leaves the live roles untouched. If a gated apply has landed and a regression surfaces, roll forward
  (Decision 55) through the same gated path: re-create the retired roles' capabilities on the merged roles or
  re-apply the prior role definitions via a fresh gated apply -- never an out-of-band admin edit. The staged
  create-before-destroy ordering means a failed pass 2 leaves the (working) superset state, which is safe to
  hold until the destroy is retried.
