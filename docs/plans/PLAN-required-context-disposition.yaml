  - "VP hermetic marking: this is a plan-only PR (implementation lands in a separate /implement PR), so every acceptance-style VP step asserts post-implementation state that is false on the plan-only tree. All pre-deploy steps are marked hermetic: false and are therefore correctly EXCLUDED from validate_vp_replay (reason not-hermetic) while still carrying VF-05 graduation dispositions. Three steps graduate to standing kernel guards: skills-required-context-count-eq-0, run-skill-parse-required-context-count-eq-0, test-run-skill-context-injection."
  - "Retire is CI-safe (verified): no validator reads instruction-architecture.yaml's anti_patterns list or enforces required-context presence (grep-negative across scripts/checks/ + prompt_compliance.py); validate_instruction_architecture_layers only checks that layer content_locations resolve to files, and validate_prompt_compliance checks the machine-readable behavioural-invariant blocks -- neither is touched by the retire. No test imports parse_required_context."
  - "Coverage gate (verified): scripts/agent_development/run_skill.py is coverage-UNMAPPED -- map_source_to_test() in scripts/test_coverage_checker.py returns None for it (agent_development is not one of the five whitelisted nested subpackages ci_rca/session/sync/roadmap/llm; same treatment as scripts/executor/**), so validate_test_coverage skips it (both check_test_file_exists and check_per_file_coverage short-circuit on a None mapping). The run_skill.py change therefore carries NO 100%-per-file-coverage obligation; tests/test_run_skill.py is added for V2 rigor (resolve_context_paths real-path coverage + parse_required_context-removed regression guard), not to satisfy the coverage gate."
