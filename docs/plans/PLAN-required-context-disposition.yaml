  - "No rescue agents or workaround loops (Decision 55); the develop-executor Step 2 edit preserves the Step-4 stop-cleanly / no-inline-repair invariant."
  - "Public repo (Decision 101): no AWS account IDs, ARNs, ExternalIds, credentials, internal hostnames, or trading alpha in any edit."
  - "Do NOT create a new numbered Decision -- this is a truthful-contract edit (decision-scout CLEAN; Decision 86). Do NOT chase contract re-ratification: instruction-architecture.yaml has no class: field, so validate_contract_drift ignores it."
  - "Do NOT disturb the Decision-127 'Human runbook / operator-prose doc' anti-pattern row (or any other row) in instruction-architecture.yaml."
  - "rec-568 closes ONLY via the ops portal (--update-rec) or the Resolves: squash-merge trailer -- never a direct JSONL write (Decision 84 Single Portal Invariant)."
  - "rec-568 is SUPERSEDED, not fixed: do NOT add a --target-optional code path to run_skill.py (its code-review consumer is dead; adding dead code violates no-gold-plating / the SLOC decompose ethos)."
  - "run_skill.py stays under its 500-SLOC default budget (currently 137 SLOC; the change nets a decrease)."
context:
