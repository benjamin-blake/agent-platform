  - "gates: decision-scout=CLEAN (CITE-only, no WARN/BLOCK, orchestrator-dispatched pre-plan); plan-critique=PROCEED after 1 round (run inline via the Skill tool per the /overseer dispatch, which forbids async Agent sub-dispatch in this harness)."
  - "CI-RCA HARD-BLOCK deferral (planning preflight): one unresolved ci-rca rec is open at authoring time -- rec-2762 (Critical: PLAN-ducklake-maintenance-smoke-split.yaml carries 5 malformed closes_criteria refs, a plan-schema regression in an unrelated DuckLake plan). This ACG-02 plan is unrelated by all three Related-Work tests (different file; no shared Decision; different failure category -- closes_criteria schema vs required-context primitive retirement). Deferred per the Related-Work deferral allowance; rec-2762 is owned by its own ci-rca remediation and must not be inline-patched here (Decision 55/72)."
  - "rec-568 disposition = SUPERSEDE (not fix). rec-568 asks to (1) make run_skill.py --target optional and (2) fix the implement skill's code-review-via-run_skill call. But implement/SKILL.md:163,183 already dispatch code-review via the Agent tool + Skill (explicitly NOT run_skill.py), and the executor is frozen (Decision 67), so the code-review-via-run_skill path rec-568 targets is dead. This plan reduces run_skill.py to the executor-rca harness (single --target transcript + explicit --context) where --target is legitimately required; rec-568's fix is moot. Close as superseded via Resolves: rec-568."
  - "Scope note: .claude/commands/plan.md was folded in beyond the audit's six named RETIRE targets after tree verification -- plan.md:97 uses the retired term 'required-context files' to describe the planning-skill Critique-Gate section being rewritten; reworded to 'context files' so the term leaves every live interactive surface (audit ACG-02 acceptance is scoped to .claude/skills/, but a clean retire removes the live Layer-3 reference too)."
  - "contract_version bumped 1 -> 2 to mark the required-context retirement; NO re-ratification and NO new Decision (decision-scout CLEAN; a truthful-contract edit needs neither -- Decision 86). status/ratified_at/ratified_via are left as-is (the contract's structural ratification stands)."
