schema_version: 1
slug: "terraform-deploy-governance-anchor"
intent: >-
  Record the terraform-deploy audit's allow-list INVERSION as the target deploy/IAM model in one
  citable forward-direction Decision (before realization, Decision 126 precedent), and register the
  audit's remaining findings as tier_items -- so the follow-on engineering has one fixed point to
  build toward instead of each landing its own ad hoc framing. Unblocks routine autonomous
  infrastructure change (the deployment treadmill the audit traced), a direct North-Star enabler.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-terraform-deploy-governance-anchor.yaml
phase: >-
  Platform tier T2 (agent-native Terraform CD hardening). Governance-anchor response to
  audits/terraform-deploy-redesign-b67955b.yaml: authors Decision 144 (forward-direction anchor)
  + Decision 145 (arbitrary stopgap raise of the DECISIONS.md byte ceiling) + tier_items T2.44-T2.50.
scope:
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      (1) Author ONE new forward-direction Decision (target number 144; re-verify max header at
      write time) adopting the allow-list inversion as the target deploy/IAM model; it explicitly
      amends Decision 98 point 1 and Decision 92 point 5, extends Decision 129's per-service prefix
      pattern from reads to writes, excludes PlatformAdmin from boundary attachment, and retains
      Decisions 77 and 101 untouched. No edits to the Decision 98/92 body text (forward-direction
      amendments are stated only in the amending decision, per the Decision 126/143 precedent).
      (2) Author a SECOND, standalone Decision (target number 145 -- the next free number after the
      anchor) that records an ARBITRARY, TEMPORARY raise of the DECISIONS.md live byte ceiling from
      400,000 to 500,000 as a stopgap, explicitly amends Decision 134 clause 2 (the clause that set
      the 400,000 ceiling), and CITES the open, unactioned structural-fix audit
      audits/decision-consolidation-growth-f79d6b5.yaml (findings DCG-01/DCG-02/DCG-05) as the real
      remedy this only tides over. The file sits at 398,438 / 400,000 bytes today, so the two new
      Decisions cannot land as pure additions under the old ceiling; the raise (not compaction) is
      the sanctioned relief. No edits to the Decision 134 body text (same forward-direction
      amendment convention).
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Register 7 new tier_items T2.44-T2.50 immediately after T2.43 (mapping DEP-04/09/13, DEP-06,
      DEP-07/08, DEP-10/11, DEP-01/02, DEP-12, DEP-05) and add a progress_note to T2.42 recording
      that it already carries DEP-03 (no new tier_item for DEP-03). T2.48 additionally carries a
      recurring-measured-review criterion (c6) for the per-change-class incident-free auto-apply
      track record (Finding 2; keeps the widen-on-track-record model from stalling at v2).
  - file: scripts/checks/decisions/validate_decisions_size.py
    action: Modify
    purpose: >-
      Raise the live-byte ceiling constant _DECISIONS_LIVE_MAX_BYTES from 400_000 to 500_000 (the
      arbitrary stopgap Decision 145 records), add an inline provenance comment on the constant
      citing Decision 145 + the decision-consolidation-growth audit, and update the module
      docstring / FAIL-message Decision citation to name the amendment. _DECISIONS_LIVE_MAX_H2 (120)
      and _DECISIONS_COMBINED_MAX_BYTES (700_000) are UNCHANGED (live headers go 103 -> 105; combined
      stays well under 700,000). No raise-marker guard exists for this ceiling (unlike SLOC's
      validate_sloc_budget_raises + config/sloc_budgets.yaml), so the raise is a plain constant edit
      recorded durably in Decision 145 + git. The sibling test
      tests/checks/decisions/test_validate_decisions_size.py keys every assertion off the IMPORTED
      constant (no hardcoded 400_000), so validate --pre and the size-check tests pass automatically
      under the raise; its line-64 "(400_000)" comment becomes stale-but-non-blocking (implementer
      MAY refresh it in the same touch -- cosmetic).
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    docs/DECISIONS.md contains a new forward-direction Decision whose body (a) adopts the allow-list
    inversion as the target "broad-but-bounded deployer under the mandatory permissions boundary"
    model with the guard + authority budget classifying danger, (b) extends Decision 129's
    per-service agent-platform-* prefix from the READ axis to the WRITE axis, (c) EXPLICITLY amends
    Decision 98 point 1 (pipeline MAY mint boundary-carrying agent-platform-* roles via the gated
    path; admin-create retained for non-prefixed/bootstrap roles), (d) EXPLICITLY amends Decision 92
    point 5 (authority-budget v2: create+update of inline policies/attachments on any
    boundary-carrying agent-platform-* role in-budget; role-create stays gated but becomes
    executable), (e) EXPLICITLY excludes PlatformAdmin from boundary attachment (control identity,
    audit spec 3.3), and (f) retains Decisions 77 and 101 untouched.
  - >-
    The Decision is framed forward-direction (records the target model before realization; a plain
    "## Decision NNN:" header, NOT a Decision-105 "state: ratified" candidate-CD shape) and carries
    the Decision 126 section template: Status / Date / Warehouse ID / Problem / Decision (numbered) /
    Reversal conditions / Rationale / Related.
  - >-
    The Decision routes ENFORCEMENT to the realizing tier_item, not to its own body: it records
    target + rationale only and states the guard-classification + IAMRoleWriteBounded/
    IAMRoleCreateBounded change lands in environment-taxonomy.md + authority_budget.json at T2.48
    (Decision 92 pt5 sole-SoT; Decision 86 no-drift). Its Related section cites Decisions 129, 98,
    92, 77, 101, 126, 143, 94, 113, 83, 100/75, 105, 35, 55/72, 84 and characterizes Decision 143 as
    COMPLEMENTARY -- role-create staying gated-via-the-Environment preserves 143's "materially higher
    bar than an in-handler edit" durability property.
  - >-
    docs/ROADMAP-PLATFORM.yaml gains 7 new tier_items T2.44-T2.50 mapping every remaining audit
    finding, with T2.48 (the inversion) citing the new Decision, T2.48 depends_on [T2.45], T2.47
    depends_on [T2.46], and T2.49 + T2.50 each depends_on [T2.48].
  - >-
    docs/ROADMAP-PLATFORM.yaml's T2.42 carries a progress_note recording that it already owns audit
    finding DEP-03 (spurious layer-replace routing); no new tier_item is created for DEP-03.
  - >-
    Both new Decisions' text and the tier_items contain no AWS account IDs, ARNs, or ExternalId VALUES
    (Decision 101 public-content boundary): roles are named by logical name, resources by prefix.
  - >-
    docs/DECISIONS.md contains a SECOND new standalone Decision (target 145) that (a) states plainly
    the byte-ceiling raise is an ARBITRARY, TEMPORARY stopgap, (b) EXPLICITLY amends Decision 134
    clause 2 (the 400,000-byte ceiling clause) to a 500,000-byte ceiling, (c) CITES the open,
    unactioned audits/decision-consolidation-growth-f79d6b5.yaml (DCG-01/DCG-02/DCG-05) as the
    structural fix it only tides over, and (d) carries reversal conditions retiring/lowering the
    ceiling once that structural mechanism lands or the scout moves to a portal read. Forward-direction
    plain header (not a Decision-105 CD shape); no edit to the Decision 134 body.
  - >-
    scripts/checks/decisions/validate_decisions_size.py has _DECISIONS_LIVE_MAX_BYTES = 500_000
    (raised from 400_000) with an inline comment citing Decision 145 + the decision-consolidation-growth
    audit, and _DECISIONS_LIVE_MAX_H2 (120) and _DECISIONS_COMBINED_MAX_BYTES (700_000) unchanged;
    docs/DECISIONS.md stays under the raised 500,000-byte live ceiling with BOTH new Decisions (144 +
    145) added (no compaction of any superseded body occurs), and the live header count stays under 120.
  - >-
    bin/venv-python -m scripts.validate --pre exits 0 on the implementation branch
    (validate_decisions_size, validate_platform_roadmap referential integrity, DECISIONS.md
    structure, and plan schema all green).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      The new Decision exists and carries the inversion target model plus the two explicit
      amendments and the Decision-129 read->write extension.
    command: >-
      awk '/^## Decision [0-9]+: .*[Ii]nversion/{f=1} f{print} /^---$/{if(f)exit}' docs/DECISIONS.md
      > /tmp/dec144.txt && test -s /tmp/dec144.txt && head -1 /tmp/dec144.txt && grep -q 'amends
      Decision 98 point 1' /tmp/dec144.txt && grep -q 'Decision 92 point 5' /tmp/dec144.txt && grep
      -qE 'Decision 129' /tmp/dec144.txt && grep -qi 'broad-but-bounded' /tmp/dec144.txt && grep -qiE
      'per-service|prefix' /tmp/dec144.txt
    expected: >-
      Prints the new Decision header (title contains "inversion") and exits 0 -- the block names the
      98-point-1 and 92-point-5 amendments, cites Decision 129, and states the broad-but-bounded
      per-service-prefix target model.
    fix_if: >-
      The Decision header/title is missing, the amendment phrases are absent, or Decision 129 / the
      prefix model is not referenced -- author the Decision body per execution step 2.
    hermetic: false
    graduation: not-applicable
  - step: 2
    phase: pre-deploy
    action: >-
      The Decision is forward-direction (plain header, not a CD shape), EXCLUDES PlatformAdmin from
      the boundary, RETAINS Decisions 77 and 101 untouched, and routes enforcement to T2.48.
    command: >-
      grep -qiE 'forward-direction|before realization|not a candidate CD|not a Decision 105'
      /tmp/dec144.txt && grep -qE 'PlatformAdmin' /tmp/dec144.txt && grep -qi 'exclud' /tmp/dec144.txt
      && grep -qE 'Decision 77' /tmp/dec144.txt && grep -qE 'Decision 101' /tmp/dec144.txt && grep
      -qiE 'retain|untouched' /tmp/dec144.txt && grep -qE 'T2\.48' /tmp/dec144.txt && ! grep -qE
      '^state: ratified' /tmp/dec144.txt
    expected: >-
      Exit 0 -- the block is framed forward-direction (no "state: ratified"), states PlatformAdmin is
      excluded from boundary attachment, marks Decisions 77/101 retained, and points enforcement at
      T2.48.
    fix_if: >-
      Any of the forward-direction framing, the PlatformAdmin exclusion, the 77/101 retention, or the
      T2.48 enforcement-routing is missing -- add it per execution step 2.
    hermetic: false
    graduation: not-applicable
  - step: 3
    phase: pre-deploy
    action: All 7 new tier_items T2.44 through T2.50 exist in the roadmap.
    command: >-
      for i in 44 45 46 47 48 49 50; do grep -qE "^  - id: \"?T2\.$i\"?" docs/ROADMAP-PLATFORM.yaml ||
      { echo "MISSING T2.$i"; exit 1; }; done && echo "all 7 present"
    expected: Prints "all 7 present" and exits 0.
    fix_if: >-
      A T2.4x id is missing (or a number collided with a concurrently-merged item) -- add the missing
      tier_item, or renumber the whole block to the next free contiguous range and update
      cross-references.
    hermetic: false
    graduation: not-applicable
  - step: 4
    phase: pre-deploy
    action: >-
      The tier-item dependency wiring is correct and the inversion cites the new Decision.
    command: >-
      bin/venv-python -c "import yaml; d=yaml.safe_load(open('docs/ROADMAP-PLATFORM.yaml'));
      t={i['id']:i for i in d['tier_items'] if i['id'] in
      {'T2.45','T2.46','T2.47','T2.48','T2.49','T2.50'}};
      assert t['T2.48']['depends_on']==['T2.45'], t['T2.48']['depends_on'];
      assert t['T2.47']['depends_on']==['T2.46'], t['T2.47']['depends_on'];
      assert t['T2.49']['depends_on']==['T2.48'], t['T2.49']['depends_on'];
      assert t['T2.50']['depends_on']==['T2.48'], t['T2.50']['depends_on'];
      assert 144 in t['T2.48']['related_decisions'], t['T2.48']['related_decisions'];
      print('deps OK')"
    expected: Prints "deps OK" -- all four depends_on edges are exactly as specified and T2.48 cites Decision 144.
    fix_if: >-
      An assertion fails -- correct the depends_on list or related_decisions on the named item to
      match the plan's sequencing (guard-before-widening; consolidation/channel after the inversion).
    hermetic: false
    graduation: not-applicable
  - step: 5
    phase: pre-deploy
    action: T2.42 carries a note that it already owns audit finding DEP-03, and no separate DEP-03 tier_item exists.
    command: >-
      awk '/^  - id: "?T2\.42"?/{f=1} f{print} /^  - id: "?T2\.43"?/{exit}' docs/ROADMAP-PLATFORM.yaml
      | grep -qE 'DEP-03' && echo "T2.42 carries DEP-03"
    expected: Prints "T2.42 carries DEP-03" and exits 0.
    fix_if: The DEP-03 note is missing from T2.42 -- add the progress_note per execution step 4.
    hermetic: false
    graduation: not-applicable
  - step: 6
    phase: pre-deploy
    action: >-
      Public-content boundary (Decision 101): the new Decision block carries no AWS account ID or
      account-scoped ARN.
    command: >-
      ! grep -qE 'arn:aws:[a-z0-9-]*:[a-z0-9-]*:[0-9]{12}|(^|[^0-9])[0-9]{12}([^0-9]|$)' /tmp/dec144.txt
    expected: >-
      Exit 0 -- no 12-digit account id and no account-scoped ARN appear in the Decision block (roles
      are named logically, resources by prefix). ExternalId VALUES are additionally caught by the
      pre-commit never-commit hook.
    fix_if: >-
      A 12-digit account id or an account-bearing ARN appears -- replace it with the logical role name
      or the agent-platform-* prefix pattern (Decision 101).
    hermetic: false
    graduation: not-applicable
  - step: 7
    phase: pre-deploy
    action: >-
      The stopgap Decision (target 145) exists, states the raise is arbitrary/temporary, amends
      Decision 134 clause 2, and cites the decision-consolidation-growth audit as the structural fix.
    command: >-
      awk '/^## Decision [0-9]+: .*[Ss]topgap/{f=1} /^## Decision [0-9]+: .*byte ceiling/{f=1} f{print}
      /^---$/{if(f)exit}' docs/DECISIONS.md > /tmp/dec145.txt && test -s /tmp/dec145.txt && head -1
      /tmp/dec145.txt && grep -qi 'arbitrary' /tmp/dec145.txt && grep -qiE 'temporary|stopgap'
      /tmp/dec145.txt && grep -q 'Decision 134' /tmp/dec145.txt && grep -q
      'decision-consolidation-growth-f79d6b5' /tmp/dec145.txt && grep -qE '500,?000' /tmp/dec145.txt
    expected: >-
      Prints the stopgap Decision header and exits 0 -- the block calls the raise arbitrary and
      temporary, amends Decision 134 (clause 2), cites audits/decision-consolidation-growth-f79d6b5.yaml,
      and names the 500,000 ceiling.
    fix_if: >-
      The header is missing, the arbitrary/temporary framing is absent, Decision 134 is not amended, or
      the audit is not cited -- author the stopgap Decision per the DECISION-145 reference block.
    hermetic: false
    graduation: not-applicable
  - step: 8
    phase: pre-deploy
    action: >-
      The byte-limit constant is raised to 500_000 (with the Decision-145 provenance comment) and
      docs/DECISIONS.md stays under the raised ceiling with BOTH new Decisions added; no superseded
      body was compacted; live headers stay under 120.
    command: >-
      grep -qE '_DECISIONS_LIVE_MAX_BYTES = 500_000' scripts/checks/decisions/validate_decisions_size.py
      && grep -qiE 'decision.?145|decision-consolidation-growth'
      scripts/checks/decisions/validate_decisions_size.py && B=$(wc -c < docs/DECISIONS.md) && echo
      "live bytes: $B" && [ "$B" -le 500000 ] && H=$(grep -cE '^## Decision [0-9]+:' docs/DECISIONS.md)
      && echo "live headers: $H" && [ "$H" -le 120 ]
    expected: >-
      Exit 0 -- the constant reads 500_000 and carries the Decision-145 provenance citation; live bytes
      are at or under 500,000 (both Decisions 144 + 145 present, no compaction); live headers stay <= 120.
    fix_if: >-
      The constant is not 500_000 / lacks the provenance comment -- edit validate_decisions_size.py per
      execution step 1. If live bytes exceed 500,000 or headers exceed 120, tighten the two new Decision
      bodies (do NOT compact superseded bodies -- that path is out of scope this PR).
    hermetic: false
    graduation: not-applicable
  - step: 9
    phase: pre-deploy
    action: The full presubmit passes (size governance under the raised ceiling + roadmap referential integrity + DECISIONS.md structure + plan schema).
    command: bin/venv-python -m scripts.validate --pre
    expected: >-
      Exit 0 -- validate_decisions_size passes under the raised 500,000-byte ceiling with both new
      Decisions present, validate_platform_roadmap (related_decisions [144] and the new depends_on
      edges all resolve), the DECISIONS.md structure checks, and the plan-document schema all pass.
    fix_if: >-
      A --pre check fails -- read the failing check name and fix the cited file (a size-ceiling
      breach, a dangling related_decisions/depends_on ref, a malformed Decision header, or a schema
      violation).
    hermetic: false
    graduation: not-applicable
  - step: 10
    phase: pre-deploy
    action: >-
      V2 substantiation: sibling unit test for the byte-ceiling check passes under the raised
      constant.
    command: bin/venv-python -m pytest tests/checks/decisions/test_validate_decisions_size.py
    expected: >-
      Exit 0 -- the test keys off the imported constant, so it passes under the raised limit.
    fix_if: >-
      The test fails -- check whether it hardcodes the old 400_000 value instead of importing
      _DECISIONS_LIVE_MAX_BYTES (out of this plan's file scope; escalate rather than inline-patch),
      or whether the raised constant/provenance comment in validate_decisions_size.py is malformed.
    hermetic: false
    graduation: not-applicable
constraints:
  - >-
    Files strictly in scope: docs/DECISIONS.md, docs/ROADMAP-PLATFORM.yaml, and
    scripts/checks/decisions/validate_decisions_size.py ONLY. (The sibling test
    tests/checks/decisions/test_validate_decisions_size.py needs no functional change -- it keys off
    the imported constant; an optional stale-comment refresh on its line 64 is cosmetic.)
  - "audits/terraform-deploy-redesign-b67955b.yaml is READ-ONLY input -- do not edit it."
  - >-
    IMPLEMENTATION plan; no recommendations filed (STRATEGIC plans suspended per AGENTS.md;
    executor frozen per Decision 67).
  - >-
    Decision 101 public-content boundary: name roles by logical name and resources by the
    agent-platform-* / ducklake-* prefix pattern -- never an AWS account id, ARN, or ExternalId value.
  - >-
    Forward-direction amendment convention (Decision 126/143 precedent): state the amendments to
    Decision 98 point 1 and Decision 92 point 5 ONLY in the new Decision's text; do NOT add inline
    "Amended by" back-markers to the Decision 98/92 body (their v1 model stays authoritative until
    T2.48 realizes the inversion -- an inline marker would misleadingly imply the model already
    changed). Decision 144 is a plain "## Decision NNN:" header, NOT a Decision-105 "state: ratified"
    CD entry.
  - >-
    Decision-134 size ceiling (HARD, RAISED by the stopgap): docs/DECISIONS.md is 398,438 / 400,000
    bytes today (~1,562 B headroom), so the two new Decisions (144 anchor ~6-10 KB + 145 stopgap
    ~3-6 KB) cannot land as pure additions under the OLD ceiling. HUMAN-DISPOSED RELIEF (this PR):
    raise the ceiling, do NOT compact. Change _DECISIONS_LIVE_MAX_BYTES from 400_000 to 500_000 in
    scripts/checks/decisions/validate_decisions_size.py, recorded as its own reversal-conditioned
    Decision 145. BYTE MATH: 398,438 + ~15 KB (both Decisions) ~= 413 KB, leaving ~87 KB headroom
    under 500,000; combined live+archive ~= 507 KB stays under the 700,000 backstop; live headers go
    103 -> 105, under the 120 ceiling. No superseded body is compacted, no DPI-04 victim-selection is
    performed, and docs/DECISIONS_ARCHIVE.md is NOT touched. The 500,000-byte ceiling still fits the
    decision-scout's whole-live-file read within the 200k-token window (~125k tokens < 200k), so
    Decision 134's bridge-guard protected-consumer assumption still holds.
  - >-
    The raise is a CONSCIOUS, CITED, TEMPORARY stopgap -- not the fix and not a routine act. The
    structural/architectural remedy is authored and unactioned in
    audits/decision-consolidation-growth-f79d6b5.yaml (DCG-01 near-term relief sweep, DCG-02
    number-preserving compact-to-stub + archival lifecycle, DCG-05 explicit significance gate on
    inflow; all dedup_hit_count 0, unowned). Decision 145 MUST cite that audit and state the raise
    tides over only until the mechanism is built. Per Decision 128 / decision-entry.yaml a ceiling
    raise silently trades away the read-cost/portability guard, so it must be loud + Decision-cited
    (this constraint), never a frictionless constant edit. validate_decisions_size carries NO
    raise-marker guard (contrast validate_sloc_budget_raises + config/sloc_budgets.yaml's
    "# raise-approved: dec-NNN"), so no marker is added; the durable record is Decision 145 + the
    inline provenance comment + git history.
  - No rescue agents or workaround loops (Decision 55). No warehouse write during planning.
  - >-
    Numbering race: re-verify the max "## Decision NNN:" header at implement time -- a concurrent PR
    may have claimed 144. The anchor takes the next free number and the stopgap takes anchor+1 (target
    144 + 145). If they shift, update every cross-reference (tier-item related_decisions incl. T2.48's
    [144,...], the T2.42 note, the Decision-145 amends-Decision-134 text, and the inline provenance
    comment in validate_decisions_size.py). The VP greps key off the titles ("inversion" / "stopgap" /
    "byte ceiling"), not the numbers.
context:
  - >-
    Anchors the response to audits/terraform-deploy-redesign-b67955b.yaml (13 findings DEP-01..DEP-13;
    highest-leverage change DEP-02; verdict "adequate, one inversion away from strong"). The audit's
    Q7 blueprint sequences Phase 0 (DEP-04/09/13/07) -> Phase 1 (T2.42 / DEP-03/08) -> Phase 2 (the
    inversion, DEP-01/02, amends 98 pt1 + 92 pt5) -> Phase 3 (DEP-05) -> Phase 4 (conditional, at
    Decision 77's live_full trigger).
  - >-
    Decision 126 is the forward-direction precedent: record the target deployment model in one
    citable Decision BEFORE realization, route rationale to the Decision and forward intent to
    tier_items (Decision 86), and do NOT use the Decision-105 CD-ratification lane (the model is not
    realized end-to-end).
  - >-
    Decision 129 is the in-repo natural experiment this extends: its per-service agent-platform-*
    prefix ended a 15+-recurrence READ-axis class and deliberately left the WRITE axis enumerated;
    Decision 129 point 3 already established that resource-axis grants sit outside the IAM-write
    authority budget. The new Decision inherits Decision 129's reversal condition (re-narrow on a
    non-agent-platform-* resource or an over-grant incident).
  - >-
    Decision 143 (2026-07-20, post-dates the audit's b67955b base) scopes identities by worst
    reachable verb via resource-shape boundaries and leans on "role CREATE requires a human-gated
    apply" as a durability property. The new Decision is complementary: it makes the boundary
    mandatory on exec roles too, and role-create staying GATED (via the tf-gated-apply Environment,
    now executable rather than admin-only) preserves Decision 143's "materially higher bar than an
    in-handler edit". 143's own "requires agent_platform_admin" exec-role-CREATE text is re-grounded
    when T2.48 lands (noted in T2.48's intent).
  - >-
    Main was 0 commits behind origin/main at planning time (preflight main_freshness). Preflight:
    creds ok, ops_outbox empty, ci_rca_unresolved_recs empty (rec-2762 is a resolved-class ci-rca
    rec on an unrelated plan file -- no HARD BLOCK). open_recs 786 (individual review suspended,
    Decision 73).
  - >-
    Extra depends_on edges beyond the tasking's explicit T2.49->T2.48: T2.48->T2.45 (guard must
    classify resource-based policies before the write surface broadens -- DEP-06 must land no later
    than the Phase-2 widening) and T2.47->T2.46 (DEP-10 is cheapest after the DEP-08 consolidation).
    Both are audit-faithful sequencing; concurred by plan-critique.
  - >-
    DECISION-134 BLOCK -> RESOLVED BY HUMAN DISPOSITION (raise, not compact): docs/DECISIONS.md is at
    398,438/400,000 bytes, so the anchor + stopgap cannot be pure additions under the old ceiling.
    The plan-critique REVISE finding flagged the prior compaction approach's human-disposition fork;
    the human decided to ARBITRARILY RAISE the ceiling (400,000 -> 500,000) as a stopgap, recorded as
    its own Decision 145, rather than compact superseded bodies in this anchor PR. Compaction was
    rejected here because victim-selection is a DPI-04 human disposition with a body-citation hazard
    (a mis-compacted body-cited clause is wrong-but-trusted) and it couples an unrelated judgment-heavy
    edit to the governance anchor. The structural fix (compaction lifecycle + significance gate) stays
    owned by audits/decision-consolidation-growth-f79d6b5.yaml, which Decision 145 cites.
  - >-
    RATCHET-REVIEW (plan-critique RESOLVED, Finding 2): the recurring "Decision 92 point-9
    ratchet-review" (periodic review of per-change-class incident-free auto-apply track record to
    decide further widening) is kept OUT of any Decision body (Decision 86 -- forward intent routes to
    tier_items, not Decision prose). Instead it is scheduled as a recurring MEASURED act on tier_item
    T2.48 (criterion c6), so the widen-on-track-record authority-budget model does not stall at v2.
    Decision 144's body leaves the existing Decision 92 ratchet "UNCHANGED" (a reference to the
    standing mechanism, not a newly-authored recurring review) -- consistent with this ruling.
  - >-
    Decision-scout verdict + CITE list (verbatim decision ids): FLAGS_FOUND (round 1 returned BLOCK
    on the Decision-134 live-byte ceiling; round 2 cleared to FLAGS_FOUND). The round-2 compaction
