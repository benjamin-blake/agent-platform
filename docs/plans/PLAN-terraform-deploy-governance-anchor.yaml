schema_version: 1
slug: "terraform-deploy-governance-anchor"
intent: >-
  Record the terraform-deploy audit's allow-list INVERSION as the target deploy/IAM model in one
  citable forward-direction Decision (before realization, Decision 126 precedent), and register the
  audit's remaining findings as tier_items -- so the follow-on engineering has one fixed point to
  build toward instead of each landing its own ad hoc framing. Unblocks routine autonomous
  infrastructure change (the deployment treadmill the audit traced), a direct North-Star enabler.
plan_type: IMPLEMENTATION
verification_tier: V1
plan_path: docs/plans/PLAN-terraform-deploy-governance-anchor.yaml
phase: >-
  Platform tier T2 (agent-native Terraform CD hardening). Governance-anchor response to
  audits/terraform-deploy-redesign-b67955b.yaml: authors Decision 144 + tier_items T2.44-T2.50.
scope:
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      (1) Author ONE new forward-direction Decision (target number 144; re-verify max header at
      write time) adopting the allow-list inversion as the target deploy/IAM model; it explicitly
      amends Decision 98 point 1 and Decision 92 point 5, extends Decision 129's per-service prefix
      pattern from reads to writes, excludes PlatformAdmin from boundary attachment, and retains
      Decisions 77 and 101 untouched. No edits to the Decision 98/92 body text (forward-direction
      amendments are stated only in the amending decision, per the Decision 126/143 precedent).
      (2) Apply the Decision-134 size relief valve (compaction of superseded decision bodies to
      header-preserving pointer stubs -- Decision 134 clause 2) to a human-confirmed set of
      fully-superseded entries so live bytes stay <= ~392,000 after the addition (the file sits at
      398,438 / 400,000 today; a new Decision breaches the ceiling without relief).
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Register 7 new tier_items T2.44-T2.50 immediately after T2.43 (mapping DEP-04/09/13, DEP-06,
      DEP-07/08, DEP-10/11, DEP-01/02, DEP-12, DEP-05) and add a progress_note to T2.42 recording
      that it already carries DEP-03 (no new tier_item for DEP-03).
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    docs/DECISIONS.md contains a new forward-direction Decision whose body (a) adopts the allow-list
    inversion as the target "broad-but-bounded deployer under the mandatory permissions boundary"
    model with the guard + authority budget classifying danger, (b) extends Decision 129's
    per-service agent-platform-* prefix from the READ axis to the WRITE axis, (c) EXPLICITLY amends
    Decision 98 point 1 (pipeline MAY mint boundary-carrying agent-platform-* roles via the gated
    path; admin-create retained for non-prefixed/bootstrap roles), (d) EXPLICITLY amends Decision 92
    point 5 (authority-budget v2: create+update of inline policies/attachments on any
    boundary-carrying agent-platform-* role in-budget; role-create stays gated but becomes
    executable), (e) EXPLICITLY excludes PlatformAdmin from boundary attachment (control identity,
    audit spec 3.3), and (f) retains Decisions 77 and 101 untouched.
  - >-
    The Decision is framed forward-direction (records the target model before realization; a plain
    "## Decision NNN:" header, NOT a Decision-105 "state: ratified" candidate-CD shape) and carries
    the Decision 126 section template: Status / Date / Warehouse ID / Problem / Decision (numbered) /
    Reversal conditions / Rationale / Related.
  - >-
    The Decision routes ENFORCEMENT to the realizing tier_item, not to its own body: it records
    target + rationale only and states the guard-classification + IAMRoleWriteBounded/
    IAMRoleCreateBounded change lands in environment-taxonomy.md + authority_budget.json at T2.48
    (Decision 92 pt5 sole-SoT; Decision 86 no-drift). Its Related section cites Decisions 129, 98,
    92, 77, 101, 126, 143, 94, 113, 83, 100/75, 105, 35, 55/72, 84 and characterizes Decision 143 as
    COMPLEMENTARY -- role-create staying gated-via-the-Environment preserves 143's "materially higher
    bar than an in-handler edit" durability property.
  - >-
    docs/ROADMAP-PLATFORM.yaml gains 7 new tier_items T2.44-T2.50 mapping every remaining audit
    finding, with T2.48 (the inversion) citing the new Decision, T2.48 depends_on [T2.45], T2.47
    depends_on [T2.46], and T2.49 + T2.50 each depends_on [T2.48].
  - >-
    docs/ROADMAP-PLATFORM.yaml's T2.42 carries a progress_note recording that it already owns audit
    finding DEP-03 (spurious layer-replace routing); no new tier_item is created for DEP-03.
  - >-
    The new Decision text and tier_items contain no AWS account IDs, ARNs, or ExternalId VALUES
    (Decision 101 public-content boundary): roles are named by logical name, resources by prefix.
  - >-
    docs/DECISIONS.md stays under the Decision-134 live ceiling (<= 400,000 bytes; target <= 392,000)
    after the addition, achieved by compacting a human-confirmed set of fully-superseded decision
    bodies to header-preserving pointer stubs; each stub retains its "## Decision NN:" header so all
    number-based citations keep resolving.
  - >-
    bin/venv-python -m scripts.validate --pre exits 0 on the implementation branch
    (validate_decisions_size, validate_platform_roadmap referential integrity, DECISIONS.md
    structure, and plan schema all green).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      The new Decision exists and carries the inversion target model plus the two explicit
      amendments and the Decision-129 read->write extension.
    command: >-
      awk '/^## Decision [0-9]+: .*[Ii]nversion/{f=1} f{print} /^---$/{if(f)exit}' docs/DECISIONS.md
      > /tmp/dec144.txt && test -s /tmp/dec144.txt && head -1 /tmp/dec144.txt && grep -q 'amends
      Decision 98 point 1' /tmp/dec144.txt && grep -q 'Decision 92 point 5' /tmp/dec144.txt && grep
      -qE 'Decision 129' /tmp/dec144.txt && grep -qi 'broad-but-bounded' /tmp/dec144.txt && grep -qiE
      'per-service|prefix' /tmp/dec144.txt
    expected: >-
      Prints the new Decision header (title contains "inversion") and exits 0 -- the block names the
      98-point-1 and 92-point-5 amendments, cites Decision 129, and states the broad-but-bounded
      per-service-prefix target model.
    fix_if: >-
      The Decision header/title is missing, the amendment phrases are absent, or Decision 129 / the
      prefix model is not referenced -- author the Decision body per execution step 2.
    hermetic: false
    graduation: not-applicable
  - step: 2
    phase: pre-deploy
    action: >-
      The Decision is forward-direction (plain header, not a CD shape), EXCLUDES PlatformAdmin from
      the boundary, RETAINS Decisions 77 and 101 untouched, and routes enforcement to T2.48.
    command: >-
      grep -qiE 'forward-direction|before realization|not a candidate CD|not a Decision 105'
      /tmp/dec144.txt && grep -qE 'PlatformAdmin' /tmp/dec144.txt && grep -qi 'exclud' /tmp/dec144.txt
      && grep -qE 'Decision 77' /tmp/dec144.txt && grep -qE 'Decision 101' /tmp/dec144.txt && grep
      -qiE 'retain|untouched' /tmp/dec144.txt && grep -qE 'T2\.48' /tmp/dec144.txt && ! grep -qE
      '^state: ratified' /tmp/dec144.txt
    expected: >-
      Exit 0 -- the block is framed forward-direction (no "state: ratified"), states PlatformAdmin is
      excluded from boundary attachment, marks Decisions 77/101 retained, and points enforcement at
      T2.48.
    fix_if: >-
      Any of the forward-direction framing, the PlatformAdmin exclusion, the 77/101 retention, or the
      T2.48 enforcement-routing is missing -- add it per execution step 2.
    hermetic: false
    graduation: not-applicable
  - step: 3
    phase: pre-deploy
    action: All 7 new tier_items T2.44 through T2.50 exist in the roadmap.
    command: >-
      for i in 44 45 46 47 48 49 50; do grep -qE "^  - id: \"?T2\.$i\"?" docs/ROADMAP-PLATFORM.yaml ||
      { echo "MISSING T2.$i"; exit 1; }; done && echo "all 7 present"
    expected: Prints "all 7 present" and exits 0.
    fix_if: >-
      A T2.4x id is missing (or a number collided with a concurrently-merged item) -- add the missing
      tier_item, or renumber the whole block to the next free contiguous range and update
      cross-references.
    hermetic: false
    graduation: not-applicable
  - step: 4
    phase: pre-deploy
    action: >-
      The tier-item dependency wiring is correct and the inversion cites the new Decision.
    command: >-
      bin/venv-python -c "import yaml; d=yaml.safe_load(open('docs/ROADMAP-PLATFORM.yaml'));
      t={i['id']:i for i in d['tier_items'] if i['id'] in
      {'T2.45','T2.46','T2.47','T2.48','T2.49','T2.50'}};
      assert t['T2.48']['depends_on']==['T2.45'], t['T2.48']['depends_on'];
      assert t['T2.47']['depends_on']==['T2.46'], t['T2.47']['depends_on'];
      assert t['T2.49']['depends_on']==['T2.48'], t['T2.49']['depends_on'];
      assert t['T2.50']['depends_on']==['T2.48'], t['T2.50']['depends_on'];
      assert 144 in t['T2.48']['related_decisions'], t['T2.48']['related_decisions'];
      print('deps OK')"
    expected: Prints "deps OK" -- all four depends_on edges are exactly as specified and T2.48 cites Decision 144.
    fix_if: >-
      An assertion fails -- correct the depends_on list or related_decisions on the named item to
      match the plan's sequencing (guard-before-widening; consolidation/channel after the inversion).
    hermetic: false
    graduation: not-applicable
  - step: 5
    phase: pre-deploy
    action: T2.42 carries a note that it already owns audit finding DEP-03, and no separate DEP-03 tier_item exists.
    command: >-
      awk '/^  - id: "?T2\.42"?/{f=1} f{print} /^  - id: "?T2\.43"?/{exit}' docs/ROADMAP-PLATFORM.yaml
      | grep -qE 'DEP-03' && echo "T2.42 carries DEP-03"
    expected: Prints "T2.42 carries DEP-03" and exits 0.
    fix_if: The DEP-03 note is missing from T2.42 -- add the progress_note per execution step 4.
    hermetic: false
    graduation: not-applicable
  - step: 6
    phase: pre-deploy
    action: >-
      Public-content boundary (Decision 101): the new Decision block carries no AWS account ID or
      account-scoped ARN.
    command: >-
      ! grep -qE 'arn:aws:[a-z0-9-]*:[a-z0-9-]*:[0-9]{12}|(^|[^0-9])[0-9]{12}([^0-9]|$)' /tmp/dec144.txt
    expected: >-
      Exit 0 -- no 12-digit account id and no account-scoped ARN appear in the Decision block (roles
      are named logically, resources by prefix). ExternalId VALUES are additionally caught by the
      pre-commit never-commit hook.
    fix_if: >-
      A 12-digit account id or an account-bearing ARN appears -- replace it with the logical role name
      or the agent-platform-* prefix pattern (Decision 101).
    hermetic: false
    graduation: not-applicable
  - step: 7
    phase: pre-deploy
    action: >-
      Decision-134 size ceiling holds after the addition (the relief valve reclaimed enough headroom).
    command: >-
      B=$(wc -c < docs/DECISIONS.md) && echo "live bytes: $B" && [ "$B" -le 400000 ]
    expected: >-
      Prints the live byte count and exits 0 -- docs/DECISIONS.md is at or under the 400,000-byte
      Decision-134 live ceiling despite the new Decision (superseded bodies compacted to stubs).
    fix_if: >-
      Live bytes exceed 400,000 -- compact one or more additional fully-superseded decision bodies to
      header-preserving pointer stubs (human-confirmed targets), or reduce Decision 144's length.
    hermetic: false
    graduation: not-applicable
  - step: 8
    phase: pre-deploy
    action: The full presubmit passes (size governance + roadmap referential integrity + DECISIONS.md structure + plan schema).
    command: bin/venv-python -m scripts.validate --pre
    expected: >-
      Exit 0 -- validate_decisions_size, validate_platform_roadmap (related_decisions [144] and the
      new depends_on edges all resolve), the DECISIONS.md structure checks, and the plan-document
      schema all pass.
    fix_if: >-
      A --pre check fails -- read the failing check name and fix the cited file (a size-ceiling
      breach, a dangling related_decisions/depends_on ref, a malformed Decision header, or a schema
      violation).
    hermetic: false
    graduation: not-applicable
constraints:
  - "Files strictly in scope: docs/DECISIONS.md and docs/ROADMAP-PLATFORM.yaml ONLY."
  - "audits/terraform-deploy-redesign-b67955b.yaml is READ-ONLY input -- do not edit it."
  - >-
    IMPLEMENTATION plan; no recommendations filed (STRATEGIC plans suspended per AGENTS.md;
    executor frozen per Decision 67).
  - >-
    Decision 101 public-content boundary: name roles by logical name and resources by the
    agent-platform-* / ducklake-* prefix pattern -- never an AWS account id, ARN, or ExternalId value.
  - >-
    Forward-direction amendment convention (Decision 126/143 precedent): state the amendments to
    Decision 98 point 1 and Decision 92 point 5 ONLY in the new Decision's text; do NOT add inline
    "Amended by" back-markers to the Decision 98/92 body (their v1 model stays authoritative until
    T2.48 realizes the inversion -- an inline marker would misleadingly imply the model already
    changed). Decision 144 is a plain "## Decision NNN:" header, NOT a Decision-105 "state: ratified"
    CD entry.
  - >-
    Decision-134 size ceiling (HARD): docs/DECISIONS.md is 398,438 / 400,000 bytes today (~1,562 B
    headroom), so a new Decision cannot land as a pure addition. Relief valve IN SCOPE: compact a
    human-confirmed set of FULLY-superseded decision bodies to header-preserving pointer stubs
    (Decision 134 clause 2 sanctions this; the stub retains the "## Decision NN:" header + Status +
    a one-line supersession pointer, so number-citations keep resolving and the DPI-04 victim->
    superseder link is preserved/improved; this also satisfies Decision 105's R1 ratification grep,
    which keys off the retained headers). BYTE MATH: to hit the <=392,000 B target AND absorb a
    ~6-10 KB Decision 144, compaction must NET-REMOVE ~14 KB -- roughly 3-4 fully-dead bodies, not one
    small stub. VICTIM-SELECTION HAZARD (decision-scout NOTE): header-preservation fixes NUMBER
    citations but NOT live BODY/clause citations -- before compacting ANY candidate, grep the repo for
    live reliance on that decision's BODY (not just its number) and exclude on any hit. Confirmed
    MUST-EXCLUDES: Decision 44 (superseded by 117 but its boundary table is body-cited "unchanged" by
    117/73/79), Decision 58 (superseded by 76 but its mirror rule is body-cited by 75), Decision 35
    (scoped by 77, NOT superseded -- never a candidate), and Decision 40 (superseded by 122 but its
    trigger conditions are cited as live by ROADMAP-PRODUCT.md). Scout-suggested safer candidates
    (still require the body-citation grep + DPI-01/DPI-04 confirmation against
    audits/decision-log-premise-integrity-8fb581e.yaml): 42, 49, 68, 71, 74, 89. Target-set selection
    is a DPI-04 human disposition -- surface it for confirmation, do not choose unilaterally (see the
    open question in context). Do NOT touch docs/DECISIONS_ARCHIVE.md (archival is DPI-04's
    out-of-scope tool and a third file).
  - No rescue agents or workaround loops (Decision 55). No warehouse write during planning.
  - >-
    Numbering race: re-verify the max "## Decision NNN:" header at implement time -- a concurrent PR
    may have claimed 144. If so, use the next free number and update every cross-reference (tier-item
    related_decisions, T2.42 note). The VP greps key off the title "inversion", not the number.
context:
  - >-
    Anchors the response to audits/terraform-deploy-redesign-b67955b.yaml (13 findings DEP-01..DEP-13;
    highest-leverage change DEP-02; verdict "adequate, one inversion away from strong"). The audit's
    Q7 blueprint sequences Phase 0 (DEP-04/09/13/07) -> Phase 1 (T2.42 / DEP-03/08) -> Phase 2 (the
    inversion, DEP-01/02, amends 98 pt1 + 92 pt5) -> Phase 3 (DEP-05) -> Phase 4 (conditional, at
    Decision 77's live_full trigger).
  - >-
    Decision 126 is the forward-direction precedent: record the target deployment model in one
    citable Decision BEFORE realization, route rationale to the Decision and forward intent to
    tier_items (Decision 86), and do NOT use the Decision-105 CD-ratification lane (the model is not
    realized end-to-end).
  - >-
    Decision 129 is the in-repo natural experiment this extends: its per-service agent-platform-*
    prefix ended a 15+-recurrence READ-axis class and deliberately left the WRITE axis enumerated;
    Decision 129 point 3 already established that resource-axis grants sit outside the IAM-write
    authority budget. The new Decision inherits Decision 129's reversal condition (re-narrow on a
    non-agent-platform-* resource or an over-grant incident).
  - >-
    Decision 143 (2026-07-20, post-dates the audit's b67955b base) scopes identities by worst
    reachable verb via resource-shape boundaries and leans on "role CREATE requires a human-gated
    apply" as a durability property. The new Decision is complementary: it makes the boundary
    mandatory on exec roles too, and role-create staying GATED (via the tf-gated-apply Environment,
    now executable rather than admin-only) preserves Decision 143's "materially higher bar than an
    in-handler edit". 143's own "requires agent_platform_admin" exec-role-CREATE text is re-grounded
    when T2.48 lands (noted in T2.48's intent).
  - >-
    Main was 0 commits behind origin/main at planning time (preflight main_freshness). Preflight:
    creds ok, ops_outbox empty, ci_rca_unresolved_recs empty (rec-2762 is a resolved-class ci-rca
    rec on an unrelated plan file -- no HARD BLOCK). open_recs 786 (individual review suspended,
    Decision 73).
  - >-
    Extra depends_on edges beyond the tasking's explicit T2.49->T2.48: T2.48->T2.45 (guard must
    classify resource-based policies before the write surface broadens -- DEP-06 must land no later
    than the Phase-2 widening) and T2.47->T2.46 (DEP-10 is cheapest after the DEP-08 consolidation).
    Both are audit-faithful sequencing; concurred by plan-critique.
  - >-
    DECISION-134 BLOCK + PIVOT (decision-scout, round 1): docs/DECISIONS.md is at 398,438/400,000
    bytes, so Decision 144 cannot be a pure addition. Resolved IN SCOPE via Decision 134 clause 2's
    compaction-to-stub relief valve (header-preserving; targets human-confirmed, excluding the
    DPI-04 still-cited-as-live set 35/40/44/58). OPEN QUESTION for the overseer/human: accept this
    bundled in-place compaction, OR land a separate DPI-04-dispositioned archival PR first (cleaner,
    keeps the anchor free of compaction, but needs file-scope beyond docs/DECISIONS.md).
  - >-
    OPEN QUESTION for the plan-critique gate (Fable design-consult suggestion): should the new
    Decision ALSO register a "Decision 92 point-9 ratchet-review" recurring measured act (periodic
    review of per-change-class incident-free auto-apply track record to decide further widening)?
    Drafted WITHOUT it to avoid scope balloon; include only if plan-critique concurs it belongs.
  - >-
    Decision-scout verdict + CITE list (verbatim decision ids): FLAGS_FOUND (round 1 returned BLOCK
    on the Decision-134 live-byte ceiling; pivoted to the in-scope compaction-to-stub relief valve;
    round 2 cleared to FLAGS_FOUND with one residual NOTE -- the compaction victim-selection
    body-citation hazard -- addressed by the must-excludes + body-citation-grep in the constraints).
    CITE: Decision 134, 105, 92, 98, 129, 143, 94, 126, 77, 113, 83, 84, 86, 55, 72, 101, 100, 75.
  - "gates: decision-scout=FLAGS_FOUND (2 rounds; 1 NOTE addressed); plan-critique=<verdict> after <N> round(s)"
pre_implementation_checklist:
  - Branch confirmed not on main (harness claude/... branch)
  - Read audits/terraform-deploy-redesign-b67955b.yaml (findings DEP-01..DEP-13, Q7 blueprint, disposition)
  - Read Decision 126 (forward-direction template), 129 (read pattern), 98 pt1, 92 pt5, 77, 101, 143, 134 (size ceiling)
  - Re-verify the max "## Decision NNN:" header and the next free T2.4x ids before writing
  - Both scope files located and readable
  - >-
    VP hermetic/graduation policy: every pre-deploy VP step is graduation=not-applicable (one-shot
    doc-content assertions, not reusable kernel verifiers) and hermetic=false (they grep files
    /implement CREATES/EDITS, so they cannot pass the plan-PR-tree vp-replay).
execution_steps:
  - >-
    Secure Decision-134 headroom (do this in the SAME PR, within docs/DECISIONS.md): compact a
    human-confirmed set of FULLY-superseded decision bodies to header-preserving pointer stubs so
    live bytes land <= ~392,000 (>=8 KB margin under the 400,000 ceiling). Byte math: net-remove
    ~14 KB (~3-4 dead bodies) to absorb the ~6-10 KB Decision 144 plus the margin. Stub shape:
    retain the "## Decision NN:" header + Status line + one line "Superseded by Decision MM (see
    there for the live state)"; remove the superseded body only. Before compacting ANY candidate,
    grep the repo for live reliance on that decision's BODY/clauses (not just its number) and skip on
    any hit -- header-preservation only fixes number-citations. MUST-EXCLUDE (confirmed body-cited or
    not-superseded): Decisions 35, 40, 44, 58. Scout-suggested safer candidates (still grep-verify +
    confirm against DPI-01/DPI-04 in audits/decision-log-premise-integrity-8fb581e.yaml): 42, 49, 68,
    71, 74, 89. Target-set selection is a DPI-04 human disposition -- confirm the set at the
    overseer/human gate before removing any body. If the human prefers, substitute a separate
    preceding DPI-04 archival PR and skip this step.
  - >-
    Re-verify the next free Decision number (grep the max "## Decision NNN:" header; target is 144).
    Author the new Decision at the TOP of docs/DECISIONS.md's decision list (newest-first, immediately
    above "## Decision 143:") using the Decision-126 section template and the drafted content in the
    DECISION-144 reference block below. Worded as an EXPLICIT amendment of Decision 98 point 1 and
    Decision 92 point 5; extends Decision 129 reads->writes; EXCLUDES PlatformAdmin from boundary
    attachment; RETAINS Decisions 77 and 101 untouched; forward-direction (a plain "## Decision NNN:"
    header, not a Decision-105 CD shape). Do NOT edit the Decision 98/92 body text.
  - >-
    Register 7 new tier_items in docs/ROADMAP-PLATFORM.yaml immediately after T2.43's block (after its
    "status: complete" line, before the "# ----- T3:" comment) using the drafted TIER-ITEMS reference
    block below (T2.44..T2.50). Re-verify T2.44-T2.50 are still free; if any collided, renumber the
    contiguous block and fix related_decisions/depends_on cross-references.
  - >-
    Add a progress_note to the existing T2.42 tier_item recording that it already carries audit
    finding DEP-03 (spurious layer-replace routing; its c1/c3 are DEP-03's remedy), cross-referencing
    the new Decision and the audit path. Do not otherwise modify T2.42.
  - >-
    Execute the Verification Plan -- run each step; loop until all pass. On an unrecoverable failure,
    stop and RCA (Decision 55); do not workaround.
  - "Report: the Decision number authored, the 7 tier_item ids, the compacted set, and verification results."
  - >-
    DECISION-144 reference block (author verbatim, adjusting only the number if 144 is taken):
    Title -- "Allow-list inversion: broad-but-bounded deployer under the mandatory permissions
    boundary as the target Terraform deploy/IAM model (forward-direction; amends Decision 98 point 1
    and Decision 92 point 5; extends Decision 129 from reads to writes)". Sections:
    Problem -- the enumerated per-resource WRITE surface on github_ci_apply structurally lags the
    module, so guard-PASS changes die AccessDenied at apply and latch the record red; the IAM-write
    budget stops at branch/pr and new roles are declared boundary-less, so gated-apply approves then
    fails; Decision 129 fixed exactly this for the READ axis (ended a 15+-recurrence class) and left
    the write axis enumerated; the binding wall is the AWS-side identity policy, not the guard
    budget; the audit traced this to a multiple-compounding allow-list-iam family (highest-leverage
    DEP-02); the target model was never recorded once, so record it now before realization.
    Decision (numbered) --
    (1) TARGET MODEL: invert github_ci_apply's authority from "enumerate what it may write" to a
    broad-but-bounded deployer under the existing mandatory permissions boundary
    (agent-platform-github-ci-apply-boundary -- broad DataPlaneAllow wildcards plus DenyIAMEscalation
    with the boundary-propagation condition, DenyBoundaryRemoval, DenyBoundaryPolicyModification: the
    verified SCP substitute), with the deterministic guard and the authority budget carrying danger
    classification; the CD.35 control theory (saved-plan no-TOCTOU, fail-closed guard, convergence
    anchor, Environment gate, bootstrap fixed point -- Decisions 77/92/119/120/126) is KEPT verbatim;
    realized by tier_item T2.48, not by this Decision.
    (2) EXTENDS Decision 129 from reads to writes: apply the same per-service account-scoped
    agent-platform-* prefix pattern to the WRITE axis (logs:CreateLogGroup/PutRetentionPolicy on
    /aws/lambda/agent-platform-*; lambda lifecycle on function:agent-platform-*;
    cloudwatch:PutMetricAlarm/DeleteAlarms on the agent-platform-*/ducklake-* alarm namespaces;
    events writes on rule/agent-platform-*; iam:TagRole/UpdateRoleDescription on
    role/agent-platform-*); extend validate_ci_refresh_read_coverage to assert WRITE coverage per
    managed resource type; Decision 129's reversal (re-narrow on a non-agent-platform-* resource or
    an over-grant incident) applies to the write axis too.
    (3) MANDATORY boundary on all agent-platform-* CI and execution roles and on PlatformDev, but
    EXPLICITLY EXCLUDING PlatformAdmin -- PlatformAdmin is the control identity that must remain able
    to amend the boundary (audit spec 3.3); attaching DenyBoundaryPolicyModification to it would wedge
    the only identity that can fix the boundary; its reachability is hardened separately by DEP-13
    (severing the ExternalId-in-state escalation), not by boundary attachment (Decision 113's
    two-principal split unchanged).
    (4) AMENDS Decision 98 point 1: the pipeline (github_ci_apply) MAY mint boundary-carrying
    agent-platform-* roles via the gated tf-gated-apply Environment path (a new role now declares the
    mandatory boundary in HCL, so iam:CreateRole satisfies IAMRoleCreateBounded's propagation
    condition and the gated apply succeeds instead of AccessDenying; this rides the Decision 94
