pre_implementation_checklist:
  - Branch confirmed not on main (claude/cd-premise-validity-audit-j8isbv)
  - docs/PROJECT_CONTEXT.md read
  - DECISIONS.md read via the decision-scout gate (fresh context, Step 6a)
  - All files in scope located and readable (path correction applied -- platform_roadmap_models.py)
  - Acceptance criteria understood and verifiable
execution_steps:
  - >-
    scripts/platform_roadmap_models.py -- change CandidateDecision.state (line ~117) from
    'state: str = "pending"' to 'state: Literal["pending", "ratified", "superseded"] = "pending"'.
    Literal is already imported (line 7); mirror the OpenQuestion/KnownGap status pattern.
  - >-
    tests/test_platform_roadmap_models.py -- add a red fixture (a candidate_decision with
    state "Retired" -> RoadmapDocument.model_validate raises ValidationError, mirroring the
    test_cd_extra_forbid_rejects_bogus_field pattern at lines 277-280) and a green fixture asserting
    each of pending/ratified/superseded loads.
  - >-
    scripts/checks/roadmap/validate_candidate_decision_supersession.py (new) -- implement the guard
    mirroring validate_candidate_decision_ratification's structure (same _common.ROOT + sys.path
    handling + 'from scripts.roadmap.platform_roadmap import load'). Build an id->CD map; for each
    state=="pending" CD, search detail with re.compile(r"fully superseded by (CD\.\d+)"); if it
    matches and the referenced CD exists and is state=="ratified", append a FAIL naming both CDs and
    prescribing the same-edit flip. Decorate with
    @registry.register("validate_candidate_decision_supersession", owner="platform").
  - >-
    scripts/checks/registry.py -- insert _c("validate_candidate_decision_supersession") immediately
    after _c("validate_candidate_decision_ratification") in BOTH pre_sequence() and full_sequence().
  - >-
    scripts/checks/roadmap/validate_candidate_decision_ratification.py -- harden _DEC_NNN_RE from
    r"dec-(\d+)" to an anchored form (e.g. r"(?<![0-9A-Za-z])dec-(\d+)(?![0-9A-Za-z])") so a
    malformed pointer like "dec-0123abc" no longer partially matches; keep/extend the well-formedness
    note near the regex (rec-2467).
  - >-
    tests/checks/roadmap/test_validate_candidate_decision_supersession.py (new) -- author the 4-case
    matrix (ratified-superseder=red; pending-superseder=green; narrow-supersession=green;
    self-demotion=green) using tmp_path + patch("scripts.checks._common.ROOT", tmp_path) like the
    ratification test; add a test asserting the check name is in both pre_sequence() and
    full_sequence().
  - >-
    tests/checks/roadmap/test_validate_candidate_decision_ratification.py -- add a test asserting BOTH
    directions of the rec-2467 hardening: a ratified CD with ratified_as/filed_via "dec-0123abc"
    produces a guard FAIL (malformed pointer no longer partially resolves), AND a valid
    "ops_decisions:dec-078" still resolves to 78 (assert _dec_number("ops_decisions:dec-078") == 78
    directly, or that a well-formed ratified CD still passes) -- the anchor must not regress valid
    pointers.
  - >-
    docs/contracts/candidate-decision-ratification.yaml -- extend lane_steps.implement.execute with
    the supersession-flip sentence and the PCD-05 prose-sweep sentence; add a NEW note: sub-key under
    referential_guard.rules.R2 (sibling to applies_to/rule) with distinctive text, e.g.
    "'pending_log_decision_lambda' is historical vocabulary meaning pending ratification via the live
    vehicle (the portal path); the literal is retained, not renamed." -- do NOT alter the existing
    literal in R2.rule; add a one-line pointer naming validate_candidate_decision_supersession as the
    load-time backstop.
  - >-
    RED demonstration on real data (before flipping CD.7): run VP step 5 against origin/main's
    roadmap and confirm the guard FAILs naming CD.7 -- the live violation this plan discharges.
  - >-
    docs/ROADMAP-PLATFORM.yaml -- edit ONLY the single 'state:' line of the CD.7 block (roadmap
    ~line 485), changing 'state: pending' to 'state: superseded'. CD.7's detail block (~lines 468-483)
    and its already-empty gates line (~484) MUST remain byte-for-byte unchanged, preserving the CD.14
    canonical superseded shape (ratified_as/filed_via stay absent, R3 exempt) and avoiding any prose
    edit that would trip the downstream PCD-05 prose-sweep concern in this same PR. Touch no other CD
