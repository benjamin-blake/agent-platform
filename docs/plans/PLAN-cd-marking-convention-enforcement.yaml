  - "gates: decision-scout=BLOCK->resolved (CD.7 flip added to scope, Decision 122 cited); plan-critique=<pending, run fresh-context by overseer>"
  - >-
    GRADUATION DISPOSITIONS (added post-critique to satisfy the mid-flight T3.21 requirement --
    validate_graduation_completeness now requires a graduation: field on every pre-deploy VP step since
    this net-new plan gets no pre-field carve-out): 6 steps not-applicable, 1 step waive, 0 graduate ->
    no verification_registry row required. Honest per VF-05 (the registry graduates only kernel-PRIMITIVE
    checks): the three pytest steps (1,2,3) are not kernel-primitive -- their standing enforcement is the
