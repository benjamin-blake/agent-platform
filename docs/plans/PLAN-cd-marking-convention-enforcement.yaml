    Audit source: audits/pending-cd-premise-validity-f4dec93.yaml (findings PCD-03, PCD-04, PCD-05;
    companion .md alongside). Novel findings; no owning tier_item.
  - >-
    PREMISE CORRECTION (supersedes the audit/f4dec93 framing): CD.28 is ALREADY RATIFIED at HEAD --
    state: ratified, ratified_as: dec-122 (ROADMAP-PLATFORM.yaml:1303-1305), via Decision 122
    ("Ratify CD.28 ...", DECISIONS.md:696, 2026-07-06, AFTER the audit's commit f4dec93). CD.7 is
    state: pending with detail "[Amendment 2026-05-27 -- fully superseded by CD.28]" (line 469).
    Therefore the supersession guard fires on CD.7 at HEAD: CD.7 is a LIVE marking-convention
    violation, NOT a latent one. The old "guard stays latent / roadmap stays green as-is / flip is
    mechanical later" framing is DEAD; this plan discharges CD.7 in the same PR that adds the guard.
  - >-
    PATH CORRECTION: the audit's anchor "scripts/platform_roadmap.py:381" is STALE -- that file does
    not exist. CandidateDecision lives in scripts/platform_roadmap_models.py:111 (state field line
    117); scripts/roadmap/platform_roadmap.py is the facade that re-exports it and provides load().
    typing.Literal is already imported (models line 7), so the PCD-04 change needs no new import.
  - >-
    CD.7 is the SOLE live instance: CD.11 (line 531) uses "narrowly superseded by CD.27" + the
    structured narrowly_supersedes field -- must NOT trigger; CD.10 (line 508) self-demotes its
