schema_version: 1
slug: "cd-marking-convention-enforcement"
intent: >-
  Move the platform roadmap's candidate-decision marking convention from author discipline to
  load-time enforcement so a decision fully-superseded-in-prose by a now-ratified CD cannot silently
  stay pending, and a typo'd state cannot unbind a CD from every state-keyed surface -- and discharge
  the one live instance (CD.7, superseded by the now-ratified CD.28) in the same edit (audit findings
  PCD-03, PCD-04, and the contract clause of PCD-05).
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-cd-marking-convention-enforcement.yaml
phase: >-
  Platform governance -- candidate-decision marking-convention surface (Decision 105 ratification
  lane hardening). Audit-sourced (audits/pending-cd-premise-validity-f4dec93.yaml PCD-03/04/05);
  novel findings, no owning tier_item.
scope:
  - file: scripts/platform_roadmap_models.py
    action: Modify
    purpose: >-
      PCD-04 -- change CandidateDecision.state from a free str to
      Literal["pending","ratified","superseded"], mirroring the sibling OpenQuestion/KnownGap
      Literal status fields so an unknown state value fails loudly at load.
  - file: scripts/checks/roadmap/validate_candidate_decision_supersession.py
    action: Create
    purpose: >-
      PCD-03 guard -- new registered check that FAILS when a state==pending CD's detail records
      "fully superseded by CD.NN" AND that CD.NN is state==ratified. Narrow supersession (CD.11)
      and self-demotion (CD.10) are out of the trigger by construction.
  - file: scripts/checks/registry.py
    action: Modify
    purpose: >-
      Register validate_candidate_decision_supersession in BOTH pre_sequence() and full_sequence(),
      immediately after validate_candidate_decision_ratification (governance guard, pre-merge gate).
  - file: scripts/checks/roadmap/validate_candidate_decision_ratification.py
    action: Modify
    purpose: >-
      rec-2467 -- anchor the _dec_number _DEC_NNN_RE regex bounds so a malformed pointer like
      "dec-0123abc" fails loudly instead of partially resolving to dec-0123.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Discharge the one live violation -- flip CD.7 state pending -> superseded (canonical superseded
      shape per the CD.14 exemplar; ratified_as/filed_via stay absent, R3 exempts superseded CDs from
      dec-NNN resolution; keep CD.7's existing 2026-05-27 "fully superseded by CD.28" amendment and the
      already-emptied gates). CD.28 is now decision-final (Decision 122), which is exactly the
      condition that makes the held flip due. TOUCH ONLY the CD.7 block.
  - file: docs/contracts/candidate-decision-ratification.yaml
    action: Modify
    purpose: >-
      PCD-03 contract half + PCD-05 clause + Q5 cosmetic -- add the supersession-flip step and the
      pending-window prose-sweep step to lane_steps.implement.execute; add a NEW note: sub-key under
      referential_guard.rules.R2 (sibling to applies_to/rule) recording that pending_log_decision_lambda
      is historical vocabulary meaning pending ratification via the live portal path (the literal in
      R2.rule is retained, not renamed); cross-reference the new supersession guard.
  - file: tests/test_platform_roadmap_models.py
    action: Modify
    purpose: >-
      PCD-04 fixtures -- prove state "Retired" raises ValidationError at load and each of
      pending/ratified/superseded is accepted.
  - file: tests/checks/roadmap/test_validate_candidate_decision_supersession.py
    action: Create
    purpose: >-
      PCD-03 fixture matrix (mirror convention, Decision 131): ratified-superseder=red;
      pending-superseder=green; narrow-supersession=green; self-demotion=green; plus a
      registered-in-both-tiers assertion.
  - file: tests/checks/roadmap/test_validate_candidate_decision_ratification.py
    action: Modify
    purpose: >-
      rec-2467 -- add a test proving a ratified CD whose pointer is "dec-0123abc" now fails the
      guard loudly (no partial resolution), and confirm existing R1/R2/R3 cases still pass.
bundled_recommendations: [rec-2467]
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    Loading a roadmap whose candidate_decision has state "Retired" fails loudly with a Pydantic
    ValidationError; each of "pending"/"ratified"/"superseded" loads without error.
  - >-
    The new supersession guard fixture matrix passes (guard LOGIC proven independently of live data):
    pending CD + "fully superseded by CD.X" with CD.X ratified => guard FAIL; same with CD.X pending
    => PASS; narrow-supersession analog => PASS; self-demotion analog => PASS.
  - >-
    validate_candidate_decision_supersession is present in BOTH pre_sequence() and full_sequence()
    (parity with validate_candidate_decision_ratification).
  - >-
    Red-then-green on REAL data: the new guard, run against the pre-flip roadmap (origin/main, where
    CD.7 is still pending and CD.28 is ratified), FAILs naming CD.7 -- the live violation; and after
    the CD.7 -> superseded flip in this same PR, the guard run against the working-tree
    docs/ROADMAP-PLATFORM.yaml passes (empty failed list). This is the proof the fix is complete.
  - >-
    rec-2467 -- a ratified CD whose only pointer is "dec-0123abc" fails the ratification guard
    loudly (malformed pointer no longer partially resolves); all pre-existing ratification tests
    still pass.
  - >-
    docs/contracts/candidate-decision-ratification.yaml still parses as YAML and
    lane_steps.implement.execute carries both the supersession-flip clause and the prose-sweep clause;
    referential_guard.rules.R2 gains a NEW note: sub-key containing "historical vocabulary" and
    "portal" (the pending_log_decision_lambda literal in R2.rule is unchanged).
  - "bin/venv-python -m scripts.validate --pre is green after the CD.7 flip."
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      PCD-04 -- the state Literal rejects an unknown value and accepts the three valid ones (run the
      model test file, which includes the new red/green state fixtures).
    command: "bin/venv-python -m pytest tests/test_platform_roadmap_models.py -q"
    expected: >-
      All tests pass, including the new fixtures: state "Retired" raises ValidationError; each of
      pending/ratified/superseded loads.
    fix_if: >-
      If an unknown state loads without error, the Literal was not applied to CandidateDecision.state
      (check scripts/platform_roadmap_models.py line ~117).
    graduation: not-applicable
  - step: 2
    phase: pre-deploy
    action: >-
      PCD-03 -- run the new supersession-guard fixture matrix (red + three green cases) and the
      registered-in-both-tiers assertion.
    command: "bin/venv-python -m pytest tests/checks/roadmap/test_validate_candidate_decision_supersession.py -q"
    expected: >-
      All matrix tests pass: the ratified-superseder case appends the FAIL string; the
      pending-superseder, narrow-supersession, and self-demotion cases append nothing.
    fix_if: >-
      A green case going red means the regex over-matches (e.g. catches "narrowly superseded"); the
      red case staying green means the pending+ratified conjunction is not detected.
    graduation: not-applicable
  - step: 3
    phase: pre-deploy
    action: >-
      rec-2467 -- run the ratification-guard test file. The new test asserts BOTH directions: a
      malformed pointer "dec-0123abc" does NOT resolve (guard FAILs loudly), AND a valid
      "ops_decisions:dec-078" STILL resolves to 78 (the anchored regex must not regress valid
      pointers). Existing R1/R2/R3 cases still pass.
    command: "bin/venv-python -m pytest tests/checks/roadmap/test_validate_candidate_decision_ratification.py -q"
    expected: >-
      All tests pass, including the new bidirectional test: "dec-0123abc" produces a guard FAIL (no
      partial resolve) AND "ops_decisions:dec-078" still resolves to 78.
    fix_if: >-
      If "dec-0123abc" still resolves, _DEC_NNN_RE was not anchored; if a prior test broke, the new
      bound is too tight (it must still match dec-078 inside ops_decisions:dec-078).
    graduation: not-applicable
  - step: 4
    phase: pre-deploy
    action: >-
      Post-flip GREEN proof on real data -- run the new supersession guard against the working-tree
      docs/ROADMAP-PLATFORM.yaml (CD.7 now superseded) and assert it is clean. Also confirms CD.11
      narrow and CD.10 self-demotion do not fire.
    command: >-
      bin/venv-python -c "from scripts.checks.roadmap.validate_candidate_decision_supersession import
      validate_candidate_decision_supersession as g; f=[]; g(f); assert f==[], f; print('post-flip:
      live roadmap green under supersession guard')"
    expected: "Prints 'post-flip: live roadmap green under supersession guard'; failed list is empty."
    fix_if: >-
      A non-empty failed list means CD.7 was not flipped (or was flipped wrong), or the guard fires on
      another live pending CD (over-broad trigger) -- fix the flip/regex before proceeding.
    graduation: not-applicable
  - step: 5
    phase: pre-deploy
    action: >-
      Pre-flip RED demonstration on real data -- run the new guard against origin/main's roadmap
      (CD.7 still pending, CD.28 ratified) in an isolated ROOT and assert it FAILs naming CD.7. Valid
      at implement time (pre-merge); it is the live-violation proof the flip discharges.
    command: >-
      bin/venv-python -c "import subprocess,tempfile,pathlib; from unittest.mock import patch; from
      scripts.checks import _common; from scripts.checks.roadmap.validate_candidate_decision_supersession
      import validate_candidate_decision_supersession as g; d=pathlib.Path(tempfile.mkdtemp());
      (d/'docs').mkdir();
      (d/'docs'/'ROADMAP-PLATFORM.yaml').write_text(subprocess.check_output(['git','show','origin/main:docs/ROADMAP-PLATFORM.yaml'],text=True));
      patch.object(_common,'ROOT',d).start(); f=[]; g(f); assert f, 'expected guard FAIL on pre-flip
      roadmap (CD.7 live violation)'; print('pre-flip red demo OK: guard fails on pre-flip roadmap (CD.7 is the sole trigger)')"
    expected: "Prints 'pre-flip red demo OK: guard fails on pre-flip roadmap ...'; the failed list is non-empty (CD.7 is the sole trigger)."
    fix_if: >-
      If it does not fail on CD.7, the guard is not detecting the pending-CD.7 + ratified-CD.28
      conjunction on real data -- the fixture matrix passing but this failing means the regex or the
      superseder-state lookup diverges from the real detail prose.
    graduation: not-applicable
  - step: 6
    phase: pre-deploy
    action: >-
      Confirm the contract edits landed in the correct YAML keys and the file still parses: flip +
      prose-sweep clauses in lane_steps.implement.execute; a NEW note: sub-key under
      referential_guard.rules.R2. This is the NON-VACUOUS check -- the existing literal in R2.rule
      already contains 'pending_log_decision_lambda', so we assert the new note sub-key, not the literal.
    command: >-
      bin/venv-python -c "import yaml,pathlib; d=yaml.safe_load(pathlib.Path('docs/contracts/candidate-decision-ratification.yaml').read_text());
      impl=d['lane_steps']['implement']['execute'].lower(); r2=d['referential_guard']['rules']['R2'];
      note=(r2.get('note') or '').lower();
      assert 'superseded' in impl and 'fully superseded' in impl; assert 'discipline_points' in impl or 'prose' in impl;
      assert note and ('historical' in note or 'vocabulary' in note) and 'portal' in note, r2;
      print('contract clauses + new R2 note present; YAML parses')"
    expected: "Prints 'contract clauses + new R2 note present; YAML parses'."
    fix_if: >-
      A KeyError/AssertionError means the R2 note: sub-key was not added (or a lane clause landed under
      the wrong key, or the YAML broke) -- add the note:/fix the structure, not the assertion.
    graduation: waive
    graduation_waiver_reason: >-
      Kernel-expressible as a grep_count on the lane-contract clauses, but deliberately not graduated
      in this PR: the substantive PCD-03 enforcement is the registered
      validate_candidate_decision_supersession guard, and the contract clauses are process
      documentation whose removal would be caught at plan-critique/contract-review time; a standing
      grep is deferred as low-value for this change.
  - step: 7
    phase: pre-deploy
    action: >-
      Run the authoritative fast presubmit gate end-to-end after the CD.7 flip; the new guard, the
      model change, and the roadmap flip must all pass in-sequence.
    command: "bin/venv-python -m scripts.validate --pre"
    expected: >-
      The run is green; both "Candidate decision" guards pass, the roadmap validates with CD.7
      superseded, and no SLOC/CC/registry/tier-floor check reddens.
    fix_if: >-
      Diagnose the specific failing check from the output; if a SLOC budget is crossed, decompose
      (Decision 128), do not raise.
    graduation: not-applicable
constraints:
  - Only modify files listed in the Scope table (AGENTS.md -- out-of-scope bugs become recommendations, not inline fixes).
  - >-
    The supersession guard MUST key ONLY on the "fully superseded by CD.NN" detail-prose conjunction;
    narrow supersession (CD.11 "narrowly superseded") and self-demotion (CD.10) MUST NOT trigger
    (audit trap T4 -- surviving clauses bind).
  - >-
    Deliberate non-goal (out of scope, no code for it): the guard does NOT flag a dangling "fully
    superseded by CD.NNN" whose CD.NNN does not exist in the roadmap (unknown superseder -> no match
    -> no fail). The audit does not ask for it, and this mirrors the ratification guard's own
    non-handling of unresolved pointers; leaving it out avoids scope creep.
  - >-
    docs/ROADMAP-PLATFORM.yaml edit is SURGICAL -- flip ONLY CD.7's state field (pending ->
    superseded). Do NOT sweep prose, do NOT touch any other CD or tier_item. The 5-CD ratification
    wave (Unit D) and the pending-tense prose sweep (Unit B) are separate downstream plans.
  - >-
    CD.7 flip applies the CD.14 canonical superseded shape: state=superseded; leave ratified_as and
    filed_via absent (R3 exempts superseded CDs from R1's dec-NNN resolution); keep the existing
    detail amendment naming CD.28; leave gates empty (already emptied 2026-05-27). Justification is
    Decision 122 (CD.28 now decision-final).
  - >-
    Do NOT rename the pending_log_decision_lambda literal (R2 still permits it) -- add only the
    clarifying note (audit Q5, below-threshold cosmetic vocabulary drift).
  - >-
    Register the new check in scripts/checks/registry.py, never hand-wire into scripts/validate.py
    (scripts/CLAUDE.md; validate.py is the single source of truth via the registry).
  - >-
    No exceptions raised at module import time -- the guard defers all validation to its registered
    call (AGENTS.md Safety). No eval()/exec().
  - >-
    SLOC decompose-by-default (Decision 128): the new guard is a small cohesive module; no scope file
    is projected to cross its config/sloc_budgets.yaml budget, so no budget raise is authored.
  - >-
    Test placement follows the mirror convention (Decision 131) -- the new guard's test lives at
    tests/checks/roadmap/test_validate_candidate_decision_supersession.py.
  - No rescue agents or workaround loops (Decision 55).
context:
