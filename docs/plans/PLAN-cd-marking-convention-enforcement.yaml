    #comment at line 484 -- both outside candidate_decisions[].detail, so the CD-scoped guard skips
    them.)
  - >-
    rec-2467 (open, Low, XS) bundled: its regex hardening lands in the same guard file
    (scripts/checks/roadmap/validate_candidate_decision_ratification.py). Rec context: bare
    re.search(r'dec-(\d+)') partially matches 'dec-0123abc'. Closure is via the Resolves: rec-2467
    trailer at squash-merge (rec-autoclose.yml) -- the overseer owns the merge.
  - >-
    SEQUENCING (this = Unit A). A-before-D: the state Literal + the supersession guard must EXIST
    before Unit D flips five more CDs to ratified (so the guard governs that wave). A-before-C: both
    touch the platform_roadmap facade/models. A now ALSO touches docs/ROADMAP-PLATFORM.yaml (CD.7
    block only), which Units B (prose sweep) and D (ratification wave) also edit -- disjoint line
    ranges, but A must merge before B and D on that file so sequential ordering avoids a merge
    conflict. Note: the old "A must merge before D so the CD.7 flip is mechanical" rationale is
    discharged -- the CD.7 flip happens IN A now, not in D.
  - >-
    LAMBDA DEPLOYMENT ASSESSMENT (definitive): compute_affected_artifacts(scope) ==
    {'data-pipeline': ['docs/ROADMAP-PLATFORM.yaml']}; data-pipeline is status: active. BUT
    docs/ROADMAP-PLATFORM.yaml is a bundled ASSET (src/lambdas/data-pipeline/manifest.yaml assets:,
    line 47), NOT a handler/include -- the CD.7 state flip changes reference-doc content, not the
    Lambda's runtime code/behaviour. validate_lambda_deploy_gating is ADVISORY-ONLY (never fails CI).
    validate_tier_floor deliberately EXCLUDES assets from its code-file set (it names
    docs/ROADMAP-PLATFORM.yaml as the asset it must not over-flag) and only applies to
    schema_version-2 plans (this is v1). Therefore NO per-Lambda build/deploy/smoke-test step is
    required and the tier stays V2 (driven by the Python source, not the roadmap asset). Precedent:
    PLAN-audit-remediation-wave-2 (V1), wave-5 (asset-exclusion), broker-credential-codegen. If a
    refreshed bundle is ever wanted, the governed channel is .github/workflows/deploy-prod-lambdas.yml
    (decoupled_build_pipeline class; the consuming scheduled-agent schedule is DISABLED). This same
    reasoning governs Units B and D (they edit the same asset).
  - >-
    Branch is at origin/main HEAD (0 commits behind; merge-base 9d1eae25) and none of the scope files
    changed on main since the branch point -- no Main Divergence Assessment concern.
  - >-
    Tier Item Freshness Gate skipped: intent is audit/ad_hoc-sourced enforcement hardening naming no
    tier_item (soft-warn exception: ad_hoc_rec / user_explicit_out_of_scope).
  - >-
    CI-RCA Related-Work deferral: preflight surfaced rec-2710 as "[SOFT -- LIKELY RESOLVED]"
