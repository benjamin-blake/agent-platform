schema_version: 1
slug: "intent-migration-wave1-bazel-feasibility"
intent: >-
  Advance platform tier T5.5 (INTENT-doc extract-and-retire) by retiring the first WAVE-1
  document, docs/INTENT-bazel-feasibility.md, whose verdict already graduated to Decision 80 --
  shrinking the prose drift surface so agents read architectural intent from the canonical
  machine-parseable surfaces (Decisions + roadmap), per Decision 86 and the agent-first North Star.
plan_type: IMPLEMENTATION
verification_tier: V1
plan_path: docs/plans/PLAN-intent-migration-wave1-bazel-feasibility.yaml
phase: >-
  Platform tier T5.5 (INTENT-* document extraction and retirement); WAVE-1 of
  docs/intent-migration/MANIFEST.yaml (feasibility_graduated -> delete_pointer).
scope:
  - file: docs/INTENT-bazel-feasibility.md
    action: Delete
    purpose: >-
      Retire the graduated feasibility assessment. Its decision-relevant content lives in
      Decision 80 (verdict + discriminating findings + wired revisit trigger) and roadmap KG.13;
      the exhaustive per-claim tables remain recoverable in git history (commit ddb85a0, PR #64)
      per the delete_pointer archetype.
  - file: docs/intent-migration/MANIFEST.yaml
    action: Modify
    purpose: >-
      Flip the bazel-feasibility documents[] entry disposition_state from pending to done
      (line ~272). This auto-shrinks the validate.py intent-doc-freeze guard's allowed set
      (the guard derives the allowed set from entries with disposition_state != done). Change
      ONLY that one field; leave content_blocks / drift_findings / targets intact as the
      disposition record.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Inbound-reference sweep: remove the `- docs/INTENT-bazel-feasibility.md` line from tier_item
      T5.5 files_in_scope (line ~5331) so the deleted path is not a dangling reference and the
      T5.5 final INTENT- grep stays clean.
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Inbound-reference sweep: reword Decision 80's two live path references (lines ~332 and ~346)
      to drop the `docs/INTENT-bazel-feasibility.md` path token while preserving the PR #64 /
      commit ddb85a0 git-archaeology anchor. Reference repoint ONLY -- no change to the verdict,
      decision points, rationale, consequences, heading, status, date, or Warehouse ID.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - docs/INTENT-bazel-feasibility.md no longer exists on disk.
  - >-
    The MANIFEST bazel-feasibility documents[] entry has disposition_state: done, and it is the
    only entry flipped to done; every other documents[] entry is unchanged.
  - >-
    The validate.py intent-doc-freeze guard (validate_intent_doc_freeze) produces no failure
    naming bazel-feasibility when run against the post-change tree.
  - >-
    Neither live canonical surface (docs/DECISIONS.md, docs/ROADMAP-PLATFORM.yaml) contains the
    path docs/INTENT-bazel-feasibility.md after the sweep.
  - >-
    Repo-wide, the only remaining occurrences of the path docs/INTENT-bazel-feasibility.md are the
    historical plan artifact docs/plans/PLAN-bazel-feasibility.md and the synthetic test fixtures
    in tests/test_validate.py.
  - >-
    Decision 80 still references commit ddb85a0 and/or PR #64 (git-archaeology anchor preserved);
    its verdict, decision points, rationale, consequences, heading, status, date, and Warehouse ID
    are otherwise unchanged.
  - tier_item T5.5 files_in_scope no longer lists docs/INTENT-bazel-feasibility.md.
  - Full `bin/venv-python -m scripts.validate` exits 0 (credential-gated checks may report SKIPPED in degraded mode).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Confirm the INTENT doc is deleted from the working tree.
    command: test ! -f docs/INTENT-bazel-feasibility.md && echo DELETED || echo PRESENT
    expected: Prints DELETED.
    fix_if: >-
      Prints PRESENT -- the file still exists. Ensure `git rm docs/INTENT-bazel-feasibility.md`
      ran (or `rm` + `git add -A`).
  - step: 2
    phase: pre-deploy
    action: Confirm the MANIFEST bazel-feasibility entry is flipped to disposition_state done.
    command: |-
      grep -A20 '^  - id: bazel-feasibility$' docs/intent-migration/MANIFEST.yaml | grep -m1 'disposition_state:'
    expected: "Prints a line whose value is `disposition_state: done`."
    fix_if: >-
      Prints `disposition_state: pending` (or nothing) -- flip ONLY the bazel-feasibility entry's
      disposition_state field to done; do not touch other entries.
  - step: 3
    phase: pre-deploy
    action: Run the real intent-doc-freeze guard against the post-change tree; confirm no bazel false-positive.
    command: |-
      bin/venv-python -c "import scripts.validate as v; f=[]; v.validate_intent_doc_freeze(f); print('PASS' if not any('bazel-feasibility' in x for x in f) else 'FAIL:'+str(f))"
    expected: Prints PASS (the file is gone and its manifest entry is done, so the guard emits no failure for it).
    fix_if: >-
      Prints FAIL -- the guard flags bazel (the file is still on disk but no longer in the allowed
      set). Ensure BOTH the file is deleted AND the manifest entry is done (the two must land together).
  - step: 4
    phase: pre-deploy
    action: Inbound-reference sweep -- confirm the two LIVE canonical surfaces hold no path reference.
    command: |-
      grep -rn "INTENT-bazel-feasibility.md" docs/DECISIONS.md docs/ROADMAP-PLATFORM.yaml; echo "grep_exit=$?"
    expected: No matching lines printed; trailing line reads grep_exit=1 (grep found nothing).
    fix_if: >-
      Any line prints (grep_exit=0) -- a live path reference remains. Reword/remove it: DECISIONS.md
      Decision 80 lines ~332 and ~346, ROADMAP-PLATFORM.yaml T5.5 files_in_scope line ~5331.
  - step: 5
    phase: pre-deploy
    action: Inbound-reference sweep -- confirm only the intended historical/synthetic residue remains repo-wide.
    command: |-
      grep -rl "INTENT-bazel-feasibility.md" . --include=*.md --include=*.yaml --include=*.py | sort
    expected: >-
      Exactly two paths -- ./docs/plans/PLAN-bazel-feasibility.md and ./tests/test_validate.py.
      NEITHER docs/DECISIONS.md NOR docs/ROADMAP-PLATFORM.yaml appears.
    fix_if: >-
      docs/DECISIONS.md or docs/ROADMAP-PLATFORM.yaml appears -- a live surface still dangles
      (re-do step 4's reword). An unexpected new path appears -- investigate it before proceeding;
      do not blanket-edit historical plan artifacts.
  - step: 6
    phase: pre-deploy
    action: Confirm Decision 80's git-archaeology anchor survived the reword.
    command: |-
      grep -n "ddb85a0\|PR #64" docs/DECISIONS.md | head
    expected: At least one line in the Decision 80 block still references commit ddb85a0 and/or PR #64.
    fix_if: >-
      No anchor remains -- the reword stripped the git pointer. Restore the ddb85a0 / PR #64
      reference so the deleted prose stays recoverable.
  - step: 7
    phase: pre-deploy
    action: Confirm the synthetic-fixture guard tests still pass (unaffected by the real manifest flip).
    command: bin/venv-python -m pytest tests/test_validate.py::TestIntentDocFreeze -q
    expected: All TestIntentDocFreeze tests pass (the fixtures build their own temp manifest; the real flip does not touch them).
    fix_if: >-
      A failure -- inspect it; the tests are synthetic and should be flip-independent. Do NOT edit
      the tests to mask a real regression (Decision 55).
  - step: 8
    phase: pre-deploy
    action: Run the authoritative presubmit (CI-equivalent gate).
    command: bin/venv-python -m scripts.validate
    expected: >-
      Exits 0; the "Intent doc freeze (Decision 86)" section reports no failures; the DECISIONS.md
      and roadmap schema checks pass (credential-gated DQ checks may report SKIPPED in degraded mode).
    fix_if: >-
      Non-zero exit -- read the failing check. Likely causes: malformed YAML after the manifest or
      roadmap edit, or a DECISIONS.md structural check tripped by the reword. Fix the cited check;
      do not add or remove checks to make it pass.
