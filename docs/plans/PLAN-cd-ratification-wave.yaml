  Pre-ETL (roadmap/DECISIONS/test edits only): git checkout -- docs/DECISIONS.md
  docs/ROADMAP-PLATFORM.yaml tests/test_platform_roadmap_models.py restores the tree. Post-ETL: the
  backfill is an idempotent caller-keyed upsert on dec-NNN; to reverse a ratification the DECISIONS.md
  entry must be removed AND the ops_decisions row reconciled -- prefer forward-fix (amend the
  Decision) over deletion, since DECISIONS.md is the source of truth the warehouse projects from. The
  roadmap CD flips and exemption strips are reverted by restoring the YAML and re-running the backfill
  (upsert refreshes from the markdown SoT).
