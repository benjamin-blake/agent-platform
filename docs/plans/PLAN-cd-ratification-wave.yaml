schema_version: 1
slug: "cd-ratification-wave"
intent: >-
  Execute the Decision-105 ratification lane over six pending candidate decisions -- five realized-
  but-unevidenced (CD.39, CD.9, CD.5, CD.4, CD.8) plus CD.19 (a resolved-by-events closure ratified
  by explicit human decision) -- plus the lockstep roadmap/test bookkeeping, draining ratification
  DEBT so the pending-CD count reflects genuinely open decisions and the governance surface stays
  truthful. DRAFT-only during /plan; all warehouse writes and state flips are /implement-time behind
  an execution-time human confirmation gate.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-cd-ratification-wave.yaml
phase: >-
  Platform governance / Decision-105 candidate-decision ratification lane
  (docs/contracts/candidate-decision-ratification.yaml). Drains the pending_cd_disposition ledger
  from audit audits/pending-cd-premise-validity-f4dec93.yaml (Unit D residue, re-baselined at
  origin/main HEAD 2026-07-16). No tier_item is advanced; this is ratification + bookkeeping only.
scope:
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Author 6 new `## Decision NNN:` entries (dec-135..dec-140) ratifying CD.39/9/5/4/8/19, at the
      top of the file (newest-first convention). Numbering authority is DECISIONS.md; numbers
      re-derived at /implement time (current max = Decision 134). Format matches the ETL parser
      (scripts/decisions_md.py) and the Decision 122/123 template so the Decision-134 DAF fidelity
      tripwire does not fire. Verbatim drafts in context items DRAFT-DEC-135..DRAFT-DEC-140.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      (a) Flip CD.39/9/5/4/8/19 to the canonical ratified shape (state: ratified + ratified_as +
      filed_via, dec-135..dec-140) with each realization_evidence written (context DRAFT-EVIDENCE +
      DRAFT-ROADMAP-FLIPS); (b) strip bootstrap_completion_exempt on T0.9/T0.10/T2.4/T2.2 (each now
      has all gating CDs ratified) and add a dated discharge record to the scope-(c) exemption ledger
      (context DRAFT-BOOKKEEPING); (c) correct T2.2's stale timestamp-policy note (option (b), not
      "timestamps preserved"). RETAIN exemptions on T2.5/T0.13/T2.1/T0.12.5/T0.12.7/T0.3 (each still
      gated by a pending CD).
  - file: tests/test_platform_roadmap_models.py
    action: Modify
    purpose: >-
      Lockstep update of test_live_platform_yaml_bootstrap_exemption_set: remove "T0.9", "T0.10",
      "T2.4", "T2.2" from the verbatim `expected` set (17 -> 13; they strip) and refresh the docstring
      to record the dec-136/137/138 (CD.9/CD.5/CD.4) and dec-140 (CD.19) discharge. This is the ONLY
      test coupled to the live CD/exemption state; all realization_candidates/ratifiable_cds tests are
      fixture-based and safe.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    The referential ratification guard (validate_candidate_decision_ratification, both --pre and
    full tiers) is GREEN over all SIX newly-ratified shapes: each of CD.39/9/5/4/8/19 has state:
    ratified + ratified_as: dec-NNN + filed_via: ops_decisions:dec-NNN with matching NNN, and each
    dec-NNN resolves to a `## Decision NNN:` header in DECISIONS.md (R1).
  - >-
    ratifiable_cds() and realization_candidates() reflect the drain: CD.4, CD.5, CD.8, CD.9, CD.39
    no longer appear in realization_candidates() (which drops from 13 entries to the 8 forward-
    intent/genuinely-open remainder CD.3/CD.10/CD.15/CD.23/CD.29/CD.30/CD.32/CD.37); none of the six
    ratified CDs remain in the pending set (CD.19 was never a realization_candidate -- it ratifies as
    a resolved-by-events closure, not a realized-by-gate one).
  - >-
    docs/ROADMAP-PLATFORM.yaml parses cleanly (scripts.roadmap.platform_roadmap.load succeeds) and
    validate_platform_roadmap passes; CD counts move pending 20->14, ratified 18->24, superseded 2,
    total 40 (no new CD is created).
  - >-
    bootstrap_completion_exempt is stripped on exactly T0.9, T0.10, T2.4, T2.2 and RETAINED on
    T2.5/T0.13/T2.1/T0.12.5/T0.12.7/T0.3; test_live_platform_yaml_bootstrap_exemption_set is updated
    in lockstep (expected set now 13) and GREEN (actual == expected).
  - >-
    The `--backfill-decisions-md` ETL writes the 6 new rows to ops_decisions without raising the
    Decision-134 DAF fidelity tripwire (each entry parses to a non-empty decision_text and an ISO
    decided_date), and each dec-NNN is retrievable via the decision_by_id read verb.
  - >-
    CD.19 is ratified as dec-140 and HONESTLY framed as a resolved-by-events closure (human-decided;
    NOT realized-by-gate -- T1.6 remains not_started); its detail records the de facto option (b)
    outcome, and T2.2's stale note is corrected to "created preserved; last_updated = import_time".
  - >-
    session_preflight re-run confirms the cleared completion gates (T0.9/T0.10/T2.4/T2.2 no longer
    blocked_on_cd; CD.19's gate on T1.6 cleared) and validate.py --pre is GREEN end to end.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      After the DECISIONS.md + roadmap edits, confirm the six target CDs carry the canonical ratified
      shape in the roadmap.
    command: >-
      bin/venv-python -c "import yaml,pathlib;d=yaml.safe_load(pathlib.Path('docs/ROADMAP-PLATFORM.yaml').read_text());cds={c['id']:c
      for c in d['candidate_decisions']};print([(i,cds[i]['state'],cds[i].get('ratified_as'),cds[i].get('filed_via'))
      for i in ['CD.39','CD.9','CD.5','CD.4','CD.8','CD.19']])"
    expected: >-
      Each tuple reads (id, 'ratified', 'dec-NNN', 'ops_decisions:dec-NNN') with matching NNN:
      CD.39->135, CD.9->136, CD.5->137, CD.4->138, CD.8->139, CD.19->140 (numbers subject to
      /implement re-derivation).
    fix_if: >-
      Any CD still state: pending, a missing/typo'd ratified_as or filed_via, or ratified_as/
      filed_via NNN disagreement -> re-edit the roadmap CD entry.
    graduation: waive
    graduation_waiver_reason: >-
      grep/parse-shaped and grep_count-expressible in principle, but it verifies THIS wave's transient
      six-CD set and numbers; the standing validate_candidate_decision_ratification guard already
      graduates the general ratified-shape referential invariant across all CDs, so a per-wave
      graduated check would duplicate it.
  - step: 2
    phase: pre-deploy
    action: Confirm the six new Decision headers are present in DECISIONS.md.
    command: grep -cE '^## Decision (135|136|137|138|139|140):' docs/DECISIONS.md
    expected: "6"
    fix_if: >-
      Count < 6 -> a drafted entry is missing or its header is malformed; re-insert. (If the
      /implement re-derivation shifted the block off 135-140, adjust the grep to the actual range.)
    graduation: waive
    graduation_waiver_reason: >-
      grep_count-shaped but pinned to this wave's specific decision numbers, which shift if a
      concurrent PR claims 135+; a graduated standing check would encode transient literals. The
      durable header<->ratified_as linkage is already graduated by the referential guard.
  - step: 3
    phase: pre-deploy
    action: >-
      Confirm the roadmap still parses, the realization feed has drained, and the pending count
      arithmetic holds.
    command: >-
      bin/venv-python -c "from pathlib import Path;from scripts.roadmap.platform_roadmap import
      load,PlatformRoadmapState;doc=load(Path('docs/ROADMAP-PLATFORM.yaml'));st=PlatformRoadmapState(doc);rc={c['id']
      for c in st.realization_candidates()};pend={c.id for c in doc.candidate_decisions if
      c.state=='pending'};print('rc_residue',{'CD.4','CD.5','CD.8','CD.9','CD.39'}&rc,'pending_residue',{'CD.4','CD.5','CD.8','CD.9','CD.39','CD.19'}&pend,'pending_count',len(pend))"
    expected: "rc_residue set() pending_residue set() pending_count 14 (the six have left; 20 -> 14)."
    fix_if: >-
      A target CD still present in either set, or pending_count != 14 -> a state flip did not persist;
      re-edit.
    graduation: waive
    graduation_waiver_reason: >-
      parse-shaped and command_output_matches-expressible in principle, but it verifies THIS wave's
      transient six-CD feed/pending residue; the general realization_candidates()/ratifiable_cds()
      behavior is already graduated by the fixture unit tests in
      tests/platform_roadmap_state/test_realization_candidates.py, so a per-wave graduated check would
      duplicate them. Parity with the step 1-2 waivers.
  - step: 4
    phase: pre-deploy
    action: Run the bootstrap-exemption lockstep test.
    command: bin/venv-python -m pytest tests/test_platform_roadmap_models.py -k bootstrap_exemption_set -q
    expected: >-
      PASS -- actual bootstrap_completion_exempt set == expected (13 items) with T0.9/T0.10/T2.4/T2.2
      removed and the retains intact.
    fix_if: >-
      AssertionError missing=/extra= -> reconcile: the roadmap strips and the test `expected` set must
      agree; do NOT loosen the test to a membership floor -- this is a deliberate verbatim SoT
      assertion.
    graduation: not-applicable
  - step: 5
    phase: pre-deploy
    action: Run the fast presubmit tier (governance writes gate pre-merge).
    command: bin/venv-python -m scripts.validate --pre
    expected: >-
      GREEN. In particular validate_candidate_decision_ratification and
      validate_candidate_decision_supersession pass, the DECISIONS.md-header referential checks
      resolve all six new dec-NNN, and validate_decisions_size stays under the 400KB/120-header
      ceilings.
    fix_if: >-
      Any check red -> forward-fix on the branch (never auto-revert, Decision 55); if a ci-rca-class
      failure, follow the RCA-first protocol.
    graduation: not-applicable
  - step: 6
    phase: post-deploy
    action: >-
      ETL the new DECISIONS.md entries into ops_decisions (Single Portal Invariant, Decision 84).
      Requires the agent_platform assume-role profile.
    command: bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md
    expected: >-
      Returns {"written": >=6, "failed": 0, "skipped": ...} with no RuntimeError -- the six new
      live-h2 entries parse to non-empty decision_text + ISO decided_date, so the DAF fidelity
      tripwire does NOT fire and no fidelity_baseline.yaml allowlist edit is needed.
    fix_if: >-
      Fidelity tripwire RuntimeError -> a new entry parsed to empty decision_text or a non-ISO date;
      fix the entry's `**Decision:**` body / `**Date:**` line and re-run (idempotent upsert). Portal
      unreachable -> confirm `aws sts get-caller-identity --profile agent_platform`; write fails
      loudly, no offline outbox (Decision 84 I-4).
  - step: 7
    phase: post-deploy
    action: Confirm each ratified CD's dec-NNN is retrievable from ops_decisions via the reader.
    command: >-
      bin/venv-python -c "from scripts.ops_portal.decisions import _fetch_decision_from_reader as
      f;print([bool(f(x)) for x in ['dec-135','dec-136','dec-137','dec-138','dec-139','dec-140']])"
    expected: "[True, True, True, True, True, True] (adjust ids to the /implement-derived numbers)."
    fix_if: "Any False -> the backfill did not land that row; re-run step 6 and inspect the writer response."
  - step: 8
    phase: post-deploy
    action: Re-run session_preflight to confirm the completion gates cleared and the realization surface updated.
    command: bin/venv-python -m scripts.session.preflight
    expected: >-
      Preflight OK; T0.9/T0.10/T2.4/T2.2 no longer appear in blocked_on_cd for CD.4/CD.5/CD.9/CD.19,
      CD.19's gate on T1.6 is cleared, and the realization-candidate surface no longer lists the five
      realized CDs.
    fix_if: >-
      A target item still blocked_on its now-ratified CD -> the state flip did not persist; re-check
      the roadmap edit. Creds unavailable -> degraded mode is acceptable (Decision 60); credential-
      dependent legs emit SKIPPED, non-blocking.
constraints:
  - >-
    DRAFT-ONLY during /plan and this plan artefact: do NOT run --backfill-decisions-md or
    --file-decision, do NOT edit DECISIONS.md, do NOT flip any state/ratified_as/filed_via/
    realization_evidence, do NOT strip any bootstrap_completion_exempt flag, do NOT call the ops
    portal. Every such action is /implement-time, AFTER the execution-time human confirmation gate
    (Decision 105 lane; plan-confirmation + plan-critique are the sign-off on the drafted text).
  - >-
    CD.19's disposition was DECIDED BY THE HUMAN PRINCIPAL: ratify as dec-140, a resolved-by-events
    closure (NOT a realized-by-gate ratification -- T1.6 remains not_started). The drafted DEC-140 +
    evidence must frame it honestly as overtaken-by-events and record the true de facto outcome
    (option (b): created preserved, last_updated = import_time), not the audit's mis-recorded
    option-(a) framing.
  - >-
    File NO recs (the lane's only prescribed portal call is the /implement-time backfill ETL). No
    rescue agents or workaround loops (Decision 55); CI-red is forward-fixed on the branch, never
    auto-reverted.
  - >-
    Single Portal Invariant (Decision 84): decision writes go ONLY through
    scripts.ops_data_portal --backfill-decisions-md; never Edit/Write logs/.decisions-index.jsonl
    (read cache). Numbering authority is DECISIONS.md (caller supplies decision_id); re-derive the
    next free number at /implement time -- a concurrent PR may have claimed dec-135+.
  - >-
    No new standing prose-architecture docs (Decision 86): rationale lives in the DECISIONS.md
    entries, not a companion doc. No SLOC concern (Decision 128) -- YAML/markdown/test edits only,
    no source file crosses its budget.
