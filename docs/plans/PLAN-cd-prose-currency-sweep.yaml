    3x file-wide: CD.30 detail (L1407, pending -> currently TRUE, out of scope), CD.31 opening (L1423,
    retained), CD.31 closing (L1485, removed). After the sweep the file-wide count is 2, so rec-2048's
    literal oracle would NOT reach 1 -- it is now miscalibrated by CD.30's legitimate later-added instance.
    The plan therefore verifies rec-2048's INTENT with a CD.31-BLOCK-SCOPED count (VP step 3, == 1), not the
    stale file-wide oracle. Closure is via the Resolves: trailer (trust-based autoclose, Decision 103/the
    Decision 70 trailer convention -- runs no oracle), verified post-merge by VP step 10.
  - >-
    Lambda Deployment Assessment: docs/ROADMAP-PLATFORM.yaml is a `data-pipeline` bundled ASSET (roadmap
    data), NOT Lambda handler/include code. Editing prose in it requires NO build/deploy/smoke-test step
    and does not force V3. Verification tier is V2: a schema-validated governed-data file whose invariants
    are enforced by executable Python guards, so verification exercises those real code paths (not static docs).
  - >-
    Graduation dispositions (T3.21 / VF-05): this plan is net-new, so every pre-deploy VP step carries a
    `graduation` field, and NONE is a GRADUATE candidate (a prose currency sweep has no durable behaviour to
