    one-shot structured-field guard against the PR base, not a standing file grep), and 9 (validate --pre
    meta-gate) stay `not-applicable`; the post-deploy closure step (10) needs no disposition. The class-level
    regression guard for this whole category is the lane-contract prose-currency-sweep clause landed in #596
