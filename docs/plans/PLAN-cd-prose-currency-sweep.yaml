execution_steps:
  - >-
    Item 1 (CD.35 detail, rec-2287): replace the sentence "Ratified later via the log-decision path (a
    numbered Decision when Wave 1 / T2.20 ships); does NOT edit DECISIONS.md while pending." with a
    date-bracketed resolved-historical note that points at the live dec-092 ratification and paraphrases
    (does NOT quote) the retired pending-window clause. Suggested: "[Ratified 2026-06-19 as Decision 92
    (dec-092) at Wave 1 / T2.20 -- see the state/ratified_as/filed_via fields and discipline_points below.
    Pre-ratification this clause recorded that ratification would land later via the log-decision path with
    no DECISIONS.md edit during the pending window; retained as resolved-historical.]" MUST NOT reproduce
    the literal substring 'does NOT edit DECISIONS.md while pending'.
  - >-
    Item 2a (CD.31 duplicate disclaimer, rec-2048): (i) bracket the RETAINED opening instance
    ("This roadmap edit does NOT touch DECISIONS.md and does NOT change any numbered Decision's status.")
    as resolved-historical with a 2026-07-16 date + dec-078 pointer, keeping the literal 'does NOT touch
    DECISIONS.md' sentence intact (a prior VP requires it within 40 lines of 'id: CD.31'); (ii) remove the
