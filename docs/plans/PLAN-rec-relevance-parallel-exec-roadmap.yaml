execution_steps:
  - "Deliverable authored DURING this planning session (REPORT-ONLY): docs/ROADMAP-PLATFORM.yaml gains candidate_decisions CD.36-38 (pending) and tier_items T3.8/T3.9 (not_started, MVP), T3.10/T4.8/T4.9/T4.10/T4.11 (deferred_post_mvp). Verified: platform_roadmap PASS, no live->deferred edges, T3.8 eligible."
  - "No /implement required for this plan -- it captures roadmap forward intent. Per-item implementation is a separate future plan when each item is scheduled (T3.8 is eligible now; pick it up via /orient -> /plan when rec-queue hygiene is prioritised)."
  - "Execute the Verification Plan; run the Step 10 multi-perspective REPORT critique against the roadmap additions; merge to main."
work_areas: []
rollback: >-
  Revert the three additive edits to docs/ROADMAP-PLATFORM.yaml (the CD.36-38 block and the T3.8-T3.10 /
  T4.8-T4.11 tier_item blocks). Purely additive forward-intent DATA; no runtime or code impact, so reverting
  has no downstream consequence beyond removing the roadmap entries.
