  - >-
    All edits land in one branch commit so deletion + manifest flip + carrier creation + sweep are atomic
    (the intent-doc-freeze guard requires file-deleted AND manifest-entry-done together).
  - No rescue agents or workaround loops (Decision 55). A failing guard or schema check is fixed at the
    source, never masked.
