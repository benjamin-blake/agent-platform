verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      No-stranded-intent gate -- confirm the surviving facets have live carriers BEFORE deleting the doc
      (Decision 86: extract residual to live surfaces). ops_session_log retirement is carried by T2.26;
      the canonical DuckLake telemetry substrate (the four-table model agent-turn events reconcile onto)
      is carried by T2.36; the new turn-capture build is carried by T3.19.
    command: >-
      grep -q 'ops_session_log' docs/ROADMAP-PLATFORM.yaml && grep -A2 '^  - id: T2.36$'
      docs/ROADMAP-PLATFORM.yaml | grep -q 'telemetry re-lands on DuckLake' && grep -q '^  - id: T3.19$'
      docs/ROADMAP-PLATFORM.yaml && echo CARRIERS_OK
    expected: Prints CARRIERS_OK.
    fix_if: >-
      If T2.26 no longer carries ops_session_log or T2.36 is missing, do NOT git rm yet -- the surviving
      facet would be stranded. Ensure T3.19 is authored first (it is the primary carrier).
  - step: 2
    phase: pre-deploy
    action: >-
      Confirm the new tier_item T3.19 exists with the reconciled dependency edges and does NOT target
      the retired Iceberg substrate.
    command: >-
      bin/venv-python -c "import yaml; d=yaml.safe_load(open('docs/ROADMAP-PLATFORM.yaml'));
      items=[i for i in d['tier_items'] if i['id']=='T3.19']; assert items, 'T3.19 missing';
      t=items[0]; assert set(['T2.36','T1.10','T3.2'])<=set(t['depends_on']), t['depends_on'];
      blob=yaml.dump(t); assert 'iceberg_tables.tf' not in blob, 'still targets iceberg';
      print('T3.19_OK', t['depends_on'])"
    expected: "Prints T3.19_OK with depends_on including T2.36, T1.10, T3.2; no assertion error."
    fix_if: >-
      Missing item, wrong edges, or iceberg_tables.tf still present -- fix the T3.19 block. All three
      depends_on targets already exist; a bad edge fails the T-1.5 roadmap schema check.
  - step: 3
    phase: pre-deploy
    action: >-
      Confirm the new candidate_decision CD.40 exists with state pending and cites the canonical
      telemetry decisions.
    command: >-
      bin/venv-python -c "import yaml; d=yaml.safe_load(open('docs/ROADMAP-PLATFORM.yaml'));
      cds=[c for c in d.get('candidate_decisions',[]) if c['id']=='CD.40']; assert cds, 'CD.40 missing';
      c=cds[0]; assert c.get('state')=='pending', c.get('state'); blob=yaml.dump(c);
      assert all(x in blob for x in ['95','96','97','84','105']), 'missing canonical cites';
      assert 'T3.19' in yaml.dump(c.get('gates',[])), 'CD.40 must gate T3.19'; print('CD40_OK')"
    expected: Prints CD40_OK (state pending; cites 95/96/97/84/105; gates T3.19).
    fix_if: >-
      Missing CD.40, wrong state (must be 'pending' per Decision 105 / the CandidateDecision default),
      or missing canonical cites -- fix the candidate_decisions[] entry.
  - step: 4
    phase: pre-deploy
    action: Confirm the INTENT doc is deleted from the working tree.
    command: test ! -f docs/INTENT-session-log-architecture.md && echo DELETED || echo PRESENT
    expected: Prints DELETED.
    fix_if: Prints PRESENT -- ensure `git rm docs/INTENT-session-log-architecture.md` ran.
  - step: 5
    phase: pre-deploy
    action: Confirm the MANIFEST session-log-architecture entry is flipped to disposition_state done.
    command: >-
      grep -A20 '^  - id: session-log-architecture$' docs/intent-migration/MANIFEST.yaml | grep -m1
      'disposition_state:'
    expected: "Prints a line whose value is `    disposition_state: done`."
    fix_if: >-
      Prints pending (or nothing) -- flip ONLY the session-log-architecture entry's disposition_state to
      done; do not touch other entries.
  - step: 6
    phase: pre-deploy
    action: Run the real intent-doc-freeze guard; confirm no session-log-architecture false-positive.
    command: >-
      bin/venv-python -c "import scripts.validate as v; f=[]; v.validate_intent_doc_freeze(f);
      print('PASS' if not any('session-log-architecture' in x for x in f) else 'FAIL:'+str(f))"
    expected: Prints PASS.
    fix_if: >-
      Prints FAIL -- the guard flags session-log-architecture. Ensure BOTH the file is deleted AND the
      manifest entry is done (the guard derives its allowed set from disposition_state != done, so the
      two must land together).
  - step: 7
    phase: pre-deploy
    action: >-
      Inbound-reference sweep -- confirm every live surface is repointed off the deleted doc path and off
      the CD.NN.* placeholder tokens.
    command: >-
      grep -Ern 'INTENT-session-log-architecture\.md|CD\.NN\.[a-f]' docs/ROADMAP-PLATFORM.yaml
      scripts/verifiers/__init__.py .claude/skills/planning/SKILL.md; echo "grep_exit=$?"
    expected: No matching lines; trailing line reads grep_exit=1.
    fix_if: >-
      Any line prints -- a live surface still dangles the deleted path or a placeholder token. Repoint it
      to CD.40 / T3.19 (T-1.9 note, T2.15, T2.26, the verifiers comment, or the SKILL.md example). Do not
      delete the host content, only swap the pointer.
  - step: 8
    phase: pre-deploy
    action: >-
      Repo-wide close -- fresh sweep returns only historical / c4-exempt residual.
    command: >-
      grep -rl 'INTENT-session-log-architecture' . --include=*.md --include=*.yaml --include=*.py |
      grep -v '^\./docs/plans/' | grep -v '^\./docs/audit-reports/' | grep -v
      '^\./docs/intent-migration/MANIFEST.yaml' | sort; echo "residual_exit=$?"
    expected: >-
      No lines printed before residual_exit (all remaining hits are under docs/plans/, docs/audit-reports/,
      or the c4-exempt MANIFEST self-reference). A live canonical or code/infra surface appearing is a
      failure.
    fix_if: >-
      A canonical or code surface appears -- repoint it (step 7). An UNEXPECTED new path appears --
      investigate before editing; it may be a reference introduced after this plan's inventory.
  - step: 9
    phase: pre-deploy
    action: Confirm the synthetic intent-doc-freeze guard unit tests still pass (flip-independent).
    command: bin/venv-python -m pytest tests/test_validate.py::TestIntentDocFreeze -q
    expected: All TestIntentDocFreeze tests pass.
    fix_if: >-
      A failure -- inspect it; the tests are synthetic and should be flip-independent. Do NOT edit the
      tests to mask a real regression (Decision 55).
  - step: 10
    phase: pre-deploy
    action: Run the authoritative presubmit (CI-equivalent gate).
    command: bin/venv-python -m scripts.validate
    expected: >-
      Exits 0; the "Intent doc freeze (Decision 86)" section reports no failures; the ROADMAP schema
      check passes (T3.19 depends_on resolves; CD.40 referential integrity holds) and the MANIFEST schema
      check passes (credential-gated DQ checks may report SKIPPED in degraded mode).
    fix_if: >-
      Non-zero exit -- read the failing check. Likely causes: malformed YAML after the roadmap/manifest
      edit, a T3.19 schema violation (missing required field, unresolved depends_on), or a CD.40
      referential-integrity failure. Fix the cited check; do not add or remove checks to make it pass.
