    CD.40 is a candidate_decision (forward proposal), state: pending, kept UNRATIFIED. Do NOT ratify it
    to a numbered Decision, do NOT write it to ops_decisions, and do NOT run --backfill-decisions-md:
    the subsystem is unbuilt, so there is no realization evidence (Decision 105). It is a
    ROADMAP-PLATFORM.yaml candidate_decisions[] edit only.
  - >-
    Preserve every repointed host's surrounding prose and the T-1.9 historical completion record --
    these are pointer swaps, not content rewrites. Only the dangling doc path and the CD.NN.* placeholder
    tokens are replaced with the live CD.40 / T3.19 target.
  - >-
    Do NOT mass-rename the bare `telemetry_agent_turns` slug across T2.15 / T2.26 / T3.2 / the verifiers
    comment -- that is those items' own build-time reconciliation and is out of scope here. CD.40 records
