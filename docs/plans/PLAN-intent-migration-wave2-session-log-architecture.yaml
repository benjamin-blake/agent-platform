  - >-
    Do NOT edit tests/test_validate.py; its TestIntentDocFreeze fixtures are synthetic and
    flip-independent.
  - >-
    Do NOT edit logs/.recommendations-log.jsonl or logs/.decisions-index.jsonl. This plan files no recs
