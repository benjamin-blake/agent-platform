schema_version: 1
slug: "t3-6-hermeticity-closeout"
intent: >-
  Reconcile platform T3.6 (Test-suite hermeticity audit) exit-criteria ledger to reality and close the item:
  hermeticity is the precondition for the self-improving system's autonomous, cacheable, hard-gated verification
  (CD.29 / CD.27 / KG.13), so an accurate "hermeticity DONE" record unblocks that downstream platform work.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-t3-6-hermeticity-closeout.yaml
phase: >-
  Platform T3.6 (Test-suite hermeticity audit) -- follow-on closeout. The pytest-suite half shipped 2026-06-02
  (PLAN-test-hermeticity.md, pre-ledger) and the verifier half shipped 2026-06-18 (PLAN-verifier-hermeticity); the structured
  exit-criteria ledger was added afterwards (#256/#258) so criteria c1-c4 never received their open->met flips.
  This plan re-verifies that evidence, records the c4 precondition, rehomes the DQ criterion c5 to T1.6, and
  lets T3.6 complete.
scope:
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      The sole edit target. (1) c1-c4 open->met flips are driven by closes_criteria (applied by /implement's
      bookkeeping walk on a verified VP pass, met_by=t3-6-hermeticity-closeout). (2) c4 deliverable: the
      authoritative satisfied-precondition record lands on the T3.6 tier_item (progress_note + the c1-c4 met_by
      provenance), with SECONDARY cross-reference pointers appended to CD.29 (a new gate-status discipline_points
      entry -- NOT touching state/filed_via/title/detail/gates, so it records a satisfied gate, never ratifies
      the pending CD) and KG.13.notes. (3) c5 rehomed to T1.6 (status: rehomed, met_by: T1.6). (4) T3.6
      status: complete + completed_at after all criteria are met/rehomed (operator-confirmed, not auto-flipped).
bundled_recommendations: []
closes_criteria:
  - "T3.6:c1"
  - "T3.6:c2"
  - "T3.6:c3"
  - "T3.6:c4"
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    c1: docs/AUDIT-test-hermeticity.yaml parses and every entry carries root_cause_class + disposition, AND every
    non-hermetic verifier under scripts/verifiers/ declares Hermeticity.NON_HERMETIC_BY_CONSTRUCTION -- the audit
    enumeration exists on disk (re-verified, not inferred from the progress_note).
  - >-
    c2: the unit suite passes under two distinct pytest-randomly seeds with sockets disabled
    (-m "not integration" --disable-socket --randomly-seed), proving order- and network-independence.
  - >-
    c3: validate_hermeticity_flags and validate_verifier_hermeticity are both invoked in run_python_checks and
    their regression tests (TestValidateHermeticityFlags, TestVerifierHermeticity) pass.
  - >-
    c4: the T3.6 hermeticity precondition is recorded SATISFIED -- authoritatively on the T3.6 tier_item, with
    dated [SATISFIED 2026-06-25 ...] secondary pointers on CD.29 (gate-status note) and KG.13.notes; the edit
    leaves CD.29 state: pending and filed_via byte-identical (no ratification).
  - >-
    c5 is rehomed to T1.6 (status: rehomed, met_by: T1.6); T1.6 retains the live-reader-DQ -> scheduled-canary
    scope verbatim in its own exit_criteria, so no scope is lost.
  - >-
    Roadmap criteria-integrity (validate_platform_roadmap checks i/ii/iii) and the PlanDocument schema both pass;
    after the bookkeeping walk T3.6 has no open criteria and qualifies for status: complete.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      c1 -- re-verify the audit enumeration exists on disk: the test-side audit YAML is well-formed with
      per-entry root_cause_class + disposition, and the verifier-side dispositions are declared in code.
    command: >-
      bin/venv-python -c "import yaml; d=yaml.safe_load(open('docs/AUDIT-test-hermeticity.yaml')); t=d['tests'];
      assert t and all('root_cause_class' in e and 'disposition' in e for e in t), 'missing fields';
      print(f'audit entries OK: {len(t)}')" && test $(grep -rlF "NON_HERMETIC_BY_CONSTRUCTION" scripts/verifiers/ | wc -l) -ge 5
    expected: >-
      Prints "audit entries OK: N" (N>0) and the test exits 0 because at least 5 verifier modules declare
      NON_HERMETIC_BY_CONSTRUCTION. Both the test-side and verifier-side audit dispositions are present.
    fix_if: >-
      The audit YAML is missing/malformed or an entry lacks root_cause_class/disposition, or fewer than 5
      verifier modules carry the disposition -- c1 is NOT actually satisfied; STOP and re-open the criterion
      rather than flipping it.
  - step: 2
    phase: pre-deploy
    action: >-
      c2 -- run the hermetic unit lane under two distinct random seeds with sockets disabled; both green proves
      order-independence and network-independence (the shipped invariant).
    command: >-
      bin/venv-python -m pytest tests/ -m "not integration" --randomly-seed=12345 --disable-socket
      --allow-hosts=127.0.0.1,::1 -q && bin/venv-python -m pytest tests/ -m "not integration"
      --randomly-seed=99999 --disable-socket --allow-hosts=127.0.0.1,::1 -q
    expected: Both runs exit 0 with the same pass count; no pytest-socket SocketBlockedError, no order-dependent failures.
    fix_if: >-
      A test makes a real socket call (blocked) or fails only under a particular ordering -- the suite is not
      hermetic; STOP and re-open c2 (do not flip it). Triage the offending test per its audit YAML disposition.
  - step: 3
    phase: pre-deploy
    action: >-
      c3 -- confirm both hermeticity gates are wired into run_python_checks (full presubmit tier) and their
      regression tests pass.
    command: >-
      grep -nE "validate_hermeticity_flags\(failed\)" scripts/validate.py && grep -nE
      "validate_verifier_hermeticity\(failed\)" scripts/validate.py && bin/venv-python -m pytest
      tests/test_validate.py::TestValidateHermeticityFlags tests/test_validate.py::TestVerifierHermeticity -q
    expected: >-
      Both grep lines print (the calls exist in run_python_checks) and the two test classes pass. The CI gate
      that rejects a NEW non-hermetic test/verifier is live.
    fix_if: >-
      Either call is absent from run_python_checks (gate defined but never invoked) or a regression test fails --
      c3 is not satisfied; STOP and re-open it.
  - step: 4
    phase: pre-deploy
    action: >-
      c4 -- confirm the dated satisfied-precondition record was added on CD.29 and KG.13, and that the CD.29 edit
      did NOT mutate the pending decision's governed fields (records a satisfied gate, never ratifies).
    command: >-
      test $(grep -cF "SATISFIED 2026-06-25" docs/ROADMAP-PLATFORM.yaml) -ge 2 && ! git diff origin/main --
      docs/ROADMAP-PLATFORM.yaml | grep -qE "^-[[:space:]]*(state: pending|filed_via:|gates:|title:|detail:)"
      && echo "c4 annotations present; CD.29 governed fields (state/filed_via/gates/title/detail) not mutated"
    expected: >-
      Prints the confirmation line: at least two dated [SATISFIED 2026-06-25 ...] pointers exist (CD.29 + KG.13)
      and no removed diff line touches a pending-CD state:/filed_via:/gates:/title:/detail: field.
    fix_if: >-
      Fewer than two SATISFIED-2026-06-25 markers (a pointer is missing) or the guard trips because the edit
      removed/rewrote a state:/filed_via:/gates: line -- rework the annotation to be additive and re-run.
  - step: 5
    phase: pre-deploy
    action: >-
      c5 -- confirm the DQ criterion is rehomed to T1.6 and that T1.6 still owns the live-reader-DQ ->
      scheduled-canary scope (no scope lost in the rehome).
    command: >-
      bin/venv-python -c "from scripts.platform_roadmap import load; d=load('docs/ROADMAP-PLATFORM.yaml');
      g={i.id:i for i in d.tier_items}; c5=[c for c in g['T3.6'].exit_criteria if c.id=='c5'][0];
      assert c5.status=='rehomed' and c5.met_by=='T1.6', (c5.status, c5.met_by);
      t16=' '.join(c.text for c in g['T1.6'].exit_criteria).lower();
      assert 'scheduled monitor' in t16 or 'scheduled canary' in t16 or 'blocking' in t16, 'T1.6 lost DQ scope';
      print('c5 rehomed to T1.6; T1.6 retains DQ gate->monitor scope')"
    expected: >-
      Prints "c5 rehomed to T1.6; T1.6 retains DQ gate->monitor scope" -- c5.status==rehomed, c5.met_by=="T1.6",
      and T1.6's criteria still carry the live-reader-DQ relocation language.
    fix_if: >-
      c5 is not rehomed, met_by is not T1.6, or T1.6's exit_criteria no longer carry the DQ scope -- fix the
      rehome target / restore the T1.6 criteria.
  - step: 6
    phase: pre-deploy
    action: >-
      Ledger + plan integrity -- run the roadmap criteria-integrity checks (met_by resolves, no bare strings on
      touched items, every closes_criteria ref resolves) and the PlanDocument schema validation.
    command: >-
      bin/venv-python -c "import sys; sys.path.insert(0,'.'); from scripts.validate import
      validate_platform_roadmap; f=[]; validate_platform_roadmap(f); assert not f, f; print('roadmap criteria
      integrity OK')" && bin/venv-python -m scripts.plan_document docs/plans/PLAN-t3-6-hermeticity-closeout.yaml
    expected: >-
      Prints "roadmap criteria integrity OK" and "PASS: docs/plans/PLAN-t3-6-hermeticity-closeout.yaml validates
      against PlanDocument schema." closes_criteria refs T3.6:c1..c4 resolve; met_by=t3-6-hermeticity-closeout
      resolves to this plan file.
    fix_if: >-
      A roadmap integrity issue (dangling met_by, bare-string criterion on a touched item, unresolved
      closes_criteria ref) or a plan-schema error -- read the printed FAIL and correct the offending field.
  - step: 7
    phase: pre-deploy
    action: >-
      Full presubmit smoke -- run the comprehensive local gate to confirm the roadmap/plan edits introduce no
      regression (this is the authoritative-tier-equivalent run; CI remains the merge gate).
    command: bin/venv-python -m scripts.validate 2>&1 | tail -25
    expected: All checks pass (exit 0). The roadmap schema validation and plan-document validation are green within the run.
    fix_if: >-
      A check fails -- read the failing step's output. If it is the roadmap/plan validation, fix per step 6; if a
      pre-existing unrelated failure, STOP and RCA per Decision 55 (do not work around).
constraints:
  - >-
    Scope STRICTLY to docs/ROADMAP-PLATFORM.yaml. The hermeticity machinery (pyproject addopts, requirements
    pins, validate.py gates, AUDIT-test-hermeticity.yaml, verifier dispositions) already exists and is NOT
    modified -- this plan re-verifies and records, it does not re-implement.
  - >-
    Status-Trusted-Never-Inferred (T2.20): the VP RE-VERIFIES c1-c4 evidence on disk before any flip. If any of
    steps 1-3 fails, STOP and leave that criterion open -- never flip a criterion on the strength of the
    progress_note prose.
  - >-
    Ledger-flip ordering: execution applies the direct edits (c5 rehome, CD.29/KG.13 pointers, progress_note),
    THEN the VP runs, THEN /implement's bookkeeping walk flips c1-c4 open->met (met_by=t3-6-hermeticity-closeout),
    THEN T3.6 status: complete is surfaced for operator confirmation. The VP never asserts the post-walk met /
    complete states; it asserts evidence and edits only.
  - >-
    CD.29 is a state: pending candidate_decision; pending CDs ratify ONLY via the ops portal and are binding
    (roadmap agent_instructions ratification-vehicle clause; Decision 84). The c4 pointer is an ADDITIVE
    gate-status note (a new discipline_points entry) that records "T3.6, a member of CD.29.gates, is satisfied";
    it MUST NOT touch state:, filed_via:, title:, detail:, or gates:. VP step 4 guards this.
  - >-
    Decision 86: no new standing prose-architecture docs -- this plan creates no docs and edits only structured
    roadmap YAML. The exit-criteria ledger is git-authoritative (docs/contracts/exit-criteria-ledger.yaml); the
    warehouse-SoT invariant (Decision 84) does NOT apply to it, and this edit is NOT an ops-portal write.
  - >-
    c5 disposition is rehome (lifecycle state, Decision 70), not criterion deletion. met_by names the receiving
    tier_item id (T1.6), which must resolve to a real item per the ledger contract.
  - No rescue agents or workaround loops (Decision 55). On an unrecoverable failure, STOP and RCA.
  - bin/venv-python for all Python; ruff line length 127; type hints required; no emojis; ASCII hyphens only.
context:
  - >-
    Follow-on closeout for an in_progress item (Decision 59: in_progress resolvable == the set of open criteria).
    Investigation (2026-06-25) confirmed c1-c3 shipped: AUDIT-test-hermeticity.yaml (10 entries), pyproject
    addopts (--randomly-seed=last/--disable-socket/--allow-hosts), requirements pins (pytest-randomly>=4.1.0,
    pytest-socket>=0.8.0), validate_hermeticity_flags + validate_verifier_hermeticity wired into
    run_python_checks (~scripts/validate.py:2911-2912) with 12 regression tests. They read "open" only because
    the structured ledger postdates the work.
  - >-
    c4 is the only genuinely-new content: record hermeticity SATISFIED as a precondition for CD.29 (verification
    hard-gate consolidation; gates: [T3.1, T3.6, T3.7, T0.12.5]) and KG.13 (TIA + result caching). Authoritative
    record on T3.6; CD.29/KG.13 carry secondary [SATISFIED 2026-06-25 ...] pointers matching the existing
    "[SATISFIED 2026-06-03: CD.16 ratified via Decision 79, dec-1086]" idiom already in the roadmap.
  - >-
    c5 (live-reader DQ checks -> scheduled canary) is owned by T1.6 (status: not_started), whose exit_criteria
    carry the gate->monitor relocation verbatim. Both prior T3.6 plans explicitly scoped c5 out as "T1.6
    coordination." Rehoming c5 -> T1.6 is the honest disposition and lets T3.6 complete. Precedent: an earlier
    audit (roadmap 2026-06-09 reconciliation) flipped an item to complete after re-homing mis-homed criteria to
    T2.7.
  - >-
    Completing T3.6 unblocks downstream platform work gated on hermeticity: CD.29 / T0.12.5 (hard-gate
    consolidation), T3.10 (retire legacy verification projection, depends_on T3.6), KG.13 caching, and the
    executor hermetic verify (CD.27). The behavioural-tier hermeticity those consumers need is c1-c4 (the pytest
    suite + verifiers), NOT the DQ disposition (c5) -- so rehoming c5 deprives them of nothing.
  - >-
    Decision-scout gate verdict: FLAGS_FOUND (1 WARN, 1 NOTE, no BLOCK). WARN (pending-CD governance) and NOTE
    ([SATISFIED] idiom placement) are both incorporated above: authoritative record on T3.6, additive gate-status
    pointer on CD.29 with state/filed_via untouched (VP step 4). CITE: Decision 59, 70, 84, 86, 75, 79; roadmap
    ids CD.29, CD.27, CD.12, T1.6, T3.6, T0.12.5, T3.10, KG.13; docs/contracts/exit-criteria-ledger.yaml.
  - >-
    Decision 79 confirms V2: scope is docs/ROADMAP-PLATFORM.yaml (not manifest-packaged); no active Lambda
    artifact is touched, so V3 is not triggered. No .tf in scope -> no Infrastructure Assessment.
  - >-
    No ci_rca_unresolved recs at planning time (preflight 2026-06-25). Branch 0 commits behind origin/main; no
    Scope-file divergence. Related hermeticity recs (rec-2052, rec-2262, rec-2264, rec-2266, ...) are tactical
    enhancements to the shipped gates, NOT T3.6 exit criteria, and are deliberately NOT bundled (follow-on
    "scope the next slice only"). rec-2263 (roadmap-bookkeeping edits should be scope-declared in plans) is
    satisfied in spirit: ROADMAP-PLATFORM.yaml is the declared scope.
pre_implementation_checklist:
  - Branch confirmed not on main (claude/eager-clarke-zchoc2)
  - docs/PROJECT_CONTEXT.md read
  - DECISIONS to cite confirmed via decision-scout (Decision 59, 70, 84, 86, 75, 79; verdict FLAGS_FOUND, both flags incorporated)
  - docs/contracts/exit-criteria-ledger.yaml read (met/rehomed require met_by; flips on verified VP pass only)
  - T3.6 and T1.6 exit_criteria read; CD.29 (gates/state/discipline_points) and KG.13 (notes) located in ROADMAP-PLATFORM.yaml
  - Re-verified on disk that c1-c3 evidence is present (audit YAML, pyproject addopts, validate.py gates + tests)
  - Confirmed closes_criteria refs T3.6:c1..c4 resolve and are open on origin/main
execution_steps:
  - >-
    Edit docs/ROADMAP-PLATFORM.yaml -- rehome c5: under T3.6 exit_criteria id c5, set status: rehomed and add
    met_by: T1.6 (keep the c5 text). Leave c1-c4 untouched here (the bookkeeping walk flips them).
  - >-
    Edit docs/ROADMAP-PLATFORM.yaml -- c4 secondary pointers: append a NEW discipline_points entry to CD.29
    reading e.g. "Gate status: T3.6 (hermeticity) [SATISFIED 2026-06-25: criteria c1-c4 met via
    PLAN-t3-6-hermeticity-closeout; c5 rehomed to T1.6; authoritative record on the T3.6 tier_item]. Remaining
    gates T3.1/T3.7/T0.12.5 open. Recording a satisfied gate is bookkeeping about the gating tier_item, NOT
    ratification of CD.29 -- state remains pending." Do NOT modify CD.29 state/filed_via/title/detail/gates.
    Append a matching line to KG.13.notes ("T3.6 hermeticity precondition [SATISFIED 2026-06-25 ...]; remaining
    precondition is the T3.1 graduation registry").
  - >-
    Edit docs/ROADMAP-PLATFORM.yaml -- T3.6 progress_note: add a 2026-06-25 line recording the ledger
    reconciliation (c1-c4 evidence re-verified and closed via this plan; c5 rehomed to T1.6; hermeticity
    precondition for CD.29/T0.12.5 and KG.13 recorded satisfied). This is the authoritative c4 record on T3.6.
  - >-
    Execute the Verification Plan -- run each step in order; all must pass. If any of steps 1-3 (c1-c4 evidence)
    fails, STOP and leave that criterion open (do not flip). On any unrecoverable failure, RCA per Decision 55.
  - >-
    On a fully green VP, the /implement bookkeeping walk flips T3.6:c1, c2, c3, c4 from open->met with
    met_by: t3-6-hermeticity-closeout (per closes_criteria).
  - >-
    All criteria now met (c1-c4) or rehomed (c5) -> surface to the operator that T3.6 QUALIFIES for status:
    complete. On confirmation, set T3.6 status: complete and completed_at: "2026-06-25". Do NOT auto-flip.
  - "Report: criteria re-verified and closed, the c4 record + c5 rehome applied, and T3.6 completion outcome."
rollback: >-
  All edits are additive roadmap bookkeeping in a single file. Revert the branch commit to restore the prior
  ledger state (c1-c5 open, T3.6 in_progress, CD.29/KG.13 un-annotated). No code, infra, or warehouse state is
  touched, so revert is a clean no-op on the running system.
