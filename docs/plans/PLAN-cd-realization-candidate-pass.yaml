execution_steps:
  - "scripts/platform_roadmap_state.py: add module-level _FULLY_SUPERSEDED_RE = re.compile(r\"fully superseded by CD\\.\\d+\") (mirrors the supersession guard); add PlatformRoadmapState.realization_candidates() returning, for each pending CD with falsy realization_evidence, no '[Realized' in detail, and no _FULLY_SUPERSEDED_RE match, the CD when every gated item resolved via _TIER_SHORTCUT_RE (tier shortcut -> items whose tier==ref; else by_id[ref]) has status complete OR in _INACTIVE_FOR_TIER (empty gates vacuously included); return dicts {id, title, gates}."
  - "scripts/platform_roadmap_state.py: add 'realization_candidates': self.realization_candidates() to to_preflight_dict()'s returned dict AND 'realization_candidates': [] to the compute_state_dict parse-error dict. Add rec-2468 truthy-vs-None docstring notes at ratifiable_cds() and realization_candidates() (realization_evidence is str|None; TRUTHY => evidenced, None/'' => not; consumers filter on truthiness, not 'is not None')."
  - "scripts/platform_roadmap_models.py: change CandidateDecision.realization_evidence to Field(default=None, description=\"str|None; TRUTHY => ratifiable/realized-evidenced, None or empty-string => not. ratifiable_cds/realization_candidates filter on truthiness (not 'is not None'), so '' is excluded.\") (resolves rec-2468 field-definition leg; Field already imported)."
  - ".claude/skills/orient/SKILL.md: add a platform_roadmap.realization_candidates row to the Inputs table; add a 'Realization candidates (derived, lowest-confidence)' subsection immediately BELOW the Realized-but-pending CDs subsection in Deliverable Shape section 1, framed as 'candidates for evidence-writing in a human-confirmed /plan session' with read-only discipline; leave the verbatim 'do NOT surface a pending CD with no realization_evidence in the RATIFIABLE list' rule unchanged."
  - "tests/fixtures/platform_roadmap_state.py: create the importable helper module -- move _BASE_DOC/_doc/_item/_make_state/_write_fixture_yaml/_cd/_state_from_doc/_LIVE_ROADMAP out of the monolith; extend _cd with an optional detail param."
