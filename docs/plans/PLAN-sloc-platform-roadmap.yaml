execution_steps:
  - "Create scripts/platform_roadmap_gate_rules.py -- move _Token, _tokenize, _Verdict, GateRuleEvaluator, GateRuleParser and constants _EVAL_TOKEN_RE, _INACTIVE_FOR_TIER verbatim. First line: `# complexity-waiver: decision-43`; then `from __future__ import annotations`, imports (re, datetime/timezone), and `if TYPE_CHECKING: from scripts.platform_roadmap_state import PlatformRoadmapState`. No body edits."
  - "Create scripts/platform_roadmap_models.py -- move all 12 model classes + RoadmapDocument (_validate_graph) and constants _SUPPORTED_VERSIONS, _OPS_DECISIONS_RE, _TIER_SHORTCUT_RE, _GATE_HELPERS verbatim. First line `# complexity-waiver: decision-43`; import GateRuleParser from scripts.platform_roadmap_gate_rules; imports (re, typing, pydantic). Preserve extra='forbid' exactly."
  - "Create scripts/platform_roadmap_state.py -- move _item_dict, _pending_gating_cds_for_item, load, compute_followon_state, PlatformRoadmapState, compute_state_dict and constants _CANONICAL_TIER_ORDER, _CD_REF_RE verbatim. Import TierItem/RoadmapDocument/_TIER_SHORTCUT_RE from scripts.platform_roadmap_models and GateRuleEvaluator/_INACTIVE_FOR_TIER from scripts.platform_roadmap_gate_rules; imports (datetime, pathlib, typing, yaml). No waiver header (all funcs <=CC20)."
