schema_version: 1
slug: audit-remediation-wave-5-jk5t0y
intent: >-
  Machine-enforce verification-system audit findings VF-04 (deterministic V-tier floor) and
  VF-13 (closed VerificationStep.phase enum + hermetic/tier_waiver fields) so tier and phase
  correctness stop depending on LLM-critique diligence, hardening the plan contract the future
  VP-replay and executor consumers key on.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-audit-remediation-wave-5-jk5t0y.yaml
phase: >-
  Platform tier_item T3.17 (Deterministic V-tier floor + plan verification-step schema
  hardening); carrier for audit findings VF-04/VF-13 (audits/verification-system-review-f80508b.yaml).
closes_criteria:
  - "T3.17:c1"
  - "T3.17:c2"
  - "T3.17:c3"
scope:
  - file: scripts/plan_document.py
    action: Modify
    purpose: >-
      Add schema_version 2 as the hardened contract. Constrain VerificationStep.phase to the
      closed enum (pre-deploy | post-deploy) enforced ONLY when schema_version == 2; add optional
      VerificationStep.hermetic (bool, default false) and optional plan-level tier_waiver
      (str | None). schema_version 1 plans stay grandfathered (free-text phase, no waiver needed).
  - file: scripts/checks/misc/validate_tier_floor.py
    action: Create
    purpose: >-
      New registered check (VF-04). For each schema_version-2 PLAN-*.yaml, compute the V-tier
      floor from the plan's declared scope (active-manifest Lambda code file => V3; .tf in scope
      => V3 conservative; Python source => >=V2) and fail a plan declaring below its floor unless
      it carries tier_waiver. schema_version-1 plans are skipped (grandfathered).
  - file: scripts/checks/registry.py
    action: Modify
    purpose: >-
      Register validate_tier_floor into pre_sequence() and full_sequence(), immediately after
      validate_plan_documents in each.
  - file: scripts/validate.py
    action: Modify
    purpose: >-
      One-line facade re-export import of validate_tier_floor so getattr(validate, name) and
      `from scripts.validate import validate_tier_floor` both resolve (Decision 104 facade).
  - file: tests/test_plan_document.py
    action: Modify
    purpose: >-
      Cover the schema_version-2 phase enum (v2 phase 'pre-merge' rejected; v1 phase free-text
      accepted), the hermetic default, and the optional tier_waiver field.
  - file: tests/test_validate.py
    action: Modify
    purpose: >-
      Colocate validate_tier_floor check tests here (Decision 104 coverage mapping routes
      scripts/checks/**/*.py to tests/test_validate.py): v2 Lambda-code-in-scope + V2 fails;
      tier_waiver rescues it; v1 plan below floor passes (grandfathered); .tf in scope => V3.
  - file: tests/test_checks_registry.py
    action: Modify
    purpose: >-
      Update FROZEN_PRE_SEQUENCE and FROZEN_FULL_SEQUENCE oracles to include validate_tier_floor
      at its registered position (after validate_plan_documents), keeping the frozen-sequence
      equivalence tests green.
  - file: tests/fixtures/plan_documents/valid_v2.yaml
    action: Create
    purpose: >-
      schema_version-2 fixture that validates cleanly (canonical phases, tier consistent with its
      scope). Base for the negative-case mutations in test_plan_document.py.
  - file: tests/fixtures/plan_documents/tier_floor_violation_v2.yaml
    action: Create
    purpose: >-
      schema_version-2 fixture with an active-manifest Lambda code file in scope and
      verification_tier: V2 -- the VF-04 acceptance fixture the tier-floor check must fail.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    A schema_version-2 plan with an active-manifest Lambda code file in scope and
    verification_tier: V2 fails validate --pre (validate_tier_floor); adding a tier_waiver to the
    same plan makes it pass (VF-04, T3.17:c1/c2).
  - >-
    A schema_version-2 plan with a verification_plan step phase 'pre-merge' fails
    validate_plan_documents; a schema_version-1 plan with the same free-text phase still validates
    (grandfathered) (VF-13, T3.17:c3).
  - >-
    VerificationStep.hermetic defaults to false and is accepted on schema_version-2 plans;
    tier_waiver is accepted as an optional plan-level string.
  - >-
    All existing docs/plans/*.yaml (all schema_version 1) still validate under both
    validate_plan_documents and validate_tier_floor -- zero regressions.
  - >-
    validate_tier_floor is registered in pre_sequence() and full_sequence() and reachable via
    getattr(validate, 'validate_tier_floor'); the frozen-sequence oracles in
    tests/test_checks_registry.py match after the insertion.
  - >-
    Full validate green modulo the pre-existing 'Import contracts (Decision 80)' carve-out
    (unrelated to this change; documented pre-existing failure on the f80508b base).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      VF-13 positive+negative: a schema_version-2 plan with phase 'pre-merge' is rejected by the
      PlanDocument schema, while a schema_version-1 plan with free-text phase is accepted.
    command: >-
      bin/venv-python -c "import yaml; from pydantic import ValidationError;
      from scripts.plan_document import PlanDocument;
      b=yaml.safe_load(open('tests/fixtures/plan_documents/valid_v2.yaml'));
      b['verification_plan'][0]['phase']='pre-merge';
      raised=False;
      exec('try:\n PlanDocument.model_validate(b)\nexcept ValidationError:\n raised=True');
      assert raised, 'v2 plan with phase pre-merge should be rejected'; print('OK: v2 enum enforced')"
    expected: >-
      Prints 'OK: v2 enum enforced' -- a ValidationError is raised for the v2 fixture mutated to
      phase 'pre-merge' (closed enum violation). The unmutated v1 fixtures still load (asserted by
      the authoritative pytest cases in step 5).
    fix_if: >-
      No error raised for a v2 plan with phase 'pre-merge' (enum not enforced), or a v1 plan is
      wrongly rejected (grandfathering broken).
  - step: 2
    phase: pre-deploy
    action: >-
      VF-04 tier-floor fixture fails: the tier_floor_violation_v2 fixture (active-manifest Lambda
      code file in scope, verification_tier V2) is flagged below floor by validate_tier_floor.
    command: >-
      bin/venv-python -c "from scripts.validate import validate_tier_floor; import pathlib;
      f=[]; validate_tier_floor(f, plans_dir=pathlib.Path('tests/fixtures/plan_documents'));
      print('FAILED_LIST', f); assert f, 'expected tier-floor violation to be reported'"
    expected: >-
      validate_tier_floor appends a failure for tier_floor_violation_v2.yaml (declared V2, floor
      V3 via the active-manifest Lambda code file). Non-empty failed list. (Uses the check's
      plans_dir test seam mirroring validate_plan_documents.)
    fix_if: >-
      failed list is empty -- the floor did not fire on an active-manifest Lambda code file, or
      the plans_dir seam is missing so the check cannot be pointed at the fixture dir.
  - step: 3
    phase: pre-deploy
    action: >-
      VF-04 tier_waiver rescue: the same violating fixture, with a tier_waiver field added,
      passes validate_tier_floor.
    command: >-
      bin/venv-python -c "from scripts.validate import validate_tier_floor; import pathlib,yaml,tempfile,os,shutil;
      d=tempfile.mkdtemp(); src='tests/fixtures/plan_documents/tier_floor_violation_v2.yaml';
      p=yaml.safe_load(open(src)); p['tier_waiver']='conscious V2: Lambda file is comment-only';
      open(os.path.join(d,'PLAN-'+p['slug']+'.yaml'),'w').write(yaml.safe_dump(p));
      f=[]; validate_tier_floor(f, plans_dir=pathlib.Path(d)); print('FAILED_LIST', f);
      shutil.rmtree(d); assert not f, 'tier_waiver should rescue the plan'"
    expected: >-
      With tier_waiver set, validate_tier_floor does NOT append a failure for that plan (waiver
      honoured; critique judges the justification downstream). Empty failed list.
    fix_if: >-
      failed list non-empty despite tier_waiver -- the waiver escape hatch is not wired into the
      floor check.
  - step: 4
    phase: pre-deploy
    action: >-
      No-regression: validate_tier_floor and validate_plan_documents both pass over the real
      docs/plans directory (all schema_version 1, grandfathered).
    command: >-
      bin/venv-python -c "from scripts.validate import validate_tier_floor, validate_plan_documents;
      f=[]; validate_tier_floor(f); validate_plan_documents(f); print('FAILED_LIST', f);
      assert not f, f"
    expected: >-
      Empty failed list over the live docs/plans/ tree: every existing plan is schema_version 1,
      so the tier floor is skipped and the phase enum is not enforced; all continue to validate.
    fix_if: >-
      Any existing plan is reported as a failure -- grandfathering is not correctly gated on
      schema_version == 2.
  - step: 5
    phase: pre-deploy
    action: >-
      Run the full unit suite for the three modified/created source modules and their mapped test
      files, exercising real code paths (schema validators, floor computation, registry sequence).
    command: >-
      bin/venv-python -m pytest tests/test_plan_document.py tests/test_validate.py
      tests/test_checks_registry.py -q
    expected: >-
      All tests pass, including the new schema_version-2 enum/hermetic/tier_waiver cases, the
      colocated validate_tier_floor cases in test_validate.py, and the updated frozen-sequence
      oracle assertions in test_checks_registry.py.
    fix_if: >-
      Any test fails; a frozen-sequence assertion mismatch means the FROZEN_*_SEQUENCE oracle was
      not updated to match the new registry insertion point.
  - step: 6
    phase: pre-deploy
    action: >-
      Registry wiring + facade parity: validate_tier_floor is registered, appears exactly once in
      pre_sequence after validate_plan_documents, and resolves through the validate facade.
    command: >-
      bin/venv-python -c "from scripts.checks import registry; from scripts import validate;
      names=[s.name for s in registry.pre_sequence() if s.kind=='check'];
      assert 'validate_tier_floor' in registry.all_checks(), 'not registered';
      assert names.count('validate_tier_floor')==1, names;
      i=names.index('validate_tier_floor'); assert names[i-1]=='validate_plan_documents', names;
      assert callable(getattr(validate,'validate_tier_floor')), 'facade missing'; print('OK')"
    expected: >-
      Prints OK: check is in the registry, appears once in pre_sequence immediately after
      validate_plan_documents, and is reachable via getattr(validate, 'validate_tier_floor').
    fix_if: >-
      AssertionError -- missing @register decorator, wrong sequence position, duplicate insertion,
      or missing facade import line in scripts/validate.py.
  - step: 7
    phase: pre-deploy
    action: >-
      Fast-tier gate: run validate --pre and confirm green modulo the documented pre-existing
      Import-contracts carve-out.
    command: bin/venv-python -m scripts.validate --pre
    expected: >-
      The run reports only the pre-existing 'Import contracts (Decision 80)' failure (present on
      the f80508b base, unrelated to this change); the new Plan document and Tier floor checks
      pass. No new failures attributable to this plan.
    fix_if: >-
      Any failure other than 'Import contracts (Decision 80)' -- diagnose and fix on-branch; if a
      genuinely unrecoverable environmental failure, stop and RCA (Decision 55), do not loop.
constraints:
  - >-
    schema_version 1 plans MUST remain valid unchanged -- the phase enum and tier floor apply
    ONLY to schema_version 2. Do not rewrite, renumber, or re-tier any existing docs/plans/*.yaml
    (Option A grandfathering, chosen at the confirmation gate).
  - >-
    New optional fields (VerificationStep.hermetic, plan-level tier_waiver) must have defaults so
    the model still honours extra='forbid' while not requiring them on v1 plans.
  - >-
    validate_tier_floor must expose a plans_dir override parameter (test seam), mirroring
    validate_plan_documents, so fixtures can be validated without touching docs/plans/.
  - >-
    The tier floor keys on Lambda CODE files only (manifest handlers + includes, respecting
    excludes) -- bundled assets/config (e.g. docs/ROADMAP-PLATFORM.yaml, config.yaml) must NOT
    force V3, or nearly every plan would be over-floored.
  - >-
    Keep scripts/checks/misc/validate_tier_floor.py under the 500-SLOC cap (Decision 43 / Decision
    102) and add no SLOC to scripts/validate.py beyond the one facade import line (Decision 104).
  - >-
    Do NOT add a check to ci.yml without adding it to validate.py first -- registry.py + the
    facade import ARE the single source of truth (Decision 104).
  - Do NOT file or bundle recommendations (explicit task constraint).
  - No rescue agents or workaround loops (Decision 55).
context:
  - >-
    Decision-scout verdict FLAGS_FOUND. CITE list (verbatim decision ids): Decision 48, Decision
    79, Decision 104, Decision 85, Decision 93, Decision 86, Decision 117, Decision 55.
  - "gates: decision-scout=FLAGS_FOUND; plan-critique=<pending> after 0 round(s)"
  - >-
    Decision 48 (DECISIONS.md:2409-2414) acknowledged the V-tier classifier as future work
    ('documentation-enforced only. No automated detection currently exists. A future rec should
    add a deterministic tier classifier to validate.py') but the rec was never filed -- VF-04
    closes exactly this acknowledged-but-unowned gap. The floor's V1/V2/V3 semantics and
    highest-tier-wins rule align with Decision 48's classification rules.
  - >-
    Decision 79: Lambda tier follows the manifest graph. The floor's Lambda arm derives from
    compute_affected_artifacts / the manifest handlers+includes set, excluding assets/config --
    not a hand-curated path list.
  - >-
    Decision 104: owner-tagged ordered check registry. Adding a check requires a module under
    scripts/checks/<domain>/ with @register, a one-line facade re-export in scripts/validate.py,
    sequence insertion in registry.py, and a matching update to the byte-for-byte frozen-sequence
    oracle in tests/test_checks_registry.py. Coverage mapping (scripts/test_coverage_checker.py:57)
    routes scripts/checks/**/*.py test coverage to tests/test_validate.py -- so the tier-floor
    check's tests are colocated there, NOT in a standalone test_validate_tier_floor.py (scout WARN,
    resolved).
  - >-
    Decision 85 ratified CD.22 (PlanDocument schema, extra='forbid', dual-tier enforcement) as the
    canonical PLAN-*.yaml contract. The schema_version-2 bump deliberately evolves this ratified
    contract while preserving extra='forbid' and both-tier enforcement.
  - >-
    Decision 93 fail-loud lifecycle precedent: enforce the closed phase enum via a Pydantic
    model_validator that raises at load, consistent with platform_roadmap.py style.
  - >-
    Decision 86: tier_waiver is a machine-readable field (not prose), squarely aligned; no docs/
    artifact is created, so the intent-doc-freeze guard is not implicated. The finding routes to
    tier_item T3.17, not a new doc.
  - >-
    Decision 117 SUPERSEDES Decision 44 for automatability semantics -- cite 117. None of the
    scope files are executor-boundary files (Decision 79 affirms validate.py/lambda_manifest.py
    are not executor machinery), so the boundary is not crossed.
  - >-
    Decision 48 [NOTE, conscious-acceptance]: the floor's 'any .tf in scope => V3' is broader than
    Decision 48's 'resource-affecting .tf' -- a comment-only .tf edit would be floored to V3. Kept
    as a deliberate conservative start (only the plan's file paths are available at check time, no
    content diff); a genuinely comment-only .tf plan escapes via tier_waiver. Refining to
    content-aware detection is deferred.
  - >-
    Empirical grounding (probed at planning time): under a naive 'compute_affected_artifacts
    non-empty => V3' rule, 48 of 133 existing plans fall below floor -- almost entirely because
    docs/ROADMAP-PLATFORM.yaml is a bundled ASSET of data-pipeline.zip. Excluding assets/config
    (code-only match) drops this to 8 genuine under-declarers (e.g. commit-signing-cc-web = V1
    with terraform/github/repo.tf). Option A (schema_version-2 gating) grandfathers all 133 v1
    plans so none of these regress.
  - >-
    Freshness/stale-reference: T3.17.files_in_scope lists
    scripts/checks/contracts/validate_plan_documents.py, but the file actually lives at
    scripts/checks/roadmap/validate_plan_documents.py. The plan re-grounds to the real location;
    validate_plan_documents.py itself needs NO change (it already calls the pydantic schema, so
    the VF-13 phase enum is enforced through it automatically for v2 plans).
  - >-
    Wave sequencing: PLAN-audit-remediation-wave-3 (VF-02/03) already shipped and merged
    2026-07-03 (operator-confirmed); no live conflict on the scripts/checks sequencing surface.
    T3.17 is a prerequisite for T3.15 (VP replay needs the hardened phase enum + hermetic marker).
  - >-
    Open CI-RCA recs (3) are being resolved by another agent in
    PLAN-ci-rca-cd25-ratification-tier-gap.yaml -- deferred here per explicit task instruction.
    This plan touches no ci-rca source_file and no shared failure category.
pre_implementation_checklist:
  - Branch confirmed not on main (claude/audit-remediation-wave-5-jk5t0y)
  - docs/PROJECT_CONTEXT.md read
  - Decision-scout gate run (FLAGS_FOUND); flags folded into the plan
  - All files in scope located and readable (validate_plan_documents.py path re-grounded to roadmap/)
  - Acceptance criteria understood and verifiable
  - Option A (schema_version-2 gating) confirmed by operator at the confirmation gate
execution_steps:
  - >-
    scripts/plan_document.py: add 2 to _SUPPORTED_VERSIONS; add optional VerificationStep.hermetic
    (bool=False) and optional plan-level tier_waiver (str|None); add a model_validator that, when
    schema_version == 2, rejects any VerificationStep.phase not in {'pre-deploy','post-deploy'}.
    Keep the phase field type accepting str so v1 free-text still loads; enforce the enum only in
    the v2 branch of the validator.
  - >-
    scripts/checks/misc/validate_tier_floor.py: new module. @register('validate_tier_floor',
    owner='platform'). Signature validate_tier_floor(failed, plans_dir=None) mirroring
    validate_plan_documents. For each PLAN-*.yaml with schema_version == 2, load it, compute the
    floor from scope (active-manifest Lambda code file via manifest handlers+includes minus
    excludes => V3; any .tf => V3; any .py => >=V2; else V1), and if declared tier rank < floor
    rank and no tier_waiver, append a failure. Skip schema_version-1 plans entirely.
  - >-
    scripts/checks/registry.py: insert _c('validate_tier_floor') immediately after
    _c('validate_plan_documents') in BOTH pre_sequence() and full_sequence().
  - >-
    scripts/validate.py: add the facade re-export import
    'from scripts.checks.misc.validate_tier_floor import validate_tier_floor  # noqa: F401,E402'
    in the misc-checks import block.
  - >-
    tests/fixtures/plan_documents/: create valid_v2.yaml (clean schema_version-2 plan) and
    tier_floor_violation_v2.yaml (v2, active-manifest Lambda code file in scope, verification_tier
    V2).
  - >-
    tests/test_plan_document.py: add cases for v2 phase enum rejection, v1 free-text acceptance,
    hermetic default, and tier_waiver optional field.
  - >-
    tests/test_validate.py: add validate_tier_floor cases (fixture fails; tier_waiver rescues;
    v1-below-floor passes; .tf => V3) using the plans_dir seam.
  - >-
    tests/test_checks_registry.py: update FROZEN_PRE_SEQUENCE and FROZEN_FULL_SEQUENCE to include
    ('check','validate_tier_floor') after ('check','validate_plan_documents').
  - >-
    Execute the Verification Plan -- run each step; loop until pass; on an unrecoverable failure
    stop and RCA (Decision 55). The only tolerated red is the pre-existing 'Import contracts
    (Decision 80)' carve-out.
  - "Report: what was implemented, verification results, and the closes_criteria bookkeeping walk."
work_areas: []
rollback: >-
  Revert the branch commits. All changes are additive schema/check code plus new v2 test fixtures;
  no existing plan, data surface, or infrastructure is mutated, so revert is clean.
