execution_steps:
  - >-
    scripts/plan_document.py: add 2 to _SUPPORTED_VERSIONS; add optional VerificationStep.hermetic
    (bool=False) and optional plan-level tier_waiver (str|None); add/extend the PlanDocument
    model_validator(mode='after') so that when schema_version == 2 it rejects any
    VerificationStep.phase not in {'pre-deploy','post-deploy'}. Keep the phase field type accepting
    str so v1 free-text still loads; enforce the enum only in the v2 branch of the validator.
  - >-
    scripts/checks/roadmap/validate_tier_floor.py: new module. @register('validate_tier_floor',
    owner='platform'). Signature validate_tier_floor(failed, plans_dir=None) mirroring
    validate_plan_documents. For each PLAN-*.yaml with schema_version == 2, load it, compute the
    floor from scope: build the active manifests' code-file set from load_all() handlers+includes
    minus excludes (NOT compute_affected_artifacts) -- a scope file matching it => V3; any .tf =>
    V3; any .py => >=V2; else V1. If declared tier rank < floor rank and no tier_waiver, append a
    failure. Skip schema_version-1 plans entirely.
  - >-
    scripts/checks/registry.py: insert _c('validate_tier_floor') immediately after
    _c('validate_plan_documents') in BOTH pre_sequence() and full_sequence().
  - >-
    scripts/validate.py: add the facade re-export import
    'from scripts.checks.roadmap.validate_tier_floor import validate_tier_floor  # noqa: F401,E402'
    in the roadmap-checks import block.
  - >-
    docs/ROADMAP-PLATFORM.yaml: re-ground T3.17 files_in_scope (contracts/ -> roadmap/ for
    validate_plan_documents; new check -> scripts/checks/roadmap/validate_tier_floor.py) and
    re-word c2 to the conservative-.tf-with-tier_waiver rule. Do NOT flip criterion statuses (that
    is /implement's bookkeeping walk on a verified VP pass).
  - >-
    tests/fixtures/plan_documents/: create valid_v2.yaml (clean schema_version-2 plan),
    tier_floor_violation_v2.yaml (v2, active-manifest Lambda code file in scope, verification_tier
    V2), and a _badphase_v2/ one-file subdir (v2 plan with phase 'pre-merge') for the step-1 seam.
  - >-
    tests/test_plan_document.py: add cases for v2 phase enum rejection, v1 free-text acceptance,
    hermetic default, and tier_waiver optional field.
  - >-
    tests/test_validate.py: add validate_tier_floor cases exercising EVERY floor branch (Lambda
    code => V3; .tf => V3; .py => V2; docs-only => V1; tier_waiver rescue; v1-below-floor skipped)
    using the plans_dir seam, plus the _validate.validate_tier_floor alias.
  - >-
    tests/test_checks_registry.py: update FROZEN_PRE_SEQUENCE and FROZEN_FULL_SEQUENCE to include
    ('check','validate_tier_floor') after ('check','validate_plan_documents').
  - >-
    Execute the Verification Plan -- run each step; loop until pass; on an unrecoverable failure
    stop and RCA (Decision 55). The only tolerated red is the pre-existing 'Import contracts
    (Decision 80)' carve-out.
  - "Report: what was implemented, verification results, and the closes_criteria bookkeeping walk."
work_areas: []
