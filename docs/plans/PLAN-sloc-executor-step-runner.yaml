  - "Collapse scripts/executor/step_runner.py to the facade: keep implement_step + _detect_ghost_step + _list_meaningful_worktree_changes + _append_step_telemetry + StepOutcome + model wrappers + ALL shared module state (_PROJECT_PYTHON block, _EXECUTOR_ACC_VARS, STEP_TELEMETRY_JSONL, constants) + all module-scope imports; add re-exports for every extracted symbol."
