  - DECISIONS.md read (102, 104, 80, 43, 117, 67; and 48/75 flags folded)
  - All files in scope located and readable
  - Acceptance criteria understood and verifiable
  - Baseline captured -- the current step_runner suites pass BEFORE any code movement (the behavioural-equivalence oracle)
execution_steps:
