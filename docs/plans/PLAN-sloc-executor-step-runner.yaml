  - "Cross-plan sequencing: independent of the other 3 executor plans -- they all import the FACADE paths, which are unchanged. plan.py's lazy `from scripts.executor.step_runner import gather_step_context` (Plan 3) and batch.py's lazy step_runner imports resolve through this retained facade regardless of landing order."
