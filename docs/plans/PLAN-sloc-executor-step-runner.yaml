execution_steps:
  - "Capture baseline FIRST -- run tests/test_executor_step_runner.py + tests/test_step_runner.py + the step_runner parts of tests/test_execute_recommendation.py green on the pre-refactor tree."
  - "Create scripts/executor/step_context.py (gather_step_context + gotchas, with the decision-43 waiver header), step_acceptance.py (run_acceptance/run_verification/_extract_acceptance_command/_normalize_acceptance + _EXECUTOR_ACC_VARS + the _PROJECT_PYTHON block), step_commit.py (commit_step + _enforce_step_scope); move each body verbatim; route _enforce_step_scope's call to _list_meaningful_worktree_changes through the step_runner facade namespace."
  - "Collapse scripts/executor/step_runner.py to the facade: keep implement_step + _detect_ghost_step + _list_meaningful_worktree_changes + _append_step_telemetry + StepOutcome + model wrappers + constants; add re-exports for every extracted public AND test-patched-private symbol; import _PROJECT_PYTHON from step_acceptance for implement_step's validate subprocess."
  - "Migrate ONLY the <=2 step_runner.subprocess (and any step_runner.shutil) primitive patches that drive a moved body (run_acceptance/run_verification -> step_acceptance; commit_step/_enforce_step_scope -> step_commit) in tests/test_executor_step_runner.py + tests/test_execute_recommendation.py + tests/test_step_runner.py; leave facade-resident symbol patches untouched."
  - "Run `validate --update-sloc-budgets`, then grep-confirm the step_runner.py key is dropped and no step_*.py key was seeded."
  - "Execute the Verification Plan -- run each step; loop until pass; on unrecoverable failure stop and RCA (Decision 55)."
  - "Report -- what was extracted, the equivalence-oracle result, final step_runner.py SLOC, CC/coverage status, and the migrated-patch summary."
work_areas: []
rollback: >-
  Pure refactor on a feature branch; if the equivalence oracle (existing suites) cannot be made green,
  abandon the change (no merge). Nothing is deployed. If merged and a regression surfaces, revert the
  squash commit -- the facade + siblings + test-patch migration land atomically in one PR.
