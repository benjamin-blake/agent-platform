  - >-
    Main divergence: preflight reported branch 0 behind / 0 ahead of origin/main at planning time; no
    Scope-file overlap risk. ci_rca_unresolved_recs empty (no HARD BLOCK).
pre_implementation_checklist:
  - Branch confirmed not on main (claude/roadmap-mvp-triage-audit-q2np7f)
  - docs/PROJECT_CONTEXT.md read
  - Audit source audits/platform-roadmap-mvp-triage-7d57a0d.yaml RMAP-01..RMAP-05 read
  - All files in scope (docs/ROADMAP-PLATFORM.yaml, docs/DECISIONS.md) located and readable
  - Acceptance criteria understood and verifiable
  - Re-check current max "## Decision NNN:" header in docs/DECISIONS.md; confirm the drafted 122 is still free (else shift consistently)
execution_steps:
  - >-
    ROADMAP completions (RMAP-02/01/03). In docs/ROADMAP-PLATFORM.yaml, for EACH of T-1.14, T2.25, T3.17:
    set `status: complete` and add `completed_at: "2026-07-06"`. Replace/extend each item's progress_note
    with the audit evidence anchor: T-1.14 -> "2026-07-06 (RMAP-02): PR #469 (53796b4) merged to main behind
    required pr-validate, satisfying the last 'CI green' sub-clause; inference-provider.yaml v1/ratified, .md
    + model_routing.yaml deleted, model_registry.py reads the YAML."; T2.25 -> "2026-07-06 (RMAP-01): all five
    criteria pass against read artifacts -- environment-taxonomy.md Guard subsection is SOLE SoT,
    terraform_apply_guard.py classifies in-budget vs out-of-budget against authority_budget.json,
    prompt_compliance --all clean; Decision 92 point 5 records 'IMPLEMENTED by T2.25 / 2026-06-29'. Status
    simply never flipped."; T3.17 -> "2026-07-06 (RMAP-03): validate_tier_floor wired into validate.py and
    _V2_PHASE_ENUM rejection in plan_document.py both landed by audit-remediation-wave-5; all three criteria
    already status=met." Leave each item's exit_criteria form unchanged (bare-string stays bare; T3.17 stays
    structured/met).
  - >-
    T5.4 tombstone + T1.5 c1 fold (RMAP-05). Set T5.4 `status: reserved`; rewrite its name to
    "RESERVED -- superseded by T1.5 c1 (DECISIONS.md retirement, Phase 3b)"; rewrite intent to explain the
    dedup (T5.4 duplicated T1.5's first exit criterion; its grep-no-production-references + file-deletion
    mechanic is folded into T1.5 c1, the single owner; id preserved because roadmap prose at T1.5
    files_in_scope and T2.26 coordination notes reference it; no depends_on/gate/CD reference); set
    `depends_on: []`, `files_in_scope: []`, `exit_criteria: []`; add a `rename_history` block (from: original
    T5.4 markdown-retirement item; to: reserved, mechanic owned by T1.5 c1, 2026-07-06 per audit RMAP-05).
    Then rewrite T1.5 exit_criteria[0] (currently "docs/DECISIONS.md retired (Phase 3b)") to absorb the
    mechanic, e.g.: "docs/DECISIONS.md retired (Phase 3b): docs/DECISIONS.md and docs/DECISIONS_ARCHIVE.md
    deleted, and `grep -r 'DECISIONS.md' scripts/ src/ docs/ terraform/` returns no production references
    (grep-no-production-references + file-deletion mechanic folded from T5.4, tombstoned 2026-07-06 per audit
    RMAP-05; T1.5 c1 is the single owner of DECISIONS.md retirement)". Keep T1.5's criteria as bare strings.
  - >-
    CD.28 ratification (RMAP-04) -- EXECUTE ONLY after re-checking the max Decision number. (a) Author a new
    Decision in docs/DECISIONS.md (drafted as Decision 122; shift to the next free number if taken, keeping
    all references consistent) using the DRAFTED TEXT below. (b) Flip the roadmap CD.28 entry from
    `state: pending` + `filed_via: pending_log_decision_lambda` to `state: ratified` + `ratified_as: dec-122`
    + `filed_via: ops_decisions:dec-122`. (c) Flip T0.4 to `status: complete` + `completed_at: "2026-07-06"`
    and append a progress_note: "2026-07-06 (RMAP-04): CD.28 ratified as Decision 122 (as amended by Decision
    116); c1-c3 met, c4 rehomed to T2.9. Completion was gated solely on this ratification (a decision act)."
    (a)+(b) MUST be in the SAME commit (Decision 105 R1/R2/R3 atomicity). After merge, run
    `bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md` to sync ops_decisions (Decision 84).
  - >-
    DRAFTED Decision 122 text (author verbatim in intent, adjust number if shifted):
    "## Decision 122: Ratify CD.28 -- executor LLM inference = DeepSeek-direct via LiteLLM (Tier 1),
    Anthropic-direct (Tier 2); Bedrock retired (as amended by Decision 116) (Decided)".
    Status: Decided. Date: 2026-07-06. Warehouse ID: dec-122 (keyed on the decision number; synced to
    ops_decisions via `ops_data_portal --backfill-decisions-md` post-merge, per Decision 84).
    Problem: CD.28 was operationally realized (DeepSeek + Anthropic keys live in Secrets Manager -- T0.4
    c1-c3 met, LiteLLM smoke tests 200 on 2026-06-21; Bedrock code paths retired; inference-provider.yaml
    v1 reflects the CD.28 tier model) but remained state: pending, gating completion of T0.4 and T4.1-T4.4.
    Decision: Ratifies CD.28 AS AMENDED BY Decision 116. Executor LLM inference steady state -- Tier 1
    = DeepSeek-direct via LiteLLM (deepseek/deepseek-chat, deepseek/deepseek-reasoner; remapping to
    deepseek-v4-flash post-2026-07-24); Tier 2 = Anthropic-direct via LiteLLM (warm-fetched escape hatch,
    Max x5 programmatic pool); Tier 3 = OpenRouter (deferred). Bedrock retired from the architecture as an
    LLM substrate. Scheduled-agent provider routing is governed by Decision 116's split (routine/non-agentic
    -> LiteLLM Tier 1; judgment/agentic -> claude -p), NOT CD.28's original blanket scheduled-agent clause.
    Layer reconciliation (Decision 121): the tier model governs the EXECUTOR LiteLLM inference transport
    (scripts/llm_client.py, repointed by T4.2). The current model_registry._VALID_PROVIDERS = {"gemini"} /
    llm_client._gemini_call is the INTERIM executor transport pending T4.2's LiteLLM cutover, which OWNS its
    removal (T4.2 files_in_scope scripts/llm_client.py 'rewrite to LiteLLM transport; remove Bedrock +
    Gemini-CLI paths'; T4.2 exit criterion 'LiteLLM is the only LLM transport'). Decision 121's 'Gemini is
    the sole valid provider' describes that interim state, not a permanent commitment -- no contradiction.
    Reversal conditions: revert/re-evaluate if (a) DeepSeek direct API pricing changes >5x in either
    direction, or (b) the Anthropic Max x5 programmatic pool is sustained >70% utilization over 30 days
    (file a rec to provision an org-billed Anthropic API key as overflow). Mirrors
    cost_projection.reevaluation_triggers. Related: Decision 116 (scheduled-agent provider split; amends
    CD.28's scheduled-agent clause), Decision 49 (superseded by 116; Copilot SDK retirement), Decision 121
    (model_registry interim Gemini state; layer reconciliation), Decision 47 (lock-in lesson; Anthropic-direct
    preserves the warm-fetched escape hatch), Decision 84 (DECISIONS.md canonical + portal backfill),
    Decision 105 (candidate-decision ratification lane). Supersedes: CD.7 (LLM-on-Bedrock primary), Decision
    40 (Copilot SDK + Bedrock planning).
  - Execute the Verification Plan -- run each step; loop until pass; a non-200/non-skip smoke failure or any validate --pre failure stops the flow for diagnosis (Decision 55, no workaround loops).
  - "Report: which items flipped, the CD.28/Decision-122 ratification, the T5.4/T1.5 consolidation, and verification results."
work_areas: []
rollback: >-
  All edits are confined to docs/ROADMAP-PLATFORM.yaml and docs/DECISIONS.md. If a post-merge issue
  surfaces, `git revert` the squash-merge commit; no infrastructure or data-plane state is touched.
  After a revert, re-run `ops_data_portal --backfill-decisions-md` so ops_decisions drops the reverted
  Decision 122 row.
