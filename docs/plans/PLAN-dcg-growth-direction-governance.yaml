    IMPLEMENTATION type (Decision 67 STRATEGIC freeze); no recs filed -- audit findings DCG-04/DCG-05
    and recs rec-2814/2815/2822/2823 are referenced, not refiled.
  - >-
    Deliberate-constraint boundary: the Decision-105 ratification lane STAYS -- this rescopes its
    ARTIFACT (adds the batch-wave form), never proposes deleting the lane.
  - >-
    TRAP-1: Decision 43 ("Directed Growth Governance") governs CODE/SLOC growth, NOT decision-log
    growth -- precedent in name only; not cited as governing, and Decision 150 is titled distinctly to
    avoid conflation (decision-scout confirmed clean).
  - >-
    No new standing prose docs (Decision 86/127): the significance clause is a section in the existing
    decision-entry.yaml contract; rationale routes to Decision 150; no docs/INTENT-*.md.
  - >-
    The significance clause's four routing rows are authored to be citable as a classification
    vocabulary (forward-linkage: rec-2822/2823 will cite it for the citation-stranded-artifact class)
    -- but this plan does NOT build the migration manifest or touch those recs.
  - >-
    Amendment-form convention (scout flag 1): use the realized-mechanism inline blockquote form
    ("> **Amended by Decision 150 (date):**") on Decision 105's body, reciprocal to Decision 150's
    amends-clause -- NOT the forward-only amending-Decision-only form (Decision 105 is live/realized).
  - >-
    Decision 150 authoring + `--backfill-decisions-md` ETL run behind the /implement execution-time
    human confirmation gate for the Decision text; the entry lands via the sanctioned portal ETL
    (Decision 84 Single Portal Invariant / numbering authority), never a direct JSONL cache edit.
  - >-
    Prose-budget ratchet (Decision 43/127 surface, Decision 128 raise mechanism; surfaced by
    plan-critique round 1): planning/SKILL.md and implement/SKILL.md are zero-headroom entries in
    config/prose_budgets.yaml (~24 B and ~59 B headroom). Keep the skill additions MINIMAL/tight and
    raise each entry to its exact post-edit size with a dec-150-cited `# raise-approved:` marker -- a
    Decision-cited raise is the sanctioned exception; do NOT pad the additions to justify a bigger raise.
  - No rescue agents or workaround loops (Decision 55).
