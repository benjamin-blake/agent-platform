  - >-
    GRANULARITY FORK (human decision at Step 6b, relayed by the orchestrator): governing Decision as
    ONE two-clause entry (RECOMMENDED) vs TWO separate entries. Recommendation ONE -- the significance
    bar and batch-wave form are two facets of a single direction mechanism (audit Q2 frames them as
    one answer), interdependent by construction (the significance taxonomy's cd_state_flip row routes
    INTO the batch-wave form), and a Decision about minting fewer headers should itself prefer one
    header for one commitment; the 78 KB / 18-header headroom removes any byte pressure to split;
    per-clause reversal conditions and the amends-Decision-105 title edge (cf. Decision 143 "amends
