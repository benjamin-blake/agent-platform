  - >-
    Batch-wave shape is ALREADY exercised and R1-R3-compatible: CD.16 and CD.24 both carry
    ratified_as=dec-079 / filed_via=ops_decisions:dec-079 (verified via the roadmap loader), ratified
    together under Decision 79; Decision 105 reconciled 5 CDs in one entry. The guard checks each CD
