    audits/decision-consolidation-growth-f79d6b5.yaml (Q2 verdict insufficient). Effort S each per the audit.
  - >-
    Waves 1+2 of this DCG run are merged on main (Decision 149 compaction lifecycle + DCG-03
    orphan-divergence guard). Live docs/DECISIONS.md is 421,753 bytes / 102 H2 headers -> ~78 KB and
    18 headers of headroom under Decision 134's 500,000-byte / 120-header ceilings (Decision 145
