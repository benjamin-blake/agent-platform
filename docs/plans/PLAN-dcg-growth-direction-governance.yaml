  - "gates: decision-scout=FLAGS_FOUND (1 round); plan-critique=REVISE r1 -> re-requested r2 (prose-budget ratchet fix)"
  - >-
    Scout CONTRADICT resolutions folded in (both Decision 105, non-blocking): (1) AMENDMENT-FORM --
