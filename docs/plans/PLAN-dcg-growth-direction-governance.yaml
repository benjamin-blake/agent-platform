execution_steps:
  - >-
    docs/contracts/decision-entry.yaml: add a `significance:` section (mirroring the `compaction:`
    section shape -- a leading comment naming DCG-05 / Decision 150 / this plan, then keyed subfields).
    Include `bar:` (durable architectural commitment with reversal-relevant consequences -> a numbered
    `## Decision NNN:` entry) and `routing:` with four rows: numbered_decision (as above);
    cd_state_flip (a CD status transition / gate-clear -> the batch-wave clause in
    candidate-decision-ratification.yaml; content-bearing ratifications keep their own entry);
    operational_fact (a transient/operational statement -- what-is-currently-true or a point-fix -> a
    recommendation via `scripts.ops_data_portal file_rec`, or a tier_item note/progress_note if it is
    roadmap status); field_semantics (the meaning/constraints of a data field or config key -> a
    governance/semantics note in the owning contract, never a numbered Decision; Decision 86/127
    routing). Add a note that the planning skill's decision-authoring step cites this section and that
    the taxonomy is a citable classification vocabulary. Pre: no significance section. Post: section
    present, `bin/venv-python -c "import yaml,pathlib; yaml.safe_load(pathlib.Path('docs/contracts/decision-entry.yaml').read_text())"` parses clean.
  - >-
    docs/contracts/candidate-decision-ratification.yaml: add a `batch_wave_ratified_form:` subsection
    -- the many-CDs -> one shared dec-NNN wave-entry shape, the per-CD clause form, the
    content-bearing-keeps-own-entry rule, and an explicit note that R1-R3 tolerate it by construction
    (each CD checked independently; live CD.16/CD.24 -> dec-079 precedent under Decision 79; Decision
    105's own 5-CD reconciliation).
  - >-
    .claude/skills/planning/SKILL.md: add a short "Decision Significance Gate" note at/just before the
    "Candidate Decision Ratification (Workflow Step 5b)" section (line 373) that cites
    decision-entry.yaml's `significance:` section as the bar for any numbered-Decision draft (fresh
    governance Decision OR CD ratification), and extend the Step 5b draft guidance to cover bundling
    >=2 same-session pure gate-clears into one wave Decision (routing per the significance clause). Keep
    the addition tight -- planning/SKILL.md is a zero-headroom prose-budget entry (raised in the
    config/prose_budgets.yaml step below).
  - >-
    .claude/skills/implement/SKILL.md: in "CD Ratification Bookkeeping (Workflow Step 6)" (line 419),
    add a batch-wave clause -- when a plan bundles >=2 same-session PURE gate-clear CDs into one wave
    Decision, author ONE `## Decision N` entry (step 3) and ETL once (step 4), but repeat the three
    PER-CD sub-steps once per bundled CD: the roadmap-flip (step 5, with each CD's
    ratified_as/filed_via pointing at the SHARED dec-NNN), the marking-convention obligation, and the
    pending-window prose sweep (candidate-decision-ratification.yaml lane_steps.implement.execute
    sub-steps 5 and 6). Preflight (step 6) and validate (step 7) run once over all bundled CDs.
    Content-bearing ratifications are NOT bundled. Preserve Decision 90 (tier_item status flips remain
    a separate bookkeeping step). Keep the addition tight -- implement/SKILL.md is a zero-headroom
    prose-budget entry (raised in the config/prose_budgets.yaml step below).
  - >-
    tests/checks/roadmap/test_validate_candidate_decision_ratification.py: add a regression test (e.g.
    `test_multiple_cds_share_one_ratified_as_passes`) that sets up two `state: ratified` CDs both
