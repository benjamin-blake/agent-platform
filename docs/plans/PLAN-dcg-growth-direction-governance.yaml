schema_version: 1
slug: dcg-growth-direction-governance
intent: >-
  Give decision-log growth an explicit direction mechanism -- a significance bar for what becomes a
  numbered Decision, plus a batch-wave ratified form -- so the reasoning corpus stays bounded in
  SHAPE (not just size), preserving decision-scout triage and lower-tier-model portability as the
  self-improvement loop keeps routing rationale into DECISIONS.md.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-dcg-growth-direction-governance.yaml
phase: >-
  Platform governance surface -- decision-log growth direction. Audit remediation of DCG-05 (high)
  and DCG-04 (medium), audits/decision-consolidation-growth-f79d6b5.yaml (Q2 verdict: insufficient).
  Audit-driven, no owning tier_item (soft-warn exception; Tier Item Freshness Gate skipped -- names
  no tier_item, claims no alignment). T1.5 owns DECISIONS.md long-term but does not gate this work.
scope:
  - file: docs/contracts/decision-entry.yaml
    action: Modify
    purpose: >-
      Add a named `significance:` section (mirroring Decision 149's `compaction:` section shape on
      this same file) -- the bar for what becomes a numbered Decision, plus the four routing rows
      (numbered Decision / batch-wave clause / rec or tier_item note / contract governance note),
      rows 3-4 precise enough to serve as a citable classification vocabulary. Realizes DCG-05.
  - file: docs/contracts/candidate-decision-ratification.yaml
    action: Modify
    purpose: >-
      Document the batch-wave ratified form: same-session PURE gate-clears land as ONE wave Decision
      with per-CD clauses, each CD's ratified_as/filed_via pointing at the shared dec-NNN;
      content-bearing ratifications keep their own entry. Note R1-R3 already tolerate many-to-one by
      construction. Realizes DCG-04 (artifact rescope of the Decision-105 lane, not lane deletion).
  - file: .claude/skills/planning/SKILL.md
    action: Modify
    purpose: >-
      Cite the significance clause at the decision-authoring step (a short Decision Significance Gate
      note at/just before "Candidate Decision Ratification (Workflow Step 5b)", line 373), and extend
      the ratification-lane draft guidance to cover bundling >=2 pure gate-clears into one wave entry.
  - file: .claude/skills/implement/SKILL.md
    action: Modify
    purpose: >-
      Add the batch-wave clause to "CD Ratification Bookkeeping" (line 419): author ONE wave Decision
      + ETL once, but repeat the three PER-CD sub-steps (roadmap-flip, marking-convention obligation,
      pending-window prose sweep) once per bundled CD (scout flag 2). Preserve Decision 90 (tier_item
      status flips are a separate bookkeeping step).
  - file: tests/checks/roadmap/test_validate_candidate_decision_ratification.py
    action: Modify
    purpose: >-
      Add a regression test proving >=2 state=ratified CDs sharing one ratified_as dec-NNN pass
      R1-R3 green (failed == []), mirroring the live CD.16/CD.24 -> dec-079 precedent (Decision 79).
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      (a) Author the governing Decision 150 (default: one two-clause entry -- significance bar +
      batch-wave form -- amending Decision 105; see the granularity fork in context). (b) Append the
      reciprocal inline blockquote back-reference "> **Amended by Decision 150 (date):**" to Decision
      105's body (scout flag 1: realized-mechanism amendment convention).
  - file: config/prose_budgets.yaml
    action: Modify
    purpose: >-
      Bump the zero-headroom ratchet entries for .claude/skills/planning/SKILL.md (~24 B headroom)
      and .claude/skills/implement/SKILL.md (~59 B headroom) to their exact post-edit byte sizes, each
      carrying an inline `# raise-approved: dec-150 <reason>` marker (validate_prose_limits +
      validate_prose_budget_raises are both in the --pre tier). Surfaced by plan-critique round 1.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    docs/contracts/decision-entry.yaml carries a named `significance:` section (mirroring the
    `compaction:` section shape) stating the bar (durable architectural commitment with
    reversal-relevant consequences -> numbered Decision) and all four routing rows, with rows 3-4
    (operational fact -> rec / tier_item note; field semantics -> contract governance note) precise
    enough to serve as a citable classification vocabulary.
  - >-
    The planning skill's decision-authoring step (near Step 5b) cites the significance clause in
    decision-entry.yaml.
  - >-
    docs/contracts/candidate-decision-ratification.yaml documents the batch-wave ratified form:
    same-session pure gate-clears -> one `## Decision N` wave entry with per-CD clauses, each CD's
    ratified_as/filed_via -> the shared dec-NNN; content-bearing ratifications keep their own entry;
    and it notes R1-R3 tolerate many-to-one by construction.
  - >-
    The /plan and /implement ratification-lane steps describe the batch-wave form; the
    implement/SKILL.md edit makes explicit that the three PER-CD sub-steps (roadmap-flip,
    marking-convention obligation, pending-window prose sweep) repeat once per bundled CD while
    entry-authoring / ETL / preflight / validate run once per wave (Decision 105 flag-2; Decision 90
    tier-flip-separate preserved).
  - >-
    tests/checks/roadmap/test_validate_candidate_decision_ratification.py includes a regression test
    proving >=2 CDs sharing one ratified_as dec-NNN pass R1-R3 green (failed == []), mirroring the
    live CD.16/CD.24 -> dec-079 precedent (Decision 79), carrying the mandated anchor comment
    "# batch-wave: >=2 CDs share one ratified_as (CD.16/CD.24 -> dec-079 precedent)".
  - >-
    A governing Decision 150 exists in docs/DECISIONS.md (default: one two-clause entry amending
    Decision 105; title distinct from Decision 43; includes reversal conditions; Related cites
    Decisions 105/145/149/134/86/84/90/79) and is landed via `ops_data_portal --backfill-decisions-md`.
  - >-
    Decision 105's body carries a reciprocal inline "> **Amended by Decision 150 (YYYY-MM-DD):**"
    blockquote back-reference (realized-mechanism convention, per the Decision 89 <- Decision 83
    precedent), and Decision 150 carries the amends-Decision-105 clause (bidirectional linkage).
  - >-
    `bin/venv-python -m scripts.validate --pre` passes (validate_candidate_decision_ratification,
    validate_decisions_size, decision-entry conformance, prose/placement, validate_prose_limits,
    validate_prose_budget_raises).
  - >-
    config/prose_budgets.yaml's planning/SKILL.md and implement/SKILL.md entries are bumped to their
    exact post-edit byte sizes, each carrying an inline `# raise-approved: dec-150 <reason>` marker
    that resolves against the working-tree `## Decision 150:` header; validate_prose_limits and
    validate_prose_budget_raises both pass.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      Run the ratification guard's unit-test file green, exercising the real R1-R3 code path
      including the new >=2-CDs-share-one-dec-NNN case.
    command: 'bin/venv-python -m pytest tests/checks/roadmap/test_validate_candidate_decision_ratification.py -q'
    expected: >-
      All tests pass, including the new shared-ratified_as regression test (failed == []).
    fix_if: >-
      The new test fails -- the guard wrongly rejects legitimate many-to-one, or the test set up the
      shared ratified_as / single header incorrectly.
    graduation: waive
    graduation_waiver_reason: >-
      The guard's unit tests already execute under the standard pytest suite invoked by validate.py's
      full tier; a separately-registered kernel check would duplicate that existing coverage.
  - step: 2
    phase: pre-deploy
    action: >-
      Confirm the new regression test actually exercises two ratified CDs sharing one dec-NNN (not
      merely any green test) via the plan-mandated stable anchor comment.
    command: 'grep -n "batch-wave: >=2 CDs share one ratified_as" tests/checks/roadmap/test_validate_candidate_decision_ratification.py'
    expected: >-
      >=1 match -- the mandated anchor comment on the new shared-ratified_as regression test.
    fix_if: >-
      No match -- the implementer added a differently-shaped test or omitted the anchor; the specific
      many-to-one case is unverified.
    graduation: waive
    graduation_waiver_reason: >-
      Verifies presence of a specific regression test whose execution is already enforced by the
      pytest suite; a standing grep on test internals is brittle to LLM-authored naming and duplicative.
  - step: 3
    phase: pre-deploy
    action: Confirm decision-entry.yaml carries the `significance:` section with all four routing rows.
    command: 'grep -nE "^significance:|numbered_decision:|cd_state_flip:|operational_fact:|field_semantics:" docs/contracts/decision-entry.yaml'
    expected: >-
      The `significance:` header plus all four routing keys (numbered_decision, cd_state_flip,
      operational_fact, field_semantics) present.
    fix_if: >-
      The section or any of the four routing rows is missing.
    graduation: waive
    graduation_waiver_reason: >-
      A bare existence grep verifies presence, not the correctness of the four routing rows (an
      authoring-time judgement reviewed at plan-critique); it is not a meaningful standing regression
      invariant worth a registry row -- consistent with Decision 149's `compaction:` section, which
      added no such existence guard.
  - step: 4
    phase: pre-deploy
    action: Confirm the planning skill cites the significance clause at its decision-authoring step.
    command: 'grep -niE "significance" .claude/skills/planning/SKILL.md'
    expected: >-
      >=1 match referencing decision-entry.yaml's significance section at the decision-authoring /
      Step 5b area.
    fix_if: >-
      No match -- the citation required by DCG-05's acceptance is absent.
    graduation: waive
    graduation_waiver_reason: >-
      A grep-for-citation standing check is brittle to benign rewordings and risks false-positive CI
      breaks on unrelated skill edits; the citation link is protected by the decision-scout /
      plan-critique review loop rather than a mechanical grep (cf. rec-2479 stale-reference handling).
  - step: 5
    phase: pre-deploy
    action: Confirm candidate-decision-ratification.yaml documents the batch-wave ratified form.
    command: 'grep -niE "batch.?wave" docs/contracts/candidate-decision-ratification.yaml'
    expected: >-
      >=1 match documenting the many-CDs -> one shared dec-NNN wave form.
    fix_if: >-
      No match -- the batch-wave form is undocumented in the canonical contract.
    graduation: waive
    graduation_waiver_reason: >-
      Same family as step 3 -- contract-content existence, not correctness; the wave shape's rules
      are reviewed at authoring, so a bare existence grep is not a meaningful standing invariant.
  - step: 6
    phase: pre-deploy
    action: >-
      Confirm implement/SKILL.md CD Ratification Bookkeeping covers the batch-wave form AND the
      explicit per-bundled-CD repetition of the three per-CD sub-steps.
    command: 'grep -niE "batch.?wave|per bundled CD|once per bundled" .claude/skills/implement/SKILL.md'
    expected: >-
      Matches documenting the wave form and the explicit per-bundled-CD repetition of the roadmap-flip
      + marking-convention + pending-window prose sweep sub-steps.
    fix_if: >-
      No match, or the per-CD repetition is not made explicit -- bookkeeping would under-apply past
      the first CD (scout flag 2 unresolved).
    graduation: waive
    graduation_waiver_reason: >-
      Same family as step 4 -- skill-wiring grep is brittle to benign rewordings; the batch-wave
      methodology is protected by the review loop, not a mechanical grep.
  - step: 7
    phase: pre-deploy
    action: >-
      Confirm the governing Decision 150 entry exists AND Decision 105 carries the reciprocal inline
      amendment marker.
    command: 'grep -nE "^## Decision 150:" docs/DECISIONS.md && grep -nE "Amended by Decision 150" docs/DECISIONS.md'
    expected: >-
      The `## Decision 150:` header is present AND a "> **Amended by Decision 150 ...**" blockquote
      marker appears inside Decision 105's body.
    fix_if: >-
      Either the Decision 150 header or the reciprocal 105 back-reference is missing (bidirectional
      linkage incomplete).
    graduation: waive
    graduation_waiver_reason: >-
      One-time decision-entry authoring; a specific Decision header's existence is not a standing
      invariant, and validate's ratification / size / conformance guards already cover the corpus's
      structural integrity.
  - step: 8
    phase: pre-deploy
    action: >-
      Confirm both prose-budget entries carry a dec-150 raise-approved marker on the entry line
      (guards the zero-headroom ratchet raise).
    command: 'grep -nE "(planning|implement)/SKILL\.md:\s*[0-9]+\s*#\s*raise-approved:\s*dec-150" config/prose_budgets.yaml'
    expected: >-
      Two matches -- the planning/SKILL.md and implement/SKILL.md entries each raised to their exact
      post-edit byte size with an inline `# raise-approved: dec-150 <reason>` marker.
    fix_if: >-
      Fewer than two matches -- an entry was raised without the marker (validate_prose_budget_raises
      FAILs) or was not bumped (validate_prose_limits FAILs on the over-budget skill file).
    graduation: waive
    graduation_waiver_reason: >-
      A one-time Decision-cited ratchet raise; validate_prose_limits and validate_prose_budget_raises
      already stand as the permanent guards on this surface, so a separately-registered grep would
      duplicate them.
  - step: 9
    phase: pre-deploy
    action: >-
      Run the fast presubmit gate over all touched files (size, decision-entry conformance,
      ratification guard, prose/placement, prose budgets).
    command: 'bin/venv-python -m scripts.validate --pre'
    expected: >-
      Exit 0; validate_candidate_decision_ratification PASS, validate_decisions_size PASS,
      decision-entry conformance PASS, validate_prose_limits PASS, validate_prose_budget_raises PASS.
    fix_if: >-
      Any registered pre-tier check fails -- e.g. the size ceiling is breached, the ratification guard
      rejects the corpus, a conformance check flags the touched files, or a skill file exceeds its
      (now-raised) prose budget.
    graduation: not-applicable
constraints:
