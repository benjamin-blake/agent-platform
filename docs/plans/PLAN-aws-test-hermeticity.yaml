schema_version: 1
slug: "aws-test-hermeticity"
intent: >-
  Close the unit-test AWS-hermeticity gap (rec-2484) so no unit test can silently reach real AWS:
  replace the copy-pasted per-class reader guards with one global defense-in-depth hermetic-AWS
  guard in the root tests/conftest.py, and normalize the production reader's AWS-profile injection
  so dev keeps the agent_platform named profile while Lambda/CI run on ambient OIDC.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-aws-test-hermeticity.yaml
phase: >-
  Platform hardening (test hermeticity / CI-local drift elimination). Discharges the rec-2484 /
  rec-2710 / rec-2707 residue class. No product-roadmap phase; no tier_item claimed (soft-warn
  exception category: ad_hoc_rec, discharges an open manual rec).
scope:
  # ---- PHASE 1 (no check registration; fully implementable now) ----
  - file: tests/conftest.py
    action: Modify
    purpose: >-
      Add (L1) a global autouse hermetic-AWS fixture that consolidates the existing
      _clear_aws_credential_env fixture (line 54) -- deletes AWS_PROFILE/AWS_DEFAULT_PROFILE plus
      AWS_ACCESS_KEY_ID/AWS_LAMBDA_FUNCTION_NAME, redirects AWS_CONFIG_FILE + AWS_SHARED_CREDENTIALS_FILE
      to a nonexistent path, and sets AWS_EC2_METADATA_DISABLED=true, with an @pytest.mark.integration
      opt-out -- so boto3.Session(profile_name='agent_platform') raises ProfileNotFound deterministically
      on every machine. Add (L2) a botocore.session.Session.create_client tripwire autouse fixture
      (single chokepoint under boto3.client/resource/Session().client) that raises loudly on any
      un-mocked client construction, mirroring _block_llm_cli_subprocess (line 138), with a
      @pytest.mark.aws opt-in for moto/Stubber tests.
  - file: tests/ops_data_portal/test_ci_rca_fingerprint.py
    action: Modify
    purpose: >-
      Retire the per-class _guard_live_reader autouse fixture (the global L1/L2 guard supersedes it)
      and re-point its self-verifying meta-test (test_guard_blocks_unmocked_reader) to assert the new
      global-guard behavior instead of the removed AssertionError. All tests in this file stay green.
  - file: tests/ops_data_portal/test_ci_rca_close_then_recur.py
    action: Modify
    purpose: >-
      Retire the duplicated per-class _guard_live_reader autouse fixture and re-point its
      self-verifying meta-test to the global guard. All tests in this file stay green.
  - file: tests/test_conftest_hermeticity.py
    action: Create
    purpose: >-
      New test module proving the L1 and L2 fixtures work (rec-2484 acceptance command target):
      boto3.Session(profile_name='agent_platform') raises ProfileNotFound under L1; an un-mocked
      botocore create_client raises the L2 tripwire; @pytest.mark.integration bypasses L1 and
      @pytest.mark.aws bypasses L2.
  - file: pyproject.toml
    action: Modify
    purpose: >-
      Register the `aws` marker in [tool.pytest.ini_options].markers (the suite runs --strict-markers,
      so an unregistered marker errors). No addopts change.
  - file: src/common/iceberg_reader.py
    action: Modify
    purpose: >-
      Normalize AWS-profile injection: resolve the profile ONCE at the make_reader boundary and pass
      an explicit profile into DuckLakeReader so every boto3.Session site (the two Function-URL
      resolvers and _invoke) uses the same injected profile via scripts.aws_profile.resolve_aws_profile
      -- dev resolves the agent_platform default (Decision 113); Lambda/CI resolve None (ambient OIDC).
      Remove the buried per-callsite default so the profile is genuinely injected, not defaulted deep
      in the call stack. Behavior-preserving for Lambda/CI (resolve already returns None there).
  - file: tests/test_iceberg_reader.py
    action: Modify
    purpose: >-
      Cover the new/changed lines from the make_reader/DuckLakeReader profile-injection normalization
      (Decision 104 coverage-gate: iceberg_reader.py maps here). This file is grandfathered at 641 SLOC
      (raise-approved: dec-130) -- keep additions from raising its budget (Decision 128: no unmarked raise;
      decompose only if it crosses).
  - file: scripts/ops_portal/ci_rca_runtime.py
    action: Modify
    purpose: >-
      Confirm-only in most cases: the CI-RCA dedup call sites already forward profile via
      make_reader(profile=...). Reconcile with the normalized iceberg_reader boundary and remove any
      residual hardcode if found; preserve the fail-open connectivity contract and the Decision-124
      facade import/patch surface (dec-43 CC waiver). map_source_to_test returns None (no hard
      coverage gate); if a code change lands, tests/ops_data_portal/test_ci_rca_runtime.py plus the
      in-scope fingerprint/close-then-recur reader-path tests exercise it.
  # ---- PHASE 2 (DEFERRED: rebase AFTER the sibling WS1 "affected-set-selection" plan merges) ----
  - file: scripts/checks/hygiene/validate_no_profile_name_literal.py
    action: Create
    purpose: >-
      New --pre hygiene check forbidding profile_name= STRING LITERALS (profile_name='...' /
      profile_name="...") in src/ and scripts/ -- so a hardcoded named profile can never reappear
      in a production path. Must match only a quoted string-literal argument value (AST-based or a
      regex scoped to exclude docstrings/comments and the profile_name=... ellipsis placeholder),
      never profile_name=<name> or profile_name=<call>. Decorated @registry.register(...).
  - file: scripts/checks/registry.py
    action: Modify
    purpose: >-
      Insert _c("validate_no_profile_name_literal") into pre_sequence() (single-line addition).
      DEFERRED to Phase 2 to avoid a concurrent-edit collision on pre_sequence() with the WS1
      affected-set-selection plan and the registry equivalence-oracle / growth-safe invariants in
      tests/test_checks_registry.py (rec-2673/2674/2675).
  - file: scripts/validate.py
    action: Modify
    purpose: >-
      Add the facade re-export import for validate_no_profile_name_literal (mirrors the existing
      per-check facade imports), so getattr-resolution on the `validate` namespace finds it.
  - file: tests/checks/hygiene/test_validate_no_profile_name_literal.py
    action: Create
    purpose: >-
      Test the new check: passes on the current clean tree, flags a planted profile_name='agent_platform'
      literal, and does NOT flag profile_name=<variable>/<call> or docstring occurrences. Self-contained
      (Decision 131 clause 2: no cross-test imports; helpers via conftest/tests.fixtures only).
bundled_recommendations:
  - rec-2484
infrastructure_dependencies:
  - >-
    No terraform/*.tf in scope. src/common/iceberg_reader.py is a bundle include for the ACTIVE
    Lambda artifacts data-pipeline and ops-compaction (compute_affected_artifacts; --list-bundle
    confirms), so the change deploys via the decoupled_build_pipeline channel (bin/venv-python -m
    scripts.build_lambda --deploy); no terraform/personal filemd5 coupling and no IAM change.
acceptance_criteria:
  - >-
    Under the L1 fixture, boto3.Session(profile_name='agent_platform') raises botocore ProfileNotFound
    on every machine (dev and CI), proven by tests/test_conftest_hermeticity.py.
  - >-
    Under the L2 fixture, an un-mocked botocore create_client (boto3.client/resource/Session().client)
    raises the tripwire loudly; @pytest.mark.aws tests bypass it; @pytest.mark.integration tests bypass L1.
  - >-
    The per-class _guard_live_reader fixtures are removed from both ci_rca test files and every test in
    tests/ops_data_portal/test_ci_rca_fingerprint.py and test_ci_rca_close_then_recur.py still passes under
    the global guard (35 tests total).
  - >-
    tests/test_aws_profile.py stays green: resolve_aws_profile still returns the agent_platform named
    profile when no ambient credential signals are present, and None under Lambda/CI signals (Decision 113).
  - >-
    The production reader path injects the profile at the make_reader boundary and resolves via
    resolve_aws_profile at every boto3.Session site; Lambda/CI behavior (ambient OIDC) is unchanged; the
    new/changed iceberg_reader.py lines are covered by tests/test_iceberg_reader.py (Decision 104 coverage gate).
  - >-
    (Phase 2) The new validate_no_profile_name_literal --pre check passes clean on the current tree,
    is wired into pre_sequence(), and flags a planted profile_name='agent_platform' literal while not
    flagging profile_name=<variable>/<call> or docstring occurrences.
  - >-
    (V3) data-pipeline and ops-compaction are rebuilt, deployed via build_lambda --deploy, and smoke-tested
    healthy post-deploy with no ProfileNotFound regression in the deployed reader path.
  - >-
    The per-class _guard_live_reader fixture DEFINITIONS are gone from both ci_rca test files (surface
    retired), and rec-2484 is closed via the "Resolves:" squash-merge trailer (confirmed against the synced
    read cache post-merge).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Prove the L1 hermetic fixture and the L2 create_client tripwire both fire (rec-2484 acceptance).
    command: bin/venv-python -m pytest tests/test_conftest_hermeticity.py -q
    expected: >-
      All tests pass: a bare boto3.Session(profile_name='agent_platform') raises ProfileNotFound; an
      un-mocked botocore create_client raises the tripwire; @pytest.mark.aws and @pytest.mark.integration
      opt-outs behave as specified.
    fix_if: >-
      ProfileNotFound not raised (AWS_CONFIG_FILE/AWS_SHARED_CREDENTIALS_FILE redirect missing or a real
      profile still resolvable) or the tripwire does not intercept create_client (wrong patch target --
      must be botocore.session.Session.create_client).
    graduation: not-applicable
  - step: 2
    phase: pre-deploy
    action: Prove the 35 ci_rca tests still pass with the per-class guards removed and the global guard active.
    command: bin/venv-python -m pytest tests/ops_data_portal/test_ci_rca_fingerprint.py tests/ops_data_portal/test_ci_rca_close_then_recur.py -q
    expected: 35 passed; no test relies on the removed _guard_live_reader fixture; the re-pointed meta-tests pass.
    fix_if: >-
      A dedup-path test falls through to a live make_reader (add the missing mock in that test), or a
      re-pointed meta-test still asserts the old AssertionError shape.
    graduation: not-applicable
  - step: 3
    phase: pre-deploy
    action: Regression -- resolve_aws_profile named-profile resolution survives the fixture consolidation.
    command: bin/venv-python -m pytest tests/test_aws_profile.py -q
    expected: >-
      All pass -- resolve_aws_profile(default="agent_platform") returns "agent_platform" with no ambient
      signals and None under AWS_ACCESS_KEY_ID/AWS_LAMBDA_FUNCTION_NAME (Decision 113 preserved).
    fix_if: >-
      L1 set a fake AWS_ACCESS_KEY_ID globally (flips resolve to None) -- delete credential-signal env vars
      instead of setting fakes; scope any moto fake creds to the @pytest.mark.aws opt-in path only.
    graduation: not-applicable
  - step: 4
    phase: pre-deploy
    action: Prove the reader profile-injection normalization did not break the reader unit tests and the new lines are covered.
    command: bin/venv-python -m pytest tests/test_iceberg_reader.py -q
    expected: All pass -- make_reader/DuckLakeReader resolve the injected profile; no regression in URL resolution or _invoke.
    fix_if: A boto3.Session site still bypasses resolve_aws_profile or the make_reader boundary no longer forwards profile.
    graduation: not-applicable
  - step: 5
    phase: pre-deploy
    action: Prove the new profile_name-literal check behaves correctly (clean pass, planted-literal fail, no false positives).
    command: bin/venv-python -m pytest tests/checks/hygiene/test_validate_no_profile_name_literal.py -q
    expected: >-
      All pass -- the check passes on the clean tree, flags a planted profile_name='agent_platform' literal,
      and does NOT flag profile_name=<variable>/<call> or docstring/comment occurrences.
    fix_if: The regex/AST is too broad (flags variables/calls/docstrings) or too narrow (misses the planted literal).
    graduation: not-applicable
  - step: 6
    phase: pre-deploy
    action: Prove the new check is wired into the --pre gate end-to-end and the whole fast tier passes.
    command: bin/venv-python -m scripts.validate --pre
    expected: >-
      --pre passes; validate_no_profile_name_literal runs as a registered step (visible in the sequence) and
      the registry growth-safe invariants in tests/test_checks_registry.py remain satisfied.
    fix_if: >-
      Check not reached (missing @register or missing pre_sequence insertion or missing validate.py facade
      re-export), or a registry invariant/canary fails -- confirm this ran AFTER the WS1 rebase.
    graduation: not-applicable
  - step: 7
    phase: post-deploy
    action: Confirm the changed reader file is bundled into both active Lambda artifacts before deploying.
    command: bin/venv-python -m scripts.build_lambda --list-bundle data-pipeline | grep -q 'iceberg_reader.py' && bin/venv-python -m scripts.build_lambda --list-bundle ops-compaction | grep -q 'iceberg_reader.py'
    expected: iceberg_reader.py appears in both bundle file lists (the change is deploy-relevant to both artifacts).
    fix_if: File absent from a bundle -- re-check manifest includes/excludes; the affected-artifact set changed.
  - step: 8
    phase: post-deploy
    action: Build, upload, and deploy the two affected active Lambda artifacts (decoupled_build_pipeline channel).
    command: bin/venv-python -m scripts.build_lambda --deploy --profile agent_platform
    expected: >-
      data-pipeline and ops-compaction build, upload to S3, and update-function-code succeed for their
      functions (agent-platform-scheduled-agent-dispatcher, agent-platform-findings-processor,
      agent-platform-ops-compaction); the DuckLake artifacts are unaffected by this change.
    fix_if: Build/upload/deploy error -- read the build_lambda output; do not hand-patch AWS (Decision 55, forward-fix).
  - step: 9
    phase: post-deploy
    action: Post-deploy smoke -- the deployed functions are healthy and the reader path resolves ambient creds (no ProfileNotFound).
    command: aws lambda get-function --function-name agent-platform-ops-compaction --profile agent_platform --query 'Configuration.[State,LastUpdateStatus]' --output text
    expected: >-
      "Active Successful" -- the function updated cleanly. Then invoke ops-compaction with a benign/dry event
      and confirm a non-error response with no ProfileNotFound / NoCredentialsError in the function logs
      (the in-Lambda reader resolves ambient OIDC via resolve_aws_profile -> None).
    fix_if: >-
      State != Active/LastUpdateStatus != Successful, or logs show ProfileNotFound/NoCredentialsError -- the
      profile injection regressed the ambient path; RCA per Decision 55, do not swap back inline.
  - step: 10
    phase: pre-deploy
    action: Stale-reference sweep -- confirm the retired per-class _guard_live_reader fixture DEFINITIONS are gone.
    command: "test $(grep -rc 'def _guard_live_reader' tests/ops_data_portal/test_ci_rca_fingerprint.py tests/ops_data_portal/test_ci_rca_close_then_recur.py | awk -F: '{s+=$2} END {print s}') -eq 0"
    expected: Zero `def _guard_live_reader` definitions remain in either file (the global L1/L2 guard fully replaces them).
    fix_if: A per-class fixture definition survives -- delete it; the surface must be retired, not left dormant alongside the global guard.
    graduation: waive
    graduation_waiver_reason: >-
      One-time surface retirement, not a recurring invariant -- the standing regression guard is the global
      fixture's own behavior test (step 1) and the 35 ci_rca tests passing without the per-class guard (step 2).
      A permanent grep_count==0 registry check would ossify these two specific filenames.
  - step: 11
    phase: post-deploy
    action: Closure verification -- confirm rec-2484 is closed after the squash-merge Resolves trailer fires.
    command: bin/venv-python -m scripts.sync.ops pull && bin/venv-python -c "import json,pathlib; rows=[json.loads(l) for l in pathlib.Path('logs/.recommendations-log.jsonl').read_text().splitlines() if l.strip()]; r=next(x for x in rows if x.get('id')=='rec-2484'); assert r.get('status')=='closed', r.get('status'); print('rec-2484 closed')"
    expected: >-
      rec-2484 status == closed in the synced read cache. Runs AFTER the PR squash-merges (the "Resolves: rec-2484"
      trailer triggers rec-autoclose.yml). If run before merge it will read 'open' -- that is expected pre-merge.
    fix_if: >-
      Still 'open' post-merge -- confirm the squash-commit body carried "Resolves: rec-2484"; fallback:
      bin/venv-python -m scripts.ops_data_portal --update-rec rec-2484 --status closed --resolution "..." (Decision 70).
constraints:
  - Only modify files listed in Scope. Out-of-scope bugs become recommendations via scripts/ops_data_portal, not inline fixes.
  - No rescue agents or workaround loops; no unilateral judgement closures; forward-fix on failure (Decision 55).
  - No SLOC budget raise -- if any touched file crosses its budget, decompose into a facade package (Decision 128). Headroom is ample on production/scripts files; tests/test_iceberg_reader.py is grandfathered at 641 (dec-130) -- keep additions from raising it.
  - Do NOT add a check to .github/workflows/ci.yml; register the Phase-2 check in scripts/checks/registry.py + scripts/validate.py first (validate.py is the single SoT).
  - >-
    No direct writes to logs/.recommendations-log.jsonl or logs/.decisions-index.jsonl; rec-2484 closes
    via the "Resolves:" squash-commit trailer (rec-autoclose) or the ops portal. Author the new Decision
    in DECISIONS.md then --backfill-decisions-md (Decision 84/86); never write the JSONL caches.
  - No terraform apply; the Lambda deploy is the decoupled_build_pipeline code channel, not an infra apply.
  - Never edit or commit on main; work on the claude/... session branch. Auto-rebase at commit-flow time only.
  - >-
    L1 must NOT set a real-looking AWS_ACCESS_KEY_ID globally -- that flips resolve_aws_profile to None and
    breaks named-profile resolution. Achieve the ProfileNotFound guarantee via the nonexistent-config-path
    redirect (+ AWS_EC2_METADATA_DISABLED + the L2 tripwire + --disable-socket). Scope any moto fake
    credentials to the @pytest.mark.aws opt-in path only. tests/test_aws_profile.py (uses clear=True) is
    immune, but other tests relying on the credential-env deletion are not.
  - >-
    The new fixtures live in the ROOT tests/conftest.py (Decision 131 clause 3: the global socket/AWS/
    hermeticity guards live SOLELY in the root conftest; package sub-conftests layer under it and never
    redeclare globals). New test modules and re-pointed meta-tests are bound by validate_no_cross_test_imports
    (Decision 131 clause 2): each stays self-contained; shared helpers via conftest fixtures or tests.fixtures only.
  - >-
    Preserve Decision 113: dev/CC-web uses the agent_platform named profile (static-key + chained AssumeRole);
    Lambda and GitHub-OIDC CI use ambient credentials (resolve_aws_profile returns None). The reader
    normalization must not change this or the Decision-124 facade import/patch surface of ci_rca_runtime.py.
context:
  - >-
    Discharges rec-2484 (open, source=manual -- "--disable-socket + --allow-hosts does not block
    boto3/AWS calls"). Sibling residue rec-2710/rec-2707 already closed via per-class fixes; this
    replaces those per-class guards with the structural fix. rec-2484 acceptance names
    tests/test_conftest_hermeticity.py.
  - >-
    RCA: pytest addopts use --disable-socket + --allow-hosts=127.0.0.1,::1; a non-empty --allow-hosts takes
    pytest-socket's connect-guard path (patches socket.socket.connect, NOT getaddrinfo) and is empirically
    ineffective against boto3/urllib3. Separately, boto3.Session(profile_name='agent_platform') raises
    ProfileNotFound at Session construction (config parse) BEFORE any socket, so --disable-socket cannot catch
    it; it passes on dev (has the ~/.aws profile) and reds only on CI (OIDC, no named profile).
  - >-
    TWO-PHASE / OWNERSHIP SPLIT (critical): a concurrent sibling plan WS1 "affected-set-selection" owns
    scripts/checks/registry.py and the registry baselines in tests/test_checks_registry.py. Phase 1 (conftest
    L1/L2 + ci_rca guard retirement + pyproject aws marker + reader profile injection + V3 Lambda deploy)
    registers NO check and is implementable now. Phase 2 (register validate_no_profile_name_literal in
    pre_sequence + validate.py facade + its test) MUST be rebased onto main AFTER WS1 merges -- a concurrent
    edit to pre_sequence() collides and can trip the registry equivalence-oracle / growth-safe invariants
    (rec-2673/2674/2675). WS3 owns tests/conftest.py outright.
  - >-
    VERIFICATION TIER = V3 (forced, not discretionary): src/common/iceberg_reader.py is a bundle include for
    the ACTIVE artifacts data-pipeline and ops-compaction (compute_affected_artifacts confirms; --list-bundle
    shows iceberg_reader.py in both). Decision 79 mandates per-Lambda build + deploy + smoke-test for active
    artifacts. The change is behavior-preserving in-Lambda (ambient creds unchanged), but the tier rule is
    deterministic. DESCOPE OPTION for the reviewer: dropping src/common/iceberg_reader.py + tests/test_iceberg_reader.py
    + scripts/ops_portal/ci_rca_runtime.py from scope makes this a V2 pure-test-hermeticity change -- the
    conftest fixtures already fully close rec-2484, and the buried agent_platform default is dev-correct
    (Decision 113) and made deterministic-ProfileNotFound by L1. Kept in scope here to honor the confirmed design.
  - >-
    Decision draft (NEW, tiny separate Decision, slug "aws-test-hermeticity"): establishes (i) the
    AWS-profile-injection standard for production reader/AWS paths (inject at the boundary; resolve via
    resolve_aws_profile; dev=agent_platform, Lambda/CI=ambient) and (ii) the no-profile_name=-string-literal
    enforcement check. Precedent: recent registered checks that establish a NEW enforceable rule each carried
    their own numbered Decision (127/128/129/131/132); a separate small Decision is preferable to folding into
    WS1's affected-set-selection (different subject/rationale; Decision 86 canonical-home + one-coherent-subject
    grain). The Phase-1 hermetic fixtures are hygiene (no ADR). Filed via ops_data_portal --backfill-decisions-md
    at implement time; number re-checked at write time (current max is Decision 134, so likely Decision 135;
    well under the Decision-134 decisions-size ceiling).
  - >-
    Decisions to CITE -- 131 (root-conftest hierarchy + no-cross-test-import), 104 (check-registry pattern
    + coverage-gate mapping), 79 + 48 (Lambda-tier gating / V3), 113 (static-key/assume-role dev vs ambient),
    128 (SLOC decompose-by-default), 130 (tests/ grandfather of test_iceberg_reader.py), 55 (forward-fix /
    no workaround loops), 86 + 84 (route rationale to a numbered Decision, backfill not JSONL), 124
    (ci_rca_runtime facade import/patch surface). Plus the new "aws-test-hermeticity" Decision.
  - "Decision-scout verdict + CITE list (verbatim decision ids): FLAGS_FOUND. CITE: dec-131, dec-104, dec-79, dec-48, dec-113, dec-128, dec-130, dec-55, dec-86, dec-84, dec-124, plus new dec (slug aws-test-hermeticity). Decision-104 coverage NOTE folded in: tests/test_iceberg_reader.py added to scope. Triaged 94 of 94."
  - "gates: decision-scout=FLAGS_FOUND (dec-104 coverage NOTE resolved by adding tests/test_iceberg_reader.py to scope); plan-critique=DEFERRED_TO_OVERSEER (nested-gate wake failed)"
