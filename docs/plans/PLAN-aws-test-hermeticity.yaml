  - "PHASE 2b: scripts/checks/registry.py -- insert _c(\"validate_no_profile_name_literal\") into pre_sequence(). scripts/validate.py -- add the facade re-export. This is ONE commit."
  - "PHASE 2c: tests/checks/hygiene/test_validate_no_profile_name_literal.py -- create the check's test (clean pass / planted-literal fail / no false positives)."
