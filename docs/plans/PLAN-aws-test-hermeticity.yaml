schema_version: 1
slug: "aws-test-hermeticity"
intent: >-
  Close the unit-test AWS-hermeticity gap (rec-2484) so no unit test can silently reach real AWS:
  replace the copy-pasted per-class reader guards with one global defense-in-depth hermetic-AWS
  guard in the root tests/conftest.py. Pure test-infrastructure hygiene -- no production code change.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-aws-test-hermeticity.yaml
phase: >-
  Platform hardening (test hermeticity / CI-local drift elimination). Discharges rec-2484 and the
  rec-2710/rec-2707 per-class-guard residue. No product-roadmap phase; no tier_item claimed
  (soft-warn exception category: ad_hoc_rec, discharges an open manual rec).
scope:
  - file: tests/conftest.py
    action: Modify
    purpose: >-
      Add (L1) a global autouse hermetic-AWS fixture that consolidates the existing
      _clear_aws_credential_env fixture (line 54) -- deletes AWS_PROFILE/AWS_DEFAULT_PROFILE plus
      AWS_ACCESS_KEY_ID/AWS_LAMBDA_FUNCTION_NAME (NO fake credentials set), redirects AWS_CONFIG_FILE
      + AWS_SHARED_CREDENTIALS_FILE to a nonexistent path, and sets AWS_EC2_METADATA_DISABLED=true,
      with an @pytest.mark.integration opt-out -- so boto3.Session(profile_name='agent_platform')
      raises ProfileNotFound deterministically on every machine. Add (L2) a
      botocore.session.Session.create_client tripwire autouse fixture (single chokepoint under
      boto3.client/resource/Session().client) that raises loudly on any un-mocked client
      construction, mirroring _block_llm_cli_subprocess (line 138), with a @pytest.mark.aws opt-in
      for moto/Stubber tests.
  - file: pyproject.toml
    action: Modify
    purpose: >-
      Register the `aws` marker in [tool.pytest.ini_options].markers (the suite runs --strict-markers,
      so an unregistered marker errors). No addopts change.
  - file: tests/ops_data_portal/test_ci_rca_fingerprint.py
    action: Modify
    purpose: >-
      Retire the per-class _guard_live_reader autouse fixture (the global L1/L2 guard supersedes it)
      AND delete the now-obsolete self-verifying meta-test test_guard_blocks_unmocked_reader -- the
      global guard has its own behavior test (tests/test_conftest_hermeticity.py), and the ci_rca
      dedup fail-open path (see Context) means the per-class "name the missing mock" ergonomic the
      meta-test asserted is not reproduced by the global guard anyway. Remaining tests stay green.
  - file: tests/ops_data_portal/test_ci_rca_close_then_recur.py
    action: Modify
    purpose: >-
      Remove the duplicated per-class _guard_live_reader autouse fixture ONLY (this file has the
      fixture but NO self-verifying meta-test -- nothing else to change). Remaining tests stay green.
  - file: tests/test_conftest_hermeticity.py
    action: Create
    purpose: >-
      New test module proving the L1 and L2 fixtures work (rec-2484 acceptance command target):
      boto3.Session(profile_name='agent_platform') raises ProfileNotFound under L1; an un-mocked
      botocore create_client raises the L2 tripwire; @pytest.mark.integration bypasses L1 and
      @pytest.mark.aws bypasses L2.
bundled_recommendations:
  - rec-2484
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    Under the L1 fixture, boto3.Session(profile_name='agent_platform') raises botocore ProfileNotFound
    on every machine (dev and CI), proven by tests/test_conftest_hermeticity.py.
  - >-
    Under the L2 fixture, an un-mocked botocore create_client (boto3.client/resource/Session().client)
    raises the tripwire loudly; @pytest.mark.aws tests bypass it; @pytest.mark.integration tests bypass L1.
  - >-
    The per-class _guard_live_reader fixtures are removed from both ci_rca test files, the obsolete
    test_guard_blocks_unmocked_reader meta-test is deleted, and the remaining ci_rca tests still pass
    under the global guard (34 = the prior 35 minus the deleted meta-test).
  - >-
    tests/test_aws_profile.py stays green: resolve_aws_profile still returns the agent_platform named
    profile when no ambient credential signals are present, and None under Lambda/CI signals -- the
    fixture consolidation deletes credential-signal env vars (does NOT set fake ones).
  - >-
    The broader unit suite stays green under the global L1/L2 guards: any test that legitimately
    constructs an AWS client is either mocked or carries @pytest.mark.aws (no un-marked live-AWS test remains).
  - >-
    rec-2484 is closed via the "Resolves:" squash-merge trailer (confirmed against the synced read cache post-merge).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Prove the L1 hermetic fixture and the L2 create_client tripwire both fire, and the opt-outs work (rec-2484 acceptance).
    command: bin/venv-python -m pytest tests/test_conftest_hermeticity.py -q
    expected: >-
      All tests pass: a bare boto3.Session(profile_name='agent_platform') raises ProfileNotFound; an
      un-mocked botocore create_client raises the tripwire; @pytest.mark.aws and @pytest.mark.integration
      opt-outs behave as specified.
    fix_if: >-
      ProfileNotFound not raised (AWS_CONFIG_FILE/AWS_SHARED_CREDENTIALS_FILE redirect missing or a real
      profile still resolvable) or the tripwire does not intercept create_client (wrong patch target --
      must be botocore.session.Session.create_client).
    graduation: not-applicable
  - step: 2
    phase: pre-deploy
    action: Prove the remaining ci_rca tests pass with the per-class guards removed and the meta-test deleted.
    command: bin/venv-python -m pytest tests/ops_data_portal/test_ci_rca_fingerprint.py tests/ops_data_portal/test_ci_rca_close_then_recur.py -q
    expected: 34 passed (prior 35 minus the deleted test_guard_blocks_unmocked_reader); no test relies on the removed _guard_live_reader fixture.
    fix_if: >-
      A dedup-path test relied on the removed fixture's ergonomics -- add the missing mock in that test.
      A count other than 34 means the fixture/meta-test deletion was incomplete or over-broad.
    graduation: not-applicable
  - step: 3
    phase: pre-deploy
    action: Regression -- resolve_aws_profile named-profile resolution survives the fixture consolidation.
    command: bin/venv-python -m pytest tests/test_aws_profile.py -q
    expected: >-
      All pass -- resolve_aws_profile(default="agent_platform") returns "agent_platform" with no ambient
      signals and None under AWS_ACCESS_KEY_ID/AWS_LAMBDA_FUNCTION_NAME.
    fix_if: >-
      L1 set a fake AWS_ACCESS_KEY_ID (flips resolve to None) -- the design is delete-credential-signals
      only; never set fake creds globally. Scope any moto fake creds to the @pytest.mark.aws opt-in path.
    graduation: not-applicable
  - step: 4
    phase: pre-deploy
    action: Stale-reference sweep -- confirm the retired per-class _guard_live_reader fixture DEFINITIONS are gone.
    command: "test $(grep -rc 'def _guard_live_reader' tests/ops_data_portal/test_ci_rca_fingerprint.py tests/ops_data_portal/test_ci_rca_close_then_recur.py | awk -F: '{s+=$2} END {print s}') -eq 0"
    expected: Zero `def _guard_live_reader` definitions remain in either file (the global L1/L2 guard fully replaces them).
    fix_if: A per-class fixture definition survives -- delete it; the surface must be retired, not left dormant alongside the global guard.
    graduation: waive
    graduation_waiver_reason: >-
      One-time surface retirement, not a recurring invariant -- the standing regression guard is the global
      fixture's own behavior test (step 1) and the ci_rca tests passing without the per-class guard (step 2).
      A permanent grep_count==0 registry check would ossify these two specific filenames.
  - step: 5
    phase: pre-deploy
    action: Blast-radius check -- the global L1/L2 guards do not red pre-existing unit tests.
    command: bin/venv-python -m pytest tests/ -q -p no:randomly
    expected: >-
      The unit suite is green. Any test that legitimately constructs an AWS client now either mocks it or
      carries @pytest.mark.aws; any test needing a named profile carries @pytest.mark.integration.
    fix_if: >-
      A previously-passing test now errors with ProfileNotFound or the create_client tripwire -- mock its
      client or add the correct opt-out marker; do NOT weaken the global guard (Decision 55, forward-fix).
    graduation: not-applicable
  - step: 6
    phase: post-deploy
    action: Closure verification -- confirm rec-2484 is closed after the squash-merge Resolves trailer fires.
    command: bin/venv-python -m scripts.sync.ops sync && bin/venv-python -c "import json,pathlib; rows=[json.loads(l) for l in pathlib.Path('logs/.recommendations-log.jsonl').read_text().splitlines() if l.strip()]; r=next(x for x in rows if x.get('id')=='rec-2484'); assert r.get('status')=='closed', r.get('status'); print('rec-2484 closed')"
    expected: >-
      rec-2484 status == closed in the synced read cache. Runs AFTER the PR squash-merges (the "Resolves: rec-2484"
      trailer triggers rec-autoclose.yml). If run before merge it will read 'open' -- that is expected pre-merge.
    fix_if: >-
      Still 'open' post-merge -- confirm the squash-commit body carried "Resolves: rec-2484"; fallback:
      bin/venv-python -m scripts.ops_data_portal --update-rec rec-2484 --status closed --resolution "..." (Decision 70).
constraints:
  - Only modify files listed in Scope. This plan makes NO production code change (test infrastructure + pyproject only). Out-of-scope bugs become recommendations via scripts/ops_data_portal, not inline fixes.
  - No rescue agents or workaround loops; no unilateral judgement closures; forward-fix on failure (Decision 55).
  - No SLOC budget raise -- headroom is ample on all touched files; if a file crossed budget, decompose (Decision 128), never raise.
  - No direct writes to logs/.recommendations-log.jsonl or logs/.decisions-index.jsonl; rec-2484 closes via the "Resolves:" squash-commit trailer (rec-autoclose) or the ops portal.
  - No terraform, no Lambda deploy, no Decision Record -- this is pure test hygiene (extends Decision 131 clause 3; the L1/L2 fixtures are hygiene, no ADR).
  - Never edit or commit on main; work on the claude/... session branch.
  - >-
    L1 must NOT set a real-looking AWS_ACCESS_KEY_ID -- that flips resolve_aws_profile to None and breaks
    named-profile resolution. Achieve the ProfileNotFound guarantee via the nonexistent-config-path redirect
    (+ AWS_EC2_METADATA_DISABLED + the L2 tripwire + --disable-socket). Scope any moto fake credentials to
    the @pytest.mark.aws opt-in path only. tests/test_aws_profile.py (uses clear=True) is immune, but other
    tests relying on the credential-env deletion are not.
  - >-
    The new fixtures live in the ROOT tests/conftest.py (Decision 131 clause 3: the global socket/AWS/
    hermeticity guards live SOLELY in the root conftest; package sub-conftests layer under it and never
    redeclare globals). tests/test_conftest_hermeticity.py stays self-contained (Decision 131 clause 2:
    validate_no_cross_test_imports).
context:
  - >-
    Discharges rec-2484 (open, source=manual -- "--disable-socket + --allow-hosts does not block
    boto3/AWS calls"). Sibling residue rec-2710/rec-2707 already closed via per-class fixes; this
    replaces those per-class guards with the structural fix. rec-2484 acceptance names
    tests/test_conftest_hermeticity.py.
  - >-
    RCA: pytest addopts use --disable-socket + --allow-hosts=127.0.0.1,::1; a non-empty --allow-hosts takes
    pytest-socket's connect-guard path (patches socket.socket.connect, NOT getaddrinfo) and is empirically
    ineffective against boto3/urllib3. Separately, boto3.Session(profile_name='agent_platform') raises
    ProfileNotFound at Session construction (config parse) BEFORE any socket, so --disable-socket cannot catch
    it; it passes on dev (has the ~/.aws profile) and reds only on CI (OIDC, no named profile).
  - >-
    DESCOPED from this plan (deferred, likely dropped): the profile-injection normalization of
    src/common/iceberg_reader.py + scripts/ops_portal/ci_rca_runtime.py, its coverage in
    tests/test_iceberg_reader.py, the validate_no_profile_name_literal --pre check (+ registry/validate.py
    wiring), and the "aws-test-hermeticity" Decision. Reason: iceberg_reader.py is a LIVE ~15-caller DuckLake
    reader and the injection is behavior-preserving (Lambda/CI already resolve None via resolve_aws_profile),
    not worth a V3 two-Lambda deploy (data-pipeline + ops-compaction). Plan A closes rec-2484 via the conftest
    fixtures alone. No WS1 (affected-set-selection) dependency remains.
  - >-
    KNOWN TRADEOFF (why the meta-test is deleted, not re-pointed): the ci_rca dedup path fails OPEN --
    find_open/find_recent_ci_rca_rec_by_fingerprint wrap make_reader in a broad except, and
    iceberg_reader._resolve_function_url_via_ssm/_api themselves catch all exceptions and return None, so a
    guard error (ProfileNotFound / L2 tripwire) is converted into a RuntimeError "cannot reach the DuckLake
    reader" that _is_reader_unreachable_error treats as reader-unreachable -> returns None (dedup skipped).
    So the per-class guard's loud "name the missing mock" AssertionError ergonomic is NOT reproduced by the
    global guard on the ci_rca path; test_guard_blocks_unmocked_reader asserted that ergonomic and is now
    obsolete. Accepted: the global guard still prevents a LIVE AWS call (the rec-2484 goal); it just does not
    reproduce the per-test naming ergonomic. Correctly-mocked ci_rca tests are unaffected.
  - Decisions to CITE -- 131 (root-conftest hierarchy clause 3 + no-cross-test-import clause 2; this plan extends it), 55 (fail-loud tripwire idiom / forward-fix), 86 + 84 (no prose doc; rec closure via portal/trailer, not JSONL writes).
  - >-
    Decision-scout verdict + CITE list (verbatim decision ids): FLAGS_FOUND. Its sole actionable flag was a
    Decision-104 coverage NOTE on tests/test_iceberg_reader.py -- now MOOT because iceberg_reader.py is
    descoped from Plan A. Effective CITE for Plan A: dec-131, dec-55, dec-86, dec-84. No BLOCK; no new Decision.
  - "gates: decision-scout=FLAGS_FOUND (dec-104 coverage NOTE now moot -- iceberg_reader.py descoped); plan-critique=applied at overseer level (this restructure implements the critique verdict; not re-run per overseer)"
pre_implementation_checklist:
  - Branch confirmed not on main (a fresh claude/... implement branch off latest origin/main)
  - docs/PROJECT_CONTEXT.md read
  - DECISIONS.md read (131, 55, 86, 84)
  - Scope-drift check at implement start (files in scope match this 5-file list)
  - All files in scope located and readable
  - Acceptance criteria understood and verifiable
execution_steps:
  - "tests/conftest.py -- add the L1 hermetic-AWS autouse fixture (consolidating _clear_aws_credential_env; delete credential signals, redirect config/creds files to a nonexistent path, disable IMDS, @pytest.mark.integration opt-out) and the L2 botocore.session.Session.create_client tripwire autouse fixture (@pytest.mark.aws opt-in)."
  - "pyproject.toml -- register the `aws` marker under [tool.pytest.ini_options].markers."
  - "tests/ops_data_portal/test_ci_rca_fingerprint.py -- delete the per-class _guard_live_reader fixture AND the obsolete test_guard_blocks_unmocked_reader meta-test."
  - "tests/ops_data_portal/test_ci_rca_close_then_recur.py -- delete the per-class _guard_live_reader fixture only (no meta-test present)."
  - "tests/test_conftest_hermeticity.py -- create the test proving L1 (ProfileNotFound), L2 (create_client tripwire), and both opt-outs."
  - "Execute the Verification Plan -- run VP steps 1-5 (hermeticity test, remaining ci_rca tests, aws_profile regression, stale-reference sweep, blast-radius suite run); loop until green. On a pre-existing test tripped by the global guard, mock its client or add the correct opt-out marker (never weaken the guard)."
  - "Post-merge: run VP step 6 to confirm rec-2484 closed via the Resolves: trailer."
  - "Report: what was implemented, verification results, and rec-2484 closure."
work_areas: []
rollback: >-
  Test-infrastructure only -- revert the branch to restore the per-class _guard_live_reader fixtures and
  the deleted meta-test. No production, Lambda, terraform, or Decision state is touched, so there is nothing
  else to roll back.
