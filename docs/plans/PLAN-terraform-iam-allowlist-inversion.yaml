schema_version: 1
slug: "terraform-iam-allowlist-inversion"
intent: >-
  Realize Decision 144's target IAM model (the audit's centerpiece, DEP-01/DEP-02): invert
  github_ci_apply from an enumerated per-resource WRITE allow-list into a broad-but-bounded deployer
  operating under the MANDATORY agent-platform-github-ci-apply-boundary, extend Decision 129's
  per-service agent-platform-* prefix from reads to writes, attach the boundary to all in-scope
  agent-platform-* CI + execution roles and PlatformDev (PlatformAdmin excluded), and retune the
  authority budget to v2 -- so a guard-PASS agent-platform-* change auto-applies end-to-end instead
  of dying AccessDenied, and a new boundary-carrying role ships through one gated approval instead of
  the admin tier. This contributes to the North Star's self-improving loop by removing the dominant
  source of human-in-the-loop deploy friction while keeping every CD.35 safety property verbatim.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-terraform-iam-allowlist-inversion.yaml
phase: >-
  Platform T2.48 (Phase-2 allow-list inversion, realizes Decision 144; depends_on T2.45 which
  landed as slice C). Audit terraform-deploy-redesign slice E (CENTERPIECE) in the overseer run
  OVERSEER-terraform-deploy-redesign; DEP-01 + DEP-02.
scope:
  - file: terraform/bootstrap/github_ci_apply.tf
    action: Modify
    purpose: >-
      Invert the WRITE surface (DEP-01/DEP-02). (a) Broaden the enumerated WRITE Sids to the
      per-service agent-platform-*/ducklake-* prefix pattern and ADD the currently-missing write
      verbs: a new CloudWatchLogsWrite Sid (logs:CreateLogGroup/PutRetentionPolicy/TagLogGroup/
      DeleteLogGroup/DeleteRetentionPolicy on log-group:/aws/lambda/agent-platform-*), a new
      LambdaFunctionWrite Sid (lambda:CreateFunction/UpdateFunctionConfiguration/DeleteFunction/
      TagResource/UntagResource/PutFunctionConcurrency/DeleteFunctionConcurrency on
      function:agent-platform-*), broaden LambdaPermissionWrite/EventBridgeWrite/CloudWatchAlarmsWrite
      from enumerated ARNs to function:agent-platform-*/rule:agent-platform-*/alarm namespaces
      (agent-platform-* AND ducklake-*), and add iam:UpdateRoleDescription (rec-2757).
      (b) HAZARD-4: add an IAMRoleDeleteBounded Sid granting iam:DeleteRole/DetachRolePolicy/
      DeleteRolePolicy on role/agent-platform-* so slice F's guard-gated role destroys execute
      instead of AccessDenying. (c) Widen IAMRoleCreateBounded + IAMRoleWriteBounded Resource to
      role/agent-platform-* KEEPING the iam:PermissionsBoundary propagation condition. (d) Add an
      explicit DenySelfInlinePolicyWrite Deny carving the apply role's own ARN
      (role/agent-platform-github-ci-apply) out of the widened role/agent-platform-* write grant
      (retain the T2.23 self-grant break). (e) Extend the boundary DataPlaneAllow with the 4 new iam
      verbs it does not yet permit (iam:DeleteRole/DetachRolePolicy/DeleteRolePolicy/
      UpdateRoleDescription) -- the boundary is a CEILING; a grant absent from it is silently denied.
      Retain DenyIAMEscalation / DenyBoundaryRemoval / DenyBoundaryPolicyModification unchanged.
  - file: terraform/bootstrap/authority_budget.json
    action: Modify
    purpose: >-
      Retune to v2 (c4). in_budget_actions gains "create" (creating a NEW inline policy/attachment on
      a boundary-carrying agent-platform-* role becomes in-budget, was update-only); the managed-role
      set moves from the two enumerated roles to a boundary-carrying agent-platform-* prefix
      (in_budget_managed_role_prefix) with an explicit self-exclusion of the apply role. Role CREATE
      (aws_iam_role type) stays out-of-budget/gated -- only now EXECUTABLE by the gated job because
      new roles declare the boundary. in_budget_resource_types unchanged (aws_iam_role_policy /
      aws_iam_role_policy_attachment).
  - file: terraform/personal/oidc.tf
    action: Modify
    purpose: >-
      Attach permissions_boundary = agent-platform-github-ci-apply-boundary to the 4 CI roles that
      lack it: github_ci_plan, github_ci_drift, github_ci_ducklake_deploy, github_ci_prod_deploy
      (branch/pr already carry it). Coverage 3/17 -> 7/17 for CI roles.
  - file: terraform/personal/platform_roles.tf
    action: Modify
    purpose: >-
      Attach the boundary to PlatformDev (aws_iam_role.platform_dev). EXPLICITLY do NOT attach it to
      PlatformAdmin (aws_iam_role.platform_admin) -- PlatformAdmin is the control identity that must
      remain able to amend the boundary; attaching DenyBoundaryPolicyModification to it would wedge
      break-glass (Decision 144 pt.3). The two DEP-13 Deny statements (DenyStateAndConvergenceWrite,
      DenyStateRead) are unaffected -- a boundary is a ceiling and an identity Deny always wins.
  - file: terraform/personal/ducklake_lambdas.tf
    action: Modify
    purpose: Attach the boundary to the ducklake_writer + ducklake_reader execution roles.
  - file: terraform/personal/ducklake_catalog_dr.tf
    action: Modify
    purpose: Attach the boundary to the ducklake_catalog_dr execution role.
  - file: terraform/personal/ducklake_maintenance.tf
    action: Modify
    purpose: Attach the boundary to the ducklake_maintenance execution role.
  - file: terraform/personal/ducklake_maintenance_smoke.tf
    action: Modify
    purpose: Attach the boundary to the ducklake_maintenance_smoke execution role.
  - file: terraform/personal/prod_lambdas.tf
    action: Modify
    purpose: >-
      Attach the boundary to the 3 prod execution roles: scheduled_agent_dispatcher,
      findings_processor, ops_compaction. Total exec-role coverage 0/8 -> 8/8.
  - file: scripts/checks/iam_tf/validate_ci_refresh_read_coverage.py
    action: Modify
    purpose: >-
      Extend the check's CONTRACT to also assert per-managed-resource-type WRITE coverage (c5,
      Decision 144 pt.2). Because the module is already 478 SLOC, DECOMPOSE per Decision 128 rather
      than raise: this file becomes a thin facade/orchestrator that imports the read-coverage map from
      a new _read_coverage submodule and the new write-coverage map from a new _write_coverage
      submodule; the registered check name validate_ci_refresh_read_coverage and its registry entry
      are UNCHANGED. Every resulting file stays < 500 SLOC.
  - file: scripts/checks/iam_tf/_write_coverage.py
    action: Create
    purpose: >-
      New submodule (Decision 128 decomposition): the WRITE-coverage map (managed resource type ->
      required write actions + resource-prefix, e.g. aws_lambda_function -> lambda:CreateFunction/
      UpdateFunctionConfiguration on function:agent-platform-*; aws_cloudwatch_log_group ->
      logs:CreateLogGroup/PutRetentionPolicy; aws_cloudwatch_metric_alarm -> cloudwatch:PutMetricAlarm;
      aws_cloudwatch_event_rule -> events:PutRule; aws_iam_role -> boundary + IAMRoleCreateBounded)
      and the assertion that github_ci_apply's inline policy covers each. An unmapped
      apply-role-written type FAILS LOUD (mirrors the read-coverage loud-fail).
  - file: scripts/checks/iam_tf/_read_coverage.py
    action: Create
    purpose: >-
      New submodule (Decision 128 decomposition): the existing READ CHECKED_TYPES/ENUMERATED_IAM_TYPES/
      TRANSITIVE_TYPES maps + read-assertion logic extracted verbatim from
      validate_ci_refresh_read_coverage.py so the facade stays < 500 SLOC. Exact split boundary is an
      implementation detail; the invariant is no file crosses 500 and behaviour is byte-equivalent.
  - file: scripts/checks/iam_tf/validate_authority_budget.py
    action: Modify
    purpose: >-
      Teach the drift gate the v2 budget shape: accept in_budget_managed_role_prefix (assert it maps
      to the IAMRoleWriteBounded Resource role/agent-platform-* in the HCL) alongside/in place of the
      enumerated in_budget_managed_roles; assert the apply-role self-exclusion (the widened prefix
      necessarily matches agent-platform-github-ci-apply, so the check MUST verify the explicit
      DenySelfInlinePolicyWrite carve-out exists in HCL, upgrading the old substring self-grant
      guard); assert in_budget_actions == ["create","update"]. Stays < 500 SLOC (currently 72).
  - file: scripts/terraform_apply_guard.py
    action: Modify
    purpose: >-
      Widen the in-budget predicate (_classify_iam_change) to READ the authority_budget v2 shape --
      REQUIRED for budget v2 to function (the implementer surfaced that the v1 guard classifies BOTH
      creates and updates as out-of-budget against a v2 budget, regressing T2.25 auto-apply and
      defeating c1/c2; scope added post-block with human authorization). Change: in_budget_actions from
      exact list-equality to SUBSET membership (a lone ["create"] or ["update"] is in-budget; a
      ["delete","create"] replace is not); in_budget_managed_roles exact-membership to
      in_budget_managed_role_prefix PREFIX-match; PLUS an explicit apply-role self-exclusion (the
      widened agent-platform-* prefix matches agent-platform-github-ci-apply itself, so a write on the
      apply role routes to gated -- the guard-side counterpart to DenySelfInlinePolicyWrite). Predicate
      widening only: NO new classification stage; evaluation order + missing-budget fail-closed +
      saved-plan no-TOCTOU control theory (Decision 77/92/126) retained verbatim.
  - file: tests/test_terraform_apply_guard.py
    action: Modify
    purpose: >-
      Update _BUDGET to the v2 shape and prove the four correctness properties: (1) in-budget UPDATE on
      github_ci_branch/pr STILL auto-applies (T2.25 preserved via subset-match); (2) in-budget CREATE of
      an inline policy on an agent-platform-* role auto-applies (budget-v2 goal via prefix-match); (3) an
      inline-policy write targeting agent-platform-github-ci-apply itself does NOT auto-apply
      (self-exclusion -> gated); (4) aws_iam_role CREATE / trust-diff / destroy / out-of-budget still
      route to gated (fail-closed control theory retained -- Decision 77/92).
  - file: docs/contracts/environment-taxonomy.md
    action: Modify
    purpose: >-
      Update the Guard classification subsection (sole SoT, Decision 92 pt.5) to v2: in_budget_actions
      == ["create","update"]; managed roles = boundary-carrying agent-platform-* prefix (not the
      two-role list); replace the "Conservative v1 narrowing: role CREATES stay gated" note with
      "role CREATE stays gated (routes to tf-gated-apply) but is now EXECUTABLE because new roles
      declare the mandatory boundary". The guard's in-budget PREDICATE (_classify_iam_change) widens
      to read the authority_budget v2 shape (subset-match on actions + prefix-match on the role + an
      explicit apply-role self-exclusion) -- NO new classification STAGE; the fail-closed control
      theory (evaluation order, missing-budget fail-closed, saved-plan no-TOCTOU) is retained verbatim.
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Governance bookkeeping sanctioned by Decision 144 pt.4/pt.5 (NOT a new Decision -- 144 is the
      forward-direction record; E realizes it). Add a short realization annotation under Decision 98
      point 1 and Decision 92 point 5 marking the amendments as now-IMPLEMENTED by T2.48, and
      re-ground Decision 143's exec-role-CREATE MECHANISM text from "admin-create only / human-gated
      for the exec-role CREATE" to "admin-create OR gated-Environment-executable for boundary-carrying
      agent-platform-* roles" (143's identity-scoping RULE and its "materially higher bar than an
      in-handler edit" property are preserved -- role CREATE still routes through the required-reviewer
      Environment). Annotation only; no account IDs/ARNs (Decision 101).
bundled_recommendations:
  - rec-2703
  - rec-2757
closes_criteria:
  - "T2.48:c1"
  - "T2.48:c2"
  - "T2.48:c3"
  - "T2.48:c4"
  - "T2.48:c5"
  - "T2.48:c6"
infrastructure_dependencies:
  - >-
    terraform/bootstrap/** is admin-only, NEVER auto-applied (terraform/bootstrap/CLAUDE.md). The
    widened github_ci_apply.tf + authority_budget.json apply OUT-OF-BAND under agent_platform_admin,
    and go FIRST (bootstrap before personal) so the apply role HAS the widened grants + the boundary
    permits them before any personal-root boundary attachment relies on them.
  - >-
    terraform/personal/** boundary attachments are aws_iam_role UPDATEs -> IAM_SENSITIVE_TYPES ->
    guard exit 2 (out-of-budget: aws_iam_role is not an in_budget_resource_type). They CANNOT ride the
    tf-gated-apply Environment either, because github_ci_apply has no iam:PutRolePermissionsBoundary
    on these 13 roles (only branch/pr) -- an Environment approval would approve-then-AccessDeny (the
    DEP-02 trap applied to the fix itself). They therefore route to the admin out-of-band break-glass
    path (deploy-paths.yaml#admin_out_of_band): a human reviews the plan and explicitly directs the
    apply under agent_platform_admin. Overseer NEVER approves the gated Environment for these
    (GATE-B-apply / GATE-E-execroles).
  - >-
    HIGHEST-RISK boundary-intersection gate (GATE-E-execroles): attaching the boundary can PASS
    terraform plan+apply and THEN cause RUNTIME AccessDenied for any action the boundary DataPlaneAllow
    does not cover -- no guard/CI catches this. REQUIRED pre-apply acceptance: aws iam
    simulate-principal-policy per exec role (8) + PlatformDev + the 4 CI roles, enumerating each
    principal's real runtime actions against the proposed boundary (T2.23 c4 precedent). REQUIRED
    post-apply: smoke BOTH deploy channels (the four DuckLake Lambdas' governed code-deploy channel
    deploy-ducklake-lambdas.yml + a routine terraform/personal infra auto-apply).
  - >-
    Lambda deploy channels (Decision 125): the four terraform_personal_filemd5_coupled DuckLake
    Lambdas' CODE deploys via the governed deploy-ducklake-lambdas.yml channel (grep-only / CI-delegated,
    NOT a local build_lambda --deploy). terraform apply must precede any Lambda code deploy
    (terraform/CLAUDE.md IAM precedence). This plan changes IAM/config only (no source_code_hash);
    exec-role function CODE is ignore_changes-decoupled and unaffected.
  - >-
    Provider-init egress (Decision 119): terraform/personal uses the third-party kislerdm/neon
    provider; a stock CC-web session cannot terraform init/validate/plan it. Local terraform VP steps
    are grep-only + terraform fmt -check (only if terraform present); terraform validate/plan/apply are
    CI-delegated (the required terraform-validate check + the speculative-plan pipeline are the
    authoritative verifiers). terraform/bootstrap is hashicorp/*-only and inits unconditionally under
    the admin apply.
acceptance_criteria:
  - >-
    (c1/DEP-01) A PR adding a new agent-platform-* Lambda + its log group + a CloudWatch alarm
    auto-applies end-to-end through CD with ZERO AccessDenied and ZERO bootstrap grant edit.
  - >-
    (c2/DEP-02) A PR creating a boundary-carrying agent-platform-* role routes to tf-gated-apply and,
    on approval, applies with ZERO AccessDenied WITHOUT invoking the admin tier.
  - >-
    (c3) The boundary is attached to all in-scope agent-platform-* CI + execution roles and to
    PlatformDev, PlatformAdmin EXCLUDED, with DenyIAMEscalation + DenyBoundaryRemoval +
    DenyBoundaryPolicyModification carried -- verified via aws iam simulate-principal-policy per
    principal (every real runtime action allowed; escalation + boundary-removal denied).
  - >-
    (c4) authority_budget.json is v2 (in_budget_actions == ["create","update"]; boundary-carrying
    agent-platform-* managed-role prefix; apply-role self-exclusion) and validate_authority_budget
    stays green with the boundary-propagation condition, the self-ARN exclusion, and the three
    self-protection denies retained.
  - >-
    (c5) validate_ci_refresh_read_coverage asserts WRITE coverage per managed resource type (an
    apply-role-written type with no covering write grant fails loud), and no scripts/checks/iam_tf/
    submodule exceeds 500 SLOC (Decision 128 decompose, not raise).
  - >-
    (c6) A periodic Decision-92 ratchet-review of the per-change-class incident-free auto-apply track
    record is scheduled as a standing measured act (surfaced from auto-apply telemetry in /orient or
    preflight). status:met means the recurring mechanism/schedule EXISTS and FIRES -- NOT that all
    future reviews concluded (else T2.48 can never reach complete).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      Boundary attached to the 4 previously-unbounded CI roles in oidc.tf (github_ci_plan,
      github_ci_drift, github_ci_ducklake_deploy, github_ci_prod_deploy).
    command: >-
      test "$(grep -c 'permissions_boundary  *= .*agent-platform-github-ci-apply-boundary'
      terraform/personal/oidc.tf)" -eq 6
    expected: >-
      6 permissions_boundary lines in oidc.tf (branch + pr existing, plus the 4 newly-attached CI
      roles).
    fix_if: >-
      Count != 6 -- a CI role was missed or double-counted; grep the aws_iam_role blocks and confirm
      each of the 6 personal-root CI roles carries the exact boundary ARN.
    hermetic: false
    graduation: graduate
    graduation_check_id: "ci-role-boundary-attach-count-eq-6"
  - step: 2
    phase: pre-deploy
    action: PlatformDev carries the boundary; PlatformAdmin explicitly does NOT (control identity).
    command: >-
      grep -A3 'resource "aws_iam_role" "platform_dev"' terraform/personal/platform_roles.tf | grep -q
      'permissions_boundary' && ! grep -A3 'resource "aws_iam_role" "platform_admin"'
      terraform/personal/platform_roles.tf | grep -q 'permissions_boundary'
    expected: platform_dev block contains permissions_boundary; platform_admin block does NOT.
    fix_if: >-
      PlatformAdmin gained a boundary (would wedge break-glass -- Decision 144 pt.3) or PlatformDev
      lacks one; correct the attachment.
    hermetic: false
    graduation: graduate
    graduation_check_id: "platformdev-bounded-platformadmin-excluded"
  - step: 3
    phase: pre-deploy
    action: All 8 Lambda execution roles carry the boundary (ducklake_* + prod_lambdas).
    command: >-
      test "$(grep -rl 'permissions_boundary  *= .*agent-platform-github-ci-apply-boundary'
      terraform/personal/ducklake_lambdas.tf
      terraform/personal/ducklake_catalog_dr.tf terraform/personal/ducklake_maintenance.tf
      terraform/personal/ducklake_maintenance_smoke.tf terraform/personal/prod_lambdas.tf 2>/dev/null
      | wc -l)" -ge 4 && test "$(grep -rc 'permissions_boundary' terraform/personal/prod_lambdas.tf)"
      -eq 3
    expected: >-
      The exec-role files carry boundary attachments; prod_lambdas.tf has exactly 3 (dispatcher,
      findings, ops_compaction). (ducklake_reader is defined in ducklake_lambdas.tf; the -ge 4 tolerates
      that file layout.)
    fix_if: >-
      An exec role is missing its boundary -- runtime AccessDenied risk after attach is not the issue
      here (attach is additive), but a MISSING attach means 8/8 coverage is not met (c3). Add it.
    hermetic: false
    graduation: graduate
    graduation_check_id: "exec-role-boundary-attach-present"
  - step: 4
    phase: pre-deploy
    action: >-
      github_ci_apply gained the previously-missing WRITE verbs (DEP-01, rec-2703/rec-2757):
      logs:CreateLogGroup, lambda:CreateFunction + UpdateFunctionConfiguration, cloudwatch:PutMetricAlarm,
      events:PutRule, iam:UpdateRoleDescription.
    command: >-
      for a in 'logs:CreateLogGroup' 'lambda:CreateFunction' 'lambda:UpdateFunctionConfiguration'
      'cloudwatch:PutMetricAlarm' 'events:PutRule' 'iam:UpdateRoleDescription'; do grep -q "$a"
      terraform/bootstrap/github_ci_apply.tf || { echo "MISSING $a"; exit 1; }; done
    expected: All six write verbs are present in the apply role's inline policy.
    fix_if: >-
      A verb is missing -- the DEP-01 write-surface inversion is incomplete; add the corresponding
      broadened WRITE Sid scoped to the agent-platform-*/ducklake-* prefix.
    hermetic: false
    graduation: graduate
    graduation_check_id: "apply-role-write-verbs-present"
  - step: 5
    phase: pre-deploy
    action: >-
      HAZARD-4 (Fable, load-bearing for slice F): github_ci_apply grants iam:DeleteRole,
      iam:DetachRolePolicy, iam:DeleteRolePolicy on role/agent-platform-*.
    command: >-
      for a in 'iam:DeleteRole' 'iam:DetachRolePolicy' 'iam:DeleteRolePolicy'; do grep -q "$a"
      terraform/bootstrap/github_ci_apply.tf || { echo "MISSING $a"; exit 1; }; done && grep -q
      'role/agent-platform-\*' terraform/bootstrap/github_ci_apply.tf
    expected: >-
      All three destroy verbs present, scoped to role/agent-platform-*. F's guard-gated role destroys
      will execute (not AccessDeny) after approval.
    fix_if: >-
      A destroy verb is missing -- slice F's live-proof role-retirement acceptance would AccessDeny.
      Add the IAMRoleDeleteBounded Sid.
    hermetic: false
    graduation: graduate
    graduation_check_id: "apply-role-hazard4-delete-verbs"
  - step: 6
    phase: pre-deploy
    action: >-
      IAMRoleCreateBounded + IAMRoleWriteBounded widened to Resource role/agent-platform-* with the
      iam:PermissionsBoundary propagation condition RETAINED on both.
    command: >-
      awk '/Sid  *= *"IAMRole(Create|Write)Bounded"/{f=1} f&&/agent-platform-github-ci-apply-boundary/{c++}
      END{exit !(c>=2)}' terraform/bootstrap/github_ci_apply.tf && test "$(grep -c 'role/agent-platform-\*'
      terraform/bootstrap/github_ci_apply.tf)" -ge 2
    expected: >-
      Both bounded Sids reference the boundary ARN in their Condition and target role/agent-platform-*.
    fix_if: >-
      The propagation condition was dropped or the Resource was not widened -- an unbounded create/put
      could slip through or the widening is incomplete. Restore the Condition and the prefix Resource.
    hermetic: false
    graduation: graduate
    graduation_check_id: "iam-bounded-sids-prefix-and-condition"
  - step: 7
    phase: pre-deploy
    action: >-
      Self-ARN exclusion (audit Q7 "self-ARN exclusion kept" + T2.23 self-grant break): an explicit
      Deny carves the apply role's own ARN out of the widened role/agent-platform-* inline-policy write.
    command: >-
      grep -q 'role/agent-platform-github-ci-apply"' terraform/bootstrap/github_ci_apply.tf && awk
      '/Effect  *= *"Deny"/{d=1} d&&/agent-platform-github-ci-apply"/{print; found=1} END{exit !found}'
      terraform/bootstrap/github_ci_apply.tf
    expected: >-
      A Deny statement names the apply role's own ARN (role/agent-platform-github-ci-apply) for the
      inline-policy write actions.
    fix_if: >-
      No self-exclusion Deny -- the widened prefix would let the pipeline PutRolePolicy on itself,
      breaking the T2.23 self-grant invariant. Add DenySelfInlinePolicyWrite.
    hermetic: false
    graduation: graduate
    graduation_check_id: "apply-role-self-exclusion-deny"
  - step: 8
    phase: pre-deploy
    action: >-
      Boundary DataPlaneAllow extended with the 4 new iam verbs it must permit as a ceiling
      (DeleteRole/DetachRolePolicy/DeleteRolePolicy/UpdateRoleDescription); the 3 self-protection
      Denies retained.
    command: >-
      awk '/aws_iam_policy" "github_ci_apply_boundary"/{b=1} b' terraform/bootstrap/github_ci_apply.tf
      > /tmp/bnd.$$ ; for a in 'iam:DeleteRole' 'iam:DetachRolePolicy' 'iam:DeleteRolePolicy'
      'iam:UpdateRoleDescription' 'DenyIAMEscalation' 'DenyBoundaryRemoval' 'DenyBoundaryPolicyModification';
      do grep -q "$a" /tmp/bnd.$$ || { echo "MISSING $a"; rm -f /tmp/bnd.$$; exit 1; }; done; rm -f /tmp/bnd.$$
    expected: >-
      The boundary block lists the 4 new iam verbs in DataPlaneAllow and retains all 3 self-protection
      Deny Sids. (Data-plane service wildcards s3/lambda/logs/events/cloudwatch already cover the
      broadened data-plane writes -- only the new iam verbs need adding.)
    fix_if: >-
      A new iam verb is absent from the boundary -- the identity grant for it is silently DENIED by
      the ceiling (the boundary-intersection trap). Add it to DataPlaneAllow.
    hermetic: false
    graduation: graduate
    graduation_check_id: "boundary-dataplane-new-iam-verbs"
  - step: 9
    phase: pre-deploy
    action: >-
      authority_budget.json is v2 -- in_budget_actions includes "create", the managed-role set is a
      boundary-carrying agent-platform-* prefix, and the apply role is self-excluded.
    command: >-
      grep -q '"create"' terraform/bootstrap/authority_budget.json && grep -q '"update"'
      terraform/bootstrap/authority_budget.json && grep -Eq 'agent-platform-'
      terraform/bootstrap/authority_budget.json
    expected: >-
      Budget lists create + update actions and the agent-platform-* managed-role prefix. (The
      self-exclusion is asserted structurally by validate_authority_budget in step 12, not by this grep.)
    fix_if: >-
      "create" missing or the prefix absent -- budget v2 incomplete; c4 not met. Update the JSON.
    hermetic: false
    graduation: graduate
    graduation_check_id: "authority-budget-v2-create-and-prefix"
  - step: 10
    phase: pre-deploy
    action: >-
      Public-repo boundary (Decision 101): the touched terraform files contain NO bare 12-digit
      account id and NO literal ExternalId -- account_id and every secret stay var-interpolated.
    command: >-
      ! grep -REn '[^0-9][0-9]{12}[^0-9]' terraform/bootstrap/github_ci_apply.tf
      terraform/personal/oidc.tf terraform/personal/platform_roles.tf
      terraform/bootstrap/authority_budget.json
    expected: No bare 12-digit sequence in any touched IAM file (the never-commit hook shape-pattern).
    fix_if: >-
      A literal account id leaked -- replace with ${var.account_id}. NEVER commit a real id/ARN/ExternalId.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Differential admission REJECTED as tautological -- origin/main's touched IAM files ALSO contain no
      bare 12-digit account id (the public-repo boundary is a standing repo invariant, not a
      this-change property), so the check passes on both trees and cannot graduate into a differential
      regression guard. The invariant is already defended repo-wide by the never-commit pre-commit hook
      and validate.py's account-id shape checks.
  - step: 11
    phase: pre-deploy
    action: >-
