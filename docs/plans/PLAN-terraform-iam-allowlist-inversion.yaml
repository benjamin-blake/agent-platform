  - >-
    Public-repo boundary (Decision 101): NO real AWS account IDs / ARNs / ExternalIds / secrets in the
    plan or any committed file -- roles by logical name, resources by prefix, account_id and secrets
    var-interpolated. Simulate-gate ACCT/BOUNDARY_DOC are operator-supplied at run time.
