    out-of-band break-glass (guard-BLOCKED role updates; the gated Environment would
    approve-then-AccessDeny). Verify global convergence (plan -detailed-exitcode == 0) before
    dispatch-ack. Overseer NEVER approves the gated Environment for these (GATE-B-apply).
  - >-
    SLOC (Decision 128): decompose validate_ci_refresh_read_coverage.py (478 SLOC) into a facade +
    submodules rather than raise its budget; every new/edited scripts/checks/iam_tf/ file stays < 500
    SLOC. No bare --update-sloc-budgets re-seed.
