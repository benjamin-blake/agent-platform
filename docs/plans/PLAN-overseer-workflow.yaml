schema_version: 1
slug: "overseer-workflow"
intent: >-
  Add an "overseer" orchestration meta-layer (a Layer 3 command + Layer 4 skill) that composes the
  existing /plan and /implement subagents to drive an entire platform roadmap item or audit to
  completion largely unattended, advancing the North Star self-improving recursive loop (Decision 90)
  by narrowing the human to intent, decomposition, and completion gates.
plan_type: IMPLEMENTATION
verification_tier: V1
plan_path: docs/plans/PLAN-overseer-workflow.yaml
phase: >-
  Phase Platform (automation infrastructure) -- orchestration meta-layer over the Decision 90
  four-tier workflow. No specific tier_item: user-directed new interactive surface (soft-warn
  category user_explicit_out_of_scope; Tier Item Freshness Gate skipped).
scope:
  - file: .claude/skills/overseer/SKILL.md
    action: Create
    purpose: >-
      Layer 4 overseer methodology -- read-nothing router discipline, bounded hand-back schema,
      YAML ledger schema, overlap-matrix serial/parallel decision procedure, autonomy-boundary
      policy + hard always-ask list, the Fable advice-consult protocol, planning/implementation
      subagent dispatch shapes, and the Decision 67/55/73/90 guardrails.
  - file: .claude/commands/overseer.md
    action: Create
    purpose: >-
      Layer 3 thin overseer workflow -- the intake -> recon -> advice -> reconcile -> decompose ->
      dispatch -> aggregate -> completion lifecycle with G0/G1/G3 human gates, offloading every
      machine execution to subagents and referencing the overseer skill via the Skill tool.
  - file: AGENTS.md
    action: Modify
    purpose: >-
      Register /overseer in the "Skills and slash commands" section, positioned explicitly as an
      orchestration meta-layer composing /plan and /implement (not a fifth tier, not
      /develop-executor); reconciles Decision 90.
  - file: docs/contracts/file-router.yaml
    action: Modify
    purpose: >-
      Register discoverability routes for the overseer command, the overseer skill, and the
      OVERSEER-{slug}.yaml ledger class home under docs/plans/reports/.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    .claude/commands/overseer.md exists, is prose-allowlist compliant, and declares the full
    intake -> completion lifecycle with G0/G1/G3 human gates plus the Fable-advice + Opus-planning +
    Sonnet-implementation dispatch and an explicit serial-vs-parallel decision.
  - >-
    .claude/skills/overseer/SKILL.md exists with valid frontmatter, parses under prompt_compliance,
    and encodes the read-nothing discipline, the bounded hand-back schema, the YAML ledger schema,
    the overlap-matrix procedure, the autonomy boundary + always-ask list, and the Decision
    67/55/73/90 guardrails.
  - AGENTS.md registers /overseer as an orchestration meta-layer (not a fifth tier).
  - >-
    docs/contracts/file-router.yaml registers the overseer command, skill, and ledger class, and
    passes link-validity (validate_placement).
  - >-
    bin/venv-python -m scripts.validate --pre exits 0 (prose_allowlist, validate_placement,
    validate_prompt_compliance, and validate_instruction_architecture_layers all PASS).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Confirm the overseer skill frontmatter and any Behavioural Invariants block parse cleanly.
    command: bin/venv-python -m scripts.prompt_compliance --prompt .claude/skills/overseer/SKILL.md
    expected: Exit 0; the skill's invariants parse with no error emitted.
    fix_if: Non-zero exit or a parse error means malformed frontmatter or an invalid invariants block.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Kernel-expressible (command_exit_zero) but validate_prompt_compliance already runs across all
      .claude/skills/*/SKILL.md via its glob in the --pre tier; a per-file graduation duplicates an
      already-graduated repo-wide check.
  - step: 2
    phase: pre-deploy
    action: Confirm the command declares the full lifecycle, human gates, subagent dispatch, and the serial/parallel decision.
    command: grep -qiE 'intake' .claude/commands/overseer.md && grep -qiE 'recon' .claude/commands/overseer.md && grep -qiE 'advice|fable' .claude/commands/overseer.md && grep -qiE 'decompos' .claude/commands/overseer.md && grep -qiE 'dispatch' .claude/commands/overseer.md && grep -qiE 'completion' .claude/commands/overseer.md && grep -qiE 'G0|G1|G3|gate' .claude/commands/overseer.md && grep -qiE 'serial|parallel' .claude/commands/overseer.md
    expected: Exit 0; every required lifecycle anchor, the G0/G1/G3 gates, and the serial/parallel decision are present.
    fix_if: A missing anchor means the command dropped a lifecycle stage, a human gate, or the serial/parallel dispatch decision.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Kernel-expressible (grep_count) but a one-off assertion of this command artefact's required
      sections; duplicates the plan-critique and prose-review gates and carries no standing
      regression value once the artefact is merged.
  - step: 3
    phase: pre-deploy
    action: Confirm the skill encodes the core methodology and the four decision-flag guardrails.
    command: grep -qiE 'read-nothing' .claude/skills/overseer/SKILL.md && grep -qiE 'hand-back' .claude/skills/overseer/SKILL.md && grep -qiE 'ledger' .claude/skills/overseer/SKILL.md && grep -qiE 'overlap matrix' .claude/skills/overseer/SKILL.md && grep -qiE 'always-ask' .claude/skills/overseer/SKILL.md && grep -qE 'Decision 67' .claude/skills/overseer/SKILL.md && grep -qE 'Decision 55' .claude/skills/overseer/SKILL.md && grep -qE 'Decision 73' .claude/skills/overseer/SKILL.md && grep -qE 'Decision 90' .claude/skills/overseer/SKILL.md
    expected: Exit 0; the read-nothing discipline, hand-back schema, ledger, overlap matrix, always-ask list, and the 67/55/73/90 guardrails are all present.
    fix_if: A missing anchor means the skill dropped a core-discipline section or one of the mandated decision guardrails.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Kernel-expressible (grep_count) but a one-off assertion of this skill artefact's required
      sections; duplicates the plan-critique and prose-review gates and carries no standing
      regression value once the artefact is merged.
  - step: 4
    phase: pre-deploy
    action: Confirm AGENTS.md registers /overseer as an orchestration meta-layer.
    command: grep -qE '/overseer' AGENTS.md && grep -qiE 'meta-layer|orchestrat' AGENTS.md
    expected: Exit 0; AGENTS.md names /overseer and frames it as an orchestration meta-layer.
    fix_if: A missing match means the registration was omitted or the meta-layer framing (Decision 90 reconciliation) was dropped.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Kernel-expressible (grep_count) one-off registration assertion for AGENTS.md; no standing
      regression value beyond the merged edit.
  - step: 5
    phase: pre-deploy
    action: Confirm the file-router registers the artefacts and their targets resolve on disk.
    command: grep -qE 'overseer' docs/contracts/file-router.yaml && test -f .claude/commands/overseer.md && test -f .claude/skills/overseer/SKILL.md
    expected: Exit 0; the router references the overseer artefacts and every referenced file exists.
    fix_if: A missing router entry or absent target file means link-validity (validate_placement) will fail in CI.
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Link-validity is already graduated into validation as validate_placement (--pre and full
      tiers); this step is a one-off registration-presence check that duplicates it.
  - step: 6
    phase: pre-deploy
    action: Run the authoritative fast presubmit tier over the whole change.
    command: bin/venv-python -m scripts.validate --pre
    expected: Exit 0; prose_allowlist, validate_placement, validate_prompt_compliance, and validate_instruction_architecture_layers all PASS.
    fix_if: Any failed check names the offending file/rule; fix and re-run until exit 0.
    hermetic: false
    graduation: not-applicable
constraints:
  - "V1 tier: markdown methodology + YAML config only; no Python, no Lambda, no Terraform; no test files required (test_coverage_checker gates Python source only)."
  - >-
    The overseer is an interactive, human-gated CC-web orchestration meta-layer -- NOT
    scripts/execute_recommendation.py. It does not consume the recommendation queue and dispatches
    only IMPLEMENTATION-type plans, so it is within the Decision 67 executor-freeze scope (the freeze
    targets the autonomous Lambda executor).
  - >-
    No rescue/self-heal loops on red CI: CI failures route into the source=ci_rca rec flow and
    escalate to the human; the overseer never inline-patches a red build (Decision 55/72). A subtask
    blocked or failed twice goes to RCA -> human escalation, never silent retry.
  - >-
    Halt-on-open-ci_rca-rec: the overseer halts and escalates while any open source=ci_rca critical
    rec exists; it does not dispatch unrelated work past the hard block (Decision 73).
  - >-
    Any recs the overseer or its subagents file transit the ops portal (file_rec); bundled recs use
    the Resolves: trailer (Decision 84 Single Portal Invariant).
  - >-
    The ledger stays machine-parseable YAML at docs/plans/reports/OVERSEER-{slug}.yaml; no new
    standing prose-architecture doc under docs/ (Decision 86); both prose artefacts stay within the
    Decision 127 allowlist (already covered by .claude/commands/**/*.md and
    .claude/skills/**/SKILL.md globs).
  - >-
    Parallel code-writing subagents require per-agent git worktree isolation + disjoint file scopes +
    a fixed merge order (Decision 25); serial dispatch is the default for code-writers.
  - "No emojis; ASCII hyphens only; bash syntax; bin/venv-python for all Python invocations."
context:
  - >-
    Decision-scout verdict + CITE list (verbatim decision ids): FLAGS_FOUND (94 of 94 triaged, no
    BLOCK). CITE: dec-76, dec-85/CD.22, dec-127, dec-86, dec-126, dec-101. RELATED: dec-25, dec-84,
    dec-93.
  - "gates: decision-scout=FLAGS_FOUND after 1 round; plan-critique=PROCEED after 1 round"
  - >-
    Decision flags accepted (human-confirmed): dec-67 (overseer is an interactive human-gated
    meta-layer, not the frozen Lambda executor, IMPLEMENTATION-only, no rec-queue); dec-55/72
    (CI failures -> ci_rca flow + escalate, never inline-patch); dec-73 (halt-on-open-ci_rca gate);
    dec-90 (positioned as an orchestration meta-layer composing existing tiers, not a fifth tier).
  - >-
    Decision 90 reconciliation: the overseer composes the existing four-tier workflow rather than
    adding a tier. A formal numbered Decision recording the overseer's architectural position +
    freeze-scope affirmation is filed as a follow-on (Decision 86 rationale -> Decisions), not in
    this artefact-creation plan.
  - >-
    Design was grounded in a fresh-context Fable advice consult this session (orchestrator-worker +
    externalized ledger + read-nothing discipline + overlap-matrix parallelisation + autonomy
    gradient); the overseer institutionalises the same Fable-consult-first pattern it was designed
    with.
  - >-
    Branch was 0 commits behind / 0 ahead of origin/main at planning time; no scope overlap with
    main changes. No tier_item targeted (user_explicit_out_of_scope); Freshness Gate skipped.
  - >-
    The OVERSEER-{slug}.yaml ledger is a runtime artefact created by the overseer at execution time,
    NOT by this plan; a .yaml under docs/plans/reports/ is untouched by validate_prose_allowlist
    (.md-only), validate_placement's docs-root check (depth-1 only), and validate_plan_documents
    (PLAN-*.yaml-only).
pre_implementation_checklist:
  - Branch confirmed not on main
  - docs/PROJECT_CONTEXT.md read
  - Cited decisions (67, 55, 73, 90, 76, 85, 86, 127, 126, 101, 25, 84, 93) understood
  - All files in scope located and readable (2 new, 2 modified)
  - Acceptance criteria understood and verifiable
execution_steps:
  - >-
    Create .claude/skills/overseer/SKILL.md with frontmatter (name: overseer; description; model:
    opus[1m]; required-context) and these sections: a Behavioural Invariants block; Read-Nothing
    Router Discipline; Bounded Hand-Back Schema (status/summary<=150w/artifacts/evidence/decisions/
    open_questions); Overseer Ledger Schema (docs/plans/reports/OVERSEER-{slug}.yaml -- wave plan,
    per-slice status, autonomous-decision audit log); Lifecycle and Gates (G0 intake, G1
    decomposition, G3 completion, plus the blocked/failed-twice -> RCA -> human escalation exception
    path and the halt-on-open-ci_rca gate); Overlap-Matrix Serial/Parallel Decision Procedure (with
    per-agent worktree isolation + fixed merge order, serial default); Autonomy-Boundary Policy
    (settled-consensus + convention-fit + reversible + no-credible-alternative -> autonomous, else
    present 2-3 options with a recommendation) + the hard always-ask list (IAM/security/spend/
    public-surface/governed-deploy); Fable Advice-Consult Protocol (fresh-context, model=fable, free
    to read the repo, separates settled-consensus from contested and flags best-practice-vs-repo
    divergence, consumed via adopt/adapt/reject reconciliation, invoked once per major design
    decision); Planning-Subagent Dispatch (Opus, invoke the planning skill, produce + self-critique
    PLAN-{slug}.yaml) and Implementation-Subagent Dispatch (Sonnet, invoke the implement skill,
    drive each plan to a merged PR via the Decision 76 event-driven GitHub MCP flow); and the
    Decision guardrails (67 meta-layer/not-executor/IMPLEMENTATION-only/no-queue; 55/72 no-rescue +
    ci_rca routing; 73 halt-on-open-ci_rca; 90 meta-layer-not-tier).
  - >-
    Create .claude/commands/overseer.md with frontmatter (description; model: opus[1m];
    argument-hint) as a thin step-sequence lifecycle (intake -> recon -> advice -> reconcile ->
    decompose -> dispatch -> aggregate -> completion) that references the overseer skill via the
    Skill tool, offloads every machine execution to subagents, and places explicit human
    confirmation gates at G0/G1/G3 -- mirroring the style of plan.md / implement.md / orient.md.
  - >-
    Modify AGENTS.md "Skills and slash commands" section to register /overseer, framed explicitly as
    an orchestration meta-layer composing /plan and /implement (not a fifth tier, not
    /develop-executor) -- this is the Decision 90 reconciliation.
  - >-
    Modify docs/contracts/file-router.yaml to add discoverability routes for
    .claude/commands/overseer.md, .claude/skills/overseer/SKILL.md, and the OVERSEER-{slug}.yaml
    ledger class (docs/plans/reports/); both prose artefacts are already covered by the existing
    prose_allowlist globs (.claude/commands/**/*.md, .claude/skills/**/SKILL.md).
  - "Execute the Verification Plan -- run each step; loop until pass; on unrecoverable failure stop and RCA (Decision 55)."
  - "Report: files created/modified and actual per-step verification results."
work_areas: []
rollback: >-
  Delete .claude/commands/overseer.md and the .claude/skills/overseer/ directory, and revert the
  AGENTS.md and docs/contracts/file-router.yaml registration edits. No runtime state, data
  migration, or deployed artefact is involved.
