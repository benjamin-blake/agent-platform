schema_version: 1
slug: sloc-ops-data-portal-tests
intent: >-
  Decompose tests/test_ops_data_portal.py (2805 SLOC, the largest remaining rec-2709 roster home
  after Wave 1) into a tests/ops_data_portal/ concern-split test PACKAGE whose modules each cover
  scripts/ops_data_portal.py and are each < 500 SLOC, then retire its grandfather home and delete
  its config/sloc_budgets.yaml entry -- rec-2709 Wave 3 of the Decision 131 mirror-convention
  rollout that keeps files small enough for lower-tier model comprehension (the load-bearing
  purpose of the 500-SLOC gate, Decision 128).
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-sloc-ops-data-portal-tests.yaml
phase: >-
  rec-2709 Wave 3 (Decision 131 mirror convention, amends Decision 104); SLOC governance /
  model-portability (Decision 128). Behavior-preserving pure test MOVE of the
  scripts/ops_data_portal.py test home into a concern-split package. No product-roadmap phase;
  platform tooling only.
scope:
  - file: tests/ops_data_portal/__init__.py
    action: Create
    purpose: >-
      Package marker for the concern-split (prepend import mode; mirror convention). Empty file --
      no conftest is needed because there are no cross-module shared pytest fixtures (the global
      recursion/socket guards live in the root tests/conftest.py and merge up the tree; the only
      shared items are plain data constants, which go to tests/fixtures/).
  - file: tests/fixtures/ops_portal_records.py
    action: Create
    purpose: >-
      Home for the two cross-module shared data constants VALID_FIELDS (used by ~all write-path
      modules; 32 refs in the monolith) and VALID_DECISION_FIELDS (2 refs). tests/fixtures/ is an
      importable package exempt from the no-cross-test-import guard (names never start with test_),
      so every consuming test_*.py imports from here rather than from a sibling test module.
      Consumers alias on import (`from tests.fixtures.ops_portal_records import VALID_FIELDS as
      _VALID_FIELDS, VALID_DECISION_FIELDS as _VALID_DECISION_FIELDS`) so every method body stays
      byte-identical (`dict(_VALID_FIELDS)`, `{**_VALID_FIELDS, ...}`). Constants are never mutated
      in place in the monolith (always copied), so a shared module-level constant is safe.
  - file: tests/ops_data_portal/test_rec_write.py
    action: Create
    purpose: >-
      Facade write-path core (file_rec / update_rec + write_validators + migration params):
      TestFileRec, TestUpdateRec, TestRetiredSurfaces, TestWriteTimeDispatch, TestMigrationParams
      (~280 content SLOC). Verbatim class/method bodies; fresh import header carrying the duckdb
      importorskip guard.
  - file: tests/ops_data_portal/test_pipeline_reader.py
    action: Create
    purpose: >-
      Reader / cache / sync consolidation (the rec-2707 reader-mock surface): TestPipelineConsolidation,
      TestFetchRecFromReader, TestClosedBoundaryNoAthenaFallback, TestSyncTable (~142 content SLOC).
      Preserve every explicit reader patch/mock verbatim.
  - file: tests/ops_data_portal/test_decisions.py
    action: Create
    purpose: >-
      scripts/ops_portal/decisions.py surface (file_decision / update_decision / fetch_decision /
      backfill_decisions_from_md): TestFileDecision, TestUpdateDecision, TestBackfillDecisionsFromMd
      (~155 content SLOC). Uses VALID_DECISION_FIELDS from the fixture; keeps the scripts.decisions_md
      string patch targets verbatim.
  - file: tests/ops_data_portal/test_cli.py
    action: Create
    purpose: >-
      scripts/ops_portal/cli.py argv-dispatch surface: TestCLI (~87 content SLOC). Verbatim.
  - file: tests/ops_data_portal/test_maintenance.py
    action: Create
    purpose: >-
      scripts/ops_portal/maintenance_ops.py surface (enqueue findings, postmortems, selftests):
      TestEnqueueFindings, TestPostmortems, TestSelftests (~185 content SLOC). The class-scoped
      @staticmethod _reader_with_rows helper (in TestPostmortems) moves with its class.
  - file: tests/ops_data_portal/test_risk_scoring.py
    action: Create
    purpose: >-
      scripts/ops_portal/risk_scoring.py surface: TestComputeRisk (~94 content SLOC). The class-scoped
      _radon_mock helper moves with the class.
  - file: tests/ops_data_portal/test_writer_transport.py
    action: Create
    purpose: >-
      scripts/ops_portal/writer_transport.py transport surface: TestDuckLakeTransportHelpers
      (~120) PLUS the two module-level helpers _FakeResp and _patch_writer_transport (~37) that
      are SINGLE-CONSUMER of this class (all usages are inside TestDuckLakeTransportHelpers) --
      they move verbatim into this module, NOT hoisted (Wave 1 SINGLE-CONSUMER precedent). Keeps
      the SigV4 / boto3 / requests.post monkeypatch fakes verbatim. ~157 content SLOC.
  - file: tests/ops_data_portal/test_ci_rca_schema.py
    action: Create
    purpose: >-
      scripts/ops_portal/ci_rca_schema.py enforcement surface: TestCiRcaSourceFileGate,
      TestCiRcaSchemaEnforcement (~311 content SLOC). This module MUST bind the guard as
      `duckdb = pytest.importorskip("duckdb")` (name bound, not a bare call) because
      test_reconcile_table_columns_rerun_safety uses `duckdb.connect(":memory:")` verbatim.
      Preserve the class setup_method verbatim.
  - file: tests/ops_data_portal/test_ci_rca_dispute.py
    action: Create
    purpose: >-
      ci_rca_schema.py evidence-dispute + strict-legacy-reject surface: TestCiRcaEvidenceDispute,
      TestCiRcaStrictLegacyReject (~107 content SLOC). Verbatim.
  - file: tests/ops_data_portal/test_ci_rca_runtime.py
    action: Create
    purpose: >-
      scripts/ops_portal/ci_rca_runtime.py cross-check spine + typed gates: TestCiRcaCrossCheckSpine,
      TestEvidenceBundleRefConditional, TestTerminusOverrideTyped, TestWarnModePerRuleStamping,
      TestWhyChainCeilingVersioned, TestDetectionGapUnknownGate (~348 content SLOC). TestCiRcaCrossCheckSpine's
      class-scoped _make_bundle/_ctx_v2 helpers move with the class (this class's _make_bundle variant
      differs from the fingerprint class's -- keep each class's own copy; do NOT unify).
  - file: tests/ops_data_portal/test_ci_rca_propose_close.py
    action: Create
    purpose: >-
      ci_rca_runtime.py propose/close + bundle-absent + evidence-S3 + warn-mode-reject surface:
      TestProposeOrCloseRec, TestBundleAbsentFailLoud, TestEvidenceS3Existence, TestWarnModeRejectMarker
      (~335 content SLOC). Verbatim.
  - file: tests/ops_data_portal/test_ci_rca_fingerprint.py
    action: Create
    purpose: >-
      OVER-500 SPLIT, Part A (Wave 1 OPEN-RISK-1 PRIMARY precedent -- sibling classes across modules,
      verbatim, NO budget marker). TestCiRcaFingerprintDedup retains its guard/fingerprint/backstop/bump
      cohort (all methods with lineno < 2566: the autouse _guard_live_reader guard, find_open/find_recent
      fingerprint tests, the file_rec write-time backstop tests, and bump_ci_rca_occurrence tests),
      plus the class attr _FINGERPRINT and helpers _make_bundle/_ctx_v2 (~262 content SLOC).
  - file: tests/ops_data_portal/test_ci_rca_close_then_recur.py
    action: Create
    purpose: >-
      OVER-500 SPLIT, Part B. New sibling class TestCiRcaCloseThenRecur carries the close-then-recur
      / recent-finder cohort (all methods with lineno >= 2566: the test_close_then_recur_* group plus
      test_fingerprint_bump_open_match_never_consults_recent_finder). To stay self-contained under the
      no-cross-test-import guard, DUPLICATE verbatim into this class the shared members it references:
      the _FINGERPRINT class attr, the autouse _guard_live_reader fixture (rec-2707 backstop-reader
      guard -- must remain autouse-active in each module), and the _make_bundle/_ctx_v2 builders
      (~234 method SLOC + ~56 duplicated helper SLOC = ~290 content SLOC). The class rename
      (TestCiRcaFingerprintDedup -> TestCiRcaCloseThenRecur) is the sole sanctioned test-id delta.
  - file: scripts/test_coverage_checker.py
    action: Modify
    purpose: >-
      THE FLIP (final commit): delete the single line "test_ops_data_portal.py" from
      _RETIRING_GRANDFATHER_HOMES. NO frozenset edit is needed -- "scripts/ops_data_portal.py" is
      ALREADY a seeded member of _CONCERN_SPLIT_TEST_PACKAGES (foundation roster), so once the
      retiring line is deleted, map_source_to_test(scripts/ops_data_portal.py) resolves to the
      tests/ops_data_portal package directory. Do NOT touch _ALL_MIRROR_TARGET_HOMES (frozen roster --
      test_ops_data_portal.py stays). Do NOT add any special-case: scripts/ops_portal/** already
      returns None in the grandfather helper (Decision 124), so no analog to Wave 1's
      _scaffolding/_terraform routing exists here.
  - file: config/sloc_budgets.yaml
    action: Modify
    purpose: >-
      Delete ONLY the "tests/test_ops_data_portal.py: 2805  # raise-approved: dec-130 ..." line by
      hand. NEVER run --update-sloc-budgets (it would strip the dec-130 markers on the other 23
      entries and could re-seed the new modules). HARD invariant: this file loses exactly that one
      line and nothing else.
  - file: tests/test_coverage_checker.py
    action: Modify
    purpose: >-
      Update the map_source_to_test oracle to the post-Wave-3 state. In
      test_representative_paths_resolve_under_current_retirement_state: update the docstring (two
      homes now retired -- test_validate.py AND test_ops_data_portal.py) and ADD the case
      `scripts/ops_data_portal.py -> tests/ops_data_portal`, while KEEPING the existing
      `scripts/ops_portal/cli.py -> None` and `scripts/executor/step_runner.py -> None` cases
      (Decision 124 regression assertion). In test_retiring_is_all_target_homes_minus_test_validate:
      update the assertion set to `_ALL_MIRROR_TARGET_HOMES - {"test_validate.py",
      "test_ops_data_portal.py"}`, add `"test_ops_data_portal.py" not in _RETIRING_GRANDFATHER_HOMES`,
      and generalize the docstring/method name to "two homes retired". Leave test_roster_is_the_24_known_basenames
      unchanged (the frozen roster is unaffected).
  - file: tests/test_ops_data_portal.py
    action: Delete
    purpose: >-
      Fully decomposed; replaced by the tests/ops_data_portal/ concern-split package. Deleted in the
      FINAL commit only, atomically with the map flip + budget-line deletion + oracle update.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    Test-id preservation: the union of class::function pytest node ids collected from
    tests/ops_data_portal/ (module path stripped) equals the pre-move union collected from
    origin/main's tests/test_ops_data_portal.py, modulo (a) module-path changes and (b) the SINGLE
    sanctioned class-qualifier rename of the ~17 methods moved out of TestCiRcaFingerprintDedup into
    the new sibling TestCiRcaCloseThenRecur. Same function set, same count, same pass/skip outcomes.
  - >-
    Every new test module under tests/ops_data_portal/ is < 500 SLOC (validate_sloc_limits counting:
    non-blank, non-comment lines) and < 20 CC branches per function; no config/sloc_budgets.yaml
    entry is added for any of them (the OVER-500 TestCiRcaFingerprintDedup is resolved by concern-split
    into two sibling modules, NOT a raise marker).
  - "bin/venv-python -m scripts.validate --pre exits 0 (SLOC gate green; no-cross-test-import guard green; collectability green)."
  - >-
    bin/venv-python -m pytest tests/ops_data_portal -q collects/passes the same number of tests as
    origin/main's tests/test_ops_data_portal.py (in a duckdb-equipped environment). Where duckdb is
    absent (e.g. the requirements-fast.txt --pre tier), every module skip-collects cleanly via the
    module-level `pytest.importorskip("duckdb")` guard -- expected, behavior-preserving.
  - >-
    git diff origin/main -- config/sloc_budgets.yaml shows ONLY the tests/test_ops_data_portal.py
    line removed; the other 23 dec-130 entries and their raise-approved markers are byte-identical.
  - >-
    map_source_to_test oracle (asserted by the updated tests/test_coverage_checker.py):
    scripts/ops_data_portal.py -> tests/ops_data_portal (concern-split package dir);
    scripts/ops_portal/cli.py -> None and scripts/executor/step_runner.py -> None (Decision 124
    None-returns preserved). _RETIRING_GRANDFATHER_HOMES no longer contains "test_ops_data_portal.py";
    _ALL_MIRROR_TARGET_HOMES (frozenset of 24) is unchanged; "scripts/ops_data_portal.py" remains in
    _CONCERN_SPLIT_TEST_PACKAGES.
  - >-
    check_test_file_exists(scripts/ops_data_portal.py) returns True (the tests/ops_data_portal package
    exists with >= 1 test_*.py and an __init__.py), and the monolith tests/test_ops_data_portal.py is
    gone.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      Capture the BEFORE class::function id baseline from the monolith (module path stripped).
      Requires duckdb importable in the running venv; if the module skip-collects (duckdb absent),
      install duckdb first so the baseline is non-empty and meaningful.
    command: >-
      bin/venv-python -m pytest tests/test_ops_data_portal.py --collect-only -q | grep '::'
      | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/claude-0/before_ids.txt; wc -l /tmp/claude-0/before_ids.txt
    expected: A non-empty sorted baseline of CLASSFN::Class::method ids written to the temp file.
    fix_if: >-
      If the count is 0, duckdb is not installed (the importorskip skipped the whole module) -- install
      duckdb in the venv and re-run so id-preservation is actually exercised. If collection ERRORS
      (not skips), the monolith has an import/collection problem to fix before moving anything.
  - step: 2
    phase: pre-deploy
    action: >-
      After the move, collect the AFTER id set from the new package and diff against the baseline;
      the ONLY permitted delta is the TestCiRcaFingerprintDedup -> TestCiRcaCloseThenRecur
      class-qualifier rename on the ~17 close-then-recur / recent-finder methods.
    command: >-
      bin/venv-python -m pytest tests/ops_data_portal --collect-only -q | grep '::'
      | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/claude-0/after_ids.txt;
      diff /tmp/claude-0/before_ids.txt /tmp/claude-0/after_ids.txt
    expected: >-
      The diff shows ONLY paired lines where "TestCiRcaFingerprintDedup::test_close_then_recur_*"
      (and test_fingerprint_bump_open_match_never_consults_recent_finder) are removed and the
      identical method names re-appear under "TestCiRcaCloseThenRecur::...". Review that pairing
      line-by-line and accept it; no other added/removed id is permitted.
    fix_if: >-
      Any unpaired added/removed id means a class/method was dropped, duplicated, or a verbatim body
      was lost/renamed during the move -- restore it. A duplicated helper that accidentally became a
      collected test_ name is a naming error; keep helpers underscore-prefixed.
  - step: 3
    phase: pre-deploy
    action: Run the authoritative fast presubmit tier -- proves the SLOC gate, the no-cross-test-import guard, and collectability.
    command: bin/venv-python -m scripts.validate --pre
    expected: Exit 0. No "SLOC limits" failure, no "cross-test import" failure, no collection error.
    fix_if: >-
      A >500 unregistered module (rebalance classes across modules, or split further), a cross-test
      import (hoist the shared constant to tests/fixtures/ or duplicate the class-scoped helper), or
      a collection error (fix the module's fresh import header / the importorskip placement).
  - step: 4
    phase: pre-deploy
    action: Full pass of the moved package at the same count as the baseline (duckdb-equipped environment).
    command: bin/venv-python -m pytest tests/ops_data_portal -q
    expected: >-
      All pass (or uniformly skip if duckdb is absent). In a duckdb-equipped run the selected/passed
      count equals the step-1 baseline line count. No StopIteration / mock-exhaustion failures (the
      rec-2707 reader mocks and the autouse _guard_live_reader guard survived the move in each module).
    fix_if: >-
      A failure means a patch target or mock did not survive the move -- re-check that string patch
      targets (scripts.ops_data_portal.*, scripts.ops_portal.*, src.common.*, scripts.sync.*,
      scripts.decisions_md.*) are byte-identical to the monolith, and that _guard_live_reader was
      duplicated into the Part B class.
  - step: 5
    phase: pre-deploy
    action: Assert config/sloc_budgets.yaml lost exactly the tests/test_ops_data_portal.py line and nothing else.
    command: git diff origin/main -- config/sloc_budgets.yaml
    expected: >-
      Exactly one removed line ("  tests/test_ops_data_portal.py: 2805  # raise-approved: dec-130 ...")
      and zero added lines; the other 23 entries and their dec-130 markers untouched.
    fix_if: Any other changed line means --update-sloc-budgets was run (forbidden) or an unintended entry was added.
  - step: 6
    phase: pre-deploy
    action: Prove the retired mapping and the Decision 124 None-returns via the updated coverage-checker oracle.
    command: bin/venv-python -m pytest tests/test_coverage_checker.py -q
    expected: >-
      All pass, including the updated assertions: scripts/ops_data_portal.py -> tests/ops_data_portal;
      scripts/ops_portal/cli.py -> None; scripts/executor/step_runner.py -> None;
      "test_ops_data_portal.py" not in _RETIRING_GRANDFATHER_HOMES; _ALL_MIRROR_TARGET_HOMES == the
      frozen 24.
    fix_if: >-
      An oracle assertion still asserts grandfather behavior for test_ops_data_portal.py, or a
      None-return regressed -- update the assertion / restore the None-return.
  - step: 7
    phase: pre-deploy
    action: Confirm the monolith is gone, the retirement line is deleted, and the whole tests/ tree still collects clean.
    command: >-
      test ! -f tests/test_ops_data_portal.py && ! grep -q '"test_ops_data_portal.py"'
      scripts/test_coverage_checker.py && bin/venv-python -m pytest tests/ --collect-only -q >/dev/null
      && echo RETIRED-OK
    expected: Prints RETIRED-OK (monolith absent, retirement line absent, whole-suite collection clean -- no import/collision errors).
    fix_if: If the file survives, the line remains, or collection errors, the FINAL commit is incomplete or a module header is malformed.
constraints:
  - >-
    PURE MOVE, no test-logic changes. Copy each class/method body verbatim; author only a fresh
    per-file import header importing exactly the symbols that file references. Patch string targets
    (scripts.ops_data_portal.*, scripts.ops_portal.*, src.common.*, scripts.sync.*,
    scripts.decisions_md.*) stay BYTE-IDENTICAL -- the source decomposition into scripts/ops_portal/**
    already happened, so unlike Wave 1 there is NO patch-target namespace rewrite in this wave.
  - >-
    Preserve the module-level `pytest.importorskip("duckdb")` guard in EVERY new module (duckdb is
    excluded from requirements-fast.txt, so the guard is what keeps --pre skip-collection clean).
    Bind it as `duckdb = pytest.importorskip("duckdb")` in test_ci_rca_schema.py (that module calls
    `duckdb.connect(":memory:")` verbatim); a bare `pytest.importorskip("duckdb")` is acceptable in
    modules that never reference the bound name, but carrying the bound form uniformly is fine
    (module-level assignment is not F841-flagged).
  - >-
    No cross-test imports (validate_no_cross_test_imports is active in --pre and full). The two shared
    DATA constants (_VALID_FIELDS, _VALID_DECISION_FIELDS) go to tests/fixtures/ops_portal_records.py
    (importable, exempt) and are imported with an alias to keep bodies verbatim. Single-consumer
    module helpers (_FakeResp, _patch_writer_transport) move WITH their class into
    test_writer_transport.py -- not hoisted. Class-scoped helpers (_make_bundle, _ctx_v2, _radon_mock,
    _reader_with_rows, _guard_live_reader, the _FINGERPRINT attr) move with their class; where the
    OVER-500 fingerprint class is split, its shared members are DUPLICATED verbatim into both sibling
    classes (never imported between test_* modules).
  - >-
    The OVER-500 class TestCiRcaFingerprintDedup (501 SLOC) is concern-split into two sibling classes
    across two modules (Wave 1 OPEN-RISK-1 PRIMARY precedent), NOT registered with a budget raise. The
    close-then-recur / recent-finder cohort (lineno >= 2566) becomes TestCiRcaCloseThenRecur; this
    single class-qualifier rename is the only permitted test-id delta (accept in VP step 2).
  - >-
    config/sloc_budgets.yaml loses exactly the tests/test_ops_data_portal.py line; NEVER run
    --update-sloc-budgets. Do NOT edit _ALL_MIRROR_TARGET_HOMES; do NOT add anything to
    _CONCERN_SPLIT_TEST_PACKAGES (scripts/ops_data_portal.py is already seeded there). Preserve the
    scripts/executor/** and scripts/ops_portal/** None-returns (Decision 124 regression assertion in
    the oracle).
  - >-
    Every new dir carries an __init__.py (prepend import mode). No conftest.py is created in
    tests/ops_data_portal/ (no shared pytest fixtures across modules; the root tests/conftest.py
    provides the global recursion/socket guards, merged up the tree).
  - >-
    No test-count-coupling regressions (tests/CLAUDE.md): the move introduces no new exact-count
    asserts. After removing classes there is no monolith left to lint; after adding modules, verify
    every symbol used in side_effect=/assertions is imported at module scope, and run ruff to catch
    F401.
  - >-
    Do NOT resolve rec-2709 (Wave 3 of ~14); bundled_recommendations stays empty. No rescue agents or
    workaround loops (Decision 55). PUBLIC repo -- no AWS account IDs / ARNs / ExternalIds / secrets /
    internal hostnames in any new file. Use bin/venv-python for all Python invocations; bash-only shell.
  - >-
    PR STRUCTURE (overseer standard): ONE branch / ONE PR with batched sequential COMMITS
    (additive-modules commits -> FINAL flip commit), NOT multi-PR-per-domain. Intermediate commits are
    low-risk (the monolith stays grandfathered and simply shrinks under its 2805 budget while the new
    modules are additive valid tests), so every intermediate state keeps --pre green; the FINAL flip
    (retire line + budget-line delete + oracle update + monolith delete) is isolated to the last commit.
