rollback: >-
  The demonstration is self-cleaning: revert any seeded tag (restore the original managed value), remove any
  seeded .tflock (after verifying its demo ID t2-24-acceptance-recovery-demo), dispatch-ack
  terraform-apply-sandbox back to green, and close the demo tf_drift rec via update_rec -- leaving the sandbox
  green with no open tf_drift rec. The code change (terraform-drift.yml acceptance line + the new test) is
  revertable by reverting PR-A; the roadmap bookkeeping by reverting PR-B (which returns T2.24 to in_progress
  with c1/c2/c3 open). No schema or data migration is involved; rollback is low-risk. If abandoned mid-demo,
  perform the seed/lock cleanup and reconverge to green before ending.
