execution_steps:
  - >-
    Fix the workflow: in .github/workflows/terraform-drift.yml, replace the prose --acceptance argument on
    the "File the drift rec via the ops portal" step with the executable command
    `aws s3 cp s3://agent-platform-data-lake/convergence/personal/sandbox.json - | grep -q green`
    (preserve the surrounding step and all other portal args). No other workflow change.
  - >-
    Create tests/test_terraform_drift_acceptance.py: scan .github/workflows/*.yml for every
    `--acceptance <value>` argument that follows an ops_data_portal invocation, extract the value (handle
    quoted single-line form), and assert lint_acceptance_command(value) == (True, None). Add asserts that
    terraform-drift.yml has no `terraform apply`, has `-detailed-exitcode`, and has the "Error acquiring the
    state lock" skip branch. Import lint_acceptance_command from scripts.executor.acceptance_lint.
  - >-
    Run VP1-VP5 (schema, fix-lint, regression test, c3 structural, pre-state) -- all local/read-only. Then
    run the authoritative local gate `bin/venv-python -m scripts.validate --pre` and ensure it passes.
  - >-
    Commit-flow PR-A (code): push the branch; open the code PR (terraform-drift.yml + the new test) via
    GitHub MCP create_pull_request; subscribe_pr_activity and end the turn; on green CI wake confirm checks
    then squash-merge. This puts the fixed workflow on main BEFORE any dispatched drift run.
  - >-
    VP6 (unstrand): AFTER PR-A is merged, under agent_platform_admin read the convergence record commit_sha
    and dispatch terraform-apply-sandbox (workflow_dispatch, acknowledge_red_commit=that sha); approve the
    tf-gated-apply Environment if the guard fail-closes; wait for success; run the VP6 command (green + zero
    open tf_drift recs).
  - >-
    VP7 (c3 IAM): under agent_platform_admin, run the simulate-principal-policy capability matrix; the
    decisive assertion is that the drift role CANNOT s3:PutObject the state object. Loop until pass.
  - >-
    VP8 (c2): under agent_platform_admin, seed the demo .tflock (JSON body including
    "ID":"t2-24-acceptance-recovery-demo") at tfstate/personal/sandbox/terraform.tfstate.tflock; dispatch
    terraform-drift (workflow_dispatch); wait for the run to conclude and confirm via get_job_logs the
    "lock held; skipping" notice + exit 0; run the VP8 command (verifies no rec, record green, removes the
    demo lock after the ID guard). Run c2 BEFORE c1 so the no-rec assertion holds against a zero baseline.
  - >-
    VP9 (c1 seed): under agent_platform_admin, recover tfvars + init terraform/personal; seed a reversible
    managed-tag-value change on a low-risk resource; run the VP9 command to GATE on local plan exit 2 before
    dispatching. If it does not produce exit 2 or admin lacks permission, pick another managed attribute per
    VP9 fix_if and re-verify.
  - >-
    VP10 (c1 signal -- the keystone proof): dispatch terraform-drift (workflow_dispatch) with the seed in
    place; wait for the run; confirm via get_job_logs the portal "tf_drift rec filed" line (no acceptance
    ValueError); run the VP10 command (record red + one open tf_drift rec). VP11 (dedup): dispatch
    terraform-drift again while red; run the VP11 command (no duplicate).
  - >-
    VP12 (c1 recovery): revert the seed; confirm local plan exit 0; dispatch terraform-apply-sandbox
    (workflow_dispatch, acknowledge_red_commit = the red commit sha or rec id); wait for success; close the
    demo rec via ops_data_portal --update-rec ... --status closed; run the VP12 command (green + zero open recs).
  - >-
    Bookkeeping walk (PR-B repo edit): in docs/ROADMAP-PLATFORM.yaml, flip T2.24 c1/c2/c3 status open->met
    with met_by: t2-24-acceptance-recovery, and flip T2.24 status in_progress->complete with completed_at and
    a closeout note citing this plan + the demonstration run URLs. Run VP13 to verify. Run
    `bin/venv-python -m scripts.validate --pre`; open PR-B (docs-only) via GitHub MCP; subscribe and end the
    turn; on green wake squash-merge. No Resolves: trailer (the demo rec is closed directly via update_rec).
  - >-
    Report: the c1/c2/c3 demonstration outcomes (run URLs, the tf_drift rec id filed-then-closed), the
    convergence record's red->green->red->green trajectory (unstrand then demo), all VP results, the
    workflow fix + regression test, and the final roadmap bookkeeping.
