schema_version: 1
slug: close-audit-findings-ulf-05-06-12
intent: >-
  Retire dead substrate residue flagged by the unclosed-loops audit -- the retired Copilot-SDK
  inference surface (ULF-05), 565 committed executor per-run artifacts (ULF-06), and a stale
  transient handoff (ULF-12) -- so the machine-readable repository state matches operating reality
  (agent-first invariant, CD.13/CD.25) and the frozen scheduled-agent + executor rebuild starts from
  a clean substrate.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-close-audit-findings-ulf-05-06-12.yaml
phase: >-
  Platform audit-closure (ULF-05/06/12 of audits/unclosed-loops-44ef5c6.yaml). Realizes part of
  CD.28's Copilot-SDK retirement; supersedes Decision 49 (via new Decision 116, which also amends
  CD.28's scheduled-agent clause) and Decision 44 (via new Decision 117); adds Decision 115 (handoff
  lifecycle); annotates tier_items T4.1/T4.2/T4.3. Not a follow-on to an in_progress item -- user_explicit.
scope:
  # --- ULF-05: non-Lambda Copilot residue (clean) ---
  - file: .github/workflows/refresh-copilot-multipliers.yml
    action: Delete
    purpose: Live monthly cron (contents:write) refreshing multipliers for a retired provider; no live consumer.
  - file: scripts/copilot_multipliers_refresher.py
    action: Delete
    purpose: The refresher script the cron runs; consumers are the workflow (deleted) + its test (deleted).
  - file: tests/test_copilot_multipliers_refresher.py
    action: Delete
    purpose: Tests for the deleted refresher.
  - file: config/agent/copilot/model_multipliers.yaml
    action: Delete
    purpose: Config written by the refresher and validated by validate_copilot_multipliers; both retired. Not Lambda-packaged.
  - file: scripts/checks/prompts/validate_copilot_multipliers.py
    action: Delete
    purpose: Check validating the deleted multipliers config.
  - file: scripts/checks/registry.py
    action: Modify
    purpose: Remove validate_copilot_multipliers from pre_sequence (line ~87) and full_sequence (line ~129).
  - file: scripts/validate.py
    action: Modify
    purpose: Remove the validate_copilot_multipliers import (line ~145).
  - file: scripts/ci_rca_tier_map.py
    action: Modify
    purpose: Remove validate_copilot_multipliers from _KNOWN_EXTERNAL_DEP_CHECKS (line ~25).
  - file: config/ci_rca_taxonomy.yaml
    action: Modify
    purpose: Remove the validate_copilot_multipliers function_to_category entry (line ~24) in lockstep with the registry removal.
  - file: tests/test_validate.py
    action: Modify
    purpose: Remove the ~24 patch("validate.validate_copilot_multipliers") lines (patching a deleted symbol fails).
  - file: tests/test_checks_registry.py
    action: Modify
    purpose: Update the frozen ordered-sequence equivalence oracle (Decision 104) to drop validate_copilot_multipliers from both tiers.
  # --- ULF-05: Lambda-entangled Copilot deletion (V3) ---
  - file: scripts/copilot_wrapper.py
    action: Delete
    purpose: Deprecated Copilot CLI wrapper; process-safety utils already relocated to scripts/llm_utils.py.
  - file: tests/test_copilot_wrapper.py
    action: Delete
    purpose: Skipped test for the deleted wrapper.
  - file: scripts/copilot_sdk_client.py
    action: Delete
    purpose: Deprecated Copilot SDK inference client; only consumer is the frozen scheduled_agent_handler (gutted below).
  - file: tests/test_copilot_sdk_client.py
    action: Delete
    purpose: Tests for the deleted SDK client.
  - file: scripts/test_coverage_checker.py
    action: Modify
    purpose: Repoint the deferred kill_process_tree import (line ~160) from scripts.copilot_wrapper to scripts.llm_utils (function confirmed at llm_utils.py:159).
  - file: scripts/checks/deps/validate_imports.py
    action: Modify
    purpose: Remove the ("copilot_wrapper", ...) entry from the import-smoke modules list (else the check fails file-not-found).
  - file: scripts/classify_automatable.py
    action: Modify
    purpose: Remove copilot_wrapper.py and tests/test_copilot_wrapper entries from the hardcoded boundary list (a DUPLICATE of the capabilities.yaml SSOT); confirm the automatable-classification path still resolves.
  - file: scripts/checks/misc/validate_invariants.py
    action: Modify
    purpose: Remove the now-dangling copilot_wrapper.py exclusion in Check 1 (@file gotcha); check still passes (no other script has the pattern).
  - file: scripts/build_lambda.py
    action: Modify
    purpose: Remove copilot_sdk_client.py + copilot_wrapper.py from _LAMBDA_SCRIPTS, drop the now-unused _COPILOT_SDK_PACKAGE pin, and remove the dead copilot/bin/ executable-permission branch (line ~234).
  - file: src/data/handlers/scheduled_agent_handler.py
    action: Modify
    purpose: Remove _invoke_copilot_sdk, _invoke_gemini, _get_gemini_api_key, _GEMINI_BYOK_ENDPOINT and the rec-curator copilot/gemini preload guard; restructure dispatch so github-models is retained and copilot-sdk/gemini raise an explicit retired-provider error (no silent misroute); update docstrings (incl. the L325-331 routing comment and L338 return contract).
  - file: tests/test_scheduled_agent_handler.py
    action: Modify
    purpose: Remove/rewrite the copilot-sdk + gemini dispatch tests (~8 copilot_sdk_inference_sync patches); retain github-models coverage; add a retired-provider-raises test.
  - file: src/lambdas/data-pipeline/manifest.yaml
    action: Modify
    purpose: Remove copilot_sdk_client.py + copilot_wrapper.py from includes (lines ~17-18) and the github-copilot-sdk==0.2.3 pip pin (line ~50).
  - file: src/lambdas/ops-compaction/manifest.yaml
    action: Modify
    purpose: Remove copilot_sdk_client.py + copilot_wrapper.py from includes (lines ~10-11).
  - file: tests/test_build_lambda.py
    action: Modify
    purpose: Remove test_build_app_package_installs_copilot_sdk (line ~261; the SDK is no longer installed).
  - file: config/agent/executor/capabilities.yaml
    action: Modify
    purpose: Executor self-modification boundary SSOT (loaded by validate_executor_boundary + migrate_dq_ops_recs). Remove the copilot_wrapper.py (line 14) and tests/test_copilot_wrapper (line 20) boundary_patterns rows -- the files no longer exist.
  # --- ULF-05: live doc/config surfaces that name the deleted code ---
  - file: docs/contracts/inference-provider.md
    action: Modify
    purpose: >-
      Targeted correction only -- replace the references to the deleted _invoke_copilot_sdk/_invoke_gemini
      functions and copilot_sdk_inference_sync() (Routing Logic snippet L164-173, provider table L79-80,
      client-retained claim L31, scheduled-agent note L26) with the retired-provider reality + a pointer to
      Decision 116. The full CD.28 tier-model rewrite remains owned by CD.28's PLAN-update-inference-provider-contract follow-on.
  - file: docs/PROJECT_CONTEXT.md
    action: Modify
    purpose: >-
      Remove the File Router row for the deleted copilot_sdk_client.py (line 172); update the executor-boundary
      gotcha (line 238) to drop copilot_wrapper.py/test_copilot_wrapper.py in lockstep with Decision 117 /
      capabilities.yaml; remove the Copilot SDK auth gotcha for the deleted copilot_sdk_client.py (line 286).
  - file: config/sloc_budgets.yaml
    action: Modify
    purpose: Remove the scripts/copilot_wrapper.py SLOC budget entry (line 9); the file is deleted.
  - file: src/data/handlers/CLAUDE.md
    action: Modify
    purpose: Remove the two "Copilot SDK legacy" gotchas (Subprocess + Auth) and drop the Copilot-SDK emphasis from the Model ID reminder; the handler no longer spawns Copilot subprocesses after the gut.
  # --- ULF-05: schedule.yaml truthfulness ---
  - file: .github/agents/schedule.yaml
    action: Modify
    purpose: Flip the six enabled:true flags to false to match the DISABLED EventBridge dispatch reality. Do NOT delete (T4.3) or migrate provider fields (Decision 116 realization owned by PLAN-resolve-scheduled-agent-provider).
  # --- Roadmap edits (ULF-05 CD.28 reconciliation + ULF-06 scope notes) ---
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      (a) Amend CD.28's scheduled-agent reconciliation clause (~line 1127-1134) so "scheduled agents also move to
      LiteLLM" becomes the Decision-116 split (routine/non-agentic -> LiteLLM Tier 1 DeepSeek; judgment/agentic ->
      claude -p), keeping CD.28's "non-agentic LLM call site -> LiteLLM-only" rule intact; (b) rewrite the CD.28
      follow-on PLAN-resolve-scheduled-agent-provider inventory entry (~line 1192) to the Decision-116 routing and
      note the retired surfaces; (c) update T4.3's intent line "LLM transport is LiteLLM per CD.28" (~line 6972) to
      the split routing + add a T4.3 progress_note (schedule.yaml deletion + provider migration still owned; handler
      copilot/gemini paths removed this session); (d) add a T4.1 and T4.2 progress_note naming telemetry emission
      (Decision 59/95) as the replacement for the retired local write sites in scripts/execute_recommendation.py.
  # --- ULF-06: executor run artifacts ---
  - file: logs/runs/
    action: Delete
    purpose: git rm 551 committed per-run JSON artifacts with zero consumers/rotation/owner.
  - file: logs/failure-summaries/
    action: Delete
    purpose: git rm 14 committed failure-summary artifacts with zero consumers.
  - file: .gitignore
    action: Modify
    purpose: Add logs/runs/ and logs/failure-summaries/ so the frozen executor's writes stay untracked.
  # --- ULF-12: transient handoff + decisions ---
  - file: docs/handoffs/HANDOFF-ducklake-lambda-runtime-apply.md
    action: Delete
    purpose: Self-destructing transient handoff whose T2.17 apply completed; instructs its own pre-merge deletion.
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Add Decision 115 (transient handoffs ride PR descriptions; docs/handoffs/ pattern retired; no guard);
      Decision 116 (Supersedes Decision 49 AND amends CD.28's scheduled-agent clause -- routine/non-agentic agents
      -> DeepSeek via LiteLLM (CD.28 Tier 1); judgment/agentic agents -> claude -p (Claude Code headless, Max OAuth));
      Decision 117 (Supersedes Decision 44 -- executor self-modification boundary; config/agent/executor/capabilities.yaml
      is named as the code-level SSOT, and the deleted copilot rows are dropped). Re-check max Decision number at
      implement time (currently 114); Warehouse ID line on each.
bundled_recommendations: []
infrastructure_dependencies:
  - "Lambda deploy (V3): rebuild + deploy the active data-pipeline and ops-compaction artifacts after copilot files leave the package (Decision 79 per-Lambda gating; blanket freeze lifted). Needs the agent_platform (PlatformDev) profile with Lambda update permissions. Deploy the affected functions (agent-platform-scheduled-agent-dispatcher, agent-platform-findings-processor); ducklake_* layers/functions are untouched by this code change."
  - "No terraform/*.tf files in scope; no IAM change; no apply required. The deployed dispatcher stays disabled (SCHEDULED_AGENTS_ENABLED=false in terraform/scheduled_agents.tf); this plan does not re-enable it."
acceptance_criteria:
  - "git ls-files finds none of: scripts/copilot_wrapper.py, scripts/copilot_sdk_client.py, scripts/copilot_multipliers_refresher.py, config/agent/copilot/model_multipliers.yaml, scripts/checks/prompts/validate_copilot_multipliers.py, .github/workflows/refresh-copilot-multipliers.yml."
  - "rg 'copilot_sdk|copilot-sdk' over scripts/ and .github/workflows/ returns nothing. Every LIVE surface that named the DELETED functions is corrected in scope (docs/contracts/inference-provider.md, docs/PROJECT_CONTEXT.md, config/agent/executor/capabilities.yaml, src/data/handlers/CLAUDE.md, config/sloc_budgets.yaml, scripts/classify_automatable.py). Surviving copilot-sdk references are confined to: .github/agents/schedule.yaml provider fields (T4.3-owned); inference-provider.md's retained legacy reference sections (Model-ID note, Migration Reference table, YAML schema example) that the TARGETED correction intentionally leaves pending CD.28's PLAN-update-inference-provider-contract full rewrite; and historical decision/roadmap/archive/plan text."
  - "validate_copilot_multipliers is fully removed: absent from scripts/checks/registry.py (both tiers), not imported in scripts/validate.py, absent from scripts/ci_rca_tier_map.py and config/ci_rca_taxonomy.yaml, and the tests/test_checks_registry.py ordered oracle no longer lists it."
  - "src/data/handlers/scheduled_agent_handler.py imports clean, retains the github-models path, and raises an explicit retired-provider error for provider in {copilot-sdk, gemini} (no silent misroute); tests/test_scheduled_agent_handler.py passes."
  - "scripts/build_lambda.py, src/lambdas/data-pipeline/manifest.yaml, and src/lambdas/ops-compaction/manifest.yaml no longer reference the two copilot modules or the github-copilot-sdk pip package."
  - "config/agent/executor/capabilities.yaml (the boundary SSOT) no longer lists copilot_wrapper.py or tests/test_copilot_wrapper; the hardcoded duplicate in scripts/classify_automatable.py is likewise cleaned; validate_executor_boundary passes."
  - "data-pipeline and ops-compaction rebuild + deploy succeed; the built package does NOT contain copilot_wrapper.py or copilot_sdk_client.py; invoking the deployed dispatcher returns cleanly with no FunctionError and a JSON dict payload (the {\"status\":\"disabled\"} sentinel is the expected return because SCHEDULED_AGENTS_ENABLED=false), proving the deployed handler module imports without error."
  - ".github/agents/schedule.yaml has all six agents enabled: false; schedule.yaml is NOT deleted and provider fields are unchanged."
  - "git ls-files logs/runs logs/failure-summaries returns 0; .gitignore ignores both paths; scripts/execute_recommendation.py is unchanged (frozen write path)."
  - "docs/handoffs/HANDOFF-ducklake-lambda-runtime-apply.md is deleted (docs/handoffs/ is empty)."
  - "docs/DECISIONS.md contains Decision 115, Decision 116 (Supersedes Decision 49; amends CD.28's scheduled-agent clause), and Decision 117 (Supersedes Decision 44; names capabilities.yaml as the boundary SSOT), each with a Warehouse ID line; Decision numbers are unique and sequential."
  - "docs/ROADMAP-PLATFORM.yaml is internally consistent with Decision 116: CD.28's scheduled-agent reconciliation clause + the PLAN-resolve-scheduled-agent-provider entry + T4.3's intent line all reflect the routine->LiteLLM/DeepSeek, judgment->claude -p split (no residual 'scheduled agents move to LiteLLM' blanket); T4.3/T4.1/T4.2 carry the scope notes; validate_platform_roadmap passes."
  - "bin/venv-python -m scripts.validate (full tier) is green."
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Delete the non-Lambda copilot residue and confirm the files are gone.
    command: "git rm .github/workflows/refresh-copilot-multipliers.yml scripts/copilot_multipliers_refresher.py tests/test_copilot_multipliers_refresher.py config/agent/copilot/model_multipliers.yaml scripts/checks/prompts/validate_copilot_multipliers.py && for f in .github/workflows/refresh-copilot-multipliers.yml scripts/copilot_multipliers_refresher.py config/agent/copilot/model_multipliers.yaml scripts/checks/prompts/validate_copilot_multipliers.py; do test ! -e \"$f\" || { echo \"STILL PRESENT: $f\"; exit 1; }; done && echo OK"
    expected: All five paths removed; prints OK.
    fix_if: A path still exists -- ensure git rm staged it and no leftover copy remains.
  - step: 2
    phase: pre-deploy
    action: Remove the validate_copilot_multipliers cascade (registry both tiers, validate.py import, ci_rca_tier_map, ci_rca_taxonomy, test oracle) and confirm the registry is clean + the oracle test passes.
    command: "bin/venv-python -c \"from scripts.checks.registry import pre_sequence, full_sequence; names=[getattr(s,'name',str(s)) for s in pre_sequence()+full_sequence()]; assert not any('copilot_multipliers' in n for n in names), 'still registered'; print('registry OK')\" && bin/venv-python -m pytest tests/test_checks_registry.py tests/test_validate.py -q"
    expected: "registry OK printed; test_checks_registry + test_validate pass (frozen ordered oracle + patches updated)."
    fix_if: "Registry still lists the check, or a test fails -- update registry.py sequences, the ordered oracle in test_checks_registry.py, and the test_validate.py patches together."
  - step: 3
    phase: pre-deploy
    action: Repoint test_coverage_checker to llm_utils and confirm kill_process_tree resolves there.
    command: "bin/venv-python -c \"from scripts.llm_utils import kill_process_tree; print('llm_utils OK')\" && ! grep -q 'from scripts.copilot_wrapper import' scripts/test_coverage_checker.py && echo 'repoint OK'"
    expected: "Prints llm_utils OK and repoint OK."
    fix_if: "Import fails or test_coverage_checker still imports copilot_wrapper -- fix the import site."
  - step: 4
    phase: pre-deploy
    action: Delete copilot_wrapper.py + copilot_sdk_client.py + tests; confirm no live (non-schedule) import remains.
    command: "git rm scripts/copilot_wrapper.py tests/test_copilot_wrapper.py scripts/copilot_sdk_client.py tests/test_copilot_sdk_client.py && ! grep -rn 'from scripts.copilot_wrapper\\|import scripts.copilot_wrapper\\|from scripts.copilot_sdk_client\\|import scripts.copilot_sdk_client' scripts/ src/ && echo 'no live imports'"
    expected: "Files removed; prints 'no live imports' (schedule handler edited in step 5)."
    fix_if: "A live import remains -- resolve it (repoint or delete the caller) before proceeding."
  - step: 5
    phase: pre-deploy
    action: Gut the handler's copilot-sdk/gemini paths (retain github-models; retired providers raise explicit error) and run the handler unit tests.
    command: "bin/venv-python -c \"import ast; src=open('src/data/handlers/scheduled_agent_handler.py').read(); assert '_invoke_copilot_sdk' not in src and '_invoke_gemini' not in src, 'copilot/gemini paths remain'; assert '_invoke_github_models' in src, 'github-models path lost'; ast.parse(src); print('handler OK')\" && bin/venv-python -m pytest tests/test_scheduled_agent_handler.py -q"
    expected: "Prints handler OK; handler tests pass."
    fix_if: "copilot/gemini paths remain, github-models lost, or tests fail -- rework the dispatch restructure and tests."
  - step: 6
    phase: pre-deploy
    action: Clean build_lambda + both manifests + the capabilities.yaml SSOT + classify_automatable duplicate; build the package; assert the two modules are absent from the built artifact and the boundary SSOT.
    command: "bin/venv-python -c \"import yaml; b=yaml.safe_load(open('config/agent/executor/capabilities.yaml'))['boundary_patterns']; assert 'copilot_wrapper.py' not in b and 'tests/test_copilot_wrapper' not in b, b; print('capabilities SSOT clean')\" && bin/venv-python -m scripts.build_lambda && bin/venv-python -c \"import zipfile,glob,sys; zips=glob.glob('dist/**/*.zip',recursive=True)+glob.glob('build/**/*.zip',recursive=True); bad=[z for z in zips for n in zipfile.ZipFile(z).namelist() if n.endswith(('copilot_wrapper.py','copilot_sdk_client.py'))]; print('packages checked:',len(zips)); sys.exit(1 if bad else 0)\""
    expected: "capabilities SSOT clean; build succeeds; no built zip contains copilot_wrapper.py or copilot_sdk_client.py."
    fix_if: "SSOT still lists a copilot row, build fails (dangling reference), or a zip still bundles a copilot module -- fix capabilities.yaml, _LAMBDA_SCRIPTS/_COPILOT_SDK_PACKAGE, and both manifests."
  - step: 7
    phase: post-deploy
    action: Deploy the two affected active Lambda artifacts (dispatcher = data-pipeline, findings-processor).
    command: "bin/venv-python -m scripts.build_lambda --deploy"
    expected: "Deploy exits 0; the dispatcher + findings-processor function code updates report success (ducklake_* untouched by this code change)."
    fix_if: "Deploy fails -- confirm agent_platform Lambda-update permissions and per-Lambda gating; on unrecoverable failure STOP and RCA (Decision 55)."
  - step: 8
    phase: post-deploy
    action: Invoke the deployed dispatcher and assert a clean return (no FunctionError; JSON dict payload). SCHEDULED_AGENTS_ENABLED=false, so the expected payload is the disabled sentinel -- a clean return proves the deployed handler module imported without error (no ImportError from the removed modules).
    command: "aws lambda invoke --function-name agent-platform-scheduled-agent-dispatcher --payload '{}' --cli-binary-format raw-in-base64-out --profile agent_platform --region eu-west-2 /tmp/ulf05_invoke.json >/tmp/ulf05_meta.json 2>&1; bin/venv-python -c \"import json; m=json.load(open('/tmp/ulf05_meta.json')); assert 'FunctionError' not in m, m; p=json.load(open('/tmp/ulf05_invoke.json')); assert isinstance(p,dict), p; assert p.get('status')=='disabled' or 'agents_run' in p, p; print('invoke OK', p)\""
    expected: "No FunctionError; payload is a dict -- {\"status\":\"disabled\"} (dispatcher env-gated off) is the expected clean return, proving module import health."
    fix_if: "FunctionError/ImportError or non-dict payload -- a removed module is still referenced at module scope; fix and redeploy in-session. (Note: this step verifies import-health only; the provider-dispatch path is not exercised while disabled -- rely on VP5 ast.parse + VP6 package-absence + handler unit tests for dispatch correctness.)"
  - step: 9
    phase: post-deploy
    action: Confirm the deployed dispatcher SHA matches the freshly built copilot-free package.
    command: "aws lambda get-function --function-name agent-platform-scheduled-agent-dispatcher --profile agent_platform --region eu-west-2 --query 'Configuration.[LastModified,CodeSha256]' --output text && echo 'compare CodeSha256 to the just-built package sha256 from step 6/7'"
    expected: "get-function returns the updated LastModified + CodeSha256 matching the just-deployed build."
    fix_if: "SHA does not match the freshly built package -- redeploy."
  - step: 10
    phase: pre-deploy
    action: git rm the executor run artifacts, gitignore both paths, and confirm zero tracked files remain.
    command: "git rm -r --quiet logs/runs logs/failure-summaries && printf 'logs/runs/\\nlogs/failure-summaries/\\n' >> .gitignore && test \"$(git ls-files logs/runs logs/failure-summaries | wc -l)\" -eq 0 && git check-ignore logs/runs/x.json logs/failure-summaries/y.json && echo 'ULF-06 OK'"
    expected: "Zero tracked files under both dirs; both paths are git-ignored; prints ULF-06 OK."
    fix_if: "Files still tracked or paths not ignored -- re-run git rm and verify the .gitignore entries."
  - step: 11
    phase: pre-deploy
    action: Confirm the frozen executor write path is untouched and its tests still pass.
    command: "git diff --quiet -- scripts/execute_recommendation.py && bin/venv-python -m pytest tests/test_execute_recommendation.py -q"
    expected: "No diff to execute_recommendation.py; executor tests pass (write path creates dirs at runtime; no committed artifacts read)."
    fix_if: "execute_recommendation.py changed (out of scope) or tests read committed artifacts -- revert the source change."
  - step: 12
    phase: pre-deploy
    action: Delete the handoff, add Decisions 115/116/117, and confirm numbering + supersession/amendment headers.
    command: "git rm docs/handoffs/HANDOFF-ducklake-lambda-runtime-apply.md && test -z \"$(ls -A docs/handoffs 2>/dev/null)\" && grep -q '^## Decision 115' docs/DECISIONS.md && grep -q '^## Decision 116.*Supersedes Decision 49' docs/DECISIONS.md && grep -q '^## Decision 117.*Supersedes Decision 44' docs/DECISIONS.md && grep -q 'capabilities.yaml' docs/DECISIONS.md && test \"$(grep -oE '^## Decision [0-9]+' docs/DECISIONS.md | sort | uniq -d | wc -l)\" -eq 0 && echo 'ULF-12 + decisions OK'"
    expected: "Handoff gone; docs/handoffs empty; all three decisions present with correct headers; Decision 116 references CD.28, Decision 117 names capabilities.yaml; no duplicate numbers."
    fix_if: "A decision is missing/misnumbered/duplicated or lacks the CD.28-amend or capabilities.yaml reference -- re-check the max number and re-author."
  - step: 13
    phase: pre-deploy
    action: Assert the roadmap is internally consistent with Decision 116 -- no residual blanket 'scheduled agents move to LiteLLM' AND the split routing (claude -p) is written into the edited surfaces (CD.28 body, PLAN-resolve entry, T4.3 intent) so a partial edit cannot false-green; validate the plan document; run the roadmap check.
    command: "! grep -q 'scheduled agents also move to LiteLLM' docs/ROADMAP-PLATFORM.yaml && test \"$(grep -c 'claude -p' docs/ROADMAP-PLATFORM.yaml)\" -ge 2 && ! grep -q 'LLM transport is LiteLLM per CD.28' docs/ROADMAP-PLATFORM.yaml && bin/venv-python -m scripts.plan_document docs/plans/PLAN-close-audit-findings-ulf-05-06-12.yaml && bin/venv-python -c \"failed=[]; __import__('scripts.checks.roadmap.validate_platform_roadmap', fromlist=['validate_platform_roadmap']).validate_platform_roadmap(failed); print('roadmap FAILED:',failed) if failed else print('roadmap OK')\""
    expected: "No residual blanket clause and no unedited 'LLM transport is LiteLLM per CD.28' T4.3 line; 'claude -p' present in >=2 roadmap surfaces (CD.28 body + PLAN-resolve/T4.3); plan document validates; roadmap check prints roadmap OK."
    fix_if: "A blanket/unedited clause remains or 'claude -p' is under-present -- finish amending CD.28's reconciliation clause, the PLAN-resolve entry, and T4.3 intent to the split routing; fix any schema/roadmap failure."
  - step: 14
    phase: pre-deploy
    action: Final sweep -- rg acceptance for the retired copilot code/workflow surfaces.
    command: "rg -n 'copilot_sdk|copilot-sdk' scripts/ .github/workflows/ && echo 'UNEXPECTED HITS' || echo 'SWEEP CLEAN'"
    expected: "Prints SWEEP CLEAN (no copilot_sdk/copilot-sdk under scripts/ or .github/workflows/)."
    fix_if: "Any hit under scripts/ or .github/workflows/ -- retire or repoint it (schedule.yaml under .github/agents/ is intentionally out of this sweep)."
  - step: 15
    phase: post-deploy
    action: Run the full validate tier green.
    command: "bin/venv-python -m scripts.validate"
    expected: "Full tier exits 0 (all checks green, including validate_imports, validate_invariants, validate_ci_rca_taxonomy, validate_executor_boundary, validate_platform_roadmap)."
    fix_if: "Any check fails -- resolve before merge; a validate.py failure on main spawns a ci_rca rec (forward-fix, Decision 55)."
constraints:
