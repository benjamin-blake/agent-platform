schema_version: 1
slug: "ci-rca-schema-enforcement"
intent: >-
  Land Phase 1 (core slice) of the T1.13 CI-RCA methodology contract: a CI_RCA_STRICT_MODE
  feature flag (default warn), the structured context_v2_json schema with write-time guidance,
  and warn-mode portal validation for source=ci_rca recs -- retargeted from the INTENT's
  pre-Decision-84 Iceberg/Athena surface to the live DuckLake closed reader/writer boundary.
  Deepens RCA quality so the self-improving control plane (T3.4) consumes well-formed
  root-cause signals instead of rescue-mode diagnoses.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-ci-rca-schema-enforcement.yaml
phase: >-
  PLATFORM tier_item T1.13 (CI-RCA methodology contract), Phase 1 core slice per
  docs/INTENT-ci-rca-methodology.md Section 6. First of six depth follow-on plans.
scope:
  - file: config/feature_flags.yaml
    action: Create
    purpose: >-
      Canonical declarative source for CI_RCA_STRICT_MODE (default warn; accepted values warn|strict).
      Read by the portal at process start. Greenfield -- no feature-flag file exists today.
  - file: terraform/personal/feature_flags.tf
    action: Create
    purpose: >-
      Provision CI_RCA_STRICT_MODE as an SSM String param mirrored from config/feature_flags.yaml
      (try()-wrapped file()+yamldecode per AGENTS.md optional-artifact rule) for future server-side
      strict enforcement. Under terraform/personal/ so push-to-main auto-applies behind
      terraform_apply_guard.py (Decision 77); a top-level terraform/ file would NOT auto-apply.
  - file: scripts/ops_data_portal.py
    action: Modify
    purpose: >-
      Add get_ci_rca_strict_mode() (module-level cached yaml.safe_load, mirrors line 288; no hot-reload),
      the CiRcaContext Pydantic model (INTENT Section 1), and the warn-mode validation branch in
      file_rec() accepting a context_v2_json argument.
  - file: scripts/executor/rec_write_guidance.py
    action: Modify
    purpose: >-
      get_rec_write_guidance('ci_rca') returns the CiRcaContext field semantics as authoritative
      write-time guidance (Decision 66). One-line comment justifies the dedicated code path (nested
      object, not a flat ops.yaml column entry -- diverges from the Wave-2 auto-population pattern by design).
  - file: config/lambda/ducklake/field_semantics.yaml
    action: Modify
    purpose: >-
      Add context_v2_json {role: input, sql_type: VARCHAR, nullable: true} to BOTH the history and
      current column blocks of ops_recommendations (the DuckLake schema contract baked into the Lambdas).
  - file: src/common/ducklake_runtime.py
    action: Modify
    purpose: >-
      Add reconcile_table_columns(con, table): introspect the physical columns of the history+current
      tables (DuckDB PRAGMA table_info / information_schema over the attached catalog), then ALTER TABLE
      ADD COLUMN for any spec column that is absent. Idempotency comes from the introspection guard, NOT a
      SQL IF NOT EXISTS clause -- there is no ADD COLUMN precedent in this codebase and DuckLake 1.5.3
      support for the clause is unverified (the existing line 335-336 ALTERs are SET PARTITIONED BY, a
      different statement). Never DROP. This is the non-destructive migration primitive for the live
      ops_recommendations tables.
  - file: scripts/ducklake_neon_smoke_test.py
    action: Modify
    purpose: >-
      Add a --migrate-ops-recs-columns operational flag (mirrors the direct-Neon _open_attached path used
      by --attach/--restore-drill; deploy-free client, not Lambda-packaged) that calls
      reconcile_table_columns against ops_recommendations and asserts context_v2_json is present on BOTH
      the history and current tables. This is the in-scope invocation surface + verification command for
      the live-table column migration -- deliberately NOT a maintenance-handler action, which
      compute_affected_artifacts shows would pull data-pipeline + ops-compaction (unprovisioned per
      rec-2164) into the deploy set.
  - file: tests/test_ops_data_portal.py
    action: Modify
    purpose: >-
      Add warn-mode unit tests (valid passes; deficient why_chain warns-not-raises; legacy free-text
      warns-not-raises; flag default; guidance returns schema), a reconcile_table_columns re-run-safety
      test (second call against a temp table is a no-op), and one env-gated live roundtrip test.
  - file: docs/INTENT-ci-rca-methodology.md
    action: Modify
    purpose: >-
      Stale-pointer annotation only (Decision 86): mark the Iceberg-ALTER / Athena-_current /
      Athena-telemetry wording in Sections 1/3/7 as superseded by the DuckLake closed boundary
      (Decision 84/81), and record that this plan landed the Phase-1 core slice with named deferrals.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Update the T1.13 progress_note (Phase-1 core slice landing + deferred checks) and correct the stale
      files_in_scope path terraform/feature_flags.tf -> terraform/personal/feature_flags.tf (Decision 77).
bundled_recommendations: []
infrastructure_dependencies:
  - >-
    terraform/personal/feature_flags.tf -- sandbox PLATFORM environment; push-to-main auto-applies
    behind scripts/terraform_apply_guard.py (fail-closed). A plain SSM String param adds no
    destroy/IAM/trust change, so the deterministic guard PASSES; remote terraform-validate (required
    check, Decision 83) is authoritative for HCL syntax/plan.
  - >-
    DuckLake ops_recommendations catalog migration -- non-destructive ALTER TABLE ADD COLUMN on
    ops_recommendations_history and _current, idempotent via column introspection (not a SQL IF NOT
    EXISTS clause). Invoked once post-deploy via the deploy-free smoke client
    (ducklake_neon_smoke_test --migrate-ops-recs-columns, direct-Neon _open_attached path). Decision 84/81
    closed boundary; NOT Iceberg, NOT Athena. Data-preserving (905 live rows must survive); NEVER DROP.
  - >-
    Per-Lambda deploy gating (Decision 79 / CD.16): EXACTLY four active DuckLake artifacts are affected
    (compute_affected_artifacts on field_semantics.yaml + ducklake_runtime.py) -- ducklake_writer,
    ducklake_reader, ducklake_maintenance, ducklake_catalog_dr (catalog_dr packages ducklake_runtime.py).
    Each gets build + deploy + smoke-test via build_lambda --deploy --ducklake-only. The migration is
    invoked via the deploy-free smoke client (not a maintenance-handler action) precisely so the deploy
    set is NOT expanded to data-pipeline + ops-compaction (which editing src/lambdas/ducklake_maintenance/
    handler.py would pull in -- both unprovisioned per rec-2164).
acceptance_criteria:
  - CI_RCA_STRICT_MODE exists in config/feature_flags.yaml defaulting to warn; get_ci_rca_strict_mode() returns 'warn' and rejects values outside {warn, strict}.
  - get_rec_write_guidance('ci_rca') returns the structured context schema surfacing proximate_cause, why_chain, detection_gap, recurrence_class, corrective_action, preventive_action (Decision 66).
  - file_rec(source=ci_rca, context_v2_json=<valid>) in warn mode validates the object, persists it to the new context_v2_json column, and writes a >=80-char human summary into the legacy context column; the reader roundtrips both.
  - file_rec(source=ci_rca, context_v2_json=<deficient why_chain>) in warn mode logs a structured deficiency warning and does NOT raise; the rec is still filed.
  - file_rec(source=ci_rca) with only legacy free-text context (no context_v2_json) passes with a deprecation warning; no rejection.
  - context_v2_json column is present and nullable on ops_recommendations_history and _current; the legacy context column is preserved and still readable.
  - All four affected active DuckLake Lambda artifacts (writer, reader, maintenance, catalog_dr) rebuilt, deployed, and smoke-tested green; ops-read-your-write roundtrips at production scope.
  - docs/INTENT-ci-rca-methodology.md carries the DuckLake stale-pointer annotation + Phase-1 deferral note; docs/ROADMAP-PLATFORM.yaml T1.13 progress_note updated.
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Plan document validates against the PlanDocument schema.
    command: bin/venv-python -m scripts.plan_document docs/plans/PLAN-ci-rca-schema-enforcement.yaml
    expected: Exit 0; prints validation success.
    fix_if: Non-zero exit or schema error -- fix the named field; unknown-key error means a stray top-level key.
  - step: 2
    phase: pre-deploy
    action: Flag reader returns the default in warn.
    command: bin/venv-python -c "from scripts.ops_data_portal import get_ci_rca_strict_mode as f; print(f())"
    expected: Prints warn.
    fix_if: ImportError -- reader not added; prints other value -- default wrong or YAML key mismatch.
  - step: 3
    phase: pre-deploy
    action: Write-time guidance surfaces the structured schema fields.
    command: bin/venv-python -c "from scripts.executor.rec_write_guidance import get_rec_write_guidance as g; s=str(g('ci_rca')); assert all(k in s for k in ['proximate_cause','why_chain','detection_gap','recurrence_class','corrective_action','preventive_action']), s; print('ok')"
    expected: Prints ok.
    fix_if: AssertionError -- ci_rca guidance missing fields; KeyError/ValueError -- source not registered.
  - step: 4
    phase: pre-deploy
    action: Warn-mode validation unit tests exercise the real file_rec code path (mocked writer).
    command: bin/venv-python -m pytest tests/test_ops_data_portal.py -k ci_rca -q
    expected: All selected tests pass -- valid context_v2_json validates; deficient why_chain warns and does NOT raise; legacy free-text passes with deprecation warning; flag default warn.
    fix_if: A warn-mode test raises -- validation is hard-rejecting in warn (must only warn); failures mean field bounds or terminus check wrong.
  - step: 5
    phase: pre-deploy
    action: Column added to both history and current blocks of the DuckLake schema contract.
    command: bin/venv-python -c "s=open('config/lambda/ducklake/field_semantics.yaml').read(); n=s.count('context_v2_json'); assert n>=2, n; print('ok',n)"
    expected: Prints ok and a count >= 2 (history + current).
    fix_if: Count < 2 -- column missing from one of the two column blocks.
  - step: 6
    phase: pre-deploy
    action: Terraform flag param is defined under terraform/personal/ (remote terraform-validate is authoritative for HCL).
    command: bin/venv-python -c "t=open('terraform/personal/feature_flags.tf').read().lower(); assert 'ci_rca_strict_mode' in t and 'ssm' in t, 'flag SSM param missing'; print('ok')"
    expected: Prints ok.
    fix_if: AssertionError -- the SSM param for the flag is not defined, or the file landed at the wrong (non-personal) path.
  - step: 7
    phase: post-deploy
    action: Build and deploy all four affected active DuckLake artifacts.
    command: bin/venv-python -m scripts.build_lambda --deploy --ducklake-only --profile agent_platform
    expected: writer, reader, maintenance, catalog-dr function code updated; exit 0.
    fix_if: Deploy error -- check S3 upload and function names; ResourceNotFoundException -- function not provisioned (record as a rec, do not rescue-loop, Decision 55).
  - step: 8
    phase: post-deploy
    action: Run the non-destructive column migration against the live catalog and assert the new column is present on BOTH the history and current tables.
    command: bin/venv-python -m scripts.ducklake_neon_smoke_test --migrate-ops-recs-columns --profile agent_platform
    expected: reconcile_table_columns adds context_v2_json where absent (idempotent no-op if already present) and reports it present on ops_recommendations_history AND ops_recommendations_current; exit 0; the 905 existing rows are untouched.
    fix_if: column absent on either table after the run -- introspection or ALTER path wrong; any DROP/recreate observed -- abort (the migration MUST be non-destructive, Decision 84/81).
  - step: 9
    phase: post-deploy
    action: Prove the redeployed writer/reader operate at production scope with no schema regression on the existing columns.
    command: bin/venv-python -m scripts.ducklake_neon_smoke_test --ops-read-your-write --profile agent_platform
    expected: write_ops via writer then read via reader succeeds at production scope; exit 0. (This proves no schema regression / existing-column roundtrip; the new-column persistence proof is step 10.)
    fix_if: 409/absent-update loud-fail or a schema-gate rejection -- the writer/reader redeploy (step 7) did not take; re-run step 7.
  - step: 10
    phase: post-deploy
    action: End-to-end roundtrip of a real context_v2_json value through the production closed boundary (self-cleaning, Decision 70).
    command: RUN_LIVE_DUCKLAKE=1 bin/venv-python -m pytest tests/test_ops_data_portal.py -k ci_rca_context_v2_roundtrip_live -q
    expected: Test passes -- files a test ci_rca rec with a valid context_v2_json, reads it back via the reader asserting context_v2_json persisted AND the legacy context summary present, then closes the rec via update_rec.
    fix_if: context_v2_json is None on read -- writer projection or the step-8 migration did not land; rec not closeable -- update_rec lifecycle path broken.
  - step: 11
    phase: post-deploy
    action: Full presubmit (local mirror of CI) is green before push.
    command: bin/venv-python -m scripts.validate
    expected: All checks pass (lint, format, tests, prompts); exit 0.
    fix_if: Any check fails -- fix before push; remote CI (Decision 83 required checks) is authoritative.
constraints:
  - >-
    WARN MODE ONLY: this plan introduces no hard rejections. file_rec(source=ci_rca) MUST NOT raise on
    structural deficiency while CI_RCA_STRICT_MODE=warn. The strict branch may exist but stays inert
    (flag default warn). Decision 55 loud-fail applies to write transport, not to warn-mode schema-depth warnings.
  - >-
    DEPLOY ORDERING (deploy-window edge): a context_v2_json-bearing write would be schema-gate-rejected
    (writer 422 -> ValueError at ops_data_portal.py:209-210) by the CURRENTLY-deployed writer until step 7
    redeploys it and step 8 adds the live column. The WARN-MODE no-raise guarantee therefore holds only
    AFTER the post-deploy steps land. The window is benign: no production caller emits context_v2_json
    until the Phase-3 agent prompt rewrite (PLAN-ci-rca-prompt-rewrite); the only context_v2_json write
    before then is the step-10 live roundtrip, which runs post-deploy by construction.
  - >-
    DEFERRED out of scope (named follow-on atomic plans -- do NOT implement here): citation-existence
    lookup (INTENT Section 4 check 5), evidence-bundle SHA-256 S3 verification (check 7), cross-check
    enforcement of earliest_viable_gate/actual_gate (checks 3-4, require the Phase-2 evidence script),
    Section 7 observability emission (ops_ci_rca_telemetry). prior_art_citation and evidence_bundle_ref
    are validated for SHAPE only in this slice.
  - >-
    context_v2_json is ADDITIVE: a nullable sibling column. The legacy context column is preserved (it
    receives a one-paragraph human summary) so existing free-text readers (/plan preflight, audit
    dashboards) keep working. Do NOT overload or drop context (INTENT Section 1).
  - >-
    DuckLake is the sole backend (Decision 84): the column lands via field_semantics.yaml + the writer
    schema gate + a guarded idempotent ALTER ADD COLUMN -- NOT Iceberg ALTER TABLE, NOT Athena views.
    Reads transit ducklake_reader named verbs; no caller SQL (Decision 81 cl.7).
  - >-
    terraform/personal/ only (Decision 77): the flag tf must land under terraform/personal/ so
    push-to-main auto-applies behind terraform_apply_guard.py. No IAM/destroy/trust changes.
  - >-
    Per-Lambda deploy gating (Decision 79 / CD.16): all four affected active DuckLake artifacts get
    build + deploy + smoke-test.
  - No rescue agents or workaround loops (Decision 55). On unrecoverable V3 failure, stop and RCA.
  - IMPLEMENTATION type only (CD.17 / Decision 67 STRATEGIC-plan freeze).
