execution_steps:
  - >-
    Create config/feature_flags.yaml with CI_RCA_STRICT_MODE: warn plus a short comment naming the
    accepted values (warn|strict). This is the canonical flag source.
  - >-
    Add get_ci_rca_strict_mode() to scripts/ops_data_portal.py: module-level cached yaml.safe_load of
    config/feature_flags.yaml (mirror the _capabilities_cache pattern at line 288); read once at process
    start (no hot-reload); default 'warn' when the key or file is absent; reject values outside {warn, strict}.
  - >-
    Add the CiRcaContext Pydantic model to scripts/ops_data_portal.py per INTENT Section 1: schema_version
    (int, ==1); proximate_cause (100-600); why_chain (list 3-7, per-entry 40-250, final entry must satisfy
    BOTH the systemic-keyword set {gate,tier,policy,contract,gap,missing,absent,placement,scope,invariant,enforcement}
    AND a file:line citation matching [\w./-]+\.(py|yaml|tf|md|sh):\d+); why_chain_terminus_override (optional);
    detection_gap{earliest_viable_gate, actual_gate_that_caught_it in {pre,presubmit,CI}; gap_explanation 120-600
    with a file:line token}; recurrence_class in {novel,instance_of_known_pattern,regression}; prior_art_citation
    (SHAPE-validated only -- existence/relevance lookup DEFERRED); corrective_action (100-600); preventive_action
    (100-800); evidence_bundle_ref{sha256 pattern, s3_uri pattern, upload_status} (SHAPE-validated only -- S3
    existence DEFERRED).
  - >-
    Extend scripts/executor/rec_write_guidance.py so get_rec_write_guidance('ci_rca') returns the CiRcaContext
    field semantics as authoritative write-time guidance (Decision 66). Add a one-line comment justifying the
    dedicated code path (nested object, not a flat ops.yaml column entry -- intentional divergence from the
    Wave-2 auto-population pattern).
  - >-
    Add the warn-mode validation branch to file_rec() for source=ci_rca: accept a new context_v2_json argument.
    If provided, run CiRcaContext.model_validate + the why_chain two-layer terminus check + per-field bounds.
    On any structural deficiency: when get_ci_rca_strict_mode()=='warn', log a structured deficiency warning
    (logger.warning naming the failing checks) and DO NOT raise; when 'strict', raise (branch present but inert
    this slice). When context_v2_json is absent (legacy free-text), log a one-line deprecation warning and pass.
    Persist context_v2_json (when present) into the merged record so the writer projection stores it, and write
    a one-paragraph (>=80-char) human summary into the legacy context column to satisfy _validate_context_length.
  - >-
    Add context_v2_json {role: input, sql_type: VARCHAR, nullable: true} to BOTH the history and current column
    blocks of ops_recommendations in config/lambda/ducklake/field_semantics.yaml. Do NOT touch
    src/common/ducklake_scd2_schema.py if avoidable (keeps the change config-driven).
  - >-
    Add reconcile_table_columns(con, *, table) to src/common/ducklake_runtime.py: introspect the physical
    columns of the history+current tables (DuckDB PRAGMA table_info / information_schema over the attached
    catalog) and run ALTER TABLE <t> ADD COLUMN <name> <sql_type> for each spec column that is absent.
    Idempotency comes from the introspection guard, NOT a SQL IF NOT EXISTS clause (there is no ADD COLUMN
    precedent here; the line 335-336 ALTERs are SET PARTITIONED BY, a different statement). Never DROP. Keep
    it a pure function over an open connection so it is callable from the smoke client.
  - >-
    Add a --migrate-ops-recs-columns operational flag to scripts/ducklake_neon_smoke_test.py: open a direct
    Neon connection via the existing _open_attached helper (the --attach/--restore-drill path), call
    reconcile_table_columns(con, table="ops_recommendations"), then assert via introspection that
    context_v2_json is present on BOTH ops_recommendations_history and _current; print the result. This is the
    one-time migration trigger + verification (deploy-free; deliberately NOT a maintenance-handler action,
    which would pull data-pipeline + ops-compaction into the deploy set).
  - >-
    Create terraform/personal/feature_flags.tf: provision CI_RCA_STRICT_MODE as an SSM String parameter whose
    value is sourced from config/feature_flags.yaml via try()-wrapped file()+yamldecode (AGENTS.md optional-artifact
    rule) so the YAML stays canonical. No IAM/destroy/trust changes (the fail-closed apply guard must PASS).
  - >-
    Add/extend tests in tests/test_ops_data_portal.py: unit tests (-k ci_rca) for valid context_v2_json,
    deficient why_chain (warns, does not raise), legacy free-text (deprecation warning, passes), flag default,
    and guidance schema; a reconcile_table_columns re-run-safety test (second call against a temp/in-memory
    DuckDB table is a no-op, asserting introspection-based idempotency); plus one env-gated live roundtrip test
    (-k ci_rca_context_v2_roundtrip_live, skipped unless RUN_LIVE_DUCKLAKE=1) that files -> reads via reader ->
    asserts persisted -> closes via update_rec.
  - >-
    Annotate docs/INTENT-ci-rca-methodology.md (stale-pointer only, Decision 86): mark Sections 1/3/7
    Iceberg-ALTER / Athena-_current / Athena-telemetry wording as superseded by the DuckLake closed boundary
    (Decision 84/81), and record that this plan landed the Phase-1 core slice (flag + schema + guidance +
    warn-mode validation + context_v2_json column) and DEFERRED citation-existence lookup, evidence SHA-256
    verification, cross-check enforcement, and Section 7 observability emission to named follow-on plans.
  - >-
    Update docs/ROADMAP-PLATFORM.yaml T1.13: append to progress_note (Phase-1 core slice landing + deferred
    checks) AND correct the stale files_in_scope entry terraform/feature_flags.tf to
    terraform/personal/feature_flags.tf (it auto-applies only under terraform/personal/ per Decision 77).
  - >-
    Execute the Verification Plan: run each step; loop until pass; build+deploy the four active DuckLake
    artifacts; run the migration; roundtrip via ducklake_neon_smoke_test --ops-read-your-write and the live
