rollback: >-
  The flag stays/returns to warn (default), so no strict rejections fire. Revert config/feature_flags.yaml
  and the scripts changes via git. context_v2_json is nullable/additive -- leave it in place (harmless);
  never DROP (data-preserving). If a Lambda deploy regresses, redeploy the previous artifact zips
  (build_lambda --ducklake-only at the prior commit). Removing terraform/personal/feature_flags.tf reverts
  the SSM param (no dependents in this slice).
