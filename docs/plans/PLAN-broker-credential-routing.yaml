schema_version: 1
slug: "broker-credential-routing"
intent: >-
  Ratify the Class C credential-routing invariant so the trading system's execution layer
  resolves broker API credentials by a routing key from a single canonical contract (never
  ad-hoc environment variables) -- the pre-codegen keystone (CD.25) that the L3 broker adapters
  and the Secrets Manager provisioning build to.
plan_type: REPORT-ONLY
verification_tier: V1
plan_path: docs/plans/PLAN-broker-credential-routing.yaml
phase: >-
  Platform tier T2.14 (contract-authoring phase; depends_on T2.1 complete) under the CD.25
  pre-codegen contract ritual. Product execution-layer items L3.exec.4 (Alpaca) and L3.exec.5
  (IBKR) are downstream consumers; product Phase 1 Core Infrastructure.
scope:
  - file: docs/contracts/credential-routing.yaml
    action: Create
    purpose: >-
      The Class C deliverable. Concept-shaped cross-system invariant: a routing key
      broker/<broker>/<account_type> resolves to exactly one Secrets Manager secret; runtime
      resolves credentials only by routing key (no direct broker-API-key env-var fallback);
      secret values are out-of-band (Decision 37). Vocabulary conforms to the two-axis taxonomy
      (Decision 77). Mirrors the ratified source-lineage.yaml / project-id.yaml shape.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      (1) Re-ground T2.14 files_in_scope path terraform/secrets_manager_brokers.tf ->
      terraform/personal/secrets_manager_brokers.tf (work-root retired per CD.21). (2) Set T2.14
      status not_started -> in_progress with a progress_note recording that the contract phase is
      done and the Secrets Manager + resolver codegen remains (and that final completion is also
      CD.25-ratification-gated, since T2.14 is bootstrap_completion_exempt: false). (3) Strengthen
      exit criterion 3 to name the scripts/validate.py env-var-fallback CI guard (the tracked
      enforcement owner for the contract's RESOLVE-BY-KEY-ONLY invariant). No other roadmap items
      touched.
  - file: docs/plans/PLAN-broker-credential-routing.yaml
    action: Create
    purpose: This planning artefact.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - "docs/contracts/credential-routing.yaml exists at contract_version 1, status ratified, class C, with a fields mapping holding routing_key and an allowed_values.routing_table mapping broker/alpaca/paper and broker/alpaca/live to agent-platform-broker-alpaca-paper and agent-platform-broker-alpaca-live."
  - "The contract loads cleanly via scripts.contracts.load_contract (schema-valid ContractDocument; no verbs key; Class C shape)."
  - "The contract is a valid $ref target -- a simulated downstream Class A contract resolves routing_key via scripts.contracts.resolve_refs with the canonical description layered in and a tightening dq_intent_local accepted."
  - "The CD.25 contract-drift gate passes over docs/contracts/ with credential-routing among the ritual contracts and no drift."
  - "The environment/phase taxonomy lint reports no violations for credential-routing.yaml (vocabulary conforms to Decision 77 -- no '<phase> environment' adjacency)."
  - "The six audit_invariants encode resolve-by-key-only (no env-var fallback, enforcement owner named), secret-value-out-of-band, ARN-scoped read, account-type-from-phase, least-privilege-across-account-types, and credential-rotation."
  - "Roadmap: T2.14 files_in_scope path re-grounded to terraform/personal/secrets_manager_brokers.tf; status in_progress with a progress_note naming the codegen follow-on; the roadmap document still loads."
  - "Step 10 multi-perspective critique converges (the fourth T2.14 exit criterion)."
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      Load the contract through the real loader; assert Class C, version 1, ratified, routing_key
      present, no verbs, self-resolution is a clean no-op (inline field), the not_null baseline is
      the loosest (Invariant 5), and the routing_table + six audit_invariants are present with the
      two Alpaca secret names.
    command: |
      bin/venv-python - <<'PY'
      from scripts.contracts import load_contract, resolve_refs
      import pathlib
      src = pathlib.Path("docs/contracts")
      d = load_contract(src / "credential-routing.yaml")
      assert d.contract.class_.value == "C" and d.contract.contract_version == 1
      assert d.contract.status.value == "ratified" and d.verbs is None
      assert d.fields and "routing_key" in d.fields
      assert resolve_refs(d, src)["routing_key"].ref is None
      nn = (d.fields["routing_key"].dq_intent or {}).get("not_null") or {}
      assert nn.get("enforced") is not True
      rt = d.allowed_values["routing_table"]
      assert rt["broker/alpaca/paper"]["secret_name"] == "agent-platform-broker-alpaca-paper"
      assert rt["broker/alpaca/live"]["secret_name"] == "agent-platform-broker-alpaca-live"
      assert len(d.audit_invariants) == 6
      joined = " ".join(d.audit_invariants)
      for k in ("RESOLVE-BY-KEY-ONLY", "LEAST-PRIVILEGE-ACROSS-ACCOUNT-TYPES", "CREDENTIAL-ROTATION"):
          assert k in joined, k
      print("OK credential-routing contract")
      PY
    expected: "Prints 'OK credential-routing contract' and exits 0."
    fix_if: "An AssertionError or ContractValidationError -- the contract violates the Class C shape (verbs present, wrong status/version, missing routing_key, wrong secret name) or is not schema-valid."
  - step: 2
    phase: pre-deploy
    action: >-
      Prove the contract is a usable $ref target by resolving a simulated downstream Class A
      contract against routing_key with a tightening dq_intent_local override.
    command: |
      bin/venv-python - <<'PY'
      from scripts.contracts import load_contract, resolve_refs
      import tempfile, pathlib, shutil, yaml
      src = pathlib.Path("docs/contracts")
      with tempfile.TemporaryDirectory() as td:
          td = pathlib.Path(td); shutil.copy(src / "credential-routing.yaml", td / "credential-routing.yaml")
          a = {"contract": {"id": "probe_a", "class": "A", "contract_version": 1, "status": "ratified"},
               "fields": {"probe": {"$ref": "docs/contracts/credential-routing.yaml#/contract/fields/routing_key",
                                    "dq_intent_local": {"not_null": {"enforced": True}}}}}
          (td / "probe_a.yaml").write_text(yaml.safe_dump(a), encoding="utf-8")
          r = resolve_refs(load_contract(td / "probe_a.yaml"), td)["probe"]
          assert r.ref is None and r.description and r.dq_intent == {"not_null": {"enforced": True}}
          print("OK routing_key is a usable $ref target")
      PY
    expected: "Prints 'OK routing_key is a usable $ref target' and exits 0 -- the $ref collapses, the canonical description is carried, and the tightening override is applied."
    fix_if: "A ContractValidationError (dangling target/field, chained ref, loosening override) or AssertionError -- a downstream contract cannot $ref routing_key."
  - step: 3
    phase: pre-deploy
    action: >-
      Run the fast tier over the working tree: the CD.25 contract-drift gate must PASS with
      credential-routing among the ritual contracts, and the environment/phase taxonomy lint must
      report no violations (the contract is tracked by now, so get_changed_files sees it).
    command: bin/venv-python -m scripts.validate --pre
    expected: "Exit 0; '=== Contract drift gate (CD.25) ===' prints PASS with 6 ritual contract(s) and no drift; '=== Environment/phase taxonomy lint ===' prints 'No environment/phase taxonomy violations in changed docs.'"
    fix_if: "Any 'Contract drift' failure line or a taxonomy violation naming credential-routing.yaml -- fix the offending field/vocabulary and re-run. (If the contract is still untracked, git add it first so the taxonomy lint sees it.)"
  - step: 4
    phase: pre-deploy
    action: "Validate the plan artefact against the PlanDocument schema."
    command: bin/venv-python -m scripts.plan_document docs/plans/PLAN-broker-credential-routing.yaml
    expected: "PASS: docs/plans/PLAN-broker-credential-routing.yaml validates against PlanDocument schema."
    fix_if: "A 'FAIL:' line naming the schema violation -- correct the plan field and re-run."
  - step: 5
    phase: pre-deploy
    action: >-
      Confirm the roadmap still loads after the T2.14 edits and that T2.14 is in_progress with the
      re-grounded path and a progress_note.
    command: |
      bin/venv-python - <<'PY'
      from scripts.platform_roadmap import load
      d = load("docs/ROADMAP-PLATFORM.yaml")
      t = {i.id: i for i in d.tier_items}["T2.14"]
      assert t.status == "in_progress"
      assert "terraform/personal/secrets_manager_brokers.tf" in t.files_in_scope
      assert t.progress_note and "Phase 1" in t.progress_note
      print("ROADMAP_LOADS", len(d.tier_items), "items; T2.14 in_progress, path re-grounded")
      PY
    expected: "Prints a ROADMAP_LOADS line with the item count and exits 0 (the roadmap parses; T2.14 in_progress; path re-grounded; no Pydantic ValidationError)."
    fix_if: "A Pydantic ValidationError -- the T2.14 edit uses a key/status outside the TierItem schema; correct it and re-run."
constraints:
  - "REPORT-ONLY: the deliverable is the Class C contract. No Terraform, no scripts/broker_secrets.py, no IAM changes -- those are the named codegen follow-on (CD.25 pre-codegen ordering: ratify the contract first, then codegen consumes it)."
  - "Author strictly against the shipped scripts/contracts_schema.py (ContractDocument, extra=forbid). Class C must not define verbs; it MAY own the canonical routing_key field via a fields block."
  - "Vocabulary conforms to the two-axis taxonomy (Decision 77): broker paper/live are product-phase / broker-account-type selectors, never platform 'environments'. Avoid the '<phase> environment' / '<tier> phase' adjacencies the taxonomy lint flags."
  - "Secret values are out-of-band (Decision 37); the contract governs only secret naming and routing, never key material. Secret tag values use the ASCII tag charset only (no parentheses)."
  - "Class C contracts are single-hop leaf nodes -- no $ref inside them (Invariant 5)."
  - "Do NOT create docs/contracts/_joins.yaml: no join uses routing_key today (INTENT Part 5 incremental-landing rule)."
  - "No new standing prose-architecture docs (Decision 86): the contract YAML is the canonical machine-parseable home; no companion .md."
  - "Roadmap edits limited to the T2.14 tier item: re-ground the files_in_scope path (CD.21), re-ground the intent vocabulary (environment -> account-type, Decision 77), and record progress (in_progress + progress_note). No other roadmap items touched. Do NOT mark T2.14 complete -- completion is gated on the codegen follow-on AND CD.25 ratification (bootstrap_completion_exempt: false)."
  - "No rescue agents or workaround loops (Decision 55)."
