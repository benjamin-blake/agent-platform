schema_version: 1
slug: sloc-session-preflight-tests
intent: >-
  Decompose tests/test_session_preflight.py (2864 SLOC) into a concern-split test package under
  tests/session/preflight/ (nine cohesive test_<concern>.py modules, each < 500 SLOC, all covering
  scripts/session/preflight.py), then SURGICALLY retire only its grandfather home and delete its
  config/sloc_budgets.yaml entry -- rec-2709 Wave 4 of the Decision 131 mirror-convention rollout.
  Purpose: keep every test file small enough for lower-tier model comprehension (the load-bearing
  reason the 500-SLOC gate exists, Decision 128). Behaviour-preserving pure MOVE; no test-logic change.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-sloc-session-preflight-tests.yaml
phase: >-
  rec-2709 Wave 4 (Decision 131 mirror convention, amends Decision 104); SLOC governance /
  model-portability (AGENTS.md Decision 128). Behaviour-preserving test MOVE of the
  scripts/session/preflight.py test home. No product-roadmap phase; platform tooling only.
scope:
  - file: tests/fixtures/session_preflight_module.py
    action: Create
    purpose: >-
      Shared SINGLETON load of scripts/session/preflight.py under the synthetic sys.modules name
      "session_preflight" (idempotent: return the existing sys.modules entry if already loaded).
      Every new tests/session/preflight/ module AND the package conftest import the identical
      module object from here. Direct precedent: tests/fixtures/validate_module.py (Wave 1).
      MANDATORY because session_preflight.PREFLIGHT_REPORT / TELEMETRY_ACTIVE_SESSION_FILE are
      per-module-object attributes: a per-file re-run of the importlib loader would create a fresh
      copy per test module, letting the last-collected copy win the sys.modules slot while each
      file's own _preflight.main() kept reading its own now-orphaned copy -- decoupling
      patch("session_preflight.PREFLIGHT_REPORT") from the main() it must intercept (vacuous-pass /
      writes-to-real-file hazard). tests/fixtures/ is exempt from the no-cross-test-import guard.
  - file: tests/session/__init__.py
    action: Create
    purpose: Package marker for the tests/session/ mirror tree (prepend import mode; empty file).
  - file: tests/session/preflight/__init__.py
    action: Create
    purpose: >-
      Package marker for the concern-split package (prepend import mode; empty file). This is the
      directory the mirror machinery computes for scripts/session/preflight.py once retired
      (tests/session/preflight/); check_test_file_exists accepts it once it holds >=1 test_*.py.
  - file: tests/session/preflight/conftest.py
    action: Create
    purpose: >-
      Package conftest hoisting the module-level autouse fixture `_disable_reader_and_git_fetch`
      VERBATIM (it stubs _make_reader, scripts.sync.ops.sync/warm_sync, session_preflight._sync_ops_pull,
      and -- for every class except TestCheckMainFreshness -- scripts.preflight.env_git.check_main_freshness).
      It is a FIXTURE, so it belongs in a conftest, NOT tests/fixtures/. Its
      `request.cls.__name__ == "TestCheckMainFreshness"` guard is a class-name string comparison, so it
      still fires correctly after that class moves to test_env_git.py. Header imports pytest, MagicMock,
      patch, ExitStack, Path, AND imports tests.fixtures.session_preflight_module (noqa F401) so
      sys.modules["session_preflight"] is guaranteed registered before the fixture's patch() runs.
      Layers UNDER the root tests/conftest.py (global recursion/socket/env-clearing autouse fixtures)
      without redeclaring any of them.
  - file: tests/session/preflight/test_env_git.py
    action: Create
    purpose: >-
      env_git-surface classes (verbatim): TestCheckVenv, TestGetGitStatus, TestCheckMainFreshness,
      TestCheckVenvWorktree, TestLogSync, TestActivateHint, TestGetRecentMainCommits. ~350 SLOC.
  - file: tests/session/preflight/test_aws_infra.py
    action: Create
    purpose: >-
      aws_infra / credentials / terraform / reader-priming classes (verbatim): TestCheckTerraformPending,
      TestCheckCredentials, TestHandleCredentialsStartup, TestCredentialsOrderingInMain, TestUrlPriming.
      ~230 SLOC.
  - file: tests/session/preflight/test_recs_cache.py
    action: Create
    purpose: >-
      recs_cache counters + alerts derivations (all derived from the warm recs-rows cache), verbatim:
      TestGracefulMissingFiles, TestNonAutomatableRecommendations, TestNonAutomatableSoftcap,
      TestCountRecommendationsReader, TestRecsReadStatusDegradation, TestGetLatestDecisionTs,
      TestForwardFixRecursion, TestBudgetBypassAlert. ~330 SLOC.
  - file: tests/session/preflight/test_context_docs.py
    action: Create
    purpose: >-
      context_docs / roadmap-slimming / telemetry-health / endstate-drift classes (verbatim):
      TestSlimRoadmapState, TestReadContextFiles, TestReadContextFilesRecsCount, TestTelemetryHealth,
      TestRetiredAthenaEstate, TestEndstateDrift. ~355 SLOC.
  - file: tests/session/preflight/test_priority_queue.py
    action: Create
    purpose: >-
      priority_queue read/print/degraded-fallback + reader-dedup classes (verbatim):
      TestReadPriorityQueueDegraded, TestPrintPriorityQueue, TestReadPriorityQueueReader,
      TestPriorityQueueSourceCache, TestSyncCollapse, TestVerbDedup, TestErrorPropagation. ~325 SLOC.
  - file: tests/session/preflight/test_main_report.py
    action: Create
    purpose: >-
      main() integration + report-shape + summary classes (call _preflight.main(), verbatim):
      TestFormatPreflightSummary, TestStdoutDoesNotDumpFullJson, TestJsonOutputSchema,
      TestMainIncludesPriorityQueue, TestCiRcaHardBlock, TestPreflightReportDisputeKey. ~370 SLOC.
  - file: tests/session/preflight/test_ci_rca_signals.py
    action: Create
    purpose: >-
      ci_rca_signals fetch/derive/liveness/gap/dispute/undetermined classes (verbatim):
      TestCiRcaLivenessAlert, TestConvergenceRcaGapAlert, TestFetchCiRcaRecs, TestDeriveCiRcaClosed,
      TestDeriveCiRcaDisputeOpen, TestFetchCiRcaDisputeRecs, TestPrintCiRcaDisputeRecs,
      TestFetchCiRcaUndeterminedRecs. ~360 SLOC.
  - file: tests/session/preflight/test_correlation.py
    action: Create
    purpose: >-
      correlation classes (verbatim, including their in-class _make_rec/_make_commit/_make_closed_sibling
      helpers): TestCiRcaCorrelation, TestPrintCiRcaRecsWithCorrelation, TestCorrelateRecsWithCommits,
      TestSurfaceQueueRelevanceTriage. ~325 SLOC.
  - file: tests/session/preflight/test_ci_rca_gauges.py
    action: Create
    purpose: >-
      ci_rca_gauges classes (abstention / telemetry-section / back-validation-section), verbatim:
      TestAbstentionGauge, TestCiRcaTelemetrySection, TestCiRcaBackValidationSection. ~300 SLOC.
  - file: scripts/test_coverage_checker.py
    action: Modify
    purpose: >-
      The surgical flip (FINAL commit only): (1) delete the single line "test_session_preflight.py"
      from _RETIRING_GRANDFATHER_HOMES -- KEEP "test_session_postflight.py"; (2) add
      "scripts/session/preflight.py" to the _CONCERN_SPLIT_TEST_PACKAGES frozenset. Do NOT touch
      _NESTED_SUBPACKAGE_TEST_PREFIX, _ALL_MIRROR_TARGET_HOMES, or any other home. Gate reasoning:
      after (1), scripts/session/preflight.py's grandfather home "test_session_preflight.py" is no
      longer in _RETIRING but is still in _ALL_MIRROR_TARGET_HOMES, so map_source_to_test routes it
      through _mirror_source_to_test; with (2) that returns the PACKAGE DIR tests/session/preflight/
      (not tests/session/test_preflight.py). postflight's home stays in _RETIRING -> grandfather;
      metrics is off-roster (never in _ALL) -> unconditional grandfather. Exactly one source flips.
  - file: tests/test_coverage_checker.py
    action: Modify
    purpose: >-
      Update the oracle (FINAL commit): (a) ADD three cases to
      test_representative_paths_resolve_under_current_retirement_state -- scripts/session/preflight.py
      -> tests/session/preflight (concern-split package dir), scripts/session/postflight.py ->
      tests/test_session_postflight.py (still grandfathered), scripts/session/metrics.py ->
      tests/test_session_metrics.py (off-roster grandfather); KEEP the existing scripts/executor/** and
      scripts/ops_portal/** -> None cases (Decision 124). (b) Update
      test_retiring_is_all_target_homes_minus_test_validate: TWO homes are now retired -- assert
      `_ALL_MIRROR_TARGET_HOMES - _RETIRING_GRANDFATHER_HOMES == {"test_validate.py",
      "test_session_preflight.py"}`, `"test_session_preflight.py" not in _RETIRING_GRANDFATHER_HOMES`,
      and (surgical regression) `"test_session_postflight.py" in _RETIRING_GRANDFATHER_HOMES`; rename
      the method/docstring to reflect the two-retired state. (c) ADD a positive
      test_maps_scripts_session_preflight_to_concern_split_package mirroring test_maps_scripts_to_test.
      LEAVE test_roster_is_the_24_known_basenames UNCHANGED (roster frozen at 24; retirement never
      removes from _ALL_MIRROR_TARGET_HOMES).
  - file: config/sloc_budgets.yaml
    action: Modify
    purpose: >-
      Delete ONLY the line "  tests/test_session_preflight.py: 2864  # raise-approved: dec-130 one-time
      grandfather of pre-existing tests/ SLOC debt (coverage-gap fix)" by hand (FINAL commit). NEVER run
      --update-sloc-budgets (it strips the dec-130 markers on the other grandfathered entries). HARD
      invariant: this file loses exactly that one line and nothing else. This is a ratchet-DOWN removal
      (Decision 43/102), always unrestricted; no raise marker is added (Decision 128 -- decompose, don't raise).
  - file: tests/test_session_preflight.py
    action: Delete
    purpose: >-
      Fully decomposed into the tests/session/preflight/ concern-split package. Deleted WHOLE in the
      FINAL commit only (kept 100% intact through every prior commit so the old module-level loader and
      the new shared singleton loader never coexist under one full-suite collection -- see OPEN RISK 1).
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - >-
    Test-id preservation: the set of pytest node ids (class::function, module-path stripped) collected
    from tests/session/preflight/ equals the pre-move set from origin/main's
    tests/test_session_preflight.py. Same function set, same count, same pass/fail outcomes. Because
    this is a PURE move with NO class rename, NO method rename, and NO class-level concern-split (the
    largest class, TestCiRcaCorrelation, is ~170 SLOC -- far under 500), the diff MUST be EMPTY with no
    sanctioned delta.
  - >-
    bin/venv-python -m scripts.validate --pre exits 0: SLOC gate green (every new module < 500 SLOC and
    < 20 CC branches, none registered in config/sloc_budgets.yaml); no-cross-test-import guard green;
    collectability green.
  - "bin/venv-python -m pytest tests/session/preflight -q passes with the same number of tests as the pre-move baseline."
  - >-
    git diff origin/main -- config/sloc_budgets.yaml shows ONLY the tests/test_session_preflight.py line
    removed; every other dec-130 entry and its raise-approved marker is byte-identical.
  - >-
    map_source_to_test spot-checks (asserted by the updated tests/test_coverage_checker.py oracle):
    scripts/session/preflight.py -> tests/session/preflight (concern-split package DIR);
    scripts/session/postflight.py -> tests/test_session_postflight.py (still grandfathered);
    scripts/session/metrics.py -> tests/test_session_metrics.py (off-roster grandfather);
    scripts/executor/step_runner.py -> None and scripts/ops_portal/cli.py -> None (Decision 124, unperturbed).
  - >-
    _RETIRING_GRANDFATHER_HOMES no longer contains "test_session_preflight.py" and STILL contains
    "test_session_postflight.py"; _ALL_MIRROR_TARGET_HOMES (frozenset) is unchanged (24 entries);
    "scripts/session/preflight.py" is present in _CONCERN_SPLIT_TEST_PACKAGES.
  - >-
    Every new test module is < 500 SLOC (validate_sloc_limits counting: non-blank, non-comment lines) and
    < 20 cyclomatic branches; NO new config/sloc_budgets.yaml entry is added; tests/test_session_preflight.py
    is deleted.
  - >-
    Whole-suite collection is clean: bin/venv-python -m pytest tests/ --collect-only -q reports no import
    or collection error from the new package, the shared loader, the deleted monolith, or the oracle edits.
verification_plan:
  - step: 1
    phase: pre-deploy
    graduation: not-applicable
    action: Capture the BEFORE test-id baseline from the monolith before the FINAL commit deletes it.
    command: >-
      bin/venv-python -m pytest tests/test_session_preflight.py --collect-only -q | grep '::'
      | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/claude-0/before_ids.txt; wc -l /tmp/claude-0/before_ids.txt
    expected: A non-empty sorted baseline of class::function ids (module path stripped) written to the temp file.
    fix_if: If collection errors, the monolith has an import/collection problem that must be fixed before decomposing.
  - step: 2
    phase: pre-deploy
    graduation: not-applicable
    action: Collect the AFTER id set from the new package and assert byte-identical equality with the baseline.
    command: >-
      bin/venv-python -m pytest tests/session/preflight --collect-only -q | grep '::'
      | sed -E 's/^[^:]+::/CLASSFN::/' | sort -u > /tmp/claude-0/after_ids.txt;
      diff /tmp/claude-0/before_ids.txt /tmp/claude-0/after_ids.txt
    expected: Empty diff (identical class::function sets). No sanctioned delta -- this is a pure move with no renames/splits.
    fix_if: Any added/removed id means a class was dropped, duplicated, mis-copied, or a method was lost/renamed. STOP and reconcile.
  - step: 3
    phase: pre-deploy
    graduation: not-applicable
    action: Run the authoritative fast presubmit tier -- proves SLOC gate, no-cross-test-import guard, and collectability.
    command: bin/venv-python -m scripts.validate --pre
    expected: Exit 0. No "SLOC limits" failure, no "cross-test import" failure, no collection error.
    fix_if: >-
      A >500 unregistered file (rebalance classes across modules), a cross-test import (a helper leaked between
      test_* modules -- move it to tests/fixtures/ or the package conftest), or a collection error (fix the
      offending module's fresh import header).
  - step: 4
    phase: pre-deploy
    graduation: not-applicable
    action: Full pass of the new package at the same count as the baseline.
    command: bin/venv-python -m pytest tests/session/preflight -q
    expected: All pass; total selected count equals the step-1 baseline line count.
    fix_if: >-
      A failure means a patch target or fixture did not survive the move -- most likely the shared-loader
      singleton (session_preflight identity) or the hoisted autouse fixture. Verify _preflight is the same
      object as sys.modules["session_preflight"] in every module.
  - step: 5
    phase: pre-deploy
    graduation: not-applicable
    action: Assert config/sloc_budgets.yaml lost exactly the tests/test_session_preflight.py line and nothing else.
    command: git diff origin/main -- config/sloc_budgets.yaml
    expected: >-
      Exactly one removed line (the "tests/test_session_preflight.py" budget entry with its 2864 value and
      dec-130 raise-approved marker) and zero added lines.
    fix_if: Any other changed line means --update-sloc-budgets was run (forbidden) or an unintended entry was touched.
  - step: 6
    phase: pre-deploy
    graduation: not-applicable
    action: Prove the retired + surgical mapping via the updated coverage-checker oracle.
    command: bin/venv-python -m pytest tests/test_coverage_checker.py -q
    expected: >-
      All pass, including: scripts/session/preflight.py -> tests/session/preflight; postflight/metrics still
      grandfathered to their flat test_session_* homes; executor/** and ops_portal/** -> None; the updated
      two-retired-homes assertion; the unchanged 24-entry roster.
    fix_if: >-
      A failing oracle assertion means the flip was wrong -- e.g. postflight/metrics stopped grandfathering
      (over-reach), the concern-split package path is mis-declared, or the two-retired-homes assertion still
      expects only test_validate.py retired. Correct the map edit or the oracle expectation to match.
  - step: 7
    phase: pre-deploy
    graduation: not-applicable
    action: Confirm the monolith is gone and the retirement line is deleted.
    command: >-
      test ! -f tests/test_session_preflight.py && ! grep -q '"test_session_preflight.py"' scripts/test_coverage_checker.py
      && grep -q '"test_session_postflight.py"' scripts/test_coverage_checker.py && echo RETIRED-OK
    expected: Prints RETIRED-OK (monolith deleted, preflight line removed from _RETIRING, postflight line still present).
    fix_if: If the file survives, the preflight line remains, or the postflight line was also removed (over-reach), the FINAL commit is wrong.
  - step: 8
    phase: pre-deploy
    graduation: not-applicable
    action: Whole-suite collection smoke -- no import/collection error anywhere from the move.
    command: bin/venv-python -m pytest tests/ --collect-only -q
    expected: Clean collection; no ImportError/collection error from the new package, the shared loader, or the deleted monolith.
    fix_if: A collection error means a dangling reference to the deleted file or a broken import header in a new module.
constraints:
  - >-
    Pure behaviour-preserving MOVE. Copy every class body and every in-class helper (_make_run, _patched,
    _make_row, _make_rec, _make_commit, _make_closed_sibling, _make_gh_result, _make_counting_reader,
    _make_git_result, the TestEndstateDrift _make_* helpers, class-attribute constants like _REC_001) VERBATIM
    with the class that owns them. Author a fresh per-file import header importing exactly the symbols that file
    references -- no test-logic edits.
  - >-
    Shared module-under-test loading is a SINGLE tests/fixtures/session_preflight_module.py singleton
    (idempotent via a sys.modules["session_preflight"] check), imported by every new module and the package
    conftest. Do NOT re-run the importlib loader per module -- that decouples patch("session_preflight.PREFLIGHT_REPORT"
    / ".TELEMETRY_ACTIVE_SESSION_FILE") from _preflight.main(). Direct precedent: tests/fixtures/validate_module.py.
  - >-
    The module-level autouse fixture `_disable_reader_and_git_fetch` is a FIXTURE -> hoist VERBATIM to
    tests/session/preflight/conftest.py (package conftest), NOT tests/fixtures/. A plain helper used as a bare
    side_effect/key would go to tests/fixtures/ -- but there is no such cross-class plain helper here (every
    _make_* is a class-bound method that moves with its class).
  - >-
    Do NOT duplicate, move, or redeclare the ROOT tests/conftest.py autouse fixtures (_clear_executor_env_vars,
    _clear_aws_credential_env, _isolate_plans_jsonl, _patch_write_run_summary, _block_llm_cli_subprocess,
    _allow_network_for_integration, etc.) -- they stay global and layer above the new package conftest.
  - >-
    No cross-test imports (validate_no_cross_test_imports is active in --pre and full). New modules import only:
    stdlib, pytest, the real scripts.preflight.* modules a class references (e.g. `from scripts.preflight import
    _common`), and `from tests.fixtures.session_preflight_module import preflight as _preflight`. patch("session_preflight.*")
    is a STRING target -- never `import session_preflight` from a test module.
  - >-
    ruff-format import discipline (tests/CLAUDE.md): one consolidated import block per module (never split the same
    module's imports across two blocks -- ruff silently drops the second). Each module re-declares
    `boto3 = pytest.importorskip("boto3")` at top to preserve the monolith's skip-if-boto3-missing behaviour.
  - >-
    Every mirror directory carries an __init__.py (prepend import mode): tests/session/__init__.py and
    tests/session/preflight/__init__.py.
  - >-
    Surgical retirement: remove ONLY "test_session_preflight.py" from _RETIRING_GRANDFATHER_HOMES (KEEP
    "test_session_postflight.py"); add ONLY "scripts/session/preflight.py" to _CONCERN_SPLIT_TEST_PACKAGES. Do NOT
    touch _NESTED_SUBPACKAGE_TEST_PREFIX or _ALL_MIRROR_TARGET_HOMES.
  - >-
    config/sloc_budgets.yaml loses exactly the tests/test_session_preflight.py line; NEVER run
    --update-sloc-budgets. Add NO raise marker and NO new tests/ budget entry (Decision 128 -- decompose, not raise).
  - Do NOT resolve rec-2709 (Wave 4 of ~14); bundled_recommendations stays empty.
  - >-
    No rescue agents or workaround loops (Decision 55). On an unrecoverable collect-id mismatch, STOP and RCA --
    never patch around it. PUBLIC repo -- no AWS account IDs/ARNs/secrets/internal hostnames in any new file.
  - Use bin/venv-python for all Python invocations; bash-only shell.
context:
  - >-
    DECISION ANALYSIS (inline; overseer is the critique gate, so no decision-scout/plan-critique sub-subagents
    were spawned). CITE: Decision 131 (test-colocation inverted to a mirror rule + retiring grandfather-table +
    no-cross-test-import guard + per-package conftest hierarchy; amends Decision 104; enables rec-2709 -- governs
    every step of this wave); Decision 130 (whole-repo structural-size governance + the 24-home one-time
    grandfather of tests/ SLOC debt + the dec-130 sloc_budgets markers -- governs the budget-line deletion, a
    ratchet-DOWN removal); Decision 128 (SLOC budget-raise guardrails: decompose by default, a raise must be loud
    and Decision-cited -- this wave decomposes and adds ZERO budget lines / ZERO raise markers); Decision 124
    (scripts/executor/** and scripts/ops_portal/** deliberately map to None -- the oracle KEEPS those None
    assertions, unperturbed by this wave's map edits). RELATED: Decision 80/104 (facade / concern-split precedent
    the tests/session/preflight/ package mirrors, exactly as Wave 1's tests/validate/); Decision 43/102 (CC-20 and
    500-SLOC limits; the budget-line removal is unrestricted, new modules must respect the limits).
  - >-
    CONTRADICTION CHECK = CLEAN. Unlike Wave 1 (whose 522-SLOC single-class TestValidatePlacement created a
    Decision-128 tension requiring a class-level concern-split), NO class in tests/test_session_preflight.py
    exceeds 500 SLOC -- the largest is TestCiRcaCorrelation at 202 raw lines / ~170 SLOC. So there is NO class-split,
    NO id-qualifier delta, and NO budget-raise-marker tension. The only doctrinal nuance is the tests/CLAUDE.md
    "one-line retirement is NOT uniform" caveat: here preflight IS a genuine flip (scripts/session/preflight.py
    resolves via the _NESTED_SUBPACKAGE_TEST_PREFIX["session"]="test_session_" rule to home
    test_session_preflight.py, then through the mirror branch to the package dir), while postflight stays in
    _RETIRING and metrics is off-roster -- so removing the single preflight basename flips exactly one source.
  - >-
    MIRROR PATH the machinery computes (verified against _mirror_source_to_test): rel =
    scripts/session/preflight.py, parts=("scripts","session","preflight.py"), mirror_subdir=Path("session"),
    stem="preflight"; rel.as_posix() in _CONCERN_SPLIT_TEST_PACKAGES => returns ROOT/tests/session/preflight (a
    PACKAGE DIRECTORY, no test_ prefix, no .py). check_test_file_exists passes once that dir holds >=1 test_*.py.
  - >-
    SURGICAL-RETIREMENT GATE REASONING (why exactly one source flips). After deleting "test_session_preflight.py"
    from _RETIRING_GRANDFATHER_HOMES: (preflight) home.name "test_session_preflight.py" not in _RETIRING, IS in
    _ALL_MIRROR_TARGET_HOMES, home.name != "test_validate.py" so the scaffolding special-case is skipped ->
    _mirror_source_to_test -> tests/session/preflight (because scripts/session/preflight.py was added to
    _CONCERN_SPLIT_TEST_PACKAGES). (postflight) home.name "test_session_postflight.py" STILL in _RETIRING ->
    returns the grandfather home tests/test_session_postflight.py. (metrics) home.name "test_session_metrics.py"
    is in NEITHER _RETIRING NOR _ALL_MIRROR_TARGET_HOMES (it was never on the 24-home roster) -> map_source_to_test
    falls through both branches and returns `home` unconditionally = tests/test_session_metrics.py. Net: preflight
    -> concern-split package; postflight + metrics -> unchanged flat grandfather homes.
  - >-
    CLASS -> MODULE MAP (55 classes, verbatim; no module-level helper other than the autouse fixture). env_git:
    TestCheckVenv, TestGetGitStatus, TestCheckMainFreshness, TestCheckVenvWorktree, TestLogSync, TestActivateHint,
    TestGetRecentMainCommits. aws_infra: TestCheckTerraformPending, TestCheckCredentials,
    TestHandleCredentialsStartup, TestCredentialsOrderingInMain, TestUrlPriming. recs_cache(+alerts):
    TestGracefulMissingFiles, TestNonAutomatableRecommendations, TestNonAutomatableSoftcap,
    TestCountRecommendationsReader, TestRecsReadStatusDegradation, TestGetLatestDecisionTs,
    TestForwardFixRecursion, TestBudgetBypassAlert. context_docs: TestSlimRoadmapState, TestReadContextFiles,
    TestReadContextFilesRecsCount, TestTelemetryHealth, TestRetiredAthenaEstate, TestEndstateDrift.
    priority_queue: TestReadPriorityQueueDegraded, TestPrintPriorityQueue, TestReadPriorityQueueReader,
    TestPriorityQueueSourceCache, TestSyncCollapse, TestVerbDedup, TestErrorPropagation. main_report:
    TestFormatPreflightSummary, TestStdoutDoesNotDumpFullJson, TestJsonOutputSchema,
    TestMainIncludesPriorityQueue, TestCiRcaHardBlock, TestPreflightReportDisputeKey. ci_rca_signals:
    TestCiRcaLivenessAlert, TestConvergenceRcaGapAlert, TestFetchCiRcaRecs, TestDeriveCiRcaClosed,
    TestDeriveCiRcaDisputeOpen, TestFetchCiRcaDisputeRecs, TestPrintCiRcaDisputeRecs,
    TestFetchCiRcaUndeterminedRecs. correlation: TestCiRcaCorrelation, TestPrintCiRcaRecsWithCorrelation,
    TestCorrelateRecsWithCommits, TestSurfaceQueueRelevanceTriage. ci_rca_gauges: TestAbstentionGauge,
    TestCiRcaTelemetrySection, TestCiRcaBackValidationSection.
