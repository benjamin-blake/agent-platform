  - docs/PROJECT_CONTEXT.md read
  - docs/DECISIONS.md reviewed via the decision-scout fresh-context gate (Decisions 92/94/77/83/84/79/76/72/55 cited)
  - All six scope files located and readable; the T2.20 substrate (terraform-apply-sandbox.yml + oidc.tf + the bootstrap github_ci_apply.tf convergence grant) and the github_ci_plan template (T2.21) read in full
  - Convergence-write authorization model confirmed per-role (no bucket-policy gate)
  - Acceptance criteria understood and each independently verifiable
  - Human-gated apply path for the new role confirmed (gated-apply Environment or agent_platform_admin), to precede the first scheduled run
execution_steps:
  - >-
    terraform/personal/oidc.tf: add aws_iam_role.github_ci_drift + aws_iam_role_policy.github_ci_drift.
    Trust: mirror github_ci_branch (StringEquals aud + StringLike sub repo:${local.github_repo}:ref:refs/heads/main).
    Policy: s3:GetObject on tfstate/personal/*; s3:PutObject+DeleteObject scoped to the EXACT key
    tfstate/personal/sandbox/terraform.tfstate.tflock; s3:GetObject+PutObject on convergence/personal/*
    (joining the apply identity); lambda:InvokeFunctionUrl on the ducklake_writer URL ONLY;
    ListBucket/GetBucketLocation + the SAME refresh-time READ surface github_ci_plan/github_ci_apply use
    during plan (glue / dynamodb Describe* / lambda Get*+List* / events / sns / cloudwatch / ssm on
    /agent-platform/* / secretsmanager on Neon+tfvars / logs / the iam read-quartet / athena). Explicitly
    NO write on the state object, NO convergence DELETE, NO tfplan, NO DeleteObject beyond the .tflock
    key, NO resource mutation, NO IAM. Update the github_ci_branch DenyConvergenceRecordWrite comment to
    name {apply, drift} as the sanctioned writer set. Run terraform -chdir=terraform/personal fmt + validate.
  - >-
    config/agent/data_quality/source_registry.yaml: add a tf_drift entry (canonical_id: tf_drift;
    description: scheduled Terraform drift detector that runs terraform plan against sandbox and flips the
    convergence record on a state-vs-code delta; signal_interpretation: a green->red convergence flip from
    out-of-band infra drift -- volume tracks how often real infra diverges from code; added_date:
    '2026-06-24'). Confirm validate_source('tf_drift') passes.
  - >-
    Create .github/workflows/terraform-drift.yml: schedule cron '17 * * * *' + workflow_dispatch; own
    concurrency group terraform-drift (cancel-in-progress: false); permissions id-token: write +
    contents: read; configure-aws-credentials -> agent-platform-github-ci-drift (continue-on-error; gate
    later steps on the step outcome); read config/terraform-version; setup-terraform (wrapper false) +
    setup-python; materialise tfvars from Secrets Manager (mask + non-empty assert; reuse the apply job's
    split-on-first-'=' masking); terraform init with the bounded transient-5xx retry loop (parity with
    validate.py); read the current convergence record status (s3 cp; parse .status -> prior_status);
    terraform plan -detailed-exitcode -lock=true -lock-timeout=120s -input=false -var-file=... capturing
    the exit code AND stderr. Branch: ec=0 no-op; ec=2 drift; ec=1 -> if stderr matches "Error acquiring
    the state lock" skip-this-cycle (exit 0, no alarm) else genuine error (exit 1, fail loud, no rec / no
    red). On drift (ec=2) AND prior_status != "red": merge-write the record (preserve fields; set
    status=red + a drift reason marker + run_url + detected_at) THEN file the rec (bin/venv-python -m
    scripts.ops_data_portal --file-rec --source tf_drift --priority High --effort S --risk medium
    --verification-tier V2 --title/--context/--acceptance; note --priority is capitalized and
    --effort/--risk/--title/--context/--acceptance are required by the CLI), both fail-loud. On drift AND
    prior_status == "red": log "already red; not re-alarming" and exit 0.
    NO terraform apply step anywhere.
  - >-
    terraform/CLAUDE.md: add an "alarm-only scheduled drift detection (T2.24 / Wave 5)" section -- the
    hourly cron, the exit-code semantics (0 / 2 / 1+lock-skip), native-lock coexistence, the
    green->red-only red-flip dedup, drift-files-via-ops-portal-not-ci-rca, and the dispatch-ack recovery;
    update the convergence writer-set language to {apply, drift}.
  - >-
    terraform/bootstrap/github_ci_apply.tf: comment-only accuracy fix on the ConvergenceRecordWrite
    statement ("the apply identity is the ONLY writer" -> "the apply identity is A writer; the T2.24
    drift identity github_ci_drift joins at Wave 5"). Zero terraform plan diff.
  - >-
    docs/ROADMAP-PLATFORM.yaml: re-ground T2.24 files_in_scope (add terraform/personal/oidc.tf +
    config/agent/data_quality/source_registry.yaml with inline comments; reclassify
    scripts/ops_data_portal.py as invoked-not-modified) and, on completion, advance T2.24 status from
    not_started with a closeout note.
  - >-
    Execute the Verification Plan: run pre-deploy steps 1-5 now; loop until each passes. Then the
    human-gated apply of github_ci_drift (gated-apply Environment or agent_platform_admin); then
    post-deploy steps 6-11. On an unrecoverable V3 failure STOP and run RCA (Decision 55) -- do not add a
    workaround.
  - >-
    Report: what changed in each of the six files, the pre-deploy verification results, and the
    post-deploy results (or the explicit hand-off if the gated apply / dispatch tests are pending).
work_areas: []
rollback: >-
  Delete .github/workflows/terraform-drift.yml (the scheduled detector stops immediately). The
  github_ci_drift role is removed by deleting its two resources from terraform/personal/oidc.tf and
  applying via the human-gated path (role deletion is guard-BLOCKED -> human-gated, as intended); it is
  inert once the workflow is gone (assumable by nothing). Revert the source_registry.yaml entry ONLY
  after confirming no open tf_drift recs reference it (validate_source is exact-match -- removing it
  while a tf_drift rec is open would break that rec's write-time validation on update; prefer leaving the
  registry entry). The comment edits and the roadmap re-grounding are plain reverts. Convergence-record
  writes by drift are identical in shape to apply writes -- no schema migration to reverse. No data-plane
  change; rollback is low-risk.
