rollback: >-
  Code is forward-fixable (revert the PR). The physical ALTER TABLE ADD COLUMN intent is additive and
  non-destructive (reconcile_columns never DROPs); leaving the column in place is harmless if the code
  reverts. SCD2 history is append-only -- a bad backfill run is corrected by a subsequent good backfill
  (the content_hash gate makes re-runs differential), never by deleting rows. The decision-entry Intent
  marker is optional, so reverting it strands no authored entry (a pre-existing **Intent:** simply stops
  being extracted).
