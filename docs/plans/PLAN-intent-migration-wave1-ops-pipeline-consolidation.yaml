execution_steps:
  - >-
    Delete docs/INTENT-ops-pipeline-consolidation.md (`git rm docs/INTENT-ops-pipeline-consolidation.md`).
  - >-
    In docs/intent-migration/MANIFEST.yaml, flip the ops-pipeline-consolidation documents[]
    entry's disposition_state from pending to done. Change ONLY that one field.
  - >-
