schema_version: 1
slug: "intent-migration-wave1-ops-pipeline-consolidation"
intent: >-
  Advance platform tier T5.5 (INTENT-doc extract-and-retire) by retiring the second WAVE-1
  document, docs/INTENT-ops-pipeline-consolidation.md, whose recommended architecture (the
  single agent-facing ops API: file_rec / update_rec / sync, plus its primitive fixes) has
  already graduated into the live closed-boundary model under Decision 84 -- shrinking the prose
  drift surface so agents read architectural intent from the canonical machine-parseable
  surfaces (Decisions + roadmap), per Decision 86 and the agent-first North Star. The third
  WAVE-1 doc (ducklake-consolidation) is deferred: its Phase-4 telemetry intent is in-flight on
  tier_item T2.26 (in_progress), exactly as the bazel pilot deferred it.
plan_type: IMPLEMENTATION
verification_tier: V1
plan_path: docs/plans/PLAN-intent-migration-wave1-ops-pipeline-consolidation.yaml
phase: >-
  Platform tier T5.5 (INTENT-* document extraction and retirement); WAVE-1 of
  docs/intent-migration/MANIFEST.yaml (feasibility_graduated -> delete_pointer).
scope:
  - file: docs/INTENT-ops-pipeline-consolidation.md
    action: Delete
    purpose: >-
      Retire the graduated incident-analysis / planning-context doc. Its decision-relevant
      content lives in the live system: the recommended three-operation agent API
      (file_rec / update_rec / sync) and its primitive fixes (update_rec reads source-of-truth
      not a destructible cache; loud-fail over swallowed errors; a single sync flush) ARE the
      Decision 84 closed reader-writer boundary; the 2026-05-09 incident root-cause is preserved
      in archived Decision 69 (docs/DECISIONS_ARCHIVE.md, superseded by Decision 78) and the
      exhaustive incident chain remains recoverable in git history, per the delete_pointer
      archetype. Content-block capture verified (no new add): MANIFEST block "Recommended
      architecture" -> Decision 84 (single portal / closed boundary); MANIFEST block "Decisions
      the planner will need to make" -> all five resolved or moot under Decision 84 (compaction
      trigger / DynamoDB-as-read-source / internal-CLI migration / cache-rebuild / incident
      recovery), so no residual open question is filed.
  - file: docs/intent-migration/MANIFEST.yaml
    action: Modify
    purpose: >-
      Flip the ops-pipeline-consolidation documents[] entry disposition_state from pending to
      done (line ~308). This auto-shrinks the validate.py intent-doc-freeze guard's allowed set
      (the guard derives the allowed set from entries with disposition_state != done). Change
      ONLY that one field; leave content_blocks / drift_findings / primary_targets /
      related_decisions intact as the disposition record. Do NOT touch the ducklake-consolidation
      entry (stays pending -- deferred) or any other entry.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Inbound-reference sweep of a LIVE canonical surface: remove the
      `- docs/INTENT-ops-pipeline-consolidation.md` line from tier_item T5.5 files_in_scope
      (line ~6639) so the deleted path is not a dangling reference and the T5.5 final INTENT-
      grep stays clean. LEAVE CD.10's `supersedes_intents: [ops-pipeline-consolidation]`
      (line ~468) untouched -- it is bare-slug retirement metadata, explicitly "not a reference"
      per ROADMAP line 149, and does not contain the INTENT- token. Touch no other line.
  - file: docs/DECISIONS_ARCHIVE.md
    action: Modify
    purpose: >-
      Inbound-reference sweep of the archived Decision 69 (Ops Pipeline Consolidation, status
      Superseded by Decision 78). Reword its Problem-section path token (line ~14) to drop
      `docs/INTENT-ops-pipeline-consolidation.md` while preserving the git-archaeology anchor
      ("root-cause analysis recoverable in git history"). Reference repoint ONLY -- no change to
      the decision's status, date, problem substance, decision body, supersession link, or
      heading. This keeps the archive from dangling a path to the deleted doc (the live
      DECISIONS.md holds no such reference; Decision 84's Related line cites the ducklake doc, not
      this one, and is untouched).
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - docs/INTENT-ops-pipeline-consolidation.md no longer exists on disk.
  - >-
    The MANIFEST ops-pipeline-consolidation documents[] entry has disposition_state: done, and it
    is the only entry flipped to done this wave; every other documents[] entry (including
    ducklake-consolidation, which stays pending) is unchanged.
  - >-
    The validate.py intent-doc-freeze guard (validate_intent_doc_freeze) produces no failure
    naming ops-pipeline-consolidation when run against the post-change tree.
  - >-
    Neither live canonical surface (docs/ROADMAP-PLATFORM.yaml, docs/DECISIONS_ARCHIVE.md) contains
    the path docs/INTENT-ops-pipeline-consolidation.md after the sweep.
  - >-
    CD.10's supersedes_intents: [ops-pipeline-consolidation] retirement metadata is preserved
    (bare-slug provenance is intentionally retained, per ROADMAP line 149).
  - >-
    Repo-wide, the only remaining occurrences of the path TOKEN
    docs/INTENT-ops-pipeline-consolidation.md are the historical plan artifact
    docs/plans/PLAN-ops-pipeline-consolidation.md and this plan's own YAML
    (docs/plans/PLAN-intent-migration-wave1-ops-pipeline-consolidation.yaml, which quotes the token in
    its prose) -- point-in-time records, not live references. The other historical plans
    PLAN-cc-scheduled-agents-phase-3.md and PLAN-fix-ci-harness.md carry only the bare slug
    ops-pipeline-consolidation (not the full path token), so they do NOT match the path grep.
  - >-
    Archived Decision 69 retains its status (Superseded by Decision 78), date, problem substance,
    decision body, and heading; only the deleted-path token is reworded.
  - tier_item T5.5 files_in_scope no longer lists docs/INTENT-ops-pipeline-consolidation.md.
  - Full `bin/venv-python -m scripts.validate` exits 0 (credential-gated checks may report SKIPPED in degraded mode).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Confirm the INTENT doc is deleted from the working tree.
    command: test ! -f docs/INTENT-ops-pipeline-consolidation.md && echo DELETED || echo PRESENT
    expected: Prints DELETED.
    fix_if: >-
      Prints PRESENT -- the file still exists. Ensure `git rm docs/INTENT-ops-pipeline-consolidation.md`
      ran (or `rm` + `git add -A`).
  - step: 2
    phase: pre-deploy
    action: Confirm the MANIFEST ops-pipeline-consolidation entry is flipped to disposition_state done.
    command: |-
      grep -A20 '^  - id: ops-pipeline-consolidation$' docs/intent-migration/MANIFEST.yaml | grep -m1 'disposition_state:'
    expected: "Prints a line whose value is `disposition_state: done`."
    fix_if: >-
      Prints `disposition_state: pending` (or nothing) -- flip ONLY the ops-pipeline-consolidation
      entry's disposition_state field to done; do not touch other entries.
  - step: 3
    phase: pre-deploy
    action: Confirm the ducklake-consolidation entry was NOT touched (stays pending -- deferred).
    command: |-
      grep -A20 '^  - id: ducklake-consolidation$' docs/intent-migration/MANIFEST.yaml | grep -m1 'disposition_state:'
    expected: "Prints `disposition_state: pending` (the deferred WAVE-1 doc is untouched)."
    fix_if: >-
      Prints `disposition_state: done` -- you flipped the wrong / an extra entry. Revert the
      ducklake-consolidation entry to pending; only ops-pipeline-consolidation flips this wave.
  - step: 4
    phase: pre-deploy
    action: Run the real intent-doc-freeze guard against the post-change tree; confirm no ops-pipeline false-positive.
    command: |-
      bin/venv-python -c "import scripts.validate as v; f=[]; v.validate_intent_doc_freeze(f); print('PASS' if not any('ops-pipeline-consolidation' in x for x in f) else 'FAIL:'+str(f))"
    expected: Prints PASS (the file is gone and its manifest entry is done, so the guard emits no failure for it).
    fix_if: >-
      Prints FAIL -- the guard flags ops-pipeline (the file is still on disk but no longer in the
      allowed set, or the manifest flip did not land). Ensure BOTH the file is deleted AND the
      manifest entry is done (the two must land together).
  - step: 5
    phase: pre-deploy
    action: Inbound-reference sweep -- confirm the two LIVE canonical surfaces hold no path reference.
    command: |-
      grep -rn "INTENT-ops-pipeline-consolidation.md" docs/ROADMAP-PLATFORM.yaml docs/DECISIONS_ARCHIVE.md; echo "grep_exit=$?"
    expected: No matching lines printed; trailing line reads grep_exit=1 (grep found nothing).
    fix_if: >-
      Any line prints (grep_exit=0) -- a live path reference remains. Reword/remove it:
      ROADMAP-PLATFORM.yaml T5.5 files_in_scope line ~6639, DECISIONS_ARCHIVE.md Decision 69 line ~14.
  - step: 6
    phase: pre-deploy
    action: Confirm CD.10's bare-slug retirement metadata survived (must NOT be swept).
    command: |-
      grep -n "supersedes_intents: \[ops-pipeline-consolidation\]" docs/ROADMAP-PLATFORM.yaml
    expected: Prints one line (~468) -- the intentional retirement-metadata provenance is preserved.
    fix_if: >-
      No line prints -- the sweep wrongly removed retirement metadata. Restore
      `supersedes_intents: [ops-pipeline-consolidation]` on CD.10 (ROADMAP line 149 declares it not a reference).
  - step: 7
    phase: pre-deploy
    action: Inbound-reference sweep -- confirm only the intended historical residue remains repo-wide.
    command: |-
      grep -rl "INTENT-ops-pipeline-consolidation.md" . --include=*.md --include=*.yaml --include=*.py | sort
    expected: >-
      Exactly two paths -- ./docs/plans/PLAN-ops-pipeline-consolidation.md (historical artifact) and
      ./docs/plans/PLAN-intent-migration-wave1-ops-pipeline-consolidation.yaml (this plan's own YAML,
      which quotes the path token in its prose). NEITHER docs/ROADMAP-PLATFORM.yaml NOR
      docs/DECISIONS_ARCHIVE.md appears; the deleted INTENT doc itself does not appear. The bare-slug-only
      historical plans PLAN-cc-scheduled-agents-phase-3.md / PLAN-fix-ci-harness.md do NOT match this
      path grep.
    fix_if: >-
      docs/ROADMAP-PLATFORM.yaml or docs/DECISIONS_ARCHIVE.md appears -- a live surface still dangles
      (re-do step 5's sweep). An unexpected new path appears -- investigate it before proceeding; do
      not blanket-edit historical plan artifacts.
  - step: 8
    phase: pre-deploy
    action: Confirm archived Decision 69 kept its supersession status after the reword.
    command: |-
      grep -n "Superseded by Decision 78" docs/DECISIONS_ARCHIVE.md | head
    expected: At least one line in the Decision 69 block still reads "Superseded by Decision 78".
    fix_if: >-
      No status remains -- the reword stripped the supersession link. Restore it; the edit is a
      path-token repoint only, not a status/substance change.
  - step: 9
    phase: pre-deploy
    action: Confirm the synthetic-fixture guard tests still pass (unaffected by the real manifest flip).
    command: bin/venv-python -m pytest tests/test_validate.py::TestIntentDocFreeze -q
    expected: All TestIntentDocFreeze tests pass (the fixtures build their own temp manifest; the real flip does not touch them).
    fix_if: >-
      A failure -- inspect it; the tests are synthetic and should be flip-independent. Do NOT edit
      the tests to mask a real regression (Decision 55).
  - step: 10
    phase: pre-deploy
    action: Run the authoritative presubmit (CI-equivalent gate).
    command: bin/venv-python -m scripts.validate
    expected: >-
      Exits 0; the "Intent doc freeze (Decision 86)" section reports no failures; the DECISIONS.md /
      DECISIONS_ARCHIVE.md and roadmap schema checks pass (credential-gated DQ checks may report
      SKIPPED in degraded mode).
    fix_if: >-
      Non-zero exit -- read the failing check. Likely causes: malformed YAML after the manifest or
      roadmap edit, or a DECISIONS structural check tripped by the reword. Fix the cited check; do
      not add or remove checks to make it pass.
constraints:
