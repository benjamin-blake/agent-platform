    to this plan's scope).
  - >-
    Content block verification:
    Block 1 "Recommended architecture" -> Decision 84 (I-1 single backend, I-2 writer-owned
    keyspace, I-3 named-verb boundary, I-4 no write buffering). Three-function API (file_rec,
    update_rec, sync) and primitive fixes are all live.
    Block 2 "Decisions the planner will need to make" -> All 5 resolved by Decision 78/84:
    (1) compaction trigger -- DuckLake atomic commits; (2) DynamoDB read source -- DuckLake
    writer-owned keyspace; (3) CLI migration -- I-4 hard-removed drain/pull; (4) cache
    rebuild -- I-3 named-verb boundary; (5) incident recovery -- historical, done.
  - >-
    Inbound-reference inventory:
    LIVE to remove: docs/ROADMAP-PLATFORM.yaml T5.5 files_in_scope line ~6639.
    LEAVE: docs/plans/PLAN-ops-pipeline-consolidation.md (historical plan artifact).
    NO path reference found in docs/DECISIONS.md (confirmed by grep at plan time).
  - >-
    WAVE-1 gate "WAVE-0 complete" holds: Decision 86 is Decided and the validate.py
    intent-doc-freeze guard is wired (WAVE-0 shipped 2026-06-12). WAVE-1 has NO cross_wave_gate.
  - >-
    Decision-scout gate: NO_FLAGS. CITE Decision 86 + Decision 84.
pre_implementation_checklist:
  - Branch confirmed not on main (claude/intent-migration-ops-consolidation-q2xe2l)
  - docs/INTENT-ops-pipeline-consolidation.md read in full
