    re-order any archive entry.
  - >-
    Do NOT sweep CD.10's supersedes_intents: [ops-pipeline-consolidation] (ROADMAP line ~468). It is
    intentional bare-slug retirement metadata (ROADMAP line 149: "retirement metadata ... are not
