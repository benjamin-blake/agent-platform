    preservation forbids new gate tests here beyond the facade/interception tests."
  - "Decision-scout NOTE 1 (Decision 104 coverage-mapping clause) -- resolution: deliberate,
    recorded deviation. The ratified precedent extended map_source_to_test for scripts/checks/**;
    this plan does NOT extend it for scripts/ducklake_smoke/** because (a) the checker is a
    SHARED file across ~16 sibling decomposition plans on this branch (edit collision), (b) the
