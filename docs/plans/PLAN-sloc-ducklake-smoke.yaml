    rec under the rec-2414 program to extend the mapping for all decomposition packages at once."
  - "Decision-scout NOTE 2 (Decision 48 V2 standard vs inert coverage gate) -- resolution: V2 is
    declared on the deterministic classifier (pure Python, no external integration; Decision 79
    compute_affected_artifacts([]) == empty verified -- not Lambda-packaged, no deploy leg); the
    plan states coverage is preserved-not-improved. Recommended follow-up (orchestrator
    decision): file the path-form --cov invocation quirk in scripts/test_coverage_checker.py as
    a rec via the ops portal -- it silently no-ops the coverage floor for ALL scripts/ files and
    predates this plan."
  - "Rec disposition: rec-2414 (open umbrella, 'Break down SLOC-budget-registered oversized
    files below 500 SLOC') is the parent program -- cited, NOT bundled (this plan satisfies one
    slice of ~16). rec-2093 (OCC marker set), rec-2097 (CHURN_WRITES_PER_WRITER semantics),
    rec-2098 (EC8 label wording) are open BEHAVIORAL changes against this file -- explicitly out
    of scope (byte-stable refactor); their target symbols move but their reproduction surfaces
