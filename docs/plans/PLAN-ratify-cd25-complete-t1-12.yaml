schema_version: 1
slug: "ratify-cd25-complete-t1-12"
intent: >-
  Complete platform tier_item T1.12 (Ratify Class B Lambda verb contracts) by ratifying candidate
  decision CD.25 -- the pre-codegen contract ratification ritual and the sole completion gate on
  T1.12's last open criterion -- via the shared candidate-decision ratification lane, then closing
  T1.12's five open exit criteria and flipping it to complete. This lands the public-surface keystone
  of the agent platform's self-describing, drift-checked typed-verb contract discipline (North Star
  NS.4/NS.5).
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-ratify-cd25-complete-t1-12.yaml
phase: >-
  Platform tier T1 (tier_item T1.12; follow-on to PLAN-ratify-class-b-lambda-verb-contracts). Ratifies
  CD.25 via the Decision 105 lane. Product Phase 1 Core Infrastructure (complete).
closes_criteria:
  - "T1.12:c1"
  - "T1.12:c2"
  - "T1.12:c3"
  - "T1.12:c4"
  - "T1.12:c5"
scope:
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Add Decision 118 (dec-118) -- "Ratify CD.25 -- pre-codegen contract ratification ritual (scoped,
      necessary not sufficient)". The verbatim text is in execution_steps; scoped to the realized
      ritual with reversal conditions.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      (1) Flip CD.25 to the canonical ratified shape (state: ratified + ratified_as: dec-118 +
      filed_via: ops_decisions:dec-118 + realization_evidence). (2) Flip T1.12 exit_criteria c1-c5
      open -> met (with met_by) and status in_progress -> complete + completed_at + progress_note.
      (3) Discharge the CD.25-scoped bootstrap_completion_exempt subset: strip the flag on the 10
      members gated solely by CD.25, retain it (with a note) on T0.12.5 (pending CD.29) and T0.12.7
      (pending CD.10), and rewrite the scope-(b) "STAYS OPEN" agent_instructions annotation.
  - file: docs/plans/PLAN-ratify-cd25-complete-t1-12.yaml
    action: Create
    purpose: This planning artefact.
bundled_recommendations: []
infrastructure_dependencies: []
acceptance_criteria:
  - "c1: The three DuckLake Lambda verb contracts (ducklake_writer, ducklake_reader, ducklake_maintenance) still load as class B, contract_version 1, status provisional_v0."
  - "c2: Each contract's re_ratification_trigger.first_of parses via scripts.contracts_enforcement (check_re_ratification_trigger returns no errors; evaluate_provisional_trigger fires at high metrics, unfired at empty metrics)."
  - "c3: Each contract's verbs map is a subset of the live handler _ACTIONS dispatch surface AND the CD.25 contract-drift gate (validate_contract_drift) passes with no drift."
  - "c4: The Step 10 multi-perspective critique convergence on the three contract deliverables is recorded (met by the prior authoring plan PLAN-ratify-class-b-lambda-verb-contracts)."
  - "c5: CD.25 is ratified -- docs/DECISIONS.md carries a `## Decision 118:` header, CD.25 in docs/ROADMAP-PLATFORM.yaml has state: ratified + ratified_as: dec-118 + filed_via: ops_decisions:dec-118, the validate_candidate_decision_ratification referential guard passes, and T1.12 status is complete with c1-c5 all status: met."
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Confirm the three Class B contracts still hold the c1/c2/c3-substrate invariants -- class B / v1 / provisional_v0, triggers parse and fire correctly, and every documented verb is in the live handler _ACTIONS dispatch table.
    command: |
      bin/venv-python - <<'PY'
      from scripts.contracts import load_contract
      from scripts.contracts_enforcement import check_re_ratification_trigger, evaluate_provisional_trigger
      import importlib, pathlib
      src = pathlib.Path("docs/contracts")
      surfaces = {
          "ducklake_writer": ("src.lambdas.ducklake_writer.handler", {"file_ops", "update_ops", "write_ops", "create_ops_tables"}),
          "ducklake_reader": ("src.lambdas.ducklake_reader.handler", {"read_ops_current", "read_ops_history", "named_read", "query_ops"}),
          "ducklake_maintenance": ("src.lambdas.ducklake_maintenance.handler", {"merge", "gc", "hot_merge", "merge_ops", "catalog_reinit", "restore_drill", "catalog_stats", "reconcile_columns"}),
      }
      hi = {"production_invocations": 10**9, "days_since_first_production_invocation": 10**9}
      for name, (mod, documented) in surfaces.items():
          d = load_contract(src / f"{name}.yaml")
          assert d.contract.class_.value == "B" and d.contract.contract_version == 1, name
          assert d.contract.status.value == "provisional_v0", name
          assert check_re_ratification_trigger(d) == [], (name, check_re_ratification_trigger(d))
          assert evaluate_provisional_trigger(d, {})[0] is False, name
          assert evaluate_provisional_trigger(d, hi)[0] is True, name
          assert set(d.verbs) == documented, (name, set(d.verbs) ^ documented)
          live = set(importlib.import_module(mod)._ACTIONS)
          assert documented <= live, (name, documented - live)
          print("OK", name, len(d.verbs), "verbs subset of live dispatch")
      PY
    expected: Three "OK <name> <n> verbs subset of live dispatch" lines and exit 0.
    fix_if: An AssertionError -- a contract lost its Class B shape, a trigger stopped parsing, or a documented verb is no longer in the live handler. Do NOT edit the handler to match; correct the contract only if the code surface genuinely changed.
  - step: 2
    phase: pre-deploy
    action: Run the CD.25 contract-drift gate over docs/contracts/ (c3 gate side).
    command: |
      bin/venv-python -c "from scripts.checks.contracts.validate_contract_drift import validate_contract_drift; f=[]; validate_contract_drift(f); assert not f, f; print('DRIFT GATE PASS')"
    expected: Prints the gate PASS banner and "DRIFT GATE PASS"; exit 0.
    fix_if: Any drift failure (cat-1 structural or cat-2..8) -- fix the offending contract's amendment_log / status / $ref and re-run.
  - step: 3
    phase: pre-deploy
    action: Confirm Decision 118 is authored in docs/DECISIONS.md and CD.25 carries the canonical ratified shape with agreeing ratified_as / filed_via (c5 -- the ratification landed).
    command: |
      bin/venv-python - <<'PY'
      import re, yaml, pathlib
      dec = pathlib.Path("docs/DECISIONS.md").read_text()
      assert re.search(r"^## Decision 118:", dec, re.M), "dec-118 header missing"
      d = yaml.safe_load(pathlib.Path("docs/ROADMAP-PLATFORM.yaml").read_text())
      cd = next(c for c in d["candidate_decisions"] if c["id"] == "CD.25")
      assert cd["state"] == "ratified", cd["state"]
      assert cd["ratified_as"] == "dec-118", cd.get("ratified_as")
      assert cd["filed_via"] == "ops_decisions:dec-118", cd.get("filed_via")
      assert cd.get("realization_evidence"), "realization_evidence missing"
      print("OK dec-118 authored; CD.25 ratified shape coherent")
      PY
    expected: Prints 'OK dec-118 authored; CD.25 ratified shape coherent' and exits 0.
    fix_if: A missing header, a state/ratified_as/filed_via mismatch, or absent realization_evidence -- the ratification bookkeeping is incomplete; fix DECISIONS.md / the CD.25 block. (If a concurrent PR claimed 118, use the next free number consistently across the header, ratified_as, and filed_via.)
  - step: 4
    phase: pre-deploy
    action: Confirm T1.12 is complete with all five criteria met and the roadmap loads through the Pydantic model (c5 -- the tier-item bookkeeping; also proves CD.25 is no longer a pending blocker).
    command: |
      bin/venv-python - <<'PY'
      from scripts.platform_roadmap import load
      d = load("docs/ROADMAP-PLATFORM.yaml")
      it = next(i for i in d.tier_items if i.id == "T1.12")
      assert it.status == "complete", it.status
      assert it.completed_at, "completed_at missing"
      crit = {c.id: c.status for c in it.exit_criteria}
      for cid in ("c1", "c2", "c3", "c4", "c5"):
          assert crit.get(cid) == "met", (cid, crit.get(cid))
      cd = next(c for c in d.candidate_decisions if c.id == "CD.25")
      assert cd.state == "ratified", cd.state
      print("OK T1.12 complete; c1-c5 met; CD.25 ratified; roadmap loads")
      PY
    expected: Prints 'OK T1.12 complete; c1-c5 met; CD.25 ratified; roadmap loads' and exits 0.
    fix_if: A Pydantic ValidationError, a criterion still open, a missing met_by (validate_platform_roadmap rule (i) -- met_by must resolve to a real PLAN-<slug>.yaml), or status not complete -- correct the T1.12 block.
  - step: 5
    phase: pre-deploy
    action: Confirm the CD.25-scoped bootstrap_completion_exempt discharge is correct -- stripped on the 10 solely-CD.25-gated members, retained on the two co-gated members, and the scope-(b) annotation no longer says "STAYS OPEN".
    command: |
      bin/venv-python - <<'PY'
      import yaml, pathlib
      raw = pathlib.Path("docs/ROADMAP-PLATFORM.yaml").read_text()
      d = yaml.safe_load(raw)
      items = {i["id"]: i for i in d["tier_items"]}
      stripped = ["T-1.11","T-1.12","T-1.13","T-1.14","T-1.15","T-1.16","T-1.17","T-1.18","T-1.19","T0.12.6"]
      retained = {"T0.12.5", "T0.12.7"}
      for tid in stripped:
          assert not items[tid].get("bootstrap_completion_exempt", False), f"{tid} still exempt"
      for tid in retained:
          assert items[tid].get("bootstrap_completion_exempt") is True, f"{tid} lost its retained flag"
      assert "STAYS OPEN (close-audit-ulf-02" not in raw, "stale scope-(b) STAYS OPEN annotation not updated"
      assert "dec-118" in raw, "scope-(b) annotation not re-grounded onto dec-118"
      print("OK exemption discharge correct; annotation updated")
      PY
    expected: Prints 'OK exemption discharge correct; annotation updated' and exits 0.
    fix_if: A stripped member still exempt, a retained member lost its flag, or the stale "STAYS OPEN" annotation survives -- correct the scope-(b) discharge edit.
  - step: 6
    phase: pre-deploy
    action: Confirm the ratified Decision reached the ops_decisions warehouse projection via the portal (behavioural read-back; the git-tracked DECISIONS.md header + guard in steps 3/7 are the authoritative gate).
    command: bin/venv-python -m scripts.ops_data_portal --sync && bin/venv-python -c "import json,pathlib; rows=[json.loads(l) for l in pathlib.Path('logs/.decisions-index.jsonl').read_text().splitlines() if l.strip()]; ids={r.get('decision_id') or r.get('id') for r in rows}; assert 'dec-118' in ids, sorted(i for i in ids if str(i).startswith('dec-11'))[-5:]; print('OK dec-118 in ops_decisions projection')"
    expected: Prints 'OK dec-118 in ops_decisions projection' and exits 0.
    fix_if: dec-118 absent after sync -- re-run `bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md`. If AWS creds are unavailable (degraded mode; verify `aws sts get-caller-identity --profile agent_platform`), this warehouse read-back is SKIPPED -- the git-tracked header + referential guard remain the authoritative ratification proof; re-file the backfill once connectivity is restored.
  - step: 7
    phase: pre-deploy
    action: Run the fast presubmit tier over the working tree -- integrates the CD.25 drift gate, the validate_candidate_decision_ratification referential guard (R1 -- dec-118 header resolves; ratified_as/filed_via NNN agree), the platform-roadmap criteria-integrity guard (closes_criteria refs + met_by resolution), and the Decision 86 intent-doc-freeze gate.
    command: bin/venv-python -m scripts.validate --pre
    expected: Exit 0; the Contract drift gate (CD.25), platform-roadmap schema validation, and candidate-decision ratification guard all PASS.
    fix_if: Any FAIL line -- most likely the referential guard (dec-118 header vs ratified_as/filed_via mismatch) or the roadmap criteria integrity (a closes_criteria ref or met_by that does not resolve). Fix the named artefact and re-run.
  - step: 8
    phase: pre-deploy
    action: Validate this plan artefact against the PlanDocument schema.
    command: bin/venv-python -m scripts.plan_document docs/plans/PLAN-ratify-cd25-complete-t1-12.yaml
    expected: A PASS line stating docs/plans/PLAN-ratify-cd25-complete-t1-12.yaml validates against the PlanDocument schema.
    fix_if: A "FAIL:" line naming the schema violation -- correct the plan field and re-run.
