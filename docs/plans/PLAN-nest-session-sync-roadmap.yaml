schema_version: 1
slug: "nest-session-sync-roadmap"
intent: >-
  Nest three grandfathered scripts/ prefix families -- session_* (3), sync_* (3), and the
  roadmap/plan tooling group (6) -- from the scripts/ root into scripts/session/, scripts/sync/,
  and scripts/roadmap/ subpackages (git mv + __init__.py) with a single same-commit repo-wide
  reference rewrite and no import shims. Phase 2 of 3 of audit finding RS-01: converts the scripts/
  root's largest remaining predictability gap into the proven scripts/ci_rca//checks//executor/
  subpackage pattern so agents locate session, sync, and roadmap code by home, not by scanning flat
  filenames. rec-164 Phase A territory.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-nest-session-sync-roadmap.yaml
phase: >-
  Repository-structure restructure Phase P4b (audit finding RS-01 [medium], phase 2 of 3, from
  audits/repository-structure-cb02572.yaml RS-01 + proposed_target_tree scripts/{session,sync,roadmap}/
  nodes). Runs AFTER P1 (RS-04 file-router registry + validate_placement link-validity check), P2
  (RS-02/03 stray consolidation), P3 (RS-05 context-locality scripts/CLAUDE.md carries the
  root-vs-subpackage rule), and P4a (nest ci_rca_* -> scripts/ci_rca/, the proven pattern) -- all
  merged at origin/main f119383. Platform axis; RS-01 is planned-insufficient via open rec-164.
  IMPLEMENTATION type (STRATEGIC frozen + >5-file heuristic suspended, Decision 67). rec-164 does
  NOT close here -- it closes at RS-01 phase 3.
