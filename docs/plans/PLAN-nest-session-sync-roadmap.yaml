    Create the three packages with one-line docstring markers (coverage-excluded), e.g.:
      scripts/session/__init__.py  -> """scripts.session -- preflight/postflight/metrics session automation subpackage (RS-01 / rec-164 Phase A)."""
      scripts/sync/__init__.py     -> """scripts.sync -- ops/recommendations/ducklake_version cache-sync subpackage (RS-01 / rec-164 Phase A)."""
      scripts/roadmap/__init__.py  -> """scripts.roadmap -- roadmap + plan-artefact tooling subpackage (RS-01 / rec-164 Phase A)."""
  - |
    Move the 12 modules with git mv (preserves history):
      for m in preflight postflight metrics; do git mv "scripts/session_$m.py" "scripts/session/$m.py"; done
      for m in ops recommendations ducklake_version; do git mv "scripts/sync_$m.py" "scripts/sync/$m.py"; done
      for m in platform_roadmap product_roadmap product_roadmap_schema plan_document plan_audit find_plan; do git mv "scripts/$m.py" "scripts/roadmap/$m.py"; done
  - |
    Apply the anchored reference rewrite with a Python re.sub sweep (NOT plain sed -- needs \b + per-name mapping).
    Build a RENAME dict (old flat name -> new dotted suffix): session_preflight->session.preflight,
    session_postflight->session.postflight, session_metrics->session.metrics, sync_ops->sync.ops,
    sync_recommendations->sync.recommendations, sync_ducklake_version->sync.ducklake_version, and the 6 roadmap
    names -> roadmap.<same_name>. Apply THREE \b-anchored patterns over the EXPLICIT live-file list (the Scope
    Modify/Create rows -- moved modules at their NEW paths, non-moving importers, config, file-router,
    ARCHITECTURE-WORKFLOW, .claude/ commands+skills, AGENTS.md, .github/instructions, bin, EVALUATION-PROMPTS,
    and the ~30 test files) and NO other file:
      1. r"\bscripts\.(NAMES)\b"          -> "scripts." + RENAME[name]                (dotted: -m, from-import target, import, @patch)
      2. r"\bscripts/(NAMES)\.py\b"        -> "scripts/" + RENAME[name].replace(".","/") + ".py"   (path form)
      3. r"\bfrom scripts import (NAMES)\b" -> for roadmap: "from scripts.roadmap import NAME";
                                              for session/sync: "from scripts.<pkg> import <short> as NAME"  (alias to preserve binding)
    NAMES = the 12 names joined by | sorted longest-first. DO NOT include platform_roadmap_gate_rules/_models/_state,
    config/ci_rca_taxonomy.yaml-style non-modules, or the bare AGENTS.md "sync_ops" prose (handle those two bare
    mentions by hand). After the sweep run `ruff check --fix` on the edited Python to catch F401/PLC0414.
  - |
