    metrics} live under scripts/session/, sync_{ops,recommendations,ducklake_version} under scripts/sync/,
    and platform_roadmap/product_roadmap/product_roadmap_schema/plan_document/plan_audit/find_plan under
    scripts/roadmap/ -- each package with an __init__.py. The out-of-scope siblings platform_roadmap_{gate_rules,
    models,state}.py remain at scripts/ root, byte-unchanged versus origin/main.
  - >-
    Prefix rule applied consistently: session_*/sync_* STRIP the family prefix (session.preflight,
    sync.ops, ...); the roadmap family KEEPS full names (scripts.roadmap.platform_roadmap, ...). Every
    `from scripts import sync_ops` binding is preserved via `from scripts.sync import ops as sync_ops`.
  - >-
    The self-referential workflow entrypoints resolve post-move: `bin/venv-python -m scripts.session.preflight`
    runs (the /plan + /implement + /audit + /orient Step-1 entrypoint), `bin/venv-python scripts/roadmap/find_plan.py`
    resolves a PLAN path (the /implement Step-2 resolver), and `scripts/session/postflight.py --pre-commit-sanity`
    self-reinvokes correctly. Every .claude/ command + skill reference is rewritten (no flat form survives there).
  - >-
    The 8 ROOT-anchoring modules resolve repo-root paths post-move (parent.parent -> parent.parent.parent):
    scripts.roadmap.find_plan.ROOT, scripts.roadmap.plan_audit.ROOT, and scripts.session.metrics.ROOT each
