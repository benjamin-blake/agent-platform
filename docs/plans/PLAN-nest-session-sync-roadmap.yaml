  - >-
    Zero flat references remain in LIVE surfaces: a git grep for scripts[./](session_preflight|session_postflight|
    session_metrics|sync_ops|sync_recommendations|sync_ducklake_version|platform_roadmap|product_roadmap|
    product_roadmap_schema|plan_document|plan_audit|find_plan) AND `from scripts import (session_*|sync_*|...)`,
