constraints:
  - IMPLEMENTATION plan type; no recommendations bundled or filed (orchestrator constraint; STRATEGIC + >5-file heuristic suspended per Decision 67 -- authored as one larger IMPLEMENTATION plan).
  - >-
    Do NOT close rec-164 -- it owns the whole RS-01 territory and closes only at RS-01 phase 3. This phase
    moves THREE families (session, sync, roadmap) and leaves the remaining grandfathered families (llm_*,
    ops_*) untouched. No Resolves: trailer.
  - >-
    No import shims, re-export stubs, or compatibility deferred-imports (audit Q6 answer -- the import-linter
    contracts exist precisely to prevent that pattern). The move is a hard same-commit cutover.
  - >-
    Per-name rename mapping (NOT a single family-prefix substitution): session_* and sync_* STRIP the family
    prefix (session_preflight->session.preflight, sync_ops->sync.ops, etc.); the roadmap family KEEPS full
    names (platform_roadmap->roadmap.platform_roadmap, find_plan->roadmap.find_plan, etc.). Build the sweep as
    a re.sub over an explicit per-name mapping (dotted `scripts.NAME`, path `scripts/NAME.py`, AND
    `from scripts import NAME`), names sorted longest-first, each pattern \b-anchored.
  - >-
    Binding preservation: `from scripts import sync_ops` (17 sites, mostly tests/test_sync_ops.py) MUST become
    `from scripts.sync import ops as sync_ops` -- the `as sync_ops` alias keeps the bound name so downstream
    `sync_ops.X` / @patch refs still resolve. The roadmap family keeps its name so `from scripts import
    platform_roadmap` -> `from scripts.roadmap import platform_roadmap` needs NO alias (a redundant
    `as platform_roadmap` would trip ruff PLC0414).
  - >-
    The 8 depth-sensitive modules MUST have Path(__file__)...parent.parent changed to parent.parent.parent:
    session/postflight.py (sys.path bootstrap), session/metrics.py, sync/ops.py, sync/recommendations.py,
    sync/ducklake_version.py, roadmap/plan_document.py (default plans_root), roadmap/plan_audit.py, and
    roadmap/find_plan.py. session/preflight.py, roadmap/platform_roadmap.py, roadmap/product_roadmap.py, and
    roadmap/product_roadmap_schema.py have NO __file__ anchor -- do NOT add one. This is a mandatory
    correctness edit the import rewrite does not provide.
  - >-
    DO-NOT-TOUCH: the out-of-scope siblings scripts/platform_roadmap_gate_rules.py, scripts/platform_roadmap_models.py,
    scripts/platform_roadmap_state.py stay at scripts/ root (not in phase-2 scope). The moved roadmap/platform_roadmap.py
    imports them via absolute `from scripts.platform_roadmap_gate_rules import ...` -- LEAVE those imports unchanged.
    The \b boundary already excludes them from the sweep (the `_` after platform_roadmap defeats \b).
  - >-
    Sweep LIVE surfaces only. Append-only / grandfathered history is LEFT untouched: docs/plans/ (PLAN-*,
    archive/, reports/), audits/ (incl. audits/repository-structure-cb02572.yaml), logs/, docs/DECISIONS.md,
    docs/DECISIONS_ARCHIVE.md, docs/CHANGELOG.md, docs/SESSION_LOG*.md, the grandfathered docs/INTENT-*.md, and
    the EXECUTED docs/audit-prompts/*.md (composed-and-run audit artifacts, P4a precedent). Conversely, these
    ARE live surfaces and ARE swept: the 3 ROADMAP-*.yaml (cosmetic files_in_scope/prose), docs/GETTING_STARTED.md,
    the 3 live docs/contracts/*.yaml (candidate-decision-ratification, exit-criteria-ledger, session-id), and
    docs/runbooks/ducklake-catalog-operations.md.
  - >-
    file-router.yaml (docs/contracts/) is a live CI gate via validate_placement: the 4 rows targeting
    scripts/session_preflight.py / session_postflight.py / session_metrics.py / plan_audit.py MUST be repointed
    to the new nested paths in this same commit or validate_placement fails on dead targets. Stage the new
    packages (git add) BEFORE running validate so its `git ls-files` snapshot sees them tracked.
  - >-
    version.yaml Lambda carve-out (Decision 79 / decision-scout WARN, RESOLVED): config/lambda/ducklake/version.yaml
    is tracked in FOUR active DuckLake manifests (ducklake_catalog_dr/maintenance/reader/writer), so ANY edit to it
    makes compute_affected_artifacts non-empty and escalates this plan to V3 (build+deploy+smoke-test, needs AWS).
    Its header "TO BUMP" comment `-m scripts.sync_ducklake_version` is therefore LEFT stale (deliberate carve-out,
    excluded from the VP3 sweep) to keep this a clean V2 refactor. The provenance path is instead corrected on the
    NON-bundled surfaces: the module's _FLOOR_COMMENT (scripts/sync/ducklake_version.py) and the requirements.txt
    duckdb-floor comment. Do NOT edit version.yaml. A future DuckLake-Lambda deploy can piggyback the comment fix.
  - Test files are NOT renamed. tests/test_<old_flat_name>.py stay put; only their imports / @patch targets / from-imports / path literals are rewritten. The coverage-map extension keeps them resolvable.
  - Gates are FULL validate (not --pre) AND FULL pytest, both green before the orchestrator pushes.
  - No emojis; ASCII hyphens only; ruff line length 127; type hints; async for I/O (AGENTS.md style). After editing a test file keep its imports in ONE block (tests/CLAUDE.md -- ruff format drops symbols from a second same-module block); verify with `ruff check` after the sweep.
  - "Public-repo content boundary (Decision 101): every touched file is engineering code/config/docs -- no account IDs, ARNs, ExternalIds, credentials, or trading alpha."
  - No rescue agents or workaround loops (Decision 55). Forward-fix on-branch only. Never edit or commit on main; work on the harness claude/ branch (AGENTS.md Git-ops).
