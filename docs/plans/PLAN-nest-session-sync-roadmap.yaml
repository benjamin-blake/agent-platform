      bin/venv-python -m pytest tests/test_session_preflight.py tests/test_session_preflight_cache_serving.py tests/test_session_preflight_contracts.py tests/test_session_preflight_decomposition.py tests/test_session_preflight_platform_roadmap.py tests/test_session_preflight_product_roadmap.py tests/test_session_postflight.py tests/test_session_postflight_decomposition.py tests/test_session_metrics.py tests/test_sync_ops.py tests/test_sync_recommendations.py tests/test_sync_recommendations_decisions.py tests/test_sync_ducklake_version.py tests/test_platform_roadmap.py tests/test_platform_roadmap_gate_rules.py tests/test_platform_roadmap_models.py tests/test_platform_roadmap_state.py tests/test_product_roadmap.py tests/test_product_roadmap_schema.py tests/test_product_roadmap_state.py tests/test_plan_document.py tests/test_plan_audit.py tests/test_find_plan.py tests/test_validate.py tests/test_ops_data_portal.py tests/test_ops_portal_incremental_cache.py tests/test_migrate_ops_data.py -q
    expected: All listed test modules pass (imports, patches, from-import aliasing, path resolver, and subprocess entrypoints all resolve against the nested packages).
    fix_if: A failing test names the unresolved import/patch target; finish the anchored rewrite (imports + every @patch string + from-scripts-import alias) in that test file or the moved module.
  - step: 11
