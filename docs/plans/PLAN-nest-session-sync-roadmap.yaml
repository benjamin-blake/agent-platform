verification_plan:
  - step: 1
    phase: pre-deploy
    hermetic: false
    action: Validate this PLAN document against the PlanDocument schema.
    command: bin/venv-python -m scripts.roadmap.plan_document docs/plans/PLAN-nest-session-sync-roadmap.yaml
    expected: Reports the plan validates against the PlanDocument schema (no errors). (Post-move the validator is scripts.roadmap.plan_document; pre-move use scripts.plan_document.)
    fix_if: A schema error names the offending field; correct it (extra keys forbidden; every VP step needs a non-empty command; unique step ids).
  - step: 2
    phase: pre-deploy
    hermetic: false
    action: Confirm all 12 modules moved into their packages with __init__.py markers and no flat original remains directly under scripts/.
    command: >-
      set -e; for p in session/preflight session/postflight session/metrics sync/ops sync/recommendations sync/ducklake_version roadmap/platform_roadmap roadmap/product_roadmap roadmap/product_roadmap_schema roadmap/plan_document roadmap/plan_audit roadmap/find_plan; do test -f "scripts/$p.py" || { echo "MISSING scripts/$p.py"; exit 1; }; done; for i in session sync roadmap; do test -f "scripts/$i/__init__.py" || { echo "MISSING scripts/$i/__init__.py"; exit 1; }; done; for old in session_preflight session_postflight session_metrics sync_ops sync_recommendations sync_ducklake_version platform_roadmap product_roadmap product_roadmap_schema plan_document plan_audit find_plan; do test ! -e "scripts/$old.py" || { echo "STILL FLAT scripts/$old.py"; exit 1; }; done; echo MOVED_OK
    expected: Prints MOVED_OK (12 modules under their packages, 3 __init__.py present, zero flat originals).
    fix_if: A MISSING/STILL FLAT line names the offender; complete the git mv (or add the __init__.py) and re-run.
  - step: 3
    phase: pre-deploy
    hermetic: false
    action: Stale-reference sweep (Closure Obligation) -- zero flat references (dotted, path, or from-scripts-import) survive in LIVE surfaces; append-only/grandfathered history is intentionally excluded.
    command: >-
      ALT="product_roadmap_schema|sync_ducklake_version|session_preflight|session_postflight|sync_recommendations|platform_roadmap|session_metrics|product_roadmap|plan_document|plan_audit|find_plan|sync_ops"; MATCHES=$(git grep -nE "scripts[./]($ALT)\b|from scripts import ($ALT)\b" -- ':(exclude)docs/plans/*' ':(exclude)audits/*' ':(exclude)logs/*' ':(exclude)docs/DECISIONS.md' ':(exclude)docs/DECISIONS_ARCHIVE.md' ':(exclude)docs/CHANGELOG.md' ':(exclude)docs/SESSION_LOG*.md' ':(exclude)docs/INTENT-*.md' ':(exclude)docs/audit-prompts/*' ':(exclude)config/lambda/ducklake/version.yaml' || true); if [ -z "$MATCHES" ]; then echo SWEEP_CLEAN; else echo "STALE_REFS:"; echo "$MATCHES"; fi
    expected: >-
      Prints SWEEP_CLEAN. (NB `scripts.platform_roadmap` inside scripts.platform_roadmap_gate_rules/_models/_state
      is NOT matched -- the \b after platform_roadmap fails before the `_` -- so the out-of-scope siblings
      correctly do not appear.)
    fix_if: STALE_REFS lists file:line -- apply the anchored rewrite to that live file (unless it is genuinely append-only, in which case widen the exclude pathspec, not the rewrite).
  - step: 4
    phase: pre-deploy
    hermetic: false
    action: ROOT-anchor correctness -- the 8 depth-sensitive modules resolve the repo root post-move (the move-sensitivity fix the import rewrite does NOT provide).
    command: >-
      bin/venv-python -c "import scripts.roadmap.find_plan as fp, scripts.roadmap.plan_audit as pa, scripts.roadmap.plan_document as pd, scripts.session.metrics as sm, scripts.sync.ops as so, scripts.sync.recommendations as sr, scripts.sync.ducklake_version as sd; from pathlib import Path; assert (fp.ROOT/'scripts'/'validate.py').exists(), fp.ROOT; assert (pa.ROOT/'scripts'/'validate.py').exists(), pa.ROOT; assert (sm.ROOT/'scripts'/'validate.py').exists(), sm.ROOT; assert (so._REPO_ROOT/'scripts'/'validate.py').exists(), so._REPO_ROOT; assert (sr._REPO_ROOT/'scripts'/'validate.py').exists(), sr._REPO_ROOT; assert (sd.ROOT/'requirements.txt').exists(), sd.ROOT; import inspect; print('ROOT_ANCHORS_OK')"
    expected: Prints ROOT_ANCHORS_OK (every anchored ROOT/_REPO_ROOT contains scripts/validate.py or requirements.txt). plan_document + session/postflight anchors are exercised in steps 6/10.
    fix_if: An AssertionError shows a path missing scripts/ -- that module still has parent.parent (2 levels); change it to parent.parent.parent (3 levels).
  - step: 5
    phase: pre-deploy
    hermetic: false
    action: DO-NOT-TOUCH invariants -- the out-of-scope roadmap siblings are byte-unchanged and still importable (proves the \b-anchored sweep did not over-reach the platform_roadmap substring).
    command: >-
      CHANGED=$(git diff --name-only origin/main -- scripts/platform_roadmap_gate_rules.py scripts/platform_roadmap_models.py scripts/platform_roadmap_state.py); if [ -n "$CHANGED" ]; then echo "UNEXPECTED_CHANGE:"; echo "$CHANGED"; exit 1; fi; bin/venv-python -c "import scripts.platform_roadmap_gate_rules, scripts.platform_roadmap_models, scripts.platform_roadmap_state; print('SIBLINGS_OK')"
    expected: Prints SIBLINGS_OK (no diff on the three siblings; they still import from scripts/ root).
    fix_if: UNEXPECTED_CHANGE names a sibling the sweep wrongly touched -- revert it (git checkout origin/main -- <file>); the anchored regex must never rewrite these.
  - step: 6
    phase: pre-deploy
    hermetic: false
    action: >-
      Self-referential workflow-entrypoint smoke -- the three moved entrypoints the REMAINING restructure
      phases depend on resolve end-to-end: session.preflight runs, find_plan resolves a plan by path, and the
      postflight facade + plan_document default-root work.
    command: >-
      bin/venv-python -m scripts.session.preflight --health >/dev/null 2>&1; echo "preflight rc=$?"; bin/venv-python scripts/roadmap/find_plan.py docs/plans/PLAN-nest-session-sync-roadmap.yaml; bin/venv-python -c "import scripts.session.postflight as sp, scripts.roadmap.plan_document as pd; from pathlib import Path; r=Path(sp.__file__).resolve().parents[2]; assert (r/'scripts'/'validate.py').exists(), r; assert pd.main.__defaults__ is not None; print('ENTRYPOINTS_OK')"
    expected: >-
      preflight rc is 0 or 1 (runs, not an ImportError); find_plan prints the plan path (not NOT_FOUND / a
      traceback); ENTRYPOINTS_OK printed (postflight repo-root reachable two levels up; plan_document importable).
    fix_if: An ImportError/ModuleNotFoundError or NOT_FOUND means a cross-family import, the sys.path bootstrap depth, or the find_plan ROOT was not fixed -- resolve per steps 3/4 and re-run.
  - step: 7
    phase: pre-deploy
    hermetic: false
    action: Coverage-map preservation -- map_source_to_test resolves every moved module to its kept-in-place test file.
    command: >-
      bin/venv-python -c "from scripts.test_coverage_checker import map_source_to_test as m; from pathlib import Path; import sys; cases={'scripts/session/preflight.py':'tests/test_session_preflight.py','scripts/session/postflight.py':'tests/test_session_postflight.py','scripts/session/metrics.py':'tests/test_session_metrics.py','scripts/sync/ops.py':'tests/test_sync_ops.py','scripts/sync/recommendations.py':'tests/test_sync_recommendations.py','scripts/sync/ducklake_version.py':'tests/test_sync_ducklake_version.py','scripts/roadmap/platform_roadmap.py':'tests/test_platform_roadmap.py','scripts/roadmap/product_roadmap.py':'tests/test_product_roadmap.py','scripts/roadmap/product_roadmap_schema.py':'tests/test_product_roadmap_schema.py','scripts/roadmap/plan_document.py':'tests/test_plan_document.py','scripts/roadmap/plan_audit.py':'tests/test_plan_audit.py','scripts/roadmap/find_plan.py':'tests/test_find_plan.py'}; bad=[s for s,t in cases.items() if str(m(Path(s))).replace(chr(92),'/').endswith(t)==False]; print('MAP_OK' if not bad else 'MAP_FAIL: '+str(bad)); sys.exit(0 if not bad else 1)"
    expected: Prints MAP_OK (all 12 nested modules map to their existing test files).
    fix_if: MAP_FAIL lists the offenders; add/fix the session/sync/roadmap len==3 branch in map_source_to_test.
  - step: 8
    phase: pre-deploy
    hermetic: false
    action: Discovery-index + placement -- validate_placement is green (4 rewritten rows resolve, 3 new package routes resolve, no duplicate topic).
    command: >-
      bin/venv-python -c "from scripts.checks.hygiene.validate_placement import validate_placement as v; f=[]; v(f); print('PLACEMENT_OK' if not f else 'PLACEMENT_FAIL: '+'; '.join(f))"
    expected: Prints PLACEMENT_OK (scripts/session|sync|roadmap tracked and resolve; session-code/sync-code/roadmap-code topics unique; no dead target).
    fix_if: PLACEMENT_FAIL names the issue -- a dead target means a file-router row still points at a flat path or git add did not stage the new package; a duplicate topic means a new route name collides.
  - step: 9
    phase: pre-deploy
    hermetic: false
    action: >-
      Lambda non-regression -- confirm zero Lambda artifacts are affected: compute_affected_artifacts over the
      ACTUAL changed files is {}, AND the manifest-tracked config/lambda/ducklake/version.yaml is byte-unchanged
      (the deliberate carve-out that keeps this V2, per the Decision 79 scout flag).
    command: >-
      bin/venv-python -c "import subprocess; from scripts.lambda_manifest import compute_affected_artifacts as c; changed=[l for l in subprocess.run(['git','diff','--name-only','origin/main'],capture_output=True,text=True).stdout.splitlines() if l.strip()]; r=c(changed); vy='config/lambda/ducklake/version.yaml'; print('CHANGED_N='+str(len(changed))); print('LAMBDA_NONE' if r=={} else 'LAMBDA_AFFECTED: '+str(r)); print('VERSION_YAML_UNTOUCHED' if vy not in changed else 'VERSION_YAML_EDITED(triggers V3)')"
    expected: Prints LAMBDA_NONE and VERSION_YAML_UNTOUCHED (no changed file is Lambda-packaged; version.yaml deliberately not edited -> V2 holds, no build/deploy/smoke-test).
    fix_if: LAMBDA_AFFECTED or VERSION_YAML_EDITED means a manifest-tracked file was edited -- revert that edit (rehome the reference to a non-bundled surface) to keep V2, or re-classify to V3 with per-Lambda deploy for the named artifacts (needs AWS; escalate).
  - step: 10
    phase: pre-deploy
    hermetic: false
    action: >-
      Functional -- run the moved families' primary + satellite + cross-cutting tests, which exercise real
