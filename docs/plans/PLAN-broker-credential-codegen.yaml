schema_version: 1
slug: "broker-credential-codegen"
intent: >-
  Provision the broker-credential AWS Secrets Manager surface and routing-key resolver the
  execution layer (L3.exec Alpaca / Paper broker adapters) needs to obtain paper and live API
  credentials, advancing the trading system toward placing real orders. Implements the codegen
  for the already-ratified Class C contract docs/contracts/credential-routing.yaml (T2.14 phase 2).
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-broker-credential-codegen.yaml
phase: >-
  Platform tier_item T2.14 (Broker credential routing via AWS Secrets Manager + Class C
  credential-routing contract), phase 2 / codegen follow-on -- drives exit criteria 1 + 3.
  T2.14 stays in_progress: final completion is additionally gated on CD.25 ratification
  (bootstrap_completion_exempt: false), independent of this codegen. Consumed by product items
  L3.exec.3 (PaperBroker) / L3.exec.4 (AlpacaBroker) / L3.exec.5 (IBKR, forward).
scope:
  - file: terraform/personal/secrets_manager_brokers.tf
    action: Create
    purpose: >-
      Two aws_secretsmanager_secret ENVELOPES only (agent-platform-broker-alpaca-paper,
      agent-platform-broker-alpaca-live) + ARN outputs. Values set out-of-band via
      put-secret-value, never in Terraform state, no aws_secretsmanager_secret_version
      (Decision 37). Mirrors terraform/personal/inference_credentials.tf exactly. ASCII tag
      charset only; NO parentheses in Purpose/tag values (TagResource rejects them).
  - file: terraform/personal/platform_roles.tf
    action: Modify
    purpose: >-  # pragma: allowlist secret
      Add an ARN-scoped BrokerCredentialsRead statement (secretsmanager:GetSecretValue, no
      wildcard, Resource = the two broker secret ARNs) to PlatformDev's DailyOps inline policy,
      mirroring the existing InferenceCredentialsRead Sid. Guard-exit-2 (aws_iam_role_policy is
      IAM-sensitive) -> admin-applied via agent_platform_admin.
  - file: terraform/personal/oidc.tf
    action: Modify
    purpose: >-  # pragma: allowlist secret
      Add a read-only SecretsManagerBrokerCredentialsRead statement (secretsmanager:Describe*/Get*,
      ARN-scoped to agent-platform-broker-*) to BOTH github_ci_apply and github_ci_plan inline
      policies, mirroring the existing SecretsManagerInferenceCredentialsRead Sid -- so CI
      terraform plan refresh on the new broker secrets does not fail AccessDenied (the
      iterative-discovery gap rec-2302 closed). PERMISSIONS-ONLY -- touches NO assume_role_policy /
      trust / sub condition (the rec-2312 trust fix already landed on main, Decision 94).
  - file: scripts/broker_secrets.py
    action: Create
    purpose: >-
      resolve(broker, product_phase) by the contract routing_key grammar broker/<broker>/<account_type>.
      Loads docs/contracts/credential-routing.yaml via scripts/contracts.py::load_contract and reads
      allowed_values. product_phase_to_account_type map (paper->paper; live_small/live_full->live);
      closed-set membership rejection; routing_table well-formedness (grammar + secret_name uniqueness
      + secret_name matches agent-platform-broker-<broker>-<account_type>). UNMAPPED phases (research,
      backtest_canonical) return a typed NoBrokerCredentials sentinel and MUST NOT raise. Adds a
      __main__ CLI (--broker/--phase/--fetch) for V3 verification. No module-import-time raises.
  - file: scripts/validate.py
    action: Modify
    purpose: >-
      Add the RESOLVE-BY-KEY-ONLY guard (validate_broker_env_reads): grep src/ and scripts/ for
      direct broker-API-key env reads (os.environ["ALPACA_*"], os.getenv("ALPACA_*"),
      os.environ.get("ALPACA_*")), modelled on validate_warehouse_write_sources; self-excludes
      validate.py and broker_secrets.py; skips tests/. Register in the presubmit python-checks
      runner. validate.py is the single source of truth (Decision 80) -- NOT added to ci.yml first.
      Satisfies T2.14 exit criterion 3.
  - file: tests/test_broker_secrets.py
    action: Create
    purpose: >-
      100% per-file coverage of broker_secrets.py: phase->account_type mapping, closed-set
      rejection, unmapped-phase NoBrokerCredentials sentinel (no raise), routing_table
      well-formedness (grammar violation, duplicate secret_name, naming-convention mismatch).
  - file: tests/test_validate.py
    action: Modify
    purpose: >-
      Coverage for validate_broker_env_reads: positive (a planted os.environ["ALPACA_API_KEY"] in
      a temp fixture is flagged) and negative (clean tree passes; broker_secrets.py and validate.py
      self-exclusion).
  - file: docs/ROADMAP-PRODUCT.yaml
    action: Modify
    purpose: >-
      Add the reciprocal contract_gate {path: docs/contracts/credential-routing.yaml, class: C,
      contract_version: 1} to L3.exec.3/4/5; add PLATFORM:T2.14 to L3.exec.3 cross_roadmap_depends_on
      (it consumes broker/alpaca/paper but omits the dep; L3.exec.4/5 already declare it); reconcile
      the broker-adapter filename divergence (6 broker-adapter-protocol.yaml contract_gate refs vs 3
      broker-adapter.yaml) to the single canonical broker-adapter.yaml -- chosen because it matches
      L3.exec.1's authoring intent (the item that will author the file); resolves rec-2311.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Re-ground T2.14 files_in_scope (add platform_roles.tf, oidc.tf, validate.py -- the exit
      criteria reference an IAM grant and a validate.py guard but files_in_scope omits them);
      refresh progress_note (phase 2 codegen satisfies criteria 1 + 3 pending admin apply; final
      completion still gated on CD.25). Status remains in_progress.
bundled_recommendations:
  - rec-2311
infrastructure_dependencies:
  - >-
    terraform/personal/ is the applied module (CD.21); remote state at
    s3://agent-platform-data-lake/tfstate/personal/sandbox/terraform.tfstate (region eu-west-2),
    init via terraform -chdir=terraform/personal init -backend-config=backend-sandbox.hcl. No-default
    vars are recovered from the agent-platform-terraform-personal-tfvars Secrets Manager secret
    (never pasted into chat/commits).
  - >-
    Guard classification: aws_secretsmanager_secret creates are NOT in IAM_SENSITIVE_TYPES
    (guard-PASS); the platform_roles.tf (PlatformDev) and oidc.tf (github_ci_apply / github_ci_plan)
    aws_iam_role_policy edits ARE IAM-sensitive (guard exit 2). The whole plan therefore predicts a
    BLOCKED guard verdict.
  - >-
    Apply identity: the PlatformDev grant and the github_ci_plan grant are beyond github_ci_apply's
    IAM scope (github_ci_apply has read-only on PlatformDev and on github_ci_plan; PutRolePolicy
    there is admin-only until T2.23). The entire TF lands via agent_platform_admin (PlatformAdmin)
    interactive apply: terraform plan -> present -> human accept -> apply. NOT sandbox auto-apply.
  - >-
    Merge posture: the speculative-plan PR job (CD.35 Wave 2) posts a predicted BLOCKED verdict
    (advisory). Sequence the admin apply so the merge to main converges as a no-op (state already
    reflects the change) -> guard PASS -> green convergence record. IAM apply precedes any runtime
    credential read (IAM-precedence rule).
acceptance_criteria:
  - >-
    secrets_manager_brokers.tf defines exactly two aws_secretsmanager_secret resources
    (agent-platform-broker-alpaca-paper, agent-platform-broker-alpaca-live) with ARN outputs and
    NO aws_secretsmanager_secret_version (values out-of-band).
  - >-
    platform_roles.tf BrokerCredentialsRead grants secretsmanager:GetSecretValue ARN-scoped to
    exactly the two broker secret ARNs (no wildcard) on PlatformDev's DailyOps policy.
  - >-
    oidc.tf adds SecretsManagerBrokerCredentialsRead (Describe*/Get* on agent-platform-broker-*) to
    both github_ci_apply and github_ci_plan, and the oidc.tf diff contains NO assume_role_policy /
    Condition / sub / token.actions.githubusercontent.com change.
  - >-
    broker_secrets.resolve maps paper->paper and live_small/live_full->live, rejects unknown
    broker/account_type (closed set), returns the NoBrokerCredentials sentinel for unmapped phases
    (research, backtest_canonical) without raising, and enforces routing_table well-formedness.
  - >-
    The validate.py RESOLVE-BY-KEY-ONLY guard flags direct broker-API-key env reads in src/ and
    scripts/, passes on the clean tree, and is registered in the presubmit runner.
  - >-
    test_coverage_checker reports 100% per-file coverage for scripts/broker_secrets.py and the new
    validate.py guard code.
  - >-
    ROADMAP-PRODUCT L3.exec.3/4/5 carry the credential-routing.yaml contract_gate; L3.exec.3
    cross_roadmap_depends_on includes PLATFORM:T2.14; only one canonical broker-adapter filename
    remains (rec-2311 resolved).
  - >-
    ROADMAP-PLATFORM T2.14 files_in_scope includes platform_roles.tf, oidc.tf, validate.py;
    progress_note refreshed; status still in_progress.
  - >-
    [post-deploy] Both secret envelopes exist; broker_secrets.resolve returns the correct
    secret_name per routing key; GetSecretValue on a placeholder value succeeds under the PlatformDev
    runtime role (agent_platform profile).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: Unit-test the resolver (mapping, closed-set rejection, unmapped-phase sentinel, routing_table well-formedness).
    command: bin/venv-python -m pytest tests/test_broker_secrets.py -v
    expected: >-
      All pass: paper->paper and live_small/live_full->live; unknown broker or account_type raises a
      closed-set error; research / backtest_canonical return NoBrokerCredentials (no exception);
      a duplicated secret_name, a grammar violation, and a naming-convention mismatch are each rejected.
    fix_if: >-
      A mapping returns the wrong account_type, an unmapped phase raises instead of returning the
      sentinel, or a malformed routing_table is not caught.
  - step: 2
    phase: pre-deploy
    action: Test the validate.py RESOLVE-BY-KEY-ONLY guard (positive + negative + self-exclusion).
    command: bin/venv-python -m pytest tests/test_validate.py::TestBrokerEnvReadGuard -v
    expected: >-
      A planted os.environ["ALPACA_API_KEY"] read in a temp source dir is flagged; a clean tree
      passes; broker_secrets.py and validate.py are self-excluded (not flagged for naming the patterns).
    fix_if: The guard misses a planted violation, false-positives on the clean tree, or flags an excluded file.
  - step: 3
    phase: pre-deploy
    action: Confirm 100% per-file coverage of the new resolver.
    command: bin/venv-python -m pytest tests/test_broker_secrets.py --cov=scripts.broker_secrets --cov-report=term-missing --cov-fail-under=100
    expected: scripts/broker_secrets.py reports 100% coverage; the command exits 0.
    fix_if: Coverage below 100 -- add tests for the uncovered lines reported under "Missing".
  - step: 4
    phase: pre-deploy
    action: Assert the oidc.tf diff is permissions-only (Decision Scout NOTE mitigation -- no trust change).
    command: "! git diff origin/main -- terraform/personal/oidc.tf | grep -E '^[+-].*(assume_role_policy|token\\.actions\\.githubusercontent\\.com|:sub|refs/heads/main|environment:tf-gated-apply)'"
    expected: >-
      Command exits 0 (grep finds no matching added/removed lines) -- the oidc.tf change adds only the
      SecretsManagerBrokerCredentialsRead permissions statement; the trust block is untouched.
    fix_if: >-
      Any changed line touches assume_role_policy / Condition / sub -- revert it; the trust fix is
      already on main (Decision 94) and re-editing it contradicts Decision 92/94.
  - step: 5
    phase: pre-deploy
    action: Terraform format check on the module.
    command: terraform -chdir=terraform/personal fmt -check -recursive
    expected: Exit 0 -- secrets_manager_brokers.tf, platform_roles.tf, oidc.tf are canonically formatted.
    fix_if: Non-zero exit -- run terraform -chdir=terraform/personal fmt to normalise.
  - step: 6
    phase: pre-deploy
    action: Full presubmit (authoritative local gate -- guard, coverage, contract-drift, taxonomy lint, plan + roadmap validators).
    command: bin/venv-python -m scripts.validate
    expected: >-
      PASS, including validate_broker_env_reads, validate_test_coverage, validate_contract_drift
      (credential-routing.yaml unchanged), validate_environment_taxonomy (no "paper/live environment"
      phrasing in new prose), validate_plan_documents, and the roadmap validators.
    fix_if: Any check fails -- fix per its message and re-run; remote CI is authoritative.
  - step: 7
    phase: post-deploy
    action: After the agent_platform_admin apply, confirm both secret envelopes exist.
    command: aws secretsmanager describe-secret --secret-id agent-platform-broker-alpaca-paper --profile agent_platform --query Name && aws secretsmanager describe-secret --secret-id agent-platform-broker-alpaca-live --profile agent_platform --query Name
    expected: Both secret names are returned (the envelopes were created by the admin apply).
    fix_if: ResourceNotFoundException -- the admin apply did not create them; re-run terraform apply under agent_platform_admin.
  - step: 8
    phase: post-deploy
    action: Prove the resolver returns the correct secret_name and GetSecretValue works under the PlatformDev runtime role.
    command: aws secretsmanager put-secret-value --secret-id agent-platform-broker-alpaca-paper --secret-string '{"api_key":"PLACEHOLDER","api_secret":"PLACEHOLDER"}' --profile agent_platform_admin && bin/venv-python -m scripts.broker_secrets --broker alpaca --phase paper --fetch
    expected: >-
      The CLI resolves secret_name agent-platform-broker-alpaca-paper and fetches the placeholder
      value via GetSecretValue under the agent_platform (PlatformDev) profile -- proving the
      BrokerCredentialsRead grant works end-to-end.
    fix_if: >-
      AccessDenied on GetSecretValue -- the IAM grant did not apply or has not propagated (re-check
      the admin apply); a wrong secret_name -- a routing bug in resolve().
  - step: 9
    phase: post-deploy
    action: Prove an unmapped product phase resolves to the no-broker sentinel without raising.
    command: bin/venv-python -m scripts.broker_secrets --broker alpaca --phase backtest_canonical
    expected: The CLI prints the NoBrokerCredentials sentinel and exits 0 (no exception, no secret resolved).
    fix_if: The CLI raises or resolves a secret for an unmapped phase -- fix the sentinel path in resolve().
  - step: 10
    phase: post-deploy
    action: Verify rec-2311 closure and that the broker-adapter filename divergence is reconciled (closure obligation).
    command: |-
      bin/venv-python -m scripts.ops_data_portal --sync && grep '"id": "rec-2311"' logs/.recommendations-log.jsonl | grep -q '"status": "closed"' && ! grep -q "broker-adapter-protocol" docs/ROADMAP-PRODUCT.yaml
    expected: >-
      rec-2311 is closed (via the Resolves: rec-2311 trailer / rec-autoclose) and no non-canonical
      filename remains.
    fix_if: >-
      rec-2311 still open -- confirm the Resolves: rec-2311 trailer was in the squash-merge body, else
      close via bin/venv-python -m scripts.ops_data_portal --update-rec rec-2311 --status closed; if a
      non-canonical filename remains, finish the reconciliation.
constraints:
  - Build to the ratified docs/contracts/credential-routing.yaml; do NOT re-ratify, redesign, or edit the contract (CD.25 pre-codegen; contract status is ratified).
  - Secret VALUES are out-of-band only -- never aws_secretsmanager_secret_version, never in Terraform state (Decision 37).
  - ASCII tag charset only; NO parentheses in tag / Purpose values (TagResource rejects them -- see inference_credentials.tf).
  - IAM grants are ARN-scoped with no wildcard; mirror InferenceCredentialsRead (Decision 36 ARN-scoped-grant intent; Decision 81 grant-pattern lineage).
  - oidc.tf change is permissions-only -- do NOT touch any assume_role_policy / trust / sub / Condition line (Decision 92 as corrected by Decision 94; the trust fix already landed on main). VP step 4 enforces this.
  - Vocabulary -- paper / live are product phases / broker account types, NOT platform environments (Decision 77); keep resolver docstrings, CLI help, and roadmap prose conforming (validate_environment_taxonomy lint).
  - validate.py is the single source of truth; add the guard there, NOT ci.yml first (Decision 80).
  - terraform apply for the IAM changes is human-gated via agent_platform_admin (plan -> present -> accept -> apply); NOT sandbox auto-apply (Decision 35 scoped by Decision 77). IAM apply precedes any runtime credential read.
  - No new standing prose-architecture docs under docs/ (Decision 86) -- only YAML / contract-gate edits.
  - No rescue agents or workaround loops (Decision 55); on an unrecoverable V3 failure, stop and RCA.
  - Only modify files listed in scope.
context:
  - >-
    T2.14 phase 2 codegen follow-on; consumes the ratified docs/contracts/credential-routing.yaml
    (phase 1, PLAN-broker-credential-routing). Drives exit criteria 1 (Secrets Manager envelopes
    provisioned via Terraform) and 3 (resolve by routing key; validate.py guard rejects env reads).
  - >-
    T2.14 stays in_progress -- do NOT mark it complete. Final completion is additionally gated on
    CD.25 ratification (bootstrap_completion_exempt: false), independent of this codegen.
  - >-
    rec-2312 (gated-apply OIDC trust assume-role denial) was resolved on main via PR #222 (VP9
    re-tested by PR #223) and ratified as Decision 94 -- the formal correction to Decision 92 clause 3.
    It was stale-open in the warehouse (no Resolves: trailer fired) and was closed during this planning
    session. oidc.tf TRUST is NOT in scope. The only oidc.tf edit here is the read-only
    SecretsManagerBrokerCredentialsRead refresh grant (mirrors SecretsManagerInferenceCredentialsRead;
    the same iterative-discovery gap rec-2302 closed) -- required so CI terraform plan refresh on the
    new broker secrets does not fail AccessDenied.
  - >-
    Precedents to mirror exactly -- terraform/personal/inference_credentials.tf (secret envelopes +
    out-of-band values), platform_roles.tf::InferenceCredentialsRead (PlatformDev ARN-scoped read
    grant, line 174), oidc.tf::SecretsManagerInferenceCredentialsRead (CI refresh-read on
    github_ci_apply line 664 and github_ci_plan line 1163).
  - >-
    Contract well-formedness -- allowed_values is schema-typed Any, so the CD.25 contract-drift gate
    does NOT validate routing_table content (a typo repointing broker/alpaca/live to the paper secret
    would pass the drift gate). The resolver is the gate for that error class (governance.validation_path):
    grammar + secret_name uniqueness + naming-convention conformance.
  - >-
    Apply -- the PlatformDev grant and the github_ci_plan grant are beyond github_ci_apply's IAM
    scope (admin-only until T2.23); the whole TF lands via agent_platform_admin interactive apply
    against the sandbox state. Sequence the admin apply so the merge is a no-op -> green convergence
    record (the now-repaired gated-apply path still cannot apply the PlatformDev change, so a real diff
    at merge would fail AccessDenied -- the no-op merge is the target).
  - >-
    Decisions to cite -- Decision 94 (+ Decision 92 corrected by it), Decision 37 (out-of-band values),
    Decision 77 (phase != environment vocabulary + apply gating), Decision 35 (human-gated IAM apply),
    Decision 80 (validate.py single source of truth), Decision 93 (T2.14 depends_on [T2.1]; T2.9
    rotation parked), Decision 66 (closed-set validation model), Decision 79 (terraform/personal +
    scripts are NOT Lambda-packaged -- no per-Lambda deploy step). Citation hygiene -- CD.21 and CD.25
    are candidate_decisions (cite as candidate, not "Decision N"); Decision 36 -- cite its
    ARN-scoped-grant intent, not its superseded "no-OIDC" stance.
  - >-
    rec-2311 (ROADMAP-PRODUCT broker-adapter filename divergence) is bundled -- naturally resolved by
    reconciling to one canonical filename while adding the reciprocal contract_gates. Emit Resolves:
    rec-2311 in the squash-merge body.
  - >-
    Lambda packaging -- compute_affected_artifacts surfaces data-pipeline only via the bundled doc
    docs/ROADMAP-PLATFORM.yaml (a roadmap edit, no code delta); scripts/ and terraform/personal/**
    are NOT Lambda-packaged (Decision 79). No per-Lambda build/deploy/smoke-test step is required --
    the incidental data-pipeline manifest match is a doc, not a runtime change.
  - >-
    Branch was rebased onto origin/main at planning time (0 ahead / 0 behind post-rebase). Scope file
    oidc.tf changed on main (the rec-2312 trust fix, PRs #220-225) and is incorporated via the rebase;
    Main Divergence Assessment satisfied.
