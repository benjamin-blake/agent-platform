execution_steps:
  - Create terraform/personal/secrets_manager_brokers.tf -- two aws_secretsmanager_secret envelopes (agent-platform-broker-alpaca-paper, agent-platform-broker-alpaca-live) + ARN outputs, mirroring inference_credentials.tf (ASCII tags, no parentheses, no _version resource, values out-of-band).
  - Modify terraform/personal/platform_roles.tf -- add BrokerCredentialsRead to PlatformDev DailyOps (secretsmanager:GetSecretValue, ARN-scoped to the two broker secret ARNs), mirroring InferenceCredentialsRead.
  - Modify terraform/personal/oidc.tf -- add SecretsManagerBrokerCredentialsRead (secretsmanager:Describe*/Get* on agent-platform-broker-*) to BOTH github_ci_apply and github_ci_plan inline policies, mirroring SecretsManagerInferenceCredentialsRead. Touch NO trust / assume_role_policy line; run VP step 4 immediately to assert permissions-only.
  - Create scripts/broker_secrets.py -- load credential-routing.yaml via scripts/contracts.py::load_contract; implement resolve(broker, product_phase) with the product_phase_to_account_type map, closed-set rejection, routing_table well-formedness (grammar + secret_name uniqueness + naming convention), and a NoBrokerCredentials sentinel for unmapped phases (no raise); add a __main__ CLI (--broker / --phase / --fetch). No module-import-time raises.
  - Modify scripts/validate.py -- add validate_broker_env_reads (RESOLVE-BY-KEY-ONLY) modelled on validate_warehouse_write_sources; register it in the presubmit python-checks runner; self-exclude validate.py + broker_secrets.py; skip tests/.
  - Create tests/test_broker_secrets.py and extend tests/test_validate.py -- 100% per-file coverage (resolver mapping, closed-set, sentinel, well-formedness; guard positive / negative / self-exclusion).
  - Modify docs/ROADMAP-PRODUCT.yaml -- add the credential-routing.yaml contract_gate to L3.exec.3/4/5; add PLATFORM:T2.14 to L3.exec.3 cross_roadmap_depends_on; reconcile the broker-adapter filename to one canonical form (broker-adapter.yaml) across all occurrences (rec-2311).
  - Modify docs/ROADMAP-PLATFORM.yaml -- re-ground T2.14 files_in_scope (+platform_roles.tf, +oidc.tf, +validate.py); refresh progress_note (phase 2 codegen satisfies criteria 1 + 3 pending admin apply; completion still gated on CD.25); keep status in_progress.
  - Run the pre-deploy Verification Plan (steps 1-6); loop until green before opening the PR.
  - Open the PR; admin-apply the TF via agent_platform_admin (terraform plan -> present -> human accept -> apply); run the post-deploy Verification Plan (steps 7-9); sequence the merge so it converges as a no-op.
  - Execute the Verification Plan end-to-end; on an unrecoverable V3 failure stop and RCA (Decision 55) -- do not paper over with a workaround.
  - "Report: what was implemented, the pre/post-deploy verification results, the admin-apply outcome, and rec-2311 closure."
work_areas: []
rollback: >-
  The secret envelopes hold only out-of-band placeholders, so they can be deleted and the
  BrokerCredentialsRead / SecretsManagerBrokerCredentialsRead statements reverted via a follow-up
  agent_platform_admin apply with no data loss. The resolver, guard, tests, and roadmap edits are
  pure code/doc and revert by branch abandonment. oidc.tf trust is untouched, so there is no
  trust-lockout risk.
