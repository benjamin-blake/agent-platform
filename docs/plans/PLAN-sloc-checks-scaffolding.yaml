execution_steps:
  - "Create scripts/checks/_terraform.py: module docstring (rationale plus the Decision 104 sibling-module note and the Decision 119 proxy-403 behaviour note); `from __future__ import annotations`; `import shutil`; `import time`; `from scripts.checks import _common`; `from scripts.checks.iam_tf.validate_terraform_try import validate_terraform_try`. Move VERBATIM (byte-identical bodies, already using _common.*): _TRANSIENT_INIT_SIGNATURES, _PROXY_BLOCK_FORBIDDEN_MARKERS, _PROXY_BLOCK_HOST_MARKERS, _PROXY_BLOCK_CHECKSUM_MARKERS, _is_proxy_blocked_init, _TERRAFORM_ROOTS, _terraform_init_with_retry, run_terraform_creds_free, run_terraform_checks."
  - "Edit scripts/checks/_scaffolding.py: delete the 9 moved symbols and their comment blocks; delete `import shutil` and the `from scripts.checks.iam_tf.validate_terraform_try import validate_terraform_try` line (now unused). KEEP `import time`, _TRANSIENT_CLAUDE_SIGNATURES, _DQ_FRESHNESS_SECONDS, _PYTEST_FLAGS, and all other bodies. Add the facade re-export `from scripts.checks._terraform import (_TERRAFORM_ROOTS, _TRANSIENT_INIT_SIGNATURES, _terraform_init_with_retry, run_terraform_checks, run_terraform_creds_free)  # noqa: F401` in the import section. Run `ruff check --fix scripts/checks/_scaffolding.py scripts/checks/_terraform.py` immediately (PROJECT_CONTEXT batch-ruff gotcha)."
  - "Repoint the 3 patch sites in tests/test_validate.py TestRunTerraformChecks: patch(\"scripts.checks._scaffolding.validate_terraform_try\") -> patch(\"scripts.checks._terraform.validate_terraform_try\"). Change nothing else in that class. Run `ruff check --fix tests/test_validate.py`."
  - "Verify structural integrity BEFORE logic checks (PROJECT_CONTEXT Refactoring Protocol): `bin/venv-python -c \"import scripts.validate, scripts.checks._scaffolding, scripts.checks._terraform\"` imports cleanly."
  - "Execute the Verification Plan steps 1-9 in order; loop until each passes; on an unrecoverable failure stop and RCA (Decision 55). Run `validate --update-sloc-budgets` as the LAST mutating step (step 7) and diff-verify config/sloc_budgets.yaml (entry removed, no new key); steps 8-9 are read-only re-checks."
  - "Report: SLOC before/after for both files, facade/import-equivalence result, byte-stable trace result, CC/coverage status, and the config/sloc_budgets.yaml diff."
work_areas: []
rollback: >-
  Pure refactor on a feature branch. If any verification cannot be made green, abandon the change (no
  merge) -- nothing is deployed. If merged and a regression surfaces, revert the squash commit: the new
  module, the _scaffolding edit, the test repoint, and the budget regeneration land atomically in one PR.
