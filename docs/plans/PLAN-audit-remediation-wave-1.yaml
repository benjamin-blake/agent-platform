    command: "bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md"
    expected: "Backfill succeeds (DECISIONS.md -> ops_decisions ETL; dec-103/dec-087/dec-084 rows refreshed with the amendment notes). Run AFTER the squash-merge to main."
    fix_if: "Backfill fails -- confirm the agent_platform static-key chain (aws sts get-caller-identity --profile agent_platform) and re-run; there is no offline outbox (Decision 84 I-4)."
