    phase: pre-deploy
    action: VF-11 landed (CD.17 merge-authority clause + CD.29 point) AND the CD.17 reversal trigger/gates are unchanged (scout NOTE guard).
    command: "bin/venv-python -c \"import re,sys; s=open('docs/ROADMAP-PLATFORM.yaml').read(); cd17=re.search(r'- id: CD\\.17.*?(?=\\n  - id: )', s, re.S).group(0); cd29=re.search(r'- id: CD\\.29.*?(?=\\n  - id: )', s, re.S).group(0); has_clause=('VF-11' in cd17 and 'advisory' in cd17.lower() and 'unattended' in cd17.lower() and 'T3.7' in cd17); trigger_intact=('gates: [T1.5, T1.6, T2.1, T3.3, T3.4, T4.1, T4.2, T4.4]' in cd17 and 'item_field_eq(T3.2' in cd17); cd29_ok=('VF-11' in cd29 and 'unattended' in cd29.lower()); ok=has_clause and trigger_intact and cd29_ok; print('VF-11 OK' if ok else f'VF-11 FAIL clause={has_clause} trigger_intact={trigger_intact} cd29={cd29_ok}'); sys.exit(0 if ok else 1)\""
    expected: "Prints VF-11 OK (CD.17 has the merge-authority clause; the gates: list and T3.2 trigger predicate are unchanged; CD.29 has the matching point)."
    fix_if: "clause missing -- add it; trigger_intact False -- the edit wrongly touched gates:/trigger, revert that (scout: touching them flips to BLOCK); cd29 missing -- add the discipline point."
  - step: 8
    phase: pre-deploy
    action: New carriers T3.15-T3.18 fully-structured with exit criteria tracing to the audit findings.
    command: "bin/venv-python -c \"from scripts.platform_roadmap import load, ExitCriterion; from pathlib import Path; d={i.id:i for i in load(Path('docs/ROADMAP-PLATFORM.yaml')).tier_items}; import sys; bad=[]; \nfor i in ['T3.15','T3.16','T3.17','T3.18']:\n it=d[i]; cs=it.exit_criteria\n if not cs or any(not isinstance(c,ExitCriterion) for c in cs): bad.append(i+':bare-or-empty')\n if it.status!='not_started': bad.append(i+':status')\nprint('carriers OK' if not bad else 'carriers FAIL '+str(bad)); sys.exit(0 if not bad else 1)\""
    expected: "Prints carriers OK (all four exist, not_started, fully-structured non-empty exit_criteria)."
    fix_if: "A carrier is bare/empty/misstatused -- fix its definition."
  - step: 9
    phase: pre-deploy
    action: Decision-70 mis-cite notes present at all 5 sites; historical strings preserved; 1338 has NO 103 redirect; Decision 70 body untouched; ledger fixed.
    command: "grep -c 'Decision 70' docs/DECISIONS.md | grep -qx 6 && grep -q '^## Decision 70: Physical Deletion of Bootstrap Records' docs/DECISIONS.md && test \"$(grep -c 'Decision 103' docs/DECISIONS.md)\" -ge 4 && bin/venv-python -c \"import re,sys; s=open('docs/DECISIONS.md').read(); b1338=re.search(r'Decision 70 \\(queue current-state.*?priority_queue_current verb\\)', s); ctx=s[b1338.start():b1338.start()+600] if b1338 else ''; import sys; ok = b1338 is not None and 'priority_queue_current' in ctx and 'Decision 103' not in ctx.split('Related')[0][:0] ; print('note-1338-present' if b1338 else 'note-1338-missing')\" && ! grep -q 'Decision-70' docs/contracts/exit-criteria-ledger.yaml && grep -q 'Decision-103' docs/contracts/exit-criteria-ledger.yaml && grep -q 'last_updated: \"2026-07-03\"' docs/contracts/exit-criteria-ledger.yaml && echo 'DEC70 OK'"
    expected: "Prints note-1338-present then DEC70 OK: 6 'Decision 70' refs remain (5 mis-cite sites preserved + the real header), Decision 70 header intact, >=4 'Decision 103' refs (added notes), 1338 note present near the queue-semantics citation, ledger swapped Decision-70 -> Decision-103 with last_updated bumped."
    fix_if: "A count/marker is off -- ensure notes were ADDED (not replacing the historical 'Decision 70' text), 1338 was NOT redirected to 103, and the ledger edit landed. (The 5 mis-cite lines + the 1916 header = 6 total 'Decision 70' occurrences.)"
