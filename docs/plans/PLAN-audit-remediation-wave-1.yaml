    phase: pre-deploy
    action: Full validation tier, adjudicated against the documented pre-existing Import-contracts failure.
    command: "bin/venv-python -m scripts.validate"
    expected: >-
      Exit 0. If non-zero, the ONLY failing check is the pre-existing "Import contracts (Decision 80)"
      documented in the audit meta (verify it also fails on origin/main via `git stash && bin/venv-python
      -m scripts.validate`); no failure is attributable to the roadmap/DECISIONS/ledger/verification_checks
      edits (validate_platform_roadmap, validate_candidate_decision_ratification, contract-drift,
