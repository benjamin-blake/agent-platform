schema_version: 1
slug: audit-remediation-wave-1
intent: >-
  Audit-remediation wave 1 of 6 (text/roadmap only) from the verification-system design review
  audits/verification-system-review-f80508b.yaml (merged PR #402). Lands the design-stage text
  amendments for findings VF-09 (head-SHA verdict binding), VF-10 (verdict-wait timeout/heartbeat),
  VF-11 (oracle-quality precondition for unattended merges), VF-12 (per-rec differential substrate
  unification), and VF-14 (check-vocabulary / status-alphabet reconciliation), plus four new
  forward-intent carrier tier_items (T3.15-T3.18) for the audit's unowned interactive gaps
  (VF-01/07/08, VF-02/03, VF-04/13, VF-05/06), and the systemic Decision-70 mis-cite correction.
  NO recommendations are filed or bundled -- the five subsequent implementation plans carry the
  build work and cite the tier_items created here.
plan_type: IMPLEMENTATION
verification_tier: V2
plan_path: docs/plans/PLAN-audit-remediation-wave-1.yaml
phase: >-
  Platform verification-system hardening (T3 verifier/graduation family + T4 executor handshake
  contracts). Amends candidate_decisions CD.17/CD.29/CD.38 (all state: pending -- design-stage edits,
  not ratifications) and tier_items T4.1/T4.9/T3.1 c6; reactivates T3.10; stages the operator-confirmed
  T3.1 status closeout; creates T3.15-T3.18. Corrects the Decision-70 mis-cite in docs/DECISIONS.md +
  docs/contracts/exit-criteria-ledger.yaml. Not a follow-on to an in_progress item's build -- user_explicit
  audit remediation. Wave 1 of 6; waves 2-6 build against these carriers.
scope:
  # --- VF-09: head-SHA verdict binding + status-alphabet note (T4.9) ---
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      VF-09 (T4.9, ~L7171-7204). (a) Amend the correlation-ids exit criterion (currently "PR number,
      check-run id, workflow-run id, rec id, execution id") to append ", and head SHA (the exact commit
      the verdict attests)". (b) Append a new exit criterion: "Merge is permitted only when the callback's
      verified head SHA equals the PR head at merge time; a SHA mismatch routes to re-verify, and a
      repeated mismatch routes to ci-rca (Decision 72) -- the executor-side analogue of the terraform
      no-TOCTOU artifact-verdict binding (Decision 92)". (c) Add to T4.9's intent a dated status-alphabet
      note (VF-14): three overlapping status alphabets exist -- PASS/FAIL/WARN/SKIPPED (verifier harness,
      scripts/verifiers/harness.py), PASS/FAIL (typed-checks kernel, scripts/verification_checks.py),
      PASS/FAIL/BLOCKED (implement-skill VP table) -- and the future docs/contracts/executor-ci-handshake.yaml
      contract owns mapping them onto the single callback verdict vocabulary (T3.10 acceptance[] unification
      is the roadmap carrier). Append new criteria in the SAME bare-string style; do NOT rewrite the
      "- id: T4.9" line (keeps T4.9 outside validate_platform_roadmap (ii) touched-item normalization).
  # --- VF-10: verdict-wait timeout/heartbeat (T4.1, T4.9, CD.38) ---
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      VF-10. (a) T4.1 (~L6837-6879): append a bare-string exit criterion "Every waitForTaskToken /
      verdict-wait state in the state machine carries HeartbeatSeconds and TimeoutSeconds; timeout
      transitions route to ci-rca (Decision 72), never a silent re-wait -- the executor analogue of the
      interactive dropped-green-signal backstop". (b) T4.9: append a bare-string exit criterion "Every
      verdict-wait state (waitForTaskToken) carries HeartbeatSeconds and TimeoutSeconds sized to expected
      verdict latency; a missing/late verdict times out to ci-rca (Decision 72), never a silent re-wait or
      retry". (c) CD.38 (~L1775-1798): amend the existing discipline point "Verdict-callback failures
      (stale/duplicate/auth) route to ci-rca ..., never silent retry." to read "Verdict-callback failures
      (stale/duplicate/auth/verdict-timeout) route to ci-rca (Decision 72 / Decision 55), never silent
      retry or re-wait; every waitForTaskToken state carries HeartbeatSeconds/TimeoutSeconds (T4.1/T4.9)."
      Do NOT rewrite the "- id: T4.1"/"- id: T4.9" lines.
  # --- VF-12: per-rec differential substrate unification (T3.1 c6, verification_checks.py, CD.38) ---
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      VF-12. (a) T3.1 c6 (~L6325-6328, status: met -- KEEP status/met_by unchanged): reword the named
      production baseline-execution surface from "Step-Functions executor verify-state deferred per CD.27"
      to "the per-rec differential verify runs as a GitHub Actions job keyed by rec id, with Step Functions
      only dispatching and waiting -- CD.38 sole-runner rule", and append a bracketed
      "[Amendment 2026-07-03, VF-12: ...]" note preserving the original wording and stating the criterion
      remains met (only the named substrate is corrected; gate logic + is_admitted() shipped under
      PLAN-t3-1-verifier-harness). (b) CD.38: append a new discipline point: "The per-rec differential
      verify (fail-on-revert: pre-change tree -> assert FAIL; head -> assert PASS) runs as a GitHub Actions
      job keyed by rec id -- NOT in AWS. Step Functions has a verify STATE that only dispatches and waits,
      consistent with the sole-runner rule (resolves the T3.1 c6 vs CD.38 substrate seam, VF-12)."
  - file: scripts/verification_checks.py
    action: Modify
    purpose: >-
      VF-12: amend the module docstring (L1-6) so it names GitHub Actions as the execution substrate for
      the per-rec differential verify job (a per-rec differential verify job runs in GitHub Actions keyed
      by rec id; Step Functions only dispatches and waits -- CD.38 sole-runner rule), consistent with the
      T3.1 c6 amendment. Docstring-only edit -- no code/behaviour change; tests/test_verification_checks.py
      already exists (no new coverage surface). This edit sets the plan's V2 floor (Python source touched).
  # --- VF-11: oracle-quality precondition for unattended merges (CD.17 primary + CD.29 point) ---
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      VF-11 (operator pick: CD.17 primary + CD.29 discipline point). (a) CD.17 (~L641-676): append a
      bracketed "[Amendment 2026-07-03, VF-11 -- oracle-quality precondition for unattended merges]" that
      states the reversal-trigger EXPRESSION is UNCHANGED (still keyed to T4.2/T3.2/T3.3; the clause is NOT
      added to gates:) and adds a post-reversal MERGE-AUTHORITY discipline: once unfrozen the executor may
      NOT merge a rec unattended while that rec's acceptance oracle is structural-only (grep_count /
      file_presence kernel slots that pass fail-on-revert while proving only text presence) UNTIL BOTH
      (a) T3.7 mutation-on-target is live for graduated checks AND (b) the per-rec differential verify job
      is live (VF-12); until then structural-only acceptance is ADVISORY for unattended merges (such recs
      route to human /plan -> /implement, where the plan VP re-derives behavioural verification). This
      narrows the compensating-control gap VF-11 names (the human control is removed by the same unfreeze
      event that activates the structural oracle). Honors the CD.17 [Amendment 2026-06-01] "T3.6/T3.7/T3.1
      PRECEDE and do NOT gate the reversal trigger" -- the trigger predicate and gates: list are untouched.
      (b) CD.29 (~L1246-1311): append a matching discipline point colocating the doctrine (CD.29 owns
      structural-vs-behavioural / differential-admission), cross-referencing the CD.17 merge-authority
      clause, T3.18 (differential admission), and T3.7 (mutation).
  # --- VF-14: T3.10 reactivation + T3.1 operator-confirmed status closeout ---
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      VF-14. (a) T3.10 (~L6618-6648): flip status deferred_post_mvp -> not_started and rewrite progress_note
      to record the 2026-07-03 reactivation (trigger "T3.1 + T3.6 complete" now satisfied: T3.6 complete
      2026-06-25, T3.1 closed complete in THIS change), retaining the prior deferral rationale in a bracketed
      clause. Do NOT modify T3.10's exit_criteria or its "- id:" line. (b) T3.1 (~L6271-6338): flip item
      status in_progress -> complete and add completed_at: "2026-07-03" (operator-confirmed per
      Status-Trusted-Never-Inferred / CD.39; all seven exit criteria already status: met,
      met_by: t3-1-verifier-harness); expand progress_note to record the operator-confirmed closeout and the
      c6 substrate reconciliation (VF-12). Order in /implement: close T3.1 FIRST, then reactivate T3.10.
  # --- New forward-intent carriers T3.15-T3.18 (audit unowned gaps) ---
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Insert four new tier_items T3.15-T3.18 (next free T3.x ids; current max T3.14) immediately AFTER T3.14
      (~L6834) and BEFORE the "# ----- T4:" comment (~L6836), each fully-structured (id + text + status: open
      ExitCriterion objects, since new "- id:" lines ARE touched-items under validate_platform_roadmap (ii)).
      Exact definitions in execution_steps. depends_on wiring: T3.15 [T3.17]; T3.16 []; T3.17 []; T3.18 [T3.1].
      All status: not_started, strategic: false, related_intents: [verification-system], with a note that
      derived recs are automatable: false (Decision 44). Exit criteria are lifted verbatim-in-substance from
      each audit finding's `acceptance` field.
  # --- Decision-70 mis-cite correction (DECISIONS.md + ledger + post-merge backfill) ---
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Decision-70 mis-cite correction (audit meta.contract_notes item 1). Add dated bracketed amendment
      NOTES at each mis-cite site WITHOUT rewriting the historical "Decision 70" text: (1) L416 and L430
      (inside Decision 103) -- the closure-proof principle cited as "Decision 70" is a mis-cite; the
      principle is THIS decision (Decision 103, DECISIONS.md:413-416); Decision 70 (DECISIONS.md:1916) is
      "Physical Deletion of Bootstrap Records". (2) L1253 and L1264 (inside Decision 87) -- "lifecycle-state
      closure per Decision 70" is a mis-cite; the closure-proof / never-infer principle is Decision 103;
      Decision 70 is bootstrap-record deletion. (3) L1338 (inside Decision 84) -- SITE-SPECIFIC, NO 103
      redirect (operator pick): "Decision 70" is a mis-cite (Decision 70 = bootstrap-record deletion); the
      queue current-state semantics referenced are Decision 84's OWN priority_queue_current verb, not
      Decision 103. Do NOT touch Decision 70 itself (L1916) or any other text.
  - file: docs/contracts/exit-criteria-ledger.yaml
    action: Modify
    purpose: >-
      Fix decisions_cited (L5): replace "Decision-70" with "Decision-103" (the ledger's Status-Trusted-
      Never-Inferred / closure-requires-proof citation is the closure-proof principle = Decision 103, not
      the bootstrap-deletion Decision 70). Bump last_updated to "2026-07-03". No other change (the file is
      intentionally non-ritual; validate_contract_drift skips it -- no contract: key).
