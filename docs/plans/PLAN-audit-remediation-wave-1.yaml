  - "Post-merge only: `bin/venv-python -m scripts.ops_data_portal --backfill-decisions-md` re-syncs the amended Decision 103/87/84 bodies into ops_decisions (sanctioned DECISIONS.md -> ops_decisions ETL, Decision 84 I-2). Requires the agent_platform (PlatformDev) static-key chain reachable at merge time; VP step 11 runs it post-merge."
acceptance_criteria:
