  - "VF-10: T4.1 AND T4.9 each carry a HeartbeatSeconds/TimeoutSeconds verdict-wait criterion routing timeout to ci-rca; CD.38's callback-failure discipline point enumerates 'verdict-timeout' alongside stale/duplicate/auth."
  - "VF-12: T3.1 c6 names 'GitHub Actions job keyed by rec id' as the differential-verify substrate (Step Functions dispatches/waits) with a preserved-original-wording amendment note and status still met; scripts/verification_checks.py docstring names GitHub Actions as the substrate; CD.38 has a new differential-verify-in-GHA discipline point."
