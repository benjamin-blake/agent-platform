verification_plan:
  - step: 1
    phase: pre-deploy
    action: Plan document schema validation.
    command: "bin/venv-python -m scripts.plan_document docs/plans/PLAN-audit-remediation-wave-1.yaml"
    expected: "PlanDocument validates (schema_version 1; V2; scope/VP/acceptance well-formed)."
    fix_if: "Schema error -- correct the offending field per plan_document.py."
  - step: 2
    phase: pre-deploy
    action: Roadmap loads under platform_roadmap.py; assert the lifecycle flips and new items are present and well-formed.
    command: "bin/venv-python -c \"from scripts.platform_roadmap import load; from pathlib import Path; d=load(Path('docs/ROADMAP-PLATFORM.yaml')); items={i.id:i for i in d.tier_items}; assert items['T3.1'].status=='complete', items['T3.1'].status; assert items['T3.10'].status=='not_started', items['T3.10'].status; new=['T3.15','T3.16','T3.17','T3.18']; assert all(n in items for n in new), [n for n in new if n not in items]; assert items['T3.15'].depends_on==['T3.17'] and items['T3.18'].depends_on==['T3.1'], (items['T3.15'].depends_on, items['T3.18'].depends_on); print('roadmap load OK')\""
    expected: "Prints roadmap load OK (T3.1 complete, T3.10 not_started, T3.15-T3.18 present with correct deps)."
    fix_if: "A status/dep assertion fails -- fix the roadmap edit; if load() raises, fix the YAML/structure."
  - step: 3
    phase: pre-deploy
    action: Roadmap schema + candidate-decision ratification guards pass (CDs stay pending; size guard clean).
    command: "bin/venv-python -c \"f=[]; __import__('scripts.checks.roadmap.validate_platform_roadmap',fromlist=['x']).validate_platform_roadmap(f); __import__('scripts.checks.roadmap.validate_candidate_decision_ratification',fromlist=['x']).validate_candidate_decision_ratification(f); print('roadmap guards FAILED:',f) if f else print('roadmap guards OK')\""
    expected: "Prints roadmap guards OK (no bare-string-on-touched-item failure for T3.15-T3.18; no ratification-guard trip; under 10k lines)."
    fix_if: "A guard fails -- if bare-string on a new item, convert its criteria to ExitCriterion objects; if ratification, ensure no CD gained ratified_as/filed_via; if size, the additions overflow (they should not)."
  - step: 4
    phase: pre-deploy
    action: VF-09 landed (T4.9 head-SHA binding + status-alphabet note).
    command: "T49=$(bin/venv-python -c \"import re; s=open('docs/ROADMAP-PLATFORM.yaml').read(); m=re.search(r'- id: T4\\.9.*?(?=\\n  - id: )', s, re.S); print(m.group(0))\"); echo \"$T49\" | grep -qi 'head SHA' && echo \"$T49\" | grep -qi 'verified head SHA equals the PR head' && echo \"$T49\" | grep -qi 'PASS/FAIL/WARN/SKIPPED' && echo \"$T49\" | grep -qi 'executor-ci-handshake' && echo 'VF-09 OK'"
    expected: "Prints VF-09 OK (head SHA in correlation tuple + SHA-equality merge criterion + status-alphabet note naming the handshake contract, all within T4.9)."
    fix_if: "A grep misses -- complete the missing T4.9 edit."
  - step: 5
    phase: pre-deploy
    action: VF-10 landed (T4.1 + T4.9 verdict-wait + CD.38 verdict-timeout).
    command: "bin/venv-python -c \"import re; s=open('docs/ROADMAP-PLATFORM.yaml').read(); g=lambda i: re.search(r'- id: '+re.escape(i)+r'.*?(?=\\n  - id: )', s, re.S).group(0); import sys; ok=('HeartbeatSeconds' in g('T4.1') and 'HeartbeatSeconds' in g('T4.9') and 'verdict-timeout' in g('CD.38')); print('VF-10 OK' if ok else 'VF-10 FAIL'); sys.exit(0 if ok else 1)\""
    expected: "Prints VF-10 OK (HeartbeatSeconds criterion in both T4.1 and T4.9; 'verdict-timeout' in CD.38's discipline point)."
    fix_if: "A term is missing -- add the timeout/heartbeat criterion to the missing item or the CD.38 enumeration."
  - step: 6
    phase: pre-deploy
    action: VF-12 landed (T3.1 c6 substrate + verification_checks.py docstring + CD.38 point; original c6 wording preserved; c6 still met).
    command: "bin/venv-python -c \"import re,sys; s=open('docs/ROADMAP-PLATFORM.yaml').read(); t31=re.search(r'- id: T3\\.1\\b.*?(?=\\n  - id: )', s, re.S).group(0); cd38=re.search(r'- id: CD\\.38.*?(?=\\n  - id: )', s, re.S).group(0); doc=open('scripts/verification_checks.py').read()[:600]; ok=('GitHub Actions job keyed by rec id' in t31 and 'Amendment 2026-07-03, VF-12' in t31 and 'Step-Functions executor verify-state deferred per CD.27' in t31 and 'GitHub Actions' in cd38 and 'GitHub Actions' in doc); print('VF-12 OK' if ok else 'VF-12 FAIL'); sys.exit(0 if ok else 1)\""
    expected: "Prints VF-12 OK (T3.1 c6 names the GHA substrate AND preserves the original 'Step-Functions executor verify-state' wording in the amendment note; CD.38 + docstring name GitHub Actions)."
    fix_if: "A term is missing -- ensure c6 both adds the GHA substrate and preserves original wording in the note; add the CD.38 point / docstring line."
