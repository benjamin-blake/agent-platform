  Each probe is self-reverting (its own revert PR through the gated destroy path). The durable
  changes (PassRole grant, _write_coverage assertion) are additive and safe to leave live even if the
  probes are abandoned -- PassRole only widens the apply role to a verb AWS already requires for the
  CreateFunction it holds, gated by the lambda condition. If a probe apply genuinely fails, it is a
  real red-latch recovered via workflow_dispatch acknowledge-and-retry AFTER the ci-rca rec is
  reviewed (Decision 55) -- never a silent re-plan-and-apply; the failure is the audit evidence.
