schema_version: 1
slug: "t248-passrole-liveproof"
intent: >-
  Complete the Decision-144 allow-list inversion by granting the single missing verb (iam:PassRole)
  that lambda:CreateFunction structurally requires, then obtain the DEP-01/DEP-02 live-proofs the
  audit's centerpiece never captured (E and F were applied via break-glass admin, not the
  autonomous/gated path) using throwaway agent-platform-probe-* probes -- making a new
  agent-platform-* Lambda genuinely auto-deployable end-to-end and closing T2.48 c1/c2 and rec-2831.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-t248-passrole-liveproof.yaml
phase: >-
  Platform tier T2.48 (DEP-01/DEP-02 live-proof, realizes Decision 144); slice H of the
  terraform-deploy-redesign overseer run (audit terraform-deploy-redesign-b67955b, prove-then-close).
scope:
  - file: terraform/bootstrap/github_ci_apply.tf
    action: Modify
    purpose: >-
      Add the missing iam:PassRole grant to BOTH the github_ci_apply identity policy (a new Sid
      scoped to role/agent-platform-* with condition iam:PassedToService=lambda.amazonaws.com) AND
      the boundary DataPlaneAllow ceiling (a grant absent from the ceiling is silently denied by the
      intersection). Pre-stage the DEP-02 probe role's exact ARN in the enumerated IAMRolesRead list
      (established pre-add pattern, cf. planner/deploy at lines 187-188). Applied via the DESIGNED
      bootstrap admin tier (bootstrap is NEVER auto-applied -- terraform/bootstrap/CLAUDE.md).
  - file: scripts/checks/iam_tf/_write_coverage.py
    action: Modify
    purpose: >-
      Anti-recurrence hardening (audit's own static-guard pattern): assert that if github_ci_apply
      grants lambda:CreateFunction, its inline policy AND the boundary DataPlaneAllow both grant
      iam:PassRole scoped to role/agent-platform-* with the PassedToService=lambda condition. Encodes
      the AWS CreateFunction-implies-PassRole invariant so rec-2831's gap can never silently recur.
      Runs in CI via the existing validate_ci_refresh_read_coverage orchestrator (no registry / no
      validate.py facade rewiring). PLUMBING (critique R5): the facade passes ONLY the github_ci_apply
      identity apply_statements, NOT the boundary policy, so the identity-side assertion uses the
      passed apply_statements while the boundary-side assertion RE-READS + parses the boundary
      DataPlaneAllow block from terraform/bootstrap/github_ci_apply.tf itself inside _write_coverage.py
      (reusing the _read_coverage parse primitives), keeping the orchestrator facade OUT of scope.
      Stays well under the 500-SLOC budget (~130 SLOC + ~35).
  - file: tests/checks/iam_tf/test__write_coverage.py
    action: Modify
    purpose: >-
      Positive + negative coverage for the new CreateFunction-implies-PassRole assertion (present ->
      pass; CreateFunction-without-PassRole and boundary-missing-PassRole -> loud fail).
  - file: terraform/personal/probe_dep01_lambda.tf
    action: Create
    purpose: >-
      DEP-01 live-proof probe (created then reverted within this plan): a throwaway
      agent-platform-probe-liveproof Lambda that REUSES an existing agent-platform-* execution role
      (aws_iam_role.ops_compaction.arn -- NO new aws_iam_role, keeps the plan non-IAM so the guard
      PASSes and it auto-applies), its /aws/lambda/agent-platform-probe-* log group, and one
      agent-platform-probe-* CloudWatch alarm. Code is S3-sourced (s3_bucket/s3_key at an existing
      lambda-packages object, source_code_hash omitted) -- NOT data.archive_file/filemd5 on a local
      path (the go-wrong trap: a PR-plan-time zip does not exist in the apply job's fresh checkout).
  - file: terraform/personal/probe_dep02_role.tf
    action: Create
    purpose: >-
      DEP-02 live-proof probe (created then reverted within this plan): a throwaway boundary-carrying
      agent-platform-probe-liveproof-role (permissions_boundary = the authority-budget ARN,
      lambda.amazonaws.com trust, one tiny in-boundary inline policy = logs:CreateLogStream/PutLogEvents
      on its own log group, with the rec-2793 whitespace-stripped byte precondition). Referenced by NO
      workflow / NO CI config -- structurally dodges rec-2824's bootstrap deadlock (which only fires
      when a role PR repoints its OWN CI onto the not-yet-existent role).
  - file: terraform/personal/oidc.tf
    action: Modify
    purpose: >-
      Add the DEP-02 probe role's exact ARN to the github_ci_planner refresh-read list
      (IAMPlatformRolesRead) so the hourly terraform-drift plan (planner identity) stays green while
      the probe role exists -- CI-mandatory: validate_ci_refresh_read_coverage requires every
      terraform/personal resource read-covered in BOTH apply (bootstrap) and planner (oidc.tf).
      Added in the DEP-02 create PR, removed in the DEP-02 revert PR.
  - file: docs/ROADMAP-PLATFORM.yaml
    action: Modify
    purpose: >-
      Roadmap bookkeeping. TRUTHFUL SUBSET early (E/F/G already shipped + applied live): T2.49 ->
      complete (c1/c2/c3 met, met_by ci-deploy-role-consolidation); T2.48 c3/c4/c5 -> met (met_by
      terraform-iam-allowlist-inversion) + item in_progress + a progress_note that ALSO records that
      T2.44/T2.45 (DEP-06 guard resource-based-policy classification) remain not_started, that the
      write-surface broadening shipped ahead of them (a pre-existing Decision-144-pt7 sequencing gap
      this plan INHERITS, not causes), and that these probes deliberately avoid the
      resource-based-policy surface (no aws_lambda_permission) so they do not depend on the unshipped
      DEP-06 work; T2.50 -> complete (c1/c2 met, met_by gate-path-protection, c1 with the
      documented-confound note). HELD until the probe run-ids exist: T2.48 c1/c2 -> met (met_by
      t248-passrole-liveproof) + a T2.48 progress_note recording the DEP-01/DEP-02 LIVE-PROOF with the
      two run-ids -- NOT a whole-Decision-144-audit-complete claim (T2.44/T2.45 are not_started, so
      whole-audit completion would be false; that determination is the overseer's G3 call, out of this
      plan's scope). Flipped in the closing step (PR-4).
bundled_recommendations:
  - rec-2831
closes_criteria:
  - "T2.48:c1"
  - "T2.48:c2"
infrastructure_dependencies:
  - >-
    terraform/bootstrap/github_ci_apply.tf is applied ONLY by the human-gated admin tier (PlatformAdmin
    / agent_platform_admin), never auto-applied (terraform/bootstrap/CLAUDE.md). The PassRole admin
    apply MUST land and be verified live BEFORE the DEP-01 probe PR merges, or CreateFunction
    AccessDenies at auto-apply (the exact rec-2831 failure the plan exists to fix).
  - >-
    DEP-01 probe (aws_lambda_function + aws_cloudwatch_log_group + aws_cloudwatch_metric_alarm, no
    aws_iam_* resource) is a non-IAM plan -> deterministic guard PASSes -> terraform-apply-sandbox
    auto-applies the saved plan.bin on push-to-main. Requires PassRole live (above). Read+write
    coverage is already satisfied by the existing agent-platform-* prefixes (function:agent-platform-*,
    logs:* / cloudwatch:* wildcards, alarm:agent-platform-*) -- zero bootstrap edit for the Lambda.
  - >-
    DEP-02 probe (aws_iam_role create) is IAM_SENSITIVE -> guard exits 2 -> routes to the
    tf-gated-apply GitHub Environment -> HUMAN approval -> apply. CreateRole is in-budget because the
    role declares the mandatory permissions_boundary (IAMRoleCreateBounded's PermissionsBoundary
    condition), so the gated apply succeeds with 0 AccessDenied and the admin tier is NOT invoked
    (this is precisely DEP-02's acceptance). validate_boundary_attached forces the boundary at PR time.
  - >-
    Both reverts are DESTROYS -> guard routes to tf-gated-apply -> HUMAN approval. The DEP-02 role
    destroy exercises the HAZARD-4 delete verbs (iam:DeleteRole/DeleteRolePolicy) that E designed in
    and F simulate-verified live. Human-gated apply count for the whole plan: 1 bootstrap admin apply
    + 3 gated approvals (DEP-01 revert, DEP-02 create, DEP-02 revert). HONESTY CAVEAT (not fully
    self-cleaning): because bootstrap is NEVER auto-applied, removing the pre-staged probe-role ARN
    from the committed bootstrap HCL (PR-3-revert) leaves the LIVE IAMRolesRead grant dangling
    (committed != live drift) until an unscheduled future admin bootstrap apply -- an effective
    deferred 4th admin apply. It is inert (a refresh-read grant on a since-destroyed ARN, and
    terraform-drift monitors terraform/personal, NOT bootstrap, so it raises no drift-red), but it is
    real residual state, not zero.
acceptance_criteria:
  - >-
    github_ci_apply's identity policy grants iam:PassRole scoped to role/agent-platform-* with
    condition iam:PassedToService=lambda.amazonaws.com, AND the boundary DataPlaneAllow Action list
    includes iam:PassRole; the rec-2793 whitespace-stripped byte precondition (minified inline policy
    <= 10,240 B) still holds after the addition.
  - >-
    _write_coverage asserts CreateFunction-implies-PassRole for BOTH the identity policy (via the
    passed apply_statements) AND the boundary DataPlaneAllow (re-read + parsed inside the submodule,
    facade unchanged); validate --pre is exit 0 including the new assertion, and the new test's
    negative cases (CreateFunction-without-identity-PassRole and boundary-missing-PassRole) fail loud.
  - >-
    Decision 143 PassRole containment is proven by the bootstrap simulate-gate (VP step 10): PassRole
    is allowed ONLY for the role/agent-platform-* + iam:PassedToService=lambda.amazonaws.com dual
    predicate, denied off-scope, and the boundary self-protection denies (DenyIAMEscalation,
    DenyBoundaryRemoval, DenyBoundaryPolicyModification) still dominate after iam:PassRole is added to
    DataPlaneAllow -- no escalation intersection.
  - >-
    DEP-01 (T2.48 c1): a PR adding the agent-platform-probe-* Lambda + log group + alarm auto-applies
    end-to-end via terraform-apply-sandbox with the guard PASSing, 0 AccessDenied, and 0 bootstrap
    edit; the function/log-group/alarm are confirmed live; the auto-apply run-id is captured.
  - >-
    DEP-02 (T2.48 c2): a PR creating the boundary-carrying agent-platform-probe-* role routes to
    tf-gated-apply and, on human approval via the rec-2816 verify-checklist pilot, applies with 0
    AccessDenied without invoking the admin tier; the role is confirmed live carrying the boundary;
    the gated-apply run-id is captured.
  - >-
    Both probes are reverted through the gated destroy path (HAZARD-4 verbs for the role); the probe
    files, the oidc.tf planner read entry, and the bootstrap probe read entry are removed;
    terraform/personal is back at its pre-probe state and the convergence record is green.
  - >-
    rec-2831 is closed via the PR-4 Resolves trailer, VERIFIED post-merge in the synced read cache
    (not merely asserted pre-merge); the roadmap truthful-subset flips are landed (T2.49 complete,
    T2.48 c3/c4/c5 met + in_progress, T2.50 complete) and the held T2.48 c1/c2 are flipped with the
    two captured probe run-ids recorded in the T2.48 progress_note -- scoped to the DEP-01/DEP-02
    live-proof, NOT a whole-audit-complete claim (T2.44/T2.45 remain not_started).
verification_plan:
  - step: 1
    phase: pre-deploy
    action: >-
      Assert the iam:PassRole grant is present in github_ci_apply.tf in BOTH the identity policy and
      the boundary DataPlaneAllow (>= 2 occurrences).
    command: 'test "$(grep -c "iam:PassRole" terraform/bootstrap/github_ci_apply.tf)" -ge 2'
    expected: "Exit 0: iam:PassRole appears at least twice (identity Sid Action + boundary DataPlaneAllow)."
    fix_if: "0 or 1 occurrence -- PassRole missing from the identity policy or the boundary ceiling (silent deny)."
    hermetic: true
    graduation: graduate
    graduation_check_id: "passrole-grant-present-identity-and-boundary"
  - step: 2
    phase: pre-deploy
    action: "Assert the PassRole grant carries the PassedToService=lambda.amazonaws.com condition (not an unconditioned PassRole)."
    command: 'grep -q "iam:PassedToService" terraform/bootstrap/github_ci_apply.tf && grep -q "lambda.amazonaws.com" terraform/bootstrap/github_ci_apply.tf'
    expected: "Exit 0: the iam:PassedToService condition key and the lambda.amazonaws.com service value are both present."
    fix_if: "Missing condition -- an unconditioned PassRole over-grants (any service, any pass); scope it to lambda."
    hermetic: true
    graduation: graduate
    graduation_check_id: "passrole-passedtoservice-lambda-condition"
  - step: 3
    phase: pre-deploy
    action: >-
      Assert _write_coverage encodes the CreateFunction-implies-PassRole anti-recurrence invariant AND
      is self-contained (re-reads the boundary DataPlaneAllow block itself, since the facade passes
      only identity apply_statements).
    command: 'grep -q "PassRole" scripts/checks/iam_tf/_write_coverage.py && grep -Eq "DataPlaneAllow|boundary" scripts/checks/iam_tf/_write_coverage.py'
    expected: "Exit 0: the write-coverage submodule references both PassRole and the boundary block it re-reads (identity + boundary assertion, facade untouched)."
    fix_if: "PassRole absent -- rec-2831 has no standing CI guard; boundary reference absent -- the boundary-side assertion is not self-contained and would need the facade in scope."
    hermetic: true
    graduation: graduate
    graduation_check_id: "write-coverage-asserts-passrole-identity-and-boundary"
  - step: 4
    phase: pre-deploy
    action: "Run the _write_coverage unit tests (positive + the two negative cases) to confirm the new assertion fails loud."
    command: "bin/venv-python -m pytest tests/checks/iam_tf/test__write_coverage.py -q"
    expected: "All tests pass; the CreateFunction-without-PassRole and boundary-missing-PassRole cases assert a loud failure."
    fix_if: "A negative case passes silently -- the assertion is vacuous; tighten the check."
    hermetic: false
    graduation: not-applicable
  - step: 5
    phase: pre-deploy
    action: >-
      DEP-01 go-wrong-trap mitigation: assert probe_dep01_lambda.tf is S3-sourced (s3_key), declares
      NO aws_iam_role, and uses NO archive_file / filemd5-on-a-local-path.
    command: 'grep -q "s3_key" terraform/personal/probe_dep01_lambda.tf && ! grep -Eq "archive_file|filemd5" terraform/personal/probe_dep01_lambda.tf && ! grep -q "resource \"aws_iam_role\"" terraform/personal/probe_dep01_lambda.tf'
    expected: "Exit 0: S3-sourced code, no archive_file/filemd5, no new IAM role (reuses an existing agent-platform-* exec role)."
    fix_if: "archive_file/filemd5 present -> the saved plan.bin cannot read the zip in the apply job's fresh checkout (masquerades as an IAM failure); a new aws_iam_role would flip the guard to BLOCK."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Targets terraform/personal/probe_dep01_lambda.tf, a transient probe file created and then
      reverted within this plan; there is no persistent tree state for a standing regression guard to
      assert against (the file is deleted by the DEP-01 revert PR).
  - step: 6
    phase: pre-deploy
    action: >-
      DEP-02 structural asserts: probe_dep02_role.tf declares permissions_boundary = the authority
      budget ARN and lambda.amazonaws.com trust, and the probe role name appears in NO workflow /
      oidc.tf CI-role config (dodges rec-2824).
    command: 'grep -q "permissions_boundary" terraform/personal/probe_dep02_role.tf && grep -q "lambda.amazonaws.com" terraform/personal/probe_dep02_role.tf && ! grep -rq "agent-platform-probe-liveproof-role" .github/workflows/'
    expected: "Exit 0: boundary declared, lambda trust, and the probe role is referenced by no workflow (structurally cannot trip the rec-2824 self-repoint deadlock)."
    fix_if: "Missing boundary -> validate_boundary_attached fails + gated CreateRole AccessDenies; a workflow reference would recreate the rec-2824 bootstrap deadlock."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Targets terraform/personal/probe_dep02_role.tf, a transient probe file created and reverted
      within this plan; no persistent tree state exists for a standing regression guard.
  - step: 7
    phase: pre-deploy
    action: >-
      Assert the DEP-02 probe role's exact ARN is present in BOTH read-lists (bootstrap IAMRolesRead
      pre-staged, oidc.tf planner read-list) so validate_ci_refresh_read_coverage passes and drift
      stays green.
    command: 'grep -q "agent-platform-probe-liveproof-role" terraform/bootstrap/github_ci_apply.tf && grep -q "agent-platform-probe-liveproof-role" terraform/personal/oidc.tf'
    expected: "Exit 0: the probe role ARN is refresh-read-covered in both the apply (bootstrap) and planner (oidc.tf) policies."
    fix_if: "Missing in either -> validate_ci_refresh_read_coverage FAILS LOUD at PR time; or the hourly drift plan AccessDenies on GetRole and false-reds."
    hermetic: false
    graduation: waive
    graduation_waiver_reason: >-
      Both read-list entries are transient (added in the DEP-02 create PR, removed at revert); they do
      not persist to the final tree, so there is no standing state for a regression guard to assert.
  - step: 8
    phase: pre-deploy
    action: >-
      Whole-tree presubmit: run the fast gate. Confirms the roadmap schema (met_by resolves,
      closes_criteria integrity), the write-coverage check, boundary-attached lint, and public-repo
      secret guards all pass on the working tree.
    command: "bin/venv-python -m scripts.validate --pre"
    expected: "Exit 0 -- all registered --pre checks pass (advisory outside CI; authoritative in PR CI)."
    fix_if: "Any FAIL -- fix the specific check before proceeding; never patch around a red gate (Decision 55)."
    hermetic: false
    graduation: not-applicable
  - step: 9
    phase: post-deploy
    action: >-
      [PR-1 merged; HUMAN admin gate -- NEVER auto-applied] Admin-apply terraform/bootstrap (PassRole
      + pre-staged probe read entry) under agent_platform_admin. STOP if the plan shows any
      destroy/replace of github_ci_apply. The overseer relays the plan; the human reviews and
      explicitly directs the apply.
    command: "terraform -chdir=terraform/bootstrap plan -var-file=terraform/bootstrap/terraform.bootstrap.tfvars   # then apply the saved plan on explicit human direction"
    expected: "Plan is a pure inline-policy update (0 add / 1 change / 0 destroy); the rec-2793 whitespace-stripped precondition (<= 10,240 B) passes; apply completes; live policy now grants iam:PassRole."
    fix_if: "Any destroy/replace of the apply role or its policy -> STOP (would break in-flight CI). Precondition breach -> relocate a read-only Sid to a customer-managed policy before retry."
  - step: 10
    phase: post-deploy
    action: >-
      [HUMAN -- NAMED ACCEPTANCE: Decision 143 PassRole containment] Re-run the simulate-principal-policy
      gate on the applied policy. Assert four containment properties: (a) the PassRole grant is ALLOWED
      only for the dual-predicate shape (role/agent-platform-* target AND
      iam:PassedToService=lambda.amazonaws.com); (b) it is DENIED off-scope (a non-agent-platform-*
      target, or a non-lambda service); (c) adding iam:PassRole to the boundary DataPlaneAllow did NOT
      weaken or intersect the self-protection denies -- DenyIAMEscalation, DenyBoundaryRemoval, and
      DenyBoundaryPolicyModification must still dominate (an unbounded CreateRole/PutRolePolicy and any
      boundary self-modification stay explicitDeny); (d) the PRIVILEGED-CI-role-target case -- passing
      a privileged agent-platform-* role (e.g. agent-platform-github-ci-apply or
      agent-platform-github-ci-planner) to lambda -- is ALLOWED by the prefix grant (by design under
      Decision 143, not a defect), AND the apply role holds NO broad lambda:InvokeFunction, so it
      cannot create-then-invoke such a lambda to escalate in-session: the seam stays contained. Assert
      both halves of (d) explicitly.
    command: 'aws iam simulate-principal-policy --policy-source-arn "arn:aws:iam::${ACCOUNT_ID}:role/agent-platform-github-ci-apply" --action-names iam:PassRole iam:CreateRole iam:DeletePolicyVersion lambda:InvokeFunction --resource-arns "arn:aws:iam::${ACCOUNT_ID}:role/agent-platform-ops-compaction" --context-entries "ContextKeyName=iam:PassedToService,ContextKeyValues=lambda.amazonaws.com,ContextKeyType=string" --profile agent_platform   # then repeat PassRole with (i) a non-agent-platform-* target and ecs.amazonaws.com -> implicitDeny off-scope, and (ii) the agent-platform-github-ci-planner role as target -> allowed (privileged-target case)'
    expected: "PassRole=allowed for the agent-platform-* + lambda dual-predicate shape (incl. a privileged CI role target -- by design); implicitDeny for a non-agent-platform-* target OR a non-lambda service; unbounded iam:CreateRole and iam:DeletePolicyVersion on the boundary policy remain explicitDeny (self-protection denies dominate); lambda:InvokeFunction is implicitDeny/absent (the apply role cannot invoke what it creates -- privileged-target PassRole is contained)."
    fix_if: "allowed off-scope -> the Resource/condition is too loose (worst-verb-scoping violated); explicitDeny on the in-scope PassRole -> the boundary DataPlaneAllow is missing iam:PassRole (silent intersection deny); any self-protection Deny flips to allowed -> PassRole intersected a Deny (STOP, do not proceed); lambda:InvokeFunction ALLOWED -> the privileged-target containment argument breaks (a broad invoke would let the apply role create-and-run a lambda as a privileged role) -- STOP and escalate."
  - step: 11
    phase: post-deploy
    action: >-
      [PR-2 merged; AUTO-APPLY, no human gate] Merge the DEP-01 probe PR; terraform-apply-sandbox
      guard PASSes (non-IAM) and applies the saved plan.bin. Verify 0 AccessDenied and the resources
      live; capture the run-id.
    command: 'gh run list --workflow=terraform-apply-sandbox.yml -L 1 --json databaseId,conclusion,url && aws lambda get-function --function-name agent-platform-probe-liveproof --profile agent_platform --query "Configuration.FunctionName"'
    expected: "apply-sandbox run conclusion=success, guard verdict PASS, 0 AccessDenied in the apply log; the Lambda + /aws/lambda/agent-platform-probe-* log group + agent-platform-probe-* alarm exist; run-id recorded."
    fix_if: "AccessDenied at CreateFunction -> PassRole not live (step 9 did not land); a genuine red-latch is recovered via ack-dispatch/reconcile AFTER ci-rca review (Decision 55) -- and IS the audit evidence."
  - step: 12
    phase: post-deploy
    action: >-
      [PR-2-revert; HUMAN gated destroy] Merge the DEP-01 revert PR (deletes probe_dep01_lambda.tf);
      the guard routes the destroy to tf-gated-apply; human approves; verify the resources are gone
      (bonus gated-destroy datapoint).
    command: 'gh run list --workflow=terraform-apply-sandbox.yml -L 1 --json databaseId,conclusion,url  # approve tf-gated-apply in the GitHub Actions UI, then: aws lambda get-function --function-name agent-platform-probe-liveproof --profile agent_platform 2>&1 | grep -q ResourceNotFound'
    expected: "Guard routes to gated; after human approval the apply destroys the Lambda/log-group/alarm; get-function returns ResourceNotFoundException."
    fix_if: "Destroy AccessDenied -> unexpected (delete verbs for non-IAM resources are in-boundary); investigate before proceeding."
  - step: 13
    phase: post-deploy
    action: >-
      [PR-3 merged; HUMAN gated -- rec-2816 verify-checklist PILOT] Merge the DEP-02 probe PR; guard
      BLOCKs (aws_iam_role create) and routes to tf-gated-apply. The human runs the rec-2816 checklist
      (open the speculative-plan PR comment, confirm the plan sha == the saved-plan S3 key, THEN
      approve). Verify 0 AccessDenied, the role live carrying the boundary; capture the run-id. Freeze
      other terraform/personal merges during the approval window (shared apply-sandbox concurrency
      group, cancel-in-progress:false) and do NOT fire reconcile/ack-dispatch (rec-2824 layer-1 unfixed).
    command: 'gh run list --workflow=terraform-apply-sandbox.yml -L 1 --json databaseId,conclusion,url && aws iam get-role --role-name agent-platform-probe-liveproof-role --profile agent_platform --query "Role.PermissionsBoundary.PermissionsBoundaryArn"'
    expected: "Guard verdict ROUTE; after human approval the gated apply creates the role with 0 AccessDenied and the admin tier is NOT invoked; get-role shows the agent-platform-github-ci-apply-boundary; run-id recorded."
    fix_if: "AccessDenied on CreateRole -> the role did not declare the boundary (validate_boundary_attached should have caught it) or the boundary condition mismatched; a genuine failure is the audit evidence (recover via ack-dispatch after ci-rca review)."
  - step: 14
    phase: post-deploy
    action: >-
      [PR-3-revert; HUMAN gated destroy] Merge the DEP-02 revert PR (deletes probe_dep02_role.tf +
      removes the oidc.tf planner read entry); the guard routes the role destroy to tf-gated-apply
      (HAZARD-4 verbs iam:DeleteRole/DeleteRolePolicy); human approves; verify the role is gone and
      the convergence record is green.
    command: 'gh run list --workflow=terraform-apply-sandbox.yml -L 1 --json databaseId,conclusion,url  # approve tf-gated-apply, then: aws iam get-role --role-name agent-platform-probe-liveproof-role --profile agent_platform 2>&1 | grep -q NoSuchEntity'
    expected: "Guard routes to gated; after approval the role is destroyed (get-role -> NoSuchEntity); apply-sandbox writes convergence green; terraform/personal matches origin/main."
    fix_if: "Destroy AccessDenied -> the HAZARD-4 delete verbs regressed on github_ci_apply; re-verify E's IAMRoleDeleteBounded grant."
  - step: 15
    phase: post-deploy
    action: >-
      [PR-4; bookkeeping, PRE-merge] Flip the HELD T2.48 c1/c2 -> met (met_by t248-passrole-liveproof)
      recording the two captured probe run-ids in the T2.48 progress_note, scoped to the DEP-01/DEP-02
      LIVE-PROOF -- NO whole-audit-complete claim (T2.44/T2.45 not_started; that is the overseer's G3
      call). Add the Resolves: rec-2831 trailer to the squash-merge commit. Confirm validate --pre and
      validate_platform_roadmap green. (The bootstrap probe-ARN removal is done in PR-3-revert, not
      here -- no double-attribution.)
    command: 'bin/venv-python -m scripts.validate --pre && test "$(grep -c "met_by: t248-passrole-liveproof" docs/ROADMAP-PLATFORM.yaml)" -ge 2'
    expected: "validate --pre exit 0 (includes validate_platform_roadmap); the met_by=t248-passrole-liveproof line appears at least twice (both held criteria T2.48 c1 and c2 flipped to met with this plan's slug) -- a count check that is robust to YAML text-wrapping pushing met_by out of an -A window."
    fix_if: "Roadmap validation fails -> a met criterion lacks met_by, or a met_by does not resolve to a real plan/40-hex; fix per validate_platform_roadmap check (i)/(g)."
  - step: 16
