  - "Branch was 0 commits behind origin/main at planning time; no scope-file overlap, no rebase required."
pre_implementation_checklist:
  - Branch confirmed not on main (claude/audit-ulf-04-ulf-10-o56iof)
  - docs/PROJECT_CONTEXT.md read (pytest -k gotcha, Decision 84 ID authority noted)
  - DECISIONS.md relevant decisions triaged (decision-scout, 73 of 73)
  - All six files in scope located and readable
  - Acceptance criteria understood and independently verifiable
  - Re-check the max Decision number before authoring Decision 114 (numbering race)
execution_steps:
  - >-
    scripts/platform_roadmap.py: extend OpenQuestion and KnownGap with two fields each --
    'status: Literal["open", "resolved", "closed", "promoted"] = "open"' and
    'resolution_ref: str | None = None'. Keep model_config = ConfigDict(extra="ignore").
  - >-
    scripts/platform_roadmap.py: in RoadmapDocument._validate_graph, after the ExitCriterion (g)/(h)
    checks, add checks (i)/(j): for every open_question and known_gap, if status != "open" and not
    resolution_ref, raise ValueError naming the entry id (e.g. "open_question 'OQ.X': status='resolved'
    requires a non-empty resolution_ref"). This mirrors the ExitCriterion met_by rule and Decision 93.
  - >-
    docs/ROADMAP-PLATFORM.yaml: add status + resolution_ref to the 14 prose-resolved entries per the
    mapping -- KG.6 promoted/CD.18; KG.8 closed/CD.21; KG.10 promoted/CD.19; OQ.1 resolved/T0.9;
    OQ.2 resolved/T0.10; OQ.4 resolved/CD.26; OQ.7 resolved/CD.34; OQ.8 resolved/CD.34; OQ.9 resolved/CD.34;
    OQ.10 resolved/CD.33; OQ.11 resolved/CD.34; OQ.12 resolved/PLAN-oq12-clone-rehearsal-lambda;
    OQ.13 resolved/CD.31; OQ.15 resolved/Decision 91. Leave OQ.3/OQ.5/OQ.6/OQ.14 untouched (implicit open).
    Preserve each entry's existing notes prose.
  - >-
    scripts/checks/roadmap/validate_platform_roadmap.py: add a module-level constant
    '_ROADMAP_MAX_LINES = 10_000  # Decision 114 (raised from KG.11's 2500)' and a small pure helper
    '_roadmap_size_issues(text, ceiling=_ROADMAP_MAX_LINES) -> list[str]' returning a one-item FAIL list
    (naming the line count, the ceiling, and Decision 114) when the line count exceeds the ceiling, else [].
    Inside validate_platform_roadmap, after load(), append UNCONDITIONALLY:
    'issues += _roadmap_size_issues(roadmap_path.read_text(encoding="utf-8"))' -- NO in-check if-branch,
    so the append line is covered by the existing check-invoking tests and the helper's two branches by
    TestRoadmapSizeGuard, keeping the module at 100% per-file coverage (Decision 104 gate). Do not add a
    new registry entry -- extend the existing registered check (Decision 104-compliant).
  - >-
    docs/DECISIONS.md: author Decision 114 in the house format used by Decisions 112/113 -- header
    "## Decision 114: Raise the ROADMAP-PLATFORM.yaml size ceiling to 10,000 lines and add a deterministic
    guard (supersedes KG.11's 2500-line/50K-token trigger) (Decided)"; Status: Decided; Date: 2026-07-03;
    Warehouse ID: dec-114 (... synced via ops_data_portal --backfill-decisions-md post-merge, per Decision 84);
    Decision body (single-file retained not split, per AGENTS.md agent-first one-file principle / Decision 110;
    the guard lives in validate_platform_roadmap); Reversal conditions (revisit split-per-tier when the 10,000
    ceiling is breached or per-/plan load cost becomes prohibitive); Related (KG.11, CD.39 exit-criteria-ledger
    precedent, Decision 84/86/93/110). Re-check the max Decision number first (numbering race).
  - >-
    docs/ROADMAP-PLATFORM.yaml: flip KG.11 to status: resolved, resolution_ref: "Decision 114", and rewrite
    its gap/notes to state the resolution (threshold raised to 10,000 lines via Decision 114 + deterministic
    line-count guard in validate_platform_roadmap; the 2500-line/50K-token trigger is superseded). Use the
    accurate current size (~7824 lines at resolution time), not KG.11's stale "~4,900 lines" figure.
  - >-
    tests/test_platform_roadmap.py: add class TestOpenQuestionKnownGapLifecycle covering -- valid enum values
    accepted on OpenQuestion and KnownGap; an invalid status value raises ValidationError; a RoadmapDocument
    with a status!=open OQ/KG lacking resolution_ref raises ValidationError; the same with resolution_ref
    passes; the live docs/ROADMAP-PLATFORM.yaml loads clean. Cover BOTH the open_question raise site AND the
    known_gap raise site (checks (i) and (j) are separate loops) so platform_roadmap.py stays at 100% per-file coverage.
  - >-
    tests/test_validate.py: add class TestRoadmapSizeGuard covering -- _ROADMAP_MAX_LINES == 10000; the
    helper returns the overage count for a >10000-line synthetic string and None for a <=10000-line string.
  - >-
    Execute the Verification Plan in order; loop until every step passes. Run VP step 10 (warehouse backfill)
    post-merge. On an unrecoverable failure, stop and RCA rather than patching around it (Decision 55).
  - "Report: what changed across the six files, the migrated entry set, Decision 114 number, and VP results."
work_areas: []
rollback: >-
  Revert the branch commit(s); there is no infra or warehouse-schema change. dec-114 is idempotently keyed
  on the decision number, so if the backfill already ran, removing the Decision 114 block and re-running
  --backfill-decisions-md reconciles ops_decisions (or leave dec-114 -- it is inert once the guard/KG.11
  edit are reverted). The OQ/KG migration is a pure additive field edit with no destructive data change.
