  - "T3.7 (both sites) and CD.29's discipline_point scope Decision 62 to the Session E DQ-freshness routine (GH-Actions-scheduled meta-validation is not that routine) and note the live-reader-DQ revisit of 62 is owned by T1.6 -- without claiming 62 'did not eliminate scheduled DQ' (the corrected, non-overreaching framing)."
  - "No new tier_item is created; every roadmap change is an in-place refinement of an existing item (user steer)."
  - "DECISIONS.md Decision 62 amended (inline 'premise revisit -- live-reader DQ' note) per explicit human direction (2026-06-16, fork b); ops_decisions reconciled via --backfill-decisions-md post-merge. No OTHER decision edited; no recs/ops-data write; no code change."
  - "The multi-perspective report critique (2 zero-context perspectives) converged AFTER revision: the initial BLOCK findings (depends_on relaxation, Decision-62 overreach, Decision-73 L8 + Decision-81 cl.5 mis-cites, iceberg_reader packaging) are all resolved; no unresolved HIGH remains."
verification_plan:
  - step: 1
    phase: post-edit
    action: Validate the edited roadmap against its Pydantic schema.
    command: bin/venv-python -m scripts.platform_roadmap docs/ROADMAP-PLATFORM.yaml
    expected: "Prints 'PASS: ... validates against RoadmapDocument schema.'"
    fix_if: "A schema error -- fix the offending tier_item field (unknown field, bad gate grammar, dangling depends_on) and re-run."
  - step: 2
    phase: post-edit
    action: Confirm no dangling/contradictory dependency from the T1.5 drop.
    command: grep -nE "depends_on:.*T1\\.(5|6)\\b" docs/ROADMAP-PLATFORM.yaml
    expected: "T1.6 depends_on [T0.12, T1.5] (T1.5 retained); referrers T4.2 (depends_on) + CD.12/CD.19 (gates:) all depend ON T1.6 complete, correctly gated via the retained edge; the lone other [T1.5] dependent is untouched."
    fix_if: "If T1.6's depends_on ever drops T1.5 again, the deferred-phase ordering is lost (decomposition_hints is not graph-enforced) and the G.6-retirement comment becomes false -- restore the edge."
  - step: 3
    phase: post-edit
    action: Run the fast presubmit tier over the changed docs (lint/format/prompt + plan + roadmap schema).
    command: bin/venv-python -m scripts.validate --pre
    expected: "Passes; Plan document schema validation + Platform roadmap schema both green; no emoji/em-dash violations."
    fix_if: "Address the named failing check (plan schema field, prompt-compliance) and re-run."
constraints:
