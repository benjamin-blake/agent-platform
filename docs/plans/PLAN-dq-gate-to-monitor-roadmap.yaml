  - "T1.6 carries the 4-move near-term sequence + decomposition_hints separating the authorable-ahead gate->monitor phase from the T1.5-gated deferred phase; depends_on is [T0.12, T1.5] (T1.5 RETAINED so the constraint stays graph-enforced); strategic:false with a freeze-override note."
