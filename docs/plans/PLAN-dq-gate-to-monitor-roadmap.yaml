schema_version: 1
slug: "dq-gate-to-monitor-roadmap"
intent: >-
  Capture, in the platform roadmap, the session-concluded architectural refinement that resolves the
  ~30-min CI wall-clock + DQ-reader merge-gate flapping: data-quality LIVE-READER checks move OFF the
  blocking merge gate and become a scheduled MONITOR/canary (alarm-not-gate); stateful invariants are
  enforced at write time (writer 4xx); the merge path keeps only hermetic structural contract checks and
  is bounded by a per-verifier timeout/circuit-breaker; persistent DQ unavailability alarms. The
  deliverable IS the roadmap edits (forward intent -> tier_items per Decision 86), reviewed from multiple
  angles so the direction is durable and future agents do not revert it. REPORT-ONLY: the report is the
  diff to docs/ROADMAP-PLATFORM.yaml; no code/data/decision-record change.
plan_type: REPORT-ONLY
verification_tier: V1
plan_path: docs/plans/PLAN-dq-gate-to-monitor-roadmap.yaml
phase: >-
  Platform reliability / CI architecture. Direction-capture follow-on to PLAN-dq-gate-infra-resilience
  (merged 2026-06-15, #163), which fixed CORRECTNESS (transient reader 502/503/504 -> non-gating SKIP) but
  explicitly left LATENCY + persistent-unavailability alerting + placement to a follow-up. No new
  tier_item; existing items refined in place (user steer 2026-06-16).
