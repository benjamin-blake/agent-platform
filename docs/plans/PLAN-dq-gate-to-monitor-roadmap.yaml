  - The session-concluded direction takes precedence over a stale existing item; encode it durably so a future revert visibly contradicts the roadmap.
  - Decision 62 IS amended in DECISIONS.md per explicit human direction (2026-06-16, fork option (b)) -- an inline "premise revisit -- live-reader DQ" note; propagated to ops_decisions via the portal --backfill-decisions-md post-merge. No OTHER decision is edited; no recs/ops-data writes (no file_rec/update_rec).
  - No emojis; ASCII hyphens ("--") not em dashes.
  - Do NOT prescribe editing src/common/iceberg_reader.py (Lambda-packaged; the fail-fast/circuit-breaker lives in the verifier layer per Decision 79 / the dq-gate-infra-resilience precedent).
  - Drop "WAP" terminology (no prior art in DECISIONS.md); the anchor is the dq_check verb family (Decision 84 I-3).
