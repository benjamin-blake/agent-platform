schema_version: 1
slug: "ci-apply-grant-coupling"
intent: >-
  Unblock the red sandbox convergence record (the CD substrate that keeps platform infrastructure
  converged and self-improving) by granting github_ci_apply the refresh-reads T2.43 added, and kill
  the recurring generator -- a managed resource landing in terraform/personal without a matching,
  out-of-band, undetectable-until-apply grant on the least-privilege apply identity.
plan_type: IMPLEMENTATION
verification_tier: V3
plan_path: docs/plans/PLAN-ci-apply-grant-coupling.yaml
phase: >-
  Platform / CD.35 convergence substrate + apply-role governance (defect-fix on already-complete
  T2.43 work; NOT completion of an in_progress item). Ratifies a new
  numbered Decision for resource-axis data-plane read broadening; adds a pre-merge grant-coverage
  verifier (verifier-harness family, cf. T2.34/Decision 104 CI-role IAM DRY invariants).
scope:
  - file: terraform/bootstrap/github_ci_apply.tf
    action: Modify
    purpose: >-  # pragma: allowlist secret
      Phase 1 (immediate unblock + Lever A for the apply role). Broaden LambdaRead Resource from the
      four enumerated ducklake function ARNs to the prefix function:agent-platform-* (keep the
      ducklake layer ARNs enumerated -- layers are named ducklake-*/data-pipeline-*, not
      agent-platform-*); broaden EventBridgeRead Resource to rule/agent-platform-*; add a new
      enumerated SecretsManagerGithubPatRead Sid (secretsmanager:Describe*/Get* on the
      agent-platform-github-pat-* Secrets Manager name, mirroring oidc.tf line 315-323). Secrets stay enumerated
      (mixed naming + they read the underlying key material -- highest sensitivity). No boundary edit: the
      permissions-boundary DataPlaneAllow already ceilings lambda:*/events:*/secretsmanager:* reads
      (Decision 94 two-surface trap applies to WRITES/new actions, not these reads).
  - file: terraform/personal/oidc.tf
    action: Modify
    purpose: >-
      Phase 2 (Lever A for the sibling plan/drift roles). Mirror the broadening in the
      github_ci_plan/drift shared read policy: LambdaRead functions -> function:agent-platform-*,
      EventBridgeRead -> rule/agent-platform-*. These roles are already enumerated-correct for
      CURRENT resources, but broadening closes THEIR resource axis so a future function/rule
      auto-covers end-to-end (else drift/speculative-plan re-breaks on the next new resource). Keeps
      all three roles' data-plane read surface identical (the parity the coverage verifier relies on).
  - file: scripts/checks/iam_tf/validate_ci_refresh_read_coverage.py
    action: Create
    purpose: >-
      Lever B (detection + ordering). New verifier asserting every grant-requiring resource across
      the WHOLE terraform/personal module (all *.tf, not just prod_lambdas.tf) is refresh-read-covered
      in ALL THREE plan-capable role policies (github_ci_apply in terraform/bootstrap; github_ci_plan +
      github_ci_drift in terraform/personal/oidc.tf). The coverage map must classify EVERY resource
      type present in the module into one of: (i) needs an independent refresh-read grant (e.g.
      aws_lambda_function, aws_cloudwatch_event_rule, aws_secretsmanager_secret) -> assert covered;
      (ii) covered transitively by a parent's grant (e.g. aws_lambda_permission via lambda:GetPolicy,
      aws_cloudwatch_event_target via events:List*, aws_iam_role_policy via the role's iam: read) ->
      no independent assertion; (iii) enumerated-iam: path (aws_iam_role) -> assert the role ARN is in
      the enumerated IAMRolesRead/IAMCIRolesRead lists, NEVER a wildcard (Decision 35/98). A resource of
      a type NOT in the map FAILS LOUD ("unmapped resource type -- add a coverage rule"), never silently
      passes. Detection scans oidc.tf HOLISTICALLY (not per-role-block): plan/drift get LambdaRead/
      EventBridgeRead from the shared ci_full_refresh_read data source, not inline in the role blocks.
      Regex/text-based (hcl2 is unavailable in this env; mirrors the pure-text approach of
      validate_authority_budget). Must stay < 500 SLOC (Decision 128 -- decompose if it grows,
      do not register a budget raise).
  - file: scripts/checks/registry.py
    action: Modify
    purpose: >-
      Register the new check via @register in the module and add _c("validate_ci_refresh_read_coverage")
      to BOTH pre_sequence() and full_sequence() (Decision 104 -- checks register in the registry, not
      as a raw addition to validate.py). owner="platform".
  - file: scripts/validate.py
    action: Modify
    purpose: >-
      Add the import line for the new check (mirrors line 108
      `from scripts.checks.iam_tf.validate_authority_budget import validate_authority_budget  # noqa`),
      so the registry can resolve it by name. validate.py stays the single source of truth (no CI-only
      check).
  - file: tests/test_validate_ci_refresh_read_coverage.py
    action: Create
    purpose: >-
      Unit tests for the verifier (flat tests/ convention, cf. tests/test_validate_authority_budget.py).
      Must cover: (a) the real repo tree passes after the Phase 1+2 grants land; (b) a synthetic
      terraform fixture adding an uncovered aws_lambda_function/secret FAILS with a precise message
      naming the resource + the role/Sid/file to edit; (c) an unmapped resource type FAILS. 100%
      coverage of the new source file (test_coverage_checker convention).
  - file: docs/DECISIONS.md
    action: Modify
    purpose: >-
      Author a new numbered Decision ratifying resource-axis read broadening for DATA-PLANE reads
      (lambda/events; NOT iam: role reads, which stay enumerated per Decision 35/98), citing Decision
      92 pt5 + Decision 98 pt2 that read-refresh grants sit OUTSIDE the IAM-write authority budget, and
      recording the pre-merge coverage verifier as the compensating detection control. MUST include
      explicit reversal conditions (the broadening is reversible -- re-narrow to enumerated ARNs if the
      account ever hosts non-agent-platform-* resources of these services, or on any incident showing a
      prefix over-grant). Filed via DECISIONS.md then `ops_data_portal --backfill-decisions-md`
      (Decision 84; numbering authority = DECISIONS.md, re-check max header at /implement time).
bundled_recommendations:
  - rec-2702
infrastructure_dependencies:
  - "terraform/bootstrap/github_ci_apply.tf: NEVER auto-applies (terraform-apply-sandbox.yml path filter is terraform/personal/** only). Phase 1 bootstrap change is a MANUAL agent_platform_admin apply -- operator-gated, out-of-band (bootstrap/CLAUDE.md Ongoing apply runbook, Decision 77/98). Verify the import plan shows NO destroy/replace of aws_iam_role.github_ci_apply or its inline policy before applying."
  - "terraform/personal/oidc.tf (Phase 2): modifies github_ci_plan/drift inline policies -- these roles are NOT in in_budget_managed_roles (only ci-branch, ci-pr), so the guard exits 2 and the change routes to the tf-gated-apply GitHub Environment (human-approved), applying the SAME reviewed plan.bin (Decision 77 no-TOCTOU; environment-taxonomy.md Guard classification)."
  - "Ordering: Phase 1 (bootstrap admin-apply + dispatch-ack to GREEN) MUST precede Phase 2's gated-apply -- a red convergence record refuses all sandbox applies, so oidc.tf cannot land via the normal path while red. Between phases, oidc.tf's still-enumerated grants already cover current resources, so no interim drift gap."
  - "Provider-init egress (Decision 119/120): terraform/personal uses the third-party kislerdm/neon provider; a stock CC-web session cannot terraform init/plan it. The 'fresh plan converges' verification (VP step 9) is CI/admin-run (workflow_dispatch or agent_platform_admin on a mirror-synced container), NOT a local CC-web terraform plan. Local terraform steps are limited to fmt -check (no provider init)."
  - "No Lambda deploy: oidc.tf/bootstrap .tf are not Lambda-packaged; the three prod Lambdas are refresh-READ only (not modified). No build/deploy/smoke-test step applies (Decision 79/CD.16)."
acceptance_criteria:
  - "The sandbox convergence record is no longer red: `aws s3 cp s3://agent-platform-data-lake/convergence/personal/sandbox.json - --profile agent_platform | jq -e '.status != \"red\"'` exits 0 (rec-2702 acceptance)."
  - "github_ci_apply's inline policy (terraform/bootstrap/github_ci_apply.tf) refresh-read-covers the three T2.43 prod resources: LambdaRead includes function:agent-platform-* , EventBridgeRead includes rule/agent-platform-* , and a SecretsManagerGithubPatRead Sid covers the agent-platform-github-pat-* Secrets Manager name."
  - "github_ci_plan/drift (terraform/personal/oidc.tf) LambdaRead/EventBridgeRead use the same agent-platform-* prefixes, keeping all three roles' data-plane read surface identical."
  - "validate_ci_refresh_read_coverage exists, is registered in pre_sequence() and full_sequence(), passes on the real tree, and FAILS (with a resource-naming message) on a synthetic uncovered-resource fixture and on an unmapped resource type."
  - "A new numbered Decision ratifies data-plane resource-axis read broadening with explicit reversal conditions and cites Decision 92 pt5 + 98 pt2; it is backfilled to ops_decisions."
  - "rec-2702 is closed via the ops portal with a resolution referencing this plan."
verification_plan:
  - step: 1
    phase: pre-deploy
    action: "Assert the Phase 1 bootstrap grants are present (broadened lambda/events prefixes + the new github-pat read Sid)."
    command: "grep -Eq 'function:agent-platform-\\*' terraform/bootstrap/github_ci_apply.tf && grep -Eq 'rule/agent-platform-\\*' terraform/bootstrap/github_ci_apply.tf && grep -q 'SecretsManagerGithubPatRead' terraform/bootstrap/github_ci_apply.tf && grep -q 'agent-platform-github-pat-' terraform/bootstrap/github_ci_apply.tf && echo PASS"
    expected: "Prints PASS -- LambdaRead prefix, EventBridgeRead prefix, and the enumerated github-pat read Sid all present in the apply-role policy."
    fix_if: "Any grep misses -> the broadening/add was incomplete; re-edit the corresponding Sid."
    hermetic: true
  - step: 2
    phase: pre-deploy
    action: "Assert the Phase 2 oidc.tf plan/drift read policy mirrors the broadening (parity)."
    command: "grep -Eq 'function:agent-platform-\\*' terraform/personal/oidc.tf && grep -Eq 'rule/agent-platform-\\*' terraform/personal/oidc.tf && echo PASS"
    expected: "Prints PASS -- github_ci_plan/drift LambdaRead/EventBridgeRead use the same agent-platform-* prefixes."
    fix_if: "Missing -> plan/drift would re-break on the next new function/rule; add the prefixes."
    hermetic: true
  - step: 3
    phase: pre-deploy
    action: "Run the new coverage verifier against the real tree -- every managed terraform/personal resource is covered in all three roles."
    command: "bin/venv-python -m scripts.checks.iam_tf.validate_ci_refresh_read_coverage"
    expected: "Exit 0, no uncovered-resource or unmapped-type findings."
    fix_if: "A finding names an uncovered resource/role/Sid -> add the grant (or a coverage-map rule for a new resource type) and re-run."
    hermetic: true
  - step: 4
    phase: pre-deploy
    action: "Prove the verifier CATCHES a gap and an unmapped type (negative proof) via its unit tests -- the whole point is pre-merge detection."
    command: "bin/venv-python -m pytest tests/test_validate_ci_refresh_read_coverage.py -q"
    expected: "All tests pass, including the synthetic uncovered-resource case and the unmapped-type case both asserting a FAIL with a precise message."
    fix_if: "The gap/unmapped fixtures do not fail the verifier -> the check is too weak; tighten the coverage assertion."
    hermetic: true
  - step: 5
    phase: pre-deploy
    action: "Confirm the check is wired into the presubmit sequences and importable (single-source-of-truth in validate.py, not CI-only)."
    command: "grep -q 'validate_ci_refresh_read_coverage' scripts/validate.py && grep -c 'validate_ci_refresh_read_coverage' scripts/checks/registry.py | grep -qxE '[2-9]' && echo PASS"
    expected: "Prints PASS -- imported in validate.py and referenced at least twice in registry.py (pre_sequence + full_sequence)."
    fix_if: "Not registered in both sequences or not imported -> add the missing registration/import."
    hermetic: true
  - step: 6
    phase: pre-deploy
    action: "Confirm the ratifying Decision is authored with reversal conditions and the required citations."
    command: "bin/venv-python -c \"import re,sys; t=open('docs/DECISIONS.md').read(); m=re.search(r'## Decision \\d+:[^\\n]*read broadening', t, re.I); blk=t[m.start():m.start()+2500] if m else ''; ok=m and re.search(r'[Rr]eversal', blk) and 'Decision 92' in blk and 'Decision 98' in blk; print('PASS' if ok else 'FAIL'); sys.exit(0 if ok else 1)\""
    expected: "Prints PASS -- the Decision exists, names reversal conditions, and cites Decision 92 + 98."
    fix_if: "FAIL -> the Decision is missing the reversal clause or the 92/98 citations; add them."
    hermetic: true
  - step: 7
    phase: pre-deploy
    action: "Terraform formatting check on both changed .tf files (fmt needs no provider init; skip cleanly if terraform is absent -- CI terraform-validate is authoritative)."
    command: "command -v terraform >/dev/null 2>&1 && terraform fmt -check -diff terraform/bootstrap/github_ci_apply.tf terraform/personal/oidc.tf || echo 'terraform absent locally; the required terraform-validate CI job is authoritative'"
    expected: "No fmt diff (or the clean skip message). The required terraform-validate check gates the merge."
    fix_if: "fmt reports a diff -> run `terraform fmt` on the file and recommit."
    hermetic: false
  - step: 8
    phase: post-deploy
    action: "OPERATOR (agent_platform_admin, human-gated break-glass): plan + apply terraform/bootstrap. Review the IAM diff; STOP if the plan shows any destroy/replace of aws_iam_role.github_ci_apply or its inline policy."
    command: "terraform -chdir=terraform/bootstrap plan -var-file=terraform/bootstrap/terraform.bootstrap.tfvars   # review; then apply if no destroy/replace"
    expected: "Plan shows an in-place UPDATE of aws_iam_role_policy.github_ci_apply only (new/broadened read statements); apply succeeds. No destroy/replace of the live apply role."
    fix_if: "Any destroy/replace on the apply role or its policy -> STOP, do not apply; re-derive the edit (the import blocks must adopt, not recreate)."
    hermetic: false
  - step: 9
    phase: post-deploy
    action: "Verify a fresh terraform plan under the least-privilege apply identity converges with NO AccessDenied refresh errors (CI/admin-run per Decision 119/120 -- NOT a stock CC-web local plan)."
    command: "terraform -chdir=terraform/personal plan -detailed-exitcode -var-file=terraform.personal.tfvars 2>&1 | tee /tmp/apply-identity-plan.log; test $(grep -c AccessDenied /tmp/apply-identity-plan.log) -eq 0   # OPERATOR/CI: run under the github_ci_apply OIDC identity (terraform-apply-sandbox workflow_dispatch dry-plan) or agent_platform_admin on a mirror-synced container -- NOT a stock CC-web session (Decision 119/120)"
    expected: "Plan completes; exit code 0 (converged) or 2 (in-sync but pending non-IAM diff); ZERO AccessDeniedException in the refresh walk on the prod-lambda/secret/rule resources."
    fix_if: "A new AccessDenied surfaces on a different resource -> the cascade is not fully closed; add that grant to bootstrap (and the coverage map) and re-apply before dispatching."
    hermetic: false
  - step: 10
    phase: post-deploy
    action: "OPERATOR: clear the red latch via the dispatch-ack unlatch (the ONLY way to clear red; gated on the reviewed rec-2702 per Decision 55/72)."
    command: "gh workflow run terraform-apply-sandbox.yml --ref main -f acknowledge_red_commit=4ab9c3af   # OPERATOR: executed via the GitHub MCP actions_run_trigger in this harness (no local gh); dispatch only AFTER the reviewed rec-2702 (Decision 55/72)"
    expected: "The dispatched run re-plans fresh, applies, and writes the convergence record status=green for the acknowledged commit."
    fix_if: "The dispatch run fails at plan (AccessDenied) -> return to step 8/9; fails at apply (guard/gated) -> follow the tf-gated-apply approval."
    hermetic: false
  - step: 11
    phase: post-deploy
    action: "Confirm the convergence record is no longer red (rec-2702 acceptance)."
    command: "aws s3 cp s3://agent-platform-data-lake/convergence/personal/sandbox.json - --profile agent_platform | jq -e '.status != \"red\"'"
    expected: "jq exits 0 (status is green, not red). Sandbox applies are unblocked."
    fix_if: "Still red -> the dispatch-ack did not converge; re-diagnose from the run log (do NOT overwrite the record by hand)."
    hermetic: false
  - step: 12
    phase: post-deploy
    action: "Close rec-2702 via the ops portal and confirm the read cache reflects it."
    command: "bin/venv-python -m scripts.ops_data_portal --update-rec rec-2702 --status closed --resolution 'github_ci_apply refresh-read grants broadened (lambda/events prefixes) + github-pat read Sid added in terraform/bootstrap; convergence cleared via dispatch-ack. Structural anti-recurrence: resource-axis read broadening Decision + validate_ci_refresh_read_coverage verifier.' && bin/venv-python -m scripts.sync.ops pull && bin/venv-python -c \"import json,pathlib; r=[json.loads(l) for l in pathlib.Path('logs/.recommendations-log.jsonl').read_text().splitlines() if l.strip()]; x=next(v for v in r if v['id']=='rec-2702'); print(x['status']); assert x['status']=='closed'\""
    expected: "Portal update succeeds; the pulled cache shows rec-2702 status=closed."
    fix_if: "Portal write fails (connectivity) -> verify `aws sts get-caller-identity --profile agent_platform` and re-file; the Resolves: rec-2702 squash trailer is the fallback."
    hermetic: false
constraints:
  - "Forward-fix the generator, not the occurrence (Decision 55/72): the reactive per-resource enumerated grant is the anti-pattern -- Lever A (broadening) + Lever B (coverage check) are the structural fix; the 3 grants alone are not the deliverable."
  - "iam: role reads STAY enumerated (Decision 35/98) -- the broadening applies ONLY to data-plane reads (lambda/events). Secrets stay enumerated (values are sensitive; mixed naming). No service:* Resource wildcards on secrets or iam."
  - "No boundary/authority-budget widening: read-refresh grants are outside the IAM-write budget (Decision 92 pt5 / 98 pt2). Do NOT touch authority_budget.json, IAMRoleWriteBounded, or the DenyIAMEscalation boundary statements."
  - "terraform/bootstrap NEVER enters an auto-apply workflow or the guard path (bootstrap/CLAUDE.md). The Phase 1 apply is manual agent_platform_admin, human-directed (Decision 126 break-glass -- agent never self-directs terraform apply)."
  - "The dispatch-ack unlatch is gated on the reviewed critical rec-2702 (Decision 55/72); never overwrite the convergence record by hand, never auto-revert."
  - "New verifier stays < 500 SLOC (Decision 128); do NOT register a sloc_budgets.yaml raise or run --update-sloc-budgets to seed it."
  - "No new prose-architecture doc (Decision 86): rationale -> the numbered Decision; forward intent -> roadmap/tier-item; no docs/INTENT-*.md or companion doc."
  - "Public-repo boundary (Decision 101): no literal 12-digit account IDs or secret ARNs in committed .tf -- use ${var.account_id}/${var.aws_region} interpolation; the github-pat resource name is a public Secrets Manager name, not a value."
  - "Out of scope: the ci-rca dedup bug (rec-2699/2700/2701) that suppressed the auto-file -- separately tracked. The latent WRITE-grant gap (prod-lambda config / secret-tag writes under a guard-pass PR) -- note as a follow-on rec, do not fix here."
context:
  - "Root cause: github_ci_apply's terraform plan refreshes the ENTIRE terraform/personal state, so it must refresh-READ every resource in state even ones admin creates. T2.43 (prod_lambdas.tf) added a github-pat secret + 3 prod Lambda functions + the hourly-scheduled-agents rule; the apply-role policy in terraform/bootstrap/github_ci_apply.tf was only partially extended (IAMRolesRead + s3:GetBucketNotification), missing lambda/events/secretsmanager reads -> AccessDenied on every refresh -> convergence red @ 4ab9c3af (run 29376169080), blocking all sandbox applies."
  - "The generator (15+ instances, ~6 weeks, rec-1985 -> rec-2702): the apply role's grants MUST live out-of-band in terraform/bootstrap (self-grant break, T2.23), so they cannot land atomically with a terraform/personal resource. The same-tier github_ci_plan/drift grants in oidc.tf were kept in sync (they even carry `# T2.43 gap` comments, lines 200/253/316); only the cross-tier bootstrap copy lagged. The prior 'permanent closure' (PLAN-terraform-sandbox-convergence-closure) closed only the ACTION axis (Describe*/List*); the RESOURCE axis stayed enumerated -- exactly what fails."
  - "Why pre-merge missed it: at PR time the new resource is not yet in state, so no refresh reads it; the speculative-plan runs under github_ci_plan (broader) and local re-plans under agent_platform_admin (broadest), so the least-privilege apply identity is never exercised until the post-merge/dispatch apply (rec-2276 masking lesson). Detection must therefore be STATIC coverage (Lever B), not a dynamic plan."
  - "rec-2702 (open, Critical, source=implement-agent) is the current red; it was filed BY HAND because the ci-rca auto-file was suppressed by the pre-existing dedup bug (rec-2699/2700/2701). rec-2702's `file` field mis-points at terraform/personal/oidc.tf -- the actual fix is terraform/bootstrap/github_ci_apply.tf (oidc.tf is already correct)."
  - "Naming-convention basis for Lever A: lambda functions are uniformly agent-platform-* and events rules are uniformly agent-platform-* (verified) -> a per-service prefix cleanly auto-covers future resources. Layers (ducklake-*/data-pipeline-*) and secrets (agent-platform-* AND ducklake-neon-catalog-dsn-*/neon-api-key-*) are mixed-named and stay enumerated; secrets additionally read VALUES, so Lever B (detection) handles them."
  - "Decision-scout verdict: FLAGS_FOUND (no BLOCK). CITE list (verbatim): Decision 98, Decision 77, Decision 55, Decision 72, Decision 104, Decision 101, Decision 84, Decision 35. RELATED: Decision 94, Decision 119, Decision 120, Decision 86. NOTE flags: Decision 92 (narrow/earned posture vs broadening -> resolved by citing 92 pt5 + 98 pt2 that reads are outside the write budget AND landing a ratifying Decision with reversal conditions) and Decision 128 (SLOC -> verifier stays < 500, no budget registration)."
  - "gates: decision-scout=FLAGS_FOUND; plan-critique=REVISE(round 1: rule/ ARN separator fix, literal VP 9/10 commands, whole-module coverage-map spec, file_rec write-gap step) -> re-critiquing"
  - "Decision 98 is the governing precedent (admin-create + read-only bootstrap refresh grant; read grants do not widen the IAM-write budget); this plan EXTENDS its shape from IAMRolesRead (iam:) to data-plane Sids (lambda/events) and adds the missing pre-merge coverage gate Decision 98's reactive procedure lacked."
  - "The coverage verifier makes the ci-rca-didn't-fire question moot for this class: if the gap is caught pre-merge there is no red and no ci-rca is needed."
pre_implementation_checklist:
  - Branch confirmed not on main (claude/eloquent-wright-6cld3c)
  - docs/PROJECT_CONTEXT.md read
  - environment-taxonomy.md (Axis A + Guard classification) and terraform/bootstrap/CLAUDE.md read
  - terraform/bootstrap/github_ci_apply.tf and terraform/personal/oidc.tf read; the three missing grants confirmed
  - scripts/checks/registry.py registration pattern (@register + _c in pre_sequence/full_sequence) understood
  - rec-2702 acceptance (convergence .status != red) and closure path understood
  - Operator availability confirmed for the human-gated bootstrap admin-apply + dispatch-ack (Phase 1 cannot complete agent-only)
execution_steps:
  - "Phase 1 -- terraform/bootstrap/github_ci_apply.tf: in LambdaRead, replace the four enumerated function:agent-platform-ducklake-* ARNs with the single prefix arn:aws:lambda:${var.aws_region}:${var.account_id}:function:agent-platform-* (retain the three ducklake layer ARNs + their :* variants). In EventBridgeRead, replace the five enumerated ducklake rule ARNs with arn:aws:events:${var.aws_region}:${var.account_id}:rule/agent-platform-*. Add a new SecretsManagerGithubPatRead Sid (secretsmanager:Describe*/Get* on arn:aws:secretsmanager:${var.aws_region}:${var.account_id}:secret:agent-platform-github-pat-*) mirroring oidc.tf lines 315-323. Do NOT edit the boundary/authority-budget statements."  # pragma: allowlist secret
  - "Phase 2 -- terraform/personal/oidc.tf: in the github_ci_plan/drift shared read policy, replace the enumerated LambdaRead function ARNs with function:agent-platform-* and the EventBridgeRead rule ARNs with rule/agent-platform-* (retain layer ARNs; the SecretsManagerGithubPatRead Sid already exists). Result: all three roles' data-plane read surface is identical."
  - "Create scripts/checks/iam_tf/validate_ci_refresh_read_coverage.py: parse ALL of terraform/personal/*.tf (the whole module, not just prod_lambdas.tf) for managed resources. Maintain a coverage map keyed by tf resource type that classifies EVERY type present into (i) needs-independent-grant (aws_lambda_function, aws_cloudwatch_event_rule, aws_secretsmanager_secret, aws_sns_topic, aws_dynamodb_table, aws_lambda_layer_version, ...) -> (service, read-Sid name(s), arn-name extractor); (ii) covered-transitively (aws_lambda_permission, aws_cloudwatch_event_target, aws_iam_role_policy, aws_lambda_function_url, aws_cloudwatch_log_group where a *-scoped read already covers it, ...) -> no independent assertion; (iii) enumerated-iam (aws_iam_role) -> must appear literally in IAMRolesRead/IAMCIRolesRead, never a wildcard (Decision 35/98). For (i) types, extract the resource name and assert it is matched by a literal ARN OR an agent-platform-* prefix in the corresponding service read Sid in EACH of the three roles. Load the three policies: github_ci_apply inline policy from terraform/bootstrap/github_ci_apply.tf, and the github_ci_plan/drift grants from terraform/personal/oidc.tf scanned HOLISTICALLY (the LambdaRead/EventBridgeRead statements live in the shared ci_full_refresh_read data source, NOT inline in each role block). Emit a precise finding (resource, role, Sid, file) per gap; FAIL LOUD on any resource of an UNMAPPED type ('add a coverage rule'). Return findings list / non-zero on any. Keep < 500 SLOC (decompose into a helpers submodule if it grows -- no budget raise)."
  - "Register the check: @register('validate_ci_refresh_read_coverage', owner='platform') in the module; import it in scripts/validate.py (mirror line 108); add _c('validate_ci_refresh_read_coverage') to registry.py pre_sequence() and full_sequence() near validate_authority_budget/validate_invoke_implies_resolve."
