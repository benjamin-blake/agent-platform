# docs/ROADMAP-SEMANTO.yaml
#
# Third sibling roadmap: external-facing marketing / Semanto comms system.
# Anchored by Decision 101 (External brand identity -- Theseus / Guerdon / Semanto).
# Siblings: docs/ROADMAP-PLATFORM.yaml (platform infrastructure),
#           docs/ROADMAP-PRODUCT.yaml (trading-system product lifecycle).
#
# ALL tier_items carry status: deferred_post_mvp (Decision 93 -- Platform-MVP boundary).
# No item is eligible until reactivated post-MVP. Validation wired in S1.5.
# Tier prefix: S. Id grammar: S1.x.

document:
  id: ROADMAP-SEMANTO
  version: 1
  status: draft
  filed_via: pending_log_decision_lambda
  description: |
    The Semanto marketing/comms roadmap. Governs the external-facing brand presence for
    the Theseus platform (theseus.support) and the Guerdon trading product. All items
    are parked deferred_post_mvp (Decision 93) and none are eligible until the Platform
    MVP boundary is crossed and items are individually reactivated -> not_started.
    Decision 101 anchors the naming hierarchy (Theseus = platform, Guerdon = product #1,
    Semanto = this marketing/comms system and roadmap) and the presentation-layer-only
    constraint (internal identifiers unchanged).
  agent_instructions: |
    - ALL items in this roadmap carry status: deferred_post_mvp (Decision 93).
      None are eligible to start. Do not surface them in next_eligible or eligible
      item lists until individually reactivated -> not_started post-MVP.
    - Reactivation requires an explicit operator edit: status: not_started on the
      specific item. Do not auto-reactivate.
    - depends_on edges in this roadmap are intra-SEMANTO only (no live item may
      depend on a deferred item -- Decision 93 no-live-dep invariant; satisfied
      because the entire tier is deferred and nothing in ROADMAP-PLATFORM.yaml
      or ROADMAP-PRODUCT.yaml depends on any S1.x id).
    - Tier prefix is S. Id grammar: S1.x.
    - Decision 101 is the anchoring decision for all items in this roadmap.
    - S1.5 (deferred) wires ROADMAP-SEMANTO.yaml into validate.py and session_preflight.
      Until S1.5 ships, this file is not schema-validated by validate.py.
    - Marketing content lives in top-level marketing/ (never docs/). It is NOT an
      agent source-of-truth (Decision 86 scoped exception, Decision 101 clause c).

candidate_decisions: []

cross_tier_gates: []

tier_items:
  - id: S1.1
    tier: S1
    name: Apply Theseus/Guerdon external branding to public-facing surfaces
    intent: |
      Update the repository README wording and description to reflect the external brand
      names Theseus (platform) and Guerdon (trading product). Presentation only -- no
      internal identifier changes (repo name, AWS prefixes, profile, project_id all
      unchanged per Decision 101 clause b). Badge and description updates only.
    depends_on: []
    effort: XS
    strategic: false
    status: deferred_post_mvp
    progress_note: |
      Parked deferred_post_mvp (Decision 93, Decision 101). Scope: README wording + repo
      description -- presentation-layer-only branding, no internal identifier change.
      Reactivate -> not_started post-MVP to apply external brand names to public surfaces.

  - id: S1.2
    tier: S1
    name: Register theseus.support DNS/TLS + Cloudflare Pages project
    intent: |
      Human-gated step: operator registers the theseus.support domain DNS records and
      creates the Cloudflare Pages project via the Cloudflare console. No automation
      possible until the Pages project exists and DNS is live. TLS is managed by
      Cloudflare (auto-provisioned). Prerequisite for the Astro/Starlight scaffold (S1.3).
    depends_on: []
    effort: XS
    strategic: false
    status: deferred_post_mvp
    user_action_required: true
    progress_note: |
      Parked deferred_post_mvp (Decision 93, Decision 101). Domain theseus.support is
      already Cloudflare-owned. This item requires a human console action to wire DNS
      and create the Pages project. user_action_required: true. Reactivate post-MVP.

  - id: S1.3
    tier: S1
    name: Astro + Starlight static-site scaffold in top-level marketing/ + Cloudflare Pages build
    intent: |
      Scaffold the Astro + Starlight site in top-level marketing/ (not docs/; per Decision 101
      clause c scoped exception). Includes content collections with Zod-validated frontmatter,
      Cloudflare Pages build pipeline, and the one-way rendering pipeline from internal artefacts
      to marketing prose. Marketing content is never a warehouse write source (Decision 84).
    depends_on: [S1.2]
    effort: M
    strategic: false
    status: deferred_post_mvp
    progress_note: |
      Parked deferred_post_mvp (Decision 93, Decision 101). Astro + Starlight (free/MIT);
      Cloudflare Pages is the native managed primitive (Decision 100). depends_on S1.2
      (DNS/Pages project registration). Reactivate post-MVP.

  - id: S1.4
    tier: S1
    name: Public-content boundary review gate + validate.py marketing/ exclusion guard
    intent: |
      Pre-publish checklist enforcing Decision 101 clause d (no AWS account specifics;
      market platform engineering not Guerdon alpha). Adds a validate.py guard that
      excludes top-level marketing/ from the agent-first / intent-doc-freeze corpus
      so the Decision 86 freeze guard does not false-positive on marketing prose.
    depends_on: [S1.3]
    effort: S
    strategic: false
    status: deferred_post_mvp
    progress_note: |
      Parked deferred_post_mvp (Decision 93, Decision 101). Depends on S1.3 (scaffold).
      Adds boundary enforcement so no AWS account specifics or alpha/performance figures
      can be published. Also adds marketing/ exclusion to validate.py's intent-doc-freeze
      guard. Reactivate post-MVP.

  - id: S1.5
    tier: S1
    name: Wire ROADMAP-SEMANTO into tooling
    intent: |
      Add a validator over docs/ROADMAP-SEMANTO.yaml reusing the RoadmapDocument Pydantic
      schema (scripts/platform_roadmap.py), surfaced in validate.py as a new check and in
      session_preflight via the platform_roadmap compute_state path. Keeps the three sibling
      roadmaps on the same validation footing. No new schema changes required -- RoadmapDocument
      already supports the S1.x id grammar and deferred_post_mvp status.
    depends_on: []
    effort: S
    strategic: false
    status: deferred_post_mvp
    progress_note: |
      Parked deferred_post_mvp (Decision 93, Decision 101). Until this ships, ROADMAP-SEMANTO.yaml
      is authored to conform to RoadmapDocument but is not schema-validated by validate.py
      (validate_platform_roadmap and validate_product_roadmap target fixed paths). Reactivate
      post-MVP to wire the third roadmap into CI and session_preflight.

  - id: S1.6
    tier: S1
    name: Initial content -- landing page + first engineering write-up
    intent: |
      The first published content on theseus.support: a landing page and the foundational
      engineering write-up on the self-improving / agent-first platform story. Markets the
      platform engineering and architecture; never publishes Guerdon's trading alpha or
      performance figures (Decision 101 clause d). Content lives in top-level marketing/
      (Decision 101 clause c scoped exception; never in docs/).
    depends_on: [S1.3, S1.4]
    effort: M
    strategic: false
    status: deferred_post_mvp
    progress_note: |
      Parked deferred_post_mvp (Decision 93, Decision 101). First-publish content gate:
      depends on S1.3 (scaffold) and S1.4 (boundary review gate). Primary audience is
      data-engineering hiring managers (portfolio/credibility); OSS community is secondary.
      Paid service is a separately gated future option. Reactivate post-MVP.
