schema_version: 1
taxonomy_version: 1

failure_categories:
  - sloc_violation
  - iam_gap
  - dependency_gap
  - code_regression
  - schema_drift
  - environment
  - unknown
  - test_collection_empty
  - gate_escape

agent_only_categories:
  - gate_escape

function_to_category:
  validate_sloc_limits: sloc_violation
  validate_cc_limits: sloc_violation
  validate_complexity: sloc_violation
  validate_iam_runner_policy: iam_gap
  validate_requirements: dependency_gap
  validate_copilot_multipliers: dependency_gap
  validate_imports: code_regression
  validate_subprocess_encoding: code_regression
  validate_sys_executable: code_regression
  validate_no_underscore_instructions: code_regression
  validate_invariants: code_regression
  validate_executor_boundary: code_regression
  validate_rec_write_paths: code_regression
  validate_decisions_local_writes: code_regression
  validate_warehouse_write_sources: code_regression
  validate_test_coverage: code_regression
  validate_prompt_compliance: code_regression
  validate_cli_tools_in_prompts: code_regression
  validate_scheduled_agent_logs: code_regression
  validate_intent_doc_freeze: code_regression
  validate_hermeticity_flags: code_regression
  validate_claude_md_pointer_invariant: code_regression
  validate_recommendations_schema: schema_drift
  validate_pydantic_yaml_drift: schema_drift
  validate_product_roadmap: schema_drift
  validate_platform_roadmap: schema_drift
  validate_plan_documents: schema_drift
  validate_lambda_manifests: schema_drift
  validate_lambda_manifest_coverage: schema_drift
  validate_lambda_bundle_completeness: schema_drift
  validate_lambda_deploy_gating: schema_drift
  validate_contract_drift: schema_drift
  validate_dq_manifest_gate: schema_drift
  validate_environment_taxonomy: schema_drift
  validate_ci_rca_trigger: environment
  validate_ci_workflow_guards: environment
  validate_workflow_agent_safety: environment
  validate_outbox_staleness: environment
  validate_ci_rca_taxonomy: environment

step_name_to_category:
  "Validate fast tier (ruff lint, ruff format, mypy, prompt checks)": code_regression
  "Validate full tier (ruff, mypy, pytest, DQ runner, verifier harness)": code_regression
  "Terraform validate + fmt (both roots via validate.py)": environment

log_pattern_to_category:
  - pattern: "collected 0 items"
    category: test_collection_empty
    check_name: pytest_vacuous
  - pattern: "FAILED.*::test_"
    category: code_regression
    check_name: pytest
  - pattern: "ImportError|ModuleNotFoundError"
    category: dependency_gap
    check_name: import_error
  - pattern: "yaml\\.scanner\\.ScannerError|yaml\\.parser\\.ParserError"
    category: schema_drift
    check_name: yaml_parse_error
  - pattern: "terraform.*Error|Error.*terraform"
    category: environment
    check_name: terraform_error
  - pattern: "\\bAssertionError\\b"
    category: code_regression
    check_name: assertion_error

workflow_to_tier:
  CI: CI
  Main Canary: CI
  Deploy to AWS: not_a_gate
  CodeQL: not_a_gate
  Claude Code: not_a_gate
  rec-autoclose: not_a_gate
  Refresh Copilot Model Multipliers: not_a_gate
  CI RCA: not_a_gate
  terraform-apply-sandbox: not_a_gate
  terraform-drift: not_a_gate
  convergence-health: not_a_gate
  tf-gated-apply-prototype: not_a_gate
  cost-reconciliation: not_a_gate
