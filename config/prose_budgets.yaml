# Ambient agent-instruction prose byte-budget registry (Decision 43/127; raise gate reuses
# Decision 128's marker mechanism; mirrors config/sloc_budgets.yaml's structure).
# Gates the permanent prose surface classes over Decision 127's taxonomy:
#   S1 = root ambient load-set aggregate (CLAUDE.md + transitive @-imports)
#   S2 = each non-root **/CLAUDE.md
#   S4 = each .claude/skills/*/SKILL.md entry file
#   S8 = docs/PROJECT_CONTEXT.md
# S3 (.claude/commands/*.md) is measured-only (Decision 127) and has NO entry here.
# docs/DECISIONS.md / docs/DECISIONS_ARCHIVE.md are deliberately absent -- they are governed by
# validate_decisions_size (Decision 134/145), not this registry (two guards on one surface would
# be redundant).
#
# Budgets ratchet DOWN only. Every entry below is seeded at the surface's CURRENT byte size
# (zero-headroom): current<=budget must hold, enforced by validate_prose_limits.
#
# Raising a budget (or registering a new surface above its current measured bytes) requires a
# manual, reviewable edit carrying an inline `# raise-approved: dec-NNN <reason>` marker naming a
# real `## Decision NNN:` header in docs/DECISIONS.md -- enforced by validate_prose_budget_raises
# in the --pre tier.
#
# Relief valves for an over-budget surface: relocate the content to docs/PROJECT_CONTEXT.md (L2)
# or a docs/contracts/*.yaml contract (Decision 86); defer detail to an uncapped auxiliary file
# the surface points at instead of inlining it; or take the loud, Decision-cited raise above.
# NEVER split/decompose a surface into @-imported fragments to dodge this gate -- that fragments
# the ambient load an agent must read rather than reducing it (Decision 114/110
# anti-fragmentation). This is the one place this registry deliberately diverges from the SLOC
# registry's decompose-by-default relief valve (Decision 128 point 1 is SLOC-specific and does
# not apply here).
#
# Block-style only (one `key: N` per line): validate_prose_budget_raises parses the raw text
# (not yaml.safe_load, which drops the inline marker comment). Budget keys are globally unique
# across surface groups, so the raise-guard's flattened, indentation-blind line scan is lossless.
S1:
  root_ambient_load_set: 33215
S2:
  config/CLAUDE.md: 1820
  docs/CLAUDE.md: 3813
  scripts/CLAUDE.md: 2984
  src/data/handlers/CLAUDE.md: 4307
