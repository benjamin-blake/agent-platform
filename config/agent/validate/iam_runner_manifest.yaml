actions:
- action: athena:StartQueryExecution
  reason: Refresh Athena views after Iceberg compaction
  source: scripts/ops_writer.py
- action: athena:GetQueryExecution
  reason: Poll query status during view refresh
  source: scripts/ops_writer.py
- action: athena:GetQueryResults
  reason: Retrieve DQ check results from Athena
  source: scripts/data_quality_runner.py
- action: athena:ListWorkGroups
  reason: Validate workgroup availability before compaction
  source: scripts/ops_writer.py
- action: athena:GetWorkGroup
  reason: Validate workgroup availability before compaction
  source: scripts/ops_writer.py
- action: s3:GetObject
  reason: Read staging files for Iceberg compaction
  source: scripts/ops_writer.py
- action: s3:PutObject
  reason: Write Iceberg data and staging files
  source: scripts/ops_writer.py
- action: s3:DeleteObject
  reason: Delete temp staging objects after compaction (ops_writer.compact)
  source: scripts/ops_writer.py
- action: s3:ListBucket
  reason: List staging files in partition prefix
  source: scripts/ops_writer.py
- action: s3:GetBucketLocation
  reason: Resolve bucket region for SDK path-style requests
  source: scripts/ops_writer.py
- action: dynamodb:GetItem
  reason: Retrieve atomic ID counters for recommendations
  source: scripts/sync_recommendations.py
- action: dynamodb:Query
  reason: Query ID counters
  source: scripts/sync_recommendations.py
- action: dynamodb:Scan
  reason: Scan ID counters (legacy/fallback)
  source: scripts/sync_recommendations.py
- action: glue:GetDatabase
  reason: Resolve database metadata for DQ checks
  source: scripts/data_quality_runner.py
- action: glue:GetTable
  reason: Resolve table schema for DQ checks
  source: scripts/data_quality_runner.py
- action: glue:GetPartitions
  reason: List partitions for table-level DQ checks
  source: scripts/data_quality_runner.py
- action: glue:CreateTable
  reason: Create Iceberg tables during schema migrations
  source: scripts/ops_writer.py
- action: glue:UpdateTable
  reason: Update Iceberg table metadata after schema evolution
  source: scripts/ops_writer.py
- action: glue:DeleteTable
  reason: Drop staging tables during Iceberg compaction cleanup
  source: scripts/ops_writer.py
