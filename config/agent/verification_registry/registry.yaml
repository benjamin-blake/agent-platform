        c(''T4.1 merge state'', ''merge'' in shape and ''deploy_dispatch'' in shape)

        c(''CD.38 gates T4.9a'', ''T4.9a'' in cds.get(''CD.38'',{}).get(''gates'',[]))

        bad=[n for n,ok in checks if not ok]

        sys.exit(1 if bad else 0)

        '
