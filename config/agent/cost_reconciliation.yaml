# Cost reconciliation monitor -- baselines + thresholds (CD.28 / ULF-08).
# Human-owned: edit when provider pricing or policy thresholds shift.
# Not a pydantic-projection YAML (validate_pydantic_yaml_drift targets only
# config/agent/data_quality/ops.yaml); loaded into a plain pydantic model at runtime.
# No real invoice figures are committed here -- baselines are list-price reference
# points, not measured spend.

baseline:
  deepseek_input_per_mtok: 0.252
  deepseek_output_per_mtok: 0.378
  anthropic_pool_size_usd: 100.0

thresholds:
  deepseek_price_change_factor: 5.0
  anthropic_pool_utilisation_pct: 70.0
  s3_share_of_bill_pct: 50.0
  runner_cost_vs_scheduled_factor: 2.0
  step_functions_share_of_bill_pct: 5.0
  invoice_vs_telemetry_discrepancy_pct: 5.0

report:
  private_s3_prefix: "s3://agent-platform-data-lake/cost-reconciliation-reports/"
