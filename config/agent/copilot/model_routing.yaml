# Provider-aware model routing configuration for the executor pipeline.
# Decision 53: Gemini CLI is the active executor inference provider.
# Bedrock is dormant (reactivate via LLM_PROVIDER=bedrock if/when quotas restored).
# Interactive sessions (VS Code Copilot Chat) are NOT controlled by this config.

providers:
  gemini:
    cli_command: "gemini"
    headless_flags: ["-p", "--output-format", "json"]
    default_model: null  # null = Auto mode (recommended -- CLI picks pro/flash based on task)
    models:
      pro: "gemini-3-pro-preview"
      flash: "gemini-3-flash-preview"
      auto: null  # CLI auto-selects
  bedrock:
    status: dormant
    default_model: "deepseek.v3.2"
    models:
      mid: "deepseek.v3.2"
      opus: "claude-opus-4.6"

executor:
  default_provider: "gemini"
  roles:
    planning:
      effort_bands:
        XS: { model_tier: "flash" }
        S: { model_tier: "flash" }
        M: { model_tier: "auto" }
        L: { model_tier: "pro" }
        XL: { model_tier: "pro" }
    implementation:
      effort_bands:
        XS: { model_tier: "flash" }
        S: { model_tier: "flash" }
        M: { model_tier: "auto" }
        L: { model_tier: "pro" }
        XL: { model_tier: "pro" }
      file_pattern_floors:
        - pattern: "scripts/executor/"
          min_tier: "pro"
        - pattern: "scripts/validate.py"
          min_tier: "pro"
        - pattern: "config/prompts/"
          min_tier: "pro"
        - pattern: ".github/prompts/"
          min_tier: "pro"
        - pattern: ".github/instructions/"
          min_tier: "pro"
        - pattern: ".github/agents/"
          min_tier: "pro"
        - pattern: "copilot-instructions.md"
          min_tier: "pro"
    review:
      effort_bands:
        XS: { model_tier: "flash" }
        S: { model_tier: "flash" }
        M: { model_tier: "auto" }
        L: { model_tier: "pro" }
        XL: { model_tier: "pro" }
  escalation:
    flash_to: "auto"
    auto_to: "pro"
    pro_to: null  # top of hierarchy -- human intervention required

interactive:
  note: >
    Interactive sessions use VS Code Copilot Chat models (Opus, Sonnet).
    Not controlled by this config.
