# Data Quality Checks: Telemetry Tables
# Modelled after dbt test semantics. Each check compiles to an Athena SQL query.
# The runner asserts zero violations (rows that FAIL the check).
#
# Supported test types:
#   not_null        - column must not contain NULL values
#   unique          - column must have no duplicate values
#   accepted_values - column values must be in the given list
#   relationships   - FK column must reference an existing PK in another table
#   row_count       - table must have >= min rows (catches empty tables)
#   recency         - max(timestamp_column) must be within threshold of now
#   expression      - arbitrary SQL expression that must be true for all rows
#
# Severity levels:
#   error   - hard gate failure (blocks merge / fires Critical rec)
#   warn    - advisory (fires Medium rec, does not block)

# database/athena_workgroup must match ops.yaml -- data_quality_runner.main() aborts if two
# loaded YAMLs declare different values. Kept aligned to the personal account post-migration.
database: agent_platform
athena_workgroup: agent-platform-production

# Telemetry tables were NOT migrated to the personal account (public-migration, 2026-05-28).
# The checks are emptied so zero compile (load_checks does not honour an `enabled` key, so an
# empty map -- not a flag -- is what actually disables them and prevents TABLE_NOT_FOUND errors).
# Re-add the per-table check definitions if telemetry is reprovisioned.
tables: {}
