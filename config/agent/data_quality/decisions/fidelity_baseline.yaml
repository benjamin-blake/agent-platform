# Checked-in fidelity baseline/allowlist for the DECISIONS.md -> ops_decisions backfill's
# per-run fidelity tripwire (scripts/ops_portal/decisions.py::backfill_decisions_from_md).
# PLAN-daf-etl-parity-fidelity / Decision 134 clause 4 (DAF-01).
#
# NOT a zero-assertion: this is an allowlist-diff. The tripwire fails loud only on a NEW
# live-h2 entry (a "## Decision N:" heading in docs/DECISIONS.md, the live file -- the
# archive is not held to this bar) whose parsed decision_text is empty, or whose
# decided_date is non-empty-but-non-ISO, AND that is not already named below.
#
# Baselined entries are historical, pre-77-band, terse-style decisions that predate the
# "**Decision:**" / "**Status:**" / "**Date:**" bold-marker authoring convention -- the
# parser cannot recover fields that were never written in a recoverable shape. Do not add a
# NEW entry here to silence a real regression on a modern-band entry; a genuine parser or
# authoring regression on a live entry should be fixed, not baselined.
known_bad_live_entries:
  - decision_id: 63
    reason: >-
      Pre-77-band terse entry: prose body directly under the heading, no
      **Decision:**/**Status:**/**Date:** bold markers at all. decision_text is empty.
  - decision_id: 64
    reason: >-
      Pre-77-band terse entry: prose body directly under the heading, no
      **Decision:**/**Status:**/**Date:** bold markers at all. decision_text is empty.
  - decision_id: 65
    reason: >-
      Pre-77-band terse entry: prose body directly under the heading, no
      **Decision:**/**Status:**/**Date:** bold markers at all. decision_text is empty.
  - decision_id: 67
    reason: >-
      Audit DAF-01 anchor. Multi-clause amended decision (STRATEGIC-plan freeze) with no
      single **Decision:** body marker -- the content lives in clause-level Status/Reversal
      condition sub-sections instead, so decision_text is empty. decided_date is also empty:
      the only date-shaped text available is the Status-suffix clause "remove when reversal
      condition is met", which the DAF-01 ISO-guard correctly refuses to treat as a date.
