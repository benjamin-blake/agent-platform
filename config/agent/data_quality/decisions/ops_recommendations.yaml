  created_timestamp:
    root_cause_class: B
    human_decision: approved
    decided_date: '2026-05-07'
    decided_action: >
      Add not_null check to ops.yaml with exclude_before 2026-05-01 temporal gate once
      runner supports exclude_before. No data backfill -- the 23 null records are pre-SCD2
      migration bootstrap artifacts covered by the old date string column. SCD2 consistency
      check via expression: created_timestamp <= last_updated_timestamp (enforced, no
      temporal gate needed -- this invariant must hold for all rows regardless of age).
      Optional belt-and-suspenders: created_timestamp <= CURRENT_TIMESTAMP sanity check.
      No MAX(created_timestamp) assertion -- creation ordering is not guaranteed to be
      strictly sequential (batch imports and backfills are legitimate).
    enforcement_ready: NEEDS_TEMPORAL_GATE
    phase4_session: wave-5-deferred
    notes: >
      Null rate 3.7% (~23 records). Bootstrap artifact from the SCD2 schema migration
      (Decision 56, April 2026). Records written before the migration used a `date` string
      column for creation date; the migration mapped these to created_timestamp but some
      early records were missed or predated the migration. A not_null check with
      exclude_before 2026-05-01 covers post-migration records. Expression check
      created_timestamp <= last_updated_timestamp enforced for post-anchor records; was
      failing on the NULL-id ghost row (id=NULL, compact() artifact pre-PR-323) until
      that row was purged by cleanup_ops_rec_orphans.py.
    current_test: "not_null (enforced: true, exclude_before: 2026-05-01) + expression created_timestamp <= last_updated_timestamp (enforced: true, exclude_before: 2026-05-01)"
    last_verdict: PASS

  file:
    root_cause_class: C
    human_decision: approved
    decided_date: '2026-05-07'
    decided_action: >
      Validate file as a syntactically correct relative path at write time in
      ops_data_portal (no absolute paths, no backslashes as separators) -- do NOT check
      file existence, as recs targeting files to be created are valid. DQ check: not_null
      with exclude_before 2026-05-01 temporal gate. Backfill ~36 open recs missing file
      via manual inspection. Closed recs left as-is.
    enforcement_ready: GRADUATED
    phase4_session: complete
    resolved_date: '2026-05-11'
    resolution_pr: '#320'
    notes: >
      Null rate 5.7% (~36 records). Write path gap: the file field is required by the
      recommendation schema but older recs filed via brainstorm or manual sessions did not
      always set it. The ops_data_portal validates file for new records. Remediation:
      backfill missing file values for open recs via ops_data_portal, then enforce with
      temporal gate. A not_null check can be added to ops.yaml once the write-path fix
      is deployed.
    current_test: "not_null (enforced: true, exclude_before 2026-05-01)"
    last_verdict: PASS

  context:
    root_cause_class: C
    human_decision: approved
    decided_date: '2026-05-07'
    decided_action: >
      Enforce 80-character minimum at write time in ops_data_portal AND as a DQ
      expression check (LENGTH(TRIM(context)) >= 80) with exclude_before 2026-05-01
      temporal gate. 80 characters is one complete sentence -- sufficient to answer
      "why does this rec exist" without being burdensome; prevents trivial entries
      like "fix bug" or "add test". Backfill ~36 open recs with missing/thin context
      via manual review. Closed recs left as-is.
    enforcement_ready: GRADUATED
    phase4_session: complete
    resolved_date: '2026-05-11'
    resolution_pr: '#320'
    notes: >
      Null rate 5.7% (~36 records). Same cohort and root cause as file. The context field
      is required in spirit but was not validated at write time in early sessions.
      Same remediation path as file.
    current_test: "not_null (enforced: true) + expression LENGTH(TRIM(context))>=80 (enforced: true, exclude_before 2026-05-01)"
    last_verdict: PASS

  acceptance:
    root_cause_class: C
    human_decision: approved
    decided_date: '2026-05-07'
    decided_action: >
      Split validation into two tiers. Tier 1 (write time, portal): call
      lint_acceptance_command() in file_rec() to reject banned patterns immediately
      (python -c one-liners, absolute paths, line-number greps, fenced blocks, bad bash
      syntax). These rules are always correct regardless of file state. Tier 2 (execution
      time, executor): validate_acceptance_feasibility() remains at execution time only --
      file existence is context-dependent on what the implementation creates. DQ check:
      not_null with exclude_before 2026-05-01 temporal gate only -- no structural
      acceptance validation in the DQ runner, that is the portal's job. Backfill ~36
      open recs missing acceptance via manual authoring. Closed recs left as-is.
      Pre-requisite within same implementation scope: rec-626 (High/S, open) -- 78 records
      carry prose instead of shell commands; step_runner.run_acceptance() silently returns
      True for these (backwards-compat path), creating false verification confidence.
      Category 1 (open + automatable=true: rec-108, rec-095, rec-130, rec-549) must have
      acceptance converted to grep/pytest commands before the executor targets them.
    enforcement_ready: GRADUATED
    phase4_session: complete
    resolved_date: '2026-05-11'
    resolution_pr: '#320'
    notes: >
      Null rate 5.7% (~36 records). Same cohort and root cause as file and context. The
      acceptance command is required by the recommendation schema but was omitted in early
      brainstorm/manual recs. Same remediation path.
    current_test: "not_null (enforced: true, exclude_before 2026-05-01)"
    last_verdict: PASS

  resolution:
    root_cause_class: A
    human_decision: deferred
    decided_date: '2026-05-07'
    deferred_reason: >
      Resolution semantics depend on the outcome of the execution fields architectural
      review (see deferred execution_result/execution_date/execution_branch/execution_pr_url/
      execution_steps). If execution state is normalised to ops_execution_plans/telemetry,
      the definition of "why a rec was resolved" changes and may affect what resolution
      is expected to contain. Revisit in a dedicated architectural session on execution
      state normalisation.
    enforcement_ready: NO_TEST_NEEDED
    phase4_session: deferred
    notes: >
      Null rate 86.5% (~545 records). Resolution is ONLY meaningful for declined,
      superseded, or failed recommendations -- approximately 3% of the corpus. A universal
      not_null check would fail for 97% of records correctly. A conditional check
      (resolution is not null WHERE status IN declined, superseded, failed) would be
      meaningful but the DQ runner does not currently support conditional checks.
      No universal not_null check should be added. Flag as future work if conditional
      check support is added to the runner.
    current_test: none
    last_verdict: no test

  execution_result:
    root_cause_class: C
    human_decision: deferred
    decided_date: '2026-05-07'
    deferred_reason: >
      Pending architectural decision on whether execution state fields belong in
      ops_recommendations or should be normalised to ops_execution_plans/telemetry.
      The rec_id joining key provides a normalised alternative to denormalising executor
      output into the recs table. Duplicated state creates two sources of truth that can
      drift (rec says success, execution plan says failed). Revisit in a dedicated session
      on execution state normalisation alongside resolution, execution_date,
      execution_branch, execution_pr_url, and execution_steps.
    enforcement_ready: NO_TEST_NEEDED
    phase4_session: wave-4-deferred
    notes: >
      Null rate 62.5% (~394 records). Intentionally null for all open recommendations
      and all manually-implemented recommendations (execution_result='manual' is set only
      when the executor ran). A universal not_null check would fail for all open recs.
      A conditional check (execution_result is not null WHERE status IN closed, failed)
      would be meaningful but requires conditional check support in the runner. No
      universal check should be added.
    current_test: none
    last_verdict: no test

  execution_date:
    root_cause_class: C
    human_decision: deferred
    decided_date: '2026-05-07'
    deferred_reason: "See execution_result deferred_reason -- same architectural review."
    enforcement_ready: NO_TEST_NEEDED
    phase4_session: wave-4-deferred
    notes: >
      Null rate 64.0% (~403 records). Same pattern as execution_result -- set by the
      executor on close only. No universal check appropriate.
    current_test: none
    last_verdict: no test

  execution_branch:
    root_cause_class: C
    human_decision: deferred
    decided_date: '2026-05-07'
    deferred_reason: "See execution_result deferred_reason -- same architectural review."
    enforcement_ready: NO_TEST_NEEDED
    phase4_session: wave-4-deferred
    notes: >
      Null rate 66.8% (~421 records). Same pattern as execution_result. No universal
