  dependencies:
    root_cause_class: A
    human_decision: approved
    decided_date: '2026-05-07'
    decided_action: >
      Nullable array<string> -- no not_null check (null means no dependencies, which is
      the valid common case for most recs). When non-null, each element must match
      ^rec-[0-9]+$ via array expression check:
      CARDINALITY(FILTER(dependencies, x -> NOT REGEXP_LIKE(x, '^rec-[0-9]+$'))) = 0
      (enforced). Referential integrity: relationships check to_table=ops_recommendations
      severity=warn (array RI; blocked on rec-609 resolution -- array<string> returned as
      string from Athena breaks element iteration). Both checks blocked on rec-609 and
      exclude_before runner support. No data backfill needed -- no known invalid values
      in current records.
    enforcement_ready: NO_TEST_NEEDED
    phase4_session: deferred-rec-609
    notes: >
      Truly optional array field (array<string>). Most recommendations have no
      inter-rec dependencies. A not_null check would be semantically wrong -- null
      dependencies means no dependencies, which is the expected state. No check needed.
    current_test: none
    last_verdict: no test

  tags:
    root_cause_class: A
    human_decision: approved
    decided_date: '2026-05-07'
    decided_action: >
      Tags are an analytical dimension requiring a canonical allowed list, not a free-form
      array. Create config/agent/data_quality/tag_registry.yaml as the authoritative tag taxonomy.
      Each entry carries the canonical kebab-case value, description of what it categorises,
      and added_date. Portal validates each element of the tags array against the registry
      at write time -- unregistered tag triggers a warning that prompts the agent to
      register or use an existing tag (softer governance than source, which is a CI gate,
      because tag vocabulary grows faster than agent types). DQ runner: expression check
      validating all elements match ^[a-z][a-z0-9-]*$ (format backstop, blocked on rec-609
      array<string> fix). Registry is the semantic gate; regex is the structural gate.
      Future: auto-tagging by agents via content analysis is compatible with the registry
      pattern -- auto-generated tags still require registry membership.
    enforcement_ready: NO_TEST_NEEDED
    phase4_session: deferred-rec-609
    notes: >
      Truly optional array field (array<string>). Categorisation tags are not required
      by any workflow. A not_null check would be semantically wrong. No check needed.
