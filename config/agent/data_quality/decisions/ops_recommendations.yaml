# human_decision values: pending | approved | deferred | declined
# enforcement_ready values: READY_NOW | NEEDS_TEMPORAL_GATE | NEEDS_WRITE_FIX |
#   NEEDS_DATA_CORRECTION | NEEDS_PROTOTYPE | REMOVE_TEST | NO_TEST_NEEDED

table: ops_recommendations
description: Recommendation lifecycle records (SCD Type 2, n=630 local cache as of 2026-05-06)
bootstrap_anchor: '2026-05-01'
last_updated: '2026-05-12'
decisions_session: '2026-05-06'

# Pre-plan investigation DQ run: 2026-05-06T13:54Z
# Result: 11 FAIL + 1 WARN + 1 ERROR + 2 PASS (16 checks total)
# Note: latest dq-latest.json (14:16Z) shows 16 ERROR -- Athena was unreachable.
# Null rates and invalid value counts sourced from local JSONL cache (n=630).

fields:

  # --------------------------------------------------------------------------
  # Tested fields (covered by ops.yaml checks)
  # --------------------------------------------------------------------------

  id:
    root_cause_class: B
    human_decision: approved
    decided_date: '2026-05-07'
    decided_action: >
      not_null enforced with exclude_before 2026-05-01 temporal gate. Format check via
      expression: id RLIKE '^rec-[0-9]+$' (enforced, exclude_before 2026-05-01) -- rejects
      dec-XXX and empty-string IDs post-enforcement anchor. Uniqueness enforced at the
      _current view level only (not the base table; SCD2 legitimately produces multiple rows
      per ID). The 1 empty-string open record (title='Two-tier validation architecture...')
      is a bootstrap artifact -- left as-is, ages out via the exclude_before gate.
    enforcement_ready: NEEDS_TEMPORAL_GATE
    phase4_session: wave-5-deferred
    notes: >
      Null rate 0.2% (~1-2 records). Bootstrap artifact: a small number of very early
      records were written before the id field was required. The write path now always
      sets id via DynamoDB allocation. Temporal gate with exclude_before 2026-05-01 would
      scope the check to post-enforcement records only.
    current_test: "not_null (enforced: false)"
    last_verdict: FAIL

  date:
    root_cause_class: A
    human_decision: approved
    decided_date: '2026-05-07'
    enforcement_ready: REMOVE_TEST
    phase4_session: complete
    notes: >
      The `date` column was removed from the Iceberg schema as part of Decision 56
      (SCD2 simplification, April 2026). The not_null check in ops.yaml references a
      column that no longer exists. The DQ runner returns ERROR (not FAIL) for this check.
      Action: delete the `date` column section from ops_recommendations in ops.yaml.
      No data change needed.
    current_test: "not_null (enforced: false)"
    last_verdict: ERROR

  title:
    root_cause_class: B
    human_decision: approved
    decided_date: '2026-05-07'
    decided_action: >
      not_null enforced with exclude_before 2026-05-01 temporal gate. Minimum 10 characters
      enforced at write time in ops_data_portal -- prevents stub titles ("fix bug", "test")
      that are useless as executor planning input. Duplicate check: unique severity warn on
      _current view only -- hard enforcement rejected because legitimate near-duplicate
      titles exist (e.g. "Add test coverage for X" across different modules). The 2 null
      bootstrap records resolve via the exclude_before gate.
    enforcement_ready: READY_NOW
    phase4_session: dq-write-enforcement-unification
    resolved_date: '2026-05-11'
    resolution_pr: '#322'
    notes: >
      Null rate 0.3% (~2 records). Bootstrap artifact: same cohort as id/source/effort/
      priority. These appear to be dec-XXX records (ops_decisions entries written to the
