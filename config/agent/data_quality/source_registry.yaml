# Source Registry -- canonical agent-type taxonomy for ops_recommendations.source
# Maintained as the single source of truth for valid source values.
# Enforced at write time in scripts/ops_data_portal.py via validate_source().
# CI guard in scripts/validate.py verifies schedule.yaml agent names are registered.
# Added: 2026-05-08 (Wave 1 of DQ Phase 4, Decision 66)

entries:
  - canonical_id: executor-postmortem
    description: "Autonomous postmortem agent that analyses failed executor runs and files recovery recommendations"
    signal_interpretation: "Recommendation filed as a result of an executor failure. High density signals executor reliability regression or boundary misconfiguration."
    added_date: '2026-05-08'

  - canonical_id: executor-supervision
    description: "Human-supervised executor session that monitors, diagnoses, and steers autonomous executor runs"
    signal_interpretation: "Recommendation filed during a human-in-the-loop supervision session. Often corrective; indicates a gap in autonomous executor capability."
    added_date: '2026-05-08'

  - canonical_id: code-review
    description: "Automated code review agent that audits changed files for quality, safety, and repository-wide pattern compliance"
    signal_interpretation: "Recommendation filed by the code-review skill post-implementation. Medium/Low priority recs from this source are deferred improvement items; Critical/High are mandatory pre-merge."
    added_date: '2026-05-08'

  - canonical_id: planning
    description: "Planning agent or /plan workflow session that produces PLAN-{slug}.md implementation briefs"
    signal_interpretation: "Recommendation filed as a scoping or gap artefact during planning. Often represents work deliberately deferred from the plan scope."
    added_date: '2026-05-08'

  - canonical_id: brainstorm
    description: "Exploratory brainstorming or design session that generates candidate improvements without committing to a plan"
    signal_interpretation: "Low-commitment recommendation; may be superseded or declined as design evolves. High volume from this source suggests the system is in an exploratory phase."
    added_date: '2026-05-08'

  - canonical_id: doc-freshness
    description: "Scheduled agent that identifies documentation files stale relative to their source files"
    signal_interpretation: "Recommendation filed because a doc has not been updated since its corresponding source changed. Volume tracks documentation debt accumulation rate."
    added_date: '2026-05-08'

  - canonical_id: orphan-code
    description: "Scheduled agent that detects unreferenced functions, classes, and modules in scripts/ and src/"
    signal_interpretation: "Recommendation filed for dead code removal. Persistent volume suggests refactoring cycles leave orphans; zero volume means codebase is clean or agent is misconfigured."
    added_date: '2026-05-08'

  - canonical_id: transcript-review
    description: "Scheduled agent that analyses recent session transcripts for recurring friction patterns and unresolved issues"
    signal_interpretation: "Recommendation filed from transcript analysis. Recurring themes across transcripts indicate systemic friction; one-off findings indicate ad-hoc gaps."
    added_date: '2026-05-08'

  - canonical_id: code-smell
    description: "Scheduled agent that performs lightweight static analysis for code quality issues"
    signal_interpretation: "Recommendation filed for code quality improvement. Persistent volume at the same file paths indicates the executor is not clearing its own debt."
    added_date: '2026-05-08'

  - canonical_id: prompt-quality
    description: "Scheduled agent that evaluates prompt file quality, specificity, and adherence to prompt engineering standards"
    signal_interpretation: "Recommendation filed for prompt improvement. High volume signals prompt engineering debt is accumulating faster than the executor can address it."
    added_date: '2026-05-08'

  - canonical_id: rec-curator
    description: "Scheduled agent that audits the recommendation backlog for staleness, duplicates, and superseded entries"
    signal_interpretation: "Recommendation filed for backlog hygiene. Volume tracks recommendation lifecycle health; low volume means the backlog is clean."
    added_date: '2026-05-08'

  - canonical_id: manual
    description: "Human operator filing a recommendation directly via the ops_data_portal CLI or Python API"
    signal_interpretation: "Human-initiated recommendation. Always treated as intentional; not subject to automated source injection. High volume indicates active human oversight or bootstrapping activity."
    added_date: '2026-05-08'

  - canonical_id: scoping
    description: "Scoping agent or /implement workflow that decomposes a STRATEGIC plan into atomic executor recommendations"
    signal_interpretation: "Recommendation filed by the scoping step of /implement. Volume tracks how many strategic plans have been broken down; should correlate with planning activity."
    added_date: '2026-05-08'

  - canonical_id: cli-migration-analysis
    description: "One-time analysis agent that audited the codebase for CLI migration gaps and compatibility issues"
    signal_interpretation: "Recommendation filed during a targeted migration analysis session. Low expected volume; historical source for recs filed during the copilot-to-Claude Code CLI transition."
    added_date: '2026-05-08'

  - canonical_id: telemetry-audit
    description: "Agent session that audited telemetry coverage, schema correctness, and instrumentation gaps"
    signal_interpretation: "Recommendation filed to improve observability. Volume tracks instrumentation debt; should trend to zero as telemetry matures."
    added_date: '2026-05-08'

  - canonical_id: executor-gap-analysis
    description: "Agent session that analysed gaps between executor capability and the open recommendation backlog"
    signal_interpretation: "Recommendation filed to extend executor capability boundary. High volume indicates the boundary is being actively pushed; zero volume indicates the boundary is stable."
    added_date: '2026-05-08'

  - canonical_id: architectural-review
    description: "Agent session that reviewed system architecture, design decisions, and structural integrity"
    signal_interpretation: "Recommendation filed from an architectural review. Typically high-impact, low-volume. Source used for structural or cross-cutting recommendations that do not fit a single file target."
    added_date: '2026-05-08'

  - canonical_id: implement-agent
    description: "Implementation agent (/implement workflow) filing recs for out-of-scope issues discovered during execution"
    signal_interpretation: "Recommendation filed as a side-effect of implementation work. Indicates scope creep was avoided by filing rather than fixing inline. Volume tracks discipline of the out-of-scope rule."
    added_date: '2026-05-08'

  - canonical_id: cc-scheduled-agent-test
    description: "Test invocation of a Claude Code scheduled agent, used to verify harness routing and packaging integrity"
    signal_interpretation: "Recommendation filed during a smoke-test or harness validation run. Should be rare; unexpected volume indicates test runs are producing artefacts in production."
    added_date: '2026-05-08'

  - canonical_id: workflow-audit
    description: "Agent session that audited CI/CD workflows, automation scripts, and operational runbook coverage"
    signal_interpretation: "Recommendation filed to improve automation reliability. Volume tracks workflow debt; should trend to zero as automation matures."
    added_date: '2026-05-08'

  - canonical_id: tech-debt
    description: "Agent session focused on identifying and cataloguing technical debt items for future resolution"
    signal_interpretation: "Recommendation filed as an explicit tech-debt item. High volume signals intentional debt accumulation; low volume means debt is being addressed faster than it accumulates."
    added_date: '2026-05-08'

  - canonical_id: delegate-investigation
    description: "Agent session delegated to investigate a specific issue, behaviour, or anomaly and report findings"
    signal_interpretation: "Recommendation filed as an outcome of a delegated investigation. Volume tracks how often investigations produce actionable findings vs. closing without recs."
    added_date: '2026-05-08'

  - canonical_id: infra-recommendation-executor
    description: "Infrastructure-focused executor session that implements Terraform, AWS config, or deployment recommendations"
    signal_interpretation: "Recommendation filed during infrastructure implementation work. Volume tracks infra debt; should correlate with Terraform and Lambda change rate."
    added_date: '2026-05-08'

  - canonical_id: autonomous-postflight-cleanup
    description: "Autonomous postflight agent that performs session-close cleanup, log sync, and outbox drain operations"
    signal_interpretation: "Recommendation filed during automated session cleanup. Unexpected volume may indicate the postflight is over-reaching its cleanup scope."
    added_date: '2026-05-08'

  - canonical_id: agent-cron
    description: "Legacy Lambda catch-all source value for all scheduled agents dispatched via the CloudWatch Events Lambda path (disabled May 2026)"
    signal_interpretation: "Historical source value from the Lambda-based scheduler era. Present in bootstrap JSONL cache for recs filed before the Claude Code scheduled agent migration. No new recs should carry this value -- use the specific agent canonical_id instead."
    added_date: '2026-05-08'

  - canonical_id: ci_rca
    description: "CI failure root-cause analysis agent triggered by workflow_run on CI failure; files a single critical rec per failed run"
    signal_interpretation: "Recommendation filed by automated CI triage. Each rec maps to one failed CI run. Open recs from this source are surfaced by session_preflight.py and block new feature work until reviewed in a /plan session."
    added_date: '2026-05-11'

  - canonical_id: budget_breach
    description: "Fast-tier validation budget breach detector in scripts/validate.py; fires when --pre wall-clock exceeds 5 minutes"
    signal_interpretation: "Recommendation filed automatically when the fast tier overruns its 5-minute design budget. Accumulation signals that slow checks have crept into the fast tier. Zero volume is the target state."
    added_date: '2026-05-13'

  - canonical_id: budget_bypass
    description: "Fast-tier budget assertion bypass audit; filed when --ignore-budget flag is used on validate.py --pre"
    signal_interpretation: "Recommendation filed each time an operator bypasses the fast-tier budget gate. Three or more in a rolling 7-day window surfaces a soft alert in session_preflight. Persistent volume indicates the fast tier needs to be restructured, not repeatedly bypassed."
    added_date: '2026-05-13'

  - canonical_id: implement-session
    description: "Legacy source value for recs filed during an /implement session before the canonical implement-agent / scoping taxonomy was adopted"
    signal_interpretation: "Historical source value present in the migrated bootstrap data only. No new recs should carry this value -- use implement-agent or scoping instead. Registered as a legacy entry so the public-migration import (Phase C) passes validate_source for these preserved rows."
    added_date: '2026-05-28'

  - canonical_id: Autonomous Postflight Cleanup
    description: "Legacy free-text source value (Title Case, with spaces) for recs filed by the autonomous postflight before the kebab-case autonomous-postflight-cleanup canonical_id was adopted"
    signal_interpretation: "Historical source value present in the migrated bootstrap data only; validate_source is exact-match so this differs from autonomous-postflight-cleanup. No new recs should carry this value -- use autonomous-postflight-cleanup instead. Registered so the public-migration import (Phase C) preserves the source verbatim without aborting."
    added_date: '2026-05-28'

  - canonical_id: tf_drift
    description: "Scheduled Terraform drift detector that runs terraform plan against sandbox and flips the convergence record on a state-vs-code delta"
    signal_interpretation: "A green->red convergence flip from out-of-band infra drift -- volume tracks how often real infra diverges from code. One rec per drift event (deduped while the record is already red); rec clears via the dispatch-ack apply path (the converged apply writes green, then the rec is closed via the standard portal path)."
    added_date: '2026-06-24'

  - canonical_id: tf_convergence_stale
    description: "CD-convergence staleness escalation sensor (CD.35 Wave 6 / T2.35): fires when the sandbox convergence record has been red longer than the configured threshold, or when a terraform-apply-sandbox gated-apply job has been waiting on the tf-gated-apply Environment beyond threshold"
    signal_interpretation: "Persistence escalation -- one rec per red-episode (deduped: update_rec on subsequent over-threshold ticks; no duplicate filing). Volume tracks how often the convergence pipeline stalls without self-clearing. The rec closes automatically when the record returns to green (next sensor tick runs update_rec --status closed). A rec from this source does NOT hard-block the /plan queue (priority=High, not source=ci_rca/priority=critical); it escalates visibly without wedging planning."
    added_date: '2026-06-27'

  - canonical_id: ci_rca_evidence_dispute
    description: "Typed dispute path against an existing source=ci_rca rec: routes agent/bundle disagreement through /plan human review (Decision 72) rather than a silent agent override. Filed when the ci-rca agent's detection_gap cross-check disagrees with the deterministic evidence bundle on earliest_viable_gate or actual_gate_that_caught_it (INTENT Section 2 / Section 4 check 8)."
    signal_interpretation: "Review-resolution flow: open dispute recs surface in /plan under 'CI-RCA Dispute Recs (open)'. When the bundle SCRIPT logic is the defect, /plan scopes a PLAN-ci-rca-evidence-script fix; when the AGENT value is wrong, the dispute is closed declined. Dispute recs do NOT hard-block the /plan queue (they are review requests, not CI failures). High volume without resolution indicates the evidence bundle script needs a targeted fix."
    added_date: '2026-06-29'

  - canonical_id: ci_rca_probe_health
    description: "CI-RCA probe abstention health sensor (T1.13 c12(i)): fires when the deterministic evidence probe's abstention rate (rca_confidence=undetermined across source=ci_rca recs in the trailing window) meets or exceeds threshold, indicating the probe is systematically unable to classify earliest_viable_gate/escape_mode."
    signal_interpretation: "Persistence escalation -- one rec per sustained-abstention episode (deduped: update_rec on subsequent over-threshold ticks; no duplicate filing). Volume tracks how often the deterministic evidence bundle degrades to a pass-through. The rec closes automatically when the abstention rate returns under threshold (next sensor tick runs update_rec --status closed with the sub-threshold rate recorded as proof). A rec from this source does NOT hard-block the /plan queue (priority=High, not source=ci_rca/priority=critical); it escalates visibly without wedging planning."
    added_date: '2026-07-01'

  - canonical_id: cost_reconciliation
    description: "Monthly invoice-vs-telemetry cost reconciliation monitor (CD.28 / ULF-08): evaluates the five cost_projection.reevaluation_triggers plus KG.7's programmatic-pool-exhaustion concern against a per-provider cost snapshot and files a rec when a trigger trips or the invoice/telemetry discrepancy exceeds 5%."
    signal_interpretation: "Alarm-not-gate cost signal (Decision 55 / Decision 62) -- deduped one-rec-per-trigger-episode (update_rec on persistence) and auto-closed on clear (update_rec status=closed), mirroring the tf_convergence_stale / ci_rca_probe_health pattern. Volume tracks how often the cost envelope's watched lines breach; it never blocks a merge or auto-remediates."
    added_date: '2026-07-02'

  - canonical_id: ci_rca_warn_period_audit
    description: "Phase-4 back-validation CLI (scripts.ops_data_portal --back-validate, T1.13 c2 enabler): re-validates warn-period source=ci_rca recs against the current CI_RCA_STRICT_MODE schema and, with --refile-audit, files one audit rec per non-conformant parent (schema deficiency or a stamped non-schema warn_mode_reject reason), capped at 20/day."
    signal_interpretation: "Surfacing-only audit trail (Decision 55) -- never auto-closes, auto-remediates, or flips the strict-mode flag. Each rec carries the parent rec id and its failing-checks list. Volume tracks how many warn-period recs would have been rejected under strict mode; feeds the evidence base for the CI_RCA_STRICT_MODE warn->strict cutover decision (T1.13 c2), it does not perform the flip."
    added_date: '2026-07-05'
