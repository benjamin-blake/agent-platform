# Supersession-annotation waiver allowlist (DPI-01, PLAN-decisions-supersession-guard).
#
# scripts/checks/decisions/validate_supersession_annotations.py's forward-pointer sub-check FAILs
# any (superseder, victim) edge extracted from docs/DECISIONS.md / docs/DECISIONS_ARCHIVE.md whose
# victim block carries no annotation pointing back at the superseder -- UNLESS the edge is listed
# here. Waiving an edge is a deliberate operator ruling that the victim's core still stands
# (clause-level amend, partial/scoped supersession, or a citation false-positive), made explicit
# and auditable rather than baked into extractor regex cleverness. A waived edge that later
# becomes annotated is a WARN (stale waiver), not a FAIL -- prune it here when convenient, but it
# never blocks the build.
#
# Every entry MUST name a real (superseder, victim) edge the extractor currently produces; run
# the extractor before editing this file if unsure. Do not add a waiver for a genuinely-new,
# unannotated FULL supersession -- annotate the victim instead (Wave 1 DPI-02 pattern).
